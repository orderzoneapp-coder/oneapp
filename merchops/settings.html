<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Global Settings [v1.95]</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #000000; color: #c9d1d9; margin: 0; overflow: hidden; user-select: none; }
        
        .term-bg { background-color: #010409; }
        .term-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .term-border { border-color: #30363d; }
        .term-input { background-color: #010409; border: 1px solid #30363d; color: #c9d1d9; outline: none; transition: border-color 0.2s; }
        .term-input:focus { border-color: #58a6ff; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #30363d; background-color: #010409; color: #8b949e; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip.active { background-color: rgba(88,166,255,0.1); border-color: #58a6ff; color: #58a6ff; font-weight: bold; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; } 
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .slide-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .slide-out { animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
    </style>
</head>
<body class="term-bg text-sm h-screen flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // 🔒 [보안] F12 및 우클릭 원천 차단
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = { SETTINGS: 'oneapp_global_settings', MASTER: 'BASE_CATALOG', DICT: 'PARSER_DICT' };
        const generateUUID = () => Math.random().toString(36).substr(2, 9);

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "오더즈", 
            "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", 
            "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", 
            "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", 
            "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", 
            "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그", "순번"
        ];
        const REQUIRED_COLS = ['품목코드'];

        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V3', 1);
            req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const clearIDB = async () => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').clear();
                tx.oncomplete = () => resolve();
            });
        };

        const DEFAULT_SETTINGS = {
            appScriptUrl: 'https://script.google.com/macros/s/AKfycbzEciWpT_TTxFQlfFr_wXpSfLO3abCV_xwdSH1iJji5itjNHb6uyrtuQ52EIONF8lw-/exec',
            targetCatalogs: [],
            marginRules: [
                { id: generateUUID(), condition: '01', unit: 'box, 박스, BOX', type: 'divide', rate: 10 },
                { id: generateUUID(), condition: '01', unit: '개, 낱개, 소분, EA, ea', type: 'divide', rate: 15 },
                { id: generateUUID(), condition: '*', unit: 'box, 박스, BOX', type: 'divide', rate: 10 },
                { id: generateUUID(), condition: '*', unit: '개, 낱개, 소분, EA, ea', type: 'divide', rate: 15 },
                { id: generateUUID(), condition: '전체', unit: '전체', type: 'divide', rate: 20 }
            ],
            mappings: {
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드',
                '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량',
                '구매처': '거래처명, 구매처, 거래처', '견적서': '견적서, 카테고리, 템플릿',
                '단위': '단위, 판매단위', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 판매가',
                '도매A': '도매A, A판매', '입고B': 'B단가, 입고B', '간단설명': '지시사항, 간단설명, 비고'
            },
            masterLinks: {
                '창고': '창고', '구매처': '구매처', '견적서': '견적서', '단위': '단위',
                '입고가': '입고가', '출고가': '출고가', '도매A': '도매A', '입고B': '입고B', '간단설명': '간단설명', '순번': '순번'
            },
            visibleMasterCols: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'],
            visibleUploadCols: ['순번', '창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명']
        };

        function SettingsApp() {
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [activeTab, setActiveTab] = useState('cloud');
            const [isSyncing, setIsSyncing] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            
            // 모달 애니메이션 상태
            const [isVisible, setIsVisible] = useState(false);
            const [isClosing, setIsClosing] = useState(false);

            const [resetSettingsText, setResetSettingsText] = useState('');
            const [wipeDBText, setWipeDBText] = useState('');
            const [newMapTarget, setNewMapTarget] = useState('');
            const [newMapKeywords, setNewMapKeywords] = useState('');

            const mockCatalogs = ['공통식자재', '냉동수산', '가공품', '포장재'];

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            // 앱 접속 즉시 슬라이드 인 애니메이션 실행
            useEffect(() => {
                const timer = setTimeout(() => setIsVisible(true), 50);
                getIDB(CORE_KEYS.SETTINGS).then(data => { if (data) setSettings(data); });
                return () => clearTimeout(timer);
            }, []);

            // ESC 키 입력 시 닫기
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'Escape' && isVisible) handleClose(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isVisible]);

            // 닫기 로직 (애니메이션 후 이전 페이지로 복귀)
            const handleClose = () => {
                setIsClosing(true);
                setTimeout(() => {
                    if (window.history.length > 1) {
                        window.history.back(); // 이전 앱으로 복귀
                    } else {
                        window.location.href = 'master.html'; // 이전 기록 없으면 마스터로 폴백
                    }
                }, 300); // 애니메이션 시간 대기
            };

            const handleSave = async () => {
                await setIDB(CORE_KEYS.SETTINGS, settings);
                localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                showToast('✅ 환경설정이 안전하게 저장되었습니다.');
                setTimeout(() => handleClose(), 1000);
            };

            const handleCloudSync = async () => {
                if (!settings.appScriptUrl) return showToast('⚠️ GAS API URL을 먼저 설정해주세요.');
                try {
                    setIsSyncing(true);
                    const resMaster = await fetch(settings.appScriptUrl, { method: 'POST', body: JSON.stringify({ action: 'PULL_MASTER' }) }).then(r => r.json());
                    if (resMaster.status === 'success') await setIDB(CORE_KEYS.MASTER, resMaster.data.master); 
                    else throw new Error(resMaster.message);

                    const resDict = await fetch(settings.appScriptUrl, { method: 'POST', body: JSON.stringify({ action: 'PULL_DICT' }) }).then(r => r.json());
                    if (resDict.status === 'success') await setIDB(CORE_KEYS.DICT, resDict.data.dict); 
                    else throw new Error(resDict.message);

                    showToast('✅ 클라우드 동기화 완료! (가벼운 마스터 & 딕셔너리 로드)');
                } catch (e) {
                    showToast('❌ 동기화 실패: ' + e.message);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleResetSettings = async () => {
                if (resetSettingsText !== '설정초기화') return;
                await setIDB(CORE_KEYS.SETTINGS, DEFAULT_SETTINGS); 
                setSettings(DEFAULT_SETTINGS); 
                setResetSettingsText('');
                showToast('♻️ 마진 룰 및 매핑 설정이 기본값으로 복원되었습니다.');
            };

            const handleWipeDB = async () => {
                if (wipeDBText !== 'DB완전삭제') return;
                await clearIDB(); 
                await setIDB(CORE_KEYS.SETTINGS, settings); 
                setWipeDBText('');
                showToast('🚨 로컬 마스터 데이터 및 대기열이 영구 삭제되었습니다.');
            };

            const handleAddMapping = () => {
                if (!newMapTarget || !newMapKeywords) return showToast('⚠️ 타겟 속성과 키워드를 모두 입력하세요.');
                setSettings(p => ({
                    ...p, mappings: { ...p.mappings, [newMapTarget]: newMapKeywords }, masterLinks: { ...p.masterLinks, [newMapTarget]: newMapTarget }
                }));
                setNewMapTarget(''); setNewMapKeywords('');
                showToast('✅ 새 매핑 규칙이 추가되었습니다.');
            };

            const handleRemoveMapping = (key) => {
                if (REQUIRED_COLS.includes(key)) return showToast('⚠️ 필수 컬럼은 삭제할 수 없습니다.');
                const newMappings = { ...settings.mappings }; delete newMappings[key];
                const newLinks = { ...settings.masterLinks }; delete newLinks[key];
                setSettings(p => ({ ...p, mappings: newMappings, masterLinks: newLinks }));
            };

            const lnbMenu = [
                { id: 'cloud', icon: 'fas fa-cloud', label: '1. 시스템 & 클라우드' },
                { id: 'catalog', icon: 'fas fa-tags', label: '2. 기준 카탈로그 제어' },
                { id: 'margin', icon: 'fas fa-calculator', label: '3. 단가 마진율 (÷, ×)' },
                { id: 'mapping', icon: 'fas fa-file-excel', label: '4. 엑셀 매핑 사전 확장' },
                { id: 'ui', icon: 'fas fa-desktop', label: '5. 화면 노출 컬럼 설정' },
                { id: 'danger', icon: 'fas fa-exclamation-triangle', label: '6. 시스템 초기화', color: 'text-[#f85149]' }
            ];

            return (
                <div className="fixed inset-0 z-50 flex justify-end overflow-hidden">
                    {/* Backdrop (화면 밖 터치 영역) */}
                    <div 
                        className={`absolute inset-0 bg-black/70 backdrop-blur-sm transition-opacity duration-300 ${isVisible && !isClosing ? 'opacity-100' : 'opacity-0'}`} 
                        onClick={handleClose}
                    ></div>

                    {/* Sliding Modal Panel (최대 1600px, 너비 85%) */}
                    <div className={`relative w-[85%] max-w-[1600px] h-full bg-[#0d1117] shadow-[-10px_0_30px_rgba(0,0,0,0.8)] flex flex-col border-l term-border ${isVisible && !isClosing ? 'slide-in' : ''} ${isClosing ? 'slide-out' : 'translate-x-full'}`}>
                        
                        <div className="flex flex-1 overflow-hidden h-full">
                            {/* 좌측 LNB 네비게이션 */}
                            <div className="w-[300px] bg-[#010409] border-r term-border flex flex-col shrink-0">
                                <div className="p-6 border-b term-border flex justify-between items-center">
                                    <div>
                                        <h1 className="text-xl font-black text-white"><i className="fas fa-cog text-gray-400 mr-2"></i>GLOBAL SETTINGS</h1>
                                        <p className="text-[11px] text-[#58a6ff] font-mono mt-1 tracking-widest">NEXUS_V1.95</p>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto py-4 flex flex-col">
                                    {lnbMenu.map(menu => (
                                        <button key={menu.id} onClick={() => setActiveTab(menu.id)} 
                                            className={`px-6 py-4 text-left text-[14px] font-bold border-l-4 transition-colors flex items-center ${activeTab === menu.id ? 'bg-[#21262d] border-[#58a6ff] text-[#58a6ff]' : 'border-transparent text-gray-400 hover:bg-[#161b22] hover:text-gray-200'} ${menu.color || ''}`}>
                                            <i className={`${menu.icon} w-6`}></i> {menu.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 메인 컨텐츠 영역 */}
                            <div className="flex-1 flex flex-col overflow-hidden relative bg-[#0d1117]">
                                {/* 헤더 툴바 (닫기 버튼 포함) */}
                                <div className="px-10 py-6 border-b term-border flex justify-between items-center bg-[#010409]">
                                    <h2 className="text-xl font-black text-white">{lnbMenu.find(m => m.id === activeTab)?.label}</h2>
                                    <div className="flex gap-3">
                                        <button onClick={handleClose} className="px-5 py-2.5 text-gray-400 hover:text-white transition-colors border term-border rounded-lg bg-[#161b22] hover:bg-[#21262d] font-bold text-sm">
                                            <i className="fas fa-times mr-2"></i> 닫기 (돌아가기)
                                        </button>
                                        <button onClick={handleSave} className="px-8 py-2.5 bg-[#238636] hover:bg-[#2ea043] text-white text-sm font-black rounded-lg transition-all shadow-[0_0_15px_rgba(35,134,54,0.3)]">
                                            <i className="fas fa-save mr-2"></i>전역 설정 반영
                                        </button>
                                    </div>
                                </div>

                                {/* 설정 본문 탭 */}
                                <div className="flex-1 overflow-auto custom-scrollbar p-10 bg-[#0d1117]">
                                    <div className="max-w-[1100px] mx-auto space-y-6">
                                        
                                        {activeTab === 'cloud' && (
                                            <div className="space-y-4 fade-in">
                                                <div className="term-panel p-8 rounded-lg border term-border">
                                                    <h3 className="text-base font-bold text-white mb-4"><i className="fas fa-network-wired text-[#58a6ff] mr-2"></i>Google AppScript API 연결</h3>
                                                    <input type="text" value={settings.appScriptUrl} onChange={(e) => setSettings({...settings, appScriptUrl: e.target.value})} placeholder="https://script.google.com/macros/s/..." className="term-input w-full p-4 rounded text-sm font-mono mb-2" />
                                                    <p className="text-xs text-gray-500">* 클라우드 마스터 DB 및 파서 딕셔너리와 통신하기 위한 게이트웨이입니다.</p>
                                                </div>
                                                
                                                <div className="term-panel p-8 rounded-lg border term-border bg-[#010409]">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <h3 className="text-base font-bold text-[#3fb950] mb-2"><i className="fas fa-sync-alt mr-2"></i>클라우드 지능 강제 동기화 (PULL)</h3>
                                                            <p className="text-sm text-gray-400">서버의 최신 마스터 정보(경량화) 및 파서 매핑 딕셔너리를 메모리로 가져옵니다.</p>
                                                        </div>
                                                        <button onClick={handleCloudSync} disabled={isSyncing} className="px-6 py-4 bg-[#161b22] hover:bg-[#21262d] border border-[#3fb950] text-[#3fb950] font-bold rounded-lg shadow-lg disabled:opacity-50 transition-colors">
                                                            {isSyncing ? <><i className="fas fa-spinner fa-spin mr-2"></i>동기화 중...</> : <><i className="fas fa-cloud-download-alt mr-2"></i>데이터 가져오기</>}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'catalog' && (
                                            <div className="term-panel p-8 rounded-lg border term-border fade-in">
                                                <h3 className="text-base font-bold text-white mb-4"><i className="fas fa-tags text-[#d2a8ff] mr-2"></i>단가 룰 적용 카탈로그 지정</h3>
                                                <div className="flex flex-wrap gap-3">
                                                    {mockCatalogs.map(cat => {
                                                        const isActive = settings.targetCatalogs.includes(cat);
                                                        return (
                                                            <label key={cat} className={`cursor-pointer px-5 py-3 border rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${isActive ? 'bg-[rgba(88,166,255,0.1)] border-[#58a6ff] text-[#58a6ff]' : 'bg-[#010409] border-[#30363d] text-gray-400 hover:text-gray-200'}`}>
                                                                <input type="checkbox" className="hidden" checked={isActive} onChange={() => {
                                                                    setSettings(p => ({ ...p, targetCatalogs: isActive ? p.targetCatalogs.filter(c => c !== cat) : [...p.targetCatalogs, cat] }))
                                                                }} />
                                                                <i className={`fas ${isActive ? 'fa-check-square' : 'fa-square'} text-base`}></i> {cat}
                                                            </label>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'margin' && (
                                            <div className="term-panel p-8 rounded-lg border term-border fade-in">
                                                <div className="flex justify-between items-center mb-6">
                                                    <div>
                                                        <h3 className="text-base font-bold text-white"><i className="fas fa-calculator text-[#3fb950] mr-2"></i>동적 단가 연산 엔진 (Margin Rules)</h3>
                                                    </div>
                                                    <button onClick={() => setSettings(p => ({...p, marginRules: [...p.marginRules, { id: generateUUID(), condition: '*', unit: '*', type: 'divide', rate: 10 }]}))} className="px-4 py-2 bg-[#21262d] hover:bg-[#30363d] text-white text-sm rounded border term-border"><i className="fas fa-plus mr-1"></i>룰 추가</button>
                                                </div>
                                                <div className="space-y-3">
                                                    {settings.marginRules.map((rule, idx) => {
                                                        const rawPrice = rule.type === 'divide' ? (10000 / (1 - rule.rate / 100)) : (10000 * (1 + rule.rate / 100));
                                                        const examplePrice = Math.round(rawPrice / 100) * 100;
                                                        return (
                                                        <div key={rule.id} className="flex gap-3 items-center bg-[#010409] p-4 rounded border term-border">
                                                            <div className="flex flex-col gap-1.5 w-32">
                                                                <label className="text-[10px] text-gray-500 font-bold uppercase">창고조건</label>
                                                                <input type="text" value={rule.condition} onChange={e => {
                                                                    const newRules = [...settings.marginRules]; newRules[idx].condition = e.target.value; setSettings({...settings, marginRules: newRules});
                                                                }} className="term-input text-sm p-2 rounded" />
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 flex-1">
                                                                <label className="text-[10px] text-gray-500 font-bold uppercase">단위조건</label>
                                                                <input type="text" value={rule.unit} onChange={e => {
                                                                    const newRules = [...settings.marginRules]; newRules[idx].unit = e.target.value; setSettings({...settings, marginRules: newRules});
                                                                }} className="term-input text-sm p-2 rounded" />
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-32">
                                                                <label className="text-[10px] text-[#d2a8ff] font-bold uppercase">연산 방식</label>
                                                                <select value={rule.type} onChange={e => {
                                                                    const newRules = [...settings.marginRules]; newRules[idx].type = e.target.value; setSettings({...settings, marginRules: newRules});
                                                                }} className="term-input text-sm p-2 rounded text-[#d2a8ff] cursor-pointer">
                                                                    <option value="divide">나누기 (÷)</option>
                                                                    <option value="multiply">곱하기 (×)</option>
                                                                </select>
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-24">
                                                                <label className="text-[10px] text-[#58a6ff] font-bold uppercase">마진율 (%)</label>
                                                                <input type="number" value={rule.rate} onChange={e => {
                                                                    const newRules = [...settings.marginRules]; newRules[idx].rate = parseFloat(e.target.value) || 0; setSettings({...settings, marginRules: newRules});
                                                                }} className="term-input text-sm p-2 rounded text-[#58a6ff] text-center font-bold" />
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-36 items-center bg-[#161b22] rounded px-3 py-2 justify-center border term-border">
                                                                <label className="text-[10px] text-gray-500 font-bold">1만원 기준 예시</label>
                                                                <div className="text-[13px] font-mono text-[#3fb950] font-bold">{examplePrice.toLocaleString()}원</div>
                                                            </div>
                                                            <button onClick={() => {
                                                                const newRules = settings.marginRules.filter(r => r.id !== rule.id); setSettings({...settings, marginRules: newRules});
                                                            }} className="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-[#f85149] text-lg"><i className="fas fa-trash-alt"></i></button>
                                                        </div>
                                                    )})}
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'mapping' && (
                                            <div className="term-panel p-8 rounded-lg border term-border flex flex-col h-[70vh] fade-in">
                                                <h3 className="text-base font-bold text-white mb-4 shrink-0"><i className="fas fa-book text-[#e3b341] mr-2"></i>확장형 엑셀 매핑 사전</h3>
                                                <div className="flex-1 overflow-auto custom-scrollbar border term-border rounded-lg mb-4 bg-[#010409]">
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-[#0d1117] border-b term-border text-gray-400 sticky top-0 z-10">
                                                            <tr>
                                                                <th className="p-4 w-48 font-bold">마스터 속성명</th>
                                                                <th className="p-4 font-bold">엑셀 헤더 감지 키워드</th>
                                                                <th className="p-4 w-56 text-center font-bold">DB 연동</th>
                                                                <th className="p-4 w-16 text-center"></th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-[#21262d]">
                                                            {Object.keys(settings.mappings).map(h => {
                                                                const isRequired = REQUIRED_COLS.includes(h);
                                                                return (
                                                                <tr key={h} className="hover:bg-[#161b22] transition-colors">
                                                                    <td className="p-4 font-bold text-gray-300">{isRequired ? <i className="fas fa-lock mr-2 text-gray-600"></i> : <i className="fas fa-link text-[#58a6ff] mr-2"></i>}{h}</td>
                                                                    <td className="p-4"><input type="text" value={settings.mappings[h] || ''} onChange={e => setSettings(p => ({...p, mappings: {...p.mappings, [h]: e.target.value}}))} className="term-input w-full p-2.5 rounded" /></td>
                                                                    <td className="p-4">
                                                                        {isRequired ? <div className="text-center text-gray-600 font-bold bg-[#010409] p-2.5 rounded border term-border">식별자 고정</div> : (
                                                                            <select value={settings.masterLinks[h] || ''} onChange={e => setSettings(p => ({...p, masterLinks: {...p.masterLinks, [h]: e.target.value}}))} className="term-input w-full p-2.5 rounded cursor-pointer">
                                                                                <option value="">-- 연동 안함 --</option>
                                                                                {MASTER_HEADERS.map(mh => <option key={`sel-${h}-${mh}`} value={mh}>{mh}</option>)}
                                                                            </select>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-4 text-center">
                                                                        {!isRequired && <button onClick={() => handleRemoveMapping(h)} className="text-gray-500 hover:text-[#f85149] p-2 text-lg"><i className="fas fa-trash-alt"></i></button>}
                                                                    </td>
                                                                </tr>
                                                            )})}
                                                        </tbody>
                                                    </table>
                                                </div>
                                                <div className="bg-[#0d1117] border term-border p-5 rounded-lg flex gap-4 shrink-0">
                                                    <input type="text" value={newMapTarget} onChange={e => setNewMapTarget(e.target.value)} placeholder="새 속성명" className="term-input p-3 rounded text-sm w-56" />
                                                    <input type="text" value={newMapKeywords} onChange={e => setNewMapKeywords(e.target.value)} placeholder="감지 키워드 (콤마 구분)" className="term-input p-3 rounded text-sm flex-1" />
                                                    <button onClick={handleAddMapping} className="px-6 py-3 bg-[#21262d] hover:bg-[#30363d] text-[#3fb950] font-bold rounded-lg text-sm transition-colors"><i className="fas fa-plus mr-2"></i> 규칙 추가</button>
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'ui' && (
                                            <div className="space-y-6 fade-in">
                                                <div className="term-panel p-8 rounded-lg border term-border">
                                                    <h3 className="text-base font-bold text-white mb-5">마스터 DB 노출 컬럼 설정</h3>
                                                    <div className="flex flex-wrap gap-2.5">
                                                        {REQUIRED_COLS.map(h => <div key={`ui-req-${h}`} className="config-chip locked opacity-50 cursor-not-allowed"><i className="fas fa-lock mr-1.5"></i>{h}</div>)}
                                                        {MASTER_HEADERS.filter(h => !REQUIRED_COLS.includes(h)).map(h => (
                                                            <div key={`ui-mst-${h}`} onClick={() => setSettings(p => ({...p, visibleMasterCols: p.visibleMasterCols.includes(h) ? p.visibleMasterCols.filter(x => x !== h) : [...p.visibleMasterCols, h]}))} className={`config-chip ${settings.visibleMasterCols.includes(h) ? 'active' : ''}`}>{h}</div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="term-panel p-8 rounded-lg border term-border">
                                                    <h3 className="text-base font-bold text-white mb-5">작업 뷰(시세관리/파서) 컬럼 설정</h3>
                                                    <div className="flex flex-wrap gap-2.5 mb-5">
                                                        {settings.visibleUploadCols.filter(h => !REQUIRED_COLS.includes(h)).map(h => (
                                                            <div key={`ui-up-${h}`} className="config-chip active cursor-default">
                                                                {h} <button onClick={() => setSettings(p => ({...p, visibleUploadCols: p.visibleUploadCols.filter(x => x !== h)}))} className="ml-2.5 text-[#58a6ff] hover:text-[#f85149]"><i className="fas fa-times"></i></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <select onChange={e => { if(e.target.value && !settings.visibleUploadCols.includes(e.target.value)) setSettings(p => ({...p, visibleUploadCols: [...p.visibleUploadCols, e.target.value]})); e.target.value=''; }} className="term-input p-3 rounded text-sm w-80 cursor-pointer">
                                                        <option value="">-- 작업 컬럼 추가 --</option>
                                                        {MASTER_HEADERS.filter(h => !REQUIRED_COLS.includes(h) && !settings.visibleUploadCols.includes(h)).map(h => <option key={`add-ui-${h}`} value={h}>{h}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'danger' && (
                                            <div className="space-y-5 fade-in">
                                                <div className="term-panel p-8 rounded-lg border border-amber-900/50 bg-[rgba(217,119,6,0.02)]">
                                                    <h3 className="text-base font-black text-amber-500 mb-2">환경설정 기본값 복원</h3>
                                                    <p className="text-sm text-gray-500 mb-4">설정값만 초기 상태로 되돌립니다. 마스터 데이터는 유지됩니다.</p>
                                                    <div className="flex items-center gap-3">
                                                        <input type="text" placeholder="설정초기화" value={resetSettingsText} onChange={(e) => setResetSettingsText(e.target.value)} className="term-input p-3 rounded text-sm w-56 border-amber-600/50" />
                                                        <button onClick={handleResetSettings} disabled={resetSettingsText !== '설정초기화'} className="px-6 py-3 bg-amber-600 hover:bg-amber-500 text-white text-sm font-black rounded disabled:opacity-30 transition-colors">복원 실행</button>
                                                    </div>
                                                </div>
                                                <div className="term-panel p-8 rounded-lg border border-rose-900/50 bg-[rgba(248,81,73,0.02)]">
                                                    <h3 className="text-base font-black text-[#f85149] mb-2">로컬 마스터 DB 강제 삭제</h3>
                                                    <p className="text-sm text-gray-500 mb-4">상품 DB와 대기열(Queue)이 모두 영구 삭제됩니다.</p>
                                                    <div className="flex items-center gap-3">
                                                        <input type="text" placeholder="DB완전삭제" value={wipeDBText} onChange={(e) => setWipeDBText(e.target.value)} className="term-input p-3 rounded text-sm w-56 border-[#f85149]" />
                                                        <button onClick={handleWipeDB} disabled={wipeDBText !== 'DB완전삭제'} className="px-6 py-3 bg-[#f85149] hover:bg-rose-600 text-white text-sm font-black rounded disabled:opacity-30 transition-colors">삭제 실행</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Toast Notification */}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 term-panel text-white px-5 py-3 rounded-lg shadow-2xl flex items-center gap-3 fade-in text-[13px] font-bold z-[60] border term-border">
                            <i className={toastMsg.includes('❌') || toastMsg.includes('🚨') ? "fas fa-exclamation-triangle text-[#f85149]" : toastMsg.includes('♻️') ? "fas fa-sync-alt text-amber-400" : "fas fa-check-circle text-[#3fb950]"}></i>
                            {toastMsg.replace(/✅|❌|🚨|♻️/g, '')}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SettingsApp />);
    </script>
</body>
</html>
