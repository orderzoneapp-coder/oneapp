<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Valuation Hub (시세 관리) V1.95</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #000000; color: #c9d1d9; margin: 0; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .term-bg { background-color: #010409; }
        .term-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .term-border { border-color: #30363d; }
        .term-input { background-color: #010409; border: 1px solid #30363d; color: #c9d1d9; }
        .term-input:focus { border-color: #8b949e; outline: none; }
        .data-row { transition: background-color 0.1s; border-bottom: 1px solid #21262d; }
        .data-row:hover { background-color: #161b22; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { background: rgba(22, 27, 34, 0.6); border: 1px solid #30363d; backdrop-filter: blur(4px); transition: all 0.2s; }
        .nav-btn:hover { background: rgba(48, 54, 61, 0.9); transform: scale(1.1); color: white; }
    </style>
</head>
<body class="term-bg text-sm h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col w-full"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // 보안 스크립트
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = {
            BASE_CATALOG: 'oneapp_base_catalog',
            PENDING_QUEUE: 'oneapp_pending_queue',
            CYCLE_LOG: 'oneapp_workspace_cycle_log',
            SETTINGS: 'oneapp_global_settings',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V3', 1);
            req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const GlobalHeader = ({ activeTab, pendingCount }) => {
            const tabs = [
                { id: 'master', name: '마스터 DB', icon: 'fas fa-server', url: 'master.html' },
                { id: 'manager', name: '상품 관리', icon: 'fas fa-tasks', url: 'manager.html' },
                { id: 'workspace', name: '시세 관리', icon: 'fas fa-edit', url: 'workspace.html' },
                { id: 'parser', name: '스마트 파서', icon: 'fas fa-bolt', url: 'parser.html' }
            ];

            return (
                <div className="flex flex-col shrink-0 z-40 w-full term-bg border-b term-border max-w-[1400px] mx-auto">
                    <header className="h-[60px] flex justify-between items-center px-6">
                        <div className="flex items-center">
                            <span className="font-black text-[20px] tracking-wider text-white mr-8">NEXUS<span className="text-gray-500">.IO</span></span>
                            <div className="flex items-end h-full pt-2 mt-[11px]">
                                {tabs.map(tab => {
                                    const isActive = activeTab === tab.id;
                                    const isManager = tab.id === 'manager';
                                    return (
                                        <a key={tab.id} href={tab.url} className={`relative flex items-center gap-2 px-5 py-3 text-[13px] font-bold rounded-t-lg transition-colors border-x border-t ${isActive ? 'term-panel border-b-transparent text-white z-10' : 'border-transparent text-gray-500 hover:text-gray-300'}`} style={{ marginBottom: isActive ? '-1px' : '0' }}>
                                            <i className={`${tab.icon} ${isActive ? 'text-white' : ''}`}></i> {tab.name}
                                            {isManager && pendingCount > 0 && <span className="ml-1.5 flex h-5 min-w-[20px] px-1.5 items-center justify-center rounded-full bg-[#21262d] border border-gray-600 text-gray-300 text-[10px] font-black shadow-sm">{pendingCount}</span>}
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                        {/* 환경 설정 열기 버튼 */}
                        <button onClick={() => window.location.href = 'settings.html'} className="px-4 py-2 bg-[#161b22] hover:bg-[#21262d] text-gray-300 font-bold rounded text-xs transition-colors border term-border">
                            <i className="fas fa-sliders-h text-gray-400 mr-2"></i>환경 설정
                        </button>
                    </header>
                </div>
            );
        };

        function WorkspaceApp() {
            const [baseCatalog, setBaseCatalog] = useState({});
            const [workspaceItems, setWorkspaceItems] = useState([]);
            const [searchTerm, setSearchTerm] = useState(''); 
            const [toastMsg, setToastMsg] = useState('');
            const [pendingCount, setPendingCount] = useState(0);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 4000); }, []);

            const loadData = useCallback(async () => {
                const catalog = await getIDB(CORE_KEYS.BASE_CATALOG) || {};
                const queue = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                setBaseCatalog(catalog);
                setPendingCount(Object.keys(queue).length);
            }, []);

            useEffect(() => {
                loadData();
                const handleStorage = (e) => { if (e.key === CORE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, [loadData]);

            // ⌨️ 글로벌 단축키 바인딩
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'F7') { e.preventDefault(); document.getElementById('btn-f7')?.click(); }
                    if (e.key === 'F8') { e.preventDefault(); document.getElementById('btn-f8')?.click(); }
                    if (e.key === 'F9') { e.preventDefault(); document.getElementById('btn-f9')?.click(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const handleSwipe = (direction, url) => {
                showToast(`[화면 전환] ${direction} 앱으로 이동합니다.`);
                setTimeout(() => { window.location.href = url; }, 500);
            };

            // 📂 스마트 탐색 엔진이 탑재된 파일 로드 로직
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!window.XLSX) { showToast('엑셀 라이브러리가 로드되지 않았습니다.'); return; }

                showToast('파일을 분석하고 있습니다...');

                const processWorkbookData = async (parsedData, originalHeaders) => {
                    if (!parsedData || parsedData.length === 0) {
                        showToast('인식할 수 있는 데이터가 없거나 형식이 맞지 않습니다.');
                        e.target.value = ''; return;
                    }

                    // 글로벌 매핑 설정 가져오기
                    const settings = await getIDB(CORE_KEYS.SETTINGS) || {};
                    const mappings = settings.mappings || {
                        '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드',
                        '품목명': '품목명, 상품명, 품명, 상품이름',
                        '규격': '규격명, 규격, 사이즈, 단량',
                        '입고가': '입고가, 입고, 매입가, 단가'
                    };

                    const headerMap = {}; 
                    ['품목코드', '품목명', '규격', '입고가'].forEach(key => {
                        const keywords = String(mappings[key] || '').split(',').map(s=>s.trim().toLowerCase());
                        const foundHeader = originalHeaders.find(ah => keywords.includes(String(ah).toLowerCase()));
                        if (foundHeader) headerMap[key] = foundHeader;
                    });

                    const codeKey = headerMap['품목코드'] || '품목코드';
                    const nameKey = headerMap['품목명'] || '품목명';
                    const specKey = headerMap['규격'] || '규격';
                    const priceKey = headerMap['입고가'] || '입고가';

                    const items = parsedData.map(row => {
                        const code = String(row[codeKey] || row['상품코드'] || row['코드'] || '');
                        const name = String(row[nameKey] || row['상품명'] || '');
                        const spec = String(row[specKey] || '');
                        const price = parseNum(row[priceKey] || row['매입가'] || row['단가']);

                        return { code, name, spec, inPrice: price };
                    }).filter(item => item.code); // 코드가 존재하는 항목만 허용 (시세관리 원칙)
                    
                    setWorkspaceItems(items);
                    showToast(`스마트 파싱 완료: ${items.length}건 엑셀 로드 성공`);
                    e.target.value = '';
                };

                // 헤더 스니핑 및 엑셀 객체 조립 엔진
                const parseSheet = (wb) => {
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                    
                    let headerRowIdx = -1;
                    // 최대 앞부분 30줄 탐색 (첫 행에 의미 없는 데이터 방어)
                    for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                        const rowStr = (jsonAll[i] || []).join('').replace(/\s/g, '');
                        if (rowStr.includes('품목코드') || rowStr.includes('상품코드') || rowStr.includes('바코드')) { 
                            headerRowIdx = i; 
                            break; 
                        }
                    }
                    if (headerRowIdx === -1) headerRowIdx = 0;
                    
                    const headers = jsonAll[headerRowIdx] || [];
                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                        const row = jsonAll[i];
                        if (!row || row.length === 0) continue;
                        const obj = {}; let isEmpty = true;
                        headers.forEach((h, idx) => { 
                            if (h) { 
                                obj[String(h).trim()] = row[idx]; 
                                if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; 
                            } 
                        });
                        if(!isEmpty) parsedData.push(obj);
                    }
                    processWorkbookData(parsedData, headers);
                };

                // 가짜 엑셀 (CSV/HTML) 판독 스니퍼 엔진
                const sniffer = new FileReader();
                sniffer.onload = (sniffEvt) => {
                    const arr = new Uint8Array(sniffEvt.target.result);
                    let isRealExcel = false;
                    
                    if (arr.length >= 4 && arr[0] === 0x50 && arr[1] === 0x4B && arr[2] === 0x03 && arr[3] === 0x04) {
                        isRealExcel = true;
                    } else if (arr.length >= 8 && arr[0] === 0xD0 && arr[1] === 0xCF && arr[2] === 0x11 && arr[3] === 0xE0) {
                        isRealExcel = true;
                    }

                    const mainReader = new FileReader();
                    mainReader.onload = (mainEvt) => {
                        try {
                            let wb;
                            if (!isRealExcel) {
                                wb = window.XLSX.read(mainEvt.target.result, { type: 'string', cellDates: true });
                            } else {
                                wb = window.XLSX.read(mainEvt.target.result, { type: 'array', cellDates: true });
                            }
                            parseSheet(wb);
                        } catch (err) {
                            showToast('파일 포맷을 해석할 수 없습니다.');
                        }
                    };

                    if (!isRealExcel) {
                        mainReader.readAsText(file, 'euc-kr');
                    } else {
                        mainReader.readAsArrayBuffer(file);
                    }
                };
                
                const blob = file.slice(0, 8);
                sniffer.readAsArrayBuffer(blob);
            };

            // ⚙️ 환경설정 룰 강제 적용
            const handleApplySettingsRules = async () => {
                if (workspaceItems.length === 0) return;
                
                const settings = await getIDB(CORE_KEYS.SETTINGS) || {};
                const rules = settings.marginRules || [];
                
                if (rules.length === 0) {
                    showToast('환경설정에 등록된 마진 룰이 없습니다.');
                    return;
                }

                let appliedCount = 0;
                let skippedCount = 0;

                const updated = workspaceItems.map(item => {
                    if (item.inPrice > 0) {
                        const mItem = baseCatalog[item.code] || {};
                        const itemWarehouse = String(mItem['창고'] || '');
                        const itemUnit = String(mItem['단위'] || '').toLowerCase();

                        let matchedRule = null;
                        for (const rule of rules) {
                            const conditionStr = String(rule.condition || '');
                            const unitRuleStr = String(rule.unit || '').toLowerCase();

                            const isConditionMatch = conditionStr === '*' || conditionStr === '전체' || conditionStr.split(/[,./|\s]+/).some(s => itemWarehouse.includes(s.trim()));
                            const isUnitMatch = unitRuleStr === '*' || unitRuleStr === '전체' || unitRuleStr.split(/[,./|\s]+/).some(s => itemUnit.includes(s.trim()));

                            if (isConditionMatch && isUnitMatch) { matchedRule = rule; break; }
                        }

                        if (matchedRule) {
                            let ruledPrice = item.inPrice;
                            if (matchedRule.type === 'divide') {
                                const safeRate = Math.min(matchedRule.rate, 99.99);
                                ruledPrice = item.inPrice / (1 - (safeRate / 100));
                            } else {
                                ruledPrice = item.inPrice * (1 + (matchedRule.rate / 100));
                            }
                            ruledPrice = Math.round(ruledPrice / 10) * 10;
                            appliedCount++;
                            return { ...item, inPrice: ruledPrice };
                        } else {
                            skippedCount++;
                        }
                    }
                    return item;
                });
                
                setWorkspaceItems(updated);
                showToast(`룰 적용 완료 (적용: ${appliedCount}건 / 미해당: ${skippedCount}건)`);
            };

            // 🚀 [F7] 하이패스 - 세이프티 넷 포함
            const handleHighPass = async () => {
                if (workspaceItems.length === 0) return;
                
                let isUnsafe = false;
                workspaceItems.forEach(item => {
                    const mItem = baseCatalog[item.code];
                    const mPrice = mItem ? parseNum(mItem['입고가']) : 0;
                    
                    if (item.inPrice === 0) isUnsafe = true; // 0원 입력 시 위험
                    if (mPrice > 0) {
                        const diffRatio = Math.abs(item.inPrice - mPrice) / mPrice;
                        if (diffRatio >= 0.3) isUnsafe = true; // 30% 이상 변동 시 위험
                    }
                });

                if (isUnsafe) {
                    showToast("안전망 작동: 0원이거나 변동폭이 30% 이상인 항목이 있습니다. F8 결재를 이용하세요.");
                    return;
                }

                const newCatalog = { ...baseCatalog };
                let updateCount = 0;
                
                workspaceItems.forEach(item => {
                    if (newCatalog[item.code] && item.inPrice > 0 && item.inPrice !== parseNum(newCatalog[item.code]['입고가'])) {
                        newCatalog[item.code]['입고가'] = item.inPrice;
                        updateCount++;
                    }
                });

                if (updateCount === 0) {
                    showToast("기존 마스터와 완전히 동일하여 갱신할 내용이 없습니다.");
                    return;
                }

                await setIDB(CORE_KEYS.BASE_CATALOG, newCatalog);
                localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());
                
                setWorkspaceItems([]);
                setSearchTerm('');
                showToast(`F7 하이패스 완료: ${updateCount}건이 즉시 반영되었습니다.`);
                loadData();
            };

            // 🚀 [F8] 결재 상신 (상품관리로 이동)
            const handleApplyDelta = async () => {
                if (workspaceItems.length === 0) return;
                
                const queue = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                const cycleLog = await getIDB(CORE_KEYS.CYCLE_LOG) || {};

                let conflictCount = 0;
                let hasUpdates = false;

                workspaceItems.forEach(item => {
                    const mItem = baseCatalog[item.code];
                    const mPrice = mItem ? parseNum(mItem['입고가']) : 0;
                    
                    const priceChanged = item.inPrice > 0 && item.inPrice !== mPrice;
                    const textChanged = mItem && ((item.name && item.name !== mItem.품목명) || (item.spec && item.spec !== mItem.규격));
                    const isNewItem = !mItem;

                    if (priceChanged && cycleLog[item.code]) conflictCount++;
                    if (priceChanged || textChanged || isNewItem) hasUpdates = true;
                });

                if (!hasUpdates) { showToast("변경점 없음"); return; }
                if (conflictCount > 0 && !window.confirm(`${conflictCount}건 중복 변경 이력 존재. 덮어쓰기 상신을 계속하시겠습니까?`)) return;

                workspaceItems.forEach(item => {
                    const mItem = baseCatalog[item.code];
                    const mPrice = mItem ? parseNum(mItem['입고가']) : 0;
                    const isNewItem = !mItem;

                    const priceChanged = item.inPrice > 0 && item.inPrice !== mPrice;
                    const textChanged = mItem && ((item.name && item.name !== mItem.품목명) || (item.spec && item.spec !== mItem.규격));

                    if (priceChanged || textChanged || isNewItem) {
                        if (!queue[item.code]) queue[item.code] = { 코드: item.code, finalData: {} };
                        if (isNewItem) queue[item.code].isNewItem = true;
                        
                        if (priceChanged || isNewItem) {
                            queue[item.code].finalData['입고가'] = item.inPrice;
                            queue[item.code].baseVersionPrice = mPrice; 
                            cycleLog[item.code] = true;
                        }
                        
                        if (textChanged || isNewItem) {
                            queue[item.code].textUpdateReq = { 품목명: item.name, 규격: item.spec };
                        }
                    }
                });

                await setIDB(CORE_KEYS.PENDING_QUEUE, queue);
                await setIDB(CORE_KEYS.CYCLE_LOG, cycleLog);
                localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());

                showToast(`상신 완료. 상품 관리 화면으로 이동합니다.`);
                setTimeout(() => { window.location.href = 'manager.html'; }, 800);
            };

            // 🚀 [F9] 즉시 엑셀 출력 (팝업 없음)
            const handleExportExcel = () => {
                if (workspaceItems.length === 0) { showToast("출력할 데이터가 없습니다."); return; }
                
                const exportData = workspaceItems.map(item => {
                    const mItem = baseCatalog[item.code] || {};
                    return {
                        '품목코드': item.code,
                        '품목명': item.name || mItem['품목명'] || '',
                        '규격': item.spec || mItem['규격'] || '',
                        '기존_입고가': mItem ? parseNum(mItem['입고가']) : 0,
                        '작업후_입고가': item.inPrice
                    };
                });

                const ws = window.XLSX.utils.json_to_sheet(exportData);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "시세작업내역");
                window.XLSX.writeFile(wb, `시세작업결과_${new Date().getTime()}.xlsx`);
                showToast("엑셀 다운로드가 완료되었습니다.");
            };

            const filteredItems = useMemo(() => {
                if (!searchTerm) return workspaceItems;
                const kw = searchTerm.toLowerCase();
                return workspaceItems.filter(item => 
                    (item.name || '').toLowerCase().includes(kw) || 
                    (item.code || '').toLowerCase().includes(kw) || 
                    (item.spec || '').toLowerCase().includes(kw)
                );
            }, [workspaceItems, searchTerm]);

            return (
                <div className="flex-1 flex flex-col h-full w-full items-center justify-center relative">
                    
                    {/* Swipe Navigation Buttons */}
                    <button onClick={() => handleSwipe('상품 관리', 'manager.html')} className="nav-btn fixed left-4 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full text-gray-500 group">
                        <i className="fas fa-chevron-left text-xl"></i>
                        <span className="absolute left-14 top-1/2 -translate-y-1/2 text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">상품 관리로 이동</span>
                    </button>
                    <button onClick={() => handleSwipe('스마트 파서', 'parser.html')} className="nav-btn fixed right-4 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full text-gray-500 group">
                        <i className="fas fa-chevron-right text-xl"></i>
                        <span className="absolute right-14 top-1/2 -translate-y-1/2 text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">스마트 파서로 이동</span>
                    </button>

                    <div className="w-full max-w-[1400px] h-full flex flex-col border-x term-border shadow-2xl relative bg-[#010409]">
                        <GlobalHeader activeTab="workspace" pendingCount={pendingCount} />
                        
                        <div className="flex-1 flex flex-col p-8 w-full gap-4 overflow-hidden fade-in relative">
                            
                            {/* 🎛️ 상단 툴바 */}
                            <div className="flex justify-between items-end pb-4 border-b term-border shrink-0">
                                <div>
                                    <h1 className="text-xl font-black text-white mb-1"><i className="fas fa-edit text-gray-400 mr-2"></i>VALUATION_WORKSPACE</h1>
                                    <p className="text-xs text-gray-500 font-mono">코드가 포함된 엑셀을 로드하여 다중 편집 및 단가 룰을 적용합니다.</p>
                                </div>
                                <div className="flex gap-2">
                                    <label className="cursor-pointer px-5 py-2.5 rounded term-panel term-border text-[13px] font-bold hover:bg-[#21262d] transition-colors text-white shadow-sm flex items-center">
                                        <i className="fas fa-file-excel text-gray-400 mr-2"></i> 엑셀 로드
                                        <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} />
                                    </label>
                                    
                                    <button onClick={handleApplySettingsRules} disabled={workspaceItems.length === 0} className="px-5 py-2.5 term-panel term-border rounded text-[13px] font-bold hover:bg-[#21262d] text-gray-300 transition-colors disabled:opacity-50 shadow-sm flex items-center mr-2">
                                        <i className="fas fa-bolt text-gray-400 mr-2"></i> 설정 룰 연산
                                    </button>
                                    
                                    <button id="btn-f9" onClick={handleExportExcel} disabled={workspaceItems.length === 0} className="px-4 py-2.5 rounded text-[12px] font-bold transition-colors shadow-sm flex items-center border term-border hover:bg-[#21262d] text-gray-300 disabled:opacity-50">
                                        [F9] 엑셀저장
                                    </button>
                                    
                                    <button id="btn-f7" onClick={handleHighPass} disabled={workspaceItems.length === 0} className={`px-4 py-2.5 rounded text-[12px] font-bold transition-colors shadow-sm flex items-center border term-border ${workspaceItems.length > 0 ? 'bg-[#21262d] hover:bg-[#30363d] text-white' : 'bg-[#161b22] text-gray-500 border-transparent cursor-not-allowed'}`}>
                                        [F7] 즉시 반영 (하이패스)
                                    </button>

                                    <button id="btn-f8" onClick={handleApplyDelta} disabled={workspaceItems.length === 0} className={`px-6 py-2.5 rounded text-[13px] font-black transition-colors shadow-sm flex items-center border term-border ${workspaceItems.length > 0 ? 'bg-[#30363d] hover:bg-[#484f58] text-white' : 'bg-[#161b22] text-gray-500 border-transparent cursor-not-allowed'}`}>
                                        <i className="fas fa-paper-plane mr-2"></i> [F8] 결재 상신
                                    </button>
                                </div>
                            </div>

                            {/* 🔎 검색 및 인포 */}
                            <div className="flex justify-between items-center shrink-0">
                                <div className="relative w-96">
                                    <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                                    <input 
                                        type="text" 
                                        placeholder="현재 엑셀 내 품명, 규격, 코드 즉시 검색..." 
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full bg-[#0d1117] border border-[#30363d] text-white pl-9 pr-3 py-2 text-xs font-mono rounded focus:border-[#8b949e] outline-none transition-colors"
                                    />
                                </div>
                                <div className="text-xs font-mono text-gray-500">
                                    엑셀 로드됨: <span className="text-white font-bold">{workspaceItems.length.toLocaleString()}</span>건 
                                    {searchTerm && <span className="ml-2">(검색됨: <span className="text-white">{filteredItems.length}</span>건)</span>}
                                </div>
                            </div>

                            {/* 🖥️ 메인 엑셀 뷰 (스프레드시트 UI) */}
                            <div className="flex-1 term-panel rounded-lg flex flex-col overflow-hidden border term-border shadow-xl relative">
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-xs whitespace-nowrap">
                                        <thead className="bg-[#0d1117] sticky top-0 border-b border-[#30363d] text-gray-400 z-10 shadow-sm">
                                            <tr>
                                                <th className="py-3 px-4 font-bold w-12 text-center text-[10px]">NO</th>
                                                <th className="py-3 px-4 font-bold w-36">상품코드</th>
                                                <th className="py-3 px-4 font-bold border-r border-[#30363d]">마스터 원본 정보 및 엑셀 대조 <span className="text-[10px] ml-2 font-normal text-gray-500">※ 텍스트 다름 감지 시 알림</span></th>
                                                <th className="py-3 px-4 font-bold text-right w-36 border-r border-[#30363d]">마스터 현재 단가</th>
                                                <th className="py-3 px-4 font-bold text-gray-200 text-right w-44 bg-[#010409]">
                                                    <i className="fas fa-keyboard mr-2 text-gray-500"></i>작업 단가 입력
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#21262d]">
                                            {filteredItems.length === 0 ? (
                                                <tr>
                                                    <td colSpan="5" className="py-32 text-center text-gray-600 font-bold bg-[#010409]">
                                                        <i className="fas fa-file-excel text-5xl mb-4 block opacity-20"></i>
                                                        {workspaceItems.length === 0 ? "우측 상단 [엑셀 로드] 버튼을 눌러 작업을 시작하세요." : "검색 결과가 없습니다."}
                                                    </td>
                                                </tr>
                                            ) : (
                                                filteredItems.map((item, index) => {
                                                    const mItem = baseCatalog[item.code];
                                                    const isNew = !mItem;
                                                    const isTxtChanged = mItem && ((item.name && item.name !== mItem.품목명) || (item.spec && item.spec !== mItem.규격));
                                                    const mPrice = mItem ? parseNum(mItem['입고가']) : 0;
                                                    const isPriceChanged = item.inPrice > 0 && item.inPrice !== mPrice;

                                                    return (
                                                        <tr key={item.code} className="data-row h-[42px]">
                                                            <td className="py-1.5 px-4 text-center text-[10px] text-gray-600 font-bold">{index + 1}</td>
                                                            <td className="py-1.5 px-4 font-mono text-[#8b949e] font-bold">{item.code}</td>
                                                            <td className="py-1.5 px-4 border-r border-[#30363d]">
                                                                <div className="flex items-center gap-2">
                                                                    <span className={`font-bold ${isTxtChanged ? 'text-white' : 'text-gray-400'}`}>{item.name}</span>
                                                                    <span className="text-[10px] text-gray-500">({item.spec})</span>
                                                                    {isNew && <span className="ml-1 bg-[#21262d] border border-gray-600 text-gray-300 px-1.5 py-0.5 rounded text-[9px] font-bold">신규</span>}
                                                                    {isTxtChanged && <span className="ml-1 bg-[#161b22] border border-gray-700 text-gray-400 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wider">텍스트 갱신</span>}
                                                                </div>
                                                            </td>
                                                            <td className="py-1.5 px-4 text-right text-gray-500 font-mono border-r border-[#30363d] font-bold">
                                                                {mPrice > 0 ? mPrice.toLocaleString() : '-'}
                                                            </td>
                                                            <td className={`py-1 px-4 text-right bg-[#010409] relative ${isPriceChanged ? 'bg-[#161b22]' : ''}`}>
                                                                <input 
                                                                    id={`input-price-${index}`}
                                                                    type="number" 
                                                                    value={item.inPrice || ''}
                                                                    onChange={(e) => {
                                                                        const val = e.target.value;
                                                                        setWorkspaceItems(prev => prev.map((i, idx) => idx === index ? { ...i, inPrice: parseNum(val) } : i));
                                                                    }}
                                                                    onKeyDown={(e) => {
                                                                        if (e.key === 'ArrowDown') { e.preventDefault(); document.getElementById(`input-price-${index + 1}`)?.focus(); }
                                                                        if (e.key === 'ArrowUp') { e.preventDefault(); document.getElementById(`input-price-${index - 1}`)?.focus(); }
                                                                    }}
                                                                    onPaste={(e) => {
                                                                        e.preventDefault();
                                                                        const pasteData = e.clipboardData.getData('text');
                                                                        const rows = pasteData.split(/\r?\n/).filter(r => r.trim() !== '');
                                                                        if(rows.length > 0) {
                                                                             setWorkspaceItems(prev => {
                                                                                 const next = [...prev];
                                                                                 rows.forEach((val, i) => {
                                                                                     if(index + i < next.length) {
                                                                                         next[index + i] = { ...next[index + i], inPrice: parseNum(val) };
                                                                                     }
                                                                                 });
                                                                                 return next;
                                                                             });
                                                                             showToast(`일괄 붙여넣기 완료 (${rows.length}개 셀)`);
                                                                        }
                                                                    }}
                                                                    className={`term-input w-full text-right px-2.5 py-1.5 rounded font-mono font-bold transition-all outline-none focus:bg-[#21262d] ${isPriceChanged ? 'text-white border-gray-500 bg-[#161b22]' : 'text-gray-400 bg-[#0d1117] border-transparent hover:border-[#30363d]'}`}
                                                                    placeholder={mPrice > 0 ? mPrice : ''}
                                                                />
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* 글로벌 토스트 (무채색 계열로 변경) */}
                        {toastMsg && (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 term-panel text-gray-200 px-6 py-3.5 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.8)] flex items-center gap-3 fade-in text-[13px] font-bold z-50 border term-border">
                                <i className={`fas text-lg ${toastMsg.includes('오류') || toastMsg.includes('실패') || toastMsg.includes('위험') || toastMsg.includes('안전망') ? 'fa-exclamation-triangle text-gray-400' : 'fa-check-circle text-gray-300'}`}></i>
                                {toastMsg.replace(/✅|❌|⚠️|🚨|🚀|⚡|⚙️|📋|ℹ️/g, '')}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<WorkspaceApp />);
    </script>
</body>
</html>
