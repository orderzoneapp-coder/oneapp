<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Verification Hub (상품 관리) V1.96</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #000000; color: #c9d1d9; margin: 0; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .term-bg { background-color: #010409; }
        .term-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .term-border { border-color: #30363d; }
        .data-row { transition: background-color 0.1s; border-bottom: 1px solid #21262d; }
        .data-row:hover { background-color: #161b22; }
        .term-input { background-color: #010409; border: 1px solid #30363d; color: #c9d1d9; outline: none; }
        .term-input:focus { border-color: #58a6ff; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Swipe Buttons */
        .nav-btn { background: rgba(22, 27, 34, 0.6); border: 1px solid #30363d; backdrop-filter: blur(4px); transition: all 0.2s; }
        .nav-btn:hover { background: rgba(48, 54, 61, 0.9); transform: scale(1.1); color: white; }
    </style>
</head>
<body class="term-bg text-sm h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col w-full"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, Fragment } = React;

        /* 🔒 [보안] F12 및 개발자 도구 차단 */
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = {
            BASE_CATALOG: 'oneapp_base_catalog',
            PENDING_QUEUE: 'oneapp_pending_queue',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        // 🚨 V3 DB로 연결되도록 변경
        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V3', 1);
            req.onupgradeneeded = (e) => { 
                if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); 
            };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const runSmartMatch = (extName, extSpec, mProducts) => {
            const target = normalizeText((extName || '') + (extSpec || ''));
            let bestMatch = null;
            let bestScore = 0;
            
            Object.values(mProducts).forEach(m => {
                const mTarget = normalizeText((m.품목명 || '') + (m.규격 || ''));
                if (target === mTarget) { bestScore = 1; bestMatch = m; return; }
                
                if (mTarget.includes(target) || target.includes(mTarget)) {
                    const score = Math.min(target.length, mTarget.length) / Math.max(target.length, mTarget.length);
                    if (score > bestScore) { bestScore = score; bestMatch = m; }
                }
            });
            
            return bestScore > 0.6 ? bestMatch : null;
        };

        const GlobalHeader = ({ activeTab, pendingCount }) => {
            const tabs = [
                { id: 'master', name: '마스터 DB', icon: 'fas fa-server', url: 'master.html' },
                { id: 'manager', name: '상품 관리', icon: 'fas fa-tasks', url: 'manager.html' },
                { id: 'workspace', name: '시세 관리', icon: 'fas fa-edit', url: 'workspace.html' },
                { id: 'parser', name: '스마트 파서', icon: 'fas fa-bolt', url: 'parser.html' }
            ];

            return (
                <div className="flex flex-col shrink-0 z-40 w-full term-bg border-b term-border max-w-[1400px] mx-auto">
                    <header className="h-[60px] flex justify-between items-center px-6">
                        <div className="flex items-center">
                            <span className="font-black text-[20px] tracking-wider text-white mr-8">NEXUS<span className="text-[#3fb950]">.IO</span></span>
                            <div className="flex items-end h-full pt-2 mt-[11px]">
                                {tabs.map(tab => {
                                    const isActive = activeTab === tab.id;
                                    const isManager = tab.id === 'manager';
                                    return (
                                        <a key={tab.id} href={tab.url} className={`relative flex items-center gap-2 px-5 py-3 text-[13px] font-bold rounded-t-lg transition-colors border-x border-t ${isActive ? 'term-panel border-b-transparent text-white z-10' : 'border-transparent text-gray-500 hover:text-gray-300'}`} style={{ marginBottom: isActive ? '-1px' : '0' }}>
                                            <i className={`${tab.icon} ${isActive ? 'text-[#3fb950]' : ''}`}></i> {tab.name}
                                            {isManager && pendingCount > 0 && <span className="ml-1.5 flex h-5 min-w-[20px] px-1.5 items-center justify-center rounded-full bg-[#f85149] text-white text-[10px] font-black shadow-sm animate-pulse">{pendingCount}</span>}
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                        {/* 환경 설정 열기 버튼 */}
                        <button onClick={() => window.location.href = 'settings.html'} className="px-4 py-2 bg-[#161b22] hover:bg-[#21262d] text-white font-bold rounded text-xs transition-colors border term-border">
                            <i className="fas fa-sliders-h text-[#58a6ff] mr-2"></i>환경 설정
                        </button>
                    </header>
                </div>
            );
        };

        function ItemManagerApp() {
            const [baseCatalog, setBaseCatalog] = useState({});
            const [pendingQueue, setPendingQueue] = useState({});
            const [filterMode, setFilterMode] = useState('all'); // all, new, text, price, conflict, suspend
            const [toastMsg, setToastMsg] = useState('');
            
            // 수동 매핑 모달 상태
            const [bindModalOpen, setBindModalOpen] = useState(false);
            const [bindTarget, setBindTarget] = useState(null);
            const [searchKw, setSearchKw] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const loadData = useCallback(async () => {
                const mData = await getIDB(CORE_KEYS.BASE_CATALOG) || {};
                const pData = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                setBaseCatalog(mData);
                setPendingQueue(pData);
            }, []);

            useEffect(() => {
                loadData();
                const handleStorage = (e) => { if (e.key === CORE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, [loadData]);

            // 🚀 대기열 데이터 가공 엔진
            const verificationList = useMemo(() => {
                const list = [];
                Object.values(pendingQueue).forEach(pItem => {
                    const mItem = baseCatalog[pItem.코드];
                    const isNew = pItem.isNewItem || !mItem;
                    
                    const mName = isNew ? '' : String(mItem.품목명 || '');
                    const mSpec = isNew ? '' : String(mItem.규격 || '');
                    const pName = String(pItem.finalData?.['품목명'] || pItem.textUpdateReq?.['품목명'] || mName);
                    const pSpec = String(pItem.finalData?.['규격'] || pItem.textUpdateReq?.['규격'] || mSpec);
                    const vendor = String(pItem.finalData?.['구매처'] || pItem.textUpdateReq?.['vendor'] || '');
                    
                    const mPrice = isNew ? 0 : parseNum(mItem['입고가']);
                    const pPrice = parseNum(pItem.finalData?.['입고가'] || mPrice);
                    
                    let issues = [];
                    let aiSuggestion = null;

                    if (isNew) {
                        issues.push('new');
                        // AI 매핑 추천 계산
                        aiSuggestion = runSmartMatch(pName, pSpec, baseCatalog);
                    } else {
                        if (pItem.baseVersionPrice !== undefined && pItem.baseVersionPrice !== mPrice) issues.push('conflict');
                        if (mName !== pName || mSpec !== pSpec) issues.push('text');
                        if (pPrice > mPrice && mPrice > 0) issues.push('price_up');
                        if (pPrice < mPrice && pPrice > 0) issues.push('price_down');
                    }

                    list.push({
                        ...pItem,
                        mItem: mItem || {},
                        mName, mSpec, pName, pSpec, mPrice, pPrice, vendor, issues, aiSuggestion
                    });
                });
                return list.sort((a, b) => b.issues.length - a.issues.length); // 이슈 많은 순 정렬
            }, [baseCatalog, pendingQueue]);

            // 🛑 정지된 상품 리스트
            const suspendedList = useMemo(() => {
                return Object.values(baseCatalog).filter(item => item.isSuspended);
            }, [baseCatalog]);

            // KPI 카운트
            const kpi = useMemo(() => {
                const counts = { all: verificationList.length, new: 0, text: 0, price: 0, conflict: 0, suspend: suspendedList.length };
                verificationList.forEach(item => {
                    if (item.issues.includes('new')) counts.new++;
                    if (item.issues.includes('text')) counts.text++;
                    if (item.issues.includes('price_up') || item.issues.includes('price_down')) counts.price++;
                    if (item.issues.includes('conflict')) counts.conflict++;
                });
                return counts;
            }, [verificationList, suspendedList]);

            // 필터링 적용 리스트
            const displayList = useMemo(() => {
                if (filterMode === 'suspend') return suspendedList;
                if (filterMode === 'all') return verificationList;
                return verificationList.filter(item => {
                    if (filterMode === 'price') return item.issues.includes('price_up') || item.issues.includes('price_down');
                    return item.issues.includes(filterMode);
                });
            }, [verificationList, suspendedList, filterMode]);

            const triggerSync = () => localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());

            // ✅ 개별 / 일괄 확정(승인) 처리
            const handleApproveMerge = async (code) => {
                const pItem = pendingQueue[code];
                if (!pItem) return;

                let newMaster = { ...baseCatalog };
                if (!newMaster[code]) newMaster[code] = { 코드: code };
                
                // 단가 및 정보 덮어쓰기
                if (pItem.finalData) {
                    Object.assign(newMaster[code], pItem.finalData);
                }
                // 텍스트 변경 요청 반영
                if (pItem.textUpdateReq) {
                    newMaster[code].품목명 = pItem.textUpdateReq['품목명'] || newMaster[code].품목명;
                    newMaster[code].규격 = pItem.textUpdateReq['규격'] || newMaster[code].규격;
                }

                let newQueue = { ...pendingQueue };
                delete newQueue[code];

                setBaseCatalog(newMaster); setPendingQueue(newQueue);
                await setIDB(CORE_KEYS.BASE_CATALOG, newMaster);
                await setIDB(CORE_KEYS.PENDING_QUEUE, newQueue);
                triggerSync();
                showToast(`✅ [${code}] 병합 및 승인 완료`);
            };

            // ❌ 무시 (삭제)
            const handleReject = async (code) => {
                let newQueue = { ...pendingQueue };
                delete newQueue[code];
                setPendingQueue(newQueue);
                await setIDB(CORE_KEYS.PENDING_QUEUE, newQueue);
                triggerSync();
                showToast(`🗑️ 해당 요청이 삭제되었습니다.`);
            };

            // 🔗 수동 매핑 (Bind)
            const handleBindMapping = async (queueCode, masterCode) => {
                const pItem = pendingQueue[queueCode];
                if (!pItem || !baseCatalog[masterCode]) return;

                let newMaster = { ...baseCatalog };
                Object.assign(newMaster[masterCode], pItem.finalData || {});

                let newQueue = { ...pendingQueue };
                delete newQueue[queueCode];

                setBaseCatalog(newMaster); setPendingQueue(newQueue);
                await setIDB(CORE_KEYS.BASE_CATALOG, newMaster);
                await setIDB(CORE_KEYS.PENDING_QUEUE, newQueue);
                triggerSync();
                setBindModalOpen(false); setBindTarget(null);
                showToast(`🔗 기존 마스터 [${masterCode}]와 성공적으로 연결되었습니다.`);
            };

            // ⛔ 임의 정지(Suspend) 토글
            const handleToggleSuspend = async (code, currentStatus) => {
                let newMaster = { ...baseCatalog };
                if (newMaster[code]) {
                    newMaster[code].isSuspended = !currentStatus;
                    setBaseCatalog(newMaster);
                    await setIDB(CORE_KEYS.BASE_CATALOG, newMaster);
                    triggerSync();
                    showToast(currentStatus ? `🟢 해당 상품의 판매가 복구되었습니다.` : `⛔ 해당 상품이 정지(보류) 처리되었습니다.`);
                }
            };

            const searchResults = useMemo(() => {
                if (!searchKw.trim()) return [];
                const kw = searchKw.toLowerCase().replace(/\s+/g, '');
                return Object.values(baseCatalog).filter(m => 
                    !m.isSuspended && ((m.품목명+m.규격+m.코드).toLowerCase().replace(/\s+/g, '').includes(kw))
                ).slice(0, 15);
            }, [baseCatalog, searchKw]);

            const handleSwipe = (direction, url) => {
                showToast(`ℹ️ [화면 전환] ${direction} 앱으로 이동합니다.`);
                setTimeout(() => { window.location.href = url; }, 500);
            };

            return (
                <div className="relative w-full h-full flex justify-center overflow-hidden">
                    
                    {/* Swipe Navigation Buttons */}
                    <button onClick={() => handleSwipe('스마트 파서', 'parser.html')} className="nav-btn fixed left-4 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full text-gray-500 group">
                        <i className="fas fa-chevron-left text-xl"></i>
                        <span className="absolute left-14 top-1/2 -translate-y-1/2 text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">스마트 파서로 이동</span>
                    </button>
                    <button onClick={() => handleSwipe('마스터 DB', 'master.html')} className="nav-btn fixed right-4 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full text-gray-500 group">
                        <i className="fas fa-chevron-right text-xl"></i>
                        <span className="absolute right-14 top-1/2 -translate-y-1/2 text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">마스터 DB로 이동</span>
                    </button>

                    {/* Main Content Area (1400px Fixed) */}
                    <div className="w-full max-w-[1400px] h-full flex flex-col border-x term-border bg-[#010409] relative shadow-2xl">
                        
                        <GlobalHeader activeTab="manager" pendingCount={kpi.all} />
                        
                        <div className="flex-1 flex flex-col p-6 w-full gap-5 fade-in overflow-hidden relative">
                            
                            {/* 🎛️ 상단 대시보드 및 필터 (이슈 모아보기) */}
                            <div className="flex justify-between items-end pb-3 border-b term-border shrink-0">
                                <div>
                                    <h1 className="text-xl font-black text-white mb-1"><i className="fas fa-tasks text-[#3fb950] mr-2"></i>VERIFICATION_HUB</h1>
                                    <p className="text-xs text-gray-500 font-mono">시세 관리와 파서에서 올라온 이슈를 항목별로 검증하고 마스터에 병합(Merge)합니다.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-6 gap-3 shrink-0">
                                {[
                                    { id: 'all', label: '전체 검증 대기', count: kpi.all, icon: 'fa-layer-group', color: 'border-gray-500 text-gray-300' },
                                    { id: 'new', label: '신규 / 미매핑', count: kpi.new, icon: 'fa-star', color: 'border-[#3fb950] text-[#3fb950]' },
                                    { id: 'text', label: '텍스트 갱신', count: kpi.text, icon: 'fa-edit', color: 'border-[#d2a8ff] text-[#d2a8ff]' },
                                    { id: 'price', label: '단가 변동', count: kpi.price, icon: 'fa-won-sign', color: 'border-[#58a6ff] text-[#58a6ff]' },
                                    { id: 'conflict', label: '충돌 경고', count: kpi.conflict, icon: 'fa-exclamation-triangle', color: 'border-[#f85149] text-[#f85149]' },
                                    { id: 'suspend', label: '⛔ 정지 보관함', count: kpi.suspend, icon: 'fa-ban', color: 'border-gray-700 text-gray-400' }
                                ].map(f => (
                                    <div key={f.id} onClick={() => setFilterMode(f.id)} className={`cursor-pointer term-panel rounded-xl p-3.5 border transition-all hover:bg-[#21262d] flex flex-col justify-between ${filterMode === f.id ? `bg-[#21262d] ${f.color} shadow-sm` : 'border-transparent term-border hover:border-gray-600'}`}>
                                        <span className="text-[11px] font-bold text-gray-400 mb-2 flex items-center"><i className={`fas ${f.icon} mr-1.5`}></i>{f.label}</span>
                                        <span className={`text-2xl font-black ${filterMode === f.id ? f.color.split(' ')[1] : 'text-white'}`}>{f.count}</span>
                                    </div>
                                ))}
                            </div>

                            {/* 🖥️ 검증 그리드 (이슈별 맞춤 타겟팅) */}
                            <div className="flex-1 term-panel rounded-xl flex flex-col overflow-hidden border term-border shadow-xl">
                                <div className="px-4 py-2.5 bg-[#010409] border-b term-border flex justify-between items-center shrink-0">
                                    <span className="text-[12px] font-bold text-gray-400"><i className="fas fa-filter mr-1.5"></i>현재 필터: {filterMode.toUpperCase()} ({displayList.length}건)</span>
                                    <span className="text-[11px] text-gray-500">항목의 뱃지를 클릭하면 해당 이슈만 모아볼 수 있습니다.</span>
                                </div>
                                
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-[12px] whitespace-nowrap">
                                        <thead className="bg-[#0d1117] sticky top-0 z-10 border-b border-[#30363d] text-gray-400">
                                            <tr>
                                                <th className="py-3 px-4 w-28 text-center">감지된 이슈</th>
                                                <th className="py-3 px-4 w-40 text-gray-500 border-r term-border">마스터 원본 (기준)</th>
                                                <th className="py-3 px-4 text-white">작업 요청 내용 (Delta)</th>
                                                <th className="py-3 px-4 text-right w-48 border-l term-border">이슈별 액션 / 승인</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#21262d]">
                                            {filterMode === 'suspend' ? (
                                                displayList.length === 0 ? <tr><td colSpan="4" className="py-16 text-center text-gray-600 font-bold">정지된 품목이 없습니다.</td></tr> :
                                                displayList.map(item => (
                                                    <tr key={item.코드} className="hover:bg-[#161b22] opacity-70 hover:opacity-100 transition-all h-[50px]">
                                                        <td className="py-2 px-4 text-center"><span className="bg-gray-800 text-gray-300 px-2 py-1 rounded text-[10px] font-black">정지됨</span></td>
                                                        <td colSpan="2" className="py-2 px-4 font-bold text-gray-400 line-through">{item.품목명} ({item.규격}) <span className="text-[10px] font-mono ml-2">{item.코드}</span></td>
                                                        <td className="py-2 px-4 text-right">
                                                            <button onClick={() => handleToggleSuspend(item.코드, true)} className="px-4 py-2 bg-transparent border border-[#3fb950] text-[#3fb950] hover:bg-[rgba(63,185,80,0.1)] rounded text-[11px] font-bold transition-colors">🟢 판매 복구</button>
                                                        </td>
                                                    </tr>
                                                ))
                                            ) : (
                                                displayList.length === 0 ? <tr><td colSpan="4" className="py-16 text-center text-gray-600 font-bold">대기 중인 검증 항목이 없습니다.</td></tr> :
                                                displayList.map(item => {
                                                    const hasNew = item.issues.includes('new');
                                                    const hasText = item.issues.includes('text');
                                                    const hasPrice = item.issues.includes('price_up') || item.issues.includes('price_down');
                                                    const hasConflict = item.issues.includes('conflict');

                                                    return (
                                                        <tr key={item.코드} className={`hover:bg-[#161b22] transition-colors h-[54px] ${hasConflict ? 'bg-[rgba(248,81,73,0.05)]' : ''}`}>
                                                            <td className="py-2 px-4">
                                                                <div className="flex flex-col gap-1 items-center">
                                                                    {hasNew && <button onClick={() => setFilterMode('new')} className="bg-[rgba(63,185,80,0.15)] text-[#3fb950] border border-[#3fb950]/30 px-1.5 py-0.5 rounded text-[10px] font-black hover:bg-[#3fb950] hover:text-white transition-colors">신규</button>}
                                                                    {hasConflict && <button onClick={() => setFilterMode('conflict')} className="bg-rose-900/40 text-[#f85149] border border-[#f85149]/30 px-1.5 py-0.5 rounded text-[10px] font-black animate-pulse hover:bg-[#f85149] hover:text-white transition-colors">충돌</button>}
                                                                    {hasText && <button onClick={() => setFilterMode('text')} className="bg-[rgba(210,168,255,0.15)] text-[#d2a8ff] border border-[#d2a8ff]/30 px-1.5 py-0.5 rounded text-[10px] font-black hover:bg-[#d2a8ff] hover:text-white transition-colors">텍스트</button>}
                                                                    {item.issues.includes('price_up') && <button onClick={() => setFilterMode('price')} className="text-[#f85149] px-1.5 py-0.5 rounded text-[10px] font-black border border-[#f85149]/30 hover:bg-[#f85149] hover:text-white transition-colors">인상</button>}
                                                                    {item.issues.includes('price_down') && <button onClick={() => setFilterMode('price')} className="text-[#58a6ff] px-1.5 py-0.5 rounded text-[10px] font-black border border-[#58a6ff]/30 hover:bg-[#58a6ff] hover:text-white transition-colors">인하</button>}
                                                                </div>
                                                            </td>
                                                            
                                                            {/* 마스터 영역 */}
                                                            <td className="py-2 px-4 border-r term-border">
                                                                {hasNew ? (
                                                                    <span className="text-gray-600 font-bold text-[11px]"><i className="fas fa-question-circle mr-1"></i>마스터에 없음</span>
                                                                ) : (
                                                                    <div className="flex flex-col">
                                                                        <span className="text-[10px] font-mono text-gray-500 mb-0.5">{item.코드}</span>
                                                                        <span className={`font-bold ${hasText ? 'text-gray-500 line-through' : 'text-gray-300'}`}>{item.mName} <span className="font-normal text-[10px]">({item.mSpec})</span></span>
                                                                        {hasPrice && <span className="text-[11px] font-mono text-gray-400 mt-0.5">단가: {item.mPrice.toLocaleString()}</span>}
                                                                    </div>
                                                                )}
                                                            </td>

                                                            {/* 요청(Delta) 영역 */}
                                                            <td className="py-2 px-4 bg-[rgba(255,255,255,0.01)]">
                                                                <div className="flex flex-col">
                                                                    <span className={`font-bold text-[13px] ${hasText || hasNew ? 'text-[#d2a8ff]' : 'text-white'}`}>{item.pName} <span className="text-[11px] opacity-70">({item.pSpec})</span></span>
                                                                    {hasPrice && (
                                                                        <div className="flex items-center gap-2 mt-0.5">
                                                                            <span className={`text-[11px] font-mono font-bold ${item.pPrice > item.mPrice ? 'text-[#f85149]' : 'text-[#58a6ff]'}`}>새 단가: {item.pPrice.toLocaleString()}</span>
                                                                            <span className={`text-[10px] font-black ${item.pPrice > item.mPrice ? 'text-[#f85149]' : 'text-[#58a6ff]'}`}>({item.pPrice > item.mPrice ? '+' : ''}{(item.pPrice - item.mPrice).toLocaleString()})</span>
                                                                        </div>
                                                                    )}
                                                                    {item.vendor && <span className="text-[10px] text-gray-500 font-bold mt-1 bg-[#21262d] w-max px-1.5 py-0.5 rounded">출처: {item.vendor}</span>}
                                                                    
                                                                    {/* AI 추천 UI */}
                                                                    {hasNew && item.aiSuggestion && (
                                                                        <div className="mt-2 flex items-center gap-2 bg-[rgba(63,185,80,0.1)] border border-[#3fb950]/30 p-2 rounded-lg w-max">
                                                                            <span className="text-[10px] text-[#3fb950] font-black"><i className="fas fa-lightbulb mr-1"></i>AI 매핑 추천:</span>
                                                                            <span className="text-[11px] font-bold text-gray-200">{item.aiSuggestion.품목명} ({item.aiSuggestion.규격})</span>
                                                                            <button onClick={() => handleBindMapping(item.코드, item.aiSuggestion.품목코드)} className="ml-2 px-2 py-1 bg-[#3fb950] text-white text-[10px] font-black rounded hover:bg-emerald-600 transition-colors">연결</button>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </td>

                                                            {/* 액션 영역 */}
                                                            <td className="py-2 px-4 text-right border-l term-border">
                                                                <div className="flex flex-col gap-1.5 items-end justify-center">
                                                                    {hasNew ? (
                                                                        <div className="flex items-center gap-1.5">
                                                                            <button onClick={() => { setBindTarget(item); setSearchKw(item.pName); setBindModalOpen(true); }} className="px-3 py-1.5 bg-[#21262d] hover:bg-[#30363d] text-[#58a6ff] border border-[#30363d] rounded text-[11px] font-bold transition-colors shadow-sm"><i className="fas fa-search mr-1"></i>수동 연결</button>
                                                                            <button onClick={() => handleApproveMerge(item.코드)} className="px-3 py-1.5 bg-[#1f6feb] hover:bg-[#388bfd] text-white rounded text-[11px] font-bold transition-colors shadow-sm"><i className="fas fa-plus mr-1"></i>신규 발급</button>
                                                                        </div>
                                                                    ) : hasConflict ? (
                                                                        <div className="flex items-center gap-1.5">
                                                                            <button onClick={() => handleReject(item.코드)} className="px-3 py-1.5 bg-[#21262d] text-gray-400 hover:text-white rounded text-[11px] font-bold transition-colors">취소</button>
                                                                            <button onClick={() => handleApproveMerge(item.코드)} className="px-3 py-1.5 bg-[#f85149] hover:bg-rose-600 text-white rounded text-[11px] font-black transition-colors shadow-sm"><i className="fas fa-exclamation-triangle mr-1"></i>강제 덮어쓰기</button>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex items-center gap-1.5">
                                                                            <button onClick={() => handleReject(item.코드)} className="px-3 py-1.5 bg-transparent border border-gray-600 text-gray-400 hover:bg-[#21262d] hover:text-white rounded text-[11px] font-bold transition-colors">반려(무시)</button>
                                                                            <button onClick={() => handleApproveMerge(item.코드)} className="px-4 py-1.5 bg-[#238636] hover:bg-[#2ea043] text-white rounded text-[11px] font-black transition-colors shadow-sm"><i className="fas fa-check mr-1"></i>승인 반영</button>
                                                                        </div>
                                                                    )}
                                                                    
                                                                    {!hasNew && (
                                                                        <button onClick={() => handleToggleSuspend(item.코드, false)} className="mt-1 text-[10px] text-gray-500 hover:text-[#f85149] font-bold transition-colors"><i className="fas fa-ban mr-1"></i>이 상품 임의 정지</button>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* 🔍 수동 연결 (Bind) 모달 */}
                        {bindModalOpen && (
                            <div className="fixed inset-0 bg-[#010409]/80 flex justify-center items-center z-[100] backdrop-blur-sm fade-in">
                                <div className="bg-[#0d1117] w-[600px] rounded-xl border border-[#30363d] shadow-2xl flex flex-col overflow-hidden">
                                    <div className="p-4 bg-[#010409] border-b border-[#30363d] flex justify-between items-center">
                                        <h2 className="text-white font-black text-[15px]"><i className="fas fa-link text-[#58a6ff] mr-2"></i>기존 마스터 상품에 수동 연결</h2>
                                        <button onClick={() => setBindModalOpen(false)} className="text-gray-500 hover:text-white"><i className="fas fa-times"></i></button>
                                    </div>
                                    <div className="p-5 flex flex-col gap-4">
                                        <div className="bg-[#161b22] p-4 rounded-lg border border-[#30363d]">
                                            <p className="text-[11px] text-gray-400 mb-1">연결할 원본 텍스트</p>
                                            <p className="text-[14px] font-black text-[#d2a8ff]">{bindTarget?.pName} <span className="text-[12px] font-normal text-gray-500">({bindTarget?.pSpec})</span></p>
                                        </div>
                                        <div className="relative">
                                            <i className="fas fa-search absolute left-3 top-3 text-gray-500"></i>
                                            <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="연결할 마스터 품명/규격 검색..." className="w-full term-input pl-9 pr-4 py-2.5 rounded outline-none text-[13px] font-bold focus:shadow-[0_0_10px_rgba(88,166,255,0.2)]" autoFocus />
                                        </div>
                                        <div className="max-h-[300px] overflow-y-auto custom-scrollbar border border-[#30363d] rounded bg-[#010409]">
                                            <ul className="divide-y divide-[#21262d]">
                                                {searchResults.length === 0 ? <li className="p-6 text-center text-gray-600 font-bold text-xs">검색 결과가 없습니다.</li> :
                                                    searchResults.map(m => (
                                                        <li key={m.코드} className="p-3 hover:bg-[#161b22] flex justify-between items-center group cursor-pointer" onClick={() => handleBindMapping(bindTarget.코드, m.코드)}>
                                                            <div className="flex flex-col">
                                                                <span className="text-[10px] font-mono text-gray-500">{m.코드}</span>
                                                                <span className="font-bold text-gray-300 text-[12px]">{m.품목명} <span className="font-normal text-gray-500">({m.규격})</span></span>
                                                            </div>
                                                            <button className="px-3 py-1.5 bg-[#21262d] text-[#58a6ff] group-hover:bg-[#1f6feb] group-hover:text-white rounded text-[11px] font-bold transition-colors">선택</button>
                                                        </li>
                                                    ))
                                                }
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Toast Notification */}
                        {toastMsg && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 term-panel text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-3 fade-in text-[13px] font-bold z-50">
                                <i className={`fas ${toastMsg.includes('✅') || toastMsg.includes('🔗') || toastMsg.includes('🟢') ? 'fa-check-circle text-[#3fb950]' : toastMsg.includes('🗑️') ? 'fa-trash-alt text-gray-400' : 'fa-exclamation-triangle text-[#f85149]'}`}></i>
                                {toastMsg.replace(/✅|❌|⚠️|🗑️|🔗|🟢|⛔/g, '')}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ItemManagerApp />);
    </script>
</body>
</html>
