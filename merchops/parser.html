<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>NEXUS - Smart Parser [v1.95]</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #000000; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .system-io-bg { background-color: #010409; }
        .system-io-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .system-io-text { color: #c9d1d9; }
        .term-input { background-color: #010409; border: 1px solid #30363d; color: #c9d1d9; font-family: monospace; }
        .term-input:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 1px rgba(88,166,255,0.3); }

        .data-row { transition: all 0.1s; border-bottom: 1px solid #21262d; cursor: pointer; }
        .data-row:hover { background-color: #161b22; }
        .data-row.selected { background-color: rgba(227, 179, 65, 0.1); border: 1px solid #e3b341; }
        
        .catalog-row { transition: background-color 0.1s; border-bottom: 1px solid #21262d; cursor: pointer; }
        .catalog-row:hover { background-color: #21262d; }
        
        .nav-btn { background: rgba(22, 27, 34, 0.6); border: 1px solid #30363d; backdrop-filter: blur(4px); transition: all 0.2s; }
        .nav-btn:hover { background: rgba(48, 54, 61, 0.9); transform: scale(1.1); color: white; }
    </style>
</head>
<body class="system-io-bg system-io-text text-sm h-screen flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // 🔒 보안 스크립트
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = {
            BASE_CATALOG: 'oneapp_base_catalog',
            PENDING_QUEUE: 'oneapp_pending_queue',
            SETTINGS: 'oneapp_global_settings',
            DICT: 'PARSER_DICT',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V3', 1);
            req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const generateUUID = () => Math.random().toString(36).substr(2, 9);

        // ==========================================
        // 🧠 1. 텍스트 파싱 엔진 (순수 정규식)
        // ==========================================
        const parseTextSemantically = (rawText) => {
            let cleanText = rawText.replace(/[\u00A0\u200B\u200C\u200D\uFEFF]/g, ' ');
            let lines = cleanText.split('\n').map(l => l.trim()).filter(l => l !== '');
            const results = []; 
            let currentItem = {};
            
            const pushItem = () => {
                if (currentItem.품목명) {
                    if (currentItem.입고가) currentItem.입고가 = parseNum(currentItem.입고가);
                    results.push({ _id: generateUUID(), ...currentItem });
                }
                currentItem = {};
            };

            lines.forEach(line => {
                if (/상품\s*\([\d,]+개\)/i.test(line) || /마켓보로|통신판매업|- 끝 -/.test(line)) return;

                const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                let extractedPrice = null;
                if (priceMatch) {
                    extractedPrice = priceMatch[1];
                    line = line.replace(priceMatch[0], '').trim();
                    if (line.endsWith('/')) line = line.slice(0, -1).trim();
                }
                if (extractedPrice) currentItem.입고가 = extractedPrice;
                if (!line) { if (extractedPrice) pushItem(); return; }

                if (!currentItem.품목명) {
                    if (line.includes(' / ')) {
                        const splitParts = line.split(' / ');
                        let namePart = splitParts[0].trim(); 
                        let specPart = splitParts.slice(1).join(' / ').trim();
                        const unitMatch = namePart.match(/(EA|BOX|포|개|박스|봉|캔|병|팩|단|마리)$/i);
                        if (unitMatch) { 
                            currentItem.단위 = unitMatch[0]; 
                            currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); 
                        } else { 
                            currentItem.품목명 = namePart; 
                        }
                        currentItem.규격 = specPart.split('/')[0].trim() || '';
                    } else { 
                        currentItem.품목명 = line; 
                    }
                } else {
                    if (line.includes('/')) {
                        const parts = line.split('/').map(s => s.trim());
                        if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                        if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                    } else if (/^\d+(?:\.\d+)?(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입)/i.test(line) && !currentItem.규격) {
                        currentItem.규격 = line;
                    }
                }
                if (extractedPrice) pushItem();
            });
            if (currentItem.품목명) pushItem();
            return results;
        };

        // ==========================================
        // 🧠 2. 2단계 지능형 매칭 엔진 (딕셔너리 -> 마스터)
        // ==========================================
        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => {
            if (!str) return '';
            const match = String(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g);
            return match ? match.join('') : '';
        };

        const runSmartMatch = (extName, extSpec, mProducts, dict) => {
            const rawName = String(extName || '').trim();
            
            // 1단계: 클라우드 딕셔너리 대조 (최우선)
            if (dict && dict[rawName]) {
                const dictCode = dict[rawName];
                if (mProducts[dictCode]) {
                    return { code: dictCode, name: mProducts[dictCode]['품목명'], status: '🔵 딕셔너리' };
                }
            }

            // 2단계: 기존 N-gram 마스터 대조
            const extFullText = normalizeText((extName || '') + " " + (extSpec || ''));
            let bestMatch = null; 
            let bestScore = 0;
            const extTokens = tokenize((extName || '') + " " + (extSpec || ''));
            const extSpecNum = extractSpec((extName || '') + " " + (extSpec || ''));
            let perfectMatches = [];

            for (const mCode in mProducts) {
                const m = mProducts[mCode];
                const mName = String(m.품목명 || '').trim();
                const mSpec = String(m.규격 || '').trim();
                const mFullText = normalizeText(mName + mSpec);
                const mSpecNum = extractSpec(mName + " " + mSpec);

                let isSpecMatch = true;
                if (extSpecNum && mSpecNum && extSpecNum !== mSpecNum) isSpecMatch = false; 

                if (extFullText === mFullText && isSpecMatch) {
                    perfectMatches.push(m); continue;
                }

                const mTokens = tokenize(mName + " " + mSpec);
                const intersection = extTokens.filter(t => mTokens.includes(t));
                let score = intersection.length / Math.max(extTokens.length, mTokens.length);

                if (!isSpecMatch) score = score * 0.1; 
                if (score >= 0.7 && score > bestScore) { bestScore = score; bestMatch = m; }
            }

            if (perfectMatches.length === 1) return { code: perfectMatches[0].품목코드, name: perfectMatches[0].품목명, status: '🟡 이름일치' };
            if (bestMatch && bestScore >= 0.7) return { code: bestMatch.품목코드, name: bestMatch.품목명, status: '🟡 유사발견' };
            
            return { code: '', name: '', status: '🔴 매칭실패' };
        };

        const GlobalHeader = ({ activeTab }) => {
            const tabs = [
                { id: 'master', name: '마스터 DB', icon: 'fas fa-server', url: 'master.html' },
                { id: 'manager', name: '상품 관리', icon: 'fas fa-tasks', url: 'manager.html' },
                { id: 'workspace', name: '시세 관리', icon: 'fas fa-edit', url: 'workspace.html' },
                { id: 'parser', name: '스마트 파서', icon: 'fas fa-bolt', url: 'parser.html' }
            ];

            return (
                <div className="flex flex-col shrink-0 z-40 w-full system-io-bg border-b system-io-border">
                    <header className="h-[60px] flex justify-between items-center px-6 max-w-[1400px] w-full mx-auto">
                        <div className="flex items-center">
                            <span className="font-black text-[20px] tracking-wider text-white mr-8">NEXUS<span className="text-[#58a6ff]">.IO</span></span>
                            <div className="flex items-end h-full pt-2 mt-[11px]">
                                {tabs.map(tab => {
                                    const isActive = activeTab === tab.id;
                                    return (
                                        <a key={tab.id} href={tab.url} className={`relative flex items-center gap-2 px-5 py-3 text-[13px] font-bold rounded-t-lg transition-colors border-x border-t ${isActive ? 'system-io-panel border-b-transparent text-white z-10' : 'border-transparent text-gray-500 hover:text-gray-300'}`} style={{ marginBottom: isActive ? '-1px' : '0' }}>
                                            <i className={`${tab.icon} ${isActive ? 'text-[#e3b341]' : ''}`}></i> {tab.name}
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                        <button onClick={() => window.location.href = 'settings.html'} className="px-4 py-2 bg-[#161b22] hover:bg-[#21262d] text-white font-bold rounded text-xs transition-colors border system-io-border">
                            <i className="fas fa-sliders-h text-[#58a6ff] mr-2"></i>환경 설정
                        </button>
                    </header>
                </div>
            );
        };

        // ==========================================
        // 📊 메인 애플리케이션
        // ==========================================
        function ParserApp() {
            const [baseCatalog, setBaseCatalog] = useState({});
            const [parserDict, setParserDict] = useState({});
            const [settings, setSettings] = useState({});
            const [inputText, setInputText] = useState('');
            const [parsedItems, setParsedItems] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            
            // UI States
            const [catalogSearch, setCatalogSearch] = useState('');
            const [selectedRowId, setSelectedRowId] = useState(null);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            useEffect(() => {
                const loadData = async () => {
                    setBaseCatalog(await getIDB(CORE_KEYS.BASE_CATALOG) || {});
                    setParserDict(await getIDB(CORE_KEYS.DICT) || {});
                    setSettings(await getIDB(CORE_KEYS.SETTINGS) || {});
                };
                loadData();
                window.addEventListener('storage', (e) => { if (e.key === CORE_KEYS.SYNC_TRIGGER) loadData(); });
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'F8') document.getElementById('btn-apply')?.click(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const catalogArray = useMemo(() => Object.values(baseCatalog), [baseCatalog]);
            const filteredCatalog = useMemo(() => {
                if (!catalogSearch) return catalogArray.slice(0, 100); // 렌더링 성능 위해 100개 제한
                const kw = catalogSearch.toLowerCase();
                return catalogArray.filter(i => (i.품목명||'').toLowerCase().includes(kw) || (i.품목코드||'').toLowerCase().includes(kw)).slice(0, 100);
            }, [catalogArray, catalogSearch]);

            const handleSwipe = (direction, url) => {
                showToast(`ℹ️ [화면 전환] ${direction} 앱으로 이동합니다.`);
                setTimeout(() => { window.location.href = url; }, 500);
            };

            // 1. 텍스트 분석 실행
            const handleStartParsing = () => {
                if (!inputText.trim()) return showToast('⚠️ 텍스트를 입력해주세요.');
                setIsProcessing(true);
                setSelectedRowId(null);
                
                setTimeout(() => {
                    const rawItems = parseTextSemantically(inputText);
                    const processedItems = rawItems.map(item => {
                        const matchResult = runSmartMatch(item.품목명, item.규격, baseCatalog, parserDict);
                        return {
                            ...item,
                            matchCode: matchResult.code,
                            matchName: matchResult.name,
                            matchStatus: matchResult.status,
                            needsLearning: false
                        };
                    });
                    setParsedItems(processedItems);
                    setIsProcessing(false);
                    showToast(`✅ ${processedItems.length}건 텍스트 분석 및 딕셔너리 매칭 완료`);
                }, 100);
            };

            // 2. 좌측 카탈로그에서 수동 매핑 클릭
            const handleCatalogClick = (mItem) => {
                if (!selectedRowId) return showToast('⚠️ 매핑할 파싱 대상을 우측에서 먼저 클릭하여 선택해주세요.');
                
                setParsedItems(prev => prev.map(item => {
                    if (item._id === selectedRowId) {
                        return {
                            ...item,
                            matchCode: mItem.품목코드,
                            matchName: mItem.품목명,
                            matchStatus: '🟣 수동 매핑',
                            needsLearning: true // 학습 전송 플래그
                        };
                    }
                    return item;
                }));
                showToast(`🔗 [${mItem.품목명}] 수동 매핑 완료 (F8 전송 시 학습됨)`);
            };

            // 3. F8 전송 (대기열 상신 + 클라우드 딕셔너리 학습)
            const handleApplyDelta = async () => {
                if (parsedItems.length === 0) return;
                setIsProcessing(true);

                try {
                    const queue = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                    let count = 0;
                    
                    // 학습 전송용 데이터
                    const dictPayload = [];

                    parsedItems.forEach(item => {
                        const code = item.matchCode || `NEW-${generateUUID().substring(0,6).toUpperCase()}`;
                        
                        if (!queue[code]) queue[code] = { 코드: code, finalData: {} };
                        if (!item.matchCode) queue[code].isNewItem = true;
                        
                        queue[code].finalData = { 
                            ...queue[code].finalData, 
                            품목명: item.품목명, 
                            규격: item.규격 || '',
                            입고가: item.입고가 || 0
                        };
                        count++;

                        // 수동 매핑건은 클라우드 딕셔너리 학습 페이로드에 추가
                        if (item.needsLearning && item.matchCode) {
                            dictPayload.push({ text: item.품목명, code: item.matchCode });
                        }
                    });

                    await setIDB(CORE_KEYS.PENDING_QUEUE, queue);

                    // 백그라운드 클라우드 딕셔너리 학습(PUSH_DICT) 전송
                    if (dictPayload.length > 0 && settings.appScriptUrl) {
                        fetch(settings.appScriptUrl, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'PUSH_DICT', data: dictPayload })
                        }).catch(e => console.warn("Dictionary Sync Failed:", e));
                    }

                    localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());

                    setParsedItems([]);
                    setInputText('');
                    setSelectedRowId(null);
                    showToast(`🚀 ${count}건 상신 완료! (신규 학습 ${dictPayload.length}건) -> 상품 관리로 이동`);
                    setTimeout(() => { window.location.href = 'manager.html'; }, 1000);
                } catch(err) {
                    console.error(err);
                    showToast("❌ 전송 중 오류 발생");
                } finally {
                    setIsProcessing(false);
                }
            };

            const kpi = useMemo(() => {
                return {
                    total: parsedItems.length,
                    matched: parsedItems.filter(i => i.matchStatus.includes('딕셔너리') || i.matchStatus.includes('일치')).length,
                    manual: parsedItems.filter(i => i.matchStatus.includes('수동')).length,
                    unmatched: parsedItems.filter(i => i.matchStatus.includes('실패')).length,
                };
            }, [parsedItems]);

            return (
                <div className="flex-1 flex flex-col h-full w-full items-center justify-center relative">
                    
                    {/* Swipe Navigation Buttons */}
                    <button onClick={() => handleSwipe('시세 관리', 'workspace.html')} className="nav-btn fixed left-4 top-1/2 -translate-y-1/2 z-40 p-4 rounded-full text-gray-500 group">
                        <i className="fas fa-chevron-left text-xl"></i>
                        <span className="absolute left-14 top-1/2 -translate-y-1/2 text-xs font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">시세 관리로 이동</span>
                    </button>

                    <div className="w-full max-w-[1400px] h-full flex flex-col border-x system-io-border shadow-2xl relative bg-[#010409]">
                        <GlobalHeader activeTab="parser" />

                        <div className="flex-1 flex flex-col p-6 w-full gap-4 overflow-hidden fade-in">
                            {/* Header */}
                            <div className="flex justify-between items-end pb-3 border-b system-io-border shrink-0">
                                <div>
                                    <h1 className="text-xl font-black text-white mb-1"><i className="fas fa-bolt text-[#e3b341] mr-2"></i>SMART_PARSER</h1>
                                    <p className="text-xs text-gray-500 font-mono">텍스트를 분석하고, 딕셔너리로 코드를 매칭하며 새로운 패턴을 클라우드에 학습시킵니다.</p>
                                </div>
                                <div className="flex gap-2">
                                    <button id="btn-apply" onClick={handleApplyDelta} disabled={parsedItems.length === 0 || isProcessing} className={`px-6 py-2.5 rounded text-xs font-black transition-colors shadow-sm flex items-center ${parsedItems.length > 0 ? 'bg-[#238636] hover:bg-[#2ea043] text-white shadow-[0_0_10px_rgba(35,134,54,0.3)]' : 'system-io-panel text-gray-500 cursor-not-allowed'}`}>
                                        <i className="fas fa-paper-plane mr-2"></i> 상신 및 학습전송 (F8)
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 flex gap-4 overflow-hidden h-full">
                                
                                {/* ----------------------------------------------------
                                    [좌측 30%] 마스터 카탈로그 리스트 (수동 매핑용)
                                ---------------------------------------------------- */}
                                <div className="w-[30%] flex flex-col gap-3 shrink-0 h-full border-r system-io-border pr-4">
                                    <div className="flex justify-between items-center bg-[#0d1117] p-3 border system-io-border rounded-lg">
                                        <span className="text-xs font-bold text-[#8b949e] uppercase tracking-widest"><i className="fas fa-search mr-2"></i>Catalog Search</span>
                                    </div>
                                    <div className="relative">
                                        <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                                        <input 
                                            type="text" 
                                            placeholder="품목명 또는 코드 검색..." 
                                            value={catalogSearch}
                                            onChange={(e) => setCatalogSearch(e.target.value)}
                                            className="w-full term-input pl-9 pr-3 py-2 text-xs rounded"
                                        />
                                    </div>
                                    <div className="text-[10px] text-gray-500">클릭하여 우측의 선택된 파서 항목과 매핑합니다.</div>
                                    
                                    <div className="flex-1 overflow-auto custom-scrollbar border system-io-border rounded bg-[#0d1117]">
                                        <table className="w-full text-left text-xs whitespace-nowrap">
                                            <tbody className="divide-y divide-[#21262d]">
                                                {filteredCatalog.map(mItem => (
                                                    <tr key={mItem.품목코드} onClick={() => handleCatalogClick(mItem)} className="catalog-row">
                                                        <td className="p-3">
                                                            <div className="font-bold text-[#c9d1d9]">{mItem.품목명}</div>
                                                            <div className="text-[10px] text-gray-500 mt-0.5">{mItem.규격} <span className="text-[#58a6ff] ml-2">{mItem.품목코드}</span></div>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {filteredCatalog.length === 0 && (
                                                    <tr><td className="p-4 text-center text-gray-600">검색 결과가 없습니다.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* ----------------------------------------------------
                                    [우측 70%] 텍스트 파서 작업창
                                ---------------------------------------------------- */}
                                <div className="w-[70%] flex flex-col gap-3 h-full overflow-hidden pl-2">
                                    
                                    {/* 상단 텍스트 입력 */}
                                    <div className="h-[140px] flex gap-3 shrink-0">
                                        <textarea 
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            className="flex-1 term-input p-4 rounded-lg resize-none text-[13px] leading-relaxed custom-scrollbar shadow-inner"
                                            placeholder="카톡 시세나 웹 텍스트를 전체 복사하여 이곳에 붙여넣으세요..."
                                        ></textarea>
                                        <button onClick={handleStartParsing} disabled={!inputText || isProcessing} className="w-[140px] bg-[#21262d] hover:bg-[#30363d] text-[#58a6ff] font-bold text-xs rounded-lg border system-io-border transition-colors disabled:opacity-50 flex flex-col items-center justify-center gap-2">
                                            {isProcessing ? <i className="fas fa-circle-notch fa-spin text-2xl"></i> : <i className="fas fa-magic text-2xl"></i>}
                                            분석 실행
                                        </button>
                                    </div>

                                    {/* 하단 파싱 결과 리스트 */}
                                    <div className="flex-1 flex flex-col gap-2 overflow-hidden">
                                        <div className="flex justify-between items-center bg-[#0d1117] p-3 border system-io-border rounded-lg shrink-0">
                                            <span className="text-xs font-bold text-[#8b949e] uppercase tracking-widest"><i className="fas fa-list-ul mr-2"></i>Parsed Results</span>
                                            <div className="flex gap-3 text-[11px] font-bold">
                                                <span className="text-[#3fb950]">🔵 자동: {kpi.matched}</span>
                                                <span className="text-[#d2a8ff]">🟣 수동: {kpi.manual}</span>
                                                <span className="text-[#f85149]">🔴 미매칭: {kpi.unmatched}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 system-io-panel rounded-lg flex flex-col overflow-hidden shadow-xl">
                                            <div className="flex-1 overflow-auto custom-scrollbar">
                                                <table className="w-full text-left text-xs whitespace-nowrap">
                                                    <thead className="bg-[#010409] sticky top-0 z-10 border-b system-io-border text-gray-400">
                                                        <tr>
                                                            <th className="py-3 px-4 w-24 text-center">매칭 상태</th>
                                                            <th className="py-3 px-4 w-40">마스터 코드 및 상품명</th>
                                                            <th className="py-3 px-4 text-[#d2a8ff] bg-[rgba(210,168,255,0.05)] border-x system-io-border">파싱 추출 품명 (원본)</th>
                                                            <th className="py-3 px-4 text-right w-32">추출 단가</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-[#21262d]">
                                                        {parsedItems.length === 0 ? (
                                                            <tr>
                                                                <td colSpan="4" className="py-24 text-center text-gray-600 font-bold bg-[#0d1117]">
                                                                    <i className="fas fa-robot text-4xl mb-4 opacity-20 block"></i>
                                                                    텍스트를 붙여넣고 [분석 실행]을 눌러주세요.
                                                                </td>
                                                            </tr>
                                                        ) : (
                                                            parsedItems.map(item => {
                                                                const isDict = item.matchStatus.includes('딕셔너리');
                                                                const isManual = item.matchStatus.includes('수동');
                                                                const isMatched = isDict || item.matchStatus.includes('일치');
                                                                const isNew = item.matchStatus.includes('실패');
                                                                const isSelected = selectedRowId === item._id;

                                                                return (
                                                                    <tr key={item._id} onClick={() => setSelectedRowId(item._id)} className={`data-row h-[46px] ${isSelected ? 'selected' : ''}`}>
                                                                        <td className="py-1.5 px-4 text-center">
                                                                            <span className={`px-2 py-1 rounded text-[10px] font-black ${isDict ? 'bg-[rgba(88,166,255,0.1)] text-[#58a6ff]' : isManual ? 'bg-[rgba(210,168,255,0.1)] text-[#d2a8ff]' : isMatched ? 'bg-[rgba(63,185,80,0.1)] text-[#3fb950]' : isNew ? 'bg-[rgba(248,81,73,0.1)] text-[#f85149]' : 'bg-[rgba(227,179,65,0.1)] text-[#e3b341]'}`}>
                                                                                {item.matchStatus}
                                                                            </span>
                                                                        </td>
                                                                        <td className="py-1.5 px-4">
                                                                            <div className="font-bold text-[#c9d1d9]">{item.matchName || <span className="text-gray-600 font-normal">상품을 선택하세요</span>}</div>
                                                                            <div className="text-[10px] font-mono text-gray-500 mt-0.5">{item.matchCode || '-'}</div>
                                                                        </td>
                                                                        <td className="py-1.5 px-4 bg-[rgba(210,168,255,0.02)] border-x system-io-border">
                                                                            <div className="flex flex-col">
                                                                                <span className="font-bold text-gray-400">{item.품목명}</span>
                                                                                {item.규격 && <span className="text-[10px] text-gray-600 mt-0.5">{item.규격} {item.단위 ? `| ${item.단위}` : ''}</span>}
                                                                            </div>
                                                                        </td>
                                                                        <td className="py-1.5 px-4 text-right font-mono font-bold text-[#58a6ff]">
                                                                            {item.입고가 > 0 ? item.입고가.toLocaleString() : '-'}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Toast */}
                    {toastMsg && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 bg-[#161b22] border system-io-border text-white px-6 py-3.5 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.8)] flex items-center gap-3 fade-in text-[13px] font-bold">
                            <i className={`fas text-lg ${toastMsg.includes('✅') || toastMsg.includes('🚀') ? 'fa-check-circle text-[#3fb950]' : toastMsg.includes('🔗') ? 'fa-link text-[#d2a8ff]' : toastMsg.includes('♻️') ? 'fa-sync-alt text-[#58a6ff]' : 'fa-exclamation-triangle text-[#f85149]'}`}></i>
                            {toastMsg.replace(/✅|❌|⚠️|🚀|♻️|🔗|ℹ️/g, '')}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ParserApp />);
    </script>
</body>
</html>
