<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Smart Parser [v1.94]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #000000; color: #c9d1d9; margin: 0; overflow: hidden; user-select: none; }
        .term-bg { background-color: #010409; }
        .term-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .term-border { border-color: #30363d; }
        .term-input { background-color: #010409; border: 1px solid #30363d; color: #c9d1d9; font-family: monospace; }
        .term-input:focus { border-color: #58a6ff; outline: none; }
        .data-row:hover { background-color: #161b22; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="term-bg h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // 🔒 보안 스크립트 (수정: React Hook 외부에서 순수 JS로 즉시 실행)
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = { BASE_CATALOG: 'oneapp_base_catalog', PENDING_QUEUE: 'oneapp_pending_queue', CYCLE_LOG: 'oneapp_workspace_cycle_log', SYNC_TRIGGER: 'merchMaster_sync_trigger' };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V2', 2);
            req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const GlobalHeader = ({ activeTab, pendingCount }) => {
            const NAV_MENU = [
                { id: 'master', name: '마스터 DB', icon: 'fas fa-server', url: '/merchops/master.html' },
                { id: 'manager', name: '상품 관리', icon: 'fas fa-tasks', url: '/merchops/manager.html' },
                { id: 'workspace', name: '시세 관리', icon: 'fas fa-edit', url: '/merchops/workspace.html' },
                { id: 'parser', name: '스마트 파서', icon: 'fas fa-bolt', url: '/merchops/parser.html' },
                { id: 'insights', name: '인사이트', icon: 'fas fa-chart-line', url: '/merchops/insights.html' },
                { id: 'publish', name: '대외 발행', icon: 'fas fa-share-square', url: '/merchops/publish.html' },
                { id: 'settings', name: '환경 설정', icon: 'fas fa-cog', url: '/merchops/settings.html' }
            ];

            return (
                <div className="flex flex-col shrink-0 z-40 w-full term-bg border-b term-border">
                    <header className="h-[60px] flex justify-between items-center px-6">
                        <div className="flex items-center gap-6 h-full">
                            <a href="/merchops/parser.html" className="font-black text-[20px] tracking-wider text-white hover:text-indigo-400 transition-colors">
                                NEXUS<span className="text-indigo-500">.IO</span>
                            </a>
                            <div className="flex items-end h-full gap-1 ml-4 pt-2">
                                {NAV_MENU.map(menu => {
                                    const isActive = activeTab === menu.id;
                                    const isManager = menu.id === 'manager';
                                    return (
                                        <a key={menu.id} href={menu.url}
                                            className={`relative flex items-center gap-2 px-5 py-3 text-[13px] font-bold rounded-t-lg transition-colors border-x border-t ${isActive ? 'term-panel border-b-transparent text-white z-10' : 'border-transparent text-gray-500 hover:text-gray-300'}`}
                                            style={{ marginBottom: isActive ? '-1px' : '0' }}
                                        >
                                            <i className={`${menu.icon} ${isActive ? 'text-indigo-400' : ''}`}></i> {menu.name}
                                            {isManager && pendingCount > 0 && <span className="ml-1.5 flex h-5 min-w-[20px] px-1.5 items-center justify-center rounded-full bg-rose-600 text-white text-[10px] font-black shadow-sm animate-pulse">{pendingCount}</span>}
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                    </header>
                </div>
            );
        };

        const parseText = (text) => {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const results = [];
            lines.forEach(line => {
                const priceMatch = line.match(/([\d,]+)\s*원/);
                if (priceMatch) {
                    const price = parseNum(priceMatch[1]);
                    const infoPart = line.replace(priceMatch[0], '').trim();
                    results.push({ id: Math.random().toString(36).substr(2, 9), rawName: infoPart, price });
                }
            });
            return results;
        };

        function ParserApp() {
            const [inputText, setInputText] = useState('');
            const [parsedItems, setParsedItems] = useState([]);
            const [masterData, setMasterData] = useState({});
            const [pendingCount, setPendingCount] = useState(0);

            const loadData = useCallback(async () => {
                setMasterData(await getIDB(CORE_KEYS.BASE_CATALOG) || {});
                setPendingCount(Object.keys(await getIDB(CORE_KEYS.PENDING_QUEUE) || {}).length);
            }, []);

            useEffect(() => {
                loadData();
                window.addEventListener('storage', (e) => { if (e.key === CORE_KEYS.SYNC_TRIGGER) loadData(); });
                return () => window.removeEventListener('storage', loadData);
            }, [loadData]);

            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'F8') document.getElementById('btn-parse-apply')?.click(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const handleStartParsing = () => {
                if (!inputText.trim()) return;
                setParsedItems(parseText(inputText));
            };

            const handleApply = async () => {
                if (parsedItems.length === 0) return;
                const master = await getIDB(CORE_KEYS.BASE_CATALOG) || {};
                const queue = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                const cycleLog = await getIDB(CORE_KEYS.CYCLE_LOG) || {};

                parsedItems.forEach(item => {
                    const code = "TEMP_CODE"; // 임시
                    const mItem = master[code];
                    if (mItem) {
                        master[code] = { ...mItem, 입고가: item.price };
                        cycleLog[code] = true;
                    } else {
                        queue[item.id] = { rawName: item.rawName, price: item.price, isNew: true };
                    }
                });

                await setIDB(CORE_KEYS.BASE_CATALOG, master);
                await setIDB(CORE_KEYS.PENDING_QUEUE, queue);
                await setIDB(CORE_KEYS.CYCLE_LOG, cycleLog);
                localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());

                alert("🚀 분석 결과가 마스터 DB와 상품 관리로 각각 전송되었습니다.");
                setParsedItems([]); setInputText('');
                loadData();
            };

            return (
                <div className="flex-1 flex flex-col h-full w-full">
                    <GlobalHeader activeTab="parser" pendingCount={pendingCount} />
                    <div className="flex-1 flex flex-col p-6 max-w-[1400px] mx-auto w-full gap-4">
                        <div className="flex justify-between items-end border-b term-border pb-4 shrink-0">
                            <div>
                                <h1 className="text-xl font-black tracking-tighter text-white">SMART_PARSER<span className="text-indigo-500">.EXE</span></h1>
                                <p className="text-xs text-gray-500 font-mono">비정형 텍스트를 분석하여 델타 데이터로 변환합니다.</p>
                            </div>
                            <button id="btn-parse-apply" onClick={handleApply} disabled={parsedItems.length === 0} className="px-6 py-2.5 bg-[#238636] hover:bg-[#2ea043] text-white text-xs font-black rounded transition-all disabled:bg-[#30363d] disabled:text-gray-500 disabled:cursor-not-allowed">
                                <i className="fas fa-paper-plane mr-2"></i> F8 전송 (반영)
                            </button>
                        </div>

                        <div className="flex-1 flex gap-4 overflow-hidden">
                            <div className="w-1/3 flex flex-col gap-2">
                                <label className="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Input Raw Text</label>
                                <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="flex-1 term-input p-4 rounded resize-none text-[13px] leading-relaxed" placeholder="카톡 시세나 웹 텍스트를 붙여넣으세요..."></textarea>
                                <button onClick={handleStartParsing} className="py-3 bg-[#21262d] hover:bg-[#30363d] text-indigo-400 font-bold text-xs rounded border term-border transition-colors">
                                    <i className="fas fa-bolt mr-2"></i>텍스트 분석 실행
                                </button>
                            </div>
                            <div className="w-2/3 flex flex-col gap-2">
                                <label className="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Parsed Result Preview</label>
                                <div className="flex-1 term-panel rounded overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-xs">
                                        <thead className="sticky top-0 bg-[#0d1117] border-b term-border text-gray-500">
                                            <tr><th className="p-3">분석 품명</th><th className="p-3 text-right">추출 단가</th><th className="p-3 text-center">매칭 상태</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#21262d]">
                                            {parsedItems.length === 0 ? <tr><td colSpan="3" className="p-10 text-center text-gray-600 font-mono">NO DATA PARSED</td></tr> : (
                                                parsedItems.map(item => (
                                                    <tr key={item.id} className="data-row">
                                                        <td className="p-3 font-bold text-[#c9d1d9]">{item.rawName}</td>
                                                        <td className="p-3 text-right font-mono text-[#3fb950]">{item.price.toLocaleString()}원</td>
                                                        <td className="p-3 text-center"><span className="bg-rose-900/30 text-[#f85149] border border-rose-900/50 text-[10px] font-black px-2 py-0.5 rounded">NEW_ITEM</span></td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<ParserApp />);
    </script>
</body>
</html>
