<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIRTHDAY_SYS.exe</title>
  
  <!-- Tailwind CSS (디자인) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (기능) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX 문법 변환기) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 아이콘 컴포넌트 (외부 라이브러리 의존성을 없애기 위해 SVG로 직접 구현)
    const TerminalIcon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
    );
    const CalendarIcon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    );
    const UserPlusIcon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
    );
    const Trash2Icon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
    );
    const SearchIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    );
    const BellIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    );

    function App() {
      // 상태 관리
      const [friends, setFriends] = useState([]);
      const [name, setName] = useState('');
      const [birthdate, setBirthdate] = useState('');
      const [group, setGroup] = useState('');
      const [searchQuery, setSearchQuery] = useState('');

      // 로컬 스토리지에서 데이터 불러오기
      useEffect(() => {
        const savedData = localStorage.getItem('sys_birthday_data');
        if (savedData) {
          try {
            setFriends(JSON.parse(savedData));
          } catch (e) {
            console.error("데이터 파싱 오류", e);
          }
        }
      }, []);

      // 데이터가 변경될 때마다 로컬 스토리지에 저장
      useEffect(() => {
        localStorage.setItem('sys_birthday_data', JSON.stringify(friends));
      }, [friends]);

      // D-Day 계산 함수
      const calculateDDay = (birthDateString) => {
        if (!birthDateString) return null;
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const bDate = new Date(birthDateString);
        let nextBday = new Date(today.getFullYear(), bDate.getMonth(), bDate.getDate());
        
        // 이미 올해 생일이 지났다면 내년으로 설정
        if (today > nextBday) {
          nextBday.setFullYear(today.getFullYear() + 1);
        }
        
        const diffTime = nextBday - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        return diffDays;
      };

      // 나이 계산 함수
      const calculateAge = (birthDateString) => {
        if (!birthDateString) return 0;
        const today = new Date();
        const birthDate = new Date(birthDateString);
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }
        return age;
      };

      // 친구 추가 함수
      const handleAddFriend = (e) => {
        e.preventDefault();
        if (!name || !birthdate) return;

        const newFriend = {
          id: Date.now().toString(),
          name,
          birthdate,
          group: group || '미지정',
          createdAt: new Date().toISOString()
        };

        setFriends([...friends, newFriend]);
        
        // 입력폼 초기화
        setName('');
        setBirthdate('');
        setGroup('');
      };

      // 친구 삭제 함수
      const handleDelete = (id) => {
        if(window.confirm('해당 데이터를 시스템에서 삭제하시겠습니까?')) {
          setFriends(friends.filter(f => f.id !== id));
        }
      };

      // 정렬 및 필터링된 데이터
      const processedFriends = friends
        .filter(f => f.name.includes(searchQuery) || f.group.includes(searchQuery))
        .map(f => ({
          ...f,
          dDay: calculateDDay(f.birthdate),
          age: calculateAge(f.birthdate)
        }))
        .sort((a, b) => a.dDay - b.dDay);

      // 다가오는 생일 (D-30 이내)
      const upcomingBirthdays = processedFriends.filter(f => f.dDay <= 30);

      return (
        <div className="min-h-screen bg-black text-green-500 font-mono p-4 md:p-8 selection:bg-green-500 selection:text-black">
          <div className="max-w-5xl mx-auto space-y-6">
            
            {/* Header */}
            <header className="border-b-2 border-green-500/50 pb-4 flex items-end justify-between">
              <div>
                <h1 className="text-2xl md:text-4xl font-bold tracking-tighter flex items-center gap-3">
                  <TerminalIcon size={36} />
                  BIRTHDAY_SYS.exe
                </h1>
                <p className="text-green-600 mt-2 text-sm">v1.0.0 | STATUS: ONLINE | RECORDS: {friends.length}</p>
              </div>
              <div className="hidden md:block text-right text-xs text-green-700">
                {new Date().toISOString().split('T')[0]} <br/>
                SYSTEM_READY...
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* Left Column: Input Form & Dashboard */}
              <div className="space-y-6">
                
                {/* Input Form */}
                <section className="border border-green-500/30 p-4 bg-gray-900/30 relative">
                  <div className="absolute top-0 left-2 -translate-y-1/2 bg-black px-2 text-sm font-bold text-green-400">
                    [ REGISTRATION ]
                  </div>
                  <form onSubmit={handleAddFriend} className="space-y-4 mt-2">
                    <div className="space-y-1">
                      <label className="text-xs text-green-600 block">NAME</label>
                      <input 
                        type="text" 
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        className="w-full bg-black border border-green-800 focus:border-green-400 text-green-400 p-2 outline-none transition-colors"
                        placeholder="이름 입력_"
                        required
                      />
                    </div>
                    
                    <div className="space-y-1">
                      <label className="text-xs text-green-600 block">DATE OF BIRTH</label>
                      <input 
                        type="date" 
                        value={birthdate}
                        onChange={(e) => setBirthdate(e.target.value)}
                        className="w-full bg-black border border-green-800 focus:border-green-400 text-green-400 p-2 outline-none transition-colors"
                        required
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs text-green-600 block">GROUP / TAG</label>
                      <input 
                        type="text" 
                        value={group}
                        onChange={(e) => setGroup(e.target.value)}
                        className="w-full bg-black border border-green-800 focus:border-green-400 text-green-400 p-2 outline-none transition-colors"
                        placeholder="ex) 고등학교, 회사_"
                      />
                    </div>

                    <button 
                      type="submit" 
                      className="w-full border border-green-500 hover:bg-green-500 hover:text-black transition-colors p-2 flex justify-center items-center gap-2 font-bold mt-2"
                    >
                      <UserPlusIcon size={18} />
                      EXECUTE_ADD
                    </button>
                  </form>
                </section>

                {/* Upcoming Dashboard */}
                <section className="border border-green-500/30 p-4 bg-gray-900/30 relative">
                   <div className="absolute top-0 left-2 -translate-y-1/2 bg-black px-2 text-sm font-bold text-yellow-500 animate-pulse">
                    [ UPCOMING (D-30) ]
                  </div>
                  <div className="mt-2 space-y-3">
                    {upcomingBirthdays.length === 0 ? (
                      <p className="text-green-700 text-sm italic">NO UPCOMING EVENTS DETECTED.</p>
                    ) : (
                      upcomingBirthdays.map(friend => (
                        <div key={`up-${friend.id}`} className="flex justify-between items-center border-l-2 border-yellow-500 pl-3 py-1">
                          <div>
                            <span className="font-bold text-yellow-400">{friend.name}</span>
                            <span className="text-xs text-green-600 ml-2">({friend.age + 1}세 예정)</span>
                          </div>
                          <div className="font-bold text-red-400 flex items-center gap-1">
                            <BellIcon size={14} className="animate-bounce" />
                            {friend.dDay === 0 ? 'D-DAY!' : `D-${friend.dDay}`}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </section>

              </div>

              {/* Right Column: Data Grid */}
              <div className="lg:col-span-2 space-y-4">
                
                {/* Search Bar */}
                <div className="flex items-center gap-2 border border-green-800 bg-black p-2">
                  <SearchIcon size={18} className="text-green-600" />
                  <input 
                    type="text"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="검색어 입력 (이름 또는 그룹)..."
                    className="bg-transparent w-full outline-none text-green-400 placeholder:text-green-800"
                  />
                </div>

                {/* Data Table */}
                <div className="border border-green-500/30 overflow-x-auto bg-gray-900/10">
                  <table className="w-full text-left border-collapse min-w-[500px]">
                    <thead>
                      <tr className="border-b border-green-500/50 text-green-600 text-sm">
                        <th className="p-3 font-normal">NAME</th>
                        <th className="p-3 font-normal">BIRTHDATE</th>
                        <th className="p-3 font-normal">AGE</th>
                        <th className="p-3 font-normal">GROUP</th>
                        <th className="p-3 font-normal text-right">D-DAY</th>
                        <th className="p-3 font-normal text-center">CMD</th>
                      </tr>
                    </thead>
                    <tbody>
                      {processedFriends.length === 0 ? (
                        <tr>
                          <td colSpan="6" className="p-8 text-center text-green-700 italic border-t border-green-800/30">
                            NO_DATA_FOUND
                          </td>
                        </tr>
                      ) : (
                        processedFriends.map(friend => (
                          <tr 
                            key={friend.id} 
                            className={`border-b border-green-800/30 hover:bg-green-900/20 transition-colors ${friend.dDay === 0 ? 'bg-yellow-900/20' : ''}`}
                          >
                            <td className="p-3 font-bold">{friend.name}</td>
                            <td className="p-3 text-green-600 flex items-center gap-2">
                              <CalendarIcon size={14} />
                              {friend.birthdate}
                            </td>
                            <td className="p-3">{friend.age}세</td>
                            <td className="p-3 text-green-600">[{friend.group}]</td>
                            <td className="p-3 text-right font-bold">
                               {friend.dDay === 0 ? (
                                 <span className="text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">D-DAY</span>
                               ) : (
                                 `D-${friend.dDay}`
                               )}
                            </td>
                            <td className="p-3 text-center">
                              <button 
                                onClick={() => handleDelete(friend.id)}
                                className="text-red-500 hover:text-red-300 hover:bg-red-900/30 p-1 rounded transition-colors"
                                title="데이터 삭제"
                              >
                                <Trash2Icon size={16} />
                              </button>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>

              </div>
            </div>
            
          </div>
        </div>
      );
    }

    // React 앱을 화면에 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
