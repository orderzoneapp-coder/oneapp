<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate" />
  <title>ONEAPP MerchOps - HistoryViewer [v1.1.0 RuntimeOpenFix]</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f8fafc;color:#1e293b;margin:0;overflow:hidden}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  </style>
</head>
<body>
  <div id="app" class="h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-slate-900 text-emerald-400 flex items-center justify-center"><i class="fas fa-clock-rotate-left"></i></div>
        <div>
          <h1 class="text-xl font-black tracking-tight">ONEAPP HistoryViewer</h1>
          <p class="text-xs text-slate-500 font-bold">v1.1.0 RuntimeOpenFix · MerchOps 변경 이력 조회</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="btnReload" class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-black"><i class="fas fa-rotate mr-2"></i>새로고침</button>
        <button id="btnJson" class="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-black"><i class="fas fa-download mr-2"></i>JSON</button>
        <button id="btnCsv" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-black"><i class="fas fa-file-csv mr-2"></i>CSV</button>
        <button id="btnBack" class="px-4 py-2 rounded-xl bg-slate-900 hover:bg-slate-800 text-white text-sm font-black"><i class="fas fa-arrow-left mr-2"></i>MerchOps</button>
      </div>
    </header>

    <section class="px-6 py-4 bg-slate-50 border-b border-slate-200 shrink-0">
      <div class="grid grid-cols-4 gap-3 mb-4">
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><div class="text-xs font-black text-slate-400">전체 이력</div><div id="statTotal" class="text-2xl font-black mt-1">0</div></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><div class="text-xs font-black text-slate-400">가격 변경</div><div id="statPrice" class="text-2xl font-black text-rose-600 mt-1">0</div></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><div class="text-xs font-black text-slate-400">오늘 기록</div><div id="statToday" class="text-2xl font-black text-emerald-600 mt-1">0</div></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><div class="text-xs font-black text-slate-400">소스</div><div id="statSource" class="text-lg font-black text-indigo-600 mt-2 truncate">-</div></div>
      </div>
      <div class="flex flex-wrap gap-2 items-center">
        <div class="relative flex-1 min-w-[320px]">
          <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
          <input id="searchInput" class="w-full h-10 pl-9 pr-3 rounded-xl border border-slate-300 outline-none focus:border-indigo-500 text-sm font-bold" placeholder="품목코드 / 품명 / 경로 / 액션 / 변경값 검색" />
        </div>
        <select id="sourceFilter" class="h-10 px-3 rounded-xl border border-slate-300 bg-white text-sm font-bold"><option value="">전체 소스</option></select>
        <select id="actionFilter" class="h-10 px-3 rounded-xl border border-slate-300 bg-white text-sm font-bold"><option value="">전체 액션</option></select>
        <select id="sortMode" class="h-10 px-3 rounded-xl border border-slate-300 bg-white text-sm font-bold"><option value="newest">최신순</option><option value="oldest">오래된순</option><option value="code">코드순</option><option value="diff">변동폭순</option></select>
      </div>
    </section>

    <main class="flex-1 overflow-auto p-6">
      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead class="sticky top-0 bg-slate-100 border-b border-slate-200 text-xs text-slate-500 uppercase z-10">
            <tr>
              <th class="px-3 py-3 w-40">시간</th>
              <th class="px-3 py-3 w-28">소스</th>
              <th class="px-3 py-3 w-28">액션</th>
              <th class="px-3 py-3 w-28">코드</th>
              <th class="px-3 py-3">품명/규격</th>
              <th class="px-3 py-3 w-44">경로</th>
              <th class="px-3 py-3 w-36 text-right">이전값</th>
              <th class="px-3 py-3 w-36 text-right">변경값</th>
              <th class="px-3 py-3 w-28 text-right">차이</th>
            </tr>
          </thead>
          <tbody id="historyTbody" class="divide-y divide-slate-100"></tbody>
        </table>
        <div id="emptyBox" class="hidden p-16 text-center text-slate-400 font-black"><i class="fas fa-box-open text-4xl mb-3 block"></i>표시할 히스토리가 없습니다.</div>
      </div>
    </main>
  </div>

<script>
(function(){
  'use strict';
  const HISTORY_KEY='merchHistory_v870';
  const $=id=>document.getElementById(id);
  const safeStr=v=>v===undefined||v===null?'':String(v);
  const parseNum=v=>{const n=Number(String(v??'').replace(/,/g,'').replace(/[^\d.-]/g,''));return Number.isFinite(n)?n:0;};
  const fmtNum=v=>{const n=parseNum(v);return n===0&&String(v??'').trim()===''?'':n.toLocaleString('ko-KR');};
  const escapeHtml=s=>safeStr(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  let rawLogs=[];
  let normalized=[];

  function readHistory(){
    try{
      const raw=localStorage.getItem(HISTORY_KEY);
      if(!raw||raw==='undefined'||raw==='null') return [];
      const parsed=JSON.parse(raw);
      if(Array.isArray(parsed)) return parsed;
      if(parsed&&Array.isArray(parsed.logs)) return parsed.logs;
      if(parsed&&typeof parsed==='object') return Object.values(parsed).flat().filter(Boolean);
      return [];
    }catch(e){ console.error('[HistoryViewer] parse error',e); return []; }
  }
  function norm(log,idx){
    const oldVal=log.oldVal??log.beforeVal??log.oldValue??log.prev??'';
    const newVal=log.newVal??log.afterVal??log.newValue??log.next??'';
    const diffRaw=log.diff!==undefined?log.diff:(String(oldVal).match(/\d/)||String(newVal).match(/\d/)?parseNum(newVal)-parseNum(oldVal):'');
    const ts=log.timestampISO||log.createdAtISO||log.savedAtISO||log.timestamp||log.time||log.date||'';
    return {
      id:log.id||String(idx),
      timestamp:ts,
      source:safeStr(log.source||log.origin||log.sourceLabel||'unknown'),
      action:safeStr(log.actionType||log.action||log.applyMode||'change'),
      code:safeStr(log.code||log.코드||log.productCode||''),
      name:safeStr(log.name||log.품명||log.productName||''),
      spec:safeStr(log.spec||log.규격||''),
      path:safeStr(log.path||log.route||log.field||log.column||''),
      oldVal, newVal, diff:diffRaw,
      raw:log
    };
  }
  function fillFilters(){
    const src=$('sourceFilter'), act=$('actionFilter');
    const curS=src.value, curA=act.value;
    const sources=[...new Set(normalized.map(x=>x.source).filter(Boolean))].sort();
    const actions=[...new Set(normalized.map(x=>x.action).filter(Boolean))].sort();
    src.innerHTML='<option value="">전체 소스</option>'+sources.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    act.innerHTML='<option value="">전체 액션</option>'+actions.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    src.value=curS; act.value=curA;
  }
  function formatTime(v){
    if(!v) return '-';
    const d=new Date(v);
    if(!Number.isNaN(d.getTime())) return d.toLocaleString('ko-KR');
    return safeStr(v);
  }
  function isToday(v){const d=new Date(v); if(Number.isNaN(d.getTime())) return false; const n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
  function apply(){
    const q=$('searchInput').value.trim().toLowerCase();
    const src=$('sourceFilter').value; const act=$('actionFilter').value; const sort=$('sortMode').value;
    let rows=normalized.filter(x=>{
      if(src&&x.source!==src) return false;
      if(act&&x.action!==act) return false;
      if(q){
        const hay=[x.timestamp,x.source,x.action,x.code,x.name,x.spec,x.path,x.oldVal,x.newVal,x.diff].join(' ').toLowerCase();
        if(!q.split(/\s+/).every(t=>hay.includes(t))) return false;
      }
      return true;
    });
    rows.sort((a,b)=>{
      if(sort==='oldest') return new Date(a.timestamp||0)-new Date(b.timestamp||0);
      if(sort==='code') return a.code.localeCompare(b.code,'ko')||a.name.localeCompare(b.name,'ko');
      if(sort==='diff') return Math.abs(parseNum(b.diff))-Math.abs(parseNum(a.diff));
      return new Date(b.timestamp||0)-new Date(a.timestamp||0);
    });
    render(rows);
  }
  function render(rows){
    $('historyTbody').innerHTML=rows.map(x=>`<tr class="hover:bg-slate-50">
      <td class="px-3 py-2 text-xs text-slate-500">${escapeHtml(formatTime(x.timestamp))}</td>
      <td class="px-3 py-2"><span class="px-2 py-1 rounded-lg bg-slate-100 text-slate-600 text-xs font-black">${escapeHtml(x.source)}</span></td>
      <td class="px-3 py-2 text-xs font-black text-indigo-700">${escapeHtml(x.action)}</td>
      <td class="px-3 py-2 mono text-xs text-slate-500">${escapeHtml(x.code)}</td>
      <td class="px-3 py-2 font-bold">${escapeHtml(x.name)} <span class="text-slate-400 font-normal text-xs">${x.spec?`(${escapeHtml(x.spec)})`:''}</span></td>
      <td class="px-3 py-2 text-xs text-slate-500 max-w-[240px] truncate">${escapeHtml(x.path)}</td>
      <td class="px-3 py-2 text-right text-slate-500">${escapeHtml(safeStr(x.oldVal))}</td>
      <td class="px-3 py-2 text-right font-black text-slate-800">${escapeHtml(safeStr(x.newVal))}</td>
      <td class="px-3 py-2 text-right font-black ${parseNum(x.diff)>0?'text-rose-600':parseNum(x.diff)<0?'text-blue-600':'text-slate-400'}">${escapeHtml(fmtNum(x.diff))}</td>
    </tr>`).join('');
    $('emptyBox').classList.toggle('hidden', rows.length>0);
  }
  function refresh(){
    rawLogs=readHistory();
    normalized=rawLogs.map(norm);
    fillFilters();
    $('statTotal').textContent=normalized.length.toLocaleString('ko-KR');
    $('statPrice').textContent=normalized.filter(x=>/(가격|단가|입고가|출고가|행사가|price)/i.test([x.action,x.path].join(' '))).length.toLocaleString('ko-KR');
    $('statToday').textContent=normalized.filter(x=>isToday(x.timestamp)).length.toLocaleString('ko-KR');
    $('statSource').textContent=([...new Set(normalized.map(x=>x.source).filter(Boolean))].slice(0,3).join(', ') || '-');
    apply();
  }
  function download(name,content,type){const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500);}
  function toCsv(rows){
    const cols=['timestamp','source','action','code','name','spec','path','oldVal','newVal','diff'];
    return [cols.join(','),...rows.map(r=>cols.map(c=>'"'+safeStr(r[c]).replace(/"/g,'""')+'"').join(','))].join('\n');
  }
  function navigateBack(){
    try{const ref=document.referrer||''; if(ref&&/MerchOps(?:\.html)?/i.test(ref)&&history.length>1){history.back();return;}}catch(e){}
    try{location.href=(location.origin&&location.origin.includes('oneapp.orderz.co.kr'))?location.origin+'/MerchOps.html':'MerchOps.html';}catch(e){location.href='MerchOps.html';}
  }
  $('btnReload').onclick=refresh;
  $('btnJson').onclick=()=>download('MerchOps_History_'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(rawLogs,null,2),'application/json');
  $('btnCsv').onclick=()=>download('MerchOps_History_'+new Date().toISOString().slice(0,10)+'.csv','\ufeff'+toCsv(normalized),'text/csv;charset=utf-8');
  $('btnBack').onclick=navigateBack;
  ['searchInput','sourceFilter','actionFilter','sortMode'].forEach(id=>$(id).addEventListener('input',apply));
  ['sourceFilter','actionFilter','sortMode'].forEach(id=>$(id).addEventListener('change',apply));
  refresh();
})();
</script>
</body>
</html>
