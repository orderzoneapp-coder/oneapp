<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEAPP MerchOps - 시스템 감사 로그(History)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const injectMockDataForPreview = () => {
            if (!localStorage.getItem('merchHistory_v870') || JSON.parse(localStorage.getItem('merchHistory_v870')).length === 0) {
                const mockLogs = [
                    { id: '1', timestamp: new Date().toLocaleString('ko-KR'), code: '10001001', name: '냉동 흰다리새우', spec: '1.8kg', field: '입고가', oldVal: '18000', newVal: '19500', diff: 1500 },
                    { id: '2', timestamp: new Date(Date.now() - 3600000).toLocaleString('ko-KR'), code: 'SYSTEM', name: '[견적서 그룹 생성] 주말 VIP 납품단가', spec: '', field: '견적서', oldVal: '-', newVal: '142개 상품 추가됨', diff: 0 },
                    { id: '3', timestamp: new Date(Date.now() - 7200000).toLocaleString('ko-KR'), code: '20003015', name: '청정원 진간장', spec: '15kg', field: '출고가', oldVal: '45000', newVal: '42000', diff: -3000 }
                ];
                localStorage.setItem('merchHistory_v870', JSON.stringify(mockLogs));
            }
        };

        const HistoryApp = () => {
            const [logs, setLogs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');

            // 로컬 스토리지에서 히스토리 데이터 불러오기 (실시간 감지 포함)
            const loadLogs = () => {
                try {
                    injectMockDataForPreview(); // 미리보기용 임시 코드
                    const savedLogs = JSON.parse(localStorage.getItem('merchHistory_v870')) || [];
                    setLogs(savedLogs);
                } catch(e) { console.error(e); }
            };

            useEffect(() => {
                loadLogs();
                // 메인 앱에서 F8로 새로운 로그가 저장되면 즉시 화면 갱신
                const handleStorageChange = (e) => {
                    if (e.key === 'merchHistory_v870') loadLogs();
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const filteredLogs = useMemo(() => {
                if (!searchTerm.trim()) return logs;
                const keyword = searchTerm.toLowerCase();
                return logs.filter(log => 
                    (log.name && log.name.toLowerCase().includes(keyword)) ||
                    (log.code && log.code.toLowerCase().includes(keyword)) ||
                    (log.field && log.field.toLowerCase().includes(keyword))
                );
            }, [logs, searchTerm]);

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 fade-in">
                    {/* 왼쪽 사이드바 */}
                    <div className="w-[260px] bg-[#0f172a] flex flex-col text-slate-300 shadow-xl z-10 shrink-0 h-full">
                        <div className="p-6 border-b border-slate-800 bg-[#0b1120] shrink-0">
                            <h1 className="text-xl font-black text-amber-400 tracking-tight flex items-center">
                                <i className="fas fa-history mr-3"></i>로그 뷰어
                            </h1>
                            <p className="text-[11px] text-slate-500 mt-2 font-bold uppercase tracking-widest">Audit & History</p>
                        </div>
                        <div className="flex flex-col py-4 gap-1 px-3 flex-1">
                            <div className="px-4 py-3.5 rounded-xl text-left text-[13px] font-bold bg-amber-600 text-white shadow-md cursor-default">
                                <i className="fas fa-list-alt w-6 text-center mr-1"></i> 전체 작업 내역
                            </div>
                        </div>
                        <div className="p-6 border-t border-slate-800 shrink-0">
                            <button onClick={() => window.close()} className="w-full py-3 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 hover:text-white text-[13px] font-bold transition-colors">
                                <i className="fas fa-arrow-left mr-2"></i> 메인으로 (닫기)
                            </button>
                        </div>
                    </div>

                    {/* 메인 컨텐츠 영역 */}
                    <div className="flex-1 flex flex-col p-8 overflow-hidden relative">
                        <div className="flex justify-between items-end mb-6 shrink-0">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">최근 작업 및 동기화 내역</h2>
                                <p className="text-[13px] font-bold text-slate-500">메인 앱에서 [F8]로 단가를 저장하거나 카탈로그를 조작한 이력입니다. (최대 2,000건 자동 보관)</p>
                            </div>
                            <div className="relative w-[300px]">
                                <input 
                                    type="text" 
                                    placeholder="품목명, 코드, 변동항목 검색..." 
                                    value={searchTerm} 
                                    onChange={e=>setSearchTerm(e.target.value)} 
                                    className="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-[13px] font-bold outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-200 shadow-sm transition-all" 
                                />
                                <i className="fas fa-search absolute right-3 top-3.5 text-slate-400 text-[13px]"></i>
                            </div>
                        </div>

                        {}
                        <div className="flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col relative">
                            <div className="flex-1 overflow-auto custom-scrollbar p-1">
                                {filteredLogs.length > 0 ? (
                                    <table className="w-full text-left text-[13px] whitespace-nowrap">
                                        <thead className="bg-slate-50 border-b border-slate-200 sticky top-0 shadow-sm z-10 text-slate-600 font-bold">
                                            <tr>
                                                <th className="px-4 py-3.5 text-center w-40">작업일시</th>
                                                <th className="px-4 py-3.5 w-28">구분/코드</th>
                                                <th className="px-4 py-3.5 w-full">품명 (내용)</th>
                                                <th className="px-4 py-3.5 text-center w-24">변경항목</th>
                                                <th className="px-4 py-3.5 text-right w-24">기존값</th>
                                                <th className="px-4 py-3.5 text-right w-24">변경값</th>
                                                <th className="px-4 py-3.5 text-right w-24">차액</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredLogs.map((log, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors text-slate-700">
                                                    <td className="px-4 py-2.5 text-center text-slate-500 font-mono text-[11px]">{log.timestamp}</td>
                                                    <td className="px-4 py-2.5 font-bold text-[11px]">
                                                        {log.code === 'SYSTEM' ? <span className="text-amber-500">시스템 연산</span> : <span className="font-mono text-slate-500">{log.code}</span>}
                                                    </td>
                                                    <td className="px-4 py-2.5 font-bold truncate max-w-[300px]">
                                                        {log.name} <span className="text-[11px] text-slate-400 font-normal ml-1">{log.spec && `(${log.spec})`}</span>
                                                    </td>
                                                    <td className="px-4 py-2.5 text-center">
                                                        <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[11px] font-black border border-slate-200">{log.field}</span>
                                                    </td>
                                                    <td className="px-4 py-2.5 text-right text-slate-400 line-through">
                                                        {log.oldVal !== undefined && log.oldVal !== null && log.oldVal !== '' ? (isNaN(log.oldVal) ? log.oldVal : Number(log.oldVal).toLocaleString()) : '-'}
                                                    </td>
                                                    <td className="px-4 py-2.5 text-right font-black text-amber-600">
                                                        {log.newVal !== undefined && log.newVal !== null && log.newVal !== '' ? (isNaN(log.newVal) ? log.newVal : Number(log.newVal).toLocaleString()) : '-'}
                                                    </td>
                                                    <td className="px-4 py-2.5 text-right font-bold text-[11px]">
                                                        {log.diff > 0 && <span className="text-rose-500">+{log.diff.toLocaleString()}</span>}
                                                        {log.diff < 0 && <span className="text-blue-500">{log.diff.toLocaleString()}</span>}
                                                        {(!log.diff || log.diff === 0) && <span className="text-slate-300">-</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 font-bold">
                                        <i className="fas fa-folder-open text-5xl mb-4 block text-slate-200"></i>
                                        기록된 최신 작업 내역이 없거나 검색 결과가 없습니다.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HistoryApp />);
    </script>
</body>
</html>
