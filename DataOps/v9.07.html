function fmt(n){return Math.round(parseNumber(n)).toLocaleString('ko-KR')}function nowStr(){const d=new Date(),p=v=>String(v).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}function esc(s){return safeStr(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function cleanKey(s){return safeStr(s).replace(/\s/g,'').toLowerCase()}function splitKeywords(s){return safeStr(s).split(/[,\n]/).map(cleanKey).filter(Boolean)}
function getKwList(n){return splitKeywords(state.mappings[n]||CONFIG.defaultMappings[n]||'')}function getByKeywords(row,names){const keys=Object.keys(row),clean=keys.map(cleanKey),kwList=(Array.isArray(names)?names:[names]).flatMap(getKwList);for(const kw of kwList){const i=clean.findIndex(k=>k===kw);if(i>=0&&safeStr(row[keys[i]])!=='')return row[keys[i]]}for(const kw of kwList){const i=clean.findIndex(k=>k.includes(kw)||kw.includes(k));if(i>=0&&safeStr(row[keys[i]])!=='')return row[keys[i]]}return ''}function hasColumn(row,names){const keys=Object.keys(row).map(cleanKey),kwList=(Array.isArray(names)?names:[names]).flatMap(getKwList);return kwList.some(kw=>keys.some(k=>k===kw||k.includes(kw)))}

function makeRow(n,role,fileType,sheet,fileName){const r={rowId:`${role}|${fileName}|${sheet}|${n.raw.__rowNumber}|${Math.random().toString(36).slice(2,7)}`,productKey:productKey(n.code,n.displayName),batchKey:'',groupKey:groupKey(n),uploadRole:role,fileType,sourceFileName:fileName,sourceSheetName:sheet,sourceRowNumber:n.raw.__rowNumber,code:n.code,name:n.name,spec:n.spec,displayName:n.displayName,categoryCode:cat(n.code),categoryName:catName(n.code),unit:n.unit,unitType:n.unitType,vendor:n.vendor,lotVendor:n.lotVendor||'',date:n.date,baseQty:0,inQty:0,outQty:0,offsetInQty:0,offsetOutQty:0,finalQty:0,price:n.price,salesAmount:0,cogsAmount:0,stockAmount:0,systemQty:0,diffQty:0,memo:n.memo,raw:n.raw,review:{}};if(role==='BASE'){r.baseQty=fileType==='LEDGER'?n.finalQty:(n.baseQty||n.finalQty||n.qty);r.finalQty=r.baseQty}else if(role==='IN'){r.inQty=n.inQty||n.qty}else if(role==='OUT'){r.outQty=n.outQty||n.qty}else if(role==='COUNT_OR_RESTORE'){if(fileType==='LEDGER'){r.baseQty=n.baseQty;r.inQty=n.inQty;r.outQty=n.outQty;r.finalQty=n.finalQty}else r.finalQty=n.finalQty||n.qty}r.batchKey=batchKey(r);return recalc(r)}

function resetFilters(){state.filters={search:'',category:'ALL',favoriteOnly:false,unit:{BOX:true,EA:true,SPLIT:false},issueOnly:false};state.sortMode='DEFAULT';state.issueNav={currentKey:null,history:[],typeFilter:'ALL'}}function issueKey(row,type){return `${row.rowId}::${type}`}function isIssueVisited(row,type){return !!(row.issueVisited&&row.issueVisited[type])}function issueRequests(type='ALL',onlyPending=false){const rows=visibleRows();let reqs=[];rows.forEach(row=>row.issues.forEach(issue=>{if(type!=='ALL'&&issue.type!==type)return;if(onlyPending&&isIssueVisited(row,issue.type))return;reqs.push({row,issue,key:issueKey(row,issue.type)})}));return reqs}function stats(){const all=state.rows.flatMap(r=>r.issues.map(i=>({row:r,issue:i,key:issueKey(r,i.type),visited:isIssueVisited(r,i.type)})));const pending=all.filter(x=>!x.visited),by=t=>pending.filter(x=>x.issue.type===t).length;return{total:pending.length,allTotal:all.length,finalNegative:by('finalNegative'),systemNegative:by('systemNegative'),priceZero:by('priceZero'),diff:by('diff'),duplicate:by('duplicate'),lotMismatch:by('lotMismatch'),noPurchaseVendor:by('noPurchaseVendor'),adminModified:state.rows.filter(r=>r.adminModified).length}}function visibleRows(){const favs=splitKeywords(state.favoriteVendors);let rows=state.rows.filter(r=>{const q=cleanKey(state.filters.search);if(q&&!cleanKey(`${r.code} ${r.displayName} ${r.spec} ${r.vendor} ${r.memo}`).includes(q))return false;if(state.filters.category!=='ALL'&&r.categoryCode!==state.filters.category)return false;if(state.filters.favoriteOnly){const v=cleanKey(r.vendor);if(!favs.some(f=>v.includes(f)||f.includes(v)))return false}const problem=r.issues.some(i=>['finalNegative','systemNegative','diff'].includes(i.type));if(r.unitType==='SPLIT'&&!state.filters.unit.SPLIT&&!problem)return false;if(r.unitType!=='SPLIT'&&!state.filters.unit[r.unitType])return false;if(state.filters.issueOnly&&!r.issues.length)return false;return true});if(state.sortMode==='CATEGORY')r function updateRow(rowId,field,value){const r=state.rows.find(x=>x.rowId===rowId);if(!r)return;const before={baseQty:r.baseQty,inQty:r.inQty,outQty:r.outQty,finalQty:r.finalQty,price:r.price,systemQty:r.systemQty,diffQty:r.diffQty};r[field]=parseNumber(value);let memo='직접 입력';if(['baseQty','inQty','outQty'].includes(field)){const nextSystem=parseNumber(r.baseQty)+parseNumber(r.inQty)+parseNumber(r.offsetInQty)-parseNumber(r.outQty)-parseNumber(r.offsetOutQty);r.finalQty=nextSystem;memo='기초/입고/출고 수정: 잔량 자동반영'}else if(field==='finalQty'){memo='잔량 직접수정: 오차 표시'}else if(field==='price'){memo='입고가 직접수정'}r.adminModified=true;r.modifiedFields=Array.from(new Set([...(r.modifiedFields||[]),field]));recalc(r);state.commands.push({commandId:`CMD-${Date.now()}`,commandType:field==='price'?'EDIT_PRICE':'EDIT_STOCK_FIELD',targetRowIds:[rowId],before,after:{baseQty:r.baseQty,inQty:r.inQty,outQty:r.outQty,finalQty:r.finalQty,price:r.price,systemQty:r.systemQty,diffQty:r.diffQty,editedField:field},executedBy:'USER',executedAt:nowStr(),memo});render();setTimeout(()=>focusCell(rowId,field),0)}function markIssueVisited(key){const [rowId,type]=key.split('::');const r=state.rows.find(x=>x.rowId===rowId);if(!r)return;r.issueVisited=r.issueVisited||{};r.issueVisited[type]=true}function navigateIssue(direction=1,type=null){const t=type||state.issueNav.typeFilter||'ALL';if(type)state.issueNav.typeFilter=type;if(direction<0){const prev=state.issueNav.history.pop();if(prev){state.issueNav.currentKey=prev.key;render();setTimeout(()=>focusCell(prev.row.rowId,prev.issue.target==='price'?'price':prev.issue.target==='row'?'row':'finalQty'),30);return}}if(state.issueNav.currentKey){markIssueVisited(state.issueNav.currentKey)}let reqs=issueRequests(t,true);if(!reqs.length&&t!=='ALL')reqs=issueRequests('ALL',true);if(!reqs.length){render();return}const current=state.issueNav.currentKey;let idx=reqs.findIndex(x=>x.key===current);let next=reqs[idx+1]||reqs[0];if(current){const old=issueRequests('ALL',false).find(x=>x.key===current);if(old)state.issueNav.history.push(old)}state.issueNav.currentKey=next.key;render();setTimeout(()=>focusCell(next.row.rowId,next.issue.target==='price'?'price':next.issue.target==='row'?'row':'finalQty'),40)}function jumpToIssue(type){state.filters.issueOnly=true;state.filters.category='ALL';state.filters.search='';state.issueNav.typeFilter=type==='all'?'ALL':type;state.issueNav.currentKey=null;render();setTimeout(()=>navigateIssue(1,state.issueNav.typeFilter),30)}function focusCell(rowId,field){const tr=document.querySelector(`[data-row-id="${CSS.escape(rowId)}"]`);if(!tr)return;tr.scrollIntoView({behavior:'smooth',block:'center'});tr.classList.add('issue-ring');setTimeout(()=>tr.classList.remove('issue-ring'),1300);const input=['baseQty','inQty','outQty','finalQty','price'].includes(field)?tr.querySelector(`[data-field="${field}"]`):null;if(input){input.focus();input.select()}}
function toggleSelect(rowId,checked){if(checked)state.selectedRowIds.add(rowId);else state.selectedRowIds.delete(rowId);render()}function selectedRowsInOrder(){return Array.from(state.selectedRowIds).map(id=>state.rows.find(r=>r.rowId===id)).filter(Boolean)}function offsetableRows(){return selectedRowsInOrder()}function executeOffsetCommand(){const rows=offsetableRows();if(rows.length!==2){alert('상계처리는 정확히 2개 행을 선택한 뒤 실행하세요.');return}const before=rows.map(r=>({rowId:r.rowId,displayName:r.displayName,baseQty:r.baseQty,inQty:r.inQty,outQty:r.outQty,offsetInQty:r.offsetInQty,offsetOutQty:r.offsetOutQty,finalQty:r.finalQty,systemQty:r.systemQty,diffQty:r.diffQty,price:r.price}));const neg=rows.filter(r=>r.diffQty<0),pos=rows.filter(r=>r.diffQty>0);if(!neg.length&&!pos.length){alert('상계할 오차가 없습니다.');return}rows.forEach(r=>{if(r.diffQty<0)r.offsetOutQty+=Math.abs(r.diffQty);else if(r.diffQty>0)r.offsetInQty+=r.diffQty;r.adminModified=true;r.modifiedFields=Array.from(new Set([...(r.modifiedFields||[]),'offset']));recalc(r)});const after=rows.map(r=>({rowId:r.rowId,displayName:r.displayName,offsetInQty:r.offsetInQty,offsetOutQty:r.offsetOutQty,systemQty:r.systemQty,diffQty:r.diffQty}));state.commands.push({commandId:`CMD-${Date.now()}`,commandType:'OFFSET_STOCK',targetRowIds:rows.map(r=>r.rowId),before,after,executedBy:'USER',executedAt:nowStr(),memo:'스페이스바 상계처리'});state.selectedRowIds=new Set();render()}function executeSalesMoveCommand(){const rows=selectedRowsInOrder();if(rows.length!==2){alert('출고이동은 정확히 2개 행을 선택한 뒤 실행하세요.\n첫 번째 선택행의 출고를 두 번째 선택행으로 이동합니다.');return}const [source,target]=rows;const maxQty=Math.max(0,parseNumber(source.outQty));if(maxQty<=0){alert('첫 번째 선택행에 이동할 출고 수량이 없습니다.');return}const input=prompt(`출고 이동 수량을 입력하세요.\n\n출발: ${source.displayName} / 현재 출고 ${fmt(source.outQty)}\n도착: ${target.displayName} / 현재 출고 ${fmt(target.outQty)}`,String(maxQty));if(input===null)return;const qty=parseNumber(input);if(qty<=0){alert('이동 수량은 0보다 커야 합니다.');return}if(qty>maxQty){alert('이동 수량이 출발 행의 출고수량보다 큽니다.');return}if(!confirm(`출고 ${fmt(qty)}개를 이동합니다.\n\n${source.displayName} → ${target.displayName}\n\n이 작업은 관리자 명령으로 명령이력에 기록됩니다.`))return;const before=[source,target].map(r=>({rowId:r.rowId,displayName:r.displayName,outQty:r.outQty,systemQty:r.systemQty,diffQty:r.diffQty,finalQty:r.finalQty,price:r.price}));source.outQty=parseNumber(source.outQty)-qty;target.outQty=parseNumber(target.outQty)+qty;source.memo=safeStr(source.memo);target.memo=safeStr(target.memo);const moveMemo=`출고이동:${fmt(qty)} ${source.displayName}→${target.displayName}`;target.memo=target.memo?target.memo+' / '+moveMemo:moveMemo;source.adminModified=true;target.adminModified=true;source.modifiedFields=Array.from(new Set([...(source.modifiedFields||[]),'outQty']));target.modifiedFields=Array.from(new Set([...(target.modifiedFields||[]),'outQty']));recalc(source);recalc(target);const after=[source,target].map(r=>({rowId:r.rowId,displayName:r.displayName,outQty:r.outQty,systemQty:r.systemQty,diffQty:r.diffQty,finalQty:r.finalQty,price:r.price,memo:r.memo}));state.commands.push({commandId:`CMD-${Date.now()}`,commandType:'MOVE_OUT_QTY',targetRowIds:[source.rowId,target.rowId],before,after,executedBy:'USER',executedAt:nowStr(),memo:`출고이동 ${fmt(qty)}개`});state.selectedRowIds=new Set();render()}
function displayIssue(i,row=null){if(row&&isIssueVisited(row,i.type))return '↪'+i.label;return '🚨'+i.label}function roleLabel(r){return{BASE:'기초',IN:'매입',OUT:'매출',COUNT_OR_RESTORE:'실사/마감'}[r]||r}
function exportWorkbook(){const rows=visibleRows(),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['항목','값'],['버전',VERSION],['분석파일',state.analysisTitle],['분석시각',state.analyzedAt],['전체행',state.rows.length],['출력행',rows.length],['주의상태',stats().total],['관리자수정',stats().adminModified]]),'출력요약');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.map(r=>({품목코드:r.code,품명:r.displayName,규격:r.spec,단위:r.unit,구매처:r.vendor,Lot:r.lotVendor||'',일자:r.date,기초수량:r.baseQty,입고수량:r.inQty,출고량:r.outQty,상계입고:r.offsetInQty,상계출고:r.offsetOutQty,계산잔량:r.systemQty,'기말실사(이월수량)':r.finalQty,'매입단가(원가)':r.price,'기말재고액(자산가치)':r.stockAmount,'로스/조정수량':r.diffQty,'이슈/결과':`${r.adminModified?'✏️수정 ':''}${r.issues.map(i=>displayIssue(i,r)).join(', ')}`,수기메모:r.memo}))), '재고수불_마감');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.map(r=>({순번:'',품목코드:r.code,품명:r.displayName,규격:r.spec,수량:r.finalQty}))), '실사양식');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(state.commands.length?state.commands.map(c=>({일시:c.executedAt,명령:c.commandType,대상:c.targetRowIds.join(','),메모:c.memo,변경전:JSON.stringify(c.before),변경후:JSON.stringify(c.after)})):[{일시:'',명령:'',대상:'',메모:'',변경전:'',변경후:''}]), '명령이력');XLSX.writeFile(wb,`DataOps_v9_마감_${nowStr().replace(/[-: ]/g,'')}.xlsx`)}
function printView(){const rows=visibleRows();document.getElementById('printArea').innerHTML=`<div style="font-family:Pretendard,sans-serif;padding:10px"><h2>DataOps v9.00 출력</h2><div style="font-size:12px;margin-bottom:8px">${esc(state.analysisTitle)} / ${esc(state.analyzedAt)}</div><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>${['품명&규격','재고','입고','출고','잔량','입고가','이슈메모'].map(h=>`<th style="border:1px solid #999;padding:4px;background:#eee">${h}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr style="background:${i%5===0?'#f8fafc':'white'}"><td style="border:1px solid #bbb;padding:4px">${esc(r.displayName)}</td><td style="border:1px solid #bbb;padding:4px;text-align:right">${fmt(r.baseQty)}</td><td style="border:1px solid #bbb;padding:4px;text-align:right">${fmt(r.inQty)}</td><td style="border:1px solid #bbb;padding:4px;text-align:right">${fmt(r.outQty)}</td><td style="border:1px solid #bbb;padding:4px;text-align:right">${fmt(r.finalQty)}</td><td style="border:1px solid #bbb;padding:4px;text-align:right">${fmt(r.price)}</td><td style="border:1px solid #bbb;padding:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${esc((r.adminModified?'✏️수정 ':'')+r.issues.map(i=>displayIssue(i,r)).join(' '))} ${esc(r.memo)}</td></tr>`).join('')}</tbody></table></div>`;document.getElementById('printArea').classList.remove('hidden');window.print();setTimeout(()=>document.getElementById('printArea').classList.add('hidden'),1000)}
function card(label,count,cls,type){return`<button ${type?`data-jump-issue="${type}"`:''} class="${cls} border rounded-2xl p-3 text-left shadow-sm"><div class="text-xs text-slate-500">${label}</div><div class="text-2xl font-black">${count}</div></button>`}
function render(){const s=stats(),rows=visibleRows();document.getElementById('app').innerHTML=`<div class="no-print max-w-[1800px] mx-auto p-4 space-y-3"><header class="bg-slate-900 text-white rounded-2xl p-4 shadow flex flex-wrap items-center justify-between gap-3"><div><div class="text-xl font-black">ONEAPP DataOps <span class="text-blue-300">v9.07</span></div><div class="text-xs text-slate-300">${esc(VERSION)}</div></div><div class="text-xs text-right"><div>현재 분석: ${esc(state.analysisTitle)}</div><div>분석 시각: ${esc(state.analyzedAt||'-')}</div></div></header>${renderUpload()}${renderModes()}${renderCards(s)}${renderToolbar()}${renderTable(rows)}${renderSettings()}`;bindEvents()}
function renderUpload(){return`<section class="bg-white rounded-2xl shadow p-4 border"><div class="grid grid-cols-1 md:grid-cols-4 gap-3">${['BASE','IN','OUT','COUNT_OR_RESTORE'].map(r=>`<label class="block border rounded-xl p-3 bg-slate-50"><div class="font-bold text-sm mb-1">${roleLabel(r)} 파일</div><input type="file" accept=".xlsx,.xls,.csv" data-file-role="${r}" class="text-xs w-full"><div class="text-[11px] text-slate-500 mt-1">${state.files[r]?esc(state.files[r].name):'미선택'}</div></label>`).join('')}</div><div class="mt-3 flex flex-wrap gap-2 items-center"><button id="runAnalysis" class="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold">분석 실행</button><button id="resetAll" class="px-4 py-2 rounded-xl bg-slate-200 font-bold">초기화</button><button id="openSettings" class="px-4 py-2 rounded-xl bg-slate-800 text-white font-bold">매핑/기준 설정</button><span class="text-xs text-slate-500">기준: 업로드 위치 &gt; 파일 구조 &gt; 시트명 &gt; 컬럼명</span></div>${state.fileMeta.length?`<div class="mt-3 grid grid-cols-1 md:grid-cols-4 gap-2 text-xs">${state.fileMeta.map(m=>`<div class="bg-slate-100 rounded-lg p-2"><b>${roleLabel(m.role)}</b><br>${esc(m.fileName)}<br>시트:${esc(m.sheetName)} / ${esc(m.fileType)} / ${m.rows}행</div>`).join('')}</div>`:''}</section>`}
function renderModes(){return`<div class="flex gap-2">${[['ledger','수불 확인'],['issues','확인요청'],['export','출력 준비']].map(([m,l])=>`<button data-mode="${m}" class="px-4 py-2 rounded-xl font-bold ${state.activeMode===m?'bg-slate-900 text-white':'bg-white border'}">${l}</button>`).join('')}</div>`}function renderCards(s){return`<section class="grid grid-cols-2 md:grid-cols-6 gap-2">${card('전체행',state.rows.length,'bg-white','')}${card('남은 요청',s.total,'bg-orange-50','all')}${card('잔량 확인',s.finalNegative,'bg-red-50','finalNegative')}${card('계산 확인',s.systemNegative,'bg-amber-50','systemNegative')}${card('단가 확인',s.priceZero,'bg-purple-50','priceZero')}${card('오차 확인',s.diff,'bg-blue-50','diff')}${card('Lot 확인',s.lotMismatch,'bg-pink-50','lotMismatch')}${card('구매처 확인',s.noPurchaseVendor,'bg-rose-50','noPurchaseVendor')}${card('관리자수정',s.adminModified,'bg-emerald-50','')}</section><div class="bg-white rounded-2xl border p-2 text-xs text-slate-500">이슈카드는 확인 요청입니다. Tab=다음 요청, Shift+Tab=이전 요청, 카드 클릭=해당 유형 모아서보기/첫 요청 이동. 수정 여부는 관리자 판단입니다.</div>`}
function renderToolbar(){return`<section class="bg-white rounded-2xl shadow p-3 border flex flex-wrap gap-2 items-center"><input id="searchInput" value="${esc(state.filters.search)}" placeholder="품명/코드/거래처 검색" class="border rounded-xl px-3 py-2 text-sm w-64">${['ALL','10','20','30','40','50'].map(c=>`<button data-category="${c}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.category===c?'bg-blue-600 text-white':'bg-slate-100'}">${c==='ALL'?'전체':c}</button>`).join('')}<button id="favToggle" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.favoriteOnly?'bg-yellow-400':'bg-slate-100'}">★</button>${['BOX','EA','SPLIT'].map(u=>`<button data-unit="${u}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.unit[u]?'bg-slate-800 text-white':'bg-slate-100'}">${u==='SPLIT'?'소분':u}</button>`).join('')}<button id="issueOnly" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.issueOnly?'bg-orange-500 text-white':'bg-slate-100'}">이슈만</button><button id="offsetBtn" class="px-3 py-2 rounded-xl text-sm font-bold bg-indigo-600 text-white">상계처리 Space</button><button id="salesMoveBtn" class="px-3 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white">출고이동</button><span class="text-[11px] text-slate-500">2행 선택: 첫 선택행 → 두 번째 선택행</span>${['DEFAULT','CATEGORY','VENDOR'].map(m=>`<button data-sort="${m}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.sortMode===m?'bg-emerald-600 text-white':'bg-slate-100'}">${m==='DEFAULT'?'기본정렬':m==='CATEGORY'?'카테고리순':'구매처순'}</button>`).join('')}<button id="exportBtn" class="ml-auto px-4 py-2 rounded-xl bg-green-600 text-white font-bold">F9 엑셀</button><button id="printBtn" class="px-4 py-2 rounded-xl bg-slate-700 text-white font-bold">F10 인쇄</button></section>`}
function renderTable(rows){if(state.appStep==='processing')return`<div class="bg-white rounded-2xl p-10 text-center font-bold">분석 중...</div>`;if(!state.rows.length)return`<div class="bg-white rounded-2xl p-10 text-center text-slate-500">파일을 업로드하고 분석 실행을 누르세요.</div>`;return`<section class="bg-white rounded-2xl shadow border overflow-hidden"><div class="max-h-[62vh] overflow-auto"><table class="data-table min-w-full text-xs"><thead><tr>${['선택','이슈','코드','품명','규격','구매처','Lot','단위','기초','입고','출고','상계입','상계출','계산','잔량','오차','입고가','메모'].map(h=>`<th class="px-2 py-2 border-b text-left whitespace-nowrap">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(rowHtml).join('')}</tbody></table></div></section>`}
function qtyInput(r,field,extraClass=''){return `<input data-edit-row="${esc(r.rowId)}" data-field="${field}" value="${r[field]}" class="w-20 border rounded px-1 py-1 text-right bg-white ${extraClass}">`}
function rowHtml(r){const issueText=`${r.adminModified?'<span class="inline-flex items-center px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 mr-1 mb-1">✏️수정</span>':''}${r.issues.map(i=>`<span class="inline-flex items-center px-1.5 py-0.5 rounded ${isIssueVisited(r,i.type)?'bg-slate-50 text-slate-500':'bg-slate-100 text-red-700'} mr-1 mb-1">${displayIssue(i,r)}</span>`).join('')}`;return`<tr data-row-id="${esc(r.rowId)}" class="hover:bg-blue-50 ${state.selectedRowIds.has(r.rowId)?'bg-indigo-50':r.issues.length?'bg-orange-50/30':r.adminModified?'bg-emerald-50/30':''}"><td class="border-b px-2 py-1 text-center"><input type="checkbox" data-select-row="${esc(r.rowId)}" ${state.selectedRowIds.has(r.rowId)?'checked':''}></td><td class="border-b px-2 py-1 min-w-[120px]">${issueText}</td><td class="border-b px-2 py-1 font-mono">${esc(r.code)}</td><td class="border-b px-2 py-1 font-bold min-w-[220px]">${esc(r.displayName)}</td><td class="border-b px-2 py-1">${esc(r.spec)}</td><td class="border-b px-2 py-1">${esc(r.vendor)}</td><td class="border-b px-2 py-1">${esc(r.lotVendor||'')}</td><td class="border-b px-2 py-1">${esc(r.unitType)}</td><td class="border-b px-2 py-1">${qtyInput(r,'baseQty')}</td><td class="border-b px-2 py-1">${qtyInput(r,'inQty')}</td><td class="border-b px-2 py-1">${qtyInput(r,'outQty')}</td><td class="border-b px-2 py-1 text-right text-indigo-700">${r.offsetInQty?fmt(r.offsetInQty):'-'}</td><td class="border-b px-2 py-1 text-right text-indigo-700">${r.offsetOutQty?fmt(r.offsetOutQty):'-'}</td><td class="border-b px-2 py-1 text-right ${r.systemQty<0?'text-amber-700 font-black':''}" title="계산 = 기초 + 입고 + 상계입 - 출고 - 상계출">${fmt(r.systemQty)}</td><td class="border-b px-2 py-1">${qtyInput(r,'finalQty',r.finalQty<0?'bg-red-50 text-red-700 font-bold':'')}</td><td class="border-b px-2 py-1 text-right ${r.diffQty!==0?'text-blue-700 font-black':''}" title="오차 = 잔량 - 계산">${fmt(r.diffQty)}</td><td class="border-b px-2 py-1"><input data-edit-row="${esc(r.rowId)}" data-field="price" value="${r.price}" class="w-24 border rounded px-1 py-1 text-right ${r.price<=0?'bg-purple-50 text-purple-700 font-bold':''}"></td><td class="border-b px-2 py-1 max-w-[180px] truncate">${esc(r.memo)}</td></tr>`}
function renderSettings(){if(state.modal!=='settings')return'';const fieldRows=Object.keys(CONFIG.defaultMappings).map(k=>`<label class="block"><div class="text-xs font-bold text-slate-600 mb-1">${k}</div><textarea data-map-key="${k}" class="w-full border rounded-lg p-2 text-xs h-14">${esc(state.mappings[k]||'')}</textarea></label>`).join('');return`<div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"><div class="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-auto p-5"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black">매핑/기준 설정</h2><button id="closeSettings" class="px-3 py-1 rounded bg-slate-200">닫기</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-5"><section><h3 class="font-black mb-2">엑셀 컬럼 매핑</h3><div class="grid grid-cols-1 gap-2">${fieldRows}</div></section><section class="space-y-4"><div><h3 class="font-black mb-2">상품 묶음/분리 기준</h3><label class="block text-sm mb-2">단가 기준<select id="priceMode" class="border rounded p-2 ml-2"><option value="separate" ${state.grouping.priceMode==='separate'?'selected':''}>개별 단가 유지</option><option value="average" ${state.grouping.priceMode==='average'?'selected':''}>평균 단가 적용</option><option value="latest" ${state.grouping.priceMode==='latest'?'selected':''}>최신 단가 적용</option></select></label><label class="block"><input type="checkbox" id="splitByVendor" ${state.grouping.splitByVendor?'checked':''}> 같은 상품이라도 구매처가 다르면 따로 보기</label><label class="block"><input type="checkbox" id="splitByDate" ${state.grouping.splitByDate?'checked':''}> 같은 상품이라도 매입일자가 다르면 따로 보기</label></div><div><h3 class="font-black mb-2">단위 판정 기준</h3>${['box','ea','split'].map(k=>`<label class="block mb-2"><div class="text-xs font-bold">${k}</div><textarea data-unit-rule="${k}" class="w-full border rounded p-2 text-xs h-14">${esc(state.unitRules[k]||'')}</textarea></label>`).join('')}</div><div><h3 class="font-black mb-2">즐겨찾기 구매처</h3><textarea id="favoriteVendors" class="w-full border rounded p-2 text-xs h-32">${esc(state.favoriteVendors)}</textarea></div></section></div><div class="mt-4 flex justify-end gap-2"><button id="saveSettings" class="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold">설정 저장</button></div></div></div>`}
function bindEvents(){document.querySelectorAll('[data-file-role]').forEach(i=>i.addEventListener('change',e=>{const r=e.target.dataset.fileRole;state.files[r]=e.target.files[0]||null;state.rows=[];state.fileMeta=[];state.selectedRowIds=new Set();state.issueNav={currentKey:null,history:[],typeFilter:'ALL'};state.analyzedAt='';state.analysisTitle='분석 전';render()}));document.getElementById('runAnalysis')?.addEventListener('click',analyze);document.getElementById('resetAll')?.addEventListener('click',()=>{state.files={BASE:null,IN:null,OUT:null,COUNT_OR_RESTORE:null};state.rows=[];state.fileMeta=[];state.commands=[];state.selectedRowIds=new Set();state.issueNav={currentKey:null,history:[],typeFilter:'ALL'};state.analysisTitle='분석 전';state.analyzedAt='';render()});document.getElementById('openSettings')?.addEventListener('click',()=>{state.modal='settings';render()});document.getElementById('closeSettings')?.addEventListener('click',()=>{state.modal=null;render()});document.getElementById('saveSettings')?.addEventListener('click',()=>{document.querySelectorAll('[data-map-key]').forEach(t=>state.mappings[t.dataset.mapKey]=t.value);document.querySelectorAll('[data-unit-rule]').forEach(t=>state.unitRules[t.dataset.unitRule]=t.value);state.grouping.priceMode=document.getElementById('priceMode').value;state.grouping.splitByVendor=document.getElementById('splitByVendor').checked;state.grouping.splitByDate=document.getElementById('splitByDate').checked;state.favoriteVendors=document.getElementById('favoriteVendors').value;saveSettings();state.modal=null;render()});document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{state.activeMode=b.dataset.mode;render()}));document.querySelectorAll('[data-jump-issue]').forEach(b=>b.addEventListener('click',()=>jumpToIssue(b.dataset.jumpIssue))); document.getElementById('searchInput')?.addEventListener('input',e=>{state.filters.search=e.target.value;render()});document.querySelectorAll('[data-category]').forEach(b=>b.addEventListener('click',()=>{state.filters.category=b.dataset.category;render()}));document.getElementById('favToggle')?.addEventListener('click',()=>{state.filters.favoriteOnly=!state.filters.favoriteOnly;render()});document.querySelectorAll('[data-unit]').forEach(b=>b.addEventListener('click',()=>{const u=b.dataset.unit;state.filters.unit[u]=!state.filters.unit[u];render()}));document.getElementById('issueOnly')?.addEventListener('click',()=>{state.filters.issueOnly=!state.filters.issueOnly;render()});document.querySelectorAll('[data-sort]').forEach(b=>b.addEventListener('click',()=>{state.sortMode=b.dataset.sort;render()}));document.querySelectorAll('[data-select-row]').forEach(ch=>ch.addEventListener('change',e=>toggleSelect(e.target.dataset.selectRow,e.target.checked)));document.getElementById('offsetBtn')?.addEventListener('click',executeOffsetCommand);document.getElementById('salesMoveBtn')?.addEventListener('click',executeSalesMoveCommand);document.querySelectorAll('[data-edit-row]').forEach(inp=>inp.addEventListener('change',e=>updateRow(e.target.dataset.editRow,e.target.dataset.field,e.target.value)));window.onkeydown=e=>{const tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();if(e.key==='Tab'&&state.rows.length&&!state.modal){e.preventDefault();navigateIssue(e.shiftKey?-1:1);return}if(e.code==='Space'&&!['input','textarea','select','button'].includes(tag)&&state.rows.length){e.preventDefault();executeOffsetCommand()}};document.getElementById('exportBtn')?.addEventListener('click',exportWorkbook);document.getElementById('printBtn')?.addEventListener('click',printView)}
render();
})();
</script></body></html>
