function safeStr(v,f=''){if(v===null||v===undefined)return f;const s=String(v).trim();return !s||['undefined','null','nan'].includes(s.toLowerCase())?f:s}

function sheetToRows(sheet){const all=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});const h=detectHeaderRow(all);if(h<0)return{rows:[],headers:[]};const used={},headers=(all[h]||[]).map((x,i)=>{let v=safeStr(x,`__EMPTY_${i}`);if(used[v]){used[v]++;v=`${v}_${used[v]}`}else used[v]=1;return v});const rows=[];for(let i=h+1;i<all.length;i++){const arr=all[i];if(!arr||arr.every(c=>safeStr(c)===''))continue;const o={__rowNumber:i+1};headers.forEach((hd,idx)=>o[hd]=arr[idx]);rows.push(o)}return{rows,headers}}

function batchKey(r){return[r.productKey,r.price||0,r.vendor||'',r.date||''].join('|')}function groupKey(n){const p=[productKey(n.code,n.displayName)];if(state.grouping.priceMode==='separate')p.push('P:'+(n.price||0));if(state.grouping.splitByVendor)p.push('V:'+(n.vendor||''));if(state.grouping.splitByDate)p.push('D:'+(n.date||''));return p.join('|')}
function makeRow(n,role,fileType,sheet,fileName){const r={rowId:`${role}|${fileName}|${sheet}|${n.raw.__rowNumber}|${Math.random().toString(36).slice(2,7)}`,productKey:productKey(n.code,n.displayName),batchKey:'',groupKey:groupKey(n),uploadRole:role,fileType,sourceFileName:fileName,sourceSheetName:sheet,sourceRowNumber:n.raw.__rowNumber,code:n.code,name:n.name,spec:n.spec,displayName:n.displayName,categoryCode:cat(n.code),categoryName:catName(n.code),unit:n.unit,unitType:n.unitType,vendor:n.vendor,lotVendor:n.lotVendor||'',date:n.date,baseQty:0,inQty:0,outQty:0,offsetInQty:0,offsetOutQty:0,finalQty:0,price:n.price,salesAmount:0,cogsAmount:0,stockAmount:0,systemQty:0,diffQty:0,memo:n.memo,raw:n.raw,review:{}};if(role==='BASE'){r.baseQty=fileType==='LEDGER'?n.finalQty:(n.baseQty||n.finalQty||n.qty);r.finalQty=r.baseQty}else if(role==='IN'){r.inQty=n.inQty||n.qty}else if(role==='OUT'){r.outQty=n.outQty||n.qty}else if(role==='COUNT_OR_RESTORE'){if(fileType==='LEDGER'){r.baseQty=n.baseQty;r.inQty=n.inQty;r.outQty=n.outQty;r.finalQty=n.finalQty}else r.finalQty=n.finalQty||n.qty}r.batchKey=batchKey(r);return recalc(r)}
function recalc(r){r.systemQty=parseNumber(r.baseQty)+parseNumber(r.inQty)+parseNumber(r.offsetInQty)-parseNumber(r.outQty)-parseNumber(r.offsetOutQty);r.diffQty=parseNumber(r.finalQty)-r.systemQty;r.stockAmount=parseNumber(r.finalQty)*parseNumber(r.price);r.issues=buildIssues(r);return r}function makeIssue(r,t){return{type:t,label:ISSUE_LABEL[t],target:ISSUE_TARGET[t],reviewStatus:r.review&&r.review[t]?r.review[t]:'unreviewed'}}function buildIssues(r){const a=[];if(parseNumber(r.finalQty)<0)a.push(makeIssue(r,'finalNegative'));else if(parseNumber(r.systemQty)<0)a.push(makeIssue(r,'systemNegative'));if(parseNumber(r.price)<=0)a.push(makeIssue(r,'priceZero'));if(parseNumber(r.diffQty)!==0)a.push(makeIssue(r,'diff'));if(r._duplicate)a.push(makeIssue(r,'duplicate'));if(r._lotMismatch)a.push(makeIssue(r,'lotMismatch'));if(r._noPurchaseVendor)a.push(makeIssue(r,'noPurchaseVendor'));return a}
function mergeRawRows(rows){const m=new Map();for(const r of rows){const k=r.groupKey||r.productKey;if(!m.has(k))m.set(k,Object.assign({},r,{rowId:`RAW|${k}|${m.size+1}`,sourceRowNumber:'집계',review:{},_lotMismatch:!!r._lotMismatch,_noPurchaseVendor:!!r._noPurchaseVendor,lotVendor:r.lotVendor||''}));else{const t=m.get(k);t.baseQty+=r.baseQty;t.inQty+=r.inQty;t.outQty+=r.outQty;if(r.price>0)t.price=r.price;if(r._lotMismatch)t._lotMismatch=true;if(r._noPurchaseVendor)t._noPurchaseVendor=true;if(r.lotVendor&&!t.lotVendor)t.lotVendor=r.lotVendor;if(r.memo)t.memo=t.memo?`${t.memo} / ${r.memo}`:r.memo}}return Array.from(m.values()).map(r=>{r.finalQty=r.baseQty+r.inQty-r.outQty;return recalc(r)})}
function validateLotVendors(parsed){const purchaseMap=new Map();[...(parsed.BASE||[]),...(parsed.IN||[])].forEach(r=>{const v=cleanKey(r.vendor);if(!v||v==='미지정')return;if(!purchaseMap.has(r.productKey))purchaseMap.set(r.productKey,new Set());purchaseMap.get(r.productKey).add(v)});(parsed.OUT||[]).forEach(r=>{const expected=cleanKey(r.lotVendor);if(!expected)return;const vendors=purchaseMap.get(r.productKey);if(!vendors||vendors.size===0){r._noPurchaseVendor=true;return}const matched=[...vendors].some(v=>v&&expected&&(v.includes(expected)||expected.includes(v)));if(!matched)r._lotMismatch=true})}

async function analyze(){

  const roles=['BASE','IN','OUT','COUNT_OR_RESTORE'],parsed={};state.fileMeta=[];
  for(const role of roles){
   const file=state.files[role];
   if(!file){parsed[role]=[];continue}
   const wb=await withTimeout(readWorkbook(file),20000,`${roleLabel(role)} 파일 읽기`);
   if(runId!==state.analysisRunId)return;
   const sheet=chooseSheet(wb,role);
   if(!sheet||!wb.Sheets[sheet])throw new Error(`${roleLabel(role)} 파일에서 읽을 수 있는 시트를 찾지 못했습니다.`);

   const ft=detectFileType(sheet,sr.rows);
   const rows=[];
   for(const rawRow of sr.rows){
    try{const n=norm(rawRow,{role,fileType:ft,sheet,fileName:file.name});rows.push(makeRow(n,role,ft,sheet,file.name))}
    catch(rowErr){console.warn('row parse skipped',role,file.name,rawRow.__rowNumber,rowErr)}
   }

   state.fileMeta.push({role,fileName:file.name,sheetName:sheet,fileType:ft,rows:rows.length})

  validateLotVendors(parsed);

  let out=[];

   out=countRows.map(r=>Object.assign({},r,{review:{}})).map(recalc);markDuplicates(out)
  }else{
   out=mergeRawRows([...(parsed.BASE||[]),...(parsed.IN||[]),...(parsed.OUT||[])]);

   markDuplicates(out)
  }

 }catch(e){

function renderRelatedContextPanel(){const row=currentIssueRow();if(!row||!state.rows.length)return '';const sameProduct=state.rows.filter(r=>r.rowId!==row.rowId&&r.productKey===row.productKey);const sameVendor=state.rows.filter(r=>r.rowId!==row.rowId&&sameProduct.every(p=>p.rowId!==r.rowId)&&cleanKey(r.vendor)&&cleanKey(r.vendor)===cleanKey(row.vendor)).slice(0,8);const nearby=state.rows.filter(r=>r.rowId!==row.rowId&&sameProduct.every(p=>p.rowId!==r.rowId)&&sameVendor.every(v=>v.rowId!==r.rowId)&&String(r.code||'').slice(0,4)===String(row.code||'').slice(0,4)).slice(0,8);const list=[...sameProduct.slice(0,10),...sameVendor,...nearby].slice(0,14);const issueNames=row.issues.map(i=>ISSUE_LABEL[i.type]||i.type).join(', ')||'요청 없음';const itemHtml=list.length?list.map(r=>`<button data-related-jump="${esc(r.rowId)}" class="w-full text-left rounded-xl border bg-white hover:bg-blue-50 px-3 py-2"><div class="flex justify-between gap-2"><b class="truncate">${esc(r.displayName||r.code)}</b><span class="text-[11px] text-slate-500">${esc(r.vendor||'')}</span></div><div class="text-[11px] text-slate-500 mt-1">기초 ${fmt(r.baseQty)} · 입고 ${fmt(r.inQty)} · 출고 ${fmt(r.outQty)} · 잔량 ${fmt(r.finalQty)} · 오차 ${fmt(r.diffQty)}</div></button>`).join(''):'<div class="text-xs text-slate-500 rounded-xl border bg-white p-3">같은 상품/구매처/인접 코드의 연관 행이 없습니다.</div>';return `<section class="bg-white rounded-2xl shadow border p-3"><div class="flex flex-wrap items-start justify-between gap-3 mb-3"><div><h2 class="font-black text-sm">연관상품 확인 패널</h2><p class="text-xs text-slate-500">점프 후 전체 맥락에서 같은 상품·같은 구매처·인접 코드를 같이 확인합니다.</p></div><button data-related-jump="${esc(row.rowId)}" class="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-xs font-bold">현재 요청 행으로 이동</button></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-3"><div class="rounded-2xl border bg-blue-50 p-3"><div class="text-[11px] text-blue-700 font-bold">현재 요청</div><div class="font-black mt-1">${esc(row.displayName||row.code||'상품')}</div><div class="text-xs text-slate-600 mt-1">${esc(row.code)} · ${esc(row.vendor||'구매처 없음')} · ${esc(issueNames)}</div><div class="text-xs mt-2">기초 ${fmt(row.baseQty)} · 입고 ${fmt(row.inQty)} · 출고 ${fmt(row.outQty)} · 잔량 ${fmt(row.finalQty)} · 오차 ${fmt(row.diffQty)}</div></div><div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-2 max-h-56 overflow-auto">${itemHtml}</div></div></section>`}

function render(){const s=stats(),rows=visibleRows();const status=state.appStep==='processing'?'분석 중':state.rows.length?'분석 완료':Object.values(state.files).some(Boolean)?'파일 선택됨':'대기 중';document.getElementById('app').innerHTML=`<div class="no-print max-w-[1800px] mx-auto p-4 space-y-3"><header class="bg-slate-900 text-white rounded-2xl p-4 shadow"><div class="flex flex-wrap items-center justify-between gap-3"><div><div class="text-xl font-black">ONEAPP DataOps <span class="text-blue-300">v9.19</span></div><div class="text-xs text-slate-300">${esc(VERSION)}</div></div><div class="flex flex-wrap items-center gap-2 text-xs"><span class="px-3 py-1 rounded-full bg-blue-500/20 text-blue-100 font-bold">${status}</span><button id="openSettings" class="px-3 py-1.5 rounded-lg bg-white/10 border border-white/20 font-bold"><i class="fa-solid fa-gear"></i> 환경설정</button><button id="resetAll" class="px-3 py-1.5 rounded-lg bg-white/10 border border-white/20">초기화</button></div></div><div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-xs text-slate-200"><div class="bg-white/5 rounded-xl p-2"><b>현재 분석</b><br>${esc(state.analysisTitle)}</div><div class="bg-white/5 rounded-xl p-2"><b>분석 시각</b><br>${esc(state.analyzedAt||'-')}</div><div class="bg-white/5 rounded-xl p-2"><b>기준</b><br>업로드 위치 &gt; 파일 구조 &gt; 시트명 &gt; 컬럼명</div></div></header>${renderUpload()}${state.analysisError?`<section class="bg-red-50 border border-red-200 text-red-700 rounded-2xl p-3 text-sm font-bold">분석 오류: ${esc(state.analysisError)}</section>`:''}${renderModes()}${renderCards(s)}${renderRelatedContextPanel()}${renderToolbar()}${renderWorkflowGuard(s,rows)}${renderCommandHistoryPanel()}${renderTable(rows)}${renderSettings()}`;bindEvents()}
function renderUpload(){const selected=Object.values(state.files).filter(Boolean).length;return`<section class="bg-white rounded-2xl shadow border overflow-hidden"><div class="px-4 py-3 border-b bg-gradient-to-r from-blue-50 to-slate-50 flex flex-wrap items-center justify-between gap-2"><div><h2 class="font-black">파일 업로드 센터</h2><p class="text-xs text-slate-500 mt-1">기초는 시작 시점, 실사/마감은 종료 시점 확인 또는 복원 기준입니다.</p></div><button id="runAnalysis" class="px-5 py-2 rounded-xl bg-blue-600 text-white font-black shadow">${state.appStep==='processing'?'분석 중...':'분석 실행'}</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-3 p-4">${['BASE','IN','OUT','COUNT_OR_RESTORE'].map(r=>`<label class="block border rounded-2xl p-3 bg-slate-50 hover:bg-blue-50 transition"><div class="flex items-center justify-between mb-1"><div class="font-black text-sm">${roleLabel(r)}</div><span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-200 text-slate-600">${roleBadge(r)}</span></div><div class="text-[11px] text-slate-500 h-8">${roleDesc(r)}</div><input type="file" accept=".xlsx,.xls,.csv" data-file-role="${r}" class="text-xs w-full mt-2"><div class="text-[11px] text-slate-600 mt-2 truncate">${state.files[r]?esc(state.files[r].name):'미선택'}</div></label>`).join('')}</div><div class="px-4 pb-4"><div class="text-xs rounded-xl bg-amber-50 border border-amber-200 p-3 text-amber-800"><b>시점 안내</b> · 같은 재고수불부라도 <b>기초</b>에 넣으면 잔량을 시작 재고로 사용하고, <b>실사/마감</b>에 넣으면 재고·입고·출고·잔량 전체를 복원합니다.</div>${state.fileMeta.length?`<div class="mt-3 grid grid-cols-1 md:grid-cols-4 gap-2 text-xs">${state.fileMeta.map(m=>`<div class="bg-slate-100 rounded-lg p-2"><b>${roleLabel(m.role)}</b><br>${esc(m.fileName)}<br>시트:${esc(m.sheetName)} / ${esc(m.fileType)} / ${m.rows}행</div>`).join('')}</div>`:''}</div></section>`}
function renderModes(){return`<section class="bg-white rounded-2xl border shadow-sm p-2 flex flex-wrap gap-2">${[['ledger','수불 확인','재고·입고·출고·잔량 확인'],['issues','확인 요청','이슈카드 이동/모아보기/점프'],['export','출력 준비','F9/F10 출력 전 점검']].map(([m,l,d])=>`<button data-mode="${m}" class="px-4 py-2 rounded-xl text-left ${state.activeMode===m?'bg-slate-900 text-white':'bg-slate-50 border'}"><div class="font-black text-sm">${l}</div><div class="text-[11px] ${state.activeMode===m?'text-slate-300':'text-slate-500'}">${d}</div></button>`).join('')}</section>`}
function renderCards(s){return`<section class="bg-white rounded-2xl shadow border p-3"><div class="flex flex-wrap items-center justify-between gap-2 mb-2"><div><h2 class="font-black text-sm">이슈 요청 카드</h2><p class="text-xs text-slate-500">검사표가 아니라 확인 요청/작업 이동 도구입니다. 수정 여부는 관리자 판단입니다.</p></div><div class="text-[11px] text-slate-500">Tab 다음 요청 · Shift+Tab 이전 요청</div></div><div class="mb-3 rounded-xl border bg-slate-50 p-2 flex flex-wrap items-center gap-2"><span class="text-xs font-black text-slate-600">현재 요청</span><span class="px-2 py-1 rounded-lg bg-white border text-xs font-bold">${esc(currentIssueSummary())}</span><button id="prevIssueBtn" class="px-3 py-1 rounded-lg bg-white border text-xs font-bold">← 이전</button><button id="nextIssueBtn" class="px-3 py-1 rounded-lg bg-slate-900 text-white text-xs font-bold">다음 →</button><button id="clearIssueNavBtn" class="px-3 py-1 rounded-lg bg-white border text-xs font-bold">현재 요청 해제</button><span class="text-[11px] text-slate-500">버튼은 키보드 보조용입니다. 결과값을 재판단하지 않습니다.</span></div><div class="grid grid-cols-2 md:grid-cols-6 gap-2">${card('전체행',state.rows.length,'bg-white','')}${card('남은 요청',s.total,'bg-orange-50','all')}${card('잔량 확인',s.finalNegative,'bg-red-50','finalNegative')}${card('계산 확인',s.systemNegative,'bg-amber-50','systemNegative')}${card('단가 확인',s.priceZero,'bg-purple-50','priceZero')}${card('오차 확인',s.diff,'bg-blue-50','diff')}${card('Lot 확인',s.lotMismatch,'bg-pink-50','lotMismatch')}${card('구매처 확인',s.noPurchaseVendor,'bg-rose-50','noPurchaseVendor')}${card('관리자수정',s.adminModified,'bg-emerald-50','')}</div><div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs"><div class="rounded-xl bg-slate-50 border p-2"><b>모아보기</b> · 해당 이슈 항목만 좁혀서 연속 확인합니다.</div><div class="rounded-xl bg-slate-50 border p-2"><b>점프</b> · 전체 목록 맥락에서 해당 행으로 이동해 연관상품까지 같이 봅니다.</div></div></section>`}
function renderToolbar(){const viewLabel=state.filters.issueOnly&&state.filters.issueType!=='ALL'?`${ISSUE_LABEL[state.filters.issueType]||state.filters.issueType} 모아보기`:state.filters.issueOnly?'이슈 모아보기':'전체 보기';return`<section class="bg-white rounded-2xl shadow p-3 border space-y-2"><div class="flex flex-wrap gap-2 items-center"><input id="searchInput" value="${esc(state.filters.search)}" placeholder="품명/코드/거래처/Lot/메모 검색" class="border rounded-xl px-3 py-2 text-sm w-72"><span class="px-3 py-2 rounded-xl bg-slate-100 text-xs font-bold">현재 보기: ${viewLabel}</span>${state.filters.issueOnly?'<button id="issueOnly" class="px-3 py-2 rounded-xl text-sm font-bold bg-orange-500 text-white">전체로 돌아가기</button>':'<button id="issueOnly" class="px-3 py-2 rounded-xl text-sm font-bold bg-slate-100">이슈만</button>'}<button id="offsetBtn" class="px-3 py-2 rounded-xl text-sm font-bold bg-indigo-600 text-white">상계처리 Space</button><button id="salesMoveBtn" class="px-3 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white">출고이동</button><button id="exportBtn" class="ml-auto px-4 py-2 rounded-xl bg-green-600 text-white font-bold">F9 엑셀</button><button id="printBtn" class="px-4 py-2 rounded-xl bg-slate-700 text-white font-bold">F10 인쇄</button></div><div class="flex flex-wrap gap-2 items-center">${['ALL','10','20','30','40','50'].map(c=>`<button data-category="${c}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.category===c?'bg-blue-600 text-white':'bg-slate-100'}">${c==='ALL'?'전체':c}</button>`).join('')}<button id="favToggle" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.favoriteOnly?'bg-yellow-400':'bg-slate-100'}">★ 구매처</button>${['BOX','EA','SPLIT'].map(u=>`<button data-unit="${u}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.filters.unit[u]?'bg-slate-800 text-white':'bg-slate-100'}">${u==='SPLIT'?'소분':u}</button>`).join('')}${['DEFAULT','CATEGORY','VENDOR'].map(m=>`<button data-sort="${m}" class="px-3 py-2 rounded-xl text-sm font-bold ${state.sortMode===m?'bg-emerald-600 text-white':'bg-slate-100'}">${m==='DEFAULT'?'기본정렬':m==='CATEGORY'?'카테고리순':'구매처순'}</button>`).join('')}<span class="text-[11px] text-slate-500">2행 선택: 상계처리/출고이동 활성</span></div></section>`}
function renderWorkflowGuard(s,rows){
 const selected=state.selectedRowIds.size;
 const files=state.fileMeta.length;
 const visible=rows.length;
 const hidden=Math.max(0,state.rows.length-visible);
 const requiredCols=['issues','displayName','baseQty','inQty','outQty','systemQty','finalQty','diffQty'];
 const visibleKeys=new Set(visibleColumns().map(c=>c.key));
 const missingRequired=requiredCols.filter(k=>!visibleKeys.has(k));
 const checks=[
  {label:'업로드 역할',ok:files>0,desc:files?`${files}개 역할 파일 인식됨`:'파일 선택 후 분석 실행 필요'},
  {label:'테이블 설정',ok:missingRequired.length===0,desc:missingRequired.length?`필수 표시 누락: ${missingRequired.join(', ')}`:'필수 작업 컬럼 표시 중'},
  {label:'확인 요청',ok:true,desc:`남은 요청 ${s.total}건 · 전체 요청 ${s.allTotal}건`},
  {label:'명령 가능 상태',ok:selected===2,desc:selected===2?'2행 선택됨 · 상계/출고이동 가능':`${selected}행 선택됨 · 명령은 보통 2행 선택 필요`},
  {label:'현재 보기',ok:true,desc:`표시 ${visible}행${hidden?` · 숨김 ${hidden}행`:''}`},
  {label:'출력 준비',ok:state.rows.length>0,desc:state.rows.length?`F9/F10 현재 작업값 기준 · 명령이력 ${state.commands.length}건`:'분석 후 출력 가능'}
 ];
 const cardHtml=checks.map(c=>`<div class="rounded-xl border p-3 ${c.ok?'bg-emerald-50 border-emerald-100':'bg-amber-50 border-amber-100'}"><div class="flex items-center justify-between gap-2"><b class="text-sm">${esc(c.label)}</b><span class="text-[11px] px-2 py-0.5 rounded-full ${c.ok?'bg-emerald-600 text-white':'bg-amber-500 text-white'}">${c.ok?'OK':'확인'}</span></div><div class="text-[11px] text-slate-600 mt-1">${esc(c.desc)}</div></div>`).join('');
 return`<section class="bg-white rounded-2xl shadow border p-3"><div class="flex flex-wrap items-center justify-between gap-2 mb-2"><div><h2 class="font-black text-sm">작업 흐름 점검</h2><p class="text-xs text-slate-500">기능을 막는 검사가 아니라, 현재 작업 상태를 한눈에 보는 안내 패널입니다. 프로그램은 자동 보정하지 않고 현재 상태만 보여줍니다.</p></div><div class="text-[11px] text-slate-500">v9.19 · Related Context Panel</div></div><div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-6 gap-2">${cardHtml}</div></section>`
}

function visibleColumns(){let left=0;return normalizeTableColumns(state.tableColumns).filter(c=>c.visible||c.required).sort((a,b)=>(a.order||0)-(b.order||0)).map(c=>{const cc={...c};if(cc.pinned){cc._stickyLeft=left;left+=parseNumber(cc.width)||80}return cc})}
function colStyle(c){let st=`min-width:${c.width||80}px;max-width:${c.width||80}px;`;if(c.pinned)st+=`position:sticky;left:${c._stickyLeft||0}px;z-index:12;background:#f8fafc;`;return st}
function cellClass(c){return `border-b px-2 py-1 ${c.pinned?'sticky z-10 bg-white shadow-[2px_0_0_0_rgba(226,232,240,1)]':''}`}
function cellStyle(c){let st=`min-width:${c.width||80}px;max-width:${c.width||80}px;`;if(c.pinned)st+=`left:${c._stickyLeft||0}px;`;return st}

function renderCommandHistoryPanel(){
 const recent=[...state.commands].slice(-8).reverse();
 const typeLabel={EDIT_PRICE:'입고가수정',EDIT_STOCK_FIELD:'수불수정',OFFSET_STOCK:'상계처리',MOVE_OUT_QTY:'출고이동'};
 const rows=recent.map(c=>{
   const first=(c.targetRowIds||[])[0]||'';
   const targets=(c.targetRowIds||[]).length;
   return `<tr class="border-b hover:bg-slate-50"><td class="px-2 py-1 whitespace-nowrap text-slate-500">${esc(c.executedAt||'')}</td><td class="px-2 py-1 font-bold">${esc(typeLabel[c.commandType]||c.commandType)}</td><td class="px-2 py-1">${esc(c.memo||'')}</td><td class="px-2 py-1 text-right">${targets}</td><td class="px-2 py-1 text-center">${first?`<button data-command-jump="${esc(first)}" class="px-2 py-1 rounded bg-slate-100 text-[11px] font-bold">점프</button>`:'-'}</td></tr>`
 }).join('');
 return `<section class="bg-white rounded-2xl shadow border overflow-hidden"><div class="px-4 py-3 border-b bg-slate-50 flex flex-wrap items-center justify-between gap-2"><div><h2 class="font-black text-sm">명령이력 패널</h2><p class="text-xs text-slate-500">관리자가 직접 수정·상계·출고이동한 작업을 바로 확인합니다. 자동 조작 이력이 아니라 관리자 명령 기록입니다.</p></div><div class="text-xs text-slate-500">총 ${state.commands.length}건 · 최근 ${recent.length}건 표시</div></div>${state.commands.length?`<div class="overflow-auto"><table class="min-w-full text-xs"><thead class="bg-slate-100"><tr><th class="px-2 py-1 text-left">일시</th><th class="px-2 py-1 text-left">명령</th><th class="px-2 py-1 text-left">내용</th><th class="px-2 py-1 text-right">대상</th><th class="px-2 py-1 text-center">이동</th></tr></thead><tbody>${rows}</tbody></table></div>`:`<div class="p-4 text-sm text-slate-500">아직 관리자 명령이 없습니다. 기초/입고/출고/잔량/입고가 수정, 상계처리, 출고이동을 실행하면 여기에 기록됩니다.</div>`}</section>`
}

function renderTable(rows){if(state.appStep==='processing')return`<div class="bg-white rounded-2xl p-10 text-center font-bold">분석 중...</div>`;if(!state.rows.length)return`<div class="bg-white rounded-2xl p-10 text-center text-slate-500">파일을 업로드하고 분석 실행을 누르세요.</div>`;const cols=visibleColumns();return`<section class="bg-white rounded-2xl shadow border overflow-hidden"><div class="px-4 py-3 border-b bg-slate-50 flex items-center justify-between"><div><div class="font-black text-sm">작업 테이블</div><div class="text-[11px] text-slate-500">수정 가능: 기초·입고·출고·잔량·입고가·메모 / 계산·오차는 시스템 표시값입니다.</div></div><div class="text-[11px] text-slate-500">환경설정 &gt; 테이블 항목 편집에서 표시/순서/너비/고정/수정가능 여부를 관리합니다.</div></div><div data-table-scroll class="max-h-[62vh] overflow-auto"><table class="data-table min-w-full text-xs"><thead><tr>${cols.map(c=>`<th class="px-2 py-2 border-b text-left whitespace-nowrap" style="${colStyle(c)}">${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>rowHtml(r,cols)).join('')}</tbody></table></div></section>`}
function qtyInput(r,field,extraClass=''){return `<input data-edit-row="${esc(r.rowId)}" data-field="${field}" value="${r[field]}" class="w-20 border rounded px-1 py-1 text-right bg-white ${extraClass}">`}
function rowHtml(r,cols){
  const active=state.issueNav&&state.issueNav.currentKey&&String(state.issueNav.currentKey).startsWith(r.rowId+'::');
  const selected=state.selectedRowIds&&state.selectedRowIds.has(r.rowId);
  const issueClass=r.issues&&r.issues.length?'bg-white':'bg-white';
  return `<tr data-row-id="${esc(r.rowId)}" class="border-b hover:bg-blue-50 ${active?'issue-ring issue-active-row':''} ${selected?'bg-indigo-50':''} ${issueClass}">${cols.map(c=>renderCell(r,c)).join('')}</tr>`;
}
function renderCell(r,c){const k=c.key,cls=cellClass(c),st=cellStyle(c);if(k==='select')return`<td class="${cls} text-center" style="${st}"><input type="checkbox" data-select-row="${esc(r.rowId)}" ${state.selectedRowIds.has(r.rowId)?'checked':''}></td>`;if(k==='issues'){const issueText=`${r.adminModified?'<span class="inline-flex items-center px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 mr-1 mb-1">✏️수정</span>':''}${r.issues.map(i=>`<span class="inline-flex items-center px-1.5 py-0.5 rounded ${isIssueVisited(r,i.type)?'bg-slate-50 text-slate-500':'bg-slate-100 text-red-700'} mr-1 mb-1">${displayIssue(i,r)}</span>`).join('')}`;return`<td class="${cls} min-w-[120px]" style="${st}">${issueText}</td>`}if(c.editable&&['baseQty','inQty','outQty','finalQty'].includes(k))return`<td class="${cls}" style="${st}">${qtyInput(r,k,k==='finalQty'&&r.finalQty<0?'bg-red-50 text-red-700 font-bold':'')}</td>`;if(c.editable&&k==='price')return`<td class="${cls}" style="${st}"><input data-edit-row="${esc(r.rowId)}" data-field="price" value="${r.price}" class="w-24 border rounded px-1 py-1 text-right ${r.price<=0?'bg-purple-50 text-purple-700 font-bold':''}"></td>`;if(c.editable&&k==='memo')return`<td class="${cls}" style="${st}"><input data-edit-row="${esc(r.rowId)}" data-field="memo" value="${esc(r.memo)}" class="w-full border rounded px-1 py-1 text-xs"></td>`;if(k==='code')return`<td class="${cls} font-mono" style="${st}">${esc(r.code)}</td>`;if(k==='displayName')return`<td class="${cls} font-bold min-w-[220px]" style="${st}">${esc(r.displayName)}</td>`;if(k==='offsetInQty'||k==='offsetOutQty')return`<td class="${cls} text-right text-indigo-700" style="${st}">${r[k]?fmt(r[k]):'-'}</td>`;if(k==='systemQty')return`<td class="${cls} text-right ${r.systemQty<0?'text-amber-700 font-black':''}" style="${st}" title="계산 = 기초 + 입고 + 상계입 - 출고 - 상계출">${fmt(r.systemQty)}</td>`;if(k==='diffQty')return`<td class="${cls} text-right ${r.diffQty!==0?'text-blue-700 font-black':''}" style="${st}" title="오차 = 잔량 - 계산">${fmt(r.diffQty)}</td>`;if(['baseQty','inQty','outQty','finalQty','price','stockAmount','salesAmount','cogsAmount'].includes(k))return`<td class="${cls} text-right" style="${st}">${fmt(r[k])}</td>`;if(k==='memo')return`<td class="${cls} max-w-[180px] truncate" style="${st}">${esc(r.memo)}</td>`;return`<td class="${cls}" style="${st}">${esc(r[k]||'')}</td>`}
function renderSettings(){if(state.modal!=='settings')return'';const fieldRows=Object.keys(CONFIG.defaultMappings).map(k=>`<label class="block"><div class="text-xs font-bold text-slate-600 mb-1">${k}</div><textarea data-map-key="${k}" class="w-full border rounded-lg p-2 text-xs h-14">${esc(state.mappings[k]||'')}</textarea></label>`).join('');const colRows=normalizeTableColumns(state.tableColumns).map(c=>`<tr class="border-b"><td class="p-1 text-center"><input type="checkbox" data-col-visible="${c.key}" ${c.visible?'checked':''} ${c.required?'disabled':''}></td><td class="p-1 font-mono text-[11px]">${esc(c.key)}</td><td class="p-1"><input data-col-label="${c.key}" value="${esc(c.label)}" class="border rounded px-1 py-0.5 w-24 text-xs"></td><td class="p-1 text-center"><input type="checkbox" data-col-editable="${c.key}" ${c.editable?'checked':''} ${['systemQty','diffQty','issues','select'].includes(c.key)?'disabled':''}></td><td class="p-1 text-center"><input type="checkbox" data-col-pinned="${c.key}" ${c.pinned?'checked':''}></td><td class="p-1"><input data-col-width="${c.key}" value="${c.width||80}" class="border rounded px-1 py-0.5 w-16 text-xs text-right"></td><td class="p-1"><input data-col-order="${c.key}" value="${c.order||0}" class="border rounded px-1 py-0.5 w-14 text-xs text-right"></td></tr>`).join('');return`<div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"><div class="bg-white rounded-2xl shadow-2xl max-w-6xl w-full max-h-[92vh] overflow-auto p-5"><div class="flex justify-between items-center mb-4"><div><h2 class="text-xl font-black">환경설정 센터</h2><p class="text-xs text-slate-500 mt-1">v9.14: 관리자 명령이력 패널 추가. 수정·상계·출고이동 기록을 화면에서 바로 확인하고 대상 행으로 점프합니다.</p></div><button id="closeSettings" class="px-3 py-1 rounded bg-slate-200">닫기</button></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-5"><section class="lg:col-span-1"><h3 class="font-black mb-2">1. 엑셀 컬럼 매핑</h3><div class="grid grid-cols-1 gap-2">${fieldRows}</div></section><section class="space-y-4"><div class="p-3 rounded-xl border bg-slate-50"><h3 class="font-black mb-2">2. 상품 묶음/분리 기준</h3><label class="block text-sm mb-2">단가 기준<select id="priceMode" class="border rounded p-2 ml-2"><option value="separate" ${state.grouping.priceMode==='separate'?'selected':''}>개별 단가 유지</option><option value="average" ${state.grouping.priceMode==='average'?'selected':''}>평균 단가 적용</option><option value="latest" ${state.grouping.priceMode==='latest'?'selected':''}>최신 단가 적용</option></select></label><label class="block text-sm"><input type="checkbox" id="splitByVendor" ${state.grouping.splitByVendor?'checked':''}> 같은 상품이라도 구매처가 다르면 따로 보기</label><label class="block text-sm"><input type="checkbox" id="splitByDate" ${state.grouping.splitByDate?'checked':''}> 같은 상품이라도 매입일자가 다르면 따로 보기</label></div><div class="p-3 rounded-xl border"><h3 class="font-black mb-2">3. 표시/필터 기준</h3>${['box','ea','split'].map(k=>`<label class="block mb-2"><div class="text-xs font-bold">${k.toUpperCase()} 판정 키워드</div><textarea data-unit-rule="${k}" class="w-full border rounded p-2 text-xs h-14">${esc(state.unitRules[k]||'')}</textarea></label>`).join('')}<h4 class="font-bold text-sm mt-3 mb-1">즐겨찾기 구매처</h4><textarea id="favoriteVendors" class="w-full border rounded p-2 text-xs h-28">${esc(state.favoriteVendors)}</textarea></div><div class="p-3 rounded-xl border"><h3 class="font-black mb-2">4. 단축키/작업명령</h3><div class="grid grid-cols-2 gap-2 text-xs"><label>다음 요청<input id="shortcutNext" value="${esc(state.shortcuts.nextIssue)}" class="border rounded p-1 ml-2 w-24"></label><label>이전 요청<input id="shortcutPrev" value="${esc(state.shortcuts.prevIssue)}" class="border rounded p-1 ml-2 w-24"></label><label>상계처리<input id="shortcutOffset" value="${esc(state.shortcuts.offset)}" class="border rounded p-1 ml-2 w-24"></label><label>엑셀출력<input id="shortcutExport" value="${esc(state.shortcuts.exportExcel)}" class="border rounded p-1 ml-2 w-24"></label></div></div><div class="p-3 rounded-xl border"><h3 class="font-black mb-2">5. 출력 설정</h3><label class="block text-sm"><input type="checkbox" id="includeSummary" ${state.exportOptions.includeSummary?'checked':''}> 출력요약 포함</label><label class="block text-sm"><input type="checkbox" id="includeCommandHistory" ${state.exportOptions.includeCommandHistory?'checked':''}> 명령이력 포함</label></div></section><section><h3 class="font-black mb-2">6. 테이블 항목 편집</h3><div class="text-[11px] text-slate-500 mb-2">표시, 이름, 수정가능, 고정, 너비, 순서를 설정합니다. 필수 항목은 숨길 수 없습니다.</div><div class="overflow-auto border rounded-xl max-h-[64vh]"><table class="min-w-full text-xs"><thead class="bg-slate-100 sticky top-0"><tr><th class="p-1">표시</th><th class="p-1">key</th><th class="p-1">화면명</th><th class="p-1">수정</th><th class="p-1">고정</th><th class="p-1">너비</th><th class="p-1">순서</th></tr></thead><tbody>${colRows}</tbody></table></div><div class="mt-3 flex flex-wrap gap-2"><button id="presetDefault" class="px-3 py-1 rounded bg-slate-100 text-sm">기본형</button><button id="presetInspection" class="px-3 py-1 rounded bg-slate-100 text-sm">실사작업형</button><button id="presetPrice" class="px-3 py-1 rounded bg-slate-100 text-sm">단가검증형</button><button id="presetLot" class="px-3 py-1 rounded bg-slate-100 text-sm">Lot검증형</button><button id="presetExport" class="px-3 py-1 rounded bg-slate-100 text-sm">출력확인형</button><button id="resetColumns" class="px-3 py-1 rounded bg-red-50 text-red-700 text-sm">테이블 기본값 복원</button></div></section></div><div class="mt-4 flex justify-end gap-2"><button id="saveSettings" class="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold">설정 저장</button></div></div></div>`}
function applyColumnPreset(type){let cols=normalizeTableColumns(DEFAULT_TABLE_COLUMNS);const presets={inspection:['select','issues','displayName','spec','baseQty','inQty','outQty','systemQty','finalQty','diffQty','memo'],price:['select','issues','code','displayName','vendor','lotVendor','price','stockAmount','memo'],lot:['select','issues','code','displayName','vendor','lotVendor','baseQty','inQty','outQty','finalQty','memo'],export:['issues','code','displayName','spec','unitType','finalQty','price','stockAmount','memo']};if(presets[type]){const show=new Set(presets[type]);cols=cols.map((c,i)=>({...c,visible:show.has(c.key)||c.required,order:show.has(c.key)?Array.from(show).indexOf(c.key)+1:(c.order||i+50)}))}state.tableColumns=normalizeTableColumns(cols);render()}
function bindEvents(){document.querySelectorAll('[data-file-role]').forEach(i=>i.addEventListener('change',e=>{const r=e.target.dataset.fileRole;state.files[r]=e.target.files[0]||null;state.rows=[];state.fileMeta=[];state.selectedRowIds=new Set();state.issueNav={currentKey:null,history:[],typeFilter:'ALL'};state.analyzedAt='';state.analysisTitle='분석 전';render()}));document.getElementById('runAnalysis')?.addEventListener('click',analyze);document.getElementById('resetAll')?.addEventListener('click',()=>{state.files={BASE:null,IN:null,OUT:null,COUNT_OR_RESTORE:null};state.rows=[];state.fileMeta=[];state.commands=[];state.selectedRowIds=new Set();state.issueNav={currentKey:null,history:[],typeFilter:'ALL'};state.analysisTitle='분석 전';state.analyzedAt='';render()});document.getElementById('openSettings')?.addEventListener('click',()=>{state.modal='settings';render()});document.getElementById('closeSettings')?.addEventListener('click',()=>{state.modal=null;render()});document.getElementById('presetDefault')?.addEventListener('click',()=>{state.tableColumns=normalizeTableColumns(DEFAULT_TABLE_COLUMNS);render()});document.getElementById('presetInspection')?.addEventListener('click',()=>applyColumnPreset('inspection'));document.getElementById('presetPrice')?.addEventListener('click',()=>applyColumnPreset('price'));document.getElementById('presetLot')?.addEventListener('click',()=>applyColumnPreset('lot'));document.getElementById('presetExport')?.addEventListener('click',()=>applyColumnPreset('export'));document.getElementById('resetColumns')?.addEventListener('click',()=>{state.tableColumns=normalizeTableColumns(DEFAULT_TABLE_COLUMNS);render()});document.getElementById('saveSettings')?.addEventListener('click',()=>{document.querySelectorAll('[data-map-key]').forEach(t=>state.mappings[t.dataset.mapKey]=t.value);document.querySelectorAll('[data-unit-rule]').forEach(t=>state.unitRules[t.dataset.unitRule]=t.value);state.grouping.priceMode=document.getElementById('priceMode').value;state.grouping.splitByVendor=document.getElementById('splitByVendor').checked;state.grouping.splitByDate=document.getElementById('splitByDate').checked;state.favoriteVendors=document.getElementById('favoriteVendors').value;state.exportOptions.includeSummary=document.getElementById('includeSummary').checked;state.exportOptions.includeCommandHistory=document.getElementById('includeCommandHistory').checked;state.shortcuts.nextIssue=document.getElementById('shortcutNext').value;state.shortcuts.prevIssue=document.getElementById('shortcutPrev').value;state.shortcuts.offset=document.getElementById('shortcutOffset').value;state.shortcuts.exportExcel=document.getElementById('shortcutExport').value;const cols=normalizeTableColumns(state.tableColumns).map(c=>({...c,visible:document.querySelector(`[data-col-visible=\"${c.key}\"]`)?.checked||c.required,label:document.querySelector(`[data-col-label=\"${c.key}\"]`)?.value||c.label,editable:document.querySelector(`[data-col-editable=\"${c.key}\"]`)?.checked||false,pinned:document.querySelector(`[data-col-pinned=\"${c.key}\"]`)?.checked||false,width:parseNumber(document.querySelector(`[data-col-width=\"${c.key}\"]`)?.value)||c.width,order:parseNumber(document.querySelector(`[data-col-order=\"${c.key}\"]`)?.value)||c.order}));state.tableColumns=normalizeTableColumns(cols);saveSettings();state.modal=null;render()});document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{state.activeMode=b.dataset.mode;render()}));document.querySelectorAll('[data-collect-issue]').forEach(b=>b.addEventListener('click',()=>collectIssue(b.dataset.collectIssue)));document.querySelectorAll('[data-jump-issue]').forEach(b=>b.addEventListener('click',()=>jumpToIssue(b.dataset.jumpIssue)));document.getElementById('nextIssueBtn')?.addEventListener('click',()=>navigateIssue(1));document.getElementById('prevIssueBtn')?.addEventListener('click',()=>navigateIssue(-1));document.getElementById('clearIssueNavBtn')?.addEventListener('click',()=>{state.issueNav.currentKey=null;render()}); document.getElementById('searchInput')?.addEventListener('input',e=>{state.filters.search=e.target.value;render()});document.querySelectorAll('[data-category]').forEach(b=>b.addEventListener('click',()=>{state.filters.category=b.dataset.category;render()}));document.getElementById('favToggle')?.addEventListener('click',()=>{state.filters.favoriteOnly=!state.filters.favoriteOnly;render()});document.querySelectorAll('[data-unit]').forEach(b=>b.addEventListener('click',()=>{const u=b.dataset.unit;state.filters.unit[u]=!state.filters.unit[u];render()}));document.getElementById('issueOnly')?.addEventListener('click',()=>{state.filters.issueOnly=!state.filters.issueOnly;if(!state.filters.issueOnly)state.filters.issueType='ALL';render()});document.querySelectorAll('[data-sort]').forEach(b=>b.addEventListener('click',()=>{state.sortMode=b.dataset.sort;render()}));document.querySelectorAll('[data-select-row]').forEach(ch=>ch.addEventListener('change',e=>toggleSelect(e.target.dataset.selectRow,e.target.checked)));document.getElementById('offsetBtn')?.addEventListener('click',executeOffsetCommand);document.getElementById('salesMoveBtn')?.addEventListener('click',executeSalesMoveCommand);document.querySelectorAll('[data-edit-row]').forEach(inp=>inp.addEventListener('change',e=>updateRow(e.target.dataset.editRow,e.target.dataset.field,e.target.value)));window.onkeydown=e=>{const tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();if(e.key==='Tab'&&state.rows.length&&!state.modal){e.preventDefault();navigateIssue(e.shiftKey?-1:1);return}if(e.code==='Space'&&!['input','textarea','select','button'].includes(tag)&&state.rows.length){e.preventDefault();executeOffsetCommand()}};document.querySelectorAll('[data-related-jump]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.relatedJump;state.filters.issueOnly=false;state.filters.search='';render();setTimeout(()=>scheduleFocus(id,'row'),20)}));document.querySelectorAll('[data-command-jump]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.commandJump;state.filters.issueOnly=false;state.filters.search='';render();setTimeout(()=>scheduleFocus(id,'row'),20)}));document.getElementById('exportBtn')?.addEventListener('click',exportWorkbook);document.getElementById('printBtn')?.addEventListener('click',printView)}
render();
})();
</script></body></html>
