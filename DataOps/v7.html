<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp DataOps - 핵심 수불부 관리 (v7 Engine)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        // --- 데이터 정제(Sanitization) 유틸리티 ---
        const safeNum = (val) => {
            const n = Number(val);
            return isNaN(n) || !isFinite(n) ? 0 : n;
        };

        const safeStr = (val, fallback = '') => {
            if (val === null || val === undefined) return fallback;
            const s = String(val).trim();
            const lower = s.toLowerCase();
            if (lower === 'undefined' || lower === 'nan' || lower === 'null' || lower === '') return fallback;
            return s;
        };

        // --- 공통 유틸리티 ---
        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const extractDateFromName = (filename) => {
            if (!filename) return 0;
            const match8 = filename.match(/20\d{6}/); 
            if (match8) return parseInt(match8[0], 10);
            const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); 
            if (match6) return parseInt('20' + match6[1], 10);
            return 0;
        };

        const addOneDay = (dateNum) => {
            if (!dateNum) return 0;
            const y = Math.floor(dateNum / 10000);
            const m = Math.floor((dateNum % 10000) / 100) - 1;
            const d = dateNum % 100;
            const date = new Date(y, m, d + 1);
            return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
        };

        const formatItemDate = (dateStr, refYear) => {
            if (!dateStr) return 0;
            const str = String(dateStr).trim();
            if (str.includes('실사등록') || str.includes('미지정')) return 0; 
            if (/^\d{5}$/.test(str)) {
                const serial = parseInt(str, 10);
                if (serial > 30000 && serial < 80000) {
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                    return parseInt(`${y}${m}${d}`, 10);
                }
            }
            const parts = str.match(/\d+/g);
            if (!parts) return 0;
            let y, m, d;
            if (parts.length >= 3) {
                y = parts[0]; if (y.length === 2) y = '20' + y;
                m = parts[1].padStart(2, '0'); d = parts[2].padStart(2, '0');
            } else if (parts.length === 2) {
                if (parts[0].length === 4) { y = parts[0]; m = parts[1].padStart(2, '0'); d = '01'; }
                else { y = String(refYear); m = parts[0].padStart(2, '0'); d = parts[1].padStart(2, '0'); }
            } else if (parts.length === 1) {
                const cleaned = parts[0];
                if (cleaned.length === 8) { y = cleaned.substring(0, 4); m = cleaned.substring(4, 6); d = cleaned.substring(6, 8); }
                else if (cleaned.length === 6) {
                    if (cleaned.startsWith('20')) { y = cleaned.substring(0, 4); m = cleaned.substring(4, 6); d = '01'; }
                    else { y = '20' + cleaned.substring(0, 2); m = cleaned.substring(2, 4); d = cleaned.substring(4, 6); }
                } else { return 0; }
            } else { return 0; }
            const numY = parseInt(y, 10); const numM = parseInt(m, 10); const numD = parseInt(d, 10);
            if (numY > 2000 && numY < 2100 && numM >= 1 && numM <= 12 && numD >= 1 && numD <= 31) {
                return numY * 10000 + numM * 100 + numD;
            }
            return 0;
        };

        const formatStrForPeriod = (num) => {
            const s = String(num);
            if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
            if (s.length === 6) return `${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`;
            return s;
        };

        // --- V2.0 역방향 파싱 ---
        const parseIssuesAndVendors = (str, price) => {
            if (!str) return { issues: [], vendors: {} };
            const parts = str.match(/[^,]+(?:\([^)]+\))*/g) || [];
            const issues = [];
            const vendors = {};
            const knownIssues = ['과다로스', '원가수정', '수기조정', '매입내역 없음', '전산 재고 부족', '재고 부족', '변동됨', '변경됨', '삭제됨', '신규추가', '수량변동', '단가변경', '매치변경', '원가추출됨', '원가추출', '단가없음', '🔄', '🚨', '✅'];

            parts.forEach(p => {
                const part = p.trim();
                if (!part) return;
                let isKnownIssue = knownIssues.some(ki => part.includes(ki));
                if (isKnownIssue) {
                    issues.push(part);
                } else {
                    const match = part.match(/(.+)\((\d+)\)$/);
                    if (match) {
                        const vendorName = safeStr(match[1], '미지정');
                        const qty = parseInt(match[2], 10);
                        if (!isNaN(qty)) vendors[vendorName] = { qty, rev: qty * price, cogs: qty * price };
                        else issues.push(part);
                    } else {
                        issues.push(part);
                    }
                }
            });
            return { issues, vendors };
        };

        // --- 엑셀 파서 ---
        const parseExcelData = (file, currentMappings) => {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const processWorkbook = (wb) => {
                            const sheet = wb.Sheets[wb.SheetNames[0]];
                            const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                            let headerRowIdx = -1; let maxScore = 0;
                            const keywords = {
                                code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                matchVendor: currentMappings.matchVendor ? currentMappings.matchVendor.split(',').map(s => s.trim().toLowerCase()) : [], 
                                spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                            };

                            for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                const row = jsonAll[i] || []; let score = 0;
                                const rowStr = row.join('').replace(/\s/g, '');
                                if (!rowStr) continue;
                                Object.values(keywords).forEach(kwList => {
                                    if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                });
                                if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                            }
                            return { jsonAll, headerRowIdx, maxScore, keywords };
                        };

                        let wb = XLSX.read(data, { type: 'array' });
                        let { jsonAll, headerRowIdx, maxScore, keywords } = processWorkbook(wb);

                        if (maxScore < 2) {
                            try {
                                const text = new TextDecoder('euc-kr').decode(data);
                                const wb2 = XLSX.read(text, { type: 'string' });
                                const res2 = processWorkbook(wb2);
                                if (res2.maxScore > maxScore) { jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; keywords = res2.keywords; }
                            } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                        }
                        if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                        const rawHeaders = jsonAll[headerRowIdx];
                        const uniqueHeaders = []; const headerCounts = {};
                        for (let j = 0; j < rawHeaders.length; j++) {
                            let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                            if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                            uniqueHeaders.push(h);
                        }

                        const parsedData = [];
                        
                        const getValByKeywords = (obj, kwList) => {
                            const keys = Object.keys(obj);
                            const cleanKeys = keys.map(k => k.replace(/\s/g, '').toLowerCase());
                            
                            for (let kw of kwList) {
                                if (!kw) continue;
                                const idx = cleanKeys.indexOf(kw);
                                if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') {
                                    return obj[keys[idx]];
                                }
                            }
                            for (let kw of kwList) {
                                if (!kw) continue;
                                const idx = cleanKeys.findIndex(k => k.includes(kw));
                                if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') {
                                    return obj[keys[idx]];
                                }
                            }
                            return null;
                        };

                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i];
                            if (!row || row.join('').trim() === '') continue;
                            const rowObj = {};
                            uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                            
                            const codeRaw = getValByKeywords(rowObj, keywords.code);
                            const codeStr = safeStr(codeRaw, '');
                            const baseNameRaw = getValByKeywords(rowObj, keywords.name);
                            const baseName = safeStr(baseNameRaw, '');

                            if (!codeStr && !baseName) continue;
                            if (codeStr.includes('합계') || codeStr.includes('총계') || baseName.includes('합계') || baseName.includes('총계') || baseName.includes('총합')) continue;
                            if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(codeStr) || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(baseName)) continue;
                            if (codeStr.includes('오전') || codeStr.includes('오후') || baseName.includes('오전') || baseName.includes('오후')) continue;
                            if (codeStr.includes('실사등록') || baseName.includes('실사등록')) continue;
                            if (codeStr.includes('기록없음') || baseName.includes('기록없음')) continue;

                            const specValRaw = getValByKeywords(rowObj, keywords.spec);
                            const specVal = safeStr(specValRaw, '');
                            let fullName = baseName || '이름없음';
                            if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                            const finalCode = codeStr || 'NO_CODE';

                            const normObj = {
                                코드: finalCode,
                                품명: fullName,
                                수량: parseNumber(getValByKeywords(rowObj, keywords.qty)),
                                단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                거래처: safeStr(getValByKeywords(rowObj, keywords.vendor), '미지정'),
                                매입처매칭: safeStr(getValByKeywords(rowObj, keywords.matchVendor), ''),
                                일자: safeStr(getValByKeywords(rowObj, keywords.date), ''),
                                메모: '', 
                                _raw: rowObj 
                            };
                            parsedData.push(normObj);
                        }
                        resolve(parsedData);
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
            matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', 
            excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플' 
        };

        // --- UI 컴포넌트 ---
        const ProductRow = React.memo(({ item, idx, isLinked, isActiveMulti, isMultiGroupItem, targetDateStr, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            
            const totalAvailable = item.기초 + item.입고 + item.대체입고;
            if (item.로스 < 0 && totalAvailable > 0 && (Math.abs(item.로스) / totalAvailable) > 0.2) displayIssues.push('🚨과다로스(20%↑)');
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;
            const isToday = item.일자 && targetDateStr && item.일자 === targetDateStr;

            const handleKd = (e, type) => {
                const cols = ['price-input', 'base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') { if (colIdx < cols.length - 1) { e.preventDefault(); const n = document.getElementById(`${cols[colIdx+1]}-${idx}`); if(n) { n.focus(); n.select(); } } }
                else if (e.key === 'ArrowLeft') { if (colIdx > 0) { e.preventDefault(); const p = document.getElementById(`${cols[colIdx-1]}-${idx}`); if(p) { p.focus(); p.select(); } } }
                else if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); const n = document.getElementById(`${type}-${idx+1}`); if(n) { n.focus(); n.select(); } }
                else if (e.key === 'ArrowUp') { e.preventDefault(); const p = document.getElementById(`${type}-${idx-1}`); if(p) { p.focus(); p.select(); } }
                else if (e.key === ' ' || e.code === 'Space') { if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragOver(false); };
            const handleDrop = (e) => {
                e.preventDefault(); setIsDragOver(false);
                try {
                    const dataStr = e.dataTransfer.getData('text/plain');
                    if (!dataStr) return;
                    const data = JSON.parse(dataStr);
                    if (data.sourceKey !== item.batchKey) onSalesMove(data.sourceKey, item.batchKey, data.vendor, data.qty, data.code, item.코드);
                } catch (err) {}
            };

            const cellInputBase = "w-full text-right bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none rounded text-[13px] px-1.5 py-1 transition-all shadow-sm";
            
            return (
                <tr 
                    data-code={item.코드} data-batch={item.batchKey} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
                    className={`transition duration-200 ${isActiveMulti ? 'bg-blue-50/60 outline outline-2 outline-blue-500 z-20 relative shadow-md' : (isLinked ? 'bg-slate-50 ring-1 ring-blue-400 shadow-md relative z-10 scale-[1.01]' : 'border-b border-slate-100 hover:bg-slate-50')} ${isDragOver ? 'bg-blue-50 outline outline-2 outline-blue-400 scale-[1.01] z-20 shadow-md' : ''} ${!isActiveMulti && item.isDummy && item.단가 === 0 ? 'bg-rose-50/30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.03)] border-r border-slate-200 ${isMultiGroupItem && !isLinked ? 'border-l-4 border-l-blue-400' : ''} ${isLinked ? 'bg-blue-50/50 border-l-4 border-l-blue-600' : ''} ${isActiveMulti ? 'bg-blue-50/60' : (item.isDummy && item.단가 === 0 ? 'bg-rose-50' : 'bg-white group-hover:bg-slate-50')}`}>
                        <div className="flex items-center justify-between w-full">
                            <div className="flex flex-col justify-center flex-1 pr-3 overflow-hidden max-w-[280px]">
                                <div className="font-semibold text-slate-800 text-[13px] flex items-start gap-1 mb-0.5">
                                    {isLinked && <i className="fas fa-link text-blue-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    {isActiveMulti && <i className="fas fa-tags text-blue-500 mr-1 mt-0.5"></i>}
                                    <span title={item.품명} className="truncate leading-tight text-slate-900">{item.품명}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 truncate font-medium tracking-tight flex items-center">
                                    {item.코드 !== '-' && item.코드 !== 'NO_CODE' ? <span className="mr-1">{item.코드}</span> : ''}
                                    <span className={isToday ? "text-blue-700 bg-blue-100 px-1 rounded border border-blue-200 font-bold" : ""}>{item.일자 || '미상'}</span>
                                    <span className="mx-1 text-slate-300">|</span> 
                                    <span className={`truncate ${isToday ? 'text-blue-700 font-bold' : ''}`}>{item.거래처 || '미지정'}</span>
                                    {item.대체입고 > 0 && <span className="text-[9px] text-blue-500 font-semibold whitespace-nowrap ml-1 shrink-0">(조정됨)</span>}
                                </div>
                            </div>
                            <div className="flex items-center justify-end shrink-0 pl-3 border-l border-slate-200">
                                <span className="text-slate-400 font-semibold text-[10px] mr-1">₩</span>
                                <input id={`price-input-${idx}`} type="number" className={`${cellInputBase} w-[70px] font-bold ${item.단가 === 0 ? 'border-rose-300 bg-rose-50 text-rose-600' : 'text-slate-800'}`} value={item.단가 === 0 ? '' : item.단가} onChange={(e) => onBaseDataChange(item.batchKey, '단가', e.target.value)} onClick={(e) => e.stopPropagation()} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'price-input')} placeholder="0" title="원가(단가) 수기 수정" />
                            </div>
                        </div>
                    </td>
                    <td className={`py-2 px-2 text-right ${isActiveMulti ? 'bg-slate-50/50' : ''} border-r border-slate-100`}>

        }, (prevProps, nextProps) => prevProps.item === nextProps.item && prevProps.isLinked === nextProps.isLinked && prevProps.idx === nextProps.idx && prevProps.isActiveMulti === nextProps.isActiveMulti && prevProps.isMultiGroupItem === nextProps.isMultiGroupItem && prevProps.targetDateStr === nextProps.targetDateStr);

        // V4.5: 가변형 UI FileBox (isCompact 분기 부활)
        const FileBox = React.memo(({ title, type, icon, files, setFiles, autoAssignFiles, isCompact }) => {
            const inputRef = useRef(null);

            const handleOnChange = (e) => {
                const selectedFiles = Array.from(e.target.files);

            if (isCompact) {

                return (

                        <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                        <div className="flex items-center gap-2.5 overflow-hidden w-full">

                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // 기본 대형 UI
            const baseClasses = `relative border-[3px] rounded-2xl transition-all cursor-pointer flex flex-col items-center justify-center min-h-[140px] z-10 p-5 text-center`;
            const activeClasses = files[type] ? 'border-blue-400 bg-blue-50/50 border-solid shadow-sm' : 'border-slate-300 bg-white border-dashed hover:border-slate-400 hover:bg-slate-50 shadow-sm';
            const dragClasses = isDragging ? 'border-blue-500 bg-blue-100 border-dashed scale-[1.02] shadow-md' : '';

            return (
                <div className={`${baseClasses} ${activeClasses} ${dragClasses}`} onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} onDrop={handleBoxDrop} onClick={() => inputRef.current.click()}>
                    <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                    <i className={`fas ${icon} text-4xl mb-3 ${files[type] ? 'text-blue-600' : 'text-slate-300'}`}></i>
                    <div className="font-black text-[16px] text-slate-800 tracking-tight">{title}</div>
                    <div className="text-[13px] font-bold text-slate-500 mt-1.5 w-full px-1 break-all line-clamp-2 leading-relaxed">
                        {files[type] ? <span className="text-blue-700 font-extrabold">{files[type].name}</span> : '클릭하거나 드래그하여 파일을 올려주세요'}
                    </div>
                </div>
            );
        });

        // --- Main App Component ---
        function App() {
            const [appStep, setAppStep] = useState('upload'); 
            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });
            const [filters, setFilters] = useState({ issuesOnly: false, excludeZeroActual: false, search: '', reviewType: null });
            const [activeIssueMode, setActiveIssueMode] = useState(null); 
            const [activeMultiCode, setActiveMultiCode] = useState(null);
            const [ackMultiCodes, setAckMultiCodes] = useState(new Set());
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [alertMsg, setAlertMsg] = useState('');
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, warnings: [], payload: null });
            const [showSettings, setShowSettings] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);
            const [undoUi, setUndoUi] = useState({ state: 'closed' });
            const [substHistory, setSubstHistory] = useState([]);
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [targetDateStr, setTargetDateStr] = useState('');
            const [productData, setProductData] = useState([]);
            const [analysisPeriod, setAnalysisPeriod] = useState('전체 기간');

            const currentIssueIdxRef = useRef(-1);
            const focusedInputRef = useRef({ key: null, idx: -1 });
            const activeIssueModeRef = useRef(null);

            // V4.1: 원가 추출 모드 활성화 조건
            const isCostExtractionMode = !files.prev && files.in && !files.out && files.end;

            // V4.1: 터미널 스마트 메시지 생성
            const terminalMessage = useMemo(() => {
                if (isProcessing) return "processing data_blocks...";
                if (isCostExtractionMode) return "cost_extraction_mode ready... (초기 셋업: 우측 버튼을 클릭하세요)";
                if (files.end && !files.in && !files.out && !files.prev) return "smart_restore_mode ready... (마감 복원: Enter)";
                if (files.in || files.out || files.prev || files.end) return "cross_validation_mode ready... (교차 검증: Enter)";
                return "waiting for data_blocks... (파일을 업로드하세요)";
            }, [files, isProcessing, isCostExtractionMode]);

            useEffect(() => {
                activeIssueModeRef.current = activeIssueMode;
            }, [activeIssueMode]);

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('inventoryMappingsLight');
                return saved ? JSON.parse(saved) : defaultMappings;
            });
            const saveMappings = () => { localStorage.setItem('inventoryMappingsLight', JSON.stringify(mappings)); setShowSettings(false); };

            const priceOptionsMap = useMemo(() => {
                const map = {};
                productData.forEach(p => {
                    if (!map[p.코드]) map[p.코드] = new Set();
                    if (p.단가 > 0 && !p.isDummy) map[p.코드].add(p.단가);
                });
                const result = {};
                for(let code in map) { result[code] = Array.from(map[code]); }
                return result;
            }, [productData]);

            const multiPriceCodes = useMemo(() => {
                const codes = new Set();
                productData.forEach(p => {
                    if (priceOptionsMap[p.코드] && priceOptionsMap[p.코드].length >= 2 && p.출고 > 0) codes.add(p.코드);
                });
                return Array.from(codes);
            }, [productData, priceOptionsMap]);

            // V3.5: 3대 카드 카운팅 로직 전면 개편
            const closingStats = useMemo(() => {
                let missingPriceCount = 0, totalMissingPriceCount = 0;
                let lossCount = 0, totalLossCount = 0;
                let matchCount = 0, totalMatchCount = 0;
                let totalRevenue = 0, totalInventoryAsset = 0, totalLossValue = 0;
                
                let multiPriceSet = new Set(multiPriceCodes);
                
                productData.forEach(p => {
                    // 1. 단가 검증 카운트 (0원 이거나 단가변경/단가없음 알림이 있는 항목)
                    const hasPriceTotal = (p.isDummy && p.단가 === 0) || (p.이슈 && p.이슈.some(i => i.includes('단가변경') || i.includes('단가없음')));
                    const hasPriceUnresolved = (!p.수기확인완료 && p.isDummy && p.단가 === 0) || (p.이슈 && p.이슈.some(i => i.includes('🚨단가변경') || i.includes('🚨단가없음')));
                    if (hasPriceTotal) totalMissingPriceCount++;
                    if (hasPriceUnresolved) missingPriceCount++;

                    // 2. 재고 오차 확인 카운트 (로스발생이거나 수량/추가/삭제 알림이 있는 항목)
                    const hasQtyTotal = p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0) || (p.이슈 && p.이슈.some(i => i.includes('수량변동') || i.includes('신규추가') || i.includes('삭제됨')));
                    const hasQtyUnresolved = (!p.수기확인완료 && (p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0))) || (p.이슈 && p.이슈.some(i => i.includes('🚨수량변동') || i.includes('🚨신규추가') || i.includes('🚨삭제됨')));
                    if (hasQtyTotal) totalLossCount++;
                    if (hasQtyUnresolved) lossCount++;

                    // 3. Lot 매치 카운트 (다중단가 그룹이거나 매치변경 알림이 있는 항목)
                    const isMultiPriceItem = multiPriceSet.has(p.코드);
                    const hasMatchTotal = (p.이슈 && p.이슈.some(i => i.includes('매치변경'))) || isMultiPriceItem;
                    const hasMatchUnresolved = (p.이슈 && p.이슈.some(i => i.includes('🚨매치변경'))) || (isMultiPriceItem && !ackMultiCodes.has(p.코드));
                    if (hasMatchTotal) totalMatchCount++;
                    if (hasMatchUnresolved) matchCount++;

                    // Financials
                    totalRevenue += (Number(p.매출액) || 0);
                    const actualQty = p.실사 === '' || p.실사 === null ? 0 : Number(p.실사);
                    const price = Number(p.단가) || 0;
                    totalInventoryAsset += (actualQty * price);
                    if (p.로스 !== 0) totalLossValue += Math.abs(Number(p.로스) * price);
                });
                
                return { missingPriceCount, totalMissingPriceCount, lossCount, totalLossCount, multiPriceCount: matchCount, totalMultiPriceCount: totalMatchCount, totalRevenue, totalInventoryAsset, totalLossValue, total: productData.length };
            }, [productData, multiPriceCodes, ackMultiCodes]);

            const handleFocusInput = useCallback((key, idx) => { focusedInputRef.current = { key, idx }; }, []);

            const autoAssignFiles = useCallback((fileArray) => {
                setFiles(prev => {
                    let updated = { ...prev };
                    const stockCandidates = [];
                    fileArray.forEach(file => {
                        const name = file.name.toLowerCase();
                        if (name.includes('구매') || name.includes('매입') || name.includes('입고')) updated.in = file;
                        else if (name.includes('판매') || name.includes('매출') || name.includes('출고')) updated.out = file;
                        else stockCandidates.push(file);
                    });
                    if (stockCandidates.length > 0) {
                        stockCandidates.sort((a, b) => extractDateFromName(a.name) - extractDateFromName(b.name));
                        if (stockCandidates.length === 1) {
                            const name = stockCandidates[0].name.toLowerCase();
                            if (name.includes('기말') || name.includes('실사') || name.includes('마감')) updated.end = stockCandidates[0];
                            else updated.prev = stockCandidates[0]; 
                        } else {
                            updated.prev = stockCandidates[0]; updated.end = stockCandidates[stockCandidates.length - 1];
                        }
                    }
                    return updated;
                });
            }, []);

            const handleGlobalDrop = useCallback((e) => {
                e.preventDefault(); setIsGlobalDragging(false);
                const droppedFiles = Array.from(e.dataTransfer.files);
                if (droppedFiles.length > 0) autoAssignFiles(droppedFiles);
                window.focus(); 
            }, [autoAssignFiles]);

            const handleResetFiles = useCallback(() => {
                setFiles({ prev: null, in: null, out: null, end: null });
                setProductData([]); setAnalysisPeriod('전체 기간'); setSubstHistory([]); setUndoUi({ state: 'closed' });
                setLinkSourceKey(null); setActiveIssueMode(null); setAckMultiCodes(new Set()); setActiveMultiCode(null);
                currentIssueIdxRef.current = -1; focusedInputRef.current = { key: null, idx: -1 };
                setFilters({ issuesOnly: false, excludeZeroActual: false, search: '', reviewType: null });
                setError(''); setAppStep('upload');
                document.querySelectorAll('input[type="file"]').forEach(input => input.value = '');
            }, []);

            const handleSaveMemo = useCallback((batchKey, text) => {
                setProductData(prev => prev.map(item => item.batchKey === batchKey ? { ...item, 메모: text } : item));
            }, []);

            const handleBaseDataChange = useCallback((batchKey, field, val) => {
                const numVal = val === '' ? 0 : Number(val);
                setProductData(prevP => {
                    return prevP.map(item => {
                        if (item.batchKey === batchKey) {
                            const newItem = { ...item, [field]: numVal, 수기확인완료: true };
                            if (field === '단가') {
                                let newIssues = [...newItem.이슈].filter(msg => msg !== '원가수정(수기)' && msg !== '원가수정(실사반영)' && !msg.includes('🚨'));
                                if (numVal !== item._orig?.단가) newIssues.push('원가수정(수기)');
                                newItem.이슈 = newIssues.map(msg => msg.replace(/🚨/g, '✅')).filter(msg => msg !== '매입내역 없음'); return newItem;
                            }
                            newItem.전산잔량 = newItem.기초 + newItem.입고 + newItem.대체입고 - newItem.출고 - newItem.대체출고;
                            newItem.실사 = newItem.전산잔량; newItem.로스 = 0;
                            let newIssues = [...newItem.이슈].filter(msg => msg !== '장부 수기조정' && !msg.includes('🚨'));
                            const isBaseChanged = newItem.기초 !== (newItem._orig?.기초 || 0) || newItem.입고 !== (newItem._orig?.입고 || 0) || newItem.출고 !== (newItem._orig?.출고 || 0);
                            if (isBaseChanged) newIssues.push('장부 수기조정');
                            newItem.이슈 = newIssues.map(msg => msg.replace(/🚨/g, '✅'));
                            return newItem;
                        }
                        return item;
                    });
                });
            }, []);

            const handleManualStockChange = useCallback((batchKey, val) => {
                setProductData(prev => prev.map(item => {
                    if (item.batchKey === batchKey) {
                        const newActual = val === '' ? '' : Number(val);
                        const lossCalcVal = val === '' ? 0 : Number(val);
                        const newLoss = lossCalcVal - item.전산잔량;
                        let newIssues = [...item.이슈].filter(msg => msg !== '실사 수기조정');
                        
                        // 수동 변경 시 기존 🚨 알림들을 ✅ 로 변경 (수기 확인 완료 처리)
                        newIssues = newIssues.map(msg => msg.replace(/🚨/g, '✅'));
                        if (val !== '' && newLoss !== 0) newIssues.push('실사 수기조정');
                        
                        return { ...item, 실사: newActual, 로스: newLoss, 이슈: newIssues, 수기확인완료: true }; 
                    }
                    return item;
                }));
            }, []);

            const handleUndoAction = useCallback((historyItem) => {

            const runCostExtraction = useCallback(async () => {

                        }
                    });

                    // V4.1: 필터링 추가 보완
                    const finalProductData = Object.values(pData)
                        .filter(item => !(item.기초 === 0 && item.입고 === 0 && item.출고 === 0 && item.실사 === 0 && item.로스 === 0))
                        .sort((a, b) => a.품명.localeCompare(b.품명));
                        
                    setProductData(finalProductData);
                    setAppStep('closing');

                    setTimeout(() => { 
                        setAlertMsg("✨ [초기 재고 셋업 (선입선출 모드)]\n\n현재 물리 재고(4번)를 장기간 매입 내역(2번)을 바탕으로 선입선출(최신순)로 분할하여 정확한 자산화 데이터를 추출했습니다.\n\n이 상태로 '마감 엑셀 다운로드(F8)'를 하시면, 내일의 1번(기초 재고) 파일로 완벽하게 작동합니다."); 
                    }, 800);

                } catch (err) {
                    setAlertMsg('원가 추출 중 오류가 발생했습니다. 엑셀 파일 형식을 확인해주세요.');
                    console.error(err);
                } finally {
                    setIsProcessing(false);
                }
            }, [files, mappings]);

            const executeAnalysis = useCallback((payload) => {
                setIsProcessing(true); setConfirmModal({ isOpen: false, warnings: [], payload: null });
                try {
                    const { parsedPrev, parsedIn, parsedOut, parsedEnd, periodStr, targetDateStrFromData } = payload;
                    setAnalysisPeriod(periodStr); setTargetDateStr(targetDateStrFromData); 
                    
                    const isClosingItem = (item) => item._raw && ('로스/조정수량' in item._raw || '기초수량' in item._raw || '기말실사(이월수량)' in item._raw);
                    
                    // [버그 픽스] 1번 기초재고 파일은 '수불마감' 파일일 확률이 높으므로 isClosingItem 필터에서 제외하지 않음
                    const prevItems = parsedPrev; 
                    const inItems = parsedIn.filter(item => !isClosingItem(item));
                    const outItems = parsedOut.filter(item => !isClosingItem(item));
                    const closingEndItems = parsedEnd.filter(isClosingItem);

                    const hasPrevData = prevItems.length > 0;
                    const hasInRawData = inItems.length > 0;
                    const hasOutRawData = outItems.length > 0;
                    const hasClosingEnd = closingEndItems.length > 0;

                    // V4.1 핵심: 4번 마감파일만 단독으로 올렸을 때 "순수 복원 모드"로 직행 (식별자 붕괴 해결)
                    const isOnlyClosingRestore = !hasPrevData && !hasInRawData && !hasOutRawData && hasClosingEnd;

                    // V4.6: 일자(Date)로 인한 중복 분리 생성 방지용 BatchKey 제너레이터
                    const generateBatchKey = (code, name, price) => {
                        const actualCode = String(code || 'NO_CODE');
                        return actualCode === 'NO_CODE' ? `NO_CODE|${name}|${price}` : `${actualCode}|${price}`;
                    };

                    let pData = {}; 
                    let autoAckCodes = new Set();
                    
                    if (isOnlyClosingRestore) {
                        closingEndItems.forEach(item => {
                            const code = String(item.코드 || item._raw['상품코드'] || 'NO_CODE');
                            const price = parseNumber(item._raw['매입단가(원가)'] !== undefined ? item._raw['매입단가(원가)'] : item.단가);
                            const date = String(item.일자 || targetDateStrFromData);
                            const name = item._raw['상품명(규격)'] || item.품명;
                            const batchKey = generateBatchKey(code, name, price);

                            const { issues, vendors } = parseIssuesAndVendors(item._raw['이슈/결과'] || '', price);
                            let actualQty = item.수량;
                            if (item._raw['기말실사(이월수량)'] !== undefined) actualQty = parseNumber(item._raw['기말실사(이월수량)']);
                            else if (item._raw['기말실사'] !== undefined) actualQty = parseNumber(item._raw['기말실사']);

                            let tRev = 0, tCogs = 0;
                            Object.values(vendors).forEach(v => { tRev += v.rev; tCogs += v.cogs; });

                            if (!pData[batchKey]) {
                                pData[batchKey] = {
                                    batchKey, 코드: code, 품명: name, 단가: price, 일자: date, 거래처: item._raw['매입처(Lot)'] || '이전 마감자료',
                                    기초: parseNumber(item._raw['기초수량']), 입고: parseNumber(item._raw['입고수량']), 출고: parseNumber(item._raw['출고량']),
                                    대체입고: 0, 대체출고: 0, 전산잔량: parseNumber(item._raw['기초수량']) + parseNumber(item._raw['입고수량']) - parseNumber(item._raw['출고량']),
                                    실사: actualQty, 로스: parseNumber(item._raw['로스/조정수량']),
                                    매출액: tRev, 매출원가: tCogs, 메모: item._raw['수기메모'] || '',
                                    이슈: issues.filter(i => !i.includes('🚨')), // 알림은 해제된 상태로 100% 복원
                                    출고내역: vendors, _orig: {기초: parseNumber(item._raw['기초수량']), 입고: parseNumber(item._raw['입고수량']), 출고: parseNumber(item._raw['출고량']), 단가: price},
                                    isDummy: (!code || code === 'NO_CODE'), 수기확인완료: true
                                };
                            } else {
                                pData[batchKey].기초 += parseNumber(item._raw['기초수량']);
                                pData[batchKey].입고 += parseNumber(item._raw['입고수량']);
                                pData[batchKey].출고 += parseNumber(item._raw['출고량']);
                            }
                        });
                    } else {
                        // 데이터 교차 검증 모드 (1,2,3 번 전표가 섞여 들어왔을 때)
                        let codePriceTotals = {};
                        const oldMap = {}; 

                        if (hasClosingEnd) {
                            closingEndItems.forEach(item => {
                                const code = String(item.코드 || item._raw['상품코드'] || 'NO_CODE');
                                const price = parseNumber(item._raw['매입단가(원가)'] !== undefined ? item._raw['매입단가(원가)'] : item.단가);
                                const date = String(item.일자 || targetDateStrFromData);
                                const name = item._raw['상품명(규격)'] || item.품명;
                                const batchKey = generateBatchKey(code, name, price);
                                
                                if (!oldMap[batchKey]) {
                                    const { issues, vendors } = parseIssuesAndVendors(item._raw['이슈/결과'] || '', price);
                                    let actualQty = item.수량;
                                    if (item._raw['기말실사(이월수량)'] !== undefined) actualQty = parseNumber(item._raw['기말실사(이월수량)']);
                                    else if (item._raw['기말실사'] !== undefined) actualQty = parseNumber(item._raw['기말실사']);

                                    oldMap[batchKey] = {
                                        batchKey, 
                                        기초: parseNumber(item._raw['기초수량']), 입고: parseNumber(item._raw['입고수량']), 출고: parseNumber(item._raw['출고량']),
                                        실사: actualQty, 로스: parseNumber(item._raw['로스/조정수량']), 메모: item._raw['수기메모'] || '',
                                        issues, vendors, 품명: name, 코드: code, 단가: price, 일자: date, 거래처: item._raw['매입처(Lot)'] || '이전 마감자료', _processed: false
                                    };
                                } else {
                                    oldMap[batchKey].기초 += parseNumber(item._raw['기초수량']);
                                    oldMap[batchKey].입고 += parseNumber(item._raw['입고수량']);
                                    oldMap[batchKey].출고 += parseNumber(item._raw['출고량']);
                                }
                            });
                        }

                        const stockPool = {};
                        const excludeList = (mappings.excludeVendor || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s);
                        const isExcluded = (vendorName) => vendorName && excludeList.some(keyword => vendorName.toLowerCase().includes(keyword));

                        const addStockToTotals = (code, name, price, field, qty) => {
                            const key = generateBatchKey(code, name, price);
                            if (!codePriceTotals[key]) codePriceTotals[key] = { 기초: 0, 입고: 0, 출고: 0 };
                            codePriceTotals[key][field] += qty;
                        };

                        const addStock = (item, type, qtyToApply) => {
                            if (type === 'in' && isExcluded(item.거래처)) return;
                            const code = String(item.코드 || 'NO_CODE'); 
                            const price = parseNumber(item.단가); 
                            const date = String(item.일자 || '');
                            const name = item.품명;
                            const batchKey = generateBatchKey(code, name, price);
                            
                            if (!pData[batchKey]) {
                                pData[batchKey] = { 
                                    batchKey, 코드: code, 품명: name, 단가: price, 일자: date, 거래처: item.거래처 || (type === 'prev' ? '이월재고' : '미지정'),
                                    기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                    매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig: {기초:0, 입고:0, 출고:0, 단가: price}, 
                                    isDummy: (!code || code === 'NO_CODE'), 수기확인완료: false 
                                };
                            } else {
                                // 기존 행이 있으면 매입 데이터로 거래처와 일자 업데이트 (누적 정보 최신화)
                                if (type === 'in' && pData[batchKey].기초 > 0 && pData[batchKey].거래처 === '이월재고') {
                                    pData[batchKey].거래처 = item.거래처 || pData[batchKey].거래처;
                                    pData[batchKey].일자 = date || pData[batchKey].일자;
                                }
                            }
                            if (type === 'prev') { pData[batchKey].기초 += qtyToApply; addStockToTotals(code, name, price, '기초', qtyToApply); }
                            if (type === 'in') { pData[batchKey].입고 += qtyToApply; addStockToTotals(code, name, price, '입고', qtyToApply); }
                            
                            if (!stockPool[code]) stockPool[code] = { buckets: [] };
                            if (qtyToApply !== 0) stockPool[code].buckets.push({ batchKey, 단가: price, 일자: date, 수량: qtyToApply, 거래처: item.거래처 || (type === 'prev' ? '이월재고' : '미지정') });
                        };

                        if (hasPrevData) {
                            prevItems.forEach(item => {
                                let qty = item.수량;
                                if (isClosingItem(item)) {
                                    if (item._raw['기말실사(이월수량)'] !== undefined) qty = parseNumber(item._raw['기말실사(이월수량)']);
                                    else if (item._raw['기말실사'] !== undefined) qty = parseNumber(item._raw['기말실사']);
                                } else if (item._raw && item._raw['기초수량'] !== undefined) {
                                    qty = parseNumber(item._raw['기초수량']);
                                }
                                addStock(item, 'prev', qty);
                            });
                        } else if (hasClosingEnd) {
                            Object.values(oldMap).forEach(old => { if (old.기초 !== 0) addStock(old, 'prev', old.기초); });
                        }

                        if (hasInRawData) {
                            inItems.forEach(item => {
                                let qty = item.수량;
                                if (item._raw && item._raw['입고수량'] !== undefined) qty = parseNumber(item._raw['입고수량']);
                                addStock(item, 'in', qty);
                            });
                        } else if (hasClosingEnd) {
                            Object.values(oldMap).forEach(old => { if (old.입고 !== 0) addStock(old, 'in', old.입고); });
                        }

                        Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));

                        // --- 신규 추가 로직: 4번 파일에만 존재(조정 등)하여 stockPool에 없는 단가를 출고 매칭을 위해 강제 편입 ---
                        if (hasClosingEnd) {
                            Object.values(oldMap).forEach(old => {
                                if (old.코드 !== 'NO_CODE' && old.단가 > 0) {
                                    if (!stockPool[old.코드]) stockPool[old.코드] = { buckets: [] };
                                    const existingBucket = stockPool[old.코드].buckets.find(b => b.단가 === old.단가);
                                    if (!existingBucket) {
                                        if (!pData[old.batchKey]) {
                                            pData[old.batchKey] = { 
                                                batchKey: old.batchKey, 코드: old.코드, 품명: old.품명, 단가: old.단가, 일자: old.일자, 거래처: old.거래처 || '이전 마감자료',
                                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                                매출액: 0, 매출원가: 0, 메모: old.메모 || '', 이슈: [], 출고내역: {}, _orig: {기초:0, 입고:0, 출고:0, 단가: old.단가}, 
                                                isDummy: false, 수기확인완료: false 
                                            };
                                        }
                                        stockPool[old.코드].buckets.push({
                                            batchKey: old.batchKey, 단가: old.단가, 일자: old.일자 || targetDateStrFromData, 수량: 999999, 거래처: old.거래처 || '이전 마감자료(수정됨)'
                                        });
                                    } else {
                                        if (existingBucket.수량 <= 0) existingBucket.수량 = 999999;
                                    }
                                }
                            });
                            Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));
                        }
                        // -------------------------------------------------------------------------------------------------------

                        if (hasOutRawData) {
                            outItems.forEach(sale => { 
                                if (isExcluded(sale.거래처)) return;
                                const code = String(sale.코드 || 'NO_CODE'); 
                                let qtyToDeduct = parseNumber(sale.수량);
                                if (sale._raw && sale._raw['출고량'] !== undefined) qtyToDeduct = parseNumber(sale._raw['출고량']);

                                const pool = stockPool[code];
                                let revenue = 0; if (sale.단가 !== 0 && qtyToDeduct !== 0) revenue = qtyToDeduct * sale.단가;
                                let finalRevenue = revenue;
                                if (finalRevenue === 0 && sale._raw) {
                                    const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                                    for (let k of amtKeys) {
                                        const matchedKey = Object.keys(sale._raw).find(rk => rk.replace(/\s/g, '').includes(k));
                                        if (matchedKey && sale._raw[matchedKey] !== undefined && sale._raw[matchedKey] !== '') { finalRevenue = parseNumber(sale._raw[matchedKey]); break; }
                                    }
                                }
                                if (finalRevenue === 0 && sale.단가 !== 0 && qtyToDeduct === 0) finalRevenue = sale.단가;
                                
                                if (!pool || pool.buckets.length === 0) {
                                    const bKey = generateBatchKey(code, sale.품명, 0);
                                    if (!pData[bKey]) pData[bKey] = { 
                                        batchKey: bKey, 코드: code, 품명: sale.품명, 단가: 0, 일자: '', 거래처: '매입내역 없음', 
                                        기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                        매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig:{기초:0,입고:0,출고:0,단가:0}, 
                                        isDummy: true, 수기확인완료: false
                                    };
                                    pData[bKey].출고 += qtyToDeduct; pData[bKey].매출액 += finalRevenue;
                                    if (!pData[bKey].출고내역[sale.거래처]) pData[bKey].출고내역[sale.거래처] = {qty: 0, rev: 0, cogs: 0};
                                    pData[bKey].출고내역[sale.거래처].qty += qtyToDeduct; pData[bKey].출고내역[sale.거래처].rev += finalRevenue;
                                    
                                    addStockToTotals(code, sale.품명, 0, '출고', qtyToDeduct);
                                    return;
                                }

                                let remainingQty = qtyToDeduct;
                                const deductFromBucket = (bucket, take) => {
                                    const cogs = take * bucket.단가; const revShare = qtyToDeduct > 0 ? finalRevenue * (take / qtyToDeduct) : 0;
                                    bucket.수량 -= take; pData[bucket.batchKey].출고 += take; pData[bucket.batchKey].매출원가 += cogs; pData[bucket.batchKey].매출액 += revShare;
                                    if (!pData[bucket.batchKey].출고내역[sale.거래처]) pData[bucket.batchKey].출고내역[sale.거래처] = {qty: 0, rev: 0, cogs: 0};
                                    pData[bucket.batchKey].출고내역[sale.거래처].qty += take; pData[bucket.batchKey].출고내역[sale.거래처].rev += revShare; pData[bucket.batchKey].출고내역[sale.거래처].cogs += cogs;
                                    addStockToTotals(code, sale.품명, bucket.단가, '출고', take);
                                };

                                if (remainingQty < 0) deductFromBucket(pool.buckets[pool.buckets.length - 1], remainingQty);
                                else {
                                    let matchedBuckets = [];
                                    if (sale.매입처매칭 && sale.매입처매칭 !== '미지정') {
                                        const matchStr = sale.매입처매칭.replace(/\s/g, '').toLowerCase();
                                        pool.buckets.forEach(bucket => {
                                            const bVendorStr = String(bucket.거래처 || '').replace(/\s/g, '').toLowerCase();
                                            if (bVendorStr && matchStr && (bVendorStr.includes(matchStr) || matchStr.includes(bVendorStr))) matchedBuckets.push(bucket);
                                        });
                                    }
                                    if (matchedBuckets.length > 0) {
                                        for (let i = 0; i < matchedBuckets.length && remainingQty > 0; i++) {
                                            const bucket = matchedBuckets[i]; if (bucket.수량 <= 0) continue;
                                            const take = Math.min(bucket.수량, remainingQty); deductFromBucket(bucket, take); remainingQty -= take;
                                        }
                                        if (remainingQty > 0) { deductFromBucket(matchedBuckets[matchedBuckets.length - 1], remainingQty); remainingQty = 0; }
                                    } else {
                                        for (let i = 0; i < pool.buckets.length && remainingQty > 0; i++) {
                                            const bucket = pool.buckets[i]; if (bucket.수량 <= 0) continue;
                                            const take = Math.min(bucket.수량, remainingQty); deductFromBucket(bucket, take); remainingQty -= take;
                                        }
                                        if (remainingQty > 0) deductFromBucket(pool.buckets[pool.buckets.length - 1], remainingQty);
                                    }
                                }
                            });
                        } else if (hasClosingEnd) {
                            Object.values(oldMap).forEach(old => {
                                if (old.출고 !== 0 || Object.keys(old.vendors).length > 0) {
                                    const batchKey = old.batchKey;
                                    if (!pData[batchKey]) {
                                        pData[batchKey] = { 
                                            batchKey, 코드: old.코드, 품명: old.품명, 단가: old.단가, 일자: old.일자, 거래처: old.거래처, 
                                            기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                            매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig:{기초:0,입고:0,출고:0,단가:old.단가}, 
                                            isDummy: (!old.코드 || old.코드 === 'NO_CODE'), 수기확인완료: false
                                        };
                                    }
                                    pData[batchKey].출고 += old.출고;
                                    addStockToTotals(old.코드, old.품명, old.단가, '출고', old.출고);
                                    
                                    Object.entries(old.vendors).forEach(([vName, vData]) => {
                                        if (!pData[batchKey].출고내역[vName]) pData[batchKey].출고내역[vName] = {qty:0, rev:0, cogs:0};
                                        pData[batchKey].출고내역[vName].qty += vData.qty;
                                        pData[batchKey].출고내역[vName].rev += vData.rev;
                                        pData[batchKey].출고내역[vName].cogs += vData.cogs;
                                        pData[batchKey].매출액 += vData.rev;
                                        pData[batchKey].매출원가 += vData.cogs;
                                    });
                                }
                            });
                        }

                        // 교차 검증 및 독립적인 알림 푸시
                        Object.values(pData).forEach(item => {
                            item._orig = { 기초: item.기초, 입고: item.입고, 출고: item.출고, 단가: item.단가 };
