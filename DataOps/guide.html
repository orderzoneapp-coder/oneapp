<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp DataOps - 사용 가이드 및 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .pulse-border { animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        // 시뮬레이션용 더미 데이터 세트
        const mockScenarios = {
            default: [],
            daily: [
                { id: 1, name: '깐마늘_1kg(대구)', date: '2026-04-01', vendor: '마산구매', price: 8700, prev: 0, in: 30, out: 28, actual: 0, loss: -2, issues: ['🚨과다로스(20%↑)'], _outData: {'A식당(10)': '', 'B마트(18)': ''} },
                { id: 2, name: '무우_상박스_BOX', date: '2026-04-01', vendor: '경매', price: 8000, prev: 10, in: 50, out: 55, actual: 5, loss: 0, issues: ['✅'], _outData: {'C마트(55)': ''} },
            ],
            setup: [
                { id: 3, name: '대파_단_수입', date: '2026-04-01', vendor: '초기재고', price: 2100, prev: 100, in: 0, out: 0, actual: 100, loss: 0, issues: ['✅26-04-01(가락시장)원가추출'], isSetup: true },
                { id: 4, name: '대파_단_수입', date: '2026-04-01', vendor: '초기재고', price: 1800, prev: 50, in: 0, out: 0, actual: 50, loss: 0, issues: ['✅26-03-30(가락시장)원가추출'], isSetup: true },
                { id: 5, name: '양파_1망_국산', date: '2026-04-01', vendor: '초기재고', price: 0, prev: 20, in: 0, out: 0, actual: 20, loss: 0, issues: ['🚨단가없음'], isSetup: true }
            ],
            error: [
                { id: 6, name: '쥬키니호박_특10kg', date: '2026-04-01', vendor: '하양상회', price: 15000, prev: 0, in: 10, out: 5, actual: 0, loss: -5, issues: ['🚨수량변동: 입고(0→10)'] },
                { id: 7, name: '청양고추_10kg', date: '2026-04-01', vendor: '진주농산', price: 45000, prev: 0, in: 5, out: 5, actual: 0, loss: 0, issues: ['🚨매치변경'] },
            ]
        };

        function App() {
            const [activeScenario, setActiveScenario] = useState('default');
            const [isSimulating, setIsSimulating] = useState(false);

            const playSimulation = (scenario) => {
                setIsSimulating(true);
                setActiveScenario('default');
                setTimeout(() => {
                    setActiveScenario(scenario);
                    setIsSimulating(false);
                }, 600);
            };

            // 캔버스 미리보기 환경(Iframe/Blob)에서 window.location.href 오류 방지
            const handleGoBack = () => {
                try {
                    const currentUrl = window.location.href;
                    if (currentUrl.startsWith('blob:') || currentUrl === 'about:blank') {
                        alert("미리보기 환경에서는 페이지 이동이 제한됩니다.\n(실제 웹 서버 환경에서는 index.html로 정상 이동합니다.)");
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    alert("미리보기 환경에서는 페이지 이동이 제한됩니다.\n(실제 웹 서버 환경에서는 index.html로 정상 이동합니다.)");
                }
            };

            const dataToRender = mockScenarios[activeScenario];

            return (
                <div className="min-h-screen flex flex-col w-full pb-10">
                    {/* Header */}
                    <header className="shrink-0 bg-white border-b border-slate-200 w-full sticky top-0 z-50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-lg shadow-md">
                                    <i className="fas fa-graduation-cap"></i>
                                </div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center">
                                    oneapp DataOps <span className="text-blue-500 ml-2 font-bold">가이드 센터</span>
                                </h1>
                            </div>
                            <button 
                                onClick={handleGoBack} 
                                className="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold shadow-md hover:bg-slate-900 transition flex items-center gap-2"
                            >
                                <i className="fas fa-desktop"></i> 메인 수불부로 돌아가기
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-6xl mx-auto px-4 mt-8 space-y-10 fade-in">
                        
                        {/* Section 1: 치트시트 */}
                        <section>
                            <div className="flex items-center mb-4 gap-2">
                                <div className="w-1 h-6 bg-blue-500 rounded-full"></div>
                                <h2 className="text-xl font-black text-slate-800">1. 파일 업로드 치트시트 (핵심 공식)</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                {/* Card 1 */}
                                <div className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition">
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-lg"><i className="fas fa-calendar-check"></i></div>
                                        <span className="px-2 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded">가장 많이 씀</span>
                                    </div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-1">일일 스마트 마감</h3>
                                    <p className="text-sm text-slate-500 mb-4 h-10">매일 퇴근 전, 오늘 하루치 영업 데이터를 정산할 때 사용합니다.</p>
                                    <div className="bg-slate-50 rounded-lg p-3 text-sm font-semibold text-slate-700 flex flex-wrap gap-1.5 items-center">
                                        <span className="bg-white px-2 py-1 border border-slate-200 rounded shadow-sm">1.기초(어제마감)</span> <i className="fas fa-plus text-slate-400 text-xs"></i>
                                        <span className="bg-white px-2 py-1 border border-slate-200 rounded shadow-sm">2.매입</span> <i className="fas fa-plus text-slate-400 text-xs"></i>
                                        <span className="bg-white px-2 py-1 border border-slate-200 rounded shadow-sm">3.매출</span> <i className="fas fa-plus text-slate-400 text-xs"></i>
                                        <span className="bg-white px-2 py-1 border border-slate-200 rounded shadow-sm">4.오늘실사</span>
                                    </div>
                                </div>

                                {/* Card 2 */}
                                <div className="bg-white rounded-xl p-5 border-2 border-emerald-400 shadow-md relative overflow-hidden transform hover:-translate-y-1 transition">
                                    <div className="absolute top-0 right-0 bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg">초기 셋업용</div>
                                    <div className="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-lg mb-3"><i className="fas fa-magic"></i></div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-1">원가 추출 (선입선출)</h3>
                                    <p className="text-sm text-slate-500 mb-4 h-10">시스템을 처음 도입하거나, 현재 물리 재고에 선입선출로 단가를 매길 때 씁니다.</p>
                                    <div className="bg-emerald-50 rounded-lg p-3 text-sm font-semibold text-emerald-800 flex flex-wrap gap-1.5 items-center border border-emerald-100">
                                        <span className="bg-white px-2 py-1 border border-emerald-200 rounded shadow-sm">2.당기매입(장기간)</span> <i className="fas fa-plus text-emerald-400 text-xs"></i>
                                        <span className="bg-white px-2 py-1 border border-emerald-200 rounded shadow-sm">4.현재실사</span>
                                    </div>
                                </div>

                                {/* Card 3 */}
                                <div className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition">
                                    <div className="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-lg mb-3"><i className="fas fa-window-restore"></i></div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-1">순수 원장 복원</h3>
                                    <p className="text-sm text-slate-500 mb-4 h-10">과거에 마감했던 엑셀을 다시 불러와서 메모나 실사만 살짝 수정할 때 씁니다.</p>
                                    <div className="bg-slate-50 rounded-lg p-3 text-sm font-semibold text-slate-700 flex flex-wrap gap-1.5 items-center">
                                        <span className="bg-white px-2 py-1 border border-slate-200 rounded shadow-sm">4.실사 (마감엑셀 단독)</span>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <hr className="border-slate-200" />

                        {/* Section 2: 시뮬레이터 */}
                        <section>
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-1 h-6 bg-emerald-500 rounded-full"></div>
                                    <h2 className="text-xl font-black text-slate-800">2. 결과 시뮬레이터 (미리보기)</h2>
                                </div>
                                <span className="text-xs text-slate-500 bg-slate-100 px-3 py-1 rounded font-semibold border border-slate-200"><i className="fas fa-info-circle mr-1"></i>버튼을 눌러 작동 방식을 확인하세요</span>
                            </div>

                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                {/* Terminal UI Mock */}
                                <div className="bg-[#0f172a] p-4 flex flex-col md:flex-row justify-between items-center border-b border-slate-700">
                                    <div className="flex items-center gap-3 text-sm font-mono mb-4 md:mb-0 w-full">
                                        <span className="text-emerald-400 font-bold shrink-0">{`>_ System.IO`}</span>
                                        <div className="bg-black/40 rounded-lg flex-1 px-3 py-2 border border-slate-800 flex items-center">
                                            <span className="text-slate-300">
                                                {isSimulating ? 'processing simulation...' : 
                                                 activeScenario === 'default' ? 'waiting for action...' : 
                                                 activeScenario === 'daily' ? 'cross_validation_mode (교차 검증 완료)' : 
                                                 activeScenario === 'setup' ? 'cost_extraction_mode (원가 추출 완료)' : 'error_detect_mode (수량 불일치 감지)'}
                                                <span className="animate-pulse ml-1 text-emerald-500">█</span>
                                            </span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 shrink-0 md:ml-4">
                                        <button onClick={() => playSimulation('daily')} className={`px-4 py-2 rounded-lg text-xs font-bold transition flex items-center border ${activeScenario === 'daily' ? 'bg-blue-600 text-white border-blue-500 shadow-md pulse-border' : 'bg-slate-800 text-slate-300 border-slate-600 hover:bg-slate-700'}`}>일일 마감 결과</button>
                                        <button onClick={() => playSimulation('setup')} className={`px-4 py-2 rounded-lg text-xs font-bold transition flex items-center border ${activeScenario === 'setup' ? 'bg-emerald-600 text-white border-emerald-500 shadow-md pulse-border' : 'bg-slate-800 text-slate-300 border-slate-600 hover:bg-slate-700'}`}>초기 셋업 결과</button>
                                        <button onClick={() => playSimulation('error')} className={`px-4 py-2 rounded-lg text-xs font-bold transition flex items-center border ${activeScenario === 'error' ? 'bg-rose-600 text-white border-rose-500 shadow-md pulse-border' : 'bg-slate-800 text-slate-300 border-slate-600 hover:bg-slate-700'}`}>에러 감지 예시</button>
                                    </div>
                                </div>

                                {/* Mock Table Grid */}
                                <div className="p-0 bg-slate-50 min-h-[250px] relative">
                                    {isSimulating ? (
                                        <div className="absolute inset-0 flex items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10">
                                            <i className="fas fa-spinner fa-spin text-3xl text-slate-400"></i>
                                        </div>
                                    ) : null}

                                    {activeScenario === 'default' && !isSimulating && (
                                        <div className="flex flex-col items-center justify-center h-[250px] text-slate-400">
                                            <i className="fas fa-mouse-pointer text-4xl mb-3"></i>
                                            <p className="font-semibold">상단의 시뮬레이션 버튼을 선택해 주세요.</p>
                                        </div>
                                    )}

                                    {activeScenario !== 'default' && (
                                        <table className="w-full text-left whitespace-nowrap text-sm border-collapse">
                                            <thead className="bg-white text-slate-500 font-semibold text-[11px] uppercase tracking-wider border-b border-slate-200">
                                                <tr>
                                                    <th className="py-3 px-4 border-r border-slate-200 w-[30%]">품명 / 거래처 | 단가</th>
                                                    <th className="py-3 px-3 text-right border-r border-slate-200">기초</th>
                                                    <th className="py-3 px-3 text-right border-r border-slate-200">입고</th>
                                                    <th className="py-3 px-3 text-right border-r border-slate-200">출고</th>
                                                    <th className="py-3 px-3 text-right border-r border-slate-200 text-blue-600">실사</th>
                                                    <th className="py-3 px-3 text-right border-r border-slate-200">로스</th>
                                                    <th className="py-3 px-4 text-left">이슈/결과</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 bg-white">
                                                {dataToRender.map((row) => (
                                                    <tr key={row.id} className="hover:bg-slate-50 transition">
                                                        <td className="py-3 px-4 border-r border-slate-100">
                                                            <div className="font-bold text-slate-800 text-[13px]">{row.name}</div>
                                                            <div className="text-[10px] text-slate-500 mt-0.5 flex justify-between w-full pr-2">
                                                                <span>{row.vendor}</span>
                                                                <span className="font-bold text-slate-700 font-mono">₩{formatMoney(row.price)}</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-3 px-3 text-right border-r border-slate-100 text-slate-600">{row.prev}</td>
                                                        <td className="py-3 px-3 text-right border-r border-slate-100 font-bold text-emerald-600">{row.in}</td>
                                                        <td className="py-3 px-3 text-right border-r border-slate-100 font-bold text-rose-600">{row.out}</td>
                                                        <td className="py-3 px-3 text-right border-r border-slate-100">
                                                            <div className={`px-2 py-1 bg-slate-50 border rounded font-bold ${row.actual < (row.prev+row.in-row.out) ? 'border-rose-300 text-rose-600' : 'border-slate-300 text-slate-800'}`}>
                                                                {row.actual}
                                                            </div>
                                                        </td>
                                                        <td className="py-3 px-3 text-right border-r border-slate-100">
                                                            {row.loss !== 0 ? <span className={`font-bold ${row.loss < 0 ? 'text-rose-600' : 'text-blue-600'}`}>{row.loss}</span> : <span className="text-slate-300">-</span>}
                                                        </td>
                                                        <td className="py-3 px-4 text-left">
                                                            <div className="flex flex-col gap-1">
                                                                <div className="flex gap-1 flex-wrap">
                                                                    {row.issues.map((msg, i) => (
                                                                        <span key={i} className={`px-2 py-0.5 rounded border text-[10px] font-bold ${
                                                                            msg.includes('✅') ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' :
                                                                            (msg.includes('🚨수량변동') || msg.includes('🚨단가없음') || msg.includes('과다로스') ? 'bg-rose-100 text-rose-700 border-rose-200 shadow-sm' : 
                                                                            (msg.includes('🚨매치변경') ? 'bg-blue-100 text-blue-700 border-blue-200 shadow-sm' : 'bg-slate-100 text-slate-600 border-slate-200'))
                                                                        }`}>
                                                                            {msg}
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                                {row._outData && (
                                                                    <div className="flex gap-1 mt-1">
                                                                        {Object.keys(row._outData).map(k => (
                                                                            <span key={k} className="bg-white border border-slate-200 text-slate-600 px-1.5 py-0.5 rounded text-[9px] font-semibold">{k}</span>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                
                                {/* Explainer Panel */}
                                <div className="bg-blue-50 p-4 border-t border-blue-100 text-sm text-blue-900 leading-relaxed">
                                    {activeScenario === 'default' && <div><i className="fas fa-lightbulb text-blue-500 mr-2"></i>원하는 시나리오를 선택하면 시스템이 데이터를 어떻게 해석하는지 볼 수 있습니다.</div>}
                                    {activeScenario === 'daily' && <div><strong className="text-blue-700"><i className="fas fa-check-circle mr-1"></i>일일 마감 모드 분석:</strong> 기존 데이터(기초)에 입고와 출고를 더해 전산잔량을 구하고, 입력된 실사와의 차이를 로스(오차)로 계산합니다. 20% 이상 비면 🚨과다로스 경고가 뜹니다.</div>}
                                    {activeScenario === 'setup' && <div><strong className="text-emerald-700"><i className="fas fa-magic mr-1"></i>진성 선입선출 (Row 쪼개기):</strong> 100개의 실사 재고를 최근 매입한 전표(2번 파일)와 대조하여, <span className="bg-emerald-100 px-1 rounded">2100원짜리 100개</span>와 <span className="bg-emerald-100 px-1 rounded">1800원짜리 50개</span>로 원장을 자동 분할한 모습입니다. 단가가 없으면 🚨단가없음이 뜹니다.</div>}
                                    {activeScenario === 'error' && <div><strong className="text-rose-700"><i className="fas fa-search mr-1"></i>정밀 교차 검증:</strong> 어제 마감했던 파일(4번)과 오늘 다시 뽑은 매입/매출 전표의 숫자가 다르면, 시스템이 이를 귀신같이 잡아내어 <span className="bg-rose-100 px-1 rounded text-rose-800">🚨수량변동(0→10)</span> 또는 판매처가 바뀐 <span className="bg-blue-100 px-1 rounded text-blue-800">🚨매치변경</span> 으로 경고해 줍니다. (이후 Tab 키를 누르면 ✅로 바뀌며 확인처리 됨)</div>}
                                </div>
                            </div>
                        </section>

                        <hr className="border-slate-200" />

                        {/* Section 3: 꿀팁 */}
                        <section className="pb-12">
                            <div className="flex items-center mb-4 gap-2">
                                <div className="w-1 h-6 bg-purple-500 rounded-full"></div>
                                <h2 className="text-xl font-black text-slate-800">3. 전문가용 꿀팁 (UI 조작법)</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 flex gap-4">
                                    <div className="w-12 h-12 bg-white rounded-lg border border-slate-200 flex items-center justify-center text-xl shrink-0 shadow-sm text-slate-700 font-bold whitespace-nowrap">Tab</div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-1">에러 카드 지우기 (원클릭 Ack)</h4>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            상단의 [재고 오차 확인] 등 붉은색 에러 카드를 누르면 에러가 발생한 행(Row)으로 자동 이동합니다.<br/> 
                                            내용을 눈으로 확인한 뒤, 키보드 <kbd className="bg-white border border-slate-300 rounded px-1.5 shadow-sm text-xs font-sans">Tab</kbd> 키를 누르세요. 
                                            🚨 표시가 ✅로 바뀌며 에러 카운트가 1개씩 즉시 깎입니다.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 flex gap-4">
                                    <div className="w-12 h-12 bg-slate-800 text-white rounded-lg flex items-center justify-center text-[10px] font-bold shrink-0 shadow-sm text-center leading-tight">Space<br/>Bar</div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-1">재고 조정 (원물 쪼개기 / 로스 상계)</h4>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            마이너스 로스가 난 원물 상품의 실사 칸을 클릭하고 <kbd className="bg-white border border-slate-300 rounded px-1 shadow-sm text-xs font-sans">Space</kbd> 바를 누르세요. "조정 대상 선택..."이 뜹니다.
                                            이후 플러스 로스가 난 소분 상품의 실사 칸을 클릭하면, <strong>원가를 계산하여 두 재고가 서로 교환(상계)</strong>됩니다.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
