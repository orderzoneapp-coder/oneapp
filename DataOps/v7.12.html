<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp DataOps - 핵심 수불부 관리 (v7.12 Engine)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        // --- 데이터 정제(Sanitization) 유틸리티 ---
        const safeNum = (val) => {
            const n = Number(val);
            return isNaN(n) || !isFinite(n) ? 0 : n;
        };

        const safeStr = (val, fallback = '') => {
            if (val === null || val === undefined) return fallback;
            const s = String(val).trim();
            const lower = s.toLowerCase();
            if (lower === 'undefined' || lower === 'nan' || lower === 'null' || lower === '') return fallback;
            return s;
        };

        // --- 공통 유틸리티 ---
        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const extractDateFromName = (filename) => {
            if (!filename) return 0;
            const match8 = filename.match(/20\d{6}/); 
            if (match8) return parseInt(match8[0], 10);
            const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); 
            if (match6) return parseInt('20' + match6[1], 10);
            return 0;
        };

        const extractDateNum = (dStr) => {
            const num = parseInt(String(dStr).replace(/\D/g, ''), 10);
            return isNaN(num) ? 0 : num;
        };

        const addOneDay = (dateNum) => {
            if (!dateNum) return 0;
            const y = Math.floor(dateNum / 10000);
            const m = Math.floor((dateNum % 10000) / 100) - 1;
            const d = dateNum % 100;
            const date = new Date(y, m, d + 1);
            return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
        };

        const formatItemDate = (dateStr, refYear) => {
            if (!dateStr) return 0;
            const str = String(dateStr).trim();
            if (str.includes('실사등록') || str.includes('미지정')) return 0; 
            if (/^\d{5}$/.test(str)) {
                const serial = parseInt(str, 10);
                if (serial > 30000 && serial < 80000) {
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                    return parseInt(`${y}${m}${d}`, 10);
                }
            }
            const parts = str.match(/\d+/g);
            if (!parts) return 0;
            let y, m, d;
            if (parts.length >= 3) {
                y = parts[0]; if (y.length === 2) y = '20' + y;
                m = parts[1].padStart(2, '0'); d = parts[2].padStart(2, '0');
            } else if (parts.length === 2) {
                if (parts[0].length === 4) { y = parts[0]; m = parts[1].padStart(2, '0'); d = '01'; }
                else { y = String(refYear); m = parts[0].padStart(2, '0'); d = parts[1].padStart(2, '0'); }
            } else if (parts.length === 1) {
                const cleaned = parts[0];
                if (cleaned.length === 8) { y = cleaned.substring(0, 4); m = cleaned.substring(4, 6); d = cleaned.substring(6, 8); }
                else if (cleaned.length === 6) {
                    if (cleaned.startsWith('20')) { y = cleaned.substring(0, 4); m = cleaned.substring(4, 6); d = '01'; }
                    else { y = '20' + substring(0, 2); m = cleaned.substring(2, 4); d = cleaned.substring(4, 6); }
                } else { return 0; }
            } else { return 0; }
            const numY = parseInt(y, 10); const numM = parseInt(m, 10); const numD = parseInt(d, 10);
            if (numY > 2000 && numY < 2100 && numM >= 1 && numM <= 12 && numD >= 1 && numD <= 31) {
                return numY * 10000 + numM * 100 + numD;
            }
            return 0;
        };

        const formatStrForPeriod = (num) => {
            const s = String(num);
            if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
            if (s.length === 6) return `${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`;
            return s;
        };

        // --- V2.0 역방향 파싱 ---
        const parseIssuesAndVendors = (str, price) => {
            if (!str) return { issues: [], vendors: {} };
            const parts = str.match(/[^,]+(?:\([^)]+\))*/g) || [];
            const issues = [];
            const vendors = {};
            // [V7.12] ✅ 칩 자체로 파싱하므로 내부분배 등 특정 키워드에 얽매이지 않음
            const knownIssues = ['과다로스', '원가수정', '수기조정', '매입내역 없음', '전산 재고 부족', '재고 부족', '변동됨', '변경됨', '삭제됨', '신규추가', '수량변동', '단가변경', '매치변경', '원가추출됨', '원가추출', '단가없음', 'Lot매치실패', '매입처없음', '수량부족', '🔄', '🚨', '✅'];

            parts.forEach(p => {
                const part = p.trim();
                if (!part) return;
                let isKnownIssue = knownIssues.some(ki => part.includes(ki));
                if (isKnownIssue) {
                    issues.push(part);
                } else {
                    const match = part.match(/(.+)\((\d+)\)$/);
                    if (match) {
                        const vendorName = safeStr(match[1], '미지정');
                        const qty = parseInt(match[2], 10);
                        if (!isNaN(qty)) vendors[vendorName] = { qty, rev: qty * price, cogs: qty * price, isLifo: false };
                        else issues.push(part);
                    } else {
                        issues.push(part);
                    }
                }
            });
            return { issues, vendors };
        };

        // --- 엑셀 파서 ---
        const parseExcelData = (file, currentMappings) => {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const processWorkbook = (wb) => {
                            const sheet = wb.Sheets[wb.SheetNames[0]];
                            const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                            let headerRowIdx = -1; let maxScore = 0;
                            const keywords = {
                                code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                matchVendor: currentMappings.matchVendor ? currentMappings.matchVendor.split(',').map(s => s.trim().toLowerCase()) : [], 
                                spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                            };

                            for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                const row = jsonAll[i] || []; let score = 0;
                                const rowStr = row.join('').replace(/\s/g, '');
                                if (!rowStr) continue;
                                Object.values(keywords).forEach(kwList => {
                                    if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                });
                                if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                            }
                            return { jsonAll, headerRowIdx, maxScore, keywords };
                        };

                        let wb = XLSX.read(data, { type: 'array' });
                        let { jsonAll, headerRowIdx, maxScore, keywords } = processWorkbook(wb);

                        if (maxScore < 2) {
                            try {
                                const text = new TextDecoder('euc-kr').decode(data);
                                const wb2 = XLSX.read(text, { type: 'string' });
                                const res2 = processWorkbook(wb2);
                                if (res2.maxScore > maxScore) { jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; keywords = res2.keywords; }
                            } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                        }
                        if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                        const rawHeaders = jsonAll[headerRowIdx];
                        const uniqueHeaders = []; const headerCounts = {};
                        for (let j = 0; j < rawHeaders.length; j++) {
                            let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                            if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                            uniqueHeaders.push(h);
                        }

                        const parsedData = [];
                        
                        const getValByKeywords = (obj, kwList) => {
                            const keys = Object.keys(obj);
                            const cleanKeys = keys.map(k => k.replace(/\s/g, '').toLowerCase());
                            
                            for (let kw of kwList) {
                                if (!kw) continue;
                                const idx = cleanKeys.indexOf(kw);
                                if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') {
                                    return obj[keys[idx]];
                                }
                            }
                            for (let kw of kwList) {
                                if (!kw) continue;
                                const idx = cleanKeys.findIndex(k => k.includes(kw));
                                if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') {
                                    return obj[keys[idx]];
                                }
                            }
                            return null;
                        };

                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i];
                            if (!row || row.join('').trim() === '') continue;
                            const rowObj = {};
                            uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                            
                            const codeRaw = getValByKeywords(rowObj, keywords.code);
                            const codeStr = safeStr(codeRaw, '');
                            const baseNameRaw = getValByKeywords(rowObj, keywords.name);
                            const baseName = safeStr(baseNameRaw, '');

                            if (!codeStr && !baseName) continue;
                            if (codeStr.includes('합계') || codeStr.includes('총계') || baseName.includes('합계') || baseName.includes('총계') || baseName.includes('총합')) continue;
                            if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(codeStr) || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(baseName)) continue;
                            if (codeStr.includes('오전') || codeStr.includes('오후') || baseName.includes('오전') || baseName.includes('오후')) continue;
                            if (codeStr.includes('실사등록') || baseName.includes('실사등록')) continue;
                            if (codeStr.includes('기록없음') || baseName.includes('기록없음')) continue;

                            const specValRaw = getValByKeywords(rowObj, keywords.spec);
                            const specVal = safeStr(specValRaw, '');
                            let fullName = baseName || '이름없음';
                            if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                            const finalCode = codeStr || 'NO_CODE';

                            const normObj = {
                                코드: finalCode,
                                품명: fullName,
                                수량: parseNumber(getValByKeywords(rowObj, keywords.qty)),
                                단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                거래처: safeStr(getValByKeywords(rowObj, keywords.vendor), '미지정'),
                                매입처매칭: safeStr(getValByKeywords(rowObj, keywords.matchVendor), ''),
                                일자: safeStr(getValByKeywords(rowObj, keywords.date), ''),
                                메모: '', 
                                _raw: rowObj 
                            };
                            parsedData.push(normObj);
                        }
                        resolve(parsedData);
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
            matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', 
            excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플',
            lifoVendor: '2전송, 쿠팡, B2B, 당일우선',
            internalLot: '우리, 공용, 분배, 담당자' 
        };

        // --- UI 컴포넌트 ---
        const ProductRow = React.memo(({ item, idx, isLinked, isActiveMulti, isMultiGroupItem, targetDateStr, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove, internalLotMapping }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            
            const totalAvailable = item.기초 + item.입고 + item.대체입고;
            if (item.로스 < 0 && totalAvailable > 0 && (Math.abs(item.로스) / totalAvailable) > 0.2) displayIssues.push('🚨과다로스(20%↑)');
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;
            const isToday = item.일자 && targetDateStr && item.일자 === targetDateStr;

            // [V7.12] 내부 분배 로트 키워드 로드하여 청록색 표시 검증
            const internalLotKeywords = useMemo(() => (internalLotMapping || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s), [internalLotMapping]);

            const focusAndEnsureVisible = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.focus({ preventScroll: true });
                    el.select();
                    const container = document.getElementById('main-scroll-container');
                    if (container) {
                        const cRect = container.getBoundingClientRect();
                        const eRect = el.getBoundingClientRect();
                        if (eRect.top < cRect.top + 150 || eRect.bottom > cRect.bottom - 60) {
                            const targetScrollTop = container.scrollTop + (eRect.top - cRect.top) - (cRect.height / 2) + (eRect.height / 2);
                            container.scrollTo({ top: targetScrollTop, behavior: 'smooth' });
                        }
                    } else {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            };

            const handleKd = (e, type) => {
                const cols = ['price-input', 'base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') { if (colIdx < cols.length - 1) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx+1]}-${idx}`); } }
                else if (e.key === 'ArrowLeft') { if (colIdx > 0) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx-1]}-${idx}`); } }
                else if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx+1}`); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx-1}`); }
                else if (e.key === ' ' || e.code === 'Space') { if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragOver(false); };
            const handleDrop = (e) => {
                e.preventDefault(); setIsDragOver(false);
                try {
                    const dataStr = e.dataTransfer.getData('text/plain');
                    if (!dataStr) return;
                    const data = JSON.parse(dataStr);
                    if (data.sourceKey !== item.batchKey) onSalesMove(data.sourceKey, item.batchKey, data.vendor, data.qty, data.code, item.코드);
                } catch (err) {}
            };

            const cellInputBase = "w-full text-right bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none rounded text-[13px] px-1.5 py-1 transition-all shadow-sm";
            
            return (
                <tr 
                    data-code={item.코드} data-batch={item.batchKey} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
                    className={`transition duration-200 ${isActiveMulti ? 'bg-blue-50/60 outline outline-2 outline-blue-500 z-20 relative shadow-md' : (isLinked ? 'bg-slate-50 ring-1 ring-blue-400 shadow-md relative z-10 scale-[1.01]' : 'border-b border-slate-100 hover:bg-slate-50')} ${isDragOver ? 'bg-blue-50 outline outline-2 outline-blue-400 scale-[1.01] z-20 shadow-md' : ''} ${!isActiveMulti && item.isDummy && item.단가 === 0 ? 'bg-rose-50/30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.03)] border-r border-slate-200 ${isMultiGroupItem && !isLinked ? 'border-l-4 border-l-blue-400' : ''} ${isLinked ? 'bg-blue-50/50 border-l-4 border-l-blue-600' : ''} ${isActiveMulti ? 'bg-blue-50/60' : (item.isDummy && item.단가 === 0 ? 'bg-rose-50' : 'bg-white group-hover:bg-slate-50')}`}>
                        <div className="flex items-center justify-between w-full">
                            <div className="flex flex-col justify-center flex-1 pr-3 overflow-hidden max-w-[280px]">
                                <div className="font-semibold text-slate-800 text-[13px] flex items-start gap-1 mb-0.5">
                                    {isLinked && <i className="fas fa-link text-blue-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    {isActiveMulti && <i className="fas fa-tags text-blue-500 mr-1 mt-0.5"></i>}
                                    <span title={item.품명} className="truncate leading-tight text-slate-900">{item.품명}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 truncate font-medium tracking-tight flex items-center">

        // --- Main App Component ---
        function App() {
            const [appStep, setAppStep] = useState('upload'); 
            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });

            const activeIssueModeRef = useRef(null);

            const isCostExtractionMode = !files.prev && files.in && !files.out && files.end;

            const terminalMessage = useMemo(() => {
                if (isProcessing) return "processing data_blocks...";
                if (isCostExtractionMode) return "cost_extraction_mode ready... (초기 셋업: 우측 버튼을 클릭하세요)";
                if (files.end && !files.in && !files.out && !files.prev) return "smart_restore_mode ready... (마감 복원: Enter)";

            const [grouping, setGrouping] = useState(() => {
                const saved = localStorage.getItem('inventoryGroupingV79');

                    splitByVendor: false,

            const saveMappings = () => {

            const priceOptionsMap = useMemo(() => {
                const map = {};
                productData.forEach(p => {

                const result = {};
                for(let code in map) { result[code] = Array.from(map[code]); }
                return result;
            }, [productData]);

            const multiPriceCodes = useMemo(() => {
                const codes = new Set();
                productData.forEach(p => {
                    if (priceOptionsMap[p.코드] && priceOptionsMap[p.코드].length >= 2 && p.출고 > 0) codes.add(p.코드);
                });
                return Array.from(codes);
            }, [productData, priceOptionsMap]);

            const closingStats = useMemo(() => {
                let missingPriceCount = 0, totalMissingPriceCount = 0;
                let lossCount = 0, totalLossCount = 0;
                let matchCount = 0, totalMatchCount = 0;
                let totalRevenue = 0, totalInventoryAsset = 0, totalLossValue = 0;
                
                let multiPriceSet = new Set(multiPriceCodes);
                
                productData.forEach(p => {
                    const hasPriceTotal = (p.isDummy && p.단가 === 0) || (p.이슈 && p.이슈.some(i => i.includes('단가변경') || i.includes('단가없음')));
                    const hasPriceUnresolved = (!p.수기확인완료 && p.isDummy && p.단가 === 0) || (p.이슈 && p.이슈.some(i => i.includes('🚨단가변경') || i.includes('🚨단가없음')));
                    if (hasPriceTotal) totalMissingPriceCount++;
                    if (hasPriceUnresolved) missingPriceCount++;

                    const hasQtyTotal = p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0) || (p.이슈 && p.이슈.some(i => i.includes('수량변동') || i.includes('신규발생') || i.includes('코드없음') || i.includes('수량부족')));
                    const hasQtyUnresolved = (!p.수기확인완료 && (p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0))) || (p.이슈 && p.이슈.some(i => i.includes('🚨수량변동') || i.includes('🚨신규발생') || i.includes('🚨코드없음') || i.includes('🚨수량부족')));
                    if (hasQtyTotal) totalLossCount++;
                    if (hasQtyUnresolved) lossCount++;

                    const isMultiPriceItem = multiPriceSet.has(p.코드);
                    const hasMatchTotal = (p.이슈 && p.이슈.some(i => i.includes('매치변경') || i.includes('Lot매치실패') || i.includes('매입처없음'))) || isMultiPriceItem;
                    const hasMatchUnresolved = (p.이슈 && p.이슈.some(i => i.includes('🚨매치변경') || i.includes('🚨Lot매치실패') || i.includes('🚨매입처없음'))) || (isMultiPriceItem && !ackMultiCodes.has(p.코드));
                    if (hasMatchTotal) totalMatchCount++;
                    if (hasMatchUnresolved) matchCount++;

                    totalRevenue += (Number(p.매출액) || 0);
                    const actualQty = p.실사 === '' || p.실사 === null ? 0 : Number(p.실사);
                    const price = Number(p.단가) || 0;
                    totalInventoryAsset += (actualQty * price);
                    if (p.로스 !== 0) totalLossValue += Math.abs(Number(p.로스) * price);
                });
                
                return { missingPriceCount, totalMissingPriceCount, lossCount, totalLossCount, multiPriceCount: matchCount, totalMultiPriceCount: totalMatchCount, totalRevenue, totalInventoryAsset, totalLossValue, total: productData.length };
            }, [productData, multiPriceCodes, ackMultiCodes]);

            const handleFocusInput = useCallback((key, idx) => { focusedInputRef.current = { key, idx }; }, []);

            const autoAssignFiles = useCallback((fileArray) => {
                setFiles(prev => {
                    let updated = { ...prev };
                    const stockCandidates = [];
                    fileArray.forEach(file => {
                        const name = file.name.toLowerCase();
                        if (name.includes('구매') || name.includes('매입') || name.includes('입고')) updated.in = file;
                        else if (name.includes('판매') || name.includes('매출') || name.includes('출고')) updated.out = file;
                        else stockCandidates.push(file);
                    });
                    if (stockCandidates.length > 0) {
                        stockCandidates.sort((a, b) => extractDateFromName(a.name) - extractDateFromName(b.name));
                        if (stockCandidates.length === 2) {
                            updated.prev = stockCandidates[0]; 
                            updated.end = stockCandidates[1];
                        } else if (stockCandidates.length === 1) {
                            const file = stockCandidates[0];
                            const name = file.name.toLowerCase();
                            if (updated.in || updated.out) {
                                updated.prev = file;
                            } else {
                                if (name.includes('기말') || name.includes('실사') || name.includes('마감')) updated.end = file;

            const handleResetFiles = useCallback(() => {

                                    {appStep === 'closing' && <span className="text-[11px] font-bold text-slate-400 mr-1"><i className="fas fa-file-excel mr-1.5"></i>데이터 소스:</span>}
                                    <FileBox isCompact={appStep === 'closing'} title={appStep === 'closing' ? "1. 기초" : "1. 기초 재고"} type="prev" icon="fa-history" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                    {appStep === 'closing' && <i className="fas fa-chevron-right text-slate-600 text-[10px]"></i>}
                                    <FileBox isCompact={appStep === 'closing'} title={appStep === 'closing' ? "2. 매입" : "2. 당기 매입"} type="in" icon="fa-truck-loading" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                    {appStep === 'closing' && <i className="fas fa-chevron-right text-slate-600 text-[10px]"></i>}
                                    <FileBox isCompact={appStep === 'closing'} title={appStep === 'closing' ? "3. 매출" : "3. 당기 매출"} type="out" icon="fa-receipt" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                    {appStep === 'closing' && <i className="fas fa-chevron-right text-slate-600 text-[10px]"></i>}
                                    <FileBox isCompact={appStep === 'closing'} title={appStep === 'closing' ? "4. 실사" : "4. 실사 (옵션)"} type="end" icon="fa-clipboard-check" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                    
                                    {(files.prev || files.in || files.out || files.end) && (
                                        <button onClick={handleResetFiles} className={`flex items-center justify-center font-bold transition-colors rounded ${appStep === 'closing' ? 'ml-auto px-4 py-2 text-[12px] text-slate-400 hover:text-slate-100 hover:bg-slate-700/50' : 'mx-auto mt-4 px-4 py-2 text-[13px] bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200 col-span-full shadow-sm'}`}>
                                            <i className="fas fa-redo-alt mr-1.5"></i>초기화
                                        </button>
                                    )}
                                </div>
                            </div>

                            {isProcessing && (
                                <div className="fixed inset-0 z-[100] bg-slate-900/20 backdrop-blur-sm flex items-center justify-center">
                                    <div className="bg-slate-800 text-white px-6 py-4 rounded-xl shadow-xl flex items-center font-bold text-lg animate-pulse border border-slate-700">
                                        <i className="fas fa-spinner fa-spin mr-3 text-2xl text-emerald-400"></i> 데이터를 처리하고 있습니다...
                                    </div>
                                </div>
                            )}

                            {appStep === 'upload' && !isProcessing && (
                                <div className="flex-1 flex flex-col items-center justify-center opacity-40 py-20 animate-pulse mt-4">
                                    <i className="fas fa-layer-group text-8xl text-slate-300 mb-6"></i>
                                    <p className="text-slate-600 font-black text-2xl tracking-tight">수불 마감에 필요한 파일을 업로드하세요</p>
                                    <p className="text-slate-400 mt-3 font-bold text-base">여러 파일을 한 번에 올리거나, 필요한 파일만 선택해 업로드할 수 있습니다.</p>
                                </div>
                            )}

                            {appStep === 'closing' && (
                                <div className="flex flex-col fade-in relative mt-1">
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <div 
                                            onClick={() => { setFilters({...filters, reviewType: null}); handleIssueJump('multiPrice', 'next', true); }}
                                            className={`p-4 rounded-xl border-[3px] transition-all cursor-pointer flex flex-col justify-between relative overflow-hidden ${activeIssueMode === 'multiPrice' ? 'bg-white border-slate-800 shadow-lg' : 'bg-white border-blue-200 hover:border-blue-400 hover:shadow-md'}`}
                                        >
                                            <div className="text-xs font-bold text-slate-600 mb-1 flex items-center justify-between">
                                                <span className="flex items-center"><i className="fas fa-tags text-blue-500 mr-2 text-base"></i>Lot 매치(판매처)</span>
                                                {closingStats.multiPriceCount > 0 && <span className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span>}
                                            </div>
                                            <div className="flex items-end justify-between mt-2">
                                                <div>
                                                    <div className="text-3xl font-black text-slate-800">{closingStats.multiPriceCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                                    {closingStats.multiPriceCount > 0 ? (
                                                        <div className="text-[12px] text-blue-600 font-bold mt-1">새로운 불일치 발견</div>
                                                    ) : (
                                                        <div className="text-[12px] text-slate-400 font-semibold mt-1">모든 사항 일치함</div>
                                                    )}
                                                </div>
                                                {closingStats.multiPriceCount === 0 ? (
                                                    <div className="text-emerald-500 font-bold text-sm bg-emerald-50 px-2 py-1 rounded flex items-center mb-1"><i className="fas fa-check-circle mr-1"></i>완료</div>
                                                ) : (
                                                    <div className="text-xs text-slate-400 font-bold mb-1 bg-slate-50 px-2 py-1 rounded border border-slate-100 shadow-sm">Tab <i className="fas fa-arrow-right ml-0.5"></i></div>
                                                )}
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setActiveIssueMode(null); setFilters({...filters, reviewType: 'multiPrice', issuesOnly: false}); }}
                                                className="absolute top-3 right-3 text-[11px] font-bold px-2 py-1 rounded bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-blue-600 transition shadow-sm"
                                                title="해결된 항목을 포함해 전체 대상 리스트를 필터링하여 보여줍니다."
                                            >
                                                <i className="fas fa-list mr-1"></i>다시보기
                                            </button>
                                        </div>
                                        
                                        <div 
                                            onClick={() => { setFilters({...filters, reviewType: null}); handleIssueJump('loss', 'next', true); }}
                                            className={`p-4 rounded-xl border-[3px] transition-all cursor-pointer flex flex-col justify-between relative overflow-hidden ${activeIssueMode === 'loss' ? 'bg-white border-slate-800 shadow-lg' : 'bg-white border-orange-200 hover:border-orange-400 hover:shadow-md'}`}
                                        >
                                            <div className="text-xs font-bold text-slate-600 mb-1 flex items-center justify-between">
                                                <span className="flex items-center"><i className="fas fa-balance-scale text-orange-500 mr-2 text-base"></i>재고/전표 변동 확인</span>
                                                {closingStats.lossCount > 0 && <span className="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse shadow-[0_0_8px_rgba(249,115,22,0.6)]"></span>}
                                            </div>
                                            <div className="flex items-end justify-between mt-2">
                                                <div>
                                                    <div className="text-3xl font-black text-slate-800">{closingStats.lossCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                                    {closingStats.lossCount > 0 ? (
                                                        <div className="text-[12px] text-orange-600 font-bold mt-1">새로운 변동사항 발견</div>
                                                    ) : (
                                                        <div className="text-[12px] text-slate-400 font-semibold mt-1">모든 변동 확인됨</div>
                                                    )}
                                                </div>
                                                {closingStats.lossCount === 0 ? (
                                                    <div className="text-emerald-500 font-bold text-sm bg-emerald-50 px-2 py-1 rounded flex items-center mb-1"><i className="fas fa-check-circle mr-1"></i>완료</div>
                                                ) : (
                                                    <div className="text-xs text-slate-400 font-bold mb-1 bg-slate-50 px-2 py-1 rounded border border-slate-100 shadow-sm">Tab <i className="fas fa-arrow-right ml-0.5"></i></div>
                                                )}
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setActiveIssueMode(null); setFilters({...filters, reviewType: 'loss', issuesOnly: false}); }}
                                                className="absolute top-3 right-3 text-[11px] font-bold px-2 py-1 rounded bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-orange-600 transition shadow-sm"
                                                title="해결된 항목을 포함해 전체 대상 리스트를 필터링하여 보여줍니다."
                                            >
                                                <i className="fas fa-list mr-1"></i>다시보기
                                            </button>
                                        </div>
                                        
                                        <div 
                                            onClick={() => { setFilters({...filters, reviewType: null}); handleIssueJump('missingPrice', 'next', true); }}
                                            className={`p-4 rounded-xl border-[3px] transition-all cursor-pointer flex flex-col justify-between relative overflow-hidden ${activeIssueMode === 'missingPrice' ? 'bg-white border-slate-800 shadow-lg' : 'bg-white border-rose-200 hover:border-rose-400 hover:shadow-md'}`}
                                        >
                                            <div className="text-xs font-bold text-slate-600 mb-1 flex items-center justify-between">
                                                <span className="flex items-center"><i className="fas fa-exclamation-circle text-rose-500 mr-2 text-base"></i>단가 검증</span>
                                                {closingStats.missingPriceCount > 0 && <span className="w-2.5 h-2.5 rounded-full bg-rose-500 animate-pulse shadow-[0_0_8px_rgba(244,63,94,0.6)]"></span>}
                                            </div>
                                            <div className="flex items-end justify-between mt-2">
                                                <div>
                                                    <div className="text-3xl font-black text-slate-800">{closingStats.missingPriceCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                                    {closingStats.missingPriceCount > 0 ? (
                                                        <div className="text-[12px] text-rose-600 font-bold mt-1">신규/변동 단가 발견</div>
                                                    ) : (
                                                        <div className="text-[12px] text-slate-400 font-semibold mt-1">모든 단가 일치함</div>
                                                    )}
                                                </div>
                                                {closingStats.missingPriceCount === 0 ? (
                                                    <div className="text-emerald-500 font-bold text-sm bg-emerald-50 px-2 py-1 rounded flex items-center mb-1"><i className="fas fa-check-circle mr-1"></i>완료</div>
                                                ) : (
                                                    <div className="text-xs text-slate-400 font-bold mb-1 bg-slate-50 px-2 py-1 rounded border border-slate-100 shadow-sm">Tab <i className="fas fa-arrow-right ml-0.5"></i></div>
                                                )}
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setActiveIssueMode(null); setFilters({...filters, reviewType: 'missingPrice', issuesOnly: false}); }}
                                                className="absolute top-3 right-3 text-[11px] font-bold px-2 py-1 rounded bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-rose-600 transition shadow-sm"
                                                title="해결된 항목을 포함해 전체 대상 리스트를 필터링하여 보여줍니다."
                                            >
                                                <i className="fas fa-list mr-1"></i>다시보기
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col">
                                        <div className="w-full rounded-xl">
                                            <table className="w-full text-left border-collapse whitespace-nowrap text-sm min-w-[1000px]">
                                                <thead className="bg-slate-50 text-slate-600 font-extrabold text-[12px] tracking-tight sticky top-0 z-[45] border-b-2 border-slate-200 shadow-md">
                                                    <tr>
                                                        <th className="p-2 border-r border-slate-200 sticky left-0 bg-slate-50 z-30 shadow-[1px_0_0_#e2e8f0] w-[320px] min-w-[280px]">
                                                            <div className="relative w-full flex items-center">
                                                                <input 
                                                                    id="searchInput"
                                                                    type="text" 
                                                                    placeholder="품명(규격) / 일자 / 거래처 | 단가 검색 (F3)" 
                                                                    value={filters.search} 
                                                                    onChange={e => setFilters(f => ({ ...f, search: e.target.value, issuesOnly: e.target.value ? false : f.issuesOnly, excludeZeroActual: e.target.value ? false : f.excludeZeroActual }))} 
                                                                    onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); e.target.select(); } }}
                                                                    className="w-full py-1.5 pl-3 pr-8 bg-white border border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-700 font-bold outline-none placeholder-slate-400 transition-colors rounded-md shadow-sm" 
                                                                />
                                                                <div className="absolute right-3 text-slate-400 pointer-events-none">
                                                                    <i className="fas fa-search text-sm"></i>
                                                                </div>
                                                            </div>
                                                        </th>
                                                        
                                                        <th className="py-2.5 px-2 border-r border-slate-200 text-right w-[85px] min-w-[85px]">기초 재고</th>
                                                        <th className="py-2.5 px-2 border-r border-slate-200 text-right w-[85px] min-w-[85px]">입고</th>
                                                        <th className="py-2.5 px-2 border-r border-slate-200 text-right w-[85px] min-w-[85px]">출고</th>
                                                        <th className="py-2.5 px-2 border-r border-slate-200 text-right w-[85px] min-w-[85px]">실사 수량</th>
                                                        <th className="py-2.5 px-2 border-r border-slate-200 text-right w-[85px] min-w-[85px]">로스/오차</th>
                                                        
                                                        <th className="py-1.5 px-4 text-left w-full min-w-[250px] align-middle">
                                                            <div className="flex justify-between items-center w-full">
                                                                <span>이슈/결과 및 메모</span>
                                                                <div className="flex items-center gap-2">
                                                                    {substHistory.length > 0 && (
                                                                        <button onClick={() => setUndoUi({ state: 'list' })} className="px-2.5 py-1 rounded border border-rose-200 text-[11px] font-bold bg-white text-rose-600 hover:bg-rose-50 transition flex items-center shadow-sm">
                                                                            <i className="fas fa-undo mr-1.5"></i>취소 ({substHistory.length})
                                                                        </button>
                                                                    )}
                                                                    <button 
                                                                        onClick={() => {
                                                                            const { key, idx } = focusedInputRef.current;
                                                                            if (!key) { setAlertMsg("조정할 상품의 실사칸을 클릭(선택)하여 커서를 위치시킨 후 버튼을 눌러주세요."); return; }
                                                                            handleSpacebarLink(key, idx);
                                                                        }}
                                                                        className={`px-3 py-1.5 text-[11px] rounded font-bold transition flex items-center border ${linkSourceKey ? 'bg-slate-800 border-slate-900 text-white shadow-md animate-pulse' : 'bg-transparent border-transparent text-slate-400 hover:text-slate-600 hover:bg-slate-200'}`}
                                                                    >
                                                                        <i className="fas fa-exchange-alt mr-1.5"></i>
                                                                        {linkSourceKey ? '대상 선택...' : '재고 조정(로스상계)'} 
                                                                        <span className={`ml-1.5 px-1 py-0.5 rounded text-[9px] border hidden sm:inline-block font-normal tracking-wide ${linkSourceKey ? 'bg-slate-700 border-slate-600 text-slate-200' : 'bg-slate-200/50 border-transparent text-slate-400'}`}>Space</span>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 bg-white">
                                                    {filteredProductData.length === 0 ? (
                                                        <tr><td colSpan="7" className="p-12 text-center text-slate-400 font-bold bg-slate-50/50"><i className="fas fa-box-open mb-3 text-3xl opacity-50 block"></i>표시할 데이터가 없습니다.</td></tr>
                                                    ) : (
                                                        filteredProductData.map((item, idx) => (
                                                            <ProductRow 
                                                                key={item.batchKey} item={item} idx={idx} 
                                                                isLinked={linkSourceKey === item.batchKey} 
                                                                isActiveMulti={activeMultiCode === item.코드}
                                                                isMultiGroupItem={multiPriceCodes.includes(item.코드)} 
                                                                targetDateStr={targetDateStr}
                                                                onStockChange={handleManualStockChange} onSpacebar={handleSpacebarLink} 
                                                                onFocusInput={handleFocusInput} onBaseDataChange={handleBaseDataChange}
                                                                onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                                onSalesMove={handleSalesMove}
                                                                internalLotMapping={mappings.internalLot}
                                                            />
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-slate-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce border border-slate-200">
                                <div className="bg-slate-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-slate-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-slate-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-slate-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-slate-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
                                            <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                <tr>
                                                    <th className="p-3 font-semibold">원물 (차감 내역)</th>
                                                    <th className="p-3 font-semibold">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-semibold">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-rose-600 font-black">-{h.sQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-600 font-black">+{h.tQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-100 hover:text-rose-600 hover:border-rose-300 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-rose-600 font-bold hover:text-rose-800 hover:bg-rose-50 border border-transparent hover:border-rose-200 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-slate-800 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-slate-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
