            };

            const handleBaseDataChange = useCallback((batchKey, field, val) => {
                const numVal = val === '' ? 0 : Number(val);
                
                setProductData(prevP => {
                    const newP = prevP.map(item => {
                        if (item.batchKey === batchKey) {
                            const newItem = { ...item, [field]: numVal, 수기확인완료: true };
                            
                            if (field === '단가') {
                                let newIssues = [...newItem.이슈].filter(msg => msg !== '원가수정(수기)' && msg !== '원가수정(실사반영)');
                                if (numVal !== item._orig?.단가) newIssues.push('원가수정(수기)');
                                newItem.이슈 = newIssues.filter(msg => msg !== '매입내역 없음');
                                return newItem;
                            }

                            newItem.전산잔량 = newItem.기초 + newItem.입고 + newItem.대체입고 - newItem.출고 - newItem.대체출고;
                            if (newItem.실사 !== null && newItem.실사 !== '') {
                                newItem.로스 = newItem.실사 - newItem.전산잔량;
                            } else {
                                newItem.실사 = newItem.전산잔량;
                                newItem.로스 = 0;
                            }
                            
                            let newIssues = [...newItem.이슈].filter(msg => msg !== '장부 수기조정');
                            const isBaseChanged = newItem.기초 !== (newItem._orig?.기초 || 0) || newItem.입고 !== (newItem._orig?.입고 || 0) || newItem.출고 !== (newItem._orig?.출고 || 0);
                            if (isBaseChanged) newIssues.push('장부 수기조정');
                            return newItem;
                        }
                        return item;
                    });
                    
                    return newP;
                });
            }, []);

            const handleManualStockChange = useCallback((batchKey, val) => {
                setProductData(prev => prev.map(item => {
                    if (item.batchKey === batchKey) {
                        const newActual = val === '' ? '' : Number(val);
                        const lossCalcVal = val === '' ? 0 : Number(val);
                        const newLoss = lossCalcVal - item.전산잔량;
                        
                        let newIssues = [...item.이슈].filter(msg => msg !== '실사 수기조정');
                        if (val !== '' && newLoss !== 0) newIssues.push('실사 수기조정');
                        return { ...item, 실사: newActual, 로스: newLoss, 이슈: newIssues, 수기확인완료: true }; 
                    }
                    return item;
                }));
            }, []);

            const handleUndoAction = useCallback((historyItem) => {
                setProductData(prev => {
                    const newData = [...prev];
                    const sIdx = newData.findIndex(d => d.batchKey === historyItem.sourceKey);
                    const tIdx = newData.findIndex(d => d.batchKey === historyItem.targetKey);
                    
                    if (sIdx >= 0) newData[sIdx] = { ...historyItem.sourceItemPrev, 이슈: [...historyItem.sourceItemPrev.이슈] };
                    if (tIdx >= 0) newData[tIdx] = { ...historyItem.targetItemPrev, 이슈: [...historyItem.targetItemPrev.이슈] };
                    return newData;
                });
                setSubstHistory(h => h.filter(item => item.id !== historyItem.id));
            }, []);

            const handleUndoAll = useCallback(() => {
                [...substHistory].reverse().forEach(h => handleUndoAction(h));
                setUndoUi({ state: 'closed' });
            }, [substHistory, handleUndoAction]);

            const runAnalysisRef = useRef(runAnalysis);
            useEffect(() => { runAnalysisRef.current = runAnalysis; }, [runAnalysis]);
            
            const handleIssueJumpRef = useRef(handleIssueJump);
            useEffect(() => { handleIssueJumpRef.current = handleIssueJump; }, [handleIssueJump]);

            const handleCombinedExport = useCallback(() => {
                if (filteredProductData.length === 0) { setAlertMsg("다운로드할 데이터가 없습니다."); return; }
                
                const today = new Date();
                let exportFileNameDate = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
                
                let totalRev = 0; let totalCogs = 0; let totalAsset = 0; let totalLossValue = 0;

                // Sheet 1: 재고 (이월용 및 재고/로스 트렌드 아카이브용)
                const exportData1 = filteredProductData
                    .filter(item => item.코드 && item.코드 !== 'NO_CODE' && item.코드 !== '-')
                    .map(item => {
                        let displayIssues = item.이슈 ? [...item.이슈] : [];
                        displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음'));

                        let vendorStrs = [];
                        if (item.출고내역 && Object.keys(item.출고내역).length > 0) {
                            vendorStrs = Object.entries(item.출고내역).map(([v, q]) => `${v}(${q})`);
                        }
                        
                        const qty = item.실사 === '' || item.실사 === null ? 0 : Number(item.실사);
                        const rev = Number(item.매출액) || 0;
                        const cogs = Number(item.매출원가) || 0;
                        const adjust = (Number(item.로스) || 0) + (Number(item.대체입고) || 0) - (Number(item.대체출고) || 0);

                        const price = Number(item.단가) || 0;
                        const inventoryAsset = qty * price;
                        const lossValue = (Number(item.로스) || 0) * price;

                        totalRev += rev; totalCogs += cogs; totalAsset += inventoryAsset; totalLossValue += lossValue;

                        const issueResultStr = [...displayIssues, ...vendorStrs].join(', ');

                        return {
                            '결산일자': targetDateStr, 
                            '품목코드': item.코드, 
                            '품명': item.품명, 
                            '기말실사(이월수량)': qty, 
                            '매입단가(원가)': price, 
                            '기말재고액(자산가치)': inventoryAsset, 
                            '출고량': item.출고, 
                            '조정': adjust,
                            '이슈/결과': issueResultStr
                        };
                    });

                // Sheet 2: 실사
                const aggregated = {};
                productData.forEach(item => {
                    const code = item.코드;
                    if (!code || code === 'NO_CODE' || code === '-') return;
                    
                    const qty = item.실사 === '' || item.실사 === null ? 0 : Number(item.실사);
                    if (!aggregated[code]) {
                        aggregated[code] = { 품명: item.품명, 수량: 0 };
                    }
                    aggregated[code].수량 += qty;
                });

                const exportData2 = [];
                Object.keys(aggregated).forEach(code => {
                    if (aggregated[code].수량 !== 0) {
                        exportData2.push({
                            '일자': targetDateStr, 
                            '순번': '',
                            '담당자': '',
                            '창고': '01',
                            '코드': code,
                            '품명(규격)': aggregated[code].품명,
                            '수량': aggregated[code].수량,
                            '적요': ''
                        });
                    }
                });

                // Sheet 3: 거래처매출 Raw (BI 연동용, 소계 없음)
                const exportData3 = [];
                // Sheet 4: 거래처별 집계 (엑셀 확인용, 소계 전용)
                const vendorAggregated = {};

                filteredProductData.forEach(item => {
                    if (!item.코드 || item.코드 === 'NO_CODE' || item.코드 === '-') return;
                    if (item.출고내역 && Object.keys(item.출고내역).length > 0) {
                        const totalOut = item.출고 || 1; 
                        const revPerUnit = item.매출액 / totalOut;
                        const cogsPerUnit = item.매출원가 / totalOut;

                        Object.entries(item.출고내역).forEach(([vendor, qty]) => {
                            const vRev = Math.round(revPerUnit * qty);
                            const vCogs = Math.round(cogsPerUnit * qty);
                            const vProfit = vRev - vCogs;
                            const vMargin = vRev !== 0 ? ((vProfit / vRev) * 100).toFixed(1) : '0';

                            // 1. Raw Data 축적 
                            exportData3.push({
                                '결산일자': targetDateStr, 
                                '거래처명': vendor, 
                                '품목코드': item.코드,
                                '품명(규격)': item.품명,
                                '판매수량': qty,
                                '단가(원가)': Number(item.단가) || 0,
                                '매출액': vRev,
                                '매출원가': vCogs,
                                '매출이익': vProfit,
                                '마진율(%)': vMargin + '%'
                            });

                            // 2. 집계용 Data 축적
                            if (!vendorAggregated[vendor]) {
                                vendorAggregated[vendor] = { 매출액: 0, 매출원가: 0 };
                            }
                            vendorAggregated[vendor].매출액 += vRev;
                            vendorAggregated[vendor].매출원가 += vCogs;
                        });
                    }
                });

                // 거래처별 집계 시트 데이터 포맷팅
                const exportData4 = Object.keys(vendorAggregated).sort().map(vendor => {
                    const rev = vendorAggregated[vendor].매출액;
                    const cogs = vendorAggregated[vendor].매출원가;
                    const profit = rev - cogs;
                    const margin = rev !== 0 ? ((profit / rev) * 100).toFixed(1) : '0';
                    return {
                        '거래처명': vendor,
                        '총 매출액': rev,
                        '총 매출원가': cogs,
                        '총 매출이익': profit,
                        '종합 마진율(%)': margin + '%'
                    };
                });

                // Sheet 5: 마감 요약 (경영 아카이브용)
                const totalProfit = totalRev - totalCogs;
                const totalMargin = totalRev !== 0 ? ((totalProfit / totalRev) * 100).toFixed(1) : '0';
                
                const exportData5 = [{
                    '결산일자': targetDateStr, 
                    '분석기간': analysisPeriod,
                    '총 매출액(₩)': totalRev,
                    '총 매출원가(₩)': totalCogs,
                    '매출 총이익(₩)': totalProfit,
                    '종합 마진율(%)': totalMargin + '%',
                    '기말 재고자산 총액(₩)': totalAsset,
                    '발생 로스 총액(₩)': totalLossValue,
                    '운영 코멘트': '※ 이 행의 데이터를 일일/월간 경영 대시보드에 복사하여 누적(Archive)하세요.'
                }];

                const wb = XLSX.utils.book_new();

                if (exportData1.length > 0) {
                    const ws1 = XLSX.utils.json_to_sheet(exportData1); 
                    XLSX.utils.book_append_sheet(wb, ws1, '재고(이월용)');
                } else {
                    const ws1 = XLSX.utils.json_to_sheet([{'메시지': '유효한 품목 데이터가 없습니다.'}]); 
                    XLSX.utils.book_append_sheet(wb, ws1, '재고(이월용)');
                }

                if (exportData2.length > 0) {
                    const ws2 = XLSX.utils.json_to_sheet(exportData2);
                    Object.keys(ws2).forEach(cellAddress => {
                        if (cellAddress === '!ref' || cellAddress === '!margins') return;
                        const cell = ws2[cellAddress];
                        if (cellAddress.startsWith('D') && cellAddress !== 'D1') {
                            cell.t = 's'; 
                            cell.v = '01'; 
                            cell.w = '01'; 
                        }
                        if (cellAddress.startsWith('E') && cellAddress !== 'E1') {
                            cell.t = 's'; 
                        }
                    });
                    XLSX.utils.book_append_sheet(wb, ws2, '실사양식');
                }

                if (exportData3.length > 0) {
                    const ws3 = XLSX.utils.json_to_sheet(exportData3);
                    XLSX.utils.book_append_sheet(wb, ws3, '거래처매출(Raw)');
                }

                if (exportData4.length > 0) {
                    const ws4 = XLSX.utils.json_to_sheet(exportData4);
                    XLSX.utils.book_append_sheet(wb, ws4, '거래처별집계');
                }

                if (exportData5.length > 0) {
                    const ws5 = XLSX.utils.json_to_sheet(exportData5);
                    ws5['!cols'] = [{wch:12}, {wch:20}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:20}, {wch:18}, {wch:60}];
                    XLSX.utils.book_append_sheet(wb, ws5, '마감요약(아카이브)');
                }

                XLSX.writeFile(wb, `수불마감_${exportFileNameDate}.xlsx`);
                
                setTimeout(() => {
                    setAlertMsg("✅ 마감 데이터가 엑셀로 추출되었습니다.\n\n[💡 데이터 운영 노하우]\n1. 방금 다운받은 엑셀의 첫 번째 탭[재고(이월용)]은 내일의 '1번. 기초 재고' 파일로 그대로 다시 업로드하세요.\n\n2. 마지막 탭[마감요약]의 딱 한 줄 데이터는 경영 아카이브 시트에 매일/매월 복사해 두시면 회사의 핵심 지표 추이가 완성됩니다.");
                }, 500);

            }, [filteredProductData, productData, analysisPeriod, targetDateStr]);

            useEffect(() => {
                actionRefs.current = { 
                    handleCombinedExport: handleCombinedExport,
                    runAnalysis: () => runAnalysisRef.current(),
                    handleIssueJump: (dir) => {
                        if (activeIssueModeRef.current) {
                            handleIssueJumpRef.current(activeIssueModeRef.current, dir, false);
                        }
                    }
                };
            }, [handleCombinedExport]);

            useEffect(() => {
                const handleGlobalEnter = (e) => {
                    if (e.key === 'Enter') {
                        if (document.querySelector('.modal-bounce')) return;
                        const activeEl = document.activeElement;
                        const tag = activeEl ? activeEl.tagName.toLowerCase() : '';
                        const type = activeEl ? activeEl.type : '';
                        const isTyping = tag === 'textarea' || (tag === 'input' && (type === 'text' || type === 'number' || type === 'search'));
                        if (!isTyping && tag !== 'button') {
                            if (appStep === 'upload' && !isProcessing && (files.in || files.out || files.prev || files.end)) {
                                e.preventDefault(); actionRefs.current.runAnalysis();
                            }
                        }
                    }
                };

                const handleGlobalKeys = (e) => {
                    if (document.querySelector('.modal-bounce')) {
                        if (e.key === 'Escape') setUndoUi({ state: 'closed' }); return;
                    }
                    if (e.key === 'F8') { e.preventDefault(); actionRefs.current.handleCombinedExport(); }
                    if (e.key === 'Escape') {
                        if (linkSourceKey) {
                            setLinkSourceKey(null);
                            if (focusedInputRef.current.key) {
                                setTimeout(() => {
                                    const input = document.getElementById(`actual-input-${focusedInputRef.current.idx}`);
                                    if (input) { input.focus(); input.select(); }
                                }, 50);
                            }
                        }
                        if (activeIssueModeRef.current) {
                            setActiveIssueMode(null);
                        }
                    }
                    if (e.key === 'Tab' && appStep === 'closing') {
                        if (activeIssueModeRef.current) {
                            e.preventDefault();
                            actionRefs.current.handleIssueJump(e.shiftKey ? 'prev' : 'next');
                        }
                    }
                };

                window.addEventListener('keydown', handleGlobalEnter);
                window.addEventListener('keydown', handleGlobalKeys);
                return () => { window.removeEventListener('keydown', handleGlobalEnter); window.removeEventListener('keydown', handleGlobalKeys); };
            }, [linkSourceKey, appStep, isProcessing, files]);

            return (
                <div className="h-screen flex flex-col bg-[#f8fafc] w-full relative" onDragOver={(e) => { e.preventDefault(); setIsGlobalDragging(true); }} onDragLeave={(e) => { e.preventDefault(); setIsGlobalDragging(false); }} onDrop={handleGlobalDrop}>
                    
                    <header className="shrink-0 bg-white border-b border-gray-200 w-full z-40 relative">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex justify-between items-center">
                            <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                                <h1 className="text-xl md:text-2xl font-black text-gray-800 tracking-tight flex items-center">
                                    <span className="text-indigo-600 mr-2">oneapp</span> DataOps
                                    <span className="text-purple-500 text-[10px] px-2 py-0.5 bg-purple-50 rounded-full border border-purple-200 font-bold shadow-sm whitespace-nowrap hidden sm:inline-block ml-3">Light V1.24</span>
                                </h1>
                            </div>

                            <div className="flex gap-2 shrink-0">
                                <button onClick={() => setShowSettings(!showSettings)} className="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 rounded text-xs font-bold shadow-sm hover:bg-gray-50 transition">매핑설정</button>
                            </div>
                        </div>
                    </header>

                    {showSettings && (
                        <div className="absolute top-[60px] left-0 right-0 z-50 flex justify-center animate-[fadeIn_0.3s_ease-out]">
                            <div className="bg-white border-2 border-indigo-200 p-6 rounded-xl shadow-xl relative overflow-hidden w-full max-w-7xl mx-4">
                                <div className="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
                                <div className="flex justify-between items-center mb-5">
                                    <div><h3 className="text-lg font-bold text-gray-800"><i className="fas fa-sitemap text-indigo-500 mr-2"></i>엑셀 열(Header) 인식 규칙 설정</h3></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                    {Object.entries({ 
                                        code: '품목코드 (필수)', 
                                        name: '품목명 (필수)', 
                                        spec: '규격 열 (선택)', 
                                        qty: '수량/실사 (필수)', 
                                        price: '매입단가 (필수)', 
                                        date: '일자 (필수)', 
                                        vendor: '거래처명, 거래처 (선택)', 
                                        matchVendor: '판매전표 내 구매처 (Lot 매칭)',
                                        excludeVendor: '제외 거래처(창고이동 등)' 
                                    }).map(([key, label]) => (
                                        <div key={key} className="flex flex-col">
                                            <label className={`text-xs font-bold mb-1 ${key === 'excludeVendor' ? 'text-red-600' : (key === 'matchVendor' ? 'text-blue-600' : 'text-gray-600')}`}>
                                                {key === 'excludeVendor' && <i className="fas fa-ban mr-1"></i>}
                                                {key === 'matchVendor' && <i className="fas fa-link mr-1"></i>}
                                                {label}
                                            </label>
                                            <input type="text" value={mappings[key]} onChange={(e) => setMappings({...mappings, [key]: e.target.value})} className={`border rounded-md px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 shadow-sm ${key === 'excludeVendor' ? 'border-red-300 focus:ring-red-400 bg-red-50 text-red-800' : (key === 'matchVendor' ? 'border-blue-300 focus:ring-blue-400 bg-blue-50 text-blue-800' : 'border-gray-300 focus:ring-indigo-400 bg-white')}`} />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 flex justify-end items-center gap-4">
                                    <button onClick={() => setMappings(defaultMappings)} className="text-sm text-gray-500 hover:text-red-500 font-bold transition-colors">기본값 복원</button>
                                    <button onClick={saveMappings} className="bg-gray-800 text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-gray-900 shadow-md">설정 저장 및 닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 z-[350] bg-gray-900 bg-opacity-60 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md modal-bounce">
                                <div className="flex items-center mb-4">
                                    <i className="fas fa-exclamation-circle text-orange-500 text-2xl mr-3"></i>
                                    <h3 className="font-bold text-gray-800 text-lg">데이터 필터링 알림</h3>
                                </div>
                                <p className="text-gray-700 font-medium mb-3 text-sm leading-relaxed">
                                    파일명 기준의 분석 기간에 포함되지 않는 매입/매출 데이터가 발견되었습니다.
                                </p>
                                <ul className="list-disc pl-5 space-y-1.5 mb-5 text-sm text-red-600 font-bold">
                                    {confirmModal.warnings.map((w, i) => <li key={i}>{w}</li>)}
                                </ul>
                                <p className="text-xs text-gray-600 mb-6 bg-gray-50 p-3 rounded border border-gray-200">
                                    ※ 시스템은 <strong>업로드하신 파일명 날짜를 우선 기준</strong>으로 데이터를 필터링합니다.<br/> (해당 기간을 벗어나는 데이터는 분석에서 제외됩니다)
                                </p>
                                
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => { setConfirmModal({isOpen: false, warnings: [], payload: null}); setIsProcessing(false); }} className="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-200 transition">취소 (재업로드)</button>
                                    <button onClick={() => executeAnalysis(confirmModal.payload)} className="px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-sm">확인 및 분석 진행</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {alertMsg && !confirmModal.isOpen && (
                        <div className="fixed inset-0 z-[300] bg-gray-900 bg-opacity-60 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm modal-bounce text-center">
                                <i className="fas fa-exclamation-triangle text-indigo-500 text-4xl mb-4"></i>
                                <p className="text-gray-800 font-bold mb-6 whitespace-pre-line leading-relaxed">{alertMsg}</p>
                                <button id="alert-confirm-btn" autoFocus onClick={() => setAlertMsg('')} className="px-6 py-2.5 bg-gray-800 text-white rounded-lg text-sm font-bold hover:bg-gray-900 transition shadow-md w-full">확인</button>
                            </div>
                        </div>
                    )}

                    {memoModal.isOpen && (
                        <div className="fixed inset-0 z-[250] bg-gray-900 bg-opacity-60 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm modal-bounce">
                                <h3 className="font-bold text-gray-800 mb-4 text-lg"><i className="fas fa-edit text-indigo-500 mr-2"></i>조정 사유 메모</h3>
                                <textarea 
                                    className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none font-medium"
                                    rows="3"
                                    placeholder="오차 발생 원인이나 특이사항을 기재하세요."
                                    value={memoModal.text}
                                    onChange={(e) => setMemoModal(prev => ({...prev, text: e.target.value}))}
                                    autoFocus
                                ></textarea>
                                <div className="flex justify-end gap-2 mt-4">
                                    <button onClick={() => setMemoModal({isOpen: false, batchKey: null, text: ''})} className="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-200 transition">취소</button>
                                    <button onClick={() => { handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({isOpen: false, batchKey: null, text: ''}); }} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-sm">저장</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 flex flex-col overflow-hidden w-full relative">
                        {error && <div className="shrink-0 bg-red-50 text-red-600 p-3 text-sm font-bold flex items-center justify-center border-b border-red-200 w-full"><div className="max-w-7xl w-full px-4"><i className="fas fa-exclamation-triangle mr-2 text-lg"></i>{error}</div></div>}

                        {appStep === 'upload' && (
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 fade-in w-full flex justify-center">
                                <div className="max-w-7xl w-full">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-base font-bold text-gray-800"><i className="fas fa-file-upload text-indigo-500 mr-2"></i>엑셀 파일 업로드(선택/드래그)</span>
                                            <div className="flex gap-2 items-center">
                                                {(files.prev || files.in || files.out || files.end) && <button onClick={handleResetFiles} className="px-3 py-1.5 bg-gray-100 text-gray-500 rounded text-xs font-bold hover:bg-gray-200 transition">초기화</button>}
                                                <button onClick={() => runAnalysisRef.current()} disabled={isProcessing || (!files.in && !files.out && !files.prev && !files.end)} className={`px-6 py-2 rounded-lg text-white font-bold text-sm shadow-md transition flex items-center ${isProcessing || (!files.in && !files.out && !files.prev && !files.end) ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                                    {isProcessing ? '처리중...' : <>분석 실행 (수불부 생성) <span className="ml-2 px-1.5 py-0.5 bg-indigo-800 text-indigo-200 text-[10px] rounded border border-indigo-400 opacity-80">Enter</span></>}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 relative z-20">
                                            <FileBox title="1. 기초 재고" type="prev" icon="fa-history" color="blue" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="2. 당기 매입" type="in" icon="fa-truck-loading" color="emerald" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="3. 당기 매출" type="out" icon="fa-receipt" color="indigo" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="4. 실사 (옵션)" type="end" icon="fa-clipboard-check" color="purple" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {appStep === 'closing' && (
                            <div className="flex-1 flex flex-col h-full fade-in w-full">
                                <div className="shrink-0 bg-[#f8fafc] pt-4 pb-2 z-30 shadow-sm border-b border-gray-200 w-full">
                                    <div className="max-w-7xl mx-auto px-4 md:px-6 flex flex-col gap-3">
                                        
                                        <div className="flex items-center justify-between bg-white px-4 py-2 rounded-lg border border-gray-200 shadow-sm">
                                            <div className="flex items-center text-xs font-bold text-gray-500 overflow-x-auto whitespace-nowrap hide-scrollbar flex-1">
                                                <span className="flex items-center"><span className="w-5 h-5 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-1.5 shrink-0">1</span> <span className="truncate max-w-[100px]">{files.prev ? <span className="text-gray-800">{files.prev.name}</span> : '(공백)'}</span></span>
                                                <span className="text-gray-300 mx-3">|</span>
                                                <span className="flex items-center"><span className="w-5 h-5 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-1.5 shrink-0">2</span> <span className="truncate max-w-[100px]">{files.in ? <span className="text-gray-800">{files.in.name}</span> : '(공백)'}</span></span>
                                                <span className="text-gray-300 mx-3">|</span>
                                                <span className="flex items-center"><span className="w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center mr-1.5 shrink-0">3</span> <span className="truncate max-w-[100px]">{files.out ? <span className="text-gray-800">{files.out.name}</span> : '(공백)'}</span></span>
                                                <span className="text-gray-300 mx-3">|</span>
                                                <span className="flex items-center"><span className="w-5 h-5 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center mr-1.5 shrink-0">4</span> <span className="truncate max-w-[100px]">{files.end ? <span className="text-gray-800">{files.end.name}</span> : '(공백)'}</span></span>
                                                
                                                <span className="text-[11px] text-gray-700 font-bold ml-4 border-l pl-4 border-gray-200">
                                                    분석기간: {analysisPeriod}
                                                </span>
                                            </div>
                                            <div className="flex gap-2 shrink-0 ml-4 items-center">
                                                <button onClick={handleResetFiles} className="px-3 py-1.5 bg-gray-100 text-gray-600 rounded text-[11px] font-bold hover:bg-gray-200 transition shadow-sm flex items-center">
                                                    <i className="fas fa-redo-alt mr-1"></i>초기화
                                                </button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-3">
                                            <div 
                                                onClick={() => handleIssueJump('missingPrice', 'next', true)}
                                                className={`p-3 rounded-lg border flex flex-col justify-between cursor-pointer transition-all ${activeIssueMode === 'missingPrice' ? 'bg-red-100 border-red-400 ring-2 ring-red-200 scale-[1.02] shadow-md' : (closingStats.missingPriceCount > 0 ? 'bg-red-50 border-red-200 hover:bg-red-100' : 'bg-gray-50 border-gray-200 hover:bg-gray-100')}`}
                                            >
                                                <div className="text-xs font-bold text-gray-500 mb-1 flex items-center"><i className="fas fa-exclamation-circle mr-1.5 text-red-400"></i>단가 누락 (매입없음)</div>
                                                <div className={`text-xl font-black ${closingStats.missingPriceCount > 0 ? 'text-red-600' : 'text-gray-700'}`}>{closingStats.missingPriceCount}건</div>
                                                <div className="text-[10px] text-red-500 font-bold mt-1"><i className="fas fa-arrow-down mr-1"></i>[Tab] 다음 항목 이동</div>
                                            </div>
                                            <div 
                                                onClick={() => handleIssueJump('loss', 'next', true)}
                                                className={`p-3 rounded-lg border flex flex-col justify-between cursor-pointer transition-all ${activeIssueMode === 'loss' ? 'bg-orange-100 border-orange-400 ring-2 ring-orange-200 scale-[1.02] shadow-md' : (closingStats.lossCount > 0 ? 'bg-orange-50 border-orange-200 hover:bg-orange-100' : 'bg-gray-50 border-gray-200 hover:bg-gray-100')}`}
                                            >
                                                <div className="text-xs font-bold text-gray-500 mb-1 flex items-center"><i className="fas fa-balance-scale mr-1.5 text-orange-400"></i>재고 오차 (확인필요)</div>
                                                <div className={`text-xl font-black ${closingStats.lossCount > 0 ? 'text-orange-600' : 'text-gray-700'}`}>{closingStats.lossCount}건</div>
                                                <div className="text-[10px] text-orange-500 font-bold mt-1"><i className="fas fa-arrow-down mr-1"></i>[Tab] 다음 항목 이동</div>
                                            </div>
                                            <div 
                                                onClick={() => handleIssueJump('multiPrice', 'next', true)}
                                                className={`p-3 rounded-lg border flex flex-col justify-between cursor-pointer transition-all ${activeIssueMode === 'multiPrice' ? 'bg-blue-100 border-blue-400 ring-2 ring-blue-200 scale-[1.02] shadow-md' : (closingStats.multiPriceCount > 0 ? 'bg-blue-50 border-blue-200 hover:bg-blue-100' : 'bg-gray-50 border-gray-200 hover:bg-gray-100')}`}
                                            >
                                                <div className="text-xs font-bold text-gray-500 mb-1 flex items-center"><i className="fas fa-tags mr-1.5 text-blue-500"></i>원가 매칭 (복수단가)</div>
                                                <div className={`text-xl font-black ${closingStats.multiPriceCount > 0 ? 'text-blue-600' : 'text-gray-700'}`}>{closingStats.multiPriceCount}건</div>
                                                <div className="text-[10px] text-blue-600 font-bold mt-1"><i className="fas fa-arrow-down mr-1"></i>[Tab] 다음 그룹 이동</div>
                                            </div>
                                        </div>

                                        <div className="flex flex-col md:flex-row justify-between items-end md:items-center gap-2 mt-4 mb-2">
                                            <div className="flex items-center gap-2 w-full md:w-auto">
                                                <div className="relative w-full md:w-64 shrink-0">
                                                    <div className="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
                                                        <i className="fas fa-search text-gray-400 text-xs"></i>
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        placeholder="품명, 코드, 거래처 검색..." 
                                                        value={filters.search} 
                                                        onChange={e => setFilters(f => ({
                                                            ...f, 
                                                            search: e.target.value, 
                                                            issuesOnly: e.target.value ? false : f.issuesOnly, 
                                                            excludeZeroActual: e.target.value ? false : f.excludeZeroActual
                                                        }))} 
                                                        onKeyDown={e => {
                                                            if (e.key === 'Enter') {
                                                                e.preventDefault();
                                                                e.target.select();
                                                            }
                                                        }}
                                                        className="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-medium shadow-sm transition-all placeholder-gray-400 text-gray-800" 
                                                    />
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-1.5 items-center justify-end w-full md:w-auto">
                                                <div className="flex items-center gap-1.5 mr-1">
                                                    <div className="flex items-center bg-white rounded-lg border border-purple-200 shadow-sm overflow-hidden shrink-0">
                                                        <button 
                                                            onClick={() => {
                                                                const { key, idx } = focusedInputRef.current;
                                                                if (!key) { setAlertMsg("조정할 상품의 실사칸을 클릭(선택)하여 커서를 위치시킨 후 버튼을 눌러주세요."); return; }
                                                                handleSpacebarLink(key, idx);
                                                            }}
                                                            className={`px-4 py-2 text-[12px] font-bold transition flex items-center 
                                                                ${linkSourceKey ? 'bg-purple-600 text-white animate-pulse' : 'text-purple-700 hover:bg-purple-50'}`}
                                                        >
                                                            <i className="fas fa-exchange-alt mr-1.5"></i>
                                                            {linkSourceKey ? '조정 완료' : '재고 조정(로스상계)'} 
                                                            <span className={`ml-1 px-1.5 py-0.5 rounded text-[10px] border ${linkSourceKey ? 'bg-purple-700 border-purple-500 text-purple-200' : 'bg-gray-100 border-gray-200 text-gray-500'}`}>Space</span>
                                                        </button>
                                                    </div>
                                                    {substHistory.length > 0 && (
                                                        <button onClick={() => setUndoUi({ state: 'list' })} className="px-3 py-2 rounded-lg border border-red-200 text-[12px] font-bold bg-red-50 text-red-600 hover:bg-red-100 transition shadow-sm flex items-center shrink-0" title="재고조정 내역 목록 보기">
                                                            <i className="fas fa-undo mr-1.5"></i>조정 취소 ({substHistory.length})
                                                        </button>
                                                    )}
                                                </div>

                                                <button onClick={() => setFilters({...filters, issuesOnly: !filters.issuesOnly})} className={`px-3 py-2 rounded border text-[12px] font-bold transition shrink-0 ${filters.issuesOnly ? 'bg-red-50 text-red-700 border-red-200 shadow-inner' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>이슈/결과 필터</button>
                                                <button onClick={() => setFilters({...filters, excludeZeroActual: !filters.excludeZeroActual})} className={`px-3 py-2 rounded border text-[12px] font-bold transition shrink-0 ${filters.excludeZeroActual ? 'bg-blue-50 text-blue-700 border-blue-200 shadow-inner' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>실사 0 제외</button>
                                                
                                                <button onClick={actionRefs.current.handleCombinedExport} className="px-4 py-2 bg-indigo-800 hover:bg-indigo-900 text-white rounded text-[12px] font-bold shadow-md transition flex items-center shrink-0" title="마감 데이터를 엑셀로 추출하고 아카이브합니다">
                                                    <i className="fas fa-file-excel mr-1.5"></i>마감 추출 및 아카이브 (F8)
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto relative bg-white border-t border-gray-200 shadow-inner w-full flex justify-center">
                                    <div className="max-w-7xl w-full flex flex-col relative pb-4">
                                        <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                                            <thead className="bg-gray-100 text-gray-600 font-bold uppercase tracking-wider text-[11px] sticky top-0 z-20 shadow-sm">
                                                <tr>
                                                    <th className="py-2 px-3 border-b border-gray-200 sticky left-0 bg-gray-100 z-20 shadow-[1px_0_0_rgba(0,0,0,0.1)] border-r-2 border-gray-200 w-auto">품명(규격) / 일자 / 거래처 <span className="text-gray-300 mx-1">|</span> 단가</th>
                                                    <th className="py-2 px-2 border-b border-gray-200 text-right bg-gray-50 border-r border-gray-100 w-[75px] min-w-[75px] max-w-[75px]">재고</th>
                                                    <th className="py-2 px-2 border-b border-gray-200 text-right bg-emerald-50 text-emerald-700 border-r border-gray-100 w-[75px] min-w-[75px] max-w-[75px]">입고</th>
                                                    <th className="py-2 px-2 border-b border-gray-200 text-right bg-red-50 text-red-700 border-r border-gray-100 w-[75px] min-w-[75px] max-w-[75px]">출고</th>
                                                    <th className="py-2 px-2 border-b border-gray-200 text-right bg-purple-50 text-purple-700 border-r border-gray-100 w-[75px] min-w-[75px] max-w-[75px]">실사</th>
                                                    <th className="py-2 px-2 border-b border-gray-200 text-right bg-red-50 text-red-600 border-r border-gray-200 w-[75px] min-w-[75px] max-w-[75px]">조정</th>
                                                    <th className="py-2 px-3 border-b border-gray-200 text-left w-full min-w-[200px]">이슈/결과 및 메모</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {filteredProductData.length === 0 ? (
                                                    <tr><td colSpan="7" className="p-8 text-center text-gray-400 font-medium">표시할 데이터가 없습니다.</td></tr>
                                                ) : (
                                                    filteredProductData.map((item, idx) => (
                                                        <ProductRow 
                                                            key={item.batchKey} 
                                                            item={item} 
                                                            idx={idx} 
                                                            isLinked={linkSourceKey === item.batchKey} 
                                                            isActiveMulti={activeMultiCode === item.코드}
                                                            onStockChange={handleManualStockChange} 
                                                            onSpacebar={handleSpacebarLink} 
                                                            onFocusInput={handleFocusInput} 
                                                            onBaseDataChange={handleBaseDataChange}
                                                            onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                            onSalesMove={handleSalesMove}
                                                        />
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-gray-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce">
                                <div className="bg-gray-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-yellow-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-gray-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-gray-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-gray-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden">
                                            <thead className="bg-gray-100 text-gray-600">
                                                <tr>
                                                    <th className="p-3 font-bold border-b">원물 (차감 내역)</th>
                                                    <th className="p-3 font-bold border-b">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-bold border-b">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-blue-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-red-500 font-black">-{h.sQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-500 font-black">+{h.tQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-100 hover:text-red-600 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-gray-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-red-600 font-bold hover:text-red-800 hover:bg-red-50 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-gray-800 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-gray-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
