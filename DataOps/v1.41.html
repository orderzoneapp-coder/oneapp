            useEffect(() => {
                const handleGlobalEnter = (e) => {
                    if (e.key === 'Enter') {
                        if (document.querySelector('.modal-bounce')) return;
                        const activeEl = document.activeElement;
                        const tag = activeEl ? activeEl.tagName.toLowerCase() : '';
                        const type = activeEl ? activeEl.type : '';
                        const isTyping = tag === 'textarea' || (tag === 'input' && (type === 'text' || type === 'number' || type === 'search'));
                        if (!isTyping && tag !== 'button') {
                            if (appStep === 'upload' && !isProcessing && (files.in || files.out || files.prev || files.end)) {
                                e.preventDefault(); actionRefs.current.runAnalysis();
                            }
                        }
                    }
                };

                const handleGlobalKeys = (e) => {
                    if (document.querySelector('.modal-bounce')) {
                        if (e.key === 'Escape') { setUndoUi({ state: 'closed' }); }
                        return;
                    }
                    if (e.key === 'F8') { e.preventDefault(); actionRefs.current.handleCombinedExport(); }
                    if (e.key === 'Escape') {
                        if (linkSourceKey) {
                            setLinkSourceKey(null);
                            if (focusedInputRef.current.key) {
                                setTimeout(() => {
                                    const input = document.getElementById(`actual-input-${focusedInputRef.current.idx}`);
                                    if (input) { input.focus(); input.select(); }
                                }, 50);
                            }
                        }
                        if (activeIssueModeRef.current) {
                            setActiveIssueMode(null);
                        }
                    }
                    if (e.key === 'Tab' && appStep === 'closing') {
                        if (activeIssueModeRef.current) {
                            e.preventDefault();
                            actionRefs.current.handleIssueJump(e.shiftKey ? 'prev' : 'next');
                        }
                    }
                };

                window.addEventListener('keydown', handleGlobalEnter);
                window.addEventListener('keydown', handleGlobalKeys);
                return () => { window.removeEventListener('keydown', handleGlobalEnter); window.removeEventListener('keydown', handleGlobalKeys); };
            }, [linkSourceKey, appStep, isProcessing, files]);

            return (
                <div className="h-screen flex flex-col bg-[#f8fafc] w-full relative" onDragOver={(e) => { e.preventDefault(); setIsGlobalDragging(true); }} onDragLeave={(e) => { e.preventDefault(); setIsGlobalDragging(false); }} onDrop={handleGlobalDrop}>

                            </div>
                        </div>
                    </header>

                    {showSettings && (
                        <div className="absolute top-[60px] left-0 right-0 z-50 flex justify-center animate-[fadeIn_0.3s_ease-out]">

                                <div className="flex justify-between items-center mb-5">

                                        name: '품목명 (필수)', 
                                        spec: '규격 열 (선택)', 
                                        qty: '수량/실사 (필수)', 
                                        price: '매입단가 (필수)', 
                                        date: '일자 (필수)', 
                                        vendor: '거래처명, 거래처 (선택)', 
                                        matchVendor: '판매전표 내 구매처 (Lot 매칭)',
                                        excludeVendor: '제외 거래처(창고이동 등)' 
                                    }).map(([key, label]) => (

                                                {key === 'matchVendor' && <i className="fas fa-link mr-1"></i>}
                                                {label}

                                            <input type="text" value={mappings[key]} onChange={(e) => setMappings({...mappings, [key]: e.target.value})} className={`border rounded-md px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 shadow-sm ${key === 'excludeVendor' ? 'border-rose-300 focus:ring-rose-400 bg-rose-50 text-rose-800' : (key === 'matchVendor' ? 'border-blue-300 focus:ring-blue-400 bg-blue-50 text-blue-800' : 'border-slate-300 focus:ring-blue-400 bg-white')}`} />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 flex justify-end items-center gap-4">
                                    <button onClick={() => setMappings(defaultMappings)} className="text-sm text-slate-500 hover:text-rose-500 font-bold transition-colors">기본값 복원</button>

                                </div>
                            </div>

                                <div className="flex items-center mb-4">
                                    <i className="fas fa-exclamation-circle text-orange-500 text-2xl mr-3"></i>
                                    <h3 className="font-bold text-slate-800 text-lg">데이터 필터링 알림</h3>
                                </div>
                                <p className="text-slate-700 font-medium mb-3 text-sm leading-relaxed">

                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 relative z-20">
                                            <FileBox title="1. 기초 재고" type="prev" icon="fa-history" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="2. 당기 매입" type="in" icon="fa-truck-loading" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="3. 당기 매출" type="out" icon="fa-receipt" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                            <FileBox title="4. 실사 (옵션)" type="end" icon="fa-clipboard-check" files={files} setFiles={setFiles} autoAssignFiles={autoAssignFiles} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {appStep === 'closing' && (
                            <div className="flex-1 flex flex-col h-full fade-in w-full relative">
                                {isProcessing && (
                                    <div className="absolute inset-0 z-[100] bg-white bg-opacity-60 backdrop-blur-sm flex items-center justify-center">
                                        <div className="bg-slate-800 text-white px-6 py-4 rounded-xl shadow-xl flex items-center font-bold text-lg animate-pulse">
                                            <i className="fas fa-spinner fa-spin mr-3 text-2xl"></i> 데이터를 분석하고 있습니다...
                                        </div>
                                    </div>
                                )}
                                <div className="shrink-0 bg-white pt-4 pb-2 z-30 shadow-sm border-b border-slate-200 w-full">
                                    <div className="max-w-7xl mx-auto px-4 md:px-6 flex flex-col gap-3">
                                        
                                        <div className="flex items-center justify-between bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 shadow-inner relative">
                                            <input type="file" ref={closingFileInputRef} accept=".xlsx, .xls, .csv" onChange={onClosingFileChange} className="hidden" />

                                            <div className="flex items-center text-xs overflow-x-auto whitespace-nowrap hide-scrollbar flex-1 gap-2">
                                                <button onClick={() => handleClosingFileUpload('prev')} className={`flex items-center px-2.5 py-1.5 rounded border transition-all ${files.prev ? 'bg-white border-slate-300 hover:border-blue-400 shadow-sm' : 'bg-transparent border-dashed border-slate-300 hover:border-slate-400'} group`} title="1. 기초 재고 업로드/변경">
                                                    <span className={`w-2 h-2 rounded-full flex items-center justify-center mr-1.5 shrink-0 transition-colors ${files.prev ? 'bg-blue-500' : 'bg-slate-300'}`}></span>

                                                </button>
                                                <button onClick={() => handleClosingFileUpload('in')} className={`flex items-center px-2.5 py-1.5 rounded border transition-all ${files.in ? 'bg-white border-slate-300 hover:border-emerald-400 shadow-sm' : 'bg-transparent border-dashed border-slate-300 hover:border-slate-400'} group`} title="2. 당기 매입 업로드/변경">
                                                    <span className={`w-2 h-2 rounded-full flex items-center justify-center mr-1.5 shrink-0 transition-colors ${files.in ? 'bg-emerald-500' : 'bg-slate-300'}`}></span>

                                                    <span className={`truncate max-w-[100px] ${files.out ? 'text-slate-700 font-bold' : 'text-slate-400 font-semibold'}`}>{files.out ? files.out.name : '+ 매출 추가'}</span>

                                                <button onClick={() => handleClosingFileUpload('end')} className={`flex items-center px-2.5 py-1.5 rounded border transition-all ${files.end ? 'bg-white border-slate-300 hover:border-purple-400 shadow-sm' : 'bg-transparent border-dashed border-slate-300 hover:border-slate-400'} group`} title="4. 실사 업로드/변경">

                                            <div className="flex flex-wrap gap-1.5 items-center justify-end w-full md:w-auto">
                                                <div className="flex items-center gap-1.5 mr-2">
                                                    <div className="flex items-center bg-white rounded-md border border-slate-300 shadow-sm overflow-hidden shrink-0">
                                                        <button 
                                                            onClick={() => {
                                                                const { key, idx } = focusedInputRef.current;
                                                                if (!key) { setAlertMsg("조정할 상품의 실사칸을 클릭(선택)하여 커서를 위치시킨 후 버튼을 눌러주세요."); return; }
                                                                handleSpacebarLink(key, idx);
                                                            }}
                                                            className={`px-4 py-2 text-[12px] font-bold transition flex items-center 
                                                                ${linkSourceKey ? 'bg-slate-800 text-white animate-pulse' : 'text-slate-700 hover:bg-slate-50'}`}
                                                        >
                                                            <i className="fas fa-exchange-alt mr-1.5"></i>
                                                            {linkSourceKey ? '조정 대상 선택...' : '재고 조정(로스상계)'} 
                                                            <span className={`ml-2 px-1.5 py-0.5 rounded text-[10px] border ${linkSourceKey ? 'bg-slate-700 border-slate-600 text-slate-200' : 'bg-slate-100 border-slate-200 text-slate-500'}`}>Space</span>
                                                        </button>
                                                    </div>
                                                    {substHistory.length > 0 && (
                                                        <button onClick={() => setUndoUi({ state: 'list' })} className="px-3 py-2 rounded-md border border-rose-200 text-[12px] font-bold bg-rose-50 text-rose-600 hover:bg-rose-100 transition shadow-sm flex items-center shrink-0">
                                                            <i className="fas fa-undo mr-1.5"></i>조정 취소 ({substHistory.length})
                                                        </button>
                                                    )}
                                                </div>

                                                <button onClick={() => setFilters({...filters, issuesOnly: !filters.issuesOnly})} className={`px-3 py-2 rounded-md border text-[12px] font-bold transition shrink-0 ${filters.issuesOnly ? 'bg-slate-800 text-white border-slate-800 shadow-inner' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50 shadow-sm'}`}>이슈/결과 필터</button>
                                                <button onClick={() => setFilters({...filters, excludeZeroActual: !filters.excludeZeroActual})} className={`px-3 py-2 rounded-md border text-[12px] font-bold transition shrink-0 ${filters.excludeZeroActual ? 'bg-slate-800 text-white border-slate-800 shadow-inner' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50 shadow-sm'}`}>실사 0 제외</button>
                                                
                                                <div className="w-px h-6 bg-slate-300 mx-1"></div>

                                                <button onClick={actionRefs.current.handleCombinedExport} className="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-md text-[12px] font-bold shadow-md transition flex items-center shrink-0 border border-slate-700" title="수불부 마감 데이터를 엑셀로 추출합니다">
                                                    <i className="fas fa-file-excel mr-1.5 text-emerald-400"></i>마감 엑셀 다운로드 (F8)
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto relative bg-white border-t border-slate-200 w-full flex justify-center">
                                    <div className="max-w-7xl w-full flex flex-col relative pb-4">
                                        <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                                            <thead className="bg-slate-50/90 backdrop-blur-sm text-slate-500 font-semibold text-[11px] uppercase tracking-wider sticky top-0 z-20 shadow-sm border-b border-slate-200">
                                                <tr>
                                                    <th className="py-2.5 px-3 border-b border-slate-200 sticky left-0 bg-slate-50/90 backdrop-blur-sm z-20 shadow-[1px_0_0_#e2e8f0] border-r border-slate-200 w-auto">품명(규격) / 일자 / 거래처 <span className="text-slate-300 mx-1">|</span> 단가</th>
                                                    <th className="py-2.5 px-2 border-b border-slate-200 text-right border-r border-slate-200 w-[75px] min-w-[75px] max-w-[75px]">기초 재고</th>
                                                    <th className="py-2.5 px-2 border-b border-slate-200 text-right border-r border-slate-200 w-[75px] min-w-[75px] max-w-[75px]">입고</th>
                                                    <th className="py-2.5 px-2 border-b border-slate-200 text-right border-r border-slate-200 w-[75px] min-w-[75px] max-w-[75px]">출고</th>
                                                    <th className="py-2.5 px-2 border-b border-slate-200 text-right border-r border-slate-200 w-[75px] min-w-[75px] max-w-[75px] text-blue-600">실사 수량</th>
                                                    <th className="py-2.5 px-2 border-b border-slate-200 text-right border-r border-slate-200 w-[75px] min-w-[75px] max-w-[75px]">로스/오차</th>
                                                    <th className="py-2.5 px-3 border-b border-slate-200 text-left w-full min-w-[200px]">이슈/결과 및 메모</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 bg-white">
                                                {filteredProductData.length === 0 ? (
                                                    <tr><td colSpan="7" className="p-8 text-center text-slate-400 font-medium">표시할 데이터가 없습니다.</td></tr>
                                                ) : (
                                                    filteredProductData.map((item, idx) => (
                                                        <ProductRow 
                                                            key={item.batchKey} 
                                                            item={item} 
                                                            idx={idx} 
                                                            isLinked={linkSourceKey === item.batchKey} 
                                                            isActiveMulti={activeMultiCode === item.코드}
                                                            isMultiGroupItem={multiPriceCodes.includes(item.코드)} 
                                                            onStockChange={handleManualStockChange} 
                                                            onSpacebar={handleSpacebarLink} 
                                                            onFocusInput={handleFocusInput} 
                                                            onBaseDataChange={handleBaseDataChange}
                                                            onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                            onSalesMove={handleSalesMove}
                                                        />
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-slate-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce border border-slate-200">
                                <div className="bg-slate-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-slate-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-slate-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-slate-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-slate-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
                                            <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                <tr>
                                                    <th className="p-3 font-semibold">원물 (차감 내역)</th>
                                                    <th className="p-3 font-semibold">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-semibold">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-rose-600 font-black">-{h.sQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-600 font-black">+{h.tQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-100 hover:text-rose-600 hover:border-rose-300 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-rose-600 font-bold hover:text-rose-800 hover:bg-rose-50 border border-transparent hover:border-rose-200 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-slate-800 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-slate-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
