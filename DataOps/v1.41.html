<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp DataOps - 핵심 수불부 관리 (V1.41)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .drag-over { background-color: #f1f5f9 !important; outline: 2px dashed #94a3b8 !important; outline-offset: -2px; transform: scale(1.005); z-index: 20; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .multi-price-highlight { background-color: #f8fafc !important; box-shadow: inset 3px 0 0 0 #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const extractDateFromName = (filename) => {
            if (!filename) return 0;
            const match8 = filename.match(/20\d{6}/); 
            if (match8) return parseInt(match8[0], 10);
            const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); 
            if (match6) return parseInt('20' + match6[1], 10);
            return 0;
        };

        const addOneDay = (dateNum) => {
            if (!dateNum) return 0;
            const y = Math.floor(dateNum / 10000);
            const m = Math.floor((dateNum % 10000) / 100) - 1;
            const d = dateNum % 100;
            const date = new Date(y, m, d + 1);
            return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
        };

        const formatItemDate = (dateStr, refYear) => {
            if (!dateStr) return 0;
            const str = String(dateStr).trim();
            if (str.includes('실사등록') || str.includes('미지정')) return 0; 

            if (/^\d{5}$/.test(str)) {
                const serial = parseInt(str, 10);
                if (serial > 30000 && serial < 80000) {
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                    return parseInt(`${y}${m}${d}`, 10);
                }
            }
            const parts = str.match(/\d+/g);
            if (!parts) return 0;
            
            let y, m, d;
            if (parts.length >= 3) {
                y = parts[0]; if (y.length === 2) y = '20' + y;
                m = parts[1].padStart(2, '0'); 
                d = parts[2].padStart(2, '0');
            } else if (parts.length === 2) {
                if (parts[0].length === 4) {
                    y = parts[0];
                    m = parts[1].padStart(2, '0');
                    d = '01'; 
                } else {
                    y = String(refYear);
                    m = parts[0].padStart(2, '0'); 
                    d = parts[1].padStart(2, '0');
                }
            } else if (parts.length === 1) {
                const cleaned = parts[0];
                if (cleaned.length === 8) {
                    y = cleaned.substring(0, 4);
                    m = cleaned.substring(4, 6);
                    d = cleaned.substring(6, 8);
                } else if (cleaned.length === 6) {
                    if (cleaned.startsWith('20')) {
                        y = cleaned.substring(0, 4);
                        m = cleaned.substring(4, 6);
                        d = '01';
                    } else {
                        y = '20' + cleaned.substring(0, 2);
                        m = cleaned.substring(2, 4);
                        d = cleaned.substring(4, 6);
                    }
                } else {
                    return 0;
                }
            } else {
                return 0;
            }

            const numY = parseInt(y, 10);
            const numM = parseInt(m, 10);
            const numD = parseInt(d, 10);

            if (numY > 2000 && numY < 2100 && numM >= 1 && numM <= 12 && numD >= 1 && numD <= 31) {
                return numY * 10000 + numM * 100 + numD;
            }
            return 0;
        };

        const formatStrForPeriod = (num) => {
            const s = String(num);
            if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
            return s;
        };

        const parseExcelData = (file, currentMappings) => {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const processWorkbook = (wb) => {
                            const sheet = wb.Sheets[wb.SheetNames[0]];
                            const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                            let headerRowIdx = -1; let maxScore = 0;
                            const keywords = {
                                code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                matchVendor: currentMappings.matchVendor ? currentMappings.matchVendor.split(',').map(s => s.trim().toLowerCase()) : [], 
                                spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                            };

                            for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                const row = jsonAll[i] || [];
                                let score = 0;
                                const rowStr = row.join('').replace(/\s/g, '');
                                if (!rowStr) continue;
                                Object.values(keywords).forEach(kwList => {
                                    if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                });
                                if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                            }
                            return { jsonAll, headerRowIdx, maxScore, keywords };
                        };

                        let wb = XLSX.read(data, { type: 'array' });
                        let { jsonAll, headerRowIdx, maxScore, keywords } = processWorkbook(wb);

                        if (maxScore < 2) {
                            try {
                                const text = new TextDecoder('euc-kr').decode(data);
                                const wb2 = XLSX.read(text, { type: 'string' });
                                const res2 = processWorkbook(wb2);
                                if (res2.maxScore > maxScore) { jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; keywords = res2.keywords; }
                            } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                        }

                        if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                        const rawHeaders = jsonAll[headerRowIdx];
                        const uniqueHeaders = []; const headerCounts = {};
                        for (let j = 0; j < rawHeaders.length; j++) {
                            let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                            if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                            uniqueHeaders.push(h);
                        }

                        const parsedData = [];
                        const getValByKeywords = (obj, kwList) => {
                            const keys = Object.keys(obj);
                            for (let kw of kwList) {
                                if(!kw) continue;
                                let match = keys.find(k => k.replace(/\s/g, '').toLowerCase() === kw);
                                if (!match) match = keys.find(k => k.replace(/\s/g, '').toLowerCase().includes(kw));
                                if (match && obj[match] !== undefined && String(obj[match]).trim() !== '') return obj[match];
                            }
                            return null;
                        };

                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i];
                            if (!row || row.join('').trim() === '') continue;
                            
                            const rowObj = {};
                            uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                            
                            const codeRaw = getValByKeywords(rowObj, keywords.code);
                            const codeStr = codeRaw !== null && codeRaw !== undefined ? String(codeRaw).trim() : '';

                            const baseNameRaw = getValByKeywords(rowObj, keywords.name);
                            const baseName = baseNameRaw !== null && baseNameRaw !== undefined ? String(baseNameRaw).trim() : '';

                            if (!codeStr && !baseName) continue;
                            if (codeStr.includes('합계') || codeStr.includes('총계') || 
                                baseName.includes('합계') || baseName.includes('총계') || baseName.includes('총합')) {
                                continue;
                            }
                            
                            if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(codeStr) || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(baseName)) continue;
                            if (codeStr.includes('오전') || codeStr.includes('오후') || baseName.includes('오전') || baseName.includes('오후')) continue;
                            if (codeStr.includes('실사등록') || baseName.includes('실사등록')) continue;
                            if (codeStr.includes('기록없음') || baseName.includes('기록없음')) continue;

                            const specValRaw = getValByKeywords(rowObj, keywords.spec);
                            const specVal = specValRaw !== null && specValRaw !== undefined ? String(specValRaw).trim() : '';
                            
                            let fullName = baseName || '이름없음';
                            if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                            const finalCode = codeStr || 'NO_CODE';

                            const normObj = {
                                코드: finalCode,
                                품명: fullName,
                                수량: parseNumber(getValByKeywords(rowObj, keywords.qty)),
                                단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                거래처: String(getValByKeywords(rowObj, keywords.vendor) || '미지정').trim(),
                                매입처매칭: String(getValByKeywords(rowObj, keywords.matchVendor) || '').trim(),
                                일자: String(getValByKeywords(rowObj, keywords.date) || '').trim(),
                                메모: '', 
                                _raw: rowObj 
                            };
                            parsedData.push(normObj);
                        }
                        resolve(parsedData);
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말/실사, 수량, 재고, 기말실사(이월수량), 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
            matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', 
            excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플' 
        };

        const DeadStockTable = React.memo(({ title, data, valueKey, valueLabel, icon, colorClass }) => (
            <div className="flex-1 bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden flex flex-col">
                <div className="bg-white p-4 border-b border-slate-200 font-bold text-slate-800 text-sm flex items-center justify-between">
                    <span className="flex items-center"><span className={`w-2 h-2 rounded-full ${colorClass} mr-2`}></span>{title}</span>
                </div>
                <div className="overflow-y-auto flex-1 p-0">
                    <table className="w-full text-xs text-left">
                        <thead className="bg-slate-50 sticky top-0 border-b border-slate-200 text-slate-500">
                            <tr>
                                <th className="p-3 font-semibold uppercase tracking-wide">품명</th>
                                <th className="p-3 font-semibold uppercase tracking-wide text-right">{valueLabel}</th>
                                <th className="p-3 font-semibold uppercase tracking-wide text-right">잔량/단가</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {data.length === 0 ? (
                                <tr><td colSpan="3" className="p-8 text-center text-slate-400 font-medium">체화 재고가 없습니다.</td></tr>
                            ) : data.map((item, i) => (
                                <tr key={i} className="hover:bg-slate-50 transition-colors">
                                    <td className="p-3 font-semibold text-slate-800 truncate max-w-[150px]" title={item.품명}>{item.품명}</td>
                                    <td className={`p-3 text-right font-black ${valueKey === 'qty' ? 'text-blue-600' : 'text-emerald-600'}`}>
                                        {valueKey === 'qty' ? item.전산잔량 : `₩${formatMoney(item.전산잔량 * item.단가)}`}
                                    </td>
                                    <td className="p-3 text-right text-slate-500">
                                        {valueKey === 'qty' ? `₩${formatMoney(item.단가)}` : item.전산잔량}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        ));

        const ProductRow = React.memo(({ item, idx, isLinked, isActiveMulti, isMultiGroupItem, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            
            const totalAvailable = item.기초 + item.입고 + item.대체입고;
            if (item.로스 < 0 && totalAvailable > 0 && (Math.abs(item.로스) / totalAvailable) > 0.2) {
                displayIssues.push('🚨과다로스(20%↑)');
            }
            
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const handleKd = (e, type) => {
                const cols = ['price-input', 'base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') {
                    if (colIdx < cols.length - 1) { e.preventDefault(); const n = document.getElementById(`${cols[colIdx+1]}-${idx}`); if(n) { n.focus(); n.select(); } }
                } else if (e.key === 'ArrowLeft') {
                    if (colIdx > 0) { e.preventDefault(); const p = document.getElementById(`${cols[colIdx-1]}-${idx}`); if(p) { p.focus(); p.select(); } }
                } else if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault(); const n = document.getElementById(`${type}-${idx+1}`); if(n) { n.focus(); n.select(); }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault(); const p = document.getElementById(`${type}-${idx-1}`); if(p) { p.focus(); p.select(); }
                } else if (e.key === ' ' || e.code === 'Space') {
                    if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); }
                }
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragOver(false); };
            const handleDrop = (e) => {
                e.preventDefault(); setIsDragOver(false);
                try {
                    const dataStr = e.dataTransfer.getData('text/plain');
                    if (!dataStr) return;
                    const data = JSON.parse(dataStr);
                    if (data.sourceKey !== item.batchKey) {
                        onSalesMove(data.sourceKey, item.batchKey, data.vendor, data.qty, data.code, item.코드);
                    }
                } catch (err) {}
            };

            const cellInputBase = "w-full text-right bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none rounded text-[13px] px-1.5 py-1 transition-all shadow-sm";
            
            return (
                <tr 
                    data-code={item.코드} 
                    data-batch={item.batchKey} 
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    className={`transition duration-200 ${isActiveMulti ? 'bg-blue-50/60 outline outline-2 outline-blue-500 z-20 relative shadow-md' : (isLinked ? 'bg-slate-50 ring-1 ring-blue-400 shadow-md relative z-10 scale-[1.01]' : 'border-b border-slate-100 hover:bg-slate-50')} ${isDragOver ? 'drag-over' : ''} ${!isActiveMulti && item.isDummy && item.단가 === 0 ? 'bg-rose-50/30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.03)] border-r border-slate-200 
                        ${isMultiGroupItem && !isLinked ? 'border-l-4 border-l-blue-400' : ''} 
                        ${isLinked ? 'bg-blue-50/50 border-l-4 border-l-blue-600' : ''} 
                        ${isActiveMulti ? 'bg-blue-50/60' : (item.isDummy && item.단가 === 0 ? 'bg-rose-50' : 'bg-white group-hover:bg-slate-50')}`}>
                        <div className="flex items-center justify-between w-full">
                            <div className="flex flex-col justify-center flex-1 pr-3 overflow-hidden max-w-[280px]">
                                <div className="font-semibold text-slate-800 text-[13px] flex items-start gap-1 mb-0.5">
                                    {isLinked && <i className="fas fa-link text-blue-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    {isActiveMulti && <i className="fas fa-tags text-blue-500 mr-1 mt-0.5"></i>}
                                    <span title={item.품명} className="truncate leading-tight text-slate-900">{item.품명}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 truncate font-medium tracking-tight flex items-center">
                                    {item.코드 !== '-' && item.코드 !== 'NO_CODE' ? <span className="mr-1">{item.코드}</span> : ''}
                                    {item.일자 || '미상'} <span className="mx-1 text-slate-300">|</span> <span className="truncate">{item.거래처 || '미지정'}</span>
                                    {item.대체입고 > 0 && <span className="text-[9px] text-blue-500 font-semibold whitespace-nowrap ml-1 shrink-0">(조정됨)</span>}
                                </div>
                            </div>
                            
                            <div className="flex items-center justify-end shrink-0 pl-3 border-l border-slate-200">
                                <span className="text-slate-400 font-semibold text-[10px] mr-1">₩</span>
                                <input 
                                    id={`price-input-${idx}`}
                                    type="number" 
                                    className={`${cellInputBase} w-[70px] font-bold ${item.단가 === 0 ? 'border-rose-300 bg-rose-50 text-rose-600' : 'text-slate-800'}`} 
                                    value={item.단가 === 0 ? '' : item.단가}
                                    onChange={(e) => onBaseDataChange(item.batchKey, '단가', e.target.value)}
                                    onClick={(e) => e.stopPropagation()}
                                    onFocus={e => e.target.select()}
                                    onKeyDown={(e) => handleKd(e, 'price-input')}
                                    placeholder="0"
                                    title="원가(단가) 수기 수정"
                                />
                            </div>
                        </div>
                    </td>
                    
                    <td className={`py-2 px-2 text-right ${isActiveMulti ? 'bg-slate-50/50' : ''} border-r border-slate-100`}>
                        <input id={`base-prev-${idx}`} type="number" 
                            className={`${cellInputBase} font-semibold ${item.기초 < 0 ? 'text-rose-600 border-rose-200' : 'text-slate-700'}`} 
                            value={item.기초 === 0 ? '' : item.기초} onChange={e => onBaseDataChange(item.batchKey, '기초', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" title="기초 재고 수정" />
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-slate-100`}>
                        <input 
                            id={`base-in-${idx}`} 
                            type="number" 
                            className={`${cellInputBase} font-bold ${totalIn > 0 ? 'text-emerald-600' : 'text-slate-400'}`} 
                            value={totalIn === 0 ? '' : totalIn} 
                            onChange={e => {
                                const val = e.target.value === '' ? 0 : Number(e.target.value);
                                onBaseDataChange(item.batchKey, '입고', val - addedIn);
                            }} 
                            onFocus={e => e.target.select()} 
                            onKeyDown={(e) => handleKd(e, 'base-in')} 
                            onWheel={e => e.target.blur()} 
                            placeholder="0" 
                            title="입고 수량 수정"
                        />
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-slate-100`}>
                        <input 
                            id={`base-out-${idx}`} 
                            type="number" 
                            className={`${cellInputBase} font-bold ${totalOut > 0 ? 'text-rose-600' : 'text-slate-400'}`} 
                            value={totalOut === 0 ? '' : totalOut} 
                            onChange={e => {
                                const val = e.target.value === '' ? 0 : Number(e.target.value);
                                onBaseDataChange(item.batchKey, '출고', val - addedOut);
                            }} 
                            onFocus={e => e.target.select()} 
                            onKeyDown={(e) => handleKd(e, 'base-out')} 
                            onWheel={e => e.target.blur()} 
                            placeholder="0" 
                            title="출고 수량 수정"
                        />
                    </td>

                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${isLinked ? 'bg-blue-50' : ''} relative`}>
                        {isLinked && (
                            <div className="absolute -top-6 right-0 bg-slate-800 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md whitespace-nowrap animate-bounce">
                                조정 대상
                            </div>
                        )}
                        <input 
                            id={`actual-input-${idx}`}
                            type="number" 
                            value={item.실사 === null || item.실사 === undefined ? '' : item.실사} 
                            onChange={(e) => onStockChange(item.batchKey, e.target.value)}
                            onClick={() => onFocusInput(item.batchKey, idx)}
                            onFocus={(e) => { e.target.select(); onFocusInput(item.batchKey, idx); }}
                            onKeyDown={(e) => handleKd(e, 'actual-input')}
                            onWheel={e => e.target.blur()}
                            placeholder={item.전산잔량}
                            title="실사 수량 수정"
                            className={`w-full text-right bg-white border ${isLinked ? 'border-blue-500 ring-1 ring-blue-500 text-blue-900' : 'border-slate-300 text-slate-800 hover:border-slate-400'} ${isNegativeActual ? 'bg-rose-50 border-rose-400 text-rose-700 font-bold' : 'font-semibold'} rounded text-[13px] px-1.5 py-1 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 shadow-sm transition-all cursor-pointer`}
                        />
                    </td>
                    
                    <td className="py-2 px-2 text-right border-r border-slate-100">
                        {item.로스 !== 0 && (
                            <div className="flex flex-col items-end justify-center mb-0.5">
                                <span className={`text-[12px] font-bold ${item.로스 < 0 ? 'text-rose-600' : 'text-blue-600'}`}>
                                    {item.로스 > 0 ? '+' : ''}{formatMoney(item.로스)}
                                </span>
                            </div>
                        )}
                        {item.로스 === 0 && <span className="text-slate-300 font-bold">-</span>}
                    </td>
                    
                    <td className="py-2 px-3 text-left w-full min-w-[200px]">
                        <div className="flex justify-between items-start w-full">
                            <div className="flex flex-col gap-1.5 w-full flex-1 pr-2">
                                <div className="flex items-center gap-1 flex-wrap text-left">
                                    {hasIssue && displayIssues.map((msg, i) => (
                                        <span key={i} className={`px-2 py-0.5 rounded border font-semibold text-[10px] whitespace-nowrap ${msg.includes('원가수정') ? 'bg-slate-100 text-slate-700 border-slate-200' : (msg.includes('과다로스') ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-orange-50 text-orange-700 border-orange-200')}`}>
                                            {msg}
                                        </span>
                                    ))}
                                </div>
                                
                                {item.출고내역 && Object.keys(item.출고내역).length > 0 && (
                                    <div className="mt-0.5 flex flex-wrap gap-1.5 items-center">
                                        {Object.entries(item.출고내역).map(([vendor, data]) => (
                                            <div 
                                                key={vendor}
                                                draggable
                                                onDragStart={(e) => {
                                                    e.stopPropagation();
                                                    e.dataTransfer.setData('text/plain', JSON.stringify({sourceKey: item.batchKey, vendor, qty: data.qty, code: item.코드}));
                                                    e.currentTarget.classList.add('opacity-40', 'scale-95');
                                                }}
                                                onDragEnd={(e) => { e.currentTarget.classList.remove('opacity-40', 'scale-95'); }}
                                                className="flex items-center bg-white border border-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px] font-semibold cursor-grab active:cursor-grabbing hover:bg-slate-50 hover:border-slate-300 shadow-sm transition-all hover:-translate-y-0.5"
                                                title={`${data.qty}개 출고 (드래그하여 다른 품목/단가로 이동)`}
                                            >
                                                <span className="truncate max-w-[120px]">{vendor}({data.qty})</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex flex-col items-end gap-1.5 text-right shrink-0 ml-2">
                                <button onClick={() => onOpenMemo(item.batchKey, item.메모 || '')} className={`transition-colors ${item.메모 ? 'text-blue-500 hover:text-blue-700' : 'text-slate-300 hover:text-slate-400'}`} title="메모 추가/수정">
                                    <i className="fas fa-edit text-base"></i>
                                </button>
                                {item.메모 && <span className="px-2 py-1 bg-yellow-50 text-yellow-800 border border-yellow-200 rounded font-semibold text-[10px] whitespace-nowrap max-w-[100px] truncate" title={item.메모}>{item.메모}</span>}
                            </div>
                        </div>
                    </td>
                </tr>
            );
        }, (prevProps, nextProps) => {
            return prevProps.item === nextProps.item && prevProps.isLinked === nextProps.isLinked && prevProps.idx === nextProps.idx && prevProps.isActiveMulti === nextProps.isActiveMulti && prevProps.isMultiGroupItem === nextProps.isMultiGroupItem;
        });

        const FileBox = React.memo(({ title, type, icon, files, setFiles, autoAssignFiles }) => {
            const inputRef = useRef(null); 
            const [isDragging, setIsDragging] = useState(false);
            
            const handleBoxDrop = (e) => { 
                e.preventDefault(); e.stopPropagation(); setIsDragging(false); 
                const droppedFiles = Array.from(e.dataTransfer.files); 
                if (droppedFiles.length > 1) autoAssignFiles(droppedFiles); 
                else if (droppedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: droppedFiles[0] })); 
                if (document.activeElement) document.activeElement.blur(); window.focus(); 
            };
            
            const handleOnChange = (e) => {
                const selectedFiles = Array.from(e.target.files); 
                if (selectedFiles.length > 1) autoAssignFiles(selectedFiles); 
                else if (selectedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: selectedFiles[0] })); 
                e.target.value = ''; 
                e.target.blur(); if (document.activeElement) document.activeElement.blur(); window.focus();
            };

            return (
                <div className={`relative border-2 border-dashed rounded-xl p-4 text-center transition-all cursor-pointer flex flex-col items-center justify-center min-h-[120px] z-10 ${isDragging ? `border-slate-400 bg-slate-50 scale-105 shadow-md` : (files[type] ? `border-blue-400 bg-blue-50/30` : 'border-slate-300 bg-white hover:border-slate-400 hover:bg-slate-50')}`} onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} onDrop={handleBoxDrop} onClick={() => inputRef.current.click()}>
                    <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                    <i className={`fas ${icon} text-2xl mb-2 ${files[type] ? `text-blue-500` : 'text-slate-300'}`}></i><div className="font-semibold text-sm text-slate-700">{title}</div>
                    <div className="text-xs text-slate-500 mt-1 w-full px-2 break-all">{files[type] ? <span className={`text-slate-800 font-bold line-clamp-2`}>{files[type].name}</span> : '클릭 / 드래그'}</div>
                </div>
            );
        });

        function App() {
            const [appStep, setAppStep] = useState('upload'); 
            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });
            
            const [filters, setFilters] = useState({ issuesOnly: false, excludeZeroActual: false, search: '' });
            
            const [activeIssueMode, setActiveIssueMode] = useState(null); 
            const currentIssueIdxRef = useRef(-1);
            const [activeMultiCode, setActiveMultiCode] = useState(null);
            const [ackMultiCodes, setAckMultiCodes] = useState(new Set());
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [alertMsg, setAlertMsg] = useState('');
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, warnings: [], payload: null });
            const [showSettings, setShowSettings] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);

            const [undoUi, setUndoUi] = useState({ state: 'closed' });
            const [substHistory, setSubstHistory] = useState([]);
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const focusedInputRef = useRef({ key: null, idx: -1 });

            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            
            const [targetDateStr, setTargetDateStr] = useState('');

            const closingFileInputRef = useRef(null);
            const [uploadTarget, setUploadTarget] = useState(null);

            const actionRefs = useRef({});
            const activeIssueModeRef = useRef(activeIssueMode);
            useEffect(() => { activeIssueModeRef.current = activeIssueMode; }, [activeIssueMode]);

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('inventoryMappingsLight');
                return saved ? JSON.parse(saved) : defaultMappings;
            });

            const saveMappings = () => {
                localStorage.setItem('inventoryMappingsLight', JSON.stringify(mappings));
                setShowSettings(false);
            };

            const [productData, setProductData] = useState([]);
            const [analysisPeriod, setAnalysisPeriod] = useState('전체 기간');

            const priceOptionsMap = useMemo(() => {
                const map = {};
                productData.forEach(p => {
                    if (!map[p.코드]) map[p.코드] = new Set();
                    if (p.단가 > 0 && !p.isDummy) map[p.코드].add(p.단가);
                });
                const result = {};
                for(let code in map) {
                    result[code] = Array.from(map[code]);
                }
                return result;
            }, [productData]);

            const multiPriceCodes = useMemo(() => {
                const codes = new Set();
                productData.forEach(p => {
                    if (priceOptionsMap[p.코드] && priceOptionsMap[p.코드].length >= 2 && p.출고 > 0) {
                        codes.add(p.코드);
                    }
                });
                return Array.from(codes);
            }, [productData, priceOptionsMap]);

            const closingStats = useMemo(() => {
                let missingPriceCount = 0;
                let lossCount = 0;
                let totalRevenue = 0;
                let totalInventoryAsset = 0;
                let totalLossValue = 0;
                
                productData.forEach(p => {
                    if (p.isDummy && p.단가 === 0 && !p.수기확인완료) missingPriceCount++;
                    if ((p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0)) && !p.수기확인완료) lossCount++;
                    
                    totalRevenue += (Number(p.매출액) || 0);
                    
                    const actualQty = p.실사 === '' || p.실사 === null ? 0 : Number(p.실사);
                    const price = Number(p.단가) || 0;
                    totalInventoryAsset += (actualQty * price);
                    
                    if (p.로스 !== 0) {
                        totalLossValue += Math.abs(Number(p.로스) * price);
                    }
                });

                let multiPriceCount = multiPriceCodes.filter(c => !ackMultiCodes.has(c)).length;

                return { 
                    missingPriceCount, lossCount, multiPriceCount, 
                    totalRevenue, totalInventoryAsset, totalLossValue,
                    total: productData.length 
                };
            }, [productData, multiPriceCodes, ackMultiCodes]);

            const handleFocusInput = useCallback((key, idx) => { focusedInputRef.current = { key, idx }; }, []);

            const autoAssignFiles = (fileArray) => {
                setFiles(prev => {
                    let updated = { ...prev };
                    const stockCandidates = [];

                    fileArray.forEach(file => {
                        const name = file.name.toLowerCase();
                        if (name.includes('구매') || name.includes('매입') || name.includes('입고')) updated.in = file;
                        else if (name.includes('판매') || name.includes('매출') || name.includes('출고')) updated.out = file;
                        else stockCandidates.push(file);
                    });

                    if (stockCandidates.length > 0) {
                        stockCandidates.sort((a, b) => extractDateFromName(a.name) - extractDateFromName(b.name));
                        if (stockCandidates.length === 1) {
                            const name = stockCandidates[0].name.toLowerCase();
                            if (name.includes('기말') || name.includes('실사') || name.includes('마감')) updated.end = stockCandidates[0];
                            else updated.prev = stockCandidates[0]; 
                        } else {
                            updated.prev = stockCandidates[0];
                            updated.end = stockCandidates[stockCandidates.length - 1];
                        }
                    }
                    return updated;
                });
            };

            const handleGlobalDrop = (e) => {
                e.preventDefault(); setIsGlobalDragging(false);
                const droppedFiles = Array.from(e.dataTransfer.files);
                if (droppedFiles.length > 0) autoAssignFiles(droppedFiles);
                window.focus(); 
            };

            const handleIssueJump = useCallback((type, direction = 'next', fromCardClick = false) => {
                setActiveIssueMode(type);
                setFilters(prev => ({ ...prev, search: '', issuesOnly: false, excludeZeroActual: false }));

                let currentActiveMultiCode = activeMultiCode;

                if (fromCardClick) {
                    currentIssueIdxRef.current = -1;
                    setActiveMultiCode(null);
                    currentActiveMultiCode = null;
                }

                if (type === 'multiPrice') {
                    let nextAckCodes = new Set(ackMultiCodes);
                    if (currentActiveMultiCode && direction === 'next' && !fromCardClick) {
                        nextAckCodes.add(currentActiveMultiCode);
                        setAckMultiCodes(nextAckCodes);
                    }
                    
                    const remaining = multiPriceCodes.filter(c => !nextAckCodes.has(c));
                    let targetCode = null;

                    if (direction === 'next') {
                        targetCode = remaining.length > 0 ? remaining[0] : null;
                    } else {
                        targetCode = remaining.length > 0 ? remaining[remaining.length - 1] : null;
                    }

                    if (targetCode) {
                        setActiveMultiCode(targetCode);
                        setTimeout(() => {
                            const rows = document.querySelectorAll(`tr[data-code="${targetCode}"]`);
                            if (rows.length > 0) {
                                rows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }, 150);
                    } else {
                        setActiveMultiCode(null);
                        if (!fromCardClick) {
                            setAlertMsg("모든 Lot 매치 항목을 확인했습니다.");
                        } else if (multiPriceCodes.length === 0) {
                            setAlertMsg("해당하는 이슈 항목이 없습니다. (모두 확인 완료)");
                        }
                        setActiveIssueMode(null);
                    }
                    return;
                }

                setActiveMultiCode(null);

                const activeEl = document.activeElement;
                let currentDataIndex = -1;
                if (activeEl) {
                    const row = activeEl.closest('tr[data-batch]');
                    if (row) {
                        const batchKey = row.getAttribute('data-batch');
                        currentDataIndex = productData.findIndex(p => p.batchKey === batchKey);
                    }
                }

                let currIdx = fromCardClick ? -1 : currentIssueIdxRef.current;
                if (currentDataIndex !== -1 && !fromCardClick) currIdx = currentDataIndex;

                if (type === 'missingPrice' && currIdx !== -1 && !fromCardClick) {
                    setProductData(prev => {
                        const newData = [...prev];
                        if (newData[currIdx] && !newData[currIdx].수기확인완료) {
                            newData[currIdx] = { ...newData[currIdx], 수기확인완료: true };
                        }
                        return newData;
                    });
                }

                const condition = (p, isMissingConfirmed = false) => {
                    if (type === 'missingPrice') return p.isDummy && p.단가 === 0 && (!p.수기확인완료 && !isMissingConfirmed);
                    if (type === 'loss') return (p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0)) && !p.수기확인완료;
                    return false;
                };

                const targetItems = productData.map((p, i) => ({...p, index: i})).filter((p, i) => condition(p, type === 'missingPrice' && i === currIdx && !fromCardClick));
                
                if (targetItems.length === 0) {
                    if (!fromCardClick) {
                        setAlertMsg(`모든 항목의 확인이 완료되었습니다.`);
                    } else {
                        setAlertMsg(`해결해야 할 이슈 항목이 없습니다. (모두 확인 완료)`);
                    }
                    setActiveIssueMode(null);
                    return;
                }

                let targetItem = null;

                if (direction === 'next') {
                    targetItem = targetItems.find(p => p.index > currIdx);
                    if (!targetItem) targetItem = targetItems[0]; 
                } else {
                    for (let i = targetItems.length - 1; i >= 0; i--) {
                        if (targetItems[i].index < currIdx) { targetItem = targetItems[i]; break; }
                    }
                    if (!targetItem) targetItem = targetItems[targetItems.length - 1]; 
                }

                if (targetItem) {
                    currentIssueIdxRef.current = targetItem.index;
                    setTimeout(() => {
                        const row = document.querySelector(`tr[data-batch="${targetItem.batchKey}"]`);
                        if (row) {
                            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            const colorClass = type === 'missingPrice' ? 'bg-rose-50' : 'bg-orange-50';
                            row.classList.add(colorClass);
                            setTimeout(() => row.classList.remove(colorClass), 1500);
                            
                            const inputId = type === 'missingPrice' ? `price-input-${targetItem.index}` : `actual-input-${targetItem.index}`;
                            const input = document.getElementById(inputId);
                            if (input) { input.focus(); input.select(); }
                        }
                    }, 150);
                }
            }, [productData, multiPriceCodes, ackMultiCodes, activeMultiCode]);

            const handleSalesMove = useCallback((sourceKey, targetKey, vendorName, qtyToMove, sourceCode, targetCode) => {
                setProductData(prevP => {
                    let sPrice = 0; let tPrice = 0;
                    let sRevUnit = 0; 
                    
                    prevP.forEach(p => {
                        if (p.batchKey === sourceKey) { 
                            sPrice = p.단가; 
                            if(p.출고내역[vendorName] && p.출고내역[vendorName].qty > 0) {
                                 sRevUnit = p.출고내역[vendorName].rev / p.출고내역[vendorName].qty;
                            } else {
                                 sRevUnit = p.출고 > 0 ? p.매출액 / p.출고 : 0; 
                            }
                        }
                        if (p.batchKey === targetKey) tPrice = p.단가;
                    });

                    return prevP.map(p => {
                        if (p.batchKey === sourceKey) {
                            const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)) };
                            np.출고 -= qtyToMove;
                            const movedCogs = qtyToMove * sPrice;
                            const movedRev = qtyToMove * sRevUnit;
                            np.매출원가 -= movedCogs;
                            np.매출액 -= movedRev;
                            
                            if (np.출고내역[vendorName]) {
                                np.출고내역[vendorName].qty -= qtyToMove;
                                np.출고내역[vendorName].rev -= movedRev;
                                np.출고내역[vendorName].cogs -= movedCogs;
                                if (np.출고내역[vendorName].qty <= 0) delete np.출고내역[vendorName];
                            }
                            np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                            if (np.실사 !== null && np.실사 !== '') {
                                np.실사 = Number(np.실사) + qtyToMove;
                                np.로스 = np.실사 - np.전산잔량;
                            } else { np.실사 = np.전산잔량; np.로스 = 0; }
                            np.수기확인완료 = true;
                            return np;
                        }
                        if (p.batchKey === targetKey) {
                            const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)), 이슈: [...p.이슈] };
                            np.출고 += qtyToMove;
                            const movedCogs = qtyToMove * tPrice;
                            const movedRev = qtyToMove * sRevUnit;
                            np.매출원가 += movedCogs;
                            np.매출액 += movedRev;
                            
                            if (!np.출고내역[vendorName]) np.출고내역[vendorName] = {qty: 0, rev: 0, cogs: 0};
                            np.출고내역[vendorName].qty += qtyToMove;
                            np.출고내역[vendorName].rev += movedRev;
                            np.출고내역[vendorName].cogs += movedCogs;
                            
                            np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                            if (np.실사 !== null && np.실사 !== '') {
                                np.실사 = Number(np.실사) - qtyToMove;
                                np.로스 = np.실사 - np.전산잔량;
                            } else { np.실사 = np.전산잔량; np.로스 = 0; }
                            np.이슈 = np.이슈.filter(msg => msg !== '매입내역 없음' && !msg.includes('전산 재고 부족'));
                            np.수기확인완료 = true;
                            return np;
                        }
                        return p;
                    });
                });
            }, []);

            const executeImmediateSubstitution = useCallback((key1, key2, idx2) => {
                setProductData(prev => {
                    const idx1 = prev.findIndex(d => d.batchKey === key1);
                    const realIdx2 = prev.findIndex(d => d.batchKey === key2);
                    if (idx1 < 0 || realIdx2 < 0) return prev;

                    const sourceItemOrig = { ...prev[idx1], 이슈: [...prev[idx1].이슈] };
                    const targetItemOrig = { ...prev[realIdx2], 이슈: [...prev[realIdx2].이슈] };

                    let sourceItem = { ...sourceItemOrig };
                    let targetItem = { ...targetItemOrig };

                    if (sourceItem.로스 < 0 && targetItem.로스 > 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 > 0) {
                        let temp = sourceItem; sourceItem = targetItem; targetItem = temp;
                    }
                    else if (sourceItem.로스 < 0 && targetItem.로스 === 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 === 0) {
                        let temp = sourceItem; sourceItem = targetItem; targetItem = temp;
                    }
                    else {
                        setAlertMsg(`재고조정 실패!\n\n두 상품을 연결하려면 먼저 실사 수량을 변경하여 오차(로스)를 만들어주세요.\n• 원물(차감 대상): 마이너스(-) 로스 발생\n• 소분(증가 대상): 플러스(+) 로스 발생`);
                        return prev;
                    }

                    const sQty = Math.abs(sourceItem.로스);
                    const tQty = Math.abs(targetItem.로스);
                    if (tQty === 0) {
                        setAlertMsg("대체되는 상품(소분품)의 실사 수량이 입력되지 않아 조정 비율을 알 수 없습니다.\n수량을 입력해주세요.");
                        return prev;
                    }

                    const transferredCost = sQty * sourceItem.단가;
                    const unitCost = transferredCost / tQty;        

                    sourceItem.대체출고 += sQty;
                    sourceItem.전산잔량 = sourceItem.기초 + sourceItem.입고 + sourceItem.대체입고 - sourceItem.출고 - sourceItem.대체출고;

                    targetItem.대체입고 += tQty;
                    targetItem.전산잔량 = targetItem.기초 + targetItem.입고 + targetItem.대체입고 - targetItem.출고 - targetItem.대체출고;
                    targetItem.실사 = targetItem.실사 === null || targetItem.실사 === '' ? targetItem.전산잔량 : targetItem.실사;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;
                    targetItem.단가 = unitCost; 
                    targetItem.매출원가 = targetItem.출고 * unitCost; 
                    targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족'));

                    targetItem.수기확인완료 = true;

                        id: Date.now(), 
                        sourceKey: sourceItem.batchKey, 
                        targetKey: targetItem.batchKey,
                        sourceName: sourceItem.품명, 
                        targetName: targetItem.품명, 
                        sQty, tQty, transferredCost, 
                        sourceItemPrev: sourceItem.batchKey === sourceItemOrig.batchKey ? sourceItemOrig : targetItemOrig,
                        targetItemPrev: targetItem.batchKey === targetItemOrig.batchKey ? targetItemOrig : sourceItemOrig,
                    }]);

                    const newData = [...prev];
                    newData[prev.findIndex(d => d.batchKey === sourceItem.batchKey)] = sourceItem;
                    newData[prev.findIndex(d => d.batchKey === targetItem.batchKey)] = targetItem;
                    return newData;

            const handleSpacebarLink = useCallback((targetBatchKey, targetIdx) => {

            const handleSaveMemo = useCallback((batchKey, text) => {

            const handleResetFiles = () => {

            const executeAnalysis = useCallback((payload) => {

                    const { parsedPrev, parsedIn, parsedOut, parsedEnd, periodStr, targetDateStrFromData } = payload;
                    setAnalysisPeriod(periodStr);

                    let pData = {}; const stockPool = {};
                    const excludeList = (mappings.excludeVendor || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s);
                    const isExcluded = (vendorName) => vendorName && excludeList.some(keyword => vendorName.toLowerCase().includes(keyword));

                    const addStock = (item, type) => {
                        if (type === 'in' && isExcluded(item.거래처)) return;
                        
                        const code = String(item.코드 || 'NO_CODE'); const price = parseNumber(item.단가); const date = String(item.일자 || '');
                        const batchKey = `${code}|${price}|${date}`;

                            pData[batchKey] = { 
                                batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 거래처: item.거래처,
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig: {기초:0, 입고:0, 출고:0, 단가: price},

                        if (type === 'prev') pData[batchKey].기초 += item.수량;

                    Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));

                    parsedOut.forEach(sale => {
                        if (isExcluded(sale.거래처)) return;
                        
                        const code = String(sale.코드 || 'NO_CODE');
                        let qtyToDeduct = sale.수량; 
                        const pool = stockPool[code];
                        
                        let revenue = 0;
                        if (sale.단가 !== 0 && sale.수량 !== 0) revenue = sale.수량 * sale.단가;

                        let finalRevenue = revenue;
                        if (finalRevenue === 0 && sale._raw) {
                            const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                            for (let k of amtKeys) {
                                const matchedKey = Object.keys(sale._raw).find(rk => rk.replace(/\s/g, '').includes(k));
                                if (matchedKey && sale._raw[matchedKey] !== undefined && sale._raw[matchedKey] !== '') {
                                    finalRevenue = parseNumber(sale._raw[matchedKey]); break;
                                }
                            }
                        }
                        if (finalRevenue === 0 && sale.단가 !== 0 && sale.수량 === 0) finalRevenue = sale.단가;
                        
                        if (!pool || pool.buckets.length === 0) {
                            const bKey = `${code}|0|미상`;
                            if (!pData[bKey]) pData[bKey] = { 
                                batchKey: bKey, 코드: code, 품명: sale.품명, 단가: 0, 일자: '', 
                                거래처: '매입내역 없음', 
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig:{기초:0,입고:0,출고:0,단가:0}, 
                                isDummy: true, 수기확인완료: false
                            };
                            pData[bKey].출고 += qtyToDeduct; 
                            pData[bKey].매출액 += finalRevenue;
                            if (!pData[bKey].출고내역[sale.거래처]) pData[bKey].출고내역[sale.거래처] = {qty: 0, rev: 0, cogs: 0};
                            pData[bKey].출고내역[sale.거래처].qty += qtyToDeduct;
                            pData[bKey].출고내역[sale.거래처].rev += finalRevenue;
                            return;
                        }

                        let remainingQty = qtyToDeduct;

                        const deductFromBucket = (bucket, take) => {
                            const cogs = take * bucket.단가;
                            const revShare = qtyToDeduct > 0 ? finalRevenue * (take / qtyToDeduct) : 0;
                            
                            bucket.수량 -= take; 
                            pData[bucket.batchKey].출고 += take;
                            pData[bucket.batchKey].매출원가 += cogs;
                            pData[bucket.batchKey].매출액 += revShare;
                            
                            if (!pData[bucket.batchKey].출고내역[sale.거래처]) {
                                pData[bucket.batchKey].출고내역[sale.거래처] = {qty: 0, rev: 0, cogs: 0};
                            }
                            pData[bucket.batchKey].출고내역[sale.거래처].qty += take;
                            pData[bucket.batchKey].출고내역[sale.거래처].rev += revShare;
                            pData[bucket.batchKey].출고내역[sale.거래처].cogs += cogs;
                        };

                        if (remainingQty < 0) {
                            const lastBucket = pool.buckets[pool.buckets.length - 1];
                            deductFromBucket(lastBucket, remainingQty);
                        } else {
                            let matchedBuckets = [];
                            if (sale.매입처매칭 && sale.매입처매칭 !== '미지정') {
                                const matchStr = sale.매입처매칭.replace(/\s/g, '').toLowerCase();
                                for (let i = 0; i < pool.buckets.length; i++) {
                                    const bucket = pool.buckets[i];
                                    const bVendorStr = String(bucket.거래처 || '').replace(/\s/g, '').toLowerCase();
                                    if (bVendorStr && matchStr && (bVendorStr.includes(matchStr) || matchStr.includes(bVendorStr))) {
                                        matchedBuckets.push(bucket);
                                    }
                                }
                            }

                            if (matchedBuckets.length > 0) {
                                for (let i = 0; i < matchedBuckets.length && remainingQty > 0; i++) {
                                    const bucket = matchedBuckets[i];
                                    if (bucket.수량 <= 0) continue;
                                    
                                    const take = Math.min(bucket.수량, remainingQty);
                                    deductFromBucket(bucket, take);
                                    remainingQty -= take;
                                }
                                
                                if (remainingQty > 0) {
                                    const lastMatchedBucket = matchedBuckets[matchedBuckets.length - 1];
                                    deductFromBucket(lastMatchedBucket, remainingQty);
                                    remainingQty = 0;
                                }
                            } else {
                                if (remainingQty > 0) {
                                    for (let i = 0; i < pool.buckets.length && remainingQty > 0; i++) {
                                        const bucket = pool.buckets[i];
                                        if (bucket.수량 <= 0) continue;
                                        
                                        const take = Math.min(bucket.수량, remainingQty);
                                        deductFromBucket(bucket, take);
                                        remainingQty -= take;
                                    }
                                }

                                if (remainingQty > 0) {
                                    const lastBucket = pool.buckets[pool.buckets.length - 1];
                                    deductFromBucket(lastBucket, remainingQty);
                                }
                            }
                        }
                    });

                    Object.values(pData).forEach(item => {
                        item._orig = { 기초: item.기초, 입고: item.입고, 출고: item.출고 };
                        item.전산잔량 = item.기초 + item.입고 - item.출고;
                        item.실사 = item.전산잔량; item.로스 = 0;
                    });

                    if (parsedEnd.length > 0) {
                        const isClosingFile = parsedEnd.some(item => item._raw && ('로스/조정수량' in item._raw || '기초수량' in item._raw));

                        if (isClosingFile) {
                            const endByCode = {};
                            parsedEnd.forEach(item => {
                                const c = String(item.코드);
                                if (!endByCode[c]) endByCode[c] = [];
                                endByCode[c].push(item);
                            });

                            Object.keys(endByCode).forEach(code => {
                                const endItems = endByCode[code];
                                const pItems = Object.values(pData).filter(p => p.코드 === code);

                                endItems.forEach(eItem => {
                                    const oldBasePrev = parseNumber(eItem._raw['기초수량']);
                                    const oldBaseIn = parseNumber(eItem._raw['입고수량']);
                                    const oldBaseOut = parseNumber(eItem._raw['출고량']);
                                    const oldPrice = parseNumber(eItem._raw['매입단가(원가)'] || eItem.단가);
                                    const oldActual = parseNumber(eItem._raw['기말실사(이월수량)'] || eItem.수량);
                                    const oldIssuesStr = String(eItem._raw['이슈/결과'] || '');
                                    const oldMemo = String(eItem._raw['수기메모'] || '');

                                    let matchedPItem = pItems.find(p => p.단가 === oldPrice);
                                    if (!matchedPItem && pItems.length > 0) {
                                        matchedPItem = pItems.find(p => p.단가 === 0) || pItems[0];
                                    }

                                    if (matchedPItem) {
                                        if (matchedPItem.단가 !== oldPrice && oldPrice > 0) {
                                            matchedPItem.단가 = oldPrice;
                                            matchedPItem.매출원가 = matchedPItem.출고 * oldPrice;
                                        }
                                        matchedPItem.실사 = oldActual;
                                        matchedPItem.로스 = matchedPItem.실사 - matchedPItem.전산잔량;
                                        matchedPItem.메모 = oldMemo;

                                        const isDataChanged = (matchedPItem.기초 !== oldBasePrev) || (matchedPItem.입고 !== oldBaseIn) || (matchedPItem.출고 !== oldBaseOut);

                                        if (!isDataChanged) {
                                            matchedPItem.수기확인완료 = true;
                                            matchedPItem.이슈 = []; 
                                        } else {
                                            matchedPItem.수기확인완료 = false;
                                            matchedPItem.이슈 = ['🚨전일대비 원장 변동됨(재확인)'];
                                        }
                                    } else {
                                        const batchKey = `${code}|${oldPrice}|삭제됨`;
                                        pData[batchKey] = { 
                                            batchKey, 코드: code, 품명: eItem.품명, 단가: oldPrice, 일자: '', 
                                            거래처: '전일 마감항목(현재 삭제됨)', 
                                            기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: oldActual, 로스: oldActual, 
                                            매출액: 0, 매출원가: 0, 메모: oldMemo, 이슈: ['🚨전일대비 원장 삭제됨'], 출고내역: {}, _orig:{기초:0,입고:0,출고:0,단가:oldPrice}, 
                                            isDummy: true, 수기확인완료: false 
                                        };
                                    }
                                });
                            });
                            
                            setTimeout(() => {
                                setAlertMsg("🔄 [스마트 재마감 모드 작동]\n\n업로드된 파일이 '과거 마감 파일'로 인식되었습니다.\n\n어제 수기 조정한 내역과 메모는 그대로 자동 복원되어 [이슈 0] 처리되었으며,\n새롭게 추가/수정되어 전산잔량이 틀어진 항목만 '이슈' 카드로 검출되었습니다.");
                            }, 800);

                        } else {
                            const actualDict = {};
                            const actualPriceDict = {};
                            
                            parsedEnd.forEach(item => {
                                const code = String(item.코드); 
                                actualDict[code] = (actualDict[code] || 0) + item.수량;
                                
                                if (item.단가 > 0) {
                                    actualPriceDict[code] = item.단가;
                                }

                                const hasSystemRecord = Object.values(pData).some(p => p.코드 === code);
                                if (!hasSystemRecord) {
                                    const price = parseNumber(item.단가) || 0; const date = String(item.일자 || '실사등록'); const batchKey = `${code}|${price}|${date}`;
                                    if (!pData[batchKey]) pData[batchKey] = { 
                                        batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 
                                        거래처: '기록없음(실사)', 
                                        기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                        매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig:{기초:0,입고:0,출고:0}, 
                                        isDummy: true, 수기확인완료: price > 0 ? true : false
                                    };
                                }
                            });

                            const uniqueCodes = [...new Set(Object.values(pData).map(p => String(p.코드)))];
                            uniqueCodes.forEach(code => {
                                const actualQty = actualDict[code] !== undefined ? actualDict[code] : 0;
                                const targetEndPrice = actualPriceDict[code];

                                const batches = Object.values(pData).filter(p => p.코드 === code).sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || '')));
                                
                                if (targetEndPrice !== undefined && targetEndPrice > 0) {
                                    batches.forEach(b => {
                                        if (b.단가 !== targetEndPrice) {
                                            b.단가 = targetEndPrice;
                                            b.매출원가 = b.출고 * targetEndPrice;
                                            
                                            let newIssues = [...b.이슈].filter(msg => msg !== '매입내역 없음' && !msg.includes('원가수정'));
                                            newIssues.push('원가수정(실사반영)');
                                            b.이슈 = newIssues;
                                            b.수기확인완료 = true; 
                                        }
                                    });
                                }

                                let remainingActual = actualQty;
                                batches.forEach(b => { b.실사 = 0; b.로스 = -b.전산잔량; });
                                if (remainingActual > 0) {
                                    for (let i = batches.length - 1; i >= 0; i--) {
                                        const b = batches[i]; const capacity = Math.max(b.전산잔량, 0); 
                                        if (capacity > 0) {
                                            if (remainingActual >= capacity) { b.실사 = capacity; remainingActual -= capacity; } 
                                            else { b.실사 = remainingActual; remainingActual = 0; }
                                            b.로스 = b.실사 - b.전산잔량;
                                        }
                                    }
                                    if (remainingActual > 0 && batches.length > 0) {
                                        const newest = batches[batches.length - 1]; newest.실사 += remainingActual; newest.로스 = newest.실사 - newest.전산잔량;
                                    }
                                }
                            });
                        }
                    }

                    const finalProductData = Object.values(pData).sort((a, b) => {
                        const codeA = String(a.코드 || ''); const codeB = String(b.코드 || '');

                        const dateA = String(a.일자 || ''); const dateB = String(b.일자 || '');
                        if (dateA !== dateB) return dateA.localeCompare(dateB);
                        return (a.단가 || 0) - (b.단가 || 0);
                    });

                    setAppStep('closing');

                } catch(err) {
                    setAlertMsg('데이터 분석 중 오류가 발생했습니다. 엑셀 파일 형식이나 매핑 규칙을 확인해주세요.');

            }, [mappings]);

            const runAnalysis = async (overrideFiles = null, demoJson = null) => {
                setIsProcessing(true); setError('');
                setLinkSourceKey(null); setActiveIssueMode(null); focusedInputRef.current = { key: null, idx: -1 }; setSubstHistory([]); setUndoUi({ state: 'closed' });
                setAckMultiCodes(new Set()); setActiveMultiCode(null); currentIssueIdxRef.current = -1;

                try {
                    let parsedPrev = [];
                    let parsedIn = [];
                    let parsedOut = [];
                    let parsedEnd = [];
                    
                    const currentFiles = overrideFiles || files;

                    if (currentFiles.prev) parsedPrev = await parseExcelData(currentFiles.prev, mappings);
                    if (currentFiles.in) parsedIn = await parseExcelData(currentFiles.in, mappings);
                    if (currentFiles.out) parsedOut = await parseExcelData(currentFiles.out, mappings);
                    if (currentFiles.end) parsedEnd = await parseExcelData(currentFiles.end, mappings);

                    const prevDateNum = extractDateFromName(currentFiles.prev?.name);
                    const endDateNum = extractDateFromName(currentFiles.end?.name);

                    const startDateNum = prevDateNum ? addOneDay(prevDateNum) : 0;
                    const targetEndDateNum = endDateNum || 0;

                    let refYear = new Date().getFullYear();
                    if (targetEndDateNum) refYear = Math.floor(targetEndDateNum / 10000);
                    else if (prevDateNum) refYear = Math.floor(prevDateNum / 10000);

                    let outOfBoundsCount = 0;
                    const validIn = [];
                    const validOut = [];

                    parsedPrev.forEach(item => {

                    });

                    parsedEnd.forEach(item => {
                        const d = formatItemDate(item.일자, refYear);
                        if (d > 0) item.일자 = formatStrForPeriod(d);
                    });

                    parsedIn.forEach(item => {
                        const d = formatItemDate(item.일자, refYear);
                        if (d > 0) item.일자 = formatStrForPeriod(d);
                        if (d > 0 && ((startDateNum && d < startDateNum) || (targetEndDateNum && d > targetEndDateNum))) {
                            outOfBoundsCount++;
                        } else {
                            validIn.push(item);
                        }
                    });

                    parsedOut.forEach(item => {
                        const d = formatItemDate(item.일자, refYear);
                        if (d > 0) item.일자 = formatStrForPeriod(d);
                        if (d > 0 && ((startDateNum && d < startDateNum) || (targetEndDateNum && d > targetEndDateNum))) {
                            outOfBoundsCount++;
                        } else {
                            validOut.push(item);
                        }
                    });

                    let minD = startDateNum || 99999999; 
                    let maxD = targetEndDateNum || 0;
                    
                    if (!startDateNum || !targetEndDateNum) {
                        const tempPeriodData = [...validIn, ...validOut, ...parsedEnd];
                        tempPeriodData.forEach(item => {
                            const d = formatItemDate(item.일자, refYear);
                            if (d > 0) { 
                                if (!startDateNum && d < minD) minD = d; 
                                if (!targetEndDateNum && d > maxD) maxD = d; 
                            }
                        });
                    }

                    let periodStr = '';
                    if (minD === 99999999 || maxD === 0) {
                        periodStr = '기간 미상';
                    } else if (minD === maxD) {
                        periodStr = formatStrForPeriod(minD);
                    } else {
                        const d1 = new Date(Math.floor(minD/10000), Math.floor((minD%10000)/100)-1, minD%100);
                        const d2 = new Date(Math.floor(maxD/10000), Math.floor((maxD%10000)/100)-1, maxD%100);
                        const days = Math.round((d2 - d1) / 86400000) + 1;
                        periodStr = `${formatStrForPeriod(minD)} ~ ${formatStrForPeriod(maxD)} (총 ${days}일간)`;
                    }

                    let targetDateStrFromData = '';
                    if (maxD !== 0) {
                        targetDateStrFromData = `${Math.floor(maxD/10000)}-${String(Math.floor((maxD%10000)/100)).padStart(2,'0')}-${String(maxD%100).padStart(2,'0')}`;
                    } else {
                        const today = new Date();
                        targetDateStrFromData = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                    }

                    let warnings = [];
                    if (prevDateNum && minD !== 99999999 && minD <= prevDateNum) {

                    if (warnings.length > 0 && !demoJson) {
                        setConfirmModal({ isOpen: true, warnings, payload });
                        setIsProcessing(false);

                    }

            const handleBaseDataChange = useCallback((batchKey, field, val) => {
