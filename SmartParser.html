    <script>
        const MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "판매여부", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록" ];
        const NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고" ];

        const initIDB = () => new Promise((resolve, reject) => { const request = indexedDB.open('MerchOpsDB', 2); request.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains('store')) db.createObjectStore('store'); if (!db.objectStoreNames.contains('master_products')) db.createObjectStore('master_products', { keyPath: '코드' }); }; request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const bulkPutIDB = async (storeName, items) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName); items.forEach(item => store.put(item)); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getAllIDB = async (storeName) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction(storeName, 'readonly'); const req = tx.objectStore(storeName).getAll(); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        const generateUUID = () => { if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID(); return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }); };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        const calcDiffRate = (oldVal, newVal) => {
            const oldNum = parseNum(oldVal);
            const newNum = parseNum(newVal);
            if (!oldNum) return null;
            return Math.round(((newNum - oldNum) / oldNum) * 1000) / 10;
        };
        const getNowISO = () => {
            try { return new Date().toISOString(); } catch(e) { return ''; }
        };

        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const ROUND_UNIT = 100;
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) ? parseNum(mItem?.['외주비']) : parseNum(currentFinalData?.['외주비']);
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) ? parseNum(mItem?.['노무비']) : parseNum(currentFinalData?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => { if (ruleWh === '*') return true; const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh))); };
            const matchUnit = (ruleUnit, targetUnit) => { if (ruleUnit === '*') return true; const targets = String(ruleUnit).toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); return targets.some(s => targetUnit === s || targetUnit.includes(s)); };

            let bestRule = null; let bestScore = -1;
            const safeMarginRules = Array.isArray(marginRules) ? marginRules : [];
            safeMarginRules.forEach(r => { if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) { let score = 0; if (r.whCode !== '*') score += 2; if (r.unit !== '*') score += 1; if (score > bestScore) { bestScore = score; bestRule = r; } } });

            const appliedRule = bestRule || { rate: 10, type: 'divide' }; let calcOutPrice = 0;
            if (baseInPrice > 0) { if (appliedRule.type === 'divide') calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); else calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); calcOutPrice = Math.round(calcOutPrice / ROUND_UNIT) * ROUND_UNIT; }

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice }; newFinalData['시중가'] = calcOutPrice;
            const providedOutPrice = parseNum(currentFinalData?.['출고가']); const mIn = parseNum(mItem?.['입고가']); const mOut = parseNum(mItem?.['출고가']);

            if (baseInPrice === 0) newFinalData['출고가'] = 0; else if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice; else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut; else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']); const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) { if (baseInPrice === 0) { newFinalData['1입고'] = 0; newFinalData['1출고'] = 0; } else { newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / ROUND_UNIT) * ROUND_UNIT; newFinalData['1출고'] = Math.round((Math.round((newFinalData['출고가'] / div1) + extraCost)) / 10) * 10; } }
            return newFinalData;
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => { if (!str) return ''; const match = String(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g); return match ? match.join('') : ''; };

        const addTag = (oldTags, newTag) => { if (!newTag) return oldTags || ''; const tags = String(oldTags || '').split(',').map(s => s.trim()).filter(Boolean); if (!tags.includes(newTag)) tags.push(newTag); return tags.join(', '); };
        const removeTag = (oldTags, tagToRemove) => { if (!tagToRemove) return oldTags || ''; const tags = String(oldTags || '').split(',').map(s => s.trim()).filter(Boolean); return tags.filter(t => t !== tagToRemove).join(', '); };

        const parseTextSemantically = (rawText) => {
            if (!rawText) return []; let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== ''); const results = []; let currentItem = {};
            const pushItem = () => { if (currentItem.품목명) { if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, ''); results.push({ _id: generateUUID(), _apply: true, ...currentItem }); } currentItem = {}; };

            lines.forEach(line => {
                if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^starLine$/i.test(line) || /^마감$/.test(line) || /\d{1,2}:\d{2}\s*마감$/.test(line) || /default-thumbnail/i.test(line) || /^상품이미지$|^이미지\s*준비중$/.test(line) || /마켓보로|통신판매업의\s*중개자|당사자가\s*아닙니다|책임을\s*지지\s*않습니다|판매자가\s*등록한|데이터가\s*없습니다|-\s*끝\s*-/i.test(line)) return;
                if (/^\s*(체\s*)?상품\s*\([\d,]+\s*개\)/i.test(line)) return;

                // ⭐ 품절 감지 로직
                if (/품절|단종|취소|판매중단|판매종료/i.test(line)) {
                    currentItem._isSoldOut = true;
                    line = line.replace(/\[?품절\]?|\(?단종\)?|\[?취소\]?|판매중단|판매종료/gi, '').trim();
                    if (!line) return;
                }

                const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/); let extractedPrice = null;
                if (priceMatch) { extractedPrice = priceMatch[1]; line = line.replace(priceMatch[0], '').trim(); if (line.endsWith('/')) line = line.slice(0, -1).trim(); }
                if (extractedPrice) currentItem.입고가 = extractedPrice; if (!line) { if (extractedPrice) pushItem(); return; }

                if (!currentItem.품목명) {
                    if (line.includes(' / ')) {
                        const splitBySpaceSlashSpace = line.split(' / '); let namePart = splitBySpaceSlashSpace[0].trim(); let specPart = splitBySpaceSlashSpace.slice(1).join(' / ').trim();
                        const unitMatch = namePart.match(/(EA|BOX|포|개|벌크BOX|벌크|박스|봉|캔|병|팩|단|마리)$/i);
                        if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } else { currentItem.품목명 = namePart; }
                        const specParts = specPart.split('/').map(s => s.trim()); currentItem.규격 = specParts[0] || ''; if (specParts.length > 1) currentItem.간단설명 = specParts.slice(1).join(' | ');
                    } else { currentItem.품목명 = line; }
                } else {
                    if (line.includes('/')) {
                        const parts = line.split('/').map(s => s.trim()); if (!currentItem.단위) currentItem.단위 = parts[0] || ''; if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || ''; if (parts.length > 2) currentItem.간단설명 = parts.slice(2).join(' | ') || '';
                    } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/i.test(line)) { currentItem.규격 = line; } 
                    else { currentItem.간단설명 = currentItem.간단설명 ? currentItem.간단설명 + ' | ' + line : line; }
                }
                if (extractedPrice) pushItem();
            });
            if (currentItem.품목명) pushItem(); return results;
        };

        const runSmartMatch = (extName, extSpec, mProducts, pDict) => {
            const normExtName = normalizeText(extName), normExtSpec = normalizeText(extSpec);
            const extTokens = tokenize(extName), extExtractedSpec = extractSpec(extName + " " + (extSpec || ''));
            const dictKey = `${normExtName}|${normExtSpec}`;
            if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 학습일치' };

            let bestMatch = null, bestScore = 0, specConflict = false; let perfectMatches = [];
            for (const mCode in mProducts) {
                const m = mProducts[mCode]; const mNormName = normalizeText(m.품목명), mTokens = tokenize(m.품목명); const mExtractedSpec = extractSpec(m.품목명 + " " + (m.규격||''));
                let specMatch = true; if (extExtractedSpec && mExtractedSpec && extExtractedSpec !== mExtractedSpec) specMatch = false;
                let score = 0; if (mNormName === normExtName) score = 1; else { const intersection = extTokens.filter(t => mTokens.includes(t)); score = intersection.length / Math.max(extTokens.length, mTokens.length); }
                if (score === 1 && specMatch) { perfectMatches.push(m); } else if (score > 0.6) { if (!specMatch) specConflict = true; else if (score > bestScore) { bestScore = score; bestMatch = m; } }
            }
            if (perfectMatches.length === 1) return { code: perfectMatches[0].코드, status: '🟢 일치' };
            if (perfectMatches.length > 1) return { code: '', status: '🟡 중복품목(선택필요)' }; 
            if (bestMatch && bestScore > 0.6) return { code: '', status: '🟡 유사' }; return { code: '', status: '🔴 불일치' };
        };

        const searchMasterProducts = (productsObj, keyword) => {
            if (!keyword || !keyword.trim()) return [];
            const rawKeyword = String(keyword).trim().toLowerCase();
            const compactKeyword = rawKeyword.replace(/[()[\]{},./\s\-_]/g, '');
            const cleanKeyword = rawKeyword.replace(/[()[\]{},./]/g, ' ');
            const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
            if (tokens.length === 0 && !compactKeyword) return [];

            const toLower = (v) => String(v || '').toLowerCase();
            const compact = (v) => toLower(v).replace(/[()[\]{},./\s\-_]/g, '');

            const results = Object.values(productsObj).map(m => {
                const mCode = toLower(m.코드);
                const mItemCode = toLower(m.품목코드);
                const mProductCode = toLower(m.상품코드);
                const mName = toLower(m.품목명);
                const mSpec = toLower(m.규격);
                const mBrand = toLower(m.브랜드);
                const mWh = toLower(m.창고);
                const mVendor = toLower(m.구매처 || m.거래처);
                const mSearchKeywords = toLower(m.검색어등록);

                const codeFields = [mCode, mItemCode, mProductCode].filter(Boolean);
                const compactCodeFields = codeFields.map(compact);
                const mFull = [mCode, mItemCode, mProductCode, mName, mSpec, mBrand, mWh, mVendor, mSearchKeywords].join(' ');
                const compactFull = compact(mFull);
                let score = 0, matchCount = 0;

                if (compactKeyword) {
                    compactCodeFields.forEach(code => {
                        if (code === compactKeyword) { score += 10000; matchCount += 3; }
                        else if (code.includes(compactKeyword)) { score += 5000 + compactKeyword.length * 20; matchCount += 2; }
                    });
                    if (compactFull.includes(compactKeyword)) score += 1000;
                }

                tokens.forEach(token => {
                    const compactToken = compact(token);
                    if (!compactToken) return;
                    if (compactCodeFields.some(code => code === compactToken)) { score += 8000; matchCount += 2; }
                    else if (compactCodeFields.some(code => code.includes(compactToken))) { score += 3000 + token.length * 20; matchCount++; }
                    else if (mName.includes(token)) { score += token.length * 10; matchCount++; }
                    else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; }
                    else if (mVendor.includes(token)) { score += token.length * 4; matchCount++; }
                    else if (mBrand.includes(token)) { score += token.length * 3; matchCount++; }
                    else if (mWh.includes(token)) { score += token.length * 2; matchCount++; }
                    else if (mSearchKeywords.includes(token)) { score += token.length * 2; matchCount++; }
                });

                return { item: m, score, matchCount };
            }).filter(r => r.score > 0);
            results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
            return results.map(r => r.item);
        };

        const useParserApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [parserDict, setParserDict] = useState(() => { try { return JSON.parse(localStorage.getItem('parserDict_v870')) || {}; } catch(e){ return {}; }});
            const [marginRules, setMarginRules] = useState(() => { try { return JSON.parse(localStorage.getItem('merchMarginRules_v878')) || [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } catch(e) { return [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } });

            useEffect(() => { getAllIDB('master_products').then(items => { if (items && items.length > 0) { const dict = {}; items.forEach(i => dict[i.코드] = i); setMasterProducts(dict); } }).catch(console.error); }, []);
            useEffect(() => { const handleStorageChange = (e) => { if (e.key === 'merchMaster_sync_trigger' || e.key === 'merch_settings_update_trigger') window.location.reload(); }; window.addEventListener('storage', handleStorageChange); return () => window.removeEventListener('storage', handleStorageChange); }, []);

            const saveMaster = async (data) => { setMasterProducts(data); try { window.requestIdleCallback?.(async () => { await bulkPutIDB('master_products', Object.values(data).filter(item => item && item.코드)); localStorage.setItem('merchMaster_sync_trigger', Date.now().toString()); }); } catch(e) { console.error("IndexedDB 저장 실패", e); } };
            const saveDict = (data) => { setParserDict(data); localStorage.setItem('parserDict_v870', JSON.stringify(data)); };

            const [parserBuffer, setParserBuffer] = useState([]); 
            const [currentTag, setCurrentTag] = useState(''); 
            const [activeTab, setActiveTab] = useState('matched'); 
            const [showInputModal, setShowInputModal] = useState(true); 
            const [showReviewModal, setShowReviewModal] = useState(false); 
            const [showErpModal, setShowErpModal] = useState(false);
            const [toastMsg, setToastMsg] = useState(''); 
            const [isProcessing, setIsProcessing] = useState(false); 
            const [processMsg, setProcessMsg] = useState('');
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [targetId, setTargetId] = useState(null); 
            const [selectedMissingCodes, setSelectedMissingCodes] = useState(new Set()); 
            const [processedCodes, setProcessedCodes] = useState(new Set());
            const [missingSearch, setMissingSearch] = useState(''); 
            const [showExcludeModal, setShowExcludeModal] = useState(false); 
            const [excludeTarget, setExcludeTarget] = useState(null);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return { masterProducts, saveMaster, parserDict, saveDict, marginRules, parserBuffer, setParserBuffer, currentTag, setCurrentTag, activeTab, setActiveTab, showInputModal, setShowInputModal, showReviewModal, setShowReviewModal, showErpModal, setShowErpModal, toastMsg, showToast, isProcessing, setIsProcessing, processMsg, setProcessMsg, globalSearch, setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes, processedCodes, setProcessedCodes, missingSearch, setMissingSearch, showExcludeModal, setShowExcludeModal, excludeTarget, setExcludeTarget };
        };

        const useParserActions = (appState) => {
            const { masterProducts, saveMaster, parserDict, saveDict, marginRules, parserBuffer, setParserBuffer, currentTag, setCurrentTag, setActiveTab, setShowInputModal, showToast, setIsProcessing, setProcessMsg, setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes, processedCodes, setProcessedCodes, setShowErpModal, setShowExcludeModal, setExcludeTarget } = appState;

            const executeParser = useCallback((rawText, tag, forceManual = false) => {
                setShowInputModal(false); setIsProcessing(true); setProcessMsg("AI 분석 및 스마트 매칭 중..."); setCurrentTag(tag); setProcessedCodes(new Set());
                setTimeout(() => {
                    try {
                        const parsedData = parseTextSemantically(rawText); const results = []; 
                        parsedData.forEach(rowData => {
                            let matchResult = forceManual ? { code: '', status: '🔴 불일치' } : runSmartMatch(rowData['품목명'] || '', rowData['규격'] || '', masterProducts, parserDict);
                            rowData._matchCode = matchResult.code; rowData._matchStatus = matchResult.status; if(matchResult.code) rowData.코드 = matchResult.code;
                            rowData.finalData = {}; const pInNum = rowData['입고가'] ? parseNum(rowData['입고가']) : 0;
                            if (pInNum > 0 && matchResult.code) rowData.finalData = calculatePricesEngine(pInNum, masterProducts[matchResult.code] || {}, {}, marginRules, true); else rowData.finalData['입고가'] = pInNum;
                            results.push(rowData);
                        });
                        setParserBuffer(results); setActiveTab(forceManual ? 'unmatched' : 'matched'); setTargetId(null); setGlobalSearch(''); setSelectedMissingCodes(new Set());
                        showToast(forceManual ? '✅ 수동 매핑 모드로 로드되었습니다.' : '✅ 텍스트 분석 및 매칭이 완료되었습니다.');
                    } catch (error) { console.error(error); showToast("❌ 텍스트 분석 중 예기치 않은 오류가 발생했습니다."); } finally { setIsProcessing(false); setProcessMsg(''); }
                }, 100);
            }, [masterProducts, parserDict, marginRules]);

            const handleApplyMatched = useCallback(async (updateTextData = true) => {
                const toApply = parserBuffer.filter(r => r._apply && r._matchCode); 
                if (toApply.length === 0) { showToast("⚠️ 적용할 항목이 없습니다."); return false; }

        const ParserReviewModal = ({ onClose, onConfirm, state, actions }) => {
            const [viewMode, setViewMode] = useState('price'); const [priceFilter, setPriceFilter] = useState('all'); const [updateText, setUpdateText] = useState(true);

            const targetRows = useMemo(() => parserBuffer.filter(r => r._apply && r._matchCode), [parserBuffer]);
            useEffect(() => { if (targetRows.length === 0) onClose(); }, [targetRows.length, onClose]);

            const analysis = useMemo(() => {
                let up = 0, down = 0, same = 0; const list = [];
                targetRows.forEach(row => {
                    const mItem = masterProducts[row._matchCode] || {};
                    const oldP = parseNum(mItem['입고가']); const newP = parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : row['입고가']);
                    let status = 'same'; if (oldP === 0 || newP === 0) { same++; } else if (newP > oldP) { status = 'up'; up++; } else if (newP < oldP) { status = 'down'; down++; } else { same++; }
                    list.push({ ...row, 기존단가: oldP, 새단가: newP, 차액: newP - oldP, 상태: status, 마스터품명: mItem.품목명 || '', 마스터규격: mItem.규격 || '' });
                });
                return { up, down, same, total: targetRows.length, list, priceList: [...list].sort((a, b) => Math.abs(b.차액) - Math.abs(a.차액)) };
            }, [targetRows, masterProducts]);

            const filteredPriceList = useMemo(() => priceFilter === 'all' ? analysis.priceList : analysis.priceList.filter(item => item.상태 === priceFilter), [analysis.priceList, priceFilter]);
            const issueSummary = useMemo(() => {
                const largeChange = analysis.list.filter(item => Math.abs(item.차액 || 0) >= 500 || Math.abs(calcDiffRate(item.기존단가, item.새단가) || 0) >= 10);
                const noOldPrice = analysis.list.filter(item => !item.기존단가 || item.기존단가 <= 0);
                const zeroNewPrice = analysis.list.filter(item => !item.새단가 || item.새단가 <= 0);
                const specChanged = analysis.list.filter(item => String(item.마스터규격 || '').trim() && String(item['규격'] || '').trim() && String(item.마스터규격 || '').trim() !== String(item['규격'] || '').trim());
                const soldOut = analysis.list.filter(item => item._isSoldOut);
                const suspicious = [...new Set([...largeChange, ...noOldPrice, ...zeroNewPrice, ...specChanged, ...soldOut].map(item => item._id))].length;
                return { largeChange, noOldPrice, zeroNewPrice, specChanged, soldOut, suspicious };
            }, [analysis.list]);

            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in" onClick={onClose}>
                    <div className="bg-white w-[900px] max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden" onClick={(e) => e.stopPropagation()}>
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">

                        </div>
                        <div className="flex bg-slate-100 border-b border-slate-200 shrink-0 p-2 gap-2">
                            <button onClick={() => setViewMode('price')} className={`flex-1 py-2.5 rounded-lg font-black text-[13px] ${viewMode === 'price' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:bg-slate-200'}`}><i className="fas fa-search-dollar mr-2"></i>1. 단가 변동 브리핑</button>

                        </div>

                                                        <td className="px-4 py-2 bg-emerald-50/10"><div className="flex flex-col"><span className="font-black text-emerald-800">{item['품목명']} {item._isSoldOut && <span className="ml-1 bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px] font-black">품절</span>}</span><span className="text-[11px] text-emerald-600/70 mt-0.5">{item['규격']}</span></div></td>

                                                <div className="text-[12px] text-slate-600 font-bold leading-relaxed">단가변동이 먼저입니다. 텍스트 좌우 검수는 전체 노가다가 아니라, 아래 이슈 항목과 필요한 상품 검색 중심으로 확인하세요.</div>

                                        <div onClick={() => setPriceFilter('all')} className={`cursor-pointer border p-3 rounded-xl flex flex-col items-center shadow-sm ${priceFilter === 'all' ? 'bg-slate-800 text-white' : 'bg-white'}`}><div className="text-[11px] mb-1">전체</div><div className="font-black text-xl">{analysis.total}건</div></div>

                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="bg-white p-4 border-t flex justify-between items-center shrink-0">
                            <label className="flex items-center gap-1.5 cursor-pointer text-slate-700 text-[12px] font-bold"><input type="checkbox" className="rounded text-indigo-600" checked={updateText} onChange={e => setUpdateText(e.target.checked)} /> 품목명/규격/단위도 파싱값으로 갱신 (공급사 품목명 통일)</label>
                            <div className="flex gap-2"><button onClick={onClose} className="px-5 py-2.5 bg-slate-100 font-bold rounded-lg hover:bg-slate-200">닫기</button><button onClick={() => { onConfirm(updateText); onClose(); }} className="px-6 py-2.5 bg-indigo-600 text-white font-black rounded-lg hover:bg-indigo-700 shadow-sm"><i className="fas fa-save mr-1.5"></i> 마스터 적용 및 학습저장</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ParserApp = () => {
            const appState = useParserApp();
            const actions = useParserActions(appState);

            const { masterProducts, parserBuffer, currentTag, activeTab, setActiveTab, showInputModal, setShowInputModal, showReviewModal, setShowReviewModal, showErpModal, setShowErpModal, toastMsg, showToast, isProcessing, processMsg, globalSearch, setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes, processedCodes } = appState;

            const matchedRows = parserBuffer.filter(r => r._matchCode);
            const similarRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('유사') && !r._matchStatus.includes('중복'));
            const duplicateRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('중복품목'));
            const combinedSimilarRows = [...duplicateRows, ...similarRows];
            const unmatchedRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('불일치'));

            const missingRows = useMemo(() => {
                if (!currentTag) return [];
                const matchedCodes = new Set(matchedRows.map(r => String(r._matchCode)));
                const processedStr = new Set(Array.from(processedCodes).map(String));
                const missing = [];
                for (const code in masterProducts) {
                    const mItem = masterProducts[code];
                    const tags = String(mItem['카탈로그'] || '').split(',').map(s => s.trim());
                    if (tags.includes(currentTag) && !matchedCodes.has(String(code)) && !processedStr.has(String(code))) missing.push(mItem);
                }
                return missing;
            }, [masterProducts, matchedRows, currentTag, processedCodes]);

            const masterSearchResults = useMemo(() => {
                if ((activeTab !== 'similar' && activeTab !== 'unmatched') || !globalSearch.trim()) return [];

            const displayUnmatchedRows = activeTab === 'similar' ? combinedSimilarRows : unmatchedRows;

            const pendingApplyRows = useMemo(() => matchedRows.filter(r => r._apply && r._matchCode), [matchedRows]);
            const unresolvedQueueCount = combinedSimilarRows.length + unmatchedRows.length + (currentTag ? missingRows.length : 0);
            const [autoCompletionShown, setAutoCompletionShown] = useState(false);
            useEffect(() => {
                const workDone = parserBuffer.length > 0 && pendingApplyRows.length > 0 && unresolvedQueueCount === 0;

                }
                if (parserBuffer.length === 0 && autoCompletionShown) setAutoCompletionShown(false);
            }, [parserBuffer.length, pendingApplyRows.length, unresolvedQueueCount, autoCompletionShown, showReviewModal, isProcessing, showToast, setShowReviewModal]);

            const handleUpdateMatchedPrice = useCallback((rowId, newVal) => {
                appState.setParserBuffer(prev => prev.map(r => {
                    if (r._id === rowId) {
                        const mItem = masterProducts[r._matchCode] || {};
                        const recalculatedFinal = calculatePricesEngine(parseNum(newVal), mItem, r.finalData || {}, appState.marginRules, true);
                        return { ...r, finalData: recalculatedFinal };
                    }
                    return r;
                }));
            }, [masterProducts, appState]);

            const safeGoToMain = async () => {
                const toApply = appState.parserBuffer.filter(r => r._apply && r._matchCode);
                if (toApply.length > 0) {
                    const go = window.confirm(`아직 저장되지 않은 매핑 ${toApply.length}건이 있습니다.

[확인] 단가 브리핑/저장 화면으로 이동

                                    <button onClick={()=>setActiveTab('unmatched')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black ${activeTab==='unmatched' ? 'bg-white text-rose-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🔴 불일치 ({unmatchedRows.length})</button>

                                    {activeTab === 'missing' && <button onClick={actions.handleRemoveMissingTags} className={`h-9 px-4 rounded-lg text-[12px] font-bold shadow-sm flex items-center ${selectedMissingCodes.size > 0 ? 'bg-rose-50 border border-rose-200 text-rose-600' : 'bg-white text-slate-400 border border-slate-200'}`}><i className="fas fa-eraser mr-1.5 text-[13px]"></i> 카탈로그 제외</button>}
                                    {(activeTab === 'matched' || activeTab === 'missing') && <div className="w-px h-6 bg-slate-300 mx-1"></div>}
                                    
                                    {/* ⭐ 초기화 버튼 추가 */}

                                        <div className="relative">
                                            <input type="text" placeholder="누락 상품 검색..." value={appState.missingSearch} onChange={e=>appState.setMissingSearch(e.target.value)} className="w-[200px] border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] outline-none focus:border-indigo-500" />
                                            <i className="fas fa-search absolute right-2.5 top-2 text-slate-400 text-[12px] pointer-events-none"></i>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap"><thead className="bg-white sticky top-0 z-10 border-b border-slate-200 text-slate-600"><tr><th className="py-2.5 px-4 w-12 text-center"><input type="checkbox" className="rounded cursor-pointer" checked={filteredMissingRows.length > 0 && selectedMissingCodes.size === filteredMissingRows.length} onChange={(e) => setSelectedMissingCodes(e.target.checked ? new Set(filteredMissingRows.map(r=>r.코드)) : new Set())} /></th><th className="py-2.5 px-3">상품코드</th><th className="py-2.5 px-3">마스터 품목명 (규격)</th><th className="py-2.5 px-3 text-right">기존 입고가</th><th className="py-2.5 px-3">소속 카탈로그</th></tr></thead><tbody className="divide-y divide-slate-100">
                                            {filteredMissingRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">누락된 항목이 없습니다. 완벽합니다!</td></tr> : filteredMissingRows.map(mItem => {
                                                const isSel = selectedMissingCodes.has(mItem.코드);
                                                // ⭐ 누락탭: 마스터 상 판매중단 시 투명도 조절 및 뱃지 추가
                                                const isStopped = mItem['판매여부'] === 0 || mItem['판매여부'] === '0';
                                                
                                                return (
                                                    <tr key={`miss-${mItem.코드}`} onClick={() => setSelectedMissingCodes(p => { const n = new Set(p); n.has(mItem.코드)?n.delete(mItem.코드):n.add(mItem.코드); return n; })} className={`cursor-pointer transition-colors ${isSel ? 'bg-rose-50/50' : 'hover:bg-slate-50'} ${isStopped ? 'opacity-50' : ''}`}>
                                                        <td className="py-2 px-4 text-center"><input type="checkbox" className="rounded text-rose-500 focus:ring-rose-500 pointer-events-none" checked={isSel} readOnly /></td>
                                                        <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{mItem.코드}</td>
                                                        <td className="py-2 px-3"><div className="flex flex-col leading-tight"><span className="font-bold text-slate-800">{mItem.품목명} {isStopped && <span className="ml-1 bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px] font-black">판매중단</span>}</span>{mItem.규격 && <span className="text-[11px] text-slate-400 mt-0.5">({mItem.규격})</span>}</div></td>
                                                        <td className="py-2 px-3 text-right text-slate-500">{mItem.입고가 ? Number(mItem.입고가).toLocaleString() : '-'}</td>
                                                        <td className="py-2 px-3 text-[11px] text-indigo-500 font-bold max-w-[200px] truncate">{mItem['카탈로그']}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody></table>
                                    </div>
                                </div>
                                )
                            ) : (
                                <div className="flex h-full w-full gap-4 fade-in">
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden relative">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0"><div className="flex items-center gap-2"><i className="fas fa-search text-slate-400"></i><span className="text-[13px] font-black text-slate-700">마스터 수동 검색</span></div><div className="relative"><input type="text" placeholder="품명/상품코드/품목코드 검색" value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} className="w-[200px] border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] outline-none focus:border-indigo-500" /><i className="fas fa-search absolute right-2.5 top-2 text-slate-400 text-[12px] pointer-events-none"></i></div></div>
                                        {targetId && <div className="bg-indigo-50/50 px-4 py-3 border-b border-indigo-100 flex items-center justify-between shrink-0"><div className="text-[11px] text-indigo-800 font-bold"><i className="fas fa-info-circle mr-1.5 text-indigo-500"></i>마스터에 없는 상품인가요?</div><button onClick={() => actions.openErpModal()} className="px-3 py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded text-[11px] font-bold"><i className="fas fa-plus mr-1"></i> ERP 코드로 등록</button></div>}
                                        <div className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/30">
                                            {!targetId && !globalSearch ? <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-hand-point-right text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">우측에서 매핑할 <span className="text-indigo-500">파싱 항목</span>을 먼저 선택하세요.</p></div>
                                            : masterSearchResults.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-search text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">검색 결과가 없습니다.</p></div>
                                            : <table className="w-full text-left text-[12px] whitespace-nowrap"><thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3">상품정보 (코드/품명/규격)</th><th className="py-2.5 px-3 text-right w-20">입고가</th><th className="py-2.5 px-3 text-center w-32">작업</th></tr></thead><tbody className="divide-y divide-slate-100">
                                                {masterSearchResults.map(m => {
                                                    const hasTag = currentTag && String(m['카탈로그']).includes(currentTag);
                                                    // ⭐ 마스터 검색탭: 마스터 상 판매중단 시 투명도 조절 및 뱃지 추가
                                                    const isStopped = m['판매여부'] === 0 || m['판매여부'] === '0';
                                                    
                                                    return (
                                                        <tr key={m.코드} className={`hover:bg-indigo-50/50 group transition-colors ${isStopped ? 'opacity-50' : ''}`}>
                                                            <td className="py-2 px-3"><div className="flex flex-col min-w-0 w-full overflow-hidden"><span className="text-[10px] font-mono text-slate-400">{m.코드}{m.품목코드 && m.품목코드 !== m.코드 ? ` · 품목 ${m.품목코드}` : ""}{m.상품코드 && m.상품코드 !== m.코드 ? ` · 상품 ${m.상품코드}` : ""}</span><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[12px] font-extrabold text-slate-800 truncate">{m.품목명}</span>{isStopped && <span className="ml-1 bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px] font-black">판매중단</span>}{m.규격 && <span className="text-[11px] text-slate-500 shrink-0">({m.규격})</span>}</div></div></td>
                                                            <td className="py-2 px-3 text-right font-bold text-slate-600">{m.입고가 ? Number(m.입고가).toLocaleString() : '-'}</td>
                                                            <td className="py-2 px-3 text-center flex gap-1 justify-center items-center h-full"><button onClick={() => actions.handleConfirmMapping(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-indigo-600 text-white hover:bg-indigo-700 flex-1"><i className="fas fa-link"></i> 연결</button>{hasTag && <button onClick={() => actions.handleRemoveTagDirect(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-rose-100 text-rose-600 hover:bg-rose-200"><i className="fas fa-eraser"></i> 단종</button>}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody></table>}
                                        </div>
                                    </div>
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0"><div className="flex items-center gap-2"><i className="fas fa-list text-slate-400"></i><span className="text-[13px] font-black text-slate-700">파싱된 외부 데이터 (대기중)</span></div><span className="text-[11px] font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">총 {displayUnmatchedRows.length}건</span></div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap"><thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3 text-center w-10">선택</th><th className="py-2.5 px-2 text-center w-14">상태</th><th className="py-2.5 px-3">파싱 품명 및 규격</th><th className="py-2.5 px-3 text-right w-16">입고가</th><th className="py-2.5 px-2 text-center w-10">무시</th></tr></thead><tbody className="divide-y divide-slate-100">
                                                {displayUnmatchedRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">대기중인 데이터가 없습니다.</td></tr> : displayUnmatchedRows.map(row => {
                                                    const isTarget = targetId === row._id;
                                                    return (
                                                        <tr key={row._id} onClick={() => { setTargetId(row._id); setGlobalSearch(row['품목명'].replace(/[()[\]{},./]/g, ' ').replace(/\s+/g, ' ').trim()); }} className={`cursor-pointer transition-colors border-l-4 ${isTarget ? 'bg-indigo-50/50 border-indigo-500' : 'hover:bg-slate-50 border-transparent'}`}>
                                                            <td className="py-2 px-3 text-center"><div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center mx-auto ${isTarget ? 'border-indigo-500 bg-white' : 'border-slate-300'}`}>{isTarget && <div className="w-2 h-2 rounded-full bg-indigo-500"></div>}</div></td>
                                                            <td className="py-2 px-2 text-center">{row._matchStatus.includes('중복품목') ? <span className="bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded text-[10px] font-black">선택필요</span> : <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold w-max block mx-auto ${activeTab === 'similar' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>{row._matchStatus.substring(0, 2)}</span>}</td>
                                                            <td className="py-2 px-3"><div className="flex flex-col"><span className={`text-[12px] font-extrabold truncate ${isTarget ? 'text-indigo-900' : 'text-slate-800'}`}>{row['품목명']}</span><span className="text-[11px] text-slate-500 mt-0.5 truncate">{row['규격']} {row['단위'] ? `| ${row['단위']}` : ''}</span></div></td>
                                                            <td className={`py-2 px-3 text-right font-bold ${isTarget ? 'text-indigo-600' : 'text-slate-600'}`}>{row['입고가'] || '-'}</td>
                                                            <td className="py-2 px-2 text-center"><button onClick={(e) => { e.stopPropagation(); actions.handleIgnoreParsedItem(row._id); }} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 px-2 py-1.5 rounded"><i className="fas fa-trash-alt"></i></button></td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody></table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    {showInputModal && <SmartParserInputModal onClose={() => setShowInputModal(false)} executeParser={actions.executeParser} showToast={showToast} availableTags={availableTags} />}
                    {showReviewModal && <ParserReviewModal onClose={() => setShowReviewModal(false)} onConfirm={actions.handleApplyMatched} state={memoizedState} actions={memoizedActions} />}
                    {showErpModal && <ErpCodeInputModal onClose={() => setShowErpModal(false)} onSubmit={actions.handleCreateNewMasterItem} targetItem={parserBuffer.find(r => r._id === targetId)} />}
                    {appState.showExcludeModal && <ExcludeOptionModal onClose={() => appState.setShowExcludeModal(false)} onConfirm={(type) => { actions.executeExclusion(appState.excludeTarget === 'selected' ? Array.from(selectedMissingCodes) : [appState.excludeTarget], type); }} count={appState.excludeTarget === 'selected' ? selectedMissingCodes.size : 1} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParserApp />);
    </script>
</body>
</html>
