<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp Insight - 유통사 통합관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 숫자 입력칸 화살표 제거 및 커스텀 스타일 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .base-input { width: 100%; background: transparent; border-bottom: 1px dashed transparent; text-align: right; transition: all 0.2s; cursor: pointer; padding: 2px 0; }
        .base-input:hover { background: #f1f5f9; border-bottom-color: #cbd5e1; }
        .base-input:focus { outline: none; background: white; border-bottom-color: #6366f1; cursor: text; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const formatAbsNumber = (num) => {
            const n = Math.abs(Number(num));
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말/실사, 수량, 재고, 기말실사(이월수량), 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 구매처, 판매처, 공급사, 판매, 청과, 3거래',
            excludeVendor: '창고이동, 가전표, 폐기, 샘플' 
        };

        const ProductRow = React.memo(({ item, idx, isLinked, onStockChange, onSpacebar, onFocusInput, onGoToSales, onBaseDataChange, onOpenMemo }) => {
            let displayIssues = item.이슈 ? [...item.이슈] : [];
            if (item.대체입고 > 0 || item.대체출고 > 0 || displayIssues.some(msg => msg.includes('🔄'))) {
                displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음'));
            }
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const handleKd = (e, type) => {
                const cols = ['base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') {
                    if (colIdx < cols.length - 1) { e.preventDefault(); const n = document.getElementById(`${cols[colIdx+1]}-${idx}`); if(n) { n.focus(); n.select(); } }
                } else if (e.key === 'ArrowLeft') {
                    if (colIdx > 0) { e.preventDefault(); const p = document.getElementById(`${cols[colIdx-1]}-${idx}`); if(p) { p.focus(); p.select(); } }
                } else if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault(); const n = document.getElementById(`${type}-${idx+1}`); if(n) { n.focus(); n.select(); }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault(); const p = document.getElementById(`${type}-${idx-1}`); if(p) { p.focus(); p.select(); }
                } else if (e.key === ' ' || e.code === 'Space') {
                    if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); }
                }
            };
            
            return (
                <tr data-code={item.코드} className={`transition duration-500 border-b border-gray-100 ${isLinked ? 'bg-indigo-50 ring-2 ring-indigo-400 shadow-md relative z-10 scale-[1.01]' : 'hover:bg-gray-50'} ${isNegativeActual ? 'bg-red-50' : ''}`}>
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.05)] border-r-2 border-gray-200 ${isNegativeActual ? 'bg-red-50' : 'bg-white group-hover:bg-gray-50'} ${isLinked ? 'bg-indigo-50 border-l-4 border-indigo-500' : ''}`}>
                        <div className="flex flex-col max-w-[280px]">
                            <div className="flex justify-between items-end mb-1">
                                <div className="font-bold text-gray-800 truncate text-[13px]">
                                    {isLinked && <i className="fas fa-link text-indigo-500 mr-1 animate-pulse"></i>}
                                    {item.품명}
                                </div>
                                <div className="font-black text-indigo-700 text-[13px] whitespace-nowrap pl-2">
                                    ₩{formatMoney(item.단가)}
                                </div>
                            </div>
                            <div className="flex justify-between items-start">
                                <div className="text-[10px] text-gray-500 truncate flex-1 pr-1">
                                    {item.일자 || '미상'} <span className="mx-1 opacity-50">|</span> {item.거래처 || '미지정'}
                                </div>
                                {item.대체입고 > 0 && <div className="text-[9px] text-blue-500 font-bold whitespace-nowrap">(조정)</div>}
                            </div>
                        </div>
                    </td>
                    
                    <td className={`py-2 px-2 text-right bg-gray-50 bg-opacity-50 border-r border-gray-100`}>
                        <input id={`base-prev-${idx}`} type="number" className={`base-input font-bold ${item.기초 < 0 ? 'text-red-600' : 'text-gray-700'}`} value={item.기초} onChange={e => onBaseDataChange(item.batchKey, '기초', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <div className="flex items-center justify-end gap-1">
                            <input id={`base-in-${idx}`} type="number" className="base-input font-bold text-emerald-700" value={item.입고} onChange={e => onBaseDataChange(item.batchKey, '입고', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-in')} onWheel={e => e.target.blur()} placeholder="0" />
                            {addedIn > 0 && <span className="text-[9px] text-blue-500 font-black" title={`원입고: ${item.입고} / 조정가산: ${addedIn}`}>+{addedIn}</span>}
                        </div>
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <div className="flex items-center justify-end gap-1">
                            <input id={`base-out-${idx}`} type="number" className={`base-input font-bold ${item.출고 > 0 ? 'text-red-600' : 'text-gray-400'}`} value={item.출고} onChange={e => onBaseDataChange(item.batchKey, '출고', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-out')} onWheel={e => e.target.blur()} placeholder="0" />
                            {addedOut > 0 && <span className="text-[9px] text-red-500 font-black" title={`원출고: ${item.출고} / 조정가산: ${addedOut}`}>+{addedOut}</span>}
                        </div>
                    </td>

                    <td className={`py-2 px-2 text-right border-r border-gray-100 ${isLinked ? 'bg-purple-200' : ''} relative`}>
                        {isLinked && (
                            <div className="absolute -top-6 right-0 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md whitespace-nowrap animate-bounce">
                                조정 대상
                            </div>
                        )}
                        <input 
                            id={`actual-input-${idx}`}
                            type="number" 
                            value={item.실사 === null || item.실사 === undefined ? '' : item.실사} 
                            onChange={(e) => onStockChange(item.batchKey, e.target.value)}
                            onClick={() => onFocusInput(item.batchKey, idx)}
                            onFocus={(e) => { e.target.select(); onFocusInput(item.batchKey, idx); }}
                            onKeyDown={(e) => handleKd(e, 'actual-input')}
                            onWheel={e => e.target.blur()}
                            placeholder={item.전산잔량}
                            className={`w-full text-right border ${isLinked ? 'border-indigo-500 ring-2 ring-indigo-200 bg-white text-indigo-900' : 'border-purple-300 text-purple-700 bg-white hover:bg-gray-50'} ${isNegativeActual ? 'bg-red-100 border-red-400 text-red-700 font-black' : 'font-bold'} rounded px-1.5 py-1 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner transition-colors cursor-pointer`}
                        />
                    </td>
                    
                    <td className="py-2 px-2 text-right border-r border-gray-100">
                        {item.로스 !== 0 && (
                            <div className="flex flex-col items-end justify-center mb-0.5">
                                <span className={`text-[12px] font-black ${item.로스 < 0 ? 'text-red-600' : 'text-blue-600'}`}>
                                    {item.로스 > 0 ? '+' : ''}{formatMoney(item.로스)}
                                </span>
                            </div>
                        )}
                        {item.대체출고 > 0 && <div className="text-[12px] font-black text-red-600">-{formatMoney(item.대체출고)}</div>}
                        {item.대체입고 > 0 && <div className="text-[12px] font-black text-blue-600">+{formatMoney(item.대체입고)}</div>}
                        {item.로스 === 0 && item.대체입고 === 0 && item.대체출고 === 0 && <span className="text-gray-300 font-black">-</span>}
                    </td>
                    
                    <td className="py-2 px-2 text-center border-r border-gray-100">
                        {item.출고 > 0 ? (
                            <button 
                                onClick={(e) => { e.stopPropagation(); onGoToSales(item.코드); }}
                                className="bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 hover:border-indigo-400 px-2 py-1 rounded text-[10px] font-bold transition-colors shadow-sm w-full"
                                title="이 품목이 팔린 거래처 내역 확인"
                            >
                                <i className="fas fa-search opacity-70"></i> 판매내역
                            </button>
                        ) : <span className="text-gray-300">-</span>}
                    </td>
                    
                    <td className="py-2 px-3 text-left w-full min-w-[200px]">
                        <div className="flex justify-between items-center w-full">
                            <div className="flex items-center gap-1 flex-wrap text-left flex-1">
                                {hasIssue && displayIssues.map((msg, i) => <span key={i} className={`px-2 py-1 rounded font-bold text-[10px] whitespace-nowrap ${msg.includes('원가수정') ? 'bg-purple-100 text-purple-700 border border-purple-200' : 'bg-red-100 text-red-700'}`}>{msg}</span>)}
                                {!hasIssue && <span className="text-gray-300">-</span>}
                            </div>
                            <div className="flex items-center gap-1.5 text-right shrink-0 ml-2">
                                {item.메모 && <span className="px-2 py-1 bg-yellow-100 text-yellow-800 border border-yellow-300 rounded font-bold text-[10px] whitespace-nowrap" title={item.메모}>{item.메모}</span>}
                                <button onClick={() => onOpenMemo(item.batchKey, item.메모 || '')} className="text-gray-400 hover:text-indigo-500 transition-colors ml-1" title="메모 추가/수정"><i className="fas fa-edit"></i></button>
                            </div>
                        </div>
                    </td>
                </tr>
            );
        }, (prevProps, nextProps) => {
            return prevProps.item === nextProps.item && prevProps.isLinked === nextProps.isLinked && prevProps.idx === nextProps.idx;
        });

        const VendorRow = React.memo(({ item, priceOptions, onPriceChange }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            let displayIssues = item.이슈 ? item.이슈.split(',').map(s => s.trim()) : [];
            if (displayIssues.some(msg => msg.includes('🔄'))) { displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음')); }
            const issueStr = displayIssues.join(', ');
            const unitCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;

            if (item.isSummary) return null; 
            
            return (
                <tr className={`transition border-b border-gray-100 ${item.isManualPrice ? 'bg-purple-50' : 'hover:bg-gray-50'}`}>
                    <td className="py-2 px-3 font-bold text-emerald-800 border-r border-gray-100 truncate max-w-[150px]">
                        {item.거래처}
                    </td>
                    <td className="py-2 px-3 border-r border-gray-100 min-w-[200px]">
                        <div className="flex items-center">
                            <div className="font-bold text-gray-800 text-[13px]">{item.품명}</div>
                            {item.isManualPrice && <span className="ml-2 bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded text-[9px] font-bold border border-purple-200">수동 지정됨</span>}
                        </div>
                        {priceOptions && priceOptions.length > 1 && (
                            <div className="mt-1.5 flex flex-wrap items-center gap-1.5">
                                <span className="text-[10px] text-gray-400 font-bold mr-1"><i className="fas fa-hand-pointer"></i> 단가 매치:</span>
                                {priceOptions.map((p, i) => {
                                    const isActive = Math.abs(unitCogs - p) < 1; 
                                    return (
                                        <button key={i} onClick={() => onPriceChange(item.거래처, item.코드, p)} className={`px-2.5 py-1 rounded text-[10px] font-bold transition-all shadow-sm ${isActive ? 'bg-indigo-500 text-white border-indigo-600 ring-2 ring-indigo-200 scale-105' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100 border'}`}>
                                            ₩{formatMoney(p)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </td>
                    <td className={`py-2 px-3 text-right font-black border-r border-gray-100 ${item.판매수량 > 0 ? 'text-red-600' : 'text-gray-400 font-bold'}`}>{item.판매수량 > 0 ? formatMoney(item.판매수량) : '0'}</td>
                    <td className="py-2 px-3 text-right text-gray-500 font-bold border-r border-gray-100 bg-gray-50 bg-opacity-30">₩{formatMoney(unitCogs)}</td>
                    <td className="py-2 px-3 text-right font-bold border-r border-gray-100">₩{formatMoney(item.판매액)}</td>
                    <td className="py-2 px-3 text-right text-gray-700 bg-gray-50 bg-opacity-50 border-r border-gray-100">₩{formatMoney(item.매출원가)}</td>
                    <td className={`py-2 px-3 text-right font-black bg-indigo-50 bg-opacity-50 border-r border-gray-100 ${item.이익 < 0 ? 'text-red-600' : 'text-indigo-700'}`}>₩{formatMoney(item.이익)}</td>
                    <td className={`py-2 px-3 text-right font-bold border-r border-gray-100 ${marginRate < 0 ? 'text-red-600' : 'text-blue-600'}`}>{marginRate}%</td>
                    <td className="py-2 px-3 text-left text-[11px]">
                        {issueStr ? <span className="px-2 py-1 bg-red-100 text-red-700 rounded font-bold inline-block">{issueStr}</span> : <span className="text-gray-300">-</span>}
                    </td>
                </tr>
            );
        }, (prev, next) => prev.item === next.item && prev.priceOptions === next.priceOptions);

        const FileBox = React.memo(({ title, type, icon, color, files, setFiles, autoAssignFiles }) => {
            const inputRef = useRef(null); 
            const [isDragging, setIsDragging] = useState(false);
            const handleBoxDrop = (e) => { 
                e.preventDefault(); e.stopPropagation(); setIsDragging(false); 
                const droppedFiles = Array.from(e.dataTransfer.files); 
                if (droppedFiles.length > 1) autoAssignFiles(droppedFiles); 
                else if (droppedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: droppedFiles[0] })); 
                window.focus(); 
            };
            return (
                <div className={`relative border-2 border-dashed rounded-xl p-4 text-center bg-white transition-all cursor-pointer flex flex-col items-center justify-center min-h-[120px] z-10 ${isDragging ? `border-${color}-500 bg-${color}-50 scale-105 shadow-md` : (files[type] ? `border-${color}-500 bg-${color}-50` : 'border-gray-300 hover:border-gray-400 hover:bg-gray-50')}`} onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} onDrop={handleBoxDrop} onClick={() => inputRef.current.click()}>
                    <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={(e) => { const selectedFiles = Array.from(e.target.files); if (selectedFiles.length > 1) autoAssignFiles(selectedFiles); else if (selectedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: selectedFiles[0] })); e.target.value = ''; }} className="hidden" multiple />
                    <i className={`fas ${icon} text-2xl mb-2 ${files[type] ? `text-${color}-600` : 'text-gray-400'}`}></i><div className="font-bold text-sm text-gray-700">{title}</div>
                    <div className="text-xs text-gray-500 mt-1 w-full px-2 break-all">{files[type] ? <span className={`text-${color}-700 font-semibold line-clamp-2`}>{files[type].name}</span> : '클릭 / 드래그'}</div>
                </div>
            );
        });

        function App() {
            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });
            const [rawJson, setRawJson] = useState({ prev: [], in: [], out: [], end: [] });
            const [viewMode, setViewMode] = useState('product'); 
            const [filters, setFilters] = useState({ noTransaction: false, issuesOnly: false, excludeZeroActual: false, search: '' });
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [alertMsg, setAlertMsg] = useState('');
            const [showGuide, setShowGuide] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);
            const [showInsights, setShowInsights] = useState(false);

            const [activeMenu, setActiveMenu] = useState('single');
            const [insights, setInsights] = useState({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });
            const [trendData, setTrendData] = useState([]);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const [undoUi, setUndoUi] = useState({ state: 'closed' });
            const [substHistory, setSubstHistory] = useState([]);
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const focusedInputRef = useRef({ key: null, idx: -1 });

            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [hasAutoSave, setHasAutoSave] = useState(false);

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('inventoryMappings');
                return saved ? JSON.parse(saved) : defaultMappings;
            });

            const saveMappings = () => {
                localStorage.setItem('inventoryMappings', JSON.stringify(mappings));
                setShowSettings(false);
            };

            const [kpis, setKpis] = useState({

            const handleVendorPriceChange = useCallback((vendorName, productCode, newPrice) => {

                        // 🌟 실사를 전산잔량으로 초기화하여 로스 제거
                        newData[targetBatchIdx].실사 = newData[targetBatchIdx].전산잔량;
                        newData[targetBatchIdx].로스 = 0;
                        newData[targetBatchIdx].이슈 = newData[targetBatchIdx].이슈.filter(msg => msg !== '실사 수기조정');
                        
                        if (!newData[targetBatchIdx].이슈.includes('원가수정(매칭)')) {
                            newData[targetBatchIdx].이슈.push('원가수정(매칭)');
                        }

                        // 3. 거래처 뷰 매출원가 재정산
                        const newCogs = vRow.판매수량 * newPrice;
                        const newProfit = vRow.판매액 - newCogs;
                        newV[vIdx] = { 
                            ...vRow,

                            isManualPrice: true,

            const handleResetFiles = () => {

                setVendorData([]);

                setInsights({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });

            };

            const extractDateFromName = (filename) => {
                if (!filename) return 0;
                const match8 = filename.match(/20\d{6}/); 
                if (match8) return parseInt(match8[0], 10);
                const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); 
                if (match6) return parseInt('20' + match6[1], 10);
                return 0;
            };

            const parseExcel = (file, currentMappings) => {
                return new Promise((resolve, reject) => {
                    if (!file) return resolve([]);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const processWorkbook = (wb) => {
                                const sheet = wb.Sheets[wb.SheetNames[0]];
                                const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                                let headerRowIdx = -1; let maxScore = 0;
                                const keywords = {
                                    code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                    name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                    qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                    price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                    vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                    spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                    date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                                };

                                for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                    const row = jsonAll[i] || [];
                                    let score = 0;
                                    const rowStr = row.join('').replace(/\s/g, '');
                                    if (!rowStr) continue;
                                    Object.values(keywords).forEach(kwList => {
                                        if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                    });
                                    if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                                }
                                return { jsonAll, headerRowIdx, maxScore, keywords };
                            };

                            let wb = XLSX.read(data, { type: 'array' });
                            let { jsonAll, headerRowIdx, maxScore, keywords } = processWorkbook(wb);

                            if (maxScore < 2) {
                                try {
                                    const text = new TextDecoder('euc-kr').decode(data);
                                    const wb2 = XLSX.read(text, { type: 'string' });
                                    const res2 = processWorkbook(wb2);
                                    if (res2.maxScore > maxScore) { jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; keywords = res2.keywords; }
                                } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                            }

                            if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                            const rawHeaders = jsonAll[headerRowIdx];
                            const uniqueHeaders = []; const headerCounts = {};
                            for (let j = 0; j < rawHeaders.length; j++) {
                                let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                                if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                                uniqueHeaders.push(h);
                            }

                            const parsedData = [];
                            const getValByKeywords = (obj, kwList) => {
                                const keys = Object.keys(obj);
                                for (let kw of kwList) {
                                    if(!kw) continue;
                                    let match = keys.find(k => k.replace(/\s/g, '').toLowerCase() === kw);
                                    if (!match) match = keys.find(k => k.replace(/\s/g, '').toLowerCase().includes(kw));
                                    if (match && obj[match] !== undefined && String(obj[match]).trim() !== '') return obj[match];
                                }
                                return null;
                            };

                            for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                                const row = jsonAll[i];
                                if (!row || row.join('').trim() === '') continue;
                                
                                const rowObj = {};
                                uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                                
                                const baseNameRaw = getValByKeywords(rowObj, keywords.name);
                                const baseName = baseNameRaw !== null && baseNameRaw !== undefined ? String(baseNameRaw).trim() : '이름없음';
                                const specValRaw = getValByKeywords(rowObj, keywords.spec);
                                const specVal = specValRaw !== null && specValRaw !== undefined ? String(specValRaw).trim() : '';
                                
                                let fullName = baseName;
                                if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                                const normObj = {
                                    코드: String(getValByKeywords(rowObj, keywords.code) || 'NO_CODE').trim(),
                                    품명: fullName,
                                    수량: parseNumber(getValByKeywords(rowObj, keywords.qty)),
                                    단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                    거래처: String(getValByKeywords(rowObj, keywords.vendor) || '미지정').trim(),
                                    일자: String(getValByKeywords(rowObj, keywords.date) || '').trim(),
                                    메모: '', 
                                    _raw: rowObj 
                                };
                                parsedData.push(normObj);
                            }
                            resolve(parsedData);
                        } catch (err) { reject(err); }
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            const autoAssignFiles = (fileArray) => {
                setFiles(prev => {
                    let updated = { ...prev };
                    const stockCandidates = [];

                    fileArray.forEach(file => {
                        const name = file.name.toLowerCase();
                        if (name.includes('구매') || name.includes('매입') || name.includes('입고')) updated.in = file;
                        else if (name.includes('판매') || name.includes('매출') || name.includes('출고')) updated.out = file;
                        else stockCandidates.push(file);
                    });

                    if (stockCandidates.length > 0) {
                        stockCandidates.sort((a, b) => extractDateFromName(a.name) - extractDateFromName(b.name));
                        if (stockCandidates.length === 1) {
                            const name = stockCandidates[0].name.toLowerCase();
                            if (name.includes('기말') || name.includes('실사') || name.includes('마감')) updated.end = stockCandidates[0];
                            else updated.prev = stockCandidates[0]; 
                        } else {
                            updated.prev = stockCandidates[0];
                            updated.end = stockCandidates[stockCandidates.length - 1];
                        }
                    }
                    return updated;
                });
            };

            const handleGlobalDrop = (e) => {
                e.preventDefault(); setIsGlobalDragging(false);
                const droppedFiles = Array.from(e.dataTransfer.files);
                if (droppedFiles.length > 0) autoAssignFiles(droppedFiles);
                window.focus(); 
            };

            const handleFileChange = async (type, e) => {
                const selectedFiles = Array.from(e.target.files);
                if (selectedFiles.length > 1) autoAssignFiles(selectedFiles);
                else if (selectedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: selectedFiles[0] }));
                e.target.value = '';
            };

            const recalculateKPIs = (pDataArray) => {
                let revenue = 0, cogs = 0, totalInAmt = 0;
                let lossQty = 0, lossAmt = 0;
                let beginningStockAmt = 0, beginningStockQty = 0;
                let endingStockAmt = 0, endingStockQty = 0;

                pDataArray.forEach(item => {
                    revenue += item.매출액 || 0; cogs += item.매출원가 || 0;
                    totalInAmt += (item.입고 || 0) * (item.단가 || 0);

                    const actualQty = item.실사 === '' || item.실사 === null || item.실사 === undefined ? 0 : Number(item.실사);
                    const sysQty = Number(item.전산잔량) || 0;
                    const diff = actualQty - sysQty;

                    lossQty += diff; lossAmt += diff * (item.단가 || 0); 

                    beginningStockQty += (item.기초 || 0); beginningStockAmt += (item.기초 || 0) * (item.단가 || 0);
                    endingStockQty += actualQty; endingStockAmt += actualQty * (item.단가 || 0);
                });

                const opProfit = revenue - cogs; const profit = opProfit + lossAmt; 
                const opProfitRate = revenue > 0 ? (opProfit / revenue) * 100 : 0;
                const cogsRate = revenue > 0 ? (cogs / revenue) * 100 : 0;
                const stockDiffQty = endingStockQty - beginningStockQty;
                const stockDiffAmt = endingStockAmt - beginningStockAmt;

                setKpis({ revenue, cogs, totalInAmt, profit, opProfit, opProfitRate, cogsRate, endingStockAmt, stockDiffQty, stockDiffAmt, lossQty, lossAmt });
            };

            const runAnalysis = async (demoFiles = null, demoJson = null) => {
                setIsProcessing(true); setError(''); setInsights({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });
                setShowInsights(false); setLinkSourceKey(null); focusedInputRef.current = { key: null, idx: -1 }; setSubstHistory([]); setUndoUi({ state: 'closed' });

                try {
                    let parsedPrev = demoJson ? demoJson.prev : rawJson.prev;
                    let parsedIn = demoJson ? demoJson.in : rawJson.in;
                    let parsedOut = demoJson ? demoJson.out : rawJson.out;
                    let parsedEnd = demoJson ? demoJson.end : rawJson.end;
                    
                    const currentFiles = demoFiles || files;

                    if (currentFiles.prev && !currentFiles.prev.isDemo) parsedPrev = await parseExcel(currentFiles.prev, mappings);
                    if (currentFiles.in && !currentFiles.in.isDemo) parsedIn = await parseExcel(currentFiles.in, mappings);
                    if (currentFiles.out && !currentFiles.out.isDemo) parsedOut = await parseExcel(currentFiles.out, mappings);
                    if (currentFiles.end && !currentFiles.end.isDemo) parsedEnd = await parseExcel(currentFiles.end, mappings);

                    const prevDateNum = extractDateFromName(currentFiles.prev?.name);
                    const endDateNum = extractDateFromName(currentFiles.end?.name);

                    let refYear = new Date().getFullYear();
                    if (prevDateNum) refYear = Math.floor(prevDateNum / 10000);
                    else if (endDateNum) refYear = Math.floor(endDateNum / 10000);

                    const formatItemDate = (dateStr) => {
                        if (!dateStr) return 0;
                        const str = String(dateStr).trim();
                        if (/^\d{5}$/.test(str)) {
                            const serial = parseInt(str, 10);
                            if (serial > 30000 && serial < 80000) {
                                const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                                const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                                return parseInt(`${y}${m}${d}`, 10);
                            }
                        }
                        const parts = str.match(/\d+/g);
                        if (!parts) return 0;
                        if (parts.length >= 3) {
                            let y = parts[0]; if (y.length === 2) y = '20' + y;
                            let m = parts[1].padStart(2, '0'); let d = parts[2].padStart(2, '0');
                            return parseInt(`${y}${m}${d}`, 10);
                        } else if (parts.length === 2) {
                            let m = parts[0].padStart(2, '0'); let d = parts[1].padStart(2, '0');
                            return parseInt(`${refYear}${m}${d}`, 10);
                        }
                        const cleaned = str.replace(/[^\d]/g, '');
                        if (cleaned.length === 8) return parseInt(cleaned, 10);
                        if (cleaned.length === 6) return parseInt('20' + cleaned, 10);
                        return 0;
                    };

                    if (prevDateNum || endDateNum) {
                        const isDateValid = (itemDateStr) => {
                            const itemDate = formatItemDate(itemDateStr);
                            if (itemDate === 0) return true; 
                            if (prevDateNum && itemDate <= prevDateNum) return false;
                            if (endDateNum && itemDate > endDateNum) return false;
                            return true;
                        };
                        parsedIn = parsedIn.filter(item => isDateValid(item.일자));
                        parsedOut = parsedOut.filter(item => isDateValid(item.일자));
                    }

                    if (!demoJson) setRawJson({ prev: parsedPrev, in: parsedIn, out: parsedOut, end: parsedEnd });

                    let minD = 99999999; let maxD = 0;
                    const allParsedData = [...parsedPrev, ...parsedIn, ...parsedOut, ...parsedEnd];
                    allParsedData.forEach(item => {
                        const d = formatItemDate(item.일자);
                        if (d > 0) { if (d < minD) minD = d; if (d > maxD) maxD = d; }
                    });
                    
                    const formatStrForPeriod = (num) => {
                        const s = String(num);
                        if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
                        return s;
                    };

                    if (minD !== 99999999 && maxD !== 0) setAnalysisPeriod(minD === maxD ? formatStrForPeriod(minD) : `${formatStrForPeriod(minD)} ~ ${formatStrForPeriod(maxD)}`);
                    else setAnalysisPeriod('기간 미상 (날짜 데이터 없음)');

                    let pData = {}; let vData = []; const stockPool = {};
                    const excludeList = (mappings.excludeVendor || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s);
                    const isExcluded = (vendorName) => vendorName && excludeList.some(keyword => vendorName.toLowerCase().includes(keyword));

                    const addStock = (item, type) => {
                        if (isExcluded(item.거래처)) return;
                        const code = String(item.코드 || 'NO_CODE'); const price = parseNumber(item.단가); const date = String(item.일자 || '');
                        const batchKey = `${code}|${price}|${date}`;

                        if (!pData[batchKey]) {
                            pData[batchKey] = { 
                                batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 거래처: item.거래처,
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                매출액: 0, 매출원가: 0, 메모: '', 이슈: [], _orig: {기초:0, 입고:0, 출고:0}
                            };
                        }
                        
                        if (type === 'prev') pData[batchKey].기초 += item.수량;
                        if (type === 'in') pData[batchKey].입고 += item.수량;
                        
                        if (!stockPool[code]) stockPool[code] = { buckets: [] };
                        if (item.수량 !== 0) stockPool[code].buckets.push({ batchKey, 단가: price, 일자: date, 수량: item.수량 });
                    };

                    parsedPrev.forEach(item => addStock(item, 'prev'));
                    parsedIn.forEach(item => addStock(item, 'in'));

                    Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));

                    parsedOut.forEach(sale => {
                        if (isExcluded(sale.거래처)) return;
                        const code = String(sale.코드 || 'NO_CODE');
                        let qtyToDeduct = sale.수량; let totalMatchedCogs = 0; let issueMsg = null;
                        const pool = stockPool[code];

                                                    ) : (
                                                        <tr>
                                                            <th className="p-3 border-b border-gray-200 text-emerald-700 border-r w-[150px]">거래처명</th>
                                                            <th className="p-3 border-b border-gray-200 border-r w-[250px]">품명(규격)</th>
                                                            <th className="p-3 border-b border-gray-200 text-right bg-red-50 text-red-700 border-r w-[80px]">판매수량</th>
                                                            <th className="p-3 border-b border-gray-200 text-right bg-gray-50 border-r w-[90px]" title="이 거래처에 적용된 개당 평균 원가">적용원가(단가)</th>
                                                            <th className="p-3 border-b border-gray-200 text-right bg-blue-50 border-r w-[90px]">판매액</th>
                                                            <th className="p-3 border-b border-gray-200 text-right bg-orange-50 text-orange-700 border-r w-[90px]">매출원가</th>
                                                            <th className="p-3 border-b border-gray-200 text-right text-indigo-600 bg-indigo-50 border-r w-[90px]">건별이익</th>
                                                            <th className="p-3 border-b border-gray-200 text-right border-r w-[75px]">마진율(%)</th>
                                                            <th className="p-3 border-b border-gray-200 text-left w-full min-w-[150px]">이슈/결과</th>
                                                        </tr>
                                                    )}
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {filteredData.length === 0 ? (
                                                        <tr><td colSpan={viewMode === 'product' ? '8' : '9'} className="p-8 text-center text-gray-400 font-medium">표시할 데이터가 없습니다.</td></tr>
                                                    ) : viewMode === 'product' ? (
                                                        filteredData.map((item, idx) => (
                                                            <ProductRow 
                                                                key={item.batchKey} 
                                                                item={item} 
                                                                idx={idx} 
                                                                isLinked={linkSourceKey === item.batchKey} 
                                                                onStockChange={handleManualStockChange} 
                                                                onSpacebar={handleSpacebarLink} 
                                                                onFocusInput={handleFocusInput} 
                                                                onGoToSales={handleGoToSales}
                                                                onBaseDataChange={handleBaseDataChange}
                                                                onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                            />
                                                        ))
                                                    ) : (
                                                        filteredData.map((item, idx) => (
                                                            <VendorRow key={`${item.거래처}-${item.코드}-${idx}`} item={item} priceOptions={priceOptionsMap[item.코드]} onPriceChange={handleVendorPriceChange} />
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                            
                                            {/* 🌟 V4.8.1: 자연스럽게 하단에 배치되는 복귀 버튼 */}
                                            {viewMode === 'vendor' && filters.search && (
                                                <div className="p-6 mt-4 mb-10 flex justify-center fade-in bg-white border border-gray-200 rounded-xl shadow-sm mx-4">
                                                    <button 
                                                        onClick={handleReturnToProducts}
                                                        className="bg-gray-800 hover:bg-gray-900 text-white px-8 py-3 rounded-full font-black shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center border-2 border-gray-700"
                                                    >
                                                        <i className="fas fa-check-circle mr-2 text-emerald-400 text-lg"></i> 단가 매칭 완료 (품목별 목록으로 복귀)
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeMenu === 'trend' && (
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 fade-in space-y-6 w-full flex flex-col items-center">
                            <div className="max-w-7xl w-full space-y-6">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4">
                                        <div>
                                            <h2 className="text-xl font-black text-gray-800 mb-1"><i className="fas fa-chart-area text-emerald-500 mr-2"></i>기간별 트렌드 대시보드</h2>
                                            <p className="text-sm text-gray-500 font-medium">과거 마감 엑셀 파일들을 여러 개 선택해서 올리면 흐름이 나타납니다.</p>
                                        </div>
                                        <div className="mt-4 md:mt-0 relative">
                                            <input type="file" id="trendFileUploader" multiple accept=".xlsx" className="hidden" onChange={handleTrendFilesDrop} />
                                            <label htmlFor="trendFileUploader" className="cursor-pointer bg-emerald-50 text-emerald-700 border-2 border-emerald-200 hover:bg-emerald-100 font-bold px-6 py-3 rounded-xl transition shadow-sm inline-flex items-center">
                                                <i className="fas fa-folder-open mr-2 text-xl"></i> 과거 마감파일 묶음 업로드
                                            </label>
                                        </div>
                                    </div>
                                    {trendData.length > 0 ? (
                                        <div className="mt-6 border border-gray-100 rounded-xl p-4 bg-gray-50">
                                            <div className="h-[400px] w-full relative"><canvas ref={chartRef}></canvas></div>
                                        </div>
                                    ) : (
                                        <div className="mt-6 border-2 border-dashed border-gray-300 rounded-xl p-12 text-center bg-gray-50 text-gray-400">
                                            <i className="fas fa-chart-bar text-6xl mb-4 text-gray-300"></i>
                                            <p className="font-bold text-lg text-gray-600">데이터가 없습니다.</p>
                                        </div>
                                    )}
                                </div>

                                {trendData.length > 0 && (
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h3 className="font-bold text-gray-800 mb-4 text-lg">월별 세부 수치 요약</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse text-sm">
                                                <thead className="bg-gray-50 border-y border-gray-200 text-gray-600">
                                                    <tr>
                                                        <th className="p-3 font-bold">월/기간 (파일명)</th>
                                                        <th className="p-3 font-bold text-right text-indigo-600">매출액</th>
                                                        <th className="p-3 font-bold text-right text-emerald-600">매출이익</th>
                                                        <th className="p-3 font-bold text-right">이익률(%)</th>
                                                        <th className="p-3 font-bold text-right text-red-500">로스손실액</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {trendData.map((d, i) => {
                                                        const rate = d.rev ? ((d.prof / d.rev) * 100).toFixed(1) : 0;
                                                        return (
                                                            <tr key={i} className="hover:bg-gray-50 transition">
                                                                <td className="p-3">
                                                                    <div className="font-bold text-gray-800">{d.monthLabel}</div>
                                                                    <div className="text-[10px] text-gray-400">{d.filename}</div>
                                                                </td>
                                                                <td className="p-3 text-right font-bold text-gray-700">₩{formatMoney(d.rev)}</td>
                                                                <td className="p-3 text-right font-black text-emerald-600">₩{formatMoney(d.prof)}</td>
                                                                <td className="p-3 text-right font-bold text-orange-500">{rate}%</td>
                                                                <td className="p-3 text-right font-bold text-red-500">₩{formatMoney(d.lossAmt)}</td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 실행 취소 전체 히스토리 리스트 모달 */}
                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-gray-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce">
                                <div className="bg-gray-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-yellow-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-gray-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-gray-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-gray-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden">
                                            <thead className="bg-gray-100 text-gray-600">
                                                <tr>
                                                    <th className="p-3 font-bold border-b">원물 (차감 내역)</th>
                                                    <th className="p-3 font-bold border-b">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-bold border-b">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-blue-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-red-500 font-black">-{h.sQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-500 font-black">+{h.tQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-100 hover:text-red-600 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-gray-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-red-600 font-bold hover:text-red-800 hover:bg-red-50 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-gray-800 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-gray-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGuide && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-gray-900 bg-opacity-60 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col animate-[fadeIn_0.3s_ease-out]">
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 flex justify-between items-center text-white shrink-0 shadow-md">
                                    <h2 className="text-xl md:text-2xl font-black flex items-center"><i className="fas fa-book-reader mr-3 text-3xl"></i>유통사 정밀 경영 결산 가이드</h2>
                                    <button onClick={() => setShowGuide(false)} className="text-white hover:text-indigo-200 transition-colors"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 md:p-8 overflow-y-auto bg-gray-50 text-gray-800 space-y-6">
                                    <section className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h3 className="text-lg md:text-xl font-black text-orange-500 mb-4 border-b-2 border-orange-100 pb-2 flex items-center"><i className="fas fa-bolt mr-2"></i> V5.2: 수불부 완벽 연동 엔진</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                            <div className="bg-white p-4 rounded-lg border-2 border-orange-100 hover:border-orange-300 transition-colors">
                                                <div className="text-orange-500 mb-2"><i className="fas fa-sync-alt text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">단가 매치 시 즉시 수량 이동</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed mb-2">
                                                    [거래처별 뷰]에서 단가 매칭 버튼을 누르면 기존에 잘못 계산되었던 출고 수량이 회수되어, <strong>원하는 품목의 실제 수량으로 깔끔하게 맞교환</strong>됩니다.
                                                </p>
                                            </div>
                                            <div className="bg-white p-4 rounded-lg border-2 border-orange-100 hover:border-orange-300 transition-colors">
                                                <div className="text-orange-500 mb-2"><i className="fas fa-magic text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">스마트 포커스 자동 복귀</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed">단가 확인 후 복귀 버튼을 누르면 <strong>작업하던 상품 줄로 스크롤이 자동 이동하고 노란색으로 반짝이며 커서가 들어갑니다.</strong> 이어서 바로 수량을 수정하세요!</p>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                                <div className="bg-gray-100 p-5 border-t border-gray-200 flex justify-end shrink-0">
                                    <button onClick={() => setShowGuide(false)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all transform hover:-translate-y-0.5">확인했습니다</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
