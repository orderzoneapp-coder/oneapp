<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp Insight - 유통사 통합관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 숫자 입력칸 화살표 제거 및 커스텀 스타일 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .base-input { width: 100%; background: transparent; border-bottom: 1px dashed transparent; text-align: right; transition: all 0.2s; cursor: pointer; padding: 2px 0; }
        .base-input:hover { background: #f1f5f9; border-bottom-color: #cbd5e1; }
        .base-input:focus { outline: none; background: white; border-bottom-color: #6366f1; cursor: text; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const formatAbsNumber = (num) => {
            const n = Math.abs(Number(num));
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말/실사, 수량, 재고, 기말실사(이월수량), 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 구매처, 판매처, 공급사, 판매, 청과, 3거래',
            excludeVendor: '창고이동, 가전표, 폐기, 샘플, 3우리, 1전송, 우리농산' 
        };

        const ProductRow = React.memo(({ item, idx, isLinked, priceOptions, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onPriceMatch, onGoToSales }) => {
            let displayIssues = item.이슈 ? [...item.이슈] : [];
            if (item.대체입고 > 0 || item.대체출고 > 0 || displayIssues.some(msg => msg.includes('🔄'))) {
                displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음'));
            }
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const handleKd = (e, type) => {
                const cols = ['base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') {
                    if (colIdx < cols.length - 1) { e.preventDefault(); const n = document.getElementById(`${cols[colIdx+1]}-${idx}`); if(n) { n.focus(); n.select(); } }
                } else if (e.key === 'ArrowLeft') {
                    if (colIdx > 0) { e.preventDefault(); const p = document.getElementById(`${cols[colIdx-1]}-${idx}`); if(p) { p.focus(); p.select(); } }
                } else if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault(); const n = document.getElementById(`${type}-${idx+1}`); if(n) { n.focus(); n.select(); }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault(); const p = document.getElementById(`${type}-${idx-1}`); if(p) { p.focus(); p.select(); }
                } else if (e.key === ' ' || e.code === 'Space') {
                    if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); }
                }
            };
            
            return (
                <tr data-code={item.코드} data-batch={item.batchKey} className={`transition duration-500 border-b border-gray-100 ${isLinked ? 'bg-indigo-50 ring-2 ring-indigo-400 shadow-md relative z-10 scale-[1.01]' : 'hover:bg-gray-50'} ${item.isDummy && item.단가 === 0 ? 'bg-red-50 bg-opacity-30' : ''}`}>
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.05)] border-r-2 border-gray-200 ${item.isDummy && item.단가 === 0 ? 'bg-red-50 bg-opacity-80' : 'bg-white group-hover:bg-gray-50'} ${isLinked ? 'bg-indigo-50 border-l-4 border-indigo-500' : ''}`}>
                        <div className="flex flex-col max-w-[280px]">
                            <div className="flex justify-between items-start mb-1">
                                <div className="font-bold text-gray-800 truncate text-[13px] flex items-center flex-wrap gap-1">
                                    {isLinked && <i className="fas fa-link text-indigo-500 mr-1 animate-pulse"></i>}
                                    <span title={item.품명} className="truncate max-w-[180px]">{item.품명}</span>
                                </div>
                                <div className="flex flex-col items-end shrink-0 pl-2">
                                    {item.isDummy && item.단가 === 0 ? (
                                        <div className="flex items-center justify-end">
                                            <span className="text-gray-400 font-bold text-[10px] mr-1">₩</span>
                                            <input 
                                                type="number" 
                                                className="w-16 bg-white border border-red-300 rounded px-1 py-0.5 text-right text-red-600 font-black focus:outline-none focus:ring-1 focus:ring-red-500 text-[12px] shadow-inner placeholder-red-300" 
                                                placeholder="0"
                                                onKeyDown={(e) => {
                                                    if(e.key === 'Enter') {
                                                        const val = Number(e.target.value);
                                                        if(val > 0) onPriceMatch(item.batchKey, item.코드, val);
                                                        e.target.blur();
                                                    }
                                                }}
                                                onBlur={(e) => {
                                                    const val = Number(e.target.value);
                                                    if(val > 0) onPriceMatch(item.batchKey, item.코드, val);
                                                }}
                                                onClick={(e) => e.stopPropagation()}
                                            />
                                        </div>
                                    ) : (
                                        <div className={`font-black text-[13px] ${item.단가 === 0 ? 'text-red-500' : 'text-indigo-700'}`}>
                                            ₩{formatMoney(item.단가)}
                                        </div>
                                    )}
                                    {item.isDummy && priceOptions && priceOptions.length > 0 && (
                                        <div className="mt-1.5 flex flex-col gap-1 w-full min-w-[110px]">
                                            {priceOptions.map(opt => (
                                                <button key={opt.price} onClick={() => onPriceMatch(item.batchKey, item.코드, opt.price)} 
                                                    className={`w-full px-2 py-1 rounded text-[10px] font-bold border transition flex justify-between items-center ${item.단가 === opt.price ? 'bg-indigo-600 text-white border-indigo-700 shadow-inner' : 'bg-white text-indigo-700 border-indigo-200 hover:bg-indigo-50 shadow-sm'}`}>
                                                    <span>₩{formatMoney(opt.price)}</span>
                                                    <span className={`text-[9px] font-medium ml-2 ${item.단가 === opt.price ? 'text-indigo-200' : 'text-gray-500'}`}>잔여 {formatMoney(opt.remainQty)}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex justify-between items-start mt-0.5">
                                <div className="text-[10px] text-gray-500 truncate flex-1 pr-1">
                                    {item.일자 || '미상'} <span className="mx-1 opacity-50">|</span> {item.거래처 || '미지정'}
                                </div>
                                {item.대체입고 > 0 && <div className="text-[9px] text-blue-500 font-bold whitespace-nowrap">(조정됨)</div>}
                            </div>
                        </div>
                    </td>
                    
                    <td className={`py-2 px-2 text-right bg-gray-50 bg-opacity-50 border-r border-gray-100`}>
                        <input id={`base-prev-${idx}`} type="number" className={`base-input font-bold ${item.기초 < 0 ? 'text-red-600' : 'text-gray-700'}`} value={item.기초 === 0 ? '' : item.기초} onChange={e => onBaseDataChange(item.batchKey, '기초', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <input 
                            id={`base-in-${idx}`} 
                            type="number" 
                            className={`base-input font-bold ${totalIn > 0 ? 'text-emerald-700' : 'text-gray-400'}`} 
                            value={totalIn === 0 ? '' : totalIn} 
                            onChange={e => {
                                const val = e.target.value === '' ? 0 : Number(e.target.value);
                                onBaseDataChange(item.batchKey, '입고', val - addedIn);
                            }} 
                            onFocus={e => e.target.select()} 
                            onKeyDown={(e) => handleKd(e, 'base-in')} 
                            onWheel={e => e.target.blur()} 
                            placeholder="0" 
                        />
                    </td>
                    
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <input 
                            id={`base-out-${idx}`} 
                            type="number" 
                            className={`base-input font-black ${totalOut > 0 ? 'text-red-600' : 'text-gray-400'}`} 
                            value={totalOut === 0 ? '' : totalOut} 
                            onChange={e => {
                                const val = e.target.value === '' ? 0 : Number(e.target.value);
                                onBaseDataChange(item.batchKey, '출고', val - addedOut);
                            }} 
                            onFocus={e => e.target.select()} 
                            onKeyDown={(e) => handleKd(e, 'base-out')} 
                            onWheel={e => e.target.blur()} 
                            placeholder="0" 
                        />
                    </td>

                    <td className={`py-2 px-2 text-right border-r border-gray-100 ${isLinked ? 'bg-purple-200' : ''} relative`}>
                        {isLinked && (
                            <div className="absolute -top-6 right-0 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md whitespace-nowrap animate-bounce">
                                조정 대상
                            </div>
                        )}
                        <input 
                            id={`actual-input-${idx}`}
                            type="number" 
                            value={item.실사 === null || item.실사 === undefined ? '' : item.실사} 
                            onChange={(e) => onStockChange(item.batchKey, e.target.value)}
                            onClick={() => onFocusInput(item.batchKey, idx)}
                            onFocus={(e) => { e.target.select(); onFocusInput(item.batchKey, idx); }}
                            onKeyDown={(e) => handleKd(e, 'actual-input')}
                            onWheel={e => e.target.blur()}
                            placeholder={item.전산잔량}
                            className={`w-full text-right border ${isLinked ? 'border-indigo-500 ring-2 ring-indigo-200 bg-white text-indigo-900' : 'border-purple-300 text-purple-700 bg-white hover:bg-gray-50'} ${isNegativeActual ? 'bg-red-100 border-red-400 text-red-700 font-black' : 'font-bold'} rounded px-1.5 py-1 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner transition-colors cursor-pointer`}
                        />
                    </td>
                    
                    <td className="py-2 px-2 text-right border-r border-gray-100">
                        {item.로스 !== 0 && (
                            <div className="flex flex-col items-end justify-center mb-0.5">
                                <span className={`text-[12px] font-black ${item.로스 < 0 ? 'text-red-600' : 'text-blue-600'}`}>
                                    {item.로스 > 0 ? '+' : ''}{formatMoney(item.로스)}
                                </span>
                            </div>
                        )}
                        {item.로스 === 0 && <span className="text-gray-300 font-black">-</span>}
                    </td>

                    <td className="py-2 px-2 text-center border-r border-gray-100">
                        {item.출고 > 0 ? (
                            <button 
                                onClick={(e) => { e.stopPropagation(); onGoToSales(item.코드); }}
                                className="bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 hover:border-indigo-400 px-2 py-1 rounded text-[10px] font-bold transition-colors shadow-sm w-full"
                                title="이 품목이 팔린 거래처 내역 확인"
                            >
                                <i className="fas fa-search opacity-70"></i> 판매내역
                            </button>
                        ) : <span className="text-gray-300">-</span>}
                    </td>
                    
                    <td className="py-2 px-3 text-left w-full min-w-[200px]">
                        <div className="flex justify-between items-center w-full">
                            <div className="flex items-center gap-1 flex-wrap text-left flex-1">
                                {hasIssue && displayIssues.map((msg, i) => <span key={i} className={`px-2 py-1 rounded font-bold text-[10px] whitespace-nowrap ${msg.includes('원가수정') ? 'bg-purple-100 text-purple-700 border border-purple-200' : 'bg-red-100 text-red-700'}`}>{msg}</span>)}
                                {!hasIssue && <span className="text-gray-300">-</span>}
                            </div>
                            <div className="flex items-center gap-1.5 text-right shrink-0 ml-2">
                                {item.메모 && <span className="px-2 py-1 bg-yellow-100 text-yellow-800 border border-yellow-300 rounded font-bold text-[10px] whitespace-nowrap" title={item.메모}>{item.메모}</span>}
                                <button onClick={() => onOpenMemo(item.batchKey, item.메모 || '')} className="text-gray-400 hover:text-indigo-500 transition-colors ml-1" title="메모 추가/수정"><i className="fas fa-edit"></i></button>
                            </div>
                        </div>
                    </td>
                </tr>
            );
        }, (prevProps, nextProps) => {
            return prevProps.item === nextProps.item && prevProps.isLinked === nextProps.isLinked && prevProps.idx === nextProps.idx && prevProps.priceOptions === nextProps.priceOptions;
        });

        const InteractiveVendorRow = React.memo(({ item, priceOptions, onPriceChange }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            let displayIssues = item.이슈 ? item.이슈.split(',').map(s => s.trim()) : [];
            if (displayIssues.some(msg => msg.includes('🔄'))) { displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음')); }
            const issueStr = displayIssues.join(', ');
            const unitCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;

            if (item.isSummary) return null;

            return (
                <tr className={`transition border-b border-gray-100 ${item.isManualPrice ? 'bg-purple-50' : 'hover:bg-gray-50'}`}>
                    <td className="py-3 px-4 font-bold text-emerald-800 border-r border-gray-100 truncate max-w-[150px]">
                        {item.거래처}
                    </td>
                    <td className="py-3 px-4 border-r border-gray-100 min-w-[200px]">
                        <div className="flex items-center">
                            <div className="font-bold text-gray-800 text-[13px]">{item.품명}</div>
                            {item.isManualPrice && <span className="ml-2 bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded text-[9px] font-bold border border-purple-200">수동 지정됨</span>}
                        </div>
                        {priceOptions && priceOptions.length > 0 && (
                            <div className="mt-1.5 flex flex-wrap items-center gap-1.5">
                                <span className="text-[10px] text-gray-400 font-bold mr-1"><i className="fas fa-hand-pointer"></i> 단가 매치:</span>
                                {priceOptions.map((opt, i) => {
                                    const isActive = Math.abs(unitCogs - opt.price) < 1;
                                    return (
                                        <button key={i} onClick={() => onPriceChange(item.거래처, item.코드, opt.price)} 
                                            className={`px-2.5 py-1 rounded text-[10px] font-bold transition-all shadow-sm flex items-center gap-1 ${isActive ? 'bg-indigo-500 text-white border-indigo-600 ring-2 ring-indigo-200 scale-105' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-100 border'}`}>
                                            <span>₩{formatMoney(opt.price)}</span>
                                            <span className={`${isActive ? 'text-indigo-200' : 'text-gray-400 font-normal'} text-[9px]`}>잔여 {formatMoney(opt.remainQty)}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </td>
                    <td className={`py-3 px-4 text-right font-black border-r border-gray-100 ${item.판매수량 > 0 ? 'text-red-600' : 'text-gray-400 font-bold'}`}>{item.판매수량 > 0 ? formatMoney(item.판매수량) : '0'}</td>
                    <td className="py-3 px-4 text-right text-gray-500 font-bold border-r border-gray-100 bg-gray-50 bg-opacity-30">₩{formatMoney(unitCogs)}</td>
                    <td className="py-3 px-4 text-right font-bold border-r border-gray-100">₩{formatMoney(item.판매액)}</td>
                    <td className="py-3 px-4 text-right text-gray-700 bg-gray-50 bg-opacity-50 border-r border-gray-100">₩{formatMoney(item.매출원가)}</td>
                    <td className={`py-3 px-4 text-right font-black bg-indigo-50 bg-opacity-50 border-r border-gray-100 ${item.이익 < 0 ? 'text-red-600' : 'text-indigo-700'}`}>₩{formatMoney(item.이익)}</td>
                    <td className="py-3 px-4 text-left text-[11px]">
                        {issueStr ? <span className="px-2 py-1 bg-red-100 text-red-700 rounded font-bold inline-block">{issueStr}</span> : <span className="text-gray-300">-</span>}
                    </td>
                </tr>
            );
        }, (prev, next) => prev.item === next.item && prev.priceOptions === next.priceOptions);

        const VendorProfitRow = React.memo(({ item }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            let displayIssues = item.이슈 ? item.이슈.split(',').map(s => s.trim()) : [];
            if (displayIssues.some(msg => msg.includes('🔄'))) { displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음')); }
            const issueStr = displayIssues.join(', ');
            const unitCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;

            if (item.isSummary) return null; 
            
            return (
                <tr className="transition border-b border-gray-100 hover:bg-gray-50">
                    <td className="py-3 px-4 font-bold text-emerald-800 border-r border-gray-100 truncate max-w-[150px]">{item.거래처}</td>
                    <td className="py-3 px-4 border-r border-gray-100 min-w-[200px] font-bold text-gray-800 text-[13px]">{item.품명}</td>
                    <td className={`py-3 px-4 text-right font-black border-r border-gray-100 ${item.판매수량 > 0 ? 'text-red-600' : 'text-gray-400 font-bold'}`}>{item.판매수량 > 0 ? formatMoney(item.판매수량) : '0'}</td>
                    <td className="py-3 px-4 text-right text-gray-500 font-bold border-r border-gray-100 bg-gray-50 bg-opacity-30">₩{formatMoney(unitCogs)}</td>

                </tr>

        const ProductProfitRow = React.memo(({ item }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            const avgCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;

            return (
                <tr className="hover:bg-gray-50 transition border-b border-gray-100">

                    <td className="py-3 px-4 text-right font-black text-red-600 border-r">{formatMoney(item.판매수량)}</td>
                    <td className="py-3 px-4 text-right text-gray-500 border-r">₩{formatMoney(avgCogs)}</td>
                    <td className="py-3 px-4 text-right text-indigo-500 border-r">₩{formatMoney(avgRev)}</td>
                    <td className="py-3 px-4 text-right font-bold border-r">₩{formatMoney(item.판매액)}</td>
                    <td className="py-3 px-4 text-right text-gray-600 bg-gray-50 border-r">₩{formatMoney(item.매출원가)}</td>
                    <td className={`py-3 px-4 text-right font-black bg-indigo-50 border-r ${item.이익 < 0 ? 'text-red-600' : 'text-indigo-700'}`}>₩{formatMoney(item.이익)}</td>
                    <td className={`py-3 px-4 text-right font-bold ${marginRate < 0 ? 'text-red-600' : 'text-blue-600'}`}>{marginRate}%</td>
                </tr>
            );
        });

        const FileBox = React.memo(({ title, type, icon, color, files, setFiles, autoAssignFiles }) => {
            const inputRef = useRef(null); 
            const [isDragging, setIsDragging] = useState(false);
            const handleBoxDrop = (e) => { 
                e.preventDefault(); e.stopPropagation(); setIsDragging(false); 
                const droppedFiles = Array.from(e.dataTransfer.files); 
                if (droppedFiles.length > 1) autoAssignFiles(droppedFiles); 
                else if (droppedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: droppedFiles[0] })); 
                
                if (document.activeElement) document.activeElement.blur();
                window.focus(); 
            };
            
            const handleOnChange = (e) => {
                const selectedFiles = Array.from(e.target.files); 
                if (selectedFiles.length > 1) autoAssignFiles(selectedFiles); 
                else if (selectedFiles.length === 1) setFiles(prev => ({ ...prev, [type]: selectedFiles[0] })); 
                e.target.value = ''; 
                
                e.target.blur();
                if (document.activeElement) document.activeElement.blur();
                window.focus();
            };

            return (
                <div className={`relative border-2 border-dashed rounded-xl p-4 text-center bg-white transition-all cursor-pointer flex flex-col items-center justify-center min-h-[120px] z-10 ${isDragging ? `border-${color}-500 bg-${color}-50 scale-105 shadow-md` : (files[type] ? `border-${color}-500 bg-${color}-50` : 'border-gray-300 hover:border-gray-400 hover:bg-gray-50')}`} onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} onDrop={handleBoxDrop} onClick={() => inputRef.current.click()}>
                    <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                    <i className={`fas ${icon} text-2xl mb-2 ${files[type] ? `text-${color}-600` : 'text-gray-400'}`}></i><div className="font-bold text-sm text-gray-700">{title}</div>
                    <div className="text-xs text-gray-500 mt-1 w-full px-2 break-all">{files[type] ? <span className={`text-${color}-700 font-semibold line-clamp-2`}>{files[type].name}</span> : '클릭 / 드래그'}</div>
                </div>
            );
        });

        function App() {
            const [appStep, setAppStep] = useState('upload'); 
            const [closingTab, setClosingTab] = useState('product');
            const [reportTab, setReportTab] = useState('product'); 

            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });
            const [rawJson, setRawJson] = useState({ prev: [], in: [], out: [], end: [] });
            
            // 🌟 V6.1.1: 카드형 필터를 위한 상태값 변경 (noTransaction 삭제, cardFilter 추가)
            const [filters, setFilters] = useState({ cardFilter: null, issuesOnly: false, excludeZeroActual: false, search: '' });
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [alertMsg, setAlertMsg] = useState('');
            const [showGuide, setShowGuide] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);
            const [showInsights, setShowInsights] = useState(false);

            const [insights, setInsights] = useState({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });

            const [undoUi, setUndoUi] = useState({ state: 'closed' });
            const [substHistory, setSubstHistory] = useState([]);
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const focusedInputRef = useRef({ key: null, idx: -1 });

            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [hasAutoSave, setHasAutoSave] = useState(false);

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('inventoryMappings');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        const targetVendors = ['3우리', '1전송', '우리농산'];
                        let currentVendor = parsed.vendor || '';
                        let currentExcludeVendor = parsed.excludeVendor || '';
                        let isUpdated = false;
                        
                        targetVendors.forEach(v => {
                            if (currentVendor.includes(v)) {
                                currentVendor = currentVendor.split(',').map(s => s.trim()).filter(s => s !== v).join(', ');
                                isUpdated = true;
                            }
                        });

                        targetVendors.forEach(v => {
                            if (!currentExcludeVendor.includes(v)) {
                                currentExcludeVendor += currentExcludeVendor ? `, ${v}` : v;
                                isUpdated = true;
                            }
                        });
                        
                        if (isUpdated) {
                            parsed.vendor = currentVendor;
                            parsed.excludeVendor = currentExcludeVendor;
                            localStorage.setItem('inventoryMappings', JSON.stringify(parsed));
                        }
                        return parsed;
                    } catch (e) {
                        return defaultMappings;
                    }
                }
                return defaultMappings;
            });

            const saveMappings = () => {
                localStorage.setItem('inventoryMappings', JSON.stringify(mappings));
                setShowSettings(false);
            };

            const [kpis, setKpis] = useState({ 
                revenue: 0, cogs: 0, totalInAmt: 0, profit: 0, profitRate: 0, opProfit: 0, opProfitRate: 0, cogsRate: 0, 
                endingStockAmt: 0, stockDiffQty: 0, stockDiffAmt: 0, lossQty: 0, lossAmt: 0 
            });
            const [productData, setProductData] = useState([]);
            const [vendorData, setVendorData] = useState([]);
            const [analysisPeriod, setAnalysisPeriod] = useState('전체 기간');

            const isAnalyzed = productData.length > 0 || vendorData.length > 0;

            // 🌟 V6.1.1: 마감 작업대 상단에 노출할 KPI & "마이너스 재고 오차" 조건 강화
            const closingStats = useMemo(() => {
                let missingPriceCount = 0;
                let lossCount = 0;
                let deadStockCount = 0;
                productData.forEach(p => {
                    if (p.isDummy && p.단가 === 0) missingPriceCount++;
                    // 전산잔량이나 실사가 마이너스면 무조건 에러(로스)로 카운트
                    if (p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0)) lossCount++;
                    if (p.무거래재고) deadStockCount++;
                });
                return { missingPriceCount, lossCount, deadStockCount, total: productData.length };
            }, [productData]);

            useEffect(() => {
                if (localStorage.getItem('insight_autosave')) {
                    setHasAutoSave(true);
                }
            }, []);

            useEffect(() => {
                if (isAnalyzed) {
                    const saveObj = {
                        productData, vendorData, substHistory, kpis, analysisPeriod, appStep, closingTab,
                        filesMeta: {
                            prev: files.prev?.name, in: files.in?.name, out: files.out?.name, end: files.end?.name
                        }
                    };
                    localStorage.setItem('insight_autosave', JSON.stringify(saveObj));
                    setHasAutoSave(true);
                }
            }, [productData, vendorData, substHistory, kpis, isAnalyzed, files, analysisPeriod, appStep, closingTab]);

            const handleLoadAutoSave = () => {
                const savedStr = localStorage.getItem('insight_autosave');
                if (savedStr) {
                    try {
                        const saved = JSON.parse(savedStr);
                        setProductData(saved.productData || []);
                        setVendorData(saved.vendorData || []);
                        setSubstHistory(saved.substHistory || []);
                        setKpis(saved.kpis || {});
                        setAnalysisPeriod(saved.analysisPeriod || '전체 기간');
                        if (saved.filesMeta) {
                            setFiles({
                                prev: saved.filesMeta.prev ? { name: saved.filesMeta.prev } : null,
                                in: saved.filesMeta.in ? { name: saved.filesMeta.in } : null,
                                out: saved.filesMeta.out ? { name: saved.filesMeta.out } : null,
                                end: saved.filesMeta.end ? { name: saved.filesMeta.end } : null,
                            });
                        }
                        setAppStep(saved.appStep || 'closing');
                        setClosingTab(saved.closingTab || 'product');
                        setAlertMsg("이전 작업 내역이 성공적으로 복구되었습니다.");
                    } catch(e) {
                        setAlertMsg("저장된 내역을 불러오는데 실패했습니다.");
                    }
                }
            };

            const handleFocusInput = useCallback((key, idx) => { 
                focusedInputRef.current = { key, idx }; 
            }, []);

            const handleGoToSales = useCallback((productCode) => {
                setClosingTab('vendor');
                setFilters(prev => ({ ...prev, search: productCode }));
            }, []);

            const handleReturnToProducts = useCallback(() => {
                const currentSearch = filters.search;
                setFilters(prev => ({ ...prev, search: '' }));
                setClosingTab('product');
                
                if (currentSearch) {
                    setTimeout(() => {
                        const rows = document.querySelectorAll('tr[data-code]');
                        let targetRow = null;
                        for (let i = 0; i < rows.length; i++) {
                            if (rows[i].getAttribute('data-code') === currentSearch) {
                                targetRow = rows[i];
                                break;
                            }
                        }
                        if (targetRow) {
                            targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetRow.classList.add('bg-yellow-100');
                            setTimeout(() => targetRow.classList.remove('bg-yellow-100'), 1500);
                            
                            const input = targetRow.querySelector('input[id^="actual-input-"]');
                            if (input) {
                                input.focus();
                                input.select();
                            }
                        }
                    }, 150);
                }
            }, [filters.search]);

            // 🌟 V6.2: 재고 오차 클릭 시 최상단 오차 품목으로 이동 및 포커스
            const handleLossCardClick = useCallback(() => {
                const targetItem = productData.find(p => p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0));
                
                if (targetItem) {
                    setFilters(prev => ({
                        ...prev, 
                        search: '', 
                        cardFilter: null, 
                        issuesOnly: false, 
                        excludeZeroActual: false,
                        noTransaction: false
                    }));
                    setClosingTab('product');
                    
                    setTimeout(() => {
                        const row = document.querySelector(`tr[data-batch="${targetItem.batchKey}"]`);
                        if (row) {
                            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            row.classList.add('bg-orange-100');
                            setTimeout(() => row.classList.remove('bg-orange-100'), 1500);
                            
                            const input = row.querySelector('input[id^="actual-input-"]');
                            if (input) {
                                input.focus();
                                input.select();
                            }
                        }
                    }, 150);
                } else {
                    setAlertMsg("현재 재고 오차가 있는 품목이 없습니다.");
                }
            }, [productData]);

            const handleVendorPriceChange = useCallback((vendorName, productCode, newPrice) => {
                setProductData(prevP => {
                    let newData = prevP.map(p => ({...p, 이슈: [...p.이슈]}));
                    const targetBatchIdx = newData.findIndex(p => p.코드 === productCode && Number(p.단가) === Number(newPrice));
                    
                    if (targetBatchIdx === -1) {
                        setAlertMsg("해당 단가를 가진 매입 이력이 존재하지 않아 원가를 매칭할 수 없습니다.");
                        return prevP;
                    }

                    const targetBatchKey = newData[targetBatchIdx].batchKey;

                    setVendorData(prevV => {
                        const newV = prevV.map(v => ({...v, matchHistory: v.matchHistory ? [...v.matchHistory] : []}));
                        const vIdx = newV.findIndex(v => v.거래처 === vendorName && v.코드 === productCode);
                        if (vIdx === -1) return prevV;

                        const vRow = newV[vIdx];

                        if (vRow.matchHistory && vRow.matchHistory.length > 0) {
                            vRow.matchHistory.forEach(match => {
                                const bIdx = newData.findIndex(p => p.batchKey === match.batchKey);
                                if (bIdx >= 0) {
                                    newData[bIdx].출고 -= match.qty;
                                    newData[bIdx].전산잔량 = newData[bIdx].기초 + newData[bIdx].입고 + newData[bIdx].대체입고 - newData[bIdx].출고 - newData[bIdx].대체출고;
                                    
                                    newData[bIdx].실사 = newData[bIdx].전산잔량;
                                    newData[bIdx].로스 = 0;
                                    newData[bIdx].이슈 = newData[bIdx].이슈.filter(msg => msg !== '실사 수기조정');
                                }
                            });
                        }

                        newData[targetBatchIdx].출고 += vRow.판매수량;
                        newData[targetBatchIdx].전산잔량 = newData[targetBatchIdx].기초 + newData[targetBatchIdx].입고 + newData[targetBatchIdx].대체입고 - newData[targetBatchIdx].출고 - newData[targetBatchIdx].대체출고;
                        
                        newData[targetBatchIdx].실사 = newData[targetBatchIdx].전산잔량;
                        newData[targetBatchIdx].로스 = 0;
                        newData[targetBatchIdx].이슈 = newData[targetBatchIdx].이슈.filter(msg => msg !== '실사 수기조정');
                        
                        if (!newData[targetBatchIdx].이슈.includes('원가수정(매칭)')) {
                            newData[targetBatchIdx].이슈.push('원가수정(매칭)');
                        }

                        const newCogs = vRow.판매수량 * newPrice;
                        const newProfit = vRow.판매액 - newCogs;
                        newV[vIdx] = { 
                            ...vRow, 
                            매출원가: newCogs, 
                            이익: newProfit, 
                            isManualPrice: true, 
                            matchHistory: [{ batchKey: targetBatchKey, qty: vRow.판매수량 }] 
                        };

                        return newV;
                    });

                    return newData;
                });
            }, []);

            const handleDummyBatchPriceMatch = useCallback((batchKey, productCode, newPrice) => {
                setProductData(prev => {
                    const newData = [...prev];
                    const idx = newData.findIndex(p => p.batchKey === batchKey);
                    if (idx === -1) return prev;
                    
                    const item = { ...newData[idx] };
                    item.단가 = newPrice;
                    item.매출원가 = item.출고 * newPrice;
                    if (!item.이슈.includes('원가수정(매칭)')) item.이슈.push('원가수정(매칭)');
                    item.이슈 = item.이슈.filter(msg => msg !== '매입내역 없음');
                    newData[idx] = item;
                    
                    return newData;
                });
                
                setVendorData(prev => {
                    return prev.map(v => {
                        if (v.코드 === productCode && v.matchHistory && v.matchHistory.length === 0) {
                            const newCogs = v.판매수량 * newPrice;
                            const newProfit = v.판매액 - newCogs;
                            let newIssues = v.이슈 ? v.이슈.replace('매입내역 없음', '').trim() : '';
                            if (newIssues.startsWith(',')) newIssues = newIssues.substring(1).trim();
                            if (newIssues.endsWith(',')) newIssues = newIssues.slice(0, -1).trim();
                            if (!newIssues) newIssues = '원가수정(매칭)';
                            else if (!newIssues.includes('원가수정(매칭)')) newIssues += ', 원가수정(매칭)';
                            
                            return { ...v, 매출원가: newCogs, 이익: newProfit, 이슈: newIssues };
                        }
                        return v;
                    });
                });
            }, []);

            const handleSaveMemo = useCallback((batchKey, text) => {
                setProductData(prev => prev.map(item => item.batchKey === batchKey ? { ...item, 메모: text } : item));
            }, []);

            const priceOptionsMap = useMemo(() => {
                const map = {};
                productData.forEach(p => {
                    if (!map[p.코드]) map[p.코드] = {};
                    if (p.단가 > 0 && !p.isDummy) { 
                        if (!map[p.코드][p.단가]) {
                            map[p.코드][p.단가] = { price: p.단가, inQty: 0, remainQty: 0 };
                        }
                        map[p.코드][p.단가].inQty += (p.입고 + p.대체입고);
                        map[p.코드][p.단가].remainQty += p.전산잔량;
                    }
                });
                const result = {};
                for (let code in map) {
                    result[code] = Object.values(map[code]).sort((a, b) => a.price - b.price);
                }
                return result;
            }, [productData]);

            const productProfitData = useMemo(() => {
                if (appStep !== 'report') return [];
                const map = {};
                vendorData.forEach(v => {
                    if (v.isSummary) return;
                    if (!map[v.코드]) {
                        map[v.코드] = { 코드: v.코드, 품명: v.품명, 판매수량: 0, 판매액: 0, 매출원가: 0, 이익: 0 };
                    }
                    map[v.코드].판매수량 += v.판매수량;
                    map[v.코드].판매액 += v.판매액;
                    map[v.코드].매출원가 += v.매출원가;
                    map[v.코드].이익 += v.이익;
                });
                return Object.values(map).sort((a, b) => b.이익 - a.이익);
            }, [vendorData, appStep]);

            const handleResetFiles = () => {
                setFiles({ prev: null, in: null, out: null, end: null });
                setRawJson({ prev: [], in: [], out: [], end: [] });
                setProductData([]);
                setVendorData([]);
                setKpis({ revenue: 0, cogs: 0, totalInAmt: 0, profit: 0, profitRate: 0, opProfit: 0, opProfitRate: 0, cogsRate: 0, endingStockAmt: 0, stockDiffQty: 0, stockDiffAmt: 0, lossQty: 0, lossAmt: 0 });
                setInsights({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });
                setAnalysisPeriod('전체 기간');
                setShowInsights(false);
                setSubstHistory([]);
                setUndoUi({ state: 'closed' });
                setLinkSourceKey(null);
                focusedInputRef.current = { key: null, idx: -1 };
                setFilters({ cardFilter: null, issuesOnly: false, excludeZeroActual: false, search: '' });
                setError('');
                setAppStep('upload');
                setClosingTab('product');
                document.querySelectorAll('input[type="file"]').forEach(input => input.value = '');
            };

            const extractDateFromName = (filename) => {
                if (!filename) return 0;
                const match8 = filename.match(/20\d{6}/); 
                if (match8) return parseInt(match8[0], 10);
                const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); 
                if (match6) return parseInt('20' + match6[1], 10);
                return 0;
            };

            const parseExcel = (file, currentMappings) => {
                return new Promise((resolve, reject) => {
                    if (!file) return resolve([]);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const processWorkbook = (wb) => {
                                const sheet = wb.Sheets[wb.SheetNames[0]];
                                const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                                let headerRowIdx = -1; let maxScore = 0;
                                const keywords = {
                                    code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                    name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                    qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                    price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                    vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                    spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                    date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                                };

                                for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                    const row = jsonAll[i] || [];
                                    let score = 0;
                                    const rowStr = row.join('').replace(/\s/g, '');
                                    if (!rowStr) continue;
                                    Object.values(keywords).forEach(kwList => {
                                        if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                    });
                                    if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                                }

                            };

                            let wb = XLSX.read(data, { type: 'array' });

                            if (maxScore < 2) {

                                } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                            }

                            if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                            const rawHeaders = jsonAll[headerRowIdx];
                            const uniqueHeaders = []; const headerCounts = {};
                            for (let j = 0; j < rawHeaders.length; j++) {
                                let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                                if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                                uniqueHeaders.push(h);

                            };

                                const row = jsonAll[i];

                                const rowObj = {};

                                const baseNameRaw = getValByKeywords(rowObj, keywords.name);

                                const specValRaw = getValByKeywords(rowObj, keywords.spec);

                                    메모: '',

                            }
                            resolve(parsedData);
                        } catch (err) { reject(err); }
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            const autoAssignFiles = (fileArray) => {

                });
            };

                    const sysQty = Number(item.전산잔량) || 0;
                    const diff = actualQty - sysQty;

                    lossQty += diff; lossAmt += diff * (item.단가 || 0); 

                    beginningStockQty += (item.기초 || 0); beginningStockAmt += (item.기초 || 0) * (item.단가 || 0);
                    endingStockQty += actualQty; endingStockAmt += actualQty * (item.단가 || 0);

                const cogsRate = revenue > 0 ? (cogs / revenue) * 100 : 0;

            const runAnalysis = async (demoFiles = null, demoJson = null) => {

                setShowInsights(false); setLinkSourceKey(null); focusedInputRef.current = { key: null, idx: -1 }; setSubstHistory([]); setUndoUi({ state: 'closed' });

                    else if (endDateNum) refYear = Math.floor(endDateNum / 10000);

                    const formatItemDate = (dateStr) => {
                        if (!dateStr) return 0;
                        const str = String(dateStr).trim();
                        if (/^\d{5}$/.test(str)) {
                            const serial = parseInt(str, 10);
                            if (serial > 30000 && serial < 80000) {
                                const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                                const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                                return parseInt(`${y}${m}${d}`, 10);
                            }
                        }
                        const parts = str.match(/\d+/g);
                        if (!parts) return 0;
                        if (parts.length >= 3) {
                            let y = parts[0]; if (y.length === 2) y = '20' + y;
                            let m = parts[1].padStart(2, '0'); let d = parts[2].padStart(2, '0');

                    const formatStrForPeriod = (num) => {

                        return s;
                    };

                    // 🌟 V6.1: 분석 대상 기간을 더 명확하게 (총 며칠인지 계산)
                    if (minD !== 99999999 && maxD !== 0) {

                    let pData = {}; let vData = []; const stockPool = {};

                    const isExcluded = (vendorName) => vendorName && excludeList.some(keyword => vendorName.toLowerCase().includes(keyword));

                    const addStock = (item, type) => {

                        const code = String(item.코드 || 'NO_CODE'); const price = parseNumber(item.단가); const date = String(item.일자 || '');
                        const batchKey = `${code}|${price}|${date}`;

                        if (!pData[batchKey]) {
                            pData[batchKey] = { 
                                batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 거래처: item.거래처,
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                매출액: 0, 매출원가: 0, 메모: '', 이슈: [], _orig: {기초:0, 입고:0, 출고:0}, isDummy: false

                        if (type === 'prev') pData[batchKey].기초 += item.수량;
                        if (type === 'in') pData[batchKey].입고 += item.수량;
                        
                        if (!stockPool[code]) stockPool[code] = { buckets: [] };
                        if (item.수량 !== 0) stockPool[code].buckets.push({ batchKey, 단가: price, 일자: date, 수량: item.수량 });
                    };

                    parsedPrev.forEach(item => addStock(item, 'prev'));
                    parsedIn.forEach(item => addStock(item, 'in'));

                    Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));

                    parsedOut.forEach(sale => {
                        if (isExcluded(sale.거래처)) return;
                        const code = String(sale.코드 || 'NO_CODE');
                        let qtyToDeduct = sale.수량; let totalMatchedCogs = 0; let issueMsg = null;
                        const pool = stockPool[code];
                        
                        let revenue = 0;
                        if (sale.단가 !== 0 && sale.수량 !== 0) revenue = sale.수량 * sale.단가;

                        let finalRevenue = revenue;
                        if (finalRevenue === 0 && sale._raw) {
                            const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                            for (let k of amtKeys) {
                                const matchedKey = Object.keys(sale._raw).find(rk => rk.replace(/\s/g, '').includes(k));
                                if (matchedKey && sale._raw[matchedKey] !== undefined && sale._raw[matchedKey] !== '') {
                                    finalRevenue = parseNumber(sale._raw[matchedKey]); break;
                                }
                            }
                        }
                        if (finalRevenue === 0 && sale.단가 !== 0 && sale.수량 === 0) finalRevenue = sale.단가;
                        
                        let matchedBatches = [];

                        if (!pool || pool.buckets.length === 0) {
                            const bKey = `${code}|0|미상`;
                            if (!pData[bKey]) pData[bKey] = { batchKey: bKey, 코드: code, 품명: sale.품명, 단가: 0, 일자: '', 거래처: sale.거래처, 기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 매출액: 0, 매출원가: 0, 메모: '', 이슈: ['매입내역 없음'], _orig:{기초:0,입고:0,출고:0}, isDummy: true };
                            pData[bKey].출고 += qtyToDeduct; pData[bKey].매출액 += finalRevenue; issueMsg = '매입내역 없음';
                            vData.push({ 거래처: sale.거래처, 코드: code, 품명: sale.품명, 판매수량: sale.수량, 판매액: finalRevenue, 매출원가: 0, 이익: finalRevenue, 이슈: issueMsg, matchHistory: [] });
                            return;

                        let remainingQty = qtyToDeduct;

                        if (remainingQty < 0) {
                            const lastBucket = pool.buckets[pool.buckets.length - 1];
                            const cogs = remainingQty * lastBucket.단가; totalMatchedCogs = cogs;
                            lastBucket.수량 -= remainingQty;

                            matchedBatches.push({ batchKey: lastBucket.batchKey, qty: remainingQty });

                                const take = Math.min(bucket.수량, remainingQty); const cogs = take * bucket.단가;
                                bucket.수량 -= take; remainingQty -= take; totalMatchedCogs += cogs;
                                const revShare = finalRevenue * (take / qtyToDeduct);
                                pData[bucket.batchKey].출고 += take; pData[bucket.batchKey].매출원가 += cogs; pData[bucket.batchKey].매출액 += revShare;
                                matchedBatches.push({ batchKey: bucket.batchKey, qty: take });
                            }
                            if (remainingQty > 0) {
                                const lastBucket = pool.buckets[pool.buckets.length - 1];
                                const cogs = remainingQty * lastBucket.단가; totalMatchedCogs += cogs;
                                const revShare = finalRevenue * (remainingQty / qtyToDeduct);
                                pData[lastBucket.batchKey].출고 += remainingQty; pData[lastBucket.batchKey].매출원가 += cogs; pData[lastBucket.batchKey].매출액 += revShare;

                                matchedBatches.push({ batchKey: lastBucket.batchKey, qty: remainingQty });

                    });

                    Object.values(pData).forEach(item => {

                        item.실사 = item.전산잔량; item.로스 = 0;

                    if (parsedEnd.length > 0) {

                        parsedEnd.forEach(item => {
                            const code = String(item.코드); actualDict[code] = (actualDict[code] || 0) + item.수량;
                            const hasSystemRecord = Object.values(pData).some(p => p.코드 === code);
                            if (!hasSystemRecord) {
                                const price = parseNumber(item.단가) || 0; const date = String(item.일자 || '실사등록'); const batchKey = `${code}|${price}|${date}`;
                                if (!pData[batchKey]) pData[batchKey] = { batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 거래처: item.거래처, 기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 매출액: 0, 매출원가: 0, 메모: '', 이슈: ['전산기록 없음 (실사로 추가됨)'], _orig:{기초:0,입고:0,출고:0} };

                    Object.values(pData).forEach(item => {

                        if (codeA !== codeB) return codeA.localeCompare(codeB);
                        const dateA = String(a.일자 || ''); const dateB = String(b.일자 || '');
                        if (dateA !== dateB) return dateA.localeCompare(dateB);
                        return (a.단가 || 0) - (b.단가 || 0);

                    setProductData(finalProductData);
                    
                    const vGrouped = {};

                        if (!vGrouped[key]) {

                        const vendorA = String(a.거래처 || ''); const vendorB = String(b.거래처 || '');
                        if (vendorA < vendorB) return -1; if (vendorA > vendorB) return 1;
                        const codeA = String(a.코드 || ''); const codeB = String(b.코드 || '');
                        if (codeA < codeB) return -1; if (codeA > codeB) return 1;

                    const targetItemOrig = { ...prev[realIdx2], 이슈: [...prev[realIdx2].이슈] };

                    let sourceItem = { ...sourceItemOrig };
                    let targetItem = { ...targetItemOrig };

                    if (sourceItem.로스 < 0 && targetItem.로스 > 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 > 0) {
                        let temp = sourceItem; sourceItem = targetItem; targetItem = temp;
                    }
                    else if (sourceItem.로스 < 0 && targetItem.로스 === 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 === 0) {
                        let temp = sourceItem; sourceItem = targetItem; targetItem = temp;
                    }
                    else {
                        setAlertMsg(`재고조정 실패!\n\n두 상품을 매칭하려면 먼저 실사 수량을 변경하여 오차(로스)를 만들어주세요.\n• 원물(차감 대상): 마이너스(-) 로스 발생\n• 소분(증가 대상): 플러스(+) 로스 발생`);
                        return prev;
                    }

                    const sQty = Math.abs(sourceItem.로스);
                    const tQty = Math.abs(targetItem.로스);
                    if (tQty === 0) {
                        setAlertMsg("대체되는 상품(소분품)의 실사 수량이 입력되지 않아 조정 비율을 알 수 없습니다.\n수량을 입력해주세요.");
                        return prev;
                    }

                    const transferredCost = sQty * sourceItem.단가;
                    const unitCost = transferredCost / tQty;        

                    const targetVendorPrevStates = vendorData.filter(v => v.코드 === targetItem.코드).map(v => ({...v}));

                    sourceItem.대체출고 += sQty;
                    sourceItem.전산잔량 = sourceItem.기초 + sourceItem.입고 + sourceItem.대체입고 - sourceItem.출고 - sourceItem.대체출고;

                    sourceItem.로스 = sourceItem.실사 - sourceItem.전산잔량;
                    sourceItem.이슈.push(`🔄 -> ${targetItem.품명}`);
                    sourceItem.무거래재고 = (sourceItem.기초 > 0 || sourceItem.입고 > 0) && sourceItem.출고 === 0 && sourceItem.실사 > 0;

                    targetItem.대체입고 += tQty;

                    targetItem.실사 = targetItem.실사 === null || targetItem.실사 === '' ? targetItem.전산잔량 : targetItem.실사;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;
                    targetItem.단가 = unitCost; 
                    targetItem.매출원가 = targetItem.출고 * unitCost; 
                    targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족'));

                    newData[prev.findIndex(d => d.batchKey === targetItem.batchKey)] = targetItem;
                    return newData;

                                                </button>
                                                <button onClick={() => setReportTab('vendor')} className={`px-5 py-2 text-xs font-bold rounded-md transition ${reportTab === 'vendor' ? 'bg-emerald-50 text-emerald-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                                    <i className="fas fa-store mr-1.5"></i>거래처별 이익 현황
                                                </button>
                                            </div>
                                            
                                            <div className="flex gap-1.5 items-center justify-end">
                                                <button onClick={handleReportDownload} className="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-bold shadow-sm transition flex items-center shrink-0">
                                                    <i className="fas fa-file-invoice mr-1.5"></i>경영진 요약 보고서 (F7)
                                                </button>
                                                <button onClick={handleSaveAndDownload} className="px-3 py-2 bg-gray-800 hover:bg-gray-900 text-white rounded-lg text-xs font-bold shadow-sm transition flex items-center shrink-0">
                                                    <i className="fas fa-file-excel mr-1.5"></i>현재 화면 엑셀저장 (F8)
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 하단 스크롤 테이블 (중앙 정렬 유지) */}
                                <div className="flex-1 overflow-y-auto relative bg-white border-t border-gray-200 shadow-inner w-full flex justify-center p-4 md:p-6">
                                    <div className="max-w-7xl w-full flex flex-col relative pb-4 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                        <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                                            <thead className="bg-gray-50 text-gray-600 font-bold text-[12px] sticky top-0 z-20 border-b border-gray-200">
                                                {reportTab === 'product' ? (
                                                    <tr>
                                                        <th className="py-3 px-4 border-r w-auto">품명(규격)</th>
                                                        <th className="py-3 px-4 text-right border-r w-[100px]">총 판매수량</th>
                                                        <th className="py-3 px-4 text-right border-r w-[120px]">평균 매입단가(원가)</th>
                                                        <th className="py-3 px-4 text-right border-r w-[120px]">평균 판매단가</th>
                                                        <th className="py-3 px-4 text-right border-r w-[130px]">총 판매액</th>
                                                        <th className="py-3 px-4 text-right border-r w-[130px]">총 매출원가</th>
                                                        <th className="py-3 px-4 text-right text-indigo-700 border-r w-[130px]">품목 총이익</th>
                                                        <th className="py-3 px-4 text-right w-[100px]">마진율(%)</th>
                                                    </tr>
                                                ) : (
                                                    <tr>
                                                        <th className="py-3 px-4 border-r w-[150px]">거래처명</th>
                                                        <th className="py-3 px-4 border-r w-auto">품명(규격)</th>
                                                        <th className="py-3 px-4 text-right border-r w-[100px]">판매수량</th>
                                                        <th className="py-3 px-4 text-right border-r w-[120px]">적용원가(단가)</th>
                                                        <th className="py-3 px-4 text-right border-r w-[130px]">판매액</th>
                                                        <th className="py-3 px-4 text-right border-r w-[130px]">매출원가</th>
                                                        <th className="py-3 px-4 text-right text-indigo-700 border-r w-[130px]">건별 이익</th>
                                                        <th className="py-3 px-4 text-right border-r w-[100px]">마진율(%)</th>
                                                        <th className="py-3 px-4 text-left w-[150px]">이슈/비고</th>
                                                    </tr>
                                                )}
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {reportTab === 'product' ? (
                                                    productProfitData.length === 0 ? (
                                                        <tr><td colSpan="8" className="p-8 text-center text-gray-400 font-medium">표시할 데이터가 없습니다.</td></tr>
                                                    ) : (
                                                        productProfitData.map((item, idx) => <ProductProfitRow key={item.코드} item={item} />)
                                                    )
                                                ) : (
                                                    filteredVendorData.length === 0 ? (
                                                        <tr><td colSpan="9" className="p-8 text-center text-gray-400 font-medium">표시할 데이터가 없습니다.</td></tr>
                                                    ) : (
                                                        filteredVendorData.map((item, idx) => <VendorProfitRow key={`${item.거래처}-${item.코드}-${idx}`} item={item} />)
                                                    )
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 실행 취소 전체 히스토리 리스트 모달 */}
                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-gray-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce">
                                <div className="bg-gray-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-yellow-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-gray-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-gray-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-gray-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden">
                                            <thead className="bg-gray-100 text-gray-600">
                                                <tr>
                                                    <th className="p-3 font-bold border-b">원물 (차감 내역)</th>
                                                    <th className="p-3 font-bold border-b">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-bold border-b">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-blue-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-red-500 font-black">-{h.sQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-500 font-black">+{h.tQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-100 hover:text-red-600 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-gray-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-red-600 font-bold hover:text-red-800 hover:bg-red-50 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-gray-800 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-gray-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGuide && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-gray-900 bg-opacity-60 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col animate-[fadeIn_0.3s_ease-out]">
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 flex justify-between items-center text-white shrink-0 shadow-md">
                                    <h2 className="text-xl md:text-2xl font-black flex items-center"><i className="fas fa-book-reader mr-3 text-3xl"></i>유통사 정밀 경영 결산 가이드</h2>
                                    <button onClick={() => setShowGuide(false)} className="text-white hover:text-indigo-200 transition-colors"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 md:p-8 overflow-y-auto bg-gray-50 text-gray-800 space-y-6">
                                    <section className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h3 className="text-lg md:text-xl font-black text-orange-500 mb-4 border-b-2 border-orange-100 pb-2 flex items-center"><i className="fas fa-bolt mr-2"></i> V6.1: 워크플로우 유연화</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                            <div className="bg-white p-4 rounded-lg border-2 border-orange-100 hover:border-orange-300 transition-colors">
                                                <div className="text-orange-500 mb-2"><i className="fas fa-forward text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">패스트 트랙 (바로 결산)</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed mb-2">
                                                    데이터에 단가 누락이나 오차가 없으면 <strong>시스템이 자동으로 판단하여 마감 단계를 건너뛰고 결산 리포트로 직행</strong>합니다. 에러가 있어도 언제든 '무시하고 결산보기'가 가능합니다.
                                                </p>
                                            </div>
                                            <div className="bg-white p-4 rounded-lg border-2 border-orange-100 hover:border-orange-300 transition-colors">
                                                <div className="text-orange-500 mb-2"><i className="fas fa-tasks text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">마감 진척도 KPI 시각화</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed">수불부 마감 작업대 상단에 <strong>해결해야 할 '단가 누락' 및 '재고 오차' 건수를 직관적으로 표시</strong>하여 작업의 목표를 뚜렷하게 만들어줍니다.</p>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                                <div className="bg-gray-100 p-5 border-t border-gray-200 flex justify-end shrink-0">
                                    <button onClick={() => setShowGuide(false)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all transform hover:-translate-y-0.5">확인했습니다</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
