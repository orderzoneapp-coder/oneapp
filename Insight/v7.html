<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>oneapp Insight - 유통사 통합관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .base-input { width: 100%; background: transparent; border-bottom: 1px dashed transparent; text-align: right; transition: all 0.2s; cursor: pointer; padding: 2px 0; }
        .base-input:hover { background: #f1f5f9; border-bottom-color: #cbd5e1; }
        .base-input:focus { outline: none; background: white; border-bottom-color: #6366f1; cursor: text; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .drag-over { background-color: #eff6ff !important; outline: 2px dashed #3b82f6 !important; outline-offset: -2px; transform: scale(1.005); z-index: 20; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim();
            let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) {
                isNegative = true;
                strVal = strVal.slice(1, -1);
            } else if (strVal.startsWith('-')) {
                isNegative = true;
                strVal = strVal.slice(1);
            }
            const cleaned = strVal.replace(/,/g, '').replace(/[^\d.]/g, '');
            let num = Number(cleaned);
            if (isNegative) num = -num;
            return isNaN(num) ? 0 : num;
        };

        const formatMoney = (num) => {
            const n = Number(num);
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const formatQty = (num) => {
            const n = Number(num);
            if (isNaN(n)) return '0';
            return n % 1 !== 0 ? n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 2 }) : n.toLocaleString();
        };

        const formatAbsNumber = (num) => {
            const n = Math.abs(Number(num));
            return isNaN(n) ? '0' : Math.round(n).toLocaleString();
        };

        const formatStrForPeriod = (num) => {
            if (!num) return '';
            const s = String(num);
            if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
            return s;
        };

        const extractDateFromName = (name) => {
            if(!name) return 0;
            const match = name.match(/20\d{6}|\d{6}/);
            if(match) {
                let str = match[0];
                if(str.length === 6) str = '20' + str;
                return parseInt(str, 10);
            }
            return 0;
        };

        const formatDateToInput = (num) => {
            if (!num) return '';
            const str = String(num);
            if (str.length === 8) return `${str.slice(0,4)}-${str.slice(4,6)}-${str.slice(6,8)}`;
            return '';
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            qty: '기말/실사, 수량, 재고, 기말실사(이월수량), 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 구매처, 판매처, 공급사, 판매, 청과, 3거래',
            excludeVendor: '창고이동, 가전표, 폐기, 샘플, 3우리, 1전송, 우리농산' 
        };

        const ProductRow = React.memo(({ item, idx, isLinked, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove, onAlert }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            const hasIssue = displayIssues.length > 0;
            
            const addedIn = item.대체입고 + (item.로스 > 0 ? item.로스 : 0);
            const addedOut = item.대체출고 + (item.로스 < 0 ? Math.abs(item.로스) : 0);
            
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            
            const actualQty = item.실사 === null || item.실사 === undefined ? '' : Number(item.실사);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const handleKd = (e, type) => {
                const cols = ['base-prev', 'base-in', 'base-out', 'actual-input'];
                const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') {
                    if (colIdx < cols.length - 1) { e.preventDefault(); const n = document.getElementById(`${cols[colIdx+1]}-${idx}`); if(n) { n.focus(); n.select(); } }
                } else if (e.key === 'ArrowLeft') {
                    if (colIdx > 0) { e.preventDefault(); const p = document.getElementById(`${cols[colIdx-1]}-${idx}`); if(p) { p.focus(); p.select(); } }
                } else if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault(); const n = document.getElementById(`${type}-${idx+1}`); if(n) { n.focus(); n.select(); }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault(); const p = document.getElementById(`${type}-${idx-1}`); if(p) { p.focus(); p.select(); }
                } else if (e.key === ' ' || e.code === 'Space') {
                    if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); }
                }
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragOver(false); };
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragOver(false);
                try {
                    const dataStr = e.dataTransfer.getData('text/plain');
                    if (!dataStr) return;
                    const data = JSON.parse(dataStr);
                    if (data.code !== item.코드) { onAlert("동일한 품명 내에서만 출고 내역을 이동할 수 있습니다."); return; }
                    if (data.sourceKey !== item.batchKey) { onSalesMove(data.sourceKey, item.batchKey, data.vendor, data.qty, data.code); }
                } catch (err) {}
            };
            
            return (
                <tr 
                    data-code={item.코드} data-batch={item.batchKey} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
                    className={`transition duration-300 border-b border-gray-100 ${isLinked ? 'bg-indigo-50 ring-2 ring-indigo-400 shadow-md relative z-10 scale-[1.01]' : 'hover:bg-gray-50'} ${isDragOver ? 'drag-over' : ''} ${item.isDummy && item.단가 === 0 ? 'bg-red-50 bg-opacity-30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.05)] border-r-2 border-gray-200 ${item.isDummy && item.단가 === 0 ? 'bg-red-50 bg-opacity-80' : 'bg-white group-hover:bg-gray-50'} ${isLinked ? 'bg-indigo-50 border-l-4 border-indigo-500' : ''} ${isDragOver ? 'bg-blue-50' : ''}`}>
                        <div className="flex flex-col max-w-[280px]">
                            <div className="flex justify-between items-start mb-1">
                                <div className="font-bold text-gray-800 text-[13px] flex items-start gap-1">
                                    {isLinked && <i className="fas fa-link text-indigo-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    <div className="flex flex-col">
                                        <span title={item.품명} className="truncate max-w-[180px] leading-tight">{item.품명}</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-end shrink-0 pl-2">
                                    {item.isDummy && item.단가 === 0 ? (
                                        <div className="flex items-center justify-end">
                                            <span className="text-gray-400 font-bold text-[10px] mr-1">₩</span>
                                            <span className="text-red-500 font-bold text-[13px]">단가미상</span>
                                        </div>
                                    ) : (
                                        <div className={`font-black text-[13px] ${item.단가 === 0 ? 'text-red-500' : 'text-indigo-700'}`}>
                                            ₩{formatMoney(item.단가)}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex justify-between items-start mt-0.5">
                                <div className="text-[10px] text-gray-500 truncate flex-1 pr-1">
                                    {item.코드} {item.일자 ? formatStrForPeriod(item.일자) : '미상'} <span className="mx-1 opacity-50">|</span> {item.거래처 || '미지정'}
                                </div>
                                {item.대체입고 > 0 && <div className="text-[9px] text-blue-500 font-bold whitespace-nowrap">(조정됨)</div>}
                            </div>
                        </div>
                    </td>
                    <td className={`py-2 px-2 text-right bg-gray-50 bg-opacity-50 border-r border-gray-100`}>
                        <input id={`base-prev-${idx}`} type="number" className={`base-input font-bold ${item.기초 < 0 ? 'text-red-600' : 'text-gray-700'}`} value={item.기초 === 0 ? '' : item.기초} onChange={e => onBaseDataChange(item.batchKey, '기초', e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <input 
                            id={`base-in-${idx}`} type="number" className={`base-input font-bold ${totalIn > 0 ? 'text-emerald-700' : 'text-gray-400'}`} value={totalIn === 0 ? '' : totalIn} 
                            onChange={e => { const val = e.target.value === '' ? 0 : Number(e.target.value); onBaseDataChange(item.batchKey, '입고', val - addedIn); }} 
                            onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-in')} onWheel={e => e.target.blur()} placeholder="0" 
                        />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-gray-100`}>
                        <input 
                            id={`base-out-${idx}`} type="number" className={`base-input font-black ${totalOut > 0 ? 'text-red-600' : 'text-gray-400'}`} value={totalOut === 0 ? '' : totalOut} 
                            onChange={e => { const val = e.target.value === '' ? 0 : Number(e.target.value); onBaseDataChange(item.batchKey, '출고', val - addedOut); }} 
                            onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-out')} onWheel={e => e.target.blur()} placeholder="0" 
                        />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-gray-100 ${isLinked ? 'bg-purple-200' : ''} relative`}>
                        {isLinked && <div className="absolute -top-6 right-0 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md whitespace-nowrap animate-bounce">조정 대상</div>}
                        <input 
                            id={`actual-input-${idx}`} type="number" value={item.실사 === null || item.실사 === undefined ? '' : item.실사} 
                            onChange={(e) => onStockChange(item.batchKey, e.target.value)} onClick={() => onFocusInput(item.batchKey, idx)} onFocus={(e) => { e.target.select(); onFocusInput(item.batchKey, idx); }} onKeyDown={(e) => handleKd(e, 'actual-input')} onWheel={e => e.target.blur()} placeholder={item.전산잔량}
                            className={`w-full text-right border ${isLinked ? 'border-indigo-500 ring-2 ring-indigo-200 bg-white text-indigo-900' : 'border-purple-300 text-purple-700 bg-white hover:bg-gray-50'} ${isNegativeActual ? 'bg-red-100 border-red-400 text-red-700 font-black' : 'font-bold'} rounded px-1.5 py-1 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner transition-colors cursor-pointer`}
                        />
                    </td>
                    <td className="py-2 px-2 text-right border-r border-gray-100">
                        {item.로스 !== 0 && (
                            <div className="flex flex-col items-end justify-center mb-0.5">
                                <span className={`text-[12px] font-black ${item.로스 < 0 ? 'text-red-600' : 'text-blue-600'}`}>{item.로스 > 0 ? '+' : ''}{formatMoney(item.로스)}</span>
                            </div>
                        )}
                        {item.로스 === 0 && <span className="text-gray-300 font-black">-</span>}
                    </td>
                    <td className="py-2 px-3 text-left w-full min-w-[200px]">
                        <div className="flex justify-between items-start w-full">
                            <div className="flex flex-col gap-1.5 w-full flex-1 pr-2">
                                <div className="flex items-center gap-1 flex-wrap text-left">
                                    {hasIssue && displayIssues.map((msg, i) => <span key={i} className={`px-2 py-0.5 rounded font-bold text-[10px] whitespace-nowrap ${msg.includes('원가수정') ? 'bg-purple-100 text-purple-700 border border-purple-200' : 'bg-red-100 text-red-700'}`}>{msg}</span>)}
                                </div>
                                {item.출고내역 && Object.keys(item.출고내역).length > 0 && (
                                    <div className="mt-0.5 flex flex-wrap gap-1.5 items-center">
                                        {Object.entries(item.출고내역).map(([vendor, qty]) => (
                                            <div 
                                                key={vendor} draggable onDragStart={(e) => { e.stopPropagation(); e.dataTransfer.setData('text/plain', JSON.stringify({sourceKey: item.batchKey, vendor, qty, code: item.코드})); e.currentTarget.classList.add('opacity-40', 'scale-95'); }} onDragEnd={(e) => { e.currentTarget.classList.remove('opacity-40', 'scale-95'); }}
                                                className="flex items-center bg-white border border-indigo-200 text-indigo-700 px-2 py-0.5 rounded text-[10px] font-bold cursor-grab active:cursor-grabbing hover:bg-indigo-50 hover:border-indigo-400 shadow-sm transition-all hover:-translate-y-0.5" title={`${qty}개 출고 (드래그하여 다른 단가로 이동)`}
                                            >
                                                <span className="truncate max-w-[120px]">{vendor}({qty})</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="flex flex-col items-end gap-1.5 text-right shrink-0 ml-2">
                                <button onClick={() => onOpenMemo(item.batchKey, item.메모 || '')} className={`transition-colors ${item.메모 ? 'text-indigo-500 hover:text-indigo-700' : 'text-gray-300 hover:text-indigo-400'}`} title="메모 추가/수정"><i className="fas fa-edit text-base"></i></button>
                                {item.메모 && <span className="px-2 py-1 bg-yellow-100 text-yellow-800 border border-yellow-300 rounded font-bold text-[10px] whitespace-nowrap max-w-[100px] truncate" title={item.메모}>{item.메모}</span>}
                            </div>
                        </div>
                    </td>
                </tr>
            );
        }, (prevProps, nextProps) => {
            return prevProps.item === nextProps.item && prevProps.isLinked === nextProps.isLinked && prevProps.idx === nextProps.idx;
        });

        const VendorProfitRow = React.memo(({ item }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            let displayIssues = item.이슈 ? String(item.이슈).split(',').map(s => s.trim()) : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족') && msg !== '');
            const issueStr = displayIssues.join(', ');
            const unitCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;
            if (item.isSummary) return null; 
            return (
                <tr className="transition border-b border-gray-100 hover:bg-gray-50">
                    <td className="py-3 px-4 font-bold text-emerald-800 border-r border-gray-100 truncate max-w-[150px]">{item.거래처}</td>
                    <td className="py-3 px-4 border-r border-gray-100 min-w-[200px] font-bold text-gray-800 text-[13px]"><div className="flex flex-col"><span>{item.품명}</span><span className="text-[10px] text-gray-400 font-normal mt-0.5">{item.코드 !== '-' ? item.코드 : ''}</span></div></td>
                    <td className={`py-3 px-4 text-right font-black border-r border-gray-100 ${item.판매수량 > 0 ? 'text-red-600' : 'text-gray-400 font-bold'}`}>{item.판매수량 > 0 ? formatMoney(item.판매수량) : '0'}</td>
                    <td className="py-3 px-4 text-right text-gray-500 font-bold border-r border-gray-100 bg-gray-50 bg-opacity-30">₩{formatMoney(unitCogs)}</td>
                    <td className="py-3 px-4 text-right font-bold border-r border-gray-100">₩{formatMoney(item.판매액)}</td>
                    <td className="py-3 px-4 text-right text-gray-700 bg-gray-50 bg-opacity-50 border-r border-gray-100">₩{formatMoney(item.매출원가)}</td>
                    <td className={`py-3 px-4 text-right font-black bg-indigo-50 bg-opacity-50 border-r border-gray-100 ${item.이익 < 0 ? 'text-red-600' : 'text-indigo-700'}`}>₩{formatMoney(item.이익)}</td>
                    <td className={`py-3 px-4 text-right font-bold border-r border-gray-100 ${marginRate < 0 ? 'text-red-600' : 'text-blue-600'}`}>{marginRate}%</td>
                    <td className="py-3 px-4 text-left text-[11px]">{issueStr ? <span className="px-2 py-1 bg-gray-100 text-gray-600 rounded font-bold inline-block">{issueStr}</span> : null}</td>
                </tr>
            );
        });

        const ProductProfitRow = React.memo(({ item }) => {
            const marginRate = item.판매액 ? (((item.이익) / Math.abs(item.판매액)) * 100).toFixed(1) : 0;
            const avgCogs = item.판매수량 > 0 ? Math.round(item.매출원가 / item.판매수량) : 0;
            const avgRev = item.판매수량 > 0 ? Math.round(item.판매액 / item.판매수량) : 0;
            return (
                <tr className="hover:bg-gray-50 transition border-b border-gray-100">
                    <td className="py-3 px-4 font-bold text-gray-800 border-r"><div className="flex flex-col"><span>{item.품명}</span><span className="text-[10px] text-gray-400 font-normal mt-0.5">{item.코드}</span></div></td>
                    <td className="py-3 px-4 text-right font-black text-red-600 border-r">{formatMoney(item.판매수량)}</td>
                    <td className="py-3 px-4 text-right text-gray-500 border-r">₩{formatMoney(avgCogs)}</td>
                    <td className="py-3 px-4 text-right text-indigo-500 border-r">₩{formatMoney(avgRev)}</td>
                    <td className="py-3 px-4 text-right font-bold border-r">₩{formatMoney(item.판매액)}</td>
                    <td className="py-3 px-4 text-right text-gray-600 bg-gray-50 border-r">₩{formatMoney(item.매출원가)}</td>
                    <td className={`py-3 px-4 text-right font-black bg-indigo-50 border-r ${item.이익 < 0 ? 'text-red-600' : 'text-indigo-700'}`}>₩{formatMoney(item.이익)}</td>
                    <td className={`py-3 px-4 text-right font-bold ${marginRate < 0 ? 'text-red-600' : 'text-blue-600'}`}>{marginRate}%</td>
                </tr>
            );
        });

        const FileBox = React.memo(({ title, type, icon, color, files, setFiles, autoAssignFiles, onVerify, previewReady, onSingleFileAdded }) => {
            const inputRef = useRef(null); 
            const [isDragging, setIsDragging] = useState(false);
            const handleBoxDrop = (e) => { 
                e.preventDefault(); e.stopPropagation(); setIsDragging(false); 
                const droppedFiles = Array.from(e.dataTransfer.files); 
                if (droppedFiles.length > 1) {
                    autoAssignFiles(droppedFiles); 
                } else if (droppedFiles.length === 1) {
                    onSingleFileAdded(type);
                    setFiles(prev => ({ ...prev, [type]: droppedFiles[0] })); 
                }
                if (document.activeElement) document.activeElement.blur();
                window.focus(); 
            };
            const handleOnChange = (e) => {
                const selectedFiles = Array.from(e.target.files); 
                if (selectedFiles.length > 1) {
                    autoAssignFiles(selectedFiles); 
                } else if (selectedFiles.length === 1) {
                    onSingleFileAdded(type);
                    setFiles(prev => ({ ...prev, [type]: selectedFiles[0] })); 
                }
                e.target.value = ''; 
                e.target.blur();
                if (document.activeElement) document.activeElement.blur();
                window.focus();
            };

            return (
                <div className={`relative border-2 border-dashed rounded-xl p-4 text-center bg-white transition-all flex flex-col items-center justify-center min-h-[130px] z-10 ${isDragging ? `border-${color}-500 bg-${color}-50 scale-105 shadow-md` : (files[type] ? `border-${color}-500 bg-${color}-50` : 'border-gray-300 hover:border-gray-400 hover:bg-gray-50')}`} 
                     onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} 
                     onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} 
                     onDrop={handleBoxDrop} >
                    
                    <div className="w-full cursor-pointer flex flex-col items-center justify-center flex-1" onClick={() => inputRef.current.click()}>
                        <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                        <i className={`fas ${icon} text-2xl mb-2 ${files[type] ? `text-${color}-600` : 'text-gray-400'}`}></i>
                        <div className="font-bold text-sm text-gray-700">{title}</div>
                        <div className="text-xs text-gray-500 mt-1 w-full px-2 break-all h-8 flex items-center justify-center">
                            {files[type] ? <span className={`text-${color}-700 font-semibold line-clamp-2`}>{files[type].name}</span> : '클릭 / 드래그'}
                        </div>
                    </div>

                    {files[type] && !files[type].isDemo && previewReady && (
                        <button onClick={(e) => { e.stopPropagation(); onVerify(type); }} className={`mt-2 px-3 py-1.5 bg-white text-${color}-700 border border-${color}-300 hover:bg-${color}-100 rounded-md text-[11px] font-bold w-full transition-colors flex items-center justify-center shadow-sm`}>
                            <i className="fas fa-search-plus mr-1.5"></i> 데이터 검증/미리보기
                        </button>
                    )}
                    {files[type] && !files[type].isDemo && !previewReady && (
                        <div className={`mt-2 px-3 py-1.5 bg-gray-100 text-gray-500 rounded-md text-[11px] font-bold w-full text-center flex items-center justify-center`}>
                            <i className="fas fa-spinner fa-spin mr-1.5"></i> 분석 중...
                        </div>
                    )}
                </div>
            );
        });

        function App() {
            const [appStep, setAppStep] = useState('upload'); 
            const [closingTab, setClosingTab] = useState('product');
            const [reportTab, setReportTab] = useState('product'); 

            const [files, setFiles] = useState({ prev: null, in: null, out: null, end: null });
            const [filePreviews, setFilePreviews] = useState({ prev: null, in: null, out: null, end: null });
            const [previewModal, setPreviewModal] = useState({ isOpen: false, type: null });
            
            const [autoOpenPreviewType, setAutoOpenPreviewType] = useState(null);
            const prevProcessedFiles = useRef({ prev: null, in: null, out: null, end: null });

            const [rawJson, setRawJson] = useState({ prev: [], in: [], out: [], end: [] });
            const [filters, setFilters] = useState({ cardFilter: null, issuesOnly: false, excludeZeroActual: false, search: '' });
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [alertMsg, setAlertMsg] = useState('');
            const [showGuide, setShowGuide] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);

            const [insights, setInsights] = useState({ lowMargin: [], highLoss: [], deadStock: [], memos: [] });
            const [undoUi, setUndoUi] = useState({ state: 'closed' });
            const [substHistory, setSubstHistory] = useState([]);
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const focusedInputRef = useRef({ key: null, idx: -1 });

            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [hasAutoSave, setHasAutoSave] = useState(false);
            const [customDates, setCustomDates] = useState({ prev: '', end: '' });

            const [aggregateData, setAggregateData] = useState(null);

            const actionRefs = useRef({});

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('inventoryMappings');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        const targetVendors = ['3우리', '1전송', '우리농산'];
                        let currentVendor = parsed.vendor || '';
                        let currentExcludeVendor = parsed.excludeVendor || '';
                        let isUpdated = false;
                        
                        targetVendors.forEach(v => {
                            if (currentVendor.includes(v)) {
                                currentVendor = currentVendor.split(',').map(s => s.trim()).filter(s => s !== v).join(', ');
                                isUpdated = true;
                            }
                            if (!currentExcludeVendor.includes(v)) {
                                currentExcludeVendor += currentExcludeVendor ? `, ${v}` : v;
                                isUpdated = true;
                            }
                        });
                        
                        if (isUpdated) {
                            parsed.vendor = currentVendor;
                            parsed.excludeVendor = currentExcludeVendor;
                            localStorage.setItem('inventoryMappings', JSON.stringify(parsed));
                        }
                        return parsed;
                    } catch (e) {
                        return defaultMappings;
                    }
                }
                return defaultMappings;
            });

            const saveMappings = () => {
                localStorage.setItem('inventoryMappings', JSON.stringify(mappings));
                setShowSettings(false);
            };

            const [kpis, setKpis] = useState({ 
                revenue: 0, cogs: 0, totalInAmt: 0, profit: 0, profitRate: 0, opProfit: 0, opProfitRate: 0, cogsRate: 0, 
                endingStockAmt: 0, stockDiffQty: 0, stockDiffAmt: 0, lossQty: 0, lossAmt: 0 
            });
            const [productData, setProductData] = useState([]);
            const [vendorData, setVendorData] = useState([]);
            const [analysisPeriod, setAnalysisPeriod] = useState('전체 기간');

            const isAnalyzed = productData.length > 0 || vendorData.length > 0;

            const parseExcel = (file, currentMappings) => {
                return new Promise((resolve, reject) => {
                    if (!file) return resolve({ parsedData: [], rawHeaders: [], matchedHeaders: {} });
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const processWorkbook = (wb) => {
                                const sheet = wb.Sheets[wb.SheetNames[0]];
                                const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                                const firstRowsText = jsonAll.slice(0, 5).map(row => row.join(' ')).join(' ');
                                const dateRegex = /(20\d{2})[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])/g;
                                let match;
                                const docDates = [];
                                while ((match = dateRegex.exec(firstRowsText)) !== null) {
                                    docDates.push(parseInt(`${match[1]}${match[2]}${match[3]}`, 10));
                                }
                                docDates.sort((a, b) => a - b);
                                const docMinDate = docDates.length > 0 ? docDates[0] : 0;
                                const docMaxDate = docDates.length > 0 ? docDates[docDates.length - 1] : 0;
                                
                                const defaultYear = docMaxDate ? Math.floor(docMaxDate / 10000) : new Date().getFullYear();

                                let headerRowIdx = -1; let maxScore = 0;
                                const keywords = {
                                    code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                    name: currentMappings.name.split(',').map(s => s.trim().toLowerCase()),
                                    qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                    price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                    vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                    spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                    date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                                };

                                for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                    const row = jsonAll[i] || [];
                                    let score = 0;
                                    const rowStr = row.join('').replace(/\s/g, '');
                                    if (!rowStr) continue;
                                    Object.values(keywords).forEach(kwList => {
                                        if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++;
                                    });
                                    if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                                }
                                return { jsonAll, headerRowIdx, maxScore, keywords, docMinDate, docMaxDate, defaultYear };
                            };

                            let wb = XLSX.read(data, { type: 'array' });
                            let { jsonAll, headerRowIdx, maxScore, keywords, docMinDate, docMaxDate, defaultYear } = processWorkbook(wb);

                            if (maxScore < 2) {
                                try {
                                    const text = new TextDecoder('euc-kr').decode(data);
                                    const wb2 = XLSX.read(text, { type: 'string' });
                                    const res2 = processWorkbook(wb2);
                                    if (res2.maxScore > maxScore) { 
                                        jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; 
                                        keywords = res2.keywords; docMinDate = res2.docMinDate; docMaxDate = res2.docMaxDate; defaultYear = res2.defaultYear;
                                    }
                                } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                            }

                            if (headerRowIdx === -1 || maxScore < 2) return resolve({ parsedData: [], rawHeaders: [], matchedHeaders: {} }); 

                            const rawHeaders = jsonAll[headerRowIdx];
                            const uniqueHeaders = []; const headerCounts = {};
                            for (let j = 0; j < rawHeaders.length; j++) {
                                let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                                if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                                uniqueHeaders.push(h);
                            }

                            const matchedHeaders = { code: null, name: null, spec: null, qty: null, price: null, date: null, vendor: null };
                            Object.entries(keywords).forEach(([field, kwList]) => {
                                for (let kw of kwList) {
                                    if (!kw) continue;
                                    let match = uniqueHeaders.find(h => h && h.replace(/\s/g, '').toLowerCase() === kw);
                                    if (!match) match = uniqueHeaders.find(h => h && h.replace(/\s/g, '').toLowerCase().includes(kw));
                                    if (match) {
                                        matchedHeaders[field] = match;
                                        break;
                                    }
                                }
                            });

                            const parsedData = [];
                            const getValByKeywords = (obj, kwList) => {
                                const keys = Object.keys(obj);
                                for (let kw of kwList) {
                                    if(!kw) continue;
                                    let match = keys.find(k => k.replace(/\s/g, '').toLowerCase() === kw);
                                    if (!match) match = keys.find(k => k.replace(/\s/g, '').toLowerCase().includes(kw));
                                    if (match && obj[match] !== undefined && String(obj[match]).trim() !== '') return obj[match];
                                }
                                return null;
                            };

                            const normalizeDateToStr = (dStr) => {
                                if (!dStr) return '';
                                const s = String(dStr).trim();
                                if (/^\d{5}$/.test(s)) {
                                    const serial = parseInt(s, 10);
                                    if (serial > 30000 && serial < 80000) {
                                        const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                                        const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0');
                                        return `${y}${m}${d}`;
                                    }
                                }
                                const mFull = s.match(/(20\d{2})[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])/);
                                if (mFull) return `${mFull[1]}${mFull[2]}${mFull[3]}`;
                                
                                const mShort = s.match(/(0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])/);
                                if (mShort) return `${defaultYear}${mShort[1]}${mShort[2]}`;
                                
                                const cleaned = s.replace(/[^\d]/g, '');
                                if (cleaned.length === 8) return cleaned;
                                if (cleaned.length === 6) return `20${cleaned}`;
                                return s; 
                            };

                            for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                                const row = jsonAll[i];
                                if (!row || row.join('').trim() === '') continue;
                                
                                const rowObj = {};
                                uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                                
                                const codeRaw = String(getValByKeywords(rowObj, keywords.code) || 'NO_CODE').trim();
                                const baseNameRaw = getValByKeywords(rowObj, keywords.name);
                                const baseName = baseNameRaw !== null && baseNameRaw !== undefined ? String(baseNameRaw).trim() : '이름없음';
                                const vendorRaw = String(getValByKeywords(rowObj, keywords.vendor) || '미지정').trim();

                                let isSummaryRow = false;
                                const checkVals = [
                                    row[0], row[1], row[2], row[3], row[4], 
                                    codeRaw, baseName, vendorRaw
                                ];
                                
                                for (let val of checkVals) {
                                    if (val === null || val === undefined || val === '') continue;
                                    const cellStr = String(val).replace(/\s/g, '').replace(/[\[\]\(\)\-:]/g, '');
                                    
                                    if (['합계', '총계', '소계', '누계', '총합계', '전체합계', '총액', '합'].includes(cellStr)) {
                                        isSummaryRow = true; break;
                                    }
                                    if (cellStr.length > 1 && cellStr.length < 15) {
                                        if (cellStr.endsWith('합계') || cellStr.endsWith('소계') || cellStr.endsWith('총계') || cellStr.endsWith('누계')) {
                                            isSummaryRow = true; break;
                                        }
                                    }
                                }
                                
                                if (isSummaryRow) continue;

                                const specValRaw = getValByKeywords(rowObj, keywords.spec);
                                const specVal = specValRaw !== null && specValRaw !== undefined ? String(specValRaw).trim() : '';
                                
                                let fullName = baseName;
                                if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                                const normObj = {
                                    코드: codeRaw,
                                    품명: fullName,
                                    수량: parseNumber(getValByKeywords(rowObj, keywords.qty)),
                                    단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                    거래처: vendorRaw,
                                    일자: normalizeDateToStr(getValByKeywords(rowObj, keywords.date)),
                                    메모: '', 
                                    _raw: rowObj 
                                };
                                parsedData.push(normObj);
                            }
                            resolve({ parsedData, rawHeaders: uniqueHeaders, matchedHeaders, docMinDate, docMaxDate });
                        } catch (err) { reject(err); }
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            useEffect(() => {
                const loadPreview = async (file, type) => {
                    try {
                        const result = await parseExcel(file, mappings);
                        
                        let totalAmt = 0; let totalQty = 0; let missingPrice = 0; let negativeQty = 0;
                        let dataMin = 99999999; let dataMax = 0;
                        const excludedVendors = {};
                        const missingPriceItems = [];
                        const negativeQtyItems = [];

                        const excludeList = (mappings.excludeVendor || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s);
                        
                        const isExcluded = (vendorName) => {
                            if (type === 'prev' || type === 'end') return false;
                            return vendorName && excludeList.some(keyword => vendorName.toLowerCase().includes(keyword));
                        };

                        const filteredDataForPreview = [];

                        result.parsedData.forEach(row => {
                            if (isExcluded(row.거래처)) {
                                const vName = row.거래처 || '미지정';
                                excludedVendors[vName] = (excludedVendors[vName] || 0) + 1;
                                return;
                            }
                            filteredDataForPreview.push(row);
                            
                            const qty = Number(row.수량) || 0;
                            const price = Number(row.단가) || 0;
                            
                            totalQty += qty;
                            
                            let rowAmt = qty * price;
                            if (row._raw) {
                                const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                                for (let k of amtKeys) {
                                    const matchedKey = Object.keys(row._raw).find(rk => rk.replace(/\s/g, '').includes(k));
                                    if (matchedKey && row._raw[matchedKey] !== undefined && String(row._raw[matchedKey]).trim() !== '') {
                                        const parsedAmt = parseNumber(row._raw[matchedKey]);
                                        if (!isNaN(parsedAmt)) { 
                                            rowAmt = parsedAmt; 
                                            break; 
                                        }
                                    }
                                }
                            }
                            
                            totalAmt += rowAmt;
                            
                            let isWarn = false;
                            if (price === 0 && qty !== 0 && !row.isDummy) {
                                missingPrice++;
                                missingPriceItems.push(row);
                                isWarn = true;
                            }
                            if (qty < 0) {
                                negativeQty++;
                                if (!isWarn) negativeQtyItems.push(row);
                            }
                            
                            const dNum = parseInt(row.일자, 10);
                            if (dNum > 20000000) {
                                if (dNum < dataMin) dataMin = dNum;
                                if (dNum > dataMax) dataMax = dNum;
                            }
                        });
                        
                        result.summary = { 
                            totalAmt, totalQty, missingPrice, negativeQty,
                            dataMin: dataMin !== 99999999 ? dataMin : 0,
                            dataMax: dataMax !== 0 ? dataMax : 0,
                            docMinDate: result.docMinDate,
                            docMaxDate: result.docMaxDate,
                            excludedVendors,
                            missingPriceItems,
                            negativeQtyItems
                        };
                        
                        result.parsedData = filteredDataForPreview; 

                        if (type === 'prev' || type === 'end') {
                            setCustomDates(prev => {
                                if (!prev[type]) {
                                    const maxD = result.summary.docMaxDate || extractDateFromName(file.name) || result.summary.dataMax;
                                    return { ...prev, [type]: formatDateToInput(maxD) };
                                }
                                return prev;
                            });
                        }

                        setFilePreviews(prev => ({ ...prev, [type]: result }));
                        if (autoOpenPreviewType === type) {
                            setPreviewModal({ isOpen: true, type: type });
                            setAutoOpenPreviewType(null);
                        }
                    } catch (e) {
                        console.error(e);
                        setFilePreviews(prev => ({ ...prev, [type]: null }));
                        if (autoOpenPreviewType === type) setAutoOpenPreviewType(null);
                    }
                };

                ['prev', 'in', 'out', 'end'].forEach(type => {
                    const currentFile = files[type];
                    const processedFile = prevProcessedFiles.current[type];

                    if (!currentFile) {
                        if (processedFile) {
                            setFilePreviews(prev => ({ ...prev, [type]: null }));
                            prevProcessedFiles.current[type] = null;
                        }
                    } else if (currentFile !== processedFile && !currentFile.isDemo) {
                        prevProcessedFiles.current[type] = currentFile;
                        loadPreview(currentFile, type);
                    }
                });
            }, [files, mappings, autoOpenPreviewType]);

            const autoAssignFiles = (fileArray) => {
                setFiles(prev => {
                    let updated = { ...prev };
                    const stockCandidates = [];

                    fileArray.forEach(file => {
                        const name = file.name.toLowerCase();
                        if (name.includes('구매') || name.includes('매입') || name.includes('입고')) updated.in = file;
                        else if (name.includes('판매') || name.includes('매출') || name.includes('출고')) updated.out = file;
                        else stockCandidates.push(file);
                    });

                    if (stockCandidates.length > 0) {
                        stockCandidates.sort((a, b) => extractDateFromName(a.name) - extractDateFromName(b.name));
                        if (stockCandidates.length === 1) {
                            const name = stockCandidates[0].name.toLowerCase();
                            if (name.includes('기말') || name.includes('실사') || name.includes('마감')) updated.end = stockCandidates[0];
                            else updated.prev = stockCandidates[0]; 
                        } else {
                            updated.prev = stockCandidates[0];
                            updated.end = stockCandidates[stockCandidates.length - 1];
                        }
                    }
                    return updated;
                });
            };

            const handleGlobalDrop = (e) => {
                e.preventDefault(); setIsGlobalDragging(false);
                const droppedFiles = Array.from(e.dataTransfer.files);
                if (droppedFiles.length > 0) autoAssignFiles(droppedFiles);
                window.focus(); 
            };

            const priceOptionsMap = useMemo(() => {
                const map = {};
                productData.forEach(p => {
                    if (!map[p.코드]) map[p.코드] = {};
                    if (p.단가 > 0 && !p.isDummy) { 
                        if (!map[p.코드][p.단가]) {
                            map[p.코드][p.단가] = { price: p.단가, inQty: 0, remainQty: 0, details: [] };
                        }
                        map[p.코드][p.단가].inQty += (p.입고 + p.대체입고);
                        map[p.코드][p.단가].remainQty += p.전산잔량;
                        map[p.코드][p.단가].details.push({ date: p.일자, vendor: p.거래처, remainQty: p.전산잔량 });
                    }
                });
                const result = {};
                for (let code in map) {
                    const opts = Object.values(map[code]).sort((a, b) => a.price - b.price);
                    opts.forEach(opt => {
                        const uniqueDetails = {};
                        opt.details.forEach(d => {
                            const key = `${d.date}_${d.vendor}`;
                            if (!uniqueDetails[key]) uniqueDetails[key] = { ...d };
                            else uniqueDetails[key].remainQty += d.remainQty;
                        });
                        opt.details = Object.values(uniqueDetails);
                    });
                    result[code] = opts;
                }
                return result;
            }, [productData]);

            const closingStats = useMemo(() => {
                let missingPriceCount = 0; let lossCount = 0;
                productData.forEach(p => {
                    if (p.isDummy && p.단가 === 0) missingPriceCount++;
                    if (p.로스 !== 0 || p.전산잔량 < 0 || (p.실사 !== null && p.실사 < 0)) lossCount++;
                });
                let multiPriceCount = 0;
                vendorData.forEach(v => {
                    if (v.isSummary) return;
                    const opts = priceOptionsMap[v.코드];
                    if (opts && opts.length >= 2 && !v.isManualPrice) multiPriceCount++;
                });
                return { missingPriceCount, lossCount, multiPriceCount, total: productData.length };
            }, [productData, vendorData, priceOptionsMap]);

            useEffect(() => {
                if (localStorage.getItem('insight_autosave')) setHasAutoSave(true);
            }, []);

            useEffect(() => {
                if (isAnalyzed) {
                    const saveObj = {

                    targetItem.실사 = targetItem.실사 === null || targetItem.실사 === '' ? targetItem.전산잔량 : targetItem.실사;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;
                    targetItem.단가 = unitCost;

                    const updatedVendorData = vendorData.map(v => {

                    newData[prev.findIndex(d => d.batchKey === targetItem.batchKey)] = targetItem;
                    return newData;

                let endingStockAmt = 0, endingStockQty = 0;

                const cogsRate = revenue > 0 ? (cogs / revenue) * 100 : 0;

                    let parsedPrev = demoJson ? demoJson.prev : (filePreviews.prev?.parsedData || []);

                    if(filePreviews.out?.summary?.dataMin) minTxDate = Math.min(minTxDate, filePreviews.out.summary.dataMin);
                    if(filePreviews.in?.summary?.dataMax) maxTxDate = Math.max(maxTxDate, filePreviews.in.summary.dataMax);
                    if(filePreviews.out?.summary?.dataMax) maxTxDate = Math.max(maxTxDate, filePreviews.out.summary.dataMax);

                    let titleStart = pRefDate ? formatStrForPeriod(pRefDate) : (minTxDate !== 99999999 ? formatStrForPeriod(minTxDate) : '');
                    let titleEnd = eRefDate ? formatStrForPeriod(eRefDate) : (maxTxDate !== 0 ? formatStrForPeriod(maxTxDate) : '');

                    const addStock = (item, type, forcedDate = null) => {

                    parsedPrev.forEach(item => addStock(item, 'prev'));

                        const pool = stockPool[code];
                        
                        let finalRevenue = sale.수량 * sale.단가; 
                        
                        if (sale._raw) {
                            const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                            for (let k of amtKeys) {

                            pData[bKey].출고 += qtyToDeduct; pData[bKey].매출액 += finalRevenue;

                            issueMsg = '';

                            return;

                        let remainingQty = qtyToDeduct;

                        if (remainingQty < 0) {
                            const lastBucket = pool.buckets[pool.buckets.length - 1];
                            const cogs = remainingQty * lastBucket.단가; totalMatchedCogs = cogs;
                            lastBucket.수량 -= remainingQty; 
                            pData[lastBucket.batchKey].출고 += remainingQty; pData[lastBucket.batchKey].매출액 += finalRevenue; pData[lastBucket.batchKey].매출원가 += cogs;
                            pData[lastBucket.batchKey].출고내역[sale.거래처] = (pData[lastBucket.batchKey].출고내역[sale.거래처] || 0) + remainingQty;
                            matchedBatches.push({ batchKey: lastBucket.batchKey, qty: remainingQty });
                        } else {
                            for (let i = 0; i < pool.buckets.length && remainingQty > 0; i++) {

                                const take = Math.min(bucket.수량, remainingQty); const cogs = take * bucket.단가;
                                bucket.수량 -= take; remainingQty -= take; totalMatchedCogs += cogs;
                                const revShare = finalRevenue * (take / qtyToDeduct);
                                pData[bucket.batchKey].출고 += take; pData[bucket.batchKey].매출원가 += cogs; pData[bucket.batchKey].매출액 += revShare;
                                pData[bucket.batchKey].출고내역[sale.거래처] = (pData[bucket.batchKey].출고내역[sale.거래처] || 0) + take;
                                matchedBatches.push({ batchKey: bucket.batchKey, qty: take });
                            }
                            if (remainingQty > 0) {
                                const lastBucket = pool.buckets[pool.buckets.length - 1];
                                const cogs = remainingQty * lastBucket.단가; totalMatchedCogs += cogs;
                                const revShare = finalRevenue * (remainingQty / qtyToDeduct);
                                pData[lastBucket.batchKey].출고 += remainingQty; pData[lastBucket.batchKey].매출원가 += cogs; pData[lastBucket.batchKey].매출액 += revShare;
                                pData[lastBucket.batchKey].출고내역[sale.거래처] = (pData[lastBucket.batchKey].출고내역[sale.거래처] || 0) + remainingQty;
                                issueMsg = '';

                        vData.push({ 거래처: sale.거래처, 코드: code, 품명: sale.품명, 판매수량: sale.수량, 판매액: finalRevenue, 매출원가: totalMatchedCogs, 이익: finalRevenue - totalMatchedCogs, 이슈: issueMsg, matchHistory: matchedBatches });

                                if (!pData[batchKey]) pData[batchKey] = { batchKey, 코드: code, 품명: item.품명, 단가: price, 일자: date, 거래처: item.거래처, 기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 매출액: 0, 매출원가: 0, 메모: '', 이슈: [], 출고내역: {}, _orig:{기초:0,입고:0,출고:0} };

                            let remainingActual = actualQty;

                                    if (capacity > 0) {

                                    }
                                }
                                if (remainingActual > 0 && batches.length > 0) {
                                    const newest = batches[batches.length - 1]; newest.실사 += remainingActual; newest.로스 = newest.실사 - newest.전산잔량;

                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-500 font-black">+{h.tQty}</span> 
                                                            <span className="font-medium text-gray-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-100 hover:text-red-600 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-gray-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-red-600 font-bold hover:text-red-800 hover:bg-red-50 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-gray-800 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-gray-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGuide && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-gray-900 bg-opacity-60 transition-opacity">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col animate-[fadeIn_0.3s_ease-out]">
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 flex justify-between items-center text-white shrink-0 shadow-md">
                                    <h2 className="text-xl md:text-2xl font-black flex items-center"><i className="fas fa-book-reader mr-3 text-3xl"></i>주요 기능 안내 및 가이드</h2>
                                    <button onClick={() => setShowGuide(false)} className="text-white hover:text-indigo-200 transition-colors"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 md:p-8 overflow-y-auto bg-gray-50 text-gray-800 space-y-6">
                                    <section className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                                        <h3 className="text-lg md:text-xl font-black text-indigo-600 mb-4 border-b-2 border-indigo-100 pb-2 flex items-center"><i className="fas fa-lightbulb mr-2"></i> 핵심 기능 활용 방법</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                            <div className="bg-white p-4 rounded-lg border-2 border-indigo-50 hover:border-indigo-200 transition-colors">
                                                <div className="text-indigo-500 mb-2"><i className="fas fa-magic text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">스마트 거래처 원가 매칭</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed mb-2">
                                                    매입 단가가 여러 개여서 자동으로 원가가 지정되지 않은 판매 내역들을 <strong>[거래처 원가 매칭]</strong> 버튼을 눌러 모아볼 수 있습니다. 단가 버튼을 클릭해 매칭을 완료하면 카운트가 줄어듭니다.
                                                </p>
                                            </div>
                                            <div className="bg-white p-4 rounded-lg border-2 border-indigo-50 hover:border-indigo-200 transition-colors">
                                                <div className="text-orange-500 mb-2"><i className="fas fa-exchange-alt text-2xl"></i></div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">원물 ↔ 소분 재고 조정 (상계 처리)</h4>
                                                <p className="text-xs text-gray-600 leading-relaxed">
                                                    원물을 소분하여 판매하는 경우, 원물의 <strong>마이너스 로스</strong>와 소분 상품의 <strong>플러스 로스</strong>를 만들어 둔 뒤 <span className="bg-gray-100 px-1 rounded border">Space</span> 키를 눌러 두 상품을 서로 연결하여 재고 오차를 상계 처리할 수 있습니다.
                                                </p>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                                <div className="bg-gray-100 p-5 border-t border-gray-200 flex justify-end shrink-0">
                                    <button onClick={() => setShowGuide(false)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all transform hover:-translate-y-0.5">확인했습니다</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
