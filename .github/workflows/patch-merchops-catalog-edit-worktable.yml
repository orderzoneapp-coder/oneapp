name: Patch MerchOps catalog edit worktable

on:
  push:
    branches:
      - agent/merchops-catalog-edit-worktable-20260721
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/merchops-catalog-edit-worktable-20260721
          fetch-depth: 0

      - name: Patch MerchOps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('MerchOps.html')
          text = path.read_text(encoding='utf-8')

          old_version = 'v2.1.159_MasterInfoDisplayFix'
          new_version = 'v2.1.160_CatalogEditWorktable'
          if old_version not in text:
              raise SystemExit(f'old version not found: {old_version}')
          text = text.replace(old_version, new_version)

          if '// v2.1.160:' not in text:
              marker = '        // v2.1.159:'
              marker_start = text.index(marker)
              marker_end = text.index('\n', marker_start) + 1
              version_note = '        // v2.1.160: žĻīŪÉąŽ°úÍ∑łŽßĆ žĄ†ŪÉĚŪēú Í≤Ĺžöį žĄ†ŪÉĚ žÉĀŪíąžĚė Žßąžä§ŪĄįÍįížĚĄ ŪéłžßĎ ÍįÄŽä•Ūēú žěĎžóÖŪÖĆžĚīŽłĒŽ°ú Ž≥Ķžā¨ŪēúŽč§. žĚīŪõĄ Í≤¨ž†Ā¬∑ÍĶ¨Žß§¬∑žě¨Í≥†¬∑ž†ēŽ≥ī žóĎžÖÄžĚĄ Ž∂ąŽü¨žė§Ž©ī žĻīŪÉąŽ°úÍ∑ł ŪéłžßĎžö© žěĄžčúŪĖČžĚĄ ž†úÍĪįŪēėÍ≥† Íłįž°ī ŽĻĄÍĶźŽ™®ŽďúžĚė žóĎžÖÄ sourceŽßĆ žěĎžóÖŪÖĆžĚīŽłĒžóź ŪĎúžčúŪēúŽč§.\n'
              text = text[:marker_end] + version_note + text[marker_end:]

          helper_anchor = 'window.rebuildMerchEstimateComparisonForScope = (managedItems = {}, masterProducts = {}, activeTags = [], marginRules = []) => {'
          if 'window.stripMerchCatalogEditRows' not in text:
              helper_pos = text.index(helper_anchor)
              helper = '''// žĻīŪÉąŽ°úÍ∑ł Žč®ŽŹÖ ŪéłžßĎžö© žěĄžčúŪĖČžĚÄ žôłŽ∂Ä žóĎžÖÄ ŽĻĄÍĶź sourcežôÄ Ž∂ĄŽ¶¨ŪēúŽč§.\nwindow.isMerchCatalogEditRow = (item = {}) => item?._catalogEditOnly === true || item?.sources?.catalog?._catalogEditOnly === true;\nwindow.stripMerchCatalogEditRows = (managedItems = {}) => {\n    const next = {};\n    Object.entries(managedItems || {}).forEach(([key, item]) => {\n        if (!item || window.isMerchCatalogEditRow(item)) return;\n        next[key] = item;\n    });\n    return next;\n};\n\n'''
              text = text[:helper_pos] + helper + text[helper_pos:]

          upload_anchor = "            let newManaged = { ...data.managedItems, ...excludedToRestore };"
          upload_start = text.index('    const handleFileUpload = useCallback')
          upload_pos = text.index(upload_anchor, upload_start)
          upload_replacement = """            // žĻīŪÉąŽ°úÍ∑ł Žč®ŽŹÖ ŪéłžßĎžö© Žßąžä§ŪĄį Ž≥Ķžā¨ŪĖČžĚÄ žóĎžÖÄ ŽĻĄÍĶź žěÖŽ†•žĚī žēĄŽčąŽč§.\n            // žôłŽ∂Ä žóĎžÖÄžĚĄ Ž∂ąŽü¨žė§ŽäĒ žąúÍįĄ ž†úÍĪįŪēī Íłįž°ī ŽĻĄÍĶźŽ™®ŽďúžĚė source žöįžĄ†žąúžúĄŽ•ľ Í∑łŽĆÄŽ°ú žú†žßÄŪēúŽč§.\n            let newManaged = window.stripMerchCatalogEditRows\n                ? window.stripMerchCatalogEditRows({ ...data.managedItems, ...excludedToRestore })\n                : { ...data.managedItems, ...excludedToRestore };"""
          text = text[:upload_pos] + upload_replacement + text[upload_pos + len(upload_anchor):]

          flow_old = """    // [M-FLOW-02] ŪĆĆžĄúŽ¶¨žä§Ūäł Ž∂ąŽü¨žė§Íłį / žĻīŪÉąŽ°úÍ∑ł žěĎžóÖŽ≤ĒžúĄ žĄ†ŪÉĚ\n    // - ŪĆĆžĄúŽ¶¨žä§Ūäł(type/catalog)ŽäĒ Íłįž°īž≤ėŽüľ Ž™©Ž°Ě sourceŽ•ľ žěĎžóÖŽĆÄžóź Ž∂ąŽü¨žė®Žč§.\n    // - žĻīŪÉąŽ°úÍ∑ł(type/category)ŽäĒ managedItems/sourceŽ•ľ ŽßĆŽď§žßÄ žēäÍ≥† Žßąžä§ŪĄį žěĎžóÖŽ≤ĒžúĄŽßĆ ŽįĒÍĺľŽč§.\n    // - žĻīŪÉąŽ°úÍ∑ł žĄ†ŪÉĚŽßĆžúľŽ°ú Í≤¨ž†Ā žĖĎžčĚžĚīŽāė žóÖŽ¨īŽ™®ŽďúŽ•ľ Ž≥ÄÍ≤ĹŪēėžßÄ žēäŽäĒŽč§."""
          flow_new = """    // [M-FLOW-02] ŪĆĆžĄúŽ¶¨žä§Ūäł Ž∂ąŽü¨žė§Íłį / žĻīŪÉąŽ°úÍ∑ł ŪéłžßĎ¬∑ŽĻĄÍĶźŽ≤ĒžúĄ žĄ†ŪÉĚ\n    // - ŪĆĆžĄúŽ¶¨žä§Ūäł(type/catalog)ŽäĒ Íłįž°īž≤ėŽüľ Ž™©Ž°Ě sourceŽ•ľ žěĎžóÖŽĆÄžóź Ž∂ąŽü¨žė®Žč§.\n    // - žôłŽ∂Ä žóĎžÖÄžĚī žóÜžĚĄ ŽēĆ žĻīŪÉąŽ°úÍ∑ł(type/category)Ž•ľ žĄ†ŪÉĚŪēėŽ©ī Žßąžä§ŪĄįÍįí Ž≥Ķžā¨Ž≥łžĚĄ ŪéłžßĎ žěĎžóÖŪÖĆžĚīŽłĒŽ°ú žÉĚžĄĪŪēúŽč§.\n    // - žôłŽ∂Ä žóĎžÖÄžĚī žěąžúľŽ©ī žĻīŪÉąŽ°úÍ∑łŽäĒ žôľž™Ĺ Žßąžä§ŪĄį ŽĻĄÍĶźŽ≤ĒžúĄŽßĆ žú†žßÄŪēėÍ≥† žė§Ž•łž™ĹžĚÄ Íłįž°ī žóĎžÖÄ sourceŽ•ľ ŪĎúžčúŪēúŽč§."""
          if flow_old not in text:
              raise SystemExit('M-FLOW-02 comment block not found')
          text = text.replace(flow_old, flow_new, 1)

          handle_anchor = '    const handleLoadFilter = useCallback((type, name) => {'
          handle_start = text.index(handle_anchor)
          branch_start = text.index("        if (type === 'category') {", handle_start)
          branch_end = text.index('        const removeLoadedFilter = () => {', branch_start)
          new_branch = '''        if (type === 'category') {\n            const isSameScope = (ui.activeTags || []).some(t => String(t?.type || '') === 'category' && String(t?.name || '') === filterName);\n            const nextCatalogName = isSameScope ? '' : filterName;\n            const scopeTags = nextCatalogName ? [{ type: 'category', name: nextCatalogName }] : [];\n            const nextScope = window.buildMerchWorkScope\n                ? window.buildMerchWorkScope(data.masterProducts, scopeTags)\n                : { mode: nextCatalogName ? 'catalog' : 'all', catalogName: nextCatalogName, codeSet: new Set(), scopeCount: 0, masterCount: Object.keys(data.masterProducts || {}).length };\n            const externalRoles = ['estimate', 'purchase', 'sales', 'inventory', 'info'];\n            const hasExternalExcel = Object.values(data.managedItems || {}).some(item => externalRoles.some(role => window.hasMerchSourceRoleData ? window.hasMerchSourceRoleData(item, role) : !!(item?.sources?.[role] && Object.keys(item.sources[role]).length > 0)));\n\n            ui.setActiveTags(prev => {\n                const keep = (prev || []).filter(t => String(t?.type || '') !== 'category');\n                return nextCatalogName ? [...keep, { type: 'category', name: nextCatalogName }] : keep;\n            });\n\n            data.setManagedItems(prev => {\n                // žĚīž†Ą žĻīŪÉąŽ°úÍ∑ł Žč®ŽŹÖ ŪéłžßĎžö© Ž≥Ķžā¨ŪĖČžĚÄ žĻīŪÉąŽ°úÍ∑ł ž†ĄŪôė¬∑Ūēīž†ú žčú ž†úÍĪįŪēúŽč§.\n                // žôłŽ∂Ä žóĎžÖÄ sourceÍįÄ žěąžúľŽ©ī Í∑łŽĆÄŽ°ú Ž≥īž°īŪēī ŪėĄžě¨ ŽĻĄÍĶźŽ™®ŽďúŽ•ľ žú†žßÄŪēúŽč§.\n                let next = window.stripMerchCatalogEditRows ? window.stripMerchCatalogEditRows(prev) : { ...(prev || {}) };\n                if (!hasExternalExcel) next = {};\n\n                if (nextCatalogName && !hasExternalExcel) {\n                    const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(config.marginRules) : (Array.isArray(config.marginRules) ? config.marginRules : []);\n                    nextScope.codeSet.forEach(code => {\n                        const mItem = data.masterProducts[code];\n                        if (!mItem) return;\n                        const catalogSource = { ...(mItem || {}), _catalogEditOnly: true, _catalogName: nextCatalogName };\n                        const sources = { catalog: catalogSource, _activeRole: 'catalog' };\n                        next[code] = {\n                            žĹĒŽďú: code,\n                            _managedKey: code,\n                            _lastUploadRole: 'catalog',\n                            _catalogEditOnly: true,\n                            _workScopeCatalogs: [nextCatalogName],\n                            sources,\n                            finalData: window.computeFinalData(mItem, sources, safeMarginRules, false),\n                            _tags: new Set([`category:${nextCatalogName}`])\n                        };\n                    });\n                }\n\n                const rebuilt = window.rebuildMerchEstimateComparisonForScope\n                    ? window.rebuildMerchEstimateComparisonForScope(next, data.masterProducts, scopeTags, config.marginRules)\n                    : { items: next };\n                return rebuilt.items;\n            });\n\n            ui.setSelectedRows(new Set());\n            if (nextCatalogName && !hasExternalExcel) {\n                const appliedView = window.applyMerchTableView ? window.applyMerchTableView(config, 'catalog', null, { manual: false }) : null;\n                const filterApplied = window.applyMerchFilterPresetToState && appliedView ? window.applyMerchFilterPresetToState(appliedView, ui) : false;\n                ui.showToast(`‚úÖ žĻīŪÉąŽ°úÍ∑ł [${nextCatalogName}] ŪéłžßĎ žěĎžóÖŪÖĆžĚīŽłĒ žÉĚžĄĪ (${nextScope?.scopeCount ?? 0}ÍĪī)${appliedView ? ` / žĖĎžčĚžĄ†ŪÉĚ: ${appliedView.name}${filterApplied ? '¬∑ŪēĄŪĄįž†Āžö©' : ''}` : ''}`);\n            } else if (nextCatalogName) {\n                ui.showToast(`‚úÖ žĻīŪÉąŽ°úÍ∑ł [${nextCatalogName}] ŽĻĄÍĶź žěĎžóÖŽ≤ĒžúĄ ž†Āžö© (${nextScope?.scopeCount ?? 0}ÍĪī) / žěĎžóÖŪÖĆžĚīŽłĒžĚÄ ŪėĄžě¨ žóĎžÖÄÍįí žú†žßÄ`);\n            } else {\n                ui.showToast(`‚úÖ žĻīŪÉąŽ°úÍ∑ł žěĎžóÖŽ≤ĒžúĄ Ūēīž†ú / ž†Ąž≤ī Žßąžä§ŪĄį ${nextScope?.masterCount ?? Object.keys(data.masterProducts || {}).length}ÍĪī`);\n            }\n            return;\n        }\n'''
          text = text[:branch_start] + new_branch + text[branch_end:]

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('MerchOps.html').read_text(encoding='utf-8')
          assert text.count('v2.1.160_CatalogEditWorktable') == 3
          assert 'window.stripMerchCatalogEditRows' in text
          assert '_catalogEditOnly: true' in text
          assert 'žěĎžóÖŪÖĆžĚīŽłĒžĚÄ ŪėĄžě¨ žóĎžÖÄÍįí žú†žßÄ' in text
          assert 'let newManaged = window.stripMerchCatalogEditRows' in text
          assert "window.applyMerchTableView(config, 'catalog'" in text
          print('MerchOps catalog edit worktable patch validated')
          PY
          git diff --check

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/patch-merchops-catalog-edit-worktable.yml
          git add MerchOps.html
          git diff --cached --check
          git commit -m "Fix catalog edit worktable"
          git push origin HEAD:agent/merchops-catalog-edit-worktable-20260721
