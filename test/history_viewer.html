<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - 시스템 감사 로그 뷰어 [v1.6 통합 버전]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const HistoryApp = () => {
            const [logs, setLogs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterField, setFilterField] = useState('all');
            const [activeTab, setActiveTab] = useState('general');

            useEffect(() => {
                try {
                    const savedLogs = JSON.parse(localStorage.getItem('merchHistory_v870') || '[]');
                    setLogs(savedLogs);
                } catch (e) {
                    setLogs([]);
                }
            }, []);

            const filteredLogs = useMemo(() => {
                const keyword = searchTerm.toLowerCase().trim();
                return logs.filter(log => {
                    const safeCode = String(log.code || '').toLowerCase();
                    
                    const isAgri = safeCode.startsWith('10');
                    if (activeTab === 'agri' && !isAgri) return false;
                    if (activeTab === 'general' && isAgri) return false;

                    const matchField = filterField === 'all' || log.field === filterField;
                    if (!matchField) return false;
                    
                    if (!keyword) return true;
                    
                    const safeName = String(log.name || '').toLowerCase();
                    const safeField = String(log.field || '').toLowerCase();
                    const safeSpec = String(log.spec || '').toLowerCase();

                    return safeName.includes(keyword) || safeCode.includes(keyword) || safeField.includes(keyword) || safeSpec.includes(keyword);
                });
            }, [logs, searchTerm, filterField, activeTab]);

            const clearLogs = () => {
                if (window.confirm("정말 모든 감사 로그를 삭제하시겠습니까? (복구 불가)")) {
                    localStorage.removeItem('merchHistory_v870');
                    setLogs([]);
                }
            };

            const formatDiff = (diff) => {
                if (!diff || diff === 0) return <span className="text-slate-400">-</span>;
                if (diff > 0) return <span className="text-rose-500 font-bold">▲ {diff.toLocaleString()}</span>;
                return <span className="text-blue-500 font-bold">▼ {Math.abs(diff).toLocaleString()}</span>;
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 fade-in">
                    {/* 왼쪽 사이드바 (v1.6 ONEAPP 통일화) */}
                    <div className="w-[260px] bg-[#0f172a] flex flex-col text-slate-300 shadow-xl z-10 shrink-0">
                        <div className="p-6 border-b border-slate-800 bg-[#0b1120]">
                            <div className="flex items-center group shrink-0 mb-4">
                                <span className="text-xl font-black text-amber-400 mr-3">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                    <div className="flex items-center mb-0.5">
                                        <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                        <span className="ml-2 bg-amber-500/20 border border-amber-400/30 text-amber-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v1.6</span>
                                    </div>
                                    <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">HISTORY VIEWER</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col py-4 gap-1 px-3 flex-1">
                            <div className="px-4 py-3.5 rounded-xl text-left text-[13px] font-bold bg-amber-600 text-white shadow-md">
                                <i className="fas fa-list w-6 text-center mr-1"></i> 시스템 단가 변동 기록
                            </div>
                        </div>
                        <div className="mt-auto p-6 border-t border-slate-800 flex flex-col gap-3">
                            <button onClick={clearLogs} className="w-full py-2.5 bg-rose-900/50 text-rose-300 border border-rose-800/50 rounded-xl hover:bg-rose-800 hover:text-white text-[12px] font-bold transition-colors">
                                <i className="fas fa-trash-alt mr-2"></i> 기록 전체 지우기
                            </button>
                            <button onClick={() => window.close()} className="w-full py-3 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 hover:text-white text-[13px] font-bold transition-colors">
                                <i className="fas fa-arrow-left mr-2"></i> 닫기 (메인으로)
                            </button>
                        </div>
                    </div>

                    {/* 메인 뷰 */}
                    <div className="flex-1 overflow-hidden flex flex-col">
                        <div className="bg-white p-6 border-b border-slate-200 flex items-center justify-between shadow-sm shrink-0">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 mb-1">단가 변동 추적기</h2>
                                <p className="text-[13px] text-slate-500 font-bold">일반 상품 1,000건, 농산/일배 상품 1,000건의 변동 내역이 자동 보관됩니다.</p>
                            </div>
                            <div className="flex gap-2 items-center">
                                <select value={filterField} onChange={(e) => setFilterField(e.target.value)} className="border border-slate-300 rounded-lg px-4 py-2.5 text-[13px] outline-none focus:border-amber-500 bg-white font-bold text-slate-600 shadow-sm">
                                    <option value="all">모든 항목</option>
                                    <option value="입고가">입고가</option>
                                    <option value="출고가">출고가</option>
                                    <option value="카탈로그">카탈로그 (생성/삭제)</option>
                                    <option value="견적서">견적서 (생성/삭제)</option>
                                </select>
                                <div className="relative">
                                    <i className="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                                    <input 
                                        type="text" 
                                        value={searchTerm} 
                                        onChange={(e) => setSearchTerm(e.target.value)} 
                                        placeholder="상품명, 코드, 항목 검색..." 
                                        className="border border-slate-300 rounded-lg pl-10 pr-4 py-2.5 w-64 text-[13px] outline-none focus:border-amber-500 bg-white shadow-sm"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 탭 네비게이션 */}
                        <div className="flex gap-4 border-b border-slate-200 px-6 pt-3 bg-white shrink-0">
                            <button 
                                onClick={() => setActiveTab('general')}
                                className={`pb-3 px-3 font-black text-[14px] transition-colors border-b-[3px] ${activeTab === 'general' ? 'border-amber-500 text-amber-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                            >
                                일반 식자재/공산품 ({logs.filter(l => !String(l.code).startsWith('10')).length})
                            </button>
                            <button 
                                onClick={() => setActiveTab('agri')}
                                className={`pb-3 px-3 font-black text-[14px] transition-colors border-b-[3px] ${activeTab === 'agri' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                            >
                                농산/일배 (10~) ({logs.filter(l => String(l.code).startsWith('10')).length})
                            </button>
                        </div>

                        <div className="flex-1 overflow-auto custom-scrollbar p-6 bg-slate-100">
                            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                        <tr className="text-slate-500 font-bold">
                                            <th className="px-4 py-3 w-40 text-center">작업 일시</th>
                                            <th className="px-4 py-3 w-28">상품코드</th>
                                            <th className="px-4 py-3 max-w-[200px]">상품명 (규격)</th>
                                            <th className="px-4 py-3 w-24 text-center">변동 항목</th>
                                            <th className="px-4 py-3 w-28 text-right">기존 데이터</th>
                                            <th className="px-4 py-3 w-28 text-right text-indigo-600">변경 데이터</th>
                                            <th className="px-4 py-3 w-28 text-right">증감(차액)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredLogs.length === 0 ? (
                                            <tr>
                                                <td colSpan="7" className="p-16 text-center text-slate-400">
                                                    <i className="fas fa-search text-3xl mb-3 block opacity-50"></i>
                                                    기록된 내용이 없거나 검색 결과가 없습니다.
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredLogs.map((log) => {
                                                const isSystem = log.code === 'SYSTEM';
                                                const isPrice = ['입고가', '출고가', '시중가'].includes(log.field);
                                                
                                                return (
                                                    <tr key={log.id} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="px-4 py-3 text-center text-slate-500 text-[11px] tracking-tight">{log.timestamp}</td>
                                                        <td className="px-4 py-3">
                                                            {isSystem ? <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px] font-black">시스템</span> : <span className="font-mono text-slate-500 text-[11px]">{log.code}</span>}
                                                        </td>
                                                        <td className="px-4 py-3 font-bold text-slate-800 truncate max-w-[200px]">
                                                            {log.name} <span className="text-slate-400 font-normal ml-1 text-[11px]">{log.spec && `(${log.spec})`}</span>
                                                        </td>
                                                        <td className="px-4 py-3 text-center">
                                                            <span className="bg-slate-100 border border-slate-200 px-2 py-1 rounded text-[11px] font-bold text-slate-600">{log.field}</span>
                                                        </td>
                                                        <td className="px-4 py-3 text-right text-slate-500">
                                                            {isPrice && !isNaN(log.oldVal) ? Number(log.oldVal).toLocaleString() : log.oldVal}
                                                        </td>
                                                        <td className="px-4 py-3 text-right font-black text-indigo-600">
                                                            {isPrice && !isNaN(log.newVal) ? Number(log.newVal).toLocaleString() : log.newVal}
                                                        </td>
                                                        <td className="px-4 py-3 text-right">
                                                            {formatDiff(log.diff)}
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HistoryApp />);
    </script>
</body>
</html>
