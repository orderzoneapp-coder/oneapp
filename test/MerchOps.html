<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v1.6 3단 통합 버전]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        window.MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "판매여부", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록" ];
        window.NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고" ];
        
        window.generateUUID = () => {
            return typeof crypto !== 'undefined' && crypto.randomUUID 
                ? crypto.randomUUID() 
                : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { 
                    const r = Math.random() * 16 | 0; 
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); 
                });
        };

        window.parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        window.initIDB = () => new Promise((resolve, reject) => { 
            const request = indexedDB.open('MerchOpsDB', 2); 
            request.onupgradeneeded = (e) => { 
                const db = e.target.result; 
                if (!db.objectStoreNames.contains('store')) {
                    db.createObjectStore('store'); 
                }
                if (!db.objectStoreNames.contains('master_products')) {
                    db.createObjectStore('master_products', { keyPath: '코드' }); 
                }
            }; 
            request.onsuccess = () => resolve(request.result); 
            request.onerror = () => reject(request.error); 
        });

        window.bulkPutIDB = async (storeName, items) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readwrite'); 
                const store = tx.objectStore(storeName); 
                items.forEach(item => store.put(item)); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        window.getAllIDB = async (storeName) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readonly'); 
                const req = tx.objectStore(storeName).getAll(); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.getIDB = async (key) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readonly'); 
                const req = tx.objectStore('store').get(key); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.setIDB = async (key, val) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readwrite'); 
                tx.objectStore('store').put(val, key); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        window.calculatePricesEngine = (baseInPrice, providedOutPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const ROUND_UNIT = 100;
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) 
                ? window.parseNum(mItem?.['외주비']) 
                : window.parseNum(currentFinalData?.['외주비']);
            
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) 
                ? window.parseNum(mItem?.['노무비']) 
                : window.parseNum(currentFinalData?.['노무비']);
            
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => { 
                if (ruleWh === '*') return true; 
                const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh))); 
            };
            
            const matchUnit = (ruleUnit, targetUnit) => { 
                if (ruleUnit === '*') return true; 
                const targets = String(ruleUnit).toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => targetUnit === s || targetUnit.includes(s)); 
            };

            let bestRule = null; 
            let bestScore = -1;
            const safeMarginRules = Array.isArray(marginRules) ? marginRules : [];
            
            safeMarginRules.forEach(r => { 
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) { 
                    let score = 0; 
                    if (r.whCode !== '*') score += 2; 
                    if (r.unit !== '*') score += 1; 
                    if (score > bestScore) { 
                        bestScore = score; 
                        bestRule = r; 
                    } 
                } 
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' }; 
            let calcOutPrice = 0;
            
            if (baseInPrice > 0) { 
                if (appliedRule.type === 'divide') {
                    calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); 
                } else {
                    calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); 
                }
                calcOutPrice = Math.round(calcOutPrice / ROUND_UNIT) * ROUND_UNIT; 
            }

            if (baseInPrice === 0) return 0;
            if (forceRecalc) return calcOutPrice;
            if (providedOutPrice > 0) return providedOutPrice;
            return calcOutPrice;
        };

        window.computeFinalData = (mItem, sources, marginRules, forceRecalc = false) => {
            const inv = sources['inventory'] || {};
            const est = sources['estimate'] || {};
            
            const invStock = inv['재고수량'] !== undefined ? window.parseNum(inv['재고수량']) : (inv['안전재고'] !== undefined ? window.parseNum(inv['안전재고']) : 999);
            const hasInv = Object.keys(inv).length > 0;
            const hasEst = Object.keys(est).length > 0;
            
            const invPromo = window.parseNum(inv['행사가']);
            const estPromo = window.parseNum(est['행사가']);
            
            const invInPrice = inv['입고가'] !== undefined ? window.parseNum(inv['입고가']) : window.parseNum(mItem['입고가']);
            const estInPrice = est['입고가'] !== undefined ? window.parseNum(est['입고가']) : window.parseNum(mItem['입고가']);
            const masterInPrice = window.parseNum(mItem['입고가']);

            const invProvidedOut = window.parseNum(inv['출고가']);
            const estProvidedOut = window.parseNum(est['출고가']);
            const masterProvidedOut = window.parseNum(mItem['출고가']);
            const masterProvidedMarket = window.parseNum(mItem['시중가']);

            const invTargetOut = window.calculatePricesEngine(invInPrice, invProvidedOut, mItem, inv, marginRules, forceRecalc);
            const estTargetOut = window.calculatePricesEngine(estInPrice, estProvidedOut, mItem, est, marginRules, forceRecalc);
            const masterTargetOut = window.calculatePricesEngine(masterInPrice, masterProvidedOut, mItem, {}, marginRules, forceRecalc);

            let finalMarketPrice = 0;
            if (forceRecalc) {
                finalMarketPrice = masterTargetOut; 
            } else {
                finalMarketPrice = masterProvidedMarket > 0 ? masterProvidedMarket : masterTargetOut;
            }
            
            let targetSource = {};
            let theme = 0; 
            let isPromo = false;
            let normalPrice = 0; 
            
            if (hasInv && invStock > 0 && invPromo > 0 && !forceRecalc) {
                targetSource = { ...inv, '입고가': invInPrice, '출고가': invTargetOut, '행사가': invPromo }; 
                theme = 2; isPromo = true; normalPrice = invTargetOut;
            } else if (hasEst && estPromo > 0 && !forceRecalc) {
                targetSource = { ...est, '입고가': estInPrice, '출고가': estTargetOut, '행사가': estPromo }; 
                theme = 1; isPromo = true; normalPrice = estTargetOut;
            } else if (hasInv && invStock > 0) {
                targetSource = { ...inv, '입고가': invInPrice, '출고가': invTargetOut }; 
                theme = 0; normalPrice = invTargetOut;
            } else if (hasEst) {
                targetSource = { ...est, '입고가': estInPrice, '출고가': estTargetOut }; 
                theme = 0; normalPrice = estTargetOut;
            } else {
                targetSource = { '입고가': masterInPrice, '출고가': masterTargetOut }; 
                theme = 0; normalPrice = masterTargetOut;
            }

            if (targetSource['입고가'] === 0) targetSource['출고가'] = 0;
            
            targetSource['시중가'] = finalMarketPrice;
            targetSource._theme = theme;
            targetSource._isPromo = isPromo;
            targetSource._normalPrice = normalPrice;
            
            return targetSource;
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const safeJSONParse = (key, defaultVal) => {
            try { 
                const s = localStorage.getItem(key); 
                return (s && s !== 'undefined') ? JSON.parse(s) : defaultVal; 
            } catch (e) { 
                return defaultVal; 
            }
        };

        const getInitialVisibleMasterCols = () => ({ 
            estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A', '판매여부'] 
        });
        
        const getInitialVisibleUploadCols = () => ({ 
            estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명', '행사가'] 
        });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { 
                '창고': '창고, 창고코드', 
                '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', 
                '품목명': '품목명, 상품명, 품명, 상품이름', 
                '규격': '규격, 규격명, 사이즈, 단량', 
                '출고가': '출고가, 출고, 판매가, 시중가', 
                '입고가': '입고가, 입고, 매입가' 
            };
            base.estimate = { 
                '창고': '창고, 창고코드', 
                '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', 
                '품목명': '품목명, 상품명, 품명, 상품이름', 
                '규격': '규격명, 규격, 사이즈, 단량', 
                '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', 
                '행사가': '행사가, 행사, 특가',
                '입고가': '입고가, 입고, 매입가', 
                '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', 
                '도매A': 'A판매, A판매가, 도매A', 
                '도매B': 'B판매, B판매가, 도매B', 
                '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };

        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { 
                '창고': '창고', 
                '구매처': '구매처', 
                '견적서': '견적서', 
                '행사가': '행사가', 
                '입고가': '입고가', 
                '출고가': '출고가', 
                '입고B': '입고B', 
                '도매A': '도매A', 
                '도매B': '도매B', 
                '간단설명': '간단설명' 
            };
            return base;
        };

        const getCellWidthClass = (h) => {
            if (window.NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서' || h === '판매여부') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            
            Object.keys(mappingConfig).forEach(field => {
                const keywords = String(mappingConfig[field]).split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                
                let matchedKey = actualHeaders.find(h => { 
                    if(!h) return false; 
                    const cleanH = String(h).toLowerCase().replace(/\s/g, ''); 
                    return keywords.includes(cleanH); 
                });
                
                if (!matchedKey) {
                    matchedKey = actualHeaders.find(h => {
                        if(!h) return false; 
                        const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                        return keywords.some(kw => { 
                            if (kw === '코드' && (cleanH.includes('1') || cleanH.includes('2') || cleanH.includes('3') || cleanH.includes('종'))) return false; 
                            return cleanH.includes(kw); 
                        });
                    });
                }
                
                if(matchedKey) {
                    headerMap[field] = matchedKey;
                }
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                
                const processData = (data, type) => {
                    try {
                        const wb = window.XLSX.read(data, { type: type, cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return [];

                        let headerRowIdx = -1;
                        const maxSearch = Math.min(25, jsonAll.length);
                        
                        for (let i = 0; i < maxSearch; i++) {
                            const rowArr = jsonAll[i] || [];
                            const rowStr = rowArr.join('').replace(/\s/g, '');
                            if (
                                rowStr.includes('품목코드') || 
                                rowStr.includes('상품코드') || 
                                rowStr.includes('바코드') || 
                               (rowStr.includes('코드') && (rowStr.includes('품명') || rowStr.includes('상품명') || rowStr.includes('규격'))) || 
                               (rowStr.includes('품명') && (rowStr.includes('규격') || rowStr.includes('단가')))
                            ) { 
                                headerRowIdx = i; 
                                break; 
                            }
                        }
                        
                        if (headerRowIdx === -1) return null; 

                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { 
                                endIdx--; 
                                continue; 
                            }
                            
                            let filledCount = 0;
                            let rawStr = '';
                            
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { 
                                    filledCount++; 
                                    rawStr += String(val).replace(/\s/g, ''); 
                                }
                            }
                            
                            if (rawStr === '') { 
                                endIdx--; 
                                continue; 
                            }
                            
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) {
                                endIdx--;
                            } else {
                                break;
                            }
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i]; 
                            if (!row) continue;
                            
                            let isEmpty = true; 
                            const obj = {}; 
                            
                            headers.forEach((h, idx) => { 
                                if (h) { 
                                    obj[h] = row[idx]; 
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') {
                                        isEmpty = false; 
                                    }
                                }
                            }); 
                            
                            if(!isEmpty) {
                                parsedData.push(obj);
                            }
                        }
                        return parsedData;
                    } catch(err) { 
                        return null; 
                    }
                };

                const isCSV = file.name.toLowerCase().endsWith('.csv');
                
                if (isCSV) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        if (text.includes('')) {
                            const utf8Reader = new FileReader();
                            utf8Reader.onload = (e2) => { 
                                resolve(processData(e2.target.result, 'string') || []); 
                            };
                            utf8Reader.readAsText(file, 'utf-8');
                        } else { 
                            resolve(processData(text, 'string') || []); 
                        }
                    };
                    reader.readAsText(file, 'euc-kr');
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => { 
                        resolve(processData(new Uint8Array(e.target.result), 'array') || []); 
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };

        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || '');
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => safeJSONParse('merchVisMaster_v870', getInitialVisibleMasterCols()));
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => safeJSONParse('merchVisUpload_v870', getInitialVisibleUploadCols()));
            const [mappings, setMappings] = useState(() => safeJSONParse('merchMappings_v870', getInitialMappings()));
            const [masterLinks, setMasterLinks] = useState(() => safeJSONParse('merchMasterLinks_v870', getInitialMasterLinks()));
            const [marginRules, setMarginRules] = useState(() => safeJSONParse('merchMarginRules_v878', [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]));

            useEffect(() => {
                const handleConfigSync = (e) => {
                    if (e.key === 'config_sync_trigger') {
                        const fVisMaster = safeJSONParse('merchVisMaster_v870', null); 
                        const fVisUpload = safeJSONParse('merchVisUpload_v870', null); 
                        const fMappings = safeJSONParse('merchMappings_v870', null); 
                        const fMasterLinks = safeJSONParse('merchMasterLinks_v870', null); 
                        const fMarginRules = safeJSONParse('merchMarginRules_v878', null);
                        
                        if(fVisMaster) setVisibleMasterCols(fVisMaster); 
                        if(fVisUpload) setVisibleUploadCols(fVisUpload); 
                        if(fMappings) setMappings(fMappings); 
                        if(fMasterLinks) setMasterLinks(fMasterLinks); 
                        if(fMarginRules) setMarginRules(fMarginRules);
                    }
                };
                window.addEventListener('storage', handleConfigSync);
                return () => window.removeEventListener('storage', handleConfigSync);
            }, []);

            return { 
                cloudUrl, setCloudUrl, 
                visibleMasterCols, setVisibleMasterCols, 
                visibleUploadCols, setVisibleUploadCols, 
                mappings, setMappings, 
                masterLinks, setMasterLinks, 
                marginRules, setMarginRules 
            };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            useEffect(() => {
                window.getAllIDB('master_products').then(items => {
                    if (items && items.length > 0) { 
                        const dict = {}; 
                        items.forEach(i => dict[i.코드] = i); 
                        setMasterProducts(dict); 
                    } else {
                        window.getIDB('merchMaster_v870').then(data => {
                            if (data) { 
                                setMasterProducts(data); 
                                window.requestIdleCallback?.(async () => { 
                                    await window.bulkPutIDB('master_products', Object.values(data).filter(item => item && item.코드)); 
                                }); 
                            }
                        }).catch(console.error);
                    }
                }).catch(console.error);
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        window.getAllIDB('master_products').then(items => {
                            if (items && items.length > 0) { 
                                const dict = {}; 
                                items.forEach(i => dict[i.코드] = i); 
                                setMasterProducts(dict); 
                            }
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    window.requestIdleCallback?.(async () => { 
                        await window.bulkPutIDB('master_products', Object.values(data).filter(item => item && item.코드)); 
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString()); 
                    }); 
                } catch(e) {
                    console.error(e);
                } 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const allLogs = [...newLogs, ...prev];
                    const agriLogs = allLogs.filter(l => String(l.code).startsWith('10')).slice(0, 1000);
                    const generalLogs = allLogs.filter(l => !String(l.code).startsWith('10')).slice(0, 1000);
                    const safeAgriIds = new Set(agriLogs.map(l => l.id)); 
                    const safeGeneralIds = new Set(generalLogs.map(l => l.id));
                    const finalLogs = allLogs.filter(l => safeAgriIds.has(l.id) || safeGeneralIds.has(l.id));
                    
                    localStorage.setItem('merchHistory_v870', JSON.stringify(finalLogs));
                    return finalLogs;
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMasterToLocal, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [activeTags, setActiveTags] = useState([]);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [priceFilter, setPriceFilter] = useState('all');

            const showToast = useCallback((msg) => { 
                setToastMsg(msg); 
                setTimeout(() => setToastMsg(''), 3000); 
            }, []);

            return {
                selectedRows, setSelectedRows, 
                globalSearch, setGlobalSearch, 
                activeTags, setActiveTags,
                showCategoryModal, setShowCategoryModal,
                alertMsg, setAlertMsg, 
                toastMsg, setToastMsg, 
                isProcessing, setIsProcessing, 
                processMsg, setProcessMsg, 
                showToast,
                priceFilter, setPriceFilter
            };
        };

        const useMerchActions = (config, data, ui, fullDisplayRows) => {
            
            const handleCloudSync = useCallback(async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다. 우측 상단 톱니바퀴에서 URL을 세팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 백업' : '불러오기'} 시작...`);
                ui.setIsProcessing(true);
                
                try {
                    if (type === 'upload') {
                        ui.setProcessMsg('서버 초기화 중...');
                        let initRes = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'initSync' }) });
                        if ((await initRes.json()).status !== 'success') throw new Error("초기화 실패");

                        const masterItems = Object.values(data.masterProducts);
                        const chunkSize = 500;
                        for (let i = 0; i < masterItems.length; i += chunkSize) {
                            const chunk = masterItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`마스터 데이터 업로드 중... (${Math.min(i + chunkSize, masterItems.length)} / ${masterItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_master', data: chunk }) });
                        }

                        const historyItems = data.historyLogs || [];
                        for (let i = 0; i < historyItems.length; i += chunkSize) {
                            const chunk = historyItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`히스토리 업로드 중... (${Math.min(i + chunkSize, historyItems.length)} / ${historyItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_history', data: chunk }) });
                        }

                        ui.setProcessMsg('환경설정 및 AI 매핑 사전 업로드 중...');
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const configPayload = {
                            action: 'config',
                            data: {
                                dict: dict,
                                rules: config.marginRules,
                                appConfig: { 
                                    mappings: config.mappings, 
                                    masterLinks: config.masterLinks, 
                                    visibleUploadCols: config.visibleUploadCols, 
                                    visibleMasterCols: config.visibleMasterCols 
                                }
                            }
                        };
                        await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(configPayload) });

                        ui.showToast('✅ 클라우드 대용량 분할 백업(Push) 성공!');
                    } else {
                        ui.setProcessMsg('클라우드 데이터 수신 중...');
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        
                        if (result.status === 'success' && result.data) { 
                            if (result.data.master && Object.keys(result.data.master).length > 0) {
                                data.setMasterProducts(result.data.master);
                            }
                            if (result.data.dict && Object.keys(result.data.dict).length > 0) {
                                localStorage.setItem('parserDict_v870', JSON.stringify(result.data.dict));
                            }
                            if (result.data.rules && result.data.rules.length > 0) {
                                config.setMarginRules(result.data.rules);
                            }
                            
                            if (result.data.history && Array.isArray(result.data.history)) {
                                data.setHistoryLogs(result.data.history);
                                localStorage.setItem('merchHistory_v870', JSON.stringify(result.data.history));
                            }
                            
                            if (result.data.appConfig) {
                                if (result.data.appConfig.mappings) config.setMappings(result.data.appConfig.mappings);
                                if (result.data.appConfig.masterLinks) config.setMasterLinks(result.data.appConfig.masterLinks);
                                if (result.data.appConfig.visibleUploadCols) config.setVisibleUploadCols(result.data.appConfig.visibleUploadCols);
                                if (result.data.appConfig.visibleMasterCols) config.setVisibleMasterCols(result.data.appConfig.visibleMasterCols);
                            }

                            if (ui.setHasUnsavedChanges) ui.setHasUnsavedChanges(false);
                            
                            const masterCount = result.data.master ? Object.keys(result.data.master).length : 0;
                            const historyCount = result.data.history ? result.data.history.length : 0;
                            ui.showToast(`✅ 데이터 불러오기 완료! (상품: ${masterCount.toLocaleString()}건, 로그: ${historyCount.toLocaleString()}건)`);
                        } else {
                            throw new Error("Invalid Data Format");
                        }
                    }
                } catch (error) { 
                    console.error(error);
                    ui.setAlertMsg("통신 오류 발생. URL이나 시트 권한을 확인하세요.\n" + error.message); 
                } finally {
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }
            }, [config.cloudUrl, data.masterProducts, data.setMasterProducts, config.marginRules, config.setMarginRules, config.mappings, config.masterLinks, config.visibleUploadCols, config.visibleMasterCols, data.historyLogs, data.setHistoryLogs, ui]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록'];
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    data.setMasterProducts(newMaster);
                    ui.showToast(`✅ ${count}건의 상품에서 찌꺼기 데이터를 삭제했습니다. (적용 후 우측 상단 ☁️클라우드 백업을 눌러주세요)`);
                }
            }, [data.masterProducts, data.setMasterProducts, ui]);

            const handleFileUpload = useCallback(async (e, role = 'estimate') => { 
                const files = Array.from(e.target.files); 
                const targetInput = e.target; 
                if (files.length === 0) return; 
                if (!window.XLSX) return ui.setAlertMsg("엑셀 파서 로드 대기중입니다.");

                ui.setIsProcessing(true); 
                ui.setProcessMsg(`[${role === 'inventory' ? '자사 재고' : '공급사 견적'}] 엑셀 로딩 및 분석 중...`);
                await new Promise(resolve => setTimeout(resolve, 50)); 

                try {
                    let newMaster = { ...data.masterProducts }; 
                    let newManaged = { ...data.managedItems }; 
                    let totalCount = 0;
                    
                    for (const file of files) {
                        const excelData = await parseExcelRobust(file);
                        
                        if (!excelData || excelData.length === 0) { 
                            ui.showToast(`⚠️ [${file.name}] 인식 가능한 데이터가 없습니다.`); 
                            continue; 
                        }

                        const actualHeaders = Object.keys(excelData[0]);
                        const curMap = config.mappings['estimate'] || {}; 
                        const headerCache = createHeaderMap(actualHeaders, curMap);
                        
                        excelData.forEach(row => {
                            const codeKey = headerCache['품목코드'] || '품목코드'; 
                            const nameKey = headerCache['품목명'] || '품목명';
                            const code = row[codeKey]; 
                            const name = row[nameKey];
                            
                            const cleanCode = String(code || '').replace(/\s/g, ''); 
                            const cleanName = String(name || '').replace(/\s/g, '');

                            if (!cleanCode || cleanCode.includes('출력') || cleanCode === '코드' || cleanCode === '품목코드' || cleanCode === '상품코드' || cleanCode.includes('예시')) return;
                            if (cleanName.includes('테스트상품') || cleanName.includes('샘플상품') || cleanCode.toLowerCase().includes('test')) return;

                            if (!newManaged[code]) { 
                                newManaged[code] = { 코드: code, sources: {}, finalData: {}, _tags: new Set() }; 
                            }
                            
                            let mItem = newManaged[code];
                            if (!mItem.sources[role]) mItem.sources[role] = {};
                            
                            mItem = { ...mItem, _tags: new Set([...(mItem._tags || []), `excel:${role === 'inventory' ? '재고' : '견적'}업로드`]) };
                            
                            const specKey = headerCache['규격']; 
                            const vendorKey = headerCache['구매처'];
                            
                            mItem.sources[role]['품목명'] = nameKey ? row[nameKey] : '';
                            mItem.sources[role]['규격'] = specKey ? row[specKey] : '';
                            mItem.sources[role]['구매처'] = vendorKey ? row[vendorKey] : '';
                            
                            if (!mItem.sources[role]['품목명'] && newMaster[code]?.['품목명']) mItem.sources[role]['품목명'] = newMaster[code]['품목명'];
                            if (!mItem.sources[role]['규격'] && newMaster[code]?.['규격']) mItem.sources[role]['규격'] = newMaster[code]['규격'];

                            Object.keys(curMap).forEach(h => {
                                if (!['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                    const actualKey = headerCache[h];
                                    if (actualHeaders.includes(actualKey)) {
                                        const val = row[actualKey];
                                        const safeVal = (val !== undefined && val !== null) ? val : '';
                                        const isNumeric = window.NUMERIC_HEADERS.includes(config.masterLinks['estimate']?.[h]) || window.NUMERIC_HEADERS.includes(h);
                                        mItem.sources[role][h] = isNumeric ? window.parseNum(safeVal) : safeVal;
                                    }
                                }
                            });

                            mItem.finalData = window.computeFinalData(newMaster[code] || {}, mItem.sources, config.marginRules);
                            newManaged[code] = mItem;
                            totalCount++;
                        });
                    }
                    data.setMasterProducts(newMaster);
                    data.setManagedItems(newManaged);
                    ui.setActiveTags(prev => {
                        const tagLabel = role === 'inventory' ? '📦 자사 재고 엑셀' : '📄 견적/시세 엑셀';
                        if (!prev.some(t => t.name === tagLabel)) return [...prev, {type: 'excel', name: tagLabel}];
                        return prev;
                    });
                    if(totalCount > 0) ui.showToast(`✅ [${role === 'inventory' ? '자사 재고' : '공급사 견적'}] 데이터 로드 완료 (${totalCount}건)`);
                } catch(error) { 
                    console.error(error); 
                    ui.setAlertMsg("❌ 파싱 오류 발생. 엑셀 파일 형식을 확인하세요."); 
                } finally { 
                    if (targetInput) targetInput.value = ''; 
                    ui.setIsProcessing(false); 
                    ui.setProcessMsg(''); 
                }
            }, [data.masterProducts, data.managedItems, config.mappings, config.masterLinks, config.marginRules, ui]);

            const handleLoadFilter = useCallback((type, name) => {
                if (!name) return;
                
                if (type === 'catalog' && name === 'all_catalogs') {
                    if (ui.activeTags.some(t => t.type === 'catalog' && t.name === '모든 카탈로그')) return ui.showToast('⚠️ 이미 모든 카탈로그가 추가되어 있습니다.');
                    ui.setIsProcessing(true); 
                    ui.setProcessMsg(`모든 카탈로그 데이터 병합 중...`);
                    
                    setTimeout(() => {
                        try {
                            ui.setActiveTags(prev => [...prev, {type: 'catalog', name: '모든 카탈로그'}]);
                            let newManaged = { ...data.managedItems }; 
                            let addedCount = 0;
                            const safeMarginRules = Array.isArray(config.marginRules) ? config.marginRules : [];

                            Object.values(data.masterProducts).forEach(mItem => {
                                if (mItem['카탈로그'] && String(mItem['카탈로그']).trim() !== '') {
                                    if (!newManaged[mItem.코드]) {
                                        newManaged[mItem.코드] = {
                                            코드: mItem.코드, 
                                            sources: { estimate: {} },
                                            finalData: window.computeFinalData(mItem, { estimate: {} }, safeMarginRules, false),
                                            _tags: new Set([`catalog:모든 카탈로그`])
                                        };
                                        addedCount++;
                                    } else {
                                        newManaged[mItem.코드] = { 
                                            ...newManaged[mItem.코드], 
                                            _tags: new Set([...(newManaged[mItem.코드]._tags || []), `catalog:모든 카탈로그`]) 
                                        };
                                    }
                                }
                            });
                            
                            data.setManagedItems(newManaged); 
                            ui.setSelectedRows(new Set()); 
                            ui.showToast(`✅ 모든 카탈로그 병합 완료! (신규 ${addedCount}건 추가됨)`);
                        } catch (e) { 
                            ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다."); 
                        } finally { 
                            ui.setIsProcessing(false); 
                            ui.setProcessMsg(''); 
                        }
                    }, 100);
                    return;
                }

                if (ui.activeTags.some(t => t.type === type && t.name === name)) return ui.showToast('⚠️ 이미 화면에 추가된 항목입니다.');

                ui.setIsProcessing(true); 
                ui.setProcessMsg(`[${name}] 데이터 병합 중...`);
                
                setTimeout(() => {
                    try {
                        ui.setActiveTags(prev => [...prev, {type, name}]);
                        let newManaged = { ...data.managedItems }; 
                        let addedCount = 0;
                        const safeMarginRules = Array.isArray(config.marginRules) ? config.marginRules : [];

                        Object.values(data.masterProducts).forEach(mItem => {
                            let isMatch = false;
                            const catStr = type === 'category' ? (mItem['견적서'] || mItem['카테고리'] || '') : (mItem['카탈로그'] || '');
                            if (String(catStr).split(',').map(c => c.trim()).includes(name)) {
                                isMatch = true;
                            }

                            if (isMatch) {
                                if (!newManaged[mItem.코드]) {
                                    const mockSource = {}; 
                                    const finalData = window.computeFinalData(mItem, { estimate: mockSource }, safeMarginRules);
                                    newManaged[mItem.코드] = {
                                        코드: mItem.코드, 
                                        sources: { estimate: mockSource },
                                        finalData: finalData,
                                        _tags: new Set([`${type}:${name}`])
                                    };
                                    addedCount++;
                                } else {
                                    newManaged[mItem.코드] = { 
                                        ...newManaged[mItem.코드], 
                                        _tags: new Set([...(newManaged[mItem.코드]._tags || []), `${type}:${name}`]) 
                                    };
                                }
                            }
                        });
                        
                        data.setManagedItems(newManaged); 
                        ui.setSelectedRows(new Set()); 
                        ui.showToast(`✅ [${name}] 병합 완료! (신규 ${addedCount}건 추가됨)`);
                    } catch (error) { 
                        ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다."); 
                    } finally { 
                        ui.setIsProcessing(false); 
                        ui.setProcessMsg(''); 
                    }
                }, 100);
            }, [data.masterProducts, data.managedItems, data.setManagedItems, config.marginRules, ui]);

            const handleRemoveFilter = useCallback((type, name) => {
                ui.setActiveTags(prev => prev.filter(t => !(t.type === type && t.name === name)));
                
                data.setManagedItems(prev => {
                    let newManaged = { ...prev }; 
                    let removedCount = 0;
                    
                    Object.keys(newManaged).forEach(key => {
                        const item = newManaged[key];
                        if (item._tags && item._tags.has(`${type}:${name}`)) {
                            const newTags = new Set(item._tags); 
                            newTags.delete(`${type}:${name}`);
                            
                            if (newTags.size === 0) { 
                                delete newManaged[key]; 
                                removedCount++; 
                            } else { 
                                newManaged[key] = { ...item, _tags: newTags }; 
                            }
                        }
                    });
                    
                    ui.showToast(`✅ [${name}] 제거 완료. (${removedCount}건 작업 화면에서 제외됨)`); 
                    return newManaged;
                });
                ui.setSelectedRows(new Set());
            }, [data.setManagedItems, ui]);

            const handleStopSales = useCallback(async () => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 판매 정지할 항목을 선택해주세요.');
                
                ui.setIsProcessing(true);
                ui.setProcessMsg('선택 항목 판매 정지 처리 중...');
                
                setTimeout(() => {
                    data.setManagedItems(prev => {
                        let next = { ...prev };
                        ui.selectedRows.forEach(code => {
                            if (next[code]) {
                                next[code].finalData = { ...next[code].finalData, '판매여부': 0 };
                            }
                        });
                        return next;
                    });
                    
                    ui.setSelectedRows(new Set());
                    ui.showToast(`✅ 선택한 ${ui.selectedRows.size}개 상품이 임시 판매중단(0) 처리되었습니다. F8을 눌러 저장하세요.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [ui.selectedRows, data.setManagedItems, ui]);

            const handleSaveAsCategory = useCallback((categoryName) => {
                if (!categoryName || !categoryName.trim()) return;
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 견적서로 저장할 상품이 없습니다.");

                ui.setIsProcessing(true); 
                ui.setProcessMsg('견적서 저장 중...');

                setTimeout(() => {
                    let newMaster = { ...data.masterProducts }; 
                    let count = 0; 
                    const safeName = categoryName.trim();

                    fullDisplayRows.forEach(row => {
                        const code = row.코드; 
                        if (!newMaster[code]) return;
                        
                        newMaster[code] = { ...newMaster[code] };
                        const currentCategories = newMaster[code]['견적서'] || newMaster[code]['카테고리'] || '';
                        const tags = String(currentCategories).split(',').map(s => s.trim()).filter(Boolean); 
                        
                        if (!tags.includes(safeName)) { 
                            tags.push(safeName); 
                            newMaster[code]['견적서'] = tags.join(', '); 
                            delete newMaster[code]['카테고리']; 
                            count++; 
                        }
                    });

                    if (count > 0) {
                        const localLogs = [{
                            id: window.generateUUID(), 
                            timestamp: new Date().toLocaleString('ko-KR'), 
                            code: 'SYSTEM', 
                            name: `[견적서 그룹 생성] ${safeName}`, 
                            spec: '', 
                            field: '견적서', 
                            oldVal: '-', 
                            newVal: `${count}개 상품 추가됨`, 
                            diff: 0
                        }];
                        data.addHistoryLogs(localLogs);
                    }

                    data.setMasterProducts(newMaster);
                    ui.setShowCategoryModal(false);
                    ui.showToast(`✅ ${count}개 상품이 [${safeName}] 견적서에 추가/저장되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [fullDisplayRows, data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.\n(※ 마스터 상품 자체가 삭제되지는 않으니 안심하세요!)`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...data.masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = String(newMaster[code][fieldKey]).split(',').map(s => s.trim()).filter(Boolean); 
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                if (count > 0) {
                    const localLogs = [{
                        id: window.generateUUID(), 
                        timestamp: new Date().toLocaleString('ko-KR'), 
                        code: 'SYSTEM', 
                        name: `[${fieldKey} 그룹 삭제] ${tagName}`,

                        field: fieldKey, 
                        oldVal: `${count}개 상품 포함`,

            const handleCommitEstimate = useCallback(() => {
                const targets = ui.selectedRows.size > 0 ? ui.selectedRows : new Set(fullDisplayRows.map(r => r.코드));
                if (targets.size === 0) return ui.showToast('⚠️ 반영할 항목이 없습니다.');
                
                if (ui.selectedRows.size === 0) {

                }
                
                let newMaster = { ...data.masterProducts }, commitCount = 0;
                let localLogs = [];
                const nowStr = new Date().toLocaleString('ko-KR');

                targets.forEach(code => {
                    const item = data.managedItems[code]; 
                    if (!item || !item.코드) return;
                    
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        if (item.finalData._theme !== undefined) {
                            newMaster[item.코드]['테마1'] = item.finalData._theme === 1 ? '1' : '';
                            newMaster[item.코드]['테마2'] = item.finalData._theme === 2 ? '1' : '';
                        }

                        let finalStatusToSave = item.finalData['판매여부'] !== undefined ? item.finalData['판매여부'] : oldItem['판매여부'];
                        const pIn = window.parseNum(item.finalData['입고가'] !== undefined ? item.finalData['입고가'] : oldItem['입고가']);
                        const pOut = window.parseNum(item.finalData['출고가'] !== undefined ? item.finalData['출고가'] : oldItem['출고가']);
                        
                        if (pIn === 0 || pOut === 0) {
                            finalStatusToSave = 0; 
                        }
                        newMaster[item.코드]['판매여부'] = finalStatusToSave;
                        
                        Object.keys(item.finalData).forEach(field => {
                            if (field.startsWith('_') || field === '판매여부') return; 
                            
                            const linked = config.masterLinks['estimate']?.[field] || (window.MASTER_HEADERS.includes(field) ? field : null);
                            
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '오류') {
                                const newVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(oldItem[linked]) : (oldItem[linked] || '');
                                
                                if (oldVal !== newVal) {
                                    if (['입고가', '출고가'].includes(linked) && oldVal > 0) {
                                        localLogs.push({ 
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal, 
                                            newVal: newVal, 
                                            diff: newVal - oldVal 
                                        });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {
                                        localLogs.push({
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal || '없음', 
                                            newVal: newVal || '삭제됨', 
                                            diff: 0
                                        });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;
                });

                if (localLogs.length > 0) {
                    data.addHistoryLogs(localLogs);
                }

                data.setMasterProducts(newMaster); 
                ui.setSelectedRows(new Set()); 
                ui.showToast(`✅ ${commitCount}건 마스터 업데이트 완료.`);

            const [localVal, setLocalVal] = useState(initialVal);

                baseBg = '!bg-rose-100';
                textClass = isNumeric ? 'text-right font-black !text-rose-800' : 'text-center font-black !text-rose-800';
            }

            const commitChange = (v) => {
                if (String(v) === String(initialVal)) return;
                data.setManagedItems(prev => {
                    const code = row.코드;
                    let currentItem = prev[code] || { 코드: code, sources: {}, finalData: {} };
                    
                    if (currentItem.sources.estimate) currentItem.sources.estimate[field] = isNumeric ? window.parseNum(v) : v;
                    if (currentItem.sources.inventory) currentItem.sources.inventory[field] = isNumeric ? window.parseNum(v) : v;

                    currentItem.finalData = { ...currentItem.finalData, [field]: v };
                    
                    if (['입고가', '출고가', '외주비', '노무비', '행사가'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        currentItem.finalData = window.computeFinalData(data.masterProducts[code] || {}, currentItem.sources, config.marginRules);
                        if (field === '출고가') {
                            currentItem.finalData['출고가'] = window.parseNum(v);
                        }
                    }
                    return { ...prev, [code]: currentItem };
                });
            };

            const handleKeyDown = (e) => { 
                if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) { 
                    e.preventDefault(); 
                    e.target.blur(); 
                    
                    const td = e.target.closest('td');
                    const tr = td.closest('tr');
                    const tbody = tr.closest('tbody');
                    const tds = Array.from(tr.children);
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.children);
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx;
                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);

                    if (nextRowIdx !== rowIdx) {
                        const nextTr = trs[nextRowIdx];
                        const nextInput = nextTr.children[colIdx]?.querySelector('input');
                        if (nextInput) {
                            nextInput.focus();
                            nextInput.select();
                        }
                    }
                } 
            };

            return (
                <td className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${baseBg} ${isSel ? '!bg-indigo-100/70' : 'group-hover:!bg-blue-100/40'} transition-colors relative`}>

                                placeholder={mVal || ''} 
                                onChange={(e) => setLocalVal(e.target.value)} 
                                onBlur={(e) => commitChange(e.target.value)} 
                                onKeyDown={handleKeyDown} 
                                onClick={(e) => e.target.select()} 
                            />
                        </div>
                    </div>
                </td>
            );

        const MemoizedTableRow = React.memo(({ row, idx, state, actions, isSel, mItem }) => {

            const requiredCoreFields = ['품목코드', '품목명', '규격'];
            
            const uploadName = row.finalData?.['품목명'] !== undefined ? row.finalData['품목명'] : '';
            const uploadSpec = row.finalData?.['규격'] !== undefined ? row.finalData['규격'] : '';
            const dName = uploadName || mItem.품목명 || '[미등록]';
            const dSpec = uploadSpec || mItem.규격 || '';

            const oldP = window.parseNum(mItem['입고가']);
            const newP = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : (row.sources?.['estimate']?.['입고가'] ?? row.sources?.['inventory']?.['입고가'] ?? oldP));
            const diffAmount = newP - oldP;
            
            const mStatus = String(mItem['판매여부'] || '').trim();
            const isStopped = mStatus === '0' || mStatus === '판매중단' || mStatus === '단종' || mStatus === '품절';

            let issueText = '-';
            let issueCellBg = 'bg-[#fbfbfe]'; 
            let issueTextColor = 'text-slate-400';

            if (isEstimateUploaded) {
                const isSpike = oldP > 0 && newP > 0 && (Math.abs(diffAmount) / oldP >= 0.3) && Math.abs(diffAmount) >= 1000;
                
                if (isSpike) {
                    issueCellBg = newP > oldP ? '!bg-rose-100' : '!bg-blue-100';
                }

                if (!mItem.코드) {

                            <div className="flex flex-col min-w-0 w-full overflow-hidden ml-1">

                    </td>

                    {!isEstimateUploaded ? (
                        visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => {

                            } else {
                                const isNum = window.NUMERIC_HEADERS.includes(h);

                                let mVal = mItem[h]; 
                                let isChanged = false;
                                
                                if (row.finalData && row.finalData[h] !== undefined) { 
                                    if (isNum && window.parseNum(row.finalData[h]) !== window.parseNum(mVal)) { isChanged = true; } 
                                    else if (!isNum && String(row.finalData[h]) !== String(mVal)) { isChanged = true; } 
                                }
                                
                                let formattedVal;
                                if (h === '판매여부') {
                                    if (mVal === '0' || mVal === 0) formattedVal = '판매중단';

                                } else {

                                }
                                
                                return (

                                        <div className={`truncate w-full ${h === '판매여부' && formattedVal === '판매중단' ? 'text-rose-500 font-bold' : ''}`}>{formattedVal}</div>
                                    </td>
                                );
                            })}
                            
                            <td className={`px-2 py-1.5 border-l-2 border-indigo-300 border-r-2 border-r-indigo-300 text-center w-[100px] min-w-[100px] max-w-[100px] ${issueCellBg} ${isSel ? '!bg-indigo-100/70' : 'group-hover:!bg-blue-50/50'}`}>
                                <div className={`text-[12px] font-black ${issueTextColor}`}>

                            </td>

                                const mVal = (linkedMasterField && row.코드 ? mItem[linkedMasterField] : undefined) ?? mItem[h];
                                return <EditableCell key={`p-u-e-${h}`} row={row} field={h} linkedMasterField={linkedMasterField} mVal={mVal} config={config} data={data} isSel={isSel} />;
                            })}
                        </>
                    )}
                </tr>
            );
        });

        const ExcelDataGrid = ({ state, actions }) => {
            const { isEstimateUploaded, selectedRows, fullDisplayRows, visibleMasterCols, visibleUploadCols, masterProducts } = state;
            const [visibleCount, setVisibleCount] = useState(100);

            useEffect(() => { setVisibleCount(100); }, [fullDisplayRows]);

            const handleScroll = useCallback((e) => { 
                const { scrollTop, clientHeight, scrollHeight } = e.target; 
                if (scrollHeight - scrollTop <= clientHeight + 150) setVisibleCount(p => p < fullDisplayRows.length ? p + 100 : p); 
            }, [fullDisplayRows.length]);

            const displayRows = fullDisplayRows.slice(0, visibleCount);
            const hiddenCount = fullDisplayRows.length - displayRows.length;

            return (
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col relative overflow-hidden">
                    <div className="flex-1 overflow-auto custom-scrollbar relative" onScroll={handleScroll}>

                            <thead className="text-[12px] font-extrabold sticky top-0 z-[60] shadow-sm border-b-2 border-slate-300">
                                <tr>
                                    <th className="sticky top-0 left-0 z-[70] bg-slate-200 px-3 py-2 border-r border-slate-300 text-slate-700 min-w-[280px] w-[280px] max-w-[280px]">
                                        <div className="flex items-center gap-2 pl-1">
                                            {isEstimateUploaded && (
                                                <input type="checkbox" className="rounded w-4 h-4 border-slate-400 cursor-pointer shrink-0 text-indigo-600 focus:ring-indigo-500" checked={selectedRows.size === fullDisplayRows.length && displayRows.length > 0} onChange={actions.toggleAllRows} />
                                            )}
                                            <span className="truncate font-black">상품 기본정보</span>
                                        </div>
                                    </th>

                                    {!isEstimateUploaded ? (
                                        visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => (
                                            <th key={`idle-th-${h}`} className="sticky top-0 z-[60] bg-slate-200 px-2 py-3 border-r border-b border-slate-300 text-center text-slate-700 font-bold" style={{width: getCellWidthClass(h)}}>{h}</th>
                                        ))
                                    ) : (
                                        <>
                                            {visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map((h, i, arr) => (
                                                <th key={`pm-${h}`} className="sticky top-0 z-[60] bg-slate-200 px-2 py-3 border-r border-b text-center text-slate-700 border-slate-300 font-bold" style={{width: getCellWidthClass(h)}}>
                                                    기존 {h}
                                                </th>
                                            ))}
                                            
                                            <th className="sticky top-0 z-[60] bg-[#eef2ff] px-2 py-3 border-b border-slate-300 border-l-2 border-l-indigo-300 border-r-2 border-r-indigo-300 text-center text-indigo-800 font-black min-w-[100px] w-[100px] max-w-[100px]">
                                                변동이슈
                                            </th>

                                            {visibleUploadCols['estimate']?.filter(h => h !== '품목코드').map(h => {
                                                const isHighlight = ['입고가', '도매A', '행사가', '출고가'].includes(h);
                                                return (
                                                    <th key={`pu-e-${h}`} className={`sticky top-0 z-[60] ${isHighlight ? 'bg-orange-100 text-orange-900 font-black' : 'bg-slate-200 text-slate-700'} px-2 py-3 border-r border-b border-slate-300 text-center`} style={{width: getCellWidthClass(h)}}>

                                        </td>

                                <tr>

                <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">MerchOps 메인 워크스페이스 [v1.6 통합 버전]</h2>
                <p className="text-[14px] text-slate-500 mb-10 text-center leading-relaxed font-bold">

                <div className="flex gap-6 w-full max-w-3xl z-10">

                        <label className="absolute inset-0 w-full h-full cursor-pointer z-20">

                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-emerald-600 transition-colors">ERP의 전체 상품 마스터 파일을 업로드합니다.</p>

                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-indigo-600 transition-colors">구글 시트에 백업된 마스터를 수동으로 가져옵니다.</p>

                        <div className="text-4xl text-purple-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-magic"></i></div>
