                    data.setMasterProducts(newMaster);
                    ui.setShowCategoryModal(false);
                    ui.showToast(`✅ ${count}개 상품이 [${safeName}] 견적서에 추가/저장되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [fullDisplayRows, data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.\n(※ 마스터 상품 자체가 삭제되지는 않으니 안심하세요!)`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...data.masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = String(newMaster[code][fieldKey]).split(',').map(s => s.trim()).filter(Boolean); 
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                if (count > 0) {
                    const localLogs = [{
                        id: window.generateUUID(), 
                        timestamp: new Date().toLocaleString('ko-KR'), 
                        code: 'SYSTEM', 
                        name: `[${fieldKey} 그룹 삭제] ${tagName}`, 
                        spec: '', 
                        field: fieldKey, 
                        oldVal: `${count}개 상품 포함`, 
                        newVal: '삭제됨', 
                        diff: 0
                    }];
                    data.addHistoryLogs(localLogs);
                }
                
                data.setMasterProducts(newMaster);
                
                if (ui.activeTags.some(t => t.type === type && t.name === tagName)) {
                    handleRemoveFilter(type, tagName);
                }

                ui.showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui, handleRemoveFilter]);

            const handleCommitEstimate = useCallback(() => {
                const targets = ui.selectedRows.size > 0 ? ui.selectedRows : new Set(fullDisplayRows.map(r => r.코드));
                if (targets.size === 0) return ui.showToast('⚠️ 반영할 항목이 없습니다.');
                
                if (ui.selectedRows.size === 0) {
                    if (!window.confirm(`선택된 항목이 없습니다.\n현재 화면에 있는 전체 ${targets.size}건의 데이터를 모두 저장하시겠습니까?`)) return;
                }
                
                let newMaster = { ...data.masterProducts }, commitCount = 0;
                let localLogs = [];
                const nowStr = new Date().toLocaleString('ko-KR');

                targets.forEach(code => {
                    const item = data.managedItems[code]; 
                    if (!item || !item.코드) return;
                    
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        if (item.finalData._theme !== undefined) {
                            newMaster[item.코드]['테마1'] = item.finalData._theme === 1 ? '1' : '';
                            newMaster[item.코드]['테마2'] = item.finalData._theme === 2 ? '1' : '';
                        }

                        // 판매중지는 사용자가 체크 후 명시적으로 요청한 경우에만 마스터 판매여부에 반영한다.
                        // 일반 가격/재고 작업 중에는 판매여부를 자동 판단해서 덮어쓰지 않는다.
                        if (item.finalData._salesStopRequested === true || String(item.finalData['판매여부']) === '0') {
                            const oldStatus = oldItem['판매여부'] !== undefined && oldItem['판매여부'] !== '' ? oldItem['판매여부'] : '-';
                            if (String(oldStatus) !== '0') {
                                localLogs.push({
                                    id: window.generateUUID(),
                                    timestamp: nowStr,
                                    code: code,
                                    name: oldItem.품목명 || item.sources?.estimate?.품목명 || '',
                                    spec: oldItem.규격 || item.sources?.estimate?.규격 || '',
                                    field: '판매여부',
                                    oldVal: oldStatus,
                                    newVal: '0 정지중',
                                    diff: 0
                                });
                            }
                            newMaster[item.코드]['판매여부'] = 0;
                        }
                        
                        Object.keys(item.finalData).forEach(field => {
                            if (field.startsWith('_') || field === '판매여부') return; 
                            
                            const linked = config.masterLinks['estimate']?.[field] || (window.MASTER_HEADERS.includes(field) ? field : null);
                            
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '오류') {
                                const newVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(oldItem[linked]) : (oldItem[linked] || '');
                                
                                if (oldVal !== newVal) {
                                    if (['입고가', '출고가'].includes(linked) && oldVal > 0) {
                                        localLogs.push({ 
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal, 
                                            newVal: newVal, 
                                            diff: newVal - oldVal 
                                        });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {
                                        localLogs.push({
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal || '없음', 
                                            newVal: newVal || '삭제됨', 
                                            diff: 0
                                        });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;
                });

                if (localLogs.length > 0) {
                    data.addHistoryLogs(localLogs);
                }

                data.setMasterProducts(newMaster); 
                ui.setSelectedRows(new Set()); 
                ui.showToast(`✅ ${commitCount}건 마스터 업데이트 완료.`);
            }, [ui.selectedRows, fullDisplayRows, data.masterProducts, data.managedItems, data.setMasterProducts, data.addHistoryLogs, config.masterLinks, ui]);

            const toggleAllRows = useCallback(() => {

                } else {

                    fullDisplayRows.forEach(r => next.add(r.코드)); 
                    ui.setSelectedRows(next);

            }, [fullDisplayRows, ui.selectedRows, ui.setSelectedRows]);

            // 주의: masterProducts 전체 4,000건을 즉시 변경하지 않는다. 최종 저장 전까지는 managedItems 작업값이다.
            // ============================================================
            const handleForceApplyMarginRules = useCallback(() => {
                if (fullDisplayRows.length === 0) return ui.showToast('⚠️ 화면에 적용할 상품이 없습니다.');

                const targetRows = ui.selectedRows.size > 0 
                    ? fullDisplayRows.filter(r => ui.selectedRows.has(r.코드))
                    : fullDisplayRows;

                    ? `선택된 ${targetRows.length}개 상품에 마진 룰을 강제 재계산 하시겠습니까?\n(수동으로 수정한 출고가 및 시중가가 시스템 룰대로 덮어씌워집니다.)`
                    : `현재 화면의 전체 ${targetRows.length}개 상품에 마진 룰을 강제 재계산 하시겠습니까?\n(수동으로 수정한 출고가 및 시중가가 시스템 룰대로 덮어씌워집니다.)`;

                ui.setProcessMsg('마진 룰 강제 적용 중...');

                setTimeout(() => {
                    data.setManagedItems(prev => {

                        targetRows.forEach(row => {

                            if (next[code]) {
                                const mItem = data.masterProducts[code] || {};
                                const currentItem = next[code];

                    ui.setProcessMsg('');

            // [M-BRIDGE-01] 출력검증센터 전달 브릿지
            // 역할: 현재 선택/검색/화면 작업범위만 merch_export_draft로 패키징한다.
            // core2 변경: draft 생성 세부 로직은 coreEngine.js의 ONEAPP.EXPORT.buildExportDraft로 위임한다.
            // 금지: masterProducts 전체, finalData 전체 객체, sources 전체 객체를 그대로 넘기지 않는다.
            // ============================================================
            const handleOpenExportCenter = useCallback(() => {
                if (Object.keys(data.managedItems).length === 0 && ui.activeTags.length === 0) {
                    ui.showToast('⚠️ 작업 중인 데이터가 없습니다. 출력검증센터로 넘길 수 없습니다.');

                    return;
                }

                const targetRows = ui.selectedRows.size > 0
                    ? fullDisplayRows.filter(r => ui.selectedRows.has(r.코드))
                    : fullDisplayRows;

                if (targetRows.length === 0) {
                    ui.showToast('⚠️ 선택된 출력 대상이 없습니다.');
                    return;
                }

                if (ui.selectedRows.size === 0) {
                    if (!window.confirm(`체크박스로 선택된 작업 항목이 없습니다.
현재 화면에 보이는 ${targetRows.length}건을 모두 출력검증센터로 넘기시겠습니까?`)) return;
                }

                ui.setIsProcessing(true);
                ui.setProcessMsg('출력검증센터 전달 패키지 생성 중...');

                setTimeout(async () => {
                    try {
                        if (!window.ONEAPP || !window.ONEAPP.EXPORT || typeof window.ONEAPP.EXPORT.buildExportDraft !== 'function') {
                            throw new Error('coreEngine EXPORT 엔진이 로드되지 않았습니다. coreEngine.js 캐시 또는 문법 오류를 확인하세요.');
                        }

                        const exportDraft = window.ONEAPP.EXPORT.buildExportDraft({
                            targetRows,
                            masterProducts: data.masterProducts
                        });
                        const validation = window.ONEAPP.EXPORT.validateExportDraft(exportDraft);
                        if (!validation.ok) throw new Error(validation.message);
                        if (!exportDraft || exportDraft.length === 0) throw new Error('전달할 draft가 0건입니다. 품목코드/코드 매칭을 확인하세요.');

                        await window.ONEAPP.STORAGE.setIDB('merch_export_draft', exportDraft);
                        ui.showToast(`✅ ${exportDraft.length}건을 출력검증센터로 전달했습니다.`);
                        window.location.href = 'FinalReviewCenter.html';

        };


        const getComparePriceFields = (config = {}) => {
            const meta = config.uploadColumnMeta || {};
            return Object.keys(meta).filter(field => meta[field]?.type === 'comparePrice');
        };

        const getRowValueByField = (row, field) => {
            if (!row) return '';
            const finalData = row.finalData || {};
            const sources = row.sources || {};
            if (finalData[field] !== undefined && finalData[field] !== '') return finalData[field];
            if (sources.inventory && sources.inventory[field] !== undefined && sources.inventory[field] !== '') return sources.inventory[field];
            if (sources.estimate && sources.estimate[field] !== undefined && sources.estimate[field] !== '') return sources.estimate[field];
            if (sources.parser && sources.parser[field] !== undefined && sources.parser[field] !== '') return sources.parser[field];
            return '';
        };

        const getComparePriceSummary = (row, config = {}) => {
            const basePrice = window.parseNum(getRowValueByField(row, '입고가'));
            if (basePrice <= 0) return { hasDiff: false, summary: '', minDiff: 0, maxDiff: 0, items: [] };

            const items = getComparePriceFields(config)
                .map(field => ({ field, value: window.parseNum(getRowValueByField(row, field)) }))
                .filter(item => item.value > 0 && item.value !== basePrice)
                .map(item => ({ ...item, diff: item.value - basePrice }));

            if (items.length === 0) return { hasDiff: false, summary: '', minDiff: 0, maxDiff: 0, items: [] };

            const formatDiff = (diff) => diff > 0 ? `+${diff.toLocaleString()}` : diff.toLocaleString();
            if (items.length === 1) {
                const item = items[0];
                return { hasDiff: true, summary: `${item.field} ${formatDiff(item.diff)}`, minDiff: item.diff, maxDiff: item.diff, items };
            }

            const sorted = [...items].sort((a, b) => a.diff - b.diff);
            const min = sorted[0];
            const max = sorted[sorted.length - 1];
            return {
                hasDiff: true,
                summary: `${min.field} ${formatDiff(min.diff)} ~ ${max.field} ${formatDiff(max.diff)}`,
                minDiff: min.diff,
                maxDiff: max.diff,
                items
            };
        };

        const hasComparePriceDiff = (row, config = {}) => getComparePriceSummary(row, config).hasDiff;

        const normalizeBasicValue = (item = {}) => String(item?.['기본'] ?? '').trim().toLowerCase();

        const isNonBasicValue = (value) => {
            const v = String(value ?? '').trim().toLowerCase();
            return v === '' || v === '0' || v === 'n' || v === 'false';
        };

        const isBasicItem = (item = {}) => !isNonBasicValue(normalizeBasicValue(item));

        const matchBasicFilter = (item = {}, query = '') => {
            const basicVal = normalizeBasicValue(item);
            const q = String(query ?? '').trim().toLowerCase();

            // 입력값이 없으면 기존 기본상품 전체: 0/공백/N/false가 아닌 상품만 노출한다.
            if (q === '') return !isNonBasicValue(basicVal);

            // 0은 포함검색이 아니라 “기본아님 전체” 특수값이다. 10/20/100은 여기 걸리면 안 된다.
            if (q === '0') return isNonBasicValue(basicVal);

            // 0이 아닌 값만 포함검색으로 처리한다. 예: 1, 2, 10, Y, 필수
            return basicVal.includes(q);
        };

        const getStockQty = (row = {}, mItem = {}) => {
            const v = row.finalData?.['재고수량'] ?? row.sources?.inventory?.['재고수량'] ?? row.sources?.inventory?.['재고'] ?? row.sources?.estimate?.['재고수량'] ?? mItem?.['재고수량'] ?? mItem?.['재고'];
            return v !== undefined && v !== null && v !== '' ? window.parseNum(v) : null;
        };

        const getSafeStock = (mItem = {}) => window.parseNum(mItem?.['안전재고']);

        const getStockCost = (row = {}) => {
            const v = getRowValueByField(row, '재고단가') || row.sources?.inventory?.['재고단가'] || row.sources?.inventory?.['입고가'];
            return window.parseNum(v);
        };

        const getMarginInfo = (row = {}, mItem = {}) => {
            const promoPrice = window.parseNum(row.finalData?.['행사가']);
            const outPrice = window.parseNum(row.finalData?.['출고가'] !== undefined ? row.finalData['출고가'] : mItem?.['출고가']);
            const price = promoPrice > 0 ? promoPrice : outPrice;
            const inPrice = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : mItem?.['입고가']);
            const rate = price > 0 ? ((price - inPrice) / price) * 100 : null;
            return { price, inPrice, rate, isPromo: promoPrice > 0 };
        };

        const isPromoActive = (row = {}) => window.parseNum(row.finalData?.['행사가']) > 0;

        const getMarginToneClass = (rate) => {
            if (rate === null || rate === undefined || isNaN(rate)) return 'bg-slate-100 text-slate-400 border-slate-200';
            if (rate < 0) return 'bg-rose-100 text-rose-800 border-rose-200';
            if (rate < 10) return 'bg-amber-100 text-amber-800 border-amber-200';
            if (rate >= 30) return 'bg-emerald-100 text-emerald-800 border-emerald-200';
            return 'bg-slate-100 text-slate-700 border-slate-200';
        };

        const isPromoSuggestion = (row = {}, mItem = {}, config = {}) => {
            if (isPromoActive(row)) return false;
            const marginInfo = getMarginInfo(row, mItem);
            if (marginInfo.rate !== null && marginInfo.rate < 0) return false;

            const oldIn = window.parseNum(mItem?.['입고가']);
            const newIn = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : (row.sources?.estimate?.['입고가'] ?? row.sources?.inventory?.['입고가']));
            const dropAmount = oldIn > 0 && newIn > 0 ? oldIn - newIn : 0;
            const isLargeDrop = oldIn > 0 && newIn > 0 && newIn < oldIn && (dropAmount >= 500 || (dropAmount / oldIn) >= 0.10);
            if (isLargeDrop) return true;

            const stockQty = getStockQty(row, mItem);
            const safeStock = getSafeStock(mItem);
            if (stockQty !== null && safeStock > 0 && stockQty >= safeStock * 1.5) return true;

            const stockCost = getStockCost(row);
            if (stockCost > 0) {
                const compareItems = getComparePriceSummary(row, config).items || [];
                if (compareItems.some(item => item.value > stockCost)) return true;
            }
            return false;
        };

        const getPromoSuggestionReason = (row = {}, mItem = {}, config = {}) => {
            const oldIn = window.parseNum(mItem?.['입고가']);
            const newIn = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : (row.sources?.estimate?.['입고가'] ?? row.sources?.inventory?.['입고가']));
            const dropAmount = oldIn > 0 && newIn > 0 ? oldIn - newIn : 0;
            if (oldIn > 0 && newIn > 0 && newIn < oldIn && (dropAmount >= 500 || (dropAmount / oldIn) >= 0.10)) return `단가하락 ${Math.round((dropAmount / oldIn) * 100)}%`;

            const stockQty = getStockQty(row, mItem);
            const safeStock = getSafeStock(mItem);
            if (stockQty !== null && safeStock > 0 && stockQty >= safeStock * 1.5) return `재고여유 ${(stockQty / safeStock).toFixed(1)}배`;

            const stockCost = getStockCost(row);
            if (stockCost > 0) {
                const compareItems = getComparePriceSummary(row, config).items || [];
                if (compareItems.some(item => item.value > stockCost)) return '재고가 유리';
            }
            return '';
        };

        const parseHistoryTime = (log = {}) => {
            if (log.timestampISO) {
                const t = new Date(log.timestampISO).getTime();
                if (!Number.isNaN(t)) return t;
            }
            if (log.timestamp) {
                const t = new Date(log.timestamp).getTime();
                if (!Number.isNaN(t)) return t;
            }
            return 0;
        };

        const getHistoryLogsFromLocal = () => {
            try {
                const raw = JSON.parse(localStorage.getItem('merchHistory_v870') || '[]');
                return Array.isArray(raw) ? raw : [];
            } catch (e) {
                console.warn('[MerchOps History Load]', e);
                return [];
            }
        };

        const getRowCatalogNames = (row = {}, mItem = {}) => {
            const names = new Set();
            if (row._tags && typeof row._tags.forEach === 'function') {
                row._tags.forEach(tag => {
                    const s = String(tag || '');
                    if (s.startsWith('catalog:')) names.add(s.replace('catalog:', '').trim());
                });
            }
            String(mItem?.['카탈로그'] || '').split(',').map(v => v.trim()).filter(Boolean).forEach(v => names.add(v));
            String(row.finalData?.['카탈로그'] || row.sources?.estimate?.['카탈로그'] || '').split(',').map(v => v.trim()).filter(Boolean).forEach(v => names.add(v));
            return Array.from(names).filter(Boolean);
        };

        const normalizeHistoryCatalog = (log = {}) => String(log.catalogName || log.catalog || log.quoteName || log.estimate || log.견적서 || '').trim();

        const findLatestParserHistory = (code, catalogNames = [], field = '입고가') => {
            const targetCode = String(code || '').trim();
            const targets = Array.isArray(catalogNames) ? catalogNames.map(v => String(v).trim()).filter(Boolean) : [String(catalogNames || '').trim()].filter(Boolean);
            if (!targetCode) return null;
            const logs = getHistoryLogsFromLocal();
            const exact = logs
                .filter(log => String(log.code || '').trim() === targetCode)
                .filter(log => !field || String(log.field || '').trim() === field)
                .filter(log => String(log.source || log.origin || '').trim() === 'parser' || log.catalog || log.catalogName || String(log.actionType || '').includes('parser') || String(log.actionType || '').includes('catalog'))
                .filter(log => targets.length === 0 || targets.includes(normalizeHistoryCatalog(log)))
                .sort((a, b) => parseHistoryTime(b) - parseHistoryTime(a));
            if (exact[0]) return exact[0];
            return logs
                .filter(log => String(log.code || '').trim() === targetCode)
                .filter(log => !field || String(log.field || '').trim() === field)
                .filter(log => String(log.source || log.origin || '').trim() === 'parser' || log.catalog || log.catalogName || String(log.actionType || '').includes('parser') || String(log.actionType || '').includes('catalog'))
                .sort((a, b) => parseHistoryTime(b) - parseHistoryTime(a))[0] || null;
        };

        const formatSignedNumber = (v) => {
            const n = Number(v || 0);
            if (!n) return '0';
            return n > 0 ? `+${n.toLocaleString()}` : n.toLocaleString();
        };

        const formatSignedRate = (v) => {
            const n = Number(v || 0);
            if (!Number.isFinite(n) || n === 0) return '0.0%';
            return `${n > 0 ? '+' : ''}${n.toFixed(1)}%`;
        };

        const buildRowReport = ({ row, mItem, issueText, issueSubText, latestHistory, compareSummary, marginInfo, stockQty, safeStock, promoActive }) => {
            const lines = [];
            const oldIn = window.parseNum(mItem?.['입고가']);
            const newIn = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : (row.sources?.estimate?.['입고가'] ?? row.sources?.inventory?.['입고가'] ?? oldIn));
            if (latestHistory) {
                const catalog = normalizeHistoryCatalog(latestHistory) || '파서';
                const oldVal = latestHistory.oldVal ?? latestHistory.oldInPrice ?? oldIn;
                const newVal = latestHistory.newVal ?? latestHistory.parsedInPrice ?? newIn;
                const diff = latestHistory.diff !== undefined ? Number(latestHistory.diff) : (window.parseNum(newVal) - window.parseNum(oldVal));
                const rate = latestHistory.diffRate !== undefined ? Number(latestHistory.diffRate) : (window.parseNum(oldVal) > 0 ? (diff / window.parseNum(oldVal)) * 100 : 0);
                const match = latestHistory.matchStatus || latestHistory.applyMode || '';
                lines.push(`${catalog} ${window.parseNum(oldVal).toLocaleString()}→${window.parseNum(newVal).toLocaleString()}`);
                lines.push(`${formatSignedNumber(diff)} / ${formatSignedRate(rate)}${match ? `, ${match}` : ''}`);
            } else if (getRowCatalogNames(row, mItem).length > 0 && issueText === '가격변동') {
                lines.push('카탈로그 태그 있음');
                lines.push('최근 입고가 변경근거 없음');
            }

            if (compareSummary?.hasDiff && lines.length < 2) {
                lines.push(`비교단가: ${compareSummary.summary}`);
            }

            if (issueText === '행사제안' && lines.length < 2) {
                lines.push(`행사제안: ${issueSubText || '조건 충족'}`);
                if (stockQty !== null && safeStock > 0) lines.push(`재고 ${stockQty.toLocaleString()} / 안전 ${safeStock.toLocaleString()}`);
            }

            if (promoActive && marginInfo.rate !== null && marginInfo.rate < 0) {
                lines.splice(0, 0, '행사가 < 입고가');
                lines.splice(1, 0, '역마진 확인 필요');
            } else if (promoActive && ['품절', '품절임박'].includes(issueSubText)) {
                lines.splice(0, 0, `행사중 ${issueSubText}`);
                if (stockQty !== null && safeStock > 0) lines.splice(1, 0, `재고 ${stockQty.toLocaleString()} / 안전 ${safeStock.toLocaleString()}`);
            }

            if (issueText === '정지대기') {
                return ['판매정지 대기', 'F8/출력센터 저장 시 반영'];
            }

            if (lines.length === 0) {
                if (marginInfo.rate !== null) return [`마진 ${marginInfo.rate.toFixed(1)}%`, marginInfo.isPromo ? '행사가 기준' : '출고가 기준'];
                return ['특이사항 없음', ''];
            }
            return lines.slice(0, 2);
        };


        const EditableCell = React.memo(({ row, field, linkedMasterField, mVal, config, data, isSel, extraClass = '' }) => {
            const isComparePrice = config.uploadColumnMeta?.[field]?.type === 'comparePrice';
            const isNumeric = isComparePrice || window.NUMERIC_HEADERS.includes(linkedMasterField) || window.NUMERIC_HEADERS.includes(field);
            const initialVal = row.finalData?.[field] !== undefined ? row.finalData[field] : (mVal !== undefined ? mVal : '');
            const [localVal, setLocalVal] = useState(initialVal);

            useEffect(() => { setLocalVal(initialVal); }, [initialVal]);

            const isDiff = linkedMasterField && mVal !== undefined && localVal !== '' && String(mVal) !== String(localVal) && isNumeric;
            const isHighlightCol = ['입고가', '출고가', '행사가'].includes(field);
            
            const isSuspicious = isNumeric && localVal !== '' && localVal !== undefined && isNaN(Number(String(localVal).replace(/,/g, '')));

            let baseBg = 'bg-white'; 
            let textClass = isNumeric ? 'text-right font-bold text-slate-700' : 'text-center text-slate-700';

            if (isHighlightCol) baseBg = 'bg-white';
            if (isDiff) {
                baseBg = 'bg-amber-50';
                textClass = isNumeric ? 'text-right font-bold text-amber-800' : 'text-center text-amber-800';
            }
            if (isSuspicious) {
                baseBg = '!bg-rose-100';
                textClass = isNumeric ? 'text-right font-black !text-rose-800' : 'text-center font-black !text-rose-800';
            }

            const commitChange = (v) => {
                if (String(v) === String(initialVal)) return;
                data.setManagedItems(prev => {
                    const code = row.코드;
                    let currentItem = prev[code] || { 코드: code, sources: {}, finalData: {} };
                    
                    if (currentItem.sources.estimate) currentItem.sources.estimate[field] = isNumeric ? window.parseNum(v) : v;
                    if (currentItem.sources.inventory) currentItem.sources.inventory[field] = isNumeric ? window.parseNum(v) : v;

                    currentItem.finalData = { ...currentItem.finalData, [field]: v };
                    
                    if (['입고가', '출고가', '외주비', '노무비', '행사가'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        const actionField = linkedMasterField || field;

                        if (actionField === '입고가' || field === '입고가') {
                            const preferredSourceKey = currentItem.sources.estimate ? 'estimate' : (currentItem.sources.inventory ? 'inventory' : 'estimate');
                            currentItem.sources[preferredSourceKey] = { ...(currentItem.sources[preferredSourceKey] || {}), 입고가: window.parseNum(v) };

                            if (window.recalculateOnInPriceChange) {
                                const recalc = window.recalculateOnInPriceChange(
                                    data.masterProducts[code] || {},
                                    currentItem.sources,
                                    config.marginRules,
                                    window.parseNum(v),
                                    currentItem.finalData || {},
                                    preferredSourceKey
                                );
                                currentItem.sources = recalc.sources;
                                currentItem.finalData = { ...(recalc.finalData || {}), [field]: isNumeric ? window.parseNum(v) : v };
                            } else {
                                currentItem.finalData = window.computeFinalData(data.masterProducts[code] || {}, currentItem.sources, config.marginRules, true);
                                currentItem.finalData['입고가'] = window.parseNum(v);
                            }
                            currentItem.finalData['_lastAction'] = '입고가변경_출고가자동연산';
                        } else {
                            currentItem.finalData = window.computeFinalData(data.masterProducts[code] || {}, currentItem.sources, config.marginRules);
                            if (field === '출고가' || linkedMasterField === '출고가') {
                                currentItem.finalData['출고가'] = window.parseNum(v);
                                currentItem.finalData['_lastAction'] = '출고가수동수정';
                            }
                            if (field === '행사가') {
                                currentItem.finalData['행사가'] = window.parseNum(v);
                                currentItem.finalData['_lastAction'] = '행사가수동지정';
                            }
                        }
                    }
                    return { ...prev, [code]: currentItem };
                });
            };

            const focusGridInput = (targetInput) => {
                if (!targetInput) return false;
                targetInput.focus();
                targetInput.select();
                return true;
            };

            const findNextEditableInput = (td, tr, tbody, rowIdx, colIdx, direction) => {
                const trs = Array.from(tbody.children).filter(rowEl => rowEl.querySelector('input'));
                const safeRowIdx = trs.indexOf(tr);
                if (safeRowIdx < 0) return null;

                if (direction === 'down' || direction === 'up') {
                    const nextRowIdx = direction === 'down'
                        ? Math.min(trs.length - 1, safeRowIdx + 1)
                        : Math.max(0, safeRowIdx - 1);
                    return trs[nextRowIdx]?.children[colIdx]?.querySelector('input') || null;
                }

                const flatInputs = trs.flatMap(rowEl => Array.from(rowEl.querySelectorAll('input')));
                const currentInput = td.querySelector('input');
                const currentIdx = flatInputs.indexOf(currentInput);
                if (currentIdx < 0) return null;

                const nextIdx = direction === 'next'
                    ? Math.min(flatInputs.length - 1, currentIdx + 1)
                    : Math.max(0, currentIdx - 1);
                return flatInputs[nextIdx] || null;
            };

            const handleKeyDown = (e) => {
                if (!['ArrowUp', 'ArrowDown', 'Enter', 'Tab'].includes(e.key)) return;

                e.preventDefault();
                const td = e.target.closest('td');
                const tr = td?.closest('tr');
                const tbody = tr?.closest('tbody');
                if (!td || !tr || !tbody) return;

                e.target.blur();
                const tds = Array.from(tr.children);
                const colIdx = tds.indexOf(td);
                const trs = Array.from(tbody.children);
                const rowIdx = trs.indexOf(tr);

                let direction = 'down';
                if (e.key === 'ArrowUp') direction = 'up';
                if (e.key === 'Tab') direction = e.shiftKey ? 'prev' : 'next';
                if (e.key === 'Enter' || e.key === 'ArrowDown') direction = 'down';

                const nextInput = findNextEditableInput(td, tr, tbody, rowIdx, colIdx, direction);
                focusGridInput(nextInput);
            };

            return (
                <td className={`px-1 py-1 border-r border-slate-200 ${extraClass} ${getCellWidthClass(linkedMasterField || field)} ${baseBg} ${isSel ? '!bg-indigo-100/70' : 'group-hover:!bg-slate-50'} transition-colors relative`}>
                    <div className="flex flex-col justify-center h-full">
                        <div className={`flex items-center w-full ${isNumeric ? 'justify-end' : 'justify-center'}`}>
                            <input 
                                type="text" 
                                className={`w-full bg-transparent hover:bg-white/60 focus:bg-white focus:ring-1 focus:ring-indigo-300 rounded px-1.5 outline-none ${textClass} text-[12px] py-1`} 
                                value={localVal} 
                                placeholder={mVal || ''} 
                                onChange={(e) => setLocalVal(e.target.value)} 
                                onBlur={(e) => commitChange(e.target.value)} 
                                onKeyDown={handleKeyDown} 
                                onClick={(e) => e.target.select()} 
                            />
                        </div>
                    </div>
                </td>
            );
        });

        const MemoizedTableRow = React.memo(({ row, idx, state, actions, isSel, mItem }) => {
            const { isEstimateUploaded, visibleMasterCols, visibleUploadCols, config, data } = state;
            const requiredCoreFields = ['품목코드', '품목명', '규격'];
            
            const uploadName = row.finalData?.['품목명'] !== undefined ? row.finalData['품목명'] : '';
            const uploadSpec = row.finalData?.['규격'] !== undefined ? row.finalData['규격'] : '';
            const dName = uploadName || mItem.품목명 || '[미등록]';
            const dSpec = uploadSpec || mItem.규격 || '';

            const oldP = window.parseNum(mItem['입고가']);
            const newP = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : (row.sources?.['estimate']?.['입고가'] ?? row.sources?.['inventory']?.['입고가'] ?? oldP));
            const diffAmount = newP - oldP;
            const diffRate = oldP > 0 && newP > 0 ? (diffAmount / oldP) * 100 : 0;
            const marginInfo = getMarginInfo(row, mItem);
            const marginText = marginInfo.rate !== null ? `마진 ${marginInfo.rate.toFixed(1)}%` : '마진 -';
            const marginToneClass = getMarginToneClass(marginInfo.rate);
            const salesState = window.getMasterSalesState(mItem);
            const isStopPending = row.finalData?._salesStopRequested === true || String(row.finalData?.['판매여부']) === '0';
            const isStopped = salesState.code === '0' || isStopPending;
            const promoActive = isPromoActive(row);
            const stockQty = getStockQty(row, mItem);
            const safeStock = getSafeStock(mItem);

            let issueText = '-';
            let issueSubText = marginText;
            let issueCellBg = 'bg-white'; 
            let issueTextColor = 'text-slate-500';

            if (isEstimateUploaded) {
                const isSpike = oldP > 0 && newP > 0 && (Math.abs(diffAmount) / oldP >= 0.3 || Math.abs(diffAmount) >= 1000);
                if (isStopPending) {
                    issueText = '정지대기';
                    issueSubText = marginText;
                    issueCellBg = 'bg-white';
                    issueTextColor = 'text-rose-700';
                } else if (promoActive) {
                    issueText = '행사중';
                    issueTextColor = 'text-purple-700';
                    issueCellBg = 'bg-white';
                    if (stockQty === 0) {
                        issueSubText = '품절';
                        issueTextColor = 'text-rose-700';
                        issueCellBg = 'bg-white';
                    } else if (stockQty !== null && safeStock > 0 && stockQty < safeStock) {
                        issueSubText = '품절임박';
                        issueTextColor = 'text-amber-700';
                        issueCellBg = 'bg-white';
                    } else if (marginInfo.rate !== null && marginInfo.rate < 0) {
                        issueSubText = '역마진';
                        issueTextColor = 'text-rose-700';
                        issueCellBg = 'bg-white';
                    }
                } else if (isPromoSuggestion(row, mItem, config)) {
                    issueText = '행사제안';
                    issueSubText = getPromoSuggestionReason(row, mItem, config) || marginText;
                    issueTextColor = 'text-fuchsia-700';
                    issueCellBg = 'bg-white';
                } else if (!mItem.코드) {
                    issueText = '신규등록';
                    issueSubText = marginText;
                    issueTextColor = 'text-emerald-600';
                } else if (oldP === 0 && newP > 0) {
                    issueText = '신규/재입고';
                    issueSubText = marginText;
                    issueTextColor = 'text-emerald-600';
                } else if (oldP > 0 && newP === 0) {
                    issueText = '품절/단종';
                    issueSubText = marginText;
                    issueTextColor = 'text-slate-500';
                } else if (oldP > 0 && newP > 0 && newP !== oldP) {
                    issueText = '가격변동';
                    const diffLabel = diffAmount > 0 ? `기준 +${diffAmount.toLocaleString()}` : `기준 ${diffAmount.toLocaleString()}`;
                    issueSubText = isSpike ? `${diffLabel} · ${Math.round(diffRate)}%` : `${diffLabel} · ${marginText}`;
                    issueTextColor = diffAmount > 0 ? 'text-rose-600' : 'text-blue-600';
                    issueCellBg = 'bg-white';
                }
            }

            const compareSummary = getComparePriceSummary(row, config);
            if (compareSummary.hasDiff) {
                if (issueText === '-' || issueText === '가격변동') {
                    issueText = issueText === '-' ? '단가확인' : issueText;
                    issueSubText = compareSummary.summary;
                    issueTextColor = issueText === '단가확인' ? 'text-violet-700' : issueTextColor;
                    issueCellBg = 'bg-white';
                } else if (!['품절', '품절임박', '역마진'].includes(issueSubText)) {
                    issueSubText = compareSummary.summary;
                }
            }

            if ((issueText === '-' || !issueText) && marginInfo.rate !== null) {
                issueSubText = marginText;
            }

            const issueBadgeClassMap = {
                '가격변동': 'bg-amber-50 text-amber-700 border-amber-200',
                '단가확인': 'bg-sky-50 text-sky-700 border-sky-200',
                '행사중': 'bg-violet-50 text-violet-700 border-violet-200',
                '행사제안': 'bg-emerald-50 text-emerald-700 border-emerald-200',
                '정지대기': 'bg-rose-50 text-rose-700 border-rose-200',
                '신규등록': 'bg-emerald-50 text-emerald-700 border-emerald-200',
                '신규/재입고': 'bg-emerald-50 text-emerald-700 border-emerald-200',
                '품절/단종': 'bg-slate-100 text-slate-600 border-slate-200',
                '-': 'bg-slate-50 text-slate-500 border-slate-200'
            };
            if (['품절', '품절임박', '역마진'].includes(issueSubText)) {
                issueBadgeClassMap[issueText] = issueSubText === '품절임박'
                    ? 'bg-orange-50 text-orange-700 border-orange-200'
                    : 'bg-rose-50 text-rose-700 border-rose-200';
            }
            const issueBadgeClass = issueBadgeClassMap[issueText] || 'bg-slate-50 text-slate-600 border-slate-200';
            const latestParserHistory = findLatestParserHistory(row.코드, getRowCatalogNames(row, mItem), '입고가');
            const reportLines = buildRowReport({ row, mItem, issueText, issueSubText, latestHistory: latestParserHistory, compareSummary, marginInfo, stockQty, safeStock, promoActive });
            const reportTone = reportLines.some(t => String(t).includes('역마진') || String(t).includes('근거 없음') || String(t).includes('근거없음')) ? 'text-rose-700' : (latestParserHistory ? 'text-slate-700' : 'text-slate-500');
            return (
                <tr className={`group border-b border-slate-200 transition-all hover:bg-slate-50 relative z-0 hover:z-10 ${isStopped ? 'opacity-70 bg-slate-50' : ''}`}>
                    
                    <td className={`sticky z-20 px-3 py-2 border-r border-r-slate-200 transition-colors min-w-[280px] w-[280px] max-w-[280px] ${isSel ? '!bg-indigo-100/70 border-l-4 !border-l-indigo-500' : 'bg-white group-hover:!bg-slate-50 border-l-4 border-l-transparent group-hover:!border-l-slate-300'}`} style={{left: 0}}>
                        <div className="flex gap-2 items-center w-full min-w-0">
                            {isEstimateUploaded && (
                                <input type="checkbox" className="w-4 h-4 rounded border-slate-300 cursor-pointer shrink-0 text-indigo-600 focus:ring-indigo-500" checked={isSel} onChange={() => {const n = new Set(state.selectedRows); n.has(row.코드)?n.delete(row.코드):n.add(row.코드); actions.setSelectedRows(n);}} />
                            )}
                            <div className="flex flex-col min-w-0 w-full overflow-hidden ml-1">
                                <span className="text-[10px] font-mono mb-0.5 truncate block w-full text-indigo-400">{row.코드}</span>
                                <div className="flex items-center w-full min-w-0 overflow-hidden">
                                    <span className={`text-[13px] font-extrabold truncate block shrink ${!mItem.품목명 ? 'text-rose-500' : 'text-slate-800'}`} title={dName}>{dName}</span>
                                    {dSpec && <span className="text-[11px] text-slate-400 truncate block shrink-0 ml-1 max-w-[40%]" title={dSpec}>({dSpec})</span>}
                                </div>
                            </div>
                        </div>
                    </td>

                    {!isEstimateUploaded ? (
                        visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => {
                            let mVal = mItem[h];
                            let salesClassName = '';
                            if (h === '판매여부') {
                                const sState = window.getMasterSalesState(mItem);
                                mVal = sState.text;
                                salesClassName = sState.className;
                            } else {
                                const isNum = window.NUMERIC_HEADERS.includes(h);
                                mVal = mVal !== undefined && mVal !== '' ? (isNum ? window.parseNum(mVal).toLocaleString() : mVal) : '-';
                            }
                            const isNum = window.NUMERIC_HEADERS.includes(h);
                            return (
                                <td key={`idle-td-${h}`} className={`px-2 py-1.5 border-r border-slate-200 text-slate-600 ${getCellWidthClass(h)} ${isNum ? 'text-right font-bold' : 'text-center'} ${isSel ? '!bg-indigo-100/70' : 'bg-white group-hover:!bg-slate-50'}`}>
                                    <div className={`truncate w-full ${h === '판매여부' ? salesClassName : ''}`}>{mVal}</div>
                                </td>
                            );
                        })
                    ) : (
                        <>
                            {visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map((h, i, arr) => {
                                const isNum = window.NUMERIC_HEADERS.includes(h); 
                                let mVal = mItem[h]; 
                                let isChanged = false;
                                
                                if (row.finalData && row.finalData[h] !== undefined) { 
                                    if (isNum && window.parseNum(row.finalData[h]) !== window.parseNum(mVal)) { isChanged = true; }

        const WelcomeGuide = ({ onUpload, onCloudSync }) => (

                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-emerald-600 transition-colors">ERP의 전체 상품 마스터 파일을 업로드합니다.</p>

                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-indigo-600 transition-colors">구글 시트에 백업된 마스터를 수동으로 가져옵니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-purple-50 hover:border-purple-200 cursor-pointer relative overflow-hidden" onClick={() => window.location.href = 'SmartParser.html'}>
                        <div className="text-4xl text-purple-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-magic"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-purple-800 transition-colors">3. 스마트 파서로 이동</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-purple-600 transition-colors">텍스트 기반의 카탈로그 델타 동기화 전용 뷰로 이동합니다.</p>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            const availableCatalogs = useMemo(() => { 
                const counts = {}; 
                Object.values(data.masterProducts).forEach(m => {
                    const str = String(m['카탈로그']||'').trim();
                    if(str) {
                        str.split(',').map(s=>s.trim()).filter(Boolean).forEach(t => counts[t] = (counts[t] || 0) + 1);
                    }
                }); 
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] })); 
            }, [data.masterProducts]);
            
            const availableCategories = useMemo(() => { 
                const counts = {}; 
                Object.values(data.masterProducts).forEach(m => {
                    const str = String(m['견적서']||m['카테고리']||'').trim();
                    if(str) {
                        str.split(',').map(s=>s.trim()).filter(Boolean).forEach(t => counts[t] = (counts[t] || 0) + 1);
                    }
                }); 
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] })); 
            }, [data.masterProducts]);

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                if (isEstimateUploaded) { 
                    baseList = Object.values(data.managedItems); 
                } else { 
                    baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} }); 
                }

                if (ui.globalSearch) {
                    const tokens = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ').split(/\s+/).filter(t => t.length > 0);
                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {}; 
                            const finalItem = item.finalData || {};
                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (mItem[key] || '')).toLowerCase();
                            
                            const cName = getVal('품목명');
                            const cSpec = getVal('규격');
                            const cVendor = getVal('구매처');
                            const cCode = String(item.코드 || '').toLowerCase();
                            
                            let score = 0; 
                            tokens.forEach(token => { 
                                if (cName.includes(token)) score += 10; 
                                else if (cCode.includes(token)) score += 8; 
                                else if (cVendor.includes(token)) score += 6; 
                                else if (cSpec.includes(token)) score += 5; 
                            });
                            return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0);
                        baseList.sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else { 
                    baseList.sort((a, b) => String(a.코드).localeCompare(String(b.코드))); 
                }

                if (ui.priceFilter !== 'all') {
                    baseList = baseList.filter(item => {
                        const mItem = data.masterProducts[item.코드] || {};
                        const oldIn = window.parseNum(mItem['입고가']);
                        const newIn = window.parseNum(item.finalData?.['입고가'] !== undefined ? item.finalData['입고가'] : (item.sources?.['estimate']?.['입고가'] ?? item.sources?.['inventory']?.['입고가']));
                        const oldOut = window.parseNum(mItem['출고가']);
                        const newOut = window.parseNum(item.finalData?.['출고가'] !== undefined ? item.finalData['출고가'] : (item.sources?.['estimate']?.['출고가'] ?? item.sources?.['inventory']?.['출고가']));
                        const oldPromo = window.parseNum(mItem['행사가']);
                        const newPromo = window.parseNum(item.finalData?.['행사가'] !== undefined ? item.finalData['행사가'] : (item.sources?.['estimate']?.['행사가'] ?? item.sources?.['inventory']?.['행사가']));

                        if (ui.priceFilter === 'changed') {
                            return (oldIn > 0 && newIn > 0 && oldIn !== newIn) || (oldOut > 0 && newOut > 0 && oldOut !== newOut) || oldPromo !== newPromo;
                        }
                        if (ui.priceFilter === 'promo') return isPromoActive(item);
                        if (ui.priceFilter === 'promoSuggest') return isPromoSuggestion(item, mItem, config);
                        if (ui.priceFilter === 'basic') return matchBasicFilter(mItem, ui.basicSearch);
                        return true;
                    });
                }
                return baseList;
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, ui.priceFilter, ui.basicSearch, config.uploadColumnMeta]);

            const customActions = useMerchActions(config, data, ui, fullDisplayRows);
            
            const appState = useMemo(() => ({
                config, data, activeTags: ui.activeTags, isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, isProcessing: ui.isProcessing, processMsg: ui.processMsg,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, fullDisplayRows, priceFilter: ui.priceFilter, basicSearch: ui.basicSearch
            }), [config, data, ui.activeTags, isEstimateUploaded, ui.selectedRows, ui.globalSearch, ui.isProcessing, ui.processMsg, config.visibleMasterCols, config.visibleUploadCols, data.masterProducts, fullDisplayRows, ui.priceFilter, ui.basicSearch]);
            
            const appActions = useMemo(() => ({
                setShowCategoryModal: ui.setShowCategoryModal, setSelectedRows: ui.setSelectedRows, setGlobalSearch: ui.setGlobalSearch, showToast: ui.showToast, setPriceFilter: ui.setPriceFilter, setBasicSearch: ui.setBasicSearch, ...customActions
            }), [ui.setShowCategoryModal, ui.setSelectedRows, ui.setGlobalSearch, ui.showToast, ui.setPriceFilter, ui.setBasicSearch, customActions]);

            useEffect(() => {
                // ============================================================
                // [M-UX-01] 전역 키보드 조작
                // 역할: F3 검색, ESC 해제, 방향키 행 이동, Tab 셀 이동, F8/F9 업무 단축키를 처리한다.
                // 주의: 입력창/모달에서는 브라우저 기본 조작과 충돌하지 않도록 우선순위를 제한한다.
                // ============================================================
                const handleGlobalKeyDown = (e) => {
                    const activeEl = document.activeElement;
                    const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeEl?.tagName);
                    const hasModal = document.querySelector('[role="dialog"], .modal, .fixed.inset-0');
                    
                    if (e.key === 'F3') {
                        e.preventDefault();
                        const searchEl = document.getElementById('merch-global-search');
                        if (searchEl) {
                            searchEl.focus();
                            searchEl.select();
                            appActions.showToast('🔎 검색창으로 이동했습니다.');
                        }
                        return;
                    }

                    if (e.key === 'Escape') {
                        if (isInput) {
                            activeEl.blur();
                            return;
                        }
                        if (!hasModal && appState.selectedRows.size > 0) {
                            e.preventDefault();
                            appActions.setSelectedRows(new Set());
                            appActions.showToast('선택을 해제했습니다.');
                        }
                        return;
                    }

                    if (!isInput && !hasModal && ['ArrowDown', 'ArrowUp'].includes(e.key)) {
                        e.preventDefault();
                        const rows = appState.fullDisplayRows || [];
                        if (rows.length === 0) return;
                        const selectedList = Array.from(appState.selectedRows || []);
                        const currentCode = selectedList.length ? selectedList[selectedList.length - 1] : null;
                        const currentIdx = rows.findIndex(r => r.코드 === currentCode);
                        const nextIdx = e.key === 'ArrowDown'
                            ? Math.min((currentIdx < 0 ? -1 : currentIdx) + 1, rows.length - 1)
                            : Math.max((currentIdx < 0 ? rows.length : currentIdx) - 1, 0);
                        const nextCode = rows[nextIdx]?.코드;
                        if (nextCode) appActions.setSelectedRows(new Set([nextCode]));
                        return;
                    }

                    if (!isInput && !hasModal && e.key === 'Enter') {
                        const rows = appState.fullDisplayRows || [];
                        if (rows.length > 0 && appState.selectedRows.size === 0) {
                            e.preventDefault();
                            appActions.setSelectedRows(new Set([rows[0].코드]));
                            return;
                        }
                    }
                    
                    if (e.key === 'F8') { 
                        e.preventDefault(); 
                        if (isInput) activeEl.blur(); 
                        if (!appState.isProcessing && appState.fullDisplayRows.length > 0) { 
                            appActions.handleCommitEstimate(); 
                        } 
                        else if(appState.fullDisplayRows.length === 0) appActions.showToast("⚠️ [F8] 반영할 데이터가 화면에 없습니다."); 
                    }
                    else if (e.key === 'F9') { 
                        e.preventDefault(); 
                        if (isInput) activeEl.blur(); 
                        if (!appState.isProcessing) appActions.handleOpenExportCenter(); 
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [appState.isProcessing, appState.fullDisplayRows, appState.selectedRows, appActions]);

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css'); 
                        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; overflow: hidden; } 
                        ::-webkit-scrollbar { width: 8px; height: 8px; } 
                        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } 
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; } 
                        .fade-in { animation: fadeIn 0.3s ease-out; } 
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                    `}</style>

                    {ui.alertMsg && (
                        <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i>
                            <span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span>
                            <button onClick={() => ui.setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>
                    )}
                    
                    {ui.toastMsg && (
                        <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-4">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-emerald-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center mb-0.5">
                                                    <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v1.6 통합 버전</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">MAIN WORKSPACE</span>
                                            </div>
                                        </div>
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} estimateCount={Object.keys(data.managedItems).length} activeTags={ui.activeTags} />
                                        
                                        <nav className="flex gap-1.5 text-[14px] shrink-0 items-center">
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" target="_blank" rel="noopener noreferrer" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">
                                                GUIDE
                                            </a>
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/trend_report" target="_blank" rel="noopener noreferrer" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-blue-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-blue-300 hover:border-blue-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="트렌드 리포트">
                                                REPORT
                                            </a>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt text-[13px]"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt text-[13px]"></i></button>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={() => window.location.href = 'HistoryViewer.html'} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-amber-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-amber-400 hover:border-amber-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="작업 히스토리 뷰어"><i className="fas fa-history text-[13px]"></i></button>
                                            <button onClick={() => window.location.href = 'ControlTower.html'} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정 콘트롤 타워"><i className="fas fa-cogs opacity-80 text-[13px]"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar state={appState} actions={appActions} availableCatalogs={availableCatalogs} availableCategories={availableCategories} />
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100 mt-4">
                            {isMasterEmpty ? (
                                <WelcomeGuide onUpload={(e) => customActions.handleFileUpload(e, 'master')} onCloudSync={customActions.handleCloudSync} />
                            ) : (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>
                    
                    {ui.showCategoryModal && <CategorySaveModal onClose={() => ui.setShowCategoryModal(false)} onSave={customActions.handleSaveAsCategory} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
