        // ============================================================
        // [E-ENGINE-01] 최종검증센터 계산출고가 엔진
        // 역할: reviewRows 단계에서 입고가/외주비/노무비/창고/단위/마진룰 기준 계산출고가를 산출한다.
        // coreEngine.js의 공통 Pricing Engine으로 위임한다.
        // ============================================================
        const calculateReviewOutPrice = window.ONEAPP.PRICING.calculateReviewOutPrice;

        const ExportApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [reviewRows, setReviewRows] = useState([]);
            const [marginRules] = useState(() => safeJSONParse('merchMarginRules_v878', [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]));
            const [activeIssue, setActiveIssue] = useState('all');
            const [activeC1, setActiveC1] = useState(null);
            const [activeC2, setActiveC2] = useState(null);
            const [sortMode, setSortMode] = useState('category');
            const [searchInput, setSearchInput] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState('');

            const showToast = useCallback((msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => setSearchTerm(searchInput.trim()), 250);
                return () => clearTimeout(timer);
            }, [searchInput]);

            useEffect(() => {
                // ============================================================
                // [E-FLOW-01] 최종검증센터 데이터 로드
                // 역할: merch_export_draft만 작업 대상으로 읽고, 해당 code에 대해서만 masterProducts를 기준정보로 참조한다.
                // 금지: master_products 전체를 reviewRows 작업대상으로 전환하지 않는다.
                // ============================================================
                const loadData = async () => {
                    setIsProcessing(true);
                    try {
                        const items = await getAllIDB('master_products');
                        const masterDict = {};
                        items.forEach(i => { if (i && i.코드) masterDict[i.코드] = i; });
                        setMasterProducts(masterDict);

                        const rawDraft = await getIDB('merch_export_draft') || [];
                        const exportDraft = Array.isArray(rawDraft) ? rawDraft : [];

                        const rows = exportDraft.map(draft => {
                            const code = draft.코드;
                            const working = draft.working || draft || {};
                            const baseline = draft.baselineSnapshot || {};
                            const source = draft.source || {};
                            const master = masterDict[code] || {};

                            const 기준입고가 = parseNum(master['입고가'] ?? baseline.기준입고가 ?? 0);
                            const 기준출고가 = parseNum(master['출고가'] ?? baseline.기준출고가 ?? 0);
                            const 기준시중가 = parseNum(master['시중가'] ?? baseline.기준시중가 ?? 0);
                            const 기준판매여부 = String(master['판매여부'] ?? baseline.기준판매여부 ?? '-');

                            const 입고가 = parseNum(working.입고가);
                            const 불러온출고가 = parseNum(working.출고가);
                            const 계산출고가 = calculateReviewOutPrice(입고가, { ...master, ...working }, marginRules);
                            const 출고가 = 불러온출고가 > 0 ? 불러온출고가 : 계산출고가;
                            const 행사가 = parseNum(working.행사가);
                            const 최종출고가 = 행사가 > 0 ? 행사가 : 출고가;
                            const rawStock = working.재고수량;
                            const 재고수량 = (rawStock !== undefined && rawStock !== null && rawStock !== '') ? parseNum(rawStock) : 999;

                            return {
                                코드: code,
                                품목명: working.품목명 || master['품목명'] || '',
                                규격: working.규격 || master['규격'] || '',
                                품목코드: working.품목코드 || baseline.품목코드 || master['품목코드'] || code,
                                '1코드': working['1코드'] || baseline['1코드'] || master['1코드'] || '',
                                '1그룹명': working['1그룹명'] || baseline['1그룹명'] || master['1그룹명'] || '',
                                '2코드': working['2코드'] || baseline['2코드'] || master['2코드'] || '',
                                '2그룹명': working['2그룹명'] || baseline['2그룹명'] || master['2그룹명'] || '',
                                카탈로그: working.카탈로그 || baseline.카탈로그 || master['카탈로그'] || '',
                                견적서: working.견적서 || baseline.견적서 || master['견적서'] || '',
                                기본: working.기본 || baseline.기본 || master['기본'] || '',
                                브랜드: working.브랜드 || master['브랜드'] || '',
                                간단설명: working.간단설명 || master['간단설명'] || '',
                                카테고리: working.카테고리 || master['견적서'] || master['카테고리'] || '일반 상품목록',
                                검색어등록: working.검색어등록 || master['검색어등록'] || '',
                                기준입고가,
                                기준출고가,
                                기준시중가,
                                기준판매여부,
                                판매여부: working.판매여부 !== undefined && working.판매여부 !== '' ? working.판매여부 : 기준판매여부,
                                입고가,
                                불러온출고가,
                                계산출고가,
                                출고가,
                                행사가,
                                최종출고가,
                                도매A: parseNum(working.도매A),
                                도매B: parseNum(working.도매B),
                                시중가: parseNum(working.시중가 || 기준시중가),
                                입고B: parseNum(working.입고B),
                                '1종코드': working['1종코드'] || master['1종코드'] || '',
                                '1종규격': working['1종규격'] || master['1종규격'] || '',
                                '1종연산': parseNum(working['1종연산'] ?? master['1종연산']),
                                '경비': parseNum(working['경비'] ?? master['경비']),
                                '외주비': parseNum(working['외주비'] ?? master['외주비']),
                                '노무비': parseNum(working['노무비'] ?? master['노무비']),
                                재고수량,
                                행사지정: parseNum(working.행사지정 || working._theme || baseline.행사지정 || master['행사지정'] || 0),
                                테마1: working.테마1 || baseline.테마1 || master['테마1'] || '',
                                테마2: working.테마2 || baseline.테마2 || master['테마2'] || '',
                                테마3: working.테마3 || baseline.테마3 || master['테마3'] || '',
                                테마4: working.테마4 || baseline.테마4 || master['테마4'] || '',
                                테마5: working.테마5 || baseline.테마5 || master['테마5'] || '',
                                source
                            };
                        }).filter(row => row.코드);

                        setReviewRows(rows);
                    } catch (e) {
                        console.error('[Export Center Load Error]', e);
                        showToast('❌ 최종검증센터 데이터 로드 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                };
                loadData();
            }, [showToast, marginRules]);

            // ============================================================
            // [E-FLOW-02] 검증센터 단가/작업값 수정
            // 역할: 입고가/출고가/행사가 수정 시 계산출고가와 최종 적용 가격을 즉시 갱신한다.
            // 정책: 입고가 변경은 계산출고가를 출고가에 자동 반영하지만, 행사가가 있으면 최종 가격은 행사가가 우선한다.
            // ============================================================
            const handleEdit = useCallback((code, field, value) => {
                setReviewRows(prev => prev.map(row => {
                    if (row.코드 !== code) return row;

                    const next = { ...row, [field]: value };

                    if (field === '입고가') {
                        const newIn = parseNum(value);
                        const calcOut = calculateReviewOutPrice(newIn, row, marginRules);
                        next.입고가 = newIn;
                        next.계산출고가 = calcOut;
                        // A안: 관리자는 입고가 기준으로 판단하므로, 입고가 수정 시 계산출고가를 최종 출고가에 자동 반영한다.
                        next.출고가 = calcOut;
                        next.최종출고가 = parseNum(row.행사가) > 0 ? parseNum(row.행사가) : calcOut;
                    } else if (field === '행사가') {
                        const newPromo = parseNum(value);
                        next.행사가 = newPromo;
                        next.최종출고가 = newPromo > 0 ? newPromo : parseNum(row.출고가);
                    } else if (field === '출고가') {
                        const newOut = parseNum(value);
                        next.출고가 = newOut;
                        next.최종출고가 = parseNum(row.행사가) > 0 ? parseNum(row.행사가) : newOut;
                    } else if (field === '행사지정') {
                        const themeNo = parseNum(value);
                        next.행사지정 = themeNo >= 1 && themeNo <= 5 ? themeNo : 0;
                        const themeCols = {};
                        for (let i = 1; i <= 5; i++) themeCols[`테마${i}`] = next.행사지정 === i ? 1 : '';
                        Object.assign(next, themeCols);
                    }

                    return next;
                }));
            }, [marginRules]);

            const getTodaySales = (row = {}) => parseNum(row.오늘판매량 ?? row.출고량 ?? row.최근출고량 ?? 0);
            const getCurrentStock = (row = {}) => parseNum(row.현재재고 ?? row.재고수량 ?? 0);
            const getStockAsset = (row = {}) => parseNum(row.재고자산 ?? row['기말재고액(자산가치)'] ?? 0);
            const hasLossIssue = (row = {}) => parseNum(row.로스수량) !== 0 || String(row.수량이슈 || '').trim() || String(row.수기메모 || '').trim();

            const getPromoReasons = (row = {}) => {
                if (window.ONEAPP?.REVIEW?.getPromoSuggestionReasons) {
                    try { return window.ONEAPP.REVIEW.getPromoSuggestionReasons(row); } catch(e) {}
                }
                const reasons = [];
                const stock = getCurrentStock(row);
                const safe = parseNum(row.안전재고);
                const baseIn = parseNum(row.기준시세입고가 || row.기준입고가);
                const inPrice = parseNum(row.입고가);
                const second = parseNum(row['2차벤더단가'] || row.비교단가최저가);
                if (safe > 0 && stock >= safe * 1.5) reasons.push('재고소진');
                if (baseIn > 0 && inPrice > 0 && (baseIn - inPrice >= 500 || ((baseIn - inPrice) / baseIn) * 100 >= 10)) reasons.push('단가하락');
                if (second > 0 && baseIn > 0 && second < baseIn) reasons.push('2차벤더유리');
                if (String(row.기본 || '').trim()) reasons.push('기준시세');
                return reasons;
            };

            const analysis = useMemo(() => {
                const result = {
                    total: reviewRows.length,
                    promoCandidate: 0,
                    promoActive: 0,
                    promoSold: 0,
                    promoNoSales: 0,
                    priceChanged: 0,
                    comparePrice: 0,
                    risk: 0,
                    reverse: 0,
                    soldout: 0,
                    lowStock: 0,
                    stopped: 0,
                    stockAsset: 0,
                    lossIssue: 0
                };

                reviewRows.forEach(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    const todaySales = getTodaySales(row);
                    const stock = getCurrentStock(row);
                    const promo = parseNum(row.행사가) > 0;
                    const reasons = getPromoReasons(row);
                    const priceChanged = isAnomaly(row) || (parseNum(row.기준출고가) > 0 && diff !== 0) || (parseNum(row.기준입고가) > 0 && parseNum(row.입고가) !== parseNum(row.기준입고가));
                    const compare = parseNum(row['2차벤더단가']) > 0 || parseNum(row.비교단가최저가) > 0 || String(row.비교단가요약 || '').trim();
                    const reverse = isMarginWarning(row);
                    const soldout = sale.label === '품절' || stock === 0;
                    const lowStock = isLowStock(row);
                    const stopped = sale.label === '정지중';
                    const lossIssue = hasLossIssue(row);
                    const asset = getStockAsset(row);

                    if (reasons.length > 0) result.promoCandidate++;
                    if (promo) {
                        result.promoActive++;
                        if (todaySales > 0) result.promoSold++;
                        if (todaySales === 0 && stock > 0) result.promoNoSales++;
                    }
                    if (priceChanged) result.priceChanged++;
                    if (compare) result.comparePrice++;
                    if (reverse) result.reverse++;
                    if (soldout) result.soldout++;
                    if (lowStock) result.lowStock++;
                    if (stopped) result.stopped++;
                    if (asset > 0) result.stockAsset++;
                    if (lossIssue) result.lossIssue++;
                    if (reverse || soldout || lowStock || stopped || lossIssue) result.risk++;
                });

                return result;
            }, [reviewRows]);

            const issueCards = useMemo(() => ([
                { key: 'all', label: '전체', count: analysis.total, sub: '작업대상 전체', icon: 'fa-list-check', cls: 'border-slate-200 bg-slate-50 text-slate-700' },
                { key: 'promoCandidate', label: '행사 후보', count: analysis.promoCandidate, sub: `재고/단가/시세`, icon: 'fa-bullhorn', cls: 'border-purple-200 bg-purple-50 text-purple-700' },
                { key: 'promoActive', label: '행사중 점검', count: analysis.promoActive, sub: `판매 ${analysis.promoSold} · 미판매 ${analysis.promoNoSales}`, icon: 'fa-store', cls: 'border-fuchsia-200 bg-fuchsia-50 text-fuchsia-700' },
                { key: 'priceChanged', label: '가격변동', count: analysis.priceChanged, sub: '기준가 대비 차이', icon: 'fa-arrow-trend-up', cls: 'border-rose-200 bg-rose-50 text-rose-700' },
                { key: 'comparePrice', label: '단가확인', count: analysis.comparePrice, sub: '비교/2차벤더', icon: 'fa-scale-balanced', cls: 'border-amber-200 bg-amber-50 text-amber-700' },
                { key: 'risk', label: '위험상품', count: analysis.risk, sub: `역 ${analysis.reverse} · 품 ${analysis.soldout} · 로스 ${analysis.lossIssue}`, icon: 'fa-triangle-exclamation', cls: 'border-red-200 bg-red-50 text-red-700' },
                { key: 'stockInsight', label: '재고 인사이트', count: analysis.stockAsset, sub: `자산 ${analysis.stockAsset} · 조정 ${analysis.lossIssue}`, icon: 'fa-boxes-stacked', cls: 'border-teal-200 bg-teal-50 text-teal-700' }
            ]), [analysis]);

            const baseFilteredRows = useMemo(() => {
                let rows = reviewRows.filter(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    const todaySales = getTodaySales(row);
                    const stock = getCurrentStock(row);
                    const promo = parseNum(row.행사가) > 0;
                    const reasons = getPromoReasons(row);
                    const priceChanged = isAnomaly(row) || (parseNum(row.기준출고가) > 0 && diff !== 0) || (parseNum(row.기준입고가) > 0 && parseNum(row.입고가) !== parseNum(row.기준입고가));
                    const compare = parseNum(row['2차벤더단가']) > 0 || parseNum(row.비교단가최저가) > 0 || String(row.비교단가요약 || '').trim();
                    const risk = isMarginWarning(row) || sale.label === '품절' || stock === 0 || isLowStock(row) || sale.label === '정지중' || hasLossIssue(row);
                    switch (activeIssue) {
                        case 'promoCandidate': return reasons.length > 0;
                        case 'promoActive': return promo;
                        case 'priceChanged': return priceChanged;
                        case 'comparePrice': return compare;
                        case 'risk': return risk;
                        case 'stockInsight': return getStockAsset(row) > 0 || hasLossIssue(row) || todaySales > 0;
                        // 기존 키 호환
                        case 'up': return parseNum(row.기준출고가) > 0 && diff > 0;
                        case 'down': return parseNum(row.기준출고가) > 0 && diff < 0;
                        case 'promo': return promo;
                        case 'soldout': return sale.label === '품절';
                        case 'stopped': return sale.label === '정지중';
                        case 'anomaly': return isAnomaly(row);
                        case 'margin': return isMarginWarning(row);
                        case 'new': return isNewItem(row);
                        case 'lowstock': return isLowStock(row);
                        default: return true;
                    }
                });

                const terms = searchTerm.toLowerCase().split(/\s+/).map(s => s.trim()).filter(Boolean);
                if (terms.length > 0) {
                    rows = rows.filter(row => {
                        const haystack = [
                            row.코드, row.품목코드, row.품목명, row.규격, row.브랜드, row.카테고리,
                            row['1그룹명'], row['2그룹명'], row.카탈로그, row.견적서,
                            row.간단설명, row.검색어등록, row.source?.sourceType, row.오늘판매량, row.현재재고,
                            row.재고자산, row.수량이슈, row.수기메모, ...(row.source?.tags || [])
                        ].join(' ').toLowerCase();
                        return terms.every(term => haystack.includes(term));
                    });
                }

                return rows;
            }, [reviewRows, activeIssue, searchTerm]);

            const reviewCategoryTree = useMemo(() => {
                return window.ONEAPP.REVIEW.buildReviewCategoryTree(baseFilteredRows);
            }, [baseFilteredRows]);

            const c1List = useMemo(() => window.ONEAPP.REVIEW.getReviewC1List(reviewCategoryTree), [reviewCategoryTree]);
            const c2List = useMemo(() => window.ONEAPP.REVIEW.getReviewC2List(reviewCategoryTree, activeC1), [reviewCategoryTree, activeC1]);

            useEffect(() => {
                if (c1List.length === 0) {
                    setActiveC1(null);
                    return;
                }
                if (!activeC1 || !c1List.some(c => c.code === activeC1)) {
                    setActiveC1(c1List[0].code);
                }
            }, [c1List, activeC1]);

            useEffect(() => {
                if (c2List.length === 0) {
                    setActiveC2(null);
                    return;
                }
                if (!activeC2 || !c2List.some(c => c.code === activeC2)) {
                    setActiveC2(c2List[0].code);
                }
            }, [c2List, activeC2]);

            const filteredRows = useMemo(() => {
                const rows = window.ONEAPP.REVIEW.getReviewItems(reviewCategoryTree, activeC1, activeC2);
                return window.ONEAPP.REVIEW.sortReviewItems(rows, sortMode, { getDiffInfo, parseNum });
            }, [reviewCategoryTree, activeC1, activeC2, sortMode]);

            const resetFilters = useCallback(() => {
                setActiveIssue('all');
                setSortMode('category');
                setSearchInput('');
                setSearchTerm('');
            }, []);

            const handleCardClick = useCallback((key) => {
                setActiveIssue(key);
                if (key === 'lowstock') setSortMode('stockAsc');
                else if (key === 'anomaly') setSortMode('diffRateDesc');
                else if (key === 'margin') setSortMode('diffAbsDesc');
                else setSortMode('category');
            }, []);


            const getPromoThemeColumns = useCallback((themeValue) => {
                const selected = parseNum(themeValue);
                const out = { 테마1: '', 테마2: '', 테마3: '', 테마4: '', 테마5: '' };
                if (selected >= 1 && selected <= 5) out[`테마${selected}`] = 1;
                return out;
            }, []);

            const getPromoThemeNo = useCallback((row = {}) => {
                const direct = parseNum(row.행사지정);
                if (direct >= 1 && direct <= 5) return direct;
                for (let i = 1; i <= 5; i++) {
                    if (parseNum(row[`테마${i}`]) === 1 || String(row[`테마${i}`] || '').trim() === '1') return i;
                }
                return 0;
            }, []);


            // ============================================================
            // [E-OUTPUT-02] 최종 마스터 반영 + 통합 엑셀 출력
            // 역할: reviewRows를 기준으로 마스터를 갱신하고 쇼핑몰업로드/ERP업데이트 시트를 생성한다.
            // 주의: 엑셀만 출력은 추적성이 떨어져 제외한다. 소분품목은 원물과 별도 행으로 건수에 포함한다.
            // ============================================================
            const handleExportExcel = useCallback(() => {
                if (reviewRows.length === 0) return showToast('⚠️ 출력할 데이터가 없습니다.');
                if (analysis.margin > 0 || analysis.anomaly > 0) {
                    if (!window.confirm(`역마진 ${analysis.margin}건, 오기의심 ${analysis.anomaly}건이 있습니다.\n관리자 확인 후 마스터에 반영하고 엑셀을 출력하시겠습니까?`)) return;
                }
                setIsProcessing(true);
                showToast('⏳ 마스터 반영 및 통합 엑셀 조립 중...');

                setTimeout(async () => {
                    try {
                        if (!window.XLSX) throw new Error('엑셀 라이브러리 없음');
                        const newMaster = { ...masterProducts };
                        const updatedItems = [];

                        reviewRows.forEach(item => {
                            const code = item.코드;
                            const sale = getSaleState(item);
                            const mItem = { ...(newMaster[code] || { 코드: code }) };
                            mItem['품목명'] = item.품목명;
                            mItem['규격'] = item.규격;
                            mItem['입고가'] = parseNum(item.입고가);
                            mItem['출고가'] = parseNum(item.출고가);
                            mItem['행사가'] = parseNum(item.행사가);
                            mItem['입고B'] = parseNum(item.입고B);
                            mItem['1종코드'] = item['1종코드'] || mItem['1종코드'] || '';
                            mItem['1종규격'] = item['1종규격'] || mItem['1종규격'] || '';
                            mItem['1종연산'] = parseNum(item['1종연산']);
                            mItem['경비'] = parseNum(item['경비']);
                            mItem['외주비'] = parseNum(item['외주비']);
                            mItem['노무비'] = parseNum(item['노무비']);
                            mItem['도매A'] = parseNum(item.도매A);
                            mItem['도매B'] = parseNum(item.도매B);
                            mItem['시중가'] = parseNum(item.시중가);
                            mItem['재고수량'] = parseNum(item.재고수량);
                            mItem['판매여부'] = sale.code;
                            mItem['브랜드'] = item.브랜드 || '';
                            mItem['간단설명'] = item.간단설명 || '';
                            mItem['검색어등록'] = item.검색어등록 || '';
                            mItem['행사지정'] = getPromoThemeNo(item) || '';
                            const themeColsForMaster = getPromoThemeColumns(mItem['행사지정']);
                            mItem['테마1'] = themeColsForMaster.테마1;
                            mItem['테마2'] = themeColsForMaster.테마2;
                            mItem['테마3'] = themeColsForMaster.테마3;
                            mItem['테마4'] = themeColsForMaster.테마4;
                            mItem['테마5'] = themeColsForMaster.테마5;
                            mItem['견적서'] = item.카테고리 || mItem['견적서'] || mItem['카테고리'] || '';
                            updatedItems.push(mItem);
                            newMaster[code] = mItem;
                        });

                        await bulkPutIDB('master_products', updatedItems);
                        setMasterProducts(newMaster);
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());

                        const wb = window.XLSX.utils.book_new();
                        const erpData = [['품목코드', '입고가', '0', '출고가', '0', '입고B', 'n', '도매A', 'n', '도매B', 'n', '최종(전송)', 'n', '행사', 'n', '1']];
                        const shopData = [['상품코드\n코드', '상품명', '규격', '출고가', '도매A', '시중가', '도매B', '도매B', 'C 판매가', 'C 도매가', 'D 판매가', 'D 도매가', '브랜드', '기본설명', '판매여부', '재고수량', '테마1', '테마2', '테마3', '테마4', '테마5', '상품태그']];

                        let subOutputCount = 0;
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            const inPrice = parseNum(item.입고가);
                            const finalOut = parseNum(item.최종출고가);
                            const pASale = parseNum(item.도매A);
                            const pMarket = parseNum(item.시중가);
                            const finalStock = parseNum(item.재고수량);
                            erpData.push([item.코드, inPrice, '0', finalOut, '0', parseNum(item.입고B)||'', 'n', pASale||'', 'n', parseNum(item.도매B)||'', 'n', inPrice, 'n', parseNum(item.행사가)||'', 'n', sale.code]);
                            const themeCols = getPromoThemeColumns(getPromoThemeNo(item));
                            shopData.push([item.코드, item.품목명, item.규격, finalOut, (pASale>0?pASale:finalOut), (pMarket>0?pMarket:finalOut), 0, 0, 0, 0, 0, 0, item.브랜드||'', item.간단설명||'', sale.code, finalStock, themeCols.테마1, themeCols.테마2, themeCols.테마3, themeCols.테마4, themeCols.테마5, item.검색어등록||'']);

                            const subInfo = calculateSubPriceInfo(item);
                            if (subInfo) {
                                // 소분품목은 원물 행과 별도 출력물로 취급한다. ERP와 쇼핑몰업로드 모두 행 수가 증가해야 한다.
                                erpData.push([subInfo.code, subInfo.subIn, '0', subInfo.subOut, '0', '', 'n', '', 'n', '', 'n', subInfo.subIn, 'n', '', 'n', sale.code]);
                                const subShopRow = buildSubShopRow(item, subInfo, masterProducts, sale);
                                if (subShopRow) shopData.push(subShopRow);
                                subOutputCount++;
                            }
                        });

                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), '쇼핑몰업로드');
                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), 'ERP업데이트');
                        window.XLSX.writeFile(wb, `통합업로드용_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast(`✅ 원물 ${reviewRows.length}건 + 소분 ${subOutputCount}건 = 총 ${reviewRows.length + subOutputCount}건 엑셀 다운로드 완료`);
                    } catch (e) {
                        console.error('[Export Excel Error]', e);
                        showToast('❌ 엑셀 파일 생성 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                }, 300);
            }, [reviewRows, masterProducts, analysis, showToast, getPromoThemeColumns, getPromoThemeNo]);

            // ============================================================
            // [E-OUTPUT-03] 이미지 출력 데이터 브릿지
            // 역할: reviewRows를 이미지 생성기가 읽는 ONEAPP_IMAGE_DATA_TEMP 구조로 변환한다.
            // 주의: 이미지 가격은 최종 적용 가격 기준이며, 정지중 상품은 제외한다.
            // ============================================================
            const handleImageExport = useCallback(() => {
                if (reviewRows.length === 0) return showToast('⚠️ 이미지로 보낼 데이터가 없습니다.');
                setIsProcessing(true);
                setTimeout(async () => {
                    try {
                        const grouped = {};
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            if (sale.label === '정지중') return;
                            const title = item.카테고리 ? String(item.카테고리).split(',')[0].trim() : '일반 상품목록';
                            const fullName = item.규격 ? `${item.품목명} (${item.규격})` : item.품목명;
                            if (!grouped[title]) grouped[title] = [];
                            grouped[title].push({ name: fullName, price: parseNum(item.최종출고가), prevPrice: parseNum(item.기준출고가) });
                        });
                        const exportData = Object.keys(grouped).map(title => ({ title: `📌 ${title}`, items: grouped[title] }));
                        await setIDB('ONEAPP_IMAGE_DATA_TEMP', JSON.stringify(exportData));
                        showToast('✅ 이미지 데이터 생성 완료. 이미지 뷰어 탭을 확인하세요.');
                    } catch (e) {
                        console.error('[Image Export Error]', e);
                        showToast('❌ 이미지 데이터 준비 중 오류 발생');
                    } finally {
                        setIsProcessing(false);
                    }
                }, 250);
            }, [reviewRows, showToast]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const tag = document.activeElement?.tagName;
                    const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(tag);
                    if (e.key === 'F9') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleExportExcel();
                    } else if (e.key === 'F10') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleImageExport();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isProcessing, handleExportExcel, handleImageExport]);

            return (
                <div className="flex h-screen overflow-hidden bg-slate-100 fade-in">
                    {toast && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 text-sm font-bold transition-all">
                            <i className="fas fa-check-circle text-emerald-400"></i>{toast}
                        </div>
                    )}

                    <div className="w-[260px] bg-[#0f172a] flex flex-col text-slate-300 shadow-xl z-10 shrink-0 h-full">
                        <div className="p-6 border-b border-slate-800 bg-[#0b1120] shrink-0">
                            <h1 className="text-xl font-black text-emerald-400 tracking-tight flex items-center">
                                <i className="fas fa-shield-alt mr-3"></i>최종검증센터
                            </h1>
                            <p className="text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-widest">Final Review Center</p>
                        </div>
                        <div className="flex flex-col py-4 gap-1 px-3 flex-1">
                            <div className="px-4 py-3.5 rounded-xl text-left text-[13px] font-bold bg-slate-800/50 text-emerald-400 border border-emerald-900/30 shadow-md flex items-center">
                                <i className="fas fa-list-check w-5 text-center mr-2"></i> 검증센터 작업 네비게이션
                            </div>
                            <div className="px-4 py-3 text-[11px] leading-relaxed text-slate-400">
                                작업 대상은 메인에서 전달된 <b className="text-slate-200">merch_export_draft</b> 기준입니다. 마스터 전체는 작업 대상으로 사용하지 않습니다.
                            </div>
                        </div>
                        <div className="p-6 border-t border-slate-800 shrink-0">
                            <button onClick={() => window.location.href = 'MerchOps.html'} className="w-full py-3 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 hover:text-white text-[13px] font-bold transition-colors">
                                <i className="fas fa-arrow-left mr-2"></i> 메인으로 돌아가기
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden">
                        <div className="bg-white p-5 border-b border-slate-200 shadow-sm shrink-0 z-10">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-xl font-black text-slate-800 flex items-center">
                                    <i className="fas fa-layer-group text-indigo-500 mr-2"></i>상황 체크 카드
                                </h2>
                                <div className="text-[12px] text-slate-500 font-bold">표시 {filteredRows.length.toLocaleString()}건 / 전체 {reviewRows.length.toLocaleString()}건</div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-7 gap-2 mb-4">
                                {issueCards.map(card => (
                                    <button key={card.key} onClick={() => handleCardClick(card.key)} className={`border p-3 rounded-xl flex flex-col items-center shadow-sm transition-all hover:shadow-md ${card.cls} ${activeIssue === card.key ? 'ring-2 ring-slate-700 scale-[1.02]' : ''}`}>
                                        <span className="text-[11px] font-black mb-1 flex items-center"><i className={`fas ${card.icon} mr-1`}></i>{card.label}</span>
                                        <span className="text-xl font-black">{card.count.toLocaleString()}</span>
                                        <span className="text-[10px] font-bold opacity-70 mt-0.5 text-center leading-tight">{card.sub}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center justify-end gap-3">
                                <div className="relative w-full max-w-md">
                                    <i className="fas fa-search absolute left-3 top-2.5 text-slate-400 text-[13px]"></i>
                                    <input value={searchInput} onChange={(e) => setSearchInput(e.target.value)} placeholder="코드 / 품목명 / 규격 / 브랜드 / 카테고리 검색" className="w-full h-9 pl-9 pr-3 border border-slate-300 rounded-lg text-[12px] font-bold outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100" />
                                </div>
                                <button onClick={resetFilters} className="h-9 px-4 rounded-lg bg-slate-100 text-slate-600 border border-slate-300 text-[12px] font-black hover:bg-slate-200">
                                    <i className="fas fa-rotate-left mr-1.5"></i>초기화
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 p-5 overflow-hidden flex flex-col">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-slate-700 text-[14px]"><i className="fas fa-edit mr-2 text-emerald-500"></i>최종 퀵 수정 & 안전 점검표</h3>
                                <div className="flex items-center gap-3 text-[11px] text-slate-500 font-bold">
                                    <span className="bg-white px-2 py-1 rounded border border-slate-200 shadow-sm"><span className="text-purple-500">■</span> 행사가는 출고가에 우선 적용</span>
                                    <span className="bg-white px-2 py-1 rounded border border-slate-200 shadow-sm"><span className="text-teal-500">■</span> 재고적음은 재고수량 오름차순</span>
                                </div>
                            </div>

                            <div className="flex-1 min-h-0 flex gap-4 overflow-hidden">
                                <div className="w-[310px] shrink-0 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
                                    <div className="px-4 py-3 border-b border-slate-200 bg-slate-50">
                                        <div className="text-[13px] font-black text-slate-800 flex items-center"><i className="fas fa-sitemap text-indigo-500 mr-2"></i>1차 / 2차 분류</div>
                                        <div className="text-[11px] text-slate-500 font-bold mt-1">현재 조건 {baseFilteredRows.length.toLocaleString()}건 기준</div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-3">
                                        {c1List.length === 0 ? (
                                            <div className="p-6 text-center text-slate-400 text-[12px] font-bold">분류할 대상이 없습니다.</div>
                                        ) : c1List.map(c1 => {
                                            const c2s = window.ONEAPP.REVIEW.getReviewC2List(reviewCategoryTree, c1.code);
                                            const isC1Active = activeC1 === c1.code;
                                            return (
                                                <div key={c1.code} className="rounded-xl border border-slate-100 overflow-hidden bg-slate-50/40">
                                                    <button onClick={() => { setActiveC1(c1.code); const first = c2s[0]; if (first) setActiveC2(first.code); }} className={`w-full px-3 py-2.5 text-left flex justify-between items-center text-[12px] font-black ${isC1Active ? 'bg-indigo-50 text-indigo-700' : 'bg-white text-slate-700 hover:bg-slate-50'}`}>
                                                        <span className="truncate"><i className="fas fa-folder mr-2 text-indigo-400"></i>{c1.name}</span>
                                                        <span className="ml-2 px-2 py-0.5 rounded-full bg-white border border-slate-200 text-[10px] text-slate-500">{c1.count}</span>
                                                    </button>
                                                    {isC1Active && (
                                                        <div className="p-2 space-y-1">
                                                            {c2s.map(c2 => {
                                                                const summary = window.ONEAPP.REVIEW.getReviewIssueSummary(c2.items, { getSaleState, isMarginWarning, isAnomaly, isLowStock, isNewItem });
                                                                const active = activeC2 === c2.code;
                                                                return (
                                                                    <button key={c2.code} onClick={() => setActiveC2(c2.code)} className={`w-full text-left rounded-lg px-3 py-2 border transition-all ${active ? 'bg-slate-900 text-white border-slate-900 shadow-sm' : 'bg-white text-slate-600 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/50'}`}>
                                                                        <div className="flex justify-between items-center gap-2">
                                                                            <span className="truncate text-[12px] font-bold">{c2.name}</span>
                                                                            <span className={`text-[10px] font-black ${active ? 'text-slate-300' : 'text-slate-400'}`}>{c2.count}건</span>
                                                                        </div>
                                                                        <div className={`mt-1 flex gap-1.5 text-[10px] font-bold ${active ? 'text-slate-300' : 'text-slate-400'}`}>
                                                                            {summary.margin > 0 && <span className="text-rose-400">역 {summary.margin}</span>}
                                                                            {summary.promo > 0 && <span className="text-purple-400">행 {summary.promo}</span>}
                                                                            {summary.anomaly > 0 && <span className="text-amber-400">오 {summary.anomaly}</span>}
                                                                            {summary.soldout > 0 && <span className="text-orange-400">품 {summary.soldout}</span>}
                                                                            {summary.margin + summary.promo + summary.anomaly + summary.soldout === 0 && <span>특이 없음</span>}
                                                                        </div>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="flex-1 bg-white border border-slate-200 rounded-xl overflow-auto custom-scrollbar shadow-sm">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="bg-[#f8fafc] sticky top-0 border-b border-slate-200 text-slate-600 z-10 shadow-sm">
                                        <tr>
                                            <th className="px-3 py-3 w-16 text-center font-bold">검증</th>
                                            <th className="px-3 py-3 w-24 font-bold">코드</th>
                                            <th className="px-3 py-3 w-28 font-bold">카테고리</th>
                                            <th className="px-3 py-3 font-bold">품목명 (규격)</th>
                                            <th className="px-3 py-3 w-20 text-right font-bold text-slate-500">기준가</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-indigo-600">입고가</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-slate-500">출고가</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-emerald-600">계산 출고가</th>
                                            <th className="px-3 py-3 w-20 text-right font-bold text-purple-600">수정행사가</th>
                                            <th className="px-3 py-3 w-28 text-center font-bold text-purple-600">행사지정</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-rose-600">최종 출고가</th>
                                            <th className="px-3 py-3 w-20 text-center font-bold">재고</th>
                                            <th className="px-3 py-3 w-20 text-center font-bold">오늘판매</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold">재고자산</th>
                                            <th className="px-3 py-3 w-32 text-center font-bold">인사이트</th>
                                            <th className="px-3 py-3 w-24 text-center font-bold">상태</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredRows.length === 0 ? (
                                            <tr><td colSpan="16" className="p-10 text-center text-slate-400 font-bold">표시할 데이터가 없습니다.</td></tr>
                                        ) : filteredRows.map(item => {
                                            const sale = getSaleState(item);
                                            const promo = parseNum(item.행사가) > 0;
                                            const margin = isMarginWarning(item);
                                            const anomaly = isAnomaly(item);
                                            const { diff, rate } = getDiffInfo(item);
                                            return (
                                                <tr key={item.코드} className={`transition-colors ${margin || anomaly ? 'bg-rose-50/50' : 'hover:bg-slate-50'}`}>
                                                    <td className="px-3 py-2 text-center">
                                                        {margin ? <i className="fas fa-exclamation-triangle text-rose-500" title="역마진"></i> :
                                                         anomaly ? <i className="fas fa-exclamation-circle text-orange-500" title="오기 의심"></i> :
                                                         sale.label === '품절' ? <span className="w-2.5 h-2.5 rounded-full bg-orange-400 inline-block" title="품절"></span> :
                                                         sale.label === '정지중' ? <span className="w-2.5 h-2.5 rounded-full bg-slate-300 inline-block" title="정지중"></span> :
                                                         <i className="fas fa-check-circle text-emerald-400"></i>}
                                                    </td>
                                                    <td className="px-3 py-2 font-mono text-slate-400 text-[11px]">{item.코드}</td>
                                                    <td className="px-3 py-2 text-[11px] text-slate-500 max-w-[140px] truncate">{item.카테고리}</td>
                                                    <td className="px-3 py-2 font-bold text-slate-800">
                                                        {item.품목명} <span className="text-slate-400 font-normal ml-1 text-[11px]">{item.규격 && `(${item.규격})`}</span>
                                                        {isNewItem(item) && <span className="ml-2 px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 text-[10px] font-black">신규</span>}
                                                    </td>
                                                    <td className="px-3 py-2 text-right text-slate-400">
                                                        {fmt(item.기준출고가)}
                                                        {item.기준출고가 > 0 && <div className={`text-[10px] font-bold ${diff >= 0 ? 'text-rose-400' : 'text-blue-400'}`}>{diff === 0 ? '-' : `${diff > 0 ? '+' : ''}${fmt(diff)} / ${(rate*100).toFixed(1)}%`}</div>}
                                                    </td>
                                                    <td className="px-2 py-1 bg-indigo-50/30">
                                                        <input type="text" value={item.입고가} onChange={(e)=>handleEdit(item.코드, '입고가', e.target.value)} title="입고가 수정 시 계산 출고가가 최종 출고가에 자동 반영됩니다." className="w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 px-1 py-1 text-right font-black text-indigo-600 outline-none" />
                                                    </td>
                                                    <td className="px-3 py-2 text-right text-slate-500 font-bold">
                                                        {parseNum(item.불러온출고가) > 0 ? fmt(item.불러온출고가) : <span className="text-slate-300">-</span>}
                                                    </td>
                                                    <td className="px-3 py-2 text-right text-emerald-600 font-black">
                                                        {parseNum(item.계산출고가) > 0 ? fmt(item.계산출고가) : <span className="text-slate-300">-</span>}
                                                    </td>
                                                    <td className="px-3 py-2 text-right">
                                                        <input type="text" value={item.행사가} onChange={(e)=>handleEdit(item.코드, '행사가', e.target.value)} placeholder="0" title="행사가가 있으면 최종 판매가로 우선 적용됩니다." className="w-20 bg-transparent border-b border-transparent focus:border-purple-400 hover:border-slate-300 px-1 py-1 text-right font-black text-purple-700 outline-none" />
                                                    </td>
                                                    <td className="px-2 py-1 text-center bg-purple-50/30">
                                                        <div className="flex items-center justify-center gap-1">
                                                            {[1,2,3,4,5].map(no => (
                                                                <button
                                                                    key={`${item.코드}-theme-${no}`}
                                                                    type="button"
                                                                    onClick={() => handleEdit(item.코드, '행사지정', parseNum(item.행사지정) === no ? 0 : no)}
                                                                    title={`행사지정 ${no}`}
                                                                    className={`w-6 h-6 rounded-md border text-[11px] font-black transition-all ${parseNum(item.행사지정) === no ? 'bg-purple-600 border-purple-700 text-white shadow-sm' : 'bg-white border-purple-200 text-purple-500 hover:bg-purple-100'}`}
                                                                >
                                                                    {no}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-1 bg-orange-50/30">
                                                        <input type="text" value={item.출고가} onChange={(e)=>handleEdit(item.코드, '출고가', e.target.value)} title="최종 저장할 기본 출고가입니다. 행사가가 있으면 행사가가 우선 적용됩니다." className={`w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 rounded-none px-1 py-1 text-right font-black outline-none transition-colors ${margin ? 'text-rose-600' : 'text-slate-800'}`} />
                                                    </td>
                                                    <td className="px-2 py-1 bg-slate-50/50">
                                                        <input type="text" value={item.재고수량} onChange={(e)=>handleEdit(item.코드, '재고수량', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 px-1 py-1 text-center font-bold text-slate-600 outline-none" />
                                                    </td>
                                                    <td className="px-3 py-2 text-center font-black text-slate-700">
                                                        {getTodaySales(item) > 0 ? fmt(getTodaySales(item)) : <span className="text-slate-300">0</span>}
                                                    </td>
                                                    <td className="px-3 py-2 text-right font-bold text-slate-600">
                                                        {getStockAsset(item) > 0 ? fmt(getStockAsset(item)) : <span className="text-slate-300">-</span>}
                                                    </td>
                                                    <td className="px-2 py-1 text-center">
                                                        <div className="flex flex-wrap justify-center gap-1">
                                                            {parseNum(item.행사가) > 0 && getTodaySales(item) > 0 && <span className="px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-600 border border-emerald-100 text-[10px] font-black">판매반응</span>}
                                                            {parseNum(item.행사가) > 0 && getTodaySales(item) === 0 && getCurrentStock(item) > 0 && <span className="px-1.5 py-0.5 rounded bg-slate-50 text-slate-500 border border-slate-200 text-[10px] font-black">미판매</span>}
                                                            {getStockAsset(item) > 0 && <span className="px-1.5 py-0.5 rounded bg-teal-50 text-teal-600 border border-teal-100 text-[10px] font-black">재고자산</span>}
                                                            {hasLossIssue(item) && <span className="px-1.5 py-0.5 rounded bg-amber-50 text-amber-600 border border-amber-100 text-[10px] font-black">수량확인</span>}
                                                            {getPromoReasons(item).length > 0 && <span className="px-1.5 py-0.5 rounded bg-purple-50 text-purple-600 border border-purple-100 text-[10px] font-black">행사후보</span>}
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-1 text-center">
                                                        <span className={`inline-flex items-center justify-center w-full border rounded px-2 py-1 text-[12px] font-black ${sale.cls}`}>{sale.text}</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                            </div>

                        <div className="bg-purple-50 border-t border-purple-100 px-6 py-2 text-[11px] font-bold text-purple-700">
                            <i className="fas fa-tags mr-1.5"></i>행사지정은 1~5 숫자만 선택합니다. 출력 시 선택값에 해당하는 테마1~테마5 열에만 1이 표시됩니다.
                        </div>
                        <div className="bg-white p-6 border-t border-slate-200 shrink-0 flex gap-4 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                            <button onClick={handleExportExcel} disabled={isProcessing || reviewRows.length === 0} className="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black text-[15px] hover:bg-emerald-700 transition-all shadow-md hover:shadow-lg flex justify-center items-center">
                                <i className="fas fa-save mr-2 text-lg"></i> 마스터 반영 후 엑셀 출력 (F9)
                            </button>
                            <button onClick={handleImageExport} disabled={isProcessing || reviewRows.length === 0} className="px-8 py-4 bg-amber-500 text-white rounded-xl font-black text-[15px] hover:bg-amber-600 transition-all shadow-md hover:shadow-lg flex justify-center items-center">
                                <i className="fas fa-image mr-2 text-lg"></i> 이미지 (F10)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExportApp />);
    </script>

    <script>
      window.addEventListener('error', function(e) {
        const root = document.getElementById('root');
        if (root && !root.dataset.errorShown) {
          root.dataset.errorShown = '1';
          const box = document.createElement('div');
          box.style.cssText = 'position:fixed;inset:16px;z-index:99999;background:#fff;border:2px solid #ef4444;border-radius:16px;padding:20px;font-family:sans-serif;color:#0f172a;overflow:auto;';
          box.innerHTML = '<h2 style="font-weight:900;color:#dc2626;margin-bottom:8px;">FinalReviewCenter 로딩 오류</h2><p>브라우저 캐시 또는 스크립트 오류가 있습니다. Ctrl+F5 후 다시 확인하세요.</p><pre style="white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:8px;margin-top:12px;">' + (e.message || '') + '</pre>';
          document.body.appendChild(box);
        }
      });
    </script>

</body>
</html>
