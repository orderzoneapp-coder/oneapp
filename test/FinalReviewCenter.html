<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - 최종검증센터 [v2.6 카테고리 네비게이션]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="./coreEngine.js"></script>

    <script>
        // STEP3 안전장치: FinalReviewCenter 행사작업/카드요약 보조 함수
        // coreEngine.js 캐시/구버전 문제로 ONEAPP.REVIEW 일부 함수가 없을 때 화면이 죽는 것을 방지한다.
        (function(global) {
            global.ONEAPP = global.ONEAPP || {};
            const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
            const REVIEW = global.ONEAPP.REVIEW = global.ONEAPP.REVIEW || {};

            REVIEW._getWorking = REVIEW._getWorking || function(row) { return row && (row.working || row.finalData || row) || {}; };
            REVIEW._getBase = REVIEW._getBase || function(row) { return row && (row.baselineSnapshot || row.master || row.baseline || {}) || {}; };

            REVIEW.getDisplayValue = REVIEW.getDisplayValue || function(row, key, fallback = '') {
                const w = REVIEW._getWorking(row);
                const b = REVIEW._getBase(row);
                if (w && w[key] !== undefined && w[key] !== '') return w[key];
                if (b && b[key] !== undefined && b[key] !== '') return b[key];
                if (row && row[key] !== undefined && row[key] !== '') return row[key];
                return fallback;
            };

            REVIEW.getSalePrice = REVIEW.getSalePrice || function(row) {
                const promo = parseNum(REVIEW.getDisplayValue(row, '행사가'));
                const out = parseNum(REVIEW.getDisplayValue(row, '출고가', REVIEW.getDisplayValue(row, '최종출고가')));
                return promo > 0 ? promo : out;
            };

            REVIEW.getMarginRate = REVIEW.getMarginRate || function(row) {
                const inP = parseNum(REVIEW.getDisplayValue(row, '입고가'));
                const saleP = REVIEW.getSalePrice(row);
                if (!saleP || !inP) return 0;
                return ((saleP - inP) / saleP) * 100;
            };

            REVIEW.isPromoActive = REVIEW.isPromoActive || function(row) {
                return parseNum(REVIEW.getDisplayValue(row, '행사가')) > 0;
            };

            REVIEW.isReverseMargin = REVIEW.isReverseMargin || function(row) {
                const inP = parseNum(REVIEW.getDisplayValue(row, '입고가'));
                const saleP = REVIEW.getSalePrice(row);
                return inP > 0 && saleP > 0 && saleP < inP;
            };

            REVIEW.isPriceChanged = REVIEW.isPriceChanged || function(row) {
                const w = REVIEW._getWorking(row);
                const b = REVIEW._getBase(row);
                return ['입고가','출고가','행사가'].some(k => parseNum(w[k]) !== parseNum(b[k]));
            };

            REVIEW.hasComparePriceIssue = REVIEW.hasComparePriceIssue || function(row) {
                const w = REVIEW._getWorking(row);
                return !!(w.비교단가요약 || w.비교단가건수 || w['2차벤더단가'] || w.비교단가최저가);
            };

            REVIEW.isSoldOut = REVIEW.isSoldOut || function(row) {
                return parseNum(REVIEW.getDisplayValue(row, '재고수량', REVIEW.getDisplayValue(row, '현재재고'))) === 0;
            };

            REVIEW.isLowStock = REVIEW.isLowStock || function(row) {
                const stock = parseNum(REVIEW.getDisplayValue(row, '재고수량', REVIEW.getDisplayValue(row, '현재재고')));
                const safe = parseNum(REVIEW.getDisplayValue(row, '안전재고'));
                return stock > 0 && safe > 0 && stock <= safe;
            };

            REVIEW.isStoppedOrPending = REVIEW.isStoppedOrPending || function(row) {
                const sale = String(REVIEW.getDisplayValue(row, '판매여부')).trim().toLowerCase();
                const w = REVIEW._getWorking(row);
                return sale === '0' || sale === 'n' || sale === 'false' || w._salesStopRequested === true;
            };

            REVIEW.getPromoSuggestionReasons = REVIEW.getPromoSuggestionReasons || function(row) {
                const w = REVIEW._getWorking(row);
                const reasons = [];
                if (String(w.소분상품여부 || '').toUpperCase() === 'Y') return reasons;

                const inP = parseNum(REVIEW.getDisplayValue(row, '입고가'));
                const baseIn = parseNum(REVIEW.getDisplayValue(row, '기준시세입고가')) || parseNum(REVIEW._getBase(row)['입고가']);
                const secondVendor = parseNum(REVIEW.getDisplayValue(row, '2차벤더단가', REVIEW.getDisplayValue(row, '비교단가최저가')));
                const stock = parseNum(REVIEW.getDisplayValue(row, '재고수량', REVIEW.getDisplayValue(row, '현재재고')));
                const safe = parseNum(REVIEW.getDisplayValue(row, '안전재고'));

                if (baseIn > 0 && inP > 0) {
                    const diff = baseIn - inP;
                    const rate = diff / baseIn * 100;
                    if (diff >= 500 || rate >= 10) reasons.push('단가하락');
                }
                if (safe > 0 && stock >= safe * 1.5) reasons.push('재고소진');
                if (secondVendor > 0 && baseIn > 0 && secondVendor < baseIn) reasons.push('2차벤더유리');
                if (String(REVIEW.getDisplayValue(row, '기본')).trim()) reasons.push('기준시세');
                return reasons;
            };

            REVIEW.isPromoCandidate = REVIEW.isPromoCandidate || function(row) {
                return REVIEW.getPromoSuggestionReasons(row).length > 0;
            };

            REVIEW.buildReviewDecision = REVIEW.buildReviewDecision || function(row) {
                const tags = [];
                const promoReasons = REVIEW.getPromoSuggestionReasons(row);
                if (REVIEW.isPromoCandidate(row)) tags.push('행사후보');
                if (REVIEW.isPromoActive(row)) tags.push('행사중');
                if (REVIEW.isPriceChanged(row)) tags.push('가격변동');
                if (REVIEW.hasComparePriceIssue(row)) tags.push('단가확인');
                if (REVIEW.isReverseMargin(row)) tags.push('역마진');
                if (REVIEW.isSoldOut(row)) tags.push('품절');
                else if (REVIEW.isLowStock(row)) tags.push('품절임박');
                if (REVIEW.isStoppedOrPending(row)) tags.push('정지대기');
                return { tags, promoReasons, marginRate: REVIEW.getMarginRate(row) };
            };

            REVIEW.buildReviewCardSummary = REVIEW.buildReviewCardSummary || function(rows = []) {
                const list = Array.isArray(rows) ? rows : [];
                const summary = {
                    promoCandidate: { count: 0, reasons: {} },
                    promoActive: { count: 0, warnings: { reverse: 0, soldout: 0, lowstock: 0 } },
                    priceChanged: { count: 0, up: 0, down: 0 },
                    comparePrice: { count: 0 },
                    risk: { count: 0, reverse: 0, soldout: 0, lowstock: 0, stopped: 0 }
                };
                list.forEach(row => {
                    const d = REVIEW.buildReviewDecision(row);
                    if (d.tags.includes('행사후보')) {
                        summary.promoCandidate.count += 1;
                        d.promoReasons.forEach(r => summary.promoCandidate.reasons[r] = (summary.promoCandidate.reasons[r] || 0) + 1);
                    }
                    if (d.tags.includes('행사중')) {
                        summary.promoActive.count += 1;
                        if (d.tags.includes('역마진')) summary.promoActive.warnings.reverse += 1;
                        if (d.tags.includes('품절')) summary.promoActive.warnings.soldout += 1;
                        if (d.tags.includes('품절임박')) summary.promoActive.warnings.lowstock += 1;
                    }
                    if (d.tags.includes('가격변동')) summary.priceChanged.count += 1;
                    if (d.tags.includes('단가확인')) summary.comparePrice.count += 1;
                    const riskTags = ['역마진','품절','품절임박','정지대기'];
                    if (d.tags.some(t => riskTags.includes(t))) {
                        summary.risk.count += 1;
                        if (d.tags.includes('역마진')) summary.risk.reverse += 1;
                        if (d.tags.includes('품절')) summary.risk.soldout += 1;
                        if (d.tags.includes('품절임박')) summary.risk.lowstock += 1;
                        if (d.tags.includes('정지대기')) summary.risk.stopped += 1;
                    }
                });
                return summary;
            };

            REVIEW.filterByReviewCard = REVIEW.filterByReviewCard || function(rows = [], card = 'all') {
                const list = Array.isArray(rows) ? rows : [];
                if (!card || card === 'all') return list;
                return list.filter(row => {
                    const d = REVIEW.buildReviewDecision(row);
                    if (card === 'promoCandidate') return d.tags.includes('행사후보');
                    if (card === 'promoActive') return d.tags.includes('행사중');
                    if (card === 'priceChanged') return d.tags.includes('가격변동');
                    if (card === 'comparePrice') return d.tags.includes('단가확인');
                    if (card === 'risk') return d.tags.some(t => ['역마진','품절','품절임박','정지대기'].includes(t));
                    return true;
                });
            };

            REVIEW.expandPromoThemeColumns = REVIEW.expandPromoThemeColumns || function(themeNo) {
                const selected = Number(themeNo) || 0;
                const out = { 테마1: '', 테마2: '', 테마3: '', 테마4: '', 테마5: '' };
                if (selected >= 1 && selected <= 5) out[`테마${selected}`] = 1;
                return out;
            };
        })(window);
    </script>


    <script>
        // REVIEW Engine 안전장치
        // coreEngine.js가 구버전이라 ONEAPP.REVIEW가 없을 때 검증센터가 빈 화면으로 죽는 문제 방지
        (function(global) {
            global.ONEAPP = global.ONEAPP || {};
            const parseNumFallback = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
            const REVIEW = global.ONEAPP.REVIEW = global.ONEAPP.REVIEW || {};

            REVIEW.getRowCategory = REVIEW.getRowCategory || function(row = {}) {
                const working = row.working || row || {};
                const base = row.baselineSnapshot || row.baseline || {};
                const code = String(row.코드 || working.품목코드 || working.코드 || base.품목코드 || base.코드 || '').trim();
                const fallbackC1 = code ? code.substring(0, 2) : '';
                const fallbackC2 = code ? code.substring(0, 4) : '';

                let c1Code = String(base['1코드'] || working['1코드'] || row['1코드'] || fallbackC1 || '').trim();
                let c1Name = String(base['1그룹명'] || working['1그룹명'] || row['1그룹명'] || '').trim();
                let c2Code = String(base['2코드'] || working['2코드'] || row['2코드'] || fallbackC2 || '').trim();
                let c2Name = String(base['2그룹명'] || working['2그룹명'] || row['2그룹명'] || '').trim();

                if (!c1Code || !c1Name) { c1Code = 'ZZZ99_기타'; c1Name = '기타'; }
                if (!c2Code || !c2Name) { c2Code = 'ZZZ9999_기타'; c2Name = '기타'; }

                return { c1Code, c1Name, c2Code, c2Name };
            };

            REVIEW.buildReviewCategoryTree = REVIEW.buildReviewCategoryTree || function(exportDraft = []) {
                const rows = Array.isArray(exportDraft) ? exportDraft : [];
                const tree = {};
                rows.forEach(row => {
                    if (!row) return;
                    const cat = REVIEW.getRowCategory(row);
                    if (!tree[cat.c1Code]) tree[cat.c1Code] = { code: cat.c1Code, name: cat.c1Name, count: 0, sub: {} };
                    if (!tree[cat.c1Code].sub[cat.c2Code]) {
                        tree[cat.c1Code].sub[cat.c2Code] = {
                            code: cat.c2Code,
                            name: cat.c2Name,
                            count: 0,
                            items: [],
                            issueSummary: { margin: 0, promo: 0, soldout: 0, stopped: 0, anomaly: 0, lowstock: 0, newItem: 0 }
                        };
                    }
                    tree[cat.c1Code].count += 1;
                    const c2 = tree[cat.c1Code].sub[cat.c2Code];
                    c2.count += 1;
                    c2.items.push(row);
                });
                return tree;
            };

            REVIEW.getReviewC1List = REVIEW.getReviewC1List || function(categoryTree = {}) {
                return Object.values(categoryTree || {}).sort((a, b) => String(a.code).localeCompare(String(b.code), 'ko'));
            };

            REVIEW.getReviewC2List = REVIEW.getReviewC2List || function(categoryTree = {}, activeC1 = '') {
                if (!activeC1 || !categoryTree[activeC1]) return [];
                return Object.values(categoryTree[activeC1].sub || {}).sort((a, b) => String(a.code).localeCompare(String(b.code), 'ko'));
            };

            REVIEW.getReviewItems = REVIEW.getReviewItems || function(categoryTree = {}, activeC1 = '', activeC2 = '') {
                if (!activeC1 || !activeC2) return [];
                return categoryTree?.[activeC1]?.sub?.[activeC2]?.items || [];
            };

            REVIEW.sortReviewItems = REVIEW.sortReviewItems || function(items = [], sortMode = 'category', helpers = {}) {
                const rows = [...(Array.isArray(items) ? items : [])];
                const getDiffInfo = helpers.getDiffInfo || (() => ({ diff: 0, rate: 0 }));
                const pNum = helpers.parseNum || parseNumFallback;
                const byCodeName = (a, b) => String(a.코드 || a.품목코드 || '').localeCompare(String(b.코드 || b.품목코드 || ''), 'ko') || String(a.품목명 || '').localeCompare(String(b.품목명 || ''), 'ko');

                if (sortMode === 'stockAsc') rows.sort((a, b) => pNum(a.재고수량) - pNum(b.재고수량) || byCodeName(a, b));
                else if (sortMode === 'diffRateDesc') rows.sort((a, b) => Math.abs(getDiffInfo(b).rate) - Math.abs(getDiffInfo(a).rate) || byCodeName(a, b));
                else if (sortMode === 'diffAbsDesc') rows.sort((a, b) => Math.abs(getDiffInfo(b).diff) - Math.abs(getDiffInfo(a).diff) || byCodeName(a, b));
                else if (sortMode === 'inPriceDesc') rows.sort((a, b) => pNum(b.입고가) - pNum(a.입고가) || byCodeName(a, b));
                else if (sortMode === 'outPriceDesc') rows.sort((a, b) => pNum(b.최종출고가) - pNum(a.최종출고가) || byCodeName(a, b));
                else rows.sort(byCodeName);
                return rows;
            };

            REVIEW.getReviewIssueSummary = REVIEW.getReviewIssueSummary || function(items = [], helpers = {}) {
                const rows = Array.isArray(items) ? items : [];
                const isMarginWarning = helpers.isMarginWarning || (() => false);
                const isAnomaly = helpers.isAnomaly || (() => false);
                const isLowStock = helpers.isLowStock || (() => false);
                const isNewItem = helpers.isNewItem || (() => false);
                const getSaleState = helpers.getSaleState || (() => ({ label: '' }));
                const summary = { total: rows.length, margin: 0, promo: 0, soldout: 0, stopped: 0, anomaly: 0, lowstock: 0, newItem: 0 };
                rows.forEach(row => {
                    const sale = getSaleState(row);
                    if (isMarginWarning(row)) summary.margin += 1;
                    if (isAnomaly(row)) summary.anomaly += 1;
                    if (isLowStock(row)) summary.lowstock += 1;
                    if (isNewItem(row)) summary.newItem += 1;
                    if (parseNumFallback(row.행사가) > 0) summary.promo += 1;
                    if (sale.label === '품절') summary.soldout += 1;
                    if (sale.label === '정지중') summary.stopped += 1;
                });
                return summary;
            };
        })(window);
    </script>

    <style>

<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const parseNum = window.ONEAPP.PRICING.parseNum;
        const fmt = (v) => parseNum(v).toLocaleString('ko-KR');

        const initIDB = window.ONEAPP.STORAGE.initIDB;
        const getAllIDB = window.ONEAPP.STORAGE.getAllIDB;
        const getIDB = window.ONEAPP.STORAGE.getIDB;
        const setIDB = window.ONEAPP.STORAGE.setIDB;
        const bulkPutIDB = window.ONEAPP.STORAGE.bulkPutIDB;

        const getSaleState = (row) => {
            const rawStatus = row?.판매여부;
            if (String(rawStatus).trim() === '0') return { code: '0', label: '정지중', text: '0 정지중', cls: 'bg-rose-50 text-rose-700 border-rose-200' };
            const baseOut = parseNum(row.출고가);
            const promo = parseNum(row.행사가);
            const finalOut = parseNum(row.최종출고가);
            const stock = row.재고수량 !== undefined && row.재고수량 !== '' ? parseNum(row.재고수량) : 999;
            const hasSalePrice = baseOut > 0 || promo > 0 || finalOut > 0;
            if (!hasSalePrice) return { code: '0', label: '정지중', text: '0 정지중', cls: 'bg-rose-50 text-rose-700 border-rose-200' };
            if (stock === 0) return { code: '1', label: '품절', text: '1 품절', cls: 'bg-orange-50 text-orange-700 border-orange-200' };
            if (promo > 0) return { code: '1', label: '행사', text: '1 행사', cls: 'bg-purple-50 text-purple-700 border-purple-200' };
            return { code: '1', label: '판매중', text: '1 판매중', cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' };
        };

        const isMarginWarning = (row) => {
            const sale = getSaleState(row);
            const finalOut = parseNum(row.최종출고가);
            const inPrice = parseNum(row.입고가);
            return sale.code === '1' && finalOut > 0 && finalOut < inPrice;
        };

        const getDiffInfo = (row) => {
            const base = parseNum(row.기준출고가);
            const finalOut = parseNum(row.최종출고가);
            const diff = finalOut - base;
            const rate = base > 0 ? diff / base : 0;
            return { diff, rate };
        };

        const isAnomaly = (row) => {
            const { diff, rate } = getDiffInfo(row);
            return parseNum(row.기준출고가) > 0 && Math.abs(rate) >= 0.3 && Math.abs(diff) >= 1000;
        };

        const isNewItem = (row) => {
            const hasBase = parseNum(row.기준입고가) > 0 || parseNum(row.기준출고가) > 0;
            const hasWork = parseNum(row.입고가) > 0 || parseNum(row.출고가) > 0 || parseNum(row.행사가) > 0;
            return !hasBase && hasWork;
        };

        const isLowStock = (row) => {
            const stock = parseNum(row.재고수량);
            // 현재 단계: 안전재고 기준은 보류. 999는 일반 판매 기본값으로 보고 제외한다.
            return stock > 0 && stock < 999;
        };

        const isValidSubItemCode = window.ONEAPP.PRICING.isValidSubItemCode;
        const calculateSubPriceInfo = window.ONEAPP.PRICING.calculateSubPriceInfo;

        // ============================================================
        // [E-OUTPUT-01] 소분품목 쇼핑몰 행 생성
        // 역할: 1종코드가 있는 경우 ERP뿐 아니라 쇼핑몰업로드 시트에도 별도 출력 행을 추가한다.
        // 주의: masterProducts[1종코드]가 있으면 상품명/규격을 우선 사용하고, 없으면 원물명 기반 보조명을 사용한다.
        // ============================================================
        const buildSubShopRow = (parentRow, subInfo, masterProducts, sale) => {
            if (!subInfo) return null;
            const subMaster = masterProducts[subInfo.code] || {};
            const subName = subMaster['품목명'] || `${parentRow.품목명 || ''} (소분)`;
            const subSpec = subMaster['규격'] || subInfo.spec || parentRow['1종규격'] || '';
            const subBrand = subMaster['브랜드'] || parentRow.브랜드 || '';
            const subDesc = subMaster['간단설명'] || parentRow.간단설명 || '';
            const subTags = subMaster['검색어등록'] || parentRow.검색어등록 || '';
            const subStock = parentRow.재고수량 !== undefined && parentRow.재고수량 !== '' ? parseNum(parentRow.재고수량) : 999;
            return [
                subInfo.code,
                subName,
                subSpec,
                subInfo.subOut,
                subInfo.subOut,
                subInfo.subOut,
                0, 0, 0, 0, 0, 0,
                subBrand,
                subDesc,
                sale.code,
                subStock,
                parentRow.테마1 || '',
                parentRow.테마2 || '',
                '', '', '',
                subTags
            ];
        };

        const safeJSONParse = window.ONEAPP.STORAGE.safeJSONParse;

        // ============================================================
        // [E-ENGINE-01] 최종검증센터 계산출고가 엔진
        // 역할: reviewRows 단계에서 입고가/외주비/노무비/창고/단위/마진룰 기준 계산출고가를 산출한다.
        // coreEngine.js의 공통 Pricing Engine으로 위임한다.
        // ============================================================
        const calculateReviewOutPrice = window.ONEAPP.PRICING.calculateReviewOutPrice;

        const ExportApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [reviewRows, setReviewRows] = useState([]);
            const [marginRules] = useState(() => safeJSONParse('merchMarginRules_v878', [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]));
            const [activeIssue, setActiveIssue] = useState('all');
            const [activeC1, setActiveC1] = useState(null);
            const [activeC2, setActiveC2] = useState(null);
            const [sortMode, setSortMode] = useState('category');
            const [searchInput, setSearchInput] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState('');

            const showToast = useCallback((msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => setSearchTerm(searchInput.trim()), 250);
                return () => clearTimeout(timer);
            }, [searchInput]);

            useEffect(() => {
                // ============================================================
                // [E-FLOW-01] 최종검증센터 데이터 로드
                // 역할: merch_export_draft만 작업 대상으로 읽고, 해당 code에 대해서만 masterProducts를 기준정보로 참조한다.
                // 금지: master_products 전체를 reviewRows 작업대상으로 전환하지 않는다.
                // ============================================================
                const loadData = async () => {
                    setIsProcessing(true);
                    try {
                        const items = await getAllIDB('master_products');
                        const masterDict = {};
                        items.forEach(i => { if (i && i.코드) masterDict[i.코드] = i; });
                        setMasterProducts(masterDict);

                        const rawDraft = await getIDB('merch_export_draft') || [];
                        const exportDraft = Array.isArray(rawDraft) ? rawDraft : [];

                        const rows = exportDraft.map(draft => {
                            const code = draft.코드;
                            const working = draft.working || draft || {};
                            const baseline = draft.baselineSnapshot || {};
                            const source = draft.source || {};
                            const master = masterDict[code] || {};

                            const 기준입고가 = parseNum(master['입고가'] ?? baseline.기준입고가 ?? 0);
                            const 기준출고가 = parseNum(master['출고가'] ?? baseline.기준출고가 ?? 0);
                            const 기준시중가 = parseNum(master['시중가'] ?? baseline.기준시중가 ?? 0);
                            const 기준판매여부 = String(master['판매여부'] ?? baseline.기준판매여부 ?? '-');

                            const 입고가 = parseNum(working.입고가);
                            const 불러온출고가 = parseNum(working.출고가);
                            const 계산출고가 = calculateReviewOutPrice(입고가, { ...master, ...working }, marginRules);
                            const 출고가 = 불러온출고가 > 0 ? 불러온출고가 : 계산출고가;
                            const 행사가 = parseNum(working.행사가);
                            const 최종출고가 = 행사가 > 0 ? 행사가 : 출고가;
                            const rawStock = working.재고수량;
                            const 재고수량 = (rawStock !== undefined && rawStock !== null && rawStock !== '') ? parseNum(rawStock) : 999;

                            return {
                                코드: code,
                                품목명: working.품목명 || master['품목명'] || '',
                                규격: working.규격 || master['규격'] || '',
                                품목코드: working.품목코드 || baseline.품목코드 || master['품목코드'] || code,
                                '1코드': working['1코드'] || baseline['1코드'] || master['1코드'] || '',
                                '1그룹명': working['1그룹명'] || baseline['1그룹명'] || master['1그룹명'] || '',
                                '2코드': working['2코드'] || baseline['2코드'] || master['2코드'] || '',
                                '2그룹명': working['2그룹명'] || baseline['2그룹명'] || master['2그룹명'] || '',
                                카탈로그: working.카탈로그 || baseline.카탈로그 || master['카탈로그'] || '',
                                견적서: working.견적서 || baseline.견적서 || master['견적서'] || '',
                                기본: working.기본 || baseline.기본 || master['기본'] || '',
                                브랜드: working.브랜드 || master['브랜드'] || '',
                                간단설명: working.간단설명 || master['간단설명'] || '',
                                카테고리: working.카테고리 || master['견적서'] || master['카테고리'] || '일반 상품목록',
                                검색어등록: working.검색어등록 || master['검색어등록'] || '',
                                기준입고가,
                                기준출고가,
                                기준시중가,
                                기준판매여부,
                                판매여부: working.판매여부 !== undefined && working.판매여부 !== '' ? working.판매여부 : 기준판매여부,
                                입고가,
                                불러온출고가,
                                계산출고가,
                                출고가,
                                행사가,
                                최종출고가,
                                도매A: parseNum(working.도매A),
                                도매B: parseNum(working.도매B),
                                시중가: parseNum(working.시중가 || 기준시중가),
                                입고B: parseNum(working.입고B),
                                '1종코드': working['1종코드'] || master['1종코드'] || '',
                                '1종규격': working['1종규격'] || master['1종규격'] || '',
                                '1종연산': parseNum(working['1종연산'] ?? master['1종연산']),
                                '경비': parseNum(working['경비'] ?? master['경비']),
                                '외주비': parseNum(working['외주비'] ?? master['외주비']),
                                '노무비': parseNum(working['노무비'] ?? master['노무비']),
                                재고수량,
                                행사지정: parseNum(working.행사지정 || working._theme || baseline.행사지정 || master['행사지정'] || 0),
                                테마1: working.테마1 || baseline.테마1 || master['테마1'] || '',
                                테마2: working.테마2 || baseline.테마2 || master['테마2'] || '',
                                테마3: working.테마3 || baseline.테마3 || master['테마3'] || '',
                                테마4: working.테마4 || baseline.테마4 || master['테마4'] || '',
                                테마5: working.테마5 || baseline.테마5 || master['테마5'] || '',
                                source
                            };
                        }).filter(row => row.코드);

                        setReviewRows(rows);
                    } catch (e) {
                        console.error('[Export Center Load Error]', e);
                        showToast('❌ 최종검증센터 데이터 로드 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                };
                loadData();
            }, [showToast, marginRules]);

            // ============================================================
            // [E-FLOW-02] 검증센터 단가/작업값 수정
            // 역할: 입고가/출고가/행사가 수정 시 계산출고가와 최종 적용 가격을 즉시 갱신한다.
            // 정책: 입고가 변경은 계산출고가를 출고가에 자동 반영하지만, 행사가가 있으면 최종 가격은 행사가가 우선한다.
            // ============================================================
            const handleEdit = useCallback((code, field, value) => {
                setReviewRows(prev => prev.map(row => {
                    if (row.코드 !== code) return row;

                    const next = { ...row, [field]: value };

                    if (field === '입고가') {
                        const newIn = parseNum(value);
                        const calcOut = calculateReviewOutPrice(newIn, row, marginRules);
                        next.입고가 = newIn;
                        next.계산출고가 = calcOut;
                        // A안: 관리자는 입고가 기준으로 판단하므로, 입고가 수정 시 계산출고가를 최종 출고가에 자동 반영한다.
                        next.출고가 = calcOut;
                        next.최종출고가 = parseNum(row.행사가) > 0 ? parseNum(row.행사가) : calcOut;
                    } else if (field === '행사가') {
                        const newPromo = parseNum(value);
                        next.행사가 = newPromo;
                        next.최종출고가 = newPromo > 0 ? newPromo : parseNum(row.출고가);
                    } else if (field === '출고가') {
                        const newOut = parseNum(value);
                        next.출고가 = newOut;
                        next.최종출고가 = parseNum(row.행사가) > 0 ? parseNum(row.행사가) : newOut;
                    } else if (field === '행사지정') {
                        const themeNo = parseNum(value);
                        next.행사지정 = themeNo >= 1 && themeNo <= 5 ? themeNo : 0;
                        const themeCols = {};
                        for (let i = 1; i <= 5; i++) themeCols[`테마${i}`] = next.행사지정 === i ? 1 : '';
                        Object.assign(next, themeCols);
                    }

                    return next;
                }));
            }, [marginRules]);

            const analysis = useMemo(() => {
                const result = { total: reviewRows.length, up: 0, down: 0, promo: 0, soldout: 0, stopped: 0, anomaly: 0, margin: 0, newItem: 0, lowStock: 0 };
                reviewRows.forEach(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    if (parseNum(row.기준출고가) > 0 && diff > 0) result.up++;
                    if (parseNum(row.기준출고가) > 0 && diff < 0) result.down++;
                    if (parseNum(row.행사가) > 0) result.promo++;
                    if (sale.label === '품절') result.soldout++;
                    if (sale.label === '정지중') result.stopped++;
                    if (isAnomaly(row)) result.anomaly++;
                    if (isMarginWarning(row)) result.margin++;
                    if (isNewItem(row)) result.newItem++;
                    if (isLowStock(row)) result.lowStock++;
                });
                return result;
            }, [reviewRows]);

            const issueCards = useMemo(() => ([
                { key: 'all', label: '전체', count: analysis.total, icon: 'fa-list-check', cls: 'border-slate-200 bg-slate-50 text-slate-700' },
                { key: 'up', label: '인상', count: analysis.up, icon: 'fa-arrow-trend-up', cls: 'border-rose-200 bg-rose-50 text-rose-700' },
                { key: 'down', label: '인하', count: analysis.down, icon: 'fa-arrow-trend-down', cls: 'border-blue-200 bg-blue-50 text-blue-700' },
                { key: 'promo', label: '행사', count: analysis.promo, icon: 'fa-bullhorn', cls: 'border-purple-200 bg-purple-50 text-purple-700' },
                { key: 'soldout', label: '품절', count: analysis.soldout, icon: 'fa-box-open', cls: 'border-orange-200 bg-orange-50 text-orange-700' },
                { key: 'stopped', label: '정지중', count: analysis.stopped, icon: 'fa-ban', cls: 'border-slate-300 bg-slate-100 text-slate-700' },
                { key: 'anomaly', label: '오기의심', count: analysis.anomaly, icon: 'fa-triangle-exclamation', cls: 'border-amber-200 bg-amber-50 text-amber-700' },
                { key: 'margin', label: '역마진', count: analysis.margin, icon: 'fa-circle-exclamation', cls: 'border-red-300 bg-red-50 text-red-700' },
                { key: 'new', label: '신규', count: analysis.newItem, icon: 'fa-sparkles', cls: 'border-indigo-200 bg-indigo-50 text-indigo-700' },
                { key: 'lowstock', label: '재고적음', count: analysis.lowStock, icon: 'fa-layer-group', cls: 'border-teal-200 bg-teal-50 text-teal-700' }
            ]), [analysis]);

            const baseFilteredRows = useMemo(() => {
                let rows = reviewRows.filter(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    switch (activeIssue) {
                        case 'up': return parseNum(row.기준출고가) > 0 && diff > 0;
                        case 'down': return parseNum(row.기준출고가) > 0 && diff < 0;
                        case 'promo': return parseNum(row.행사가) > 0;
                        case 'soldout': return sale.label === '품절';
                        case 'stopped': return sale.label === '정지중';
                        case 'anomaly': return isAnomaly(row);
                        case 'margin': return isMarginWarning(row);
                        case 'new': return isNewItem(row);
                        case 'lowstock': return isLowStock(row);
                        default: return true;
                    }
                });

                const terms = searchTerm.toLowerCase().split(/\s+/).map(s => s.trim()).filter(Boolean);
                if (terms.length > 0) {
                    rows = rows.filter(row => {
                        const haystack = [
                            row.코드, row.품목코드, row.품목명, row.규격, row.브랜드, row.카테고리,
                            row['1그룹명'], row['2그룹명'], row.카탈로그, row.견적서,
                            row.간단설명, row.검색어등록, row.source?.sourceType, ...(row.source?.tags || [])
                        ].join(' ').toLowerCase();
                        return terms.every(term => haystack.includes(term));
                    });
                }

                return rows;
            }, [reviewRows, activeIssue, searchTerm]);

            const reviewCategoryTree = useMemo(() => {
                return window.ONEAPP.REVIEW.buildReviewCategoryTree(baseFilteredRows);
            }, [baseFilteredRows]);

            const c1List = useMemo(() => window.ONEAPP.REVIEW.getReviewC1List(reviewCategoryTree), [reviewCategoryTree]);
            const c2List = useMemo(() => window.ONEAPP.REVIEW.getReviewC2List(reviewCategoryTree, activeC1), [reviewCategoryTree, activeC1]);

            useEffect(() => {
                if (c1List.length === 0) {
                    setActiveC1(null);
                    return;
                }
                if (!activeC1 || !c1List.some(c => c.code === activeC1)) {
                    setActiveC1(c1List[0].code);
                }
            }, [c1List, activeC1]);

            useEffect(() => {
                if (c2List.length === 0) {
                    setActiveC2(null);
                    return;
                }
                if (!activeC2 || !c2List.some(c => c.code === activeC2)) {
                    setActiveC2(c2List[0].code);
                }
            }, [c2List, activeC2]);

            const filteredRows = useMemo(() => {
                const rows = window.ONEAPP.REVIEW.getReviewItems(reviewCategoryTree, activeC1, activeC2);
                return window.ONEAPP.REVIEW.sortReviewItems(rows, sortMode, { getDiffInfo, parseNum });
            }, [reviewCategoryTree, activeC1, activeC2, sortMode]);

            const resetFilters = useCallback(() => {
                setActiveIssue('all');
                setSortMode('category');
                setSearchInput('');
                setSearchTerm('');
            }, []);

            const handleCardClick = useCallback((key) => {
                setActiveIssue(key);
                if (key === 'lowstock') setSortMode('stockAsc');
                else if (key === 'anomaly') setSortMode('diffRateDesc');
                else if (key === 'margin') setSortMode('diffAbsDesc');
                else setSortMode('category');
            }, []);


            const getPromoThemeColumns = useCallback((themeValue) => {
                const selected = parseNum(themeValue);
                const out = { 테마1: '', 테마2: '', 테마3: '', 테마4: '', 테마5: '' };
                if (selected >= 1 && selected <= 5) out[`테마${selected}`] = 1;
                return out;
            }, []);

            const getPromoThemeNo = useCallback((row = {}) => {
                const direct = parseNum(row.행사지정);
                if (direct >= 1 && direct <= 5) return direct;
                for (let i = 1; i <= 5; i++) {
                    if (parseNum(row[`테마${i}`]) === 1 || String(row[`테마${i}`] || '').trim() === '1') return i;
                }
                return 0;
            }, []);


            // ============================================================
            // [E-OUTPUT-02] 최종 마스터 반영 + 통합 엑셀 출력
            // 역할: reviewRows를 기준으로 마스터를 갱신하고 쇼핑몰업로드/ERP업데이트 시트를 생성한다.
            // 주의: 엑셀만 출력은 추적성이 떨어져 제외한다. 소분품목은 원물과 별도 행으로 건수에 포함한다.
            // ============================================================
            const handleExportExcel = useCallback(() => {
                if (reviewRows.length === 0) return showToast('⚠️ 출력할 데이터가 없습니다.');
                if (analysis.margin > 0 || analysis.anomaly > 0) {
                    if (!window.confirm(`역마진 ${analysis.margin}건, 오기의심 ${analysis.anomaly}건이 있습니다.\n관리자 확인 후 마스터에 반영하고 엑셀을 출력하시겠습니까?`)) return;
                }
                setIsProcessing(true);
                showToast('⏳ 마스터 반영 및 통합 엑셀 조립 중...');

                setTimeout(async () => {
                    try {
                        if (!window.XLSX) throw new Error('엑셀 라이브러리 없음');
                        const newMaster = { ...masterProducts };
                        const updatedItems = [];

                        reviewRows.forEach(item => {
                            const code = item.코드;
                            const sale = getSaleState(item);
                            const mItem = { ...(newMaster[code] || { 코드: code }) };
                            mItem['품목명'] = item.품목명;
                            mItem['규격'] = item.규격;
                            mItem['입고가'] = parseNum(item.입고가);
                            mItem['출고가'] = parseNum(item.출고가);
                            mItem['행사가'] = parseNum(item.행사가);
                            mItem['입고B'] = parseNum(item.입고B);
                            mItem['1종코드'] = item['1종코드'] || mItem['1종코드'] || '';
                            mItem['1종규격'] = item['1종규격'] || mItem['1종규격'] || '';
                            mItem['1종연산'] = parseNum(item['1종연산']);
                            mItem['경비'] = parseNum(item['경비']);
                            mItem['외주비'] = parseNum(item['외주비']);
                            mItem['노무비'] = parseNum(item['노무비']);
                            mItem['도매A'] = parseNum(item.도매A);
                            mItem['도매B'] = parseNum(item.도매B);
                            mItem['시중가'] = parseNum(item.시중가);
                            mItem['재고수량'] = parseNum(item.재고수량);
                            mItem['판매여부'] = sale.code;
                            mItem['브랜드'] = item.브랜드 || '';
                            mItem['간단설명'] = item.간단설명 || '';
                            mItem['검색어등록'] = item.검색어등록 || '';
                            mItem['행사지정'] = getPromoThemeNo(item) || '';
                            const themeColsForMaster = getPromoThemeColumns(mItem['행사지정']);
                            mItem['테마1'] = themeColsForMaster.테마1;
                            mItem['테마2'] = themeColsForMaster.테마2;
                            mItem['테마3'] = themeColsForMaster.테마3;
                            mItem['테마4'] = themeColsForMaster.테마4;
                            mItem['테마5'] = themeColsForMaster.테마5;
                            mItem['견적서'] = item.카테고리 || mItem['견적서'] || mItem['카테고리'] || '';
                            updatedItems.push(mItem);
                            newMaster[code] = mItem;
                        });

                        await bulkPutIDB('master_products', updatedItems);
                        setMasterProducts(newMaster);
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());

                        const wb = window.XLSX.utils.book_new();
                        const erpData = [['품목코드', '입고가', '0', '출고가', '0', '입고B', 'n', '도매A', 'n', '도매B', 'n', '최종(전송)', 'n', '행사', 'n', '1']];
                        const shopData = [['상품코드\n코드', '상품명', '규격', '출고가', '도매A', '시중가', '도매B', '도매B', 'C 판매가', 'C 도매가', 'D 판매가', 'D 도매가', '브랜드', '기본설명', '판매여부', '재고수량', '테마1', '테마2', '테마3', '테마4', '테마5', '상품태그']];

                        let subOutputCount = 0;
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            const inPrice = parseNum(item.입고가);
                            const finalOut = parseNum(item.최종출고가);
                            const pASale = parseNum(item.도매A);
                            const pMarket = parseNum(item.시중가);
                            const finalStock = parseNum(item.재고수량);
                            erpData.push([item.코드, inPrice, '0', finalOut, '0', parseNum(item.입고B)||'', 'n', pASale||'', 'n', parseNum(item.도매B)||'', 'n', inPrice, 'n', parseNum(item.행사가)||'', 'n', sale.code]);
                            const themeCols = getPromoThemeColumns(getPromoThemeNo(item));
                            shopData.push([item.코드, item.품목명, item.규격, finalOut, (pASale>0?pASale:finalOut), (pMarket>0?pMarket:finalOut), 0, 0, 0, 0, 0, 0, item.브랜드||'', item.간단설명||'', sale.code, finalStock, themeCols.테마1, themeCols.테마2, themeCols.테마3, themeCols.테마4, themeCols.테마5, item.검색어등록||'']);

                            const subInfo = calculateSubPriceInfo(item);
                            if (subInfo) {
                                // 소분품목은 원물 행과 별도 출력물로 취급한다. ERP와 쇼핑몰업로드 모두 행 수가 증가해야 한다.
                                erpData.push([subInfo.code, subInfo.subIn, '0', subInfo.subOut, '0', '', 'n', '', 'n', '', 'n', subInfo.subIn, 'n', '', 'n', sale.code]);
                                const subShopRow = buildSubShopRow(item, subInfo, masterProducts, sale);
                                if (subShopRow) shopData.push(subShopRow);
                                subOutputCount++;
                            }
                        });

                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), '쇼핑몰업로드');
                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), 'ERP업데이트');
                        window.XLSX.writeFile(wb, `통합업로드용_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast(`✅ 원물 ${reviewRows.length}건 + 소분 ${subOutputCount}건 = 총 ${reviewRows.length + subOutputCount}건 엑셀 다운로드 완료`);
                    } catch (e) {
                        console.error('[Export Excel Error]', e);
                        showToast('❌ 엑셀 파일 생성 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }

            }, [reviewRows, masterProducts, analysis, showToast, getPromoThemeColumns, getPromoThemeNo]);

            // ============================================================
            // [E-OUTPUT-03] 이미지 출력 데이터 브릿지
            // 역할: reviewRows를 이미지 생성기가 읽는 ONEAPP_IMAGE_DATA_TEMP 구조로 변환한다.

                setIsProcessing(true);
                setTimeout(async () => {
                    try {
                        const grouped = {};
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            if (sale.label === '정지중') return;
                            const title = item.카테고리 ? String(item.카테고리).split(',')[0].trim() : '일반 상품목록';
                            const fullName = item.규격 ? `${item.품목명} (${item.규격})` : item.품목명;
                            if (!grouped[title]) grouped[title] = [];
                            grouped[title].push({ name: fullName, price: parseNum(item.최종출고가), prevPrice: parseNum(item.기준출고가) });
                        });
                        const exportData = Object.keys(grouped).map(title => ({ title: `📌 ${title}`, items: grouped[title] }));
                        await setIDB('ONEAPP_IMAGE_DATA_TEMP', JSON.stringify(exportData));
                        showToast('✅ 이미지 데이터 생성 완료. 이미지 뷰어 탭을 확인하세요.');
                    } catch (e) {

                    } finally {
                        setIsProcessing(false);
                    }

            useEffect(() => {

                    const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(tag);
                    if (e.key === 'F9') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleExportExcel();
                    } else if (e.key === 'F10') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleImageExport();

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);

            return (

          root.dataset.errorShown = '1';
          const box = document.createElement('div');
          box.style.cssText = 'position:fixed;inset:16px;z-index:99999;background:#fff;border:2px solid #ef4444;border-radius:16px;padding:20px;font-family:sans-serif;color:#0f172a;overflow:auto;';
          box.innerHTML = '<h2 style="font-weight:900;color:#dc2626;margin-bottom:8px;">FinalReviewCenter 로딩 오류</h2><p>브라우저 캐시 또는 스크립트 오류가 있습니다. Ctrl+F5 후 다시 확인하세요.</p><pre style="white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:8px;margin-top:12px;">' + (e.message || '') + '</pre>';
          document.body.appendChild(box);
        }
      });
    </script>

</body>
</html>
