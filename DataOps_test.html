    const normalizedGroup = normalizeTransferGroupName(groupName);
    if (normalizedGroup === '식자재')
        return ['출고가(공지)', '식자재', '도매A', '출고(외노)'];
    if (normalizedGroup === '창고출고')
        return ['출고가(공지)', '도매A'];
    if (normalizedGroup === '청과상장')
        return ['출고가(공지)', '청과상장산출'];

                customers: [],

                feeMode: feeMode || 'NONE',
                profitMode: profitMode || 'NORMAL',
                outputCustomerMode: outputCustomerMode || 'ORIGINAL_CUSTOMER',
                tone: 'purple'

            card.customers.push(customer);
        if (rulePart)
            card.rule = rulePart.split('>').map(v => v.trim()).filter(Boolean);
        if (feeMode)
            card.feeMode = feeMode;
        if (profitMode)
            card.profitMode = profitMode;

            localStorage.setItem(DATAOPS_MERCH_MASTER_CACHE_KEY, JSON.stringify(normalizedMaster));
            localStorage.setItem(DATAOPS_RAW_SUBDIVISION_CACHE_KEY, JSON.stringify(rawSubdivision));
            localStorage.setItem(DATAOPS_MERCH_MASTER_SUMMARY_KEY, JSON.stringify({ ...summary, url: safeUrl }));
            localStorage.setItem('dataops_master_sync_trigger', String(Date.now()));
            if (window.DATAOPS_MASTER_CACHE_MODULE) window.DATAOPS_MASTER_CACHE_MODULE.refreshMemoryCache();
        }
        catch (e) {
            throw new Error('마스터 캐시 저장 실패: 브라우저 저장공간을 확인하세요.');
        }
        return { status: 'success', url: safeUrl, master: normalizedMaster, rawSubdivision, summary: { ...summary, url: safeUrl } };
    },
    getCachedMaster: () => {
        const parse = (key, fallback) => {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            }
            catch (e) {
                return fallback;
            }
        };
        return {
            master: parse(DATAOPS_MERCH_MASTER_CACHE_KEY, {}),
            rawSubdivision: parse(DATAOPS_RAW_SUBDIVISION_CACHE_KEY, { relations: [], bySubCode: {}, byRawCode: {}, issues: [], summary: {} }),
            summary: parse(DATAOPS_MERCH_MASTER_SUMMARY_KEY, {})
        };
    },
    getSummary: () => (window.DATAOPS_MASTER_CACHE_MODULE ? window.DATAOPS_MASTER_CACHE_MODULE.getContext().summary : DATAOPS_CLOUD_MODULE.getCachedMaster().summary) || {}
});
window.DATAOPS_CLOUD_MODULE = DATAOPS_CLOUD_MODULE;


/* =======================================================================
   1-B-2. v8.99zzx Transfer Check Deterministic Match
   - 목적: 클라우드는 동기화 때만 조회하고, 수불/매칭/치환은 로컬 캐시와 인덱스를 즉시 사용한다.
   - 원칙: 계산 중 클라우드 fetch 금지. 마감 작업은 현재 로컬 마스터 스냅샷 기준으로 고정한다.
   ======================================================================= */
const DATAOPS_MASTER_CACHE_MODULE = {
    _memoryVersion: '',
    _context: null,
    normalizeKey: (val) => safeStr(val, '').replace(/\.0$/, '').replace(/\s/g, '').toLowerCase(),
    safeParse: (key, fallback) => {
        try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
        }
        catch (e) {
            return fallback;
        }
    },
    buildStorageVersion: () => {
        const trigger = safeStr(localStorage.getItem('dataops_master_sync_trigger'), '0');
        const summaryRaw = safeStr(localStorage.getItem(DATAOPS_MERCH_MASTER_SUMMARY_KEY), '');
        return `${trigger}|${summaryRaw.length}`;
    },
    buildIndexes: (masterMap = {}) => {
        const byCode = {};
        const byName = {};
        const byNameUnit = {};
        Object.entries(masterMap || {}).forEach(([fallbackCode, item]) => {
            const m = DATAOPS_CLOUD_MODULE.normalizeMasterItem(item, fallbackCode);
            const codeKey = DATAOPS_MASTER_CACHE_MODULE.normalizeKey(m.코드 || m.품목코드);
            const nameKey = DATAOPS_MASTER_CACHE_MODULE.normalizeKey(`${m.품목명}|${m.규격}`);
            const nameUnitKey = DATAOPS_MASTER_CACHE_MODULE.normalizeKey(`${m.품목명}|${m.규격}|${m.단위}`);
            if (codeKey) byCode[codeKey] = m;
            if (nameKey && !byName[nameKey]) byName[nameKey] = m;
            if (nameUnitKey && !byNameUnit[nameUnitKey]) byNameUnit[nameUnitKey] = m;
        });
        return { byCode, byName, byNameUnit };
    },
    buildSnapshotId: (summary = {}) => {
        const syncedAt = safeStr(summary.syncedAt || summary.updatedAt || '');
        const total = safeNum(summary.total || summary.normalizedCount || 0);
        if (syncedAt) return `MERCH_${syncedAt.replace(/[^0-9]/g, '').slice(0, 14)}_${total}`;
        return `MERCH_LOCAL_${safeStr(localStorage.getItem('dataops_master_sync_trigger'), '0')}`;
    },
    hydrateFromStorage: (force = false) => {
        const version = DATAOPS_MASTER_CACHE_MODULE.buildStorageVersion();
        if (!force && DATAOPS_MASTER_CACHE_MODULE._context && DATAOPS_MASTER_CACHE_MODULE._memoryVersion === version) {
            return DATAOPS_MASTER_CACHE_MODULE._context;
        }
        const master = DATAOPS_MASTER_CACHE_MODULE.safeParse(DATAOPS_MERCH_MASTER_CACHE_KEY, {});
        const rawSubdivision = DATAOPS_MASTER_CACHE_MODULE.safeParse(DATAOPS_RAW_SUBDIVISION_CACHE_KEY, { relations: [], bySubCode: {}, byRawCode: {}, issues: [], summary: {} });
        const summary = DATAOPS_MASTER_CACHE_MODULE.safeParse(DATAOPS_MERCH_MASTER_SUMMARY_KEY, {});
        const indexes = DATAOPS_MASTER_CACHE_MODULE.buildIndexes(master);
        const snapshotId = DATAOPS_MASTER_CACHE_MODULE.buildSnapshotId(summary);
        const context = {
            master,
            rawSubdivision,
            summary: { ...summary, masterSnapshotId: snapshotId },
            indexes,
            snapshotId,
            loadedAt: new Date().toISOString(),
            hasMasterCache: Object.keys(master || {}).length > 0
        };
        DATAOPS_MASTER_CACHE_MODULE._context = context;
        DATAOPS_MASTER_CACHE_MODULE._memoryVersion = version;
        try {
            localStorage.setItem(DATAOPS_MASTER_SNAPSHOT_KEY, snapshotId);
            localStorage.setItem(DATAOPS_MASTER_INDEX_CACHE_KEY, JSON.stringify({ snapshotId, count: Object.keys(master || {}).length, builtAt: context.loadedAt }));
        }
        catch (e) { }
        return context;
    },
    getContext: () => DATAOPS_MASTER_CACHE_MODULE.hydrateFromStorage(false),
    refreshMemoryCache: () => DATAOPS_MASTER_CACHE_MODULE.hydrateFromStorage(true),
    clearMemoryCache: () => {
        DATAOPS_MASTER_CACHE_MODULE._memoryVersion = '';
        DATAOPS_MASTER_CACHE_MODULE._context = null;
    }
};
window.DATAOPS_MASTER_CACHE_MODULE = DATAOPS_MASTER_CACHE_MODULE;

/* =======================================================================
   1-C. v8.99zzd Merch Master Ledger Link
   - 목적: MerchOps MasterDB 캐시를 수불마감/분석원장 출력에 연결한다.
   - 원칙: 원본 수불 데이터는 변경하지 않고, 마스터 연결값은 확인용 보조 컬럼으로만 출력한다.
   ======================================================================= */
const DATAOPS_MASTER_LINK_MODULE = Object.freeze({
    normalizeKey: (val) => safeStr(val, '').replace(/\.0$/, '').replace(/\s/g, '').toLowerCase(),
    getCachedContext: () => DATAOPS_MASTER_CACHE_MODULE.getContext(),
    buildIndexes: (masterMap = {}) => DATAOPS_MASTER_CACHE_MODULE.buildIndexes(masterMap),
    splitDisplayName: (displayName = '') => {
        const raw = safeStr(displayName, '');
        const m = raw.match(/^(.+?)[\s]*[\(\[]([^\)\]]+)[\)\]]\s*$/);
        if (m) return { name: safeStr(m[1]), spec: safeStr(m[2]) };
        return { name: raw, spec: '' };
    },
    findMasterForItem: (item = {}, context = null) => {
        const ctx = context && context.master ? context : DATAOPS_MASTER_LINK_MODULE.getCachedContext();
        const master = ctx.master || {};
        const indexes = ctx.indexes || DATAOPS_MASTER_CACHE_MODULE.buildIndexes(master);
        const code = safeStr(item.코드 === 'NO_CODE' ? '' : item.코드).replace(/\.0$/, '').trim();
        const codeKey = DATAOPS_MASTER_LINK_MODULE.normalizeKey(code);
        if (codeKey && indexes.byCode && indexes.byCode[codeKey]) {
            return { status: '코드일치', matchType: 'CODE', master: indexes.byCode[codeKey] };
        }
        const raw = item._raw || item.raw || {};
        const unit = safeStr(item.단위 || raw['단위'] || raw['규격단위'] || raw['포장단위'], '');
        const split = DATAOPS_MASTER_LINK_MODULE.splitDisplayName(item.품명 || raw['품명'] || raw['상품명']);
        const spec = safeStr(raw['규격'] || item.규격 || split.spec, '');
        const nameKey = DATAOPS_MASTER_LINK_MODULE.normalizeKey(`${split.name}|${spec}`);
        const nameUnitKey = DATAOPS_MASTER_LINK_MODULE.normalizeKey(`${split.name}|${spec}|${unit}`);
        if (nameUnitKey && indexes.byNameUnit && indexes.byNameUnit[nameUnitKey]) {
            return { status: '품명규격단위일치', matchType: 'NAME_SPEC_UNIT', master: indexes.byNameUnit[nameUnitKey] };
        }
        if (nameKey && indexes.byName && indexes.byName[nameKey]) {
            return { status: '품명규격일치', matchType: 'NAME_SPEC', master: indexes.byName[nameKey] };
        }
        const hasMaster = Object.keys(master || {}).length > 0;
        return { status: hasMaster ? '미매칭' : '마스터캐시없음', matchType: 'NONE', master: null };
    },
    getProductRelation: (code = '', context = null) => {
        const ctx = context && context.rawSubdivision ? context : DATAOPS_MASTER_LINK_MODULE.getCachedContext();
        const rels = ctx.rawSubdivision || { bySubCode: {}, byRawCode: {} };
        const safeCode = safeStr(code).replace(/\.0$/, '').trim();
        const subRel = rels.bySubCode && rels.bySubCode[safeCode] ? rels.bySubCode[safeCode] : null;
        const rawRels = rels.byRawCode && rels.byRawCode[safeCode] ? rels.byRawCode[safeCode] : [];
        if (subRel && rawRels.length > 0) return { productType: '원물/소분', relation: subRel, rawRelations: rawRels };
        if (subRel) return { productType: '소분', relation: subRel, rawRelations: [] };
        if (rawRels.length > 0) return { productType: '원물', relation: rawRels[0], rawRelations: rawRels };
        return { productType: '일반', relation: null, rawRelations: [] };
    },
    buildMasterLedgerInfo: (item = {}, context = null) => {
        const ctx = context && context.master ? context : DATAOPS_MASTER_LINK_MODULE.getCachedContext();
        if (item._masterLink && item._masterLink.snapshotId === ctx.snapshotId) return item._masterLink;
        const match = DATAOPS_MASTER_LINK_MODULE.findMasterForItem(item, ctx);
        const m = match.master || {};
        const masterCode = safeStr(m.코드 || m.품목코드);
        const relInfo = DATAOPS_MASTER_LINK_MODULE.getProductRelation(masterCode || item.코드, ctx);
        const rel = relInfo.relation || {};
        return {
            snapshotId: ctx.snapshotId || '',
            matchStatus: match.status,
            matchType: match.matchType,
            masterCode,
            masterName: safeStr(m.품목명),
            masterSpec: safeStr(m.규격),
            masterUnit: safeStr(m.단위),
            productType: relInfo.productType,
            rawCode: safeStr(rel.rawCode || (relInfo.productType === '원물' ? masterCode : '')),
            rawName: safeStr(rel.rawName || (relInfo.productType === '원물' ? m.품목명 : '')),
            rawSpec: safeStr(rel.rawSpec || (relInfo.productType === '원물' ? m.규격 : '')),
            rawUnit: safeStr(rel.rawUnit || (relInfo.productType === '원물' ? m.단위 : '')),
            subCode: safeStr(rel.subCode || (relInfo.productType === '소분' ? masterCode : '')),
            subName: safeStr(rel.subName || (relInfo.productType === '소분' ? m.품목명 : '')),
            subSpec: safeStr(rel.subSpec || (relInfo.productType === '소분' ? m.규격 : '')),
            subUnit: safeStr(rel.subUnit || (relInfo.productType === '소분' ? m.단위 : '')),
            conversionRate: parseNumber(rel.conversionRate),
            costMethod: safeStr(rel.costMethod),
            masterInPrice: parseNumber(m.입고가),
            masterOutPrice: parseNumber(m.출고가),
            masterWholesaleA: parseNumber(m.도매A),
            masterListingPrice: parseNumber(m.상장가),
            masterSalePrice: parseNumber(m.행사가),
            masterSalesStatus: safeStr(m.판매여부),
            hasMasterCache: !!ctx.hasMasterCache
        };
    },
    applyMasterLinksToRows: (rows = [], options = {}) => {
        if (!Array.isArray(rows) || rows.length === 0) return rows || [];
        const ctx = DATAOPS_MASTER_LINK_MODULE.getCachedContext();
        if (!ctx.hasMasterCache && !options.force) return rows;
        return rows.map(item => {
            if (!item) return item;
            if (!options.force && item._masterLink && item._masterLink.snapshotId === ctx.snapshotId) return item;
            const cleanItem = { ...item };
            delete cleanItem._masterLink;
            const info = DATAOPS_MASTER_LINK_MODULE.buildMasterLedgerInfo(cleanItem, ctx);
            return {
                ...item,
                _masterLink: info,
                _masterSnapshotId: info.snapshotId,
                _masterMatched: ['CODE', 'NAME_SPEC_UNIT', 'NAME_SPEC'].includes(info.matchType),
                _productType: info.productType,
                _rawCode: info.rawCode,
                _subCode: info.subCode,
                _subRate: info.conversionRate
            };
        });
    },
    buildOutputColumns: (item = {}) => {
        const info = item._masterLink || DATAOPS_MASTER_LINK_MODULE.buildMasterLedgerInfo(item);
        return {
            '마스터스냅샷ID': info.snapshotId || '',
            '마스터매칭상태': info.matchStatus,
            '마스터매칭방식': info.matchType,
            '마스터품목코드': info.masterCode,
            '마스터품명': info.masterName,
            '마스터규격': info.masterSpec,
            '마스터단위': info.masterUnit,
            '상품구분': info.productType,
            '원물코드': info.rawCode,
            '원물명': info.rawName,
            '원물규격': info.rawSpec,
            '원물단위': info.rawUnit,
            '소분코드': info.subCode,
            '소분명': info.subName,
            '소분규격': info.subSpec,
            '소분단위': info.subUnit,
            '소분연산': info.conversionRate || '',
            '원가계산방식': info.costMethod,
            '마스터입고가': info.masterInPrice || '',
            '마스터출고가': info.masterOutPrice || '',
            '마스터도매A': info.masterWholesaleA || '',
            '마스터상장가': info.masterListingPrice || '',
            '마스터행사가': info.masterSalePrice || '',
            '마스터판매여부': info.masterSalesStatus
        };
    }
});
window.DATAOPS_MASTER_LINK_MODULE = DATAOPS_MASTER_LINK_MODULE;


/* =======================================================================
   1-D. v8.99zzx Transfer Check Deterministic Match
   - 목적: MerchOps 마스터의 원물/소분 관계를 기준으로 소분 마이너스 항목을 치환 후보로 추출하고, 관리자 명령 시 치환입고/치환출고를 반영한다.
   - 원칙: 자동 실행하지 않는다. 후보 확인 후 관리자 버튼으로만 실행한다.
   ======================================================================= */
const DATAOPS_SUBSTITUTION_CANDIDATE_MODULE = Object.freeze({
    normalizeCode: (val) => safeStr(val, '').replace(/\.0$/, '').trim(),
    getItemCode: (item = {}) => DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.normalizeCode(item.코드 === 'NO_CODE' ? '' : item.코드),
    getFifoDateKey: (item = {}) => {
        const raw = safeStr(item.일자 || item._stockRecordDate || '');
        const parsed = formatItemDate(raw, new Date().getFullYear());
        return parsed || 99999999;
    },
    getBalanceInfo: (item = {}) => {
        const finalQty = STOCK_ENGINE_MODULE.getActualQty(item);
        const systemQty = safeNum(item.전산잔량);
        const negativeQty = Math.max(finalQty < 0 ? Math.abs(finalQty) : 0, systemQty < 0 ? Math.abs(systemQty) : 0);
        return { finalQty, systemQty, negativeQty };
    },
    buildRowsByCode: (productData = []) => {
        const byCode = {};
        (productData || []).forEach((item, index) => {
            const code = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getItemCode(item);
            if (!code) return;
            if (!byCode[code]) byCode[code] = [];
            const balance = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getBalanceInfo(item);
            byCode[code].push({ item, index, finalQty: balance.finalQty, systemQty: balance.systemQty, availableQty: Math.max(0, balance.finalQty), fifoKey: DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getFifoDateKey(item) });
        });
        Object.keys(byCode).forEach(code => {
            byCode[code].sort((a, b) => {
                const ar = a.availableQty > 0 ? 0 : 1;
                const br = b.availableQty > 0 ? 0 : 1;
                return ar - br || a.fifoKey - b.fifoKey || safeStr(a.item.거래처).localeCompare(safeStr(b.item.거래처), 'ko') || safeNum(a.item.단가) - safeNum(b.item.단가) || a.index - b.index;
            });
        });
        return byCode;
    },
    buildCandidateRows: ({ productData = [], targetDateStr = '' } = {}) => {
        const rows = [];
        const linkedData = DATAOPS_MASTER_LINK_MODULE.applyMasterLinksToRows(productData || []);
        const byCode = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.buildRowsByCode(linkedData);
        linkedData.filter(item => item && (item.품명 || item.코드)).forEach(item => {
            const info = item._masterLink || DATAOPS_MASTER_LINK_MODULE.buildMasterLedgerInfo(item);
            const balance = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getBalanceInfo(item);
            const conversionRate = parseNumber(info.conversionRate);
            const isSubItem = info.productType === '소분' || info.productType === '원물/소분';
            if (!isSubItem || balance.negativeQty <= 0) return;
            const rawCodeNorm = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.normalizeCode(info.rawCode);
            const rawRefs = rawCodeNorm ? (byCode[rawCodeNorm] || []) : [];
            const rawAvailableTotal = rawRefs.reduce((sum, ref) => sum + Math.max(0, safeNum(ref.availableQty)), 0);
            const rawPrimary = rawRefs.find(ref => safeNum(ref.availableQty) > 0) || rawRefs[0] || null;
            const rawItem = rawPrimary ? rawPrimary.item : null;
            const rawBalance = rawItem ? DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getBalanceInfo(rawItem) : { finalQty: '', systemQty: '', negativeQty: 0 };
            const requiredRawQty = conversionRate > 0 ? Math.ceil(balance.negativeQty / conversionRate) : 0;
            const generatedSubQty = requiredRawQty > 0 && conversionRate > 0 ? requiredRawQty * conversionRate : 0;
            const rawUnitCost = rawItem ? safeNum(rawItem.단가) : 0;
            const subUnitCost = conversionRate > 0 && rawUnitCost > 0 ? Math.round((rawUnitCost / conversionRate) * 100) / 100 : 0;
            let candidateStatus = '치환후보';
            let checkMessage = '관리자 확인 후 치환 실행 가능';
            if (!info.rawCode) {
                candidateStatus = '원물코드없음';
                checkMessage = 'MerchOps 마스터의 1종코드/1종연산 관계 확인 필요';
            }
            else if (conversionRate <= 0) {
                candidateStatus = '소분연산없음';
                checkMessage = '1종연산이 없거나 0입니다.';
            }
            else if (!rawItem) {
                candidateStatus = '원물재고행없음';
                checkMessage = '현재 수불마감 데이터에 원물 재고 행이 없습니다.';
            }
            else if (rawAvailableTotal < requiredRawQty) {
                candidateStatus = '원물부족';
                checkMessage = '필요 원물수량보다 현재 원물 잔량 합계가 부족합니다.';
            }
            rows.push({
                '결산일자': targetDateStr,
                '마스터스냅샷ID': info.snapshotId || '',
                '치환상태': candidateStatus,
                '소분상품코드': info.masterCode || DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.getItemCode(item),
                '소분상품명': safeStr(info.masterName || item.품명),
                '소분규격': safeStr(info.masterSpec),
                '소분단위': safeStr(info.masterUnit),
                '소분마감잔량': balance.finalQty,
                '소분계산잔량': balance.systemQty,
                '부족수량': balance.negativeQty,
                '원물코드': info.rawCode,
                '원물명': info.rawName,
                '원물규격': info.rawSpec,
                '원물단위': info.rawUnit,
                '소분연산': conversionRate || '',
                '필요원물수량': requiredRawQty || '',
                '생성가능소분수량': generatedSubQty || '',
                '원물현재잔량': rawItem ? STOCK_ENGINE_MODULE.getActualQty(rawItem) : '',
                '원물계산잔량': rawItem ? rawBalance.systemQty : '',
                '원물누적현재잔량': rawAvailableTotal || '',
                '원물Lot수': rawRefs.length || '',
                '원물대표구매일': rawItem ? safeStr(rawItem.일자, '') : '',
                '원물대표구매처': rawItem ? safeStr(rawItem.거래처, '') : '',
                '원물입고가': rawUnitCost || '',
                '예상소분단위원가': subUnitCost || '',
                '원가계산방식': info.costMethod || 'raw_cost_divide_conversion',
                '확인내용': checkMessage
            });
        });
        const needByRaw = {};
        const availableByRaw = {};
        rows.forEach(row => {
            const rawCode = DATAOPS_SUBSTITUTION_CANDIDATE_MODULE.normalizeCode(row['원물코드']);
            if (!rawCode || safeStr(row['치환상태']) !== '치환후보') return;
            needByRaw[rawCode] = safeNum(needByRaw[rawCode]) + safeNum(row['필요원물수량']);
            availableByRaw[rawCode] = safeNum(row['원물누적현재잔량']);
        });
        rows.forEach(row => {
