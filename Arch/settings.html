<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Global Settings V1.96</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #010409; color: #334155; margin: 0; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-out { animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
    </style>
</head>
<body class="text-sm h-screen flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const CORE_KEYS = { SETTINGS: 'oneapp_global_settings', MASTER: 'master_products' };
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];
        const REQUIRED_COLS = ['품목코드', '품목명', '규격'];

        // DB 모듈
        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('MerchOpsDB', 2);
            req.onupgradeneeded = (e) => { 
                const db = e.target.result;
                if (!db.objectStoreNames.contains('store')) db.createObjectStore('store'); 
                if (!db.objectStoreNames.contains('master_products')) db.createObjectStore('master_products', { keyPath: '코드' });
            };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const getAllIDB = async (storeName) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, 'readonly');
                const req = tx.objectStore(storeName).getAll();
                req.onsuccess = () => resolve(req.result);
            });
        };

        const clearIDB = async () => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction(['store', 'master_products'], 'readwrite');
                tx.objectStore('store').clear();
                tx.objectStore('master_products').clear();
                tx.oncomplete = () => resolve();
            });
        };

        const DEFAULT_SETTINGS = {
            appScriptUrl: 'https://script.google.com/macros/s/AKfycbzEciWpT_TTxFQlfFr_wXpSfLO3abCV_xwdSH1iJji5itjNHb6uyrtuQ52EIONF8lw-/exec',
            marginRules: [
                { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' },
                { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
            ],
            mappings: {
                estimate: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가', '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고' }
            },
            masterLinks: {
                estimate: { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' }
            },
            visibleMasterCols: { estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] },
            visibleUploadCols: { estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] }
        };

        function SettingsApp() {
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [activeTab, setActiveTab] = useState('cloud');
            const [toastMsg, setToastMsg] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [isClosing, setIsClosing] = useState(false);
            
            const [resetText, setResetText] = useState('');
            const [wipeText, setWipeText] = useState('');
            const [newMapTarget, setNewMapTarget] = useState('');
            const [newMapKeywords, setNewMapKeywords] = useState('');
            const [customEstColInput, setCustomEstColInput] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            useEffect(() => {
                getIDB(CORE_KEYS.SETTINGS).then(data => { if (data) setSettings({...DEFAULT_SETTINGS, ...data}); });
                
                // ESC 키로 닫기
                const handleKeyDown = (e) => { if (e.key === 'Escape') handleGoBack(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const handleSave = async () => {
                await setIDB(CORE_KEYS.SETTINGS, settings);
                // 워크스페이스에도 변경사항 즉각 반영용 트리거
                localStorage.setItem('merchMappings_v870', JSON.stringify(settings.mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(settings.masterLinks));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(settings.visibleUploadCols));
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(settings.visibleMasterCols));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(settings.marginRules));
                localStorage.setItem('merchCloudUrl_v870', settings.appScriptUrl);
                
                showToast('✅ 환경설정이 안전하게 저장되었습니다.');
                setTimeout(() => handleGoBack(), 800);
            };

            const handleGoBack = () => {
                setIsClosing(true);
                setTimeout(() => {
                    const prev = document.referrer;
                    if (prev && !prev.includes('settings.html')) {
                        window.history.back();
                    } else {
                        window.location.href = 'workspace.html'; // 기본 폴백
                    }
                }, 250); // 슬라이드 아웃 애니메이션 시간
            };

            const handleCloudSync = async (type) => {
                if (!settings.appScriptUrl) return showToast('⚠️ GAS API URL을 먼저 설정해주세요.');
                setIsSyncing(true); showToast(`☁️ 클라우드 ${type === 'upload' ? '백업' : '수신'} 중...`);
                try {
                    if(type === 'upload') {
                        const masterData = await getAllIDB('master_products');
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const history = JSON.parse(localStorage.getItem('merchHistory_v870') || '[]');
                        
                        const payload = { 
                            type: "syncAll", 
                            data: { 
                                master: masterData.reduce((acc, item) => { acc[item.코드] = item; return acc; }, {}),
                                dict: dict, rules: settings.marginRules, history: history,
                                appConfig: { mappings: settings.mappings, masterLinks: settings.masterLinks, visibleUploadCols: settings.visibleUploadCols, visibleMasterCols: settings.visibleMasterCols }
                            } 
                        };
                        const res = await fetch(settings.appScriptUrl, { method: 'POST', body: JSON.stringify(payload) });
                        const result = await res.json();
                        if (result.status !== 'success') throw new Error(result.message);
                        showToast('✅ 클라우드 데이터 백업 성공');
                    } else {
                        const res = await fetch(settings.appScriptUrl, { method: 'GET' });
                        const result = await res.json();
                        if (result.status === 'success' && result.data) {
                            showToast(`✅ 클라우드 데이터 수신 성공 (마스터 ${Object.keys(result.data.master||{}).length}건)`);
                        } else throw new Error("Invalid Data");
                    }
                } catch (e) {
                    showToast('❌ 동기화 실패: ' + e.message);
                } finally { setIsSyncing(false); }
            };

            const handleResetSettings = async () => {
                if (resetText !== '설정초기화') return;
                await setIDB(CORE_KEYS.SETTINGS, DEFAULT_SETTINGS); 
                setSettings(DEFAULT_SETTINGS); setResetText('');
                showToast('♻️ 마진 룰 및 매핑 설정이 기본값으로 복원되었습니다.');
            };

            const handleWipeDB = async () => {
                if (wipeText !== 'DB완전삭제') return;
                await clearIDB(); setWipeText('');
                showToast('🚨 로컬 마스터 데이터 및 대기열이 영구 삭제되었습니다.');
            };

            const addCustomUploadCol = () => {
                if(!customEstColInput || !customEstColInput.trim()) return; const cleanVal = customEstColInput.trim();
                if ((settings.visibleUploadCols.estimate || []).includes(cleanVal)) return showToast('⚠️ 이미 추가된 항목입니다.');
                setSettings(p => ({
                    ...p, 
                    visibleUploadCols: { ...p.visibleUploadCols, estimate: [...(p.visibleUploadCols.estimate || []), cleanVal] },
                    mappings: { ...p.mappings, estimate: { ...p.mappings.estimate, [cleanVal]: cleanVal } },
                    masterLinks: { ...p.masterLinks, estimate: { ...p.masterLinks.estimate, [cleanVal]: '' } }
                }));
                setCustomEstColInput('');
            };

            const handleRemoveMapping = (key) => {
                if (REQUIRED_COLS.includes(key)) return showToast('⚠️ 필수 컬럼은 삭제할 수 없습니다.');
                setSettings(p => {
                    const newMappings = { ...p.mappings.estimate }; delete newMappings[key];
                    const newLinks = { ...p.masterLinks.estimate }; delete newLinks[key];
                    return { ...p, mappings: { ...p.mappings, estimate: newMappings }, masterLinks: { ...p.masterLinks, estimate: newLinks } };
                });
            };

            const lnbMenu = [
                { id: 'cloud', icon: 'fas fa-cloud', label: '시스템 & 클라우드 연동' },
                { id: 'ui', icon: 'fas fa-desktop', label: '화면 노출 컬럼 설정' },
                { id: 'mapping', icon: 'fas fa-file-excel', label: '엑셀 헤더 매핑 사전' },
                { id: 'margin', icon: 'fas fa-calculator', label: '단가 계산 및 마진 룰' },
                { id: 'danger', icon: 'fas fa-exclamation-triangle', label: '시스템 초기화', color: 'text-rose-500' }
            ];

            return (
                <div className="fixed inset-0 flex justify-end bg-black/80 overflow-hidden">
                    
                    {/* 💡 좌측 15% 어두운 여백 영역 (터치 시 뒤로가기) */}
                    <div 
                        className="flex-1 cursor-pointer group flex items-center justify-center transition-colors hover:bg-black/60 relative" 
                        onClick={handleGoBack}
                        title="이전 화면으로 돌아가기"
                    >
                        <div className={`flex flex-col items-center text-white/40 group-hover:text-white/90 transition-all duration-300 transform group-hover:-translate-x-2 ${isClosing ? 'opacity-0' : 'opacity-100'}`}>
                            <i className="fas fa-chevron-left text-5xl mb-4 drop-shadow-lg"></i>
                            <span className="font-extrabold tracking-widest text-sm drop-shadow-md">돌아가기</span>
                        </div>
                    </div>

                    {/* 메인 모달 패널 (우측 85%) */}
                    <div className={`w-[85%] max-w-[1600px] h-full shadow-[-15px_0_40px_rgba(0,0,0,0.6)] flex bg-slate-50 ${isClosing ? 'slide-out' : 'slide-in'}`}>
                        
                        {/* 좌측 네비게이션 */}
                        <div className="w-[280px] bg-[#0f172a] flex flex-col shrink-0 text-slate-300">
                            <div className="p-6 border-b border-slate-800">
                                <h1 className="text-xl font-black text-white flex items-center"><i className="fas fa-cogs text-indigo-400 mr-3"></i>SETTING_HUB</h1>
                                <p className="text-[11px] text-slate-500 font-mono mt-2 tracking-widest uppercase">NEXUS Core Config</p>
                            </div>
                            <div className="flex-1 overflow-y-auto py-4">
                                {lnbMenu.map(menu => (
                                    <button key={menu.id} onClick={() => setActiveTab(menu.id)} className={`w-full px-6 py-4 text-left text-[14px] font-bold border-l-4 transition-colors flex items-center ${activeTab === menu.id ? 'bg-[#1e293b] border-indigo-500 text-white' : 'border-transparent text-slate-400 hover:bg-[#1e293b] hover:text-slate-200'} ${menu.color || ''}`}>
                                        <i className={`${menu.icon} w-6`}></i> {menu.label}
                                    </button>
                                ))}
                            </div>
                            <div className="p-6 border-t border-slate-800">
                                <button onClick={handleGoBack} className="w-full px-4 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-[13px] font-bold transition-all shadow-sm flex justify-center items-center">
                                    <i className="fas fa-sign-out-alt mr-2"></i> 설정 닫기
                                </button>
                            </div>
                        </div>

                        {/* 메인 컨텐츠 영역 */}
                        <div className="flex-1 flex flex-col overflow-hidden relative bg-slate-50">
                            <div className="px-10 py-6 border-b border-slate-200 flex justify-between items-center bg-white shadow-sm z-10">
                                <h2 className="text-[18px] font-black text-slate-800">{lnbMenu.find(m => m.id === activeTab)?.label}</h2>
                                <div className="flex gap-3">
                                    <button onClick={handleGoBack} className="px-6 py-3 bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 text-[13px] font-bold rounded-xl transition-all shadow-sm flex items-center">
                                        <i className="fas fa-times mr-2"></i> 닫기
                                    </button>
                                    <button onClick={handleSave} className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-black rounded-xl transition-all shadow-md flex items-center">
                                        <i className="fas fa-save mr-2"></i>전역 설정 반영 및 저장
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-auto p-10">
                                <div className="max-w-[1000px] mx-auto space-y-6 fade-in">
                                    
                                    {activeTab === 'cloud' && (
                                        <>
                                            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                                                <h3 className="text-[15px] font-bold text-slate-800 mb-4"><i className="fas fa-network-wired text-indigo-500 mr-2"></i>Google AppScript API (엔드포인트)</h3>
                                                <input type="text" value={settings.appScriptUrl} onChange={(e) => setSettings({...settings, appScriptUrl: e.target.value})} placeholder="https://script.google.com/macros/s/..." className="w-full border border-slate-300 p-4 rounded-xl text-[13px] font-mono mb-2 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all bg-slate-50" />
                                                <p className="text-[12px] text-slate-500 font-bold ml-1">* 클라우드 마스터 DB, 히스토리, 파서 딕셔너리를 관리하는 백엔드 게이트웨이입니다.</p>
                                            </div>
                                            <div className="bg-white p-8 rounded-2xl border border-indigo-100 shadow-sm">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <h3 className="text-[15px] font-bold text-indigo-700 mb-2"><i className="fas fa-sync-alt mr-2"></i>클라우드 수동 강제 동기화</h3>
                                                        <p className="text-[12px] text-slate-500 font-bold">서버의 최신 정보로 덮어씌우거나, 현재 데이터를 서버로 즉시 밀어 넣습니다.</p>
                                                    </div>
                                                    <div className="flex gap-3">
                                                        <button onClick={() => handleCloudSync('download')} disabled={isSyncing} className="px-6 py-3.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 font-bold rounded-xl shadow-sm disabled:opacity-50 transition-colors">
                                                            {isSyncing ? <><i className="fas fa-spinner fa-spin mr-2"></i>로딩중...</> : <><i className="fas fa-cloud-download-alt mr-2"></i>가져오기 (Pull)</>}
                                                        </button>
                                                        <button onClick={() => handleCloudSync('upload')} disabled={isSyncing} className="px-6 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md disabled:opacity-50 transition-colors">
                                                            {isSyncing ? <><i className="fas fa-spinner fa-spin mr-2"></i>전송중...</> : <><i className="fas fa-cloud-upload-alt mr-2"></i>백업하기 (Push)</>}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {activeTab === 'ui' && (
                                        <>
                                            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                                                <h3 className="text-[15px] font-bold text-slate-800 mb-5 flex items-center"><span className="bg-slate-100 text-slate-600 text-[10px] px-2 py-1 rounded-md mr-2">[공통]</span> 엑셀 데이터 대조용 마스터 컬럼</h3>
                                                <div className="flex flex-wrap gap-2.5">
                                                    {REQUIRED_COLS.map(h => <div key={`ui-req-${h}`} className="px-4 py-2 bg-slate-100 border border-slate-200 text-slate-400 rounded-full text-[12px] font-bold cursor-not-allowed"><i className="fas fa-lock mr-1.5"></i>{h}</div>)}
                                                    {MASTER_HEADERS.filter(h => !REQUIRED_COLS.includes(h)).map(h => (
                                                        <button key={`ui-mst-${h}`} onClick={() => setSettings(p => ({...p, visibleMasterCols: { estimate: p.visibleMasterCols.estimate.includes(h) ? p.visibleMasterCols.estimate.filter(x => x !== h) : [...p.visibleMasterCols.estimate, h]}}))} className={`px-4 py-2 rounded-full text-[12px] font-bold border transition-colors ${settings.visibleMasterCols.estimate.includes(h) ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>{h}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                                                <h3 className="text-[15px] font-bold text-slate-800 mb-5 flex items-center"><span className="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-md mr-2">[작업/입력]</span> 워크스페이스 직접 수정 컬럼</h3>
                                                <div className="flex flex-wrap gap-2.5 mb-6">
                                                    {settings.visibleUploadCols.estimate.filter(h => !REQUIRED_COLS.includes(h)).map(h => (
                                                        <div key={`ui-up-${h}`} className="px-4 py-2 rounded-full text-[12px] font-bold border border-blue-200 bg-blue-50 text-blue-700 flex items-center shadow-sm">
                                                            {h} <button onClick={() => setSettings(p => ({...p, visibleUploadCols: { estimate: p.visibleUploadCols.estimate.filter(x => x !== h)}}))} className="ml-2.5 text-blue-400 hover:text-rose-500"><i className="fas fa-times"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" value={customEstColInput} onChange={e=>setCustomEstColInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCustomUploadCol()} placeholder="추가할 새 컬럼명 입력 (예: 마감시간)" className="flex-1 max-w-[300px] border border-slate-300 rounded-xl px-4 py-3 text-[13px] outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all bg-slate-50" />
                                                    <button onClick={addCustomUploadCol} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl text-[13px] font-bold transition-colors shadow-sm">항목 추가</button>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {activeTab === 'mapping' && (
                                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                            <div className="p-6 bg-slate-50 border-b border-slate-200">
                                                <h3 className="text-[15px] font-bold text-slate-800 mb-1"><i className="fas fa-exchange-alt text-emerald-500 mr-2"></i>엑셀 헤더 지능형 매핑 사전</h3>
                                                <p className="text-[12px] text-slate-500 font-bold ml-1">외부 엑셀 파일 로드 시, 아래 등록된 '키워드'를 감지하여 넥서스의 마스터 필드와 자동 연결합니다.</p>
                                            </div>
                                            <div className="flex-1 overflow-auto max-h-[600px] custom-scrollbar">
                                                <table className="w-full text-left text-[13px]">
                                                    <thead className="bg-white border-b border-slate-200 text-slate-500 font-bold sticky top-0 z-10 shadow-sm">
                                                        <tr><th className="p-4 w-[160px]">NEXUS 화면 필드명</th><th className="p-4">감지 키워드 (콤마 구분)</th><th className="p-4 w-[200px]">마스터 DB 업데이트 연동</th><th className="p-4 w-[60px]">삭제</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {REQUIRED_COLS.map(h => (
                                                            <tr key={`map-req-${h}`} className="bg-slate-50/50">
                                                                <td className="p-4 font-black text-slate-700"><i className="fas fa-lock text-slate-400 mr-2 text-[11px]"></i>{h}</td>
                                                                <td className="p-4"><input type="text" value={settings.mappings.estimate[h]||''} onChange={e=>setSettings(p=>({...p, mappings:{estimate:{...p.mappings.estimate, [h]:e.target.value}}}))} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 bg-white" /></td>
                                                                <td className="p-4"><div className="text-[11px] text-slate-500 bg-slate-200 px-3 py-2 rounded-lg font-bold flex justify-center shadow-inner">식별자 (필수)</div></td>
                                                                <td className="p-4"></td>
                                                            </tr>
                                                        ))}
                                                        {(settings.visibleUploadCols.estimate||[]).filter(h => !REQUIRED_COLS.includes(h)).map(h => (
                                                            <tr key={`map-e-${h}`} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-black text-slate-800">{h}</td>
                                                                <td className="p-4"><input type="text" value={settings.mappings.estimate[h]||''} onChange={e=>setSettings(p=>({...p, mappings:{estimate:{...p.mappings.estimate, [h]:e.target.value}}}))} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 bg-white" /></td>
                                                                <td className="p-4">
                                                                    <select value={settings.masterLinks.estimate[h]||''} onChange={e=>setSettings(p=>({...p, masterLinks:{estimate:{...p.masterLinks.estimate, [h]:e.target.value}}}))} className={`w-full border border-slate-300 rounded-lg px-2 py-2 outline-none focus:border-emerald-400 font-bold text-[12px] cursor-pointer ${settings.masterLinks.estimate[h]?'bg-emerald-50 text-emerald-700':'bg-white text-slate-500'}`}>
                                                                        <option value="">단순 화면 노출 (연동X)</option>
                                                                        {MASTER_HEADERS.map(mh=><option key={mh} value={mh}>{mh}</option>)}
                                                                    </select>
                                                                </td>
                                                                <td className="p-4 text-center"><button onClick={() => handleRemoveMapping(h)} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors"><i className="fas fa-trash-alt"></i></button></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'margin' && (
                                        <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                                            <div className="flex justify-between items-center mb-6">
                                                <div>
                                                    <h3 className="text-[15px] font-bold text-slate-800"><i className="fas fa-calculator text-amber-500 mr-2"></i>동적 단가 계산 (Margin Rules)</h3>
                                                    <p className="text-[12px] font-bold text-slate-500 mt-1">※ '창고코드'와 '단위'를 조합한 트리 구조. (우선순위: 창고+단위 일치 > 창고 일치 > 단위 일치 > *)</p>
                                                </div>
                                                <button onClick={() => setSettings(p => ({...p, marginRules: [...p.marginRules, { id: generateUUID(), whCode: '', unit: '', rate: 10, type: 'divide' }]}))} className="bg-amber-100 hover:bg-amber-200 text-amber-800 px-4 py-2.5 rounded-xl text-[12px] font-bold transition-colors shadow-sm"><i className="fas fa-plus mr-1"></i> 규칙 추가</button>
                                            </div>
                                            <div className="space-y-3">
                                                {settings.marginRules.map((rule, idx) => {
                                                    const isDefault = rule.id === 'default';
                                                    const updateMarginRule = (id, field, value) => setSettings(p => ({...p, marginRules: p.marginRules.map(r => r.id === id ? { ...r, [field]: value } : r)}));
                                                    const deleteMarginRule = (id) => setSettings(p => ({...p, marginRules: p.marginRules.filter(r => r.id !== id)}));
                                                    const examplePrice = rule.type === 'divide' ? Math.round(10000 / (1 - rule.rate / 100)) : Math.round(10000 * (1 + rule.rate / 100));
                                                    
                                                    return (
                                                        <div key={rule.id} className="flex gap-3 items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                            <div className="flex flex-col gap-1.5 w-32">
                                                                <label className="text-[10px] text-slate-500 font-bold">창고조건</label>
                                                                {isDefault ? <div className="text-slate-400 bg-slate-200 rounded px-3 py-2 text-[12px] font-bold text-center">* (모두)</div> : <input type="text" value={rule.whCode} onChange={e=>updateMarginRule(rule.id, 'whCode', e.target.value)} placeholder="01, * (전체)" className="border border-slate-300 px-3 py-2 rounded-lg text-[12px] font-bold outline-none focus:border-amber-400" />}
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 flex-1">
                                                                <label className="text-[10px] text-slate-500 font-bold">단위조건</label>
                                                                {isDefault ? <div className="text-slate-400 bg-slate-200 rounded px-3 py-2 text-[12px] font-bold text-center">* (모두)</div> : <input type="text" value={rule.unit} onChange={e=>updateMarginRule(rule.id, 'unit', e.target.value)} placeholder="ea, *, box" className="border border-slate-300 px-3 py-2 rounded-lg text-[12px] font-bold outline-none focus:border-amber-400" />}
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-28">
                                                                <label className="text-[10px] text-slate-500 font-bold">연산 방식</label>
                                                                <select value={rule.type} onChange={e=>updateMarginRule(rule.id, 'type', e.target.value)} className="border border-slate-300 px-2 py-2 rounded-lg text-[12px] font-bold outline-none focus:border-amber-400 cursor-pointer bg-white text-slate-700">
                                                                    <option value="divide">나누기(÷)</option><option value="multiply">곱하기(×)</option>
                                                                </select>
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-24">
                                                                <label className="text-[10px] text-amber-600 font-bold">마진율 (%)</label>
                                                                <input type="number" value={rule.rate} onChange={e=>updateMarginRule(rule.id, 'rate', Number(e.target.value))} className="border border-amber-300 bg-amber-50 text-amber-700 px-3 py-2 rounded-lg text-[13px] font-black outline-none focus:ring-2 focus:ring-amber-200 text-center" />
                                                            </div>
                                                            <div className="flex flex-col gap-1.5 w-36 items-center justify-center bg-slate-800 rounded-xl px-3 py-2 shadow-inner">
                                                                <label className="text-[10px] text-slate-400 font-bold">1만원 계산 예시</label>
                                                                <div className="text-[14px] font-mono text-emerald-400 font-black">{examplePrice.toLocaleString()}원</div>
                                                            </div>
                                                            {!isDefault && <button onClick={()=>deleteMarginRule(rule.id)} className="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:bg-rose-100 hover:text-rose-500 transition-colors"><i className="fas fa-trash-alt"></i></button>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'danger' && (
                                        <div className="space-y-6 fade-in">
                                            <div className="bg-rose-50 p-8 rounded-2xl border border-rose-200 shadow-sm">
                                                <h3 className="text-[15px] font-black text-rose-700 mb-2">설정값 기본 복원</h3>
                                                <p className="text-[12px] text-rose-600 mb-5 font-bold">화면 컬럼, 매핑 사전, 마진 룰을 초기 상태로 되돌립니다. 마스터 상품 데이터는 유지됩니다.</p>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" placeholder="'설정초기화' 입력" value={resetText} onChange={(e) => setResetText(e.target.value)} className="border border-rose-300 p-3 rounded-xl text-[13px] w-64 outline-none focus:ring-2 focus:ring-rose-200" />
                                                    <button onClick={handleResetSettings} disabled={resetText !== '설정초기화'} className="px-6 py-3 bg-rose-600 hover:bg-rose-700 text-white text-[13px] font-black rounded-xl disabled:opacity-30 transition-colors shadow-sm">복원 실행</button>
                                                </div>
                                            </div>
                                            <div className="bg-[#450a0a] p-8 rounded-2xl border border-rose-900 shadow-sm">
                                                <h3 className="text-[15px] font-black text-rose-400 mb-2">로컬 마스터 DB 강제 삭제 (Wipe)</h3>
                                                <p className="text-[12px] text-rose-300/70 mb-5 font-bold">현재 기기에 저장된 모든 상품 마스터 데이터와 대기열(Queue)이 영구적으로 삭제됩니다. 클라우드에 백업하지 않은 데이터는 복구할 수 없습니다.</p>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" placeholder="'DB완전삭제' 입력" value={wipeText} onChange={(e) => setWipeText(e.target.value)} className="border border-rose-800 bg-rose-950/50 text-rose-200 p-3 rounded-xl text-[13px] w-64 outline-none focus:ring-2 focus:ring-rose-500" />
                                                    <button onClick={handleWipeDB} disabled={wipeText !== 'DB완전삭제'} className="px-6 py-3 bg-rose-600 hover:bg-rose-500 text-white text-[13px] font-black rounded-xl disabled:opacity-30 transition-colors shadow-sm">DB 완전 삭제 실행</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {toastMsg && (
                        <div className="fixed bottom-8 right-8 z-[1000] bg-slate-800 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-[13px] font-bold border border-slate-700">
                            <i className={`fas ${toastMsg.includes('❌') || toastMsg.includes('🚨') || toastMsg.includes('⚠️') ? 'fa-exclamation-triangle text-amber-400' : 'fa-check-circle text-emerald-400'}`}></i>{toastMsg.replace(/✅|❌|🚨|⚠️|☁️|♻️/g, '')}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<SettingsApp />);
    </script>
</body>
</html>
