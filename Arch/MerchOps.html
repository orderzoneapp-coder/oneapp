    <script>
        // 🚨 필수 코어 엔진 
        window.MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록" ];
        window.NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고" ];
        
        window.generateUUID = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); });
        window.parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        window.initIDB = () => new Promise((resolve, reject) => { 
            const request = indexedDB.open('MerchOpsDB', 2); 
            request.onupgradeneeded = (e) => { 
                const db = e.target.result; 
                if (!db.objectStoreNames.contains('store')) db.createObjectStore('store'); 
                if (!db.objectStoreNames.contains('master_products')) db.createObjectStore('master_products', { keyPath: '코드' }); 
            }; 
            request.onsuccess = () => resolve(request.result); 
            request.onerror = () => reject(request.error); 
        });

        window.bulkPutIDB = async (storeName, items) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readwrite'); 
                const store = tx.objectStore(storeName); 
                items.forEach(item => store.put(item)); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        window.getAllIDB = async (storeName) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readonly'); 
                const req = tx.objectStore(storeName).getAll(); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.getIDB = async (key) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readonly'); 
                const req = tx.objectStore('store').get(key); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.setIDB = async (key, val) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readwrite'); 
                tx.objectStore('store').put(val, key); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        // 기존 마진 룰 엔진
        window.calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const ROUND_UNIT = 100;
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) ? window.parseNum(mItem?.['외주비']) : window.parseNum(currentFinalData?.['외주비']);
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) ? window.parseNum(mItem?.['노무비']) : window.parseNum(currentFinalData?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => { 
                if (ruleWh === '*') return true; 
                const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh))); 
            };
            const matchUnit = (ruleUnit, targetUnit) => { 
                if (ruleUnit === '*') return true; 
                const targets = String(ruleUnit).toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => targetUnit === s || targetUnit.includes(s)); 
            };

            let bestRule = null; let bestScore = -1;
            const safeMarginRules = Array.isArray(marginRules) ? marginRules : [];
            safeMarginRules.forEach(r => { 
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) { 
                    let score = 0; 
                    if (r.whCode !== '*') score += 2; 
                    if (r.unit !== '*') score += 1; 
                    if (score > bestScore) { bestScore = score; bestRule = r; } 
                } 
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' }; let calcOutPrice = 0;
            if (baseInPrice > 0) { 
                if (appliedRule.type === 'divide') calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); 
                else calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); 
                calcOutPrice = Math.round(calcOutPrice / ROUND_UNIT) * ROUND_UNIT; 
            }

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice }; 
            newFinalData['시중가'] = calcOutPrice;
            const providedOutPrice = window.parseNum(currentFinalData?.['출고가']); 
            const mIn = window.parseNum(mItem?.['입고가']); 
            const mOut = window.parseNum(mItem?.['출고가']);

            if (baseInPrice === 0) newFinalData['출고가'] = 0; 
            else if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice; 
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut; 
            else newFinalData['출고가'] = calcOutPrice;
            
            return newFinalData;
        };

        // 🌟 [5단 우선순위 단가 병합 및 테마 지정 엔진] - 화면 덮어쓰기 로직 제거
        window.computeFinalData = (mItem, sources, marginRules) => {
            const inv = sources['inventory'] || {};
            const est = sources['estimate'] || {};
            
            const invStock = inv['재고수량'] !== undefined ? window.parseNum(inv['재고수량']) : (inv['안전재고'] !== undefined ? window.parseNum(inv['안전재고']) : 999);
            const hasInv = Object.keys(inv).length > 0;
            const hasEst = Object.keys(est).length > 0;
            
            const invPromo = window.parseNum(inv['행사가']);
            const estPromo = window.parseNum(est['행사가']);
            
            const invInPrice = inv['입고가'] !== undefined ? window.parseNum(inv['입고가']) : window.parseNum(mItem['입고가']);
            const estInPrice = est['입고가'] !== undefined ? window.parseNum(est['입고가']) : window.parseNum(mItem['입고가']);
            const masterInPrice = window.parseNum(mItem['입고가']);

            const invNormal = window.calculatePricesEngine(invInPrice, mItem, inv, marginRules, true);
            const estNormal = window.calculatePricesEngine(estInPrice, mItem, est, marginRules, true);
            const masterNormal = window.calculatePricesEngine(masterInPrice, mItem, {}, marginRules, true);
            
            let targetSource = {};
            let theme = 0; // 1: 견적행사, 2: 재고행사
            let isPromo = false;
            let normalPrice = 0; // 50% 폭등락 검수용 오리지널가
            
            // 주의: 화면(UI) 시야 확보를 위해 출고가를 덮어쓰지 않고 행사가 메타 데이터만 부여합니다.
            if (hasInv && invStock > 0 && invPromo > 0) {
                targetSource = { ...invNormal, '행사가': invPromo }; 
                theme = 2; 
                isPromo = true; 
                normalPrice = invNormal['출고가'];
            } else if (hasEst && estPromo > 0) {
                targetSource = { ...estNormal, '행사가': estPromo }; 
                theme = 1; 
                isPromo = true; 
                normalPrice = estNormal['출고가'];
            } else if (hasInv && invStock > 0) {
                targetSource = invNormal; 
                theme = 0; 
                normalPrice = invNormal['출고가'];
            } else if (hasEst) {
                targetSource = estNormal; 
                theme = 0; 
                normalPrice = estNormal['출고가'];
            } else {
                targetSource = masterNormal; 
                theme = 0; 
                normalPrice = masterNormal['출고가'];
            }
            
            // 시중가는 무조건 마스터 기준(정상가)
            targetSource['시중가'] = masterNormal['출고가'] > 0 ? masterNormal['출고가'] : normalPrice;
            targetSource._theme = theme;
            targetSource._isPromo = isPromo;
            targetSource._normalPrice = normalPrice;
            
            return targetSource;
        };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const safeJSONParse = (key, defaultVal) => {

        const getCellWidthClass = (h) => {
            if (window.NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            
            Object.keys(mappingConfig).forEach(field => {
                const keywords = String(mappingConfig[field]).split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                let matchedKey = actualHeaders.find(h => { 
                    if(!h) return false; 
                    const cleanH = String(h).toLowerCase().replace(/\s/g, ''); 
                    return keywords.includes(cleanH); 
                });
                
                if (!matchedKey) {
                    matchedKey = actualHeaders.find(h => {
                        if(!h) return false; 
                        const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                        return keywords.some(kw => { 
                            if (kw === '코드' && (cleanH.includes('1') || cleanH.includes('2') || cleanH.includes('3') || cleanH.includes('종'))) return false; 
                            return cleanH.includes(kw); 
                        });
                    });
                }
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                
                const processData = (data, type) => {
                    try {
                        const wb = window.XLSX.read(data, { type: type, cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return [];

                        let headerRowIdx = -1;
                        const maxSearch = Math.min(25, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowArr = jsonAll[i] || [];
                            const rowStr = rowArr.join('').replace(/\s/g, '');
                            if (rowStr.includes('품목코드') || rowStr.includes('상품코드') || rowStr.includes('바코드') || 
                               (rowStr.includes('코드') && (rowStr.includes('품명') || rowStr.includes('상품명') || rowStr.includes('규격'))) || 
                               (rowStr.includes('품명') && (rowStr.includes('규격') || rowStr.includes('단가')))) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        
                        if (headerRowIdx === -1) return null; 

                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { 
                                    filledCount++; 
                                    rawStr += String(val).replace(/\s/g, ''); 
                                }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i]; 
                            if (!row) continue;
                            let isEmpty = true; 
                            const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) { 
                                    obj[h] = row[idx]; 
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; 
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        return parsedData;
                    } catch(err) { 
                        return null; 
                    }
                };

                const isCSV = file.name.toLowerCase().endsWith('.csv');
                if (isCSV) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        if (text.includes('')) {
                            const utf8Reader = new FileReader();
                            utf8Reader.onload = (e2) => { resolve(processData(e2.target.result, 'string') || []); };
                            utf8Reader.readAsText(file, 'utf-8');
                        } else { 
                            resolve(processData(text, 'string') || []); 
                        }
                    };
                    reader.readAsText(file, 'euc-kr');
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => { resolve(processData(new Uint8Array(e.target.result), 'array') || []); };

            });
        };

                                if (oldVal !== newVal) {

                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked,

                                            newVal: newVal, 
                                            diff: newVal - oldVal 
                                        });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {

                                            id: window.generateUUID(),

                                            diff: 0
                                        });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;
                });

                if (localLogs.length > 0) {

                ui.showToast(`✅ ${commitCount}건 마스터 업데이트 완료.`);

        // 🌟 [오기 검수 방어망 및 0원 판별 적용] F7 Review Modal
        const ReviewModal = ({ onClose, onConfirm, state, data }) => {
            const targetRows = useMemo(() => state.fullDisplayRows.filter(row => state.selectedRows.has(row.코드)), [state.fullDisplayRows, state.selectedRows]);

            const analysis = useMemo(() => {
                let up = 0, down = 0, newStock = 0, soldOut = 0;
                let hasAnomaly = false;
                const list = [];

                targetRows.forEach(row => {
                    const mItem = data.masterProducts[row.코드];
                    const oldP = mItem ? window.parseNum(mItem['입고가']) : 0;
                    const newP = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : row.sources?.['estimate']?.['입고가']);
                    
                    let status = 'same';
                    if (!mItem) { status = 'new_stock'; newStock++; }
                    else if (oldP === 0 && newP > 0) { status = 'new_stock'; newStock++; }
                    else if (oldP > 0 && newP === 0) { status = 'sold_out'; soldOut++; }
                    else if (oldP === 0 && newP === 0) { status = 'same'; }
                    else if (newP > oldP) { status = 'up'; up++; }
                    else if (newP < oldP) { status = 'down'; down++; }
                    else { status = 'same'; }

                    // 5단 병합 엔진에서 넘겨준 테마 및 행사 정보
                    const isPromo = row.finalData?._isPromo;
                    const theme = row.finalData?._theme;
                    
                    // 오기 검수: 정상가(마진룰적용가) 대비 50% 이상 변동이 있는지 확인
                    const normalPrice = row.finalData?._normalPrice || oldP;
                    
                    // 🌟 원래 출고가와 행사가 최종 적용가를 분리하여 가져옵니다.
                    const baseOutPrice = window.parseNum(row.finalData?.['출고가']);
                    const promoPrice = window.parseNum(row.finalData?.['행사가']);
                    const finalOutPrice = isPromo && promoPrice > 0 ? promoPrice : baseOutPrice;
                    
                    const anomaly = isPromo && normalPrice > 0 && (Math.abs(finalOutPrice - normalPrice) / normalPrice >= 0.5);
                    if (anomaly) hasAnomaly = true;

                    list.push({
                        코드: row.코드,
                        품명: row.finalData?.['품목명'] || row.sources?.['estimate']?.['품목명'] || mItem?.품목명 || '',
                        규격: row.finalData?.['규격'] || row.sources?.['estimate']?.['규격'] || mItem?.규격 || '',
                        기존단가: oldP, 
                        새단가: newP, 
                        차액: newP - oldP, 
                        상태: status,
                        isPromo, 
                        theme, 
                        anomaly, 
                        baseOutPrice, // 원래의 정상 출고가
                        finalOutPrice // 행사가 덮어쓰기 된 최종 쇼핑몰가
                    });
                });

                // 강제 정렬: 오기 의심(anomaly)이 최상단, 그다음 금액 변동순
                list.sort((a, b) => {
                    if (a.anomaly && !b.anomaly) return -1;
                    if (!a.anomaly && b.anomaly) return 1;
                    return Math.abs(b.차액) - Math.abs(a.차액);
                });
                return { up, down, newStock, soldOut, total: targetRows.length, list, hasAnomaly };
            }, [targetRows, data.masterProducts]);

            return (

                    <div className="bg-white w-[900px] max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden" onClick={(e) => e.stopPropagation()}>

                            </div>
                        )}

                                    <div className="text-emerald-700 font-black text-xl">{analysis.newStock}<span className="text-[11px] ml-1 font-bold">건</span></div>
                                </div>
                                <div className="bg-white border border-slate-300 p-3 rounded-xl flex flex-col items-center justify-center shadow-sm">

                                    <div className="text-slate-700 font-black text-xl">{analysis.soldOut}<span className="text-[11px] ml-1 font-bold">건</span></div>

                                                        {item.anomaly && <i className="fas fa-exclamation-triangle text-rose-500 ml-2 animate-pulse" title="단가 오기 의심!"></i>}

                data.setManagedItems(prev => {
                    const code = row.코드;
                    let currentItem = prev[code] || { 코드: code, sources: {}, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: v } };

                        currentItem.finalData[field] = isNumeric ? window.parseNum(v) : v;

                    return { ...prev, [code]: currentItem };
                });

            const handleKeyDown = (e) => { 
                if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) { 
                    e.preventDefault(); 
                    e.target.blur(); 
                    
                    const td = e.target.closest('td');

                    const tbody = tr.closest('tbody');

                    const trs = Array.from(tbody.children);
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx;
                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);

                    if (nextRowIdx !== rowIdx) {
                        const nextTr = trs[nextRowIdx];

                        if (nextInput) {

                            nextInput.select();
                        }

                                className={`w-full bg-transparent hover:bg-white/60 focus:bg-white focus:ring-1 rounded px-1.5 outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''} text-[12px] py-1`}

                                onKeyDown={handleKeyDown}

                            />
