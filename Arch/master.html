<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>NEXUS - Master DB [관제탑]</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #000000; color: #c9d1d9; margin: 0; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
        
        .term-bg { background-color: #010409; }
        .term-panel { background-color: #0d1117; border: 1px solid #30363d; }
        .term-border { border-color: #30363d; }
        
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Excel-like Grid Styles */
        .excel-table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: max-content; }
        .excel-th { background-color: #161b22; border-right: 1px solid #30363d; border-bottom: 2px solid #30363d; color: #8b949e; font-weight: 800; font-size: 11px; padding: 10px 12px; white-space: nowrap; position: sticky; top: 0; z-index: 20; box-shadow: 0 1px 2px rgba(0,0,0,0.5); text-align: left; }
        .excel-td { border-right: 1px solid #21262d; border-bottom: 1px solid #21262d; padding: 0; background-color: #0d1117; white-space: nowrap; transition: background-color 0.1s; }
        .excel-tr:hover .excel-td { background-color: #161b22; }
        .excel-input { width: 100%; height: 100%; min-height: 38px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: #c9d1d9; border: 2px solid transparent; outline: none; background: transparent; transition: all 0.1s; }
        .excel-input:focus { border-color: #58a6ff; background-color: #010409; box-shadow: inset 0 0 0 1px #58a6ff; position: relative; z-index: 10; border-radius: 2px; }
        
        /* Sticky Columns */
        .sticky-col-1 { position: sticky; left: 0; z-index: 15; background-color: #0d1117 !important; border-right: 2px solid #30363d; }
        .sticky-col-2 { position: sticky; left: 140px; z-index: 15; background-color: #0d1117 !important; box-shadow: 2px 0 10px rgba(0,0,0,0.5); border-right: 2px solid #30363d; }
        .excel-th.sticky-col-1, .excel-th.sticky-col-2 { z-index: 30; background-color: #161b22 !important; }

        /* Premium Edge Navigation Button */
        .edge-nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 240px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #8b949e;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 50;
            transition: background-color 0.2s, color 0.2s;
        }
        .edge-nav-btn.right {
            right: 0;
            border-right: none;
            border-radius: 16px 0 0 16px;
        }
        .edge-nav-btn:hover {
            background: rgba(33, 38, 45, 0.95);
            color: #58a6ff;
        }
        .edge-nav-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
            color: #58a6ff;
        }
        .edge-nav-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body class="term-bg text-sm h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col w-full overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, Fragment, useRef } = React;

        // [보안] 순수 JS F12 및 우클릭 원천 차단
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        const CORE_KEYS = {
            BASE_CATALOG: 'oneapp_base_catalog',
            PENDING_QUEUE: 'oneapp_pending_queue',
            SETTINGS: 'oneapp_global_settings',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", 
            "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", 
            "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", 
            "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", 
            "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", 
            "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그", "순번"
        ];

        const initIDB = () => new Promise((resolve) => {
            const req = indexedDB.open('OneAppMerchDB_V3', 1);
            req.onupgradeneeded = (e) => { 
                if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); 
            };
            req.onsuccess = () => resolve(req.result);
        });

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const req = db.transaction('store', 'readonly').objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
            });
        };

        const safeStr = (v, defaultVal = '') => (v === undefined || v === null || String(v).trim() === '') ? defaultVal : String(v);

        const GlobalHeader = ({ activeTab, pendingCount }) => {
            const tabs = [
                { id: 'master', name: '마스터 DB', icon: 'fas fa-server', url: 'master.html' },
                { id: 'manager', name: '상품 관리', icon: 'fas fa-tasks', url: 'manager.html' },
                { id: 'workspace', name: '시세 관리', icon: 'fas fa-edit', url: 'workspace.html' },
                { id: 'parser', name: '스마트 파서', icon: 'fas fa-bolt', url: 'parser.html' }
            ];

            return (
                <div className="flex flex-col shrink-0 z-40 w-full term-bg border-b term-border">
                    <header className="h-[60px] flex justify-between items-center px-6">
                        <div className="flex items-center">
                            <span className="font-black text-[20px] tracking-wider text-white mr-8">NEXUS<span className="text-[#3fb950]">.IO</span></span>
                            <div className="flex items-end h-full pt-2 mt-[11px]">
                                {tabs.map(tab => {
                                    const isActive = activeTab === tab.id;
                                    const isManager = tab.id === 'manager';
                                    return (
                                        <a key={tab.id} href={tab.url} className={`relative flex items-center gap-2 px-5 py-3 text-[13px] font-bold rounded-t-lg transition-colors border-x border-t ${isActive ? 'term-panel border-b-transparent text-white z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.5)]' : 'border-transparent text-gray-500 hover:text-gray-300'}`} style={{ marginBottom: isActive ? '-1px' : '0' }}>
                                            <i className={`${tab.icon} ${isActive ? (tab.id === 'master' ? 'text-[#e3b341]' : 'text-[#3fb950]') : ''}`}></i> {tab.name}
                                            {isManager && pendingCount > 0 && <span className="ml-1.5 flex h-5 min-w-[20px] px-1.5 items-center justify-center rounded-full bg-[#f85149] text-white text-[10px] font-black shadow-sm animate-pulse">{pendingCount}</span>}
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                        <button onClick={() => window.location.href = 'settings.html'} className="px-4 py-2 bg-[#161b22] hover:bg-[#21262d] text-white font-bold rounded text-xs transition-colors border term-border">
                            <i className="fas fa-sliders-h text-[#58a6ff] mr-2"></i>환경 설정
                        </button>
                    </header>
                </div>
            );
        };

        const EditableCell = React.memo(({ code, field, value, onSave, isFixed }) => {
            const [localVal, setLocalVal] = useState(value || '');
            const [isEditing, setIsEditing] = useState(false);
            
            useEffect(() => { setLocalVal(value || ''); }, [value]);

            const commitChange = () => {
                setIsEditing(false);
                if (String(localVal).trim() !== String(value || '').trim()) onSave(code, field, localVal);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
            };
            
            return (
                <td className="excel-td" onClick={() => !isFixed && setIsEditing(true)}>
                    <input 
                        type="text" 
                        className={`excel-input ${isFixed ? 'text-gray-500 cursor-not-allowed bg-[#010409]' : 'text-white hover:bg-[#161b22]'} text-ellipsis overflow-hidden whitespace-nowrap`}
                        value={localVal}
                        onChange={(e) => setLocalVal(e.target.value)}
                        onBlur={commitChange}
                        onKeyDown={handleKeyDown}
                        readOnly={isFixed}
                        placeholder={isFixed ? '' : '-'}
                        title={localVal} 
                    />
                </td>
            );
        }, (prev, next) => prev.value === next.value && prev.code === next.code);

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center backdrop-blur-sm fade-in">
                    <div className="bg-[#0d1117] border border-[#30363d] rounded-xl p-6 shadow-2xl max-w-sm w-full">
                        <h3 className="text-white font-bold text-lg mb-2"><i className="fas fa-exclamation-circle text-[#e3b341] mr-2"></i>{title}</h3>
                        <p className="text-gray-400 text-sm mb-6 leading-relaxed">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button onClick={onCancel} className="px-4 py-2 rounded bg-[#21262d] hover:bg-[#30363d] text-white text-sm font-bold transition-colors">취소</button>
                            <button onClick={onConfirm} className="px-4 py-2 rounded bg-[#e3b341] hover:bg-yellow-500 text-black text-sm font-bold transition-colors">확인</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [baseCatalog, setBaseCatalog] = useState({});
            const [pendingCount, setPendingCount] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [cloudUrl, setCloudUrl] = useState('');
            
            // Navigation State
            const [isNavigating, setIsNavigating] = useState(false);

            // Modal State
            const [confirmDialog, setConfirmDialog] = useState(null);

            // Category State
            const [activeC1, setActiveC1] = useState('');
            const [activeC2, setActiveC2] = useState('');
            
            // Refs for Scroll Spy
            const tableContainerRef = useRef(null);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 4000); }, []);

            const loadData = useCallback(async () => {
                const catalog = await getIDB(CORE_KEYS.BASE_CATALOG) || {};
                const queue = await getIDB(CORE_KEYS.PENDING_QUEUE) || {};
                const settings = await getIDB(CORE_KEYS.SETTINGS) || {};
                
                setBaseCatalog(catalog);
                setPendingCount(Object.keys(queue).length);
                if (settings.appScriptUrl) setCloudUrl(settings.appScriptUrl);
            }, []);

            useEffect(() => {
                loadData();
                const handleStorage = (e) => { if (e.key === CORE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, [loadData]);

            const handleNavigate = (url) => {
                if (isNavigating) return;
                setIsNavigating(true);
                setTimeout(() => { window.location.href = url; }, 100);
            };

            const callCloudAPI = async (action, data = null) => {
                if (!cloudUrl) { showToast('❌ 환경설정에서 앱스 스크립트 URL을 먼저 등록해주세요.'); return null; }
                setIsSyncing(true);
                try {
                    const response = await fetch(cloudUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, userId: "nexus_admin", role: "MASTER", data })
                    });
                    const result = await response.json();
                    if (result.status === 'error') throw new Error(result.message);
                    return result.data;
                } catch (error) {
                    showToast(`🚨 통신 오류: ${error.message}`); return null;
                } finally {
                    setIsSyncing(false);
                }
            };

            const handlePullMaster = async () => {
                showToast('📥 클라우드에서 최신 데이터를 확인합니다...');
                const result = await callCloudAPI('PULL_MASTER');
                if (result) {
                    await setIDB(CORE_KEYS.BASE_CATALOG, result.master);
                    setBaseCatalog(result.master);
                    showToast('✅ 클라우드 데이터 수신 완료 및 마스터 업데이트 완료');
                }
            };

            const handlePushCloud = () => {
                if (pendingCount > 0) {
                    showToast(`⚠️ 배포 차단됨: [상품 관리] 탭에 승인 대기 중인 ${pendingCount}건의 데이터가 남아있습니다. 먼저 확정(승인)해주세요.`);
                    return;
                }
                
                setConfirmDialog({
                    title: '클라우드 배포',
                    message: '현재 로컬 마스터 데이터(스냅샷)를 본사 클라우드 서버로 배포(Push)하시겠습니까?',
                    onConfirm: async () => {
                        setConfirmDialog(null);
                        const catalogArray = Object.values(baseCatalog);
                        showToast('📤 클라우드로 데이터를 전송 중입니다...');
                        const result = await callCloudAPI('PUSH_MERCHOPS_DELTA', catalogArray);
                        if (result) showToast(`☁️ 클라우드 서버 동기화 완료: ${result.message || '성공'}`);
                    }
                });
            };

            const handleExportExcel = () => {
                if (!window.XLSX) { showToast('❌ 엑셀 라이브러리가 로드되지 않았습니다.'); return; }
                if (displayRows.length === 0) { showToast('⚠️ 내보낼 데이터가 없습니다.'); return; }
                
                showToast('⏳ 엑셀 파일을 생성 중입니다...');
                setTimeout(() => {
                    try {
                        const exportData = displayRows.map(item => {
                            const row = {};
                            MASTER_HEADERS.forEach(h => {
                                if (h === '품목코드') row[h] = item['코드'] || item['품목코드'] || '';
                                else row[h] = item[h] || '';
                            });
                            return row;
                        });
                        const ws = window.XLSX.utils.json_to_sheet(exportData, { header: MASTER_HEADERS });
                        const wb = window.XLSX.utils.book_new();
                        window.XLSX.utils.book_append_sheet(wb, ws, "MasterDB");
                        window.XLSX.writeFile(wb, `MasterDB_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast('✅ 엑셀 다운로드가 완료되었습니다.');
                    } catch (error) {
                        showToast('❌ 엑셀 생성 중 오류가 발생했습니다.');
                    }
                }, 100);
            };

            const handleImportExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!window.XLSX) { showToast('❌ 엑셀 라이브러리가 로드되지 않았습니다.'); return; }

                showToast('⏳ 엑셀/CSV 파일을 읽고 분석하는 중입니다...');
                const isCSV = file.name.toLowerCase().endsWith('.csv');

                const processWorkbookData = async (parsedData) => {
                    if (!parsedData || parsedData.length === 0) {
                        showToast('⚠️ 인식할 수 있는 데이터가 없거나 형식이 맞지 않습니다.');
                        e.target.value = ''; return;
                    }
                    let newMaster = { ...baseCatalog };
                    let updatedCount = 0;
                    parsedData.forEach(row => {
                        const code = row['품목코드'] || row['상품코드'] || row['코드'] || row['바코드'];
                        if (code) {
                            const cleanCode = String(code).trim();
                            if (!cleanCode) return;
                            if (!newMaster[cleanCode]) newMaster[cleanCode] = { 코드: cleanCode };
                            MASTER_HEADERS.forEach(h => {
                                if (h !== '품목코드' && h !== '코드' && row[h] !== undefined && row[h] !== "") {
                                    const val = row[h];
                                    if (['출고가', '입고가', '입고B', '도매A', '도매B', '상장가', '최종전송', '최종입고', '시중가', '안전재고', '순번'].includes(h)) {
                                        newMaster[cleanCode][h] = Number(String(val).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
                                    } else { newMaster[cleanCode][h] = val; }
                                }
                            });
                            if (row['품목명'] || row['상품명'] || row['품명']) {
                                newMaster[cleanCode]['품목명'] = row['품목명'] || row['상품명'] || row['품명'];
                            }
                            updatedCount++;
                        }
                    });
                    setBaseCatalog(newMaster);
                    await setIDB(CORE_KEYS.BASE_CATALOG, newMaster);
                    localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    showToast(`✅ 업로드 완료: ${updatedCount}건의 상품 정보가 갱신되었습니다.`);
                    e.target.value = '';
                };

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = isCSV ? evt.target.result : new Uint8Array(evt.target.result);
                        const wb = window.XLSX.read(data, { type: isCSV ? 'string' : 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        let headerRowIdx = -1;
                        for (let i = 0; i < Math.min(25, jsonAll.length); i++) {
                            const rowStr = (jsonAll[i] || []).join('').replace(/\s/g, '');
                            if (rowStr.includes('품목코드') || rowStr.includes('상품코드') || rowStr.includes('바코드')) { headerRowIdx = i; break; }
                        }
                        if (headerRowIdx === -1) headerRowIdx = 0;
                        const headers = jsonAll[headerRowIdx] || [];
                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i];
                            if (!row || row.length === 0) continue;
                            const obj = {}; let isEmpty = true;
                            headers.forEach((h, idx) => { if (h) { obj[String(h).trim()] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } });
                            if(!isEmpty) parsedData.push(obj);
                        }
                        processWorkbookData(parsedData);
                    } catch(err) { showToast('❌ 파싱 실패'); }
                };
                if (isCSV) reader.readAsText(file, 'euc-kr'); else reader.readAsArrayBuffer(file);
            };

            const handleCellSave = useCallback(async (code, field, newValue) => {
                try {
                    let newMaster = { ...baseCatalog };
                    if (!newMaster[code]) newMaster[code] = { 코드: code };
                    newMaster[code][field] = newValue;
                    setBaseCatalog(newMaster);
                    await setIDB(CORE_KEYS.BASE_CATALOG, newMaster);
                    localStorage.setItem(CORE_KEYS.SYNC_TRIGGER, Date.now().toString());
                } catch(e) { showToast("❌ 저장 중 오류 발생"); }
            }, [baseCatalog, showToast]);

            const c1List = useMemo(() => {
                const map = new Map();
                Object.values(baseCatalog).filter(Boolean).forEach(p => { 
                    if (p['1그룹명']) {
                        if (!map.has(p['1그룹명']) || (!map.get(p['1그룹명']) && p['1코드'])) {
                            map.set(p['1그룹명'], p['1코드'] || '');
                        }
                    } 
                });
                return Array.from(map.entries())
                    .sort((a, b) => String(a[1]).localeCompare(String(b[1]), undefined, { numeric: true }) || String(a[0]).localeCompare(String(b[0])))
                    .map(entry => entry[0]);
            }, [baseCatalog]);

            const c2List = useMemo(() => {
                if (!activeC1) return [];
                const map = new Map();
                Object.values(baseCatalog).filter(Boolean).forEach(p => { 
                    if (p['1그룹명'] === activeC1 && p['2그룹명']) {
                        if (!map.has(p['2그룹명']) || (!map.get(p['2그룹명']) && p['2코드'])) {
                            map.set(p['2그룹명'], p['2코드'] || '');
                        }
                    } 
                });
                return Array.from(map.entries())
                    .sort((a, b) => String(a[1]).localeCompare(String(b[1]), undefined, { numeric: true }) || String(a[0]).localeCompare(String(b[0])))
                    .map(entry => entry[0]);
            }, [baseCatalog, activeC1]);

            useEffect(() => { if (c1List.length > 0 && !c1List.includes(activeC1)) setActiveC1(c1List[0]); }, [c1List, activeC1]);
            
            // Scroll Sync for C2 Sidebar
            useEffect(() => {
                if (!searchTerm && activeC2) {
                    const btn = document.getElementById(`c2-btn-${activeC2}`);
                    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, [activeC2, searchTerm]);

            const displayRows = useMemo(() => {
                const arr = Object.values(baseCatalog).filter(Boolean);
                let filtered = [];
                if (searchTerm.trim()) {
                    const kw = searchTerm.toLowerCase().replace(/\s+/g, '');
                    filtered = arr.filter(item => (String(item.코드 || '') + String(item.품목명 || '') + String(item.규격 || '')).toLowerCase().includes(kw)); 
                } else {
                    // Show ALL items for selected C1 (ignoring activeC2 filter to allow continuous scrolling)
                    filtered = arr.filter(p => p['1그룹명'] === activeC1);
                }
                
                return filtered.sort((a, b) => {
                    // Group by C2 when not searching
                    if (!searchTerm) {
                        let idxA = c2List.indexOf(a['2그룹명']);
                        let idxB = c2List.indexOf(b['2그룹명']);
                        if (idxA === -1) idxA = 9999;
                        if (idxB === -1) idxB = 9999;
                        if (idxA !== idxB) return idxA - idxB;
                    }
                    
                    const codeA = String(a.코드 || a.품목코드 || '');
                    const codeB = String(b.코드 || b.품목코드 || '');
                    return codeA.localeCompare(codeB, undefined, { numeric: true });
                });
            }, [baseCatalog, searchTerm, activeC1, c2List]);

            const ROW_HEIGHT = 40;
            const BUFFER_SIZE = 15;

            const [scrollTop, setScrollTop] = useState(0);
            
            const handleScroll = useCallback((e) => {
                const top = Math.max(0, e.target.scrollTop);
                setScrollTop(top);

                // Scroll Spy: Update activeC2 based on scroll position
                if (!searchTerm && displayRows.length > 0) {
                    // Check item near top of viewport (offset slightly to handle headers)
                    const refIndex = Math.max(0, Math.min(Math.floor((top + (ROW_HEIGHT * 2)) / ROW_HEIGHT), displayRows.length - 1));
                    const targetItem = displayRows[refIndex];
                    if (targetItem && targetItem['2그룹명'] && targetItem['2그룹명'] !== activeC2) {
                        setActiveC2(targetItem['2그룹명']);
                    }
                }
            }, [displayRows, activeC2, searchTerm]);

            const handleJumpToC2 = useCallback((c2) => {
                setActiveC2(c2);
                if (searchTerm) setSearchTerm('');
                
                // Find first item of selected C2 and jump
                const targetIndex = displayRows.findIndex(item => item['2그룹명'] === c2);
                if (targetIndex !== -1 && tableContainerRef.current) {
                    const scrollPos = targetIndex * ROW_HEIGHT;
                    tableContainerRef.current.scrollTop = scrollPos;
                    setScrollTop(scrollPos);
                }
            }, [displayRows, searchTerm]);

            const VIEWPORT_HEIGHT = Math.max(400, window.innerHeight - 250);
            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_SIZE);
            const endIndex = Math.max(startIndex, Math.min(displayRows.length, Math.floor((scrollTop + VIEWPORT_HEIGHT) / ROW_HEIGHT) + (BUFFER_SIZE * 2)));
            const virtualRows = displayRows.slice(startIndex, endIndex);
            const topPadding = startIndex * ROW_HEIGHT;
            const bottomPadding = Math.max(0, (displayRows.length - endIndex) * ROW_HEIGHT);

            const getColWidth = (h) => {
                if (h === '품목코드' || h === '코드') return 'w-[140px] min-w-[140px] max-w-[140px]';
                if (h === '품목명') return 'w-[180px] min-w-[180px] max-w-[180px]';
                if (['간단설명', '카탈로그', '견적서'].includes(h)) return 'w-[200px] min-w-[200px]';
                return 'w-[120px] min-w-[120px]';
            };

            return (
                <div className="relative w-full h-full flex justify-center overflow-hidden">
                    <button onClick={() => handleNavigate('manager.html')} disabled={isNavigating} className="edge-nav-btn right group">
                        {isNavigating ? <i className="fas fa-circle-notch fa-spin text-2xl"></i> : <Fragment><i className="fas fa-chevron-right text-xl"></i><span className="edge-nav-text">상품 관리</span></Fragment>}
                    </button>

                    <div className="w-full max-w-[1500px] h-full flex flex-col border-x term-border bg-[#010409] relative shadow-2xl overflow-hidden">
                        <GlobalHeader activeTab="master" pendingCount={pendingCount} />
                        
                        <div className="flex-1 flex flex-col w-full h-full overflow-hidden fade-in relative">
                            
                            {/* 1. 최상단 헤더 (타이틀 + 주요 액션 버튼) */}
                            <div className="flex items-center justify-between p-4 border-b term-border shrink-0 bg-[#0d1117] z-10 shadow-sm gap-6">
                                <div>
                                    <h1 className="text-xl font-black text-white flex items-center mb-1">
                                        <i className="fas fa-server text-[#e3b341] mr-2"></i>
                                        MASTER_DB 
                                        <span className="text-[10px] bg-[#21262d] px-2 py-0.5 rounded ml-2 text-[#58a6ff]">v4.0</span>
                                    </h1>
                                </div>
                                <div className="flex gap-2">
                                    <label className="cursor-pointer px-4 py-2 text-[12px] font-bold rounded term-panel border term-border hover:bg-[#21262d] text-[#c9d1d9] transition-colors shadow-sm flex items-center">
                                        <i className="fas fa-file-upload text-[#a371f7] mr-2"></i> 업로드
                                        <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleImportExcel} />
                                    </label>
                                    <button onClick={handleExportExcel} className="px-4 py-2 text-[12px] font-bold rounded term-panel border term-border hover:bg-[#21262d] text-[#c9d1d9] transition-colors shadow-sm flex items-center">
                                        <i className="fas fa-file-download text-[#3fb950] mr-2"></i> 다운로드
                                    </button>
                                    <button onClick={handlePullMaster} disabled={isSyncing} className="px-4 py-2 text-[12px] font-bold rounded term-panel border term-border hover:bg-[#21262d] text-[#c9d1d9] transition-colors disabled:opacity-50 shadow-sm flex items-center">
                                        {isSyncing ? <i className="fas fa-spinner spin-anim mr-2"></i> : <i className="fas fa-cloud-download-alt text-[#58a6ff] mr-2"></i>} 수신 (Pull)
                                    </button>
                                    <button onClick={handlePushCloud} disabled={isSyncing} className={`px-5 py-2 text-[12px] font-black rounded transition-colors border flex items-center shadow-md ${pendingCount > 0 ? 'bg-transparent border-[#f85149] text-[#f85149] hover:bg-[rgba(248,81,73,0.1)]' : 'bg-[#e3b341] hover:bg-yellow-500 text-black border-transparent shadow-[0_0_10px_rgba(227,179,65,0.3)] disabled:opacity-50'}`}>
                                        {isSyncing ? <i className="fas fa-spinner spin-anim mr-2"></i> : <i className="fas fa-cloud-upload-alt mr-2"></i>} 배포 (Push)
                                    </button>
                                </div>
                            </div>

                            {/* 2. 통합 툴바: 대분류(C1) 탭 + 검색창 (가로 배치) */}
                            <div className="flex justify-between items-center bg-[#161b22] px-4 py-3 border-b term-border shrink-0 z-10 shadow-sm h-[60px]">
                                {/* 좌측: 대분류(C1) 가로 탭 */}
                                <div className="flex gap-2 overflow-x-auto custom-scrollbar flex-1 items-center">
                                    {c1List.map(c1 => (
                                        <button key={c1} onClick={() => { 
                                            setActiveC1(c1); setSearchTerm(''); 
                                            if(tableContainerRef.current) { tableContainerRef.current.scrollTop = 0; setScrollTop(0); }
                                        }} className={`px-5 py-2 text-[13px] font-bold rounded transition-all border shrink-0 ${activeC1 === c1 && !searchTerm ? 'border-[#58a6ff] text-[#58a6ff] bg-[rgba(88,166,255,0.1)] shadow-[0_0_10px_rgba(88,166,255,0.2)]' : 'border-[#30363d] text-gray-400 bg-[#0d1117] hover:text-gray-200 hover:bg-[#21262d]'}`}>
                                            {c1}
                                        </button>
                                    ))}
                                </div>
                                
                                {/* 우측: 검색창 및 건수 */}
                                <div className="flex items-center gap-4 shrink-0 ml-6 pl-6 border-l border-[#30363d]">
                                    <div className="text-[11px] font-mono text-gray-500 w-[100px] text-right">
                                        조회됨: <span className="text-[#58a6ff] font-bold text-[12px]">{displayRows.length.toLocaleString()}</span>
                                    </div>
                                    <div className="relative w-[300px]">
                                        <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-[11px]"></i>
                                        <input type="text" placeholder="코드, 품명 등 전체 검색..." value={searchTerm} onChange={(e) => { setSearchTerm(e.target.value); setScrollTop(0); if(tableContainerRef.current) tableContainerRef.current.scrollTop = 0; }} className="w-full bg-[#0d1117] border border-[#30363d] text-white pl-8 pr-3 py-2 text-[12px] font-mono rounded outline-none focus:border-[#58a6ff] focus:bg-[#010409] transition-all shadow-inner"/>
                                    </div>
                                </div>
                            </div>

                            {/* 3. 하단 메인 영역 (좌측 세로 C2 사이드바 + 우측 데이터 테이블) */}
                            <div className="flex-1 flex overflow-hidden w-full relative bg-[#010409]">
                                
                                {/* 좌측: 중분류(C2) 세로 사이드바 */}
                                <div className="w-[240px] shrink-0 flex flex-col border-r term-border bg-[#0d1117] z-20 shadow-[2px_0_10px_rgba(0,0,0,0.5)]">
                                    <div className="p-3 border-b border-[#30363d] bg-[#161b22] text-[11px] font-bold text-gray-400 flex items-center justify-between">
                                        <span><i className="fas fa-list-ul mr-2"></i>중분류 목록</span>
                                        <span className="text-gray-600 font-mono">{activeC1}</span>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar py-2 px-2 flex flex-col gap-1">
                                        {!searchTerm ? (
                                            c2List.map(c2 => (
                                                <button key={c2} id={`c2-btn-${c2}`} onClick={() => handleJumpToC2(c2)} className={`w-full text-left px-4 py-3 rounded-md text-[13px] font-bold transition-all relative shrink-0 ${activeC2 === c2 ? 'text-[#58a6ff] bg-[#161b22] shadow-[inset_2px_0_0_#58a6ff]' : 'text-gray-400 hover:text-gray-200 hover:bg-[#21262d]'}`}>
                                                    {c2}
                                                </button>
                                            ))
                                        ) : (
                                            <div className="p-6 text-center text-gray-500 text-xs font-mono mt-10">
                                                <i className="fas fa-filter block text-2xl mb-3 opacity-30"></i>
                                                검색 결과 표시 중<br/>
                                                <span className="text-[10px] mt-2 block opacity-70">(카테고리 비활성화됨)</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* 우측: 데이터 테이블 영역 */}
                                <div className="flex-1 flex flex-col overflow-hidden relative">
                                    <div className="flex-1 overflow-auto custom-scrollbar" ref={tableContainerRef} onScroll={handleScroll}>
                                        <table className="excel-table">
                                            <thead>
                                                <tr>
                                                    <th className={`excel-th sticky-col-1 ${getColWidth('품목코드')}`}>품목코드 <i className="fas fa-lock ml-1 text-gray-600"></i></th>
                                                    <th className={`excel-th sticky-col-2 ${getColWidth('품목명')}`}>품목명</th>
                                                    {MASTER_HEADERS.filter(h => h !== '품목코드' && h !== '코드' && h !== '품목명').map(header => (
                                                        <th key={header} className={`excel-th ${getColWidth(header)}`}>{header}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-[#21262d]">
                                                {displayRows.length === 0 ? (
                                                    <tr><td colSpan={MASTER_HEADERS.length} className="py-20 text-center text-gray-600 font-bold"><i className="fas fa-database text-4xl mb-3 block opacity-20"></i>데이터가 없습니다.</td></tr>
                                                ) : (
                                                    <Fragment>
                                                        {topPadding > 0 && <tr style={{ height: `${topPadding}px` }}><td colSpan={MASTER_HEADERS.length}></td></tr>}
                                                        {virtualRows.map((item, idx) => {
                                                            const code = safeStr(item['코드'] || item['품목코드'], `key-${idx}`);
                                                            return (
                                                                <tr key={code} className="excel-tr h-[40px]">
                                                                    <td className={`sticky-col-1 excel-td ${getColWidth('품목코드')}`}>
                                                                        <EditableCell code={code} field="코드" value={code} isFixed={true} onSave={()=>{}} />
                                                                    </td>
                                                                    <td className={`sticky-col-2 excel-td border-r border-[#30363d] ${getColWidth('품목명')}`}>
                                                                        <EditableCell code={code} field="품목명" value={item['품목명']} onSave={handleCellSave} />
                                                                    </td>
                                                                    {MASTER_HEADERS.filter(h => h !== '품목코드' && h !== '코드' && h !== '품목명').map(h => (
                                                                        <td key={`${code}-${h}`} className={`excel-td ${getColWidth(h)}`}>
                                                                            <EditableCell code={code} field={h} value={item[h]} onSave={handleCellSave} />
                                                                        </td>
                                                                    ))}
                                                                </tr>
                                                            );
                                                        })}
                                                        {bottomPadding > 0 && <tr style={{ height: `${bottomPadding}px` }}><td colSpan={MASTER_HEADERS.length}></td></tr>}
                                                    </Fragment>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-[#010409] border-t border-[#30363d] px-4 py-2 text-[10px] font-bold text-gray-500 flex justify-between shrink-0 pr-10">
                                        <span><i className="fas fa-info-circle mr-1"></i>[품목명] 등 모든 속성은 직접 수정할 수 있으며, 데이터 스크롤 시 좌측 메뉴 항목이 동기화됩니다.</span>
                                        {pendingCount > 0 && <span className="text-[#f85149] animate-pulse"><i className="fas fa-lock mr-1"></i>배포 차단 활성화: 상품 관리 탭을 확인하세요.</span>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <ConfirmModal 
                        isOpen={!!confirmDialog}
                        title={confirmDialog?.title}
                        message={confirmDialog?.message}
                        onConfirm={confirmDialog?.onConfirm}
                        onCancel={() => setConfirmDialog(null)}
                    />

                    {toastMsg && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 term-panel text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-3 fade-in text-[13px] font-bold z-50 border term-border">
                            <i className={toastMsg.includes('🚨') || toastMsg.includes('❌') || toastMsg.includes('⚠️') ? "fas fa-exclamation-triangle text-[#f85149]" : "fas fa-check-circle text-[#3fb950]"}></i>
                            {toastMsg.replace(/🚨|❌|⚠️|☁️|✅|📥|📤|⏳|ℹ️|🚀/g, '')}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
