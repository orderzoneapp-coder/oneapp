<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Trend Report & Dashboard V1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; background-color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const getIDB = async (key) => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) return resolve(null);
                    const tx = db.transaction('store', 'readonly');
                    const req = tx.objectStore('store').get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(tx.error);
                };
                request.onerror = () => reject(request.error);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const CustomerReportView = ({ data }) => {
            if (!data || !data.title) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-100 text-slate-400 font-bold p-6 text-center">
                    <i className="fas fa-file-signature text-6xl mb-4 text-slate-300"></i>
                    <p className="text-lg">아직 관리자가 발행한 시황 리포트가 없습니다.</p>
                </div>
            );

            const hasCategories = data.categories && Object.keys(data.categories).length > 0;

            return (
                <div id="customer-report-capture-area" className="w-full max-w-[480px] bg-white shadow-2xl relative min-h-screen flex flex-col mx-auto overflow-hidden">
                    <header className="bg-[#0B1021] text-white px-6 py-8 rounded-b-[2rem] shadow-md relative z-10 shrink-0">
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500"></div>
                        <div className="flex justify-between items-center mb-5">
                            <span className="text-xl font-black tracking-tight text-white"><i className="fas fa-layer-group text-indigo-400 mr-2"></i>Orderz</span>
                            <span className="bg-indigo-500/30 text-indigo-200 text-[10px] font-bold px-2.5 py-1 rounded-full">공식 시황 안내</span>
                        </div>
                        <h1 className="text-2xl font-black leading-snug break-keep">{data.title}</h1>
                        <div className="mt-4 text-[11px] text-slate-400 flex items-center"><i className="far fa-clock mr-1.5"></i> {data.publishDate || new Date().toLocaleDateString('ko-KR')} 발행</div>
                    </header>

                    <main className="flex-1 px-5 py-6 space-y-6 overflow-y-auto hide-scrollbar bg-slate-50/50">
                        {data.greeting && (
                            <section className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-5">
                                    <h2 className="text-[13px] font-black text-slate-800 flex items-center mb-3"><i className="fas fa-bullhorn text-indigo-500 mr-2"></i>전체 시황 브리핑</h2>
                                    <div className="text-[13px] leading-relaxed text-slate-600 whitespace-pre-wrap font-medium break-keep">
                                        {data.greeting}
                                    </div>
                                </div>
                            </section>
                        )}

                        {hasCategories && (
                            <div className="space-y-5">
                                <h3 className="text-sm font-black text-slate-800 px-1 border-l-4 border-slate-800 pl-2.5 mt-2">카테고리별 주요 변동 내역</h3>
                                {Object.entries(data.categories).map(([catName, catData], idx) => {
                                    if (!catData.items || catData.items.length === 0) return null;
                                    return (
                                        <section key={catName} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden fade-in">
                                            <div className="bg-slate-50 p-4 border-b border-slate-200">
                                                <h4 className="text-[15px] font-black text-slate-800 mb-2">{catName}</h4>
                                                {catData.comment && (
                                                    <div className="bg-white rounded-lg p-3 relative border border-slate-100 shadow-sm">
                                                        <div className="absolute top-2 left-2 text-indigo-300 text-sm"><i className="fas fa-quote-left"></i></div>
                                                        <p className="text-[12px] text-slate-600 pl-6 leading-relaxed font-bold break-keep">{catData.comment}</p>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="divide-y divide-slate-100">
                                                {catData.items.map(item => {
                                                    const isUp = item.diff > 0; const isDown = item.diff < 0;
                                                    const colorClass = isUp ? 'text-rose-500' : isDown ? 'text-blue-500' : 'text-slate-500';
                                                    const bgClass = isUp ? 'bg-rose-50' : isDown ? 'bg-blue-50' : 'bg-slate-50';
                                                    const icon = isUp ? 'fa-arrow-up' : isDown ? 'fa-arrow-down' : 'fa-minus';
                                                    return (
                                                        <div key={item.code} className="p-4 bg-white">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div className="flex flex-col pr-2">
                                                                    <span className="text-[13px] font-extrabold text-slate-800 leading-snug">{item.name}</span>
                                                                    <span className="text-[11px] text-slate-400 font-medium mt-0.5">{item.spec}</span>
                                                                </div>
                                                                <div className={`px-2 py-1 rounded-md flex items-center text-[11px] font-black shrink-0 ${bgClass} ${colorClass}`}>
                                                                    <i className={`fas ${icon} text-[9px] mr-1`}></i>{Math.abs(item.diff).toLocaleString()}원
                                                                </div>
                                                            </div>
                                                            <div className="flex justify-between items-end mt-1.5">
                                                                <div className="flex items-center text-xs font-bold text-slate-400 gap-2">
                                                                    <span className="line-through decoration-slate-300">{item.oldVal.toLocaleString()}원</span>
                                                                    <i className="fas fa-caret-right text-slate-300"></i>
                                                                    <span className="text-slate-800 text-[14px]">{item.newVal.toLocaleString()}원</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-100 p-6 text-center shrink-0 border-t border-slate-200">
                        <div className="text-indigo-300 text-2xl mb-2"><i className="fas fa-leaf"></i></div>
                        <p className="text-xs text-slate-500 font-bold mb-1">항상 더 나은 서비스로 보답하겠습니다.</p>
                        <p className="text-[10px] text-slate-400">문의사항: 1588-0000 | 카카오톡 @orderz</p>
                    </footer>
                </div>
            );
        };

        const TopHeader = ({ isProcessing }) => {
            return (
                <div className="h-16 bg-[#0B1021] text-white flex items-center justify-between px-6 shrink-0 z-50">
                    <div className="flex items-center gap-3">
                        <span className="font-black text-xl tracking-wider text-indigo-400">ONEAPP</span>
                        <div className="flex flex-col ml-1 border-l border-slate-700 pl-4">
                            <span className="font-bold text-[15px] leading-tight">Trend Report V1.7</span>
                            <span className="text-[10px] text-slate-400 font-mono tracking-widest mt-0.5">ADMIN EARLY WARNING</span>
                        </div>
                    </div>

                    <div className="flex items-center gap-2">
                        <a href="https://oneapp.orderz.co.kr/MerchOps/v1.4" className="h-10 px-4 rounded-lg bg-[#111827] hover:bg-[#1f2937] flex items-center justify-center border border-[#374151] transition-all shadow-sm text-xs font-bold text-slate-300 hover:text-white" title="머치옵스 메인으로 이동">
                            <i className="fas fa-desktop mr-2 text-emerald-400"></i>머치옵스 메인
                        </a>
                    </div>
                </div>
            );
        };

        const ActionToolbar = ({ activeTab, setActiveTab }) => {
            const TabButton = ({ id, label, icon }) => {
                const active = activeTab === id;
                return (
                    <button 
                        onClick={() => setActiveTab(id)}
                        className={`flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-t-lg border border-b-0 transition-colors
                            ${active ? 'bg-white border-gray-200 text-indigo-700 z-10 relative shadow-[0_-2px_4px_rgba(0,0,0,0.02)]' : 'bg-slate-100 border-transparent text-slate-500 hover:bg-slate-200 hover:text-slate-700'}`}
                        style={{ marginBottom: active ? '-1px' : '0' }}
                    >
                        {icon && <i className={`fas ${icon} ${active ? 'text-indigo-600' : 'text-slate-400'}`}></i>}
                        {label} 
                    </button>
                );
            };

            return (
                <div className="px-6 pt-5 bg-slate-50 border-b border-gray-200 flex items-end justify-between shrink-0 relative z-10">
                    <div className="flex gap-1">
                        <TabButton id="dashboard" label="통합 의사결정 보드" icon="fa-chart-pie" />
                        <TabButton id="category" label="계층형 시황 분석" icon="fa-sitemap" />
                        <TabButton id="editor" label="고객 안내장 발행" icon="fa-envelope-open-text" />
                    </div>
                </div>
            );
        };

        const App = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isCustomerMode = urlParams.get('mode') === 'customer';

            const [activeTab, setActiveTab] = useState('dashboard');
            const [masterProducts, setMasterProducts] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [toastMsg, setToastMsg] = useState("");
            
            const [publishedReport, setPublishedReport] = useState(null);
            const [editorDraft, setEditorDraft] = useState(() => {
                try {
                    const saved = localStorage.getItem('merchReportDraft_v1');
                    return saved ? JSON.parse(saved) : { title: '[Orderz] 시황 변동 안내', greeting: '최근 수입 원자재 및 부자재의 매입 원가가 전반적으로 크게 상승하였습니다.\n안정적인 상품 공급을 위해 부득이하게 일부 품목의 출고가를 조정하게 되었습니다.', categories: {} };
                } catch(e) { return { title: '', greeting: '', categories: {} }; }
            });

            const [isPreviewOpen, setIsPreviewOpen] = useState(false);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

            useEffect(() => {
                const loadData = async () => {
                    try {
                        let mData = null;
                        const v16Data = localStorage.getItem('skuSyncMaster_v6'); 
                        if (v16Data) mData = JSON.parse(v16Data);
                        else mData = await getIDB('merchMaster_v870');
                        
                        if (mData) setMasterProducts(mData);
                        
                        const hData = JSON.parse(localStorage.getItem('merchHistory_v870') || '[]');
                        setHistoryLogs(hData);

                        const pData = JSON.parse(localStorage.getItem('merchCustomerReport_v1'));
                        if (pData) setPublishedReport(pData);
                    } catch (error) { console.error(error); } 
                    finally { setIsLoading(false); }
                };
                loadData();
            }, []);

            useEffect(() => {
                if (!isLoading && !isCustomerMode) localStorage.setItem('merchReportDraft_v1', JSON.stringify(editorDraft));
            }, [editorDraft, isLoading, isCustomerMode]);

            // 💡 통합 인사이트 계산 (의사결정 보드용)
            const insights = useMemo(() => {
                const marginRisks = [];
                const inversions = [];
                const volatilityList = [];

                Object.values(masterProducts).forEach(item => {
                    const inP = parseNum(item['입고가']);
                    const outP = inP === 0 ? 0 : parseNum(item['출고가']); // 입고가 0원이면 출고가도 0원 처리
                    
                    if (inP > 0 && outP > 0) {
                        const margin = ((outP - inP) / outP) * 100;
                        item._margin = margin;
                        
                        // 역마진/저마진 경보 (15% 미만)
                        if (margin < 15 && margin >= 0) marginRisks.push(item);
                        // 가격 역전 (도매/입고가가 더 비쌈)
                        if (margin < 0) inversions.push(item);
                    }
                });

                marginRisks.sort((a, b) => a._margin - b._margin);
                inversions.sort((a, b) => a._margin - b._margin);

                const priceChanges = historyLogs.reduce((acc, log) => {
                    if ((log.field === '입고가' || log.field === '입고') && (!acc[log.code] || new Date(log.timestamp) > new Date(acc[log.code].timestamp))) {
                        acc[log.code] = log; 
                    }
                    return acc;
                }, {});

                Object.values(priceChanges).forEach(log => {
                    if (log.oldVal > 0) {
                        const diffRatio = (log.diff / log.oldVal) * 100;
                        // 시세 급변 지표 (±20% 이상)
                        if (Math.abs(diffRatio) >= 20) {
                            volatilityList.push({ ...log, diffRatio });
                        }
                    }
                });
                
                volatilityList.sort((a, b) => Math.abs(b.diffRatio) - Math.abs(a.diffRatio));

                return { marginRisks: marginRisks.slice(0, 30), inversions, volatilityList: volatilityList.slice(0, 15) };
            }, [masterProducts, historyLogs]);

            // 💡 1/2 Depth 카테고리 계층 구조 (3단계 대/중/소 구조 제거 적용)
            const categoryHierarchy = useMemo(() => {
                const hierarchy = {};
                Object.values(masterProducts).forEach(item => {
                    let c1Name = item['1그룹명'];
                    let c2Name = item['2그룹명'];

                    const pCode = String(item['품목코드'] || item['코드'] || '');
                    let c1Code = String(item['1코드'] || (pCode.length >= 2 ? pCode.substring(0, 2) : ''));
                    let c2Code = String(item['2코드'] || (pCode.length >= 4 ? pCode.substring(0, 4) : ''));

                    if (!c1Name || !c1Code) { c1Name = '기타'; c1Code = 'ZZZ99_기타'; }
                    if (!c2Name || !c2Code) { c2Name = '기타'; c2Code = 'ZZZ9999_기타'; }

                    if (!hierarchy[c1Code]) hierarchy[c1Code] = { name: c1Name, code: c1Code, sub: {} };
                    if (!hierarchy[c1Code].sub[c2Code]) {
                        hierarchy[c1Code].sub[c2Code] = {
                            name: c2Name, code: c2Code, items: [],
                            totalItems: 0, marginSum: 0, validMarginCount: 0, upCount: 0, downCount: 0, avgMargin: 0
                        };
                    }

                    const c = hierarchy[c1Code].sub[c2Code];
                    c.items.push(item);
                    c.totalItems++;

                    const inP = parseNum(item['입고가']); 
                    const outP = inP === 0 ? 0 : parseNum(item['출고가']);
                    if (inP > 0 && outP > 0) {
                        const margin = ((outP - inP) / outP) * 100;
                        c.marginSum += margin;
                        c.validMarginCount++;
                    }
                });

                // 히스토리 변동
                historyLogs.forEach(log => {
                    if(log.field === '입고가' || log.field === '입고') {
                        const mItem = masterProducts[log.code];
                        if (mItem) {
                            let c1Code = String(mItem['1코드'] || 'ZZZ99_기타');
                            let c2Code = String(mItem['2코드'] || 'ZZZ9999_기타');
                            if (hierarchy[c1Code] && hierarchy[c1Code].sub[c2Code]) {
                                const c = hierarchy[c1Code].sub[c2Code];
                                if (log.diff > 0) c.upCount++;
                                if (log.diff < 0) c.downCount++;
                            }
                        }
                    }
                });

                Object.keys(hierarchy).forEach(c1 => {
                    Object.keys(hierarchy[c1].sub).forEach(c2 => {
                        const c = hierarchy[c1].sub[c2];
                        c.avgMargin = c.validMarginCount > 0 ? (c.marginSum / c.validMarginCount) : 0;
                        // 코드 순 정렬 (물류 창고 흐름과 동일한 시각)
                        c.items.sort((a,b) => String(a['품목코드']||a['코드']).localeCompare(String(b['품목코드']||b['코드'])));
                    });
                });

                return hierarchy;
            }, [masterProducts, historyLogs]);

            const [activeC1, setActiveC1] = useState(null);
            const [activeC2, setActiveC2] = useState(null);

            const c1List = useMemo(() => Object.values(categoryHierarchy).sort((a,b) => a.code.localeCompare(b.code)), [categoryHierarchy]);
            useEffect(() => { if (c1List.length > 0 && !c1List.find(c => c.code === activeC1)) setActiveC1(c1List[0].code); }, [c1List, activeC1]);

            const c2List = useMemo(() => activeC1 && categoryHierarchy[activeC1] ? Object.values(categoryHierarchy[activeC1].sub).sort((a,b) => a.code.localeCompare(b.code)) : [], [categoryHierarchy, activeC1]);
            useEffect(() => {
                if (c2List.length > 0 && !c2List.find(c => c.code === activeC2)) setActiveC2(c2List[0].code);
                else if (c2List.length === 0) setActiveC2(null);
            }, [c2List, activeC1, activeC2]);

            const handleLoadRecentChanges = () => {
                const newCats = {};
                historyLogs.forEach(log => {
                    if ((log.field === '입고가' || log.field === '입고') && Math.abs(log.diff) > 0) {
                        const catName = log.catalog || '기타 카탈로그';
                        if (!newCats[catName]) newCats[catName] = { comment: '', items: [] };
                        const existingIdx = newCats[catName].items.findIndex(i => i.code === log.code);
                        if (existingIdx === -1) newCats[catName].items.push(log);
                        else if (new Date(log.timestamp) > new Date(newCats[catName].items[existingIdx].timestamp)) newCats[catName].items[existingIdx] = log;
                    }
                });
                Object.keys(newCats).forEach(k => { newCats[k].items.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff)); });
                setEditorDraft(prev => ({ ...prev, categories: newCats }));
                showToast(`✅ 최근 변경된 데이터를 불러왔습니다.`);
            };

            const handlePublish = () => {
                const cleanData = { ...editorDraft, publishDate: new Date().toLocaleDateString('ko-KR') };
                for (const cat in cleanData.categories) { if (cleanData.categories[cat].items.length === 0) delete cleanData.categories[cat]; }
                localStorage.setItem('merchCustomerReport_v1', JSON.stringify(cleanData));
                setPublishedReport(cleanData);
                showToast("🚀 고객용 웹페이지에 적용되었습니다!");
            };

            const handleCopyLink = () => {
                const url = window.location.href.split('?')[0] + '?mode=customer';
                const textArea = document.createElement("textarea");
                textArea.value = url; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); showToast("✅ 링크 복사 완료!"); } catch (err) { showToast("❌ 복사 실패"); }
                document.body.removeChild(textArea);
            };

            const handleDownloadImage = async () => {
                const captureEl = document.getElementById('customer-report-capture-area');
                if (!captureEl) return;
                showToast("⏳ 이미지를 생성 중입니다...");
                try {
                    const canvas = await html2canvas(captureEl, { scale: 2, useCORS: true, backgroundColor: '#f8fafc' });
                    const link = document.createElement('a');
                    link.download = `시황안내장_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                    showToast("✅ 이미지 다운로드 완료!");
                } catch (e) { showToast("❌ 오류가 발생했습니다."); }
            };

            if (isCustomerMode) return isLoading ? <div className="h-screen flex items-center justify-center text-slate-500 font-bold">로딩중...</div> : <CustomerReportView data={publishedReport} />;
            if (isLoading) return <div className="h-screen flex items-center justify-center text-indigo-500 font-bold"><i className="fas fa-circle-notch fa-spin mr-2"></i>데이터 로딩중...</div>;

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300">
                    <TopHeader isProcessing={isLoading} />
                    <ActionToolbar activeTab={activeTab} setActiveTab={setActiveTab} />

                    {toastMsg && (
                        <div className="absolute bottom-10 right-6 z-[1000] bg-slate-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm font-bold fade-in">
                            <i className="fas fa-check-circle text-emerald-400"></i>{toastMsg}
                        </div>
                    )}

                    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50 border-t border-slate-200">
                        
                        {/* ================= TAB 1: 통합 의사결정 보드 ================= */}
                        {activeTab === 'dashboard' && (
                            <div className="h-full flex flex-col overflow-y-auto custom-scrollbar p-6 fade-in space-y-6">
                                {/* 조기 경보 요약 카드 */}
                                <div className="grid grid-cols-3 gap-5">
                                    <div className="bg-white p-6 rounded-xl border border-amber-300 shadow-sm flex flex-col relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10 text-amber-500"><i className="fas fa-exclamation-triangle text-6xl"></i></div>
                                        <span className="text-[12px] font-bold text-amber-600 mb-2 relative z-10"><i className="fas fa-bell mr-1"></i> 저마진 경보 (15% 미만)</span>
                                        <span className="text-3xl font-black text-amber-500 relative z-10">{insights.marginRisks.length.toLocaleString()} <span className="text-sm font-bold text-amber-400">건</span></span>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-rose-300 shadow-sm flex flex-col relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10 text-rose-500"><i className="fas fa-arrow-down text-6xl"></i></div>
                                        <span className="text-[12px] font-bold text-rose-600 mb-2 relative z-10"><i className="fas fa-radiation-alt mr-1"></i> 가격 역전 현상 (출고가 &lt; 입고가)</span>
                                        <span className="text-3xl font-black text-rose-600 relative z-10">{insights.inversions.length.toLocaleString()} <span className="text-sm font-bold text-rose-400">건</span></span>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl border border-indigo-200 shadow-sm flex flex-col relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-5 text-indigo-500"><i className="fas fa-chart-line text-6xl"></i></div>
                                        <span className="text-[12px] font-bold text-indigo-500 mb-2 relative z-10"><i className="fas fa-bolt mr-1"></i> 시세 급변 지표 (±20% 초과)</span>
                                        <span className="text-3xl font-black text-indigo-600 relative z-10">{insights.volatilityList.length.toLocaleString()} <span className="text-sm font-bold text-indigo-400">건</span></span>
                                    </div>
                                </div>

                                {/* 인사이트 테이블 영역 */}
                                <div className="grid grid-cols-2 gap-6 flex-1 min-h-[400px]">
                                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                                        <div className="bg-slate-50 p-4 border-b border-gray-200 flex justify-between items-center shrink-0">
                                            <h3 className="text-[14px] font-black text-rose-700"><i className="fas fa-siren-on text-rose-500 mr-2"></i>🚨 가격 역전 상품 목록</h3>
                                        </div>
                                        <div className="flex-1 overflow-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                <thead className="bg-white sticky top-0 border-b border-slate-200 z-10 shadow-sm text-slate-500">
                                                    <tr><th className="px-4 py-2.5">품목명 (규격)</th><th className="px-3 py-2.5 text-right">입고가</th><th className="px-3 py-2.5 text-right text-indigo-600">출고가</th><th className="px-4 py-2.5 text-right text-rose-600 w-16">마진율</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-700">
                                                    {insights.inversions.length === 0 ? <tr><td colSpan="4" className="p-10 text-center font-bold text-emerald-500">위험 상품이 없습니다!</td></tr> : insights.inversions.map(item => (
                                                        <tr key={item.코드} className="hover:bg-slate-50">
                                                            <td className="px-4 py-2"><div className="font-bold text-slate-800 truncate max-w-[180px]">{item.품목명} <span className="text-slate-400 font-normal">({item.규격})</span></div></td>
                                                            <td className="px-3 py-2 text-right">{parseNum(item['입고가']).toLocaleString()}</td>
                                                            <td className="px-3 py-2 text-right font-black text-indigo-600">{parseNum(item['출고가']).toLocaleString()}</td>
                                                            <td className="px-4 py-2 text-right font-black text-rose-600">{item._margin.toFixed(1)}%</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                                        <div className="bg-slate-50 p-4 border-b border-gray-200 flex justify-between items-center shrink-0">
                                            <h3 className="text-[14px] font-black text-slate-800"><i className="fas fa-fire text-amber-500 mr-2"></i>🔥 입고가 ±20% 급등락 (Top 15)</h3>
                                        </div>
                                        <div className="flex-1 overflow-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                <thead className="bg-white sticky top-0 border-b border-slate-200 z-10 shadow-sm text-slate-500">
                                                    <tr><th className="px-4 py-2.5">품목명 (규격)</th><th className="px-3 py-2.5 text-right">이전 단가</th><th className="px-4 py-2.5 text-right w-20">등락폭</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-700">
                                                    {insights.volatilityList.length === 0 ? <tr><td colSpan="3" className="p-10 text-center font-bold text-slate-400">변동 이력이 없습니다.</td></tr> : insights.volatilityList.map(log => {
                                                        const isUp = log.diff > 0;
                                                        return (
                                                            <tr key={log.id} className="hover:bg-slate-50">
                                                                <td className="px-4 py-2"><div className="font-bold text-slate-800 truncate max-w-[200px]">{log.name} <span className="text-slate-400 font-normal">({log.spec})</span></div></td>
                                                                <td className="px-3 py-2 text-right">{log.oldVal?.toLocaleString()}</td>
                                                                <td className={`px-4 py-2 text-right font-black ${isUp ? 'text-rose-500' : 'text-blue-500'}`}>{isUp ? '▲' : '▼'} {Math.abs(log.diffRatio).toFixed(1)}%</td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= TAB 2: 계층형 시황 분석 (2단계 내비게이션 + 가격 탄력성 제안) ================= */}
                        {activeTab === 'category' && (
                            <div className="h-full flex flex-col bg-slate-50 fade-in">
                                {/* 1Depth Categories */}
                                <div className="flex items-end px-6 pt-3 border-b border-gray-200 bg-slate-100 shrink-0 h-[56px]">
                                    <div className="flex overflow-x-auto custom-scrollbar h-full items-end w-full gap-1">
                                        {c1List.map(c1 => {
                                            const isEtc = c1.name === '기타';
                                            const isActive = activeC1 === c1.code;
                                            return (
                                                <button 
                                                    key={c1.code} onClick={() => setActiveC1(c1.code)} 
                                                    className={`px-5 py-2.5 text-[13px] font-bold rounded-t-lg transition-colors border-b-[3px]
                                                        ${isActive 
                                                            ? (isEtc ? 'border-slate-500 text-slate-700 bg-white' : 'border-indigo-600 text-indigo-700 bg-white') 
                                                            : 'border-transparent text-slate-500 hover:bg-slate-200/50'}`}
                                                >
                                                    {c1.name}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="flex-1 flex flex-col overflow-hidden bg-white">
                                    {/* 2Depth Nav in Table Header Area */}
                                    <div className="bg-slate-50 border-b border-gray-200 px-6 py-2 flex items-center overflow-x-auto shrink-0 custom-scrollbar gap-2">
                                        <span className="text-[11px] font-bold text-slate-400 mr-2 shrink-0"><i className="fas fa-filter mr-1"></i>2차 분류</span>
                                        {c2List.map(c2 => {
                                            const isActive = activeC2 === c2.code;
                                            return (
                                                <button 
                                                    key={c2.code} onClick={() => setActiveC2(c2.code)}
                                                    className={`px-4 py-1.5 text-[12px] font-bold rounded-full transition-all shrink-0 border
                                                        ${isActive ? 'bg-indigo-50 border-indigo-300 text-indigo-700 shadow-sm' : 'bg-white border-gray-200 text-slate-600 hover:bg-slate-100'}`}
                                                >
                                                    {c2.name} <span className="text-[10px] opacity-60 ml-1">{c2.totalItems}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* Main Table: Shows items directly from 2Depth + Elasticity info */}
                                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                                        {activeC2 && c2List.find(c => c.code === activeC2) ? (() => {
                                            const catData = c2List.find(c => c.code === activeC2);
                                            return (
                                                <table className="w-full text-left text-sm whitespace-nowrap">
                                                    <thead className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                                                        <tr>
                                                            <th className="py-3 px-5 font-bold text-slate-500 text-[11px] w-[100px]">물류코드</th>
                                                            <th className="py-3 px-4 font-bold text-slate-500 text-[11px]">품목명 (규격)</th>
                                                            <th className="py-3 px-4 font-bold text-slate-500 text-[11px] text-right w-24">입고가</th>
                                                            <th className="py-3 px-4 font-bold text-slate-500 text-[11px] text-right w-24 text-indigo-600">출고가</th>
                                                            <th className="py-3 px-4 font-bold text-amber-600 text-[11px] text-right bg-amber-50/30">권장 라운딩단가</th>
                                                            <th className="py-3 px-5 font-bold text-slate-500 text-[11px] text-right w-20">마진율</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-100 text-slate-700">
                                                        {catData.items.map(item => {
                                                            const code = item['품목코드'] || item['코드'];
                                                            const inP = parseNum(item['입고가']); 
                                                            const outP = inP === 0 ? 0 : parseNum(item['출고가']);
                                                            const margin = inP > 0 && outP > 0 ? ((outP - inP) / outP) * 100 : 0;
                                                            
                                                            // 가격 라운드 제안 (100원 단위 반올림 - 심리적 저항선 피팅)
                                                            const suggestedRound = outP > 0 ? Math.round(outP / 100) * 100 : 0;
                                                            const roundDelta = suggestedRound - outP;

                                                            return (
                                                                <tr key={code} className="hover:bg-indigo-50/40 transition-colors">
                                                                    <td className="py-2.5 px-5 text-xs font-mono text-slate-400">{code}</td>
                                                                    <td className="py-2.5 px-4"><div className="font-bold text-slate-800 text-[13px]">{item['품목명']} <span className="font-normal text-slate-500 text-xs ml-1">({item['규격']})</span></div></td>
                                                                    <td className="py-2.5 px-4 text-right text-[13px] font-medium">{inP > 0 ? inP.toLocaleString() : '-'}</td>
                                                                    <td className="py-2.5 px-4 text-right text-[13px] font-black text-indigo-600">{outP > 0 ? outP.toLocaleString() : '-'}</td>
                                                                    <td className="py-2.5 px-4 text-right bg-amber-50/10">
                                                                        {outP > 0 ? (
                                                                            <div className="flex flex-col items-end">
                                                                                <span className="text-[13px] font-black text-amber-600">{suggestedRound.toLocaleString()}원</span>
                                                                                {roundDelta !== 0 && <span className={`text-[10px] ${roundDelta > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>({roundDelta > 0 ? '+' : ''}{roundDelta})</span>}
                                                                            </div>
                                                                        ) : '-'}
                                                                    </td>
                                                                    <td className={`py-2.5 px-5 text-right text-xs font-black ${margin < 15 ? 'text-rose-500' : 'text-emerald-600'}`}>{margin.toFixed(1)}%</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            );
                                        })() : (
                                            <div className="h-full flex flex-col justify-center items-center text-slate-300">
                                                <i className="fas fa-hand-point-up text-5xl mb-4 opacity-50 text-indigo-200"></i>
                                                <p className="text-sm font-bold text-slate-400">상단의 2차 분류를 선택해주세요.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= TAB 3: 안내장 에디터 ================= */}
                        {activeTab === 'editor' && (
                            <div className="h-full overflow-y-auto custom-scrollbar p-6 fade-in">
                                <div className="max-w-[900px] mx-auto pb-10">
                                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                        <div className="p-6 border-b border-gray-100 flex justify-between items-end bg-slate-50">
                                            <div>
                                                <h2 className="text-lg font-black text-slate-800 mb-1"><i className="fas fa-pen-nib text-indigo-500 mr-2"></i>고객 안내장(레터) 에디터</h2>
                                            </div>
                                            <button onClick={handleLoadRecentChanges} title="변동 데이터 불러오기" className="w-10 h-10 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 rounded-md transition-all shadow-sm flex items-center justify-center">
                                                <i className="fas fa-magic"></i>
                                            </button>
                                        </div>
                                        
                                        <div className="p-6 space-y-6">
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="block text-[12px] font-black text-slate-700 mb-1.5">안내장 제목</label>
                                                    <input type="text" value={editorDraft.title} onChange={e => setEditorDraft(p => ({...p, title: e.target.value}))} className="w-full border border-gray-300 rounded-md px-3 py-2 text-[14px] font-bold outline-none focus:border-indigo-500 focus:ring-1" />
                                                </div>
                                                <div>
                                                    <label className="block text-[12px] font-black text-slate-700 mb-1.5">전체 인사말 (Global Briefing)</label>
                                                    <textarea value={editorDraft.greeting} onChange={e => setEditorDraft(p => ({...p, greeting: e.target.value}))} className="w-full h-28 border border-gray-300 rounded-md px-3 py-2 text-[13px] outline-none focus:border-indigo-500 focus:ring-1 resize-none" />
                                                </div>
                                            </div>

                                            <div className="w-full h-px bg-gray-200 my-2"></div>

                                            <div>
                                                <div className="flex items-center justify-between mb-4">
                                                    <label className="text-[14px] font-black text-slate-800"><i className="fas fa-list text-indigo-400 mr-2"></i>세부 안내</label>
                                                </div>
                                                
                                                {Object.keys(editorDraft.categories).length === 0 ? (
                                                    <div className="text-center py-10 bg-slate-50 border border-dashed border-gray-300 rounded-xl text-[13px] text-slate-400 font-bold">
                                                        불러온 변동 데이터가 없습니다. 상단 마법사 아이콘을 눌러주세요.
                                                    </div>
                                                ) : (
                                                    <div className="space-y-6">
                                                        {Object.entries(editorDraft.categories).map(([catName, catData]) => (
                                                            <div key={catName} className="bg-slate-50 border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                                                                <div className="p-4 bg-white border-b border-gray-200 flex justify-between items-center">
                                                                    <div className="font-black text-slate-800 text-[14px]"><i className="fas fa-folder-open text-indigo-400 mr-2"></i>{catName} <span className="text-indigo-500 text-[11px] ml-1">({catData.items.length}건)</span></div>
                                                                    <button onClick={() => { const n = {...editorDraft.categories}; delete n[catName]; setEditorDraft(p => ({...p, categories: n})); }} title="카테고리 삭제" className="text-rose-400 hover:text-rose-600 hover:bg-rose-50 w-8 h-8 rounded flex items-center justify-center transition-colors"><i className="fas fa-times"></i></button>
                                                                </div>
                                                                <div className="p-4 space-y-3">
                                                                    <div className="bg-white border border-gray-200 rounded-md divide-y divide-gray-100 max-h-[250px] overflow-y-auto custom-scrollbar">
                                                                        {catData.items.map(item => (
                                                                            <div key={item.id} className="flex justify-between items-center p-3 hover:bg-slate-50 transition-colors">
                                                                                <div className="flex flex-col min-w-0">
                                                                                    <span className="text-[12px] font-bold text-slate-800 truncate">{item.name}</span>
                                                                                    <span className="text-[10px] text-slate-400 mt-0.5">{item.spec}</span>
                                                                                </div>
                                                                                <div className="flex items-center gap-3 shrink-0">
                                                                                    <span className="text-[11px] text-slate-400 font-mono line-through decoration-slate-300">{item.oldVal?.toLocaleString()}</span>
                                                                                    <span className="text-[12px] font-black text-indigo-600 font-mono bg-indigo-50 px-1.5 py-0.5 rounded">{item.newVal?.toLocaleString()}</span>
                                                                                    <button onClick={() => { const n = {...editorDraft.categories}; n[catName].items = n[catName].items.filter(i => i.id !== item.id); setEditorDraft(p => ({...p, categories: n})); }} className="text-slate-300 hover:text-rose-500 hover:bg-rose-50 w-6 h-6 flex items-center justify-center rounded transition-colors ml-1"><i className="fas fa-trash-alt"></i></button>
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="bg-slate-100 p-5 border-t border-gray-200 flex justify-between items-center shrink-0">
                                            <button onClick={() => setIsPreviewOpen(true)} title="모바일 미리보기" className="w-11 h-11 bg-white border border-gray-300 text-slate-700 hover:bg-slate-50 rounded-md transition-all shadow-sm flex items-center justify-center"><i className="fas fa-mobile-alt text-lg"></i></button>
                                            <button onClick={handlePublish} title="고객용 웹페이지 적용 (발행)" className="w-12 h-12 bg-[#1A2235] text-white rounded-md hover:bg-black shadow-md transition-all flex items-center justify-center hover:-translate-y-0.5"><i className="fas fa-paper-plane text-lg text-indigo-400"></i></button>
                                        </div>
                                    </div>
                                    
                                    {publishedReport && (
                                        <div className="mt-6 bg-indigo-50/50 border border-indigo-100 rounded-xl p-6 shadow-sm flex items-center justify-between">
                                            <div>
                                                <h3 className="text-[14px] font-black text-indigo-900 mb-1"><i className="fas fa-check-circle mr-1.5 text-emerald-500"></i>발행 완료!</h3>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={handleCopyLink} title="URL 링크 복사" className="w-10 h-10 bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-100 rounded-md transition-all shadow-sm flex items-center justify-center"><i className="fas fa-link"></i></button>
                                                <button onClick={handleDownloadImage} title="카톡 전송용 이미지 다운로드" className="w-10 h-10 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-all shadow-sm flex items-center justify-center"><i className="fas fa-camera"></i></button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {isPreviewOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[1000] flex flex-col items-center justify-center p-4 fade-in overflow-hidden">
                            <div className="w-full max-w-md flex justify-between items-center mb-4 shrink-0 text-white">
                                <span className="font-bold text-sm"><i className="fas fa-mobile-alt mr-2"></i>고객 뷰어 (가로 폭 480px 기준)</span>
                                <button onClick={() => setIsPreviewOpen(false)} className="text-slate-400 hover:text-white text-xl"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="flex-1 w-full max-w-md bg-white rounded-[2rem] overflow-hidden shadow-2xl relative">
                                <CustomerReportView data={editorDraft} />
                            </div>
                            <div className="mt-4 shrink-0">
                                <button onClick={() => setIsPreviewOpen(false)} className="px-6 py-2.5 bg-slate-700 text-white rounded-full text-sm font-bold hover:bg-slate-600 border border-slate-600">닫기</button>
                            </div>
                        </div>
                    )}
                    
                    {publishedReport && (
                        <div style={{ position: 'absolute', top: '-9999px', left: '-9999px' }}>
                            <CustomerReportView data={publishedReport} />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
