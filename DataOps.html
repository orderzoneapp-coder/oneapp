const normalizeWarehouseCode = (val) => {

// - 관리자가 실제 재고 Lot을 이전 구매분으로 판단하면 최근 Lot을 0 처리하고 이전 Lot 수량을 입력한다.

const DATAOPS_PURCHASE_LOT_OVERRIDE_KEY = 'dataops_purchase_lot_overrides_v1';

    readAll: () => {
        try { return JSON.parse(localStorage.getItem(DATAOPS_PURCHASE_LOT_OVERRIDE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    },
    writeAll: (overrides = {}) => {
        try { localStorage.setItem(DATAOPS_PURCHASE_LOT_OVERRIDE_KEY, JSON.stringify(overrides || {})); }
        catch (e) { }
        return overrides || {};
    },
    get: (groupKey = '') => {
        const key = safeStr(groupKey);
        if (!key) return null;
        return DATAOPS_PURCHASE_LOT_OVERRIDE_MODULE.readAll()[key] || null;
    },
    set: (groupKey = '', lots = {}, meta = {}) => {
        const key = safeStr(groupKey);
        if (!key) return null;
        const cleanLots = {};
        Object.entries(lots || {}).forEach(([lotKey, qty]) => {
            const q = safeNum(qty);
            if (Math.abs(q) > 0.0000001) cleanLots[lotKey] = q;
        });

        all[key] = { lots: cleanLots, meta: { ...(meta || {}), savedAt: new Date().toISOString() } };
        DATAOPS_PURCHASE_LOT_OVERRIDE_MODULE.writeAll(all);
        return all[key];
    },
    remove: (groupKey = '') => {
        const key = safeStr(groupKey);
        if (!key) return;

        DATAOPS_PURCHASE_LOT_OVERRIDE_MODULE.writeAll(all);
    }
