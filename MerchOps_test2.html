<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v2.1.20 마진룰동기화]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        window.MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "판매여부", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록" ];
        window.NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고", "재고수량", "최신단가" ];
        
        window.generateUUID = () => {
            return typeof crypto !== 'undefined' && crypto.randomUUID 
                ? crypto.randomUUID() 
                : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { 
                    const r = Math.random() * 16 | 0; 
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); 
                });
        };

        window.parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);


        // ============================================================
        // [M-ENGINE-00] 마진룰 기본값/보정
        // 역할: 메인 작업대와 ControlTower의 기본 룰셋을 동일하게 유지한다.
        // 핵심: 01창고 BOX는 10%가 우선이며, 과거 단일 기본룰(*/*/20%)만 남아 있으면 자동 복구한다.
        // ============================================================
        window.getDefaultMerchMarginRules = () => ([
            { id: 'rule_1', whCode: '01', unit: 'box, 박스, BOX', rate: 10, type: 'divide' },
            { id: 'rule_2', whCode: '01', unit: 'ea, 개, 낱개, EA, kg, 단', rate: 15, type: 'divide' },
            { id: 'rule_3', whCode: '03,05', unit: 'box, 박스, BOX', rate: 15, type: 'divide' },
            { id: 'rule_4', whCode: '03,05', unit: 'ea, 개, 낱개, EA, kg, 단', rate: 10, type: 'divide' },
            { id: 'rule_5', whCode: '77,99', unit: 'box, 박스, BOX', rate: 10, type: 'divide' },
            { id: 'rule_6', whCode: '77,99', unit: 'ea, 개, 낱개, EA, kg, 단', rate: 15, type: 'divide' },
            { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
        ]);

        window.normalizeMerchWarehouseForRule = (v) => {
            const raw = String(v ?? '').trim();
            if (!raw || raw === '*') return raw || '';
            const m = raw.match(/\d+/);
            return m ? String(Number(m[0])).padStart(2, '0') : raw;
        };

        window.getMerchUnitRuleCandidates = (v) => {
            const raw = String(v ?? '').trim().toLowerCase();
            if (!raw || raw === '*') return raw === '*' ? ['*'] : [];
            const compact = raw.replace(/\s/g, '');
            const parts = [compact, ...raw.split(/[,./|\s()_\-]+/).map(s => s.trim()).filter(Boolean)];
            const cands = [];
            const push = (x) => { if (x && !cands.includes(x)) cands.push(x); };
            parts.forEach(part => {
                const p = String(part || '').toLowerCase().replace(/\s/g, '');
                if (!p) return;
                if (/box|박스|상자|bx/.test(p)) push('box');
                if (/소분|분할|절단|컷|소포장|묶음/.test(p)) push('sub');
                if (/ea|each|개|낱개|낱|kg|킬로|단|봉|포/.test(p)) push('ea');
                push(p);
            });
            return cands;
        };

        window.isLegacyDefaultOnlyMarginRules = (rules = []) => {
            if (!Array.isArray(rules) || rules.length !== 1) return false;
            const r = rules[0] || {};
            return String(r.whCode ?? '*').trim() === '*'
                && String(r.unit ?? '*').trim() === '*'
                && window.parseNum(r.rate) === 20;
        };

        window.sanitizeMerchMarginRules = (rules = []) => {
            const defaults = window.getDefaultMerchMarginRules();
            if (!Array.isArray(rules) || rules.length === 0 || window.isLegacyDefaultOnlyMarginRules(rules)) {
                return defaults.map(r => ({ ...r }));
            }
            const cleaned = rules
                .filter(r => r && typeof r === 'object')
                .map((r, idx) => ({
                    id: r.id || `rule_${idx + 1}`,
                    whCode: String(r.whCode ?? '*').trim() || '*',
                    unit: String(r.unit ?? '*').trim() || '*',
                    rate: window.parseNum(r.rate),
                    type: r.type === 'multiply' ? 'multiply' : 'divide'
                }));
            const hasDefault = cleaned.some(r => String(r.whCode).trim() === '*' && String(r.unit).trim() === '*');
            if (!hasDefault) cleaned.push({ ...defaults[defaults.length - 1] });
            return cleaned;
        };

        // ============================================================
        // [M-POLICY-01] 엑셀값 원본 우선 정책
        // 역할: 엑셀에 항목이 있으면 공란/0/변동값까지 그대로 작업 테이블값으로 인정한다.
        // 주의: undefined(항목 없음)와 ''(항목은 있으나 공란)을 구분한다.
        // ============================================================
        window.hasOwnField = (obj, key) => !!obj && Object.prototype.hasOwnProperty.call(obj, key);
        window.isBlankCell = (v) => v === undefined || v === null || String(v).trim() === '';
        window.keepExcelCellValue = (v, isNumeric = false) => {
            if (v === undefined || v === null) return '';
            if (String(v).trim() === '') return '';
            return isNumeric ? window.parseNum(v) : v;
        };
        window.getWorkingSourcePriority = () => ['estimate', 'purchase', 'sales', 'inventory', 'parser'];
        window.hasAnyUploadSource = (sources = {}) => window.getWorkingSourcePriority().some(role => sources?.[role] && Object.keys(sources[role]).length > 0);
        window.mergeExcelSourcesForTable = (sources = {}, rolePriority = window.getWorkingSourcePriority()) => {
            const merged = {};
            rolePriority.forEach(role => {
                const src = sources?.[role] || {};
                Object.keys(src).forEach(key => {
                    // 먼저 들어온 역할의 항목 존재 여부를 우선한다. 값이 공란이어도 덮어쓰지 않는다.
                    if (!window.hasOwnField(merged, key)) merged[key] = src[key];
                });
            });
            return merged;
        };
        window.getTableValueFromRow = (row = {}, field, defaultValue = '') => {
            const finalData = row.finalData || {};
            const sources = row.sources || {};
            if (window.hasOwnField(finalData, field)) return finalData[field] ?? '';
            for (const role of window.getWorkingSourcePriority()) {
                const src = sources?.[role] || {};
                if (window.hasOwnField(src, field)) return src[field] ?? '';
            }
            return defaultValue;
        };
        window.getTableValueByAliases = (row = {}, aliases = [], defaultValue = '') => {
            for (const key of aliases) {
                const val = window.getTableValueFromRow(row, key, undefined);
                if (val !== undefined) return val ?? '';
            }
            return defaultValue;
        };

        // 1재고현황 정책: 엑셀의 '기록' 열은 재고상품의 구매일자다.
        // FIFO 확인을 위해 오래된 구매일자가 위, 최근 구매일자가 아래로 정렬되도록 숫자키를 만든다.
        window.normalizeInventoryPurchaseDate = (v) => {
            if (v === undefined || v === null) return '';
            if (v instanceof Date && !isNaN(v.getTime())) {
                const mm = String(v.getMonth() + 1).padStart(2, '0');
                const dd = String(v.getDate()).padStart(2, '0');
                return `${mm}/${dd}`;
            }
            const raw = String(v).trim();
            if (!raw) return '';
            const m = raw.match(/(\d{1,4})[.\/\-년\s]+(\d{1,2})(?:[.\/\-월\s]+(\d{1,2}))?/);
            if (!m) return raw;
            const hasYear = m[3] !== undefined;
            const mm = String(hasYear ? m[2] : m[1]).padStart(2, '0');
            const dd = String(hasYear ? m[3] : m[2]).padStart(2, '0');
            return `${mm}/${dd}`;
        };

        window.getInventoryPurchaseDateKey = (v, baseDate = '') => {
            const normalized = window.normalizeInventoryPurchaseDate(v);
            const m = String(normalized || '').match(/(\d{1,2})[.\/\-](\d{1,2})/);
            if (!m) return 99999999;
            const baseYearMatch = String(baseDate || '').match(/(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})/);
            const now = new Date();
            const mm = Number(m[1]);
            const dd = Number(m[2]);
            const year = baseYearMatch ? Number(baseYearMatch[1]) : now.getFullYear();
            if (!mm || !dd) return 99999999;
            return (year * 10000) + (mm * 100) + dd;
        };

        // 1재고현황 1행 메타 정책:
        // ERP 재고현황은 실제 헤더 위 1행에 "회사명 / 창고 / 기준일 / 재고현황" 정보가 들어온다.
        // 이 값은 행 데이터가 아니므로 파싱 단계에서 별도 메타로 읽고, 재고 source에 창고/기준일자로 주입한다.
        window.normalizeWarehouseCode = (v) => {
            const raw = String(v ?? '').trim();
            if (!raw) return '';
            const m = raw.match(/(\d{1,3})\s*(?:창고)?/);
            if (!m) return raw;
            return String(Number(m[1])).padStart(2, '0');
        };

        window.normalizeInventoryBaseDate = (v) => {
            if (v === undefined || v === null) return '';
            if (v instanceof Date && !isNaN(v.getTime())) {
                const yyyy = v.getFullYear();
                const mm = String(v.getMonth() + 1).padStart(2, '0');
                const dd = String(v.getDate()).padStart(2, '0');
                return `${yyyy}/${mm}/${dd}`;
            }
            const raw = String(v).trim();
            const m = raw.match(/(20\d{2})[.\/\-년\s]+(\d{1,2})[.\/\-월\s]+(\d{1,2})/);
            if (!m) return '';
            return `${m[1]}/${String(Number(m[2])).padStart(2, '0')}/${String(Number(m[3])).padStart(2, '0')}`;
        };

        window.cleanHeaderKey = (v) => String(v ?? '').toLowerCase().replace(/\s/g, '');

        // ERP 재고현황의 "최종(창고)"는 창고명이 아니라 해당 창고의 최신/최종 단가다.
        // 컬럼명에 창고가 포함되어도 창고 매핑 후보에서 제외하고 입고가/최신단가로만 사용한다.
        window.isInventoryLatestPriceHeader = (h) => {
            const cleanH = window.cleanHeaderKey(h);
            return cleanH === '최종(창고)' || cleanH === '최종창고' || cleanH === '창고최종' || cleanH === '최신단가' || cleanH === '재고단가' || (cleanH.includes('최종') && cleanH.includes('창고'));
        };

        window.isDisallowedHeaderForField = (field, header) => {
            const cleanH = window.cleanHeaderKey(header);
            if (!cleanH) return true;

            if (field === '창고') {
                // 최종(창고)는 가격 컬럼이므로 창고로 잡으면 안 된다.
                if (window.isInventoryLatestPriceHeader(header)) return true;
                if (cleanH.includes('단가') || cleanH.includes('금액') || cleanH.includes('가격')) return true;
            }

            if (field === '기준일자') {
                // 기준일자는 1행 메타가 원칙이다. 구매일자/기록 컬럼과 혼동하지 않는다.
                if (cleanH.includes('구매일자') || cleanH.includes('상품구매일자') || cleanH === '기록') return true;
            }

            return false;
        };

        window.extractInventorySheetMeta = (jsonAll = [], headerRowIdx = 0, sheetName = '') => {
            const metaRows = jsonAll.slice(0, Math.max(0, headerRowIdx));
            const metaText = metaRows
                .flatMap(row => Array.isArray(row) ? row : [])
                .map(v => String(v ?? '').trim())
                .filter(Boolean)
                .join(' / ');
            if (!metaText) return { sheetName, titleText: '', companyName: '', warehouseRaw: '', warehouseCode: '', baseDate: '', docType: '' };

            const parts = metaText.split('/').map(s => s.trim()).filter(Boolean);
            const companyMatch = metaText.match(/회사명\s*[:：]\s*([^/]+)/);
            const warehouseRaw = (parts.find(p => /\d+\s*창고/.test(p)) || '').trim();
            const baseDate = window.normalizeInventoryBaseDate(metaText);
            const docType = parts.find(p => p.includes('재고현황')) || (metaText.includes('재고현황') ? '재고현황' : '');

            return {
                sheetName,
                titleText: metaText,
                companyName: companyMatch ? companyMatch[1].trim() : '',
                warehouseRaw,
                warehouseCode: window.normalizeWarehouseCode(warehouseRaw),
                baseDate,
                docType
            };
        };

        window.getManagedRowKey = (row = {}) => row._managedKey || row.코드;


        // Smart Parser에서 마스터에 각인한 전용 리스트명을 읽는다.
        // 파서리스트는 카탈로그/견적서/카테고리와 완전히 분리한다.
        // 전용 필드가 없으면 다른 필드로 대체하지 않고 빈 값으로 둔다.
        window.getMerchParserListValue = (item = {}) => {
            return String(item?.['파서리스트'] || '').trim();
        };

        // 품목코드 정렬 정책:
        // 품목코드는 숫자가 아니라 ERP의 텍스트 코드다.
        // 숫자 정렬(numeric:true)을 쓰면 8자리 코드가 10자리 코드보다 먼저 올라와 목록 순서가 깨진다.
        window.normalizeProductCodeText = (v) => String(v ?? '').trim().replace(/\s/g, '');
        window.compareProductCodeText = (a, b) => {
            const av = window.normalizeProductCodeText(a);
            const bv = window.normalizeProductCodeText(b);
            if (av === bv) return 0;
            return av.localeCompare(bv, 'ko-KR', { numeric: false, sensitivity: 'base' });
        };


        // 판매상태는 현재 작업정보가 아니라 마스터에 저장된 결과 상태다.
        // 화면 표시는 숫자와 상태를 섞지 않고 행사/판매/품절/정지 4개로 단순화한다.
        // 테마1~테마5는 판매상태가 아니라 행사 상세정보로 별도 표시한다.
        window.getMasterSalesState = (item = {}) => {
            const rawStatus = item['판매여부'];
            const statusStr = rawStatus !== undefined && rawStatus !== null ? String(rawStatus).trim() : '';
            const hasStatusValue = statusStr !== '';
            const outPrice = window.parseNum(item['출고가']);
            const promoPrice = window.parseNum(item['행사가']);
            const stockQty = item['재고수량'] !== undefined && item['재고수량'] !== '' ? window.parseNum(item['재고수량']) : 999;
            const hasSalePrice = outPrice > 0 || promoPrice > 0;

            if (!hasStatusValue && !hasSalePrice) {
                return { code: '-', label: '-', text: '-', tone: 'muted', className: 'text-slate-400 font-bold' };
            }

            if (statusStr === '0' || statusStr === '정지' || statusStr === '정지중' || statusStr === '판매중단' || (!hasSalePrice && hasStatusValue)) {
                return { code: '0', label: '정지', text: '정지', tone: 'stopped', className: 'text-rose-600 font-black' };
            }

            if (hasSalePrice) {
                if (stockQty === 0) {
                    return { code: '1', label: '품절', text: '품절', tone: 'soldout', className: 'text-orange-600 font-black' };
                }
                if (promoPrice > 0) {
                    return { code: '1', label: '행사', text: '행사', tone: 'promo', className: 'text-purple-700 font-black' };
                }
                return { code: '1', label: '판매', text: '판매', tone: 'selling', className: 'text-emerald-700 font-black' };
            }

            return { code: '-', label: '-', text: '-', tone: 'muted', className: 'text-slate-400 font-bold' };
        };

        window.initIDB = () => new Promise((resolve, reject) => { 
            const request = indexedDB.open('MerchOpsDB', 2); 
            request.onupgradeneeded = (e) => { 
                const db = e.target.result; 
                if (!db.objectStoreNames.contains('store')) {
                    db.createObjectStore('store'); 
                }
                if (!db.objectStoreNames.contains('master_products')) {
                    db.createObjectStore('master_products', { keyPath: '코드' }); 
                }
            }; 
            request.onsuccess = () => resolve(request.result); 
            request.onerror = () => reject(request.error); 
        });

        window.bulkPutIDB = async (storeName, items) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readwrite'); 
                const store = tx.objectStore(storeName); 
                items.forEach(item => store.put(item)); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        window.getAllIDB = async (storeName) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readonly'); 
                const req = tx.objectStore(storeName).getAll(); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.getIDB = async (key) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readonly'); 
                const req = tx.objectStore('store').get(key); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.setIDB = async (key, val) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readwrite'); 
                tx.objectStore('store').put(val, key); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        // ============================================================
        // [M-ENGINE-01] 단가 계산 엔진
        // 역할: 입고가 + 외주비 + 노무비 + 마진룰을 기준으로 계산출고가를 산출한다.
        // 주의: 행사가 우선 적용 판단은 여기서 하지 않는다. 행사가는 후속 final/출력 단계에서 우선권을 가진다.
        // 수정 시 검증: 입고가 변경, 마진룰 변경, 창고/단위별 룰, forceRecalc 동작을 함께 확인한다.
        // ============================================================
        window.calculatePricesEngine = (baseInPrice, providedOutPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const ROUND_UNIT = 100;
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) 
                ? window.parseNum(mItem?.['외주비']) 
                : window.parseNum(currentFinalData?.['외주비']);
            
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) 
                ? window.parseNum(mItem?.['노무비']) 
                : window.parseNum(currentFinalData?.['노무비']);
            
            const totalCost = baseInPrice + outsrc + labor;
            // 계산용 창고/단위 정책:
            // - 창고는 _calcWarehouse → 작업값 창고 → 마스터 창고 순으로 잡는다.
            // - 단위는 단위 필드가 비어도 규격/품명에 붙은 (BOX)/(EA)/kg/단 표기를 함께 참고한다.
            // - 환경설정 룰셋이 과거 단일 기본룰(*/*/20%)이면 ControlTower 기본룰로 자동 보정한다.
            const whRaw = String(currentFinalData?.['_calcWarehouse'] ?? currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const whCode = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(whRaw) : whRaw;
            const unitRaw = [
                currentFinalData?.['_calcUnit'],
                currentFinalData?.['단위'],
                currentFinalData?.['규격'],
                currentFinalData?.['품목명'],
                mItem?.['단위'],
                mItem?.['규격'],
                mItem?.['품목명']
            ].filter(v => v !== undefined && v !== null && String(v).trim() !== '').join(' ');
            const unitCandidates = window.getMerchUnitRuleCandidates ? window.getMerchUnitRuleCandidates(unitRaw) : [String(unitRaw).trim().toLowerCase()].filter(Boolean);
            
            const matchWh = (ruleWh, targetWh) => { 
                if (String(ruleWh).trim() === '*') return true; 
                const targetNorm = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(targetWh) : String(targetWh ?? '').trim();
                const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => {
                    const ruleNorm = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(s) : s;
                    return ruleNorm !== '' && targetNorm !== '' && ruleNorm === targetNorm;
                }); 
            };
            
            const matchUnit = (ruleUnit, targetUnits = []) => { 
                if (String(ruleUnit).trim() === '*') return true; 
                const targets = String(ruleUnit).split(/[,./|\s]+/)
                    .flatMap(s => window.getMerchUnitRuleCandidates ? window.getMerchUnitRuleCandidates(s) : [String(s).trim().toLowerCase()])
                    .filter(Boolean); 
                return targets.some(ruleUnitNorm => targetUnits.some(targetUnitNorm => targetUnitNorm === ruleUnitNorm || targetUnitNorm.includes(ruleUnitNorm) || ruleUnitNorm.includes(targetUnitNorm))); 
            };

            let bestRule = null; 
            let bestScore = -1;
            const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(marginRules) : (Array.isArray(marginRules) ? marginRules : []);
            
            safeMarginRules.forEach((r, ruleIdx) => { 
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitCandidates)) { 
                    let score = 0; 
                    if (String(r.whCode).trim() !== '*') score += 20; 
                    if (String(r.unit).trim() !== '*') score += 10; 
                    score -= ruleIdx / 1000;
                    if (score > bestScore) { 
                        bestScore = score; 
                        bestRule = r; 
                    } 
                } 
            });

            const appliedRule = bestRule || { whCode: '*', unit: '*', rate: 20, type: 'divide' };
            currentFinalData._appliedMarginRule = {
                inputWarehouse: whCode || '-',
                inputUnit: unitCandidates[0] || (unitRaw || '-'),
                inputUnitRaw: unitRaw || '',
                ruleWhCode: appliedRule.whCode || '*',
                ruleUnit: appliedRule.unit || '*',
                rate: window.parseNum(appliedRule.rate),
                type: appliedRule.type || 'divide',
                totalCost
            };
            let calcOutPrice = 0;
            
            if (baseInPrice > 0) { 
                if (appliedRule.type === 'divide') {
                    calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); 
                } else {
                    calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); 
                }
                calcOutPrice = Math.round(calcOutPrice / ROUND_UNIT) * ROUND_UNIT; 
            }

            if (baseInPrice === 0) return 0;
            if (forceRecalc) return calcOutPrice;
            if (providedOutPrice > 0) return providedOutPrice;
            return calcOutPrice;
        };

        // ============================================================
        // [M-ENGINE-02] 현재 작업값 결정 엔진
        // 역할: 엑셀 source 값을 작업 테이블(finalData)에 그대로 올린다.
        // 원칙: 엑셀에 항목이 있으면 공란/0/변동값까지 그대로 적용한다.
        //       계산값은 _calculatedOutPrice/_appliedMarginRule에만 보관하고, 룰적용(forceRecalc) 때만 출고가를 변경한다.
        // ============================================================
        window.computeFinalData = (mItem = {}, sources = {}, marginRules = [], forceRecalc = false) => {
            const hasUploadSource = window.hasAnyUploadSource(sources);
            const targetSource = hasUploadSource
                ? window.mergeExcelSourcesForTable(sources)
                : { ...(mItem || {}) };

            const working = { ...targetSource };
            working._sourcePolicy = hasUploadSource ? 'excel_original_first' : 'master_reference';
            working._isRuleApplied = !!forceRecalc;

            const baseInPrice = window.parseNum(working['입고가']);
            const calculatedOutPrice = window.calculatePricesEngine(
                baseInPrice,
                0,
                mItem || {},
                working,
                window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(marginRules) : (Array.isArray(marginRules) ? marginRules : []),
                true
            );

            working._calculatedOutPrice = calculatedOutPrice || 0;
            working._normalPrice = window.hasOwnField(working, '출고가') ? window.parseNum(working['출고가']) : 0;
            working._isPromo = window.parseNum(working['행사가']) > 0;

            if (working._isPromo && working._theme === undefined) {
                if (sources?.inventory && Object.keys(sources.inventory).length > 0) working._theme = 2;
                else if (sources?.estimate && Object.keys(sources.estimate).length > 0) working._theme = 1;
                else working._theme = 0;
            } else if (working._theme === undefined) {
                working._theme = 0;
            }

            const hasOutPriceField = window.hasOwnField(working, '출고가');
            const excelOutPrice = window.parseNum(working['출고가']);
            if (hasOutPriceField && excelOutPrice > 0 && calculatedOutPrice > 0 && excelOutPrice !== calculatedOutPrice) {
                working._sourceOutPrice = excelOutPrice;
                working._outPriceRuleDiff = true;
                working._outPriceRuleDiffAmount = calculatedOutPrice - excelOutPrice;
                working._outPriceRuleDiffRate = excelOutPrice > 0 ? ((calculatedOutPrice - excelOutPrice) / excelOutPrice) * 100 : 0;
            } else {
                working._sourceOutPrice = hasOutPriceField ? excelOutPrice : 0;
                working._outPriceRuleDiff = false;
                working._outPriceRuleDiffAmount = 0;
                working._outPriceRuleDiffRate = 0;
            }

            if (forceRecalc && baseInPrice > 0) {
                // 룰적용은 명시적 액션이다. 자동 불러오기에서는 절대 출고가를 덮어쓰지 않는다.
                working['출고가'] = calculatedOutPrice;
                working._ruleAppliedAt = new Date().toISOString();
                working._outPriceRuleDiff = false;
                working._outPriceRuleDiffAmount = 0;
                working._outPriceRuleDiffRate = 0;
            }

            return working;
        };

        // ============================================================
        // [M-REGISTER-01] 미등록 상품 간편등록 전용 양식
        // 역할: 엑셀 불러오기 중 마스터에 없는 품목코드를 현재 작업테이블에서 바로 등록할 수 있게 한다.
        // 정책: 모달을 만들지 않고 현재 테이블을 신규등록용 양식으로 전환한다.
        // ============================================================
        window.MERCH_REGISTRATION_WORK_COLS = ['품목코드', '품목명', '규격', '단위', '입고가', '구매처', '수량', '기준일자', '창고', '기본', '부가세여부', '확인'];
        window.MERCH_REGISTRATION_REQUIRED = ['품목코드', '품목명', '규격', '단위'];
        window.MERCH_REGISTRATION_RECOMMENDED = ['입고가', '구매처', '수량', '기준일자', '창고', '기본', '부가세여부'];

        window.getFirstNonBlankValue = (obj = {}, keys = []) => {
            for (const key of keys) {
                const val = obj?.[key];
                if (val !== undefined && val !== null && String(val).trim() !== '') return val;
            }
            return '';
        };

        // 신규등록용 양식은 항목명이 있는 값만 매핑한다. 품명 문자열에서 단위/규격을 추론하지 않는다.
        window.getMerchUnitByHeaderOnly = (source = {}) => {
            return window.getFirstNonBlankValue(source, ['단위', '포장단위', '판매단위', '매입단위', 'UNIT', 'unit']);
        };

        // ERP 원본 정책: 엑셀 '과세' 값이 1이면 비과세, 0이면 과세로 표시한다.
        window.normalizeMerchTaxFlag = (val, headerName = '') => {
            if (val === undefined || val === null || String(val).trim() === '') return '';
            const raw = String(val).trim();
            const header = String(headerName || '').replace(/\s/g, '');
            if (header === '과세' || header === '부가세여부') {
                if (raw === '1') return '비과세';
                if (raw === '0') return '과세';
            }
            if (raw === '1') return '비과세';
            if (raw === '0') return '과세';
            if (raw.includes('비과세') || raw.includes('면세')) return '비과세';
            if (raw.includes('과세')) return '과세';
            return raw;
        };

        window.getRegistrationSource = (row = {}, preferredRole = '') => {
            const sources = row.sources || {};
            const rolePriority = [preferredRole, 'inventory', 'purchase', 'estimate', 'sales'].filter(Boolean);
            for (const role of rolePriority) {
                if (sources[role] && Object.keys(sources[role]).length > 0) return sources[role];
            }
            return row.finalData || {};
        };

        window.buildMerchRegistrationDraft = (row = {}, preferredRole = '') => {
            const source = window.getRegistrationSource(row, preferredRole);
            const finalData = row.finalData || {};
            const code = window.getFirstNonBlankValue(finalData, ['품목코드']) || window.getFirstNonBlankValue(source, ['품목코드', '상품코드', '코드', '바코드']) || row.코드 || '';
            const name = window.getFirstNonBlankValue(finalData, ['품목명']) || window.getFirstNonBlankValue(source, ['품목명', '상품명', '품명']) || '';
            const spec = window.getFirstNonBlankValue(finalData, ['규격']) || window.getFirstNonBlankValue(source, ['규격', '규격명', '단량', '사이즈']) || '';
            const unit = window.getFirstNonBlankValue(finalData, ['단위']) || window.getMerchUnitByHeaderOnly(source) || '';
            const inPrice = window.getFirstNonBlankValue(finalData, ['입고가']) || window.getFirstNonBlankValue(source, ['입고가', '매입가', '구매단가', '단가', '최신단가', '재고단가', '최종(창고)']);
            const vendor = window.getFirstNonBlankValue(finalData, ['구매처']) || window.getFirstNonBlankValue(source, ['구매처', '거래처', '거래처명', '거래']);
            const qty = window.getFirstNonBlankValue(finalData, ['수량']) || window.getFirstNonBlankValue(source, ['수량', '재고수량', '재고', '현재고', '구매수량', '입고수량']);
            // 기준일자는 사용자의 운영 정의상 구매일자다. 자료기준일과 분리하지 않는다.
            const baseDate = window.getFirstNonBlankValue(finalData, ['기준일자']) || window.getFirstNonBlankValue(source, ['상품 구매일자', '기록', '구매일자', '입고일자', '일자', '기준일자']);
            const warehouse = window.getFirstNonBlankValue(finalData, ['창고']) || window.getFirstNonBlankValue(source, ['창고', '창고코드', '_calcWarehouse']);
            const basic = window.getFirstNonBlankValue(finalData, ['기본']) || window.getFirstNonBlankValue(source, ['기본', '기본여부', '구분', '관리구분']);
            const rawTax = window.getFirstNonBlankValue(finalData, ['과세', '부가세여부']) || window.getFirstNonBlankValue(source, ['과세', '부가세여부', '부가세', '면세', '비과세']);
            const taxFlag = window.normalizeMerchTaxFlag(rawTax, source?._taxHeader || (source['과세'] !== undefined ? '과세' : '부가세여부'));

            const draft = {
                품목코드: String(code || '').replace(/\s/g, ''),
                품목명: name,
                규격: spec,
                단위: unit,
                입고가: inPrice,
                구매처: vendor,
                수량: qty,
                기준일자: baseDate,
                창고: warehouse,
                기본: basic,
                과세: source['과세'] !== undefined ? source['과세'] : rawTax,
                부가세여부: taxFlag
            };
            const validation = window.validateMerchRegistrationCandidate(draft);
            return { ...draft, 상태: validation.status, 확인: validation.message, _registrationCandidate: true };
        };

        window.validateMerchRegistrationCandidate = (draft = {}) => {
            const missingRequired = (window.MERCH_REGISTRATION_REQUIRED || []).filter(key => draft[key] === undefined || draft[key] === null || String(draft[key]).trim() === '');
            const missingRecommended = (window.MERCH_REGISTRATION_RECOMMENDED || []).filter(key => draft[key] === undefined || draft[key] === null || String(draft[key]).trim() === '');
            if (missingRequired.length > 0) {
                return { status: '필수입력 필요', canRegister: false, message: `필수 누락: ${missingRequired.join(', ')}` };
            }
            if (missingRecommended.length > 0) {
                return { status: '등록가능', canRegister: true, message: `권장 누락: ${missingRecommended.join(', ')}` };
            }
            return { status: '등록가능', canRegister: true, message: '필수/권장 입력 완료' };
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const safeJSONParse = (key, defaultVal) => {
            try { 
                const s = localStorage.getItem(key); 
                return (s && s !== 'undefined') ? JSON.parse(s) : defaultVal; 
            } catch (e) { 
                return defaultVal; 
            }
        };

        const TABLE_VIEW_TARGETS = [
            { id: 'catalog', label: '카탈로그' },
            { id: 'estimate', label: '견적' },
            { id: 'purchase', label: '구매' },
            { id: 'sales', label: '판매' },
            { id: 'inventory', label: '재고' }
        ];
        const TABLE_VIEW_TARGET_IDS = TABLE_VIEW_TARGETS.map(t => t.id);
        const REQUIRED_MASTER_CORE_FIELDS = ['품목코드', '품목명', '규격'];

        const getInitialVisibleMasterCols = () => ({
            catalog: ['입고가'],
            estimate: ['입고가'],
            purchase: ['입고가'],
            sales: ['입고가'],
            inventory: ['입고가']
        });
        
        const getInitialVisibleUploadCols = () => ({
            catalog: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A', '행사가'],
            estimate: ['창고', '기준일자', '구매처', '브랜드', '견적서', '단위', '재고수량', '상품 구매일자', '입고가', '외주비', '노무비', '출고가', '입고B', '도매A', '간단설명', '행사가', '검색어등록'],
            purchase: ['창고', '구매처', '단위', '입고가', '입고수량'],
            sales: ['창고', '구매처', '단위', '출고가', '출고량'],
            inventory: ['창고', '기준일자', '재고수량', '상품 구매일자', '구매처', '단위', '입고가', '출고가', '행사가', '간단설명']
        });

        // ============================================================
        // [M-TABLE-01] 테이블 양식 프리셋 정책
        // 역할: 카탈로그/견적/구매/판매/재고 불러오기 목적별로 마스터 노출항목과 작업테이블 노출항목을 함께 적용한다.
        // 제외: 최종/파서는 메인 테이블 보기 설정 대상이 아니다.
        // ============================================================
        window.canonicalMerchFieldName = (field) => {
            const clean = String(field || '').trim();
            if (['A판매', 'A판매가'].includes(clean)) return '도매A';
            if (['B판매', 'B판매가', 'B도매가'].includes(clean)) return '도매B';
            return clean;
        };

        window.normalizeMerchTableColumns = (columns = []) => {
            const clean = Array.isArray(columns)
                ? columns.map(c => window.canonicalMerchFieldName(c)).filter(Boolean)
                : [];
            const deduped = [];
            clean.forEach(col => {
                if (!deduped.includes(col)) deduped.push(col);
            });
            return deduped;
        };

        window.normalizeMerchMasterColumns = (columns = []) => {
            return window.normalizeMerchTableColumns(columns).filter(c => !REQUIRED_MASTER_CORE_FIELDS.includes(c));
        };

        window.createMerchTableView = (target, name, masterColumns = ['입고가'], workColumns = [], options = {}) => ({
            id: options.id || `${target}_view_${Date.now()}`,
            name: name || '맞춤양식',
            system: false,
            masterColumns: window.normalizeMerchMasterColumns(masterColumns),
            workColumns: window.normalizeMerchTableColumns(workColumns).filter(c => c !== '품목코드'),
            updatedAt: options.updatedAt || new Date().toISOString()
        });

        window.getDefaultMerchTableViewPresets = () => {
            const presets = {};
            TABLE_VIEW_TARGETS.forEach(target => {
                presets[target.id] = { views: [] };
            });
            return presets;
        };

        window.isSystemDefaultTableView = (view = {}) => {
            const name = String(view?.name || '').trim();
            const id = String(view?.id || '').trim();
            return view?.system === true || name === '기본보기' || name === '기본양식' || id.endsWith('_default') || id.includes('_default');
        };

        window.sanitizeMerchTableViewPresets = (raw = {}) => {
            const result = {};
            TABLE_VIEW_TARGETS.forEach(target => {
                const source = raw?.[target.id] || {};
                const sourceViews = Array.isArray(source.views) ? source.views : [];
                const views = sourceViews
                    .filter(v => v && !window.isSystemDefaultTableView(v))
                    .slice(0, 5)
                    .map((v, idx) => window.createMerchTableView(
                        target.id,
                        String(v.name || `맞춤양식 ${idx + 1}`).trim(),
                        v.masterColumns || ['입고가'],
                        v.workColumns || v.columns || [],
                        { id: v.id || `${target.id}_custom_${idx + 1}`, system: false, updatedAt: v.updatedAt }
                    ));
                result[target.id] = { views };
            });
            return result;
        };

        window.findMerchTableView = (presets = {}, target = 'estimate', viewId = '') => {
            const safeTarget = TABLE_VIEW_TARGET_IDS.includes(target) ? target : 'estimate';
            const safePresets = window.sanitizeMerchTableViewPresets(presets);
            const group = safePresets[safeTarget];
            return (group?.views || []).find(v => v.id === viewId || v.name === viewId) || (group?.views || [])[0] || null;
        };

        window.getMerchTableViewsForTarget = (presets = {}, target = 'estimate') => {
            const safeTarget = TABLE_VIEW_TARGET_IDS.includes(target) ? target : 'estimate';
            return window.sanitizeMerchTableViewPresets(presets)?.[safeTarget]?.views || [];
        };

        window.getAutoTableViewTarget = (managedItems = {}, fallbackRole = 'estimate') => {
            const roles = window.getLoadedExcelRolesFromManagedItems(managedItems);
            if (roles.length === 1) return roles[0];
            if (TABLE_VIEW_TARGET_IDS.includes(fallbackRole)) return fallbackRole;
            return 'estimate';
        };

        window.applyMerchTableView = (config, target = 'estimate', viewId = '', options = {}) => {
            if (!config) return null;
            const safeTarget = TABLE_VIEW_TARGET_IDS.includes(target) ? target : 'estimate';
            const presets = window.sanitizeMerchTableViewPresets(config.tableViewPresets || {});
            const view = window.findMerchTableView(presets, safeTarget, viewId || '');
            config.setActiveTableTarget?.(safeTarget);

            if (!view) {
                // 저장된 양식이 없으면 양식선택 버튼은 숨기고, 테이블은 대상별 기본 컬럼 fallback만 사용한다.
                config.setActiveTableViewId?.('');
                try {
                    localStorage.setItem('merchActiveTableTarget_v1', safeTarget);
                    localStorage.removeItem('merchActiveTableViewId_v1');
                    window.dispatchEvent(new CustomEvent('merch_table_view_changed', { detail: { target: safeTarget, viewId: '', name: '', manual: !!options.manual } }));
                } catch (e) {}
                return null;
            }

            config.setVisibleMasterCols?.(prev => ({
                ...(prev || {}),
                [safeTarget]: window.normalizeMerchMasterColumns(view.masterColumns || ['입고가'])
            }));
            config.setVisibleUploadCols?.(prev => ({
                ...(prev || {}),
                [safeTarget]: window.normalizeMerchTableColumns(view.workColumns || []).filter(c => c !== '품목코드')
            }));
            config.setActiveTableViewId?.(view.id);
            try {
                localStorage.setItem('merchActiveTableTarget_v1', safeTarget);
                localStorage.setItem('merchActiveTableViewId_v1', view.id);
                window.dispatchEvent(new CustomEvent('merch_table_view_changed', { detail: { target: safeTarget, viewId: view.id, name: view.name, manual: !!options.manual } }));
            } catch (e) {}
            return { ...view, target: safeTarget };
        };

        // 구버전 단축버튼 호출 호환용. 신규 기능은 applyMerchTableView를 사용한다.

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;

            const clean = (v) => window.cleanHeaderKey ? window.cleanHeaderKey(v) : String(v ?? '').toLowerCase().replace(/\s/g, '');
            const isDisallowed = (field, header) => window.isDisallowedHeaderForField ? window.isDisallowedHeaderForField(field, header) : false;
            const safeHeaders = Array.isArray(actualHeaders) ? actualHeaders : [];
            const findHeader = (field, keywords, exactOnly = false) => {
                let matchedKey = safeHeaders.find(h => {
                    if(!h || isDisallowed(field, h)) return false;
                    const cleanH = clean(h);
                    return keywords.includes(cleanH);
                });

                if (!matchedKey && !exactOnly) {
                    matchedKey = safeHeaders.find(h => {
                        if(!h || isDisallowed(field, h)) return false;
                        const cleanH = clean(h);
                        return keywords.some(kw => {
                            if (kw === '코드' && (cleanH.includes('1') || cleanH.includes('2') || cleanH.includes('3') || cleanH.includes('종'))) return false;
                            return cleanH.includes(kw);
                        });
                    });
                }

                return matchedKey;
            };
            
            Object.keys(mappingConfig).forEach(field => {
                const keywords = String(mappingConfig[field]).split(',').map(s => clean(s)).filter(Boolean);
                let matchedKey = '';

                if (field === '창고') {
                    // 창고는 가격성 컬럼의 부분일치(예: 최종(창고))를 허용하지 않는다.
                    // 1재고현황의 실제 창고는 1행 메타에서 별도 주입한다.
                    const warehouseKeywords = Array.from(new Set([...keywords, '창고', '창고코드', '창고명']));
                    matchedKey = findHeader(field, warehouseKeywords, false);
                } else if (field === '기준일자') {
                    // 기준일자는 구매일자/기록과 구분한다. 실제 파일 헤더에 기준일자가 있을 때만 매핑한다.
                    const baseDateKeywords = ['기준일자', '기준일', '기준일시', '재고기준일', '재고기준일자'];
                    matchedKey = findHeader(field, baseDateKeywords, true);
                } else {
                    matchedKey = findHeader(field, keywords, false);
                }
                
                if(matchedKey) {
                    headerMap[field] = matchedKey;
                }
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                
                const processData = (data, type) => {
                    try {
                        const wb = window.XLSX.read(data, { type: type, cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return [];

                        let headerRowIdx = -1;
                        const maxSearch = Math.min(25, jsonAll.length);
                        
                        for (let i = 0; i < maxSearch; i++) {
                            const rowArr = jsonAll[i] || [];
                            const rowStr = rowArr.join('').replace(/\s/g, '');
                            if (
                                rowStr.includes('품목코드') || 
                                rowStr.includes('상품코드') || 
                                rowStr.includes('바코드') || 
                               (rowStr.includes('코드') && (rowStr.includes('품명') || rowStr.includes('상품명') || rowStr.includes('규격'))) || 
                               (rowStr.includes('품명') && (rowStr.includes('규격') || rowStr.includes('단가')))
                            ) { 
                                headerRowIdx = i; 
                                break; 
                            }
                        }
                        
                        if (headerRowIdx === -1) return null; 

                        const sheetMeta = window.extractInventorySheetMeta
                            ? window.extractInventorySheetMeta(jsonAll, headerRowIdx, wb.SheetNames[0])
                            : {};
                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { 
                                endIdx--; 
                                continue; 
                            }
                            
                            let filledCount = 0;
                            let rawStr = '';
                            
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { 
                                    filledCount++; 
                                    rawStr += String(val).replace(/\s/g, ''); 
                                }
                            }
                            
                            if (rawStr === '') { 
                                endIdx--; 
                                continue; 
                            }
                            
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) {
                                endIdx--;
                            } else {
                                break;
                            }
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i]; 
                            if (!row) continue;
                            
                            let isEmpty = true; 
                            const obj = {}; 
                            
                            headers.forEach((h, idx) => { 
                                if (h) { 
                                    obj[h] = row[idx]; 
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') {
                                        isEmpty = false; 
                                    }
                                }
                            }); 
                            
                            if(!isEmpty) {
                                parsedData.push(obj);
                            }
                        }
                        Object.defineProperty(parsedData, '_sheetMeta', {
                            value: sheetMeta,
                            enumerable: false,
                            configurable: true
                        });
                        return parsedData;
                    } catch(err) { 
                        return null; 
                    }
                };

                const isCSV = file.name.toLowerCase().endsWith('.csv');
                
                if (isCSV) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        if (text.includes('')) {
                            const utf8Reader = new FileReader();
                            utf8Reader.onload = (e2) => { 
                                resolve(processData(e2.target.result, 'string') || []); 
                            };
                            utf8Reader.readAsText(file, 'utf-8');
                        } else { 
                            resolve(processData(text, 'string') || []); 
                        }
                    };
                    reader.readAsText(file, 'euc-kr');
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => { 
                        resolve(processData(new Uint8Array(e.target.result), 'array') || []); 
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };

                const requiredLinks = {

                    ['A판매', 'A판매가', 'B판매', 'B판매가', 'B도매가'].forEach(k => { delete est[k]; });
                    est['도매A'] = '도매A';
                    est['도매B'] = '도매B';
                    Object.entries(requiredMappings).forEach(([k, v]) => { if (!est[k]) est[k] = v; });
                    return { ...(prev || {}), estimate: est };
                });
                setMasterLinks(prev => {
                    const est = { ...(prev?.estimate || {}) };
                    ['A판매', 'A판매가', 'B판매', 'B판매가', 'B도매가'].forEach(k => { delete est[k]; });
                    est['도매A'] = '도매A';
                    est['도매B'] = '도매B';
                    Object.entries(requiredLinks).forEach(([k, v]) => { if (est[k] === undefined) est[k] = v; });
                    return { ...(prev || {}), estimate: est };
                });
            }, []);


            // 과거 메인 단독 기본값(*/*/20%)이 localStorage에 남아 있으면 즉시 ControlTower 기본 룰셋으로 복구한다.
            useEffect(() => {

            const addHistoryLogs = useCallback((newLogs) => {

        const useMerchUI = () => {
