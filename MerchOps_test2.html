        const useMerchActions = (config, data, ui, fullDisplayRows) => {
            const quickExcelReadyRef = useRef({ ready: false, at: 0, count: 0, codes: [] });
            
            const handleCloudSync = useCallback(async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다. 우측 상단 톱니바퀴에서 URL을 세팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 백업' : '불러오기'} 시작...`);
                ui.setIsProcessing(true);
                
                try {
                    if (type === 'upload') {
                        ui.setProcessMsg('서버 초기화 중...');
                        let initRes = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'initSync' }) });
                        if ((await initRes.json()).status !== 'success') throw new Error("초기화 실패");

                        const masterItems = Object.values(data.masterProducts);
                        const chunkSize = 500;
                        for (let i = 0; i < masterItems.length; i += chunkSize) {
                            const chunk = masterItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`마스터 데이터 업로드 중... (${Math.min(i + chunkSize, masterItems.length)} / ${masterItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_master', data: chunk }) });
                        }

                        const historyItems = data.historyLogs || [];
                        for (let i = 0; i < historyItems.length; i += chunkSize) {
                            const chunk = historyItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`히스토리 업로드 중... (${Math.min(i + chunkSize, historyItems.length)} / ${historyItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_history', data: chunk }) });
                        }

                        ui.setProcessMsg('환경설정 및 AI 매핑 사전 업로드 중...');
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const configPayload = {
                            action: 'config',
                            data: {
                                dict: dict,
                                rules: config.marginRules,
                                appConfig: { 
                                    mappings: config.mappings, 
                                    masterLinks: config.masterLinks, 
                                    visibleUploadCols: config.visibleUploadCols, 
                                    visibleMasterCols: config.visibleMasterCols,
                                    tableViewPresets: config.tableViewPresets,
                                    activeTableTarget: config.activeTableTarget,
                                    activeTableViewId: config.activeTableViewId
                                }
                            }
                        };
                        await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(configPayload) });

                        ui.showToast('✅ 클라우드 대용량 분할 백업(Push) 성공!');
                    } else {
                        ui.setProcessMsg('클라우드 데이터 수신 중...');
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        
                        if (result.status === 'success' && result.data) { 
                            if (result.data.master && Object.keys(result.data.master).length > 0) {
                                data.setMasterProducts(result.data.master);
                            }
                            if (result.data.dict && Object.keys(result.data.dict).length > 0) {
                                localStorage.setItem('parserDict_v870', JSON.stringify(result.data.dict));
                            }
                            if (result.data.rules && result.data.rules.length > 0) {
                                config.setMarginRules(window.sanitizeMerchMarginRules(result.data.rules));
                            }
                            
                            if (result.data.history && Array.isArray(result.data.history)) {
                                data.setHistoryLogs(result.data.history);
                                localStorage.setItem('merchHistory_v870', JSON.stringify(result.data.history));
                            }
                            
                            if (result.data.appConfig) {
                                if (result.data.appConfig.mappings) config.setMappings(result.data.appConfig.mappings);
                                if (result.data.appConfig.masterLinks) config.setMasterLinks(result.data.appConfig.masterLinks);
                                if (result.data.appConfig.visibleUploadCols) config.setVisibleUploadCols(result.data.appConfig.visibleUploadCols);
                                if (result.data.appConfig.visibleMasterCols) config.setVisibleMasterCols(result.data.appConfig.visibleMasterCols);
                                if (result.data.appConfig.tableViewPresets) config.setTableViewPresets(window.sanitizeMerchTableViewPresets(result.data.appConfig.tableViewPresets));
                                if (result.data.appConfig.activeTableTarget) config.setActiveTableTarget(result.data.appConfig.activeTableTarget);
                                if (result.data.appConfig.activeTableViewId) config.setActiveTableViewId(result.data.appConfig.activeTableViewId);
                            }

                            if (ui.setHasUnsavedChanges) ui.setHasUnsavedChanges(false);
                            
                            const masterCount = result.data.master ? Object.keys(result.data.master).length : 0;
                            const historyCount = result.data.history ? result.data.history.length : 0;
                            ui.showToast(`✅ 데이터 불러오기 완료! (상품: ${masterCount.toLocaleString()}건, 로그: ${historyCount.toLocaleString()}건)`);
                        } else {
                            throw new Error("Invalid Data Format");
                        }
                    }
                } catch (error) { 
                    console.error(error);
                    ui.setAlertMsg("통신 오류 발생. URL이나 시트 권한을 확인하세요.\n" + error.message); 
                } finally {
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }
            }, [config.cloudUrl, data.masterProducts, data.setMasterProducts, config.marginRules, config.setMarginRules, config.mappings, config.masterLinks, config.visibleUploadCols, config.visibleMasterCols, data.historyLogs, data.setHistoryLogs, ui]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 상품태그 찌꺼기를 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['상품태그']) {
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    data.setMasterProducts(newMaster);
                    ui.showToast(`✅ ${count}건의 상품에서 찌꺼기 데이터를 삭제했습니다. (적용 후 우측 상단 ☁️클라우드 백업을 눌러주세요)`);
                }
            }, [data.masterProducts, data.setMasterProducts, ui]);

            const getUploadRoleMeta = (role = 'estimate') => {
                const meta = {
                    estimate: { label: '공급사 견적', tag: '📄 견적/시세 엑셀', icon: '견적', affectsPrice: true },
                    purchase: { label: '구매현황', tag: '🧾 구매 엑셀', icon: '구매', affectsPrice: true },
                    sales: { label: '판매현황', tag: '🛒 판매 엑셀', icon: '판매', affectsPrice: false },
                    inventory: { label: '자사 재고', tag: '📦 자사 재고 엑셀', icon: '재고', affectsPrice: true }
                };
                return meta[role] || meta.estimate;
            };

            // ============================================================
            // [M-FLOW-01] 엑셀 업로드/매핑 처리
            // 역할: 업로드 파일을 파싱하고 managedItems.sources 및 finalData를 구성한다.
            // 주의: 여기서 masterProducts 전체를 작업 대상으로 만들지 않는다. 업로드/필터로 들어온 대상만 managedItems에 들어간다.
            // ============================================================
            const handleFileUpload = useCallback(async (e, role = 'estimate') => { 
                const files = Array.from(e.target.files); 
                const targetInput = e.target; 
                if (files.length === 0) return; 
                if (!window.XLSX) return ui.setAlertMsg("엑셀 파서 로드 대기중입니다.");

                ui.setIsProcessing(true); 
                const roleMeta = getUploadRoleMeta(role);
                ui.setProcessMsg(`[${roleMeta.label}] 엑셀 로딩 및 분석 중...`);
                await new Promise(resolve => setTimeout(resolve, 50)); 

                try {
                    let newMaster = { ...data.masterProducts }; 
                    let newManaged = { ...data.managedItems }; 
                    let totalCount = 0;
                    
                    for (const file of files) {
                        const excelData = await parseExcelRobust(file);
                        
                        if (!excelData || excelData.length === 0) { 
                            ui.showToast(`⚠️ [${file.name}] 인식 가능한 데이터가 없습니다.`); 
                            continue; 
                        }

                        const sheetMeta = excelData._sheetMeta || {};
                        const actualHeaders = Object.keys(excelData[0]);
                        const curMap = config.mappings['estimate'] || {}; 
                        const headerCache = createHeaderMap(actualHeaders, curMap);
                        
                        excelData.forEach((row, rowIdx) => {
                            const cleanHeader = (h) => String(h || '').replace(/\s/g, '');
                            const findActualHeader = (candidates = []) => actualHeaders.find(h => candidates.includes(cleanHeader(h)));
                            const codeKey = headerCache['품목코드'] || findActualHeader(['품목코드', '상품코드', '코드', '바코드']) || '품목코드'; 
                            const nameKey = headerCache['품목명'] || findActualHeader(['품목명', '상품명', '품명']) || '품목명';
                            const code = row[codeKey]; 
                            const name = row[nameKey];
                            
                            const cleanCode = String(code || '').replace(/\s/g, ''); 
                            const cleanName = String(name || '').replace(/\s/g, '');

                            if (!cleanCode || cleanCode.includes('출력') || cleanCode === '코드' || cleanCode === '품목코드' || cleanCode === '상품코드' || cleanCode.includes('예시')) return;
                            if (cleanName.includes('테스트상품') || cleanName.includes('샘플상품') || cleanCode.toLowerCase().includes('test')) return;

                            // 1재고현황은 같은 품목코드라도 구매일자/구매처/단가가 다르면 별도 재고 Lot로 보존한다.
                            // row.코드는 원 품목코드로 유지하고, 화면/선택용 내부키만 _managedKey로 분리한다.
                            const purchaseDateKey = headerCache['상품 구매일자'] || headerCache['기록'] || '기록';
                            const vendorKeyForLot = headerCache['구매처'] || '거래';
                            const priceKeyForLot = headerCache['입고가'] || '최종(창고)';
                            const lotDateForKey = window.normalizeInventoryPurchaseDate(row[purchaseDateKey]);
                            const lotVendorForKey = String(row[vendorKeyForLot] || '').trim();
                            const lotPriceForKey = window.parseNum(row[priceKeyForLot]);
                            const managedKey = role === 'inventory'
                                ? `${cleanCode}__INV__${String(file.name || '').replace(/[^가-힣a-zA-Z0-9_.-]/g, '_')}__${rowIdx}__${lotDateForKey || 'nodate'}__${lotVendorForKey || 'novendor'}__${lotPriceForKey || 0}`
                                : cleanCode;

                            if (!newManaged[managedKey]) { 
                                newManaged[managedKey] = { 코드: cleanCode, _managedKey: managedKey, sources: {}, finalData: {}, _tags: new Set() }; 
                            }
                            
                            let mItem = newManaged[managedKey];
                            if (!mItem.sources[role]) mItem.sources[role] = {};
                            
                            mItem = { ...mItem, _tags: new Set([...(mItem._tags || []), `excel:${roleMeta.icon}업로드`]) };
                            
                            const specKey = headerCache['규격'] || findActualHeader(['규격', '규격명', '단량', '사이즈']); 
                            const vendorKey = headerCache['구매처'] || findActualHeader(['구매처', '거래처', '거래처명', '거래']);
                            const unitKey = headerCache['단위'] || findActualHeader(['단위', '포장단위', '판매단위', '매입단위', 'UNIT', 'unit']);
                            const taxKey = headerCache['부가세여부'] || headerCache['과세'] || findActualHeader(['과세', '부가세여부', '부가세', '면세', '비과세']);
                            
                            mItem.sources[role]['품목코드'] = cleanCode;
                            mItem.sources[role]['품목명'] = nameKey ? row[nameKey] : '';
                            mItem.sources[role]['규격'] = specKey ? row[specKey] : '';
                            mItem.sources[role]['단위'] = unitKey ? row[unitKey] : '';
                            mItem.sources[role]['구매처'] = vendorKey ? row[vendorKey] : '';
                            if (taxKey) {
                                mItem.sources[role]['과세'] = row[taxKey];
                                mItem.sources[role]['부가세여부'] = window.normalizeMerchTaxFlag(row[taxKey], taxKey);
                                mItem.sources[role]['_taxHeader'] = taxKey;
                            }
                            
                            // 엑셀 source에는 엑셀에 실제로 들어온 값만 보존한다.
                            // 마스터값 자동보강은 테이블/통합업로드 원본정책과 충돌하므로 적용하지 않는다.

                            Object.keys(curMap).forEach(h => {
                                if (!['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                    const actualKey = headerCache[h];
                                    if (actualHeaders.includes(actualKey)) {
                                        const val = row[actualKey];
                                        const safeVal = (val !== undefined && val !== null) ? val : '';
                                        const isComparePrice = config.uploadColumnMeta?.[h]?.type === 'comparePrice';
                                        const isNumeric = isComparePrice || window.NUMERIC_HEADERS.includes(config.masterLinks['estimate']?.[h]) || window.NUMERIC_HEADERS.includes(h);
                                        mItem.sources[role][h] = window.keepExcelCellValue(safeVal, isNumeric);
                                    }
                                }
                            });

                            // 1재고현황 전용 컬럼 의미 보정:
                            // - 1행의 창고/기준일자는 실제 행 데이터가 아니므로 sheetMeta에서 읽어 재고 source에 주입한다.
                            // - '기록'은 상품 구매일자다.
                            // - '재고'는 기초재고/재고수량이다.
                            // - '최종(창고)'는 재고단가/입고가로 참조한다.
                            if (role === 'inventory') {
                                const source = mItem.sources.inventory;
                                const actualPurchaseDateKey = headerCache['상품 구매일자'] || actualHeaders.find(h => String(h).replace(/\s/g, '') === '기록');
                                const actualStockKey = headerCache['재고수량'] || actualHeaders.find(h => String(h).replace(/\s/g, '') === '재고');
                                const actualInventoryPriceKey = headerCache['입고가'] || actualHeaders.find(h => String(h).replace(/\s/g, '') === '최종(창고)' || String(h).replace(/\s/g, '') === '최종창고');
                                const actualMemoKey = actualHeaders.find(h => String(h).replace(/\s/g, '') === '적요' || String(h).replace(/\s/g, '') === '비고');
                                const metaWarehouseCode = window.normalizeWarehouseCode(sheetMeta.warehouseCode || sheetMeta.warehouseRaw || '');
                                const metaBaseDate = sheetMeta.baseDate || '';

                                // 기존 일반 매핑에서 '창고'가 '최종(창고)'에 부분일치되어 들어온 경우를 방어적으로 제거한다.
                                if (headerCache['창고'] && window.isInventoryLatestPriceHeader && window.isInventoryLatestPriceHeader(headerCache['창고'])) {
                                    delete source['창고'];
                                }

                                if (metaWarehouseCode) source['창고'] = metaWarehouseCode;
                                if (sheetMeta.warehouseRaw) source['_warehouseRaw'] = sheetMeta.warehouseRaw;
                                if (metaBaseDate) source['기준일자'] = metaBaseDate;
                                if (sheetMeta.companyName) source['_inventoryCompanyName'] = sheetMeta.companyName;
                                if (sheetMeta.titleText) source['_inventorySheetTitle'] = sheetMeta.titleText;
                                if (sheetMeta.docType) source['_inventorySheetType'] = sheetMeta.docType;
                                if (actualPurchaseDateKey) source['상품 구매일자'] = window.normalizeInventoryPurchaseDate(row[actualPurchaseDateKey]);
                                if (actualStockKey) source['재고수량'] = window.keepExcelCellValue(row[actualStockKey], true);

                                if (actualInventoryPriceKey) {
                                    const latestWarehousePrice = window.keepExcelCellValue(row[actualInventoryPriceKey], true);
                                    source['최신단가'] = latestWarehousePrice;
                                    source['_latestWarehousePrice'] = latestWarehousePrice;
                                    source['_latestWarehousePriceHeader'] = actualInventoryPriceKey;
                                    // ERP 재고현황에서 최종(창고)는 최신단가이며, 현재 작업 입고가의 기준으로 사용한다.
                                    if (source['입고가'] === undefined || source['입고가'] === '') source['입고가'] = latestWarehousePrice;
                                }

                                if (actualMemoKey) source['비고'] = row[actualMemoKey] || '';
                                source['_inventoryFifoKey'] = window.getInventoryPurchaseDateKey(source['상품 구매일자'], metaBaseDate);
                                source['_inventorySourceRole'] = '1재고현황_기초재고';
                            }

                            // 재고 불러오기 기본창고 정책:
                            // 재고파일/마스터에 창고 각인이 없을 때만 계산용 창고 01을 적용한다.
                            // 원본 sources.inventory['창고'] 값은 임의로 덮어쓰지 않는다.
                            if (role === 'inventory') {
                                const sourceWh = String(mItem.sources?.inventory?.['창고'] ?? '').trim();
                                const masterWh = String(newMaster[cleanCode]?.['창고'] ?? '').trim();
                                if (!sourceWh && !masterWh) {
                                    mItem.sources.inventory['_calcWarehouse'] = '01';
                                    mItem.sources.inventory['_calcWarehouseReason'] = '재고 불러오기 기본창고 01 적용';
                                } else {
                                    delete mItem.sources.inventory['_calcWarehouse'];
                                    delete mItem.sources.inventory['_calcWarehouseReason'];
                                }
                            }

                            mItem.finalData = window.computeFinalData(newMaster[cleanCode] || {}, mItem.sources, window.sanitizeMerchMarginRules(config.marginRules));
                            if (!newMaster[cleanCode]) {
                                const registrationDraft = window.buildMerchRegistrationDraft
                                    ? window.buildMerchRegistrationDraft(mItem, role)
                                    : { 품목코드: cleanCode, 품목명: mItem.sources?.[role]?.['품목명'] || '', 규격: mItem.sources?.[role]?.['규격'] || '', 단위: mItem.sources?.[role]?.['단위'] || '', 상태: '신규등록' };
                                mItem.finalData = { ...(mItem.finalData || {}), ...registrationDraft };
                                mItem._registrationCandidate = true;
                                mItem._tags = new Set([...(mItem._tags || []), '미등록:신규등록대상']);
                            }
                            newManaged[managedKey] = mItem;
                            totalCount++;
                        });
                    }
                    data.setMasterProducts(newMaster);
                    data.setManagedItems(newManaged);

                    const unregisteredRows = Object.values(newManaged).filter(item => item && item.코드 && !newMaster[item.코드]);
                    if (unregisteredRows.length > 0) {
                        ui.setSelectedRows(new Set(unregisteredRows.map(item => window.getManagedRowKey(item))));
                        setTimeout(() => {
                            window.alert(`미등록 상품이 ${unregisteredRows.length}건 발견되었습니다.\n상품을 등록하세요.`);
                            ui.setRegistrationMode?.(true);
                            ui.setPriceFilter?.('all');
                            ui.setGlobalSearch?.('');
                        }, 0);
                    }

                    // 업로드한 엑셀 역할에 맞춰 목적별 테이블 양식을 즉시 적용한다.
                    // 최종/파서 템플릿은 사용하지 않고, 불러오기 버튼의 목적값만 적용한다.
                    const autoTableTarget = window.getAutoTableViewTarget ? window.getAutoTableViewTarget(newManaged, role) : role;
                    const autoAppliedTemplate = window.applyMerchTableView
                        ? window.applyMerchTableView(config, autoTableTarget, null, { manual: false })
                        : null;

                    ui.setActiveTags(prev => {
                        const tagLabel = roleMeta.tag;
                        if (!prev.some(t => t.name === tagLabel)) return [...prev, {type: 'excel', name: tagLabel}];
                        return prev;
                    });
                    if(totalCount > 0) {
                        const templateMsg = autoAppliedTemplate ? ` / 테이블: ${autoAppliedTemplate.name}` : '';
                        ui.showToast(`✅ [${roleMeta.label}] 데이터 로드 완료 (${totalCount}건)${templateMsg}`);
                    }
                } catch(error) { 
                    console.error(error); 
                    ui.setAlertMsg("❌ 파싱 오류 발생. 엑셀 파일 형식을 확인하세요."); 
                } finally { 
                    if (targetInput) targetInput.value = ''; 
                    ui.setIsProcessing(false); 
                    ui.setProcessMsg(''); 
                }
            }, [data.masterProducts, data.managedItems, config.mappings, config.masterLinks, config.uploadColumnMeta, config.marginRules, config.tableViewPresets, ui]);

            // ============================================================
            // [M-FLOW-02] 파서리스트/카탈로그 필터 불러오기
            // 역할: 기존 기능의 데이터 source는 그대로 두고, 화면 표시명만 변경한다.
            // - 기존 카달로그(파서)  → 파서리스트: 내부 type/catalog, 마스터 '카탈로그' 필드 기준
            // - 기존 카달로그(견적)  → 카탈로그: 내부 type/category, 마스터 '견적서/카테고리' 필드 기준
            // 주의: 목록 안의 폴더/항목 source를 섞거나 변경하지 않는다.
            // ============================================================
            const handleLoadFilter = useCallback((type, name) => {
                if (!name) return;
                const isAllCatalogs = type === 'catalog' && name === 'all_catalogs';
                const filterName = isAllCatalogs ? '전체리스트' : name;
                const tagKey = `${type}:${filterName}`;
                const typeLabel = type === 'catalog' ? '파서리스트' : '카탈로그';

                const removeLoadedFilter = () => {
                    ui.setActiveTags(prev => prev.filter(t => !(t.type === type && t.name === filterName)));
                    data.setManagedItems(prev => {
                        let newManaged = { ...prev };
                        let removedCount = 0;
                        Object.keys(newManaged).forEach(key => {
                            const item = newManaged[key];
                            if (item._tags && item._tags.has(tagKey)) {
                                const newTags = new Set(item._tags);
                                newTags.delete(tagKey);
                                if (newTags.size === 0) {
                                    delete newManaged[key];
                                    removedCount++;
                                } else {
                                    newManaged[key] = { ...item, _tags: newTags };
                                }
                            }
                        });
                        ui.showToast(`✅ [${filterName}] 선택해제 완료. (${removedCount}건 작업 화면에서 제외됨)`);
                        return newManaged;
                    });
                    ui.setSelectedRows(new Set());
                };

                if (ui.activeTags.some(t => t.type === type && t.name === filterName)) {
                    removeLoadedFilter();
                    return;
                }
                
                if (isAllCatalogs) {
                    ui.setIsProcessing(true); 
                    ui.setProcessMsg(`전체리스트 데이터 병합 중...`);
                    
                    setTimeout(() => {
                        try {
                            ui.setActiveTags(prev => [...prev, {type: 'catalog', name: '전체리스트'}]);
                            let newManaged = { ...data.managedItems }; 
                            let addedCount = 0;
                            const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(config.marginRules) : (Array.isArray(config.marginRules) ? config.marginRules : []);

                            Object.values(data.masterProducts).forEach(mItem => {
                                if (mItem['카탈로그'] && String(mItem['카탈로그']).trim() !== '') {
                                    if (!newManaged[mItem.코드]) {
                                        newManaged[mItem.코드] = {
                                            코드: mItem.코드, 
                                            sources: { estimate: {} },
                                            finalData: window.computeFinalData(mItem, { estimate: {} }, safeMarginRules, false),
                                            _tags: new Set([`catalog:전체리스트`])
                                        };
                                        addedCount++;
                                    } else {
                                        newManaged[mItem.코드] = { 
                                            ...newManaged[mItem.코드], 
                                            _tags: new Set([...(newManaged[mItem.코드]._tags || []), `catalog:전체리스트`]) 
                                        };
                                    }
                                }
                            });
                            
                            data.setManagedItems(newManaged); 
                            ui.setSelectedRows(new Set()); 
                            const appliedView = window.applyMerchTableView ? window.applyMerchTableView(config, 'catalog', null, { manual: false }) : null;
                            ui.showToast(`✅ 전체리스트 병합 완료! (신규 ${addedCount}건 추가됨)${appliedView ? ` / 양식선택: ${appliedView.name}` : ''}`);
                        } catch (e) { 
                            ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다."); 
                        } finally { 
                            ui.setIsProcessing(false); 
                            ui.setProcessMsg(''); 
                        }
                    }, 100);
                    return;
                }

                ui.setIsProcessing(true); 
                ui.setProcessMsg(`[${filterName}] ${typeLabel} 데이터 병합 중...`);
                
                setTimeout(() => {
                    try {
                        ui.setActiveTags(prev => [...prev, {type, name: filterName}]);
                        let newManaged = { ...data.managedItems }; 
                        let addedCount = 0;
                        const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(config.marginRules) : (Array.isArray(config.marginRules) ? config.marginRules : []);

                        Object.values(data.masterProducts).forEach(mItem => {
                            let isMatch = false;
                            // source 원복: catalog는 기존 카달로그(파서) 목록, category는 기존 카달로그(견적) 목록.
                            const catStr = type === 'category' ? (mItem['견적서'] || mItem['카테고리'] || '') : (mItem['카탈로그'] || '');
                            if (String(catStr).split(',').map(c => c.trim()).includes(filterName)) {
                                isMatch = true;
                            }

                            if (isMatch) {
                                if (!newManaged[mItem.코드]) {
                                    const mockSource = {}; 
                                    const finalData = window.computeFinalData(mItem, { estimate: mockSource }, safeMarginRules);
                                    newManaged[mItem.코드] = {
                                        코드: mItem.코드, 
                                        sources: { estimate: mockSource },
                                        finalData: finalData,
                                        _tags: new Set([`${type}:${filterName}`])
                                    };
                                    addedCount++;
                                } else {
                                    newManaged[mItem.코드] = { 
                                        ...newManaged[mItem.코드], 
                                        _tags: new Set([...(newManaged[mItem.코드]._tags || []), `${type}:${filterName}`]) 
                                    };
                                }
                            }
                        });
                        
                        data.setManagedItems(newManaged); 
                        ui.setSelectedRows(new Set()); 
                        const targetViewKey = type === 'catalog' ? 'catalog' : 'estimate';
                        const appliedView = window.applyMerchTableView ? window.applyMerchTableView(config, targetViewKey, null, { manual: false }) : null;
                        ui.showToast(`✅ [${filterName}] 병합 완료! (신규 ${addedCount}건 추가됨)${appliedView ? ` / 양식선택: ${appliedView.name}` : ''}`);
                    } catch (error) { 
                        ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다."); 
                    } finally { 
                        ui.setIsProcessing(false); 
                        ui.setProcessMsg(''); 
                    }
                }, 100);
            }, [data.masterProducts, data.managedItems, data.setManagedItems, config.marginRules, config.tableViewPresets, ui]);

            const handleRemoveFilter = useCallback((type, name) => {
                const tagKey = `${type}:${name}`;
                ui.setActiveTags(prev => prev.filter(t => !(t.type === type && t.name === name)));
                
                data.setManagedItems(prev => {
                    let newManaged = { ...prev }; 
                    let removedCount = 0;
                    
                    Object.keys(newManaged).forEach(key => {
                        const item = newManaged[key];
                        if (item._tags && item._tags.has(tagKey)) {
                            const newTags = new Set(item._tags); 
                            newTags.delete(tagKey);
                            
                            if (newTags.size === 0) { 
                                delete newManaged[key]; 
                                removedCount++; 
                            } else { 
                                newManaged[key] = { ...item, _tags: newTags }; 
                            }
                        }
                    });
                    
                    ui.showToast(`✅ [${name}] 제거 완료. (${removedCount}건 작업 화면에서 제외됨)`); 
                    return newManaged;
                });
                ui.setSelectedRows(new Set());
            }, [data.setManagedItems, ui]);

            const handleStopSales = useCallback(async () => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 정지할 상품을 선택해주세요.');
                const stopCount = ui.selectedRows.size;
                if (!window.confirm(`선택한 ${stopCount}개 상품을 판매정지 처리하시겠습니까?\nF8 저장 또는 출력검증센터 최종 저장 시 마스터 판매여부가 0으로 반영됩니다.`)) return;
                
                ui.setIsProcessing(true);
                ui.setProcessMsg('선택 항목 판매 정지 처리 중...');
                
                setTimeout(() => {
                    data.setManagedItems(prev => {
                        let next = { ...prev };
                        ui.selectedRows.forEach(code => {
                            const current = next[code] || { 코드: code, sources: {}, finalData: {} };
                            next[code] = {
                                ...current,
                                finalData: {
                                    ...(current.finalData || {}),
                                    '판매여부': 0,
                                    _salesStopRequested: true
                                }
                            };
                        });
                        return next;
                    });
                    
                    ui.showToast(`✅ ${stopCount}개 상품이 정지 대기 상태로 변경되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [ui.selectedRows, data.setManagedItems, ui]);

            // ============================================================
            // [M-ACTION-01] 이번 업데이트 대상 제외
            // 역할: 체크된 상품을 현재 작업목록(managedItems)에서만 제거한다.
            // 주의: 판매정지와 다르다. 마스터 가격/판매여부/상품정보는 절대 변경하지 않는다.
            // ============================================================
            const handleExcludeSelectedFromUpdate = useCallback(() => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 제외할 상품을 선택해주세요.');
                const excludeCount = ui.selectedRows.size;
                if (!window.confirm(`선택한 ${excludeCount}개 상품을 이번 업데이트 대상에서 제외하시겠습니까?\n마스터 가격, 판매상태, 상품정보는 변경되지 않습니다.`)) return;

                data.setManagedItems(prev => {
                    const next = { ...prev };
                    ui.selectedRows.forEach(code => {
                        delete next[code];
                    });
                    return next;
                });

                ui.setSelectedRows(new Set());
                ui.showToast(`✅ ${excludeCount}개 상품을 이번 업데이트 대상에서 제외했습니다.`);
            }, [ui.selectedRows, data.setManagedItems, ui]);

            const handleSaveAsCategory = useCallback((categoryName) => {
                if (!categoryName || !categoryName.trim()) return;
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 견적서로 저장할 상품이 없습니다.");

                ui.setIsProcessing(true); 
                ui.setProcessMsg('견적서 저장 중...');

                setTimeout(() => {
                    let newMaster = { ...data.masterProducts }; 
                    let count = 0; 
                    const safeName = categoryName.trim();

                    fullDisplayRows.forEach(row => {
                        const code = row.코드; 
                        if (!newMaster[code]) return;
                        
                        newMaster[code] = { ...newMaster[code] };
                        const currentCategories = newMaster[code]['견적서'] || newMaster[code]['카테고리'] || '';
                        const tags = String(currentCategories).split(',').map(s => s.trim()).filter(Boolean); 
                        
                        if (!tags.includes(safeName)) { 
                            tags.push(safeName); 
                            newMaster[code]['견적서'] = tags.join(', '); 
                            delete newMaster[code]['카테고리']; 
                            count++; 
                        }
                    });

                    if (count > 0) {
                        const localLogs = [{
                            id: window.generateUUID(), 
                            timestamp: new Date().toLocaleString('ko-KR'), 
                            code: 'SYSTEM', 
                            name: `[견적서 그룹 생성] ${safeName}`, 
                            spec: '', 
                            field: '견적서', 
                            oldVal: '-', 
                            newVal: `${count}개 상품 추가됨`, 
                            diff: 0
                        }];
                        data.addHistoryLogs(localLogs);
                    }

                    data.setMasterProducts(newMaster);
                    ui.setShowCategoryModal(false);
                    ui.showToast(`✅ ${count}개 상품이 [${safeName}] 견적서에 추가/저장되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [fullDisplayRows, data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui]);

            const handleSaveAsCatalog = useCallback((catalogName) => {
                if (!catalogName || !catalogName.trim()) return;
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 카탈로그로 묶을 상품이 없습니다.");

                ui.setIsProcessing(true);
                ui.setProcessMsg('카탈로그 생성 중...');

                setTimeout(() => {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    const safeName = catalogName.trim();

                    fullDisplayRows.forEach(row => {
                        const code = row.코드;
                        if (!newMaster[code]) return;

                        newMaster[code] = { ...newMaster[code] };
                        const currentCatalogs = newMaster[code]['카탈로그'] || '';
                        const tags = String(currentCatalogs).split(',').map(s => s.trim()).filter(Boolean);

                        if (!tags.includes(safeName)) {
                            tags.push(safeName);
                            newMaster[code]['카탈로그'] = tags.join(', ');
                            count++;
                        }
                    });

                    if (count > 0) {
                        const localLogs = [{
                            id: window.generateUUID(),
                            timestamp: new Date().toLocaleString('ko-KR'),
                            code: 'SYSTEM',
                            name: `[카탈로그 생성] ${safeName}`,
                            spec: '',
                            field: '카탈로그',
                            oldVal: '-',
                            newVal: `${count}개 상품 추가됨`,
                            diff: 0
                        }];
                        data.addHistoryLogs(localLogs);
                    }

                    data.setMasterProducts(newMaster);
                    ui.setShowCatalogModal(false);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                    ui.showToast(`✅ ${count}개 상품이 [${safeName}] 카탈로그에 추가/저장되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [fullDisplayRows, data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.\n(※ 마스터 상품 자체가 삭제되지는 않으니 안심하세요!)`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...data.masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = String(newMaster[code][fieldKey]).split(',').map(s => s.trim()).filter(Boolean); 
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                if (count > 0) {
                    const localLogs = [{
                        id: window.generateUUID(), 
                        timestamp: new Date().toLocaleString('ko-KR'), 
                        code: 'SYSTEM', 
                        name: `[${fieldKey} 그룹 삭제] ${tagName}`, 
                        spec: '', 
                        field: fieldKey, 
                        oldVal: `${count}개 상품 포함`, 
                        newVal: '삭제됨', 
                        diff: 0
                    }];
                    data.addHistoryLogs(localLogs);
                }
                
                data.setMasterProducts(newMaster);
                
                if (ui.activeTags.some(t => t.type === type && t.name === tagName)) {
                    handleRemoveFilter(type, tagName);
                }

                ui.showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui, handleRemoveFilter]);

            // ============================================================
            // [M-OUTPUT-01] F8 빠른 엑셀 출력
            // 역할: F8을 누르면 확인 팝업 후 마스터 적용과 엑셀 출력을 한 번에 즉시 실행한다.
            // 정책: 빠른 출력은 검증센터의 수동 검수 단계를 건너뛰는 운영 편의 기능이다. 도매/ERP 용어는 출력센터 v2.6.7 기준을 따른다.
            // ============================================================
            const handleQuickExcelExport = useCallback(() => {
                if (!window.XLSX) return ui.showToast('⚠️ 엑셀 라이브러리 로드 대기 중입니다.');
                if (!fullDisplayRows || fullDisplayRows.length === 0) return ui.showToast('⚠️ 빠른 출력할 데이터가 없습니다.');

                const readyCodes = Array.isArray(quickExcelReadyRef.current.codes) ? quickExcelReadyRef.current.codes : [];
                const readyCodeSet = new Set(readyCodes);
                const targetRows = readyCodes.length > 0
                    ? fullDisplayRows.filter(row => readyCodeSet.has(window.getManagedRowKey(row)))
                    : (ui.selectedRows.size > 0 ? fullDisplayRows.filter(row => ui.selectedRows.has(window.getManagedRowKey(row))) : fullDisplayRows);

                if (targetRows.length === 0) return ui.showToast('⚠️ 선택된 빠른 출력 대상이 없습니다.');

                const getBestValue = (row, key, defaultValue = '') => window.getTableValueFromRow(row, key, defaultValue);
                const getBestValueByAliases = (row, aliases, defaultValue = '') => window.getTableValueByAliases(row, aliases, defaultValue);
                const getBestNum = (row, key, defaultValue = '') => {
                    const value = getBestValue(row, key, defaultValue);
                    return window.isBlankCell(value) ? '' : window.parseNum(value);
                };
                const getBestNumByAliases = (row, aliases, defaultValue = '') => {
                    const value = getBestValueByAliases(row, aliases, defaultValue);
                    return window.isBlankCell(value) ? '' : window.parseNum(value);
                };
                const getBestStr = (row, key, defaultValue = '') => {
                    const value = getBestValue(row, key, defaultValue);
                    return value !== undefined && value !== null ? String(value) : defaultValue;
                };
                const isValidSubItemCode = (code) => {
                    const s = String(code || '').trim();
                    return s && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
                };
                const buildThemeFlags = (row) => {
                    const promo = getBestNum(row, '행사가') > 0;
                    const themeNo = promo ? window.parseNum(getBestValue(row, '_theme') || getBestValue(row, 'promoTheme')) : 0;
                    return [1, 2, 3, 4, 5].map(n => themeNo === n ? '1' : '');
                };
                const getSaleCode = (row) => {
                    const finalData = row.finalData || {};
                    if (finalData._salesStopRequested === true || String(finalData['판매여부']) === '0') return '0';
                    const out = getBestNum(row, '출고가');
                    const promo = getBestNum(row, '행사가');
                    return (out > 0 || promo > 0) ? '1' : '0';
                };
                const getShopSalePrice = (row) => {
                    const promo = getBestNum(row, '행사가');
                    const out = getBestNum(row, '출고가');
                    return promo > 0 ? promo : out;
                };
                const calculateSubInfo = (row) => {
                    const subCode = getBestStr(row, '1종코드');
                    const div1 = getBestNum(row, '1종연산');
                    if (!isValidSubItemCode(subCode) || div1 <= 0) return null;
                    const ROUND_UNIT = 100;
                    const inPrice = getBestNum(row, '입고가');
                    const outPrice = getBestNum(row, '출고가');
                    const outsrc = getBestNum(row, '외주비');
                    const extraCost = getBestNum(row, '경비');
                    const subIn = inPrice > 0 ? Math.round(((inPrice + outsrc) / div1) / ROUND_UNIT) * ROUND_UNIT : 0;
                    const rawSubOut = outPrice > 0 ? Math.round((outPrice / div1) + extraCost) : 0;
                    const subOut = rawSubOut > 0 ? Math.round(rawSubOut / 10) * 10 : 0;
                    return { code: subCode, spec: getBestStr(row, '1종규격'), subIn, subOut };
                };

                const wb = window.XLSX.utils.book_new();
                const erpData = [['품목코드', '입고가', '0', '출고가', '0', '입고B', 'n', '도매A', 'n', '도매B', 'n', '최종(전송)', 'n', '행사', 'n', '1']];
                const shopData = [['상품코드\n코드', '상품명', '규격', '출고가', '도매A', '시중가', 'B판매가', '도매B', 'C 판매가', 'C 도매가', 'D 판매가', 'D 도매가', '브랜드', '기본설명', '판매여부', '재고수량', '테마1', '테마2', '테마3', '테마4', '테마5', '상품태그']];
                let subOutputCount = 0;

                targetRows.forEach(row => {
                    const code = window.normalizeProductCodeText(row.코드);
                    const saleCode = getSaleCode(row);
                    const inPrice = getBestNum(row, '입고가');
                    const erpOutPrice = getBestNum(row, '출고가');
                    const promoPrice = getBestNum(row, '행사가');
                    const shopSalePrice = getShopSalePrice(row);
                    const inPriceB = getBestNum(row, '입고B');
                    const erpASale = getBestNum(row, '도매A');
                    const erpBSale = getBestNum(row, '도매B');
                    const pMarket = getBestNum(row, '시중가');
                    const shopBPrice = getBestNum(row, 'B판매가');
                    const shopBWholesale = getBestNum(row, '도매B');
                    const finalTransmission = getBestNumByAliases(row, ['최종전송', '최종(전송)'], inPrice);
                    const finalStockRaw = getBestValue(row, '재고수량', '');
                    const finalStock = finalStockRaw !== '' ? window.parseNum(finalStockRaw) : '';
                    const themeFlags = buildThemeFlags(row);

                    // ERP는 기초정보 셋팅용이다. 출고가는 정상 출고가, 행사는 행사 컬럼으로 분리한다.
                    erpData.push([code, inPrice, '0', erpOutPrice, '0', inPriceB, 'n', erpASale, 'n', erpBSale, 'n', finalTransmission, 'n', promoPrice, 'n', saleCode]);
                    // 쇼핑몰은 실제 판매가 설정용이다. 행사가가 있으면 기존 쇼핑몰 양식의 출고가 칸에 행사 우선가를 넣는다.
                    shopData.push([code, getBestStr(row, '품목명'), getBestStr(row, '규격'), shopSalePrice, erpASale, (pMarket !== '' && pMarket > 0 ? pMarket : shopSalePrice), shopBPrice, shopBWholesale, 0, 0, 0, 0, getBestStr(row, '브랜드'), getBestStr(row, '간단설명'), saleCode, finalStock, ...themeFlags, getBestStr(row, '검색어등록')]);

                    const subInfo = calculateSubInfo(row);
                    if (subInfo) {
                        const subMaster = data.masterProducts[subInfo.code] || {};
                        erpData.push([subInfo.code, subInfo.subIn, '0', subInfo.subOut, '0', '', 'n', '', 'n', '', 'n', subInfo.subIn, 'n', '', 'n', saleCode]);
                        shopData.push([subInfo.code, subMaster['품목명'] || `${getBestStr(row, '품목명')} (소분)`, subMaster['규격'] || subInfo.spec || '', subInfo.subOut, subInfo.subOut, subInfo.subOut, '', '', 0, 0, 0, 0, subMaster['브랜드'] || getBestStr(row, '브랜드'), subMaster['간단설명'] || getBestStr(row, '간단설명'), saleCode, finalStock, ...themeFlags, subMaster['검색어등록'] || getBestStr(row, '검색어등록')]);
                        subOutputCount++;
                    }
                });

                window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), '쇼핑몰업로드');
                window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), 'ERP업데이트');
                window.XLSX.writeFile(wb, `통합업로드용_QuickF8_${new Date().toISOString().slice(0,10)}.xlsx`);
                quickExcelReadyRef.current = { ready: false, at: 0, count: 0, codes: [] };
                ui.showToast(`✅ F8 빠른 엑셀 출력 완료: 원물 ${targetRows.length}건 + 소분 ${subOutputCount}건`);
            }, [fullDisplayRows, ui.selectedRows, data.masterProducts, ui]);

            const handleCommitEstimate = useCallback(() => {
                const targets = ui.selectedRows.size > 0 ? ui.selectedRows : new Set(fullDisplayRows.map(r => window.getManagedRowKey(r)));
                if (targets.size === 0) return ui.showToast('⚠️ 반영할 항목이 없습니다.');

                const targetModeText = ui.selectedRows.size > 0 ? '선택한 상품' : '현재 화면 전체';

                let newMaster = { ...data.masterProducts }, commitCount = 0;
                let localLogs = [];
                const nowStr = new Date().toLocaleString('ko-KR');

                targets.forEach(managedKey => {
                    const item = data.managedItems[managedKey]; 
                    const code = item?.코드 || managedKey; 
                    if (!item || !item.코드) return;
                    
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        if (item.finalData._theme !== undefined) {
                            const themeNo = window.parseNum(item.finalData._theme);
                            newMaster[item.코드]['테마1'] = themeNo === 1 ? '1' : '';
                            newMaster[item.코드]['테마2'] = themeNo === 2 ? '1' : '';
                            newMaster[item.코드]['테마3'] = themeNo === 3 ? '1' : '';
                            newMaster[item.코드]['테마4'] = themeNo === 4 ? '1' : '';
                            newMaster[item.코드]['테마5'] = themeNo === 5 ? '1' : '';

                        // 판매중지는 사용자가 체크 후 명시적으로 요청한 경우에만 마스터 판매여부에 반영한다.
                        // 일반 가격/재고 작업 중에는 판매여부를 자동 판단해서 덮어쓰지 않는다.
                        if (item.finalData._salesStopRequested === true || String(item.finalData['판매여부']) === '0') {
                            const oldStatus = oldItem['판매여부'] !== undefined && oldItem['판매여부'] !== '' ? oldItem['판매여부'] : '-';
                            if (String(oldStatus) !== '0') {
                                localLogs.push({
                                    id: window.generateUUID(),
                                    timestamp: nowStr,

                                    name: oldItem.품목명 || item.sources?.estimate?.품목명 || '',
                                    spec: oldItem.규격 || item.sources?.estimate?.규격 || '',
                                    field: '판매여부',
                                    oldVal: oldStatus,
                                    newVal: '정지',
                                    diff: 0
                                });
                            }
                            newMaster[item.코드]['판매여부'] = 0;
                        }
                        
                        Object.keys(item.finalData).forEach(field => {
                            if (field.startsWith('_') || field === '판매여부') return; 
                            
                            const linked = config.masterLinks['estimate']?.[field] || (window.MASTER_HEADERS.includes(field) ? field : null);
                            
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '오류') {
                                const newVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(oldItem[linked]) : (oldItem[linked] || '');
                                
                                if (oldVal !== newVal) {
                                    if (['입고가', '출고가'].includes(linked) && oldVal > 0) {
                                        localLogs.push({ 
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal, 
                                            newVal: newVal, 
                                            diff: newVal - oldVal 
                                        });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {
                                        localLogs.push({
                                            id: window.generateUUID(), 
                                            timestamp: nowStr, 
                                            code: code, 
                                            name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', 
                                            spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, 
                                            oldVal: oldVal || '없음', 
                                            newVal: newVal || '삭제됨', 
                                            diff: 0
                                        });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;
                });

                if (localLogs.length > 0) {
                    data.addHistoryLogs(localLogs);
                }

                data.setMasterProducts(newMaster); 
                quickExcelReadyRef.current = { ready: true, at: Date.now(), count: commitCount, codes: Array.from(targets) };
                handleQuickExcelExport();
                ui.setSelectedRows(new Set()); 
                ui.showToast(`✅ ${commitCount}건 마스터 적용 후 엑셀을 바로 출력했습니다.`);
            }, [ui.selectedRows, fullDisplayRows, data.masterProducts, data.managedItems, data.setMasterProducts, data.addHistoryLogs, config.masterLinks, ui, handleQuickExcelExport]);

            const toggleAllRows = useCallback(() => {
                if (ui.selectedRows.size === fullDisplayRows.length && fullDisplayRows.length > 0) {
                    ui.setSelectedRows(new Set());
                } else { 
                    const next = new Set(); 
                    fullDisplayRows.forEach(r => next.add(window.getManagedRowKey(r))); 
                    ui.setSelectedRows(next); 
                }
            }, [fullDisplayRows, ui.selectedRows, ui.setSelectedRows]);

            const handleReset = useCallback(() => {
                data.setManagedItems({}); 
                ui.setSelectedRows(new Set()); 
                ui.setGlobalSearch(''); 
                ui.setActiveTags([]); 
                ui.setPriceFilter('all');
                ui.setRegistrationMode?.(false);
                if (ui.setBasicSearch) ui.setBasicSearch('');
                if (config.setVisibleUploadCols) config.setVisibleUploadCols(getInitialVisibleUploadCols());
                if (config.setVisibleMasterCols) config.setVisibleMasterCols(getInitialVisibleMasterCols());
                config.setActiveTableTarget?.('');
                config.setActiveTableViewId?.('');
                try {
                    localStorage.removeItem('merchTableTemplateManualOverride_v870');
                    localStorage.removeItem('merchActiveTableTemplateKey_v870');
                    localStorage.removeItem('merchActiveTableTarget_v1');
                    localStorage.removeItem('merchActiveTableViewId_v1');
                    window.dispatchEvent(new CustomEvent('merch_table_view_changed', { detail: { target: '', viewId: '', manual: false } }));
                } catch (e) {}
                window.setIDB('merchops_session', null); 
                ui.showToast('작업 데이터가 초기화 되었습니다. 다음 불러오기 후 해당 대상 보기만 표시됩니다.');
            }, [data.setManagedItems, config.setVisibleUploadCols, ui]);

            // ============================================================
            // [M-FLOW-03] 현재 작업범위 마진룰 재계산
            // 역할: 환경설정의 연산룰 변경 시 현재 화면/선택 작업범위에 계산출고가를 다시 적용한다.
            // 주의: masterProducts 전체 4,000건을 즉시 변경하지 않는다. 최종 저장 전까지는 managedItems 작업값이다.
            // ============================================================
            const handleForceApplyMarginRules = useCallback(() => {

                const targetRows = ui.selectedRows.size > 0 
                    ? fullDisplayRows.filter(r => ui.selectedRows.has(window.getManagedRowKey(r)))
                    : fullDisplayRows;

                const confirmMsg = ui.selectedRows.size > 0 
                    ? `선택된 ${targetRows.length}개 상품에 마진 룰을 강제 재계산 하시겠습니까?\n(출고가만 현재 마진룰 계산값으로 덮어씁니다.)`
                    : `현재 화면의 전체 ${targetRows.length}개 상품에 마진 룰을 강제 재계산 하시겠습니까?\n(출고가만 현재 마진룰 계산값으로 덮어씁니다.)`;

                if (!window.confirm(confirmMsg)) return;

                ui.setIsProcessing(true);
                ui.setProcessMsg('마진 룰 강제 적용 중...');

                setTimeout(() => {
                    data.setManagedItems(prev => {
                        const next = { ...prev }; 
                        let count = 0;
                        const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(config.marginRules) : (Array.isArray(config.marginRules) ? config.marginRules : []);

                        targetRows.forEach(row => {

            // ============================================================
            // [M-BRIDGE-01] 출력검증센터 전달 브릿지

            // ============================================================
            const handleOpenExportCenter = useCallback(() => {
                if (Object.keys(data.managedItems).length === 0 && ui.activeTags.length === 0) {

                    const finalData = row.finalData || {};
                    const sources = row.sources || {};
                    const inventory = sources.inventory || {};
                    const estimate = sources.estimate || {};
                    const purchase = sources.purchase || {};
                    const sales = sources.sales || {};
                    const master = data.masterProducts[code] || {};
                    const tags = row._tags ? Array.from(row._tags) : [];

                    const getValue = (key, defaultValue = '') => {
                        if (finalData[key] !== undefined && finalData[key] !== '') return finalData[key];
                        if (inventory[key] !== undefined && inventory[key] !== '') return inventory[key];
                        if (estimate[key] !== undefined && estimate[key] !== '') return estimate[key];
                        if (purchase[key] !== undefined && purchase[key] !== '') return purchase[key];
                        if (sales[key] !== undefined && sales[key] !== '') return sales[key];

                            판매여부: finalData._salesStopRequested === true ? 0 : (finalData['판매여부'] !== undefined ? finalData['판매여부'] : ''),

                                <div className={`h-8 flex items-center rounded-lg border shadow-sm overflow-hidden ${priceFilter === 'basic' ? 'border-slate-800 bg-slate-800' : 'border-slate-300 bg-white'}`}>

                                        className={`h-full w-[82px] px-2 text-[12px] font-bold outline-none border-l ${priceFilter === 'basic' ? 'bg-white text-slate-800 border-slate-600' : 'bg-white text-slate-700 border-slate-200 focus:bg-white'}`}

        const CategorySaveModal = ({ onClose, onSave }) => {
            const [name, setName] = useState('');

                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in" onClick={onClose}>
                    <div className="bg-white w-[400px] rounded-2xl shadow-2xl flex flex-col overflow-hidden" onClick={(e) => e.stopPropagation()}>
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">
