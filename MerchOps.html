        ui.showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
    }, [data.masterProducts, data.setMasterProducts, data.addHistoryLogs, ui, handleRemoveFilter]);
    const collectWholesaleBelowCostWarnings = useCallback((rows = []) => {
        // v2.1.91 정책 정정:
        // - 같은 코드라도 정품/비품 단가 체계가 다르므로 교차 비교하지 않는다.
        // - 입고가  ↔ 도매A 만 비교한다.
        // - 입고B   ↔ 도매B 만 비교한다.
        // - 입고가와 도매B, 입고B와 도매A는 비교 대상이 아니다.
        const warnings = [];
        const getValue = (row, key, defaultValue = '') => window.getTableValueFromRow(row, key, defaultValue);
        const getNum = (row, key) => {
            const value = getValue(row, key, '');
            return window.isBlankCell(value) ? '' : window.parseNum(value);
        };
        const getStr = (row, key, defaultValue = '') => {
            const value = getValue(row, key, defaultValue);
            return value !== undefined && value !== null ? String(value) : defaultValue;
        };
        rows.forEach(row => {
            const code = window.normalizeProductCodeText(row.코드);
            [
                { baseField: '입고가', wholesaleField: '도매A', label: '입고가↔도매A' },
                { baseField: '입고B', wholesaleField: '도매B', label: '입고B↔도매B' }
            ].forEach(({ baseField, wholesaleField, label }) => {
                const basePrice = getNum(row, baseField);
                const wholesalePrice = getNum(row, wholesaleField);
                if (basePrice > 0 && wholesalePrice > 0 && wholesalePrice < basePrice) {
                    warnings.push({
                        code,
                        name: getStr(row, '품목명'),
                        spec: getStr(row, '규격'),
                        baseField,
                        basePrice,
                        wholesaleField,
                        wholesalePrice,
                        diff: wholesalePrice - basePrice,
                        label,
                        message: `${wholesaleField}가 ${baseField}보다 낮음`
                    });
                }
            });
        });
        return warnings;
    }, []);

    // ============================================================
    // [M-OUTPUT-01] F8 빠른 엑셀 출력
    // 역할: F8을 누르면 확인 팝업 후 마스터 적용과 엑셀 출력을 한 번에 즉시 실행한다.
    // 정책: 빠른 출력은 검증센터의 수동 검수 단계를 건너뛰는 운영 편의 기능이다. 도매/ERP 용어는 출력센터 v2.6.7 기준을 따른다.
    // ============================================================
    const handleQuickExcelExport = useCallback(() => {
        if (!window.XLSX)
            return ui.showToast('⚠️ 엑셀 라이브러리 로드 대기 중입니다.');
        const pendingInfoEntriesForExport = Object.values(ui.infoChangeQueue || {});
        if ((!fullDisplayRows || fullDisplayRows.length === 0) && pendingInfoEntriesForExport.length === 0)
            return ui.showToast('⚠️ 빠른 출력할 데이터가 없습니다.');
        const readyRows = Array.isArray(quickExcelReadyRef.current.rows) ? quickExcelReadyRef.current.rows : [];
        const readyCodes = Array.isArray(quickExcelReadyRef.current.codes) ? quickExcelReadyRef.current.codes : [];
        const readyCodeSet = new Set(readyCodes);
        const targetRows = readyRows.length > 0
            ? readyRows
            : (readyCodes.length > 0
                ? fullDisplayRows.filter(row => readyCodeSet.has(window.getManagedRowKey(row)))
                : (ui.selectedRows.size > 0 ? fullDisplayRows.filter(row => ui.selectedRows.has(window.getManagedRowKey(row))) : fullDisplayRows));
        if (targetRows.length === 0 && pendingInfoEntriesForExport.length === 0)
            return ui.showToast('⚠️ 선택된 빠른 출력 대상이 없습니다.');
        const isInfoQuickRow = (row = {}) => !!(row?.sources?.info) || (window.getCurrentMerchSourceRole && window.getCurrentMerchSourceRole(row.sources || {}, row._lastUploadRole || '') === 'info');
        const exportInfoRows = (rows = []) => {
            const infoRows = rows.filter(isInfoQuickRow);
            if (infoRows.length === 0) return false;
            const headerUnion = [];
            const isExcludedInfoHeader = (h = '') => window.isMerchInfoExcludedColumn ? window.isMerchInfoExcludedColumn(h) : ['오더즈판매가', '오더즈구매가'].includes(String(h || '').trim());
            const pushHeader = (h) => { const key = String(h || '').trim(); if (key && !isExcludedInfoHeader(key) && !headerUnion.includes(key)) headerUnion.push(key); };
            infoRows.forEach(row => {
                const src = row.sources?.info || {};
                const headers = Array.isArray(src._originalHeaders) && src._originalHeaders.length > 0 ? src._originalHeaders : Object.keys(src._originalRow || src).filter(k => !String(k).startsWith('_'));
                headers.forEach(pushHeader);
            });
            const getCanonicalForHeader = (src = {}, header = '') => {
                const map = src._infoHeaderMap || {};
                return Object.keys(map).find(key => String(map[key] || '') === String(header || '')) || '';
            };
            const getFirstInfoValue = (...vals) => {
                for (const val of vals) {
                    if (val !== undefined && val !== null && String(val).trim() !== '') return val;
                }
                return '';
            };
            const normalizeInfoSaleCode = (val) => {
                const s = String(val ?? '').trim();
                if (s === '0' || s === '정지' || s === '정지중' || s === '판매중단') return '0';
                if (s === '') return '';
                return '1';
            };
            const getThemeFlagForInfo = (themeValue, n) => {
                const codes = window.parsePromotionThemeCodes ? window.parsePromotionThemeCodes(themeValue) : String(themeValue || '').split(/[,/|\s]+/).filter(Boolean);
                return codes.includes(String(n)) ? '1' : '';
            };
            const resolveInfoOutputValue = (row = {}, src = {}, finalData = {}, original = {}, header = '', canonical = '') => {
                const cleanHeader = String(header || '').trim();
                const key = String(canonical || cleanHeader).trim();
                if (isExcludedInfoHeader(cleanHeader) || isExcludedInfoHeader(key)) return undefined;
                if (key === '상품코드' || cleanHeader === '상품코드') return getFirstInfoValue(finalData['상품코드'], finalData['품목코드'], src['상품코드'], src['품목코드'], row.코드, original[cleanHeader]);
                if (key === '상품명' || cleanHeader === '상품명') return getFirstInfoValue(finalData['상품명'], finalData['품목명'], src['상품명'], src['품목명'], original[cleanHeader]);
                if (key === '판매가격' || cleanHeader === '판매가격') return getFirstInfoValue(finalData['판매가격'], finalData['출고가'], src['판매가격'], src['출고가'], original[cleanHeader]);
                if (key === '시중가격' || cleanHeader === '시중가격') return getFirstInfoValue(finalData['시중가격'], finalData['시중가'], src['시중가격'], src['시중가'], original[cleanHeader]);
                if (key === '재고' || cleanHeader === '재고') return getFirstInfoValue(finalData['재고'], finalData['재고수량'], src['재고'], src['재고수량'], original[cleanHeader]);
                if (key === '판매' || cleanHeader === '판매') return normalizeInfoSaleCode(getFirstInfoValue(finalData['판매'], finalData['판매여부'], src['판매'], src['판매여부'], original[cleanHeader]));
                if (key === '기본설명' || cleanHeader === '기본설명') return getFirstInfoValue(finalData['기본설명'], finalData['간단설명'], src['기본설명'], src['간단설명'], original[cleanHeader]);
                if (key === '상품태그' || cleanHeader === '상품태그') return getFirstInfoValue(finalData['상품태그'], finalData['검색어등록'], src['상품태그'], src['검색어등록'], original[cleanHeader]);
                const themeMatch = cleanHeader.match(/^테마([1-5])$/) || key.match(/^테마([1-5])$/);
                if (themeMatch) {
                    const n = themeMatch[1];
                    return getFirstInfoValue(finalData[`테마${n}`], src[`테마${n}`], getThemeFlagForInfo(getFirstInfoValue(finalData['행사테마'], src['행사테마']), n), original[cleanHeader]);
                }
                if (key && window.hasOwnField(finalData, key)) return finalData[key] ?? '';
                if (key && window.hasOwnField(src, key)) return src[key] ?? '';
                return window.hasOwnField(original, cleanHeader) ? (original[cleanHeader] ?? '') : '';
            };
            const aoa = [headerUnion];
            infoRows.forEach(row => {
                const src = row.sources?.info || {};
                const finalData = row.finalData || {};
                const original = src._originalRow || {};
                aoa.push(headerUnion.map(header => {
                    const canonical = getCanonicalForHeader(src, header);
                    const val = resolveInfoOutputValue(row, src, finalData, original, header, canonical);
                    return val === undefined ? '' : val;
                }));
            });
            const wb = window.XLSX.utils.book_new();
            const ws = window.XLSX.utils.aoa_to_sheet(aoa);
            window.XLSX.utils.book_append_sheet(wb, ws, '상품정보업로드');
            const type = infoRows.some(row => String(row.sources?.info?._infoType || '') === 'shop') ? '쇼핑몰' : (infoRows.some(row => String(row.sources?.info?._infoType || '') === 'erp') ? 'ERP' : '상품');
            const parserInfoCount = appendInfoChangeSheets(wb, pendingInfoEntriesForExport);
            window.XLSX.writeFile(wb, `${type}상품정보_업로드_${new Date().toISOString().slice(0, 10)}.xlsx`);
            if (parserInfoCount > 0) {
                const exportedAt = new Date().toISOString();
                ui.setInfoChangeQueue(prev => {
                    const next = { ...(prev || {}) };
                    Object.keys(next).forEach(code => { next[code] = { ...next[code], lastExportedAt: exportedAt }; });
                    return next;
                });
            }
            quickExcelReadyRef.current = { ready: false, at: 0, count: 0, codes: [], rows: [] };
            window.__MERCHOPS_QUICK_MASTER_OVERRIDE = null;
            ui.showToast(`✅ ${type} 상품정보 업로드 엑셀 생성 완료: ${infoRows.length}건${parserInfoCount > 0 ? ` / 파서 정보변경 ${parserInfoCount}건` : ''}`);
            return true;
        };
        if (targetRows.some(isInfoQuickRow)) {
            if (exportInfoRows(targetRows)) return;
        }
        const wholesaleBelowCostWarnings = collectWholesaleBelowCostWarnings(targetRows);
        const getMasterForQuickRow = (row = {}) => {
            const code = window.normalizeProductCodeText((row && row.코드) || '');
            const masterSource = window.__MERCHOPS_QUICK_MASTER_OVERRIDE || data.masterProducts;
            return (window.getMerchMasterItemForRow ? window.getMerchMasterItemForRow(masterSource, row) : masterSource[code]) || masterSource[code] || {};
        };
        // v2.1.106: 견적서 QuickF8 쇼핑몰업로드는 마스터 fallback으로 오늘 작업값을 보강하지 않는다.
        // 마스터는 이전 기준값/비교대상이며, 견적서 엑셀은 오늘 업로드 source다.
        const getQuickActiveRole = (row = {}) => window.getCurrentMerchSourceRole ? window.getCurrentMerchSourceRole(row.sources || {}, row._lastUploadRole || '') : '';
        const isEstimateQuickRow = (row = {}) => getQuickActiveRole(row) === 'estimate' || !!(row.sources && row.sources.estimate && Object.keys(row.sources.estimate).length > 0 && !['inventory', 'purchase', 'sales'].includes(getQuickActiveRole(row)));
        const getQuickSource = (row = {}, role = '') => {
            const sources = row.sources || {};
            if (role && sources[role]) return sources[role] || {};
            const active = getQuickActiveRole(row);
            return active && sources[active] ? sources[active] : {};
        };
        const readQuickSourceValue = (row = {}, aliases = [], defaultValue = '') => {
            const source = getQuickSource(row, isEstimateQuickRow(row) ? 'estimate' : '');
            const finalData = row.finalData || {};
            const keys = Array.isArray(aliases) ? aliases : [aliases];
            // 수기 수정값은 오늘 작업값으로 인정한다. 단, source에 항목이 공란으로 존재하면 마스터로 보강하지 않는다.
            for (const key of keys) {
                if (window.hasOwnField(finalData, key) && !window.isBlankCell(finalData[key])) return finalData[key];
            }
            for (const key of keys) {
                if (window.hasOwnField(source, key)) return window.isBlankCell(source[key]) ? defaultValue : source[key];
            }
            return defaultValue;
        };
        const readQuickSourceNum = (row = {}, aliases = [], defaultValue = 0) => {
            const value = readQuickSourceValue(row, aliases, defaultValue);
            return window.isBlankCell(value) ? defaultValue : window.parseNum(value);
        };
        const readQuickSourceStr = (row = {}, aliases = [], defaultValue = '') => {
            const value = readQuickSourceValue(row, aliases, defaultValue);
            return value !== undefined && value !== null ? String(value) : defaultValue;
        };
        const isPromoResetQuickRow = (row = {}) => !!((row.finalData || {})._promoResetRequested === true);
        const isMasterThemeResetQuickRow = (row = {}) => isPromoResetQuickRow(row) && (window.isMerchMasterAddedRow ? window.isMerchMasterAddedRow(row) : !!(row && (row._isMasterConditionAdded || row._isMasterAdded || row._fileMissing)));
        const getBestValue = (row, key, defaultValue = '') => window.getTableValueFromRow(row, key, defaultValue);
        const getBestValueByAliases = (row, aliases, defaultValue = '') => window.getTableValueByAliases(row, aliases, defaultValue);
        const getOutputValueByAliases = (row, aliases, defaultValue = '') => {
            const keys = Array.isArray(aliases) ? aliases : [aliases];
            const master = getMasterForQuickRow(row);
            const resetWriteFields = new Set(['행사가', '행사테마', '테마1', '테마2', '테마3', '테마4', '테마5']);
            const isResetWriteField = keys.some(key => resetWriteFields.has(key));
            // 마스터 테마 초기화 행은 쇼핑몰 업데이트 필수 정보가 비면 안 된다.
            // 단, 행사가/행사테마/테마1~5는 초기화 작업값을 우선 사용한다.
            if (isMasterThemeResetQuickRow(row) && !isResetWriteField) {
                for (const key of keys) {
                    if (window.hasOwnField(master, key) && !window.isBlankCell(master[key])) return master[key];
                }
            }
            for (const key of keys) {
                const value = getBestValue(row, key, undefined);
                if (value !== undefined && !window.isBlankCell(value)) return value;
            }
            for (const key of keys) {
                if (window.hasOwnField(master, key) && !window.isBlankCell(master[key])) return master[key];
            }
            return defaultValue;
        };
        const getBestNum = (row, key, defaultValue = '') => {
            const value = getOutputValueByAliases(row, [key], defaultValue);
