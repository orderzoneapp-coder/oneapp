            // 저장된 과거 룰셋이 03,05 통합값이어도 03창고 확정룰을 항상 먼저 평가한다.
            const fixed03Rules = [
                { id: 'rule_03_box', whCode: '03', unit: 'box, 박스, BOX', rate: 10, type: 'divide' },
                { id: 'rule_03_ea', whCode: '03', unit: 'ea, 개, 낱개, EA, kg, 단', rate: 15, type: 'divide' }
            ];
            const withoutOld03Fixed = cleaned.filter(r => !['rule_03_box', 'rule_03_ea'].includes(String(r.id || '')));
            return [...fixed03Rules, ...withoutOld03Fixed];
        };

        // ============================================================
        // [M-POLICY-01] 엑셀값 원본 우선 정책
        // 역할: 엑셀에 항목이 있으면 공란/0/변동값까지 그대로 작업 테이블값으로 인정한다.
        // 주의: undefined(항목 없음)와 ''(항목은 있으나 공란)을 구분한다.
        // ============================================================
        window.hasOwnField = (obj, key) => !!obj && Object.prototype.hasOwnProperty.call(obj, key);
        window.isBlankCell = (v) => v === undefined || v === null || String(v).trim() === '';
        window.keepExcelCellValue = (v, isNumeric = false) => {
            if (v === undefined || v === null) return '';
            if (String(v).trim() === '') return '';
            return isNumeric ? window.parseNum(v) : v;
        };
        window.MERCH_CURRENT_SOURCE_ROLES = ['catalog', 'estimate', 'purchase', 'sales', 'inventory', 'info', 'parser'];
        window.getCurrentMerchSourceRole = (sources = {}, fallback = '') => {
            const active = String(sources?._activeRole || sources?._lastUploadRole || fallback || '').trim();
            if (active && window.MERCH_CURRENT_SOURCE_ROLES.includes(active) && sources?.[active] && Object.keys(sources[active]).length > 0) return active;
            return window.MERCH_CURRENT_SOURCE_ROLES.find(role => sources?.[role] && Object.keys(sources[role]).length > 0) || '';
        };
        window.getWorkingSourcePriority = (sources = {}) => {
            const base = [...window.MERCH_CURRENT_SOURCE_ROLES];
            const active = window.getCurrentMerchSourceRole ? window.getCurrentMerchSourceRole(sources) : '';
            return active ? [active, ...base.filter(role => role !== active)] : base;
        };
        window.hasMerchSourceRoleData = (item = {}, role = '') => {
            const src = item?.sources?.[role];
            if (!src || typeof src !== 'object') return false;
            return Object.keys(src).some(key => !String(key || '').startsWith('_'));
        };
        window.normalizeMerchWarehouseDisplay = (v) => {
            const raw = String(v ?? '').trim();
            if (!raw) return '';
            if (window.normalizeWarehouseCode) {
                const code = window.normalizeWarehouseCode(raw);
                if (/^\d{2,3}$/.test(String(code || ''))) return code;
            }
            const m = raw.match(/(\d{1,3})\s*(?:창고)?/);
            return m ? String(Number(m[1])).padStart(2, '0') : raw;
        };
        window.buildMerchInventoryRefSummary = (items = [], code = '') => {
            const refs = (Array.isArray(items) ? items : Object.values(items || {}))
                .filter(item => item && String(item.코드 || '').replace(/\s/g, '') === String(code || '').replace(/\s/g, '') && item.sources && item.sources.inventory)
                .map(item => item.sources.inventory || {});
            if (!refs.length) return null;
            const stockQty = refs.reduce((sum, inv) => sum + window.parseNum(inv['재고수량'] ?? inv['재고'] ?? inv['수량']), 0);
            const priceRows = refs.map(inv => ({
                price: window.parseNum(inv['구매가'] ?? inv['구매단가'] ?? inv['매입가'] ?? inv['매입단가'] ?? inv['단가'] ?? inv['원가'] ?? inv['최종(창고)'] ?? inv['최신단가'] ?? inv['_latestWarehousePrice'] ?? inv['재고단가'] ?? inv['입고가']),
                dateKey: inv['_inventoryFifoKey'] ?? (window.getInventoryPurchaseDateKey ? window.getInventoryPurchaseDateKey(inv['상품 구매일자'] || inv['기록']) : 99999999),
                vendor: inv['거래'] || inv['구매처'] || '',
                warehouse: inv['_calcWarehouse'] || inv['창고'] || ''
            })).filter(r => r.price > 0).sort((a, b) => (a.dateKey || 99999999) - (b.dateKey || 99999999));
            const firstPrice = priceRows.length ? priceRows[0].price : 0;
            const warehouses = [...new Set(refs.map(inv => window.normalizeMerchWarehouseDisplay(inv['_calcWarehouse'] || inv['창고'] || '')).filter(Boolean))];
            return { count: refs.length, stockQty, price: firstPrice, warehouses, rows: priceRows.slice(0, 10) };
        };
        window.hasAnyUploadSource = (sources = {}) => window.getWorkingSourcePriority(sources).some(role => sources?.[role] && Object.keys(sources[role]).length > 0);
        window.mergeExcelSourcesForTable = (sources = {}, rolePriority = window.getWorkingSourcePriority(sources)) => {
            const merged = {};
            rolePriority.forEach(role => {
                const src = sources?.[role] || {};
                Object.keys(src).forEach(key => {
                    // 현재 활성 source의 항목 존재 여부를 우선한다. 값이 공란/0이어도 마스터나 다른 source로 덮지 않는다.
                    if (!window.hasOwnField(merged, key)) merged[key] = src[key];
                });
            });
            return merged;
        };
        window.getTableValueFromRow = (row = {}, field, defaultValue = '') => {
            const finalData = row.finalData || {};
            const sources = row.sources || {};
            if (window.hasOwnField(finalData, field)) return finalData[field] ?? '';
            for (const role of window.getWorkingSourcePriority(sources)) {
                const src = sources?.[role] || {};
                if (window.hasOwnField(src, field)) return src[field] ?? '';
            }
            return defaultValue;
        };
        window.getTableValueByAliases = (row = {}, aliases = [], defaultValue = '') => {
            for (const key of aliases) {
                const val = window.getTableValueFromRow(row, key, undefined);
                if (val !== undefined) return val ?? '';
            }
            return defaultValue;
        };

        // 1재고현황 정책: 엑셀의 '기록' 열은 재고상품의 구매일자다.
        // FIFO 확인을 위해 오래된 구매일자가 위, 최근 구매일자가 아래로 정렬되도록 숫자키를 만든다.
        window.normalizeInventoryPurchaseDate = (v) => {
            if (v === undefined || v === null) return '';
            if (v instanceof Date && !isNaN(v.getTime())) {
                const mm = String(v.getMonth() + 1).padStart(2, '0');
                const dd = String(v.getDate()).padStart(2, '0');
                return `${mm}/${dd}`;
            }
            const raw = String(v).trim();
            if (!raw) return '';
            const m = raw.match(/(\d{1,4})[.\/\-년\s]+(\d{1,2})(?:[.\/\-월\s]+(\d{1,2}))?/);
            if (!m) return raw;
            const hasYear = m[3] !== undefined;
            const mm = String(hasYear ? m[2] : m[1]).padStart(2, '0');
            const dd = String(hasYear ? m[3] : m[2]).padStart(2, '0');
            return `${mm}/${dd}`;
        };

        window.getInventoryPurchaseDateKey = (v, baseDate = '') => {
            const normalized = window.normalizeInventoryPurchaseDate(v);
            const m = String(normalized || '').match(/(\d{1,2})[.\/\-](\d{1,2})/);
            if (!m) return 99999999;
            const baseYearMatch = String(baseDate || '').match(/(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})/);
            const now = new Date();
            const mm = Number(m[1]);
            const dd = Number(m[2]);
            const year = baseYearMatch ? Number(baseYearMatch[1]) : now.getFullYear();
            if (!mm || !dd) return 99999999;
            return (year * 10000) + (mm * 100) + dd;
        };

        // 1재고현황 1행 메타 정책:
        // ERP 재고현황은 실제 헤더 위 1행에 "회사명 / 창고 / 기준일 / 재고현황" 정보가 들어온다.
        // 이 값은 행 데이터가 아니므로 파싱 단계에서 별도 메타로 읽고, 재고 source에 창고/기준일자로 주입한다.
        window.normalizeWarehouseCode = (v) => {
            const raw = String(v ?? '').trim();
            if (!raw) return '';
            const m = raw.match(/(\d{1,3})\s*(?:창고)?/);
            if (!m) return raw;
            return String(Number(m[1])).padStart(2, '0');
        };

        window.normalizeInventoryBaseDate = (v) => {
            if (v === undefined || v === null) return '';
            if (v instanceof Date && !isNaN(v.getTime())) {
                const yyyy = v.getFullYear();
                const mm = String(v.getMonth() + 1).padStart(2, '0');
                const dd = String(v.getDate()).padStart(2, '0');
                return `${yyyy}/${mm}/${dd}`;
            }
            const raw = String(v).trim();
            const m = raw.match(/(20\d{2})[.\/\-년\s]+(\d{1,2})[.\/\-월\s]+(\d{1,2})/);
            if (!m) return '';
            return `${m[1]}/${String(Number(m[2])).padStart(2, '0')}/${String(Number(m[3])).padStart(2, '0')}`;
        };

        window.cleanHeaderKey = (v) => String(v ?? '').toLowerCase().replace(/\s/g, '');

        // ERP 재고현황의 "최종(창고)"는 창고명이 아니라 해당 창고의 최신/최종 단가다.
        // 컬럼명에 창고가 포함되어도 창고 매핑 후보에서 제외하고 입고가/최신단가로만 사용한다.
        window.isInventoryLatestPriceHeader = (h) => {
            const cleanH = window.cleanHeaderKey(h);
            return cleanH === '최종(창고)' || cleanH === '최종창고' || cleanH === '창고최종' || cleanH === '최신단가' || cleanH === '재고단가' || (cleanH.includes('최종') && cleanH.includes('창고'));
        };

        window.isDisallowedHeaderForField = (field, header) => {
            const cleanH = window.cleanHeaderKey(header);
            if (!cleanH) return true;

            if (field === '창고') {
                // 최종(창고)는 가격 컬럼이므로 창고로 잡으면 안 된다.
                if (window.isInventoryLatestPriceHeader(header)) return true;
                if (cleanH.includes('단가') || cleanH.includes('금액') || cleanH.includes('가격')) return true;
            }

            if (field === '기준일자') {
                // 기준일자는 1행 메타가 원칙이다. 구매일자/기록 컬럼과 혼동하지 않는다.
                if (cleanH.includes('구매일자') || cleanH.includes('상품구매일자') || cleanH === '기록') return true;
            }

            if (field === '규격') {
                // 품목명(규격), 상품명(규격) 같은 복합 헤더는 규격 컬럼이 아니다.
                // 실제 규격 컬럼이 없으면 공란 유지한다.
                if (cleanH.includes('품목명') || cleanH.includes('상품명') || cleanH.includes('품명')) return true;
            }

            return false;
        };

        window.extractInventorySheetMeta = (jsonAll = [], headerRowIdx = 0, sheetName = '') => {
            const metaRows = jsonAll.slice(0, Math.max(0, headerRowIdx));
            const metaText = metaRows
                .flatMap(row => Array.isArray(row) ? row : [])
                .map(v => String(v ?? '').trim())
                .filter(Boolean)
                .join(' / ');
            if (!metaText) return { sheetName, titleText: '', companyName: '', warehouseRaw: '', warehouseCode: '', baseDate: '', docType: '' };

            const parts = metaText.split('/').map(s => s.trim()).filter(Boolean);
            const companyMatch = metaText.match(/회사명\s*[:：]\s*([^/]+)/);
            const warehouseRaw = (parts.find(p => /\d+\s*창고/.test(p)) || '').trim();
            const baseDate = window.normalizeInventoryBaseDate(metaText);
            const docType = parts.find(p => p.includes('재고현황')) || (metaText.includes('재고현황') ? '재고현황' : '');

            return {
                sheetName,
                titleText: metaText,
                companyName: companyMatch ? companyMatch[1].trim() : '',
                warehouseRaw,
                warehouseCode: window.normalizeWarehouseCode(warehouseRaw),
                baseDate,
                docType
            };
        };

        window.getManagedRowKey = (row = {}) => row._managedKey || row.코드;


        // Smart Parser에서 마스터에 각인한 파서리스트명을 읽는다.
        // 운영 기준: 스마트파서가 저장한 파서리스트 필드를 우선하고,
        // 기존 데이터 호환을 위해 마스터 카탈로그 필드를 기본 파서리스트로 사용한다.
        window.getMerchParserListValue = (item = {}) => {
            return String(item?.['파서리스트'] || item?.['카탈로그'] || '').trim();
        };

        // 품목코드 정렬 정책:
        // 품목코드는 숫자가 아니라 ERP의 텍스트 코드다.
        // 숫자 정렬(numeric:true)을 쓰면 8자리 코드가 10자리 코드보다 먼저 올라와 목록 순서가 깨진다.
        window.normalizeProductCodeText = (v) => String(v ?? '').trim().replace(/\s/g, '');
        window.compareProductCodeText = (a, b) => {
            const av = window.normalizeProductCodeText(a);
            const bv = window.normalizeProductCodeText(b);
            if (av === bv) return 0;
            return av.localeCompare(bv, 'ko-KR', { numeric: false, sensitivity: 'base' });
        };

        // F9 출력검증센터에서 마스터 반영 후 복귀했을 때,
        // 현재 작업행의 코드 표기(공백/품목코드/상품코드/내부키)와 마스터 키가 다르면
        // 행사중/행사제외/테마 필터가 최신 마스터를 못 찾는다.
        // 필터/렌더링에서는 반드시 이 헬퍼로 최신 마스터를 조회한다.
        window.getMerchMasterItemForRow = (masterProducts = {}, row = {}) => {
            if (!masterProducts || !row) return {};
            const src = row.sources || {};
            const fd = row.finalData || {};
            const candidates = [
                row.코드,
                fd['품목코드'], fd['상품코드'], fd['코드'],
                src.estimate?.['품목코드'], src.estimate?.['상품코드'], src.estimate?.['코드'],
                src.purchase?.['품목코드'], src.purchase?.['상품코드'], src.purchase?.['코드'],
                src.sales?.['품목코드'], src.sales?.['상품코드'], src.sales?.['코드'],
                src.inventory?.['품목코드'], src.inventory?.['상품코드'], src.inventory?.['코드'],
                row._managedKey
            ].map(v => window.normalizeProductCodeText ? window.normalizeProductCodeText(v) : String(v ?? '').trim()).filter(Boolean);
            for (const code of candidates) {
                if (masterProducts[code]) return masterProducts[code];
            }
            const candidateSet = new Set(candidates);
            for (const item of Object.values(masterProducts || {})) {
                if (!item) continue;
                const mCode = window.normalizeProductCodeText ? window.normalizeProductCodeText(item.코드 || item['품목코드']) : String(item.코드 || item['품목코드'] || '').trim();
                if (mCode && candidateSet.has(mCode)) return item;
            }
            return {};
        };


        // 판매상태는 현재 작업정보가 아니라 마스터에 저장된 결과 상태다.
        // 화면 표시는 숫자와 상태를 섞지 않고 행사/판매/품절/정지 4개로 단순화한다.
        // 테마1~테마5는 판매상태가 아니라 행사 상세정보로 별도 표시한다.
        window.getMasterSalesState = (item = {}) => {
            const rawStatus = item['판매여부'];
            const statusStr = rawStatus !== undefined && rawStatus !== null ? String(rawStatus).trim() : '';
            const hasStatusValue = statusStr !== '';
            const outPrice = window.parseNum(item['출고가']);
            const promoPrice = window.parseNum(item['행사가']);
            const stockQty = item['재고수량'] !== undefined && item['재고수량'] !== '' ? window.parseNum(item['재고수량']) : 999;
            const hasSalePrice = outPrice > 0 || promoPrice > 0;

            if (!hasStatusValue && !hasSalePrice) {
                return { code: '-', label: '-', text: '-', tone: 'muted', className: 'text-slate-400 font-bold' };
            }

            if (statusStr === '0' || statusStr === '정지' || statusStr === '정지중' || statusStr === '판매중단' || (!hasSalePrice && hasStatusValue)) {
                return { code: '0', label: '정지', text: '정지', tone: 'stopped', className: 'text-rose-600 font-black' };
            }

            if (hasSalePrice) {
                if (stockQty === 0) {
                    return { code: '1', label: '품절', text: '품절', tone: 'soldout', className: 'text-orange-600 font-black' };
                }
                if (promoPrice > 0) {
                    return { code: '1', label: '행사', text: '행사', tone: 'promo', className: 'text-purple-700 font-black' };
                }
                return { code: '1', label: '판매', text: '판매', tone: 'selling', className: 'text-emerald-700 font-black' };
            }

            return { code: '-', label: '-', text: '-', tone: 'muted', className: 'text-slate-400 font-bold' };
        };

        window.initIDB = () => new Promise((resolve, reject) => { 
            const request = indexedDB.open('MerchOpsDB', 2); 
            request.onupgradeneeded = (e) => { 
                const db = e.target.result; 
                if (!db.objectStoreNames.contains('store')) {
                    db.createObjectStore('store'); 
                }
                if (!db.objectStoreNames.contains('master_products')) {
                    db.createObjectStore('master_products', { keyPath: '코드' }); 
                }
            }; 
            request.onsuccess = () => resolve(request.result); 
            request.onerror = () => reject(request.error); 
        });

        window.bulkPutIDB = async (storeName, items) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readwrite'); 
                const store = tx.objectStore(storeName); 
                items.forEach(item => store.put(item)); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        window.getAllIDB = async (storeName) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction(storeName, 'readonly'); 
                const req = tx.objectStore(storeName).getAll(); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.getIDB = async (key) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readonly'); 
                const req = tx.objectStore('store').get(key); 
                req.onsuccess = () => resolve(req.result); 
                req.onerror = () => reject(tx.error); 
            }); 
        };

        window.setIDB = async (key, val) => { 
            const db = await window.initIDB(); 
            return new Promise((resolve, reject) => { 
                const tx = db.transaction('store', 'readwrite'); 
                tx.objectStore('store').put(val, key); 
                tx.oncomplete = () => resolve(); 
                tx.onerror = () => reject(tx.error); 
            }); 
        };

        // 판매가/룰적용 반올림 정책: 1,000원 미만은 10원 단위, 1,000원 이상은 100원 단위
        window.roundMerchRuleSalePrice = (rawPrice) => {
            const n = Number(rawPrice || 0);
            if (!Number.isFinite(n) || n <= 0) return 0;
            const roundUnit = n < 1000 ? 10 : 100;
            return Math.round(n / roundUnit) * roundUnit;
        };

        // ============================================================
        // [M-ENGINE-01] 단가 계산 엔진
        // 역할: 입고가 + 외주비 + 노무비 + 마진룰을 기준으로 계산출고가를 산출한다.
        // 주의: 행사가 우선 적용 판단은 여기서 하지 않는다. 행사가는 후속 final/출력 단계에서 우선권을 가진다.
        // 수정 시 검증: 입고가 변경, 마진룰 변경, 창고/단위별 룰, forceRecalc 동작을 함께 확인한다.
        // ============================================================
        window.calculatePricesEngine = (baseInPrice, providedOutPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) 
                ? window.parseNum(mItem?.['외주비']) 
                : window.parseNum(currentFinalData?.['외주비']);
            
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) 
                ? window.parseNum(mItem?.['노무비']) 
                : window.parseNum(currentFinalData?.['노무비']);
            
            const totalCost = baseInPrice + outsrc + labor;
            // 계산용 창고/단위 정책:
            // - 창고는 _calcWarehouse → 작업값 창고 → 마스터 창고 순으로 잡는다.
            // - 단위는 단위 필드가 비어도 규격/품명에 붙은 (BOX)/(EA)/kg/단 표기를 함께 참고한다.
            // - 환경설정 룰셋이 과거 단일 기본룰(*/*/20%)이면 ControlTower 기본룰로 자동 보정한다.
            const whRaw = String(currentFinalData?.['_calcWarehouse'] ?? currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const whCode = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(whRaw) : whRaw;
            const unitRaw = [
                currentFinalData?.['_calcUnit'],
                currentFinalData?.['단위'],
                currentFinalData?.['규격'],
                currentFinalData?.['품목명'],
                mItem?.['단위'],
                mItem?.['규격'],
                mItem?.['품목명']
            ].filter(v => v !== undefined && v !== null && String(v).trim() !== '').join(' ');
            const unitCandidates = window.getMerchUnitRuleCandidates ? window.getMerchUnitRuleCandidates(unitRaw) : [String(unitRaw).trim().toLowerCase()].filter(Boolean);
            
            const matchWh = (ruleWh, targetWh) => { 
                if (String(ruleWh).trim() === '*') return true; 
                const targetNorm = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(targetWh) : String(targetWh ?? '').trim();
                const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); 
                return targets.some(s => {
                    const ruleNorm = window.normalizeMerchWarehouseForRule ? window.normalizeMerchWarehouseForRule(s) : s;
                    return ruleNorm !== '' && targetNorm !== '' && ruleNorm === targetNorm;
                }); 
            };
            
            const matchUnit = (ruleUnit, targetUnits = []) => { 
                if (String(ruleUnit).trim() === '*') return true; 
                const targets = String(ruleUnit).split(/[,./|\s]+/)
                    .flatMap(s => window.getMerchUnitRuleCandidates ? window.getMerchUnitRuleCandidates(s) : [String(s).trim().toLowerCase()])
                    .filter(Boolean); 
                return targets.some(ruleUnitNorm => targetUnits.some(targetUnitNorm => targetUnitNorm === ruleUnitNorm || targetUnitNorm.includes(ruleUnitNorm) || ruleUnitNorm.includes(targetUnitNorm))); 
            };

            let bestRule = null; 
            let bestScore = -1;
            const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(marginRules) : (Array.isArray(marginRules) ? marginRules : []);
            
            safeMarginRules.forEach((r, ruleIdx) => { 
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitCandidates)) { 
                    let score = 0; 
                    if (String(r.whCode).trim() !== '*') score += 20; 
                    if (String(r.unit).trim() !== '*') score += 10; 
                    score -= ruleIdx / 1000;
                    if (score > bestScore) { 
                        bestScore = score; 
                        bestRule = r; 
                    } 
                } 
            });

            const appliedRule = bestRule || { whCode: '*', unit: '*', rate: 20, type: 'divide' };
            currentFinalData._appliedMarginRule = {
                inputWarehouse: whCode || '-',
                inputUnit: unitCandidates[0] || (unitRaw || '-'),
                inputUnitRaw: unitRaw || '',
                ruleWhCode: appliedRule.whCode || '*',
                ruleUnit: appliedRule.unit || '*',
                rate: window.parseNum(appliedRule.rate),
                type: appliedRule.type || 'divide',
                totalCost
            };
            let calcOutPrice = 0;
            
            if (baseInPrice > 0) { 
                if (appliedRule.type === 'divide') {
                    calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); 
                } else {
                    calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); 
                }
                calcOutPrice = window.roundMerchRuleSalePrice ? window.roundMerchRuleSalePrice(calcOutPrice) : (Math.round(calcOutPrice / (calcOutPrice < 1000 ? 10 : 100)) * (calcOutPrice < 1000 ? 10 : 100)); 
            }

            if (baseInPrice === 0) return 0;
            if (forceRecalc) return calcOutPrice;
            if (providedOutPrice > 0) return providedOutPrice;
            return calcOutPrice;
        };

        // ============================================================
        // [M-MARKET-PRICE-01] 시중가 source별 적용 정책
        // 역할: 견적서의 시중가는 시세 기준 작업값으로 쓰고, 구매/재고의 원가성 단가는 시중가 갱신 근거로 쓰지 않는다.
        // 정책: 구매·재고 작업에서 시중가는 마스터 기존값을 표시/출력 기준으로 불러온다.
        // ============================================================
        window.shouldUseMasterMarketPriceForRole = (role = '') => ['purchase', 'inventory'].includes(String(role || '').trim());
        window.applyMarketPricePolicyToWorkingData = (working = {}, mItem = {}, sources = {}) => {
            const activeRole = window.getCurrentMerchSourceRole ? window.getCurrentMerchSourceRole(sources || {}) : '';
            const next = { ...(working || {}) };
            next._marketPricePolicyRole = activeRole || '';
            if (window.shouldUseMasterMarketPriceForRole && window.shouldUseMasterMarketPriceForRole(activeRole)) {
                next['시중가'] = (mItem && Object.prototype.hasOwnProperty.call(mItem, '시중가')) ? (mItem['시중가'] ?? '') : '';
                next._marketPricePolicy = 'master_reference_for_purchase_inventory';
            } else if (activeRole === 'estimate') {
                next._marketPricePolicy = 'estimate_source_allowed';
            } else if (activeRole === 'info') {
                next._marketPricePolicy = 'info_original_preserved';
            } else {
                next._marketPricePolicy = activeRole ? 'source_original' : 'master_reference';
            }
            return next;
        };

        // ============================================================
        // [M-ENGINE-02] 현재 작업값 결정 엔진
        // 역할: 엑셀 source 값을 작업 테이블(finalData)에 그대로 올린다.
        // 원칙: 엑셀에 항목이 있으면 공란/0/변동값까지 그대로 적용한다.
        //       계산값은 _calculatedOutPrice/_appliedMarginRule에만 보관하고, 룰적용(forceRecalc) 때만 출고가를 변경한다.
        //       단, 구매/재고 작업의 시중가는 source 원가로 갱신하지 않고 마스터 시중가를 참조한다.
        // ============================================================
        window.computeFinalData = (mItem = {}, sources = {}, marginRules = [], forceRecalc = false) => {
            const hasUploadSource = window.hasAnyUploadSource(sources);
            const targetSource = hasUploadSource
                ? window.mergeExcelSourcesForTable(sources, window.getWorkingSourcePriority ? window.getWorkingSourcePriority(sources) : undefined)
                : { ...(mItem || {}) };

            let working = { ...targetSource };
            working = window.applyMarketPricePolicyToWorkingData ? window.applyMarketPricePolicyToWorkingData(working, mItem || {}, sources || {}) : working;
            working._sourcePolicy = hasUploadSource ? 'excel_original_first' : 'master_reference';
            working._isRuleApplied = !!forceRecalc;

            const baseInPrice = window.parseNum(working['입고가']);
            const calculatedOutPrice = window.calculatePricesEngine(
                baseInPrice,
                0,
                mItem || {},
                working,
                window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(marginRules) : (Array.isArray(marginRules) ? marginRules : []),
                true
            );

            working._calculatedOutPrice = calculatedOutPrice || 0;
            working._normalPrice = window.hasOwnField(working, '출고가') ? window.parseNum(working['출고가']) : 0;
            working._isPromo = window.parseNum(working['행사가']) > 0;

            // 행사테마는 행사가 여부로 자동 배정하지 않는다.
            // 명시 행사테마/테마1~5/_theme 값이 있으면 source 값을 우선한다.
            // 단, DataOps/재고 source는 테마정보를 관리하지 않으므로 source에 테마가 없을 때 마스터 행사테마를 기준으로 참조한다.
            const resolvedWorkingTheme = window.resolvePromotionThemeByPriority
                ? window.resolvePromotionThemeByPriority(working, sources, mItem || {})
                : window.normalizePromotionThemeValue(working, hasUploadSource ? {} : (mItem || {}));
            if (resolvedWorkingTheme) {
                working['행사테마'] = resolvedWorkingTheme;
                [1, 2, 3, 4, 5].forEach(n => {
                    working[`테마${n}`] = resolvedWorkingTheme.split(',').includes(String(n)) ? '1' : '';
                });
            } else {
                delete working._theme;
                delete working['행사테마'];
                [1, 2, 3, 4, 5].forEach(n => { delete working[`테마${n}`]; });
            }

            const hasOutPriceField = window.hasOwnField(working, '출고가');
            const excelOutPrice = window.parseNum(working['출고가']);
            if (hasOutPriceField && excelOutPrice > 0 && calculatedOutPrice > 0 && excelOutPrice !== calculatedOutPrice) {
                working._sourceOutPrice = excelOutPrice;
                working._outPriceRuleDiff = true;
                working._outPriceRuleDiffAmount = calculatedOutPrice - excelOutPrice;
                working._outPriceRuleDiffRate = excelOutPrice > 0 ? ((calculatedOutPrice - excelOutPrice) / excelOutPrice) * 100 : 0;
            } else {
                working._sourceOutPrice = hasOutPriceField ? excelOutPrice : 0;
                working._outPriceRuleDiff = false;
                working._outPriceRuleDiffAmount = 0;
                working._outPriceRuleDiffRate = 0;
            }

            if (forceRecalc && baseInPrice > 0) {
                // 룰적용은 명시적 액션이다. 자동 불러오기에서는 절대 출고가를 덮어쓰지 않는다.
                working['출고가'] = calculatedOutPrice;
                working._ruleAppliedAt = new Date().toISOString();
                working._outPriceRuleDiff = false;
                working._outPriceRuleDiffAmount = 0;
                working._outPriceRuleDiffRate = 0;
            }

            return working;
        };

        // ============================================================
        // [M-ESTIMATE-COMPARE-01] 카탈로그 ↔ 견적서 비교 메타
        // 역할: 선택 카탈로그와 현재 견적서의 상품 존재여부 및 원본 단가 차이를
        //       마스터 저장값과 분리하여 화면·필터·리포트에서 공통 사용한다.
        // 원칙: 견적서 공란은 0으로 보정하지 않으며, 룰적용 전에는 계산 출고가를 작업값으로 사용하지 않는다.
        // ============================================================
        window.getMerchEstimateCompareStatus = (row = {}) => {
            const raw = String(row?._estimateCompareStatus || row?.finalData?._estimateCompareStatus || '').trim().toLowerCase();
            return ['maintain', 'add', 'missing'].includes(raw) ? raw : '';
        };
        window.getMerchEstimateCompareMeta = (row = {}, mItem = {}) => {
            const status = window.getMerchEstimateCompareStatus(row);
            const source = row?.sources?.estimate || {};
            const finalData = row?.finalData || {};
            const findOwnCell = (aliases = []) => {
                for (const key of aliases) {
                    if (window.hasOwnField(source, key)) return { has: true, key, raw: source[key] };
                }
                return { has: false, key: '', raw: '' };
            };
            const inCell = findOwnCell(['입고가', '최종입고', '매입단가', '매입가', '구매단가', '원가', '단가']);
            const outCell = findOwnCell(['출고가', '판매가', '판매가격']);
            const basicCell = findOwnCell(['기본', '기본구분', '기본여부', '구분(기본)', '관리구분']);
            const isBlank = (value) => window.isBlankCell ? window.isBlankCell(value) : (value === undefined || value === null || String(value).trim() === '');
            const masterIn = window.parseNum(mItem?.['입고가']);
            const masterOut = window.parseNum(mItem?.['출고가']);
            const estimateInBlank = !inCell.has || isBlank(inCell.raw);
            const estimateOutBlank = !outCell.has || isBlank(outCell.raw);
            const estimateIn = estimateInBlank ? null : window.parseNum(inCell.raw);
            const estimateOut = estimateOutBlank ? null : window.parseNum(outCell.raw);
            const ruleApplied = !!(finalData?._ruleAppliedAt || finalData?._isRuleApplied);
            const ruledOutBlank = !ruleApplied || !window.hasOwnField(finalData, '출고가') || isBlank(finalData['출고가']);
            const ruledOut = ruledOutBlank ? null : window.parseNum(finalData['출고가']);
            const priceCheck = status === 'maintain' && (
                (!estimateInBlank && estimateIn !== masterIn) ||
                estimateOutBlank ||
                (!estimateOutBlank && estimateOut !== masterOut) ||
                (ruleApplied && !ruledOutBlank && ruledOut !== masterOut)
            );
            const saleState = window.getMasterSalesState ? window.getMasterSalesState(mItem || {}) : { code: String(mItem?.['판매여부'] ?? '') };
            return {
                status,
                statusLabel: status === 'maintain' ? '유지' : (status === 'add' ? '추가' : (status === 'missing' ? '누락' : '')),
                catalogs: Array.isArray(row?._estimateCompareCatalogs) ? row._estimateCompareCatalogs : (Array.isArray(finalData?._estimateCompareCatalogs) ? finalData._estimateCompareCatalogs : []),
                masterIn,
                estimateIn,
                estimateInRaw: inCell.raw,
                estimateInBlank,
                inDiff: estimateInBlank ? null : estimateIn - masterIn,
                masterOut,
                estimateOut,
                estimateOutRaw: outCell.raw,
                estimateOutBlank,
                outDiff: estimateOutBlank ? null : estimateOut - masterOut,
                ruledOut,
                ruledOutBlank,
                ruleApplied,
                priceCheck,
                basicRef: basicCell.has ? basicCell.raw : '',
                stopCandidate: status === 'missing' && String(saleState?.code || '') === '1'
            };
        };

        // ============================================================
        // [M-PRICE-CHECK-01] 공통 가격확인 엔진
        // 역할: 구버전 '변동'과 견적 비교의 '가격확인'을 하나의 판정으로 통합한다.
        // 정책:
        // 1) 견적 비교 유지상품은 입고가·출고가·출고가 공란·룰적용 출고가 차이를 확인한다.
        // 2) 구매·재고·정보 및 카탈로그 미선택 견적은 기존 변동 기준(마스터 입고가 대비 작업 입고가)을 보존한다.
        // 3) 추가·누락은 각각 전용 필터가 있으므로 가격확인에서 중복 집계하지 않는다.
        // ============================================================
        window.getMerchPriceCheckMeta = (row = {}, mItem = {}, activeRole = '') => {
            const sources = row?.sources || {};
            const finalData = row?.finalData || {};
            const inferRole = () => {
                const requested = String(activeRole || row?._lastUploadRole || sources?._activeRole || '').trim();
                if (typeof normalizeMerchTableTarget === 'function' && requested) return normalizeMerchTableTarget(requested);
                if (requested) return requested;
                return ['estimate', 'purchase', 'sales', 'inventory', 'info'].find(role => !!sources?.[role]) || 'estimate';
            };
            const role = inferRole();
            const reasons = [];
            const addReason = (reason) => { if (reason && !reasons.includes(reason)) reasons.push(reason); };
            const estimateMeta = window.getMerchEstimateCompareMeta
                ? window.getMerchEstimateCompareMeta(row, mItem)
                : { status: '', priceCheck: false };

            if (role === 'estimate' && estimateMeta.status) {
                // 추가·누락은 전용 비교 필터에서 처리한다.
                if (estimateMeta.status !== 'maintain') {
                    return { hasIssue: false, reasons: [], role, source: 'estimateCompare', estimateMeta };
                }
                if (!estimateMeta.estimateInBlank && estimateMeta.inDiff !== 0) addReason('입고가변동');
                if (estimateMeta.estimateOutBlank) addReason('출고가공란');
                if (!estimateMeta.estimateOutBlank && estimateMeta.outDiff !== 0) addReason('출고가변동');
                if (estimateMeta.ruleApplied && !estimateMeta.ruledOutBlank && estimateMeta.ruledOut !== estimateMeta.masterOut) addReason('룰적용가변동');
                return {
                    hasIssue: reasons.length > 0,
                    reasons,
                    role,
                    source: 'estimateCompare',
                    estimateMeta,
                    masterIn: estimateMeta.masterIn,
                    workingIn: estimateMeta.estimateIn,
                    masterOut: estimateMeta.masterOut,
                    workingOut: estimateMeta.estimateOut
                };
            }

            // 구버전 변동 기준을 그대로 공통 가격확인에 편입한다.
            const masterIn = window.parseNum(mItem?.['입고가']);
            const sourcePriority = [sources?.[role], sources?.estimate, sources?.purchase, sources?.sales, sources?.inventory, sources?.info].filter(Boolean);
            let workingInRaw = Object.prototype.hasOwnProperty.call(finalData, '입고가') ? finalData['입고가'] : undefined;
            if (workingInRaw === undefined) {
                for (const source of sourcePriority) {
                    const aliases = ['입고가', '최종입고', '구매가', '구매단가', '매입가', '매입단가', '단가', '원가', '최종(창고)', '최종창고', '최신단가', '재고단가'];
                    const key = aliases.find(alias => Object.prototype.hasOwnProperty.call(source || {}, alias));
                    if (key) {
                        workingInRaw = source[key];
                        break;
                    }
                }
            }
            const workingIn = window.parseNum(workingInRaw);
            if (masterIn > 0 && workingIn > 0 && masterIn !== workingIn) addReason('입고가변동');
            return {
                hasIssue: reasons.length > 0,
                reasons,
                role,
                source: 'workingPrice',
                estimateMeta,
                masterIn,
                workingIn,
                masterOut: window.parseNum(mItem?.['출고가']),
                workingOut: null
            };
        };

        window.formatMerchComparePrice = (value, blankText = '공란') => {
            if (value === null || value === undefined || value === '') return blankText;
            return window.parseNum(value).toLocaleString();
        };
        window.formatMerchCompareDiff = (value) => {
            if (value === null || value === undefined || value === '') return '차 -';
            const num = Number(value) || 0;
            return `차 ${num > 0 ? '+' : ''}${num.toLocaleString()}`;
        };

        // ============================================================
        // [M-REGISTER-01] 미등록 상품 간편등록 전용 양식
        // 역할: 엑셀 불러오기 중 마스터에 없는 품목코드를 현재 작업테이블에서 바로 등록할 수 있게 한다.
        // 정책: 모달을 만들지 않고 현재 테이블을 신규등록용 양식으로 전환한다.
        // ============================================================
        window.MERCH_REGISTRATION_WORK_COLS = ['품목코드', '품목명', '규격', '단위', '입고가', '구매처', '수량', '기준일자', '창고', '기본', '부가세여부', '확인'];
        window.MERCH_REGISTRATION_REQUIRED = ['품목코드', '품목명', '규격', '단위'];
        window.MERCH_REGISTRATION_RECOMMENDED = ['입고가', '구매처', '수량', '기준일자', '창고', '기본', '부가세여부'];

        window.getFirstNonBlankValue = (obj = {}, keys = []) => {
            for (const key of keys) {
                const val = obj?.[key];
                if (val !== undefined && val !== null && String(val).trim() !== '') return val;
            }
            return '';
        };

        // 신규등록용 양식은 항목명이 있는 값만 매핑한다. 품명 문자열에서 단위/규격을 추론하지 않는다.
        window.getMerchUnitByHeaderOnly = (source = {}) => {
            return window.getFirstNonBlankValue(source, ['단위', '포장단위', '판매단위', '매입단위', 'UNIT', 'unit']);
        };

        // ERP 원본 정책: 엑셀 '과세' 값이 1이면 비과세, 0이면 과세로 표시한다.
        window.normalizeMerchTaxFlag = (val, headerName = '') => {
            if (val === undefined || val === null || String(val).trim() === '') return '';
            const raw = String(val).trim();
            const header = String(headerName || '').replace(/\s/g, '');
            if (header === '과세' || header === '부가세여부') {
                if (raw === '1') return '비과세';
                if (raw === '0') return '과세';
            }
            if (raw === '1') return '비과세';
            if (raw === '0') return '과세';
            if (raw.includes('비과세') || raw.includes('면세')) return '비과세';
            if (raw.includes('과세')) return '과세';
            return raw;
        };

        window.getRegistrationSource = (row = {}, preferredRole = '') => {
            const sources = row.sources || {};
            const rolePriority = [preferredRole, 'inventory', 'purchase', 'estimate', 'sales'].filter(Boolean);
            for (const role of rolePriority) {
                if (sources[role] && Object.keys(sources[role]).length > 0) return sources[role];
            }
            return row.finalData || {};
        };

        window.buildMerchRegistrationDraft = (row = {}, preferredRole = '') => {
            const source = window.getRegistrationSource(row, preferredRole);
            const finalData = row.finalData || {};
            const code = window.getFirstNonBlankValue(finalData, ['품목코드']) || window.getFirstNonBlankValue(source, ['품목코드', '상품코드', '코드', '바코드']) || row.코드 || '';
            const name = window.getFirstNonBlankValue(finalData, ['품목명']) || window.getFirstNonBlankValue(source, ['품목명', '상품명', '품명']) || '';
            const spec = window.getFirstNonBlankValue(finalData, ['규격']) || window.getFirstNonBlankValue(source, ['규격', '규격명', '단량', '사이즈']) || '';
            const unit = window.getFirstNonBlankValue(finalData, ['단위']) || window.getMerchUnitByHeaderOnly(source) || '';
            const inPrice = window.getFirstNonBlankValue(finalData, ['입고가']) || window.getFirstNonBlankValue(source, ['입고가', '구매가', '구매단가', '매입가', '매입단가', '단가', '원가', '최신단가', '재고단가', '최종(창고)']);
            const vendor = window.getFirstNonBlankValue(finalData, ['구매처']) || window.getFirstNonBlankValue(source, ['구매처', '거래처', '거래처명', '거래']);

// 정책:
// 1) 카탈로그 미선택 = 전체 마스터가 허용 범위다.
// 2) 카탈로그 선택 = 마스터의 견적서/카테고리 태그에 선택값이 있는 상품만 허용 범위다.
// 3) 카탈로그는 sources.catalog나 별도 업무모드가 아니라 마스터 범위 필터다.
// 4) 견적·구매·재고·정보는 동일 범위를 사용하되, 견적의 추가상품은 비교 예외로 유지한다.

window.getMerchMasterWorkCatalogNames = (masterItem = {}) => {
    const raw = masterItem?.['견적서'] ?? masterItem?.['카테고리'] ?? '';
    return [...new Set(String(raw || '').split(',').map(v => v.trim()).filter(Boolean))];
};
window.getMerchSelectedWorkCatalogNames = (activeTags = []) => {
    const names = (Array.isArray(activeTags) ? activeTags : [])
        .filter(tag => String(tag?.type || '') === 'category')
        .map(tag => String(tag?.name || '').trim())
        .filter(Boolean);
    // 카탈로그 작업범위는 단일선택이다. 과거 상태가 여러 개면 마지막 선택값만 사용한다.
    return names.length > 0 ? [names[names.length - 1]] : [];
};
window.buildMerchWorkScope = (masterProducts = {}, activeTags = []) => {
    const catalogNames = window.getMerchSelectedWorkCatalogNames(activeTags);
    const catalogSet = new Set(catalogNames);
    const codeSet = new Set();
    const allCodes = new Set();
    Object.values(masterProducts || {}).forEach(masterItem => {
        const code = window.normalizeProductCodeText
            ? window.normalizeProductCodeText(masterItem?.코드 || masterItem?.['품목코드'])
            : String(masterItem?.코드 || masterItem?.['품목코드'] || '').replace(/\s/g, '');
        if (!code) return;
        allCodes.add(code);
        if (catalogNames.length === 0) {
            codeSet.add(code);
            return;
        }
        const itemCatalogs = window.getMerchMasterWorkCatalogNames(masterItem);
        if (itemCatalogs.some(name => catalogSet.has(name))) codeSet.add(code);
    });
    return {
        mode: catalogNames.length > 0 ? 'catalog' : 'all',
        catalogNames,
        catalogName: catalogNames[0] || '',
        codeSet,
        allCodes,
        masterCount: allCodes.size,
        scopeCount: codeSet.size
    };
};

window.rebuildMerchEstimateComparisonForScope = (managedItems = {}, masterProducts = {}, activeTags = [], marginRules = []) => {
    const scope = window.buildMerchWorkScope(masterProducts, activeTags);
    const safeRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(marginRules) : (Array.isArray(marginRules) ? marginRules : []);
    const next = {};
    const estimateKeyByCode = new Map();
    const anyKeyByCode = new Map();
    const hasSourceData = (sources = {}, key = '') => !!(sources?.[key] && Object.keys(sources[key]).length > 0);

    Object.entries(managedItems || {}).forEach(([key, rawItem]) => {
        if (!rawItem) return;
        const item = { ...rawItem, sources: { ...(rawItem.sources || {}) }, finalData: { ...(rawItem.finalData || {}) }, _tags: new Set(rawItem._tags || []) };
        const code = window.normalizeProductCodeText
            ? window.normalizeProductCodeText(item.코드 || item['품목코드'])
            : String(item.코드 || item['품목코드'] || '').replace(/\s/g, '');
        const hasEstimate = hasSourceData(item.sources, 'estimate');
        const otherRole = ['purchase', 'sales', 'inventory', 'info', 'parser', 'catalog'].find(roleKey => hasSourceData(item.sources, roleKey)) || '';
        const oldStatus = window.getMerchEstimateCompareStatus?.(item) || item._estimateCompareStatus || item.finalData?._estimateCompareStatus || '';
        // 이전 카탈로그에서 비교용으로만 생성된 누락행은 먼저 제거하고 새 범위에서 다시 만든다.
        if (oldStatus === 'missing' && !hasEstimate && !otherRole) return;
        delete item._estimateCompareStatus;
        delete item._estimateCompareCatalogs;
        delete item._estimateCompareGeneratedAt;
        delete item._workScopeCatalogs;
        delete item.finalData._estimateCompareStatus;
        delete item.finalData._estimateCompareCatalogs;
        delete item.finalData._estimateCompareGeneratedAt;
        delete item.finalData._estimateCatalogAddRequested;
        next[key] = item;
        if (code && !anyKeyByCode.has(code)) anyKeyByCode.set(code, key);
        if (code && hasEstimate) estimateKeyByCode.set(code, key);
    });

    // 카탈로그 미선택은 전체 마스터 허용범위지만, 견적 누락비교는 생성하지 않는다.
    if (scope.mode !== 'catalog' || estimateKeyByCode.size === 0) {
        return { items: next, summary: null, scope };
    }

    const generatedAt = new Date().toISOString();
    const comparisonCodes = new Set([...scope.codeSet, ...estimateKeyByCode.keys()]);
    let maintain = 0;
    let add = 0;
    let missing = 0;

    comparisonCodes.forEach(code => {
        const inScope = scope.codeSet.has(code);
        const inEstimate = estimateKeyByCode.has(code);
        const status = inScope && inEstimate ? 'maintain' : (inEstimate ? 'add' : 'missing');
        if (status === 'maintain') maintain++;
        else if (status === 'add') add++;
        else missing++;

        let key = estimateKeyByCode.get(code) || anyKeyByCode.get(code) || code;
        let item = next[key];
        if (!item) {
            const emptySources = { _activeRole: '' };
            item = {
                코드: code,
                _managedKey: key,
                _lastUploadRole: 'estimateCompareMissing',
                sources: emptySources,
                finalData: window.computeFinalData(masterProducts[code] || {}, emptySources, safeRules, false),
                _tags: new Set()
            };
        } else {
            item = { ...item, sources: { ...(item.sources || {}) }, finalData: { ...(item.finalData || {}) }, _tags: new Set(item._tags || []) };
        }
        if (status === 'missing') {
            delete item.sources.estimate;
            item.sources._activeRole = ['purchase', 'sales', 'inventory', 'info', 'parser', 'catalog'].find(roleKey => hasSourceData(item.sources, roleKey)) || '';
            item.finalData = window.computeFinalData(masterProducts[code] || {}, item.sources, safeRules, false);
            item._lastUploadRole = item._lastUploadRole || 'estimateCompareMissing';
        } else {
            item.sources._activeRole = 'estimate';
        }
        item.finalData = { ...(item.finalData || {}), _estimateCompareStatus: status, _estimateCompareCatalogs: [...scope.catalogNames], _estimateCompareGeneratedAt: generatedAt, _estimateCatalogAddRequested: status === 'add' };
        item._estimateCompareStatus = status;
        item._estimateCompareCatalogs = [...scope.catalogNames];
        item._estimateCompareGeneratedAt = generatedAt;
        item._workScopeCatalogs = [...scope.catalogNames];
        next[key] = item;
        anyKeyByCode.set(code, key);
    });

    return { items: next, summary: { catalogs: [...scope.catalogNames], maintain, add, missing, total: comparisonCodes.size }, scope };
};

window.isMerchRowInWorkScope = (row = {}, masterProducts = {}, activeTags = [], options = {}) => {

                        const parserListStr = window.getMerchParserListValue ? window.getMerchParserListValue(mItem) : String(mItem['카탈로그'] || '').trim();
                        if (parserListStr) {
                            if (!newManaged[mItem.코드]) {
                                const mockSource = {};
                                newManaged[mItem.코드] = {
                                    코드: mItem.코드,
                                    sources: { catalog: { ...(mItem || {}), _catalogListOnly: true }, _activeRole: 'catalog' },
                                    finalData: window.computeFinalData(mItem, { catalog: { ...(mItem || {}), _catalogListOnly: true }, _activeRole: 'catalog' }, safeMarginRules, false),
                                    _tags: new Set([`catalog:전체리스트`])
                                };
                                addedCount++;
                            }
                            else {
                                newManaged[mItem.코드] = {
                                    ...newManaged[mItem.코드],
                                    _tags: new Set([...(newManaged[mItem.코드]._tags || []), `catalog:전체리스트`])
                                };
                            }
                        }
                    });
                    data.setManagedItems(newManaged);
                    ui.setSelectedRows(new Set());
                    const appliedView = window.applyMerchTableView ? window.applyMerchTableView(config, 'catalog', null, { manual: false }) : null;
                    const filterApplied = window.applyMerchFilterPresetToState && appliedView ? window.applyMerchFilterPresetToState(appliedView, ui) : false;
                    ui.showToast(`✅ 전체리스트 병합 완료! (신규 ${addedCount}건 추가됨)${appliedView ? ` / 양식선택: ${appliedView.name}${filterApplied ? '·필터적용' : ''}` : ''}`);
                }
                catch (e) {
                    ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다.");
                }
                finally {
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }
            }, 100);
            return;
        }
        ui.setIsProcessing(true);
        ui.setProcessMsg(`[${filterName}] ${typeLabel} 데이터 병합 중...`);
        setTimeout(() => {
            try {
                ui.setActiveTags(prev => [...prev, { type, name: filterName }]);
                let newManaged = { ...data.managedItems, ...excludedToRestore };
                let addedCount = 0;
                const safeMarginRules = window.sanitizeMerchMarginRules ? window.sanitizeMerchMarginRules(config.marginRules) : (Array.isArray(config.marginRules) ? config.marginRules : []);
                Object.values(data.masterProducts).forEach(mItem => {
                    let isMatch = false;
                    // source 원복: catalog는 파서리스트 목록, category는 카탈로그/견적서 목록.
                    const parserListStr = window.getMerchParserListValue ? window.getMerchParserListValue(mItem) : String(mItem['카탈로그'] || '').trim();
                    const catStr = type === 'category' ? (mItem['견적서'] || mItem['카테고리'] || '') : parserListStr;
                    if (String(catStr).split(',').map(c => c.trim()).includes(filterName)) {
                        isMatch = true;
                    }
                    if (isMatch) {
                        if (!newManaged[mItem.코드]) {
                            const mockSource = {};
                            const finalData = window.computeFinalData(mItem, { catalog: { ...(mItem || {}), _catalogListOnly: true }, _activeRole: 'catalog' }, safeMarginRules);
                            newManaged[mItem.코드] = {
                                코드: mItem.코드,
                                sources: { catalog: { ...(mItem || {}), _catalogListOnly: true }, _activeRole: 'catalog' },
                                finalData: finalData,
                                _tags: new Set([`${type}:${filterName}`])
                            };
                            addedCount++;
                        }
                        else {
                            newManaged[mItem.코드] = {
                                ...newManaged[mItem.코드],
                                _tags: new Set([...(newManaged[mItem.코드]._tags || []), `${type}:${filterName}`])
                            };
                        }
                    }
                });
                data.setManagedItems(newManaged);
                ui.setSelectedRows(new Set());
                const targetViewKey = type === 'catalog' ? 'catalog' : 'estimate';
                const appliedView = window.applyMerchTableView ? window.applyMerchTableView(config, targetViewKey, null, { manual: false }) : null;
                const filterApplied = window.applyMerchFilterPresetToState && appliedView ? window.applyMerchFilterPresetToState(appliedView, ui) : false;
                ui.showToast(`✅ [${filterName}] 병합 완료! (신규 ${addedCount}건 추가됨)${appliedView ? ` / 양식선택: ${appliedView.name}${filterApplied ? '·필터적용' : ''}` : ''}`);
            }
            catch (error) {
                ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다.");
            }
            finally {
                ui.setIsProcessing(false);
                ui.setProcessMsg('');
            }
        }, 100);
    }, [data.masterProducts, data.managedItems, data.setManagedItems, config.marginRules, config.tableViewPresets, ui]);
    const handleRemoveFilter = useCallback((type, name) => {
        if (type === 'category') {
            ui.setActiveTags(prev => (prev || []).filter(t => String(t?.type || '') !== 'category'));
            data.setManagedItems(prev => {
                const rebuilt = window.rebuildMerchEstimateComparisonForScope
                    ? window.rebuildMerchEstimateComparisonForScope(prev, data.masterProducts, [], config.marginRules)
                    : { items: prev };
                return rebuilt.items;
            });
            ui.setSelectedRows(new Set());
            ui.showToast(`✅ 카탈로그 작업범위 해제 / 전체 마스터 기준`);
            return;
        }
        const tagKey = `${type}:${name}`;
        ui.setActiveTags(prev => prev.filter(t => !(t.type === type && t.name === name)));
        data.setManagedItems(prev => {
            let newManaged = { ...prev };
            let removedCount = 0;
            Object.keys(newManaged).forEach(key => {
                const item = newManaged[key];
                if (item._tags && item._tags.has(tagKey)) {
                    const newTags = new Set(item._tags);
                    newTags.delete(tagKey);
                    if (newTags.size === 0) {
                        delete newManaged[key];
                        removedCount++;
                    }
                    else {
                        newManaged[key] = { ...item, _tags: newTags };
                    }
                }
            });
            ui.showToast(`✅ [${name}] 제거 완료. (${removedCount}건 작업 화면에서 제외됨)`);
            return newManaged;
        });
        ui.setSelectedRows(new Set());
    }, [data.setManagedItems, data.masterProducts, config.marginRules, ui]);

    // ============================================================
    // [M-EXCLUDE-SESSION-01] 이번 작업 제외
    // 제외는 현재 불러온 파일/작업 세션에만 유효하며 영구 저장하지 않는다.
    // ============================================================
    const getWorkRowCode = useCallback((row = {}) => window.normalizeProductCodeText((row && (row.코드 || row['품목코드'])) || ''), []);
    const getRowsForWorkAction = useCallback(() => {
        const list = Array.isArray(fullDisplayRows) ? fullDisplayRows : [];
        if (ui.selectedRows && ui.selectedRows.size > 0) {
            return list.filter(row => ui.selectedRows.has(window.getManagedRowKey(row)));
        }
        return list;
    }, [fullDisplayRows, ui.selectedRows]);
    const cloneManagedRowForSession = useCallback((row = {}) => {
        const safeClone = (obj) => {
            try { return JSON.parse(JSON.stringify(obj || {})); }
            catch (e) { return { ...(obj || {}) }; }
        };
        const managedKey = window.getManagedRowKey(row);
        return {
            ...row,
            코드: row.코드,
            _managedKey: row._managedKey || managedKey,
            sources: safeClone(row.sources),
            finalData: safeClone(row.finalData),
            _tags: new Set(row._tags ? Array.from(row._tags) : [])
        };
    }, []);
    const handleExcludeSelectedFromUpdate = useCallback(() => {
        const rows = getRowsForWorkAction();
        if (rows.length === 0) return ui.showToast('⚠️ 제외할 상품이 없습니다.');
        const scopeText = ui.selectedRows.size > 0 ? `선택 ${rows.length}건` : `현재 필터 ${rows.length}건`;
        if (!window.confirm(`${scopeText}을 이번 작업에서만 제외하시겠습니까?\n\n- 현재 화면/F8/F9 대상에서 제외\n- 새 파일 불러오기 또는 화면 초기화 시 자동 해제\n- 마스터와 정지관리에는 영향 없음`)) return;
        const nextExcluded = { ...(ui.sessionExcludedItems || {}) };
        const keys = new Set();
        rows.forEach(row => {
            const key = window.getManagedRowKey(row);
            keys.add(key);
            nextExcluded[key] = cloneManagedRowForSession(row);
        });
        ui.setSessionExcludedItems(nextExcluded);
        data.setManagedItems(prev => {
            const next = { ...prev };
            keys.forEach(key => { delete next[key]; });
            return next;
        });
        ui.setSelectedRows(new Set());
        ui.showToast(`✅ 이번 작업에서 ${rows.length}건 제외`);
    }, [getRowsForWorkAction, cloneManagedRowForSession, data.setManagedItems, ui]);
    const handleRestoreExcludedItems = useCallback((managedKeys = []) => {
        const targetKeys = Array.isArray(managedKeys) && managedKeys.length > 0
            ? managedKeys
            : Object.keys(ui.sessionExcludedItems || {});
        if (targetKeys.length === 0) return ui.showToast('⚠️ 복구할 제외상품이 없습니다.');
        const restoring = targetKeys.map(key => [key, (ui.sessionExcludedItems || {})[key]]).filter(([, row]) => !!row);
        data.setManagedItems(prev => {
            const next = { ...prev };
            restoring.forEach(([key, row]) => { next[key] = cloneManagedRowForSession(row); });
            return next;
        });
        ui.setSessionExcludedItems(prev => {
            const next = { ...(prev || {}) };
            restoring.forEach(([key]) => { delete next[key]; });
            return next;
        });
        ui.setSelectedRows(new Set());
        ui.showToast(`↩️ 제외상품 ${restoring.length}건 복구`);
    }, [data.setManagedItems, cloneManagedRowForSession, ui]);

    // ============================================================
    // [M-STOP-MANAGER-01] 지속 정지관리
    // 정지는 상품코드별 1건만 유지하고 정지/재개 변경대기만 F8에 추가한다.
    // ============================================================
    const handleStopSales = useCallback(async () => {
        const rows = getRowsForWorkAction();
        if (rows.length === 0) return ui.showToast('⚠️ 정지처리할 상품이 없습니다.');
        const scopeText = ui.selectedRows.size > 0 ? `선택 ${rows.length}건` : `현재 필터 ${rows.length}건`;
        if (!window.confirm(`${scopeText}을 정지예정으로 등록하시겠습니까?\n\n현재 테이블의 판매여부를 0으로 표시하며, 다음 F8에서 마스터에 반영됩니다.\n정지상품은 정지관리에서 개별·선택·전체 관리할 수 있습니다.`)) return;
        const now = new Date().toISOString();
        const targetKeys = new Set(rows.map(row => window.getManagedRowKey(row)));
        const targetCodes = new Set(rows.map(row => getWorkRowCode(row)).filter(Boolean));
        data.setManagedItems(prev => {
            const next = { ...prev };
            targetKeys.forEach(key => {
                const current = next[key];
                if (!current) return;
                next[key] = {
                    ...current,
                    finalData: {
                        ...(current.finalData || {}),
                        '판매여부': 0,
                        _salesStopRequested: true,
                        _salesResumeRequested: false,
                        _stopManagementStatus: '정지예정'
                    }
                };
            });
            return next;
        });
        ui.setStoppedProducts(prev => {
            const next = { ...(prev || {}) };
            targetCodes.forEach(code => {
                const before = next[code] || {};
                next[code] = {
                    ...before,
                    productCode: code,
                    stoppedAt: before.stoppedAt || now,
                    updatedAt: now,
                    reason: before.reason || '관리자 정지',
                    memo: before.memo || '',
                    status: 'pendingStop',
                    pendingAction: 'stop'
                };
            });
            return next;
        });
        ui.setSelectedRows(new Set());
        ui.showToast(`⏸️ ${targetCodes.size}건 정지예정 등록 / F8 반영대기`);
    }, [getRowsForWorkAction, getWorkRowCode, data.setManagedItems, ui]);
    const handleUpdateStoppedProduct = useCallback((code, patch = {}) => {
        const cleanCode = window.normalizeProductCodeText(code || '');
        if (!cleanCode) return;
        ui.setStoppedProducts(prev => {
            const before = (prev || {})[cleanCode];
            if (!before) return prev;
            return {
                ...(prev || {}),
                [cleanCode]: { ...before, ...patch, productCode: cleanCode, updatedAt: new Date().toISOString() }
            };
        });
    }, [ui.setStoppedProducts]);
    const handleBulkStoppedReason = useCallback((codes = [], reason = '') => {
        const cleanCodes = Array.from(new Set((codes || []).map(v => window.normalizeProductCodeText(v || '')).filter(Boolean)));
        if (cleanCodes.length === 0 || !String(reason || '').trim()) return ui.showToast('⚠️ 대상과 정지사유를 확인하세요.');
        const now = new Date().toISOString();
        ui.setStoppedProducts(prev => {
            const next = { ...(prev || {}) };
            cleanCodes.forEach(code => {
                if (next[code]) next[code] = { ...next[code], reason: String(reason).trim(), updatedAt: now };
            });
            return next;
        });
        ui.showToast(`✅ 정지사유 ${cleanCodes.length}건 일괄 변경`);
    }, [ui]);
    const handleBulkStoppedMemo = useCallback((codes = [], memo = '') => {
        const cleanCodes = Array.from(new Set((codes || []).map(v => window.normalizeProductCodeText(v || '')).filter(Boolean)));
        if (cleanCodes.length === 0) return ui.showToast('⚠️ 메모를 적용할 정지상품을 선택하세요.');
        const now = new Date().toISOString();
        ui.setStoppedProducts(prev => {
            const next = { ...(prev || {}) };
            cleanCodes.forEach(code => {
                if (next[code]) next[code] = { ...next[code], memo: String(memo || ''), updatedAt: now };
            });
            return next;
        });
        ui.showToast(`✅ 정지상품 메모 ${cleanCodes.length}건 일괄 변경`);
    }, [ui]);
    const handleResumeStoppedProducts = useCallback((codes = []) => {
        const cleanCodes = Array.from(new Set((codes || []).map(v => window.normalizeProductCodeText(v || '')).filter(Boolean))).filter(code => !!(ui.stoppedProducts || {})[code]);
        if (cleanCodes.length === 0) return ui.showToast('⚠️ 판매재개할 정지상품이 없습니다.');
        if (!window.confirm(`정지상품 ${cleanCodes.length}건을 판매재개 예정으로 변경하시겠습니까?\n다음 F8에서 판매여부 1로 반영되며, 성공 후 정지관리에서 제거됩니다.`)) return;
        const codeSet = new Set(cleanCodes);
        const now = new Date().toISOString();
        ui.setStoppedProducts(prev => {
            const next = { ...(prev || {}) };
            cleanCodes.forEach(code => {
                if (next[code]) next[code] = { ...next[code], pendingAction: 'resume', status: 'pendingResume', updatedAt: now };
            });
            return next;
        });
        data.setManagedItems(prev => {
            const next = { ...prev };
            const matched = new Set();
            Object.keys(next).forEach(key => {
                const row = next[key];
                const code = getWorkRowCode(row);
                if (!codeSet.has(code)) return;
                matched.add(code);
                next[key] = {
                    ...row,
                    finalData: {
                        ...(row.finalData || {}),
                        '판매여부': 1,
                        _salesStopRequested: false,
                        _salesResumeRequested: true,
                        _stopManagementStatus: '재개예정'
                    }
                };
            });
            cleanCodes.forEach(code => {
                if (matched.has(code)) return;
                next[`STOP_MANAGER__${code}`] = {
                    코드: code,
                    _managedKey: `STOP_MANAGER__${code}`,
                    _lastUploadRole: 'stopManager',
                    sources: { _activeRole: 'stopManager' },
                    finalData: { '판매여부': 1, _salesStopRequested: false, _salesResumeRequested: true, _stopManagementStatus: '재개예정' },
                    _tags: new Set(['정지관리:재개예정'])
                };
            });
            return next;
        });
        ui.showToast(`▶️ ${cleanCodes.length}건 판매재개 예정 / F8 반영대기`);
    }, [data.setManagedItems, getWorkRowCode, ui]);

    // ============================================================
    // [M-INFO-CHANGE-01] Smart Parser 정보변경 대기 관리
    // 품목명·규격·단위 변경은 ERP/쇼핑몰 업로드 완료 전까지 상품코드별 1건으로 유지한다.
    // ============================================================
    const getInfoChangeEntries = useCallback((codes = []) => {
        const requested = new Set((codes || []).map(v => window.normalizeProductCodeText(v || '')).filter(Boolean));
        return Object.values(ui.infoChangeQueue || {}).filter(item => {
            const code = window.normalizeProductCodeText(item?.productCode || '');
            return code && (requested.size === 0 || requested.has(code));
        });
    }, [ui.infoChangeQueue]);
    const appendInfoChangeSheets = useCallback((wb, entries = []) => {
        const rows = (entries || []).filter(Boolean);
        if (!wb || rows.length === 0 || !window.XLSX) return 0;
        const erp = [['품목코드', '품목명', '규격', '단위', '변경일시', '변경출처']];
        const shop = [['상품코드', '상품명', '규격', '단위', '변경일시', '변경출처']];
        const history = [['상품코드', '변경항목', '기존값', '변경값', 'ERP상태', '쇼핑몰상태', '카탈로그', '변경일시']];
        rows.forEach(item => {
            const code = window.normalizeProductCodeText(item.productCode || '');
            const master = data.masterProducts[code] || {};
            const fields = item.fields || {};
            const currentName = fields.품목명?.newValue ?? master.품목명 ?? '';
            const currentSpec = fields.규격?.newValue ?? master.규격 ?? '';
            const currentUnit = fields.단위?.newValue ?? master.단위 ?? '';
            if (item.erpStatus !== 'completed') erp.push([code, currentName, currentSpec, currentUnit, item.updatedAt || item.createdAt || '', item.sourceLabel || item.source || 'SmartParser']);
            if (item.shopStatus !== 'completed') shop.push([code, currentName, currentSpec, currentUnit, item.updatedAt || item.createdAt || '', item.sourceLabel || item.source || 'SmartParser']);
            Object.entries(fields).forEach(([field, change]) => history.push([code, field, change?.oldValue ?? '', change?.newValue ?? '', item.erpStatus || 'pending', item.shopStatus || 'pending', item.catalog || '', change?.changedAt || item.updatedAt || '']));
        });
        if (erp.length > 1) window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erp), 'ERP상품정보변경');
        if (shop.length > 1) window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shop), '쇼핑몰상품정보변경');
        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(history), '정보변경내역');
        return rows.length;
    }, [data.masterProducts]);
    const handleExportInfoChanges = useCallback((codes = []) => {
        if (!window.XLSX) return ui.showToast('⚠️ 엑셀 라이브러리 로드 대기 중입니다.');
        const entries = getInfoChangeEntries(codes);
        if (entries.length === 0) return ui.showToast('⚠️ 출력할 정보변경 건이 없습니다.');
        const wb = window.XLSX.utils.book_new();
        appendInfoChangeSheets(wb, entries);
        window.XLSX.writeFile(wb, `ERP_쇼핑몰_상품정보변경_${new Date().toISOString().slice(0, 10)}.xlsx`);
        const now = new Date().toISOString();
        const codeSet = new Set(entries.map(item => window.normalizeProductCodeText(item.productCode || '')));
        ui.setInfoChangeQueue(prev => {
            const next = { ...(prev || {}) };
            codeSet.forEach(code => { if (next[code]) next[code] = { ...next[code], lastExportedAt: now, updatedAt: next[code].updatedAt || now }; });
            return next;
        });
        ui.showToast(`✅ 정보변경 ${entries.length}건 ERP·쇼핑몰 엑셀 생성`);
    }, [appendInfoChangeSheets, getInfoChangeEntries, ui]);
    const handleCompleteInfoChanges = useCallback((codes = [], targetSystem = '') => {
        const cleanCodes = Array.from(new Set((codes || []).map(v => window.normalizeProductCodeText(v || '')).filter(Boolean)));
        if (cleanCodes.length === 0 || !['erp', 'shop'].includes(targetSystem)) return ui.showToast('⚠️ 완료 처리할 정보변경 건을 선택하세요.');
        const label = targetSystem === 'erp' ? 'ERP' : '쇼핑몰';
        if (!window.confirm(`${label} 업로드 완료 ${cleanCodes.length}건을 기록하시겠습니까?\nERP와 쇼핑몰이 모두 완료된 상품은 정보변경 목록에서 자동 제거됩니다.`)) return;
        const now = new Date().toISOString();
        ui.setInfoChangeQueue(prev => {
            const next = { ...(prev || {}) };
            cleanCodes.forEach(code => {
                if (!next[code]) return;
                const item = { ...next[code] };
                if (targetSystem === 'erp') { item.erpStatus = 'completed'; item.erpCompletedAt = now; }
                else { item.shopStatus = 'completed'; item.shopCompletedAt = now; }
                if (item.erpStatus === 'completed' && item.shopStatus === 'completed') delete next[code];
                else next[code] = item;
            });
            return next;
        });
        ui.showToast(`✅ ${label} 업로드 완료 ${cleanCodes.length}건 기록`);
    }, [ui]);
    // ============================================================
    // [M-ACTION-03] 선택상품 창고 일괄 지정

                    return;

                const currentCategories = newMaster[code]['견적서'] || newMaster[code]['카테고리'] || '';

    const handleSaveAsCatalog = useCallback((catalogName) => {

    const handleDeleteTag = useCallback((type, tagName) => {
        if (!tagName)
            return;
        const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.\n(※ 마스터 상품 자체가 삭제되지는 않으니 안심하세요!)`;
        if (!window.confirm(confirmMsg))
            return;
        let newMaster = { ...data.masterProducts };
        let count = 0;
        const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';
        for (let code in newMaster) {
            if (newMaster[code][fieldKey]) {
                const tags = String(newMaster[code][fieldKey]).split(',').map(s => s.trim()).filter(Boolean);
                if (tags.includes(tagName)) {
                    newMaster[code] = { ...newMaster[code] };
                    newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                    count++;

                }];

            handleRemoveFilter(type, tagName);
