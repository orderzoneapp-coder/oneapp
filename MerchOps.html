<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v1.5 클라우드 분할전송 최적화 + 검수뷰]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        // 🚨 앱 크래시 방지를 위한 필수 코어 엔진 완전 내장 (백지화 현상 원천 차단)
        window.MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록" ];
        window.NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고" ];
        
        window.generateUUID = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); });
        window.parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        window.initIDB = () => new Promise((resolve, reject) => { const request = indexedDB.open('MerchOpsDB', 2); request.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains('store')) db.createObjectStore('store'); if (!db.objectStoreNames.contains('master_products')) db.createObjectStore('master_products', { keyPath: '코드' }); }; request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); });
        window.bulkPutIDB = async (storeName, items) => { const db = await window.initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction(storeName, 'readwrite'); const store = tx.objectStore(storeName); items.forEach(item => store.put(item)); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        window.getAllIDB = async (storeName) => { const db = await window.initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction(storeName, 'readonly'); const req = tx.objectStore(storeName).getAll(); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        window.getIDB = async (key) => { const db = await window.initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        window.calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const ROUND_UNIT = 100;
            const outsrc = (!currentFinalData?.['외주비'] && currentFinalData?.['외주비'] !== 0) ? window.parseNum(mItem?.['외주비']) : window.parseNum(currentFinalData?.['외주비']);
            const labor = (!currentFinalData?.['노무비'] && currentFinalData?.['노무비'] !== 0) ? window.parseNum(mItem?.['노무비']) : window.parseNum(currentFinalData?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => { if (ruleWh === '*') return true; const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh))); };
            const matchUnit = (ruleUnit, targetUnit) => { if (ruleUnit === '*') return true; const targets = String(ruleUnit).toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean); return targets.some(s => targetUnit === s || targetUnit.includes(s)); };

            let bestRule = null; let bestScore = -1;
            const safeMarginRules = Array.isArray(marginRules) ? marginRules : [];
            safeMarginRules.forEach(r => { if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) { let score = 0; if (r.whCode !== '*') score += 2; if (r.unit !== '*') score += 1; if (score > bestScore) { bestScore = score; bestRule = r; } } });

            const appliedRule = bestRule || { rate: 10, type: 'divide' }; let calcOutPrice = 0;
            if (baseInPrice > 0) { if (appliedRule.type === 'divide') calcOutPrice = totalCost / (1 - (appliedRule.rate / 100)); else calcOutPrice = totalCost * (1 + (appliedRule.rate / 100)); calcOutPrice = Math.round(calcOutPrice / ROUND_UNIT) * ROUND_UNIT; }

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice }; newFinalData['시중가'] = calcOutPrice;
            const providedOutPrice = window.parseNum(currentFinalData?.['출고가']); const mIn = window.parseNum(mItem?.['입고가']); const mOut = window.parseNum(mItem?.['출고가']);

            if (baseInPrice === 0) newFinalData['출고가'] = 0; else if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice; else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut; else newFinalData['출고가'] = calcOutPrice;
            return newFinalData;
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const safeJSONParse = (key, defaultVal) => {
            try {
                const s = localStorage.getItem(key);
                return (s && s !== 'undefined') ? JSON.parse(s) : defaultVal;
            } catch (e) {
                return defaultVal;
            }
        };

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류',
                '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const getCellWidthClass = (h) => {
            if (window.NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            
            Object.keys(mappingConfig).forEach(field => {
                const keywords = String(mappingConfig[field]).split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                
                let matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.includes(cleanH);
                });

                if (!matchedKey) {
                    matchedKey = actualHeaders.find(h => {
                        if(!h) return false;
                        const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                        return keywords.some(kw => {
                            if (kw === '코드' && (cleanH.includes('1') || cleanH.includes('2') || cleanH.includes('3') || cleanH.includes('종'))) return false;
                            return cleanH.includes(kw);
                        });
                    });
                }
                
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                
                const processData = (data, type) => {
                    try {
                        const wb = window.XLSX.read(data, { type: type, cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return [];

                        let headerRowIdx = -1;
                        const maxSearch = Math.min(25, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowArr = jsonAll[i] || [];
                            const rowStr = rowArr.join('').replace(/\s/g, '');
                            
                            if (
                                rowStr.includes('품목코드') || rowStr.includes('상품코드') || rowStr.includes('바코드') ||
                                (rowStr.includes('코드') && (rowStr.includes('품명') || rowStr.includes('상품명') || rowStr.includes('규격'))) ||
                                (rowStr.includes('품명') && (rowStr.includes('규격') || rowStr.includes('단가')))
                            ) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        
                        if (headerRowIdx === -1) return null; 

                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) {
                                    obj[h] = row[idx];
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false;
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        return parsedData;
                    } catch(err) {
                        return null;
                    }
                };

                const isCSV = file.name.toLowerCase().endsWith('.csv');
                
                if (isCSV) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        if (text.includes('')) {
                            const utf8Reader = new FileReader();
                            utf8Reader.onload = (e2) => {
                                const result = processData(e2.target.result, 'string');
                                resolve(result !== null ? result : []);
                            };
                            utf8Reader.readAsText(file, 'utf-8');
                        } else {
                            const result = processData(text, 'string');
                            resolve(result !== null ? result : []);
                        }
                    };
                    reader.readAsText(file, 'euc-kr');
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const result = processData(data, 'array');
                        resolve(result !== null ? result : []);
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };

        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || '');
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => safeJSONParse('merchVisMaster_v870', getInitialVisibleMasterCols()));
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => safeJSONParse('merchVisUpload_v870', getInitialVisibleUploadCols()));
            const [mappings, setMappings] = useState(() => safeJSONParse('merchMappings_v870', getInitialMappings()));
            const [masterLinks, setMasterLinks] = useState(() => safeJSONParse('merchMasterLinks_v870', getInitialMasterLinks()));
            const [marginRules, setMarginRules] = useState(() => safeJSONParse('merchMarginRules_v878', [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]));

            useEffect(() => {
                const handleConfigSync = (e) => {
                    if (e.key === 'config_sync_trigger') {
                        const fVisMaster = safeJSONParse('merchVisMaster_v870', null);
                        const fVisUpload = safeJSONParse('merchVisUpload_v870', null);
                        const fMappings = safeJSONParse('merchMappings_v870', null);
                        const fMasterLinks = safeJSONParse('merchMasterLinks_v870', null);
                        const fMarginRules = safeJSONParse('merchMarginRules_v878', null);
                        
                        if(fVisMaster) setVisibleMasterCols(fVisMaster);
                        if(fVisUpload) setVisibleUploadCols(fVisUpload);
                        if(fMappings) setMappings(fMappings);
                        if(fMasterLinks) setMasterLinks(fMasterLinks);
                        if(fMarginRules) setMarginRules(fMarginRules);
                    }
                };
                window.addEventListener('storage', handleConfigSync);
                return () => window.removeEventListener('storage', handleConfigSync);
            }, []);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            useEffect(() => {
                window.getAllIDB('master_products').then(items => {
                    if (items && items.length > 0) {
                        const dict = {};
                        items.forEach(i => dict[i.코드] = i);
                        setMasterProducts(dict);
                    } else {
                        window.getIDB('merchMaster_v870').then(data => {
                            if (data) {
                                setMasterProducts(data);
                                const requestIdle = window.requestIdleCallback || ((cb) => setTimeout(cb, 1));
                                requestIdle(async () => {
                                    const safeData = Object.values(data).filter(item => item && item.코드);
                                    await window.bulkPutIDB('master_products', safeData);
                                });
                            }
                        }).catch(console.error);
                    }
                }).catch(console.error);
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        window.getAllIDB('master_products').then(items => {
                            if (items && items.length > 0) {
                                const dict = {};
                                items.forEach(i => dict[i.코드] = i);
                                setMasterProducts(dict);
                            }
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    const requestIdle = window.requestIdleCallback || ((cb) => setTimeout(cb, 1));
                    requestIdle(async () => {
                        const safeData = Object.values(data).filter(item => item && item.코드);
                        await window.bulkPutIDB('master_products', safeData);
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                    });
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                } 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const allLogs = [...newLogs, ...prev];
                    
                    const agriLogs = allLogs.filter(l => String(l.code).startsWith('10')).slice(0, 1000);
                    const generalLogs = allLogs.filter(l => !String(l.code).startsWith('10')).slice(0, 1000);
                    
                    const safeAgriIds = new Set(agriLogs.map(l => l.id));
                    const safeGeneralIds = new Set(generalLogs.map(l => l.id));
                    const finalLogs = allLogs.filter(l => safeAgriIds.has(l.id) || safeGeneralIds.has(l.id));

                    localStorage.setItem('merchHistory_v870', JSON.stringify(finalLogs));
                    return finalLogs;
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMasterToLocal, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [activeTags, setActiveTags] = useState([]);
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            const [priceFilter, setPriceFilter] = useState('all');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                selectedRows, setSelectedRows, globalSearch, setGlobalSearch, activeTags, setActiveTags,
                showReviewModal, setShowReviewModal, showCategoryModal, setShowCategoryModal,
                alertMsg, setAlertMsg, toastMsg, setToastMsg, isProcessing, setIsProcessing, processMsg, setProcessMsg, showToast,
                priceFilter, setPriceFilter
            };
        };

        const useMerchActions = (config, data, ui, fullDisplayRows) => {
            
            const handleCloudSync = useCallback(async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다. 우측 상단 톱니바퀴에서 URL을 세팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 백업' : '불러오기'} 시작...`);
                ui.setIsProcessing(true);
                
                try {
                    if (type === 'upload') {
                        ui.setProcessMsg('서버 초기화 중...');
                        let initRes = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'initSync' }) });
                        if ((await initRes.json()).status !== 'success') throw new Error("초기화 실패");

                        const masterItems = Object.values(data.masterProducts);
                        const chunkSize = 500;
                        for (let i = 0; i < masterItems.length; i += chunkSize) {
                            const chunk = masterItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`마스터 데이터 업로드 중... (${Math.min(i + chunkSize, masterItems.length)} / ${masterItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_master', data: chunk }) });
                        }

                        const historyItems = data.historyLogs || [];
                        for (let i = 0; i < historyItems.length; i += chunkSize) {
                            const chunk = historyItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`히스토리 업로드 중... (${Math.min(i + chunkSize, historyItems.length)} / ${historyItems.length}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_history', data: chunk }) });
                        }

                        ui.setProcessMsg('환경설정 및 AI 매핑 사전 업로드 중...');
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const configPayload = {
                            action: 'config',
                            data: {
                                dict: dict,
                                rules: config.marginRules,
                                appConfig: { mappings: config.mappings, masterLinks: config.masterLinks, visibleUploadCols: config.visibleUploadCols, visibleMasterCols: config.visibleMasterCols }
                            }
                        };
                        await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(configPayload) });

                        ui.showToast('✅ 클라우드 대용량 분할 백업(Push) 성공!');
                    } else {
                        ui.setProcessMsg('클라우드 데이터 수신 중...');
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        
                        if (result.status === 'success' && result.data) { 
                            if (result.data.master && Object.keys(result.data.master).length > 0) {
                                data.setMasterProducts(result.data.master);
                            }
                            if (result.data.dict && Object.keys(result.data.dict).length > 0) localStorage.setItem('parserDict_v870', JSON.stringify(result.data.dict));
                            if (result.data.rules && result.data.rules.length > 0) config.setMarginRules(result.data.rules);
                            
                            if (result.data.history && Array.isArray(result.data.history)) {
                                data.setHistoryLogs(result.data.history);
                                localStorage.setItem('merchHistory_v870', JSON.stringify(result.data.history));
                            }
                            
                            if (result.data.appConfig) {
                                if (result.data.appConfig.mappings) config.setMappings(result.data.appConfig.mappings);
                                if (result.data.appConfig.masterLinks) config.setMasterLinks(result.data.appConfig.masterLinks);
                                if (result.data.appConfig.visibleUploadCols) config.setVisibleUploadCols(result.data.appConfig.visibleUploadCols);
                                if (result.data.appConfig.visibleMasterCols) config.setVisibleMasterCols(result.data.appConfig.visibleMasterCols);
                            }

                            if (ui.setHasUnsavedChanges) ui.setHasUnsavedChanges(false);
                            
                            const masterCount = result.data.master ? Object.keys(result.data.master).length : 0;
                            const historyCount = result.data.history ? result.data.history.length : 0;
                            ui.showToast(`✅ 데이터 불러오기 완료! (상품: ${masterCount.toLocaleString()}건, 로그: ${historyCount.toLocaleString()}건)`);
                        } else {
                            throw new Error("Invalid Data Format");
                        }
                    }
                } catch (error) { 
                    console.error(error);
                    ui.setAlertMsg("통신 오류 발생. URL이나 시트 권한을 확인하세요.\n" + error.message); 
                } finally {
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }
            }, [config.cloudUrl, data.masterProducts, data.setMasterProducts, config.marginRules, config.setMarginRules, config.mappings, config.masterLinks, config.visibleUploadCols, config.visibleMasterCols, data.historyLogs, data.setHistoryLogs, ui]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록'];
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    data.setMasterProducts(newMaster);
                    ui.showToast(`✅ ${count}건의 상품에서 찌꺼기 데이터를 삭제했습니다. (적용 후 우측 상단 ☁️클라우드 백업을 눌러주세요)`);
                }
            }, [data.masterProducts, data.setMasterProducts, ui]);

            const handleFileUpload = useCallback(async (e, expectedType) => { 
                const files = Array.from(e.target.files); const targetInput = e.target; 
                if (files.length === 0) return; if (!window.XLSX) return ui.setAlertMsg("엑셀 파서 로드 대기중입니다.");

                ui.setIsProcessing(true); ui.setProcessMsg('엑셀 로딩 및 분석 중...');
                await new Promise(resolve => setTimeout(resolve, 50)); 

                try {
                    let newMaster = { ...data.masterProducts }; let newManaged = { ...data.managedItems }; let totalCount = 0;
                    
                    for (const file of files) {
                        let mapKey = expectedType || 'master';
                        const excelData = await parseExcelRobust(file);
                        
                        if (!excelData || excelData.length === 0) {
                            ui.showToast(`⚠️ [${file.name}] 인식할 수 있는 데이터가 없거나 형식이 맞지 않습니다.`);
                            continue;
                        }

                        const actualHeaders = Object.keys(excelData[0]);
                        const curMap = config.mappings[mapKey] || {};
                        const headerCache = createHeaderMap(actualHeaders, curMap);
                        
                        excelData.forEach(row => {
                            const codeKey = headerCache['품목코드'] || '품목코드'; 
                            const nameKey = headerCache['품목명'] || '품목명';
                            const code = row[codeKey];
                            const name = row[nameKey];
                            
                            const cleanCode = String(code || '').replace(/\s/g, '');
                            const cleanName = String(name || '').replace(/\s/g, '');

                            if (!cleanCode || cleanCode.includes('출력') || cleanCode === '코드' || cleanCode === '품목코드' || cleanCode === '상품코드' || cleanCode.includes('예시')) return;
                            if (cleanName.includes('테스트상품') || cleanName.includes('샘플상품') || cleanCode.toLowerCase().includes('test')) return;

                            if (mapKey === 'master') {
                                if (!newMaster[code]) newMaster[code] = { 코드: code };
                                window.MASTER_HEADERS.forEach(h => {
                                    const actualKey = headerCache[h] || h;
                                    if (actualHeaders.includes(actualKey)) {
                                        const val = row[actualKey];
                                        if (val !== undefined && val !== null && String(val).trim() !== '') {
                                            newMaster[code][h] = window.NUMERIC_HEADERS.includes(h) ? window.parseNum(val) : val;
                                        } else {
                                            newMaster[code][h] = window.NUMERIC_HEADERS.includes(h) ? 0 : '';
                                        }
                                    }
                                });
                            } else {
                                if (!newManaged[code]) { newManaged[code] = { 코드: code, sources: {}, finalData: {}, _tags: new Set() }; }
                                let mItem = newManaged[code];
                                if (!mItem.sources[mapKey]) mItem.sources[mapKey] = {};
                                
                                mItem = { ...mItem, _tags: new Set([...(mItem._tags || []), `excel:업로드`]) };
                                
                                const specKey = headerCache['규격']; const vendorKey = headerCache['구매처'];
                                mItem.sources[mapKey]['품목명'] = nameKey ? row[nameKey] : '';
                                mItem.sources[mapKey]['규격'] = specKey ? row[specKey] : '';
                                mItem.sources[mapKey]['구매처'] = vendorKey ? row[vendorKey] : '';
                                
                                if (!mItem.sources[mapKey]['품목명'] && newMaster[code]?.['품목명']) mItem.sources[mapKey]['품목명'] = newMaster[code]['품목명'];
                                if (!mItem.sources[mapKey]['규격'] && newMaster[code]?.['규격']) mItem.sources[mapKey]['규격'] = newMaster[code]['규격'];

                                Object.keys(curMap).forEach(h => {
                                    if (!['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                        const actualKey = headerCache[h];
                                        if (actualHeaders.includes(actualKey)) {
                                            const val = row[actualKey];
                                            const safeVal = (val !== undefined && val !== null) ? val : '';
                                            const isNumeric = window.NUMERIC_HEADERS.includes(config.masterLinks[mapKey]?.[h]) || window.NUMERIC_HEADERS.includes(h);
                                            
                                            mItem.sources[mapKey][h] = isNumeric ? window.parseNum(safeVal) : safeVal;
                                            if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNumeric ? window.parseNum(safeVal) : safeVal;
                                        }
                                    }
                                });

                                if (mapKey === 'estimate') {
                                    const pIn = window.parseNum(mItem.sources[mapKey]['입고가'] || newMaster[code]?.['입고가']);
                                    mItem.finalData = window.calculatePricesEngine(pIn, newMaster[code]||{}, mItem.finalData, config.marginRules, false);
                                }
                                newManaged[code] = mItem;
                            }
                            totalCount++;
                        });
                    }
                    data.setMasterProducts(newMaster);
                    if (expectedType === 'estimate') {
                        data.setManagedItems(newManaged);
                        ui.setActiveTags(prev => {
                            if (!prev.some(t => t.type === 'excel')) return [...prev, {type: 'excel', name: '업로드된 엑셀'}];
                            return prev;
                        });
                    }
                    if(totalCount > 0) ui.showToast(`✅ 데이터 로드 완료 (${totalCount}건)`);
                } catch(error) { 
                    console.error(error);
                    ui.setAlertMsg("❌ 파싱 오류 발생. 엑셀 파일 형식을 확인하세요."); 
                } finally { 
                    if (targetInput) targetInput.value = ''; 
                    ui.setIsProcessing(false); 
                    ui.setProcessMsg(''); 
                }
            }, [data.masterProducts, data.managedItems, config.mappings, config.masterLinks, config.marginRules, ui]);

            const handleLoadFilter = useCallback((type, name) => {

                    if (ui.activeTags.some(t => t.type === 'catalog' && t.name === '모든 카탈로그')) return ui.showToast('⚠️ 이미 모든 카탈로그가 추가되어 있습니다.');
                    ui.setIsProcessing(true);
                    ui.setProcessMsg(`모든 카탈로그 데이터 병합 중...`);
                    
                    setTimeout(() => {

                            ui.setActiveTags(prev => [...prev, {type: 'catalog', name: '모든 카탈로그'}]);
                            let newManaged = { ...data.managedItems };
                            let addedCount = 0;
                            const safeMarginRules = Array.isArray(config.marginRules) ? config.marginRules : [];

                            Object.values(data.masterProducts).forEach(mItem => {
                                if (mItem['카탈로그'] && String(mItem['카탈로그']).trim() !== '') {
                                    if (!newManaged[mItem.코드]) {
                                        newManaged[mItem.코드] = {
                                            코드: mItem.코드,
                                            sources: { estimate: {} },
                                            finalData: window.calculatePricesEngine(window.parseNum(mItem['입고가']), mItem, {}, safeMarginRules, false),
                                            _tags: new Set([`catalog:모든 카탈로그`])
                                        };
                                        addedCount++;
                                    } else {
                                        newManaged[mItem.코드] = {
                                            ...newManaged[mItem.코드],
                                            _tags: new Set([...(newManaged[mItem.코드]._tags || []), `catalog:모든 카탈로그`])
                                        };
                                    }
                                }
                            });
                            data.setManagedItems(newManaged);
                            ui.setSelectedRows(new Set());
                            ui.showToast(`✅ 모든 카탈로그 병합 완료! (신규 ${addedCount}건 추가됨)`);
                        } catch (e) {
                            console.error(e);
                            ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다.");
                        } finally {
                            ui.setIsProcessing(false);
                            ui.setProcessMsg('');
                        }
                    }, 100);
                    return;
                }

                if (ui.activeTags.some(t => t.type === type && t.name === name)) return ui.showToast('⚠️ 이미 화면에 추가된 항목입니다.');

                ui.setIsProcessing(true);
                ui.setProcessMsg(`[${name}] 데이터 병합 중...`);
                
                setTimeout(() => {
                    try {
                        ui.setActiveTags(prev => [...prev, {type, name}]);
                        let newManaged = { ...data.managedItems };
                        let addedCount = 0;
                        
                        const safeMarginRules = Array.isArray(config.marginRules) ? config.marginRules : [];

                        Object.values(data.masterProducts).forEach(mItem => {
                            let isMatch = false;
                            const catStr = type === 'category' ? (mItem['견적서'] || mItem['카테고리'] || '') : (mItem['카탈로그'] || '');
                            
                            if (String(catStr).split(',').map(c => c.trim()).includes(name)) {
                                isMatch = true;
                            }

                            if (isMatch) {
                                if (!newManaged[mItem.코드]) {
                                    newManaged[mItem.코드] = {
                                        코드: mItem.코드,
                                        sources: { estimate: {} },
                                        finalData: window.calculatePricesEngine(window.parseNum(mItem['입고가']), mItem, {}, safeMarginRules, false),
                                        _tags: new Set([`${type}:${name}`])
                                    };
                                    addedCount++;
                                } else {
                                    newManaged[mItem.코드] = {
                                        ...newManaged[mItem.코드],
                                        _tags: new Set([...(newManaged[mItem.코드]._tags || []), `${type}:${name}`])
                                    };
                                }
                            }
                        });
                        
                        data.setManagedItems(newManaged);
                        ui.setSelectedRows(new Set()); 
                        ui.showToast(`✅ [${name}] 병합 완료! (신규 ${addedCount}건 추가됨)`);
                    } catch (error) {
                        console.error("병합 중 오류 발생:", error);
                        ui.showToast("❌ 데이터 병합 중 오류가 발생했습니다.");
                    } finally {
                        ui.setIsProcessing(false);
                        ui.setProcessMsg('');
                    }
                }, 100);
            }, [data.masterProducts, data.managedItems, data.setManagedItems, config.marginRules, ui]);

            const handleRemoveFilter = useCallback((type, name) => {
                ui.setActiveTags(prev => prev.filter(t => !(t.type === type && t.name === name)));
                
                data.setManagedItems(prev => {
                    let newManaged = { ...prev };
                    let removedCount = 0;
                    
                    Object.keys(newManaged).forEach(key => {
                        const item = newManaged[key];
                        if (item._tags && item._tags.has(`${type}:${name}`)) {
                            const newTags = new Set(item._tags);
                            newTags.delete(`${type}:${name}`);
                            
                            if (newTags.size === 0) {
                                delete newManaged[key];
                                removedCount++;
                            } else {
                                newManaged[key] = { ...item, _tags: newTags };
                            }
                        }
                    });
                    
                    ui.showToast(`✅ [${name}] 제거 완료. (${removedCount}건 작업 화면에서 제외됨)`);
                    return newManaged;
                });
                ui.setSelectedRows(new Set());
            }, [data.setManagedItems, ui]);

            const handleRemoveFromWorkspace = useCallback(() => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 화면에서 제외(빼기)할 항목을 먼저 체크해주세요.');

                data.setManagedItems(prev => {
                    const next = { ...prev };
                    ui.selectedRows.forEach(code => {
                        delete next[code];
                    });
                    return next;
                });
                ui.setSelectedRows(new Set());
                ui.showToast('✅ 선택한 항목이 현재 작업 화면에서 제외되었습니다.');
            }, [ui.selectedRows, data.setManagedItems, ui]);

            const handleSaveAsCategory = useCallback((categoryName) => {
                if (!categoryName || !categoryName.trim()) return;
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 견적서로 저장할 상품이 없습니다.");

                ui.setIsProcessing(true);
                ui.setProcessMsg('견적서 저장 중...');

                setTimeout(() => {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    const safeName = categoryName.trim();

                    fullDisplayRows.forEach(row => {
                        const code = row.코드;
                        if (!newMaster[code]) return;
                        
                        newMaster[code] = { ...newMaster[code] };
                        const currentCategories = newMaster[code]['견적서'] || newMaster[code]['카테고리'] || '';
                        const tags = String(currentCategories).split(',').map(s => s.trim()).filter(Boolean); 
                        
                        if (!tags.includes(safeName)) {
                            tags.push(safeName);
                            newMaster[code]['견적서'] = tags.join(', ');
                            delete newMaster[code]['카테고리'];
                            count++;
                        }
                    });

                    if (count > 0) {
                        const localLogs = [{
                            id: window.generateUUID(), timestamp: new Date().toLocaleString('ko-KR'), code: 'SYSTEM', name: `[견적서 그룹 생성] ${safeName}`, spec: '', field: '견적서', oldVal: '-', newVal: `${count}개 상품 추가됨`, diff: 0
                        }];
                        data.addHistoryLogs(localLogs);
                    }

                    data.setMasterProducts(newMaster);
                    ui.setShowCategoryModal(false);
                    ui.showToast(`✅ ${count}개 상품이 [${safeName}] 견적서에 추가/저장되었습니다.`);
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }, 100);
            }, [fullDisplayRows, data.masterProducts, data.setMasterProducts, data.addHistoryLogs, config.cloudUrl, ui]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.\n(※ 마스터 상품 자체가 삭제되지는 않으니 안심하세요!)`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...data.masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = String(newMaster[code][fieldKey]).split(',').map(s => s.trim()).filter(Boolean); 
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                if (count > 0) {
                    const localLogs = [{
                        id: window.generateUUID(), timestamp: new Date().toLocaleString('ko-KR'), code: 'SYSTEM', name: `[${fieldKey} 그룹 삭제] ${tagName}`, spec: '', field: fieldKey, oldVal: `${count}개 상품 포함`, newVal: '삭제됨', diff: 0
                    }];
                    data.addHistoryLogs(localLogs);

                data.setMasterProducts(newMaster);
                
                if (ui.activeTags.some(t => t.type === type && t.name === tagName)) {
                    handleRemoveFilter(type, tagName);
                }

                ui.showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [data.masterProducts, data.setMasterProducts, data.addHistoryLogs, config.cloudUrl, ui, handleRemoveFilter]);

            const handleCommitEstimate = useCallback(() => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 반영할 항목을 선택해주세요.');
                let newMaster = { ...data.masterProducts }, commitCount = 0;
                let localLogs = [];
                const nowStr = new Date().toLocaleString('ko-KR');

                ui.selectedRows.forEach(code => {
                    const item = data.managedItems[code]; 
                    if (!item || !item.코드) return;
                    
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const linked = config.masterLinks['estimate']?.[field] || (window.MASTER_HEADERS.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '오류') {
                                const newVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = window.NUMERIC_HEADERS.includes(linked) ? window.parseNum(oldItem[linked]) : (oldItem[linked] || '');
                                
                                if (oldVal !== newVal) {
                                    if (['입고가', '출고가'].includes(linked) && oldVal > 0) {

                                            field: linked, oldVal: oldVal, newVal: newVal, diff: newVal - oldVal
                                        });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {
                                        localLogs.push({
                                            id: window.generateUUID(), timestamp: nowStr, code: code, name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', spec: oldItem.규격 || item.sources?.estimate?.규격 || '', 
                                            field: linked, oldVal: oldVal || '없음', newVal: newVal || '삭제됨', diff: 0
                                        });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;

                    data.addHistoryLogs(localLogs);
                }

                data.setMasterProducts(newMaster); 
                ui.setSelectedRows(new Set());

            }, [ui.selectedRows, data.masterProducts, data.managedItems, data.setMasterProducts, data.addHistoryLogs, config.masterLinks, config.cloudUrl, ui]);

            const toggleAllRows = useCallback(() => {

                setTimeout(() => {
                    data.setManagedItems(prev => {

        const EditableCell = React.memo(({ row, field, linkedMasterField, mVal, config, data, isSel }) => {
            const isNumeric = window.NUMERIC_HEADERS.includes(linkedMasterField) || window.NUMERIC_HEADERS.includes(field);
            const sourceVal = row.sources?.['estimate']?.[field];
            const initialVal = row.finalData?.[field] !== undefined ? row.finalData[field] : (sourceVal !== undefined ? sourceVal : (mVal !== undefined ? mVal : ''));
            const [localVal, setLocalVal] = useState(initialVal);

            useEffect(() => {
                setLocalVal(initialVal);
            }, [initialVal]);

            const isDiff = linkedMasterField && mVal !== undefined && localVal !== '' && String(mVal) !== String(localVal) && isNumeric;
            const isHighlightCol = ['입고가', '출고가'].includes(field);
            const isTargetCol = ['입고가', '출고가'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField);
            
            const oldP = window.parseNum(mVal);
            const newP = window.parseNum(localVal);
            const diffAmount = isDiff ? newP - oldP : 0;
            
            const isSpike = oldP > 0 && newP > 0 && Math.abs(diffAmount) / oldP >= 0.3;

            let baseBg = 'bg-white';
            if (isHighlightCol) baseBg = 'bg-orange-50/40';
            if (isDiff) baseBg = 'bg-amber-100/50';

            const commitChange = (v) => {
                if (String(v) === String(initialVal)) return;
                data.setManagedItems(prev => {
                    const code = row.코드;
                    let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: v } };
                    
                    if (['입고가', '출고가', '외주비', '노무비'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        const pInRaw = (field === '입고가' || linkedMasterField === '입고가') ? v : (currentItem.finalData['입고가'] ?? currentItem.sources['estimate']?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                        currentItem.finalData = window.calculatePricesEngine(window.parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, true);
                    }
                    return { ...prev, [code]: currentItem };
                });
            };

            const handleKeyDown = (e) => {
                if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) {
                    e.preventDefault();
                    e.target.blur();
                    
                    const td = e.target.closest('td');
                    const tr = td.closest('tr');
                    const tbody = tr.closest('tbody');
                    const tds = Array.from(tr.children);
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.children);
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx;
                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);

                    if (nextRowIdx !== rowIdx) {
                        const nextTr = trs[nextRowIdx];
                        const nextInput = nextTr.children[colIdx]?.querySelector('input');
                        if (nextInput) {
                            nextInput.focus();
                            nextInput.select();
                        }
                    }
                }
            };

            return (
                <td className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${baseBg} ${isSel ? '!bg-indigo-100/70' : 'group-hover:!bg-blue-100/60'} transition-colors relative`}>
                    <div className="flex flex-col justify-center h-full">
                        {isTargetCol && isDiff && oldP > 0 && (
                            <div className="text-[10px] text-slate-400 line-through decoration-slate-400 font-mono tracking-tighter text-right pr-1.5">{oldP.toLocaleString()}</div>
                        )}
                        <div className={`flex items-center w-full ${isNumeric ? 'justify-end' : 'justify-center'}`}>
                            {isTargetCol && isSpike && <i className="fas fa-exclamation-triangle text-rose-500 animate-pulse mr-1" title="주의! 단가가 기존 대비 30% 이상 변동되었습니다."></i>}
                            <input

        const MemoizedTableRow = React.memo(({ row, idx, state, actions, isSel, bg, mItem }) => {

                                return <EditableCell key={`p-u-e-${h}`} row={row} field={h} linkedMasterField={linkedMasterField} mVal={mVal} config={config} data={data} isSel={isSel} />;

                }
            }, [fullDisplayRows.length]);

            const displayRows = fullDisplayRows.slice(0, visibleCount);

                                </tr>
                            </tbody>

                    </div>

            <div className="h-full w-full flex flex-col items-center justify-center bg-white rounded-xl border border-slate-200 shadow-sm p-10 fade-in relative overflow-hidden">

                <div className="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 text-5xl mb-6 shadow-inner relative">
                    <i className="fas fa-box-open"></i>
                    <div className="absolute -bottom-2 -right-2 w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white text-[14px] border-2 border-white shadow-sm"><i className="fas fa-check"></i></div>
                </div>
                <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">MerchOps 메인 워크스페이스 [v1.5 클라우드 통합 버전]</h2>
                <p className="text-[14px] text-slate-500 mb-10 text-center leading-relaxed font-bold">

                    </div>

        const ReviewModal = ({ onClose, onConfirm, state, data }) => {

                return state.fullDisplayRows.filter(row => state.selectedRows.has(row.코드));
            }, [state.fullDisplayRows, state.selectedRows]);

            const analysis = useMemo(() => {
                let up = 0, down = 0, same = 0, newItems = 0;
                const list = [];

                targetRows.forEach(row => {
                    const mItem = data.masterProducts[row.코드];
                    const oldP = mItem ? window.parseNum(mItem['입고가']) : 0;
                    const newP = window.parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : row.sources?.['estimate']?.['입고가']);
                    
                    let status = 'same';
                    if (!mItem) { status = 'new'; newItems++; }
                    else if (oldP === 0 || newP === 0) { status = 'same'; same++; }
                    else if (newP > oldP) { status = 'up'; up++; }
                    else if (newP < oldP) { status = 'down'; down++; }
                    else { status = 'same'; same++; }

                    list.push({
                        코드: row.코드,
                        품명: row.finalData?.['품목명'] || row.sources?.['estimate']?.['품목명'] || mItem?.품목명 || '',
                        규격: row.finalData?.['규격'] || row.sources?.['estimate']?.['규격'] || mItem?.규격 || '',
                        기존단가: oldP,
                        새단가: newP,
                        차액: newP - oldP,
                        상태: status
                    });
                });

                list.sort((a, b) => Math.abs(b.차액) - Math.abs(a.차액));
                return { up, down, same, newItems, total: targetRows.length, list };

                                    <div className="text-[11px] text-blue-500 font-bold mb-1"><i className="fas fa-arrow-down mr-1"></i>인하</div>

                                    <div className="text-slate-700 font-black text-xl">{analysis.same}<span className="text-[11px] ml-1 font-bold">건</span></div>
                                </div>
                            </div>

                                <div className="px-4 py-2 bg-slate-100 border-b border-slate-200 text-[12px] font-bold text-slate-600 flex justify-between">
                                    <span>선택된 반영 대상: {analysis.total}건 (단가 변동순 정렬)</span>
                                </div>
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-[12px] whitespace-nowrap">
                                        <thead className="bg-white sticky top-0 border-b border-slate-200 shadow-sm z-10">
                                            <tr className="text-slate-500">
                                                <th className="px-4 py-2 w-16 text-center">상태</th>
                                                <th className="px-4 py-2 w-24">품목코드</th>
                                                <th className="px-4 py-2 w-full">품목명 (규격)</th>
                                                <th className="px-4 py-2 text-right w-24">기존 입고가</th>
                                                <th className="px-4 py-2 text-right w-24 text-indigo-600">새 입고가</th>
                                                <th className="px-4 py-2 text-right w-24">차액</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {analysis.list.map((item, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-4 py-2 text-center">
                                                        {item.상태 === 'up' && <span className="bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px] font-black">인상</span>}
                                                        {item.상태 === 'down' && <span className="bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded text-[10px] font-black">인하</span>}
                                                        {item.상태 === 'new' && <span className="bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded text-[10px] font-black">신규</span>}
                                                        {item.상태 === 'same' && <span className="text-slate-400 text-[10px] font-black">-</span>}
                                                    </td>
                                                    <td className="px-4 py-2 font-mono text-slate-500 text-[11px]">{item.코드}</td>
                                                    <td className="px-4 py-2 font-bold text-slate-800 truncate max-w-[200px]">{item.품명} <span className="text-slate-400 font-normal ml-1 text-[11px]">{item.규격 && `(${item.규격})`}</span></td>
                                                    <td className="px-4 py-2 text-right text-slate-500">{item.기존단가 > 0 ? item.기존단가.toLocaleString() : '-'}</td>
                                                    <td className="px-4 py-2 text-right font-black text-indigo-600">{item.새단가 > 0 ? item.새단가.toLocaleString() : '-'}</td>
                                                    <td className="px-4 py-2 text-right font-bold">
                                                        {item.차액 > 0 && <span className="text-rose-500">+{item.차액.toLocaleString()}</span>}
                                                        {item.차액 < 0 && <span className="text-blue-500">{item.차액.toLocaleString()}</span>}
                                                        {item.차액 === 0 && <span className="text-slate-300">-</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center shrink-0">
                            <div className="text-[11px] text-slate-500 font-bold"><i className="fas fa-info-circle mr-1"></i>수정할 내용이 있다면 닫기를 누르고 뒤쪽 테이블에서 숫자를 수정하세요.</div>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-5 py-2.5 bg-slate-100 border border-slate-200 text-slate-600 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기 (수정하러 가기)</button>
                                <button onClick={() => { onConfirm(); onClose(); }} className="px-6 py-2.5 bg-indigo-600 text-white font-black rounded-lg hover:bg-indigo-700 shadow-sm transition-colors flex items-center">
                                    <i className="fas fa-save mr-1.5 text-[14px]"></i> 저장 및 반영
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    String(tagStr).split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    String(tagStr).split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                
                if (isEstimateUploaded) {
                    baseList = Object.values(data.managedItems); 
                } else {
                    baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });
                }

                if (ui.globalSearch) {
                    const cleanKeyword = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const sourceItem = item.sources?.['estimate'] || {};
                            const finalItem = item.finalData || {};
                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (sourceItem[key] !== undefined ? sourceItem[key] : (mItem[key] || ''))).toLowerCase();
                            
                            const cName = getVal('품목명'); 
                            const cSpec = getVal('규격');
                            const cVendor = getVal('구매처'); 
                            const cWh = getVal('창고');
                            const cCode = String(item.코드 || '').toLowerCase();
                            
                            let score = 0;
                            tokens.forEach(token => {
                                if (cName.includes(token)) score += 10;
                                else if (cCode.includes(token)) score += 8;
                                else if (cVendor.includes(token)) score += 6;
                                else if (cSpec.includes(token)) score += 5;
                                else if (cWh.includes(token)) score += 4;
                            });
                            return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0);
                        baseList.sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else {
                    baseList.sort((a, b) => String(a.코드).localeCompare(String(b.코드)));
                }

                // [검수 뷰 추가 기능 5] 가격 변동 필터 로직 적용
                if (ui.priceFilter !== 'all') {
                    baseList = baseList.filter(item => {
                        const mItem = data.masterProducts[item.코드] || {};
                        const oldP = window.parseNum(mItem['입고가']);
                        const newP = window.parseNum(item.finalData?.['입고가'] !== undefined ? item.finalData['입고가'] : item.sources?.['estimate']?.['입고가']);

                        if (ui.priceFilter === 'new') return !data.masterProducts[item.코드];
                        if (oldP === 0 || newP === 0) return false; 

                        if (ui.priceFilter === 'changed') return oldP !== newP;
                        if (ui.priceFilter === 'up') return newP > oldP;
                        if (ui.priceFilter === 'down') return newP < oldP;
                        return true;
                    });
                }

                return baseList;
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, ui.priceFilter]);

            const customActions = useMerchActions(config, data, ui, fullDisplayRows);
            
            const appState = useMemo(() => ({
                config, data,
                activeTags: ui.activeTags, isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, isProcessing: ui.isProcessing, processMsg: ui.processMsg,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, fullDisplayRows,
                priceFilter: ui.priceFilter
            }), [config, data, ui.activeTags, isEstimateUploaded, ui.selectedRows, ui.globalSearch, ui.isProcessing, ui.processMsg, config.visibleMasterCols, config.visibleUploadCols, data.masterProducts, fullDisplayRows, ui.priceFilter]);
            
            const appActions = useMemo(() => ({
                setShowReviewModal: ui.setShowReviewModal, setShowCategoryModal: ui.setShowCategoryModal,
                setSelectedRows: ui.setSelectedRows, setGlobalSearch: ui.setGlobalSearch, showToast: ui.showToast,
                setPriceFilter: ui.setPriceFilter,
                ...customActions
            }), [ui.setShowReviewModal, ui.setShowCategoryModal, ui.setSelectedRows, ui.setGlobalSearch, ui.showToast, ui.setPriceFilter, customActions]);

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName);
                    
                    if (e.key === 'F7') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!appState.isProcessing && appState.selectedRows.size > 0) {
                            appActions.setShowReviewModal(true);
                        } else if(appState.selectedRows.size === 0) {
                            appActions.showToast("⚠️ [F7] 반영할 항목을 먼저 선택해주세요.");
                        }
                    } else if (e.key === 'F8') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!appState.isProcessing && appState.selectedRows.size > 0) {
                            appActions.handleCommitEstimate();
                            appActions.showToast("⏳ [F8] 데이터를 저장합니다...");
                        } else if(appState.selectedRows.size === 0) {
                            appActions.showToast("⚠️ [F8] 반영할 항목을 먼저 선택해주세요.");
                        }
                    } else if (e.key === 'F9' || e.key === 'F10') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!appState.isProcessing) appActions.handleOpenExportCenter(); 
                    }
                };

                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [appState.isProcessing, appState.selectedRows.size, appActions]);

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                    `}</style>
                    
                    {ui.alertMsg && (
                        <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i>
                            <span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span>
                            <button onClick={() => ui.setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>
                    )}
                    {ui.toastMsg && (
                        <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-4">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-emerald-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center mb-0.5">
                                                    <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v1.5 클라우드 통합 버전</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">MAIN WORKSPACE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} estimateCount={Object.keys(data.managedItems).length} activeTags={ui.activeTags} />
                                        
                                        <nav className="flex gap-1.5 text-[14px] shrink-0 items-center">
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" target="_blank" rel="noopener noreferrer" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">
                                                GUIDE
                                            </a>
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/trend_report" target="_blank" rel="noopener noreferrer" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-blue-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-blue-300 hover:border-blue-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="트렌드 리포트">
                                                REPORT
                                            </a>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt text-[13px]"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt text-[13px]"></i></button>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={() => window.open('history_viewer.html', '_blank')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-amber-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-amber-400 hover:border-amber-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="작업 히스토리 뷰어"><i className="fas fa-history text-[13px]"></i></button>
                                            <button onClick={() => window.open('settings.html', '_blank')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정 콘트롤 타워"><i className="fas fa-cogs opacity-80 text-[13px]"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar state={appState} actions={appActions} availableCatalogs={availableCatalogs} availableCategories={availableCategories} />
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {isMasterEmpty ? (
                                <WelcomeGuide onUpload={(e) => customActions.handleFileUpload(e, 'master')} onCloudSync={customActions.handleCloudSync} />
                            ) : (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>
                    {ui.showCategoryModal && <CategorySaveModal onClose={() => ui.setShowCategoryModal(false)} onSave={customActions.handleSaveAsCategory} />}
                    {ui.showReviewModal && <ReviewModal onClose={() => ui.setShowReviewModal(false)} onConfirm={customActions.handleCommitEstimate} state={appState} data={data} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
