        // v2.1.143: 테마1~5·행사상품/행사제외/행사제안·룰적용·행사가 생성/초기화를 일반 필터줄에서 분리해 행사 작업대로 구축한다. 행사작업 버튼으로 전용 패널을 열고, 행사 필터가 남아 있으면 버튼 배지와 강조상태로 숨은 필터를 알린다. 테마 선택은 상세필터 패널을 강제 노출하지 않는다.
        // v2.1.144: 행사 작업대·행사가 라벨을 보더 없는 텍스트로 단순화한다. 카테고리와 테마는 일반 클릭 단일선택, Ctrl/⌘ 클릭 다중선택을 유지하면서 마우스 드래그 연속선택을 지원한다. 테이블 상품 체크도 첫 체크박스에서 드래그해 연속 선택/해제한다.
        // v2.1.145: 1단 툴바를 마스터&작업 카테고리 → 스마트파서·파서리스트 → 카탈로그·생성 → 견적·구매·재고·정보·양식 순으로 재배치한다. 스마트파서 웹연결은 검은 헤더에서 내려 파서리스트와 묶고, 메인 초기화는 다른 작업군과 분리해 우측 끝의 강조 버튼으로 고정한다.

        // v2.1.153: 룰적용을 행사작업에서 분리해 필터초기화 좌측에 고정한다. SmartParser 구버전 정보변경 큐를 제거하고 정보 마스터 즉시반영·기존 히스토리 기록·새로고침 동기화 정책으로 전환한다.
