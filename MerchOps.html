<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v1.5 클라우드 최적화]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 공용 코어 엔진 호출 (실제 PC 구동 시 필수) -->
    <script src="coreEngine.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => JSON.parse(localStorage.getItem('merchVisMaster_v870')) || { estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => JSON.parse(localStorage.getItem('merchVisUpload_v870')) || { estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
            
            const [mappings, setMappings] = useState(() => JSON.parse(localStorage.getItem('merchMappings_v870')) || { master: {}, estimate: {} });
            const [masterLinks, setMasterLinks] = useState(() => JSON.parse(localStorage.getItem('merchMasterLinks_v870')) || { estimate: {} });

            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                return s ? JSON.parse(s) : [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }];
            });

            // 설정 동기화 감지 (콘트롤 타워에서 변경 시 즉각 반영)
            useEffect(() => {
                const handleConfigSync = (e) => {
                    if (e.key === 'config_sync_trigger') {
                        const fVisMaster = JSON.parse(localStorage.getItem('merchVisMaster_v870'));
                        const fVisUpload = JSON.parse(localStorage.getItem('merchVisUpload_v870'));
                        const fMappings = JSON.parse(localStorage.getItem('merchMappings_v870'));
                        const fMasterLinks = JSON.parse(localStorage.getItem('merchMasterLinks_v870'));
                        const fMarginRules = JSON.parse(localStorage.getItem('merchMarginRules_v878'));
                        
                        if(fVisMaster) setVisibleMasterCols(fVisMaster);
                        if(fVisUpload) setVisibleUploadCols(fVisUpload);
                        if(fMappings) setMappings(fMappings);
                        if(fMasterLinks) setMasterLinks(fMasterLinks);
                        if(fMarginRules) setMarginRules(fMarginRules);
                    }
                };
                window.addEventListener('storage', handleConfigSync);
                return () => window.removeEventListener('storage', handleConfigSync);
            }, []);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            useEffect(() => {
                if(window.getAllIDB) {
                    window.getAllIDB('master_products').then(items => {
                        if (items && items.length > 0) {
                            const dict = {}; items.forEach(i => dict[i.코드] = i);
                            setMasterProducts(dict);
                        }
                    }).catch(console.error);
                }

                try { 
                    const logs = JSON.parse(localStorage.getItem('merchHistory_v870'));
                    if (logs) setHistoryLogs(logs);
                } catch(e) {}
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger' && window.getAllIDB) {
                        window.getAllIDB('master_products').then(items => {
                            if (items && items.length > 0) {
                                const dict = {}; items.forEach(i => dict[i.코드] = i);
                                setMasterProducts(dict);
                            }
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    const requestIdle = window.requestIdleCallback || ((cb) => setTimeout(cb, 1));
                    requestIdle(async () => {
                        const safeData = Object.values(data).filter(item => item && item.코드);
                        if(window.bulkPutIDB) await window.bulkPutIDB('master_products', safeData);
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                    });
                } catch(e) { console.error("IndexedDB 저장 실패", e); } 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const combined = [...newLogs, ...prev].slice(0, 2000); 
                    localStorage.setItem('merchHistory_v870', JSON.stringify(combined));
                    return combined;
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMasterToLocal, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [activeTags, setActiveTags] = useState([]);
            
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                selectedRows, setSelectedRows, globalSearch, setGlobalSearch, activeTags, setActiveTags,
                showReviewModal, setShowReviewModal, showCategoryModal, setShowCategoryModal,
                alertMsg, setAlertMsg, toastMsg, setToastMsg, isProcessing, setIsProcessing, processMsg, setProcessMsg, showToast
            };
        };

        const useMerchActions = (config, data, ui, fullDisplayRows) => {

            const handleCloudSync = useCallback(async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다. 우측 상단 톱니바퀴에서 URL을 세팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 분할 백업' : '불러오기'} 시작...`);
                ui.setIsProcessing(true);
                
                try {
                    if (type === 'upload') {
                        // 1단계: 초기화
                        ui.setProcessMsg('서버 초기화 중...');
                        let initRes = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'initSync' }) });
                        if ((await initRes.json()).status !== 'success') throw new Error("초기화 실패");

                        // 2단계: 마스터 데이터 분할(Chunk) 전송
                        const masterItems = Object.values(data.masterProducts);
                        const chunkSize = 500;
                        for (let i = 0; i < masterItems.length; i += chunkSize) {
                            const chunk = masterItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`마스터 백업 중... (${Math.min(i + chunkSize, masterItems.length).toLocaleString()} / ${masterItems.length.toLocaleString()}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_master', data: chunk }) });
                        }

                        // 3단계: 히스토리 로그 분할 전송
                        const historyItems = data.historyLogs || [];
                        for (let i = 0; i < historyItems.length; i += chunkSize) {
                            const chunk = historyItems.slice(i, i + chunkSize);
                            ui.setProcessMsg(`히스토리 백업 중... (${Math.min(i + chunkSize, historyItems.length).toLocaleString()} / ${historyItems.length.toLocaleString()}건)`);
                            await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify({ action: 'chunk_history', data: chunk }) });
                        }

                        // 4단계: 설정 데이터 전송
                        ui.setProcessMsg('환경설정 및 AI 사전 업로드 중...');
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const configPayload = {
                            action: 'config',
                            data: {
                                dict: dict,
                                rules: config.marginRules,
                                appConfig: { mappings: config.mappings, masterLinks: config.masterLinks, visibleUploadCols: config.visibleUploadCols, visibleMasterCols: config.visibleMasterCols }
                            }
                        };
                        await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(configPayload) });

                        ui.showToast('✅ 클라우드 대용량 분할 백업(Push) 성공!');
                    } else {
                        // 클라우드에서 데이터 가져오기 (GET)
                        ui.setProcessMsg('클라우드 데이터 수신 중...');
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        
                        if (result.status === 'success' && result.data) { 
                            if (result.data.master && Object.keys(result.data.master).length > 0) {
                                await data.setMasterProducts(result.data.master);
                            }
                            if (result.data.dict && Object.keys(result.data.dict).length > 0) localStorage.setItem('parserDict_v870', JSON.stringify(result.data.dict));
                            if (result.data.rules && result.data.rules.length > 0) config.setMarginRules(result.data.rules);
                            
                            if (result.data.history && Array.isArray(result.data.history)) {
                                data.setHistoryLogs(result.data.history);
                                localStorage.setItem('merchHistory_v870', JSON.stringify(result.data.history));
                            }
                            
                            if (result.data.appConfig) {
                                if (result.data.appConfig.mappings) config.setMappings(result.data.appConfig.mappings);
                                if (result.data.appConfig.masterLinks) config.setMasterLinks(result.data.appConfig.masterLinks);
                                if (result.data.appConfig.visibleUploadCols) config.setVisibleUploadCols(result.data.appConfig.visibleUploadCols);
                                if (result.data.appConfig.visibleMasterCols) config.setVisibleMasterCols(result.data.appConfig.visibleMasterCols);
                            }

                            const masterCount = result.data.master ? Object.keys(result.data.master).length : 0;
                            const historyCount = result.data.history ? result.data.history.length : 0;
                            ui.showToast(`✅ 데이터 불러오기 완료! (상품: ${masterCount.toLocaleString()}건, 로그: ${historyCount.toLocaleString()}건)`);
                        } else {
                            throw new Error("Invalid Data Format");
                        }
                    }
                } catch (error) { 
                    console.error(error);
                    ui.setAlertMsg("통신 오류 발생. URL이나 서버 구성을 확인하세요.\n" + error.message); 
                } finally {
                    ui.setIsProcessing(false);
                    ui.setProcessMsg('');
                }
            }, [config, data, ui]);

            // 기타 액션들 (초기화, 필터링 등)
            const handleReset = useCallback(() => {
                data.setManagedItems({}); ui.setSelectedRows(new Set()); ui.setGlobalSearch(''); ui.setActiveTags([]); ui.showToast('화면 데이터가 초기화 되었습니다.');
            }, [data.setManagedItems, ui]);

            const handleCommitEstimate = useCallback(() => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 반영할 항목을 선택해주세요.');
                let newMaster = { ...data.masterProducts }, commitCount = 0, localLogs = [];
                const nowStr = new Date().toLocaleString('ko-KR');

                ui.selectedRows.forEach(code => {
                    const item = data.managedItems[code]; 
                    if (!item || !item.코드) return;
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const linked = config.masterLinks['estimate']?.[field] || (window.MASTER_HEADERS?.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '오류') {
                                const newVal = window.NUMERIC_HEADERS?.includes(linked) ? window.parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = window.NUMERIC_HEADERS?.includes(linked) ? window.parseNum(oldItem[linked]) : (oldItem[linked] || '');
                                
                                if (oldVal !== newVal) {
                                    if (['입고가', '출고가'].includes(linked) && oldVal > 0) {
                                        localLogs.push({ id: window.generateUUID(), timestamp: nowStr, code: code, name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', spec: oldItem.규격 || item.sources?.estimate?.규격 || '', field: linked, oldVal: oldVal, newVal: newVal, diff: newVal - oldVal });
                                    } else if (['카탈로그', '견적서'].includes(linked)) {
                                        localLogs.push({ id: window.generateUUID(), timestamp: nowStr, code: code, name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', spec: oldItem.규격 || item.sources?.estimate?.규격 || '', field: linked, oldVal: oldVal || '없음', newVal: newVal || '삭제됨', diff: 0 });
                                    }
                                }
                                newMaster[item.코드][linked] = newVal;
                            }
                        });
                    }
                    commitCount++;
                });

                if (localLogs.length > 0) {
                    data.addHistoryLogs(localLogs);
                    // 클라우드가 설정되어 있으면 백그라운드로 히스토리 청크 전송
                }

                data.setMasterProducts(newMaster); 
                ui.setSelectedRows(new Set()); 
                ui.showToast(`✅ ${commitCount}건 마스터 업데이트 완료.`);
            }, [ui.selectedRows, data, config.masterLinks, ui]);

            return useMemo(() => ({ handleCloudSync, handleReset, handleCommitEstimate }), [handleCloudSync, handleReset, handleCommitEstimate]);
        };

        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();
            
            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            const fullDisplayRows = useMemo(() => {
                let baseList = isEstimateUploaded ? Object.values(data.managedItems) : Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });
                // 검색 로직 생략 (기존과 동일하게 적용됨)
                return baseList.slice(0, 100); // 렌더링 최적화를 위해 임시 슬라이싱 (실제론 Virtual Scroll 또는 그대로 사용)
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch]);

            const actions = useMerchActions(config, data, ui, fullDisplayRows);

            return (
                <div className="h-screen w-full bg-slate-100 flex flex-col items-center justify-center font-sans overflow-hidden">
                    {/* Toast */}
                    {ui.toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-bold border border-slate-700"><i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}</div>}
                    
                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-white shadow-2xl overflow-hidden mx-auto border-x border-slate-200">
                        {/* 1. 글로벌 헤더 (GNB) */}
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 shadow-md z-40">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-black text-emerald-400 tracking-tight">MerchOps</h1>
                                <span className="bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold tracking-wider">v1.5 클라우드 분할전송 최적화</span>
                                {ui.isProcessing && <div className="text-amber-400 text-[12px] font-bold animate-pulse"><i className="fas fa-spinner fa-spin mr-2"></i>{ui.processMsg}</div>}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => window.open('history_viewer.html', '_blank')} className="w-9 h-9 rounded bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-amber-400 flex items-center justify-center transition-colors" title="작업 히스토리 뷰어">
                                    <i className="fas fa-history text-[14px]"></i>
                                </button>
                                <button onClick={() => window.open('export_center.html', '_blank')} className="w-9 h-9 rounded bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-emerald-400 flex items-center justify-center transition-colors" title="통합 출력 센터 (F9/F10)">
                                    <i className="fas fa-print text-[14px]"></i>
                                </button>
                                <div className="w-px h-5 bg-slate-700 mx-1 my-auto"></div>
                                <button onClick={() => actions.handleCloudSync('download')} disabled={ui.isProcessing} className="w-9 h-9 rounded bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-slate-300 flex items-center justify-center transition-colors disabled:opacity-50" title="클라우드 데이터 수신">
                                    <i className="fas fa-cloud-download-alt text-[14px]"></i>
                                </button>
                                <button onClick={() => actions.handleCloudSync('upload')} disabled={ui.isProcessing} className="w-9 h-9 rounded bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-slate-300 flex items-center justify-center transition-colors disabled:opacity-50" title="클라우드 분할 백업">
                                    <i className="fas fa-cloud-upload-alt text-[14px]"></i>
                                </button>
                                <div className="w-px h-5 bg-slate-700 mx-1 my-auto"></div>
                                <button onClick={() => window.open('settings.html', '_blank')} className="w-9 h-9 rounded bg-[#1e293b] hover:bg-[#334155] border border-slate-700 text-slate-400 flex items-center justify-center transition-colors" title="콘트롤 타워 (환경설정)">
                                    <i className="fas fa-cogs text-[14px]"></i>
                                </button>
                            </div>
                        </div>

                        {/* 2. 작업 공간 (워크스페이스) */}
                        <div className="flex-1 p-6 bg-slate-50 flex items-center justify-center overflow-auto">
                            {isMasterEmpty ? (
                                <div className="text-center p-10 bg-white rounded-2xl border border-slate-200 shadow-sm max-w-lg w-full">
                                    <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 text-4xl mx-auto mb-6"><i className="fas fa-box-open"></i></div>
                                    <h2 className="text-xl font-black text-slate-800 mb-3">마스터 데이터가 없습니다.</h2>
                                    <p className="text-slate-500 text-[13px] font-bold mb-8">상단의 <i className="fas fa-cloud-download-alt text-indigo-500 mx-1"></i> 클라우드 수신 버튼을 눌러<br/>구글 서버에 백업된 데이터를 안전하게 불러오세요.</p>
                                    <button onClick={() => actions.handleCloudSync('download')} disabled={ui.isProcessing} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black shadow-md w-full disabled:bg-slate-300 transition-colors">
                                        <i className="fas fa-cloud-download-alt mr-2"></i> 클라우드 데이터 가져오기
                                    </button>
                                </div>
                            ) : (
                                <div className="h-full w-full flex flex-col bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                                    <div className="p-4 bg-slate-100 border-b border-slate-200 flex justify-between items-center">
                                        <div className="font-bold text-[13px] text-slate-700"><i className="fas fa-database text-emerald-500 mr-2"></i>현재 로드된 DB: {Object.keys(data.masterProducts).length.toLocaleString()}건</div>
                                        <button onClick={actions.handleReset} className="px-3 py-1.5 bg-white border border-slate-300 rounded text-[11px] font-bold text-slate-600 hover:bg-slate-50"><i className="fas fa-redo-alt mr-1"></i> 화면 초기화</button>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center text-slate-400 font-bold p-10">
                                        <div className="text-center">
                                            <i className="fas fa-check-circle text-5xl mb-4 text-emerald-400"></i>
                                            <p>클라우드 분할 백업 시스템 적용 완료.</p>
                                            <p className="text-[11px] mt-2 font-normal">상단의 업로드/다운로드 버튼을 통해 5만건의 데이터도 안전하게 송수신됩니다.</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
