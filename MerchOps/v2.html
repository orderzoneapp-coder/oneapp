    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 시스템 공통 환경 변수 및 헬퍼 함수
        // ==========================================
        const MASTER_HEADERS = [
            "일자", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "입고가", "출고가", "도매가", "전송가", "창고가",

            "경비", "재료비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "입고가", "출고가", "도매가", "전송가", "창고가", "외주비", "노무비", 
            "경비", "재료비", "비과세", "기본", "연동", "싯가", "준비기간", "마감시간",
            "도매2 (전송)", "1구매", "1출고", "2구매", "2출고",
            "재고수량", "입고수량", "주문수량", "판매수량", "행사가", "입고", "출고",
            "B단가", "A판매", "B판매", "1입고", "2입고", "1종연산", "2종연산",

        const getInitialVisibleMasterCols = () => ({ estimate: ['입고가', '출고가'] });
        
        const getInitialVisibleUploadCols = () => ({ 
            estimate: ['구매처', '입고가', 'B단가', 'A판매', 'B판매', '지시사항', '정렬순서']
        });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '품목코드': '품목코드', '품목명': '품목명, 상품명, 품명', '규격': '규격' };
            base.estimate = { 
                '품목코드': '품목코드, 상품코드', '품목명': '품목명, 상품명, 품명', '규격': '규격명, 규격', 
                '구매처': '거래처명, 구매처', '입고가': '입고가, 입고', 
                'B단가': 'B단가', 'A판매': 'A판매, A판매가', 'B판매': 'B판매, B판매가, B 도매가',
                '지시사항': '지시사항', '정렬순서': '정렬순서, 순서',
                '외주비': '외주비', '경비': '경비', '노무비': '노무비', '재료비': '재료비',
                '1종연산': '1종연산', '2종연산': '2종연산',
                '1종코드': '1종코드', '1입고': '1입고, 1구매', '1출고': '1출고',
                '2종코드': '2종코드', '2입고': '2입고, 2구매', '2출고': '2출고'
            };
            return base;
        };
        
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { 
                '구매처': '구매처', '입고가': '입고가', 
                'B단가': '', 'A판매': '출고가', 'B판매': '도매가', 
                '지시사항': '', '정렬순서': '',
                '외주비': '외주비', '경비': '경비', '노무비': '노무비', '재료비': '재료비',
                '1종연산': '1종연산', '2종연산': '2종연산',
                '1종코드': '1종코드', '1입고': '1구매', '1출고': '1출고',
                '2종코드': '2종코드', '2입고': '2구매', '2출고': '2출고'
            };
            return base;
        };

        const EXPORT_OPTIONS = {
            estimate: [
                { id: 'est_integrated_excel', type: 'excel', title: '1. 통합 엑셀 다운로드 (ERP & 쇼핑몰)', desc: 'ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드', icon: 'fa-file-excel', theme: { border: 'hover:border-blue-400', bg: 'hover:bg-blue-50', text: 'text-blue-500' } },
                { id: 'est_notice', type: 'copy', title: '2. 도매몰 단가 공지용 (카톡복사)', desc: '클릭 시 텍스트가 자동 복사됩니다.', icon: 'fa-copy', theme: { border: 'hover:border-amber-400', bg: 'hover:bg-amber-50', text: 'text-amber-500' } },
                { id: 'est_print', type: 'print', title: '3. 오프라인 영업용 인쇄물', desc: '견적가 기준 프린트 최적화 레이아웃 (PDF)', icon: 'fa-print', theme: { border: 'hover:border-rose-400', bg: 'hover:bg-rose-50', text: 'text-rose-500' } }
            ]
        };

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'w-[80px] min-w-[80px] max-w-[80px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'w-[100px] min-w-[100px] max-w-[100px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'w-[160px] min-w-[160px] max-w-[160px]';
            return 'w-[110px] min-w-[110px] max-w-[110px]';
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) {
                if (!obj) continue;
                for (let k of keys) {
                    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return Number(String(obj[k]).replace(/,/g, '')) || 0;
                }
            }
            return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) {
                if (!obj) continue;
                for (let k of keys) {
                    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
                }
            }
            return '';
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.some(kw => cleanH.includes(kw));
                });
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const calculatePricesEngine = (baseInPrice, mItem, currentFinalData) => {
            const outsrc = Number(String(currentFinalData['외주비'] ?? mItem['외주비'] ?? 0).replace(/,/g, '')) || 0;
            const labor = Number(String(currentFinalData['노무비'] ?? mItem['노무비'] ?? 0).replace(/,/g, '')) || 0;
            const material = Number(String(currentFinalData['재료비'] ?? mItem['재료비'] ?? 0).replace(/,/g, '')) || 0;
            const div1 = Number(String(currentFinalData['1종연산'] ?? mItem['1종연산'] ?? 0).replace(/,/g, '')) || 0;
            const div2 = Number(String(currentFinalData['2종연산'] ?? mItem['2종연산'] ?? 0).replace(/,/g, '')) || 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };

            if (baseInPrice > 0) {
                newFinalData['출고가'] = Math.round(((baseInPrice + outsrc + labor) / 0.9) / 100) * 100;
                if (div1 > 0) {
                    newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                    newFinalData['1출고'] = Math.round((((baseInPrice + outsrc + labor) / div1 / 0.85) + material) / 100) * 100;
                }
                if (div2 > 0) {
                    newFinalData['2입고'] = Math.round(((baseInPrice + outsrc) / div2) / 100) * 100;
                    newFinalData['2출고'] = Math.round((((baseInPrice + outsrc + labor) / div2 / 0.85) + material) / 100) * 100;
                }
            }
            return newFinalData;
        };

        // ==========================================
        // 🧩 모듈화된 UI 컴포넌트들
        // ==========================================
        const SystemConsole = ({ itemCount, isProcessing, processMsg, isEstimateUploaded, estimateCount }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
            
            const timeStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
            
            let statusText = '';
            let statusColor = 'text-[#10b981]'; 
            let bgColor = 'bg-[#10b981]';

            if (isProcessing) {
                statusText = `> ${processMsg}`;
                statusColor = 'text-amber-400'; bgColor = 'bg-amber-400';
            } else if (isEstimateUploaded) {
                statusText = `> DB: ${itemCount}건 / 진행버퍼: ${estimateCount}건 로드.. (${timeStr})`;
                statusColor = 'text-[#818cf8]'; bgColor = 'bg-[#818cf8]';
            } else if (itemCount === 0) {
                statusText = `> 대기중.. (${timeStr})`;
                statusColor = 'text-slate-400'; bgColor = 'bg-slate-400';
            } else {
                statusText = `> DB: ${itemCount}건 로드.. (${timeStr})`;
            }

            return (
                <div className="bg-black rounded-md border border-slate-700 px-4 py-1.5 flex flex-1 items-center overflow-hidden shadow-inner">
                    <div className="flex items-center truncate w-full">
                        <span className={`text-[12px] font-mono ${statusColor} flex items-center`}>
                            {isProcessing && <i className="fas fa-spinner fa-spin mr-2"></i>}
                            {statusText}
                        </span>
                        <span className={`w-1.5 h-3.5 ${bgColor} ml-1.5 animate-[pulse_1s_infinite]`}></span>
                    </div>
                </div>
            );
        };

        const SearchBar = ({ onSearch }) => {
            const [val, setVal] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => onSearch(val), 250); 
                return () => clearTimeout(timer);
            }, [val, onSearch]);

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F3' || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f')) {
                        e.preventDefault(); 
                        if (document.activeElement) document.activeElement.blur();
                        setTimeout(() => { if (inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, 50);
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, []);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault(); onSearch(val); 
                    if (document.activeElement) document.activeElement.blur();
                    setTimeout(() => {
                        const firstInput = document.querySelector('input.cell-input[data-numeric="true"]') || document.querySelector('input.cell-input');
                        if (firstInput) { firstInput.focus(); firstInput.select(); }
                    }, 50);
                }
            };

            return (
                <div className="relative w-[240px] h-full shrink-0" onClick={() => {inputRef.current?.focus(); inputRef.current?.select();}}>
                    <input id="main-search-input" ref={inputRef} type="text" placeholder="검색 (단축키 F3, Ctrl+F)" value={val} onChange={e => setVal(e.target.value)} onKeyDown={handleKeyDown} autoComplete="off" spellCheck="false"
                        className="w-full h-full pl-3 pr-8 py-1.5 border border-slate-300 rounded-lg text-[12px] font-bold outline-none focus:border-indigo-500 focus:ring-2 transition-shadow" />
                    <i className="fas fa-search absolute right-3 top-3 text-slate-400 pointer-events-none"></i>
                </div>
            );
        };

        const ExportModal = ({ onClose, fullDisplayRows, currentExportTitle, executeExport }) => {
            const [zeroAction, setZeroAction] = useState({ sale: '0', stock: '0' });

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[200] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[600px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-5 border-b border-slate-700 flex justify-between items-center">
                            <h2 className="text-[16px] font-black text-white"><i className="fas fa-file-export mr-2 text-indigo-400"></i>출력 및 내보내기 센터</h2>
                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white transition-colors"></i></button>
                        </div>
                        <div className="px-6 py-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Current View :</span>
                                <span className="text-[13px] font-black text-indigo-700 bg-indigo-100 px-2.5 py-0.5 rounded">[{currentExportTitle}] 데이터</span>
                            </div>
                            <span className="text-[12px] font-bold text-slate-500">총 <span className="text-slate-800">{fullDisplayRows.length}</span>건 출력 예정</span>
                        </div>
                        
                        <div className="px-6 py-4 bg-slate-100 border-b border-slate-200">
                            <h3 className="text-[13px] font-bold text-slate-800 mb-3"><i className="fas fa-sliders-h mr-2 text-indigo-500"></i>[단가 0원 상품] 엑셀 출력 운영 설정</h3>
                            <div className="flex gap-4">
                                <div className="flex-1 bg-white p-3 rounded border border-slate-200 shadow-sm">
                                    <div className="text-[11px] font-bold text-slate-500 mb-2">쇼핑몰 판매 여부</div>
                                    <div className="flex gap-2">
                                        <label className="flex items-center gap-1.5 text-[12px] cursor-pointer"><input type="radio" name="sale" value="1" checked={zeroAction.sale === '1'} onChange={e => setZeroAction({...zeroAction, sale: e.target.value})} /> 판매중 (1)</label>
                                        <label className="flex items-center gap-1.5 text-[12px] cursor-pointer"><input type="radio" name="sale" value="0" checked={zeroAction.sale === '0'} onChange={e => setZeroAction({...zeroAction, sale: e.target.value})} /> 판매정지 (0)</label>
                                    </div>
                                </div>
                                <div className="flex-1 bg-white p-3 rounded border border-slate-200 shadow-sm">
                                    <div className="text-[11px] font-bold text-slate-500 mb-2">쇼핑몰 재고 수량</div>
                                    <div className="flex gap-2">
                                        <label className="flex items-center gap-1.5 text-[12px] cursor-pointer"><input type="radio" name="stock" value="999" checked={zeroAction.stock === '999'} onChange={e => setZeroAction({...zeroAction, stock: e.target.value})} /> 유지 (999)</label>
                                        <label className="flex items-center gap-1.5 text-[12px] cursor-pointer"><input type="radio" name="stock" value="0" checked={zeroAction.stock === '0'} onChange={e => setZeroAction({...zeroAction, stock: e.target.value})} /> 품절 (0)</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="p-6 space-y-4 max-h-[40vh] overflow-y-auto custom-scrollbar bg-white">
                            {EXPORT_OPTIONS['estimate'].map((option, idx) => (
                                <div key={option.id} onClick={() => executeExport(option, zeroAction)} className={`border border-slate-200 rounded-xl p-4 cursor-pointer transition-all group ${option.theme.border} ${option.theme.bg}`}>
                                    <div className="flex items-center justify-between">
                                        <h3 className="font-bold text-slate-800 text-[14px]">
                                            <i className={`fas ${option.icon} ${option.theme.text} mr-2.5 w-5 text-center`}></i>
                                            {idx + 1}. {option.title}
                                        </h3>
                                        <i className={`fas ${option.type === 'copy' ? 'fa-copy' : 'fa-download'} text-slate-300 group-hover:${option.theme.text} transition-colors`}></i>
                                    </div>
                                    <p className="text-[12px] text-slate-500 mt-1.5 ml-8">{option.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const MappingCenterModal = ({
            onClose, cloudUrl, setCloudUrl, handleCloudSync,
            visibleMasterCols, toggleMasterCol, visibleUploadCols, setVisibleUploadCols, mappings, setMappings,
            masterLinks, setMasterLinks, handleResetMappings, showToast, parserProfiles, setParserProfiles
        }) => {
            const [activeTab, setActiveTab] = useState('display'); 
            const [customColInput, setCustomColInput] = useState('');
            const mappingFileTab = 'estimate';

            // 💡 스마트 파서 양식 생성기 State
            const [pConfig, setPConfig] = useState({ 
                headerLines: 1, 
                linesPerBlock: 4, 
                delimiters: "/()_",
                targetFields: ['품목코드', '품목명', '규격', '입고가', '구매처'] // 기본 제공 필터
            });
            const [pMappings, setPMappings] = useState({});
            const [pSample, setPSample] = useState(`전체 상품 (188개)\n\n04월 14일 18:00 마감\n\n플레인냉동식빵(삼립)\nEA / 744g/박스입수5개\n\n2,900 원\n04월 14일 18:00 마감\n\n한입떡볶이(송학)\nEA / 1kg/박스입수10개\n\n3,200 원`);
            const [pProfileName, setPProfileName] = useState("");

            useEffect(() => { document.body.style.overflow = 'hidden'; return () => document.body.style.overflow = 'auto'; }, []);

            const addCustomUploadCol = () => {
                if(!customColInput.trim()) return;
                const val = customColInput.trim();
                if ((visibleUploadCols[mappingFileTab] || []).includes(val)) return showToast('⚠️ 이미 추가된 항목입니다.');
                setVisibleUploadCols(prev => ({ ...prev, [mappingFileTab]: [...(prev[mappingFileTab] || []), val] }));
                setMappings(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [val]: val } }));
                setMasterLinks(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [val]: '' } }));
                setCustomColInput('');
            };

            const selectableMasterHeaders = useMemo(() => {
                const base = ['품목코드', '품목명', '규격', '입고가', '출고가', 'B단가', 'A판매가', 'B판매가', '도매가', '구매처', '브랜드', '상품정보', '정렬순서'];
                const userSelected = visibleMasterCols['estimate'] || [];
                return Array.from(new Set([...base, ...userSelected]));
            }, [visibleMasterCols]);

            // --- 스마트 파서 양식 로직 ---
            const cleanLines = useMemo(() => pSample.split('\n').map(l => l.trim()).filter(l => l !== ''), [pSample]);
            const { item1Lines, item2Lines } = useMemo(() => {
                return { 
                    item1Lines: cleanLines.slice(pConfig.headerLines, pConfig.headerLines + pConfig.linesPerBlock),
                    item2Lines: cleanLines.slice(pConfig.headerLines + pConfig.linesPerBlock, pConfig.headerLines + (pConfig.linesPerBlock * 2))
                };
            }, [cleanLines, pConfig.headerLines, pConfig.linesPerBlock]);

            const splitIntoChunks = (linesArray, delimitersStr) => {
                if (!linesArray || linesArray.length === 0) return [];
                if (!delimitersStr) return linesArray;
                const escapedDelimiters = delimitersStr.split('').map(s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('');
                const regex = new RegExp(`[${escapedDelimiters}]+`);
                return linesArray.flatMap(line => line.split(regex).map(s => s.trim()).filter(s => s !== ''));
            };

            const [parsedResults, setParsedResults] = useState([]);
            const [step, setStep] = useState(1);

            useEffect(() => { document.body.style.overflow = 'hidden'; return () => document.body.style.overflow = 'auto'; }, []);

            const executeParseAndMatch = () => {
                const profile = parserProfiles[selectedProfile];
                if (!profile) return showToast("⚠️ 양식을 선택해주세요.");
                if (!rawText.trim()) return showToast("⚠️ 텍스트를 입력해주세요.");

                const { config, chunkMappings } = profile;
                let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
                if (lines.length > config.headerLines) lines = lines.slice(config.headerLines);

                const escapeRegExp = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const escapedDelimiters = config.delimiters.split('').map(escapeRegExp).join('');
                const regex = new RegExp(`[${escapedDelimiters}]+`);

                const results = [];
                for (let i = 0; i < lines.length; i += config.linesPerBlock) {
                    const blockLines = lines.slice(i, i + config.linesPerBlock);
                    if (blockLines.length === 0) break;
                    const chunks = blockLines.flatMap(line => line.split(regex).map(s => s.trim()).filter(s => s !== ''));
                    
                    const rowData = { _id: crypto.randomUUID() };
                    let hasData = false;
                    chunks.forEach((chunk, idx) => {
                        const mappedField = chunkMappings[idx];
                        if (mappedField && mappedField !== 'DISCARD') { rowData[mappedField] = chunk; hasData = true; }
                    });

                    if (hasData) {
                        const extName = rowData['품목명'] || '';
                        let matchCode = ''; let matchStatus = '매칭불가';

                        if (extName) {
                            if (parserDict[extName]) { matchCode = parserDict[extName]; matchStatus = '일치'; }
                            else {
                                const exact = Object.values(masterProducts).find(m => m.품목명 === extName);
                                if (exact) { matchCode = exact.코드; matchStatus = '일치'; }
                                else {
                                    const similar = Object.values(masterProducts).find(m => m.품목명 && (m.품목명.includes(extName) || extName.includes(m.품목명)));
                                    if (similar) { matchCode = similar.코드; matchStatus = '유사'; }
                                }
                            }
                        }
                        rowData._matchCode = matchCode;
                        rowData._matchStatus = matchStatus;
                        results.push(rowData);
                    }
                }
                setParsedResults(results);
                setStep(2);
            };

            const handleCodeChange = (id, rawCodeStr) => {
                const match = rawCodeStr.match(/\[(.*?)\]/);
                const code = match ? match[1] : rawCodeStr;
                setParsedResults(prev => prev.map(r => r._id === id ? { ...r, _matchCode: code, _matchStatus: code ? '수동지정' : '매칭불가' } : r));
            };

            const handleFinalApply = () => {
                const validResults = parsedResults.filter(r => r._matchCode);
                if (validResults.length === 0) return showToast("⚠️ 적용할 유효한 데이터가 없습니다.");

                const newDict = { ...parserDict };
                validResults.forEach(r => {
                    if (r['품목명'] && r._matchCode) newDict[r['품목명']] = r._matchCode;
                });
                setParserDict(newDict);
                localStorage.setItem('parserDict_v750', JSON.stringify(newDict));

                applyParsedData(validResults);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[200] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[90vw] max-w-[1200px] h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">
                            <h2 className="font-black text-[16px]"><i className="fas fa-magic text-indigo-400 mr-2"></i>스마트 시세 텍스트 파서</h2>
                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>

                        {step === 1 ? (
                            <div className="p-6 flex-1 flex flex-col bg-slate-50 space-y-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center space-x-4">
                                    <label className="text-sm font-bold text-slate-700 w-32 shrink-0">1. 양식 선택</label>
                                    <select value={selectedProfile} onChange={(e) => setSelectedProfile(e.target.value)} className="flex-1 border border-slate-300 rounded-lg px-4 py-2.5 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                                        <option value="">-- 매핑센타에서 만든 양식을 선택하세요 --</option>
                                        {Object.keys(parserProfiles).map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex-1 flex flex-col">
                                    <label className="text-sm font-bold text-slate-700 mb-2 block">2. 텍스트 붙여넣기</label>
                                    <textarea value={rawText} onChange={(e) => setRawText(e.target.value)} className="w-full flex-1 bg-slate-800 text-slate-200 rounded-lg p-4 font-mono text-sm outline-none border-none resize-none" placeholder="여기에 카톡, 웹페이지에서 복사한 시세 텍스트를 붙여넣으세요." />
                                </div>
                                <button onClick={executeParseAndMatch} className="bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-black text-[15px] shadow-md transition-colors"><i className="fas fa-cogs mr-2"></i>텍스트 분리 및 마스터 매칭 시작</button>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
                                <div className="p-4 bg-white border-b border-slate-200 flex justify-between items-center shrink-0">
                                    <div>
                                        <h3 className="font-black text-slate-800">추출 및 매칭 검수</h3>
                                        <p className="text-xs text-slate-500">유사하거나 매칭불가인 항목은 올바른 마스터 상품을 지정해주세요.</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <span className="px-3 py-1 bg-emerald-100 text-emerald-800 text-[11px] font-bold rounded-full">일치 {parsedResults.filter(r=>r._matchStatus==='일치').length}</span>
                                        <span className="px-3 py-1 bg-amber-100 text-amber-800 text-[11px] font-bold rounded-full">유사/수동 {parsedResults.filter(r=>['유사','수동지정'].includes(r._matchStatus)).length}</span>
                                        <span className="px-3 py-1 bg-rose-100 text-rose-800 text-[11px] font-bold rounded-full">불가 {parsedResults.filter(r=>r._matchStatus==='매칭불가').length}</span>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                                    <datalist id="master-db-list">
                                        {Object.values(masterProducts).map(m => <option key={m.코드} value={`[${m.코드}] ${m.품목명} ${m.규격||''}`} />)}
                                    </datalist>

                                    <table className="w-full text-left bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm text-[12px]">
                                        <thead className="bg-slate-100 border-b border-slate-200">
                                            <tr>
                                                <th className="py-2.5 px-3 text-center w-20">상태</th>
                                                <th className="py-2.5 px-3 w-1/4">추출된 외부 상품명</th>
                                                <th className="py-2.5 px-3 w-1/5">추출된 기타 정보</th>
                                                <th className="py-2.5 px-3 bg-indigo-50 text-indigo-800"><i className="fas fa-link mr-1"></i>마스터 상품 강제 매핑</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {parsedResults.map((row) => {
                                                const isErr = row._matchStatus === '매칭불가';
                                                const isSim = row._matchStatus === '유사' || row._matchStatus === '수동지정';
                                                const badgeClass = isErr ? 'bg-rose-100 text-rose-700' : (isSim ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700');
                                                
                                                const otherInfo = Object.entries(row).filter(([k,v]) => !k.startsWith('_') && k !== '품목명' && v).map(([k,v]) => `${k}:${v}`).join(' | ');

                                                return (
                                                    <tr key={row._id} className={isErr ? 'bg-rose-50/30' : 'hover:bg-slate-50'}>
                                                        <td className="py-2 px-3 text-center"><span className={`px-2 py-0.5 rounded text-[11px] font-bold ${badgeClass}`}>{row._matchStatus}</span></td>
                                                        <td className="py-2 px-3 font-bold text-slate-700">{row['품목명']}</td>
                                                        <td className="py-2 px-3 text-slate-500 truncate max-w-[200px]" title={otherInfo}>{otherInfo}</td>
                                                        <td className="py-2 px-3 bg-indigo-50/20">
                                                            <input 
                                                                list="master-db-list" 
                                                                defaultValue={row._matchCode ? `[${row._matchCode}] ${masterProducts[row._matchCode]?.품목명||''}` : ''}
                                                                onBlur={(e) => handleCodeChange(row._id, e.target.value)}
                                                                placeholder="마스터 상품을 검색하여 선택하세요..."
                                                                className={`w-full px-2.5 py-1.5 border rounded outline-none focus:border-indigo-500 font-bold ${row._matchCode ? 'border-emerald-300 text-emerald-800 bg-emerald-50' : 'border-rose-300 bg-white'}`}
                                                            />
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-white border-t border-slate-200 flex justify-between">
                                    <button onClick={() => setStep(1)} className="px-6 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold">이전 단계</button>
                                    <button onClick={handleFinalApply} className="px-8 py-2 bg-indigo-600 text-white rounded-lg font-black shadow-md">선택된 {parsedResults.filter(r=>r._matchCode).length}건 메인 버퍼로 이관</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [masterProducts, setMasterProducts] = useState(() => { 
                try { const s = localStorage.getItem('merchMaster_v740') || localStorage.getItem('merchMaster_v731'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
            });
            const [managedItems, setManagedItems] = useState({});
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v740') || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { const s = localStorage.getItem('merchVisMaster_v740'); return s ? JSON.parse(s) : getInitialVisibleMasterCols(); });
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { const s = localStorage.getItem('merchVisUpload_v740'); return s ? JSON.parse(s) : getInitialVisibleUploadCols(); });
            const [mappings, setMappings] = useState(() => { const s = localStorage.getItem('merchMappings_v740'); return s ? JSON.parse(s) : getInitialMappings(); });
            const [masterLinks, setMasterLinks] = useState(() => { const s = localStorage.getItem('merchMasterLinks_v740'); return s ? JSON.parse(s) : getInitialMasterLinks(); });

            const [parserProfiles, setParserProfiles] = useState(() => { try { return JSON.parse(localStorage.getItem('parserProfiles_v750')) || {}; } catch(e){ return {}; }});
            const [parserDict, setParserDict] = useState(() => { try { return JSON.parse(localStorage.getItem('parserDict_v750')) || {}; } catch(e){ return {}; }});

            const [debouncedSearch, setDebouncedSearch] = useState(''); 
            const [showExportModal, setShowExportModal] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [showSmartParser, setShowSmartParser] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            
            const [isEstimateUploaded, setIsEstimateUploaded] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const activeProfileKey = 'estimate'; 
            
            const isMasterEmpty = Object.keys(masterProducts).length === 0;

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const saveMasterToLocal = useCallback((data) => {
                try { localStorage.setItem('merchMaster_v740', JSON.stringify(data)); } 
                catch(e) { showToast('⚠️ 스토리지 용량이 초과되었습니다. 작업 내역을 클라우드에 연동/백업하세요.'); }
            }, [showToast]);

            const handleResetMappings = () => {
                if(window.confirm("모든 설정이 초기화됩니다. 계속하시겠습니까?")) {
                    setMappings(getInitialMappings()); setMasterLinks(getInitialMasterLinks());
                    setVisibleMasterCols(getInitialVisibleMasterCols()); setVisibleUploadCols(getInitialVisibleUploadCols());
                    showToast("✅ 설정이 초기화되었습니다.");
                }
            };

            const handleCloudSync = async (type) => {
                if (!cloudUrl) return setAlertMsg("클라우드 URL이 설정되지 않았습니다.");
                showToast(`클라우드 ${type === 'upload' ? '백업' : '불러오기'} 시작...`);
                try {
                    if (type === 'upload') {
                        const payload = { type: "save", data: masterProducts };
                        const res = await fetch(cloudUrl, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error("Network Error"); showToast('✅ 클라우드 저장 성공');
                    } else {
                        const res = await fetch(cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        if (result.data) { setMasterProducts(result.data); saveMasterToLocal(result.data); }
                        showToast('✅ 클라우드 데이터 불러오기 성공');
                    }
                } catch (error) { setAlertMsg("통신 오류 발생. URL이나 시트 권한을 확인하세요."); }
            };

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F7') { e.preventDefault(); setShowExportModal(true); }
                    if (e.key === 'F3' || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f')) {
                        e.preventDefault();
                        if (document.activeElement) document.activeElement.blur();
                        setTimeout(() => { const searchInput = document.getElementById('main-search-input'); if (searchInput) { searchInput.focus(); searchInput.select(); } }, 50);
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); document.getElementById('btn-commit-master')?.click(); }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
                        if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); document.getElementById('cb-toggle-all')?.click(); }
                    }
                    if (e.key === 'Escape') { if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') document.activeElement.blur(); }
                };
                window.addEventListener('keydown', handleGlobalKeyDown); return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, []);

            useEffect(() => localStorage.setItem('merchVisMaster_v740', JSON.stringify(visibleMasterCols)), [visibleMasterCols]);
            useEffect(() => localStorage.setItem('merchVisUpload_v740', JSON.stringify(visibleUploadCols)), [visibleUploadCols]);
            useEffect(() => localStorage.setItem('merchMappings_v740', JSON.stringify(mappings)), [mappings]);
            useEffect(() => localStorage.setItem('merchMasterLinks_v740', JSON.stringify(masterLinks)), [masterLinks]);
            useEffect(() => localStorage.setItem('merchCloudUrl_v740', cloudUrl), [cloudUrl]);
            useEffect(() => localStorage.setItem('parserProfiles_v750', JSON.stringify(parserProfiles)), [parserProfiles]);

            const toggleMasterCol = useCallback((tabId, header) => {
                setVisibleMasterCols(prev => {
                    const list = prev[tabId] || [];
                    return { ...prev, [tabId]: list.includes(header) ? list.filter(h => h !== header) : [...list, header] };
                });
            }, []);

            const applyParsedData = useCallback((parsedResults) => {
                setIsProcessing(true);
                setProcessMsg('파싱 데이터 연산 중...');

                setTimeout(() => {
                    let newManaged = { ...managedItems };
                    
                    parsedResults.forEach(row => {
                        const code = row._matchCode;
                        if (!code) return;

                        if (!newManaged[code]) { newManaged[code] = { 코드: code, sources: {}, finalData: {} }; }
                        let mItem = newManaged[code];
                        if (!mItem.sources[activeProfileKey]) mItem.sources[activeProfileKey] = {};
                        
                        Object.keys(row).forEach(key => {
                            if (key.startsWith('_')) return; 
                            const val = row[key];
                            const isNumeric = NUMERIC_HEADERS.includes(masterLinks[activeProfileKey]?.[key]) || NUMERIC_HEADERS.includes(key);
                            mItem.sources[activeProfileKey][key] = isNumeric ? parseNum(val) : val;
                            if (mItem.finalData[key] === undefined) mItem.finalData[key] = isNumeric ? parseNum(val) : val;
                        });

                        const getValNum = (f) => Number(String(mItem.sources[activeProfileKey][f] || masterProducts[code]?.[f] || 0).replace(/,/g, '')) || 0;
                        const pIn = getValNum('입고가');
                        if (pIn > 0) {
                            const outsrc = getValNum('외주비'); const labor = getValNum('노무비'); const material = getValNum('재료비'); const div1 = getValNum('1종연산');
                            mItem.finalData['출고가'] = Math.round(((pIn + outsrc + labor) / 0.9) / 100) * 100;
                            if (div1 > 0) {
                                mItem.finalData['1입고'] = Math.round(((pIn + outsrc) / div1) / 100) * 100;
                                mItem.finalData['1출고'] = Math.round((((pIn + outsrc + labor) / div1 / 0.85) + material) / 100) * 100;
                            }
                        }
                    });

                    setManagedItems(newManaged);
                    setIsEstimateUploaded(true);
                    setIsProcessing(false);
                    setProcessMsg('');
                    showToast('✅ 스마트 파싱 데이터가 작업 화면에 로드되었습니다.');
                }, 100);
            }, [managedItems, masterProducts, masterLinks, showToast]);

            const handleFileUpload = async (e, expectedType) => {
                const files = Array.from(e.target.files);
                const targetInput = e.target; 

                if (files.length === 0) return;
                if (!window.XLSX) return setAlertMsg("엑셀 파서 라이브러리 로드 대기중입니다.");

                setIsProcessing(true);
                setProcessMsg('로딩 및 분석 중입니다...');
                await new Promise(resolve => setTimeout(resolve, 50)); 

                try {
                    let newMaster = { ...masterProducts }; let newManaged = { ...managedItems }; let totalCount = 0;
                    
                    for (const file of files) {
                        let mapKey = expectedType;
                        if (!mapKey) mapKey = 'master';

                        const data = await parseExcelRobust(file);
                        if (data.length === 0) continue;

                        const actualHeaders = Object.keys(data[0]);
                        const curMap = mappings[mapKey] || {};
                        const headerCache = createHeaderMap(actualHeaders, curMap);
                        
                        data.forEach(row => {
                            const codeKey = headerCache['품목코드'];
                            const code = codeKey ? row[codeKey] : undefined;
                            if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                            
                            if (mapKey === 'master') {
                                if (!newMaster[code]) newMaster[code] = { 코드: code };
                                MASTER_HEADERS.forEach(h => {
                                    const actualKey = headerCache[h] || h; 
                                    const val = row[actualKey];
                                    if (val !== undefined && val !== '') {
                                        newMaster[code][h] = NUMERIC_HEADERS.includes(h) ? parseNum(val) : val;
                                    }
                                });
                            } else {
                                if (!newManaged[code]) { newManaged[code] = { 코드: code, sources: {}, finalData: {} }; }
                                let mItem = newManaged[code];
                                if (!mItem.sources[mapKey]) mItem.sources[mapKey] = {};
                                
                                const nameKey = headerCache['품목명']; const specKey = headerCache['규격']; const vendorKey = headerCache['구매처'];

                                mItem.sources[mapKey]['품목명'] = nameKey ? row[nameKey] : '';
                                mItem.sources[mapKey]['규격'] = specKey ? row[specKey] : '';
                                mItem.sources[mapKey]['구매처'] = vendorKey ? row[vendorKey] : '';
                                
                                Object.keys(curMap).forEach(h => {
                                    if (!['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                        const actualKey = headerCache[h];
                                        if(actualKey) {
                                            const val = row[actualKey];
                                            if (val !== undefined && val !== '') {
                                                const isNumeric = NUMERIC_HEADERS.includes(masterLinks[mapKey]?.[h]) || NUMERIC_HEADERS.includes(h);
                                                mItem.sources[mapKey][h] = isNumeric ? parseNum(val) : val;
                                                if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNumeric ? parseNum(val) : val;
                                            }
                                        }
                                    }
                                });

                                if (mapKey === 'estimate') {
                                    const getValNum = (f) => Number(String(mItem.sources[mapKey][f] || newMaster[code]?.[f] || 0).replace(/,/g, '')) || 0;
                                    const pIn = getValNum('입고가');
                                    if (pIn > 0) {
                                        const outsrc = getValNum('외주비'); const labor = getValNum('노무비'); const material = getValNum('재료비'); const div1 = getValNum('1종연산');
                                        mItem.finalData['출고가'] = Math.round(((pIn + outsrc + labor) / 0.9) / 100) * 100;
                                        if (div1 > 0) {
                                            mItem.finalData['1입고'] = Math.round(((pIn + outsrc) / div1) / 100) * 100;
                                            mItem.finalData['1출고'] = Math.round((((pIn + outsrc + labor) / div1 / 0.85) + material) / 100) * 100;
                                        }
                                    }
                                }
                            }
                            totalCount++;
                        });
                        
                        if (mapKey === 'estimate') setIsEstimateUploaded(true);
                    }
                    
                    setMasterProducts(newMaster); setManagedItems(newManaged); saveMasterToLocal(newMaster); 
                    if(totalCount > 0) showToast(`✅ 파싱 완료 (${totalCount}건)`);
                } catch(error) { setAlertMsg("❌ 파싱 오류 발생. 엑셀 파일을 확인하세요."); } 
                finally { if (targetInput) targetInput.value = ''; setIsProcessing(false); setProcessMsg(''); }
            };

            const handleCommitToMaster = () => {

                                                    <div className="flex items-center gap-2 pl-1">
                                                        {isEstimateUploaded && <input id="cb-toggle-all" type="checkbox" className="rounded w-3.5 h-3.5" checked={selectedRows.size === fullDisplayRows.length && fullDisplayRows.length > 0} onChange={toggleAllRows} />}
                                                        <span>상품정보 (코드/품명/규격)</span>
                                                    </div>
                                                </th>
                                                {visibleMasterCols['estimate']?.map(h => (
                                                    <th key={`pm-${h}`} className="sticky top-0 z-30 bg-[#eff6ff] px-2 py-3 border-r border-b border-blue-100 text-center text-blue-800 w-[90px] min-w-[90px]">
                                                        [M] {h}
                                                    </th>
                                                ))}
                                                {visibleUploadCols['estimate'].map(h => (
                                                    <th key={`pu-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-3 border-r border-b border-slate-200 text-center text-slate-600 ${getCellWidthClass(h)}`}>
                                                        {h}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-slate-700">
                                            {displayRows.length === 0 ? <tr><td colSpan="50" className="p-16 text-center text-slate-400 bg-white"><i className="fas fa-folder-open text-4xl mb-4 block"></i>데이터가 없습니다.</td></tr> : displayRows.map((row, idx) => {
                                                const isSel = selectedRows.has(row.코드); 
                                                const baseBg = isEstimateUploaded ? 'bg-white' : 'bg-[#faf9f5]';
                                                const hoverBg = isEstimateUploaded ? 'hover:bg-slate-50' : 'hover:bg-[#f0ece1]';
                                                const bg = isSel ? 'bg-indigo-50/50' : `${baseBg} ${hoverBg}`;
                                                
                                                const mItem = masterProducts[row.코드] || {}; 
                                                const uploadName = row.sources?.[activeProfileKey]?.['품목명'] || ''; 
                                                const uploadSpec = row.sources?.[activeProfileKey]?.['규격'] || ''; 
                                                const dName = uploadName || mItem.품목명 || '[미등록]';
                                                const dSpec = uploadSpec || mItem.규격 || '';

                                                return (
                                                    <tr key={row.코드} className={`group ${bg}`}>
                                                        <td className={`sticky z-20 px-3 py-2 border-r border-[#edebe3] w-[240px] shadow-[4px_0_8px_-2px_rgba(0,0,0,0.04)] transition-colors ${isSel ? 'bg-indigo-50/50' : 'bg-[#faf9f5] group-hover:bg-[#f0ece1]'}`} style={{left: 0}}>
                                                            <div className="flex gap-3 items-center">
                                                                {isEstimateUploaded && <input type="checkbox" className="w-3.5 h-3.5 text-indigo-600 shrink-0" checked={isSel} onChange={() => { const n = new Set(selectedRows); n.has(row.코드)?n.delete(row.코드):n.add(row.코드); setSelectedRows(n); }} />}
                                                                <div className="flex flex-col truncate w-full">
                                                                    <span className="text-[9.5px] font-mono text-indigo-400 mb-0.5">{row.코드}</span>
                                                                    <div className="flex items-center gap-1.5 w-full truncate">
                                                                        <span className={`text-[13px] font-extrabold truncate ${!mItem.품목명 && !uploadName ? 'text-rose-500' : 'text-slate-800'}`}>{dName}</span>
                                                                        {dSpec && <><span className="text-slate-300 text-[10px] shrink-0">|</span><span className="text-[11px] text-slate-500 truncate shrink-0">{dSpec}</span></>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        {visibleMasterCols['estimate']?.map(h => (
                                                            <td key={`pm-d-${h}`} className="px-2 py-1.5 border-r border-[#edebe3] text-right font-bold text-[#6b675e] bg-[#faf9f5]">
                                                                {mItem[h] !== undefined && mItem[h] !== '' ? (NUMERIC_HEADERS.includes(h) ? Number(mItem[h]).toLocaleString() : mItem[h]) : '-'}
                                                            </td>
                                                        ))}
                                                        {visibleUploadCols['estimate'].map(h => renderUploadEditableCell(row, idx, h, activeProfileKey, `r-p-f-${h}`))}
                                                    </tr>
                                                );
                                            })}
                                            <tr>
                                                <td colSpan="50" className="h-[120px] bg-slate-50 border-t border-slate-200 flex items-center justify-center">
                                                    {hiddenCount > 0 ? (
                                                        <div className="text-[12px] font-bold text-slate-500 bg-white px-6 py-2 rounded-full border shadow-sm">
                                                            <i className="fas fa-bolt text-amber-500 mr-2"></i>쾌적한 환경을 위해 상위 {maxVisibleRows}건만 표시됩니다. (숨겨진 항목: {hiddenCount}건) - 검색을 이용하세요.
                                                        </div>
                                                    ) : (
                                                        <div className="text-[12px] font-bold text-slate-400">- 끝 -</div>
                                                    )}
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {showExportModal && <ExportModal onClose={() => setShowExportModal(false)} fullDisplayRows={fullDisplayRows} currentExportTitle={currentExportTitle} executeExport={executeExport} />}
                    {showSettings && <MappingCenterModal onClose={() => setShowSettings(false)} cloudUrl={cloudUrl} setCloudUrl={setCloudUrl} visibleMasterCols={visibleMasterCols} toggleMasterCol={toggleMasterCol} visibleUploadCols={visibleUploadCols} setVisibleUploadCols={setVisibleUploadCols} mappings={mappings} setMappings={setMappings} masterLinks={masterLinks} setMasterLinks={setMasterLinks} handleCloudSync={handleCloudSync} handleResetMappings={handleResetMappings} showToast={showToast} parserProfiles={parserProfiles} setParserProfiles={setParserProfiles} />}
                    {showSmartParser && <SmartParserExecutionModal onClose={() => setShowSmartParser(false)} parserProfiles={parserProfiles} parserDict={parserDict} setParserDict={setParserDict} masterProducts={masterProducts} applyParsedData={applyParsedData} showToast={showToast} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
