<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 타이틀 버전도 수동으로 맞춰주시면 좋습니다 -->
    <title>ONEAPP MerchOps - Main Workspace [v1.6.7]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
    <div id="root"></div>
    <script type="text/babel">
        // ==========================================
        // 🚀 앱 버전 및 업데이트 일자 관리 (패치 시 여기서 수정하세요)
        // ==========================================
        const APP_VERSION = "v1.6.7";
        const LAST_UPDATED = "2026.05.09 16:50";

        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open('MerchOpsDB', 1);
            req.onupgradeneeded = (e) => { 
                if (!e.target.result.objectStoreNames.contains('store')) {
                    e.target.result.createObjectStore('store'); 
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const setIDB = async (key, val) => { 
            const db = await initIDB(); 
            return new Promise((res, rej) => { 
                const tx = db.transaction('store', 'readwrite'); 
                tx.objectStore('store').put(val, key); 
                tx.oncomplete = res; 
                tx.onerror = rej; 
            }); 
        };

        const getIDB = async (key) => { 
            const db = await initIDB(); 
            return new Promise((res, rej) => { 
                const tx = db.transaction('store', 'readonly'); 
                const req = tx.objectStore('store').get(key); 
                req.onsuccess = () => res(req.result); 
                req.onerror = rej; 
            }); 
        };

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티
        // ==========================================
        const MASTER_HEADERS = ["창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"];
        const NUMERIC_HEADERS = ["안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"];
        
        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        const getInitialMappings = () => ({
            master: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' },
            estimate: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가', '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고' }
        });
        const getInitialMasterLinks = () => ({ estimate: { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' }});

        const generateUUID = () => crypto?.randomUUID?.() || 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); });
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (['구매처','거래처명','일자','간단설명','지시사항','상품정보','적요2'].includes(h)) return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (['품목명','상품명','카탈로그','견적서'].includes(h)) return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (['단위','창고'].includes(h)) return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => { 
            for(let o of objList) { 
                if(!o) continue; 
                for(let k of keys) { 
                    if(o[k] !== undefined && o[k] !== null && o[k] !== '') return parseNum(o[k]); 
                } 
            } 
            return 0; 
        };
        const getFirstValidStr = (objList, keys) => { 
            for(let o of objList) { 
                if(!o) continue; 
                for(let k of keys) { 
                    if(o[k] !== undefined && o[k] !== null && o[k] !== '') return o[k]; 
                } 
            } 
            return ''; 
        };
        const isValidSubItemCode = (code) => { 
            const s = String(code||'').trim(); 
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && !s.toLowerCase().includes('undefined') && !s.toLowerCase().includes('null'); 
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 로직
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) {
                return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };
            }

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchRule = (rStr, tStr) => rStr === '*' || rStr.toLowerCase().split(/[,./|\s]+/).map(s=>s.trim()).filter(Boolean).some(s => tStr === s || tStr.includes(s) || (!isNaN(s) && !isNaN(tStr) && Number(s)===Number(tStr)));
            
            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchRule(r.whCode, whCode) && matchRule(r.unit, unitStr)) {
                    let score = (r.whCode !== '*' ? 2 : 0) + (r.unit !== '*' ? 1 : 0);
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };
            let calcOutPrice = Math.round((appliedRule.type === 'divide' ? totalCost / (1 - Math.min(appliedRule.rate, 99.99)/100) : totalCost * (1 + appliedRule.rate/100)) / 100) * 100;
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice, '시중가': calcOutPrice };
            const pOut = parseNum(currentFinalData?.['출고가']);
            const mIn = parseNum(mItem?.['입고가']);
            const mOut = parseNum(mItem?.['출고가']);

            if (pOut > 0 && !forceRecalc) {
                newFinalData['출고가'] = Math.round(pOut/100)*100;
            } else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) {
                newFinalData['출고가'] = Math.round(mOut/100)*100;
            } else {
                newFinalData['출고가'] = calcOutPrice;
            }

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']);
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let c1Out = Math.round((newFinalData['출고가'] / div1) + parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']));
                newFinalData['1출고'] = Math.round((isFinite(c1Out) ? c1Out : 0) / 100) * 100; 
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const map = {};
            if(!mappingConfig) return map;
            Object.keys(mappingConfig).forEach(field => {
                const kws = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matched = actualHeaders.find(h => h && kws.some(kw => String(h).toLowerCase().replace(/\s/g, '').includes(kw)));
                if(matched) map[field] = matched;
            });
            return map;
        };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 미로드"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = window.XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(!jsonAll.length) return resolve([]);
                    
                    let hdrIdx = 0;
                    let endIdx = jsonAll.length - 1;

                    for (let i=0; i<Math.min(15, jsonAll.length); i++) {
                        if (['코드','품명','상품','1코드'].some(k => jsonAll[i].join('').replace(/\s/g, '').includes(k))) { hdrIdx = i; break; }
                    }
                    const headers = jsonAll[hdrIdx] || [];

                    while (endIdx > hdrIdx) {
                        const rStr = (jsonAll[endIdx]||[]).map(v => v != null ? String(v).replace(/\s/g, '') : '').join('');
                        if (rStr === '' || (['출력','시간','합계','총계'].some(k => rStr.includes(k)) && (jsonAll[endIdx]||[]).filter(v=>v).length <= 4)) {
                            endIdx--; 
                        } else {
                            break;
                        }
                    }

                    const parsedData = jsonAll.slice(hdrIdx + 1, endIdx + 1).filter(r => r && r.some(v => v != null && String(v).trim() !== '')).map(row => {
                        const obj = {}; 
                        headers.forEach((h, i) => { if(h) obj[h] = row[i]; }); 
                        return obj;
                    });
                    
                    resolve(parsedData);
                } catch(err) { 
                    reject(err); 
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 3. 상태 관리 (Hooks)
        // ==========================================
        const useMerchConfig = () => {
            const safeParse = (key, defFn, migrationFn) => { 
                const s = localStorage.getItem(key); 
                let p = s ? JSON.parse(s) : null; 
                if (!p || !p.estimate) p = defFn(); 
                if (migrationFn) p = migrationFn(p); 
                return p; 
            };

            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || 'https://script.google.com/macros/s/AKfycbz7qZ5eM-U_qyaoP5amDfMqhZ-IXMjoBDWGu3qWI1D0JTYGINB64yYaLRLrkqWpHa88-w/exec');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => safeParse('merchVisMaster_v870', getInitialVisibleMasterCols, p => { 
                if(p.estimate.includes('카테고리')) p.estimate = p.estimate.map(h => h === '카테고리' ? '견적서' : h); 
                return p; 
            }));
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => safeParse('merchVisUpload_v870', getInitialVisibleUploadCols, p => { 
                if(p.estimate.includes('카테고리')) p.estimate = p.estimate.map(h => h === '카테고리' ? '견적서' : h); 
                if(!p.estimate.includes('품목명')) p.estimate.unshift('품목명'); 
                if(!p.estimate.includes('규격')) p.estimate.splice(1, 0, '규격'); 
                return p; 
            }));
            
            const [mappings, setMappings] = useState(() => safeParse('merchMappings_v870', getInitialMappings, p => { 
                if(!p.estimate['창고']) p.estimate['창고'] = '창고, 창고코드'; 
                if(!p.master['창고']) p.master['창고'] = '창고, 창고코드'; 
                if(p.estimate['카테고리'] !== undefined) { p.estimate['견적서'] = p.estimate['카테고리'] + ', 견적서'; delete p.estimate['카테고리']; } 
                return p; 
            }));
            
            const [masterLinks, setMasterLinks] = useState(() => safeParse('merchMasterLinks_v870', getInitialMasterLinks, p => { 
                if(p.estimate['창고'] === undefined) p.estimate['창고'] = '창고'; 
                if(p.estimate['카테고리'] !== undefined) { p.estimate['견적서'] = '견적서'; delete p.estimate['카테고리']; } 
                return p; 
            }));
            
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                const defs = [
                    {id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide'},
                    {id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide'},
                    {id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide'},
                    {id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide'},
                    {id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide'},
                    {id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide'},
                    {id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide'}
                ];
                try { 
                    const p = JSON.parse(s); 
                    if(p && p.length > 1) return p.map(r => ({...r, whCode: r.whCode || '*', unit: r.unit || '*'})); 
                } catch(e) {} 
                return defs;
            });

            useEffect(() => { 
                localStorage.setItem('merchCloudUrl_v870', cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules)); 
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules]);
            
            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            useEffect(() => { 
                getIDB('merchMaster_v870').then(d => d && setMasterProducts(d)).catch(console.error); 
                try { 
                    const l = JSON.parse(localStorage.getItem('merchHistory_v870')); 
                    if(l) setHistoryLogs(l); 
                } catch(e) {} 
            }, []);

            useEffect(() => { 
                const h = (e) => { 
                    if(e.key === 'merchMaster_sync_trigger') {
                        getIDB('merchMaster_v870').then(d => d && setMasterProducts(d)).catch(console.error); 
                    }
                }; 
                window.addEventListener('storage', h); 
                return () => window.removeEventListener('storage', h); 
            }, []);

            const saveMaster = useCallback(async (data) => { 
                setMasterProducts(data); 
                try { 
                    await setIDB('merchMaster_v870', data); 
                    localStorage.setItem('merchMaster_sync_trigger', Date.now()); 
                } catch(e) {} 
            }, []);

            const addLogs = useCallback((newLogs) => {
                setHistoryLogs(p => { 
                    const c = [...newLogs, ...p].slice(0, 2000); 
                    localStorage.setItem('merchHistory_v870', JSON.stringify(c)); 
                    return c; 
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMaster, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs: addLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            
            const [selectedCatalogs, setSelectedCatalogs] = useState(() => { 
                try { 
                    return new URLSearchParams(window.location.search).get('catalog') ? [new URLSearchParams(window.location.search).get('catalog')] : []; 
                } catch(e) { return []; } 
            }); 
            const [selectedCategories, setSelectedCategories] = useState([]);
            
            const [modals, setModals] = useState({ export: false, settings: false, review: false, category: false });
            const [isExporting, setIsExporting] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [process, setProcess] = useState({ is: false, msg: '' });
            
            const showToast = useCallback((msg) => { 
                setToastMsg(msg); 
                setTimeout(() => setToastMsg(''), 3000); 
            }, []);
            
            const toggleModal = useCallback((key, val) => {
                setModals(p => ({...p, [key]: val}));
            }, []);
            
            useEffect(() => { 
                try { 
                    if(new URLSearchParams(window.location.search).has('catalog')) {
                        window.history.replaceState({}, document.title, window.location.pathname); 
                    }
                } catch(e) {} 
            }, []);

            return { 
                selectedRows, setSelectedRows, 
                globalSearch, setGlobalSearch, 
                selectedCatalogs, setSelectedCatalogs, 
                selectedCategories, setSelectedCategories, 
                modals, toggleModal, 
                isExporting, setIsExporting, 
                alertMsg, setAlertMsg, 
                toastMsg, setToastMsg, 
                process, setProcess, 
                showToast 
            };
        };

        // ==========================================
        // 🧩 4. 액션/이벤트 훅
        // ==========================================
        const useMerchActions = (config, data, ui, fullDisplayRows) => {
            
            const handleCloudSync = async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL을 셋팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 백업' : '불러오기'} 시작...`);
                ui.setProcess({ is: true, msg: '클라우드 연동 중...' });
                try {
                    if (type === 'upload') {
                        const payload = { 
                            type: "syncAll", 
                            data: { 
                                master: data.masterProducts, 
                                dict: JSON.parse(localStorage.getItem('parserDict_v870') || '{}'), 
                                rules: config.marginRules 
                            } 
                        };
                        const res = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
                        if (res.status !== 'success') throw new Error(res.message);
                        ui.showToast('✅ 클라우드 저장 성공');
                    } else {
                        const res = await fetch(config.cloudUrl, { method: 'GET' }).then(r=>r.json());
                        if (res.status === 'success' && res.data) { 
                            if (res.data.master) data.setMasterProducts(res.data.master);
                            if (res.data.dict) localStorage.setItem('parserDict_v870', JSON.stringify(res.data.dict));
                            if (res.data.rules?.length) config.setMarginRules(res.data.rules);

            }, [initialVal, foc]);
            
            const isDiff = lnkF && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNum;
            
            const keyNav = (e) => {
                if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key)) {
                    if (e.key === 'ArrowLeft' && e.target.selectionStart !== 0) return; 
                    if (e.key === 'ArrowRight' && e.target.selectionEnd !== e.target.value.length) return;
                    if (['ArrowUp','ArrowDown','Enter'].includes(e.key)) e.preventDefault(); 
                    e.target.blur();
                    
                    const td = e.target.closest('td'), tr = td.closest('tr'), trs = Array.from(tr.closest('tbody').querySelectorAll('tr.group')), tds = Array.from(tr.querySelectorAll('td:has(input[type="text"])'));
                    let nr = trs.indexOf(tr), nc = tds.indexOf(td);
                    
                    if (e.key === 'ArrowUp') nr = Math.max(0, nr-1); 
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nr = Math.min(trs.length-1, nr+1);
                    if (e.key === 'ArrowLeft') { e.preventDefault(); nc = Math.max(0, nc-1); } 
                    if (e.key === 'ArrowRight') { e.preventDefault(); nc = Math.min(tds.length-1, nc+1); }
                    
                    if (nr !== trs.indexOf(tr) || nc !== tds.indexOf(td)) { 
                        const nIn = e.key === 'Enter' ? (trs[nr]?.querySelector('input[data-field="입고가"]')||trs[nr]?.querySelector('td input[type="text"]')) : Array.from(trs[nr]?.querySelectorAll('td:has(input[type="text"])')||[])[nc]?.querySelector('input'); 
                        if(nIn) { nIn.focus(); setTimeout(() => nIn.select(), 0); } 
                    }
                }
            };
            
            return (
                <td className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(lnkF || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>

                    let s = !m ? 'new' : (oP === 0 || nP === 0 || oP === nP) ? 'same' : (nP > oP) ? 'up' : 'down';
                    res[s]++; 
                    res.list.push({ 코드: r.코드, 품명: r.finalData?.['품목명'] || m?.품목명 || '', 규격: r.finalData?.['규격'] || m?.규격 || '', 기존: oP, 새: nP, 차액: nP - oP, 상태: s });
                });
                res.list.sort((a, b) => Math.abs(b.차액) - Math.abs(a.차액)); 
                return res;
            }, [tgts, data]);
            
            const fList = filter === 'all' ? an.list : an.list.filter(i => i.상태 === filter);
            
            const fBtn = (id, lbl, cnt, clr, ic) => (
                <div onClick={() => setFilter(id)} className={`cursor-pointer border p-3 rounded-xl flex flex-col items-center justify-center transition-all ${filter === id ? `bg-${clr}-500 border-${clr}-500 text-white` : `bg-white border-${clr}-200 hover:bg-${clr}-50`}`}>
                    <div className={`text-[11px] font-bold mb-1 ${filter === id ? 'text-white/80' : `text-${clr}-500`}`}><i className={`fas ${ic} mr-1`}></i>{lbl}</div>
                    <div className={`font-black text-xl ${filter === id ? 'text-white' : `text-${clr}-700`}`}>{cnt}<span className="text-[11px] ml-1">건</span></div>
                </div>
            );
            
            return (
                <ModalFrame title="작업 프리뷰" icon="fa-search-dollar" onClose={onClose} footer={<><button onClick={onClose} className="px-5 py-2.5 bg-slate-100 rounded-lg font-bold">닫기</button><button onClick={()=>{onConfirm(tgts.map(r=>r.코드));onClose();}} className="px-6 py-2.5 bg-indigo-600 text-white rounded-lg font-black"><i className="fas fa-save mr-1.5"></i>저장</button></>}>
                    <div className="p-6 flex flex-col flex-1 overflow-hidden bg-slate-50">
                        <div className="grid grid-cols-5 gap-3 mb-4 shrink-0">
                            {fBtn('all','전체',tgts.length,'slate','fa-list')}
                            {fBtn('up','인상',an.up,'rose','fa-arrow-up')}
                            {fBtn('down','인하',an.down,'blue','fa-arrow-down')}
                            {fBtn('new','신규',an.new,'emerald','fa-star')}
                            {fBtn('same','동결',an.same,'slate','fa-equals')}
                        </div>
                        <div className="flex-1 overflow-auto bg-white rounded-xl border">
                            <table className="w-full text-left text-[12px]">
                                <thead className="bg-white sticky top-0 border-b">
                                    <tr>
                                        <th className="px-4 py-2 w-16 text-center">상태</th>
                                        <th className="px-4 py-2">코드</th>
                                        <th className="px-4 py-2 w-full">품명</th>
                                        <th className="px-4 py-2 text-right">기존가</th>
                                        <th className="px-4 py-2 text-right text-indigo-600">새단가</th>
                                        <th className="px-4 py-2 text-right">차액</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {fList.map((i, x) => (
                                        <tr key={x}>
                                            <td className="px-4 py-2 text-center">
                                                {i.상태 === 'up' ? <span className="bg-rose-100 text-rose-600 px-1 rounded text-[10px]">인상</span> : 
                                                 i.상태 === 'down' ? <span className="bg-blue-100 text-blue-600 px-1 rounded text-[10px]">인하</span> : 
                                                 i.상태 === 'new' ? <span className="bg-emerald-100 text-emerald-600 px-1 rounded text-[10px]">신규</span> : 
                                                 <span className="text-slate-400">-</span>}
                                            </td>
                                            <td className="px-4 py-2 font-mono text-[11px]">{i.코드}</td>
                                            <td className="px-4 py-2 font-bold truncate">{i.품명}</td>
                                            <td className="px-4 py-2 text-right text-slate-500">{i.기존 > 0 ? i.기존.toLocaleString() : '-'}</td>
                                            <td className="px-4 py-2 text-right font-black text-indigo-600">{i.새 > 0 ? i.새.toLocaleString() : '-'}</td>
                                            <td className="px-4 py-2 text-right font-bold">
                                                {i.차액 > 0 ? <span className="text-rose-500">+{i.차액.toLocaleString()}</span> : 
                                                 i.차액 < 0 ? <span className="text-blue-500">{i.차액.toLocaleString()}</span> : '-'}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </ModalFrame>
            );
        };

        const SearchBar = ({ value, onChange, placeholder }) => {
            const [localVal, setLocalVal] = useState(value); 
            const inputRef = useRef(null); 
            const timerRef = useRef(null);
            
            useEffect(() => setLocalVal(value), [value]);
            
            useEffect(() => () => { 
                if (timerRef.current) clearTimeout(timerRef.current); 
            }, []);
            
            const handleChange = (e) => { 
                const val = e.target.value; 
                setLocalVal(val); 
                if (timerRef.current) clearTimeout(timerRef.current); 
                timerRef.current = setTimeout(() => onChange(val), 300); 
            };
            
            return (
                <div className="relative w-[180px] lg:w-[240px] h-9 shrink-0" onClick={() => {inputRef.current?.focus(); inputRef.current?.select();}}>
                    <input 
                        id="main-search-input" 
                        type="text" 
                        ref={inputRef} 
                        placeholder={placeholder || "결과 내 검색 (단어 조합 / F3)"}

                    />

        const MainToolbar = React.memo(({ st, acts, cats, ests }) => {
            const btnCls = "h-8 px-2.5 rounded-lg text-[11px] font-bold shadow-sm transition-colors flex items-center border";
            const btnGroup = "flex items-center gap-1.5 p-1.5 rounded-xl shrink-0 border";
            
            return (
                <div className="px-6 pt-4 pb-3 flex items-center justify-between gap-4 overflow-x-auto custom-scrollbar">
                    <div className={`${btnGroup} bg-indigo-50/50 border-indigo-100`}>
                        <MultiSelectDropdown title="카탈로그" icon="fa-folder-open" themeClass="border-indigo-200 text-indigo-700" options={cats} selected={st.selectedCatalogs} onChange={v => acts.handleLoadWorkspaces(v, st.selectedCategories)} />
                        <div className="w-px h-5 bg-indigo-200 mx-0.5"></div>
                        <button onClick={() => window.location.href='https://oneapp.orderz.co.kr/MerchOps/vp1.3'} className={`${btnCls} bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50`}><i className="fas fa-plus-square mr-1.5"></i>만들기</button>
                    </div>
                    
                    <div className={`${btnGroup} bg-blue-50/50 border-blue-100`}>
                        <MultiSelectDropdown title="견적서" icon="fa-file-invoice" themeClass="border-blue-200 text-blue-700" options={ests} selected={st.selectedCategories} onChange={v => acts.handleLoadWorkspaces(st.selectedCatalogs, v)} />
                        <div className="w-px h-5 bg-blue-200 mx-0.5"></div>
                        <button onClick={() => st.toggleModal('category', true)} className={`${btnCls} bg-white text-blue-600 border-blue-200 hover:bg-blue-50`}><i className="fas fa-save mr-1.5"></i>저장</button>
                        
                        {st.selectedCategories.length > 0 && (
                            <>
                                <button onClick={acts.handleAddToCategory} className={`${btnCls} bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50`}><i className="fas fa-plus-circle mr-1.5"></i>추가</button>
                                <button onClick={acts.handleRemoveFromCategory} className={`${btnCls} ${st.selectedRows.size ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-white text-slate-300 border-slate-200'}`}><i className="fas fa-trash-alt mr-1.5"></i>제외</button>
                            </>
                        )}
                    </div>
                    
                    <div className={`${btnGroup} bg-emerald-50/50 border-emerald-100`}>
                        <label className={`cursor-pointer ${btnCls} bg-white text-emerald-700 border-emerald-200 hover:bg-emerald-50`}>
                            <i className="fas fa-file-excel mr-1.5"></i>불러오기
                            <input type="file" className="hidden" multiple onChange={e => acts.handleFileUpload(e, 'estimate')} />
                        </label>
                        <button onClick={acts.handleExportCurrentView} className={`${btnCls} bg-white text-emerald-700 border-emerald-200 hover:bg-emerald-50`}><i className="fas fa-download mr-1.5"></i>다운로드</button>
                    </div>
                    
                    <div className="flex-1 min-w-[10px]"></div>
                    
                    <div className="flex items-center gap-2 shrink-0">
                        {(st.isEstimateUploaded || st.selectedCatalogs.length > 0 || st.selectedCategories.length > 0) && (
                            <>
                                {st.isEstimateUploaded && (
                                    <>
                                        <button onClick={acts.handleForceRecalc} className={`h-9 px-3 rounded-lg text-[12px] font-bold shadow-sm bg-rose-50 text-rose-600 border border-rose-200`}><i className="fas fa-calculator mr-1.5"></i>마진룰</button>
                                        <button onClick={acts.handleRemoveFromWorkspace} className={`h-9 px-3 rounded-lg text-[12px] font-bold shadow-sm border ${st.selectedRows.size ? 'bg-slate-50 text-slate-600 border-slate-200' : 'bg-white text-slate-300 border-slate-200'}`}><i className="fas fa-eye-slash mr-1.5"></i>숨기기</button>
                                    </>
                                )}
                                <button onClick={() => st.toggleModal('review', true)} disabled={!st.fullDisplayRows.length} className={`h-9 px-5 rounded-lg text-[12px] font-black shadow-sm text-white ${st.fullDisplayRows.length ? 'bg-slate-800' : 'bg-slate-300'}`}><i className="fas fa-check-circle mr-1.5"></i>완료 (F8)</button>
                                <div className="w-px h-6 bg-slate-300 mx-1"></div>
                            </>
                        )}
                        <button onClick={acts.handleReset} className="w-9 h-9 rounded-lg bg-white border border-slate-300 shadow-sm text-slate-500 hover:bg-slate-100 shrink-0"><i className="fas fa-redo-alt"></i></button>
                        <SearchBar value={st.globalSearch} onChange={st.setGlobalSearch} />
                    </div>
                </div>
            );
        });

        const MemoizedTableRow = React.memo(({ r, isSel, bg, mItem, isUp, visM, visU, mLnks, onTgl, onUpd }) => {
            const uN = r.finalData?.['품목명'] ?? r.sources?.estimate?.['품목명'] ?? '';
            const uS = r.finalData?.['규격'] ?? r.sources?.estimate?.['규격'] ?? '';
            
            return (
                <tr className={`group h-[40px] ${bg}`}>
                    <td className={`sticky z-20 px-3 py-2 border-r border-[#edebe3] min-w-[280px] w-[280px] ${isSel ? 'bg-indigo-50/50' : 'bg-[#faf9f5] group-hover:bg-[#f0ece1]'}`} style={{left:0}}>
                        <div className="flex gap-2 items-center w-full min-w-0">
                            {isUp && (
                                <input 
                                    type="checkbox" 
                                    className="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 shrink-0 cursor-pointer" 
                                    checked={isSel} 
                                    onChange={() => onTgl(r.코드)} 
                                    onKeyDown={e => {
                                        if(e.key === 'Enter') {
                                            e.preventDefault(); 
                                            const i = e.target.closest('tr').querySelector('td input[type="text"]'); 
                                            if(i) { i.focus(); i.select(); }
                                        }
                                    }} 
                                />
                            )}
                            <div className="flex flex-col min-w-0 w-full ml-1">
                                <span className="text-[10px] font-mono mb-0.5 truncate text-indigo-400">{r.코드}</span>
                                <div className="flex items-center w-full min-w-0">
                                    {(isUp && r._isMasterLoad) && <span className="text-[12px] font-black text-indigo-600 mr-1.5" title="마스터 직접 호출">[M]</span>}
                                    <span className={`text-[13px] font-extrabold truncate ${!mItem.품목명 ? 'text-rose-500' : 'text-slate-800'}`}>{uN || mItem.품목명 || '[미등록]'}</span>
                                    {(uS || mItem.규격) && <span className="text-[11px] text-slate-400 truncate ml-1 max-w-[40%]">({uS || mItem.규격})</span>}
                                </div>
                            </div>
                        </div>
                    </td>
                    
                    {!isUp ? visM.map(h => (
                        <td key={`id-${h}`} className={`px-2 py-1.5 border-r border-[#edebe3] text-[#6b675e] ${getCellWidthClass(h)} ${NUMERIC_HEADERS.includes(h) ? 'text-right font-bold tracking-tight' : 'text-center'}`}>
                            <div className="truncate">{mItem[h] !== undefined && mItem[h] !== '' ? (NUMERIC_HEADERS.includes(h) ? parseNum(mItem[h]).toLocaleString() : mItem[h]) : '-'}</div>
                        </td>
                    )) : (
                        <>
                            {visM.map(h => { 
                                const iN = NUMERIC_HEADERS.includes(h);
                                const mV = mItem[h]; 
                                let dV = mV;
                                let chg = false; 
                                
                                if (r.finalData?.[h] !== undefined) { 
                                    if ((iN && parseNum(r.finalData[h]) !== parseNum(mV)) || (!iN && String(r.finalData[h]) !== String(mV))) { 
                                        dV = r.finalData[h]; 
                                        chg = true; 
                                    } 
                                } 
                                return (
                                    <td key={`pm-${h}`} className={`px-2 py-1.5 border-r border-[#edebe3] ${getCellWidthClass(h)} ${chg ? 'bg-amber-100/60 text-amber-800' : 'bg-[#faf9f5] text-[#6b675e]'} ${iN ? 'text-right font-bold tracking-tight' : 'text-center'}`}>
                                        <div className="truncate">{dV !== undefined && dV !== '' ? (iN ? parseNum(dV).toLocaleString() : dV) : '-'}</div>
                                    </td>
                                ); 
                            })}
                            {visU.map(h => (
                                <EditableCell 
                                    key={`pu-${h}`} 
                                    rowCode={r.코드} 
                                    initialVal={r.finalData?.[h] ?? r.sources?.estimate?.[h] ?? ''} 
                                    field={h} 
                                    lnkF={mLnks[h]} 
                                    mVal={mLnks[h] ? mItem[mLnks[h]] : undefined} 
                                    onUpdate={onUpd} 
                                />
                            ))}
                        </>
                    )}
                </tr>
            );
        });

        const ExcelDataGrid = ({ st, acts }) => {
            const [sTop, setSTop] = useState(0);
            const RH = 40;
            const BS = 15;
            const VH = 800;
            
            const hUpd = useCallback((c, f, l, v) => {
                st.data.setManagedItems(p => { 
                    let i = { ...p[c] || { 코드: c, sources: { estimate: {} }, finalData: {} } }; 
                    i.finalData = { ...i.finalData, [f]: v }; 
                    
                    if (['입고가','출고가','외주비','노무비'].includes(f) || ['입고가','출고가'].includes(l)) {
                        const baseIn = parseNum((f === '입고가' || l === '입고가') ? v : (i.finalData['입고가'] ?? i.sources.estimate?.['입고가'] ?? st.data.masterProducts[c]?.['입고가'] ?? 0));
                        i.finalData = calculatePricesEngine(baseIn, st.data.masterProducts[c] || {}, i.finalData, st.config.marginRules, true); 
                    }
                    return { ...p, [c]: i }; 
                });
            }, [st]);
            
            const sId = Math.max(0, Math.floor(sTop/RH) - BS);
            const eId = Math.min(st.fullDisplayRows.length, Math.floor((sTop+VH)/RH) + BS);
            const dR = st.fullDisplayRows.slice(sId, eId);
            const vM = (st.config.visibleMasterCols.estimate || []).filter(h => !['품목코드','품목명','규격'].includes(h));
            const vU = (st.config.visibleUploadCols.estimate || []).filter(h => h !== '품목코드');
            
            return (
                <div className="bg-white border rounded-xl shadow-sm h-full flex flex-col relative overflow-hidden">
                    <div className="flex-1 overflow-auto custom-scrollbar relative" onScroll={e => setSTop(e.target.scrollTop)}>
                        <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                            <thead className="text-[12px] font-extrabold">
                                <tr className="h-[40px]">
                                    <th className="sticky top-0 z-40 bg-[#f5f4f0] px-3 py-2 border-b border-r border-[#e8e4db] shadow-sm text-[#5c554d] w-[280px]" style={{left:0}}>
                                        <div className="flex items-center gap-2 pl-1">
                                            {st.isEstimateUploaded && <input type="checkbox" className="rounded w-4 h-4 cursor-pointer shrink-0" checked={st.selectedRows.size === st.fullDisplayRows.length && dR.length > 0} onChange={acts.toggleAllRows} />}
                                            <span className="truncate">상품정보 (코드/품명/규격)</span>
                                        </div>
                                    </th>
                                    {!st.isEstimateUploaded ? vM.map(h => (
                                        <th key={`ih-${h}`} className={`sticky top-0 z-30 bg-[#f8fafc] px-2 py-3 border-r border-b text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                    )) : (
                                        <>
                                            {vM.map(h => (
                                                <th key={`ph-${h}`} className={`sticky top-0 z-30 bg-[#eff6ff] px-2 py-3 border-r border-b text-center text-blue-800 ${getCellWidthClass(h)}`}>
                                                    <div className="text-[9px] mb-0.5">마스터 대조</div>[M] {h}
                                                </th>
                                            ))}
                                            {vU.map(h => (
                                                <th key={`puh-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-3 border-r border-b text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                            ))}
                                        </>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {!st.fullDisplayRows.length ? (
                                    <tr><td colSpan="50" className="p-16 text-center text-slate-400">데이터 없음</td></tr>
                                ) : (
                                    <>
                                        {sId * RH > 0 && <tr style={{height: sId * RH}}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                        {dR.map((r, i) => (
                                            <MemoizedTableRow 
                                                key={r.코드} 
                                                r={r} 
                                                isSel={st.selectedRows.has(r.코드)} 
                                                bg={st.selectedRows.has(r.코드) ? 'bg-indigo-50/50' : (st.isEstimateUploaded ? 'bg-white hover:bg-slate-50' : 'bg-[#faf9f5] hover:bg-[#f0ece1]')} 
                                                mItem={st.data.masterProducts[r.코드] || {}} 
                                                isUp={st.isEstimateUploaded} 
                                                visM={vM} 
                                                visU={vU} 
                                                mLnks={st.config.masterLinks.estimate || {}} 
                                                onTgl={c => st.setSelectedRows(p => { const n = new Set(p); n.has(c) ? n.delete(c) : n.add(c); return n; })} 
                                                onUpd={hUpd} 
                                            />
                                        ))}
                                        {Math.max(0, (st.fullDisplayRows.length - eId) * RH) > 0 && <tr style={{height: Math.max(0, (st.fullDisplayRows.length - eId) * RH)}}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();
            
            const isUp = Object.keys(data.managedItems).length > 0;
            
            const extTgs = (k) => { 
                const c = {}; 
                Object.values(data.masterProducts).forEach(m => {
                    (m[k] || '').split(',').forEach(t => {
                        const x = t.trim(); 
                        if(x) c[x] = (c[x] || 0) + 1;
                    });
                }); 
                return Object.keys(c).sort().map(n => ({ name: n, count: c[n] })); 
            };
            
            const cCats = useMemo(() => extTgs('카탈로그'), [data.masterProducts]);
            const cEsts = useMemo(() => extTgs('견적서'), [data.masterProducts]);
            
            const fullRows = useMemo(() => {
                let lst = isUp ? Object.values(data.managedItems) : Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });
                
                if (!isUp && ui.selectedCatalogs.length) {
                    lst = lst.filter(i => ui.selectedCatalogs.some(c => (data.masterProducts[i.코드]?.['카탈로그'] || '').includes(c)));
                }
                if (!isUp && ui.selectedCategories.length) {
                    lst = lst.filter(i => ui.selectedCategories.some(c => (data.masterProducts[i.코드]?.['견적서'] || '').includes(c)));
                }
                
                if (ui.globalSearch) {
                    const tk = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g,' ').split(/\s+/).filter(Boolean);
                    if (tk.length) {
                        lst = lst.map(i => {
                            const v = k => String(i.finalData?.[k] ?? i.sources?.estimate?.[k] ?? data.masterProducts[i.코드]?.[k] ?? '').toLowerCase();
                            let s = 0; 
                            tk.forEach(t => { 
                                if(v('품목명').includes(t)) s += 10; 
                                else if(String(i.코드).toLowerCase().includes(t)) s += 8; 
                                else if(v('구매처').includes(t)) s += 6; 
                                else if(v('규격').includes(t)) s += 5; 
                                else if(v('창고').includes(t)) s += 4; 
                            });
                            return { ...i, _s: s };
                        }).filter(r => r._s > 0).sort((a, b) => b._s - a._s);
                    }
                } else {
                    lst.sort((a, b) => String(a.코드).localeCompare(String(b.코드)));
                }
                return lst;
            }, [isUp, data, ui.globalSearch, ui.selectedCatalogs, ui.selectedCategories]);

            const acts = useMerchActions(config, data, ui, fullRows);
            
            // 핵심 픽스: 누락되었던 상태 연결고리들(setGlobalSearch, setSelectedRows 등)을 객체에 명확히 전달
            const st = { 
                config, 
                data, 
                isEstimateUploaded: isUp, 
                selectedRows: ui.selectedRows, 
                setSelectedRows: ui.setSelectedRows, 
                globalSearch: ui.globalSearch, 
                setGlobalSearch: ui.setGlobalSearch,
                selectedCatalogs: ui.selectedCatalogs, 
                selectedCategories: ui.selectedCategories, 
                isProcessing: ui.process.is, 
                processMsg: ui.process.msg, 
                fullDisplayRows: fullRows, 
                toggleModal: ui.toggleModal 
            };
            
            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center font-sans overflow-hidden">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css'); 
                        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; overflow: hidden; } 
                        ::-webkit-scrollbar { width: 8px; height: 8px; } 
                        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } 
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; } 
                        .fade-in { animation: fI 0.2s ease-out; } 
                        @keyframes fI { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } } 
                        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 99px; border: 1px solid #e2e8f0; background: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s ease; } 
                        .config-chip:hover { background: #f8fafc; } 
                        .config-chip.active { background: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
                    `}</style>
                    
                    {ui.isExporting && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[9999] flex flex-col justify-center items-center text-white fade-in">
                            <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-500 mb-4"></i>
                            <h2 className="text-xl font-black">엑셀 생성 중...</h2>
                        </div>
                    )}
                    
                    {ui.alertMsg && (
                        <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in font-bold">
                            <i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i>
                            <span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span>
                            <button onClick={() => ui.setAlertMsg('')} className="ml-4 text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                        </div>
                    )}
                    
                    {ui.toastMsg && (
                        <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold">
                            <i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}
                        </div>
                    )}
                    
                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl mx-auto overflow-hidden">
                        <div className="shrink-0 flex flex-col bg-white border-b z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center bg-[#0b1120] gap-4">
                                        <div className="flex items-center shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center">
                                                    <span className="text-[14px] font-black text-slate-200">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold">v1.6.7</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest mt-0.5">MAIN WORKSPACE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole total={Object.keys(data.masterProducts).length} proc={ui.process} est={fullRows.length} cats={ui.selectedCatalogs} ctg={ui.selectedCategories} isUp={isUp} />
                                        
                                        <nav className="flex gap-1.5 text-[14px] shrink-0 items-center">
                                            <button onClick={() => window.location.reload(true)} className="h-8 px-2.5 rounded bg-[#0f172a] border border-slate-700 hover:bg-[#1e293b] font-bold text-[13px] text-slate-300" title="화면 강제 새로고침 (업데이트 확인용)">
                                                <i className="fas fa-sync-alt"></i>
                                            </button>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            {(isUp || ui.selectedCatalogs.length > 0 || ui.selectedCategories.length > 0) && (
                                                <>
                                                    <button onClick={() => ui.toggleModal('export', true)} className="h-8 px-2.5 rounded bg-[#0f172a] border border-slate-700 hover:bg-[#1e293b] text-amber-300 font-bold text-[11px]"><i className="fas fa-file-export mr-1.5"></i>보고서</button>
                                                    <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                                </>
                                            )}
                                            {['GUIDE', 'REPORT'].map((l, i) => (
                                                <a key={l} href={`https://oneapp.orderz.co.kr/MerchOps/${i === 0 ? 'guide' : 'trend_report'}`} className="h-8 px-2.5 rounded bg-[#0f172a] border border-slate-700 hover:bg-[#1e293b] font-bold text-[11px] text-emerald-400 tracking-wider">{l}</a>
                                            ))}
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            <button onClick={() => acts.handleCloudSync('download')} className="w-8 h-8 rounded bg-[#0f172a] border border-slate-700 text-slate-300 hover:text-white" title="클라우드 데이터 수신"><i className="fas fa-cloud-download-alt text-[13px]"></i></button>
                                            <button onClick={() => acts.handleCloudSync('upload')} className="w-8 h-8 rounded bg-[#0f172a] border border-slate-700 text-slate-300 hover:text-white" title="클라우드 전체 백업"><i className="fas fa-cloud-upload-alt text-[13px]"></i></button>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            <button onClick={() => ui.toggleModal('settings', true)} className="w-8 h-8 rounded bg-[#0f172a] border border-slate-700 text-slate-400 hover:text-white"><i className="fas fa-cogs text-[13px]"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar st={st} acts={acts} cats={cCats} ests={cEsts} />
                        </div>
                        
                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {!Object.keys(data.masterProducts).length ? (
                                <div className="h-full flex flex-col items-center justify-center bg-white rounded-xl border border-slate-200 p-10">
                                    <div className="text-indigo-500 text-5xl mb-6"><i className="fas fa-box-open"></i></div>
                                    <h2 className="text-2xl font-black text-slate-800 mb-3">MerchOps 메인 워크스페이스</h2>
                                    <p className="text-[14px] text-slate-500 mb-10 font-bold">마스터 상품 데이터가 없습니다.</p>
                                    <div className="flex gap-6 w-full max-w-3xl">
                                        {[ 
                                            { t:'마스터 엑셀 직접 업로드', d:'ERP 전체 마스터 업로드', i:'fa-file-excel', c:'emerald', a:e => acts.handleFileUpload(e,'master'), isF:true }, 
                                            { t:'클라우드에서 데이터 수신', d:'구글시트 데이터 동기화', i:'fa-cloud-download-alt', c:'indigo', a:() => acts.handleCloudSync('download') }, 
                                            { t:'스마트 파서로 이동', d:'텍스트 기반 델타 동기화', i:'fa-magic', c:'purple', a:() => window.location.href = 'https://oneapp.orderz.co.kr/MerchOps/vp1.3' } 
                                        ].map((g, x) => (
                                            <div key={x} onClick={!g.isF ? g.a : undefined} className="flex-1 bg-slate-50 border p-8 rounded-xl text-center hover:-translate-y-1 cursor-pointer transition-all relative">
                                                {g.isF && <label className="absolute inset-0 w-full h-full cursor-pointer z-20"><input type="file" className="hidden" onChange={g.a} multiple accept=".xlsx, .xls, .csv" /></label>}
                                                <div className={`text-4xl text-${g.c}-500 mb-5`}><i className={`fas ${g.i}`}></i></div>
                                                <h3 className="text-[16px] font-black text-slate-800 mb-2">{g.t}</h3>
                                                <p className="text-[12px] text-slate-500">{g.d}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : <ExcelDataGrid st={st} acts={acts} />}
                        </div>
                    </div>
                    
                    {ui.modals.category && <CategorySaveModal onClose={() => ui.toggleModal('category', false)} onSave={acts.handleSaveAsCategory} />}
                    {ui.modals.settings && <MappingCenterModal onClose={() => ui.toggleModal('settings', false)} conf={config} acts={{...acts, showToast: ui.showToast}} cats={cCats} ests={cEsts} />}
                    {ui.modals.review && <ReviewModal onClose={() => ui.toggleModal('review', false)} onConfirm={acts.handleCommitEstimate} st={st} data={data} />}
                    {ui.modals.export && <ExportModal onClose={() => ui.toggleModal('export', false)} executeExport={acts.executeExport} />}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
