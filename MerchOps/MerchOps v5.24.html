<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - 실시간 수발주 및 진행관리 (v5.24)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #cbd5e1; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1); transform-origin: top; }
        @keyframes slideDown { from { opacity: 0; transform: scaleY(0.95) translateY(-10px); } to { opacity: 1; transform: scaleY(1) translateY(0); } }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .filter-checkbox:checked + div { background-color: #3b82f6; border-color: #3b82f6; }
        .filter-checkbox:checked + div svg { display: block; }

        .qty-input {
            width: 100%; text-align: center; background-color: transparent; border: 1px solid transparent; 
            border-radius: 4px; padding: 4px 2px; font-size: 13px; font-weight: 700; outline: none; transition: all 0.2s;
        }
        .qty-input:hover { border-color: #cbd5e1; background-color: rgba(255,255,255,0.5); }
        .qty-input:focus { background-color: white; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }

        #initial-loader { position: fixed; inset: 0; background-color: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">ONEAPP MerchOps v5.24 로딩 중...</div>
        <div style="font-size: 11px; color: #64748b; margin-top: 8px;">마스터 데이터 연동 및 헤더 UI 최적화 중입니다</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        /* =======================================================================
           1. 유틸리티 함수
           ======================================================================= */
        const safeNum = (val) => { const n = Number(val); return isNaN(n) || !isFinite(n) ? 0 : n; };
        const safeStr = (val, fallback = '') => {
            if (val === null || val === undefined) return fallback;
            const s = String(val).trim(); const lower = s.toLowerCase();
            if (lower === 'undefined' || lower === 'nan' || lower === 'null' || lower === '') return fallback; return s;
        };
        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim(); let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) { isNegative = true; strVal = strVal.slice(1, -1); } 
            else if (strVal.startsWith('-')) { isNegative = true; strVal = strVal.slice(1); }
            let num = Number(strVal.replace(/,/g, '').replace(/[^\d.]/g, ''));
            if (isNegative) num = -num; return isNaN(num) ? 0 : num;
        };

        const generateStockKey = (code, vendor, price, date, options) => {
            let key = String(code);
            if (options.vendor) key += `|V:${vendor || ''}`;
            if (options.price) key += `|P:${price || ''}`;
            if (options.date) key += `|D:${date || ''}`;
            return key;
        };

        const formatDateNumber = (dateStr, slipNo) => {
            let d = (dateStr || '').trim();
            if (d.includes('/')) {
                const parts = d.split('/');
                if (parts.length >= 3) d = `${parts[1]}/${parts[2]}`;
                else if (parts.length === 2) d = `${parts[0]}/${parts[1]}`;
            } else if (d.includes('-')) {
                const parts = d.split('-');
                if (parts.length >= 3) d = `${parts[1]}/${parts[2]}`;
                else if (parts.length === 2) d = `${parts[0]}/${parts[1]}`;
            }
            if(!d && !slipNo) return '';
            return `${d}${d && slipNo ? '-' : ''}${slipNo}`;
        };

        const defaultMappings = {
            code: '복사원코드, 본사코드, 품목코드, 상품코드, 코드, 품번, sku, 2코드',
            name: '상품명, 품명, 품목명, 이름, 품목(상품명)',
            spec: '규격, 옵션, 사이즈, 1규격, 1  규격, 규격명',
            qty: '수량, 출고수량, 입고수량, 판매수량',
            stock: '재고, 기초재고, 기초수량, 현재고', 
            vendor: '거래처명, 거래처, 매입처, 판매처, 구매처, 구매처명, 유통사코드',
            group: '지역그룹, 그룹, 코스', 
            memo: '적요, 메모, 비고', 
            instruction: '지시사항, 전하실말씀, 상점메모, 배송메모', 
            warehouse: '창고, 위치, 적재위치',
            manager: '담당자, 영업사원, 담당',
            cat1: '1그룹명, 대분류, 품목그룹1명',
            cat2: '2그룹명, 중분류, 품목그룹2명',
            cat3: '3그룹명, 소분류, 품목그룹3명',
            inPrice: '입고가, 입고가 0, 입고가  0, 매입단가, 구매가',
            outPrice: '단가, 출고가, 출고가 0, 출고가  0, 판매단가, A판매, B판매, 싯가',
            date: '배송일자, 일자, 날짜, 등록일, 판매일, 입고일',
            slipNo: '순번, 전표번호, 번호, 넘버, no'
        };

        const STATUS_OPTIONS = ['주문', '입금', '준비', '배송', '완료', '부분취소', '전체취소', '삭제'];

        /* =======================================================================
           2. 엑셀 파싱 엔진
           ======================================================================= */
        const parseExcelData = (file, currentMappings) => {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        
                        const processWorkbook = (wb) => {
                            const sheet = wb.Sheets[wb.SheetNames[0]];
                            const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                            
                            let headerRowIdx = -1; let maxScore = 0;
                            const keywords = {};
                            Object.keys(currentMappings).forEach(k => {
                                keywords[k] = currentMappings[k].split(',').map(s => s.trim().toLowerCase().replace(/\s/g,''));
                            });

                            for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                const row = jsonAll[i] || []; let score = 0;
                                const rowStr = row.join('').replace(/\s/g, ''); if (!rowStr) continue;
                                Object.values(keywords).forEach(kwList => { 
                                    if (kwList.some(kw => kw && row.some(cell => String(cell).replace(/\s/g, '').toLowerCase().includes(kw)))) score++; 
                                });
                                if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                            }
                            return { jsonAll, headerRowIdx, maxScore, keywords };
                        };

                        let wb = XLSX.read(data, { type: 'array' });
                        let { jsonAll, headerRowIdx, maxScore, keywords } = processWorkbook(wb);

                        if (maxScore < 2) {
                            try {
                                const text = new TextDecoder('euc-kr').decode(data);
                                const wb2 = XLSX.read(text, { type: 'string' });
                                const res2 = processWorkbook(wb2);
                                if (res2.maxScore > maxScore) { 
                                    jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; 
                                    maxScore = res2.maxScore; keywords = res2.keywords; 
                                }
                            } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                        }

                        if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                        const rawHeaders = jsonAll[headerRowIdx];
                        const uniqueHeaders = []; const headerCounts = {};
                        for (let j = 0; j < rawHeaders.length; j++) {
                            let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                            if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                            uniqueHeaders.push(h);
                        }

                        const parsedData = [];
                        const getValByKeywords = (obj, kwList) => {
                            const keys = Object.keys(obj); 
                            const cleanKeys = keys.map(k => k.replace(/\s/g, '').toLowerCase());
                            for (let kw of kwList) { 
                                if (!kw) continue; 
                                const matchingKeys = keys.filter((k, i) => cleanKeys[i].includes(kw));
                                for (let mk of matchingKeys) {
                                    if (obj[mk] !== undefined && String(obj[mk]).trim() !== '') {
                                        return obj[mk];
                                    }
                                }
                            }
                            return null;
                        };

                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i]; if (!row || row.join('').trim() === '') continue;
                            const rowObj = {}; uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                            
                            const codeRaw = getValByKeywords(rowObj, keywords.code); const codeStr = safeStr(codeRaw, '');
                            const baseNameRaw = getValByKeywords(rowObj, keywords.name); const baseName = safeStr(baseNameRaw, '');

                            if (!codeStr && !baseName) continue;
                            if (codeStr.includes('합계') || codeStr.includes('총계') || baseName.includes('합계') || baseName.includes('총계')) continue;

                            parsedData.push({
                                코드: codeStr || 'NO_CODE', 
                                품명: baseName || '이름없음',
                                규격: safeStr(getValByKeywords(rowObj, keywords.spec), ''),
                                cat1: safeStr(getValByKeywords(rowObj, keywords.cat1), ''),
                                cat2: safeStr(getValByKeywords(rowObj, keywords.cat2), ''),
                                cat3: safeStr(getValByKeywords(rowObj, keywords.cat3), ''),
                                수량: parseNumber(getValByKeywords(rowObj, keywords.qty)), 
                                재고: parseNumber(getValByKeywords(rowObj, keywords.stock)), 
                                거래처: safeStr(getValByKeywords(rowObj, keywords.vendor), ''), 
                                그룹: safeStr(getValByKeywords(rowObj, keywords.group), ''),
                                메모: safeStr(getValByKeywords(rowObj, keywords.memo), ''), 
                                지시사항: safeStr(getValByKeywords(rowObj, keywords.instruction), ''),
                                창고: safeStr(getValByKeywords(rowObj, keywords.warehouse), ''),
                                담당자: safeStr(getValByKeywords(rowObj, keywords.manager), ''),
                                inPrice: parseNumber(getValByKeywords(rowObj, keywords.inPrice)),
                                outPrice: parseNumber(getValByKeywords(rowObj, keywords.outPrice)),
                                일자: safeStr(getValByKeywords(rowObj, keywords.date), ''),
                                순번: safeStr(getValByKeywords(rowObj, keywords.slipNo), ''),
                                _raw: rowObj 
                            });
                        }
                        resolve(parsedData);
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        /* =======================================================================
           3. UI 공통 컴포넌트
           ======================================================================= */
        const Clock = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            const yyyy = currentTime.getFullYear();
            const mm = String(currentTime.getMonth() + 1).padStart(2, '0');
            const dd = String(currentTime.getDate()).padStart(2, '0');
            const hh = String(currentTime.getHours()).padStart(2, '0');
            const min = String(currentTime.getMinutes()).padStart(2, '0');
            
            return (
                <div className="text-[12px] text-slate-400 font-mono tracking-wide flex items-center mt-0.5">
                    <i className="far fa-clock mr-1.5 text-blue-400 opacity-80"></i>
                    {`${yyyy}.${mm}.${dd} ${hh}:${min}`}
                </div>
            );
        };

        // ✨ 상태 표시 칩
        const StatusChip = ({ status }) => {
            const config = {
                '주문': 'bg-blue-100 text-blue-700 border-blue-200',
                '입금': 'bg-indigo-100 text-indigo-700 border-indigo-200',
                '준비': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                '배송': 'bg-purple-100 text-purple-700 border-purple-200',
                '완료': 'bg-emerald-100 text-emerald-700 border-emerald-200',
                '부분취소': 'bg-orange-100 text-orange-700 border-orange-200',
                '전체취소': 'bg-rose-100 text-rose-700 border-rose-200 line-through',
                '삭제': 'bg-slate-200 text-slate-500 border-slate-300 line-through',
                '적용': 'bg-slate-100 text-slate-600 border-slate-200',
                '견적': 'bg-amber-100 text-amber-700 border-amber-200'
            };
            const cls = config[status] || config['주문'];
            return <span className={`px-2 py-0.5 rounded text-[11px] font-bold border shadow-sm ${cls}`}>{status}</span>;
        };

        // ✨ 정렬 가능한 헤더 (R3)
        const SortableHeader = ({ label, sortKey, currentSort, onSort, width, align = 'left', children }) => {
            const isActive = currentSort.key === sortKey;
            return (
                <th className={`p-2 border-r border-slate-200 bg-slate-50 align-bottom ${width ? width : ''} text-${align}`}>
                    <div className={`flex items-center justify-${align === 'right' ? 'end' : (align === 'center' ? 'center' : 'start')} cursor-pointer sortable ${isActive ? 'sort-active' : ''} ${children ? 'mb-1.5' : 'mb-1'} px-1`} onClick={() => onSort(sortKey)}>
                        <span className="font-extrabold">{label}</span>
                        <span className="sort-icon">
                            {isActive ? (currentSort.direction === 'asc' ? '▲' : '▼') : '↕'}
                        </span>
                    </div>
                    {children}
                </th>
            );
        };

        // ✨ 헤더 일체형 클린 검색창 (R3)
        const SearchHeader = ({ value, onChange }) => (
            <th className="p-0 border-r border-slate-200 border-b w-auto min-w-[250px] align-middle bg-slate-50 relative group">
                <input 
                    id="mainSearch" 
                    type="text" 
                    placeholder="품명/규격 검색 (F3)" 
                    value={value} 
                    onChange={e => onChange(e.target.value)} 
                    className="w-full h-full absolute inset-0 pl-3 pr-8 bg-transparent border-none text-[12px] font-extrabold text-slate-700 placeholder-slate-400 outline-none focus:bg-white focus:ring-inset focus:ring-2 focus:ring-blue-500 transition-colors"
                    onClick={e => e.stopPropagation()} 
                />
                <i className="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none z-10 group-focus-within:text-blue-500"></i>
            </th>
        );

        // ✨ 2단 텍스트 위계 셀 (R4)
        const ProductInfoCell = ({ name, spec, code }) => (
            <td className="px-4 py-2 border-r border-slate-100 align-middle">
                <div className="flex flex-col gap-1 w-full max-w-[400px]">
                    <div className="flex items-center w-full truncate">
                        <span className="font-bold text-slate-900 text-[13px] truncate max-w-[250px]" title={name}>{name}</span>
                        {spec && <span className="ml-1.5 text-[10px] font-semibold text-slate-500 border border-slate-200 px-1 rounded bg-slate-50 shrink-0 truncate max-w-[120px]" title={spec}>{spec}</span>}
                    </div>
                    <span className="font-mono text-[10px] text-slate-400 leading-none truncate block tracking-tight">{code}</span>
                </div>
            </td>
        );

        const FilterDropdown = ({ title, options, selectedOptions, onChange, onClose }) => {
            const [search, setSearch] = useState('');
            const filteredOptions = options.filter(opt => opt.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="absolute top-full right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl z-50 w-56 text-sm font-normal text-left max-h-80 flex flex-col" onClick={e => e.stopPropagation()}>
                    <div className="p-2 border-b border-slate-100 flex items-center gap-2">
                        <i className="fas fa-search text-slate-400"></i>
                        <input type="text" placeholder="검색..." value={search} onChange={e => setSearch(e.target.value)} className="w-full outline-none text-slate-700 bg-transparent placeholder-slate-400" autoFocus />
                    </div>
                    <div className="overflow-y-auto p-1 flex-1 custom-scrollbar">
                        <label className="flex items-center px-3 py-2 hover:bg-slate-50 cursor-pointer rounded transition-colors group">
                            <input type="checkbox" className="hidden filter-checkbox" checked={selectedOptions.length === 0} onChange={() => onChange([])} />
                            <div className="w-4 h-4 border-2 border-slate-300 rounded flex items-center justify-center mr-2 transition-colors group-hover:border-blue-400">
                                <svg className="w-3 h-3 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span className="text-slate-700 font-bold">(전체 선택)</span>
                        </label>
                        {filteredOptions.map(opt => (
                            <label key={opt} className="flex items-center px-3 py-1.5 hover:bg-slate-50 cursor-pointer rounded transition-colors group">
                                <input type="checkbox" className="hidden filter-checkbox" checked={selectedOptions.includes(opt)} onChange={(e) => {
                                    if (e.target.checked) onChange([...selectedOptions, opt]);
                                    else onChange(selectedOptions.filter(o => o !== opt));
                                }} />
                                <div className="w-4 h-4 border-2 border-slate-300 rounded flex items-center justify-center mr-2 transition-colors group-hover:border-blue-400">
                                    <svg className="w-3 h-3 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <span className="text-slate-600 truncate">{opt || '(없음)'}</span>
                            </label>
                        ))}
                    </div>
                    {selectedOptions.length > 0 && (
                        <div className="p-2 border-t border-slate-100 bg-slate-50">
                            <button onClick={() => onChange([])} className="w-full py-1.5 text-xs font-bold text-slate-500 hover:text-rose-600 transition-colors">필터 초기화</button>
                        </div>
                    )}
                </div>
            );
        };

        const FileBox = React.memo(({ title, type, icon, files, setFiles, autoAssignFiles }) => {
            const inputRef = useRef(null); const [isDragging, setIsDragging] = useState(false);
            
            const handleBoxDrop = (e) => { 
                e.preventDefault(); e.stopPropagation(); setIsDragging(false); 
                const droppedFiles = Array.from(e.dataTransfer.files); 
                if (droppedFiles.length === 1) {
                    setFiles(prev => { const updated = { ...prev }; updated[type] = [...(updated[type] || []), droppedFiles[0]]; return updated; });
                } else if (droppedFiles.length > 1) {
                    autoAssignFiles(droppedFiles); 
                }
                if (document.activeElement) document.activeElement.blur(); window.focus(); 
            };
            const handleOnChange = (e) => { 
                const selectedFiles = Array.from(e.target.files); 
                if (selectedFiles.length === 1) {
                    setFiles(prev => { const updated = { ...prev }; updated[type] = [...(updated[type] || []), selectedFiles[0]]; return updated; });
                } else if (selectedFiles.length > 1) {
                    autoAssignFiles(selectedFiles); 
                }
                e.target.value = ''; e.target.blur(); if (document.activeElement) document.activeElement.blur(); window.focus(); 
            };

            const handleClear = (e) => {
                e.stopPropagation();
                setFiles(prev => ({ ...prev, [type]: [] }));
            };

            const fileCount = files[type] ? files[type].length : 0;
            const displayName = fileCount > 0 ? (fileCount === 1 ? files[type][0].name : `${files[type][files[type].length - 1].name} 외 ${fileCount - 1}건`) : '클릭하여 데이터 연결';

            return (
                <div 
                    className={`relative border rounded-lg transition-all cursor-pointer flex items-center h-[46px] w-full md:w-[190px] shrink-0 px-3 shadow-sm group overflow-hidden
                    ${fileCount > 0 ? `border-indigo-400 bg-slate-800` : 'border-slate-700 bg-slate-800/50 hover:border-slate-500 hover:bg-slate-800'} 
                    ${isDragging ? `border-blue-500 ring-1 ring-blue-500 bg-slate-800 scale-[1.02]` : ''}`} 
                    onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} 
                    onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} 
                    onDrop={handleBoxDrop} 
                    onClick={() => inputRef.current.click()}
                >
                    <input type="file" ref={inputRef} accept=".xlsx, .xls, .csv" onChange={handleOnChange} className="hidden" multiple />
                    
                    <div className="flex flex-col justify-center flex-1 min-w-0 pr-4 relative z-10">
                        <span className="text-[10px] font-black text-slate-400 tracking-tight mb-0.5 whitespace-nowrap overflow-hidden text-ellipsis">{title}</span>
                        <span className={`text-[11px] font-bold truncate ${fileCount > 0 ? 'text-indigo-300' : 'text-slate-500'}`}>{displayName}</span>
                    </div>

                    <i className={`fas ${icon} absolute right-3 text-2xl opacity-10 transition-opacity group-hover:opacity-20 ${fileCount > 0 ? 'text-indigo-400 opacity-20' : 'text-slate-400'}`}></i>

                    {fileCount > 0 && (
                        <button onClick={handleClear} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-400 p-1.5 z-20 transition-colors bg-slate-800 rounded-full" title="이 항목 지우기">
                            <i className="fas fa-times-circle text-[14px]"></i>
                        </button>
                    )}
                </div>
            );
        });

        /* =======================================================================
           5. 비즈니스 로직 훅 (MerchOps Engine)
           ======================================================================= */
        const useMerchOpsEngine = ({ mappings, masterData, setMasterData, setAlertMsg, showToast, setConfirmModal, setIsProcessing, splitOptions }) => {
            const [stockData, setStockData] = useState({}); 
            const [orderData, setOrderData] = useState([]); 

            const resetEngine = useCallback(() => { setStockData({}); setOrderData([]); }, []);

            const updateOrder = useCallback((id, field, value) => {
                setOrderData(prev => prev.map(o => {
                    if (o.id === id) { return { ...o, [field]: (field === '상태' || field === '적요' || field === '지시사항') ? value : (value === '' ? 0 : Number(value)) }; }
                    return o;
                }));
            }, []);

            const updateOrderBulkStatus = useCallback((idsSet, newStatus) => {
                setOrderData(prev => prev.map(o => idsSet.has(o.id) ? { ...o, 상태: newStatus } : o));
            }, []);

            const updateStock = useCallback((key, field, value) => {
                const val = value === '' ? undefined : Number(value);
                setStockData(prev => {
                    const current = prev[key] || { 기초재고: 0, 입고수량: 0 };
                    return { ...prev, [key]: { ...current, [field]: val } };
                });
            }, []);

            const addManualOrder = useCallback((product, vendor, qty, price) => {
                const numQty = Number(qty);
                if (!numQty || numQty <= 0) { showToast('수량을 올바르게 입력해주세요.', 'error'); return; }
                
                const newOrder = {
                    id: `ORD_MANUAL_${Date.now()}_${Math.floor(Math.random()*1000)}`,
                    그룹: '수기추가', 거래처: vendor || '미지정',
                    창고: '수기', 담당자: '수기', 코드: product.code, 품명: product.name, 규격: product.spec,
                    주문수량: numQty, 판매수량: 0, 단가: Number(price) || 0, 상태: '주문', 적요: '수기추가', 지시사항: '', 일자: '', 순번: ''
                };
                
                setOrderData(prev => [newOrder, ...prev]);
                
                const stockKey = generateStockKey(product.code, vendor, Number(price), '', splitOptions);
                
                setStockData(prev => {
                    if (prev[stockKey]) return prev;
                    return { ...prev, [stockKey]: { 
                        key: stockKey, 코드: product.code, 품명: product.name, 규격: product.spec, 
                        거래처: vendor || '', 일자: '', 순번: '', inPrice: 0, outPrice: Number(price) || 0,
                        기초재고: 0, 입고수량: 0 
                    }};
                });
                showToast(`✅ [${product.name}] ${numQty}개 추가 완료`);
            }, [showToast, splitOptions]);

            // ✨ 리팩토링된 마스터 데이터 전용 파서 로직 (단일 배열 구조)
            const processMasterOrEstimateFile = useCallback(async (file, isEstimateOnly = false) => {
                setIsProcessing(true);
                try {
                    const parsed = await parseExcelData(file, mappings, true); // true for master mapping
                    let updateCount = 0;
                    
                    setMasterData(prevMaster => {
                        const newMasterList = [...prevMaster];
                        const map = new Map(newMasterList.map(item => [item.code, item]));
                        
                        parsed.forEach(sale => {
                            const code = String(sale.코드 || 'NO_CODE');
                            if (code !== 'NO_CODE') {
                                const existing = map.get(code) || {};
                                
                                if (isEstimateOnly && existing.code) {
                                    let changed = false;
                                    if (sale.inPrice && sale.inPrice !== existing.inPrice) { existing.inPrice = sale.inPrice; changed = true; }
                                    if (sale.outPrice && sale.outPrice !== existing.outPrice) { existing.outPrice = sale.outPrice; changed = true; }
                                    if (changed) { map.set(code, existing); updateCount++; }
                                } else if (!isEstimateOnly) {
                                    // Full Master Update
                                    map.set(code, {
                                        ...existing,
                                        code: code,
                                        name: sale.품명 || existing.name,
                                        spec: sale.규격 || existing.spec,
                                        cat1: sale.cat1 || existing.cat1 || '',
                                        cat2: sale.cat2 || existing.cat2 || '',
                                        cat3: sale.cat3 || existing.cat3 || '',
                                        vendor: sale.거래처 || existing.vendor || '',
                                        inPrice: sale.inPrice || existing.inPrice || 0,
                                        outPrice: sale.outPrice || existing.outPrice || 0,
                                    });
                                    updateCount++;
                                }
                            }
                        });
                        
                        const finalArray = Array.from(map.values());
                        localStorage.setItem('merchMaster_v524', JSON.stringify(finalArray));
                        return finalArray;
                    });
                    
                    if (isEstimateOnly) {
                        setOrderData(prev => {
                            const newEst = [];
                            parsed.forEach(sale => {
                                const code = String(sale.코드 || 'NO_CODE');
                                if (code === 'NO_CODE') return;
                                newEst.push({
                                    id: `ORD_EST_${Date.now()}_${Math.floor(Math.random()*10000)}`, 
                                    그룹: safeStr(sale.그룹, '미지정'), 거래처: safeStr(sale.거래처, '미지정'), 일자: safeStr(sale.일자, ''), 순번: safeStr(sale.순번, ''),
                                    창고: safeStr(sale.창고, '미지정'), 담당자: safeStr(sale.담당자, '미지정'), 
                                    코드: code, 품명: sale.품명, 규격: sale.규격 || '',
                                    주문수량: 0, 판매수량: 0, 단가: sale.outPrice || 0, 적요: '단가 마스터 업데이트', 지시사항: '', 상태: '견적'
                                });
                            });
                            return [...prev, ...newEst];
                        });
                        setTimeout(() => showToast(`✅ 견적서 반영 완료: ${updateCount}개 품목의 단가(시세)가 업데이트되었습니다.`), 100);
                    } else {
                        setTimeout(() => setAlertMsg(`✅ 기초 마스터 데이터 ${updateCount}건이 연동/업데이트 되었습니다.`), 100);
                    }
                } catch(err) {
                    console.error(err);
                    setAlertMsg('마스터 데이터 파싱 중 오류가 발생했습니다.');
                } finally {
                    setIsProcessing(false);
                }
            }, [mappings, showToast, setAlertMsg, setIsProcessing, setMasterData]);

            const executeAnalysis = useCallback((payload) => {
                setIsProcessing(true); setConfirmModal({ isOpen: false, warnings: [], payload: null });
                try {
                    const { parsedPrev, parsedIn, parsedOut, parsedDone } = payload;
                    let newStockData = {}; let newOrderData = [];

                    const updateStockData = (item, type) => {
                        const code = String(item.코드 || 'NO_CODE');
                        const vendor = safeStr(item.거래처, '');
                        const date = safeStr(item.일자, '');
                        const price = type === 'prev' || type === 'in' ? item.inPrice : (item.outPrice || item.단가);
                        
                        const key = generateStockKey(code, vendor, price, date, splitOptions);

                        if (!newStockData[key]) { 
                            newStockData[key] = { 
                                key, 코드: code, 품명: item.품명, 규격: item.규격 || '', 
                                거래처: vendor, 일자: date, 순번: safeStr(item.순번, ''), inPrice: item.inPrice, outPrice: item.outPrice,
                                기초재고: 0, 입고수량: 0 
                            }; 
                        }
                        if (type === 'prev') { newStockData[key].기초재고 += parseNumber(item.수량); } 
                        else if (type === 'in') { newStockData[key].입고수량 += parseNumber(item.수량); } 
                        else {
                            const rowStock = parseNumber(item.재고);
                            if (rowStock > 0) newStockData[key].기초재고 = Math.max(newStockData[key].기초재고, rowStock);
                        }
                    };

                    parsedPrev.forEach(arr => arr.forEach(item => updateStockData(item, 'prev')));
                    parsedIn.forEach(arr => arr.forEach(item => updateStockData(item, 'in')));

                    let orderIdCounter = 1;
                    
                    const processOrderData = (arr, isDone, defaultStatus) => {
                        arr.forEach(sale => {
                            const code = String(sale.코드 || 'NO_CODE'); 
                            const qty = parseNumber(sale.수량); 
                            updateStockData(sale, 'out');
                            if (qty <= 0 && parseNumber(sale.재고) === 0) return;

                            let vendor = safeStr(sale.거래처, ''); let group = safeStr(sale.그룹, '');
                            let warehouse = safeStr(sale.창고, ''); let manager = safeStr(sale.담당자, '');

                            newOrderData.push({
                                id: `ORD_${orderIdCounter++}`, 그룹: group || '미지정', 거래처: vendor || '미지정', 일자: safeStr(sale.일자, ''), 순번: safeStr(sale.순번, ''),
                                창고: warehouse || '미지정', 담당자: manager || '미지정', 코드: code, 품명: sale.품명, 규격: sale.규격 || '',
                                주문수량: isDone ? 0 : qty, 판매수량: isDone ? qty : 0, 적요: sale.메모 || '', 지시사항: sale.지시사항 || '', 단가: sale.outPrice || 0, 상태: defaultStatus
                            });
                        });
                    };

                    parsedOut.forEach(arr => processOrderData(arr, false, '주문'));
                    parsedDone.forEach(arr => processOrderData(arr, true, '완료'));

                    setOrderData(prev => {
                        const existingEstimates = prev.filter(o => o.상태 === '견적');
                        return [...newOrderData, ...existingEstimates];
                    });
                    setStockData(newStockData);
                    setTimeout(() => { showToast("✨ 수발주 연산이 완료되었습니다."); }, 600);
                } catch(err) {
                    setAlertMsg('데이터 분석 중 오류가 발생했습니다. 엑셀 형식을 확인해주세요.');
                } finally { setIsProcessing(false); }
            }, [showToast, setAlertMsg, setConfirmModal, setIsProcessing, splitOptions]); 

            const runAnalysis = useCallback(async (filesObj) => {
                setIsProcessing(true); setConfirmModal({ isOpen: false, warnings: [], payload: null });
                try {
                    const parseFileArray = async (fileArr) => {
                        if (!fileArr || fileArr.length === 0) return [];
                        const promises = fileArr.map(f => parseExcelData(f, mappings));
                        return await Promise.all(promises);
                    };

                    const parsedPrev = await parseFileArray(filesObj.prev);
                    const parsedIn = await parseFileArray(filesObj.in);
                    const parsedOut = await parseFileArray(filesObj.out);   
                    const parsedDone = await parseFileArray(filesObj.done); 

                    const payload = { parsedPrev, parsedIn, parsedOut, parsedDone };
                    executeAnalysis(payload);
                } catch (err) { setAlertMsg('데이터 파싱 중 오류가 발생했습니다.'); setIsProcessing(false); }
            }, [mappings, executeAnalysis, setAlertMsg, setConfirmModal, setIsProcessing]);

            return {
                stockData, orderData, updateOrder, updateOrderBulkStatus, updateStock, addManualOrder, processMasterOrEstimateFile,
                resetEngine, executeAnalysis, runAnalysis
            };
        };

        /* =======================================================================
           6. 상품 수기 추가 (Manual Add) 컴포넌트
           ======================================================================= */
        const ManualOrderRow = ({ product, onAdd }) => {
            const [vendor, setVendor] = useState(product.vendor || '');
            const [qty, setQty] = useState('');
            const [price, setPrice] = useState(product.outPrice || product.inPrice || 0);

            return (
                <div className="bg-white border border-slate-200 rounded-lg p-2.5 mb-2 shadow-sm flex flex-col gap-2 hover:border-blue-300 transition-colors">
                    <div className="flex justify-between items-start">
                        <div className="font-bold text-sm text-slate-800 leading-tight">
                            <span className="px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-[9px] font-bold mr-1.5 border border-slate-200 shadow-sm align-middle">{product.cat3 || '미분류'}</span>
                            {product.name}
                            {product.spec && <span className="ml-1.5 text-[10px] text-slate-500 bg-slate-100 px-1 py-0.5 rounded border border-slate-200">{product.spec}</span>}
                        </div>
                        <div className="text-[10px] text-slate-400 font-mono tracking-tighter bg-slate-50 px-1 rounded">{product.code}</div>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1">
                        <input type="text" value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="거래처명" className="w-[35%] border border-slate-300 rounded px-2 py-1 text-xs outline-none focus:border-blue-500 bg-slate-50 focus:bg-white" />
                        <input type="number" value={price} onChange={e=>setPrice(e.target.value)} placeholder="단가" className="w-[25%] border border-slate-300 rounded px-2 py-1 text-xs outline-none focus:border-blue-500 bg-slate-50 focus:bg-white" />
                        <input type="number" value={qty} onChange={e=>setQty(e.target.value)} placeholder="수량" className="w-[25%] border border-blue-400 rounded px-2 py-1 text-xs outline-none focus:ring-2 focus:ring-blue-200 bg-blue-50 font-bold text-blue-900" />
                        <button onClick={() => { onAdd(product, vendor, qty, price); setQty(''); }} className="w-[25%] bg-blue-600 text-white rounded text-xs font-bold py-1 hover:bg-blue-700 transition-colors shadow-sm">담기➕</button>
                    </div>
                </div>
            );
        };

        const ManualEntryPanel = ({ isOpen, onClose, masterData, onAddOrder }) => {
            const [search, setSearch] = useState('');
            const [c1, setC1] = useState('');
            const [c2, setC2] = useState('');
            const [c3, setC3] = useState('');

            const products = masterData;
            
            const cat1List = useMemo(() => [...new Set(products.map(p => p.cat1).filter(Boolean))].sort(), [products]);
            const cat2List = useMemo(() => [...new Set(products.filter(p => p.cat1 === c1).map(p => p.cat2).filter(Boolean))].sort(), [products, c1]);
            const cat3List = useMemo(() => [...new Set(products.filter(p => p.cat2 === c2).map(p => p.cat3).filter(Boolean))].sort(), [products, c2]);

            const displayProducts = useMemo(() => {
                let list = products;
                if (search) {
                    const q = search.toLowerCase();
                    list = list.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
                } else {
                    if (c3) list = list.filter(p => p.cat3 === c3);
                    else if (c2) list = list.filter(p => p.cat2 === c2);
                    else if (c1) list = list.filter(p => p.cat1 === c1);
                    else list = []; 
                }
                return list.sort((a,b) => a.name.localeCompare(b.name));
            }, [products, c1, c2, c3, search]);

            if (!isOpen) return null;

            return (
                <div className="absolute top-full left-0 w-full bg-slate-100 border-b border-slate-300 shadow-xl z-40 flex flex-col animate-[fadeIn_0.2s_ease-out]" style={{ height: '380px' }}>
                    <div className="flex items-center justify-between px-4 py-2 border-b border-slate-200 bg-white shrink-0">
                        <div className="flex items-center gap-3 flex-1 max-w-xl">
                            <span className="font-bold text-slate-800 text-sm"><i className="fas fa-plus-square text-blue-500 mr-1.5"></i>수기 상품 추가</span>
                            <div className="relative flex-1">
                                <i className="fas fa-search absolute left-2.5 top-1.5 text-slate-400 text-xs"></i>
                                <input type="text" placeholder="코드/품명/규격 검색 (카테고리 무시)" value={search} onChange={e => { setSearch(e.target.value); setC1(''); setC2(''); setC3(''); }} className="w-full pl-7 pr-3 py-1 border border-slate-300 rounded text-xs focus:outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors" />
                            </div>
                        </div>
                        <button onClick={onClose} className="text-slate-400 hover:text-rose-500 transition-colors p-1"><i className="fas fa-times text-lg"></i></button>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-[15%] bg-slate-50 border-r border-slate-200 overflow-y-auto hide-scrollbar">
                            {cat1List.map(cat => (
                                <div key={cat} onClick={() => { setC1(cat); setC2(''); setC3(''); setSearch(''); }} className={`px-3 py-2 text-xs cursor-pointer border-b border-slate-100 transition-colors ${c1 === cat && !search ? 'bg-blue-50 border-l-4 border-l-blue-500 text-blue-700 font-bold' : 'bg-white text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                    {cat}
                                </div>
                            ))}
                        </div>
                        <div className="w-[20%] bg-white border-r border-slate-200 overflow-y-auto hide-scrollbar">
                            {cat2List.map(cat => (
                                <div key={cat} onClick={() => { setC2(cat); setC3(''); setSearch(''); }} className={`px-3 py-2 text-xs cursor-pointer border-b border-slate-50 transition-colors ${c2 === cat && !search ? 'bg-blue-50 border-l-4 border-l-blue-500 text-blue-700 font-bold' : 'bg-white text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                    {cat}
                                </div>
                            ))}
                        </div>
                        <div className="w-[20%] bg-white border-r border-slate-200 overflow-y-auto hide-scrollbar">
                            {cat3List.map(cat => (
                                <div key={cat} onClick={() => { setC3(cat); setSearch(''); }} className={`px-3 py-2 text-xs cursor-pointer border-b border-slate-50 transition-colors ${c3 === cat && !search ? 'bg-blue-50 border-l-4 border-l-blue-500 text-blue-700 font-bold' : 'bg-white text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                    {cat}
                                </div>
                            ))}
                        </div>
                        <div className="w-[45%] bg-slate-100 p-3 overflow-y-auto custom-scrollbar">
                            {displayProducts.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <i className="fas fa-boxes text-4xl mb-3 opacity-30"></i>
                                    <p className="text-sm font-bold">좌측에서 카테고리를 선택하거나 검색하세요.</p>
                                </div>
                            ) : (
                                displayProducts.map(p => (
                                    <ManualOrderRow key={p.code} product={p} onAdd={onAddOrder} />
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        /* =======================================================================
           7. 메인 컴포넌트 App
           ======================================================================= */
        function App() {
            const [files, setFiles] = useState({ prev: [], in: [], estimate: [], out: [], done: [] }); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState({ text: '', type: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, warnings: [], payload: null });
            
            const [showSettings, setShowSettings] = useState(false);
            const [showMasterModal, setShowMasterModal] = useState(false);
            const [activeSettingsTab, setActiveSettingsTab] = useState('mapping');
            const [showGuide, setShowGuide] = useState(false);
            
            const [splitOptions, setSplitOptions] = useState(() => {
                const saved = localStorage.getItem('merchSplitOptions_v524');
                return saved ? JSON.parse(saved) : { price: false, vendor: false, date: false };
            });

            const [isManualAddOpen, setIsManualAddOpen] = useState(false);
            const [isGlobalDragging, setIsGlobalDragging] = useState(false);

            const [searchInputVal, setSearchInputVal] = useState('');
            const [cardHeight, setCardHeight] = useState(0);
            const [activeTab, setActiveTab] = useState('manage'); 
            const [selectedRows, setSelectedRows] = useState(new Set()); 
            
            const cardContainerRef = useRef(null);

            const [sortConfig, setSortConfig] = useState({ key: '코드', direction: 'asc' });
            const [filterGroup, setFilterGroup] = useState([]);
            const [filterVendor, setFilterVendor] = useState([]);
            const [filterWarehouse, setFilterWarehouse] = useState('');
            const [filterManager, setFilterManager] = useState('');
            const [activeDropdown, setActiveDropdown] = useState(null);

            // ✨ 버전 업데이트: v524 (배열 기반 마스터 데이터)
            const [mappings, setMappings] = useState(() => { const saved = localStorage.getItem('merchMappings_v524'); return saved ? { ...defaultMappings, ...JSON.parse(saved) } : defaultMappings; });
            const [masterData, setMasterData] = useState(() => { const saved = localStorage.getItem('merchMaster_v524'); return saved ? JSON.parse(saved) : []; });

            const showToast = useCallback((text, type = 'success') => {
                setToastMsg({ text, type });
                setTimeout(() => setToastMsg({ text: '', type: '' }), 2500);
            }, []);

            const { 
                stockData, orderData, updateOrder, updateOrderBulkStatus, updateStock, addManualOrder, processMasterOrEstimateFile,
                resetEngine, executeAnalysis, runAnalysis
            } = useMerchOpsEngine({ mappings, masterData, setMasterData, setAlertMsg, showToast, setConfirmModal, setIsProcessing, splitOptions });

            // Master Lookup Map for speedy inner renders
            const masterMap = useMemo(() => {
                const map = {};
                masterData.forEach(p => { map[p.code] = p; });
                return map;
            }, [masterData]);

            const summaryData = useMemo(() => {
                const map = {};
                
                const getKey = (item, isOrder = false) => {
                    const baseCode = item.코드 || item.code || 'NO_CODE';
                    const vendor = item.거래처 || item.vendor || '';
                    const date = item.일자 || item.date || '';
                    const price = isOrder ? (item.단가 || item.outPrice || '') : (item.inPrice || '');
                    return generateStockKey(baseCode, vendor, price, date, splitOptions);
                };

                if (!splitOptions.price && !splitOptions.vendor && !splitOptions.date) {
                    masterData.forEach(p => { 
                        map[p.code] = { 
                            key: p.code, 코드: p.code, 품명: p.name, 규격: p.spec, 
                            기초재고: 0, 입고수량: 0, 총주문: 0, 총판매: 0,
                            inPrice: p.inPrice || 0, outPrice: p.outPrice || 0,
                            거래처: p.vendor || '', 일자: '', 순번: '', 적요: '', 지시사항: '', 담당: '', 그룹: p.cat1 || ''
                        }; 
                    });
                }

                Object.values(stockData).forEach(s => { 
                    const k = s.key || getKey(s, false); 
                    if (!map[k]) {
                        map[k] = { 
                            key: k, 코드: s.코드, 품명: s.품명, 규격: s.규격, 
                            기초재고: 0, 입고수량: 0, 총주문: 0, 총판매: 0, 
                            inPrice: s.inPrice || 0, outPrice: s.outPrice || 0,
                            거래처: s.거래처 || '', 일자: s.일자 || '', 순번: s.순번 || '', 적요: '', 지시사항: '', 담당: '', 그룹: ''
                        };
                    }
                    map[k].기초재고 += (s.기초재고 || 0);
                    map[k].입고수량 += (s.입고수량 || 0);
                    map[k].수기발주 = s.수기발주;
                });

                orderData.forEach(o => {
                    const k = getKey(o, true);
                    if (!map[k]) {
                        map[k] = { 
                            key: k, 코드: o.코드, 품명: o.품명, 규격: o.규격, 
                            기초재고: 0, 입고수량: 0, 총주문: 0, 총판매: 0, 
                            inPrice: 0, outPrice: o.단가 || 0,
                            거래처: o.거래처 || '', 일자: o.일자 || '', 순번: o.순번 || '', 적요: '', 지시사항: '', 담당: '', 그룹: ''
                        };
                    }
                    if (o.상태 !== '전체취소' && o.상태 !== '삭제' && o.상태 !== '견적') { 
                        map[k].총주문 += (o.주문수량||0); 
                        map[k].총판매 += (o.판매수량||0); 
                        
                        const appendUnique = (field, val) => {
                            if (val && !map[k][field].includes(val)) map[k][field] += (map[k][field] ? ', ' : '') + val;
                        };
                        appendUnique('적요', o.적요);
                        appendUnique('지시사항', o.지시사항);
                        appendUnique('담당', o.담당자);
                        appendUnique('그룹', o.그룹);
                        if (!splitOptions.date) { appendUnique('일자', o.일자); appendUnique('순번', o.순번); }
                        if (!splitOptions.vendor) { appendUnique('거래처', o.거래처); }
                    }
                });
                return Object.values(map);
            }, [stockData, orderData, masterData, splitOptions]);

            const hasData = orderData.length > 0 || Object.keys(stockData).length > 0 || masterData.length > 0;

            const terminalMessage = useMemo(() => {
                if (isProcessing) return "processing data_blocks..."; 
                const hasFiles = files.in.length > 0 || files.out.length > 0 || files.prev.length > 0 || files.done.length > 0;
                if (hasFiles) return "data_blocks loaded... (수발주 연산 대기 중: Enter)";
                if (orderData.length > 0 || Object.keys(stockData).length > 0) return "merch_ops active... (수발주 동기화 완료)";
                return "waiting for files... (화면에 전표를 드래그 앤 드롭 하세요)";

            useEffect(() => {

            }, []);

                window.addEventListener('click', handleClickOutside);

            }, []);

                const updateHeight = () => { if (cardContainerRef.current) { const newHeight = cardContainerRef.current.offsetHeight; setCardHeight(prev => prev !== newHeight ? newHeight : prev); } };
                updateHeight();
                if (typeof ResizeObserver !== 'undefined') { const observer = new ResizeObserver(updateHeight); if (cardContainerRef.current) observer.observe(cardContainerRef.current); return () => observer.disconnect(); }
            }, [selectedRows.size, isManualAddOpen]); 

            const saveMappings = () => { 
                localStorage.setItem('merchMappings_v524', JSON.stringify(mappings)); 
                localStorage.setItem('merchSplitOptions_v524', JSON.stringify(splitOptions)); 
                setShowSettings(false); 
                setAlertMsg('매핑 및 기준 설정이 성공적으로 저장되었습니다.'); 
            };

            const autoAssignFiles = useCallback(async (fileArray) => {
                let count = { prev: 0, in: 0, estimate: 0, out: 0, done: 0 };
                const estimateFiles = [];
                const dailyFiles = [];

                fileArray.forEach(file => { 
                    const name = file.name.toLowerCase(); 
                    if (name.includes('견적')) estimateFiles.push(file);
                    else dailyFiles.push(file);
                });

                if (estimateFiles.length > 0) {
                    for (const file of estimateFiles) { await processMasterOrEstimateFile(file, true); count.estimate++; }
                }

                if (dailyFiles.length > 0) {
                    setFiles(prev => {
                        let updated = { ...prev }; 
                        dailyFiles.forEach(file => { 
                            const name = file.name.toLowerCase(); 
                            if (name.includes('미판매') || name.includes('주문') || name.includes('발주')) { updated.out = [...(updated.out || []), file]; count.out++; }
                            else if (name.includes('완료') || name.includes('판매현황') || name.includes('출고완료')) { updated.done = [...(updated.done || []), file]; count.done++; }
                            else if (name.includes('구매') || name.includes('매입') || name.includes('입고')) { updated.in = [...(updated.in || []), file]; count.in++; }
                            else { updated.prev = [...(updated.prev || []), file]; count.prev++; }
                        });
                        return updated;
                    });
                }
                
                if(fileArray.length > 1) {
                    showToast(`✅ ${fileArray.length}개 파일 묶음 자동 분류 완료 (기초:${count.prev} 입고:${count.in} 주문:${count.out} 판매:${count.done})`);
                }
            }, [showToast, processMasterOrEstimateFile]);

            const handleGlobalDrop = useCallback((e) => {

            }, [autoAssignFiles]);

            const handleResetFiles = useCallback(() => {
                setFiles({ prev: [], in: [], estimate: [], out: [], done: [] }); resetEngine();

                setIsManualAddOpen(false); setActiveTab('manage');
            }, [resetEngine]);

            // ✨ 데이터 비우기 (마스터)
            const handleResetMasterData = () => {
                setConfirmModal({
                    isOpen: true,
                    payload: null,
                    warnings: ["정말 모든 마스터 데이터를 삭제하시겠습니까?", "초기화된 데이터는 복구할 수 없습니다."],
                    onConfirm: () => {
                        setMasterData([]);
                        localStorage.removeItem('merchMaster_v524');
                        setConfirmModal({ isOpen: false, warnings: [], payload: null });
                        showToast("✅ 마스터 데이터가 모두 초기화되었습니다.", "success");
                    }
                });
            };

            const handleSort = (key) => { setSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc' })); };
            const toggleRowSelect = (id) => { const newSet = new Set(selectedRows); if (newSet.has(id)) newSet.delete(id); else newSet.add(id); setSelectedRows(newSet); };
            const toggleAllSelect = (rows) => { 
                if (selectedRows.size === rows.length && rows.length > 0) setSelectedRows(new Set());

            // 🌟 1. 상품 관리 (마스터) 탭 데이터 정렬 로직
            const tableRowsManage = useMemo(() => {

                if (searchInputVal) {
                    const q = searchInputVal.toLowerCase();
                    list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q) || (p.spec||'').toLowerCase().includes(q));
                }
                list.sort((a, b) => {
                    const gA = String(a.code || '').substring(0, 6);
                    const gB = String(b.code || '').substring(0, 6);
                    if (gA !== gB) return gA.localeCompare(gB);
                    
                    let valA = String(a[sortConfig.key] || ''); let valB = String(b[sortConfig.key] || '');
                    if (!isNaN(valA) && !isNaN(valB) && sortConfig.key !== 'code') { return sortConfig.direction === 'asc' ? Number(valA) - Number(valB) : Number(valB) - Number(valA); }
                    if (valA === valB) return (a.code||'').localeCompare(b.code||'');
                    if (sortConfig.direction === 'asc') return valA.localeCompare(valB);
                    else return valB.localeCompare(valA);
                });
                return list;
            }, [masterData, searchInputVal, sortConfig]);

            // 🌟 2. 거래처별 리스트 정렬 
            const tableRowsList = useMemo(() => {
                let processedOrders = orderData.filter(o => o.상태 !== '견적');

                if (searchInputVal) {
                    const q = searchInputVal.toLowerCase();
                    processedOrders = processedOrders.filter(o => (o.품명||'').toLowerCase().includes(q) || (o.코드||'').toLowerCase().includes(q) || (o.규격||'').toLowerCase().includes(q));
                }

                if (filterWarehouse) processedOrders = processedOrders.filter(o => o.창고 === filterWarehouse);
                if (filterManager) processedOrders = processedOrders.filter(o => o.담당자 === filterManager);
                if (filterGroup.length > 0) processedOrders = processedOrders.filter(o => filterGroup.includes(o.그룹));
                if (filterVendor.length > 0) processedOrders = processedOrders.filter(o => filterVendor.includes(o.거래처));

                processedOrders.sort((a, b) => {
                    let valA = String(a[sortConfig.key] || ''); let valB = String(b[sortConfig.key] || '');
                    if (!isNaN(valA) && !isNaN(valB) && sortConfig.key !== '코드') { return sortConfig.direction === 'asc' ? Number(valA) - Number(valB) : Number(valB) - Number(valA); }
                    if (valA === valB) {
                        if (a.코드 !== b.코드) return a.코드.localeCompare(b.코드);
                        if (a.품명 !== b.품명) return a.품명.localeCompare(b.품명);
                        return a.거래처.localeCompare(b.거래처);
                    }
                    if (sortConfig.direction === 'asc') return valA.localeCompare(valB);
                    else return valB.localeCompare(valA);
                });

                return processedOrders;
            }, [orderData, searchInputVal, filterGroup, filterVendor, filterWarehouse, filterManager, sortConfig]);

            // 🌟 3. 기본 품목 (견적) 정렬 로직 (마스터와 동일하게 앞 6자리로 그룹화 유도)
            const tableRowsEstimate = useMemo(() => {
                let list = orderData.filter(o => o.상태 === '견적');
                if (searchInputVal) {
                    const q = searchInputVal.toLowerCase();
                    list = list.filter(o => (o.품명||'').toLowerCase().includes(q) || (o.코드||'').toLowerCase().includes(q) || (o.규격||'').toLowerCase().includes(q));
                }
                
                list.sort((a, b) => {
                    const gA = String(a.코드 || '').substring(0, 6);
                    const gB = String(b.코드 || '').substring(0, 6);
                    if (gA !== gB) return gA.localeCompare(gB);
                    
                    let valA = String(a[sortConfig.key] || ''); let valB = String(b[sortConfig.key] || '');
                    if (!isNaN(valA) && !isNaN(valB) && sortConfig.key !== '코드') { return sortConfig.direction === 'asc' ? Number(valA) - Number(valB) : Number(valB) - Number(valA); }
                    if (valA === valB) return (a.코드 || '').localeCompare(b.코드 || '');
                    if (sortConfig.direction === 'asc') return valA.localeCompare(valB);
                    else return valB.localeCompare(valA);
                });
                return list;
            }, [orderData, searchInputVal, sortConfig]);

            // 🌟 4. 품목별 (집계) 정렬 로직 
            const tableRowsSummary = useMemo(() => {
                let processed = [...summaryData];
                if (searchInputVal) { 
                    const q = searchInputVal.toLowerCase(); 
                    processed = processed.filter(o => (o.품명||'').toLowerCase().includes(q) || (o.코드||'').toLowerCase().includes(q) || (o.규격||'').toLowerCase().includes(q)); 
                }
                
                processed.sort((a, b) => {
                    let valA = String(a[sortConfig.key] || ''); let valB = String(b[sortConfig.key] || '');
                    if (!isNaN(valA) && !isNaN(valB) && sortConfig.key !== '코드') { return sortConfig.direction === 'asc' ? Number(valA) - Number(valB) : Number(valB) - Number(valA); }
                    if (valA === valB) return a.코드.localeCompare(b.코드);
                    if (sortConfig.direction === 'asc') return valA.localeCompare(valB);
                    else return valB.localeCompare(valA);
                });
                return processed;
            }, [summaryData, searchInputVal, sortConfig]);

            const groupOptions = useMemo(() => [...new Set(orderData.map(o => o.그룹))].sort(), [orderData]);
            const vendorOptions = useMemo(() => [...new Set(orderData.map(o => o.거래처))].sort(), [orderData]);
            const warehouseOptions = useMemo(() => [...new Set(orderData.map(o => o.창고).filter(Boolean))].sort(), [orderData]);
            const managerOptions = useMemo(() => [...new Set(orderData.map(o => o.담당자).filter(Boolean))].sort(), [orderData]);

            const exportExcel = useCallback(() => {
                let exportData = [];
                let sheetName = '';
                let fileName = '';

                if (activeTab === 'manage') {
                    if (tableRowsManage.length === 0) { setAlertMsg("다운로드할 데이터가 없습니다."); return; }
                    exportData = tableRowsManage.map(r => ({
                        '품목코드': r.code, '품명': r.name, '규격': r.spec, '대분류': r.cat1, '중분류': r.cat2, '소분류': r.cat3, '매입단가': r.inPrice, '판매단가': r.outPrice, '기본거래처': r.vendor
                    }));
                    sheetName = '마스터_상품목록'; fileName = `마스터_상품목록.xlsx`;
                } 
                else if (activeTab === 'estimate') {
                    if (tableRowsEstimate.length === 0) { setAlertMsg("다운로드할 데이터가 없습니다."); return; }
                    exportData = tableRowsEstimate.map(r => ({
                        '일자': r.일자, '순번': r.순번, '카테고리': masterMap[r.코드]?.cat3 || '', '품목코드': r.코드, '품명(규격)': `${r.품명} ${r.규격}`.trim(), '견적단가': r.단가, '거래처': r.거래처, '그룹': r.그룹, '상태': r.상태, '적요': r.적요
                    }));
                    sheetName = '기본품목_견적목록'; fileName = `기본품목_견적목록.xlsx`;

                    exportData = tableRowsList.map(r => {

                        return { '일자': r.일자, '순번': r.순번, '카테고리': masterMap[r.코드]?.cat3 || '', '품목코드': r.코드, '품명(규격)': `${r.품명} ${r.규격}`.trim(), '판매단가': outPrice, '수량': r.주문수량 || 0, '재고': stock.기초재고 || 0, '입고': stock.입고수량 || 0, '출고': r.판매수량 || 0, '적요': r.적요, '지시사항': r.지시사항, '거래처': r.거래처, '그룹': r.그룹, '담당': r.담당자 };
                    });
                    sheetName = '전표_상세현황'; fileName = `수발주_거래처별상세.xlsx`;

                    exportData = tableRowsSummary.map(r => {

                    });
                    sheetName = '품목_집계현황'; fileName = `수발주_품목별집계.xlsx`;

                const wb = XLSX.utils.book_new();

                try {
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = URL.createObjectURL(blob);

                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    showToast("✅ 엑셀 다운로드가 완료되었습니다.");
                } catch (err) { setAlertMsg("엑셀 파일 생성 중 오류가 발생했습니다."); }
            }, [activeTab, tableRowsManage, tableRowsEstimate, tableRowsList, tableRowsSummary, masterMap, stockData, splitOptions, showToast]);

            const latestHandlers = useRef({ exportExcel, runAnalysis, files });
            useEffect(() => { latestHandlers.current = { exportExcel, runAnalysis, files }; }, [exportExcel, runAnalysis, files]);

            return (
