                                                                    const bgClass = isShortage ? "bg-rose-50/20 hover:bg-rose-50" : "hover:bg-slate-50";

                                                                    return (
                                                                        <tr key={row.key} className={`${bgClass} transition-colors text-slate-800`}>
                                                                            <td className="px-2 py-1.5 border-r border-slate-100 text-center sticky left-0 z-20 bg-inherit"></td>
                                                                            
                                                                            <ProductInfoCell name={row.품명} spec={row.규격} code={row.코드} />

                                                                            <td className="px-4 py-2 border-r border-slate-100 text-right text-emerald-700 font-semibold">{row.inPrice ? row.inPrice.toLocaleString() : '-'}</td>
                                                                            
                                                                            <td className="px-2 py-2 border-r border-slate-100 text-right bg-slate-50">
                                                                                <div className="font-black text-slate-700 text-[14px]">{totalStock}</div>
                                                                                <div className="text-[9px] text-slate-400 mt-0.5">재고 {stock.기초재고} + 입고 {stock.입고수량}</div>
                                                                            </td>
                                                                            <td className="px-4 py-2 border-r border-slate-100 text-right font-black text-blue-600 text-[14px]">{totalDemand}</td>
                                                                            <td className="px-4 py-2 border-r border-slate-100 text-right bg-rose-50/30">
                                                                                {isShortage ? (
                                                                                    <div className="flex items-center justify-end font-black text-rose-600 text-[15px] animate-pulse"><i className="fas fa-arrow-up text-[10px] mr-1.5"></i>{displayShortage}</div>
                                                                                ) : (
                                                                                    <span className="text-slate-300 font-bold">-</span>
                                                                                )}
                                                                            </td>
                                                                            
                                                                            <td className="px-4 py-2 text-slate-600 text-xs">
                                                                                {row.적요 ? <span className="bg-slate-100 px-2 py-1 rounded shadow-sm inline-block max-w-[250px] truncate" title={row.적요}>{row.적요}</span> : '-'}
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })
                                                            )}
                                                        </tbody>
                                                    </table>
                                                )}

                                                {/* ✨ 4. 거래처별 (상세) 탭 */}
                                                {activeTab === 'vendor' && (
                                                    <table className="w-full text-left border-collapse text-[13px] whitespace-nowrap border-t border-slate-200">
                                                        <thead className="bg-slate-100 text-slate-700 font-extrabold text-[12px] sticky top-0 z-30 shadow-[0_1px_2px_rgba(0,0,0,0.05)] tracking-tight align-bottom">
                                                            <tr>
                                                                <th className="px-2 py-2 border-r border-slate-200 border-b w-[65px] text-center sticky left-0 z-40 bg-slate-100 align-middle">
                                                                    <div className="flex flex-col items-center justify-center gap-1.5">
                                                                        <input type="checkbox" className="w-3.5 h-3.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer" checked={selectedRows.size === tableRowsList.length && tableRowsList.length > 0} onChange={() => toggleAllSelect(tableRowsList)} />
                                                                        <span className="text-[9px] text-slate-400 font-bold tracking-tighter leading-none">일자-No.</span>
                                                                    </div>
                                                                </th>
                                                                
                                                                <SearchHeader value={searchInputVal} onChange={setSearchInputVal} />

                                                                <SortableHeader label="수량" sortKey="주문수량" currentSort={sortConfig} onSort={handleSort} width="w-[80px]" align="right" />
                                                                <SortableHeader label="판매단가" sortKey="단가" currentSort={sortConfig} onSort={handleSort} width="w-[100px]" align="right" />
                                                                
                                                                <th className="px-4 py-2 border-r border-slate-200 border-b text-left w-auto align-middle text-slate-600">적요 / 메세지</th>
                                                                
                                                                <th className="p-0 border-r border-slate-200 border-b w-[120px] align-middle">
                                                                    <div className="flex items-center justify-between px-3 py-2 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('거래처')}>
                                                                        <span className="flex items-center gap-1">거래처</span>
                                                                        <div className="relative text-right" onClick={(e) => { e.stopPropagation(); setActiveDropdown(activeDropdown==='vendor'?null:'vendor'); }}>
                                                                            <i className={`fas fa-filter ${filterVendor.length>0?'text-blue-500':'text-slate-400'} hover:text-blue-600 p-1`}></i>
                                                                            {activeDropdown === 'vendor' && <FilterDropdown options={vendorOptions} selectedOptions={filterVendor} onChange={setFilterVendor} onClose={()=>setActiveDropdown(null)} />}
                                                                        </div>
                                                                    </div>
                                                                </th>
                                                                <th className="p-0 border-r border-slate-200 border-b w-[100px] align-middle">
                                                                    <div className="flex items-center justify-between px-3 py-2 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('담당자')}>
                                                                        <span className="flex items-center gap-1">담당자</span>
                                                                    </div>
                                                                </th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {tableRowsList.length === 0 ? (
                                                                <tr>
                                                                    <td colSpan="8" className="p-16 text-center text-slate-400 font-bold bg-slate-50">
                                                                        <i className="fas fa-store mb-3 text-4xl opacity-50 block"></i>
                                                                        조회할 전표 데이터가 없습니다. 상단 패널에 엑셀(주문/판매)을 올려주세요.
                                                                    </td>
                                                                </tr>
                                                            ) : (
                                                                tableRowsList.map((row) => {
                                                                    const isSelected = selectedRows.has(row.id);
                                                                    const isCanceled = row.상태 === '전체취소' || row.상태 === '삭제';
                                                                    const bgClass = isSelected ? "bg-blue-50/40 hover:bg-blue-50" : (isCanceled ? "bg-slate-100 opacity-60 line-through" : "hover:bg-slate-50");
                                                                    
                                                                    const outPrice = masterMap[row.코드]?.outPrice || row.단가 || 0;

                                                                    return (
                                                                        <tr key={row.id} className={`${bgClass} transition-colors text-slate-800 cursor-pointer`} onClick={() => toggleRowSelect(row.id)}>
                                                                            <td className="px-2 py-1.5 border-r border-slate-100 text-center sticky left-0 z-20 bg-inherit" onClick={e=>e.stopPropagation()}>
                                                                                <div className="flex flex-col items-center justify-center gap-1.5">
                                                                                    <input type="checkbox" className="w-3.5 h-3.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer" checked={isSelected} onChange={() => toggleRowSelect(row.id)} />
                                                                                    <span className="text-[9px] text-slate-400 font-mono tracking-tighter leading-none" title={formatDateNumber(row.일자, row.순번)}>
                                                                                        {formatDateNumber(row.일자, row.순번).substring(0, 8)}
                                                                                    </span>
                                                                                </div>
                                                                            </td>
                                                                            
                                                                            <ProductInfoCell name={row.품명} spec={row.규격} code={row.코드} />
                                                                            
                                                                            <td className="px-4 py-2 border-r border-slate-100 text-right font-black text-indigo-600 bg-indigo-50/20">{row.주문수량 || row.판매수량}</td>
                                                                            <td className="px-4 py-2 border-r border-slate-100 text-right font-bold text-blue-700">{outPrice > 0 ? outPrice.toLocaleString() : '-'}</td>
                                                                            
                                                                            <td className="px-4 py-1.5 border-r border-slate-100 align-middle max-w-[250px]" onClick={e=>e.stopPropagation()}>
                                                                                <div className="flex flex-col gap-1 w-full">
                                                                                    <input type="text" value={row.적요} onChange={e => updateOrder(row.id, '적요', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-blue-400 outline-none text-[12px] py-0.5 text-slate-600 focus:bg-white truncate" placeholder="메모" />
                                                                                    <input type="text" value={row.지시사항} onChange={e => updateOrder(row.id, '지시사항', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-amber-400 outline-none text-[11px] py-0.5 text-amber-700 font-medium focus:bg-white truncate" placeholder="지시사항" />
                                                                                </div>
                                                                            </td>

                                                                            <td className="px-4 py-2 border-r border-slate-100 font-bold text-slate-700 truncate max-w-[120px]" title={row.거래처}>
                                                                                <div className="flex flex-col">
                                                                                    <span>{row.거래처}</span>
                                                                                    <span className="text-[9px] text-slate-400 mt-0.5">{row.그룹}</span>
                                                                                </div>
                                                                            </td>
                                                                            <td className="px-3 py-2 text-center text-slate-600 font-medium truncate max-w-[100px]" title={row.담당자}>{row.담당자}</td>
                                                                        </tr>
                                                                    );
                                                                })
                                                            )}
                                                        </tbody>
                                                    </table>
                                                )}

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
