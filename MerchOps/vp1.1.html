<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Smart Parser [v1.2]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        // ==========================================
        // 🧩 1. 상수 및 유틸리티
        // ==========================================
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => {
            if (!str) return '';
            const match = String(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g);
            return match ? match.join('') : '';
        };

        const addTag = (oldTags, newTag) => {
            if (!newTag) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            if (!tags.includes(newTag)) tags.push(newTag);
            return tags.join(', ');
        };

        const removeTag = (oldTags, tagToRemove) => {
            if (!tagToRemove) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            return tags.filter(t => t !== tagToRemove).join(', ');
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 엔진
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') calcOutPrice = totalCost / (1 - (appliedRule.rate / 100));
            else calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData?.['출고가']);
            const mIn = parseNum(mItem?.['입고가']);
            const mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']);
            const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                newFinalData['1출고'] = Math.round((Math.round((newFinalData['출고가'] / div1) + extraCost)) / 10) * 10; 
            }
            return newFinalData;
        };

        const parseTextSemantically = (rawText) => {
            if (!rawText) return [];
            let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
            const results = [];
            let currentItem = {};

            const pushItem = () => {
                if (currentItem.품목명) {
                    if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, '');
                    results.push({ _id: generateUUID(), _apply: true, ...currentItem }); 
                }
                currentItem = {};
            };

            lines.forEach(line => {
                if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^starLine$/i.test(line) || /^마감$/.test(line) || /^\d{2}월\s*\d{2}일\s*\d{2}:\d{2}\s*마감$/.test(line) || /default-thumbnail/i.test(line) || /^상품이미지$|^이미지\s*준비중$/.test(line) || /마켓보로|통신판매업의\s*중개자|당사자가\s*아닙니다|책임을\s*지지\s*않습니다|판매자가\s*등록한|데이터가\s*없습니다|-\s*끝\s*-/i.test(line)) return;

                const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                let extractedPrice = null;

                if (priceMatch) {
                    extractedPrice = priceMatch[1];
                    line = line.replace(priceMatch[0], '').trim();
                    if (line.endsWith('/')) line = line.slice(0, -1).trim();
                }

                if (extractedPrice) currentItem.입고가 = extractedPrice;
                if (!line) { if (extractedPrice) pushItem(); return; }

                if (!currentItem.품목명) {
                    if (line.includes(' / ')) {
                        const splitBySpaceSlashSpace = line.split(' / ');
                        let namePart = splitBySpaceSlashSpace[0].trim();
                        let specPart = splitBySpaceSlashSpace.slice(1).join(' / ').trim();

                        const unitMatch = namePart.match(/(EA|BOX|포|개|벌크BOX|벌크|박스|봉|캔|병|팩|단|마리)$/i);
                        if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } 
                        else { currentItem.품목명 = namePart; }

                        const specParts = specPart.split('/').map(s => s.trim());
                        currentItem.규격 = specParts[0] || '';
                        if (specParts.length > 1) currentItem.간단설명 = specParts.slice(1).join(' | ');
                    } else { currentItem.품목명 = line; }
                } else {
                    if (line.includes('/')) {
                        const parts = line.split('/').map(s => s.trim());
                        if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                        if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                        if (parts.length > 2) currentItem.간단설명 = parts.slice(2).join(' | ') || '';
                    } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/i.test(line)) {
                        currentItem.규격 = line;
                    } else {
                        currentItem.간단설명 = currentItem.간단설명 ? currentItem.간단설명 + ' | ' + line : line;
                    }
                }
                if (extractedPrice) pushItem();
            });
            if (currentItem.품목명) pushItem();
            return results;
        };

        const runSmartMatch = (extName, extSpec, mProducts, pDict) => {
            const normExtName = normalizeText(extName), normExtSpec = normalizeText(extSpec);
            const extTokens = tokenize(extName), extExtractedSpec = extractSpec(extName + " " + (extSpec || ''));
            const dictKey = `${normExtName}|${normExtSpec}`;

            if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 학습일치' };

            let bestMatch = null, bestScore = 0, specConflict = false;

            for (const mCode in mProducts) {
                const m = mProducts[mCode];
                const mNormName = normalizeText(m.품목명), mTokens = tokenize(m.품목명);
                const mExtractedSpec = extractSpec(m.품목명 + " " + (m.규격||''));

                let specMatch = true;
                if (extExtractedSpec && mExtractedSpec && extExtractedSpec !== mExtractedSpec) specMatch = false;

                let score = 0;
                if (mNormName === normExtName) score = 1;
                else {
                    const intersection = extTokens.filter(t => mTokens.includes(t));
                    score = intersection.length / Math.max(extTokens.length, mTokens.length);
                }

                if (score > 0.6) {
                    if (!specMatch) specConflict = true; 
                    else if (score > bestScore) { bestScore = score; bestMatch = m; }
                }
            }

            if (bestMatch && bestScore === 1) return { code: bestMatch.코드, status: '🟢 일치' };
            if (bestMatch && bestScore > 0.6) return { code: '', status: '🟡 유사' };
            return { code: '', status: '🔴 불일치' };
        };

        const searchMasterProducts = (productsObj, keyword) => {
            if (!keyword || !keyword.trim()) return [];
            const cleanKeyword = keyword.toLowerCase().replace(/[()[\]{},./]/g, ' ');
            const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
            if (tokens.length === 0) return [];

            const results = Object.values(productsObj).map(m => {
                const mName = String(m.품목명 || '').toLowerCase();
                const mSpec = String(m.규격 || '').toLowerCase();
                const mBrand = String(m.브랜드 || '').toLowerCase();
                const mWh = String(m.창고 || '').toLowerCase();
                const mVendor = String(m.구매처 || m.거래처 || '').toLowerCase();
                
                const mFull = mName + ' ' + mSpec + ' ' + mBrand + ' ' + mWh + ' ' + mVendor;
                let score = 0, matchCount = 0;

                tokens.forEach(token => {
                    if (mName.includes(token)) { score += token.length * 10; matchCount++; } 
                    else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; } 
                    else if (mVendor.includes(token)) { score += token.length * 4; matchCount++; }
                    else if (mBrand.includes(token)) { score += token.length * 3; matchCount++; }
                    else if (mWh.includes(token)) { score += token.length * 2; matchCount++; }
                });

                if (mFull.replace(/\s+/g, '').includes(keyword.toLowerCase().replace(/\s+/g, ''))) score += 1000;
                return { item: m, score, matchCount };
            }).filter(r => r.score > 0);

            results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
            return results.map(r => r.item);
        };

        // ==========================================
        // 🧩 3. 훅 및 상태 관리
        // ==========================================
        const useParserApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [parserDict, setParserDict] = useState(() => { try { return JSON.parse(localStorage.getItem('parserDict_v870')) || {}; } catch(e){ return {}; }});
            const [marginRules, setMarginRules] = useState(() => { try { return JSON.parse(localStorage.getItem('merchMarginRules_v878')) || [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } catch(e) { return [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } });

            useEffect(() => {
                getIDB('merchMaster_v870').then(data => {
                    if (data) setMasterProducts(data);
                }).catch(console.error);
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        getIDB('merchMaster_v870').then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMaster = async (data) => {
                setMasterProducts(data);
                try {
                    await setIDB('merchMaster_v870', data);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                }
            };

            const saveDict = (data) => {
                setParserDict(data);
                localStorage.setItem('parserDict_v870', JSON.stringify(data));
            };

            const [parserBuffer, setParserBuffer] = useState([]);
            const [currentTag, setCurrentTag] = useState(''); 
            
            const [activeTab, setActiveTab] = useState('matched'); 
            const [showInputModal, setShowInputModal] = useState(true); 
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            const [globalSearch, setGlobalSearch] = useState('');
            const [targetId, setTargetId] = useState(null); 
            const [selectedMissingCodes, setSelectedMissingCodes] = useState(new Set());
            const [processedCodes, setProcessedCodes] = useState(new Set());

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                masterProducts, saveMaster, parserDict, saveDict, marginRules,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                activeTab, setActiveTab, showInputModal, setShowInputModal,
                toastMsg, showToast, isProcessing, setIsProcessing, processMsg, setProcessMsg,
                globalSearch, setGlobalSearch, targetId, setTargetId,
                selectedMissingCodes, setSelectedMissingCodes, processedCodes, setProcessedCodes
            };
        };

        // ==========================================
        // 🧩 4. 비즈니스 액션
        // ==========================================
        const useParserActions = (appState) => {
            const { 
                masterProducts, saveMaster, parserDict, saveDict, marginRules,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                setActiveTab, setShowInputModal, showToast, setIsProcessing, setProcessMsg,
                setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes,
                processedCodes, setProcessedCodes
            } = appState;

            const executeParser = useCallback((rawText, tag, forceManual = false) => {
                setShowInputModal(false); 
                setIsProcessing(true); 
                setProcessMsg("AI 분석 및 스마트 매칭 중...");
                setCurrentTag(tag);
                setProcessedCodes(new Set());

                setTimeout(() => {
                    try {
                        const parsedData = parseTextSemantically(rawText);
                        const results = []; 
                        
                        parsedData.forEach(rowData => {
                            const extName = rowData['품목명'] || '';
                            const extSpec = rowData['규격'] || '';
                            
                            let matchResult;
                            if (forceManual) matchResult = { code: '', status: '🔴 불일치' };
                            else matchResult = runSmartMatch(extName, extSpec, masterProducts, parserDict);
                            
                            rowData._matchCode = matchResult.code; 
                            rowData._matchStatus = matchResult.status;
                            if(matchResult.code) { rowData.코드 = matchResult.code; }
                            
                            rowData.finalData = {};
                            const pInNum = rowData['입고가'] ? parseNum(rowData['입고가']) : 0;
                            
                            if (pInNum > 0 && matchResult.code) {
                                const mItem = masterProducts[matchResult.code] || {};
                                rowData.finalData = calculatePricesEngine(pInNum, mItem, {}, marginRules, true);
                            } else {
                                rowData.finalData['입고가'] = pInNum;
                            }
                            results.push(rowData);
                        });
                        
                        setParserBuffer(results); 
                        setActiveTab(forceManual ? 'unmatched' : 'matched'); 
                        setTargetId(null); 
                        setGlobalSearch(''); 
                        setSelectedMissingCodes(new Set());

                        showToast(forceManual ? '✅ 수동 매핑 모드로 로드되었습니다.' : '✅ 텍스트 분석 및 매칭이 완료되었습니다.');
                    } catch (error) {
                        console.error(error);
                        showToast("❌ 텍스트 분석 중 예기치 않은 오류가 발생했습니다.");
                    } finally {
                        setIsProcessing(false); 
                        setProcessMsg(''); 
                    }
                }, 100);
            }, [masterProducts, parserDict, marginRules]);

            const handleApplyMatched = useCallback(async () => {
                const toApply = parserBuffer.filter(r => r._apply && r._matchCode);
                if (toApply.length === 0) return showToast("⚠️ 적용할 항목이 없습니다.");

                setIsProcessing(true); setProcessMsg("단가 업데이트 및 학습 중...");

                setTimeout(async () => {
                    try {
                        let newMaster = { ...masterProducts };
                        let newDict = { ...parserDict };
                        let newlyProcessed = new Set(processedCodes);

                        toApply.forEach(row => {
                            const code = row._matchCode;
                            newlyProcessed.add(code);

                            if (!newMaster[code]) newMaster[code] = { 코드: code };
                            else newMaster[code] = { ...newMaster[code] };
                            
                            const pInNum = parseNum(row.finalData?.['입고가'] || row['입고가']);
                            if (pInNum > 0) {
                                newMaster[code]['입고가'] = pInNum;
                                const recalculated = calculatePricesEngine(pInNum, newMaster[code], row.finalData || {}, marginRules, false);
                                Object.assign(newMaster[code], recalculated);
                            }

                            if (currentTag) {
                                newMaster[code]['카탈로그'] = addTag(newMaster[code]['카탈로그'], currentTag);
                            }

                            if (row['품목명']) {
                                const normExtName = normalizeText(row['품목명']);
                                const normExtSpec = normalizeText(row['규격']);
                                newDict[`${normExtName}|${normExtSpec}`] = code;
                            }
                        });

                        await saveMaster(newMaster); 
                        saveDict(newDict); 
                        
                        setProcessedCodes(newlyProcessed);
                        
                        const appliedIds = new Set(toApply.map(r => r._id));
                        setParserBuffer(prev => {
                            const nextBuffer = prev.filter(r => !appliedIds.has(r._id));
                            if (nextBuffer.length === 0) {
                                setCurrentTag('');
                            }
                            return nextBuffer;
                        });

                        showToast(`✅ ${toApply.length}건 반영 완료! 메인 화면으로 이동합니다...`);

                        setTimeout(() => {
                            try {
                                const url = window.location.href;
                                if (url.startsWith('blob:') || url.startsWith('about:') || url.startsWith('data:')) {
                                    // 미리보기 환경
                                } else {
                                    window.location.href = `https://oneapp.orderz.co.kr/MerchOps/v1.1?catalog=${encodeURIComponent(currentTag)}`;
                                }
                            } catch (e) {}
                        }, 1200);

                    } catch (error) {
                        console.error(error);
                        showToast("❌ 데이터베이스 저장 중 오류가 발생했습니다.");
                    } finally {
                        setIsProcessing(false); setProcessMsg(''); 
                    }
                }, 100);
            }, [parserBuffer, masterProducts, parserDict, marginRules, currentTag, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setIsProcessing, setProcessMsg, showToast]);

            const handleConfirmMapping = useCallback(async (masterCode) => { 
                if (!targetId) return showToast("⚠️ 먼저 왼쪽에서 매핑할 타겟 상품을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId); if (!row) return;

                try {
                    const normExtName = normalizeText(row['품목명']);
                    const normExtSpec = normalizeText(row['규격']);
                    const dictKey = `${normExtName}|${normExtSpec}`;
                    
                    const newDict = { ...parserDict, [dictKey]: masterCode };
                    saveDict(newDict);
                    
                    let newMaster = { ...masterProducts };
                    if (!newMaster[masterCode]) newMaster[masterCode] = { 코드: masterCode };
                    else newMaster[masterCode] = { ...newMaster[masterCode] };

                    if (currentTag) {
                        newMaster[masterCode]['카탈로그'] = addTag(newMaster[masterCode]['카탈로그'], currentTag);
                    }
                    
                    const pInNum = row.finalData?.['입고가'] ? parseNum(row.finalData['입고가']) : 0;
                    let recalculatedFinal = row.finalData || {};

                    if(pInNum > 0) {
                        newMaster[masterCode]['입고가'] = pInNum;
                        recalculatedFinal = calculatePricesEngine(pInNum, newMaster[masterCode], recalculatedFinal, marginRules, false);
                        Object.assign(newMaster[masterCode], recalculatedFinal);
                    }
                    
                    await saveMaster(newMaster);

                    const newProcessed = new Set(processedCodes);
                    newProcessed.add(masterCode);
                    setProcessedCodes(newProcessed);

                    setParserBuffer(prev => prev.filter(r => r._id !== targetId));
                    setTargetId(null); setGlobalSearch(''); 
                    showToast(`✅ 매핑 및 연결 완료! ${currentTag ? `(카탈로그 '${currentTag}' 기록됨)` : ''}`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 수동 매핑 처리 중 오류가 발생했습니다.");
                }
            }, [targetId, parserBuffer, masterProducts, parserDict, marginRules, currentTag, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setTargetId, setGlobalSearch, showToast]);

            const handleCreateNewMasterItem = useCallback(async () => {
                if (!targetId) return showToast("⚠️ 먼저 추가할 파싱 항목을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId);
                if (!row) return;

                if(!window.confirm(`'${row['품목명']}'을(를) 마스터 DB에 신규 상품으로 등록하시겠습니까?`)) return;

                setIsProcessing(true); setProcessMsg("신규 마스터 품목 등록 중...");

                try {
                    const newCode = `N${Math.floor(Math.random() * 1000000).toString().padStart(6, '0')}`;
                    let newMaster = { ...masterProducts };
                    
                    const pInNum = row.finalData?.['입고가'] || parseNum(row['입고가']);

                    newMaster[newCode] = {
                        코드: newCode,
                        품목명: row['품목명'],
                        규격: row['규격'] || '',
                        단위: row['단위'] || '',
                        입고가: pInNum,
                        카탈로그: currentTag ? currentTag : ''
                    };

                    const recalculatedFinal = calculatePricesEngine(pInNum, newMaster[newCode], row.finalData || {}, marginRules, false);
                    Object.assign(newMaster[newCode], recalculatedFinal);

                    await saveMaster(newMaster);

                    const normExtName = normalizeText(row['품목명']);
                    const normExtSpec = normalizeText(row['규격']);
                    const dictKey = `${normExtName}|${normExtSpec}`;
                    const newDict = { ...parserDict, [dictKey]: newCode };
                    saveDict(newDict);

                    const newProcessed = new Set(processedCodes);
                    newProcessed.add(newCode);
                    setProcessedCodes(newProcessed);

                    setParserBuffer(prev => prev.filter(r => r._id !== targetId));
                    setTargetId(null);
                    setGlobalSearch('');

                    showToast(`✅ [${newCode}] 신규 마스터 상품으로 등록 완료!`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 신규 등록 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [targetId, parserBuffer, masterProducts, currentTag, marginRules, parserDict, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setTargetId, setGlobalSearch, setIsProcessing, setProcessMsg, showToast]);

            const handleIgnoreParsedItem = useCallback((id) => {
                setParserBuffer(prev => prev.filter(r => r._id !== id));
                if (targetId === id) { setTargetId(null); setGlobalSearch(''); }
            }, [targetId, setParserBuffer, setTargetId, setGlobalSearch]);

            const handleRemoveMissingTags = useCallback(async () => {
                const codesToProcess = Array.from(selectedMissingCodes);
                if (codesToProcess.length === 0) return showToast("⚠️ 제외할 상품을 선택하세요.");
                if (!currentTag) return showToast("⚠️ 기준 카탈로그가 없습니다.");

                setIsProcessing(true); setProcessMsg("카탈로그 제외 처리 중...");
                
                try {
                    let newMaster = { ...masterProducts };
                    let count = 0;

                    codesToProcess.forEach(code => {
                        if (newMaster[code]) {
                            newMaster[code]['카탈로그'] = removeTag(newMaster[code]['카탈로그'], currentTag);
                            count++;
                        }
                    });

                    await saveMaster(newMaster);
                    setSelectedMissingCodes(new Set()); 
                    showToast(`✅ ${count}개 상품을 '${currentTag}' 카탈로그에서 조용히 제외했습니다.`);
                } catch (error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [selectedMissingCodes, masterProducts, currentTag, saveMaster, setSelectedMissingCodes, setIsProcessing, setProcessMsg, showToast]);

            const handleRemoveTagDirect = useCallback(async (code) => {
                if (!currentTag) return;
                if(!window.confirm(`이 상품을 [${currentTag}] 카탈로그에서 강제로 단종(제외) 처리하시겠습니까?`)) return;

                        showToast(`✅ 선택한 상품을 '${currentTag}' 카탈로그에서 단종 처리했습니다.`);
                    }
                } catch(error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                }
            }, [masterProducts, currentTag, saveMaster, showToast]);

            return { executeParser, handleApplyMatched, handleConfirmMapping, handleCreateNewMasterItem, handleIgnoreParsedItem, handleRemoveMissingTags, handleRemoveTagDirect };

                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });

                return Object.keys(counts).sort().map(tag => ({
                    name: tag,
                    count: counts[tag]
                }));
            }, [masterProducts]);

            const similarRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('유사'));

            const missingRows = useMemo(() => {

                    if (tags.includes(currentTag) && !matchedCodes.has(String(code)) && !processedStr.has(String(code))) {
                        missing.push(mItem);
                    }
                }

                                                REPORT

                            <div className="px-8 pt-4 pb-3 flex items-center justify-between gap-3 overflow-x-auto custom-scrollbar w-full">

                                    <button onClick={()=>setActiveTab('matched')} className={`px-4 py-2 rounded-md text-[13px] font-black transition-all ${activeTab==='matched' ? 'bg-white text-emerald-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🟢 일치 ({matchedRows.length})</button>

                                    <button onClick={()=>setActiveTab('unmatched')} className={`px-4 py-2 rounded-md text-[13px] font-black transition-all ${activeTab==='unmatched' ? 'bg-white text-rose-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🔴 불일치 ({unmatchedRows.length})</button>

                                <div className="flex items-center gap-3 shrink-0">
                                    {activeTab === 'matched' && (
                                        <button onClick={actions.handleApplyMatched} className="h-9 px-5 rounded-lg text-[13px] font-black shadow-sm bg-slate-800 text-white border border-slate-900 hover:bg-slate-700 transition-colors flex items-center"><i className="fas fa-check-double mr-2 text-emerald-400"></i>반영 및 학습</button>
                                    )}
                                    {activeTab === 'missing' && (
                                        <button onClick={actions.handleRemoveMissingTags} className={`h-9 px-4 rounded-lg text-[12px] font-bold shadow-sm transition-colors flex items-center ${selectedMissingCodes.size > 0 ? 'bg-rose-50 border border-rose-200 text-rose-600 hover:bg-rose-100' : 'bg-white text-slate-400 border border-slate-200'}`}><i className="fas fa-eraser mr-2"></i>선택 항목 카탈로그 제외</button>
                                    )}
                                    <button onClick={() => setShowInputModal(true)} className="h-9 px-4 rounded-lg text-[12px] font-bold bg-white text-indigo-600 border border-slate-300 hover:bg-indigo-50 shadow-sm transition-colors flex items-center"><i className="fas fa-magic mr-1.5"></i>새 텍스트 파싱</button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {!currentTag && parserBuffer.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <i className="fas fa-robot text-6xl text-slate-300 mb-4"></i>
                                    <h2 className="text-xl font-black text-slate-600 mb-2">Smart Parser 대기중</h2>
                                    <p className="text-[13px] font-bold">상단 [새 텍스트 파싱] 버튼을 눌러 작업을 시작하세요.</p>
                                </div>
                            ) : activeTab === 'matched' ? (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in">
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-[#f5f4f0] text-[#5c554d] font-bold sticky top-0 z-10 border-b border-[#e8e4db]">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center"><input type="checkbox" className="rounded" checked={matchedRows.length>0 && matchedRows.every(r=>r._apply)} onChange={() => { const all = matchedRows.every(r=>r._apply); appState.setParserBuffer(p => p.map(r => r._matchCode ? {...r, _apply: !all} : r)); }} /></th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-emerald-700 bg-emerald-50/50">파싱 품목명</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3 text-right text-emerald-700 bg-emerald-50/50">새 입고가</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {matchedRows.length === 0 ? <tr><td colSpan="6" className="p-10 text-center text-slate-400">데이터가 없습니다.</td></tr> : matchedRows.map(row => {
                                                    const mItem = masterProducts[row._matchCode] || {};
                                                    const mIn = parseNum(mItem['입고가']);
                                                    const pIn = parseNum(row.finalData['입고가']);
                                                    const isDiff = mIn > 0 && mIn !== pIn;
                                                    return (
                                                        <tr key={row._id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="py-2 px-4 text-center"><input type="checkbox" className="rounded text-emerald-600 focus:ring-emerald-500" checked={row._apply} onChange={() => appState.setParserBuffer(p => p.map(r => r._id === row._id ? {...r, _apply: !r._apply} : r))} /></td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{row._matchCode}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명}</span> <span className="text-[11px] text-slate-400">({mItem.규격})</span></td>
                                                            <td className="py-2 px-3 text-emerald-800 bg-emerald-50/20 font-bold">{row['품목명']}</td>
                                                            <td className="py-2 px-3 text-right text-slate-500 font-bold">{mIn ? mIn.toLocaleString() : '-'}</td>
                                                            <td className={`py-2 px-3 text-right font-black ${isDiff ? 'text-rose-500 bg-rose-50/30' : 'text-emerald-700 bg-emerald-50/20'}`}>
                                                                <input type="text" className="w-full bg-transparent text-right outline-none" value={row.finalData['입고가']} onChange={(e) => {
                                                                    appState.setParserBuffer(p => p.map(r => r._id === row._id ? {...r, finalData: {...r.finalData, '입고가': e.target.value}} : r))
                                                                }} />
                                                            </td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : activeTab === 'missing' ? (
                                !currentTag ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm fade-in">
                                        <i className="fas fa-folder-open text-6xl text-slate-200 mb-4"></i>
                                        <h2 className="text-xl font-black text-slate-600 mb-2">누락(단종) 계산 생략됨</h2>
                                        <p className="text-[13px] font-bold text-center leading-relaxed">새 텍스트 파싱 시 기준 카탈로그를 지정하지 않아<br/>누락 상품 대조 작업이 생략되었습니다.</p>
                                    </div>
                                ) : (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in relative">
                                    {hasPendingMappings && (
                                        <div className="bg-amber-50 border-b border-amber-200 p-3.5 flex items-center gap-3 text-amber-800 text-[13px] font-bold shrink-0 shadow-inner">
                                            <i className="fas fa-exclamation-triangle text-amber-500 text-lg"></i>
                                            <div className="flex flex-col">
                                                <span>주의! 아직 처리하지 않은 [유사] 또는 [불일치] 항목이 <span className="text-rose-600 font-black px-1">{similarRows.length + unmatchedRows.length}건</span> 남아있습니다.</span>
                                                <span className="text-[11px] font-normal opacity-80 mt-0.5">이 항목들이 단순히 오타로 인해 매칭 안된 것일 수 있으므로, 수동 연결을 먼저 끝마치신 후에 여기서 누락(단종) 처리를 진행해야 안전합니다.</span>
                                            </div>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex flex-col gap-2 shrink-0">
                                        <div className="flex items-center gap-2 text-slate-700 text-[13px] font-bold"><i className="fas fa-info-circle text-indigo-500"></i>마스터 DB에는 <span className="bg-indigo-100 text-indigo-800 px-1.5 py-0.5 rounded">'{currentTag}'</span> 카탈로그에 등록되어 있지만, 이번 파싱 텍스트에는 없는 상품들입니다. (단종 의심)</div>
                                        <div className="text-[11px] text-slate-500">목록에서 체크 후 상단의 [제외] 버튼을 누르면 단가를 훼손하지 않고 해당 카탈로그에서만 조용히 제외합니다.</div>
                                    </div>
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-white sticky top-0 z-10 border-b border-slate-200 text-slate-600">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center">
                                                        <input type="checkbox" className="rounded cursor-pointer" checked={missingRows.length > 0 && selectedMissingCodes.size === missingRows.length} onChange={(e) => {
                                                            const isChecked = e.target.checked;
                                                            setSelectedMissingCodes(prev => {
                                                                if (isChecked) {
                                                                    return new Set(missingRows.map(r=>r.코드));
                                                                } else {
                                                                    return new Set();
                                                                }
                                                            });
                                                        }} />
                                                    </th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3">소속 카탈로그</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {missingRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">누락된 항목이 없습니다. 완벽합니다!</td></tr> : missingRows.map(mItem => {
                                                    const isSel = selectedMissingCodes.has(mItem.코드);
                                                    return (
                                                        <tr key={`miss-${mItem.코드}`} onClick={() => {
                                                            setSelectedMissingCodes(prev => {
                                                                const next = new Set(prev);
                                                                if(next.has(mItem.코드)) next.delete(mItem.코드); else next.add(mItem.코드);
                                                                return next;
                                                            });
                                                        }} className={`cursor-pointer transition-colors ${isSel ? 'bg-rose-50/50' : 'hover:bg-slate-50'}`}>
                                                            <td className="py-2 px-4 text-center">
                                                                <input type="checkbox" className="rounded text-rose-500 focus:ring-rose-500 pointer-events-none" checked={isSel} readOnly />
                                                            </td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{mItem.코드}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명}</span> <span className="text-[11px] text-slate-400">({mItem.규격})</span></td>
                                                            <td className="py-2 px-3 text-right text-slate-500">{mItem.입고가 ? Number(mItem.입고가).toLocaleString() : '-'}</td>
                                                            <td className="py-2 px-3 text-[11px] text-indigo-500 font-bold max-w-[200px] truncate">{mItem['카탈로그']}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )
                            ) : (
                                <div className="flex h-full w-full gap-4 fade-in">
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden relative">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-search text-slate-400"></i><span className="text-[13px] font-black text-slate-700">마스터 수동 검색 (전체 DB)</span></div>
                                            <div className="relative">
                                                <input type="text" placeholder="검색어 입력..." value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} className="w-[200px] border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] outline-none focus:border-indigo-500" />
                                                <i className="fas fa-search absolute right-2.5 top-2 text-slate-400 text-[12px] pointer-events-none"></i>
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/30">
                                            {!targetId && !globalSearch ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-hand-point-right text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">우측에서 매핑할 <span className="text-indigo-500">파싱 항목</span>을 먼저 선택하세요.</p></div>
                                            ) : masterSearchResults.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-search text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">검색 결과가 없습니다.</p></div>
                                            ) : (
                                                <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                    <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3">상품정보 (코드/품명/규격)</th><th className="py-2.5 px-3 text-right w-20">입고가</th><th className="py-2.5 px-3 text-center w-32">동작/작업</th></tr></thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {masterSearchResults.map(m => {
                                                            const hasTag = currentTag && (m['카탈로그'] || '').split(',').map(s=>s.trim()).includes(currentTag);
                                                            return (
                                                                <tr key={m.코드} className="hover:bg-indigo-50/50 group transition-colors">
                                                                    <td className="py-2 px-3"><div className="flex flex-col min-w-0 w-full overflow-hidden"><span className="text-[10px] font-mono text-slate-400">{m.코드}</span><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[12px] font-extrabold text-slate-800 truncate">{m.품목명}</span>{m.규격 && <span className="text-[11px] text-slate-500 shrink-0">({m.규격})</span>}</div></div></td>
                                                                    <td className="py-2 px-3 text-right font-bold text-slate-600">{m.입고가 ? Number(m.입고가).toLocaleString() : '-'}</td>
                                                                    <td className="py-2 px-3 text-center flex gap-1 justify-center items-center h-full">
                                                                        <button onClick={() => actions.handleConfirmMapping(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors flex-1" title="우측 항목과 연결하여 카탈로그에 추가합니다."><i className="fas fa-link"></i> 연결</button>
                                                                        {hasTag && (
                                                                            <button onClick={() => actions.handleRemoveTagDirect(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-rose-100 text-rose-600 hover:bg-rose-200 transition-colors" title="이 상품을 현재 카탈로그에서 즉각 단종(제외)시킵니다."><i className="fas fa-eraser"></i> 단종</button>
                                                                        )}
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-list text-slate-400"></i><span className="text-[13px] font-black text-slate-700">파싱된 외부 데이터 (대기중)</span></div>
                                            <span className="text-[11px] font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">총 {displayUnmatchedRows.length}건</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3 text-center w-10">선택</th><th className="py-2.5 px-2 text-center w-14">상태</th><th className="py-2.5 px-3">파싱 품명 및 규격</th><th className="py-2.5 px-3 text-right w-16">입고가</th><th className="py-2.5 px-2 text-center w-10">무시</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {displayUnmatchedRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">대기중인 데이터가 없습니다.</td></tr> : displayUnmatchedRows.map(row => {
                                                        const isTarget = targetId === row._id;
                                                        return (
                                                            <tr key={row._id} onClick={() => { setTargetId(row._id); setGlobalSearch(row['품목명'].replace(/[()[\]{},./]/g, ' ').replace(/\s+/g, ' ').trim()); }} className={`cursor-pointer transition-colors border-l-4 ${isTarget ? 'bg-indigo-50/50 border-indigo-500' : 'hover:bg-slate-50 border-transparent'}`}>
                                                                <td className="py-2 px-3 text-center"><div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center mx-auto ${isTarget ? 'border-indigo-500 bg-white' : 'border-slate-300'}`}>{isTarget && <div className="w-2 h-2 rounded-full bg-indigo-500"></div>}</div></td>
                                                                <td className="py-2 px-2 text-center"><span className={`px-1.5 py-0.5 rounded text-[10px] font-bold w-max block mx-auto ${activeTab === 'similar' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>{row._matchStatus.substring(0, 2)}</span></td>
                                                                <td className="py-2 px-3"><div className="flex flex-col"><span className={`text-[12px] font-extrabold truncate ${isTarget ? 'text-indigo-900' : 'text-slate-800'}`}>{row['품목명']}</span><span className="text-[11px] text-slate-500 mt-0.5 truncate">{row['규격']} {row['단위'] ? `| ${row['단위']}` : ''}</span></div></td>
                                                                <td className={`py-2 px-3 text-right font-bold ${isTarget ? 'text-indigo-600' : 'text-slate-600'}`}>{row['입고가'] || '-'}</td>
                                                                <td className="py-2 px-2 text-center">
                                                                    <button onClick={(e) => { e.stopPropagation(); actions.handleIgnoreParsedItem(row._id); }} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 px-2 py-1.5 rounded transition-colors" title="이 항목을 매핑하지 않고 휴지통에 버립니다."><i className="fas fa-trash-alt"></i></button>
                                                                </td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    {showInputModal && <SmartParserInputModal onClose={() => setShowInputModal(false)} executeParser={actions.executeParser} showToast={showToast} availableTags={availableTags} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParserApp />);
    </script>
</body>
</html>
