    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 시스템 공통 환경 변수 및 헬퍼 함수
        // ==========================================
        const MASTER_HEADERS = [

            "경비", "재료비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"

        const NUMERIC_HEADERS = [
            "안전재고", "입고가", "출고가", "도매가", "전송가", "창고가", "외주비", "노무비", 
            "경비", "재료비", "비과세", "기본", "연동", "싯가", "준비기간", "마감시간",
            "도매2 (전송)", "1구매", "1출고", "2구매", "2출고",
            "재고수량", "입고수량", "주문수량", "판매수량", "행사가", "입고", "출고",
            "B단가", "A판매", "B판매", "1입고", "2입고", "1종연산", "2종연산"

        const DOC_TYPES = { 'estimate': '견적', 'prev': '재고', 'in': '입고', 'out': '주문', 'sales': '판매' };

        const getInitialVisibleMasterCols = () => ({ estimate: ['입고가'] });
        const getInitialVisibleUploadCols = () => ({ 
            estimate: ['구매처', '입고가', 'B단가', 'A판매', 'B판매', '지시사항']
        });
        
        const getInitialMappings = () => {
            const base = {}; ['master', 'estimate', 'prev', 'in', 'out', 'sales'].forEach(tab => base[tab] = {});
            base.master = { '품목코드': '품목코드', '품목명': '품목명, 상품명, 품명', '규격': '규격' };
            base.estimate = { 
                '일자': '일자, 날짜',
                '품목코드': '품목코드', '품목명': '품목명, 품명', '규격': '규격명, 규격', 
                '구매처': '거래처명, 구매처', '입고가': '입고가, 입고', '출고가': '출고가, 출고',
                'B단가': 'B단가', 'A판매': 'A판매', 'B판매': 'B판매', 
                '지시사항': '지시사항', '상품정보': '상품정보', '적요2': '적요2',
                '외주비': '외주비', '경비': '경비', '노무비': '노무비', '재료비': '재료비',
                '1종연산': '1종연산', '2종연산': '2종연산',
                '1종코드': '1종코드', '1입고': '1입고, 1구매', '1출고': '1출고',
                '2종코드': '2종코드', '2입고': '2입고, 2구매', '2출고': '2출고'
            };
            return base;
        };
        
        const getInitialMasterLinks = () => {
            const base = {}; ['master', 'estimate', 'prev', 'in', 'out', 'sales'].forEach(tab => base[tab] = {});
            base.estimate = { 
                '일자': '일자', '구매처': '구매처', '입고가': '입고가', '출고가': '출고가', 
                'B단가': '', 'A판매': '출고가', 'B판매': '도매가', 
                '지시사항': '', '상품정보': '', '적요2': '',
                '외주비': '외주비', '경비': '경비', '노무비': '노무비', '재료비': '재료비',
                '1종연산': '1종연산', '2종연산': '2종연산',
                '1종코드': '1종코드', '1입고': '1구매', '1출고': '1출고',
                '2종코드': '2종코드', '2입고': '2구매', '2출고': '2출고'
            };
            return base;
        };

        const EXPORT_OPTIONS = {
            all: [
                { id: 'all_erp', type: 'excel', title: '통합 마스터 업데이트 엑셀', desc: '전체 상품 최신 기준 데이터 (ERP 갱신용)', icon: 'fa-database', theme: { border: 'hover:border-indigo-400', bg: 'hover:bg-indigo-50', text: 'text-indigo-500' } },
                { id: 'all_catalog', type: 'print', title: '전체 상품 카탈로그 (PDF)', desc: '분류별(1코드/2코드) 전체 상품 리스트', icon: 'fa-file-pdf', theme: { border: 'hover:border-rose-400', bg: 'hover:bg-rose-50', text: 'text-rose-500' } }
            ],
            estimate: [
                { id: 'est_erp', type: 'excel', title: '1. ERP 품목정보 업데이트용 엑셀', desc: '자동 연산되어 출력되는 ERP 전용 16열 양식', icon: 'fa-file-excel', theme: { border: 'hover:border-blue-400', bg: 'hover:bg-blue-50', text: 'text-blue-500' } },
                { id: 'est_shop', type: 'excel', title: '2. 쇼핑몰/자동계산 업로드용', desc: '단가, 연산식, 할인율 동적 데이터 파일', icon: 'fa-shopping-cart', theme: { border: 'hover:border-emerald-400', bg: 'hover:bg-emerald-50', text: 'text-emerald-500' } },
                { id: 'est_notice', type: 'copy', title: '3. 도매몰 단가 공지용 (카톡복사)', desc: '클릭 시 텍스트가 자동 복사됩니다.', icon: 'fa-copy', theme: { border: 'hover:border-amber-400', bg: 'hover:bg-amber-50', text: 'text-amber-500' } },
                { id: 'est_print', type: 'print', title: '4. 오프라인 영업용 인쇄물', desc: '견적가 기준 프린트 최적화 레이아웃 (PDF)', icon: 'fa-print', theme: { border: 'hover:border-rose-400', bg: 'hover:bg-rose-50', text: 'text-rose-500' } }
            ]
        };

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'w-[80px] min-w-[80px] max-w-[80px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'w-[100px] min-w-[100px] max-w-[100px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'w-[160px] min-w-[160px] max-w-[160px]';
            return 'w-[110px] min-w-[110px] max-w-[110px]';
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const extractValue = (row, mappingStr) => {
            if (!mappingStr) return '';
            const keywords = mappingStr.split(',').map(s => s.trim().toLowerCase().replace(/\s/g, ''));
            const rowKeys = Object.keys(row);
            for (let kw of keywords) {
                if (!kw) continue;
                const foundKey = rowKeys.find(k => String(k).toLowerCase().replace(/\s/g, '').includes(kw));
                if (foundKey && row[foundKey] !== undefined && row[foundKey] !== '') return row[foundKey];
            }
            return '';
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = window.XLSX.read(e.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(10, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('단가') || rowStr.includes('입고가') || rowStr.includes('일자')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx];
                        if (!rowArr) { endIdx--; continue; }
                        const filledCount = rowArr.filter(cell => cell !== undefined && cell !== null && String(cell).trim() !== '').length;
                        const rawStr = rowArr.join('').replace(/\s/g, '');
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계') || (/20\d{2}[\/\-]\d{2}/.test(rawStr) && filledCount <= 2)) && filledCount <= 4) endIdx--; else break; 
                    }
                    const data = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        if (!jsonAll[i] || jsonAll[i].join('').trim() === '') continue;
                        const obj = {}; headers.forEach((h, idx) => { if (h) obj[h] = jsonAll[i][idx]; }); data.push(obj);
                    }
                    resolve(data);
                };
                reader.readAsBinaryString(file);
            });
        };

        // ==========================================
        // 🧩 모듈화된 UI 컴포넌트들
        // ==========================================
        const SystemConsole = ({ itemCount }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
            
            const timeStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
            
            return (
                <div className="bg-black rounded-md border border-slate-700 px-4 py-1.5 flex flex-1 items-center overflow-hidden shadow-inner">
                    <div className="flex items-center truncate">
                        <span className="text-[12px] font-mono text-[#10b981]">
                            {itemCount === 0 ? `> ${timeStr}` : `> 상태: ${itemCount}개의 항목이 로드되었습니다.`}
                        </span>
                        <span className="w-1.5 h-3.5 bg-[#10b981] ml-1.5 animate-[pulse_1s_infinite]"></span>
                    </div>
                </div>
            );
        };

        const SearchBar = ({ onSearch }) => {
            const [val, setVal] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => onSearch(val), 250); 
                return () => clearTimeout(timer);
            }, [val, onSearch]);

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F3') {
                        e.preventDefault(); 
                        if (inputRef.current) {
                            inputRef.current.focus();
                            inputRef.current.select(); 
                        }
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, []);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onSearch(val); 
                    setTimeout(() => {
                        const firstInput = document.querySelector('input.cell-input[data-numeric="true"]') || document.querySelector('input.cell-input');
                        if (firstInput) {
                            firstInput.focus();
                            firstInput.select();
                        }
                    }, 50);
                }
            };

            return (
                <div className="relative w-[240px] h-full shrink-0" onClick={() => inputRef.current?.focus()}>
                    <input 
                        ref={inputRef}
                        type="text" 
                        placeholder="검색 (단축키 F3, Enter시 이동)" 
                        value={val} 
                        onChange={e => setVal(e.target.value)} 
                        onKeyDown={handleKeyDown}
                        className="w-full h-full pl-3 pr-8 py-1.5 border border-slate-300 rounded-lg text-[12px] font-bold outline-none focus:border-indigo-500 focus:ring-2 transition-shadow" 
                    />
                    <i className="fas fa-search absolute right-3 top-3 text-slate-400 pointer-events-none"></i>
                </div>
            );
        };

        const ExportModal = ({ onClose, displayRows, currentExportKey, currentExportTitle, executeExport }) => {
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => document.body.style.overflow = 'auto';
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[200] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[600px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-5 border-b border-slate-700 flex justify-between items-center">
                            <h2 className="text-[16px] font-black text-white"><i className="fas fa-file-export mr-2 text-indigo-400"></i>출력 및 내보내기 센터</h2>
                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white transition-colors"></i></button>
                        </div>
                        <div className="px-6 py-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Current View :</span>
                                <span className="text-[13px] font-black text-indigo-700 bg-indigo-100 px-2.5 py-0.5 rounded">[{currentExportTitle}] 데이터</span>
                            </div>
                            <span className="text-[12px] font-bold text-slate-500">총 <span className="text-slate-800">{displayRows.length}</span>건</span>
                        </div>
                        <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto custom-scrollbar">
                            {EXPORT_OPTIONS[currentExportKey].map((option, idx) => (
                                <div key={option.id} onClick={() => executeExport(option)} className={`border border-slate-200 rounded-xl p-4 cursor-pointer transition-all group ${option.theme.border} ${option.theme.bg}`}>
                                    <div className="flex items-center justify-between">
                                        <h3 className="font-bold text-slate-800 text-[14px]">
                                            <i className={`fas ${option.icon} ${option.theme.text} mr-2.5 w-5 text-center`}></i>
                                            {idx + 1}. {option.title}
                                        </h3>
                                        <i className={`fas ${option.type === 'copy' ? 'fa-copy' : 'fa-download'} text-slate-300 group-hover:${option.theme.text} transition-colors`}></i>
                                    </div>
                                    <p className="text-[12px] text-slate-500 mt-1.5 ml-8">{option.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 메인 Application (V7.1.8 기준)
        // ==========================================
        const App = () => {
            const [masterProducts, setMasterProducts] = useState(() => { const s = localStorage.getItem('merchMaster_v718'); return s ? JSON.parse(s) : {}; });
            const [managedItems, setManagedItems] = useState([]);
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v718') || '');
            
            const [visibleMasterCols] = useState(getInitialVisibleMasterCols());
            const [visibleUploadCols] = useState(getInitialVisibleUploadCols());
            const [mappings] = useState(getInitialMappings());
            const [masterLinks] = useState(getInitialMasterLinks());

            const [debouncedSearch, setDebouncedSearch] = useState(''); 
            const [showExportModal, setShowExportModal] = useState(false); 
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            
            const [isEstimateUploaded, setIsEstimateUploaded] = useState(false);
            const activeProfileKey = 'estimate'; 
            
            const isMasterEmpty = Object.keys(masterProducts).length === 0;

            useEffect(() => {
                const handleGlobalF7 = (e) => {
                    if (e.key === 'F7') {
                        e.preventDefault(); 
                        setShowExportModal(true);
                    }
                };
                window.addEventListener('keydown', handleGlobalF7);
                return () => window.removeEventListener('keydown', handleGlobalF7);
            }, []);

            useEffect(() => localStorage.setItem('merchMaster_v718', JSON.stringify(masterProducts)), [masterProducts]);
            useEffect(() => localStorage.setItem('merchCloudUrl_v718', cloudUrl), [cloudUrl]);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleFileUpload = async (e, expectedType) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                if (!window.XLSX) return setAlertMsg("엑셀 파서 라이브러리 로드 대기중입니다.");

                try {
                    let newMaster = { ...masterProducts }; let newManaged = [...managedItems]; let totalCount = 0;
                    for (const file of files) {
                        let mapKey = expectedType;
                        if (!mapKey) mapKey = 'master';

                        const data = await parseExcelRobust(file);
                        
                        data.forEach(row => {
                            const code = extractValue(row, (mappings[mapKey] || {})['품목코드'] || '품목코드');
                            if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                            
                            if (mapKey === 'master') {
                                if (!newMaster[code]) newMaster[code] = { 코드: code };
                                const curMasterMap = mappings['master'] || {};
                                MASTER_HEADERS.forEach(h => {
                                    const mappingStr = curMasterMap[h] || h;
                                    let val = extractValue(row, mappingStr);
                                    if (val !== undefined && val !== '') newMaster[code][h] = NUMERIC_HEADERS.includes(h) ? parseNum(val) : val;
                                });
                            } else {
                                let mItem = newManaged.find(m => m.코드 === code);
                                if (!mItem) { mItem = { 코드: code, sources: {}, finalData: {} }; newManaged.push(mItem); }
                                if (!mItem.sources[mapKey]) mItem.sources[mapKey] = {};
                                
                                mItem.sources[mapKey]['품목명'] = extractValue(row, (mappings[mapKey] || {})['품목명'] || '품목명');
                                mItem.sources[mapKey]['규격'] = extractValue(row, (mappings[mapKey] || {})['규격'] || '규격');
                                mItem.sources[mapKey]['구매처'] = extractValue(row, (mappings[mapKey] || {})['구매처'] || '구매처');
                                
                                Object.keys(mappings[mapKey] || {}).forEach(h => {
                                    const mappingStr = (mappings[mapKey] || {})[h];
                                    if (mappingStr && !['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                        const val = extractValue(row, mappingStr);
                                        if (val !== '') {
                                            const isNumeric = NUMERIC_HEADERS.includes(masterLinks[mapKey]?.[h]) || NUMERIC_HEADERS.includes(h);
                                            mItem.sources[mapKey][h] = isNumeric ? parseNum(val) : val;
                                            if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNumeric ? parseNum(val) : val;
                                        }
                                    }
                                });

                                // 백그라운드 초기 연산 
                                if (mapKey === 'estimate') {
                                    const getValNum = (f) => Number(String(mItem.sources[mapKey][f] || newMaster[code]?.[f] || 0).replace(/,/g, '')) || 0;
                                    const pIn = getValNum('입고가');
                                    
                                    if (pIn > 0) {
                                        const outsrc = getValNum('외주비');
                                        const labor = getValNum('노무비');
                                        const material = getValNum('재료비'); // V7.1.8 신규 재료비 추출
                                        const div1 = getValNum('1종연산');
                                        
                                        mItem.finalData['출고가'] = Math.round(((pIn + outsrc + labor) / 0.9) / 100) * 100;
                                        if (div1 > 0) {
                                            mItem.finalData['1입고'] = Math.round(((pIn + outsrc) / div1) / 100) * 100;
                                            // 💡 재료비 포함된 1출고 로직 적용
                                            mItem.finalData['1출고'] = Math.round((((pIn + outsrc + labor) / div1 + material) / 0.85) / 100) * 100;
                                        }
                                    }
                                }
                            }
                            totalCount++;
                        });
                        
                        if (mapKey === 'estimate') {
                            setIsEstimateUploaded(true);
                        }
                    }
                    setMasterProducts(newMaster); setManagedItems(newManaged);
                    if(totalCount > 0) showToast(`✅ 데이터 병합 완료 (${totalCount}건)`);
                } catch(error) { setAlertMsg("❌ 파싱 오류 발생. 엑셀 파일을 확인하세요."); }
                finally { e.target.value = ''; }
            };

            const handleCloudSync = async (type) => {
                if (!cloudUrl) return setAlertMsg("클라우드 URL이 설정되지 않았습니다.");
                showToast(`클라우드 ${type === 'upload' ? '전송' : '불러오기'} 시작...`);
                try {
                    if (type === 'upload') {
                        const payload = { type: "save", data: masterProducts };
                        const res = await fetch(cloudUrl, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error("Network Error"); showToast('✅ 클라우드 저장 성공');
                    } else {
                        const res = await fetch(cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        if (result.data) setMasterProducts(result.data); showToast('✅ 클라우드 불러오기 성공');
                    }
                } catch (error) { setAlertMsg("통신 오류 발생. URL을 확인하세요."); }
            };

            const handleCommitToMaster = () => {
                if (selectedRows.size === 0) return showToast('⚠️ 반영할 항목을 선택해주세요.');
                let newMaster = { ...masterProducts }, commitCount = 0;
                selectedRows.forEach(code => {
                    const item = managedItems.find(m => m.코드 === code);
                    if (!item || !item.코드) return;
                    if (!newMaster[item.코드]) newMaster[item.코드] = { 코드: item.코드 };
                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const linked = masterLinks[activeProfileKey]?.[field] || (MASTER_HEADERS.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '' && item.finalData[field] !== '오류') {
                                newMaster[item.코드][linked] = NUMERIC_HEADERS.includes(linked) ? Number(item.finalData[field]) : item.finalData[field];
                            }
                        });
                    }
                    commitCount++;
                });
                setMasterProducts(newMaster); setSelectedRows(new Set()); showToast(`✅ ${commitCount}건 전체상품 업데이트 완료.`);
            };

            const displayRows = useMemo(() => {
                let baseList = [];
                if (isEstimateUploaded) {
                    baseList = managedItems;
                } else {
                    baseList = Object.values(masterProducts).map(m => {
                        const existingManaged = managedItems.find(item => item.코드 === m.코드);
                        return existingManaged || { 코드: m.코드, sources: {}, finalData: {} };
                    });
                }

                if (debouncedSearch) {
                    const q = debouncedSearch.toLowerCase();
                    baseList = baseList.filter(i => {
                        const mItem = masterProducts[i.코드] || {};
                        const codeStr = String(i.코드 || '').toLowerCase();
                        if (codeStr.includes(q)) return true;

                        const src = i.sources?.[activeProfileKey] || {};
                        const sName = String(src['품목명'] || mItem['품목명'] || '').toLowerCase();
                        const sVendor1 = String(src['구매처'] || '').toLowerCase();
                        const sVendor2 = String(src['거래처명'] || '').toLowerCase();
                        return sName.includes(q) || sVendor1.includes(q) || sVendor2.includes(q);
                    });
                }

                return baseList.sort((a, b) => {
                    // 거래처 검색 시 적요2(순번) 기준 정렬 적용
                    if (debouncedSearch) {
                        const q = debouncedSearch.toLowerCase();
                        const srcA = a.sources?.[activeProfileKey] || {};
                        const srcB = b.sources?.[activeProfileKey] || {};
                        const mA = masterProducts[a.코드] || {};
                        const mB = masterProducts[b.코드] || {};
                        
                        const vendorA = String(srcA['구매처'] || srcA['거래처명'] || mA['구매처'] || '').toLowerCase();
                        const vendorB = String(srcB['구매처'] || srcB['거래처명'] || mB['구매처'] || '').toLowerCase();
                        
                        if (vendorA.includes(q) && vendorB.includes(q)) {
                            const seqA = parseInt(String(srcA['적요2'] || mA['적요2'] || '999999').replace(/[^0-9]/g, ''), 10) || 999999;
                            const seqB = parseInt(String(srcB['적요2'] || mB['적요2'] || '999999').replace(/[^0-9]/g, ''), 10) || 999999;
                            if (seqA !== seqB) return seqA - seqB;
                        }
                    }

                    const cA = String(a.코드 || ''), cB = String(b.코드 || '');
                    if (cA.substring(0, 6) !== cB.substring(0, 6)) return cA.substring(0, 6).localeCompare(cB.substring(0, 6));
                    return (parseInt(cA.substring(6), 10) || 0) - (parseInt(cB.substring(6), 10) || 0);
                });
            }, [masterProducts, managedItems, debouncedSearch, isEstimateUploaded]);

            const currentExportKey = isEstimateUploaded ? 'estimate' : 'all';
            const currentExportTitle = isEstimateUploaded ? '견적 업로드' : '전체상품 (통합)';

            const formatPrice = (val) => {
                const strVal = String(val).replace(/,/g, '');
                if (strVal === "오류") return '';
                const num = Number(strVal) || 0;
                return num > 0 ? num : '';
            };

            const hasValidPrice = (inVal, outVal) => {
                return (Number(String(inVal).replace(/,/g, '')) > 0) || (Number(String(outVal).replace(/,/g, '')) > 0);
            };

            const executeExport = (option) => {
                if (displayRows.length === 0) return setAlertMsg("내보낼 데이터가 없습니다.");
                setShowExportModal(false);

                if (option.type === 'excel') {
                    showToast(`⏳ [${option.title}] 생성을 준비 중입니다...`);
                    setTimeout(() => {
                        if (option.id === 'est_erp') {
                            let exportData = [];
                            exportData.push([
                                '품목코드', '입고가', '0', '출고가', '0', 'B단가', 'n', 
                                'A판매', 'n', 'B판매', 'n', '입고가', 'n', '지시사항', 'n', '1'
                            ]);

                            const createRowArr = (code, inPrice, outPrice, bPrice='', aSale='', bSale='', finalPrice='', instruction='') => {
                                if (!code) return null;
                                const outIn = formatPrice(inPrice);
                                const outOut = formatPrice(outPrice);
                                const outFinal = formatPrice(finalPrice) || outIn;

                                return [
                                    code, outIn, '0', outOut, '0', 
                                    bPrice !== '' && bPrice !== undefined ? bPrice : '', 'n', 
                                    aSale !== '' && aSale !== undefined ? aSale : '', 'n', 
                                    bSale !== '' && bSale !== undefined ? bSale : '', 'n', 
                                    outFinal, 'n', 
                                    instruction !== '' && instruction !== undefined ? instruction : '', 'n', 
                                    hasValidPrice(inPrice, outPrice) ? '1' : '' 
                                ];
                            };

                            displayRows.forEach(row => {
                                const mItem = masterProducts[row.코드] || {}; 
                                const final = row.finalData || {}; 
                                const source = row.sources?.[activeProfileKey] || {};
                                
                                const getRawVal = (f) => final[f] !== undefined ? final[f] : (source[f] || mItem[f] || '');
                                const getNumVal = (f) => Number(String(getRawVal(f)).replace(/,/g, '')) || 0;

                                const pIn = getNumVal('입고가');
                                
                                // 💡 재료비 포함 추출
                                const outsrc = Number(String(source['외주비'] || mItem['외주비'] || 0).replace(/,/g, '')) || 0;
                                const labor = Number(String(source['노무비'] || mItem['노무비'] || 0).replace(/,/g, '')) || 0;
                                const material = Number(String(source['재료비'] || mItem['재료비'] || 0).replace(/,/g, '')) || 0; // V7.1.8
                                
                                let pOut = getRawVal('출고가');
                                if (pIn > 0) {
                                    pOut = Math.round(((pIn + outsrc + labor) / 0.9) / 100) * 100;
                                }

                                const bPrice = getRawVal('B단가');
                                const aSale = getRawVal('A판매');
                                const bSale = getRawVal('B판매');
                                const instruction = getRawVal('지시사항');

                                const pRow = createRowArr(row.코드, pIn, pOut, bPrice, aSale, bSale, pIn, instruction);
                                if (pRow) exportData.push(pRow);

                                const code1 = mItem['1종코드'] || source['1종코드'];
                                if (code1) {
                                    let in1 = getRawVal('1입고');
                                    let out1 = getRawVal('1출고');
                                    const div1 = Number(String(source['1종연산'] || mItem['1종연산'] || 0).replace(/,/g, '')) || 0;
                                    
                                    if (pIn > 0 && div1 > 0) {
                                        in1 = Math.round(((pIn + outsrc) / div1) / 100) * 100;
                                        // 💡 재료비 포함된 1출고 로직 적용
                                        out1 = Math.round((((pIn + outsrc + labor) / div1 + material) / 0.85) / 100) * 100;
                                    } else if (!in1 && !out1) {
                                        in1 = "";
                                    }
                                    const row1 = createRowArr(code1, in1, out1, '', '', '', in1, '');
                                    if (row1) exportData.push(row1);
                                }

                                const code2 = mItem['2종코드'] || source['2종코드'];
                                if (code2) {
                                    let in2 = getRawVal('2입고');
                                    let out2 = getRawVal('2출고');
                                    const div2 = Number(String(source['2종연산'] || mItem['2종연산'] || 0).replace(/,/g, '')) || 0;
                                    
                                    if (pIn > 0 && div2 > 0) {
                                        in2 = Math.round(((pIn + outsrc) / div2) / 100) * 100;
                                        // 💡 재료비 포함된 2출고 로직 적용 (1출고와 동일)
                                        out2 = Math.round((((pIn + outsrc + labor) / div2 + material) / 0.85) / 100) * 100;
                                    } else if (!in2 && !out2) {
                                        in2 = "";
                                    }
                                    const row2 = createRowArr(code2, in2, out2, '', '', '', in2, '');
                                    if (row2) exportData.push(row2);
                                }
                            });

                            const ws = window.XLSX.utils.aoa_to_sheet(exportData); 
                            const wb = window.XLSX.utils.book_new();
                            window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); 
                            window.XLSX.writeFile(wb, `${option.title}_${new Date().toISOString().slice(0,10)}.xlsx`);

                        } else {
                            let exportData = [];
                            displayRows.forEach(row => {
                                const mItem = masterProducts[row.코드] || {}; const final = row.finalData || {}; const source = row.sources?.[activeProfileKey] || {};
                                const dName = source['품목명'] || mItem['품목명'] || ''; const dSpec = source['규격'] || mItem['규격'] || '';
                                let rowData = {};
                                if (option.id === 'all_erp') {
                                    rowData = { '1코드': mItem['1코드'] || '', '2코드': mItem['2코드'] || '', '품목코드': row.코드, '품목명': dName, '규격': dSpec, '입고가(매입)': final['입고가'] || final['입고'] || mItem['입고가'] || 0, '출고가(매출)': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '거래처명': source['구매처'] || source['거래처명'] || mItem['구매처'] || '' };
                                } else if (option.id === 'est_shop') {
                                    rowData = { '상품코드': row.코드, '상품명': dName, '옵션': dSpec, '정상가': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '판매가(행사가)': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '재고상태': '판매중' };
                                } else { rowData = { '품목코드': row.코드, '품목명': dName, '규격': dSpec }; }
                                exportData.push(rowData);
                            });
                            
                            const ws = window.XLSX.utils.json_to_sheet(exportData); 
                            const wb = window.XLSX.utils.book_new();
                            window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); 
                            window.XLSX.writeFile(wb, `${option.title}_${new Date().toISOString().slice(0,10)}.xlsx`);
                        }
                        showToast(`✅ [${option.title}] 엑셀 다운로드가 완료되었습니다.`);
                    }, 500);
                } 
            };

            const toggleAllRows = () => {
                if (selectedRows.size === displayRows.length && displayRows.length > 0) setSelectedRows(new Set());
                else { const next = new Set(); displayRows.forEach(r => next.add(r.코드)); setSelectedRows(next); }
            };

            const renderUploadEditableCell = (row, idx, field, activeProfile, keyPrefix) => {
                const linkedMasterField = masterLinks[activeProfile]?.[field];
                const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                const val = row.finalData?.[field] !== undefined ? row.finalData[field] : (row.sources?.[activeProfile]?.[field] || '');
                const mVal = linkedMasterField ? masterProducts[row.코드]?.[linkedMasterField] : undefined;
                const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNumeric;

                const displayVal = val === "오류" ? "" : val;
                const inputType = !isNumeric ? "text" : "number";

                const handleKeyDown = (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                        const currentRowInputs = Array.from(document.querySelectorAll(`input.cell-input[data-row="${idx}"]`));
                        const currentIndex = currentRowInputs.indexOf(e.target);
                        if (e.key === 'ArrowLeft') {
                            let move = true; if (e.target.type !== 'number') move = e.target.selectionStart === 0;
                            if (move) { e.preventDefault(); if (currentIndex > 0) { currentRowInputs[currentIndex - 1].focus(); currentRowInputs[currentIndex - 1].select(); } }
                        }
                        if (e.key === 'ArrowRight') {
                            let move = true; if (e.target.type !== 'number') move = e.target.selectionEnd === e.target.value.length;
                            if (move) { e.preventDefault(); if (currentIndex < currentRowInputs.length - 1) { currentRowInputs[currentIndex + 1].focus(); currentRowInputs[currentIndex + 1].select(); } }
                        }
                        if (e.key === 'ArrowUp') {
                            e.preventDefault(); const prevRowInputs = Array.from(document.querySelectorAll(`input.cell-input[data-row="${idx - 1}"]`));
                            if (prevRowInputs[currentIndex]) { prevRowInputs[currentIndex].focus(); prevRowInputs[currentIndex].select(); }
                        }
                        if (e.key === 'ArrowDown') {
                            e.preventDefault(); const nextRowInputs = Array.from(document.querySelectorAll(`input.cell-input[data-row="${idx + 1}"]`));
                            if (nextRowInputs[currentIndex]) { nextRowInputs[currentIndex].focus(); nextRowInputs[currentIndex].select(); }
                        }
                        if (e.key === 'Enter') {
                            e.preventDefault(); const nextRowInputs = Array.from(document.querySelectorAll(`input.cell-input[data-row="${idx + 1}"]`));
                            if (nextRowInputs.length > 0) {
                                const firstNum = nextRowInputs.find(el => el.dataset.numeric === 'true');
                                if (firstNum) { firstNum.focus(); firstNum.select(); } else { nextRowInputs[0].focus(); nextRowInputs[0].select(); }
                            }
                        }
                    }
                };

                const handleChange = (e) => {
                    const val = e.target.value;
                    setManagedItems(prev => {
                        let next = [...prev];
                        let itemIdx = next.findIndex(item => item.코드 === row.코드);
                        
                        let currentItem;
                        if (itemIdx === -1) {
                            currentItem = { 코드: row.코드, sources: { estimate: {} }, finalData: { [field]: val } };
                            next.push(currentItem);
                            itemIdx = next.length - 1;
                        } else {
                            currentItem = {
                                ...next[itemIdx],
                                finalData: { ...next[itemIdx].finalData, [field]: val }
                            };
                            next[itemIdx] = currentItem;
                        }

                        if (['입고가'].includes(field) || field === masterLinks[activeProfile]?.['입고가']) {
                            const mItem = masterProducts[currentItem.코드] || {};
                            const source = currentItem.sources?.[activeProfile] || {};
                            
                            const getNumVal = (f) => {
                                const mappedF = masterLinks[activeProfile]?.[f] || f;
                                const raw = currentItem.finalData[mappedF] !== undefined ? currentItem.finalData[mappedF] : (source[mappedF] || mItem[mappedF] || 0);
                                return Number(String(raw).replace(/,/g, '')) || 0;
                            };

                            const pIn = getNumVal('입고가');
                            
                            if (pIn > 0) {
                                const outsrc = getNumVal('외주비');
                                const labor = getNumVal('노무비');
                                const material = getNumVal('재료비'); // V7.1.8 신규 추가 재료비
                                const div1 = getNumVal('1종연산');
                                
                                currentItem.finalData['출고가'] = Math.round(((pIn + outsrc + labor) / 0.9) / 100) * 100;
                                
                                if (div1 > 0) {
                                    currentItem.finalData['1입고'] = Math.round(((pIn + outsrc) / div1) / 100) * 100;
                                    // 💡 재료비 포함된 1출고 로직 적용
                                    currentItem.finalData['1출고'] = Math.round((((pIn + outsrc + labor) / div1 + material) / 0.85) / 100) * 100;
                                }
                            }
                        }
                        return next;
                    });
                };

                return (
                    <td key={keyPrefix} className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                        <input type={inputType} className={`cell-input w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''}`}
                            value={displayVal} placeholder={mVal || ''} data-row={idx} data-numeric={isNumeric}
                            onChange={handleChange} 
                            onKeyDown={handleKeyDown} onFocus={(e) => e.target.select()} onClick={(e) => e.target.select()} onWheel={(e) => e.target.blur()}
                        />
                    </td>
                );
            };

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                    `}</style>
                    
                    {alertMsg && <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i><span className="whitespace-pre-line leading-relaxed">{alertMsg}</span><button onClick={() => setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button></div>}
                    {toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-check-circle text-emerald-400"></i>{toastMsg}</div>}

                    <div className="w-full max-w-[1280px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-5">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <span className="text-[14px] font-black text-slate-200 leading-none mb-0.5">MerchOps</span>
                                                <span className="text-[9px] font-extrabold text-slate-500 tracking-widest">V7.1.8 Export Engine</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(masterProducts).length} />

                                        <nav className="flex gap-2 text-[12px] font-bold shrink-0">
                                            <label className={`cursor-pointer px-4 py-1.5 rounded flex items-center shadow-sm transition-all duration-300 border ${isMasterEmpty ? 'text-emerald-300 border-emerald-500/30 bg-emerald-500/10 shadow-[0_0_6px_rgba(16,185,129,0.15)]' : 'text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500'}`}>
                                                <i className={`fas fa-file-excel mr-1.5 ${isMasterEmpty ? '' : 'opacity-70'}`}></i>전체상품 등록
                                                <input type="file" className="hidden" onChange={(e) => handleFileUpload(e, 'master')} multiple />
                                            </label>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <div className="px-5 pt-4 pb-3 flex justify-between items-center h-[72px]">
                                <div className="flex gap-4 items-center h-10">
                                    <label className="cursor-pointer h-full px-5 py-2 rounded-lg text-[13px] font-bold bg-white text-slate-800 border border-slate-300 hover:bg-slate-50 shadow-sm transition-colors flex items-center shrink-0">
                                        <i className="fas fa-file-invoice-dollar mr-2 text-indigo-600"></i>견적 업로드
                                        <input type="file" className="hidden" multiple onChange={(e) => handleFileUpload(e, 'estimate')} accept=".xlsx, .xls, .csv" />
                                    </label>
                                    {isEstimateUploaded && (
                                        <span className="flex items-center text-[12px] font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-200 fade-in shadow-sm">
                                            <i className="fas fa-check-circle mr-1.5"></i>견적서 연동됨 (입력모드)
                                        </span>
                                    )}
                                </div>
                                <div className="flex items-center gap-3 h-10">
                                    {isEstimateUploaded && (
                                        <>
                                            <button onClick={handleCommitToMaster} className={`h-full px-6 rounded-lg text-[13px] font-black shadow-sm ${selectedRows.size > 0 ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400 border opacity-70'}`}>
                                                <i className="fas fa-save mr-2"></i>마스터 반영
                                            </button>
                                        </>
                                    )}
                                    <button onClick={() => setShowExportModal(true)} className="h-full px-5 rounded-lg text-[13px] font-bold bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 shadow-sm transition-colors">
                                        <i className="fas fa-file-export mr-2"></i>출력 (F7)
                                    </button>
                                    <SearchBar onSearch={setDebouncedSearch} />
                                    <button onClick={() => { setIsEstimateUploaded(false); setManagedItems([]); setSelectedRows(new Set()); showToast('전체상품 기본 화면으로 돌아갑니다.'); }} className="text-slate-400 hover:text-slate-700 ml-2">
                                        <i className="fas fa-redo-alt" title="초기화"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0">
                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col">
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse text-[13px] whitespace-nowrap min-w-max relative z-0">
                                        <thead className="text-[12px] font-extrabold">
                                            <tr>
                                                <th className="sticky top-0 z-40 bg-[#f5f4f0] px-3 py-2 border-b border-r border-[#e8e4db] w-[240px] min-w-[240px] shadow-[4px_0_8px_-2px_rgba(0,0,0,0.06)] text-[#5c554d]" style={{left: 0}}>
                                                    <div className="flex items-center gap-2 pl-1">
                                                        {isEstimateUploaded && <input type="checkbox" className="rounded w-3.5 h-3.5" checked={selectedRows.size === displayRows.length && displayRows.length > 0} onChange={toggleAllRows} />}
                                                        <span>상품정보 (코드/품명/규격)</span>
                                                    </div>
                                                </th>
                                                <th className="sticky top-0 z-30 bg-[#eff6ff] px-2 py-3 border-r border-b border-blue-100 text-center text-blue-800 w-[90px] min-w-[90px]">
                                                    <div className="text-[9px] mb-0.5">전체상품</div>[M] 입고가
                                                </th>
                                                {visibleUploadCols['estimate'].map(h => (
                                                    <th key={`pu-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-2 border-r border-b border-slate-200 text-center ${getCellWidthClass(h)}`}>
                                                        <div className="text-[9px] text-indigo-400 mb-0.5">[견적]</div>{h}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-slate-700">
                                            {displayRows.length === 0 ? <tr><td colSpan="50" className="p-16 text-center text-slate-400 bg-white"><i className="fas fa-folder-open text-4xl mb-4 block"></i>데이터가 없습니다.</td></tr> : displayRows.map((row, idx) => {
                                                const isSel = selectedRows.has(row.코드); 
                                                const baseBg = isEstimateUploaded ? 'bg-white' : 'bg-[#faf9f5]';
                                                const hoverBg = isEstimateUploaded ? 'hover:bg-slate-50' : 'hover:bg-[#f0ece1]';
                                                const bg = isSel ? 'bg-indigo-50/50' : `${baseBg} ${hoverBg}`;
                                                
                                                const mItem = masterProducts[row.코드] || {}; 
                                                
                                                const uploadName = row.sources?.[activeProfileKey]?.['품목명'] || ''; 
                                                const uploadSpec = row.sources?.[activeProfileKey]?.['규격'] || ''; 
                                                
                                                const dName = uploadName || mItem.품목명 || '[미등록]';
                                                const dSpec = uploadSpec || mItem.규격 || '';

                                                return (
                                                    <tr key={row.코드} className={`group ${bg}`}>
                                                        <td className={`sticky z-20 px-3 py-2 border-r border-[#edebe3] w-[240px] shadow-[4px_0_8px_-2px_rgba(0,0,0,0.04)] transition-colors ${isSel ? 'bg-indigo-50/50' : 'bg-[#faf9f5] group-hover:bg-[#f0ece1]'}`} style={{left: 0}}>
                                                            <div className="flex gap-3 items-center">
                                                                {isEstimateUploaded && <input type="checkbox" className="w-3.5 h-3.5 text-indigo-600 shrink-0" checked={isSel} onChange={() => { const n = new Set(selectedRows); n.has(row.코드)?n.delete(row.코드):n.add(row.코드); setSelectedRows(n); }} />}
                                                                <div className="flex flex-col truncate w-full">
                                                                    <span className="text-[9.5px] font-mono text-indigo-400 mb-0.5">{row.코드}</span>
                                                                    <div className="flex items-center gap-1.5 w-full truncate">
                                                                        <span className={`text-[13px] font-extrabold truncate ${!mItem.품목명 && !uploadName ? 'text-rose-500' : 'text-slate-800'}`}>{dName}</span>
                                                                        {dSpec && <><span className="text-slate-300 text-[10px] shrink-0">|</span><span className="text-[11px] text-slate-500 truncate shrink-0">{dSpec}</span></>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-2 py-1.5 border-r border-[#edebe3] text-center text-[#6b675e] bg-[#faf9f5]">
                                                            {mItem['입고가'] ? Number(mItem['입고가']).toLocaleString() : '-'}
                                                        </td>
                                                        {visibleUploadCols['estimate'].map(h => renderUploadEditableCell(row, idx, h, activeProfileKey, `r-p-f-${h}`))}
                                                    </tr>
                                                );
                                            })}
                                            <tr><td colSpan="50" className="h-[200px] bg-slate-50/50 border-t border-slate-200"></td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {showExportModal && (
                        <ExportModal 
                            onClose={() => setShowExportModal(false)}
                            displayRows={displayRows}
                            currentExportKey={currentExportKey}
                            currentExportTitle={currentExportTitle}
                            executeExport={executeExport}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
