<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps v5.40 - 통합 수발주 및 단가 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .dark-header { background-color: #0f172a; }
        .system-io { background-color: #020617; border: 1px solid #1e293b; border-radius: 8px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .terminal-text { font-family: 'JetBrains Mono', 'Fira Code', monospace; color: #10b981; }
        
        .excel-input {
            width: 100%; text-align: right; background: transparent; border: 1px solid transparent;
            padding: 4px 8px; font-weight: 800; border-radius: 4px; transition: all 0.2s; outline: none;
            font-size: 15px;
        }
        .excel-input:focus { background-color: #fff; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .excel-input.a-price { color: #1d4ed8; border-bottom: 1px solid #bfdbfe; }
        .excel-input.b-price { color: #0f766e; border-bottom: 1px solid #99f6e4; }
        .excel-input.qty-out { color: #b45309; border-bottom: 1px solid #fde68a; background-color: #fffbeb; }
        .excel-input.error { color: #e11d48; border-bottom: 2px solid #fda4af; background-color: #fff1f2; }

        .issue-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .issue-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .issue-card.active { border-color: #3b82f6; background-color: #eff6ff; }
        .issue-card.active.rose { border-color: #f43f5e; background-color: #fff1f2; }
        .issue-card.active.amber { border-color: #f59e0b; background-color: #fffbeb; }

        /* Main Mode Toggle */
        .main-nav-btn { position: relative; overflow: hidden; }
        .main-nav-btn.active::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 3px; background-color: #60a5fa; border-radius: 3px 3px 0 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const calcMargin = (price, cost) => {
            if (!price || price <= 0) return 0;
            return (((price - cost) / price) * 100).toFixed(1);
        };

        const App = () => {
            // --- 1. 통합 상태 관리 (State) ---
            const [rawData, setRawData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeIssue, setActiveIssue] = useState(null); 
            
            // 모드 제어 State
            const [globalMode, setGlobalMode] = useState('order'); // 'order'(수발주), 'price'(단가관리)
            const [subView, setSubView] = useState('item'); // order: 'item', 'vendor' | price: 'mall', 'wholesale'
            
            const [gasUrl, setGasUrl] = useState('');

            // 모드 전환 시 서브 뷰 초기화
            useEffect(() => {
                if (globalMode === 'order') setSubView('item');
                if (globalMode === 'price') setSubView('mall');
                setActiveIssue(null);
            }, [globalMode]);

            // --- 2. 데이터 제어 (견적서 업로드 및 주문 데이터 Mocking) ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const data = XLSX.utils.sheet_to_json(ws, { range: 1, defval: "" });

                        const mockVendors = ['창창푸드(도매)', '마니유통(식자재)', '우리식당(소매)', '참조은(도매)'];

                        const mapped = data.map((row, idx) => {
                            const parseNum = (val) => Number(String(val).replace(/,/g, '')) || 0;
                            const stock = parseNum(row['재고']);
                            // 테스트용 주문 데이터 가상 생성 (수발주 결품 테스트용)
                            const mockOrderQty = stock > 0 ? Math.floor(Math.random() * (stock + 20)) : Math.floor(Math.random() * 30);
                            
                            return {
                                id: `ITEM_${Date.now()}_${idx}`,
                                순번: row['순번'] || '',
                                코드: String(row['2코드'] || '').trim(),
                                품명: String(row['품목명'] || '').trim(),
                                규격: String(row['규격명'] || '').trim(),
                                구매처: String(row['구매처명'] || '').trim(),
                                그룹: String(row['품목그룹3명'] || '').trim(),
                                구매가: parseNum(row['구매가']),
                                A판매: parseNum(row['A판매']),
                                B판매: parseNum(row['B판매']),
                                싯가: parseNum(row['싯가']),
                                재고: stock,
                                지시사항: String(row['지시사항'] || '').trim(),
                                적요: String(row['적요'] || '').trim(),
                                // 수발주 관리용 가상 필드
                                주문량: mockOrderQty,
                                출고확정: Math.min(stock, mockOrderQty), // 재고 내에서 일단 확정 세팅
                                주문처: mockVendors[idx % mockVendors.length]
                            };
                        }).filter(i => i.코드 && i.품명);

                        setRawData(mapped);
                        setActiveIssue(null);
                        setSearchTerm('');
                        alert(`데이터 로드 완료! (수발주 결품 테스트를 위해 '주문량'이 임의 생성되었습니다)`);
                    } catch (error) {
                        alert('엑셀 파일을 읽는 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleValueChange = (id, field, value) => {
                const num = Number(value.replace(/,/g, '')) || 0;
                setRawData(prev => prev.map(item => item.id === id ? { ...item, [field]: num } : item));
            };

            // --- 3. 집계 로직 (모드별 독립 집계) ---
            const stats = useMemo(() => {
                let s = { shortage: 0, marginWarning: 0, trend: 0, info: 0, total: rawData.length };
                
                rawData.forEach(i => {
                    // 수발주 모드 전용
                    if (i.주문량 > i.재고) s.shortage++;
                    
                    // 공통 / 단가 모드 전용
                    if (i.지시사항 || i.적요) s.info++;
                    if (i.구매가 !== i.싯가 && i.싯가 > 0) s.trend++;
                    
                    // 마진 경고 (뷰에 따라 다름)
                    if (globalMode === 'price') {
                        if (subView === 'mall' && i.구매가 > i.A판매 && i.A판매 > 0) s.marginWarning++;
                        if (subView === 'wholesale' && ((i.구매가 > i.A판매 && i.A판매 > 0) || (i.구매가 > i.B판매 && i.B판매 > 0))) s.marginWarning++;
                    } else {
                        // 수발주 모드일 때는 B판매(도매가) 대비 역마진을 위험으로 집계 (보수적 접근)
                        if (i.구매가 > i.B판매 && i.B판매 > 0) s.marginWarning++;
                    }
                });
                return s;
            }, [rawData, globalMode, subView]);

            // --- 4. 필터링 로직 ---
            const displayData = useMemo(() => {
                let list = rawData;
                if (searchTerm) {
                    const q = searchTerm.toLowerCase();
                    list = list.filter(i => i.품명.toLowerCase().includes(q) || i.코드.includes(q) || i.주문처?.toLowerCase().includes(q) || i.구매처.toLowerCase().includes(q));
                }
                
                if (activeIssue === 'shortage') list = list.filter(i => i.주문량 > i.재고);
                else if (activeIssue === 'info') list = list.filter(i => i.지시사항 || i.적요);
                else if (activeIssue === 'margin') {
                    if (globalMode === 'price' && subView === 'mall') list = list.filter(i => i.구매가 > i.A판매 && i.A판매 > 0);
                    else list = list.filter(i => (i.구매가 > i.A판매 && i.A판매 > 0) || (i.구매가 > i.B판매 && i.B판매 > 0));
                } 
                else if (activeIssue === 'trend') list = list.filter(i => i.구매가 !== i.싯가 && i.싯가 > 0);
                
                return list;
            }, [rawData, searchTerm, activeIssue, globalMode, subView]);

            return (
                <div className="flex flex-col h-screen">
                    {/* TOP: 글로벌 헤더 & 글로벌 모드 스위처 */}
                    <header className="dark-header text-white px-6 py-4 flex justify-between items-center shrink-0 shadow-lg z-20">
                        <div className="flex items-center gap-8">
                            <div className="flex flex-col mr-4">
                                <span className="text-xl font-black tracking-tighter text-blue-400 italic">ONEAPP MerchOps</span>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1">Final Integration v5.40</span>
                            </div>
                            
                            {/* 핵심: 글로벌 모드 스위처 */}
                            <nav className="flex gap-6 text-[15px] font-bold text-slate-400">
                                <button 
                                    onClick={() => setGlobalMode('order')} 
                                    className={`main-nav-btn transition-colors pb-1 ${globalMode === 'order' ? 'text-white active' : 'hover:text-slate-200'}`}
                                >
                                    <i className="fas fa-box-open mr-2"></i>수발주/결품 관리
                                </button>
                                <button 
                                    onClick={() => setGlobalMode('price')} 
                                    className={`main-nav-btn transition-colors pb-1 ${globalMode === 'price' ? 'text-white active' : 'hover:text-slate-200'}`}
                                >
                                    <i className="fas fa-tags mr-2"></i>상품/단가 관리
                                </button>
                            </nav>
                        </div>
                        <div className="flex items-center gap-3">
                            <button className="bg-slate-800 text-slate-300 hover:text-white transition px-4 py-1.5 rounded-full text-[12px] font-bold border border-slate-700 flex items-center">
                                <i className="fas fa-cloud-download-alt mr-1.5"></i>불러오기
                            </button>
                            <button className="bg-emerald-600 hover:bg-emerald-500 text-white transition shadow-lg shadow-emerald-900/20 px-4 py-1.5 rounded-full text-[12px] font-bold flex items-center">
                                <i className="fas fa-file-export mr-1.5"></i>엑셀출력
                            </button>
                            <button className="bg-blue-600 hover:bg-blue-500 text-white transition shadow-lg shadow-blue-900/20 px-4 py-1.5 rounded-full text-[12px] font-bold flex items-center">
                                <i className="fas fa-cloud-upload-alt mr-1.5"></i>데이터 전송
                            </button>
                        </div>
                    </header>

                    {/* MID 1: System.IO 터미널 바 & 서브 뷰 토글 */}
                    <div className="px-6 py-3 bg-slate-100 shrink-0 border-b border-slate-200 flex justify-between items-end">
                        <div className="flex flex-col gap-3 w-1/2">
                            {/* 서브 뷰 토글 (글로벌 모드에 따라 다름) */}
                            <div className="inline-flex bg-slate-200 p-1 rounded-lg w-max shadow-inner">
                                {globalMode === 'order' ? (
                                    <>
                                        <button onClick={() => {setSubView('item'); setActiveIssue(null);}} className={`px-5 py-2 rounded-md font-black text-[13px] transition-all flex items-center gap-2 ${subView === 'item' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            <i className="fas fa-list-ul"></i> 품목별 수급현황
                                        </button>
                                        <button onClick={() => {setSubView('vendor'); setActiveIssue(null);}} className={`px-5 py-2 rounded-md font-black text-[13px] transition-all flex items-center gap-2 ${subView === 'vendor' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            <i className="fas fa-truck"></i> 거래처별 출고지시
                                        </button>
                                    </>
                                ) : (
                                    <>
                                        <button onClick={() => {setSubView('mall'); setActiveIssue(null);}} className={`px-5 py-2 rounded-md font-black text-[13px] transition-all flex items-center gap-2 ${subView === 'mall' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            <i className="fas fa-shopping-cart"></i> 🛒 쇼핑몰 판가 모드
                                        </button>
                                        <button onClick={() => {setSubView('wholesale'); setActiveIssue(null);}} className={`px-5 py-2 rounded-md font-black text-[13px] transition-all flex items-center gap-2 ${subView === 'wholesale' ? 'bg-white text-teal-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            <i className="far fa-building"></i> 🏢 도매 판가 모드
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>

                        <div className="flex flex-col gap-2 w-1/2">
                            <div className="system-io p-2 flex justify-between items-center w-full">
                                <div className="flex items-center gap-2">
                                    <span className="bg-emerald-500 text-black text-[9px] font-black px-1.5 py-0.5 rounded">SYS.IO</span>
                                    <span className="terminal-text text-[11px] font-bold truncate max-w-[200px]">
                                        {isProcessing ? '> processing_request...' : `> loaded: ${stats.total} items`}
                                    </span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <label className="cursor-pointer bg-slate-800 text-white hover:bg-slate-700 px-3 py-1 rounded text-[11px] font-black transition flex items-center gap-1">
                                        <i className="fas fa-file-excel text-emerald-500"></i> 데이터(견적/주문) 업로드
                                        <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MID 2: 핫라인 이슈 카드 (모드별 동적 전환) */}
                    <div className="px-6 py-3 grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0 bg-slate-50">
                        {globalMode === 'order' ? (
                            /* 수발주 모드 이슈 카드 */
                            <>
                                <div onClick={() => setActiveIssue(activeIssue === 'shortage' ? null : 'shortage')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'shortage' ? 'active amber' : 'border-transparent border-l-amber-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">결품/재고 부족 위험</span>
                                        <i className={`fas fa-box-open ${stats.shortage > 0 ? 'text-amber-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-amber-600">{stats.shortage} <span className="text-sm text-slate-400">건</span></div>
                                    <p className="text-[10px] font-bold text-slate-400 mt-1">주문량이 재고를 초과함</p>
                                </div>
                                <div onClick={() => setActiveIssue(activeIssue === 'margin' ? null : 'margin')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'margin' ? 'active rose' : 'border-transparent border-l-rose-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">출고 마진 경고 (원가급등)</span>
                                        <i className={`fas fa-exclamation-triangle ${stats.marginWarning > 0 ? 'text-rose-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-rose-600">{stats.marginWarning} <span className="text-sm text-slate-400">건</span></div>
                                    <p className="text-[10px] font-bold text-slate-400 mt-1">오늘 입고가 상승으로 역마진</p>
                                </div>
                                <div onClick={() => setActiveIssue(activeIssue === 'info' ? null : 'info')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'info' ? 'border-blue-500 bg-blue-50/50' : 'border-transparent border-l-blue-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">특이 메모 / 지시사항</span>
                                        <i className={`fas fa-info-circle ${stats.info > 0 ? 'text-blue-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-slate-800">{stats.info} <span className="text-sm text-slate-400">건</span></div>
                                    <p className="text-[10px] font-bold text-slate-400 mt-1">현장 확인 필요 항목</p>
                                </div>
                            </>
                        ) : (
                            /* 단가/상품 모드 이슈 카드 (STEP 4와 동일) */
                            <>
                                <div onClick={() => setActiveIssue(activeIssue === 'info' ? null : 'info')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'info' ? 'border-blue-500 bg-blue-50/50' : 'border-transparent border-l-blue-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">상품정보 (지시/적요)</span>
                                        <i className={`fas fa-info-circle ${stats.info > 0 ? 'text-blue-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-slate-800">{stats.info} <span className="text-sm text-slate-400">건</span></div>
                                </div>
                                <div onClick={() => setActiveIssue(activeIssue === 'margin' ? null : 'margin')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'margin' ? 'active rose' : 'border-transparent border-l-rose-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">{subView === 'mall' ? '쇼핑몰 역마진 (A판매)' : '도매 역마진 (A/B판매)'}</span>
                                        <i className={`fas fa-exclamation-triangle ${stats.marginWarning > 0 ? 'text-rose-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-rose-600">{stats.marginWarning} <span className="text-sm text-slate-400">건</span></div>
                                </div>
                                <div onClick={() => setActiveIssue(activeIssue === 'trend' ? null : 'trend')} className={`issue-card bg-white p-4 rounded-xl shadow-sm border-2 ${activeIssue === 'trend' ? 'border-amber-500 bg-amber-50/50' : 'border-transparent border-l-amber-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-black text-slate-500">시세 급등락 (싯가변동)</span>
                                        <i className={`fas fa-chart-line ${stats.trend > 0 ? 'text-amber-500' : 'text-slate-300'}`}></i>
                                    </div>
                                    <div className="text-2xl font-black text-slate-800">{stats.trend} <span className="text-sm text-slate-400">건</span></div>
                                </div>
                            </>
                        )}
                    </div>

                    {/* BOTTOM: 실행형 그리드 (모드/뷰에 따라 컬럼이 완전히 바뀜) */}
                    <div className="flex-1 overflow-hidden px-6 pb-6 bg-slate-50 flex flex-col">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                            <div className="p-3 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                                <div className="relative max-w-sm w-full">
                                    <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                    <input type="text" placeholder="품명 / 주문처 / 코드 검색" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all font-bold text-slate-700 shadow-sm" />
                                </div>
                                {activeIssue && (
                                    <div className="flex items-center gap-2 px-3 py-1.5 bg-rose-100 text-rose-700 rounded-full text-xs font-black animate-pulse">
                                        <i className="fas fa-filter"></i> 
                                        {activeIssue === 'shortage' ? '결품/재고부족' : activeIssue === 'margin' ? '역마진' : '이슈'} 필터링 중
                                        <button onClick={() => setActiveIssue(null)} className="ml-1"><i className="fas fa-times-circle"></i></button>
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 overflow-auto relative">
                                <table className="w-full text-left border-collapse min-w-[1200px]">
                                    <thead className="bg-slate-100 sticky top-0 z-10 shadow-sm border-b border-slate-200">
                                        <tr className="text-[11px] font-black text-slate-500 uppercase tracking-tighter">
                                            <th className="px-4 py-3 w-16 text-center">No.</th>
                                            <th className="px-4 py-3">품목 정보 (코드 / 품명)</th>
                                            
                                            {/* 수발주 모드 헤더 */}
                                            {globalMode === 'order' && (
                                                <>
                                                    <th className="px-4 py-3">{subView === 'vendor' ? '주문처 (거래처)' : '기본 구매처'}</th>
                                                    <th className="px-4 py-3 text-right text-emerald-700 w-24">현재 가용재고</th>
                                                    <th className="px-4 py-3 text-right text-blue-700 w-24">총 주문수량</th>
                                                    <th className="px-4 py-3 text-right w-32 bg-amber-50 border-x border-amber-100 text-amber-800">📦 출고 지시수량</th>
                                                    <th className="px-4 py-3 text-right w-32">오늘 매입가/마진</th>
                                                    <th className="px-4 py-3 w-32 text-center">출고 상태</th>
                                                </>
                                            )}

                                            {/* 단가 모드 헤더 */}
                                            {globalMode === 'price' && (
                                                <>
                                                    <th className="px-4 py-3">구매처 / 그룹</th>
                                                    <th className="px-4 py-3 text-right w-32 bg-slate-200/50">오늘 매입가 (In)</th>
                                                    {subView === 'mall' && <th className="px-4 py-3 text-right w-48 text-blue-700 border-x border-blue-100 bg-blue-50/30">🛒 쇼핑몰 판가 (A판매)</th>}
                                                    {subView === 'wholesale' && (
                                                        <>
                                                            <th className="px-4 py-3 text-right w-40 text-blue-700">기본 도매가 (A판매)</th>
                                                            <th className="px-4 py-3 text-right w-40 text-teal-700 border-x border-teal-100 bg-teal-50/20">할인 도매가 (B판매)</th>
                                                        </>
                                                    )}
                                                    <th className="px-4 py-3 text-right w-24">싯가 / 재고</th>
                                                    <th className="px-4 py-3">지시사항 / 검증결과</th>
                                                </>
                                            )}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {displayData.length === 0 ? (
                                            <tr><td colSpan="8" className="py-24 text-center font-bold text-slate-400">데이터가 없습니다.</td></tr>
                                        ) : (
                                            displayData.map((row) => {
                                                const isShortage = row.주문량 > row.재고;
                                                const marginAPct = calcMargin(row.A판매, row.구매가);
                                                const marginBPct = calcMargin(row.B판매, row.구매가);
                                                const isMarginA = row.구매가 > row.A판매 && row.A판매 > 0;
                                                const isMarginB = row.구매가 > row.B판매 && row.B판매 > 0;
                                                
                                                return (
                                                    <tr key={row.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-4 py-3 text-center text-[10px] text-slate-400 font-mono">{row.순번}</td>
                                                        <td className="px-4 py-3">
                                                            <div className="flex flex-col">
                                                                <span className="text-[13px] font-black text-slate-800">{row.품명}</span>
                                                                <div className="flex items-center gap-1.5 mt-0.5">
                                                                    <span className="px-1 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-mono border border-slate-200">{row.코드}</span>
                                                                    <span className="text-[11px] font-bold text-slate-500">{row.규격}</span>
                                                                </div>
                                                            </div>
                                                        </td>

                                                        {/* --- 수발주 모드 렌더링 --- */}
                                                        {globalMode === 'order' && (
                                                            <>
                                                                <td className="px-4 py-3">
                                                                    <span className="text-[12px] font-bold text-slate-700">{subView === 'vendor' ? row.주문처 : row.구매처}</span>
                                                                </td>
                                                                <td className="px-4 py-3 text-right">
                                                                    <span className="text-[15px] font-black text-emerald-600">{row.재고}</span>
                                                                </td>
                                                                <td className="px-4 py-3 text-right">
                                                                    <span className="text-[15px] font-black text-blue-600">{row.주문량}</span>
                                                                </td>
                                                                <td className={`px-4 py-3 text-right border-x border-amber-100 bg-amber-50/30 ${isShortage ? 'bg-rose-50/50' : ''}`}>
                                                                    <input 
                                                                        type="text" 
                                                                        className={`excel-input qty-out ${isShortage && row.출고확정 < row.주문량 ? 'error' : ''}`} 
                                                                        defaultValue={row.출고확정} 
                                                                        onBlur={(e) => handleValueChange(row.id, '출고확정', e.target.value)} 
                                                                    />
                                                                    {isShortage && <div className="text-[9px] font-black text-rose-500 mt-1">부족: {row.주문량 - row.재고}</div>}
                                                                </td>
                                                                <td className="px-4 py-3 text-right">
                                                                    <div className="flex flex-col items-end">
                                                                        <span className="text-[13px] font-black text-slate-800">{row.구매가.toLocaleString()}</span>
                                                                        {isMarginB ? (
                                                                            <span className="text-[9px] font-bold text-rose-500 mt-0.5">역마진 위험</span>
                                                                        ) : (
                                                                            <span className="text-[9px] font-bold text-slate-400 mt-0.5">마진: {marginBPct}%</span>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    {isShortage ? (
                                                                        <span className="px-2 py-1 bg-rose-100 text-rose-700 rounded text-[11px] font-black border border-rose-200">결품/대체</span>
                                                                    ) : (
                                                                        <span className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-[11px] font-black border border-emerald-200">정상출고</span>
                                                                    )}
                                                                </td>
                                                            </>
                                                        )}

                                                        {/* --- 단가 모드 렌더링 (기존 STEP 4) --- */}
                                                        {globalMode === 'price' && (
                                                            <>
                                                                <td className="px-4 py-3">
                                                                    <div className="flex flex-col">
                                                                        <span className="text-[11px] font-bold text-slate-700">{row.구매처}</span>
                                                                        <span className="text-[10px] text-slate-400">{row.그룹}</span>
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-3 text-right bg-slate-50/50">
                                                                    <span className="text-[15px] font-black text-slate-900">{row.구매가.toLocaleString()}</span>
                                                                </td>
                                                                {subView === 'mall' && (
                                                                    <td className={`px-4 py-3 text-right border-x border-blue-50 bg-blue-50/10 ${isMarginA ? 'bg-rose-50/50' : ''}`}>
                                                                        <div className="flex flex-col items-end">
                                                                            <input type="text" className={`excel-input a-price ${isMarginA ? 'error' : ''}`} defaultValue={row.A판매.toLocaleString()} onBlur={(e) => handleValueChange(row.id, 'A판매', e.target.value)} />
                                                                            <div className="mt-1 flex items-center gap-1">
                                                                                {isMarginA && <span className="bg-rose-500 text-white px-1.5 rounded text-[9px] font-bold animate-pulse">역마진</span>}
                                                                                <span className={`text-[10px] font-black ${isMarginA ? 'text-rose-600' : 'text-blue-500'}`}>마진: {marginAPct}%</span>
                                                                            </div>
                                                                        </div>
                                                                    </td>
                                                                )}
                                                                {subView === 'wholesale' && (
                                                                    <>
                                                                        <td className={`px-4 py-3 text-right ${isMarginA ? 'bg-rose-50/30' : ''}`}>
                                                                            <div className="flex flex-col items-end">
                                                                                <input type="text" className={`excel-input a-price ${isMarginA ? 'error' : ''}`} defaultValue={row.A판매.toLocaleString()} onBlur={(e) => handleValueChange(row.id, 'A판매', e.target.value)} />
                                                                                <span className={`text-[10px] font-bold mt-1 ${isMarginA ? 'text-rose-500' : 'text-slate-400'}`}>마진: {marginAPct}%</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className={`px-4 py-3 text-right border-x border-teal-50 bg-teal-50/10 ${isMarginB ? 'bg-rose-50/50' : ''}`}>
                                                                            <div className="flex flex-col items-end">
                                                                                <input type="text" className={`excel-input b-price ${isMarginB ? 'error' : ''}`} defaultValue={row.B판매.toLocaleString()} onBlur={(e) => handleValueChange(row.id, 'B판매', e.target.value)} />
                                                                                <div className="mt-1 flex items-center gap-1">
                                                                                    {isMarginB && <span className="bg-rose-500 text-white px-1.5 rounded text-[9px] font-bold animate-pulse">위험</span>}
                                                                                    <span className={`text-[10px] font-black ${isMarginB ? 'text-rose-600' : 'text-teal-600'}`}>마진: {marginBPct}%</span>
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                    </>
                                                                )}
                                                                <td className="px-4 py-3 text-right opacity-70">
                                                                    <div className="flex flex-col items-end">
                                                                        <span className="text-[11px] font-bold text-slate-500">싯: {row.싯가.toLocaleString()}</span>
                                                                        <span className="text-[11px] font-bold text-slate-400">재: {row.재고}</span>
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-3">
                                                                    <div className="flex flex-col gap-1.5 items-start">
                                                                        {row.지시사항 && <span className="px-2 py-0.5 bg-amber-100 text-amber-800 rounded text-[10px] font-black border border-amber-200">{row.지시사항}</span>}
                                                                        {row.적요 && <span className="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px] font-bold border border-slate-200">{row.적요}</span>}
                                                                    </div>
                                                                </td>
                                                            </>
                                                        )}
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
