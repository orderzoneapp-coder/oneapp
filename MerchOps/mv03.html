<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v9.3]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 [NEW] 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티
        // ==========================================
        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '품목명' || h === '상품명') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return '';
        };

        const isValidSubItemCode = (code) => {
            if (!code) return false;
            const s = String(code).trim();
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 로직 (단가 계산 및 파서)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem, currentFinalData, marginRules, forceRecalc = false) => {
            const outsrc = parseNum(currentFinalData['외주비'] ?? mItem['외주비']);
            const labor = parseNum(currentFinalData['노무비'] ?? mItem['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData['창고'] ?? mItem['창고'] ?? '').trim();
            const unitStr = String(currentFinalData['단위'] ?? mItem['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') {
                calcOutPrice = totalCost / (1 - (appliedRule.rate / 100));
            } else {
                calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            }
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData['출고가']);
            const mIn = parseNum(mItem['입고가']);
            const mOut = parseNum(mItem['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) {
                newFinalData['출고가'] = providedOutPrice;
            } else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) {
                newFinalData['출고가'] = mOut;
            } else {
                newFinalData['출고가'] = calcOutPrice;
            }

            const div1 = parseNum(currentFinalData['1종연산'] ?? mItem['1종연산']);
            const extraCost = parseNum(currentFinalData['경비'] ?? mItem['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                const calc1Out = Math.round((newFinalData['출고가'] / div1) + extraCost);
                newFinalData['1출고'] = Math.round(calc1Out / 10) * 10; 
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.some(kw => cleanH.includes(kw));
                });
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return resolve([]);

                        let headerRowIdx = 0;
                        const maxSearch = Math.min(15, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('1코드')) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) {
                                    obj[h] = row[idx];
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false;
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        resolve(parsedData);
                    } catch(err) {
                        reject(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // ==========================================
        // 🧩 3. 커스텀 훅 (State Architecture)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || 'https://script.google.com/macros/s/AKfycbz7qZ5eM-U_qyaoP5amDfMqhZ-IXMjoBDWGu3qWI1D0JTYGINB64yYaLRLrkqWpHa88-w/exec');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) return getInitialVisibleMasterCols();
                return parsed;
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) return getInitialVisibleUploadCols();
                return parsed;
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.master) parsed = getInitialMappings();
                if (!parsed.estimate['창고']) parsed.estimate['창고'] = '창고, 창고코드';
                if (!parsed.master['창고']) parsed.master['창고'] = '창고, 창고코드';
                return parsed; 
            });
            
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) parsed = getInitialMasterLinks();
                if (parsed.estimate['창고'] === undefined) parsed.estimate['창고'] = '창고';
                return parsed;
            });

            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                if (s) {
                    try {
                        const parsed = JSON.parse(s);
                        return parsed.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' }));
                    } catch(e) {}
                }
                return [
                    { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
                ];
            });

            useEffect(() => {
                localStorage.setItem('merchCloudUrl_v870', cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules]);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            // 초기 구동 시 IndexedDB 및 LocalStorage에서 데이터 로드
            useEffect(() => {
                getIDB('merchMaster_v870').then(data => {
                    if (data) setMasterProducts(data);
                }).catch(console.error);

                try { 
                    const logs = JSON.parse(localStorage.getItem('merchHistory_v870'));
                    if (logs) setHistoryLogs(logs);
                } catch(e) {}
            }, []);

            // 💡 [탭 동기화] 다른 탭(Smart Parser)에서 마스터 데이터가 변경되면 실시간 반영
            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        getIDB('merchMaster_v870').then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    await setIDB('merchMaster_v870', data);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                } 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const combined = [...newLogs, ...prev].slice(0, 2000); 
                    localStorage.setItem('merchHistory_v870', JSON.stringify(combined));
                    return combined;
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMasterToLocal, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [selectedTag, setSelectedTag] = useState(''); 
            
            const [showExportModal, setShowExportModal] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [showBriefingModal, setShowBriefingModal] = useState(false);
            const [showHistoryModal, setShowHistoryModal] = useState(false);
            
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                selectedRows, setSelectedRows, globalSearch, setGlobalSearch, selectedTag, setSelectedTag,
                showExportModal, setShowExportModal, showSettings, setShowSettings, showBriefingModal, setShowBriefingModal, showHistoryModal, setShowHistoryModal,
                alertMsg, setAlertMsg, toastMsg, setToastMsg, isProcessing, setIsProcessing, processMsg, setProcessMsg, showToast
            };
        };

        // ==========================================
        // 🧩 4. 비즈니스 액션 훅
        // ==========================================
        const useMerchActions = (config, data, ui, fullDisplayRows) => {

            const handleCloudSync = async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다. 우측 상단 톱니바퀴에서 URL을 세팅해주세요.");
                ui.showToast(`☁️ 클라우드 ${type === 'upload' ? '전체 백업' : '불러오기'} 시작...`);
                ui.setIsProcessing(true);
                try {
                    if (type === 'upload') {
                        const dict = JSON.parse(localStorage.getItem('parserDict_v870') || '{}');
                        const payload = { 
                            type: "syncAll", 
                            data: { 
                                master: data.masterProducts,
                                dict: dict,
                                rules: config.marginRules
                            } 
                        };
                        const res = await fetch(config.cloudUrl, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(payload) 
                        });
                        const result = await res.json();
                        if (result.status !== 'success') throw new Error(result.message);
                        ui.showToast('✅ 클라우드 전체 데이터 저장(Push) 성공');
                    } else {
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        if (result.status === 'success' && result.data) { 
                            if (result.data.master && Object.keys(result.data.master).length > 0) {
                                data.setMasterProducts(result.data.master);
                            }

                                <input type="checkbox" className={`w-4 h-4 rounded border-slate-300 cursor-pointer shrink-0 text-indigo-600 focus:ring-indigo-500`} checked={isSel} onChange={() => {const n = new Set(state.selectedRows); n.has(row.코드)?n.delete(row.코드):n.add(row.코드); setSelectedRows(n);}} />
                            )}
                            <div className="flex flex-col min-w-0 w-full overflow-hidden ml-1">
                                <span className={`text-[10px] font-mono mb-0.5 truncate block w-full text-indigo-400`}>{row.코드}</span>
                                <div className="flex items-center w-full min-w-0 overflow-hidden">
                                    <span className={`text-[13px] font-extrabold truncate block shrink ${!mItem.품목명 ? 'text-rose-500' : 'text-slate-800'}`} title={dName}>{dName}</span>
                                    {dSpec && <span className="text-[11px] text-slate-400 truncate block shrink-0 ml-1 max-w-[40%]" title={dSpec}>({dSpec})</span>}
                                </div>
                            </div>
                        </div>
                    </td>

                    {!isEstimateUploaded ? (
                        visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => {
                            const isNum = NUMERIC_HEADERS.includes(h);
                            const mVal = mItem[h] !== undefined && mItem[h] !== '' ? (isNum ? parseNum(mItem[h]).toLocaleString() : mItem[h]) : '-';
                            return (
                                <td key={`idle-td-${h}`} className={`px-2 py-1.5 border-r border-[#edebe3] text-[#6b675e] ${getCellWidthClass(h)} ${isNum ? 'text-right font-bold' : 'text-center'}`}>
                                    <div className="truncate w-full">{mVal}</div>
                                </td>
                            );
                        })
                    ) : (
                        <>
                            {visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => {
                                const isNum = NUMERIC_HEADERS.includes(h);
                                const mVal = mItem[h];
                                let displayVal = mVal;
                                let isChanged = false;

                                if (row.finalData && row.finalData[h] !== undefined) {
                                    if (isNum && parseNum(row.finalData[h]) !== parseNum(mVal)) { displayVal = row.finalData[h]; isChanged = true; } 
                                    else if (!isNum && String(row.finalData[h]) !== String(mVal)) { displayVal = row.finalData[h]; isChanged = true; }
                                }
                                const formattedVal = displayVal !== undefined && displayVal !== '' ? (isNum ? parseNum(displayVal).toLocaleString() : displayVal) : '-';
                                return (
                                    <td key={`pm-d-${h}`} className={`px-2 py-1.5 border-r border-[#edebe3] transition-colors ${getCellWidthClass(h)} ${isChanged ? 'bg-amber-100/60 text-amber-800' : 'bg-[#faf9f5] text-[#6b675e]'} ${isNum ? 'text-right font-bold' : 'text-center'}`}>
                                        <div className="truncate w-full">{formattedVal}</div>
                                    </td>
                                );
                            })}
                            {visibleUploadCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => renderUploadEditableCell(row, idx, h, `p-u-e-${h}`))}
                        </>
                    )}
                </tr>
            );
        });

        const ExcelDataGrid = ({ state, actions }) => {
            const { isEstimateUploaded, selectedRows, fullDisplayRows, visibleMasterCols, visibleUploadCols, masterProducts } = state;
            const displayRows = fullDisplayRows.slice(0, 200);
            const hiddenCount = fullDisplayRows.length - displayRows.length;
            const requiredCoreFields = ['품목코드', '품목명', '규격'];

            return (
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col relative overflow-hidden">
                    <div className="flex-1 overflow-auto custom-scrollbar relative">
                        <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                            <thead className="text-[12px] font-extrabold">
                                <tr>
                                    <th className="sticky top-0 z-40 bg-[#f5f4f0] px-3 py-2 border-b border-r border-[#e8e4db] shadow-sm text-[#5c554d] min-w-[280px] w-[280px] max-w-[280px]" style={{left: 0}}>
                                        <div className="flex items-center gap-2 pl-1">
                                            {isEstimateUploaded && (
                                                <input type="checkbox" className={`rounded w-4 h-4 border-slate-300 cursor-pointer shrink-0 text-indigo-600 focus:ring-indigo-500`} checked={selectedRows.size === fullDisplayRows.length && displayRows.length > 0} onChange={actions.toggleAllRows} />
                                            )}
                                            <span className="truncate">상품정보 (코드/품명/규격)</span>
                                            {isEstimateUploaded && <span className="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[10px] font-black shrink-0">작업모드</span>}
                                        </div>
                                    </th>

                                    {!isEstimateUploaded ? (
                                        visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => (
                                            <th key={`idle-th-${h}`} className={`sticky top-0 z-30 bg-[#f8fafc] px-2 py-3 border-r border-b border-slate-200 text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                        ))
                                    ) : (
                                        <>
                                            {visibleMasterCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => (
                                                <th key={`pm-${h}`} className={`sticky top-0 z-30 bg-[#eff6ff] px-2 py-3 border-r border-b border-blue-100 text-center text-blue-800 ${getCellWidthClass(h)}`}>
                                                    <div className="text-[9px] mb-0.5">마스터 대조</div>[M] {h}
                                                </th>
                                            ))}
                                            {visibleUploadCols['estimate']?.filter(h => !requiredCoreFields.includes(h)).map(h => (
                                                <th key={`pu-e-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-3 border-r border-b border-slate-200 text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                            ))}
                                        </>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-slate-700">
                                {displayRows.length === 0 ? <tr><td colSpan="50" className="p-16 text-center text-slate-400 bg-white"><i className="fas fa-folder-open text-4xl mb-4 block"></i>{isEstimateUploaded ? "작업 버퍼에 일치하는 항목이 없습니다." : "조건에 일치하는 상품이 없거나, 데이터가 비어있습니다."}</td></tr> : displayRows.map((row, idx) => {
                                    const isSel = selectedRows.has(row.코드); 
                                    const bg = isSel ? 'bg-indigo-50/50' : (isEstimateUploaded ? 'bg-white hover:bg-slate-50' : 'bg-[#faf9f5] hover:bg-[#f0ece1]');
                                    const mItem = masterProducts[row.코드] || {}; 
                                    return <MemoizedTableRow key={row.코드} row={row} idx={idx} state={state} actions={actions} isSel={isSel} bg={bg} mItem={mItem} />;
                                })}
                                <tr>
                                    <td colSpan="50" className="h-[120px] bg-slate-50 border-t border-slate-200 flex items-center justify-center">
                                        {hiddenCount > 0 ? (
                                            <div className="text-[12px] font-bold text-slate-500 bg-white px-6 py-2 rounded-full border shadow-sm"><i className="fas fa-bolt text-amber-500 mr-2"></i>상위 200건만 표시됩니다. (숨겨진 항목: {hiddenCount}건) - 검색을 이용하세요.</div>
                                        ) : (
                                            <div className="text-[12px] font-bold text-slate-400">- 끝 -</div>
                                        )}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const WelcomeGuide = ({ onUpload, onCloudSync }) => (
            <div className="h-full w-full flex flex-col items-center justify-center bg-white rounded-xl border border-slate-200 shadow-sm p-10 fade-in relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500"></div>
                <div className="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 text-5xl mb-6 shadow-inner relative">
                    <i className="fas fa-box-open"></i>
                    <div className="absolute -bottom-2 -right-2 w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white text-[14px] border-2 border-white shadow-sm"><i className="fas fa-check"></i></div>
                </div>
                <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">MerchOps 메인 워크스페이스 [v9.3]</h2>
                <p className="text-[14px] text-slate-500 mb-10 text-center leading-relaxed font-bold">
                    현재 등록된 <span className="text-indigo-500">마스터 상품 데이터</span>가 없습니다.<br/>
                    견적 작업 및 파서 연동을 위해 전체 상품 DB를 세팅해주세요.
                </p>
                
                <div className="flex gap-6 w-full max-w-3xl z-10">
                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-emerald-50 hover:border-emerald-200 cursor-pointer relative overflow-hidden">
                        <label className="absolute inset-0 w-full h-full cursor-pointer z-20"><input type="file" className="hidden" onChange={(e) => onUpload(e, 'master')} multiple accept=".xlsx, .xls, .csv" /></label>
                        <div className="text-4xl text-emerald-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-file-excel"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-emerald-800 transition-colors">1. 마스터 엑셀 직접 업로드</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-emerald-600 transition-colors">ERP의 전체 상품 마스터 파일을 업로드합니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-indigo-50 hover:border-indigo-200 cursor-pointer relative overflow-hidden" onClick={() => onCloudSync('download')}>
                        <div className="text-4xl text-indigo-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-cloud-download-alt"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-indigo-800 transition-colors">2. 클라우드에서 데이터 수신</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-indigo-600 transition-colors">구글 시트에 백업된 마스터를 수동으로 가져옵니다.</p>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // ⚙️ 7. 메인 애플리케이션 (Main Entry)
        // ==========================================
        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            // 마스터에서 사용 가능한 고유 카탈로그(소싱폴더) 목록 추출
            const availableTags = useMemo(() => {
                const tags = new Set();
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['소싱폴더'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) tags.add(trimmed);
                    });
                });
                return Array.from(tags).sort();
            }, [data.masterProducts]);

            // 필터링된 행 계산 로직
            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                if (isEstimateUploaded) baseList = Object.values(data.managedItems);
                else baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });

                // 카탈로그 필터 (오직 '소싱폴더' 속성만 검사)
                if (ui.selectedTag) {
                    baseList = baseList.filter(item => {
                        const mItem = data.masterProducts[item.코드] || {};
                        const tagStr = mItem['소싱폴더'] || '';
                        return tagStr.split(',').map(t => t.trim()).includes(ui.selectedTag);
                    });
                }

                // 검색어 필터
                if (ui.globalSearch) {
                    const cleanKeyword = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const sourceItem = item.sources?.['estimate'] || {};
                            const finalItem = item.finalData || {};
                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (sourceItem[key] !== undefined ? sourceItem[key] : (mItem[key] || ''))).toLowerCase();
                            const cName = getVal('품목명'); const cSpec = getVal('규격');
                            const cCode = String(item.코드 || '').toLowerCase();
                            const cFull = `${cCode} ${cName} ${cSpec}`;
                            let score = 0;
                            tokens.forEach(token => {
                                if (cName.includes(token)) score += 10;
                                else if (cSpec.includes(token)) score += 5;
                                else if (cCode.includes(token)) score += 8;
                            });
                            return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0);
                        baseList.sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else {
                    baseList.sort((a, b) => String(a.코드).localeCompare(String(b.코드)));
                }
                return baseList;
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, ui.selectedTag]);

            const customActions = useMerchActions(config, data, ui, fullDisplayRows);
            const appState = {
                isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, selectedTag: ui.selectedTag, isProcessing: ui.isProcessing, processMsg: ui.processMsg,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, fullDisplayRows
            };
            
            const appActions = {
                setShowBriefingModal: ui.setShowBriefingModal, setShowExportModal: ui.setShowExportModal,
                setSelectedRows: ui.setSelectedRows, setGlobalSearch: ui.setGlobalSearch, setSelectedTag: ui.setSelectedTag, setShowHistoryModal: ui.setShowHistoryModal, showToast: ui.showToast,
                renderUploadEditableCell: (row, idx, field, keyPrefix) => {
                    const linkedMasterField = config.masterLinks['estimate']?.[field];
                    const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                    const val = row.finalData?.[field] !== undefined ? row.finalData[field] : (row.sources?.['estimate']?.[field] || '');
                    const mVal = linkedMasterField && row.코드 ? data.masterProducts[row.코드]?.[linkedMasterField] : undefined;
                    const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNumeric;

                    const handleChange = (e) => {
                        const v = e.target.value;
                        data.setManagedItems(prev => {
                            const code = row.코드; let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                            currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: v } };
                            if (['입고가', '출고가', '외주비', '노무비'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                                const pInRaw = (field === '입고가' || linkedMasterField === '입고가') ? v : (currentItem.finalData['입고가'] ?? currentItem.sources['estimate']?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                                currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, true);
                            }
                            return { ...prev, [code]: currentItem };
                        });
                    };
                    return (
                        <td key={keyPrefix} className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                            <input type="text" className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''}`} value={val === "오류" ? "" : val} placeholder={mVal || ''} onChange={handleChange} onClick={(e) => e.target.select()} />
                        </td>
                    );
                },
                ...customActions
            };

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
                        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
                    `}</style>
                    
                    {ui.alertMsg && (
                        <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i>
                            <span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span>
                            <button onClick={() => ui.setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>
                    )}
                    {ui.toastMsg && (
                        <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-5">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center mb-0.5">
                                                    <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v9.3</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">MAIN WORKSPACE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} estimateCount={Object.keys(data.managedItems).length} selectedTag={ui.selectedTag} />
                                        
                                        <nav className="flex gap-2 text-[14px] shrink-0 items-center">
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" target="_blank" rel="noopener noreferrer" className={`h-9 px-3 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">
                                                GUIDE
                                            </a>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt"></i></button>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => ui.setShowSettings(true)} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정"><i className="fas fa-cogs opacity-80"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar state={appState} actions={appActions} availableTags={availableTags} />
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {isMasterEmpty ? (
                                <WelcomeGuide onUpload={(e) => customActions.handleFileUpload(e, 'master')} onCloudSync={customActions.handleCloudSync} />
                            ) : (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>
                    {ui.showSettings && <MappingCenterModal onClose={() => ui.setShowSettings(false)} config={config} actions={{handleCloudSync: customActions.handleCloudSync, cleanUpGarbageTags: customActions.cleanUpGarbageTags, showToast: ui.showToast}} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
