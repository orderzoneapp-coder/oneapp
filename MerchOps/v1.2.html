<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Main Workspace [v1.2]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티
        // ==========================================
        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류',
                '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        // 💡 [수정] 구매처, 거래처명 열 너비를 100px에서 150px(1.5배)로 넓게 확장
        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return '';
        };

        const isValidSubItemCode = (code) => {
            if (!code) return false;
            const s = String(code).trim();
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 로직 (단가 계산 및 파서)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            // 입고가가 없거나 0원이면, 원가 합산 및 마진 계산을 무시하고 0원으로 즉각 처리합니다.
            if (!baseInPrice || baseInPrice <= 0) {
                return {
                    ...currentFinalData,
                    '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0
                };
            }

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') {
                // 💡 [수정/3순위] Infinity 에러 방어: 나누기 시 마진율 최대 99.99% 로 제한
                const safeRate = Math.min(appliedRule.rate, 99.99);
                calcOutPrice = totalCost / (1 - (safeRate / 100));
            } else {
                calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            }
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            
            // 💡 [수정/3순위] NaN 결측치 에러 방어: 숫자가 꼬였을 경우 안전하게 0원 처리
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData?.['출고가']);
            const mIn = parseNum(mItem?.['입고가']);
            const mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) {
                newFinalData['출고가'] = providedOutPrice;
            } else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) {
                newFinalData['출고가'] = mOut;
            } else {
                newFinalData['출고가'] = calcOutPrice;
            }

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']);
            const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let calc1Out = Math.round((newFinalData['출고가'] / div1) + extraCost);
                if (!isFinite(calc1Out) || isNaN(calc1Out)) calc1Out = 0;
                newFinalData['1출고'] = Math.round(calc1Out / 10) * 10; 
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.some(kw => cleanH.includes(kw));
                });
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return resolve([]);

                        let headerRowIdx = 0;
                        const maxSearch = Math.min(15, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('1코드')) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) {
                                    obj[h] = row[idx];
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false;
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        resolve(parsedData);
                    } catch(err) {
                        reject(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // ==========================================
        // 🧩 3. 커스텀 훅 (State Architecture)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || 'https://script.google.com/macros/s/AKfycbz7qZ5eM-U_qyaoP5amDfMqhZ-IXMjoBDWGu3qWI1D0JTYGINB64yYaLRLrkqWpHa88-w/exec');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) return getInitialVisibleMasterCols();
                if (parsed.estimate.includes('카테고리')) {
                    parsed.estimate = parsed.estimate.map(h => h === '카테고리' ? '견적서' : h);
                }
                return parsed;
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) parsed = getInitialVisibleUploadCols();
                if (parsed.estimate.includes('카테고리')) {
                    parsed.estimate = parsed.estimate.map(h => h === '카테고리' ? '견적서' : h);
                }
                if (!parsed.estimate.includes('품목명')) parsed.estimate.unshift('품목명');
                if (!parsed.estimate.includes('규격')) parsed.estimate.splice(1, 0, '규격');
                return parsed;
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.master) parsed = getInitialMappings();
                if (!parsed.estimate['창고']) parsed.estimate['창고'] = '창고, 창고코드';
                if (!parsed.master['창고']) parsed.master['창고'] = '창고, 창고코드';
                if (parsed.estimate['카테고리'] !== undefined) {
                    parsed.estimate['견적서'] = parsed.estimate['카테고리'] + ', 견적서';
                    delete parsed.estimate['카테고리'];
                }
                return parsed; 
            });
            
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) parsed = getInitialMasterLinks();
                if (parsed.estimate['창고'] === undefined) parsed.estimate['창고'] = '창고';
                if (parsed.estimate['카테고리'] !== undefined) {
                    parsed.estimate['견적서'] = '견적서';
                    delete parsed.estimate['카테고리'];
                }
                return parsed;
            });

            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                const defaultRules = [
                    { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
                ];
                if (s) {
                    try {
                        const parsed = JSON.parse(s);
                        if (parsed && parsed.length > 1) {
                            return parsed.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' }));
                        }
                    } catch(e) {}
                }
                return defaultRules;
            });

            useEffect(() => {
                localStorage.setItem('merchCloudUrl_v870', cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules]);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);

            useEffect(() => {
                getIDB('merchMaster_v870').then(data => {
                    if (data) setMasterProducts(data);
                }).catch(console.error);

                try { 
                    const logs = JSON.parse(localStorage.getItem('merchHistory_v870'));
                    if (logs) setHistoryLogs(logs);
                } catch(e) {}
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        getIDB('merchMaster_v870').then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    await setIDB('merchMaster_v870', data);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                } 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const combined = [...newLogs, ...prev].slice(0, 2000); 
                    localStorage.setItem('merchHistory_v870', JSON.stringify(combined));
                    return combined;
                });
            }, []);

            return { masterProducts, setMasterProducts: saveMasterToLocal, managedItems, setManagedItems, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            const [selectedCatalog, setSelectedCatalog] = useState(() => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    return params.get('catalog') || '';
                } catch(e) { return ''; }
            });

        // 💡 [수정] 좌우 화살표 이동 지원 및 엔터 시 '입고가'로 점프 + 즉시 입력(Select) 기능 보강
        const EditableCell = React.memo(({ rowCode, initialVal, field, linkedMasterField, mVal, onUpdateCell }) => {
            const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
            const [localVal, setLocalVal] = useState(initialVal);
            const [isFocused, setIsFocused] = useState(false);

            // 포커스 중이 아닐 때만 외부 값 동기화 (타이핑 중 데이터 증발 완벽 방지)
            useEffect(() => {
                if (!isFocused) setLocalVal(initialVal);
            }, [initialVal, isFocused]);

            const isDiff = linkedMasterField && mVal !== undefined && localVal !== '' && String(mVal) !== String(localVal) && isNumeric;

            const commitChange = (v) => {
                if (String(v) === String(initialVal)) return; // 변경사항 없으면 렌더링 무시
                onUpdateCell(rowCode, field, linkedMasterField, v);
            };

            const handleKeyDown = (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    // 좌우 방향키 이동 시, 사용자가 글자를 타이핑/수정 중일 때는 엑셀처럼 커서 이동을 우선 처리
                    if (e.key === 'ArrowLeft' && e.target.selectionStart !== 0) return;
                    if (e.key === 'ArrowRight' && e.target.selectionEnd !== e.target.value.length) return;

                    if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) {
                        e.preventDefault(); // 폼 제출 및 화면 스크롤 방지
                    }
                    
                    e.target.blur(); // 이동 전 현재 셀 값 자동 저장 (Commit)
                    
                    const td = e.target.closest('td');
                    const tr = td.closest('tr');
                    const tbody = tr.closest('tbody');
                    
                    // 현재 행의 모든 텍스트 입력 셀을 찾음
                    const tds = Array.from(tr.querySelectorAll('td:has(input[type="text"])'));
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.querySelectorAll('tr.group'));
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx;
                    let nextColIdx = colIdx;

                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);
                    if (e.key === 'ArrowLeft') { e.preventDefault(); nextColIdx = Math.max(0, colIdx - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault(); nextColIdx = Math.min(tds.length - 1, colIdx + 1); }

                    if (nextRowIdx !== rowIdx || nextColIdx !== colIdx) {
                        const nextTr = trs[nextRowIdx];
                        if (nextTr) {
                            let nextInput;
                            if (e.key === 'Enter') {
                                // 💡 [핵심] 엔터키를 누르면 무조건 다음 줄의 '입고가' 필드를 찾아서 이동
                                nextInput = nextTr.querySelector('input[data-field="입고가"]') || nextTr.querySelector('td:has(input[type="text"]) input');
                            } else {
                                // 상하좌우 방향키는 그대로 같은 열(Column)로 이동
                                const nextTds = Array.from(nextTr.querySelectorAll('td:has(input[type="text"])'));
                                nextInput = nextTds[nextColIdx]?.querySelector('input');
                            }

                            if (nextInput) {
                                nextInput.focus();
                                // 💡 [핵심] 리액트 렌더링 사이클에서 씹히지 않게 확실히 전체 블록 지정(Select)
                                setTimeout(() => nextInput.select(), 0);
                            }
                        }
                    }
                }
            };

            return (
                <td className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                    <input 
                        type="text" 
                        data-field={field} // 💡 입고가 셀을 콕 집어 찾기 위한 식별자 추가
                        className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''}`} 
                        value={localVal === "오류" ? "" : localVal} 
                        placeholder={mVal || ''} 
                        onChange={(e) => setLocalVal(e.target.value)} 
                        onFocus={(e) => { setIsFocused(true); setTimeout(() => e.target.select(), 0); }} // 클릭 시에도 확실히 전체 선택
                        onBlur={(e) => { setIsFocused(false); commitChange(e.target.value); }}
                        onKeyDown={handleKeyDown}
                        onClick={(e) => e.target.select()} 
                    />
                </td>
            );
        });

                                <div className="w-px h-6 bg-slate-300 mx-1"></div>

                            <i className="fas fa-redo-alt text-[13px]"></i>

                    </div>

        const MemoizedTableRow = React.memo(({ row, idx, isSel, bg, mItem, isEstimateUploaded, visMasterCols, visUploadCols, masterLinksEst, onToggleSelection, onUpdateCell }) => {
            const uploadName = row.finalData?.['품목명'] !== undefined ? row.finalData['품목명'] : (row.sources?.['estimate']?.['품목명'] || '');
            const uploadSpec = row.finalData?.['규격'] !== undefined ? row.finalData['규격'] : (row.sources?.['estimate']?.['규격'] || '');

        // 💡 [수정/4순위 해결] DOM 과부하를 막는 가상화(Windowing) 무한 스크롤 엔진 적용
        const ExcelDataGrid = ({ state, actions }) => {
            const { isEstimateUploaded, selectedRows, fullDisplayRows, visibleMasterCols, visibleUploadCols, masterProducts, config, data } = state;
            const { setSelectedRows } = actions;
            
            const [scrollTop, setScrollTop] = useState(0);

            const handleScroll = useCallback((e) => {
                setScrollTop(e.target.scrollTop);
            }, []);

            // 💡 [수정/2순위 연계] 하위 컴포넌트의 렌더링을 유발하지 않도록 안정적인 콜백 함수로 분리
            const handleUpdateCell = useCallback((code, field, linkedMasterField, value) => {
                data.setManagedItems(prev => {
                    let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: value } };
                    
                    if (['입고가', '출고가', '외주비', '노무비'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        const pInRaw = (field === '입고가' || linkedMasterField === '입고가') ? value : (currentItem.finalData['입고가'] ?? currentItem.sources['estimate']?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                        currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, true);
                    }
                    return { ...prev, [code]: currentItem };
                });
            }, [data.setManagedItems, data.masterProducts, config.marginRules]);

            const toggleRowSelection = useCallback((code) => {
                setSelectedRows(prev => {
                    const next = new Set(prev);
                    if (next.has(code)) next.delete(code); else next.add(code);
                    return next;
                });
            }, [setSelectedRows]);

            const ROW_HEIGHT = 40; // 픽셀 (CSS h-[40px] 기반)
            const BUFFER_SIZE = 15; // 위아래 여유 버퍼
            const VIEWPORT_HEIGHT = 800; // 뷰포트 추정치

            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_SIZE);
            const endIndex = Math.min(fullDisplayRows.length, Math.floor((scrollTop + VIEWPORT_HEIGHT) / ROW_HEIGHT) + BUFFER_SIZE);

            const displayRows = fullDisplayRows.slice(startIndex, endIndex);
            const topPadding = startIndex * ROW_HEIGHT;
            const bottomPadding = Math.max(0, (fullDisplayRows.length - endIndex) * ROW_HEIGHT);

            const requiredCoreFields = ['품목코드', '품목명', '규격'];

            // 하위 행 컴포넌트가 불필요하게 렌더링되지 않도록 배열 참조값을 메모이제이션
            const visMasterCols = useMemo(() => (visibleMasterCols['estimate'] || []).filter(h => !requiredCoreFields.includes(h)), [visibleMasterCols]);
            const visUploadCols = useMemo(() => (visibleUploadCols['estimate'] || []).filter(h => h !== '품목코드'), [visibleUploadCols]);
            const masterLinksEst = useMemo(() => config.masterLinks['estimate'] || {}, [config.masterLinks]);

            return (
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col relative overflow-hidden">
                    <div className="flex-1 overflow-auto custom-scrollbar relative" onScroll={handleScroll}>
                        <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                            <thead className="text-[12px] font-extrabold">
                                <tr className="h-[40px]">
                                    <th className="sticky top-0 z-40 bg-[#f5f4f0] px-3 py-2 border-b border-r border-[#e8e4db] shadow-sm text-[#5c554d] min-w-[280px] w-[280px] max-w-[280px]" style={{left: 0}}>
                                        <div className="flex items-center gap-2 pl-1">
                                            {isEstimateUploaded && (
                                                <input type="checkbox" className={`rounded w-4 h-4 border-slate-300 cursor-pointer shrink-0 text-indigo-600 focus:ring-indigo-500`} checked={selectedRows.size === fullDisplayRows.length && displayRows.length > 0} onChange={actions.toggleAllRows} />
                                            )}
                                            <span className="truncate">상품정보 (코드/품명/규격)</span>
                                            {isEstimateUploaded && <span className="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[10px] font-black shrink-0">작업모드</span>}
                                        </div>
                                    </th>

                                    {!isEstimateUploaded ? (
                                        visMasterCols.map(h => (
                                            <th key={`idle-th-${h}`} className={`sticky top-0 z-30 bg-[#f8fafc] px-2 py-3 border-r border-b border-slate-200 text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                        ))
                                    ) : (
                                        <>
                                            {visMasterCols.map(h => (
                                                <th key={`pm-${h}`} className={`sticky top-0 z-30 bg-[#eff6ff] px-2 py-3 border-r border-b border-blue-100 text-center text-blue-800 ${getCellWidthClass(h)}`}>
                                                    <div className="text-[9px] mb-0.5">마스터 대조</div>[M] {h}
                                                </th>
                                            ))}
                                            {visUploadCols.map(h => (
                                                <th key={`pu-e-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-3 border-r border-b border-slate-200 text-center text-slate-600 ${getCellWidthClass(h)}`}>{h}</th>
                                            ))}
                                        </>

                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-slate-700">
                                {fullDisplayRows.length === 0 ? <tr><td colSpan="50" className="p-16 text-center text-slate-400 bg-white"><i className="fas fa-folder-open text-4xl mb-4 block"></i>{isEstimateUploaded ? "작업 버퍼에 일치하는 항목이 없습니다." : "조건에 일치하는 상품이 없거나, 데이터가 비어있습니다."}</td></tr> : (
                                    <>
                                        {/* 가상화 상단 패딩 */}
                                        {topPadding > 0 && <tr style={{ height: `${topPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                        
                                        {displayRows.map((row, idx) => {
                                            const isSel = selectedRows.has(row.코드); 
                                            const bg = isSel ? 'bg-indigo-50/50' : (isEstimateUploaded ? 'bg-white hover:bg-slate-50' : 'bg-[#faf9f5] hover:bg-[#f0ece1]');
                                            const mItem = masterProducts[row.코드] || {}; 
                                            return <MemoizedTableRow 
                                                key={row.코드} 
                                                row={row} 
                                                idx={idx} 
                                                isSel={isSel} 
                                                bg={bg} 
                                                mItem={mItem} 
                                                isEstimateUploaded={isEstimateUploaded}
                                                visMasterCols={visMasterCols}
                                                visUploadCols={visUploadCols}
                                                masterLinksEst={masterLinksEst}
                                                onToggleSelection={toggleRowSelection}
                                                onUpdateCell={handleUpdateCell}
                                            />;
                                        })}
                                        
                                        {/* 가상화 하단 패딩 */}
                                        {bottomPadding > 0 && <tr style={{ height: `${bottomPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const WelcomeGuide = ({ onUpload, onCloudSync }) => (
            <div className="h-full w-full flex flex-col items-center justify-center bg-white rounded-xl border border-slate-200 shadow-sm p-10 fade-in relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500"></div>
                <div className="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 text-5xl mb-6 shadow-inner relative">
                    <i className="fas fa-box-open"></i>
                    <div className="absolute -bottom-2 -right-2 w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white text-[14px] border-2 border-white shadow-sm"><i className="fas fa-check"></i></div>
                </div>
                <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">MerchOps 메인 워크스페이스 [v1.2]</h2>
                <p className="text-[14px] text-slate-500 mb-10 text-center leading-relaxed font-bold">
                    현재 등록된 <span className="text-indigo-500">마스터 상품 데이터</span>가 없습니다.<br/>
                    견적 작업 및 파서 연동을 위해 전체 상품 DB를 세팅해주세요.
                </p>
                
                <div className="flex gap-6 w-full max-w-3xl z-10">
                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-emerald-50 hover:border-emerald-200 cursor-pointer relative overflow-hidden">
                        <label className="absolute inset-0 w-full h-full cursor-pointer z-20"><input type="file" className="hidden" onChange={(e) => onUpload(e, 'master')} multiple accept=".xlsx, .xls, .csv" /></label>
                        <div className="text-4xl text-emerald-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-file-excel"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-emerald-800 transition-colors">1. 마스터 엑셀 직접 업로드</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-emerald-600 transition-colors">ERP의 전체 상품 마스터 파일을 업로드합니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-indigo-50 hover:border-indigo-200 cursor-pointer relative overflow-hidden" onClick={() => onCloudSync('download')}>
                        <div className="text-4xl text-indigo-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-cloud-download-alt"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-indigo-800 transition-colors">2. 클라우드에서 데이터 수신</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-indigo-600 transition-colors">구글 시트에 백업된 마스터를 수동으로 가져옵니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-purple-50 hover:border-purple-200 cursor-pointer relative overflow-hidden" onClick={() => {
                        try {
                            if(window.location.href.startsWith('blob:')) { showToast('⚠️ 미리보기 환경에서는 우측 탭을 눌러 이동하세요.'); }
                            else { window.location.href = 'https://oneapp.orderz.co.kr/MerchOps/vp1.2'; }
                        } catch(e) { showToast('⚠️ 미리보기 환경에서는 우측 탭을 눌러 이동하세요.'); }
                    }}>
                        <div className="text-4xl text-purple-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-magic"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-purple-800 transition-colors">3. 스마트 파서로 이동</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-purple-600 transition-colors">텍스트 기반의 카탈로그 델타 동기화 전용 뷰로 이동합니다.</p>
                    </div>
                </div>
            </div>
        );

        const ReviewModal = ({ onClose, onConfirm, state, data }) => {
            const [filter, setFilter] = useState('all'); // 'all', 'up', 'down', 'new', 'same'

            const targetRows = useMemo(() => {
                if (state.selectedRows.size > 0) {
                    return state.fullDisplayRows.filter(row => state.selectedRows.has(row.코드));
                }
                return state.fullDisplayRows;
            }, [state.fullDisplayRows, state.selectedRows]);

            const analysis = useMemo(() => {
                let up = 0, down = 0, same = 0, newItems = 0;
                const list = [];

                targetRows.forEach(row => {
                    const mItem = data.masterProducts[row.코드];
                    const oldP = mItem ? parseNum(mItem['입고가']) : 0;
                    const newP = parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : row.sources?.['estimate']?.['입고가']);
                    
                    let status = 'same';
                    if (!mItem) { status = 'new'; newItems++; }
                    else if (oldP === 0 || newP === 0) { status = 'same'; same++; }
                    else if (newP > oldP) { status = 'up'; up++; }
                    else if (newP < oldP) { status = 'down'; down++; }
                    else { status = 'same'; same++; }

                    list.push({
                        코드: row.코드,
                        품명: row.finalData?.['품목명'] || row.sources?.['estimate']?.['품목명'] || mItem?.품목명 || '',
                        규격: row.finalData?.['규격'] || row.sources?.['estimate']?.['규격'] || mItem?.규격 || '',
                        기존단가: oldP,
                        새단가: newP,

                        상태: status
                    });
                });

                // 변동폭이 큰 순서대로 정렬 (인상/인하 섞어서 절댓값 기준)
                list.sort((a, b) => Math.abs(b.차액) - Math.abs(a.차액));

                return { up, down, same, newItems, total: targetRows.length, list };
            }, [targetRows, data.masterProducts]);

            const filteredList = useMemo(() => {
                if (filter === 'all') return analysis.list;
                return analysis.list.filter(item => item.상태 === filter);
            }, [analysis.list, filter]);

            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[850px] max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">

                                    <div className={`text-[11px] font-bold mb-1 ${filter === 'new' ? 'text-emerald-100' : 'text-emerald-500'}`}><i className="fas fa-star mr-1"></i>신규</div>
                                    <div className={`font-black text-xl ${filter === 'new' ? 'text-white' : 'text-emerald-700'}`}>{analysis.newItems}<span className="text-[11px] ml-1 font-bold">건</span></div>

                                <div onClick={() => setFilter('same')} className={`cursor-pointer border p-3 rounded-xl flex flex-col items-center justify-center shadow-sm transition-all hover:-translate-y-0.5 ${filter === 'same' ? 'bg-slate-500 border-slate-500 text-white' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>

                                    <div className={`font-black text-xl ${filter === 'same' ? 'text-white' : 'text-slate-700'}`}>{analysis.same}<span className="text-[11px] ml-1 font-bold">건</span></div>

                            <div className="flex gap-2">

                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white"></i></button>

                        <div className="p-6 flex flex-col gap-4">

                                <div className="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xl mr-4 group-hover:scale-110 transition-transform"><i className="fas fa-file-excel"></i></div>
                                <div>
                                    <div className="font-black text-slate-800 text-[14px]">통합 엑셀 다운로드 (ERP & 쇼핑몰)</div>
                                    <div className="text-slate-500 text-[11px] mt-1">ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드합니다.</div>
                                </div>
                            </button>
                            <button onClick={onClose} className="w-full mt-2 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">취소</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 7. 메인 애플리케이션 (Main Entry)
        // ==========================================
        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;
            const showActionButtons = isEstimateUploaded || ui.selectedCatalog !== '' || ui.selectedCategory !== '';

            // 💡 [NEW] 글로벌 단축키 (F3 검색창 점프, F9 엑셀 출력)
            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F9') { 
                        e.preventDefault(); 
                        ui.setShowExportModal(true); 
                    }
                    if (e.key === 'F3') { 
                        e.preventDefault(); 
                        const searchInput = document.getElementById('main-search-input');
                        if (searchInput) {
                            searchInput.focus();
                            searchInput.select();
                        }
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown); 
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [ui]);

            // 마스터에서 사용 가능한 고유 카탈로그 목록 추출
            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                
                if (isEstimateUploaded) {
                    baseList = Object.values(data.managedItems); 
                } else {
                    baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });

                    if (ui.selectedCatalog) {
                        baseList = baseList.filter(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const tagStr = mItem['카탈로그'] || '';
                            return tagStr.split(',').map(t => t.trim()).includes(ui.selectedCatalog);
                        });
                    }

                    if (ui.selectedCategory) {
                        baseList = baseList.filter(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const tagStr = mItem['견적서'] || mItem['카테고리'] || '';
                            return tagStr.split(',').map(t => t.trim()).includes(ui.selectedCategory);
                        });
                    }
                }

                if (ui.globalSearch) {
                    const cleanKeyword = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const sourceItem = item.sources?.['estimate'] || {};
                            const finalItem = item.finalData || {};
                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (sourceItem[key] !== undefined ? sourceItem[key] : (mItem[key] || ''))).toLowerCase();
                            
                            const cName = getVal('품목명'); 
                            const cSpec = getVal('규격');
                            const cVendor = getVal('구매처'); 
                            const cWh = getVal('창고');
                            const cCode = String(item.코드 || '').toLowerCase();
                            
                            let score = 0;
                            tokens.forEach(token => {
                                if (cName.includes(token)) score += 10;
                                else if (cCode.includes(token)) score += 8;
                                else if (cVendor.includes(token)) score += 6;
                                else if (cSpec.includes(token)) score += 5;
                                else if (cWh.includes(token)) score += 4;
                            });
                            return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0);
                        baseList.sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else {
                    baseList.sort((a, b) => String(a.코드).localeCompare(String(b.코드)));
                }
                return baseList;
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, ui.selectedCatalog, ui.selectedCategory]);

            const customActions = useMerchActions(config, data, ui, fullDisplayRows);
            
            const appState = {
                config, data,
                isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, selectedCatalog: ui.selectedCatalog, selectedCategory: ui.selectedCategory, isProcessing: ui.isProcessing, processMsg: ui.processMsg,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, fullDisplayRows
            };
            
            const appActions = {
                setShowReviewModal: ui.setShowReviewModal, setShowExportModal: ui.setShowExportModal, setShowCategoryModal: ui.setShowCategoryModal,
                setSelectedRows: ui.setSelectedRows, setGlobalSearch: ui.setGlobalSearch, setSelectedCatalog: ui.setSelectedCatalog, setShowHistoryModal: ui.setShowHistoryModal, showToast: ui.showToast,

                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
                        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
                    `}</style>
                    
                    {/* 💡 [NEW] 엑셀 다운로드 중 시스템 중복 조작을 막는 로딩막 */}
                    {ui.isExporting && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[9999] flex flex-col justify-center items-center backdrop-blur-sm fade-in">
                            <i className="fas fa-circle-notch fa-spin text-6xl text-indigo-500 mb-6"></i>

                        </div>

                    {ui.alertMsg && (

                            <span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span>

                        </div>
                    )}
                    {ui.toastMsg && (

                            <i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-4">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center mb-0.5">
                                                    <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v1.2</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">MAIN WORKSPACE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} estimateCount={Object.keys(data.managedItems).length} selectedCatalog={ui.selectedCatalog} selectedCategory={ui.selectedCategory} />
                                        
                                        <nav className="flex gap-1.5 text-[14px] shrink-0 items-center">
                                            {showActionButtons && (
                                                <>
                                                    <button onClick={() => ui.setShowExportModal(true)} className="h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-amber-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-amber-200 hover:border-amber-500/50 font-bold text-[11px]" title="ERP/쇼핑몰 양식 출력">
                                                        <i className="fas fa-file-export mr-1.5 text-[12px]"></i> 보고서
                                                    </button>
                                                    <div className="w-px h-4 bg-slate-700 mx-0.5"></div>

                                            {/* 💡 [수정] target="_blank" 속성을 제거하여 새 탭이 아닌 현재 화면에서 부드럽게 전환 */}
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">
                                                GUIDE
                                            </a>
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/trend_report" className={`h-8 px-2.5 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-blue-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-blue-300 hover:border-blue-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="트렌드 리포트">
                                                REPORT
                                            </a>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt text-[13px]"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-300 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt text-[13px]"></i></button>
                                            <div className="w-px h-4 bg-slate-700 mx-0.5"></div>
                                            <button onClick={() => ui.setShowSettings(true)} className={`w-8 h-8 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정"><i className="fas fa-cogs opacity-80 text-[13px]"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar state={appState} actions={appActions} availableCatalogs={availableCatalogs} availableCategories={availableCategories} />
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {isMasterEmpty ? (
                                <WelcomeGuide onUpload={(e) => customActions.handleFileUpload(e, 'master')} onCloudSync={customActions.handleCloudSync} />
                            ) : (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>
                    {ui.showCategoryModal && <CategorySaveModal onClose={() => ui.setShowCategoryModal(false)} onSave={customActions.handleSaveAsCategory} />}
                    {ui.showSettings && <MappingCenterModal onClose={() => ui.setShowSettings(false)} config={config} actions={{...customActions, showToast: ui.showToast}} availableCatalogs={availableCatalogs} availableCategories={availableCategories} />}
                    
                    {ui.showReviewModal && <ReviewModal onClose={() => ui.setShowReviewModal(false)} onConfirm={customActions.handleCommitEstimate} state={appState} data={data} />}
                    
                    {ui.showExportModal && <ExportModal onClose={() => ui.setShowExportModal(false)} executeExport={customActions.executeExport} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
