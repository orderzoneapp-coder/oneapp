    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 [NEW] 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티 (Pure Functions)
        // ==========================================
        const MASTER_HEADERS = [
            "창고", "소싱태그", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['소싱태그', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '소싱태그', '구매처', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '소싱태그': '소싱태그, 태그, 분류', '품목코드': '품목코드', '품목명': '품목명, 상품명, 품명', '규격': '규격', '출고가': '출고가, 출고' };
            base.estimate = { 
                '창고': '창고, 창고코드', '소싱태그': '소싱태그, 태그', '품목코드': '품목코드, 상품코드', '품목명': '품목명, 상품명, 품명', '규격': '규격명, 규격', '구매처': '거래처명, 구매처', 
                '입고가': '입고가, 입고', '출고가': '출고가, 출고',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '소싱태그': '소싱태그', '구매처': '구매처', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const EXPORT_OPTIONS = {
            estimate: [
                { id: 'est_integrated_excel', type: 'excel', title: '1. 통합 엑셀 다운로드 (ERP & 쇼핑몰)', desc: 'ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드', icon: 'fa-file-excel', theme: { border: 'hover:border-blue-400', bg: 'hover:bg-blue-50', text: 'text-blue-500' } },
                { id: 'est_notice', type: 'copy', title: '2. 도매몰 단가 공지용 (카톡복사)', desc: '클릭 시 텍스트가 자동 복사됩니다.', icon: 'fa-copy', theme: { border: 'hover:border-amber-400', bg: 'hover:bg-amber-50', text: 'text-amber-500' } }
            ]
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '소싱태그') return 'min-w-[120px] w-[120px] max-w-[120px]';
            if (h === '품목명' || h === '상품명') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return '';
        };

        const isValidSubItemCode = (code) => {
            if (!code) return false;
            const s = String(code).trim();
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 로직 엔진 (Engines)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem, currentFinalData, marginRules, forceRecalc = false) => {
            const outsrc = parseNum(currentFinalData['외주비'] ?? mItem['외주비']);
            const labor = parseNum(currentFinalData['노무비'] ?? mItem['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData['창고'] ?? mItem['창고'] ?? '').trim();
            const unitStr = String(currentFinalData['단위'] ?? mItem['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null; let bestScore = -1;
            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') calcOutPrice = totalCost / (1 - (appliedRule.rate / 100));
            else calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData['출고가']);
            const mIn = parseNum(mItem['입고가']);
            const mOut = parseNum(mItem['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData['1종연산'] ?? mItem['1종연산']);
            const extraCost = parseNum(currentFinalData['경비'] ?? mItem['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                newFinalData['1출고'] = Math.round((Math.round((newFinalData['출고가'] / div1) + extraCost)) / 10) * 10; 
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.some(kw => cleanH.includes(kw));
                });
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return resolve([]);

                        let headerRowIdx = 0;
                        const maxSearch = Math.min(15, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('1코드')) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) {
                                    obj[h] = row[idx];
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false;
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        resolve(parsedData);
                    } catch(err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // ==========================================
        // 🧩 3. 커스텀 훅 (State Architecture)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || '');
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                return (!parsed || !parsed.estimate) ? getInitialVisibleMasterCols() : parsed;
            });
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                return (!parsed || !parsed.estimate) ? getInitialVisibleUploadCols() : parsed;
            });
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.master) parsed = getInitialMappings();
                if (!parsed.estimate['창고']) parsed.estimate['창고'] = '창고, 창고코드';
                if (!parsed.master['창고']) parsed.master['창고'] = '창고, 창고코드';
                if (!parsed.estimate['출고가']) parsed.estimate['출고가'] = '출고가, 출고';
                if (!parsed.master['출고가']) parsed.master['출고가'] = '출고가, 출고';
                return parsed; 
            });
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) parsed = getInitialMasterLinks();
                if (parsed.estimate['창고'] === undefined) parsed.estimate['창고'] = '창고';
                if (parsed.estimate['출고가'] === undefined) parsed.estimate['출고가'] = '출고가';
                return parsed;
            });
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                if (s) {
                    try {
                        return JSON.parse(s).map(r => ({
                            ...r, whCode: r.whCode !== undefined && r.whCode !== '' ? r.whCode : '*', unit: r.unit !== undefined && r.unit !== '' ? r.unit : '*'
                        }));
                    } catch(e) {}
                }
                return [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }];
            });

            useEffect(() => {
                localStorage.setItem('merchCloudUrl_v870', cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules]);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        const useMerchData = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [historyLogs, setHistoryLogs] = useState(() => { 
                try { return JSON.parse(localStorage.getItem('merchHistory_v870')) || []; } catch(e) { return []; }
            });

            // 💡 IndexedDB에서 마스터 로드 (앱 분리에 따른 동기화)
            useEffect(() => {
                getIDB('merchMaster_v870').then(data => {
                    if (data && Object.keys(data).length > 0) setMasterProducts(data);
                    else {
                        const s = localStorage.getItem('merchMaster_v870') || localStorage.getItem('merchMaster_v860');
                        if(s) {
                            const parsed = JSON.parse(s);
                            setMasterProducts(parsed);
                            setIDB('merchMaster_v870', parsed);
                        }
                    }
                }).catch(console.error);
            }, []);

            // 💡 탭 간 실시간 이벤트 리스너
            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === 'merchMaster_sync_trigger') {
                        getIDB('merchMaster_v870').then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMasterToLocal = useCallback(async (data) => { 
                setMasterProducts(data);
                try { 
                    localStorage.setItem('merchMaster_v870', JSON.stringify(data)); // Fallback
                    await setIDB('merchMaster_v870', data);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                } catch(e) {} 
            }, []);

            const addHistoryLogs = useCallback((newLogs) => {
                setHistoryLogs(prev => {
                    const combined = [...newLogs, ...prev].slice(0, 2000); 
                    localStorage.setItem('merchHistory_v870', JSON.stringify(combined));
                    return combined;
                });
            }, []);

            return { masterProducts, setMasterProducts, managedItems, setManagedItems, saveMasterToLocal, historyLogs, setHistoryLogs, addHistoryLogs };
        };

        const useMerchUI = () => {
            const [activeMainTag, setActiveMainTag] = useState(''); 
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            
            const [showExportModal, setShowExportModal] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [showBriefingModal, setShowBriefingModal] = useState(false);
            const [showHistoryModal, setShowHistoryModal] = useState(false);
            
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                activeMainTag, setActiveMainTag, selectedRows, setSelectedRows, globalSearch, setGlobalSearch,
                showExportModal, setShowExportModal, showSettings, setShowSettings, showBriefingModal, setShowBriefingModal, showHistoryModal, setShowHistoryModal,
                alertMsg, setAlertMsg, toastMsg, setToastMsg, isProcessing, setIsProcessing, processMsg, setProcessMsg, showToast
            };
        };

        // ==========================================
        // 🧩 4. 비즈니스 액션 훅
        // ==========================================
        const useMerchActions = (config, data, ui, fullDisplayRows, activeProfileKey) => {

            const handleCloudSync = async (type) => { 
                if (!config.cloudUrl) return ui.setAlertMsg("클라우드 URL이 설정되지 않았습니다.");
                ui.showToast(`클라우드 ${type === 'upload' ? '백업' : '불러오기'} 시작...`);
                try {
                    if (type === 'upload') {
                        const payload = { type: "save", data: data.masterProducts };
                        const res = await fetch(config.cloudUrl, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error("Network Error"); ui.showToast('✅ 클라우드 저장 성공');
                    } else {
                        const res = await fetch(config.cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        if (result.data) data.saveMasterToLocal(result.data);
                        ui.showToast('✅ 클라우드 데이터 불러오기 성공');
                    }
                } catch (error) { ui.setAlertMsg("통신 오류 발생. URL이나 시트 권한을 확인하세요."); }
            };

            const handleFileUpload = useCallback(async (e, expectedType) => {

                            <input type="file" className="hidden" onChange={(e) => onUpload(e, 'master')} multiple accept=".xlsx, .xls, .csv" />
                        </label>
                        <div className="text-4xl text-emerald-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-file-excel"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-emerald-800 transition-colors">1. 엑셀 수동 업로드</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-emerald-600 transition-colors">ERP 마스터 파일을 선택하여 업로드합니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-indigo-50 hover:border-indigo-200 cursor-pointer relative overflow-hidden" onClick={() => onCloudSync('download')}>
                        <div className="text-4xl text-indigo-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-cloud-download-alt"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-indigo-800 transition-colors">2. 클라우드 동기화</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-indigo-600 transition-colors">구글 시트의 최신 데이터를 간편하게 로드합니다.</p>
                    </div>

                    <div className="flex-1 bg-slate-50 border border-slate-200 p-8 rounded-xl text-center hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 hover:bg-purple-50 hover:border-purple-200 cursor-pointer relative overflow-hidden" onClick={openSmartParser}>
                        <div className="text-4xl text-purple-500 mb-5 group-hover:scale-110 transition-transform duration-300"><i className="fas fa-magic"></i></div>
                        <h3 className="text-[16px] font-black text-slate-800 mb-2 group-hover:text-purple-800 transition-colors">3. 스마트 파서 실행</h3>
                        <p className="text-[12px] text-slate-500 mb-6 group-hover:text-purple-600 transition-colors">새 창에서 텍스트 기반 단가 매핑을 진행합니다.</p>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // ⚙️ 7. 메인 애플리케이션 (Main Entry)
        // ==========================================
        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const activeProfileKey = 'estimate';
            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                if (isEstimateUploaded) baseList = Object.values(data.managedItems);
                else baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });

                if (ui.activeMainTag) {
                    const tagLower = ui.activeMainTag.toLowerCase();
                    baseList = baseList.filter(item => {
                        const mItem = data.masterProducts[item.코드] || {};
                        const tags = String(mItem.소싱태그 || mItem.소싱폴더 || '').toLowerCase();
                        return tags.includes(tagLower);
                    });
                }

                if (ui.globalSearch) {
                    const cleanKeyword = ui.globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);

                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const sourceItem = item.sources?.[activeProfileKey] || {};
                            const finalItem = item.finalData || {};

                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (sourceItem[key] !== undefined ? sourceItem[key] : (mItem[key] || ''))).toLowerCase();

                            const cName = getVal('품목명');
                            const cSpec = getVal('규격');
                            const cBrand = getVal('브랜드');
                            const cWh = getVal('창고');
                            const cVendor = getVal('구매처') || getVal('거래처명') || getVal('거래처');
                            const cTag = getVal('소싱태그') || getVal('소싱폴더');
                            const cCode = String(item.코드 || '').toLowerCase();

                            const cFull = `${cCode} ${cName} ${cSpec} ${cBrand} ${cWh} ${cVendor} ${cTag}`;

                            let score = 0, matchCount = 0;
                            tokens.forEach(token => {
                                if (cName.includes(token)) { score += token.length * 10; matchCount++; }
                                else if (cSpec.includes(token)) { score += token.length * 5; matchCount++; }
                                else if (cVendor.includes(token)) { score += token.length * 4; matchCount++; }
                                else if (cBrand.includes(token)) { score += token.length * 3; matchCount++; }
                                else if (cWh.includes(token)) { score += token.length * 2; matchCount++; }
                                else if (cCode.includes(token)) { score += token.length * 8; matchCount++; }
                                else if (cTag.includes(token)) { score += token.length * 7; matchCount++; }
                                else if (cFull.includes(token)) { score += token.length * 1; matchCount++; } 
                            });

                            if (cFull.replace(/\s+/g, '').includes(cleanKeyword.replace(/\s+/g, ''))) {
                                score += 1000; matchCount += tokens.length; 
                            }
                            return { ...item, _searchScore: score, _matchCount: matchCount };
                        }).filter(r => r._searchScore > 0); 
                        baseList.sort((a, b) => b._searchScore - a._searchScore || b._matchCount - a._matchCount);
                    }
                } else {
                    baseList.sort((a, b) => {
                        const cA = String(a.코드 || ''), cB = String(b.코드 || '');
                        if (cA.substring(0, 6) !== cB.substring(0, 6)) return cA.substring(0, 6).localeCompare(cB.substring(0, 6));
                        return (parseInt(cA.substring(6), 10) || 0) - (parseInt(cB.substring(6), 10) || 0);
                    });
                }
                return baseList;
            }, [isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, activeProfileKey, ui.activeMainTag]);

            const customActions = useMerchActions(config, data, ui, fullDisplayRows, activeProfileKey);

            const appState = {
                isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, activeMainTag: ui.activeMainTag, isProcessing: ui.isProcessing,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, activeProfileKey, fullDisplayRows
            };
            
            const appActions = {
                setShowBriefingModal: ui.setShowBriefingModal, setShowExportModal: ui.setShowExportModal,
                setSelectedRows: ui.setSelectedRows, setActiveMainTag: ui.setActiveMainTag, setGlobalSearch: ui.setGlobalSearch, setShowHistoryModal: ui.setShowHistoryModal,
                handleGlobalSearchChange: (val) => ui.setGlobalSearch(val),
                renderUploadEditableCell: (row, idx, field, activeProfile, keyPrefix, isParserRow = false) => {
                    const linkedMasterField = config.masterLinks[activeProfile]?.[field];
                    const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                    const val = row.finalData?.[field] !== undefined ? row.finalData[field] : (row.sources?.[activeProfile]?.[field] || '');
                    const mVal = linkedMasterField && row.코드 ? data.masterProducts[row.코드]?.[linkedMasterField] : undefined;
                    const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNumeric;

                    const handleCellKeyDown = (e) => {
                        if (['ArrowUp', 'ArrowDown', 'Enter', 'ArrowLeft', 'ArrowRight', 'Tab'].includes(e.key)) {
                            if (e.key === 'ArrowLeft' && e.target.selectionStart > 0) return;
                            if (e.key === 'ArrowRight' && e.target.selectionEnd < e.target.value.length) return;

                            let targetRow = idx; let targetCol = field;
                            const currentInput = e.target;
                            const rowInputs = Array.from(currentInput.closest('tr').querySelectorAll('input[type="text"][data-col]'));
                            const currentColIndex = rowInputs.findIndex(inp => inp.dataset.col === field);

                            if (e.key === 'ArrowUp') targetRow -= 1;
                            else if (e.key === 'ArrowDown') targetRow += 1;
                            else if (e.key === 'Enter') { targetRow += 1; targetCol = '입고가'; e.preventDefault(); }
                            else if (e.key === 'Tab') {
                                e.preventDefault();
                                if (e.shiftKey) { if (currentColIndex > 0) targetCol = rowInputs[currentColIndex - 1].dataset.col; else targetRow -= 1; } 
                                else { if (currentColIndex < rowInputs.length - 1) targetCol = rowInputs[currentColIndex + 1].dataset.col; else targetRow += 1; }
                            } 
                            else if (e.key === 'ArrowLeft') { if (currentColIndex > 0) targetCol = rowInputs[currentColIndex - 1].dataset.col; else targetRow -= 1; } 
                            else if (e.key === 'ArrowRight') { if (currentColIndex < rowInputs.length - 1) targetCol = rowInputs[currentColIndex + 1].dataset.col; else targetRow += 1; }

                            let targetElement = null;
                            if (e.key === 'Enter') {
                                targetElement = document.querySelector(`input[data-row="${targetRow}"][data-col="입고가"]`);
                                if (!targetElement) { 
                                    const nextRowInputs = document.querySelectorAll(`input[data-row="${targetRow}"][data-col]`);
                                    if (nextRowInputs.length > 0) targetElement = nextRowInputs[0];
                                }
                            } else if ((e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) && currentColIndex === 0 && targetRow >= 0) {
                                const prevRowInputs = document.querySelectorAll(`input[data-row="${targetRow}"][data-col]`);
                                if (prevRowInputs.length > 0) targetElement = prevRowInputs[prevRowInputs.length - 1];
                            } else if ((e.key === 'ArrowRight' || (e.key === 'Tab' && !e.shiftKey)) && currentColIndex === rowInputs.length - 1) {
                                const nextRowInputs = document.querySelectorAll(`input[data-row="${targetRow}"][data-col]`);
                                if (nextRowInputs.length > 0) targetElement = nextRowInputs[0];
                            } else if (targetRow !== idx || targetCol !== field) {
                                targetElement = document.querySelector(`input[data-row="${targetRow}"][data-col="${targetCol}"]`);
                            }

                            if (targetElement) { targetElement.focus(); targetElement.select(); }
                        }
                    };

                    const handleChange = (e) => {
                        const v = e.target.value;
                        const isInputTrigger = ['입고가', '외주비', '노무비'].includes(field) || ['입고가', '외주비', '노무비'].includes(linkedMasterField);
                        
                        data.setManagedItems(prev => {
                            const code = row.코드; let currentItem = prev[code];
                            if (!currentItem) { currentItem = { 코드: code, sources: { [activeProfile]: {} }, finalData: { [field]: v } }; } 
                            else { currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: v } }; }
                            
                            if (isInputTrigger || ['출고가'].includes(field) || ['출고가'].includes(linkedMasterField)) {
                                const pInRaw = (isInputTrigger && (field === '입고가' || linkedMasterField === '입고가')) ? v : (currentItem.finalData['입고가'] ?? currentItem.sources[activeProfile]?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                                currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, isInputTrigger);
                            }
                            return { ...prev, [code]: currentItem };
                        });
                    };
                    return (
                        <td key={keyPrefix} className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                            <input type="text" autoComplete="off" spellCheck="false" className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''}`} value={val === "오류" ? "" : val} placeholder={mVal || ''} data-row={idx} data-col={field} data-numeric={isNumeric} onKeyDown={handleCellKeyDown} onChange={handleChange} onClick={(e) => e.target.select()} />
                        </td>
                    );
                },
                ...customActions
            };

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
                        input, textarea { -webkit-user-select: auto; -moz-user-select: auto; -ms-user-select: auto; user-select: auto; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
                        .config-chip:hover { background-color: #f8fafc; }
                        .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
                    `}</style>
                    
                    {ui.alertMsg && <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i><span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span><button onClick={() => ui.setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button></div>}
                    {ui.toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}</div>}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-5">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <div className="flex items-center mb-0.5">
                                                    <span className="text-[14px] font-black text-slate-200 leading-none">MerchOps</span>
                                                    <span className="ml-2 bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-1.5 py-0.5 rounded text-[9px] font-bold leading-none tracking-wider">v9.2 Main</span>
                                                </div>
                                                <span className="text-[9px] font-extrabold text-slate-400 tracking-widest uppercase mt-0.5">MERCHANDISING WORKSPACE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} estimateCount={Object.keys(data.managedItems).length} />
                                        
                                        <nav className="flex gap-2 text-[14px] shrink-0 items-center">
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" target="_blank" rel="noopener noreferrer" className={`h-9 px-3 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">GUIDE</a>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt"></i></button>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => ui.setShowSettings(true)} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정 (매핑센터)"><i className="fas fa-cogs opacity-80"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <MainToolbar state={appState} actions={appActions} />
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {isMasterEmpty ? (
                                <WelcomeGuide onUpload={customActions.handleFileUpload} onCloudSync={customActions.handleCloudSync} openSmartParser={customActions.openSmartParser} />
                            ) : (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>

                    {ui.showBriefingModal && <BriefingModal onClose={() => ui.setShowBriefingModal(false)} fullDisplayRows={fullDisplayRows} masterProducts={data.masterProducts} activeProfileKey={activeProfileKey} showToast={ui.showToast} marginRules={config.marginRules} />}
                    {ui.showExportModal && <ExportModal onClose={() => ui.setShowExportModal(false)} fullDisplayRows={fullDisplayRows} currentExportTitle={isEstimateUploaded ? '엑셀 견적서' : '전체 마스터'} executeExport={customActions.executeExport} />}
                    {ui.showSettings && <MappingCenterModal onClose={() => ui.setShowSettings(false)} config={config} actions={{handleCloudSync: customActions.handleCloudSync, showToast: ui.showToast, handleFileUpload: customActions.handleFileUpload}} />}
                    {ui.showHistoryModal && <HistoryModal onClose={() => ui.setShowHistoryModal(false)} historyLogs={data.historyLogs} setHistoryLogs={data.setHistoryLogs} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
