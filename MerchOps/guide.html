<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - 사용자 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
        .smooth-scroll { scroll-behavior: smooth; }
        .guide-section { scroll-margin-top: 5rem; }
    </style>
</head>
<body class="smooth-scroll text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const GuideApp = () => {
            const [activeMenu, setActiveMenu] = useState('intro');

            // 네비게이션 메뉴 데이터
            const menus = [
                { id: 'intro', icon: 'fa-flag', label: '1. 도입 목적 및 개요' },
                { id: 'workflow', icon: 'fa-route', label: '2. 핵심 업무 흐름' },
                { id: 'buttons', icon: 'fa-toggle-on', label: '3. 각 버튼별 기능 완벽 가이드' },
                { id: 'parser', icon: 'fa-magic', label: '4. 스마트 파서 사용법' },
                { id: 'settings', icon: 'fa-cogs', label: '5. 환경설정 ⚙️ 완벽 가이드' },
                { id: 'tips', icon: 'fa-lightbulb', label: '6. 활용 팁 & FAQ' }
            ];

            const scrollTo = (id) => {
                setActiveMenu(id);
                document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 상단 글로벌 네비게이션 */}
                    <header className="bg-[#0f172a] text-white sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-xl font-black text-indigo-400">ONEAPP</span>
                                <span className="text-sm font-bold border-l border-slate-600 pl-3">MerchOps 사용자 가이드 v1.2</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <a href="https://oneapp.orderz.co.kr/MerchOps/v1.1" className="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-md text-xs font-bold transition-colors border border-slate-600"><i className="fas fa-desktop mr-1.5 text-emerald-400"></i>머치옵스</a>
                                <a href="https://oneapp.orderz.co.kr/MerchOps/vp1.1.html" className="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-md text-xs font-bold transition-colors border border-slate-600"><i className="fas fa-magic mr-1.5 text-indigo-400"></i>스마트 파서</a>
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1 max-w-7xl mx-auto w-full">
                        {/* 좌측 목차 (사이드바) */}
                        <aside className="w-64 hidden md:block shrink-0 py-8 pr-6 sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">목차 (Table of Contents)</h3>
                            <nav className="flex flex-col gap-1">
                                {menus.map(menu => (
                                    <button 
                                        key={menu.id} 
                                        onClick={() => scrollTo(menu.id)}
                                        className={`text-left px-4 py-3 rounded-lg text-sm font-bold transition-all ${activeMenu === menu.id ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-slate-600 hover:bg-slate-100'}`}
                                    >
                                        <i className={`fas ${menu.icon} w-6 text-center opacity-70`}></i> {menu.label}
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        {/* 우측 메인 콘텐츠 */}
                        <main className="flex-1 py-8 px-4 md:pl-8 md:pr-0 pb-32">
                            {/* 1. 도입 목적 */}
                            <section id="intro" className="guide-section mb-16">
                                <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-8 text-white shadow-lg mb-6">
                                    <h1 className="text-3xl font-black mb-4">ONEAPP MerchOps 시스템 개요</h1>
                                    <p className="text-indigo-100 text-lg leading-relaxed">
                                        MerchOps는 텍스트 형태의 외부 시세 데이터(카톡 등) 및 엑셀 견적서를 자체 마스터 DB 규격으로 자동 매핑하고,<br/>
                                        사전 설정된 마진 룰에 따라 <strong>단가를 갱신 및 카탈로그 동기화(Delta)</strong>를 수행하는 강력한 사내 전용 상품 관리 시스템입니다.
                                    </p>
                                </div>
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <i className="fas fa-bolt text-3xl text-amber-500 mb-4"></i>
                                        <h3 className="font-bold text-lg mb-2">실시간 탭 동기화</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">데이터를 저장할 필요 없이, 스마트 파서에서 작업한 내용이 머치옵스에 즉각(0초) 반영됩니다.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <i className="fas fa-tags text-3xl text-emerald-500 mb-4"></i>
                                        <h3 className="font-bold text-lg mb-2">카탈로그 & 델타 관리</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">단순 단가 변경뿐만 아니라, 특정 거래처의 신규 품목 추가 및 단종(누락) 품목까지 완벽하게 잡아냅니다.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <i className="fas fa-cloud text-3xl text-blue-500 mb-4"></i>
                                        <h3 className="font-bold text-lg mb-2">안전한 클라우드 백업</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">무제한 로컬 메모리(IndexedDB)를 통해 브라우저가 멈추지 않으며, 원할 때 구글 시트에 영구 백업 가능합니다.</p>
                                    </div>
                                </div>
                            </section>

                            {/* 5. 환경설정 ⚙️ 완벽 가이드 */}
                            <section id="settings" className="guide-section mb-16">
                                <h2 className="text-2xl font-black border-b-2 border-slate-200 pb-2 mb-6"><i className="fas fa-cogs text-slate-500 mr-2"></i>환경설정 ⚙️ 완벽 가이드</h2>
                                <p className="text-slate-600 mb-6">머치옵스 우측 상단의 톱니바퀴 버튼을 누르면 열리는 '환경설정 센터'의 핵심 기능들을 안내합니다.</p>

                                <div className="space-y-4">
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-rose-500">
                                        <h3 className="font-bold text-slate-800 text-lg mb-2 flex items-center"><i className="fas fa-broom text-rose-500 mr-2"></i>클라우드 DB 최적화 (검색어 찌꺼기 삭제)</h3>
                                        <p className="text-sm text-slate-600 mb-3 leading-relaxed">
                                            과거 엑셀 업로드 시 저장되었던 불필요한 '검색어등록' 필드의 찌꺼기 데이터들(예: 110g, 가공식품, #REF! 등)을 한 번에 삭제합니다. 불필요한 데이터를 제거하여 <strong>클라우드 DB 용량을 다이어트하고 시스템 속도를 최적화</strong>합니다.
                                        </p>
                                        <div className="bg-rose-50 p-3 rounded text-xs text-rose-800 font-bold border border-rose-100">
                                            👉 <strong>사용 팁:</strong> [기존 엑셀 검색어 일괄 삭제] 버튼을 누른 후에는, 반드시 상단의 <span className="bg-slate-800 text-white px-1.5 py-0.5 rounded">☁️ 클라우드 백업(↑)</span>을 눌러야 찌꺼기 없는 깨끗한 상태가 클라우드에 영구 반영됩니다! (파서에서 만든 카탈로그와 견적서는 안전하게 보호됩니다.)
                                        </div>
                                    </div>

                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-500">
                                        <h3 className="font-bold text-slate-800 text-lg mb-2 flex items-center"><i className="fas fa-calculator text-indigo-500 mr-2"></i>단가 계산 및 하이브리드 마진 룰</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            공급처의 입고가를 바탕으로 우리의 <strong>출고가(시중가)를 얼마로 세팅할지 자동으로 계산</strong>해 주는 공식입니다.<br/>
                                            '창고코드'와 '단위(ea, box)'를 조합하여 조건별로 마진율(%)과 연산 방식(곱하기/나누기)을 다르게 지정할 수 있습니다.
                                        </p>
                                    </div>

                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                                        <h3 className="font-bold text-slate-800 text-lg mb-2 flex items-center"><i className="fas fa-columns text-emerald-500 mr-2"></i>화면 노출 항목 및 엑셀 헤더 매핑</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            화면에 보여줄 데이터 기둥(열)을 켜고 끄거나 커스텀 항목을 새로 추가할 수 있습니다. 또한, 엑셀을 업로드할 때 <strong>어떤 엑셀 헤더명(예: 거래처명)을 우리 DB의 어떤 필드(예: 구매처)로 자동 연결할지 키워드를 콤마(,)로 구분하여 설정</strong>합니다.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-slate-600">
                                        <h3 className="font-bold text-slate-800 text-lg mb-2 flex items-center"><i className="fas fa-undo text-slate-500 mr-2"></i>앱 전체 초기화</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            로컬 브라우저에 꼬여있는 캐시나 데이터를 완벽하게 포맷(Format)하는 최후의 수단입니다. <strong>"파서 학습 사전(AI 매칭 데이터)"</strong>은 보존할지 묻는 알림창이 뜨므로, 소중한 학습 데이터는 날리지 않고 안전하게 초기화할 수 있습니다.
                                        </p>
                                    </div>
                                </div>
                            </section>

                            {/* 6. 활용 팁 & FAQ */}
                            <section id="tips" className="guide-section">
                                <h2 className="text-2xl font-black border-b-2 border-slate-200 pb-2 mb-6"><i className="fas fa-lightbulb text-amber-500 mr-2"></i>자주 묻는 질문 & 활용 팁</h2>
                                
                                <div className="space-y-4">
                                    <details className="bg-white border border-slate-200 rounded-xl group overflow-hidden cursor-pointer">
                                        <summary className="p-5 font-bold text-slate-800 outline-none flex justify-between items-center group-open:bg-slate-50">
                                            Q. 파싱 후 화면에 100% 일치하는 데이터가 없다고 나옵니다.
                                            <i className="fas fa-chevron-down text-slate-400 transition-transform group-open:rotate-180"></i>
                                        </summary>
                                        <div className="p-5 pt-0 text-sm text-slate-600 leading-relaxed border-t border-slate-100 mt-2">
                                            A. 오류가 아닙니다! 처음에는 파서가 똑똑하지 않아 [🟡 매핑 대기] 또는 [🔴 신규 대기] 탭에 데이터가 쌓입니다. 해당 탭을 눌러 수동으로 검색 후 연결(학습)해 주면, 다음번부터는 자동으로 [✅ 자동 일치] 탭에 나타납니다.
                                        </div>
                                    </details>

                                    <details className="bg-white border border-slate-200 rounded-xl group overflow-hidden cursor-pointer">
                                        <summary className="p-5 font-bold text-slate-800 outline-none flex justify-between items-center group-open:bg-slate-50">
                                            Q. 단가 계산 및 마진 룰은 어디서 설정하나요?
                                            <i className="fas fa-chevron-down text-slate-400 transition-transform group-open:rotate-180"></i>
                                        </summary>
                                        <div className="p-5 pt-0 text-sm text-slate-600 leading-relaxed border-t border-slate-100 mt-2">
                                            A. 머치옵스(메인 화면) 우측 상단의 <strong>[톱니바퀴 ⚙️] 아이콘</strong>을 클릭하세요. '환경설정 센터' 창이 열리면 좌측 메뉴에서 <strong>'3. 단가 계산 및 마진 룰'</strong>을 선택하여 창고별/단위별로 마진율을 정밀하게 세팅할 수 있습니다.
                                        </div>
                                    </details>
                                </div>
                            </section>

                            <div className="mt-12 text-center text-slate-400 text-sm font-bold">
                                © ONEAPP MerchOps. All rights reserved.
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GuideApp />);
    </script>
</body>
</html>
