<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티 (Pure Functions)
        // ==========================================
        
        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ 
            estimate: ['창고', '구매처', '입고가', '출고가', '입고B', '도매A', '간단설명'],
            parser: ['품목명', '규격', '입고가', '단위', '간단설명']
        });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {}, parser: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드', '품목명': '품목명, 상품명, 품명', '규격': '규격', '출고가': '출고가, 출고' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드', '품목명': '품목명, 상품명, 품명', '규격': '규격명, 규격', '구매처': '거래처명, 구매처', 
                '입고가': '입고가, 입고', '출고가': '출고가, 출고',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명'
            };
            base.parser = {
                '품목명': '품목명', '규격': '규격', '입고가': '입고가', '단위': '단위', '간단설명': '간단설명'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {}, parser: {} };
            base.estimate = { 
                '창고': '창고', '구매처': '구매처', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명'
            };
            base.parser = {
                '품목명': '', '규격': '', '입고가': '입고가', '단위': '단위', '간단설명': '간단설명'
            };
            return base;
        };

        const EXPORT_OPTIONS = {
            estimate: [
                { id: 'est_integrated_excel', type: 'excel', title: '1. 통합 엑셀 다운로드 (ERP & 쇼핑몰)', desc: 'ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드', icon: 'fa-file-excel', theme: { border: 'hover:border-blue-400', bg: 'hover:bg-blue-50', text: 'text-blue-500' } },
                { id: 'est_notice', type: 'copy', title: '2. 도매몰 단가 공지용 (카톡복사)', desc: '클릭 시 텍스트가 자동 복사됩니다.', icon: 'fa-copy', theme: { border: 'hover:border-amber-400', bg: 'hover:bg-amber-50', text: 'text-amber-500' } }
            ]
        };

        // 안전한 UUID 생성 함수 (crypto.randomUUID 폴백)
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '품목명' || h === '상품명') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return '';
        };

        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => {
            if (!str) return '';
            const match = String(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g);
            return match ? match.join('') : '';
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 로직 엔진 (Engines)
        // ==========================================

        const calculatePricesEngine = (baseInPrice, mItem, currentFinalData, marginRules, forceRecalc = false) => {
            const outsrc = parseNum(currentFinalData['외주비'] ?? mItem['외주비']);
            const labor = parseNum(currentFinalData['노무비'] ?? mItem['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData['창고'] ?? mItem['창고'] ?? '').trim();
            const unitStr = String(currentFinalData['단위'] ?? mItem['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') {
                calcOutPrice = totalCost / (1 - (appliedRule.rate / 100));
            } else {
                calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            }
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData['출고가']);
            const mIn = parseNum(mItem['입고가']);
            const mOut = parseNum(mItem['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) {
                newFinalData['출고가'] = providedOutPrice;
            } else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) {
                newFinalData['출고가'] = mOut;
            } else {
                newFinalData['출고가'] = calcOutPrice;
            }

            const div1 = parseNum(currentFinalData['1종연산'] ?? mItem['1종연산']);
            const extraCost = parseNum(currentFinalData['경비'] ?? mItem['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                const calc1Out = Math.round((newFinalData['출고가'] / div1) + extraCost);
                newFinalData['1출고'] = Math.round(calc1Out / 10) * 10; 
            }
            return newFinalData;
        };

        const parseTextSemantically = (rawText) => {
            let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
            const results = [];
            let currentItem = {};

            const pushItem = () => {
                if (currentItem.품목명) {
                    if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, '');
                    results.push({ _id: generateUUID(), _apply: false, ...currentItem });
                }
                currentItem = {};
            };

            lines.forEach(line => {
                if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^starLine$/i.test(line) || /^마감$/.test(line) || /^\d{2}월\s*\d{2}일\s*\d{2}:\d{2}\s*마감$/.test(line) || /default-thumbnail/i.test(line) || /^상품이미지$|^이미지\s*준비중$/.test(line) || /마켓보로|통신판매업의\s*중개자|당사자가\s*아닙니다|책임을\s*지지\s*않습니다|판매자가\s*등록한|데이터가\s*없습니다|-\s*끝\s*-/i.test(line)) return;

                const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                let extractedPrice = null;

                if (priceMatch) {
                    extractedPrice = priceMatch[1];
                    line = line.replace(priceMatch[0], '').trim();
                    if (line.endsWith('/')) line = line.slice(0, -1).trim();
                }

                if (extractedPrice) currentItem.입고가 = extractedPrice;
                if (!line) { if (extractedPrice) pushItem(); return; }

                if (!currentItem.품목명) {
                    if (line.includes(' / ')) {
                        const splitBySpaceSlashSpace = line.split(' / ');
                        let namePart = splitBySpaceSlashSpace[0].trim();
                        let specPart = splitBySpaceSlashSpace.slice(1).join(' / ').trim();

                        const unitMatch = namePart.match(/(EA|BOX|포|개|벌크BOX|벌크|박스|봉|캔|병|팩|단|마리)$/i);
                        if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } 
                        else { currentItem.품목명 = namePart; }

                        const specParts = specPart.split('/').map(s => s.trim());
                        currentItem.규격 = specParts[0] || '';
                        if (specParts.length > 1) currentItem.간단설명 = specParts.slice(1).join(' | ');
                    } else { currentItem.품목명 = line; }
                } else {
                    if (line.includes('/')) {
                        const parts = line.split('/').map(s => s.trim());
                        if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                        if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                        if (parts.length > 2) currentItem.간단설명 = parts.slice(2).join(' | ') || '';
                    } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/i.test(line)) {
                        currentItem.규격 = line;
                    } else {
                        currentItem.간단설명 = currentItem.간단설명 ? currentItem.간단설명 + ' | ' + line : line;
                    }
                }
                if (extractedPrice) pushItem();
            });
            if (currentItem.품목명) pushItem();
            return results;
        };

        const searchMasterProducts = (productsObj, keyword) => {
            if (!keyword || !keyword.trim()) return [];
            const cleanKeyword = keyword.toLowerCase().replace(/[()[\]{},./]/g, ' ');
            const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
            if (tokens.length === 0) return [];

            const results = Object.values(productsObj).map(m => {
                const mName = String(m.품목명 || '').toLowerCase();
                const mSpec = String(m.규격 || '').toLowerCase();
                const mBrand = String(m.브랜드 || '').toLowerCase();
                const mFull = mName + ' ' + mSpec + ' ' + mBrand;
                let score = 0, matchCount = 0;

                tokens.forEach(token => {
                    if (mName.includes(token)) { score += token.length * 10; matchCount++; } 
                    else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; } 
                    else if (mBrand.includes(token)) { score += token.length * 3; matchCount++; }
                });

                if (mFull.replace(/\s+/g, '').includes(keyword.toLowerCase().replace(/\s+/g, ''))) score += 1000;
                return { item: m, score, matchCount };
            }).filter(r => r.score > 0);

            results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
            return results.map(r => r.item);
        };

        const runSmartMatch = (extName, extSpec, mProducts, pDict) => {
            const normExtName = normalizeText(extName), normExtSpec = normalizeText(extSpec);
            const extTokens = tokenize(extName), extExtractedSpec = extractSpec(extName + " " + (extSpec || ''));
            const dictKey = `${normExtName}|${normExtSpec}`;

            if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 학습일치' };

            let bestMatch = null, bestScore = 0, specConflict = false;

            for (const mCode in mProducts) {
                const m = mProducts[mCode];
                const mNormName = normalizeText(m.품목명), mTokens = tokenize(m.품목명);
                const mExtractedSpec = extractSpec(m.품목명 + " " + (m.규격||''));

                let specMatch = true;
                if (extExtractedSpec && mExtractedSpec && extExtractedSpec !== mExtractedSpec) specMatch = false;

                let score = 0;
                if (mNormName === normExtName) score = 1;
                else {
                    const intersection = extTokens.filter(t => mTokens.includes(t));
                    score = intersection.length / Math.max(extTokens.length, mTokens.length);
                }

                if (score > 0.6) {
                    if (!specMatch) specConflict = true; 
                    else if (score > bestScore) { bestScore = score; bestMatch = m; }
                }
            }

            if (bestMatch && bestScore === 1) return { code: bestMatch.코드, status: '🟢 일치' };
            if (bestMatch && bestScore > 0.6) return { code: '', status: '🟡 유사' };
            return { code: '', status: '🔴 불일치' };
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => {
                    if(!h) return false;
                    const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                    return keywords.some(kw => cleanH.includes(kw));
                });
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        if(jsonAll.length === 0) return resolve([]);

                        let headerRowIdx = 0;
                        const maxSearch = Math.min(15, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('1코드')) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        const headers = jsonAll[headerRowIdx] || [];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) {
                                    obj[h] = row[idx];
                                    if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false;
                                }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        resolve(parsedData);
                    } catch(err) {
                        reject(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // ==========================================
        // 🧩 3. 커스텀 훅 (State Architecture)
        // ==========================================

        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v870') || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) return getInitialVisibleMasterCols();
                return parsed;
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.estimate) return getInitialVisibleUploadCols();
                return parsed;
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                let parsed = s ? JSON.parse(s) : null;
                if (!parsed || !parsed.master) parsed = getInitialMappings();
                
                if (!parsed.estimate['창고']) parsed.estimate['창고'] = '창고, 창고코드';
                if (!parsed.master['창고']) parsed.master['창고'] = '창고, 창고코드';
                if (!parsed.estimate['출고가']) parsed.estimate['출고가'] = '출고가, 출고';
                if (!parsed.master['출고가']) parsed.master['출고가'] = '출고가, 출고';

                return parsed; 
            });

                const increased = [], decreased = [];
                const isParserMatched = effectiveViewMode === 'parser' && parserFilter === 'matched';
                const activeProfile = isParserMatched ? 'parser' : 'estimate';

                fullDisplayRows.forEach(row => {
                    const rowCode = isParserMatched ? row._matchCode : row.코드;
                    const mItem = masterProducts[rowCode];
                    if (!mItem) return;

                    let pIn = 0;
                    if (isParserMatched) {
                        pIn = parseNum(row.finalData?.['입고가'] || row['입고가']);
                    } else {
                        pIn = parseNum(row.finalData?.['입고가'] || row.sources?.[activeProfile]?.['입고가'] || mItem['입고가']);

                    const mIn = parseNum(mItem['입고가']);
                    const diff = pIn - mIn;

                    if (mIn > 0 && diff !== 0) { 
                        const data = { code: rowCode, name: mItem.품목명, spec: mItem.규격, pIn, mIn, diff, mItem };

                    itemsToExport.forEach(item => {
                        const mItem = item.mItem;
                        const pIn = item.pIn;
                        
                        const projected = calculatePricesEngine(pIn, mItem, {...mItem, ...item.finalData, '입고가': pIn}, marginRules, false);
                        const pOut = projected['출고가'] || 0;
                        const pMarketPrice = projected['시중가'] || pOut;

                        erpData.push([item.code, pIn, '0', pOut, '0', projected['입고B']||'', 'n', projected['도매A']||'', 'n', projected['도매B']||'', 'n', projected['최종전송']||pIn, 'n', projected['간단설명']||'', 'n', '1']);
                        
                        [1, 2].forEach(type => {
                            const cCode = projected[`${type}종코드`];
                            if (cCode) { 
                                const cIn = projected[`${type}입고`] || projected[`${type}구매`] || 0;
                                const cOut = projected[`${type}출고`] || 0; 
                                erpData.push([cCode, cIn, '0', cOut, '0', '', 'n', '', 'n', '', 'n', cIn, 'n', '', 'n', '1']); 
                            }
                        });
                        
                        const priceA = projected['도매A'] || pOut;
                        shopData.push([item.code, mItem.품목명, mItem.규격, pOut, priceA, pMarketPrice, 0, 0, 0, 0, 0, 0, mItem.브랜드||'', mItem.간단설명||'', '1', '999', '', '', '', '', '', mItem.검색어등록||'']);
                    });
                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), "쇼핑몰업로드"); 
                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), "ERP업데이트");
                    window.XLSX.writeFile(wb, `단가변동_업데이트_${new Date().toISOString().slice(0,10)}.xlsx`);
                    showToast('✅ 변동 품목 엑셀 다운로드가 완료되었습니다.');
                }, 500);

                if (itemsToExport.length === 0) return showToast('리포트로 발행할 변동 품목이 없습니다.');

                    }

                                    {stats.increased.length > 0 ? (
                                        <ul className="space-y-2">
                                            {stats.increased.map(item => (

        const ExcelDataGrid = ({ state, actions }) => {

        const ParserSplitView = ({ state, actions }) => {

                            ) : masterSearchResults.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-search text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">검색 결과가 없습니다.</p><p className="text-[11px]">우측 상단 검색창에서 키워드를 부분적으로 지우거나 수정해보세요.</p></div>
                            ) : (
                                <table className="w-full text-left text-[12px] whitespace-nowrap">
                                    <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3">상품정보 (코드/품명/규격)</th><th className="py-2.5 px-3 text-right w-24">[M] 입고가</th><th className="py-2.5 px-3 text-center w-16">작업</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {masterSearchResults.map(m => (
                                            <tr key={m.코드} className="hover:bg-amber-50/50 group transition-colors">
                                                <td className="py-2 px-3"><div className="flex flex-col min-w-0 w-full overflow-hidden"><span className="text-[10px] font-mono text-slate-400">{m.코드}</span><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[12px] font-extrabold text-slate-800 truncate">{m.품목명}</span>{m.규격 && <span className="text-[11px] text-slate-500 shrink-0">({m.규격})</span>}</div></div></td>

                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}

                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
                        <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-2"><i className="fas fa-file-alt text-slate-400"></i><span className="text-[13px] font-black text-slate-700">파싱된 외부 데이터 (미매칭)</span></div><span className="text-[11px] font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">총 {displayRows.length}건 대기중</span>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3 text-center w-14">🎯 타겟</th><th className="py-2.5 px-2 text-center w-14">상태</th><th className="py-2.5 px-3">파싱 품명 및 규격</th><th className="py-2.5 px-3 text-right w-20">입고가</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">
                                    {displayRows.length === 0 ? <tr><td colSpan="4" className="p-10 text-center text-slate-400 font-bold">대기중인 데이터가 없습니다.</td></tr> : displayRows.map(row => {
                                        const isTarget = parserState.targetId === row._id;
                                        let badgeClass = 'bg-slate-100 text-slate-700';
                                        if (row._matchStatus.includes('🟡')) badgeClass = 'bg-yellow-100 text-yellow-700'; else if (row._matchStatus.includes('🔴')) badgeClass = 'bg-red-100 text-red-700';
                                        return (
                                            <tr key={row._id} onClick={() => handleSetTarget(row._id, row['품목명'])} className={`cursor-pointer transition-colors border-l-4 ${isTarget ? 'bg-amber-50/50 border-amber-500' : 'hover:bg-slate-50 border-transparent'}`}>
                                                <td className="py-2 px-3 text-center"><div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center mx-auto ${isTarget ? 'border-amber-500 bg-white' : 'border-slate-300'}`}>{isTarget && <div className="w-2 h-2 rounded-full bg-amber-500"></div>}</div></td>
                                                <td className="py-2 px-2 text-center"><span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${badgeClass} w-max block mx-auto`}>{row._matchStatus.substring(0, 2)}</span></td>
                                                <td className="py-2 px-3"><div className="flex flex-col"><span className={`text-[12px] font-extrabold truncate ${isTarget ? 'text-amber-900' : 'text-slate-800'}`}>{row['품목명']}</span><span className="text-[11px] text-slate-500 mt-0.5 truncate">{row['규격']} {row['단위'] ? `| ${row['단위']}` : ''}</span></div></td>

        // ==========================================
        // ⚙️ 7. 메인 애플리케이션 (Main Entry)
        // ==========================================
        const App = () => {
            const config = useMerchConfig();
            const data = useMerchData();
            const ui = useMerchUI();

            const activeProfileKey = 'estimate';
            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
            const isMasterEmpty = Object.keys(data.masterProducts).length === 0;

            const effectiveViewMode = (ui.viewMode === 'parser' && data.parserBuffer.length === 0) ? 'default' : ui.viewMode;

            // 디스플레이될 행 계산 로직
            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                if (effectiveViewMode === 'default') {
                    if (isEstimateUploaded) baseList = Object.values(data.managedItems);
                    else baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });

                    if (ui.globalSearch) {
                        const searchedMasters = searchMasterProducts(data.masterProducts, ui.globalSearch);
                        const searchedCodes = new Set(searchedMasters.map(m => m.코드));
                        baseList = baseList.filter(i => searchedCodes.has(i.코드));
                        const scoreMap = {};
                        searchedMasters.forEach((m, idx) => { scoreMap[m.코드] = searchedMasters.length - idx; });
                        baseList.sort((a, b) => (scoreMap[b.코드] || 0) - (scoreMap[a.코드] || 0));
                    } else {
                        baseList.sort((a, b) => {
                            const cA = String(a.코드 || ''), cB = String(b.코드 || '');
                            if (cA.substring(0, 6) !== cB.substring(0, 6)) return cA.substring(0, 6).localeCompare(cB.substring(0, 6));
                            return (parseInt(cA.substring(6), 10) || 0) - (parseInt(cB.substring(6), 10) || 0);
                        });
                    }
                } else if (effectiveViewMode === 'parser') {
                    if (ui.parserFilter === 'matched') {
                        baseList = data.parserBuffer.filter(r => r._matchCode);
                    } else {
                        baseList = data.parserBuffer.filter(r => !r._matchCode && (ui.parserFilter === 'similar' ? r._matchStatus.includes('유사') : r._matchStatus.includes('불일치')));
                    }
                }
                return baseList;
            }, [effectiveViewMode, isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, data.parserBuffer, ui.parserFilter]);

            // 마스터 검색 결과 (파서 뷰용)
            const masterSearchResults = useMemo(() => {
                if (ui.viewMode !== 'parser' || ui.parserFilter === 'matched' || !ui.globalSearch.trim()) return [];
                return searchMasterProducts(data.masterProducts, ui.globalSearch).slice(0, 50);
            }, [ui.globalSearch, data.masterProducts, ui.viewMode, ui.parserFilter]);

            // 비즈니스 액션 훅 연결
            const customActions = useMerchActions(config, data, ui, fullDisplayRows, effectiveViewMode, activeProfileKey);

            // 상태 매핑
            const appState = {
                viewMode: ui.viewMode, effectiveViewMode, parserFilter: ui.parserFilter, parserBuffer: data.parserBuffer, isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, parserState: ui.parserState, isProcessing: ui.isProcessing,
                visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, activeProfileKey, fullDisplayRows, masterSearchResults
            };
            
            // 액션 매핑 (UI 함수 + 비즈니스 함수)
            const appActions = {
                setViewMode: ui.setViewMode, setParserFilter: ui.setParserFilter, setShowBriefingModal: ui.setShowBriefingModal, setShowExportModal: ui.setShowExportModal, setShowSmartParserModal: ui.setShowSmartParserModal,
                setSelectedRows: ui.setSelectedRows, setParserState: ui.setParserState, setGlobalSearch: ui.setGlobalSearch, setShowHistoryModal: ui.setShowHistoryModal,
                handleGlobalSearchChange: (val) => { ui.setGlobalSearch(val); if (ui.viewMode === 'parser' && ui.parserFilter !== 'matched') ui.setParserState(prev => ({ ...prev, searchKey: val })); },
                toggleParserRowCheck: (id) => data.setParserBuffer(prev => prev.map(r => r._id === id ? { ...r, _apply: !r._apply } : r)),
                renderUploadEditableCell: (row, idx, field, activeProfile, keyPrefix, isParserRow = false) => {
                    const linkedMasterField = config.masterLinks[activeProfile]?.[field];
                    const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                    const val = row.finalData?.[field] !== undefined ? row.finalData[field] : (row.sources?.[activeProfile]?.[field] || '');
                    const mVal = linkedMasterField && row.코드 ? data.masterProducts[row.코드]?.[linkedMasterField] : undefined;
                    const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNumeric;

                    const handleChange = (e) => {
                        const v = e.target.value;
                        const isInputTrigger = ['입고가', '외주비', '노무비'].includes(field) || ['입고가', '외주비', '노무비'].includes(linkedMasterField);
                        const isOutputTrigger = ['출고가'].includes(field) || ['출고가'].includes(linkedMasterField);

                        if (isParserRow) {
                            data.setParserBuffer(prev => prev.map(r => {
                                if (r._id !== row._id) return r;
                                let updated = { ...r }; updated.finalData = { ...updated.finalData, [field]: v };
                                
                                if (isInputTrigger || isOutputTrigger) {
                                    const pInRaw = (isInputTrigger && (field === '입고가' || linkedMasterField === '입고가')) ? v : (updated.finalData['입고가'] ?? updated.sources[activeProfile]?.['입고가'] ?? data.masterProducts[row.코드]?.['입고가'] ?? 0);
                                    updated.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[row.코드] || {}, updated.finalData, config.marginRules, isInputTrigger);
                                }
                                return updated;
                            }));
                        } else {
                            data.setManagedItems(prev => {
                                const code = row.코드; let currentItem = prev[code];
                                if (!currentItem) { currentItem = { 코드: code, sources: { [activeProfile]: {} }, finalData: { [field]: v } }; } 
                                else { currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: v } }; }
                                
                                if (isInputTrigger || isOutputTrigger) {
                                    const pInRaw = (isInputTrigger && (field === '입고가' || linkedMasterField === '입고가')) ? v : (currentItem.finalData['입고가'] ?? currentItem.sources[activeProfile]?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                                    currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, isInputTrigger);
                                }
                                return { ...prev, [code]: currentItem };
                            });
                        }
                    };
                    return (
                        <td key={keyPrefix} className={`px-1 py-1 border-r border-slate-200 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                            <input type="text" autoComplete="off" spellCheck="false" className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none ${isNumeric ? 'text-right font-bold' : 'truncate text-center'} ${isDiff ? 'text-indigo-700' : ''}`} value={val === "오류" ? "" : val} placeholder={isParserRow ? '' : (mVal || '')} data-row={idx} data-numeric={isNumeric} onChange={handleChange} onClick={(e) => e.target.select()} />
                        </td>
                    );
                },
                ...customActions
            };

            const currentExportTitle = effectiveViewMode === 'parser' ? '파싱 데이터' : (isEstimateUploaded ? '엑셀 견적서' : '전체 마스터');

            // 단축키 및 이벤트 방지 리스너
            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F7') { e.preventDefault(); document.getElementById('btn-export-excel')?.click(); }
                    if (e.key === 'F8') { e.preventDefault(); document.getElementById('btn-export-briefing')?.click(); }
                    if (e.key === 'F9') { e.preventDefault(); document.getElementById('btn-export-report')?.click(); }
                    
                    if (e.key === 'F3' || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f')) {
                        e.preventDefault();
                        if (document.activeElement) document.activeElement.blur();
                        setTimeout(() => { const searchInput = document.getElementById('main-search-input'); if (searchInput) { searchInput.focus(); searchInput.select(); } }, 50);
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); document.getElementById('btn-commit-master')?.click(); }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
                        if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); document.getElementById('cb-toggle-all')?.click(); }
                    }
                    if (e.key === 'Escape') { if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') document.activeElement.blur(); }
                };
                window.addEventListener('keydown', handleGlobalKeyDown); return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, []);

            useEffect(() => {
                const handleContextMenu = (e) => e.preventDefault();
                const handleSelectStart = (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') e.preventDefault(); };
                const handleDragStart = (e) => e.preventDefault();
                const handleSecurityKeys = (e) => {
                    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                        e.preventDefault(); ui.showToast('⚠️ 보안 정책에 의해 해당 기능이 차단되었습니다.');
                    }
                };
                document.addEventListener('contextmenu', handleContextMenu); document.addEventListener('selectstart', handleSelectStart); document.addEventListener('dragstart', handleDragStart); document.addEventListener('keydown', handleSecurityKeys);
                return () => { document.removeEventListener('contextmenu', handleContextMenu); document.removeEventListener('selectstart', handleSelectStart); document.removeEventListener('dragstart', handleDragStart); document.removeEventListener('keydown', handleSecurityKeys); };
            }, []);

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
                        input, textarea { -webkit-user-select: auto; -moz-user-select: auto; -ms-user-select: auto; user-select: auto; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
                        .config-chip:hover { background-color: #f8fafc; }
                        .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
                    `}</style>
                    
                    {ui.alertMsg && <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i><span className="whitespace-pre-line leading-relaxed">{ui.alertMsg}</span><button onClick={() => ui.setAlertMsg('')} className="ml-4"><i className="fas fa-times text-slate-400 hover:text-white"></i></button></div>}
                    {ui.toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}</div>}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40">
                            <div className="p-5 pb-0 pt-6">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden">
                                    <div className="px-5 py-3 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120] gap-5">
                                        <div className="flex items-center group shrink-0">
                                            <span className="text-xl font-black text-indigo-400 mr-3">ONEAPP</span>
                                            <div className="flex flex-col border-l-2 border-slate-700 pl-3">
                                                <span className="text-[14px] font-black text-slate-200 leading-none mb-0.5">MerchOps</span>
                                                <span className="text-[9px] font-extrabold text-slate-500 tracking-widest">V8.7.8 STABLE</span>
                                            </div>
                                        </div>
                                        
                                        <SystemConsole itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} viewMode={ui.viewMode} parserState={ui.parserState} estimateCount={Object.keys(data.managedItems).length} parserCount={data.parserBuffer.length} />
                                        
                                        <nav className="flex gap-2 text-[14px] shrink-0 items-center">
                                            <a href="https://oneapp.orderz.co.kr/MerchOps/guide" target="_blank" rel="noopener noreferrer" className={`h-9 px-3 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-emerald-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-emerald-300 hover:border-emerald-500/50 font-bold text-[11px] tracking-wider uppercase ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="MerchOps 사용 가이드">
                                                GUIDE
                                            </a>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <label className={`cursor-pointer w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border ${ui.viewMode === 'default' && isMasterEmpty ? 'text-emerald-400 border-emerald-500/50 bg-emerald-500/10 shadow-[0_0_8px_rgba(16,185,129,0.25)]' : 'text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500'}`} title="마스터 DB (엑셀/CSV) 업로드">
                                                <i className={`fas fa-database ${isMasterEmpty ? '' : 'opacity-80'}`}></i><input type="file" className="hidden" onChange={(e) => {ui.setViewMode('default'); customActions.handleFileUpload(e, 'master');}} multiple disabled={ui.isProcessing} />
                                            </label>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => customActions.handleCloudSync('download')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드 데이터 불러오기"><i className="fas fa-cloud-download-alt"></i></button>
                                            <button onClick={() => customActions.handleCloudSync('upload')} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-indigo-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-indigo-300 hover:border-indigo-500/50 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="클라우드에 데이터 백업"><i className="fas fa-cloud-upload-alt"></i></button>
                                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                                            <button onClick={() => ui.setShowSettings(true)} className={`w-9 h-9 rounded flex items-center justify-center shadow-sm transition-all duration-300 border text-slate-400 bg-[#0f172a] border-slate-700 hover:bg-[#1e293b] hover:text-white hover:border-slate-500 ${ui.isProcessing ? 'opacity-40 pointer-events-none' : ''}`} title="환경설정 (매핑센터)"><i className="fas fa-cogs opacity-80"></i></button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            
                            <MainToolbar state={appState} actions={appActions} />
                            
                            {ui.viewMode === 'parser' && ui.parserState.targetId && (
                                <div className="px-8 pb-3 fade-in"><div className="bg-amber-50 border border-amber-200 text-amber-800 px-4 py-2.5 rounded-lg flex items-center justify-between shadow-sm"><div className="flex items-center gap-3"><span className="flex items-center justify-center w-6 h-6 rounded-full bg-amber-200 text-amber-700 text-xs"><i className="fas fa-search"></i></span><span className="text-[13px] font-bold">현재 <span className="text-amber-600 font-black px-1">'{data.parserBuffer.find(r=>r._id===ui.parserState.targetId)?.['품목명']}'</span> 매핑을 위해 전체상품을 다중 검색 중입니다. (검색어: '{ui.parserState.searchKey}')</span></div><button onClick={() => { ui.setParserState({targetId:null, searchKey:''}); ui.setGlobalSearch(''); }} className="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1.5 rounded hover:bg-amber-100 transition-colors">검색 취소</button></div></div>
                            )}
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {effectiveViewMode === 'default' || (effectiveViewMode === 'parser' && ui.parserFilter === 'matched') ? (
                                <ExcelDataGrid state={appState} actions={appActions} />
                            ) : (
                                <ParserSplitView state={appState} actions={appActions} />
                            )}
                        </div>
                    </div>

                    {ui.showSmartParserModal && <SmartParserInputModal onClose={() => ui.setShowSmartParserModal(false)} executeParser={customActions.executeParser} showToast={ui.showToast} />}
                    {ui.showBriefingModal && <BriefingModal onClose={() => ui.setShowBriefingModal(false)} fullDisplayRows={fullDisplayRows} masterProducts={data.masterProducts} effectiveViewMode={effectiveViewMode} parserFilter={ui.parserFilter} activeProfileKey={activeProfileKey} showToast={ui.showToast} marginRules={config.marginRules} />}
                    {ui.showExportModal && <ExportModal onClose={() => ui.setShowExportModal(false)} fullDisplayRows={fullDisplayRows} currentExportTitle={currentExportTitle} executeExport={customActions.executeExport} />}
                    {ui.showSettings && <MappingCenterModal onClose={() => ui.setShowSettings(false)} config={config} actions={{handleCloudSync: customActions.handleCloudSync, showToast: ui.showToast}} />}
                    {ui.showHistoryModal && <HistoryModal onClose={() => ui.setShowHistoryModal(false)} historyLogs={data.historyLogs} setHistoryLogs={data.setHistoryLogs} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
