        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'w-[80px] min-w-[80px] max-w-[80px]';
            if (h === '구매처' || h === '거래처명') return 'w-[100px] min-w-[100px] max-w-[100px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요') return 'w-[140px] min-w-[140px] max-w-[140px]';
            return 'w-[110px] min-w-[110px] max-w-[110px]';
        };

        const parseAllTabId = (id) => {
            if (id.startsWith('M_')) return { type: 'M', field: id.substring(2) };
            if (id.startsWith('F_')) { const firstUnderscore = id.indexOf('_', 2); return { type: 'F', mapKey: id.substring(2, firstUnderscore), field: id.substring(firstUnderscore + 1) }; }
            return null;
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const extractValue = (row, mappingStr) => {
            if (!mappingStr) return '';
            const keywords = mappingStr.split(',').map(s => s.trim().toLowerCase().replace(/\s/g, ''));
            const rowKeys = Object.keys(row);
            for (let kw of keywords) {
                if (!kw) continue;
                const foundKey = rowKeys.find(k => String(k).toLowerCase().replace(/\s/g, '').includes(kw));
                if (foundKey && row[foundKey] !== undefined && row[foundKey] !== '') return row[foundKey];
            }
            return '';
        };

        const parseExcelRobust = (file) => {
            return new Promise((resolve, reject) => {
                if (!window.XLSX) return reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = window.XLSX.read(e.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(10, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('단가') || rowStr.includes('입고가') || rowStr.includes('구매처')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx];
                        if (!rowArr) { endIdx--; continue; }
                        const filledCount = rowArr.filter(cell => cell !== undefined && cell !== null && String(cell).trim() !== '').length;
                        const rawStr = rowArr.join('').replace(/\s/g, '');
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('시간') || rawStr.includes('합계') || rawStr.includes('총계') || /20\d{2}[\/\-]\d{2}/.test(rawStr)) && filledCount <= 4) endIdx--; else break; 
                    }
                    const data = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        if (!jsonAll[i] || jsonAll[i].join('').trim() === '') continue;
                        const obj = {}; headers.forEach((h, idx) => { if (h) obj[h] = jsonAll[i][idx]; }); data.push(obj);
                    }
                    resolve(data);
                };
                reader.readAsBinaryString(file);
            });
        };

            const [time, setTime] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
            
            const timeStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
            
            return (
                <div className="bg-black rounded-md border border-slate-700 px-4 py-1.5 flex flex-1 items-center overflow-hidden shadow-inner">

        const SearchBar = ({ onSearch }) => {
            const [val, setVal] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => onSearch(val), 250); 
                return () => clearTimeout(timer);
            }, [val, onSearch]);

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F3') {
                        e.preventDefault(); 
                        if (inputRef.current) {
                            inputRef.current.focus();
                            inputRef.current.select(); 
                        }
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, []);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onSearch(val); 
                    setTimeout(() => {
                        const firstInput = document.querySelector('input.cell-input[data-numeric="true"]') || document.querySelector('input.cell-input');
                        if (firstInput) {
                            firstInput.focus();
                            firstInput.select();
                        }
                    }, 50);
                }
            };

            return (
                <div className="relative w-[240px] h-full shrink-0" onClick={() => inputRef.current?.focus()}>
                    <input 
                        ref={inputRef}
                        type="text" 
                        placeholder="검색 (단축키 F3, Enter시 이동)"

                    mSet.forEach(h => currentPool.add(`M_${h}`));
                    ['estimate', 'prev', 'in', 'out', 'sales'].forEach(tab => {
                        (visibleUploadCols[tab] || []).forEach(h => { if (!['품목코드', '품목명', '규격'].includes(h)) currentPool.add(`F_${tab}_${h}`); });
                    });

                    let newActive = (prev.activeIds || []).filter(id => currentPool.has(id));
                    let newWarehouse = (prev.warehouseIds || []).filter(id => currentPool.has(id) && id.startsWith('F_'));
                    const knownItems = new Set([...newActive, ...newWarehouse]);
                    currentPool.forEach(id => { if (!knownItems.has(id)) newActive.push(id); });

                    if (JSON.stringify(newActive) !== JSON.stringify(prev.activeIds) || JSON.stringify(newWarehouse) !== JSON.stringify(prev.warehouseIds)) {
                        return { activeIds: newActive, warehouseIds: newWarehouse };
                    }
                    return prev;
                });
            }, [visibleMasterCols, visibleUploadCols]);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const toggleMasterCol = useCallback((tabId, header) => {
                setVisibleMasterCols(prev => {
                    const list = prev[tabId] || [];
                    return { ...prev, [tabId]: list.includes(header) ? list.filter(h => h !== header) : [...list, header] };
                });
            }, []);

            const onDragStart = (e, index) => {
                dragItemRef.current = index;
                setDraggingIdx(index);
                e.dataTransfer.effectAllowed = "move";
            };

            const onDragEnter = (e, index) => {
                e.preventDefault();
                dragOverItemRef.current = index;
                if (dragItemRef.current !== null && dragOverItemRef.current !== null && dragItemRef.current !== dragOverItemRef.current) {
                    setAllTabConfig(prev => {
                        const n = [...prev.activeIds];
                        const draggedItem = n[dragItemRef.current];
                        n.splice(dragItemRef.current, 1);
                        n.splice(dragOverItemRef.current, 0, draggedItem);
                        return { ...prev, activeIds: n };
                    });
                    dragItemRef.current = dragOverItemRef.current; 
                    setDraggingIdx(dragOverItemRef.current);
                }
            };

            const onDragEnd = () => {
                dragItemRef.current = null;
                dragOverItemRef.current = null;
                setDraggingIdx(null);
            };

            const handleFileUpload = async (e, expectedType) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                if (!window.XLSX) return setAlertMsg("엑셀 파서 라이브러리 로드 대기중입니다.");

                try {
                    let newMaster = { ...masterProducts }; let newManaged = [...managedItems]; let totalCount = 0;
                    for (const file of files) {
                        let mapKey = expectedType;
                        if (!mapKey) {
                            const foundNameKey = Object.keys(sourceKeyMap).find(k => file.name.includes(k));
                            if (foundNameKey) mapKey = sourceKeyMap[foundNameKey];
                            else if (file.name.includes('마스터') || file.name.includes('상품정보') || file.name.includes('품목') || file.name.includes('상품') || file.name.includes('단가')) mapKey = 'master';
                        }
                        if (!mapKey) { setAlertMsg(`[${file.name}] 인식 불가. 파일명에 키워드를 포함해주세요.`); continue; }

                        const data = await parseExcelRobust(file);
                        if (mapKey !== 'master' && data.length > 0) {
                            const headers = Object.keys(data[0]); const curMap = mappings[mapKey] || {};
                            const keywordsToMatch = Object.keys(curMap).filter(k => !['품목코드', '품목명', '규격'].includes(k)).map(k => curMap[k].split(',')[0].trim().replace(/\s/g, '')).filter(kw => kw);
                            if (keywordsToMatch.length > 0) {
                                const matchCount = keywordsToMatch.filter(kw => headers.some(h => String(h).replace(/\s/g, '').includes(kw))).length;
                                if ((matchCount / keywordsToMatch.length) * 100 < 30) {
                                    setAlertMsg(`🚨 신규 양식 감지됨 ([${file.name}] 일치율 30% 미만). 매핑을 확인하세요.`);
                                    setShowSettings(true); setMappingMainTab('operation'); setMappingFileTab(mapKey); e.target.value = ''; return; 
                                }
                            }
                        }

                        data.forEach(row => {
                            const code = extractValue(row, (mappings[mapKey] || {})['품목코드'] || '품목코드');
                            if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                            
                            if (mapKey === 'master') {
                                if (!newMaster[code]) newMaster[code] = { 코드: code };
                                const curMasterMap = mappings['master'] || {};
                                MASTER_HEADERS.forEach(h => {
                                    const mappingStr = curMasterMap[h] || h;
                                    let val = extractValue(row, mappingStr);
                                    if (val !== undefined && val !== '') newMaster[code][h] = NUMERIC_HEADERS.includes(h) ? parseNum(val) : val;
                                });
                            } else {
                                let mItem = newManaged.find(m => m.코드 === code);
                                if (!mItem) { mItem = { 코드: code, sources: {}, finalData: {} }; newManaged.push(mItem); }
                                if (!mItem.sources[mapKey]) mItem.sources[mapKey] = {};
                                
                                mItem.sources[mapKey]['품목명'] = extractValue(row, (mappings[mapKey] || {})['품목명'] || '품목명');
                                mItem.sources[mapKey]['규격'] = extractValue(row, (mappings[mapKey] || {})['규격'] || '규격');
                                mItem.sources[mapKey]['구매처'] = extractValue(row, (mappings[mapKey] || {})['구매처'] || '구매처');
                                
                                Object.keys(mappings[mapKey] || {}).forEach(h => {
                                    const mappingStr = (mappings[mapKey] || {})[h];
                                    if (mappingStr && !['품목코드', '품목명', '규격', '구매처'].includes(h)) {
                                        const val = extractValue(row, mappingStr);
                                        if (val !== '') {
                                            const isNumeric = NUMERIC_HEADERS.includes(masterLinks[mapKey]?.[h]) || NUMERIC_HEADERS.includes(h);
                                            mItem.sources[mapKey][h] = isNumeric ? parseNum(val) : val;
                                            if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNumeric ? parseNum(val) : val;
                                        }
                                    }
                                });
                            }
                            totalCount++;
                        });
                        if (mapKey !== 'master') { setSideTab('estimate'); setActiveSources([Object.keys(sourceKeyMap).find(key => sourceKeyMap[key] === mapKey) || '견적']); }
                    }
                    setMasterProducts(newMaster); setManagedItems(newManaged);
                    if(totalCount > 0) showToast(`✅ 데이터 병합 완료 (${totalCount}건)`);
                } catch(error) { setAlertMsg("❌ 파싱 오류 발생. 매핑 설정을 확인하세요."); }
                finally { e.target.value = ''; }
            };

            const handleResetMappings = () => {
                if(window.confirm("모든 설정이 초기화됩니다. 계속하시겠습니까?")) {

                    setVisibleMasterCols(getInitialVisibleMasterCols()); setVisibleUploadCols(getInitialVisibleUploadCols());

                }
            };

            const handleCloudSync = async (type) => {
                if (!cloudUrl) return setAlertMsg("매핑센터에서 Google Sheets 연동 URL을 설정해주세요.");
                showToast(`클라우드 ${type === 'upload' ? '전송' : '불러오기'} 시작...`);
                try {
                    if (type === 'upload') {
                        const payload = { type: "save", config: { masterCols: visibleMasterCols, uploadCols: visibleUploadCols, mappings, masterLinks, allTabConfig }, data: masterProducts };
                        const res = await fetch(cloudUrl, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error("Network Error"); showToast('✅ 클라우드 저장 성공');
                    } else {
                        const res = await fetch(cloudUrl, { method: 'GET' });
                        if (!res.ok) throw new Error("Network Error");
                        const result = await res.json();
                        if (result.config) {
                            if(result.config.masterCols) setVisibleMasterCols(result.config.masterCols);
                            if(result.config.uploadCols) setVisibleUploadCols(result.config.uploadCols);
                            if(result.config.mappings) setMappings(result.config.mappings);
                            if(result.config.masterLinks) setMasterLinks(result.config.masterLinks);
                            if(result.config.allTabConfig) setAllTabConfig(result.config.allTabConfig);
                        }
                        if (result.data) setMasterProducts(result.data); showToast('✅ 클라우드 불러오기 성공');
                    }
                } catch (error) { setAlertMsg("통신 오류 발생. URL을 확인하세요."); }
            };

            const handleCommitToMaster = () => {
                if (selectedRows.size === 0) return showToast('⚠️ 반영할 항목을 선택해주세요.');
                let newMaster = { ...masterProducts }, commitCount = 0;
                selectedRows.forEach(idx => {
                    const item = managedItems[idx];
                    if (!item.코드) return;
                    if (!newMaster[item.코드]) newMaster[item.코드] = { 코드: item.코드 };
                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const linked = masterLinks[activeProfileKey]?.[field] || (MASTER_HEADERS.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '' && item.finalData[field] !== '오류') {
                                newMaster[item.코드][linked] = NUMERIC_HEADERS.includes(linked) ? Number(item.finalData[field]) : item.finalData[field];
                            }
                        });
                    }
                    commitCount++;
                });
                setMasterProducts(newMaster); setSelectedRows(new Set()); showToast(`✅ ${commitCount}건 업데이트 완료.`);
            };

            const displayRows = useMemo(() => {
                let list = sideTab === 'manage' ? Object.values(masterProducts) : managedItems;
                if (debouncedSearch) {
                    const q = debouncedSearch.toLowerCase();
                    list = list.filter(i => {
                        const mItem = masterProducts[i.코드] || {};
                        const codeStr = String(i.코드 || '').toLowerCase();
                        if (codeStr.includes(q)) return true;

                        if (sideTab === 'manage') {
                            const mName = String(mItem['품목명'] || mItem['품명'] || '').toLowerCase();
                            const mVendor = String(mItem['구매처'] || '').toLowerCase();
                            return mName.includes(q) || mVendor.includes(q);
                        } else {
                            const sourcesToCheck = activeSources.length > 0 ? [sourceKeyMap[activeSources[0]]] : ['estimate', 'prev', 'in', 'out', 'sales'];
                            for (let key of sourcesToCheck) {
                                const src = i.sources?.[key] || {};
                                const sName = String(src['품목명'] || mItem['품목명'] || '').toLowerCase();
                                const sVendor1 = String(src['구매처'] || '').toLowerCase();
                                const sVendor2 = String(src['거래처명'] || '').toLowerCase();
                                if (sName.includes(q) || sVendor1.includes(q) || sVendor2.includes(q)) return true;
                            }
                            return false;
                        }
                    });
                }
                return list.sort((a, b) => {
                    const cA = String(a.코드 || ''), cB = String(b.코드 || '');
                    if (cA.substring(0, 6) !== cB.substring(0, 6)) return cA.substring(0, 6).localeCompare(cB.substring(0, 6));
                    return (parseInt(cA.substring(6), 10) || 0) - (parseInt(cB.substring(6), 10) || 0);
                });
            }, [masterProducts, managedItems, sideTab, debouncedSearch, activeSources]);

            const currentExportKey = activeSources.length === 0 ? 'all' : activeProfileKey;
            const currentExportTitle = activeSources.length === 0 ? '전체 (통합)' : DOC_TYPES[currentExportKey];

            const formatPrice = (val) => {
                if (val === "오류") return "오류";
                const num = Number(String(val).replace(/,/g, '')) || 0;
                return num > 0 ? num : '';
            };

            const hasValidPrice = (inVal, outVal) => {
                return inVal === "오류" || outVal === "오류" || (Number(String(inVal).replace(/,/g, '')) > 0) || (Number(String(outVal).replace(/,/g, '')) > 0);
            };

            const executeExport = (option) => {
                if (displayRows.length === 0) return setAlertMsg("내보낼 데이터가 없습니다.");
                setShowExportModal(false);

                if (option.type === 'excel') {
                    showToast(`⏳ [${option.title}] 생성을 준비 중입니다...`);
                    setTimeout(() => {
                        if (option.id === 'est_erp') {
                            let exportData = [];
                            exportData.push([
                                '품목코드', '입고가', '0', '출고가', '0', 'B단가', 'n', 
                                'A판매', 'n', 'B판매', 'n', '입고가', 'n', '지시사항', 'n', '1'
                            ]);

                            const createRowArr = (code, inPrice, outPrice, bPrice='', aSale='', bSale='', finalPrice='', instruction='') => {
                                if (!code) return null;
                                const outIn = formatPrice(inPrice);
                                const outOut = formatPrice(outPrice);
                                const outFinal = formatPrice(finalPrice) || outIn;

                                return [
                                    code, outIn, '0', outOut, '0', 
                                    bPrice !== '' && bPrice !== undefined ? bPrice : '', 'n', 
                                    aSale !== '' && aSale !== undefined ? aSale : '', 'n', 
                                    bSale !== '' && bSale !== undefined ? bSale : '', 'n', 
                                    outFinal, 'n', 
                                    instruction !== '' && instruction !== undefined ? instruction : '', 'n', 
                                    hasValidPrice(inPrice, outPrice) ? '1' : '' 
                                ];
                            };

                            displayRows.forEach(row => {
                                const mItem = masterProducts[row.코드] || {}; 
                                const final = row.finalData || {}; 
                                const source = row.sources?.[currentExportKey] || {};
                                
                                const pIn_raw = final['입고가'] !== undefined ? final['입고가'] : (source['입고가'] || mItem['입고가'] || '');
                                const pIn = Number(String(pIn_raw).replace(/,/g, '')) || 0;
                                
                                const bPrice = final['B단가'] !== undefined ? final['B단가'] : (source['B단가'] || '');
                                const aSale = final['A판매'] !== undefined ? final['A판매'] : (source['A판매'] || '');
                                const bSale = final['B판매'] !== undefined ? final['B판매'] : (source['B판매'] || '');
                                const instruction = final['지시사항'] !== undefined ? final['지시사항'] : (source['지시사항'] || '');

                                let calcOut = 0;
                                if (pIn > 0) {
                                    const outsrc = Number(mItem['외주비'] || source['외주비']) || 0;
                                    const exp = Number(mItem['경비'] || source['경비']) || 0;
                                    const labor = Number(mItem['노무비'] || source['노무비']) || 0;
                                    calcOut = Math.round(((pIn + outsrc + exp + labor) / 0.9) / 100) * 100;
                                }
                                
                                const pOut = calcOut > 0 ? calcOut : (final['출고가'] !== undefined ? final['출고가'] : (source['출고가'] || mItem['출고가'] || ''));

                                const pRow = createRowArr(row.코드, pIn, pOut, bPrice, aSale, bSale, pIn, instruction);
                                if (pRow) exportData.push(pRow);

                                const code1 = mItem['1종코드'] || source['1종코드'];
                                if (code1) {
                                    let in1 = ''; let out1 = '';
                                    const div1 = Number(mItem['1종연산'] || source['1종연산']) || 0;
                                    if (pIn > 0 && div1 > 0) {
                                        in1 = Math.round(((pIn / div1) * 1.15) / 100) * 100;
                                        out1 = Math.round((in1 / 0.85) / 100) * 100;
                                    } else {
                                        in1 = final['1입고'] || final['1구매'] || source['1입고'] || source['1구매'] || '';
                                        out1 = final['1출고'] || source['1출고'] || '';
                                        if (!in1 && !out1) in1 = "오류";
                                    }
                                    const row1 = createRowArr(code1, in1, out1, '', '', '', in1, '');
                                    if (row1) exportData.push(row1);
                                }

                                const code2 = mItem['2종코드'] || source['2종코드'];
                                if (code2) {
                                    let in2 = ''; let out2 = '';
                                    const div2 = Number(mItem['2종연산'] || source['2종연산']) || 0;
                                    if (pIn > 0 && div2 > 0) {
                                        in2 = Math.round(((pIn / div2) * 1.15) / 100) * 100;

                                    } else {

                                        out2 = final['2출고'] || source['2출고'] || '';
                                        if (!in2 && !out2) in2 = "오류";
                                    }
                                    const row2 = createRowArr(code2, in2, out2, '', '', '', in2, '');

                                }
                            });

                            const ws = window.XLSX.utils.aoa_to_sheet(exportData); 
                            const wb = window.XLSX.utils.book_new();
                            window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); 
                            window.XLSX.writeFile(wb, `${option.title}_${new Date().toISOString().slice(0,10)}.xlsx`);

                        } else {
                            let exportData = [];
                            displayRows.forEach(row => {
                                const mItem = masterProducts[row.코드] || {}; const final = row.finalData || {}; const source = row.sources?.[currentExportKey] || {};
                                const dName = source['품목명'] || mItem['품목명'] || ''; const dSpec = source['규격'] || mItem['규격'] || '';
                                let rowData = {};
                                if (option.id === 'all_erp') {
                                    rowData = { '1코드': mItem['1코드'] || '', '2코드': mItem['2코드'] || '', '품목코드': row.코드, '품목명': dName, '규격': dSpec, '입고가(매입)': final['입고가'] || final['입고'] || mItem['입고가'] || 0, '출고가(매출)': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '거래처명': source['구매처'] || source['거래처명'] || mItem['구매처'] || '' };
                                } else if (option.id === 'est_shop') {
                                    rowData = { '상품코드': row.코드, '상품명': dName, '옵션': dSpec, '정상가': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '판매가(행사가)': final['A판매'] || final['출고'] || mItem['출고가'] || 0, '재고상태': '판매중' };
                                } else { rowData = { '품목코드': row.코드, '품목명': dName, '규격': dSpec }; }
                                exportData.push(rowData);

                            const ws = window.XLSX.utils.json_to_sheet(exportData);

                            window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); 
                            window.XLSX.writeFile(wb, `${option.title}_${new Date().toISOString().slice(0,10)}.xlsx`);
                        }
                        
                        showToast(`✅ [${option.title}] 엑셀 다운로드가 완료되었습니다.`);
                    }, 500);
                } 
                else if (option.type === 'copy') {
                    let copyText = `[도매 단가 공지 - ${new Date().toLocaleDateString()}]\n`; let currentVendor = '';
                    const sortedForCopy = [...displayRows].sort((a,b) => {
                        const vendorA = (a.sources?.[currentExportKey]?.['구매처'] || a.sources?.[currentExportKey]?.['거래처명'] || masterProducts[a.코드]?.구매처 || '기타');
                        const vendorB = (b.sources?.[currentExportKey]?.['구매처'] || b.sources?.[currentExportKey]?.['거래처명'] || masterProducts[b.코드]?.구매처 || '기타');
                        return vendorA.localeCompare(vendorB);
                    });
                    sortedForCopy.forEach(row => {
                        const mItem = masterProducts[row.코드] || {}; const source = row.sources?.[currentExportKey] || {};
                        const dName = source['품목명'] || mItem['품목명'] || ''; const dSpec = source['규격'] || mItem['규격'] || '';

                    });
                    const textarea = document.createElement('textarea'); textarea.value = copyText; document.body.appendChild(textarea); textarea.select();
                    try { document.execCommand('copy'); showToast('✅ 단가 공지 내용이 클립보드에 복사되었습니다. 카톡에 바로 붙여넣기(Ctrl+V) 하세요.'); } 
                    catch (err) { setAlertMsg('클립보드 복사에 실패했습니다. 브라우저 설정을 확인해주세요.'); } 
                    finally { document.body.removeChild(textarea); }
                }
                else if (option.type === 'print') {

                                                                    {(visibleUploadCols[activeProfileKey]||[]).map(h => renderUploadEditableCell(row, idx, h, activeProfileKey, `r-p-f-${h}`))}
                                                                </>
                                                            )
                                                        )}
                                                    </tr>
                                                );
                                            })}
                                            <tr><td colSpan="50" className="h-[200px] bg-slate-50/50 border-t border-slate-200"></td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Export Modal 컴포넌트 호출 */}
                    {showExportModal && (
                        <ExportModal 
                            onClose={() => setShowExportModal(false)}
                            displayRows={displayRows}
                            currentExportKey={currentExportKey}
                            currentExportTitle={currentExportTitle}
                            executeExport={executeExport}
                        />
                    )}

                    {/* Mapping Center Modal 컴포넌트 호출 */}
                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)}
                            cloudUrl={cloudUrl} setCloudUrl={setCloudUrl}
                            mappingMainTab={mappingMainTab} setMappingMainTab={setMappingMainTab}
                            mappingFileTab={mappingFileTab} setMappingFileTab={setMappingFileTab}
                            visibleMasterCols={visibleMasterCols} toggleMasterCol={toggleMasterCol}
                            visibleUploadCols={visibleUploadCols} setVisibleUploadCols={setVisibleUploadCols}
                            mappings={mappings} setMappings={setMappings}
                            masterLinks={masterLinks} setMasterLinks={setMasterLinks}
                            allTabConfig={allTabConfig} setAllTabConfig={setAllTabConfig}
                            handleCloudSync={handleCloudSync} handleResetMappings={handleResetMappings} showToast={showToast}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
