<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - System Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 공통 컴포넌트 ---
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { 
                const t = setInterval(() => setTime(new Date()), 1000); 
                return () => clearInterval(t); 
            }, []);
            return (
                <div className="text-[12px] text-slate-400 font-mono tracking-wide flex items-center mt-0.5">
                    <i className="far fa-clock mr-1.5 text-emerald-400 opacity-80"></i>
                    {`${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`}
                </div>
            );
        };

        const FileBox = ({ title, icon, expectedType, onUpload }) => {
            const fileRef = useRef(null);
            return (
                <div 
                    className="relative border border-slate-700 bg-slate-800 hover:bg-slate-700 rounded-lg transition-all cursor-pointer flex items-center h-10 w-32 shrink-0 px-3 shadow-md group"
                    onClick={() => fileRef.current?.click()}
                >
                    <input type="file" ref={fileRef} className="hidden" multiple onChange={(e) => onUpload(e, expectedType)} accept=".xlsx, .xls, .csv" />
                    <div className="flex flex-col justify-center flex-1 pr-2 z-10 overflow-hidden">
                        <span className="text-[10px] font-black text-slate-400 mb-0.5 whitespace-nowrap">{title}</span>
                        <span className="text-[9px] font-bold text-slate-300 truncate group-hover:text-white transition-colors">업로드</span>
                    </div>
                    <i className={`fas ${icon} absolute right-2 text-lg text-slate-500 opacity-30 group-hover:opacity-60 transition-opacity`}></i>
                </div>
            );
        };

        // [시스템 기준 마스터 항목 36종]
        const MASTER_HEADERS = [
            "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "입고가", "출고가", "도매가", "전송가", "창고가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "입고가", "출고가", "도매가", "전송가", "창고가", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "준비기간", "마감시간"
        ];

        const DOC_TYPES = {
            'estimate': '견적서',
            'prev': '재고장',
            'in': '입고장',
            'out': '주문서',
            'sales': '판매현황'
        };

        const getInitialVisibleMasterCols = () => ({
            master: ['입고가', '출고가', '구매처', '간단설명'],
            estimate: ['입고가', '출고가'],
            prev: ['안전재고'],
            in: ['입고가'],
            out: ['출고가'],
            sales: ['출고가']
        });

        const getInitialVisibleUploadCols = () => ({
            // 섹션 B 백지화 원칙 적용: 엑셀 파일 실물 항목 기준 초기값
            estimate: ['거래처명', '지시사항', '입고', '출고', '입고2 (전송)', '도매1 (전송)', '도매2 (전송)', '상품정보', '1종코드', '1구매', '1출고', '2종코드', '2구매', '2출고'],
            prev: ['안전재고', '구매처', '간단설명'],
            in: ['입고가', '구매처', '간단설명'],
            out: ['출고가', '구매처', '간단설명'],
            sales: ['출고가', '구매처', '간단설명']
        });

        const getInitialMappings = () => {
            const base = {};
            ['master', 'estimate', 'prev', 'in', 'out', 'sales'].forEach(tab => base[tab] = {});
            base.estimate = {
                '품목코드': '품목코드', '품목명': '품목명', '규격': '규격',
                '거래처명': '거래처명', '지시사항': '지시사항', '입고': '입고', '출고': '출고',
                '입고2 (전송)': '입고2 (전송)', '도매1 (전송)': '도매1 (전송)', '도매2 (전송)': '도매2 (전송)',
                '상품정보': '상품정보', '1종코드': '1종코드', '1구매': '1구매', '1출고': '1출고',
                '2종코드': '2종코드', '2구매': '2구매', '2출고': '2출고'
            };
            return base;
        };

        const getInitialMasterLinks = () => {
            const base = {};
            ['master', 'estimate', 'prev', 'in', 'out', 'sales'].forEach(tab => base[tab] = {});
            base.estimate = {
                // 커스텀 항목 -> 마스터 덮어쓰기 맵핑
                '거래처명': '구매처',
                '입고': '입고가',
                '출고': '출고가',
                '입고2 (전송)': '전송가',
                '도매1 (전송)': '도매가',
                '도매2 (전송)': '도매가', 
                '1종코드': '1종코드',
                '1구매': '1종연산',
                '2종코드': '2종코드',
                '2구매': '2종연산',
                // 지시사항, 상품정보 등은 연결 안함 ('')
            };
            ['prev', 'in', 'out', 'sales'].forEach(tab => {
                base[tab] = { '안전재고': '안전재고', '입고가': '입고가', '출고가': '출고가', '구매처': '구매처', '간단설명': '간단설명' }
            });
            return base;
        };

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'w-[80px] min-w-[80px] max-w-[80px]';
            if (h === '구매처' || h === '거래처명') return 'w-[100px] min-w-[100px] max-w-[100px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보') return 'w-[140px] min-w-[140px] max-w-[140px]';
            return 'w-[110px] min-w-[110px] max-w-[110px]';
        };

        const previewDummyRow = {
            코드: 'SAMPLE-001', 품목명: '[예시] 프리미엄 원두 세트', 규격: '500g x 2',
            입고가: 18000, 출고가: 25000, 구매처: '커피컴퍼니', 간단설명: '가을 시즌 한정판', 안전재고: 100, 전송가: 22000, 도매가: 20000,
            sources: {
                estimate: { '입고': 18000, '출고': 25000, '거래처명': '커피컴퍼니', '지시사항': '가을 한정판 (파일)', '할인율': '10%', '입고2 (전송)': 22000, '도매1 (전송)': 20000 },
                prev: { '안전재고': 95, '구매처': '커피컴퍼니', '간단설명': '정상' },
                in: { '입고가': 18500, '구매처': '커피컴퍼니', '간단설명': '단가인상' },
                out: { '출고가': 25000, '구매처': '커피컴퍼니', '간단설명': '요청' },
                sales: { '출고가': 24000, '구매처': '커피컴퍼니', '간단설명': '이벤트 할인가' }
            },
            finalData: { '입고': 18000, '출고': 25000 }
        };

        const App = () => {
            // 상태 저장소 (버전 v562로 마이그레이션)
            const [masterProducts, setMasterProducts] = useState(() => {
                const saved = localStorage.getItem('merchMaster_v562');
                return saved ? JSON.parse(saved) : {};
            });
            
            const [managedItems, setManagedItems] = useState([]);
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('merchCloudUrl_v562') || '');

            const [docOrder, setDocOrder] = useState(() => {
                const saved = localStorage.getItem('merchDocOrder_v562');
                return saved ? JSON.parse(saved) : ['estimate', 'prev', 'in', 'out', 'sales'];
            });

            const [visibleMasterCols, setVisibleMasterCols] = useState(() => {
                const saved = localStorage.getItem('merchVisMaster_v562');
                return saved ? JSON.parse(saved) : getInitialVisibleMasterCols();
            });

            const [visibleUploadCols, setVisibleUploadCols] = useState(() => {
                const saved = localStorage.getItem('merchVisUpload_v562');
                return saved ? JSON.parse(saved) : getInitialVisibleUploadCols();
            });

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('merchMappings_v562');
                return saved ? JSON.parse(saved) : getInitialMappings();
            });

            const [masterLinks, setMasterLinks] = useState(() => {
                const saved = localStorage.getItem('merchMasterLinks_v562');
                return saved ? JSON.parse(saved) : getInitialMasterLinks();
            });

            const [sideTab, setSideTab] = useState('manage'); 
            const [searchInputVal, setSearchInputVal] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            
            const [mappingMainTab, setMappingMainTab] = useState('master');
            const [mappingFileTab, setMappingFileTab] = useState('all');
            const [customColInput, setCustomColInput] = useState('');
            
            const [activeSources, setActiveSources] = useState([]);
            const sourceKeyMap = { '견적': 'estimate', '재고': 'prev', '입고': 'in', '주문': 'out', '판매': 'sales' };
            const activeProfileKey = activeSources.length > 0 ? sourceKeyMap[activeSources[0]] : 'estimate';
            
            // 커스텀 열 목록 추출
            const customColsToRender = sideTab !== 'manage' 
                ? (visibleUploadCols[activeProfileKey] || []).filter(h => !MASTER_HEADERS.includes(h) && !['품목코드', '품목명', '규격'].includes(h))
                : [];

            useEffect(() => {
                localStorage.setItem('merchMaster_v562', JSON.stringify(masterProducts));
                localStorage.setItem('merchDocOrder_v562', JSON.stringify(docOrder));
                localStorage.setItem('merchVisMaster_v562', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v562', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v562', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v562', JSON.stringify(masterLinks));
                localStorage.setItem('merchCloudUrl_v562', cloudUrl);
            }, [masterProducts, docOrder, visibleMasterCols, visibleUploadCols, mappings, masterLinks, cloudUrl]);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const toggleMasterCol = (tabId, header) => {
                setVisibleMasterCols(prev => {
                    const list = prev[tabId] || [];
                    return { ...prev, [tabId]: list.includes(header) ? list.filter(h => h !== header) : [...list, header] };
                });
            };

            const addCustomUploadCol = () => {
                if(!customColInput.trim()) return;
                const val = customColInput.trim();
                
                if ((visibleUploadCols[mappingFileTab] || []).includes(val)) {
                    showToast('⚠️ 이미 추가된 항목입니다.');
                    return;
                }
                
                setVisibleUploadCols(prev => ({ ...prev, [mappingFileTab]: [...(prev[mappingFileTab] || []), val] }));
                setMappings(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [val]: val } }));
                setMasterLinks(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [val]: '' } }));
                setCustomColInput('');
            };

            const removeUploadCol = (tabId, colName) => {
                setVisibleUploadCols(prev => ({
                    ...prev,
                    [tabId]: (prev[tabId] || []).filter(h => h !== colName)
                }));
            };

            const moveDocOrder = (idx, direction) => {
                const newOrder = [...docOrder];
                if (direction === 'up' && idx > 0) {
                    [newOrder[idx - 1], newOrder[idx]] = [newOrder[idx], newOrder[idx - 1]];
                } else if (direction === 'down' && idx < newOrder.length - 1) {
                    [newOrder[idx + 1], newOrder[idx]] = [newOrder[idx], newOrder[idx + 1]];
                }
                setDocOrder(newOrder);
            };

            const handleResetMappings = () => {
                if(window.confirm("모든 매핑, 순서 및 노출 설정이 초기화됩니다. 계속하시겠습니까?")) {
                    setMappings(getInitialMappings());
                    setMasterLinks(getInitialMasterLinks());
                    setVisibleMasterCols(getInitialVisibleMasterCols());
                    setVisibleUploadCols(getInitialVisibleUploadCols());
                    setDocOrder(['estimate', 'prev', 'in', 'out', 'sales']);
                    showToast("✅ 매핑 키워드 및 노출 프로필이 기본값으로 복원되었습니다.");
                }
            };

            const handleCloudSync = async (type) => {
                if (!cloudUrl) {
                    setAlertMsg("매핑센터에서 Google Sheets 델타 연동 URL을 설정해주세요.");
                    setShowSettings(true);
                    setMappingMainTab('master');
                    return;
                }
                
                showToast(`클라우드 ${type === 'upload' ? '전송' : '불러오기'} 작업을 시작합니다...`);

                try {
                    if (type === 'upload') {
                        const payload = {
                            type: "save",
                            config: {
                                masterCols: visibleMasterCols,
                                uploadCols: visibleUploadCols,
                                mappings: mappings,
                                masterLinks: masterLinks,
                                docOrder: docOrder
                            },
                            data: masterProducts
                        };
                        const response = await fetch(cloudUrl, { method: 'POST', body: JSON.stringify(payload) });
                        if (response.ok) showToast('✅ 데이터가 클라우드에 성공적으로 영구 저장되었습니다.');
                        else throw new Error("네트워크 오류");
                    } else {
                        const response = await fetch(cloudUrl, { method: 'GET' });
                        if(!response.ok) throw new Error("네트워크 오류");
                        const result = await response.json();
                        
                        if(result.config) {
                            if(result.config.masterCols) setVisibleMasterCols(result.config.masterCols);
                            if(result.config.uploadCols) setVisibleUploadCols(result.config.uploadCols);
                            if(result.config.mappings) setMappings(result.config.mappings);
                            if(result.config.masterLinks) setMasterLinks(result.config.masterLinks);
                            if(result.config.docOrder) setDocOrder(result.config.docOrder);
                        }
                        if(result.data) {
                            setMasterProducts(result.data);
                        }
                        showToast('✅ 클라우드에서 최신 데이터를 불러왔습니다.');
                    }
                } catch (error) {
                    console.error("Cloud Sync Error:", error);
                    setAlertMsg("클라우드 서버 통신 중 오류가 발생했습니다. URL 및 권한을 확인해주세요.");
                }
            };

            const handleCommitToMaster = () => {
                if (selectedRows.size === 0) {
                    showToast('⚠️ 반영할 항목을 좌측 체크박스로 선택해주세요.');
                    return;
                }

                let newMaster = { ...masterProducts };
                let commitCount = 0;

                selectedRows.forEach(idx => {
                    const item = managedItems[idx];
                    const code = item.코드;
                    if (!code) return;
                    
                    if (!newMaster[code]) newMaster[code] = { 코드: code };
                    
                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const val = item.finalData[field];
                            // 마스터 링크가 있거나, 필드 이름 자체가 마스터 속성인 경우 저장
                            const linkedMasterField = masterLinks[activeProfileKey]?.[field] || (MASTER_HEADERS.includes(field) ? field : null);

                            if (linkedMasterField && val !== undefined && val !== '') {
                                newMaster[code][linkedMasterField] = NUMERIC_HEADERS.includes(linkedMasterField) ? Number(val) : val;
                            }
                        });
                    }
                    commitCount++;
                });

                setMasterProducts(newMaster);
                setSelectedRows(new Set()); 
                showToast(`✅ ${commitCount}건의 데이터가 마스터에 업데이트 되었습니다.`);
                if (cloudUrl) handleCloudSync('upload');
            };

            const handleInlineEdit = (idx, field, value) => {
                const newItems = [...managedItems];
                newItems[idx] = { 
                    ...newItems[idx], 
                    finalData: { ...(newItems[idx].finalData || {}), [field]: value }
                };
                setManagedItems(newItems);
            };

            const toggleRowSelect = (idx) => {
                const next = new Set(selectedRows);
                if (next.has(idx)) next.delete(idx);
                else next.add(idx);
                setSelectedRows(next);
            };

            const toggleAllRows = () => {
                if (selectedRows.size === displayRows.length && displayRows.length > 0) {
                    setSelectedRows(new Set());
                } else {
                    const next = new Set();
                    displayRows.forEach((_, idx) => next.add(idx));
                    setSelectedRows(next);
                }
            };

            const parseNum = (v) => {
                if (!v) return 0;
                return Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
            };

            const extractValue = (row, mappingStr) => {
                if (!mappingStr) return '';
                const keywords = mappingStr.split(',').map(s => s.trim().toLowerCase().replace(/\s/g, ''));
                const rowKeys = Object.keys(row);
                for (let kw of keywords) {
                    if (!kw) continue;
                    const foundKey = rowKeys.find(k => String(k).toLowerCase().replace(/\s/g, '').includes(kw));
                    if (foundKey && row[foundKey] !== undefined && row[foundKey] !== '') {
                        return row[foundKey];
                    }
                }
                return '';
            };

            const parseExcelRobust = (file) => {
                return new Promise((resolve, reject) => {
                    if (!window.XLSX) {
                        reject(new Error("엑셀 파서가 로드되지 않았습니다."));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const wb = window.XLSX.read(e.target.result, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                        
                        let headerRowIdx = 0;
                        for (let i = 0; i < Math.min(10, jsonAll.length); i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('단가') || rowStr.includes('입고가')) {
                                headerRowIdx = i;
                                break;
                            }
                        }

                        const headers = jsonAll[headerRowIdx];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr) { endIdx--; continue; }
                            
                            const filledCount = rowArr.filter(cell => cell !== undefined && cell !== null && String(cell).trim() !== '').length;
                            const rawStr = rowArr.join('').replace(/\s/g, '');
                            
                            if (rawStr === '') { endIdx--; continue; }
                            
                            const isFooter = (
                                rawStr.includes('출력') || rawStr.includes('시간') || 
                                rawStr.includes('일시') || rawStr.includes('합계') || 
                                rawStr.includes('총계') || /20\d{2}[\/\-]\d{2}/.test(rawStr) || /오전|오후/.test(rawStr)
                            ) && filledCount <= 4; 
                            
                            if (isFooter) endIdx--; else break; 
                        }

                        const data = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const rowArr = jsonAll[i];
                            if (!rowArr || rowArr.join('').trim() === '') continue;
                            const obj = {};
                            headers.forEach((h, idx) => {
                                if (h) obj[h] = rowArr[idx];
                            });
                            data.push(obj);
                        }
                        resolve(data);
                    };
                    reader.readAsBinaryString(file);
                });
            };

            const handleFileUpload = async (e, expectedType) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                if (!window.XLSX) {
                    setAlertMsg("엑셀 파서 라이브러리를 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                    e.target.value = '';
                    return;
                }

                try {
                    let newMaster = { ...masterProducts };
                    let newManaged = [...managedItems];
                    let totalCount = 0;

                    for (const file of files) {
                        const name = file.name.toLowerCase();
                        let mapKey = expectedType;
                        
                        if (!mapKey) {
                            const isEstimate = name.includes('견적');
                            const isSales = name.includes('판매');
                            const isPrev = name.includes('재고');
                            const isIn = name.includes('입고');
                            const isOut = name.includes('주문') || name.includes('발주');
                            const isMaster = name.includes('마스터') || name.includes('상품정보') || name.includes('상품') || name.includes('품목');
                            mapKey = isSales ? 'sales' : isEstimate ? 'estimate' : isPrev ? 'prev' : isIn ? 'in' : isOut ? 'out' : isMaster ? 'master' : null;
                        }

                        if (!mapKey) {
                            setAlertMsg(`[${file.name}] 인식할 수 없는 파일명입니다.`);
                            continue;
                        }

                        const data = await parseExcelRobust(file);

                        // --- Auto-Popup 일치율 체크 ---
                        if (mapKey !== 'master' && data.length > 0) {
                            const headers = Object.keys(data[0]);
                            const curMap = mappings[mapKey] || {};
                            
                            const keywordsToMatch = Object.keys(curMap)
                                .filter(k => !['품목코드', '품목명', '규격'].includes(k))
                                .map(k => curMap[k].split(',')[0].trim().replace(/\s/g, ''))
                                .filter(kw => kw);

                            if (keywordsToMatch.length > 0) {
                                const matchCount = keywordsToMatch.filter(kw => 
                                    headers.some(h => String(h).replace(/\s/g, '').includes(kw))
                                ).length;
                                
                                const matchRate = (matchCount / keywordsToMatch.length) * 100;
                                
                                if (matchRate < 30) {
                                    setAlertMsg(`🚨 새로운 문서 양식이 감지되었습니다.\n업로드한 파일 [${file.name}]와 기존 매핑 키워드 간의 일치율이 30% 미만입니다. 매핑 키워드를 확인해주세요.`);
                                    setShowSettings(true);
                                    setMappingMainTab('operation');
                                    setMappingFileTab(mapKey);
                                    e.target.value = ''; 
                                    return; 
                                }
                            }
                        }

                        let fileCount = 0;
                        const curMap = mappings[mapKey] || {};

                        data.forEach(row => {
                            const codeMap = curMap['품목코드'] || '품목코드, 1코드, 2코드, 코드';
                            const code = extractValue(row, codeMap);
                            
                            if (!code) return;
                            const codeStr = String(code).replace(/\s/g, '');
                            if (codeStr.includes('출력') || codeStr.includes('합계') || codeStr.includes('총계')) return;
                            
                            if (mapKey === 'master') {
                                if (!newMaster[code]) newMaster[code] = { 코드: code };
                                const p = newMaster[code];
                                
                                MASTER_HEADERS.forEach(h => {
                                    let val = row[h];
                                    if (h === '외주비' && val === undefined) val = row['외주비0']; 
                                    if (val !== undefined && val !== '') {
                                        p[h] = NUMERIC_HEADERS.includes(h) ? parseNum(val) : val;
                                    }
                                });
                            } 
                            else {
                                let mItem = newManaged.find(m => m.코드 === code);
                                if (!mItem) {
                                    mItem = { 코드: code, sources: {}, finalData: {} };
                                    newManaged.push(mItem);
                                }

                                const qtyStr = extractValue(row, curMap['수량']);
                                const qty = parseNum(qtyStr);
                                if (qty) {
                                    if (mapKey === 'estimate') mItem.견적수량 = (mItem.견적수량 || 0) + qty;
                                    if (mapKey === 'prev') mItem.재고 = (mItem.재고 || 0) + qty;
                                    if (mapKey === 'in') mItem.입고수량 = (mItem.입고수량 || 0) + qty;
                                    if (mapKey === 'out') mItem.주문수량 = (mItem.주문수량 || 0) + qty;
                                    if (mapKey === 'sales') mItem.판매수량 = (mItem.판매수량 || 0) + qty;
                                }

                                if (!mItem.sources[mapKey]) mItem.sources[mapKey] = {};
                                
                                // 오직 매핑센터 섹션 B에 정의된 항목들만 추출
                                const targetCols = visibleUploadCols[mapKey] || [];
                                
                                targetCols.forEach(h => {
                                    const mappingStr = curMap[h];
                                    if (mappingStr) {
                                        const val = extractValue(row, mappingStr);
                                        if (val !== '') {
                                            const linkedField = masterLinks[mapKey]?.[h];
                                            const isNumeric = NUMERIC_HEADERS.includes(linkedField) || NUMERIC_HEADERS.includes(h);
                                            
                                            const parsedVal = isNumeric ? parseNum(val) : val;
                                            mItem.sources[mapKey][h] = parsedVal;
                                            if (mItem.finalData[h] === undefined) {
                                                mItem.finalData[h] = parsedVal;
                                            }
                                        }
                                    }
                                });
                            }
                            fileCount++;
                        });
                        
                        totalCount += fileCount;
                        if (mapKey !== 'master') {
                            setSideTab('estimate');
                            const targetSource = mapKey === 'estimate' ? '견적' : mapKey === 'prev' ? '재고' : mapKey === 'in' ? '입고' : mapKey === 'out' ? '주문' : '판매';
                            if (!activeSources.includes(targetSource)) {
                                setActiveSources([targetSource]); 
                            }
                        }
                    }
                    
                    setMasterProducts(newMaster);
                    setManagedItems([...newManaged]); 
                    if(totalCount > 0) showToast(`✅ 데이터 병합 완료 (${totalCount}건)`);
                } catch(error) {
                    console.error(error);
                    setAlertMsg("❌ 파싱 중 오류가 발생했습니다. 헤더 매핑 설정을 확인해주세요.");
                } finally { 
                    e.target.value = ''; 
                }
            };

            const displayRows = useMemo(() => {
                let list = sideTab === 'manage' ? Object.values(masterProducts) : managedItems;
                
                if (searchInputVal) {
                    const q = searchInputVal.toLowerCase();
                    list = list.filter(i => {
                        const mItem = masterProducts[i.코드] || {};
                        let foundName = false;
                        if (sideTab !== 'manage' && activeSources.length > 0) {
                            const srcKey = sourceKeyMap[activeSources[0]];
                            foundName = (i.sources?.[srcKey]?.['품목명'] || '').toLowerCase().includes(q);
                        }
                        const name = foundName || mItem['품목명'] || mItem['품명'] || '';
                        return name.toLowerCase().includes(q) || (i.코드||'').toLowerCase().includes(q);
                    });
                }

                const sortedList = [...list];
                sortedList.sort((a, b) => {
                    const codeA = String(a.코드 || '');
                    const codeB = String(b.코드 || '');
                    const catA = codeA.substring(0, 6);
                    const catB = codeB.substring(0, 6);
                    if (catA !== catB) return catA.localeCompare(catB);
                    const serialA = parseInt(codeA.substring(6), 10) || 0;
                    const serialB = parseInt(codeB.substring(6), 10) || 0;
                    return serialA - serialB;
                });

                return sortedList;
            }, [masterProducts, managedItems, sideTab, searchInputVal, activeSources]);

            // 단일 문서 렌더링 헬퍼 (마스터 대조군 + 파일 실물군 완전 분리 렌더링)
            const renderDocColumns = (row, idx, mapKey, isPreview = false) => {
                const targetRow = isPreview ? previewDummyRow : row;
                const cells = [];
                
                // 1. [M] 마스터 대조 지정 컬럼 (Section A)
                (visibleMasterCols[mapKey] || []).forEach(h => {
                    cells.push(renderMasterReferenceCell(targetRow, h, `${mapKey}-mr-${h}`));
                });

                // 2. [F] 개별 파일 항목 컬럼 (Section B)
                (visibleUploadCols[mapKey] || []).forEach(h => {
                    cells.push(renderUploadEditableCell(targetRow, idx, h, mapKey, `${mapKey}-ue-${h}`));
                });

                return cells;
            };

            const renderMasterManageCell = (row, field, keyPrefix) => {
                const val = row[field];
                const isNumeric = NUMERIC_HEADERS.includes(field);
                return (
                    <td key={keyPrefix || `mm-${field}`} className={`px-2 py-1.5 border-r border-slate-200 text-slate-700 truncate ${getCellWidthClass(field)} ${isNumeric ? 'text-right font-bold' : ''}`} title={val}>
                        {val !== undefined && val !== '' ? (isNumeric ? Number(val).toLocaleString() : val) : '-'}
                    </td>
                );
            };

            const renderMasterReferenceCell = (row, field, keyPrefix) => {
                const masterItem = masterProducts[row.코드] || row; 
                const val = masterItem[field];
                const isNumeric = NUMERIC_HEADERS.includes(field);
                return (
                    <td key={keyPrefix || `mr-${field}`} className={`px-2 py-1.5 border-r border-slate-200 bg-slate-100/60 text-slate-500 truncate ${getCellWidthClass(field)} ${isNumeric ? 'text-right font-medium' : ''}`} title={val}>
                        {val !== undefined && val !== '' ? (isNumeric ? Number(val).toLocaleString() : val) : '-'}
                    </td>
                );
            };

            const renderUploadEditableCell = (row, idx, field, activeProfile, keyPrefix) => {
                // 마스터 덮어쓰기 설정값 참조
                const linkedMasterField = masterLinks[activeProfile]?.[field];
                const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                const cellWidthClass = getCellWidthClass(linkedMasterField || field);
                
                const sourceData = row.sources?.[activeProfile] || {};
                const uploadVal = sourceData[field];
                const finalVal = row.finalData?.[field];
                const displayFinal = finalVal !== undefined ? finalVal : (uploadVal !== undefined ? uploadVal : '');

                // 마스터 대조 렌더링 및 차이값 하이라이트 (연결된 마스터 항목 기준)
                const mVal = linkedMasterField ? (masterProducts[row.코드]?.[linkedMasterField]) : undefined;
                const isDiff = linkedMasterField && mVal !== undefined && uploadVal !== undefined && String(mVal) !== String(uploadVal) && isNumeric;

                return (
                    <td key={keyPrefix || `ue-${field}`} className={`px-1 py-1 border-r border-slate-200 z-0 relative transition-colors ${cellWidthClass} ${isDiff ? 'bg-amber-50/30' : 'bg-white'}`}>
                        <div className="flex flex-col justify-center h-full w-full overflow-hidden">
                            <input
                                type={isNumeric ? "number" : "text"}
                                className={`w-full bg-transparent border-transparent hover:bg-slate-50 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 rounded px-1.5 py-1 text-[12px] text-slate-800 outline-none transition-all cursor-text ${isNumeric ? 'text-right font-bold' : 'truncate'} ${isDiff ? 'text-indigo-700' : ''}`}
                                value={displayFinal}
                                placeholder={uploadVal !== undefined ? uploadVal : (mVal || '')}
                                onChange={(e) => handleInlineEdit(idx, field, e.target.value)}
                                title={displayFinal || uploadVal || mVal}
                            />
                        </div>
                    </td>
                );
            };

            // 통합(전체) 뷰 헤더 렌더링 헬퍼 (마스터/파일 분리 반영)
            const renderDocHeaders = (mapKey) => {
                const headers = [];
                
                // 1. [M] 마스터 대조 지정 헤더
                (visibleMasterCols[mapKey] || []).forEach(h => {
                    headers.push(
                        <th key={`${mapKey}-preview-mr-${h}`} className={`sticky top-0 z-30 bg-blue-50/50 px-2 py-3 border-r border-b border-blue-100 text-center text-blue-700 font-black ${getCellWidthClass(h)} truncate shadow-inner`}>
                            <div className="text-[9px] text-blue-400 mb-0.5 leading-none font-bold">[{DOC_TYPES[mapKey]}]</div>
                            <span className="text-[10px] mr-1 opacity-70">[M]</span>{h}
                        </th>
                    );
                });

                // 2. [F] 개별 파일 항목 헤더
                (visibleUploadCols[mapKey] || []).forEach(h => {
                    const kw = mappings[mapKey]?.[h] ? mappings[mapKey][h].split(',')[0] : '';
                    const link = masterLinks[mapKey]?.[h];
                    headers.push(
                        <th key={`${mapKey}-preview-ue-${h}`} className={`sticky top-0 z-30 bg-white px-2 py-2 border-r border-b border-slate-200 text-center text-slate-800 font-bold ${getCellWidthClass(link || h)} truncate`}>
                            <div className="text-[9px] text-indigo-400 mb-0.5 leading-none font-bold">[{DOC_TYPES[mapKey]}]</div>
                            <div className="flex flex-col items-center">
                                <span>{h}</span>
                                {kw && <span className="text-[9px] font-normal text-indigo-500 mt-0.5 w-full truncate px-1"><i className="fas fa-link mr-1"></i>{kw}</span>}
                                {link && <span className="text-[9px] font-bold text-rose-500 mt-0.5 w-full truncate px-1 opacity-80" title={`마스터 [${link}]에 덮어쓰기 됨`}>➔ {link}</span>}
                            </div>
                        </th>
                    );
                });
                return headers;
            };

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; }
                        ::-webkit-scrollbar-track { background: transparent; }
                        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
                        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        
                        .fade-in { animation: fadeIn 0.3s ease-out; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

                        .config-chip {
                            cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px 14px;
                            background: #ffffff; border: 1px solid #e2e8f0; border-radius: 9999px; transition: all 0.2s;
                            color: #64748b; font-size: 12px; white-space: nowrap;
                        }
                        .config-chip:hover { border-color: #cbd5e1; background: #f8fafc; }
                        .config-chip.active { background: #e0e7ff; border-color: #818cf8; color: #4338ca; font-weight: 600; box-shadow: none; }
                        
                        input[type=number]::-webkit-inner-spin-button, 
                        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                    `}</style>
                    
                    {alertMsg && (
                        <div className="fixed top-6 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-start gap-3 animate-[fadeIn_0.3s_ease-out] font-bold text-sm border border-slate-700">
                            <i className="fas fa-exclamation-circle text-rose-400 text-lg mt-0.5"></i>
                            <span className="whitespace-pre-line leading-relaxed">{alertMsg}</span>
                            <button onClick={() => setAlertMsg('')} className="ml-4 text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                        </div>
                    )}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-out] font-bold text-sm border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400 text-lg"></i>
                            {toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1440px] h-full flex flex-col bg-slate-50 shadow-2xl border-x border-slate-200 overflow-hidden">
                        
                        <header className="shrink-0 h-[60px] bg-white border-b border-slate-200 w-full px-6 flex justify-between items-center z-50">
                            <div className="flex items-center cursor-pointer group">
                                <span className="text-2xl font-black text-indigo-600 tracking-tighter mr-3 group-hover:text-indigo-700 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-200 pl-3">
                                    <span className="text-lg font-black text-slate-700 leading-none tracking-tight">MerchOps</span>
                                    <span className="text-[9px] font-extrabold text-slate-400 mt-1 tracking-widest uppercase">Merchandising Operations</span>
                                </div>
                            </div>
                            <nav className="flex gap-2.5 text-[13px] font-bold items-center">
                                <button className="text-slate-500 hover:text-slate-800 transition-colors flex items-center px-2 py-1.5 rounded-md hover:bg-slate-100">
                                    <i className="far fa-question-circle mr-1.5"></i>가이드
                                </button>
                                <div className="w-px h-4 bg-slate-200 mx-1"></div>
                                <button onClick={() => handleCloudSync('load')} className="text-blue-600 bg-blue-50 hover:bg-blue-100 border border-blue-200 px-4 py-1.5 rounded-md flex items-center transition-all shadow-sm">
                                    <i className="fas fa-cloud-download-alt mr-1.5"></i>불러오기
                                </button>
                                <button onClick={() => handleCloudSync('upload')} className="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-4 py-1.5 rounded-md flex items-center transition-all shadow-sm">
                                    <i className="fas fa-cloud-upload-alt mr-1.5"></i>클라우드 전송
                                </button>
                                <button onClick={() => { setShowSettings(true); setMappingMainTab('master'); }} className="text-slate-600 bg-white hover:bg-slate-50 border border-slate-300 px-4 py-1.5 rounded-md flex items-center transition-all shadow-sm ml-1">
                                    <i className="fas fa-cogs mr-1.5 text-indigo-500"></i>매핑센터
                                </button>
                            </nav>
                        </header>

                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-40 relative shadow-sm">
                            <div className="p-5 pb-0">
                                <div className="bg-[#0f172a] rounded-xl shadow-lg border border-slate-800 overflow-hidden flex flex-col">
                                    <div className="px-5 py-3.5 flex justify-between items-center border-b border-slate-800/80 bg-[#0b1120]">
                                        <div className="flex items-center gap-4">
                                            <span className="text-[15px] font-black text-white tracking-tight flex items-center">
                                                <i className="fas fa-terminal text-indigo-400 mr-2 opacity-80"></i>System.IO
                                            </span>
                                            <div className="bg-black rounded border border-slate-700 px-3 py-1.5 flex items-center shadow-inner min-w-[320px]">
                                                <span className="text-[12px] font-mono text-[#10b981]">
                                                    {`> system.io: status: ${Object.keys(masterProducts).length} items loaded.`}
                                                </span>
                                                <span className="w-1.5 h-3.5 bg-[#10b981] ml-1 animate-[pulse_1s_infinite]"></span>
                                            </div>
                                            <Clock />
                                        </div>
                                        <button onClick={() => { setMasterProducts({}); setManagedItems([]); showToast('데이터가 완전 초기화되었습니다.'); }} className="px-4 py-1.5 bg-slate-800 text-slate-300 hover:bg-rose-900 hover:text-rose-100 hover:border-rose-800 border border-slate-700 rounded text-[11px] font-bold transition flex items-center shadow-sm">
                                            <i className="fas fa-redo-alt mr-1.5"></i>초기화
                                        </button>
                                    </div>
                                    
                                    <div className="p-4 flex items-center overflow-x-auto hide-scrollbar bg-[#0f172a]">
                                        <span className="text-[11px] font-bold text-slate-400 mr-4 flex items-center shrink-0">
                                            <i className="fas fa-filter mr-1.5 opacity-70"></i>데이터 소스 업로드:
                                        </span>
                                        
                                        <div className="flex gap-2 shrink-0 items-center">
                                            <FileBox title="1. 견적" icon="fa-file-invoice-dollar" expectedType="estimate" onUpload={handleFileUpload} />
                                            <i className="fas fa-plus text-slate-600 text-[10px] mx-0.5"></i>
                                            <FileBox title="2. 입고" icon="fa-truck-loading" expectedType="in" onUpload={handleFileUpload} />
                                            <i className="fas fa-plus text-slate-600 text-[10px] mx-0.5"></i>
                                            <FileBox title="3. 주문" icon="fa-clipboard-list" expectedType="out" onUpload={handleFileUpload} />
                                            <i className="fas fa-plus text-slate-600 text-[10px] mx-0.5"></i>
                                            <FileBox title="4. 판매" icon="fa-chart-line" expectedType="sales" onUpload={handleFileUpload} />
                                        </div>
                                        
                                        <div className="ml-auto flex gap-2 pl-6 shrink-0 border-l border-slate-700/50">
                                            <label className="cursor-pointer px-5 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white border border-slate-700 rounded-lg text-[12px] font-bold transition flex items-center shadow-md">
                                                <i className="fas fa-database mr-2 text-indigo-400"></i>마스터 엑셀 업로드
                                                <input type="file" className="hidden" onChange={(e) => handleFileUpload(e, 'master')} multiple />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="px-5 pt-4 pb-3 flex justify-between items-center border-b border-slate-200">
                                <div className="flex gap-4 items-center h-10">
                                    <div className="flex bg-slate-100 rounded-lg p-1 border border-slate-200 shadow-sm h-full">
                                        <button onClick={() => { setSideTab('manage'); setActiveSources([]); }} className={`px-5 rounded-md text-[13px] font-bold transition flex items-center ${sideTab === 'manage' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            전체상품
                                        </button>
                                        <button onClick={() => setSideTab('estimate')} className={`px-5 rounded-md text-[13px] font-bold transition flex items-center ${sideTab === 'estimate' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            관리상품
                                        </button>
                                    </div>

                                                                    ))}
                                                                </div>

                                                                <div className="flex items-center gap-2 bg-slate-50 p-2.5 rounded-lg border border-slate-200">
                                                                    <span className="text-[11px] font-bold text-slate-600 whitespace-nowrap px-1 flex items-center">
                                                                        <i className="fas fa-plus text-indigo-500 mr-1.5"></i>파일 항목 추가:
                                                                    </span>
                                                                    <input 
                                                                        type="text" value={customColInput} onChange={e => setCustomColInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && addCustomUploadCol()}
                                                                        placeholder="예: 견적단가, 지시사항, 할인율" 
                                                                        className="flex-1 border border-slate-300 rounded px-2.5 py-1.5 text-[12px] outline-none focus:border-indigo-500 transition-colors bg-white shadow-sm" 
                                                                    />
                                                                    <button onClick={addCustomUploadCol} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-1.5 rounded text-[12px] font-bold transition-colors shadow-sm">항목 생성</button>
                                                                </div>
                                                            </div>

                                                            {/* Mapping Inputs (항목명 + 엑셀키워드 + 마스터 DB 연결) */}
                                                            <div className="bg-slate-100 border border-slate-200 rounded-xl p-5 shadow-inner">
                                                                <h3 className="text-[13px] font-black text-slate-800 flex items-center mb-4 border-b border-slate-200 pb-2">
                                                                    <i className="fas fa-link text-indigo-500 mr-2"></i>항목 상세 설정 및 마스터 연결
                                                                </h3>
                                                                <div className="flex flex-col gap-3">
                                                                    {/* 헤더 */}
                                                                    <div className="flex gap-4 px-2 pb-1 text-[11px] font-bold text-slate-500">
                                                                        <div className="w-[120px] shrink-0 text-slate-700">1. 파일 표출 항목명</div>
                                                                        <div className="flex-1 text-slate-700">2. 매핑 키워드 (엑셀 열 이름)</div>
                                                                        <div className="flex-1 text-indigo-700 flex items-center"><i className="fas fa-database mr-1"></i> 3. 덮어쓸 마스터 항목 (선택)</div>
                                                                    </div>

                                                                    {/* 필수 항목 매핑 */}
                                                                    {['품목코드', '품목명', '규격'].map(coreKey => (
                                                                        <div key={coreKey} className="flex items-center gap-4 px-2">
                                                                            <div className="w-[120px] shrink-0 text-[12px] font-bold text-slate-500">{coreKey} <i className="fas fa-lock text-[9px] ml-1 opacity-50"></i></div>
                                                                            <input type="text" value={mappings[mappingFileTab]?.[coreKey] || ''} onChange={(e) => setMappings(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [coreKey]: e.target.value } }))} placeholder="엑셀 열 이름" className="flex-1 border border-slate-300 rounded px-3 py-1.5 text-[11px] bg-white outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
                                                                            <div className="flex-1 text-[11px] text-slate-400 bg-slate-200/50 rounded px-3 py-1.5 border border-slate-200" title="시스템 필수 항목은 변경할 수 없습니다.">시스템 기본 연결</div>
                                                                        </div>
                                                                    ))}

                                                                    {/* 커스텀 항목 매핑 및 DB 연결 */}
                                                                    {(visibleUploadCols[mappingFileTab] || []).filter(h => !['품목코드', '품목명', '규격'].includes(h)).map(h => (
                                                                        <div key={h} className="flex items-center gap-4 px-2">
                                                                            <div className="w-[120px] shrink-0 text-[12px] font-bold text-slate-800 truncate" title={h}>{h}</div>
                                                                            <input type="text" value={mappings[mappingFileTab]?.[h] || ''} onChange={(e) => setMappings(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [h]: e.target.value } }))} placeholder="추출할 엑셀 열 이름" className="flex-1 border border-slate-300 rounded px-3 py-1.5 text-[11px] bg-white outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 shadow-sm" />
                                                                            <div className="flex-1 relative">
                                                                                <select
                                                                                    value={masterLinks[mappingFileTab]?.[h] || ''}
                                                                                    onChange={(e) => setMasterLinks(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [h]: e.target.value } }))}
                                                                                    className={`w-full border rounded px-3 py-1.5 text-[11px] outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 appearance-none shadow-sm cursor-pointer
                                                                                        ${masterLinks[mappingFileTab]?.[h] ? 'bg-indigo-50 border-indigo-300 text-indigo-700 font-bold' : 'bg-white border-slate-300 text-slate-600'}`}
                                                                                >
                                                                                    <option value="">-- 단순 노출 (연결 안 함) --</option>
                                                                                    {MASTER_HEADERS.map(mh => (
                                                                                        <option key={mh} value={mh}>{mh}</option>
                                                                                    ))}
                                                                                </select>
                                                                                <i className="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none"></i>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        {/* Setup Actions */}
                                        <div className="p-4 bg-slate-50 border-t border-slate-200 shrink-0 flex justify-between items-center z-10 relative shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                            <button onClick={handleResetMappings} className="text-slate-500 hover:text-slate-800 text-[12px] font-bold px-2 flex items-center transition-colors">
                                                <i className="fas fa-undo mr-1.5"></i>초기화
                                            </button>
                                            <div className="flex gap-2">
                                                <button onClick={() => setShowSettings(false)} className="px-5 py-2 bg-slate-200 text-slate-700 rounded-md text-[12px] font-bold hover:bg-slate-300 transition-colors">닫기</button>
                                                <button onClick={() => { setShowSettings(false); handleCloudSync('upload'); }} className="px-6 py-2 bg-[#0f172a] text-white rounded-md text-[12px] font-bold shadow-md hover:bg-black transition-colors flex items-center">
                                                    확정 및 클라우드 동기화
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* --- [우측 영역] 실시간 미리보기 (Live Simulation Pane) --- */}
                                    <div className="flex-1 flex flex-col bg-slate-200/50 relative overflow-hidden">
                                        <div className="px-6 py-4 border-b border-slate-200 bg-white shrink-0 flex justify-between items-center shadow-sm z-10">
                                            <div className="flex items-center gap-3">
                                                <h3 className="font-black text-slate-800 text-[15px] flex items-center">
                                                    <i className="fas fa-desktop text-emerald-500 mr-2"></i>실시간 시뮬레이션
                                                </h3>
                                                <span className="text-[11px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded font-bold border border-emerald-100 animate-pulse">Live Preview</span>
                                            </div>
                                            <div className="flex gap-4 text-[11px] font-bold">
                                                <div className="flex items-center"><span className="w-2.5 h-2.5 rounded bg-blue-100 border border-blue-200 mr-1.5"></span> [M] 마스터 대조 (가이드)</div>
                                                <div className="flex items-center"><span className="w-2.5 h-2.5 rounded bg-white border border-slate-200 mr-1.5"></span> [F] 엑셀 항목 (수정가능)</div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 p-6 overflow-hidden flex flex-col">
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-lg flex-1 overflow-auto custom-scrollbar relative">
                                                <table className="w-full text-left border-collapse text-[13px] whitespace-nowrap min-w-max">
                                                    <thead className="bg-[#f8fafc] text-slate-600 font-extrabold text-[12px] tracking-tight">
                                                        <tr>
                                                            {/* 공통 헤더: 식별 컬럼 */}
                                                            <th className="sticky top-0 z-40 bg-[#f8fafc] px-4 py-3 border-b border-r border-slate-200 w-[260px] min-w-[260px] max-w-[260px] shadow-[4px_0_8px_-2px_rgba(0,0,0,0.06)]" style={{left: 0}}>
                                                                상품정보 (코드/품명/규격)
                                                            </th>
                                                            
                                                            {/* 동적 헤더 생성 */}
                                                            {mappingMainTab === 'master' ? (
                                                                MASTER_HEADERS.filter(h => !['품목코드', '품목명', '규격'].includes(h)).map(h => {
                                                                    const showMaster = (visibleMasterCols['master'] || []).includes(h);
                                                                    if (!showMaster) return null;
                                                                    return <th key={`preview-mh-${h}`} className={`sticky top-0 z-30 bg-[#f8fafc] px-3 py-3 border-r border-b border-slate-200 text-center text-slate-700 ${getCellWidthClass(h)} truncate`}>{h}</th>;
                                                                })
                                                            ) : (
                                                                mappingFileTab === 'all' 
                                                                    ? docOrder.map(mapKey => renderDocHeaders(mapKey))
                                                                    : renderDocHeaders(mappingFileTab)
                                                            )}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 text-slate-700 bg-white">
                                                        {/* 더미 데이터 1Row 렌더링 */}
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="sticky z-20 px-4 py-3 border-r border-slate-200 w-[260px] bg-white shadow-[4px_0_8px_-2px_rgba(0,0,0,0.04)]" style={{left: 0}}>
                                                                <div className="flex flex-col justify-center">
                                                                    <span className="text-[10px] font-mono text-indigo-500 mb-0.5">{previewDummyRow.코드}</span>
                                                                    <div className="flex items-center gap-1.5">
                                                                        <span className="text-[13px] font-extrabold text-slate-800">{previewDummyRow.품목명}</span>
                                                                        <span className="text-slate-300 text-[10px]">|</span>
                                                                        <span className="text-[11px] text-slate-500">{previewDummyRow.규격}</span>
                                                                    </div>
                                                                </div>
                                                            </td>

                                                            {mappingMainTab === 'master' ? (
                                                                MASTER_HEADERS.filter(h => !['품목코드', '품목명', '규격'].includes(h)).map(h => {
                                                                    const showMaster = (visibleMasterCols['master'] || []).includes(h);
                                                                    if (!showMaster) return null;
                                                                    return renderMasterManageCell(previewDummyRow, h, `preview-mm-${h}`);
                                                                })
                                                            ) : (
                                                                mappingFileTab === 'all'
                                                                    ? docOrder.map(mapKey => renderDocColumns(previewDummyRow, 0, mapKey, true))
                                                                    : renderDocColumns(previewDummyRow, 0, mappingFileTab, true)
                                                            )}
                                                        </tr>
                                                        {/* 빈 공간 채우기 용 더미 로우 */}
                                                        <tr><td colSpan="50" className="h-[200px] bg-slate-50/50"></td></tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
