<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps v5.45 - Dynamic Grid Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #cbd5e1; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .config-chip {
            cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; transition: all 0.2s;
        }
        .config-chip.active { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; font-weight: 700; }
        
        .row-margin-alert { background-color: #fef2f2 !important; }
        .row-margin-alert td:not(.injected-col) { border-color: #fee2e2; }
        
        .injected-col { background-color: #eff6ff; }
        .group:hover .injected-col { background-color: #e0f2fe; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
            return (
                <div className="text-[12px] text-slate-400 font-mono tracking-wide flex items-center mt-0.5">
                    <i className="far fa-clock mr-1.5 text-blue-400 opacity-80"></i>
                    {`${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`}
                </div>
            );
        };

        const FileBox = ({ title, icon, expectedType, onUpload }) => {
            const fileRef = useRef(null);
            return (
                <div 
                    className="relative border border-slate-700 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all cursor-pointer flex items-center h-[46px] w-[160px] shrink-0 px-3 shadow-sm group"
                    onClick={() => fileRef.current?.click()}
                >
                    <input type="file" ref={fileRef} className="hidden" multiple onChange={(e) => onUpload(e, expectedType)} accept=".xlsx, .xls, .csv" />
                    <div className="flex flex-col justify-center flex-1 pr-4 z-10 overflow-hidden">
                        <span className="text-[10px] font-black text-slate-400 mb-0.5 whitespace-nowrap">{title}</span>
                        <span className="text-[11px] font-bold text-slate-500 truncate group-hover:text-blue-400 transition-colors">클릭하여 업로드</span>
                    </div>
                    <i className={`fas ${icon} absolute right-3 text-xl text-slate-500 opacity-20 group-hover:opacity-40 transition-opacity`}></i>
                </div>
            );
        };

        const App = () => {
            const [masterProducts, setMasterProducts] = useState(() => {
                const saved = localStorage.getItem('merchMaster_v545');
                return saved ? JSON.parse(saved) : {};
            });
            const [managedItems, setManagedItems] = useState([]);

            const [columnConfig, setColumnConfig] = useState(() => {
                const saved = localStorage.getItem('merchColConfig_v545_v2');
                return saved ? JSON.parse(saved) : { 
                    "일자-No": true, "카테고리": true, "상품정보": true, "단가": true, 
                    "주문": true, "재고": true, "입고": true, "잔량": true, 
                    "적요": true, "지시사항": true, "거래처": true, "그룹": true, "상태/담당": true 
                };
            });

            const [sideTab, setSideTab] = useState('manage'); 
            const [searchInputVal, setSearchInputVal] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [alertMsg, setAlertMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            
            const [activeIssueFilter, setActiveIssueFilter] = useState(null); 

            const [settingsTab, setSettingsTab] = useState('mapping');
            const [mappingFileTab, setMappingFileTab] = useState('master');
            
            const [activeSources, setActiveSources] = useState([]);
            const INJECT_ORDER = [
                { id: '견적', key: '견적수량', label: '견적수량' },
                { id: '주문', key: '주문수량', label: '주문수량' },
                { id: '재고', key: '재고', label: '현재고' },
                { id: '입고', key: '입고수량', label: '입고수량' },
                { id: '판매', key: '판매수량', label: '판매수량' }
            ];
            
            const toggleSource = (src) => {
                setActiveSources(prev => prev.includes(src) ? prev.filter(s => s !== src) : [...prev, src]);
            };

            const injectedCols = activeSources.length > 0 
                ? INJECT_ORDER.filter(col => activeSources.includes(col.id))
                : [];
            
            const hideDefaultQty = activeSources.length > 0; 

            const [mappings, setMappings] = useState(() => {
                const saved = localStorage.getItem('merchMappings_v545_v3');
                return saved ? JSON.parse(saved) : {
                    master: { code: '2코드, 품목코드', name: '품목(상품명), 품목명, 상품명', spec: '1 규격, 규격명, 규격', qty: '', stock: '', vendor: '구매처명, 구매처', group: '품목그룹3명, 그룹', payment: '', memo: '간단설명, 적요', instruction: '지시사항', warehouse: '', manager: '', date: '', slipNo: '', inPrice: '입고가, 구매가, 매입단가', outPrice: '출고가, A판매, 단가, 판매가' },
                    estimate: { code: '2코드, 품목코드', name: '품목명', spec: '규격명', qty: '', stock: '', vendor: '구매처명', group: '품목그룹3명', payment: '', memo: '적요', instruction: '지시사항', warehouse: '', manager: '', date: '일자', slipNo: '순번', inPrice: '구매가', outPrice: 'A판매, 단가' },
                    sales: { code: '품목코드, 상품코드', name: '품명, 상품명', spec: '규격, 옵션', qty: '수량', stock: '', vendor: '거래처명, 구매처', group: '', payment: '', memo: '적요', instruction: '지시사항', warehouse: '창고명', manager: '담당자', date: '일자', slipNo: 'NO.', inPrice: '구매, 매입', outPrice: '단가, 출고가' },
                    prev: { code: '코드, 품목코드', name: '상품명, 품명', spec: '규격, 옵션', qty: '수량', stock: '재고', vendor: '거래처명', group: '', payment: '', memo: '비고', instruction: '', warehouse: '창고', manager: '담당자', date: '일자', slipNo: '', inPrice: '단가', outPrice: '' },
                    in: { code: '품목코드', name: '품명', spec: '규격', qty: '입고수량, 수량', stock: '입고후재고', vendor: '매입처명, 거래처', group: '', payment: '', memo: '입고메모', instruction: '특이사항', warehouse: '창고', manager: '담당자', date: '입고일자, 일자', slipNo: '입고번호', inPrice: '단가, 매입단가', outPrice: '' },
                    out: { code: '주문코드, 품목코드', name: '주문상품명, 품명', spec: '주문옵션, 규격', qty: '주문수량, 수량', stock: '재고', vendor: '주문자, 거래처', group: '배송그룹', payment: '결제', memo: '요청사항, 배송메모', instruction: '지시사항', warehouse: '창고', manager: '영업담당', date: '주문일자, 일자', slipNo: '주문번호', inPrice: '', outPrice: '판매단가, 단가' }
                };
            });
            const [splitOptions, setSplitOptions] = useState({ price: false, vendor: false, date: false });

            useEffect(() => {
                localStorage.setItem('merchMaster_v545', JSON.stringify(masterProducts));
                localStorage.setItem('merchColConfig_v545_v2', JSON.stringify(columnConfig));
                localStorage.setItem('merchMappings_v545_v3', JSON.stringify(mappings));
            }, [masterProducts, columnConfig, mappings]);

            const toggleColumn = (key) => setColumnConfig(prev => ({ ...prev, [key]: !prev[key] }));

            const applyPreset = (type) => {
                const base = { "일자-No": true, "카테고리": true, "상품정보": true };
                let nextConfig = { ...columnConfig };
                Object.keys(nextConfig).forEach(k => nextConfig[k] = false);
                Object.assign(nextConfig, base);

                if (type === 'price') {
                    nextConfig["단가"] = true; nextConfig["적요"] = true; nextConfig["거래처"] = true; nextConfig["그룹"] = true; nextConfig["상태/담당"] = true;
                } else if (type === 'logistics') {
                    nextConfig["주문"] = true; nextConfig["재고"] = true; nextConfig["입고"] = true; nextConfig["잔량"] = true; nextConfig["적요"] = true; nextConfig["상태/담당"] = true;
                } else if (type === 'info') {
                    nextConfig["지시사항"] = true; nextConfig["적요"] = true; nextConfig["거래처"] = true; nextConfig["상태/담당"] = true;
                } else {
                    Object.keys(nextConfig).forEach(k => nextConfig[k] = true);
                }
                setColumnConfig(nextConfig);
                showToast("✅ 노출 항목 프리셋이 적용되었습니다.");
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const calcMargin = (cost, sell) => {
                if (!sell || sell === 0) return 0;
                return (((sell - cost) / sell) * 100).toFixed(1);
            };

            const parseNum = (v) => {
                if (!v) return 0;
                return Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
            };

            const extractValue = (row, mappingStr) => {
                if (!mappingStr) return '';
                const keywords = mappingStr.split(',').map(s => s.trim().toLowerCase().replace(/\s/g, ''));
                const rowKeys = Object.keys(row);
                
                for (let kw of keywords) {
                    if (!kw) continue;
                    const foundKey = rowKeys.find(k => String(k).toLowerCase().replace(/\s/g, '').includes(kw));
                    if (foundKey && row[foundKey] !== undefined && row[foundKey] !== '') {
                        return row[foundKey];
                    }
                }
                return '';
            };

            const parseExcelRobust = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const wb = XLSX.read(e.target.result, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                        
                        let headerRowIdx = 0;
                        for (let i = 0; i < Math.min(10, jsonAll.length); i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품') || rowStr.includes('단가')) {
                                headerRowIdx = i;
                                break;
                            }
                        }

                        const headers = jsonAll[headerRowIdx];
                        const data = [];
                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const rowArr = jsonAll[i];
                            if (!rowArr || rowArr.join('').trim() === '') continue;
                            const obj = {};
                            headers.forEach((h, idx) => {
                                if (h) obj[h] = rowArr[idx];
                            });
                            data.push(obj);
                        }
                        resolve(data);
                    };
                    reader.readAsBinaryString(file);
                });
            };

            const handleFileUpload = async (e, expectedType) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                try {
                    let newMaster = { ...masterProducts };
                    let newManaged = [...managedItems];
                    let totalCount = 0;

                    for (const file of files) {
                        const name = file.name.toLowerCase();
                        let mapKey = expectedType;
                        
                        if (!mapKey) {
                            const isEstimate = name.includes('견적');
                            const isSales = name.includes('판매');
                            const isPrev = name.includes('재고');
                            const isIn = name.includes('입고');
                            const isOut = name.includes('주문') || name.includes('발주');
                            const isMaster = name.includes('마스터') || name.includes('상품정보') || name.includes('상품') || name.includes('품목');
                            
                            mapKey = isSales ? 'sales' : isEstimate ? 'estimate' : isPrev ? 'prev' : isIn ? 'in' : isOut ? 'out' : isMaster ? 'master' : null;
                        }

                        if (!mapKey) {
                            setAlertMsg(`[${file.name}] 인식할 수 없는 파일명입니다.\n(지정된 업로드 박스를 클릭해서 파일을 올려주세요.)`);
                            continue;
                        }

                        const currentMap = mappings[mapKey];
                        const data = await parseExcelRobust(file);
                        let fileCount = 0;

                        data.forEach(row => {
                            const code = extractValue(row, currentMap.code);
                            if (!code) return;

                            if (!newMaster[code]) newMaster[code] = { 코드: code };
                            const p = newMaster[code];

                            const nameVal = extractValue(row, currentMap.name);
                            const spec = extractValue(row, currentMap.spec);
                            const vendor = extractValue(row, currentMap.vendor);
                            const group = extractValue(row, currentMap.group);
                            const inPrice = parseNum(extractValue(row, currentMap.inPrice));
                            const outPrice = parseNum(extractValue(row, currentMap.outPrice));
                            const qty = parseNum(extractValue(row, currentMap.qty));
                            const stock = parseNum(extractValue(row, currentMap.stock));
                            const instruction = extractValue(row, currentMap.instruction);
                            const memo = extractValue(row, currentMap.memo);
                            const dateVal = extractValue(row, currentMap.date);
                            const slipVal = extractValue(row, currentMap.slipNo);

                            if (nameVal) p.품명 = nameVal;
                            if (spec) p.규격 = spec;
                            if (vendor) p.구매처 = vendor;
                            if (group) p.그룹 = group;

                            if (mapKey === 'master') {
                                if (inPrice > 0) p.구매가 = inPrice;
                                if (outPrice > 0) p.A판매 = outPrice;
                                if (instruction) p.지시사항 = instruction;
                                if (memo) p.적요 = memo;
                            }
                            
                            const existingIdx = newManaged.findIndex(m => m.코드 === code && m.일자 === dateVal);
                            let managedObj = existingIdx >= 0 ? newManaged[existingIdx] : { ...p, 일자: dateVal, 순번: slipVal, 거래처: vendor || p.구매처 };

                            if (mapKey === 'sales') {
                                managedObj.판매수량 = (managedObj.판매수량 || 0) + qty;
                                if (outPrice > 0) managedObj.A판매 = outPrice;
                            } else if (mapKey === 'out') {
                                managedObj.주문수량 = (managedObj.주문수량 || 0) + qty;
                            } else if (mapKey === 'estimate') {
                                managedObj.견적수량 = qty > 0 ? qty : (managedObj.견적수량 || 0);
                                if (inPrice > 0) managedObj.구매가 = inPrice;
                                if (outPrice > 0) managedObj.A판매 = outPrice;
                                if (instruction) managedObj.지시사항 = instruction;
                            } else if (mapKey === 'prev') {
                                managedObj.재고 = (managedObj.재고 || 0) + (stock > 0 ? stock : qty);
                            } else if (mapKey === 'in') {
                                managedObj.입고수량 = (managedObj.입고수량 || 0) + qty;
                            }
                            
                            if (memo) managedObj.적요 = memo;

                            if (existingIdx >= 0) {
                                newManaged[existingIdx] = managedObj;
                            } else {
                                newManaged.push(managedObj);
                            }

                            fileCount++;
                        });
                        
                        totalCount += fileCount;
                        if (mapKey !== 'master') setSideTab('estimate');
                    }
                    
                    setMasterProducts(newMaster);
                    setManagedItems(newManaged);
                    if(totalCount > 0) showToast(`✅ 데이터 자산화 및 수량 연산 완료 (${totalCount}건)`);
                } catch(error) {
                    console.error(error);
                    setAlertMsg("❌ 파싱 중 오류가 발생했습니다. 헤더 매핑 설정을 확인해주세요.");
                } finally { 
                    e.target.value = ''; 
                }
            };

            const issues = useMemo(() => {
                let margin = 0, stock = 0, info = 0;
                const targetList = sideTab === 'manage' ? Object.values(masterProducts) : managedItems;
                
                targetList.forEach(row => {
                    const cost = row.구매가 || 0;
                    const sell = row.A판매 || row.단가 || 0;
                    if (cost > sell && sell > 0) margin++;
                    
                    const inQty = row.입고수량 || 0;
                    const totalStock = (row.재고 || 0) + inQty;
                    if (row.주문수량 > 0 && row.주문수량 > totalStock) stock++;

                    if (row.적요 || row.지시사항) info++;
                });
                
                return { margin, stock, info };
            }, [masterProducts, managedItems, sideTab]);

            const hasIssues = issues.margin > 0 || issues.stock > 0 || issues.info > 0;

            const handleIssueClick = (type) => {
                if (activeIssueFilter === type) {
                    setActiveIssueFilter(null);
                    return;
                }
                setActiveIssueFilter(type);
                
                setColumnConfig(prev => {
                    const next = { ...prev };
                    let changed = false;
                    if (type === 'margin' && !next['단가']) { next['단가'] = true; changed = true; }
                    if (type === 'stock') {
                        if (!next['주문']) { next['주문'] = true; changed = true; }
                        if (!next['잔량']) { next['잔량'] = true; changed = true; }
                    }
                    if (type === 'info') {
                        if (!next['적요']) { next['적요'] = true; changed = true; }
                        if (!next['지시사항']) { next['지시사항'] = true; changed = true; }
                    }
                    if (changed) showToast(`자동으로 연관 항목을 활성화했습니다.`);
                    return next;
                });
            };

            const displayRows = useMemo(() => {
                let list = sideTab === 'manage' ? Object.values(masterProducts) : 
                           sideTab === 'estimate' ? managedItems : Object.values(masterProducts);
                
                if (searchInputVal) {
                    const q = searchInputVal.toLowerCase();
                    list = list.filter(i => (i.품명||'').toLowerCase().includes(q) || (i.코드||'').toLowerCase().includes(q));
                }

                if (activeIssueFilter === 'margin') {
                    list = list.filter(row => {
                        const cost = row.구매가 || 0;
                        const sell = row.A판매 || row.단가 || 0;
                        return cost > sell && sell > 0;
                    });
                } else if (activeIssueFilter === 'stock') {
                    list = list.filter(row => {
                        const inQty = row.입고수량 || 0;
                        const totalStock = (row.재고 || 0) + inQty;
                        return row.주문수량 > 0 && row.주문수량 > totalStock;
                    });
                } else if (activeIssueFilter === 'info') {
                    list = list.filter(row => row.적요 || row.지시사항);
                }

                return list;
            }, [masterProducts, managedItems, sideTab, searchInputVal, activeIssueFilter]);

            const col1Left = 0;
            const col2Left = 60;
            const col3Left = 140;

            return (
                <div className="h-screen flex flex-col w-full relative items-center">
                    
                    {alertMsg && (
                        <div className="fixed top-20 z-[999] bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-out] font-bold text-sm">
                            <span className="whitespace-pre-line">{alertMsg}</span>
                            <button onClick={() => setAlertMsg('')} className="ml-4 text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                        </div>
                    )}
                    
                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-out] font-bold text-sm border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400 text-lg"></i>
                            {toastMsg}
                        </div>
                    )}

                    <div className="w-full max-w-[1360px] h-full flex flex-col bg-white relative shadow-2xl border-x border-slate-300 overflow-hidden">
                        
                        <header className="shrink-0 bg-white border-b border-slate-200 w-full z-[60] relative shadow-sm">
                            <div className="w-full px-6 h-16 flex justify-between items-center">
                                <div className="flex items-center cursor-pointer">
                                    <span className="text-3xl font-black text-blue-600 tracking-tighter mr-3">ONEAPP</span>
                                    <div className="flex flex-col border-l-2 border-slate-200 pl-3">

                                <div className="bg-slate-800 p-4 text-white flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-6">
                                        <h2 className="font-black text-lg"><i className="fas fa-cogs text-blue-400 mr-2"></i>매핑센터</h2>
                                        <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
                                            <button onClick={() => setSettingsTab('mapping')} className={`px-4 py-1.5 text-[13px] font-bold rounded-md transition-colors ${settingsTab === 'mapping' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>엑셀 헤더 매핑</button>
                                            <button onClick={() => setSettingsTab('display')} className={`px-4 py-1.5 text-[13px] font-bold rounded-md transition-colors ${settingsTab === 'display' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>UI 노출 설정</button>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-rose-400 text-xl transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                
                                <div className="overflow-y-auto flex-1 bg-white custom-scrollbar">
                                    {settingsTab === 'mapping' && (
                                        <div className="p-6">
                                            <div className="p-4 border border-slate-200 rounded-lg mb-4 bg-white relative">
                                                <div className="absolute top-0 left-0 bottom-0 w-1.5 bg-red-600 rounded-l-lg"></div>
                                                <p className="text-[13px] text-slate-500 mb-4 ml-2">각 파일별로 다르게 지정된 헤더 이름을 독립적으로 매핑할 수 있습니다.</p>
                                                <div className="flex gap-2 ml-2">
                                                    {[
                                                        { id: 'master', label: '마스터(공통)' },
                                                        { id: 'estimate', label: '견적서' },
                                                        { id: 'sales', label: '판매' },
                                                        { id: 'prev', label: '재고' },
                                                        { id: 'in', label: '입고' },
                                                        { id: 'out', label: '주문' }
                                                    ].map(tab => (
                                                        <button key={tab.id} onClick={() => setMappingFileTab(tab.id)}
                                                            className={`px-5 py-2 rounded-lg text-[13px] font-bold border transition-colors
                                                                ${mappingFileTab === tab.id ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                                                            {tab.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="p-6 border border-slate-200 rounded-lg mb-4 bg-white">
                                                <div className="grid grid-cols-4 gap-x-4 gap-y-6">
                                                    {Object.entries({
                                                        code: '품목코드', name: '품명', spec: '규격', stock: '재고',
                                                        qty: '주문수량', vendor: '거래/구매처', group: '그룹/지역', payment: '수금/결제',
                                                        memo: '적요/메모', instruction: '지시사항', warehouse: '창고', manager: '담당자',
                                                        date: '일자', slipNo: '순번(넘버)', inPrice: '매입가(구매)', outPrice: '판매가(단가)'
                                                    }).map(([key, label]) => (
                                                        <div key={key}>
                                                            <label className="text-[12px] font-bold text-slate-700 mb-1.5 block">{label}</label>
                                                            <input type="text" 
                                                                value={mappings[mappingFileTab]?.[key] || ''}
                                                                onChange={(e) => setMappings(prev => ({ ...prev, [mappingFileTab]: { ...prev[mappingFileTab], [key]: e.target.value } }))}
                                                                className="w-full border border-slate-300 rounded-md py-1.5 px-3 text-[13px] text-slate-800 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                                            />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="p-5 border border-slate-200 rounded-lg bg-white relative">
                                                <div className="absolute top-0 left-0 bottom-0 w-1.5 bg-red-600 rounded-l-lg"></div>
                                                <div className="flex justify-between items-center ml-2">
                                                    <div>
                                                        <h3 className="text-[15px] font-black text-indigo-900 mb-2 flex items-center">
                                                            <i className="fas fa-layer-group text-indigo-600 mr-2"></i> 품목 관리 기준 설정
                                                        </h3>
                                                        <p className="text-[12px] text-slate-500 leading-relaxed">
                                                            ※ 시스템은 기본적으로 <span className="font-bold text-blue-600">'품목코드'</span> 기준으로 구동됩니다.<br/>
                                                            같은 '품목코드' 상품을 아래 설정을 통해 세분화하여 분리/합산 관리할 수 있습니다.
                                                        </p>
                                                    </div>
                                                    <div className="flex gap-5 bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5">
                                                        <label className="flex items-center gap-2 cursor-pointer group">
                                                            <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked={splitOptions.price} onChange={e => setSplitOptions(prev => ({...prev, price: e.target.checked}))} />
                                                            <span className="text-[13px] font-bold text-slate-700 group-hover:text-blue-600">단가별 분리</span>
                                                        </label>
                                                        <label className="flex items-center gap-2 cursor-pointer group">
                                                            <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked={splitOptions.vendor} onChange={e => setSplitOptions(prev => ({...prev, vendor: e.target.checked}))} />
                                                            <span className="text-[13px] font-bold text-slate-700 group-hover:text-blue-600">매입처별 분리</span>
                                                        </label>
                                                        <label className="flex items-center gap-2 cursor-pointer group">
                                                            <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked={splitOptions.date} onChange={e => setSplitOptions(prev => ({...prev, date: e.target.checked}))} />
                                                            <span className="text-[13px] font-bold text-slate-700 group-hover:text-blue-600">일자별 분리</span>
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {settingsTab === 'display' && (
                                        <div className="p-8">
                                            <div className="flex items-center gap-3 mb-6 pb-6 border-b border-slate-200">
                                                <span className="text-sm font-black text-slate-700">추천 프리셋:</span>
                                                <button onClick={() => applyPreset('price')} className="px-4 py-2 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold border border-blue-200 hover:bg-blue-100 transition-colors shadow-sm">단가 관리용</button>
                                                <button onClick={() => applyPreset('logistics')} className="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-lg text-xs font-bold border border-emerald-200 hover:bg-emerald-100 transition-colors shadow-sm">물류/수급 현황용</button>
                                                <button onClick={() => applyPreset('info')} className="px-4 py-2 bg-amber-50 text-amber-600 rounded-lg text-xs font-bold border border-amber-200 hover:bg-amber-100 transition-colors shadow-sm">특이사항 확인용</button>
                                                <button onClick={() => applyPreset('all')} className="ml-auto px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold border border-slate-200 hover:bg-slate-200 transition-colors shadow-sm">항목 전체 보기</button>
                                            </div>

                                            <p className="text-sm font-bold text-slate-500 mb-6">테이블에 노출할 항목을 선택하십시오. (상품정보 우측으로 선택한 항목이 자동 배열됩니다)</p>
                                            <div className="grid grid-cols-4 gap-3">
                                                {Object.keys(columnConfig).map(key => {
                                                    const isAnchor = key === '일자-No' || key === '카테고리' || key === '상품정보';
                                                    return (
                                                        <div key={key} 
                                                            onClick={() => { if (!isAnchor) toggleColumn(key); }} 
                                                            className={`config-chip ${columnConfig[key] ? 'active' : ''} ${isAnchor ? 'opacity-60 cursor-not-allowed bg-slate-100' : 'hover:border-blue-300'}`}>
                                                            <i className={`fas ${columnConfig[key] ? 'fa-check-circle' : 'fa-circle-notch text-slate-300'} ${isAnchor && 'text-blue-400'}`}></i>
                                                            <span className="text-sm">{key} {isAnchor && <span className="ml-1 text-[10px] text-blue-500 font-bold">(고정)</span>}</span>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="p-4 bg-slate-50 flex justify-between items-center border-t border-slate-200 shrink-0">
                                    <button onClick={() => {}} className="text-slate-500 hover:text-slate-800 font-bold text-[13px] px-2 flex items-center transition-colors">
                                        <i className="fas fa-undo mr-1.5"></i>기본값 복원
                                    </button>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowSettings(false)} className="px-6 py-2.5 bg-slate-200 text-slate-700 rounded-lg text-[13px] font-bold hover:bg-slate-300 transition-colors">닫기</button>
                                        <button onClick={() => setShowSettings(false)} className="px-8 py-2.5 bg-blue-600 text-white rounded-lg text-[13px] font-black shadow-md hover:bg-blue-700 transition-colors flex items-center">
                                            <i className="fas fa-save mr-2"></i>저장하기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
