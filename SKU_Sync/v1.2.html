<body class="bg-[#f1f5f9] overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // =========================================================================
        // 🧩 0. Constants & ONEAPP Dictionary
        // =========================================================================
        const ONEAPP_CATEGORIES = [
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '무우', erp3Code: '11010', orders3Code: '101010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '알타리', erp3Code: '11011', orders3Code: '101011' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '배추', erp3Code: '11012', orders3Code: '101012' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '대파', erp3Code: '11013', orders3Code: '101013' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '마늘', erp3Code: '11014', orders3Code: '101014' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '양파', erp3Code: '11015', orders3Code: '101015' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '감자/고구마/당근', c2Code: '1020', c3Name: '감자', erp3Code: '11020', orders3Code: '102010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '감자/고구마/당근', c2Code: '1020', c3Name: '고구마', erp3Code: '11021', orders3Code: '102011' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '버섯류', c2Code: '1030', c3Name: '새송이버섯', erp3Code: '11030', orders3Code: '103010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '버섯류', c2Code: '1030', c3Name: '팽이버섯', erp3Code: '11031', orders3Code: '103011' },
            { c1Name: '수산.축산', c1Code: '20', c2Name: '돼지고기', c2Code: '2010', c3Name: '삼겹살', erp3Code: '21010', orders3Code: '201010' },
            { c1Name: '수산.축산', c1Code: '20', c2Name: '닭고기', c2Code: '2020', c3Name: '생닭', erp3Code: '22010', orders3Code: '202010' },
            { c1Name: '가공.식품', c1Code: '30', c2Name: '면류', c2Code: '3010', c3Name: '라면', erp3Code: '31010', orders3Code: '301010' },
            { c1Name: '양념.소스', c1Code: '40', c2Name: '장류', c2Code: '4010', c3Name: '쌈장', erp3Code: '41030', orders3Code: '401030' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '재단비닐', erp3Code: '52056', orders3Code: '502056' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '비닐봉투', erp3Code: '52036', orders3Code: '502036' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '단무지비닐', erp3Code: '52044', orders3Code: '502044' }
        ];

        const NUMERIC_HEADERS = ["안전재고", "출고가", "입고가"];

        const VISIBLE_UPLOAD_COLS = { 
            estimate: ['입고가', '출고가', '구매처', '간단설명'],
            parser: ['입고가', '단위', '간단설명']
        };
        const MASTER_LINKS = { 
            estimate: { '창고': '창고', '구매처': '구매처', '입고가': '입고가', '출고가': '출고가', '간단설명': '간단설명' },
            parser: { '입고가': '입고가', '단위': '단위', '간단설명': '간단설명' }
        };

        const getInitialMappings = () => ({
            estimate: { '품목코드': '품목코드, 상품코드', '품목명': '품목명, 상품명, 품명', '규격': '규격명, 규격', '구매처': '거래처명, 구매처', '입고가': '입고가, 매입가', '출고가': '출고가, 판매가' },
            parser: { '품목명': '품목명', '규격': '규격', '입고가': '입고가', '단위': '단위' }
        });

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[100px] w-[100px] max-w-[100px]';
            if (h === '구매처' || h === '거래처명') return 'min-w-[120px] w-[120px] max-w-[120px]';
            if (h === '간단설명') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '오더즈' || h === '3코드') return 'min-w-[80px] w-[80px] max-w-[80px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const formatMoney = (num) => Math.round(num).toLocaleString() + '원';

        // =========================================================================
        // 🚀 1. Core Logic: Ingest & Match & Route Engine
        // =========================================================================
        const IngestEngine = {
            parseNum: (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0),
            normalizeText: (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '',
            tokenize: (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [],
            createHeaderMap: (actualHeaders, mappingConfig) => {
                const headerMap = {};
                if(!mappingConfig) return headerMap;
                Object.keys(mappingConfig).forEach(field => {
                    const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                    const matchedKey = actualHeaders.find(h => {
                        if(!h) return false;
                        const cleanH = String(h).toLowerCase().replace(/\s/g, '');
                        return keywords.some(kw => cleanH.includes(kw));
                    });
                    if(matchedKey) headerMap[field] = matchedKey;
                });
                return headerMap;
            },
            parseExcelRobust: (file) => {
                return new Promise((resolve, reject) => {
                    if (!window.XLSX) return reject(new Error("엑셀 파서 로드 대기중"));
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonAll = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });
                        
                        let headerRowIdx = 0;
                        const maxSearch = Math.min(15, jsonAll.length);
                        for (let i = 0; i < maxSearch; i++) {
                            const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                            if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { 
                                headerRowIdx = i; break; 
                            }
                        }
                        const headers = jsonAll[headerRowIdx];
                        let endIdx = jsonAll.length - 1;
                        
                        while (endIdx > headerRowIdx) {
                            const rowArr = jsonAll[endIdx];
                            if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                            let filledCount = 0, rawStr = '';
                            for(let i=0; i<rowArr.length; i++) {
                                const val = rowArr[i];
                                if(val !== undefined && val !== null && String(val).trim() !== '') { filledCount++; rawStr += String(val).replace(/\s/g, ''); }
                            }
                            if (rawStr === '') { endIdx--; continue; }
                            if ((rawStr.includes('출력') || rawStr.includes('합계')) && filledCount <= 4) endIdx--;
                            else break;
                        }

                        const parsedData = [];
                        for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                            const row = jsonAll[i];
                            if (!row) continue;
                            let isEmpty = true; const obj = {}; 
                            headers.forEach((h, idx) => { 
                                if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; }
                            }); 
                            if(!isEmpty) parsedData.push(obj);
                        }
                        resolve(parsedData);
                    };
                    reader.readAsArrayBuffer(file);
                });
            },
            parseTextSemantically: (rawText) => {
                let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
                const results = []; let currentItem = {};
                const pushItem = () => {
                    if (currentItem.품목명) {
                        if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, '');
                        results.push({ _id: crypto.randomUUID(), _apply: false, ...currentItem });
                    }
                    currentItem = {};
                };

                lines.forEach(line => {
                    if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^마감$/.test(line) || /이미지\s*준비중/i.test(line)) return;
                    const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                    let extractedPrice = null;
                    if (priceMatch) {
                        extractedPrice = priceMatch[1];
                        line = line.replace(priceMatch[0], '').trim();
                        if (line.endsWith('/')) line = line.slice(0, -1).trim();
                    }
                    if (extractedPrice) currentItem.입고가 = extractedPrice;
                    if (!line) { if (extractedPrice) pushItem(); return; }

                    if (!currentItem.품목명) {
                        if (line.includes(' / ')) {
                            const splitParts = line.split(' / ');
                            let namePart = splitParts[0].trim(); let specPart = splitParts.slice(1).join(' / ').trim();
                            const unitMatch = namePart.match(/(EA|BOX|포|개|박스|봉|캔|병|팩|단|마리)$/i);
                            if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } 
                            else { currentItem.품목명 = namePart; }
                            const specParts = specPart.split('/').map(s => s.trim());
                            currentItem.규격 = specParts[0] || '';
                        } else { currentItem.품목명 = line; }
                    } else {
                        if (line.includes('/')) {
                            const parts = line.split('/').map(s => s.trim());
                            if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                            if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                        } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입)/i.test(line)) {
                            currentItem.규격 = line;
                        }
                    }
                    if (extractedPrice) pushItem();
                });
                if (currentItem.품목명) pushItem();
                return results;
            }
        };

        const MatchEngine = {
            findCategoryInfo: (keyword) => {
                if (!keyword) return null;
                return ONEAPP_CATEGORIES.find(c => keyword.includes(c.c3Name) || c.c3Name.includes(keyword)) || null;
            },
            searchMasterProducts: (productsObj, keyword) => {
                if (!keyword || !keyword.trim()) return [];
                const cleanKw = keyword.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                const tokens = cleanKw.split(/\s+/).filter(t => t.length > 0);
                if (tokens.length === 0) return [];
                const results = Object.values(productsObj).map(m => {
                    const mName = String(m.품목명 || '').toLowerCase(); const mSpec = String(m.규격 || '').toLowerCase();
                    let score = 0, matchCount = 0;
                    tokens.forEach(token => {
                        if (mName.includes(token)) { score += token.length * 10; matchCount++; } 
                        else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; } 
                    });
                    if ((mName + mSpec).replace(/\s+/g, '').includes(cleanKw.replace(/\s+/g, ''))) score += 1000;
                    return { item: m, score, matchCount };
                }).filter(r => r.score > 0);
                results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
                return results.map(r => r.item);
            },
            runSmartMatch: (extName, extSpec, mProducts, pDict) => {
                const normExtName = IngestEngine.normalizeText(extName), normExtSpec = IngestEngine.normalizeText(extSpec);
                const dictKey = `${normExtName}|${normExtSpec}`;
                if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 사전학습일치' };
                let bestMatch = null, bestScore = 0;
                const extTokens = IngestEngine.tokenize(extName);
                for (const mCode in mProducts) {
                    const m = mProducts[mCode];
                    const mNormName = IngestEngine.normalizeText(m.품목명), mTokens = IngestEngine.tokenize(m.품목명);
                    let score = 0;
                    if (mNormName === normExtName) score = 1;
                    else {
                        const intersection = extTokens.filter(t => mTokens.includes(t));
                        score = intersection.length / Math.max(extTokens.length, mTokens.length);
                    }
                    if (score > 0.6) { if (score > bestScore) { bestScore = score; bestMatch = m; } }
                }
                if (bestMatch && bestScore === 1) return { code: bestMatch.코드, status: '🟢 완전일치' };
                if (bestMatch && bestScore > 0.6) return { code: '', status: '🟡 유사발견' };
                return { code: '', status: '🔴 불일치' };
            },
            generatePseudoSKU: (orders3Code) => {
                const seq = String(Math.floor(100 + Math.random() * 900)); // 100~999
                return `${orders3Code || '999999'}${seq}`;
            }
        };

        const RouteEngine = {
            exportToExcel: (fullDisplayRows, masterProducts, showToast, onClose) => {
                showToast(`⏳ 통합 동기화 엑셀 조립 중...`);
                setTimeout(() => {
                    const wb = window.XLSX.utils.book_new(); 
                    let erpData = [['품목코드', '카테고리(3코드)', '매입가', '출고가']]; 
                    let shopData = [['상품코드', '쇼핑몰분류(오더즈)', '상품명', '규격', '출고가', '브랜드', '간단설명']];
                    
                    fullDisplayRows.forEach(row => {
                        const mItem = masterProducts[row.코드] || {}, final = row.finalData || {};
                        const pIn = final['입고가'] !== undefined ? final['입고가'] : (mItem['입고가'] || 0);
                        const pOut = final['출고가'] !== undefined ? final['출고가'] : (mItem['출고가'] || 0);
                        const dName = final['품목명'] || mItem['품목명'] || '';
                        const dSpec = final['규격'] || mItem['규격'] || '';
                        const erpCategory = final['3코드'] || mItem['3코드'] || '';
                        const shopCategory = final['오더즈'] || mItem['오더즈'] || '';
                        erpData.push([row.코드, erpCategory, pIn, pOut]);
                        shopData.push([row.코드, shopCategory, dName, dSpec, pOut, mItem['브랜드'] || '', mItem['간단설명'] || '']);
                    });

                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), "쇼핑몰_업로드용"); 
                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), "ERP_수발주동기용"); 
                    window.XLSX.writeFile(wb, `ONEAPP_SKU라우팅_${new Date().toISOString().slice(0,10)}.xlsx`);
                    showToast(`✅ 이원화된 동기화 파일 생성이 완료되었습니다.`);
                    if(onClose) onClose();
                }, 400);
            },
            sendToWebhook: (fullDisplayRows, masterProducts, webhookUrl, showToast, onClose) => {
                if (!webhookUrl) {
                    showToast("⚠️ 설정에서 Webhook URL을 먼저 등록해주세요.");
                    return;
                }
                showToast("🚀 MerchOps로 데이터를 전송합니다...");
                
                setTimeout(() => {
                    console.log(`Sending ${fullDisplayRows.length} items to ${webhookUrl}`);
                    showToast("✅ MerchOps 동기화 전송이 성공적으로 완료되었습니다.");
                    if(onClose) onClose();
                }, 1000);
            }
        };

        // =========================================================================
        // 💾 3. Store (전역 상태 관리)
        // =========================================================================
        const useConfigStore = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem('skuSyncCloudUrl_v6') || '');
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('skuSyncMappings_v6'); return s ? JSON.parse(s) : getInitialMappings(); 
            });
            useEffect(() => {
                localStorage.setItem('skuSyncCloudUrl_v6', cloudUrl); 
                localStorage.setItem('skuSyncMappings_v6', JSON.stringify(mappings));
            }, [cloudUrl, mappings]);
            return { cloudUrl, setCloudUrl, mappings, setMappings };
        };

        const usePipelineStore = () => {
            const [masterProducts, setMasterProducts] = useState(() => { 
                try { const s = localStorage.getItem('skuSyncMaster_v6'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } 
            });
            const [managedItems, setManagedItems] = useState({});
            const [parserBuffer, setParserBuffer] = useState([]);
            const [parserDict, setParserDict] = useState(() => { 
                try { return JSON.parse(localStorage.getItem('skuSyncParserDict_v6')) || {}; } catch(e){ return {}; }
            });
            const [masterCatalogProducts, setMasterCatalogProducts] = useState([]);

            const saveMasterToLocal = useCallback((data) => { try { localStorage.setItem('skuSyncMaster_v6', JSON.stringify(data)); } catch(e) {} }, []);
            
            return { 
                masterProducts, setMasterProducts, managedItems, setManagedItems, parserBuffer, setParserBuffer, parserDict, setParserDict, saveMasterToLocal,
                masterCatalogProducts, setMasterCatalogProducts
            };
        };

        const useViewStore = () => {
            const [viewMode, setViewMode] = useState('catalog');
            const [parserFilter, setParserFilter] = useState('matched'); 
            const [parserState, setParserState] = useState({ targetId: null, searchKey: '' });
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState(''); 
            
            const [showExportModal, setShowExportModal] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            const [showSmartParserModal, setShowSmartParserModal] = useState(false);
            
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                viewMode, setViewMode, parserFilter, setParserFilter, parserState, setParserState, selectedRows, setSelectedRows, globalSearch, setGlobalSearch,
                showExportModal, setShowExportModal, showSettings, setShowSettings, showSmartParserModal, setShowSmartParserModal,
                toastMsg, showToast, isProcessing, setIsProcessing, processMsg, setProcessMsg
            };
        };

        // =========================================================================
        // 🧩 4. UI Layout & View Components
        // =========================================================================

        const TopHeader = ({ itemCount, isProcessing, processMsg, uiActions }) => {
            const now = new Date();
            const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            let statusText = `DB: ${itemCount}건 로드됨 (${dateStr} ${timeStr})`;
            if (isProcessing) statusText = `${processMsg} (${dateStr} ${timeStr})`;

            return (
                <div className="h-16 bg-[#0B1021] text-white flex items-center justify-between px-6 shrink-0 z-50">
                    <div className="flex items-center gap-3">
                        <span className="font-black text-xl tracking-wider text-indigo-400">ONEAPP</span>
                        <div className="flex flex-col ml-1 border-l border-slate-700 pl-4">
                            <span className="font-bold text-[15px] leading-tight">SKU Sync</span>
                            <span className="text-[10px] text-slate-400 font-mono tracking-widest mt-0.5">PIPELINE ENGINE</span>
                        </div>
                    </div>

                    <div className="flex-1 max-w-2xl mx-8">
                        <div className="bg-[#050814] border border-[#1A2235] rounded-md flex items-center px-4 py-2 font-mono text-[13px] shadow-inner h-9">
                            <span className="text-emerald-500 mr-2 opacity-80">{'>'}</span>
                            <span className={isProcessing ? "text-indigo-400" : "text-emerald-400"}>{statusText}</span>
                            <span className="ml-2 w-1.5 h-3.5 bg-emerald-500 animate-pulse inline-block"></span>
                        </div>
                    </div>

                    <div className="flex gap-2.5 items-center">
                        <button onClick={() => uiActions.triggerMasterLoad()} className="w-9 h-9 rounded bg-[#1A2235] hover:bg-indigo-900 flex items-center justify-center border border-slate-800 transition-colors shadow" title="본사 마스터 DB 불러오기">
                            <i className="fas fa-folder-open text-indigo-300 text-sm"></i>
                        </button>
                        <button onClick={() => uiActions.setShowExportModal(true)} className="w-9 h-9 rounded bg-[#1A2235] hover:bg-indigo-900 flex items-center justify-center border border-slate-800 transition-colors shadow" title="라우팅 출력 / 구글 시트 업로드 (F9)">
                            <i className="fas fa-cloud-upload-alt text-indigo-300 text-sm"></i>
                        </button>
                        <button onClick={() => uiActions.setShowSettings(true)} className="w-9 h-9 rounded bg-[#1A2235] hover:bg-slate-700 flex items-center justify-center border border-slate-800 transition-colors shadow ml-1" title="환경설정 (매핑센터)">
                            <i className="fas fa-cog text-slate-300 text-sm"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const ActionToolbar = ({ state, actions }) => {
            const { viewMode, globalSearch, isEstimateUploaded } = state;
            const fileInputRef = useRef(null);

            const TabButton = ({ id, label, icon }) => {
                const active = viewMode === id;
                return (
                    <button 
                        onClick={() => actions.setViewMode(id)}
                        className={`flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-t-lg border border-b-0 transition-colors
                            ${active ? 'bg-white border-gray-200 text-indigo-700 z-10 relative shadow-[0_-2px_4px_rgba(0,0,0,0.02)]' : 'bg-slate-100 border-transparent text-slate-500 hover:bg-slate-200 hover:text-slate-700'}`}
                        style={{ marginBottom: active ? '-1px' : '0' }}
                    >
                        {icon && <i className={`fas ${icon} ${active ? 'text-indigo-600' : 'text-slate-400'}`}></i>}
                        {label} {id === 'parser' && <i className="fas fa-plus-circle text-[10px] text-slate-400 ml-1 hover:text-indigo-500" onClick={(e)=>{e.stopPropagation(); actions.setShowSmartParserModal(true);}}></i>}
                    </button>
                );
            };

            return (
                <div className="px-6 pt-5 bg-slate-50 border-b border-gray-200 flex items-end justify-between shrink-0 relative z-10">
                    <div className="flex gap-1">
                        <TabButton id="catalog" label="카테고리 소싱" icon="fa-sitemap" />
                        <TabButton id="default" label="엑셀 뷰 ↑" />
                        <TabButton id="parser" label="파서 뷰 ⊕" />
                        <TabButton id="smartform" label="스마트 폼" />
                        <TabButton id="bom" label="BOM 조립" />
                    </div>

                    <div className="flex items-center gap-3 pb-2.5">
                        {isEstimateUploaded && viewMode === 'default' && (
                            <button onClick={actions.handleCommitEstimate} className="px-3 py-1.5 border border-indigo-200 text-indigo-600 rounded text-xs font-bold bg-white hover:bg-indigo-50 transition-colors shadow-sm">
                                캐시에 확정
                            </button>
                        )}
                        {viewMode === 'parser' && (
                            <button onClick={actions.handleParserApply} className="px-3 py-1.5 border border-indigo-200 text-indigo-600 rounded text-xs font-bold bg-white hover:bg-indigo-50 transition-colors shadow-sm">
                                매칭 반영
                            </button>
                        )}

                        <button onClick={() => fileInputRef.current.click()} className="px-3 py-1.5 border border-emerald-500 text-emerald-600 rounded text-xs font-bold bg-white hover:bg-emerald-50 transition-colors shadow-sm flex items-center">
                            <i className="fas fa-file-excel mr-1.5"></i> 내 엑셀 파이프라인 등록
                        </button>
                        <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls, .csv" multiple onChange={actions.handleFileUpload} />
                        
                        <div className="w-px h-4 bg-gray-300 mx-1"></div>

                        <div className="relative w-64 h-[30px]">
                            <input 
                                id="main-search-input"
                                type="text" 
                                placeholder="검색 (F3)" 
                                value={globalSearch} 
                                onChange={(e) => actions.handleGlobalSearchChange(e.target.value)}
                                className="w-full h-full pl-3 pr-8 bg-white border border-gray-300 rounded text-xs outline-none focus:border-indigo-500 transition-colors"
                            />
                            <i className="fas fa-search absolute right-3 top-[9px] text-gray-400 text-[11px] pointer-events-none"></i>
                        </div>
                        
                        <button onClick={actions.handleReset} className="w-[30px] h-[30px] border border-gray-300 rounded bg-white flex items-center justify-center hover:bg-gray-50 transition-colors shadow-sm" title="초기화">
                            <i className="fas fa-redo-alt text-gray-500 text-xs"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const EmptyState = () => (
            <div className="flex flex-col items-center justify-center h-full w-full py-32 bg-white">
                <i className="fas fa-folder-open text-[40px] mb-4 text-slate-300"></i>
                <p className="text-sm text-slate-400 font-medium">데이터가 없습니다.</p>
            </div>
        );

        // --- 4.0 Category Sourcing View ---
        const CategorySourcingView = ({ data, ui }) => {
            const [sourcingMode, setSourcingMode] = useState('PRODUCT'); // 'PRODUCT' | 'CATEGORY'
            const [activeC1, setActiveC1] = useState('');
            const [activeC2, setActiveC2] = useState('');
            const [cartItems, setCartItems] = useState([]);
            const [skuSettings, setSkuSettings] = useState({
                prefix: 'SHOP',
                optionCode: new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }).replace(/\./g, '').replace(/\s/g, ''),
                counter: 1
            });
            
            // 체크박스 및 드래그 다중 선택 상태
            const [checkedItems, setCheckedItems] = useState(new Set());
            const [dragMode, setDragMode] = useState(null); // true: 체크중, false: 해제중, null: 대기

            // 1. 데이터 추출 (1차, 2차 카테고리)
            const c1List = useMemo(() => {
                const map = new Map();
                data.masterCatalogProducts.forEach(p => {
                    if (p.c1Code && !map.has(p.c1Code)) map.set(p.c1Code, p.c1Name || p.c1Code);
                });
                return Array.from(map.entries()).map(([code, name]) => ({code, name})).sort((a,b) => a.code.localeCompare(b.code));
            }, [data.masterCatalogProducts]);

            useEffect(() => {
                if (c1List.length > 0 && !c1List.find(c => c.code === activeC1)) {
                    setActiveC1(c1List[0].code);
                }
            }, [c1List]);

            const c2List = useMemo(() => {
                if(!activeC1) return [];
                const map = new Map();
                data.masterCatalogProducts.filter(p => p.c1Code === activeC1).forEach(p => {
                    if (p.c2Code && !map.has(p.c2Code)) map.set(p.c2Code, p.c2Name || p.c2Code);
                });
                return Array.from(map.entries()).map(([code, name]) => ({code, name})).sort((a,b) => a.code.localeCompare(b.code));
            }, [data.masterCatalogProducts, activeC1]);

            useEffect(() => {
                if (c2List.length > 0 && !c2List.find(c => c.code === activeC2)) {
                    setActiveC2(c2List[0].code);
                } else if (c2List.length === 0) {
                    setActiveC2('');
                }
            }, [c2List, activeC1]);

            // 2. 디스플레이 데이터
            const displayItems = useMemo(() => {
                if (!activeC2) return [];
                
                if (sourcingMode === 'PRODUCT') {
                    return data.masterCatalogProducts.filter(p => p.c2Code === activeC2);
                } else {
                    const map = new Map();
                    data.masterCatalogProducts.filter(p => p.c2Code === activeC2).forEach(p => {
                        if (p.c3Code && !map.has(p.c3Code)) {
                            map.set(p.c3Code, { c3Code: p.c3Code, c3Name: p.c3Name, ordersCode: p.ordersCode });
                        }
                    });
                    return Array.from(map.values()).sort((a,b) => a.c3Code.localeCompare(b.c3Code));
                }
            }, [data.masterCatalogProducts, activeC2, sourcingMode]);

            // 카테고리/모드 변경 시 선택 초기화
            useEffect(() => { setCheckedItems(new Set()); }, [activeC1, activeC2, sourcingMode]);

            // 글로벌 MouseUp (드래그 종료)
            useEffect(() => {
                const handleGlobalMouseUp = () => setDragMode(null);
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => window.removeEventListener('mouseup', handleGlobalMouseUp);
            }, []);

            const generateSKU = (c1Code, currentCounter) => {
                const seq = String(currentCounter).padStart(3, '0');
                const catPrefix = c1Code === '10' ? 'C1' : c1Code === '20' ? 'F1' : c1Code === '30' ? 'F2' : c1Code === '40' ? 'S1' : 'E1';
                return `${skuSettings.prefix}-${catPrefix}-${skuSettings.optionCode}-${seq}`;
            };

            // 복사 로직 통합
            const handleCopyMultiple = (items) => {
                let currentCounter = skuSettings.counter;
                const newItems = [];

                items.forEach(item => {
                    if (sourcingMode === 'PRODUCT') {
                        if (cartItems.some(c => c.masterId === item.id)) return;
                        newItems.push({
                            cartId: Date.now() + Math.random(), masterId: item.id, name: item.name, spec: item.spec, 
                            basePrice: item.basePrice, sku: generateSKU(item.c1Code, currentCounter++),
                            c3Name: item.c3Name, ordersCode: item.ordersCode, erp3Code: item.c3Code
                        });
                    } else {
                        newItems.push({
                            cartId: Date.now() + Math.random(), masterId: `TEMPLATE-${item.c3Code}-${Date.now() + Math.random()}`, 
                            name: '', spec: '', basePrice: 0, 
                            sku: generateSKU(activeC1, currentCounter++),
                            c3Name: item.c3Name, ordersCode: item.ordersCode, erp3Code: item.c3Code
                        });
                    }
                });

                if(newItems.length > 0) {
                    setCartItems(prev => [...prev, ...newItems]);
                    setSkuSettings(prev => ({ ...prev, counter: currentCounter }));
                    ui.showToast(`✅ ${newItems.length}건이 큐에 추가되었습니다.`);
                }
            };

            const handleCopyItem = (item) => handleCopyMultiple([item]);
            
            const handleCopySelected = () => {
                const itemsToCopy = displayItems.filter(item => checkedItems.has(sourcingMode === 'PRODUCT' ? item.id : item.c3Code));
                if (itemsToCopy.length === 0) return ui.showToast('⚠️ 선택된 항목이 없습니다.');
                handleCopyMultiple(itemsToCopy);
                setCheckedItems(new Set()); // 복사 후 체크 해제
            };

            // --- 체크박스 드래그 선택 로직 ---
            const handleRowMouseDown = (e, id) => {
                if (e.button !== 0) return; // 좌클릭만 허용
                if (e.target.closest('button')) return; // 복사 버튼 클릭시 무시

                const isCurrentlyChecked = checkedItems.has(id);
                const newMode = !isCurrentlyChecked;
                setDragMode(newMode);

                setCheckedItems(prev => {
                    const next = new Set(prev);
                    if (newMode) next.add(id); else next.delete(id);
                    return next;
                });
            };

            const handleRowMouseEnter = (id) => {
                if (dragMode === null) return;
                setCheckedItems(prev => {
                    const next = new Set(prev);
                    if (dragMode) next.add(id); else next.delete(id);
                    return next;
                });
            };

            const handleToggleAll = (e) => {
                if (e.target.checked) {
                    const allIds = displayItems.map(item => sourcingMode === 'PRODUCT' ? item.id : item.c3Code);
                    setCheckedItems(new Set(allIds));
                } else {
                    setCheckedItems(new Set());
                }
            };

            // -------------------------------

            const handleUpdateCartItem = (cartId, field, value) => {
                setCartItems(prev => prev.map(item => item.cartId === cartId ? { ...item, [field]: value } : item));
            };

            const handleRemoveCartItem = (cartId) => setCartItems(prev => prev.filter(item => item.cartId !== cartId));

            const handleRegisterProducts = () => {
                if(cartItems.length === 0) return;
                
                const invalidItem = cartItems.find(item => !item.name.trim());
                if (invalidItem) return ui.showToast('⚠️ 품목명이 비어있는 상품이 있습니다. 큐에서 이름을 입력해주세요.');

                const newManaged = { ...data.managedItems };
                cartItems.forEach(item => {
                    newManaged[item.sku] = {
                        코드: item.sku,
                        sources: { 'catalog': { ...item } },
                        finalData: { 
                            '품목명': item.name, '규격': item.spec || 'EA', '구매처': '자체조달',
                            '입고가': IngestEngine.parseNum(item.basePrice),
                            '출고가': 0, 
                            '오더즈': item.ordersCode || '999999', '3코드': item.erp3Code || '999999', '3그룹명': item.c3Name || '기타'
                        }
                    };
                });
                data.setManagedItems(newManaged);
                ui.showToast(`✅ ${cartItems.length}개의 상품이 파이프라인 큐에 등록되었습니다.`);
                setCartItems([]);
                ui.setViewMode('default');
            }

            return (
                <div className="h-full flex flex-col overflow-hidden select-none border border-t-0 border-gray-200 rounded-b-lg mx-6 mb-6 bg-white">
                    {/* 1Depth Categories (Top Row) */}
                    <div className="flex items-end px-2 pt-2 border-b border-gray-200 bg-slate-50 shrink-0 h-[52px]">
                        <div className="flex overflow-x-auto custom-scrollbar h-full items-end w-full">
                            {c1List.length === 0 && <span className="text-sm text-slate-400 px-4 pb-2">마스터 DB를 로드해주세요.</span>}
                            {c1List.map(c => (
                                <button 
                                    key={c.code} onClick={() => setActiveC1(c.code)} 
                                    className={`px-5 py-2 text-[13px] font-bold rounded-t-lg transition-colors border-b-[3px]
                                    ${activeC1 === c.code ? 'border-indigo-600 text-indigo-700 bg-white shadow-[0_-2px_5px_rgba(0,0,0,0.02)]' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}`}
                                >
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Split Body */}
                    <div className="flex-1 flex overflow-hidden">
                        {/* 2Depth Categories (Left Vertical Column) */}
                        <div className="w-[150px] bg-white border-r border-gray-200 overflow-y-auto py-2 shrink-0 custom-scrollbar shadow-[2px_0_10px_rgba(0,0,0,0.02)] z-10">
                            {c2List.map(c => (
                                <button 
                                    key={c.code} onClick={() => setActiveC2(c.code)}
                                    className={`w-full text-left px-4 py-3 text-[13px] font-bold transition-all border-l-4 
                                    ${activeC2 === c.code ? 'bg-indigo-50/50 text-indigo-700 border-indigo-600' : 'border-transparent text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                                >
                                    {c.name}
                                </button>
                            ))}
                        </div>

                        {/* 3Depth Categories / Products (Center Area) */}
                        <div className="flex-1 flex flex-col bg-white border-r border-gray-200 z-0">
                            {/* Table Header: 항목명/입고가/전체복사 열맞춤 및 체크박스 추가 */}
                            <div className="flex items-center px-4 py-2 bg-slate-50 border-b border-gray-200 text-[11px] font-bold text-slate-500 shrink-0">
                                <div className="w-8 flex justify-center shrink-0">
                                    <input 
                                        type="checkbox" 
                                        className="w-3.5 h-3.5 cursor-pointer accent-indigo-600" 
                                        checked={displayItems.length > 0 && checkedItems.size === displayItems.length}
                                        onChange={handleToggleAll} 
                                    />
                                </div>
                                {sourcingMode === 'PRODUCT' ? (
                                    <>
                                        <div className="w-24">상품코드</div>
                                        <div className="flex-1">본사 상품명 (규격)</div>
                                        <div className="w-24 text-right pr-4">입고가</div>
                                        <div className="w-16 text-center pr-2">
                                            <button onClick={handleCopySelected} className="px-2 py-1 bg-white border border-slate-300 hover:bg-slate-100 text-slate-600 rounded text-[10px] transition-colors shadow-sm whitespace-nowrap">선택 복사</button>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="w-24 text-center">오더즈/ERP</div>
                                        <div className="flex-1 px-4">3차 카테고리명</div>
                                        <div className="w-24 text-right pr-4"></div>
                                        <div className="w-16 text-center pr-2">
                                            <button onClick={handleCopySelected} className="px-2 py-1 bg-white border border-slate-300 hover:bg-slate-100 text-slate-600 rounded text-[10px] transition-colors shadow-sm whitespace-nowrap">선택 복사</button>
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* List Content */}
                            <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                                {data.masterCatalogProducts.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                        <i className="fas fa-folder-open text-4xl mb-4 text-indigo-300 opacity-50"></i>
                                        <p className="font-bold text-[15px] text-slate-600 mb-1">본사 마스터 DB가 비어있습니다.</p>
                                    </div>
                                ) : displayItems.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                        <i className="fas fa-search text-4xl mb-3 opacity-20"></i><p className="font-bold text-sm">조건에 맞는 데이터가 없습니다.</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col select-none pb-2">
                                        {sourcingMode === 'PRODUCT' ? (
                                            displayItems.map((p) => {
                                                const isChecked = checkedItems.has(p.id);
                                                return (
                                                <div 
                                                    key={p.id} 
                                                    onMouseDown={(e) => handleRowMouseDown(e, p.id)}
                                                    onMouseEnter={() => handleRowMouseEnter(p.id)}
                                                    className={`flex items-center px-4 py-2 border-b transition-colors cursor-pointer ${isChecked ? 'bg-indigo-50/50 border-indigo-100' : 'border-slate-100 bg-white hover:bg-slate-50'}`}
                                                >
                                                    <div className="w-8 flex justify-center shrink-0">
                                                        <input type="checkbox" checked={isChecked} readOnly className="w-3.5 h-3.5 pointer-events-none accent-indigo-600" />
                                                    </div>
                                                    <div className="w-24 shrink-0 text-[11px] font-mono text-slate-400 pointer-events-none">{p.id}</div>
                                                    <div className="flex-1 flex flex-col justify-center truncate pr-4 pointer-events-none">
                                                        <div className={`text-sm font-bold truncate transition-colors ${isChecked ? 'text-indigo-800' : 'text-slate-800'}`}>{p.name} <span className={`text-xs font-normal ml-1 ${isChecked ? 'text-indigo-500' : 'text-slate-500'}`}>{p.spec}</span></div>
                                                    </div>
                                                    <div className="w-24 text-right shrink-0 pr-4 pointer-events-none">
                                                        <div className={`text-sm font-black transition-colors ${isChecked ? 'text-indigo-600' : 'text-slate-700'}`}>{formatMoney(p.basePrice)}</div>
                                                    </div>
                                                    <div className="w-16 text-center shrink-0 pr-2">
                                                        <button onClick={(e) => { e.stopPropagation(); handleCopyItem(p); }} className={`w-full py-1 rounded text-[11px] font-bold transition-colors border ${isChecked ? 'text-indigo-700 bg-indigo-100 border-indigo-200 hover:bg-indigo-600 hover:text-white' : 'text-indigo-600 bg-indigo-50 hover:bg-indigo-600 hover:text-white border-indigo-100'}`}>
                                                            복사
                                                        </button>
                                                    </div>
                                                </div>
                                            )})
                                        ) : (
                                            displayItems.map((c) => {
                                                const isChecked = checkedItems.has(c.c3Code);
                                                return (
                                                <div 
                                                    key={c.c3Code} 
                                                    onMouseDown={(e) => handleRowMouseDown(e, c.c3Code)}
                                                    onMouseEnter={() => handleRowMouseEnter(c.c3Code)}
                                                    className={`flex items-center px-4 py-2.5 border-b transition-colors cursor-pointer ${isChecked ? 'bg-indigo-50/50 border-indigo-100' : 'border-slate-100 bg-white hover:bg-slate-50'}`}
                                                >
                                                    <div className="w-8 flex justify-center shrink-0">
                                                        <input type="checkbox" checked={isChecked} readOnly className="w-3.5 h-3.5 pointer-events-none accent-indigo-600" />
                                                    </div>
                                                    <div className="w-24 shrink-0 text-center flex flex-col gap-0.5 pointer-events-none">
                                                        <span className="text-[10px] font-mono text-slate-500">{c.ordersCode}</span>
                                                        <span className="text-[10px] font-mono text-slate-400">{c.c3Code}</span>
                                                    </div>
                                                    <div className="flex-1 px-4 pointer-events-none">
                                                        <div className={`text-sm font-bold transition-colors ${isChecked ? 'text-indigo-800' : 'text-slate-800'}`}>{c.c3Name}</div>
                                                    </div>

            const [searchKw, setSearchKw] = useState('');

            const searchResults = useMemo(() => {
                if(data.masterCatalogProducts.length === 0) return [];
                if(!searchKw.trim()) return data.masterCatalogProducts.slice(0, 50);
                
                const fuse = new Fuse(data.masterCatalogProducts, { keys: ['name', 'keywords', 'code', 'id'], threshold: 0.3 });
                return fuse.search(searchKw).map(r => r.item).slice(0, 50);
            }, [searchKw, data.masterCatalogProducts]);

            const addToBom = (item) => { if(!bomList.find(b => b.id === item.id)) setBomList([...bomList, { ...item, qty: 1 }]); };
            const updateQty = (id, delta) => setBomList(bomList.map(b => b.id === id ? { ...b, qty: Math.max(1, b.qty + delta) } : b));
            const removeFromBom = (id) => setBomList(bomList.filter(b => b.id !== id));
            const totalCost = bomList.reduce((sum, item) => sum + ((item.basePrice || 0) * item.qty), 0);

            const handleSubmit = () => {
                if(bomList.length < 2) return ui.showToast('⚠️ 상품을 2개 이상 선택하세요.');
                if(!bomName) return ui.showToast('⚠️ 세트 상품명을 입력하세요.');

                    코드: pseudoSKU,
                    sources: { 'bom': { '품목명': bomName, '규격': bomSpec, '입고가': totalCost, '간단설명': `구성: ${bomList.map(b=>b.name).join(', ')}` } },

                };

                                                        <div className="text-xs font-bold text-indigo-800 mb-2 uppercase tracking-wide">현재 적용된 시스템 룰 (V1.6 기준)</div>
                                                        <div className="flex items-center gap-2 text-indigo-900 font-mono text-sm bg-white px-4 py-3 rounded border border-indigo-200 shadow-sm">
                                                            <span className="font-black">오더즈코드(6자리)</span> <i className="fas fa-plus text-[10px] text-indigo-300"></i> <span className="font-black">시스템 일련번호(3자리)</span>
                                                        </div>
                                                        <p className="text-[11px] text-indigo-600 mt-3 leading-relaxed">
                                                            * 예시: '배추' 카테고리 (오더즈: 101012) 선택 시 <strong className="font-bold">101012842</strong> 포맷의 9자리 숫자로 채번됩니다.<br/>
                                                            * 이는 기존 ERP 체계와의 호환성을 유지하기 위한 고정 규칙입니다.
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {activeSettingTab === 'master' && (
                                            <div className="space-y-6 fade-in">
                                                <div>
                                                    <h3 className="text-lg font-bold text-slate-800 mb-2">통합 마스터 DB 다운로드</h3>
                                                    <p className="text-xs text-slate-500 mb-6 leading-relaxed">본사의 최신 마스터 상품 정보 및 표준 카테고리 딕셔너리가 <strong className="text-slate-700">시트별로 분리된 하나의 엑셀 파일</strong>로 일괄 다운로드됩니다. (초기 1회성 셋팅용)</p>
                                                    
                                                    <div onClick={executeMasterDownload} className="border border-emerald-200 rounded-lg p-5 cursor-pointer hover:border-emerald-500 hover:shadow-md transition-all group bg-emerald-50/30 w-1/2">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <h3 className="font-bold text-emerald-800 text-base"><i className="fas fa-file-excel text-emerald-500 mr-2 text-lg"></i>통합 마스터 DB (시트 분리)</h3>
                                                            <i className="fas fa-download text-emerald-300 group-hover:text-emerald-600 transition-colors text-lg"></i>
                                                        </div>
                                                        <p className="text-xs text-emerald-600/80 ml-7 leading-relaxed">
                                                            파일 내에 <strong className="text-emerald-700 font-bold">[본사상품정보]</strong> 시트와 <strong className="text-emerald-700 font-bold">[카테고리정보]</strong> 시트가 각각 분리되어 포함되어 있습니다.
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 px-8 py-5 border-t border-slate-200 flex justify-end shrink-0">
                                        <button onClick={() => ui.setShowSettings(false)} className="px-6 py-2.5 bg-[#1A2235] hover:bg-black text-white rounded-lg text-sm font-bold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">저장 및 닫기</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        // =========================================================================
        // ⚙️ 6. Main App
        // =========================================================================
        const App = () => {
            const config = useConfigStore();
            const data = usePipelineStore();
            const ui = useViewStore();
            const masterFileInputRef = useRef(null);

            const activeProfileKey = 'estimate';
            const isEstimateUploaded = Object.keys(data.managedItems).length > 0;

            let effectiveViewMode = ui.viewMode;
            if (ui.viewMode === 'parser' && data.parserBuffer.length === 0) effectiveViewMode = 'default';

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                if (effectiveViewMode === 'default') {
                    if (isEstimateUploaded) baseList = Object.values(data.managedItems);
                    else baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });
                    if (ui.globalSearch) {
                        const searchedMasters = MatchEngine.searchMasterProducts(data.masterProducts, ui.globalSearch);
                        const searchedCodes = new Set(searchedMasters.map(m => m.코드));
                        baseList = baseList.filter(i => searchedCodes.has(i.코드));
                    }
                } else if (effectiveViewMode === 'parser') {
                    if (ui.parserFilter === 'matched') baseList = data.parserBuffer.filter(r => r._matchCode);
                    else baseList = data.parserBuffer.filter(r => !r._matchCode);
                }
                return baseList;
            }, [effectiveViewMode, isEstimateUploaded, data.managedItems, data.masterProducts, ui.globalSearch, data.parserBuffer, ui.parserFilter]);

            const masterSearchResults = useMemo(() => {
                if (ui.viewMode !== 'parser' || ui.parserFilter === 'matched' || !ui.globalSearch.trim()) return [];
                return MatchEngine.searchMasterProducts(data.masterProducts, ui.globalSearch).slice(0, 50);
            }, [ui.globalSearch, data.masterProducts, ui.viewMode, ui.parserFilter]);

            // 💡 [핵심 기능] 본사 마스터 DB (엑셀/CSV) 불러오기 로직
            const handleMasterLoad = async (e) => {
                const files = Array.from(e.target.files); 
                const targetInput = e.target;
                if (files.length === 0) return;
                
                ui.setIsProcessing(true); 
                ui.setProcessMsg('본사 마스터 파싱 중...');
                await new Promise(resolve => setTimeout(resolve, 50)); 
                
                try {
                    const excelData = await IngestEngine.parseExcelRobust(files[0]);
                    
                    const catalogList = excelData.map(row => ({
                        // 엑셀 구조 매핑
                        id: row['품목코드'] || `TEMP-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                        c1Code: String(row['1코드'] || '').trim(),
                        c1Name: row['1그룹명'] || '',
                        c2Code: String(row['2코드'] || '').trim(),
                        c2Name: row['2그룹명'] || '',
                        c3Code: String(row['3코드'] || '').trim(),
                        c3Name: row['3그룹명'] || '',
                        ordersCode: String(row['오더즈'] || '').trim(),
                        name: row['품목명'] || '',
                        spec: row['규격'] || '',
                        basePrice: IngestEngine.parseNum(row['입고가'] || row['출고가'] || 0),
                        keywords: (row['검색어등록'] || row['간단설명'] || '').split(',').map(s=>s.trim()).filter(Boolean)
                    })).filter(p => p.name); // 이름이 있는 것만 추출
                    
                    data.setMasterCatalogProducts(catalogList);
                    ui.showToast(`✅ ${catalogList.length}건의 본사 상품정보를 불러왔습니다.`);
                    ui.setViewMode('catalog');
                } catch(error) { 
                    ui.showToast("❌ 마스터 파일 파싱 오류 발생"); 
                } finally { 
                    if (targetInput) targetInput.value = ''; 
                    ui.setIsProcessing(false); 
                    ui.setProcessMsg(''); 
                }
            };

            const handleFileUpload = async (e) => { 
                const files = Array.from(e.target.files); const targetInput = e.target; 
                if (files.length === 0) return; 
                ui.setIsProcessing(true); ui.setProcessMsg('엑셀 파싱 중...');
                await new Promise(resolve => setTimeout(resolve, 50)); 
                try {
                    let newMaster = { ...data.masterProducts }; let newManaged = { ...data.managedItems }; let totalCount = 0;
                    for (const file of files) {
                        const excelData = await IngestEngine.parseExcelRobust(file);
                        if (excelData.length === 0) continue;
                        const actualHeaders = Object.keys(excelData[0]);
                        const curMap = config.mappings['estimate'] || {};
                        const headerCache = IngestEngine.createHeaderMap(actualHeaders, curMap);
                        excelData.forEach(row => {
                            const codeKey = headerCache['품목코드'] || '품목코드'; const code = row[codeKey];
                            
                            const finalCode = code || `TEMP-${Date.now()}-${Math.floor(Math.random()*1000)}`;

                            if (String(finalCode).replace(/\s/g, '').includes('출력')) return;
                            
                            const rowName = row[headerCache['품목명'] || '품목명'] || '';
                            const categoryInfo = MatchEngine.findCategoryInfo(rowName);
                            
                            if (!newManaged[finalCode]) newManaged[finalCode] = { 코드: finalCode, sources: { estimate: {} }, finalData: {} };
                            let mItem = newManaged[finalCode];
                            mItem.sources.estimate['품목명'] = headerCache['품목명'] ? row[headerCache['품목명']] : '';
                            mItem.sources.estimate['규격'] = headerCache['규격'] ? row[headerCache['규격']] : '';
                            Object.keys(curMap).forEach(h => {
                                const actualKey = headerCache[h];
                                if(actualKey && row[actualKey] !== undefined && row[actualKey] !== '') {
                                    const isNumeric = NUMERIC_HEADERS.includes(h);
                                    mItem.finalData[h] = isNumeric ? IngestEngine.parseNum(row[actualKey]) : row[actualKey];
                                }
                            });
                            if (categoryInfo) {
                                mItem.finalData['오더즈'] = categoryInfo.orders3Code; mItem.finalData['3코드'] = categoryInfo.erp3Code; mItem.finalData['3그룹명'] = categoryInfo.c3Name;
                            }
                            totalCount++;
                        });
                    }
                    data.setManagedItems(newManaged); ui.setViewMode('default');
                    if(totalCount > 0) ui.showToast(`✅ ${totalCount}건 큐에 등록되었습니다.`);
                } catch(error) { ui.showToast("❌ 파싱 오류 발생"); } 
                finally { if (targetInput) targetInput.value = ''; ui.setIsProcessing(false); ui.setProcessMsg(''); }
            };

            const executeParser = (rawText) => { 
                ui.setShowSmartParserModal(false); ui.setIsProcessing(true); ui.setProcessMsg("패턴 분석 및 매칭 중...");
                setTimeout(() => {
                    const parsedData = IngestEngine.parseTextSemantically(rawText);
                    const results = [...data.parserBuffer]; 
                    parsedData.forEach(rowData => {
                        const matchResult = MatchEngine.runSmartMatch(rowData['품목명'] || '', rowData['규격'] || '', data.masterProducts, data.parserDict);
                        rowData._matchCode = matchResult.code; rowData._matchStatus = matchResult.status;
                        if(matchResult.code) { rowData._apply = true; rowData.코드 = matchResult.code; }
                        rowData.sources = { ['parser']: { ...rowData } }; rowData.finalData = { ...rowData };
                        Object.keys(rowData.finalData).forEach(k => { if (k.startsWith('_') || k === 'sources' || k === 'finalData' || k === '코드') delete rowData.finalData[k]; });
                        results.push(rowData);
                    });
                    data.setParserBuffer(results); ui.setViewMode('parser'); ui.setParserFilter('matched'); ui.setParserState({ targetId: null, searchKey: '' }); ui.setIsProcessing(false); ui.setProcessMsg(''); ui.showToast('✅ 텍스트 분석 완료.');
                }, 100);
            };

            const handleCommitEstimate = () => {
                if (ui.selectedRows.size === 0) return ui.showToast('⚠️ 반영할 데이터를 선택해주세요.');
                let newMaster = { ...data.masterProducts };
                ui.selectedRows.forEach(code => {
                    const item = data.managedItems[code]; if (!item) return;
                    if (!newMaster[code]) newMaster[code] = { 코드: code };
                    Object.assign(newMaster[code], item.finalData);
                });
                data.setMasterProducts(newMaster); ui.setSelectedRows(new Set()); data.saveMasterToLocal(newMaster); ui.showToast(`✅ 마스터 캐시에 업데이트 완료.`);
            };

            const handleParserApply = () => { 
                const toApply = data.parserBuffer.filter(r => r._apply && r._matchCode);
                if (toApply.length === 0) return;
                let newMaster = { ...data.masterProducts }; let newDict = { ...data.parserDict };
                toApply.forEach(row => {
                    const code = row._matchCode;
                    if (!newMaster[code]) newMaster[code] = { 코드: code };
                    newMaster[code]['입고가'] = IngestEngine.parseNum(row.finalData?.['입고가']);
                    if (row['품목명']) { const k = `${IngestEngine.normalizeText(row['품목명'])}|${IngestEngine.normalizeText(row['규격'])}`; newDict[k] = code; }
                });
                data.setMasterProducts(newMaster); data.saveMasterToLocal(newMaster); data.setParserDict(newDict); localStorage.setItem('skuSyncParserDict_v6', JSON.stringify(newDict));
                data.setParserBuffer([]); ui.setViewMode('default'); ui.showToast(`✅ 기계학습 및 단가 반영 완료.`);
            };

            const handleConfirmMapping = (masterCode) => { 
                const targetId = ui.parserState.targetId; if (!targetId) return;
                const row = data.parserBuffer.find(r => r._id === targetId); if (!row) return;
                const k = `${IngestEngine.normalizeText(row['품목명'])}|${IngestEngine.normalizeText(row['규격'])}`;
                const newDict = { ...data.parserDict, [k]: masterCode };
                data.setParserDict(newDict); localStorage.setItem('skuSyncParserDict_v6', JSON.stringify(newDict));
                data.setParserBuffer(prev => prev.map(r => r._id === targetId ? { ...r, _matchCode: masterCode, _matchStatus: '🟠 수동바인딩', _apply: true, 코드: masterCode } : r));
                ui.setParserState({ targetId: null, searchKey: '' }); ui.setGlobalSearch(''); ui.showToast('✅ 학습 완료.');
            };

            const toggleParserRowCheck = (id) => data.setParserBuffer(prev => prev.map(r => r._id === id ? { ...r, _apply: !r._apply } : r));
            const toggleAllRows = () => {
                if (effectiveViewMode === 'parser') {
                    const allApplied = fullDisplayRows.slice(0, 200).every(r => r._apply);
                    data.setParserBuffer(prev => prev.map(r => r._matchCode ? { ...r, _apply: !allApplied } : r));
                } else {
                    if (ui.selectedRows.size === fullDisplayRows.length && fullDisplayRows.length > 0) ui.setSelectedRows(new Set());
                    else { const next = new Set(); fullDisplayRows.forEach(r => next.add(r.코드)); ui.setSelectedRows(next); }
                }
            };

            const executeExport = () => {
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 출력할 데이터가 없습니다."); 
                RouteEngine.exportToExcel(fullDisplayRows, data.masterProducts, ui.showToast, () => ui.setShowExportModal(false));
            };

            const executeWebhook = () => {
                if (fullDisplayRows.length === 0) return ui.showToast("⚠️ 전송할 데이터가 없습니다."); 
                RouteEngine.sendToWebhook(fullDisplayRows, data.masterProducts, config.cloudUrl, ui.showToast, () => ui.setShowExportModal(false));
            };

            const executeMasterDownload = () => {
                ui.showToast(`⏳ 마스터 DB 엑셀을 생성중입니다...`);
                setTimeout(() => {
                    const wb = window.XLSX.utils.book_new(); 
                    
                    // data.masterCatalogProducts 가 비어있을 경우 빈 시트가 생성되지 않도록 기본 헤더 구조를 잡아줍니다.
                    let prodData = data.masterCatalogProducts.map(p => {
                        return {
                            '1코드': p.c1Code, '1그룹명': p.c1Name, '2코드': p.c2Code, '2그룹명': p.c2Name,
                            '3코드': p.c3Code, '3그룹명': p.c3Name, '오더즈': p.ordersCode, '구매처': '본사물류',
                            '브랜드': '', '품목코드': p.id, '품목명': p.name, '규격': p.spec, '입고가': p.basePrice, '출고가': p.basePrice, '간단설명': (p.keywords||[]).join(', ')
                        };
                    });

                    if (prodData.length === 0) {
                        prodData = [{
                            '1코드': '', '1그룹명': '', '2코드': '', '2그룹명': '', '3코드': '', '3그룹명': '', '오더즈': '', '구매처': '', '브랜드': '', '품목코드': '', '품목명': '', '규격': '', '입고가': '', '출고가': '', '간단설명': ''
                        }];
                    }

                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(prodData), "본사상품정보"); 

                    // 중복을 제거하여 카테고리 시트 조립
                    const catMap = new Map();
                    data.masterCatalogProducts.forEach(p => {
                        if(p.c3Code && !catMap.has(p.c3Code)) {
                            catMap.set(p.c3Code, {
                                '1그룹명': p.c1Name, '2코드': p.c2Code, '2그룹명': p.c2Name, '3코드': p.c3Code, '3그룹명': p.c3Name, '오더즈': p.ordersCode
                            });
                        }
                    });
                    
                    let catData = Array.from(catMap.values());
                    if(catData.length === 0) {
                        catData = [{'1그룹명': '', '2코드': '', '2그룹명': '', '3코드': '', '3그룹명': '', '오더즈': ''}];
                    }

                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(catData), "카테고리정보"); 

                    window.XLSX.writeFile(wb, `ONEAPP_마스터DB_${new Date().toISOString().slice(0,10)}.xlsx`);
                    ui.showToast(`✅ 통합 마스터 DB 다운로드가 완료되었습니다.`);
                }, 400);
            };

            const renderUploadEditableCell = (row, idx, field, activeProfile, keyPrefix, isParserRow = false) => {
                const linkedMasterField = MASTER_LINKS[activeProfile]?.[field];
                const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
                const val = row.finalData?.[field] !== undefined ? row.finalData[field] : (row.sources?.[activeProfile]?.[field] || '');
                const mVal = linkedMasterField && row.코드 ? data.masterProducts[row.코드]?.[linkedMasterField] : undefined;
                const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNumeric;

                const handleChange = (e) => {
                    const v = e.target.value;
                    if (isParserRow) {
                        data.setParserBuffer(prev => prev.map(r => { if (r._id !== row._id) return r; let updated = { ...r }; updated.finalData = { ...updated.finalData, [field]: isNumeric ? IngestEngine.parseNum(v) : v }; return updated; }));
                    } else {
                        data.setManagedItems(prev => {
                            const code = row.코드; let currentItem = prev[code];
                            if (!currentItem) { currentItem = { 코드: code, sources: { [activeProfile]: {} }, finalData: { [field]: isNumeric ? IngestEngine.parseNum(v) : v } }; } 
                            else { currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: isNumeric ? IngestEngine.parseNum(v) : v } }; }
                            return { ...prev, [code]: currentItem };
                        });
                    }
                };
                return (
                    <td key={keyPrefix} className={`px-2 py-1 border-r border-gray-100 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-indigo-50/40' : 'bg-white'}`}>
                        <input type="text" autoComplete="off" spellCheck="false" className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-xs outline-none ${isNumeric ? 'text-right font-medium' : 'truncate text-center'} ${isDiff ? 'text-indigo-700 font-bold' : 'text-slate-700'}`} value={val === "오류" ? "" : val} placeholder={isParserRow ? '' : (mVal || '')} onChange={handleChange} onClick={(e) => e.target.select()} />
                    </td>
                );
            };

            const appState = { viewMode: ui.viewMode, effectiveViewMode, parserFilter: ui.parserFilter, parserBuffer: data.parserBuffer, isEstimateUploaded, selectedRows: ui.selectedRows, globalSearch: ui.globalSearch, parserState: ui.parserState, isProcessing: ui.isProcessing, visibleUploadCols: VISIBLE_UPLOAD_COLS, masterProducts: data.masterProducts, activeProfileKey, fullDisplayRows, masterSearchResults };
            const appActions = { setViewMode: ui.setViewMode, setParserFilter: ui.setParserFilter, handleCommitEstimate, handleParserApply, setShowExportModal: ui.setShowExportModal, setShowSettings: ui.setShowSettings, triggerMasterLoad: () => masterFileInputRef.current.click(), handleGlobalSearchChange: (val) => { ui.setGlobalSearch(val); if (ui.viewMode === 'parser' && ui.parserFilter !== 'matched') ui.setParserState(prev => ({ ...prev, searchKey: val })); }, handleReset: () => { if(ui.viewMode==='parser') data.setParserBuffer([]); else data.setManagedItems({}); ui.setGlobalSearch(''); ui.setSelectedRows(new Set()); }, handleFileUpload, setShowSmartParserModal: ui.setShowSmartParserModal, toggleAllRows, toggleParserRowCheck, setSelectedRows: ui.setSelectedRows, handleSetTarget: (rowId, extName) => { const cleanName = extName.replace(/[()[\]{},./]/g, ' ').replace(/\s+/g, ' ').trim(); ui.setGlobalSearch(cleanName); ui.setParserState({ targetId: rowId, searchKey: cleanName }); }, handleConfirmMapping, renderUploadEditableCell };

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'F9') { e.preventDefault(); ui.setShowExportModal(true); }
                    if (e.key === 'F3') { e.preventDefault(); document.getElementById('main-search-input')?.focus(); }
                };
                window.addEventListener('keydown', handleGlobalKeyDown); return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [effectiveViewMode]);

            return (
                <div className="h-screen w-full flex flex-col font-sans overflow-hidden bg-slate-100">
                    {ui.toastMsg && <div className="fixed bottom-10 right-6 z-[1000] bg-slate-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm font-bold fade-in"><i className="fas fa-check-circle text-emerald-400"></i>{ui.toastMsg}</div>}

                    {/* Top GNB + System IO Console */}
                    <TopHeader itemCount={Object.keys(data.masterProducts).length} isProcessing={ui.isProcessing} processMsg={ui.processMsg} uiActions={appActions} />
                    
                    {/* 숨겨진 본사 마스터 DB 파일 업로드 인풋 */}
                    <input type="file" ref={masterFileInputRef} className="hidden" accept=".xlsx, .xls, .csv" onChange={handleMasterLoad} />

                    {/* Tab Navigation & Toolbar */}
                    <ActionToolbar state={appState} actions={appActions} />

                    {/* Main Workspace Area */}
                    <div className="flex-1 flex flex-col overflow-hidden bg-slate-50 pt-6">
                        {ui.viewMode === 'catalog' ? ( <CategorySourcingView data={data} ui={ui} /> ) : 
                         ui.viewMode === 'smartform' ? ( <SmartFormView data={data} ui={ui} /> ) : 
                         ui.viewMode === 'bom' ? ( <BOMBuilderView data={data} ui={ui} /> ) : 
                         effectiveViewMode === 'default' || (effectiveViewMode === 'parser' && ui.parserFilter === 'matched') ? (
                            <ExcelDataGrid state={appState} actions={appActions} />
                        ) : ( <ParserSplitView state={appState} actions={appActions} /> )}
                    </div>

                    <Modals ui={ui} data={data} config={config} executeParser={executeParser} executeExport={executeExport} executeWebhook={executeWebhook} executeMasterDownload={executeMasterDownload} appState={appState} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
