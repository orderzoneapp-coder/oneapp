<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - 출력검증센터 [v2.6.0 가격컬럼 단순화]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        const fmt = (v) => parseNum(v).toLocaleString('ko-KR');

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                if (!db.objectStoreNames.contains('master_products')) db.createObjectStore('master_products', { keyPath: '코드' });
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        const getAllIDB = async (storeName) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                if (!db.objectStoreNames.contains(storeName)) return resolve([]);
                const tx = db.transaction(storeName, 'readonly');
                const req = tx.objectStore(storeName).getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const bulkPutIDB = async (storeName, items) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                items.forEach(item => store.put(item));
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getAppliedPrice = (row) => {
            const promo = parseNum(row?.행사가);
            const out = parseNum(row?.출고가);
            return promo > 0 ? promo : out;
        };

        const getSaleState = (row) => {
            const rawStatus = row?.판매여부;
            if (String(rawStatus).trim() === '0') return { code: '0', label: '정지중', text: '0 정지중', cls: 'bg-rose-50 text-rose-700 border-rose-200' };
            const out = parseNum(row.출고가);
            const promo = parseNum(row.행사가);
            const stock = row.재고수량 !== undefined && row.재고수량 !== '' ? parseNum(row.재고수량) : 999;
            const hasSalePrice = out > 0 || promo > 0;
            if (!hasSalePrice) return { code: '0', label: '정지중', text: '0 정지중', cls: 'bg-rose-50 text-rose-700 border-rose-200' };
            if (stock === 0) return { code: '1', label: '품절', text: '1 품절', cls: 'bg-orange-50 text-orange-700 border-orange-200' };
            if (promo > 0) return { code: '1', label: '행사', text: '1 행사', cls: 'bg-purple-50 text-purple-700 border-purple-200' };
            return { code: '1', label: '판매중', text: '1 판매중', cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' };
        };

        const isMarginWarning = (row) => {
            const sale = getSaleState(row);
            const salePrice = getAppliedPrice(row);
            const inPrice = parseNum(row.입고가);
            return sale.code === '1' && salePrice > 0 && salePrice < inPrice;
        };

        const getDiffInfo = (row) => {
            const base = parseNum(row.기준입고가);
            const current = parseNum(row.입고가);
            const diff = current - base;
            const rate = base > 0 ? diff / base : 0;
            return { diff, rate };
        };

        const isBigChange = (row) => {
            const sale = getSaleState(row);
            if (sale.label === '정지중') return false;
            const { diff, rate } = getDiffInfo(row);
            return parseNum(row.기준입고가) > 0 && parseNum(row.입고가) > 0 && Math.abs(rate) >= 0.3 && Math.abs(diff) >= 1000;
        };

        const isDigitSuspicion = (row) => {
            const base = parseNum(row.기준입고가);
            const current = parseNum(row.입고가);
            if (base <= 0 || current <= 0) return false;
            const ratio = current / base;
            return (ratio >= 9 && ratio <= 11) || (ratio >= 0.09 && ratio <= 0.11);
        };

        const isNewItem = (row) => {
            const hasBase = parseNum(row.기준입고가) > 0 || parseNum(row.기준출고가) > 0;
            const hasWork = parseNum(row.입고가) > 0 || parseNum(row.출고가) > 0 || parseNum(row.행사가) > 0;
            return !hasBase && hasWork;
        };

        const isLowStock = (row) => {
            const stock = parseNum(row.재고수량);
            // 현재 단계: 안전재고 기준은 보류. 999는 일반 판매 기본값으로 보고 제외한다.
            return stock > 0 && stock < 999;
        };

        const isValidSubItemCode = (code) => {
            if (!code) return false;
            const s = String(code).trim();
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
        };

        // ============================================================
        // [E-ENGINE-02] 소분가 계산 엔진
        // 역할: 원물코드에 연결된 1종코드의 입고/출고 소분가를 계산한다.
        // 확정 정책: 1출고 = 원물 기본 출고가 / 1종연산 + 경비. 행사가/최종적용가 기준이 아니다.
        // ============================================================
        const calculateSubPriceInfo = (row) => {
            const div1 = parseNum(row['1종연산']);
            if (!isValidSubItemCode(row['1종코드']) || div1 <= 0) return null;
            const ROUND_UNIT = 100;
            const inPrice = parseNum(row.입고가);
            const outPrice = parseNum(row.출고가); // 정책 확정: 소분 1출고는 행사가/최종적용가가 아닌 원물 기본 출고가 기준
            const outsrc = parseNum(row['외주비']);
            const extraCost = parseNum(row['경비']);
            const subIn = inPrice > 0 ? Math.round(((inPrice + outsrc) / div1) / ROUND_UNIT) * ROUND_UNIT : 0;
            const rawSubOut = outPrice > 0 ? Math.round((outPrice / div1) + extraCost) : 0;
            const subOut = rawSubOut > 0 ? Math.round(rawSubOut / 10) * 10 : 0;
            return { code: String(row['1종코드']).trim(), spec: row['1종규격'] || '', div1, subIn, subOut };
        };

        // ============================================================
        // [E-OUTPUT-01] 소분품목 쇼핑몰 행 생성
        // 역할: 1종코드가 있는 경우 ERP뿐 아니라 쇼핑몰업로드 시트에도 별도 출력 행을 추가한다.
        // 주의: masterProducts[1종코드]가 있으면 상품명/규격을 우선 사용하고, 없으면 원물명 기반 보조명을 사용한다.
        // ============================================================
        const buildSubShopRow = (parentRow, subInfo, masterProducts, sale) => {
            if (!subInfo) return null;
            const subMaster = masterProducts[subInfo.code] || {};
            const subName = subMaster['품목명'] || `${parentRow.품목명 || ''} (소분)`;
            const subSpec = subMaster['규격'] || subInfo.spec || parentRow['1종규격'] || '';
            const subBrand = subMaster['브랜드'] || parentRow.브랜드 || '';
            const subDesc = subMaster['간단설명'] || parentRow.간단설명 || '';
            const subTags = subMaster['검색어등록'] || parentRow.검색어등록 || '';
            const subStock = parentRow.재고수량 !== undefined && parentRow.재고수량 !== '' ? parseNum(parentRow.재고수량) : 999;
            return [
                subInfo.code,
                subName,
                subSpec,
                subInfo.subOut,
                subInfo.subOut,
                subInfo.subOut,
                0, 0, 0, 0, 0, 0,
                subBrand,
                subDesc,
                sale.code,
                subStock,
                parentRow.테마1 || '',
                parentRow.테마2 || '',
                '', '', '',
                subTags
            ];
        };

        const safeJSONParse = (key, defaultVal) => {
            try {
                const raw = localStorage.getItem(key);
                return raw && raw !== 'undefined' ? JSON.parse(raw) : defaultVal;
            } catch (e) {
                return defaultVal;
            }
        };

        // ============================================================
        // [E-ENGINE-01] 출력검증센터 출고가 산출 엔진
        // 역할: 입고가/외주비/노무비/창고/단위/마진룰 기준으로 출고가를 산출한다.
        // 주의: 화면에는 별도 계산출고가/최종출고가를 노출하지 않고, 출고가와 행사가만 보여준다.
        // ============================================================
        const calculateReviewOutPrice = (baseInPrice, context = {}, marginRules = []) => {
            const inPrice = parseNum(baseInPrice);
            if (inPrice <= 0) return 0;

            const outsrc = parseNum(context['외주비']);
            const labor = parseNum(context['노무비']);
            const totalCost = inPrice + outsrc + labor;
            const whCode = String(context['창고'] ?? '').trim();
            const unitStr = String(context['단위'] ?? '').trim().toLowerCase();

            const matchWh = (ruleWh, targetWh) => {
                if (!ruleWh || ruleWh === '*') return true;
                const targets = String(ruleWh).split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };

            const matchUnit = (ruleUnit, targetUnit) => {
                if (!ruleUnit || ruleUnit === '*') return true;
                const targets = String(ruleUnit).toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;
            const safeRules = Array.isArray(marginRules) ? marginRules : [];
            safeRules.forEach(rule => {
                if (matchWh(rule.whCode, whCode) && matchUnit(rule.unit, unitStr)) {
                    let score = 0;
                    if (rule.whCode && rule.whCode !== '*') score += 2;
                    if (rule.unit && rule.unit !== '*') score += 1;
                    if (score > bestScore) {
                        bestScore = score;
                        bestRule = rule;
                    }
                }
            });

            const applied = bestRule || { rate: 20, type: 'divide' };
            let calc = 0;
            if (applied.type === 'divide') {
                calc = totalCost / (1 - (parseNum(applied.rate) / 100));
            } else {
                calc = totalCost * (1 + (parseNum(applied.rate) / 100));
            }
            return Math.round(calc / 100) * 100;
        };

        const ExportApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [reviewRows, setReviewRows] = useState([]);
            const [marginRules] = useState(() => safeJSONParse('merchMarginRules_v878', [{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]));
            const [activeIssue, setActiveIssue] = useState('all');
            const [sortMode, setSortMode] = useState('category');
            const [searchInput, setSearchInput] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState('');

            const showToast = useCallback((msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => setSearchTerm(searchInput.trim()), 250);
                return () => clearTimeout(timer);
            }, [searchInput]);

            useEffect(() => {
                // ============================================================
                // [E-FLOW-01] 출력검증센터 데이터 로드
                // 역할: merch_export_draft만 작업 대상으로 읽고, 해당 code에 대해서만 masterProducts를 기준정보로 참조한다.
                // 금지: master_products 전체를 reviewRows 작업대상으로 전환하지 않는다.
                // ============================================================
                const loadData = async () => {
                    setIsProcessing(true);
                    try {
                        const items = await getAllIDB('master_products');
                        const masterDict = {};
                        items.forEach(i => { if (i && i.코드) masterDict[i.코드] = i; });
                        setMasterProducts(masterDict);

                        const rawDraft = await getIDB('merch_export_draft') || [];
                        const exportDraft = Array.isArray(rawDraft) ? rawDraft : [];

                        const rows = exportDraft.map(draft => {
                            const code = draft.코드;
                            const working = draft.working || draft || {};
                            const baseline = draft.baselineSnapshot || {};
                            const source = draft.source || {};
                            const master = masterDict[code] || {};

                            const 기준입고가 = parseNum(master['입고가'] ?? baseline.기준입고가 ?? 0);
                            const 기준출고가 = parseNum(master['출고가'] ?? baseline.기준출고가 ?? 0);
                            const 기준시중가 = parseNum(master['시중가'] ?? baseline.기준시중가 ?? 0);
                            const 기준판매여부 = String(master['판매여부'] ?? baseline.기준판매여부 ?? '-');

                            const 입고가 = parseNum(working.입고가);
                            const 불러온출고가 = parseNum(working.출고가);
                            const 산출출고가 = calculateReviewOutPrice(입고가, { ...master, ...working }, marginRules);
                            const 출고가 = 불러온출고가 > 0 ? 불러온출고가 : 산출출고가;
                            const 행사가 = parseNum(working.행사가);
                            const rawStock = working.재고수량;
                            const 재고수량 = (rawStock !== undefined && rawStock !== null && rawStock !== '') ? parseNum(rawStock) : 999;

                            return {
                                코드: code,
                                품목명: working.품목명 || master['품목명'] || '',
                                규격: working.규격 || master['규격'] || '',
                                브랜드: working.브랜드 || master['브랜드'] || '',
                                간단설명: working.간단설명 || master['간단설명'] || '',
                                카테고리: working.카테고리 || master['견적서'] || master['카테고리'] || '일반 상품목록',
                                검색어등록: working.검색어등록 || master['검색어등록'] || '',
                                기준입고가,
                                기준출고가,
                                기준시중가,
                                기준판매여부,
                                판매여부: working.판매여부 !== undefined && working.판매여부 !== '' ? working.판매여부 : 기준판매여부,
                                입고가,
                                출고가,
                                행사가,
                                도매A: parseNum(working.도매A),
                                도매B: parseNum(working.도매B),
                                시중가: parseNum(working.시중가 || 기준시중가),
                                입고B: parseNum(working.입고B),
                                '1종코드': working['1종코드'] || master['1종코드'] || '',
                                '1종규격': working['1종규격'] || master['1종규격'] || '',
                                '1종연산': parseNum(working['1종연산'] ?? master['1종연산']),
                                '경비': parseNum(working['경비'] ?? master['경비']),
                                '외주비': parseNum(working['외주비'] ?? master['외주비']),
                                '노무비': parseNum(working['노무비'] ?? master['노무비']),
                                재고수량,
                                테마1: working.테마1 || (working._theme === 1 ? '1' : ''),
                                테마2: working.테마2 || (working._theme === 2 ? '1' : ''),
                                source
                            };
                        }).filter(row => row.코드);

                        setReviewRows(rows);
                    } catch (e) {
                        console.error('[Export Center Load Error]', e);
                        showToast('❌ 출력검증센터 데이터 로드 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                };
                loadData();
            }, [showToast, marginRules]);

            // ============================================================
            // [E-FLOW-02] 검증센터 단가/작업값 수정
            // 역할: 입고가/출고가/행사가 수정 시 작업값을 즉시 갱신한다.
            // 정책: 입고가·외주비·노무비 변경 시 출고가를 자동 재계산하고, 행사가가 있으면 출력 적용가만 행사가가 우선한다.
            // ============================================================
            const handleEdit = useCallback((code, field, value) => {
                setReviewRows(prev => prev.map(row => {
                    if (row.코드 !== code) return row;

                    const next = { ...row, [field]: value };

                    if (field === '입고가' || field === '외주비' || field === '노무비') {
                        const numericValue = parseNum(value);
                        next[field] = numericValue;
                        const calcContext = { ...row, ...next };
                        next.출고가 = calculateReviewOutPrice(parseNum(next.입고가), calcContext, marginRules);
                    } else if (field === '행사가') {
                        next.행사가 = parseNum(value);
                    } else if (field === '출고가') {
                        next.출고가 = parseNum(value);
                    } else if (field === '재고수량') {
                        next.재고수량 = parseNum(value);
                    }

                    return next;
                }));
            }, [marginRules]);

            const analysis = useMemo(() => {
                const result = { total: reviewRows.length, up: 0, down: 0, promo: 0, soldout: 0, stopped: 0, anomaly: 0, margin: 0, newItem: 0, lowStock: 0 };
                reviewRows.forEach(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    if (parseNum(row.기준입고가) > 0 && diff > 0) result.up++;
                    if (parseNum(row.기준입고가) > 0 && diff < 0) result.down++;
                    if (parseNum(row.행사가) > 0) result.promo++;
                    if (sale.label === '품절') result.soldout++;
                    if (sale.label === '정지중') result.stopped++;
                    if (isBigChange(row)) result.anomaly++;
                    if (isMarginWarning(row)) result.margin++;
                    if (isNewItem(row)) result.newItem++;
                    if (isLowStock(row)) result.lowStock++;
                });
                return result;
            }, [reviewRows]);

            const issueCards = useMemo(() => ([
                { key: 'all', label: '전체', count: analysis.total, icon: 'fa-list-check', cls: 'border-slate-200 bg-slate-50 text-slate-700' },
                { key: 'up', label: '인상', count: analysis.up, icon: 'fa-arrow-trend-up', cls: 'border-rose-200 bg-rose-50 text-rose-700' },
                { key: 'down', label: '인하', count: analysis.down, icon: 'fa-arrow-trend-down', cls: 'border-blue-200 bg-blue-50 text-blue-700' },
                { key: 'promo', label: '행사', count: analysis.promo, icon: 'fa-bullhorn', cls: 'border-purple-200 bg-purple-50 text-purple-700' },
                { key: 'soldout', label: '품절', count: analysis.soldout, icon: 'fa-box-open', cls: 'border-orange-200 bg-orange-50 text-orange-700' },
                { key: 'stopped', label: '정지중', count: analysis.stopped, icon: 'fa-ban', cls: 'border-slate-300 bg-slate-100 text-slate-700' },
                { key: 'anomaly', label: '큰변동', count: analysis.anomaly, icon: 'fa-triangle-exclamation', cls: 'border-amber-200 bg-amber-50 text-amber-700' },
                { key: 'margin', label: '역마진', count: analysis.margin, icon: 'fa-circle-exclamation', cls: 'border-red-300 bg-red-50 text-red-700' },
                { key: 'digit', label: '자릿수확인', count: reviewRows.filter(isDigitSuspicion).length, icon: 'fa-keyboard', cls: 'border-orange-200 bg-orange-50 text-orange-700' },
                { key: 'new', label: '신규', count: analysis.newItem, icon: 'fa-sparkles', cls: 'border-indigo-200 bg-indigo-50 text-indigo-700' },
                { key: 'lowstock', label: '재고적음', count: analysis.lowStock, icon: 'fa-layer-group', cls: 'border-teal-200 bg-teal-50 text-teal-700' }
            ]), [analysis, reviewRows]);

            const filteredRows = useMemo(() => {
                let rows = reviewRows.filter(row => {
                    const sale = getSaleState(row);
                    const { diff } = getDiffInfo(row);
                    switch (activeIssue) {
                        case 'up': return parseNum(row.기준입고가) > 0 && diff > 0;
                        case 'down': return parseNum(row.기준입고가) > 0 && diff < 0;
                        case 'promo': return parseNum(row.행사가) > 0;
                        case 'soldout': return sale.label === '품절';
                        case 'stopped': return sale.label === '정지중';
                        case 'anomaly': return isBigChange(row);
                        case 'digit': return isDigitSuspicion(row);
                        case 'margin': return isMarginWarning(row);
                        case 'new': return isNewItem(row);
                        case 'lowstock': return isLowStock(row);
                        default: return true;
                    }
                });

                const terms = searchTerm.toLowerCase().split(/\s+/).map(s => s.trim()).filter(Boolean);
                if (terms.length > 0) {
                    rows = rows.filter(row => {
                        const haystack = [
                            row.코드, row.품목명, row.규격, row.브랜드, row.카테고리,
                            row.간단설명, row.검색어등록, row.source?.sourceType, ...(row.source?.tags || [])
                        ].join(' ').toLowerCase();
                        return terms.every(term => haystack.includes(term));
                    });
                }

                const sorted = [...rows];
                const byCategory = (a, b) => String(a.카테고리 || '').localeCompare(String(b.카테고리 || ''), 'ko') || String(a.품목명 || '').localeCompare(String(b.품목명 || ''), 'ko');
                if (sortMode === 'stockAsc') sorted.sort((a, b) => parseNum(a.재고수량) - parseNum(b.재고수량) || byCategory(a, b));
                else if (sortMode === 'diffRateDesc') sorted.sort((a, b) => Math.abs(getDiffInfo(b).rate) - Math.abs(getDiffInfo(a).rate));
                else if (sortMode === 'diffAbsDesc') sorted.sort((a, b) => Math.abs(getDiffInfo(b).diff) - Math.abs(getDiffInfo(a).diff));
                else if (sortMode === 'inPriceDesc') sorted.sort((a, b) => parseNum(b.입고가) - parseNum(a.입고가));
                else if (sortMode === 'outPriceDesc') sorted.sort((a, b) => getAppliedPrice(b) - getAppliedPrice(a));
                else sorted.sort(byCategory);
                return sorted;
            }, [reviewRows, activeIssue, searchTerm, sortMode]);

            const resetFilters = useCallback(() => {
                setActiveIssue('all');
                setSortMode('category');
                setSearchInput('');
                setSearchTerm('');
            }, []);

            const handleCardClick = useCallback((key) => {
                setActiveIssue(key);
                if (key === 'lowstock') setSortMode('stockAsc');
                else if (key === 'anomaly') setSortMode('diffRateDesc');
                else if (key === 'margin') setSortMode('diffAbsDesc');
                else setSortMode('category');
            }, []);

            // ============================================================
            // [E-OUTPUT-02] 최종 마스터 반영 + 통합 엑셀 출력
            // 역할: reviewRows를 기준으로 마스터를 갱신하고 쇼핑몰업로드/ERP업데이트 시트를 생성한다.
            // 주의: 엑셀만 출력은 추적성이 떨어져 제외한다. 소분품목은 원물과 별도 행으로 건수에 포함한다.
            // ============================================================
            const handleExportExcel = useCallback(() => {
                if (reviewRows.length === 0) return showToast('⚠️ 출력할 데이터가 없습니다.');
                if (analysis.margin > 0 || analysis.anomaly > 0) {
                    if (!window.confirm(`역마진 ${analysis.margin}건, 큰변동 ${analysis.anomaly}건이 있습니다.\n관리자 확인 후 마스터에 반영하고 엑셀을 출력하시겠습니까?`)) return;
                }
                setIsProcessing(true);
                showToast('⏳ 마스터 반영 및 통합 엑셀 조립 중...');

                setTimeout(async () => {
                    try {
                        if (!window.XLSX) throw new Error('엑셀 라이브러리 없음');
                        const newMaster = { ...masterProducts };
                        const updatedItems = [];

                        reviewRows.forEach(item => {
                            const code = item.코드;
                            const sale = getSaleState(item);
                            const mItem = { ...(newMaster[code] || { 코드: code }) };
                            mItem['품목명'] = item.품목명;
                            mItem['규격'] = item.규격;
                            mItem['입고가'] = parseNum(item.입고가);
                            mItem['출고가'] = parseNum(item.출고가);
                            mItem['행사가'] = parseNum(item.행사가);
                            mItem['입고B'] = parseNum(item.입고B);
                            mItem['1종코드'] = item['1종코드'] || mItem['1종코드'] || '';
                            mItem['1종규격'] = item['1종규격'] || mItem['1종규격'] || '';
                            mItem['1종연산'] = parseNum(item['1종연산']);
                            mItem['경비'] = parseNum(item['경비']);
                            mItem['외주비'] = parseNum(item['외주비']);
                            mItem['노무비'] = parseNum(item['노무비']);
                            mItem['도매A'] = parseNum(item.도매A);
                            mItem['도매B'] = parseNum(item.도매B);
                            mItem['시중가'] = parseNum(item.시중가);
                            mItem['재고수량'] = parseNum(item.재고수량);
                            mItem['판매여부'] = sale.code;
                            mItem['브랜드'] = item.브랜드 || '';
                            mItem['간단설명'] = item.간단설명 || '';
                            mItem['검색어등록'] = item.검색어등록 || '';
                            mItem['테마1'] = item.테마1 || '';
                            mItem['테마2'] = item.테마2 || '';
                            mItem['견적서'] = item.카테고리 || mItem['견적서'] || mItem['카테고리'] || '';
                            updatedItems.push(mItem);
                            newMaster[code] = mItem;
                        });

                        await bulkPutIDB('master_products', updatedItems);
                        setMasterProducts(newMaster);
                        localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());

                        const wb = window.XLSX.utils.book_new();
                        const erpData = [['품목코드', '입고가', '0', '출고가', '0', '입고B', 'n', '도매A', 'n', '도매B', 'n', '최종(전송)', 'n', '행사', 'n', '1']];
                        const shopData = [['상품코드\n코드', '상품명', '규격', '출고가', '도매A', '시중가', '도매B', '도매B', 'C 판매가', 'C 도매가', 'D 판매가', 'D 도매가', '브랜드', '기본설명', '판매여부', '재고수량', '테마1', '테마2', '테마3', '테마4', '테마5', '상품태그']];

                        let subOutputCount = 0;
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            const inPrice = parseNum(item.입고가);
                            const finalOut = getAppliedPrice(item);
                            const pASale = parseNum(item.도매A);
                            const pMarket = parseNum(item.시중가);
                            const finalStock = parseNum(item.재고수량);
                            erpData.push([item.코드, inPrice, '0', finalOut, '0', parseNum(item.입고B)||'', 'n', pASale||'', 'n', parseNum(item.도매B)||'', 'n', inPrice, 'n', parseNum(item.행사가)||'', 'n', sale.code]);
                            shopData.push([item.코드, item.품목명, item.규격, finalOut, (pASale>0?pASale:finalOut), (pMarket>0?pMarket:finalOut), 0, 0, 0, 0, 0, 0, item.브랜드||'', item.간단설명||'', sale.code, finalStock, item.테마1||'', item.테마2||'', '', '', '', item.검색어등록||'']);

                            const subInfo = calculateSubPriceInfo(item);
                            if (subInfo) {
                                // 소분품목은 원물 행과 별도 출력물로 취급한다. ERP와 쇼핑몰업로드 모두 행 수가 증가해야 한다.
                                erpData.push([subInfo.code, subInfo.subIn, '0', subInfo.subOut, '0', '', 'n', '', 'n', '', 'n', subInfo.subIn, 'n', '', 'n', sale.code]);
                                const subShopRow = buildSubShopRow(item, subInfo, masterProducts, sale);
                                if (subShopRow) shopData.push(subShopRow);
                                subOutputCount++;
                            }
                        });

                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), '쇼핑몰업로드');
                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), 'ERP업데이트');
                        window.XLSX.writeFile(wb, `통합업로드용_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast(`✅ 원물 ${reviewRows.length}건 + 소분 ${subOutputCount}건 = 총 ${reviewRows.length + subOutputCount}건 엑셀 다운로드 완료`);
                    } catch (e) {
                        console.error('[Export Excel Error]', e);
                        showToast('❌ 엑셀 파일 생성 중 오류가 발생했습니다.');
                    } finally {
                        setIsProcessing(false);
                    }
                }, 300);
            }, [reviewRows, masterProducts, analysis, showToast]);

            // ============================================================
            // [E-OUTPUT-03] 이미지 출력 데이터 브릿지
            // 역할: reviewRows를 이미지 생성기가 읽는 ONEAPP_IMAGE_DATA_TEMP 구조로 변환한다.
            // 주의: 이미지 가격은 최종 적용 가격 기준이며, 정지중 상품은 제외한다.
            // ============================================================
            const handleImageExport = useCallback(() => {
                if (reviewRows.length === 0) return showToast('⚠️ 이미지로 보낼 데이터가 없습니다.');
                setIsProcessing(true);
                setTimeout(async () => {
                    try {
                        const grouped = {};
                        reviewRows.forEach(item => {
                            const sale = getSaleState(item);
                            if (sale.label === '정지중') return;
                            const title = item.카테고리 ? String(item.카테고리).split(',')[0].trim() : '일반 상품목록';
                            const fullName = item.규격 ? `${item.품목명} (${item.규격})` : item.품목명;
                            if (!grouped[title]) grouped[title] = [];
                            grouped[title].push({ name: fullName, price: getAppliedPrice(item), prevPrice: parseNum(item.기준출고가) });
                        });
                        const exportData = Object.keys(grouped).map(title => ({ title: `📌 ${title}`, items: grouped[title] }));
                        await setIDB('ONEAPP_IMAGE_DATA_TEMP', JSON.stringify(exportData));
                        showToast('✅ 이미지 데이터 생성 완료. 이미지 뷰어 탭을 확인하세요.');
                    } catch (e) {
                        console.error('[Image Export Error]', e);
                        showToast('❌ 이미지 데이터 준비 중 오류 발생');
                    } finally {
                        setIsProcessing(false);
                    }
                }, 250);
            }, [reviewRows, showToast]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const tag = document.activeElement?.tagName;
                    const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(tag);
                    if (e.key === 'F9') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleExportExcel();
                    } else if (e.key === 'F10') {
                        e.preventDefault();
                        if (isInput) document.activeElement.blur();
                        if (!isProcessing) handleImageExport();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isProcessing, handleExportExcel, handleImageExport]);

            return (
                <div className="flex h-screen overflow-hidden bg-slate-100 fade-in">
                    {toast && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 text-sm font-bold transition-all">
                            <i className="fas fa-check-circle text-emerald-400"></i>{toast}
                        </div>
                    )}

                    <div className="w-[260px] bg-[#0f172a] flex flex-col text-slate-300 shadow-xl z-10 shrink-0 h-full">
                        <div className="p-6 border-b border-slate-800 bg-[#0b1120] shrink-0">
                            <h1 className="text-xl font-black text-emerald-400 tracking-tight flex items-center">
                                <i className="fas fa-shield-alt mr-3"></i>출력검증센터
                            </h1>
                            <p className="text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-widest">Export Verify Center</p>
                        </div>
                        <div className="flex flex-col py-4 gap-1 px-3 flex-1">
                            <div className="px-4 py-3.5 rounded-xl text-left text-[13px] font-bold bg-slate-800/50 text-emerald-400 border border-emerald-900/30 shadow-md flex items-center">
                                <i className="fas fa-list-check w-5 text-center mr-2"></i> 이슈별 모아보기
                            </div>
                            <div className="px-4 py-3 text-[11px] leading-relaxed text-slate-400">
                                작업 대상은 메인에서 전달된 <b className="text-slate-200">merch_export_draft</b> 기준입니다. 마스터 전체는 작업 대상으로 사용하지 않습니다.
                            </div>
                        </div>
                        <div className="p-6 border-t border-slate-800 shrink-0">
                            <button onClick={() => window.location.href = 'MerchOps.html'} className="w-full py-3 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 hover:text-white text-[13px] font-bold transition-colors">
                                <i className="fas fa-arrow-left mr-2"></i> 메인으로 돌아가기
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden">
                        <div className="bg-white p-5 border-b border-slate-200 shadow-sm shrink-0 z-10">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-xl font-black text-slate-800 flex items-center">
                                    <i className="fas fa-layer-group text-indigo-500 mr-2"></i>이슈 카드뷰
                                </h2>
                                <div className="text-[12px] text-slate-500 font-bold">표시 {filteredRows.length.toLocaleString()}건 / 전체 {reviewRows.length.toLocaleString()}건</div>
                            </div>

                            <div className="grid grid-cols-5 xl:grid-cols-10 gap-2 mb-4">
                                {issueCards.map(card => (
                                    <button key={card.key} onClick={() => handleCardClick(card.key)} className={`border p-3 rounded-xl flex flex-col items-center shadow-sm transition-all hover:shadow-md ${card.cls} ${activeIssue === card.key ? 'ring-2 ring-slate-700 scale-[1.02]' : ''}`}>
                                        <span className="text-[11px] font-black mb-1 flex items-center"><i className={`fas ${card.icon} mr-1`}></i>{card.label}</span>
                                        <span className="text-xl font-black">{card.count.toLocaleString()}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="relative flex-1 max-w-xl">
                                    <i className="fas fa-search absolute left-3 top-2.5 text-slate-400 text-[13px]"></i>
                                    <input value={searchInput} onChange={(e) => setSearchInput(e.target.value)} placeholder="코드 / 품목명 / 규격 / 브랜드 / 카테고리 검색 · 예: 양파 15kg" className="w-full h-9 pl-9 pr-3 border border-slate-300 rounded-lg text-[12px] font-bold outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100" />
                                </div>
                                <select value={sortMode} onChange={(e) => setSortMode(e.target.value)} className="h-9 px-3 border border-slate-300 rounded-lg text-[12px] font-bold text-slate-700 bg-white outline-none">
                                    <option value="category">카테고리순</option>
                                    <option value="stockAsc">재고수량 오름차순</option>
                                    <option value="diffRateDesc">변동률 큰 순</option>
                                    <option value="diffAbsDesc">차액 큰 순</option>
                                    <option value="inPriceDesc">입고가 높은 순</option>
                                    <option value="outPriceDesc">출고가 높은 순</option>
                                </select>
                                <button onClick={resetFilters} className="h-9 px-4 rounded-lg bg-slate-100 text-slate-600 border border-slate-300 text-[12px] font-black hover:bg-slate-200">
                                    <i className="fas fa-rotate-left mr-1.5"></i>필터 초기화
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 p-5 overflow-hidden flex flex-col">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-slate-700 text-[14px]"><i className="fas fa-edit mr-2 text-emerald-500"></i>최종 퀵 수정 & 안전 점검표</h3>
                                <div className="flex items-center gap-3 text-[11px] text-slate-500 font-bold">
                                    <span className="bg-white px-2 py-1 rounded border border-slate-200 shadow-sm"><span className="text-purple-500">■</span> 행사가가 있으면 출력 적용가 우선</span>
                                    <span className="bg-white px-2 py-1 rounded border border-slate-200 shadow-sm"><span className="text-teal-500">■</span> 재고적음은 재고수량 오름차순</span>
                                </div>
                            </div>

                            <div className="flex-1 bg-white border border-slate-200 rounded-xl overflow-auto custom-scrollbar shadow-sm">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="bg-[#f8fafc] sticky top-0 border-b border-slate-200 text-slate-600 z-10 shadow-sm">
                                        <tr>
                                            <th className="px-3 py-3 w-16 text-center font-bold">검증</th>
                                            <th className="px-3 py-3 w-24 font-bold">코드</th>
                                            <th className="px-3 py-3 w-28 font-bold">카테고리</th>
                                            <th className="px-3 py-3 font-bold">품목명 (규격)</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-slate-500">(M)입고가</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-indigo-600">입고가</th>
                                            <th className="px-3 py-3 w-24 text-right font-bold text-rose-600">출고가</th>
                                            <th className="px-3 py-3 w-20 text-right font-bold text-purple-600">행사가</th>
                                            <th className="px-3 py-3 w-20 text-center font-bold">재고</th>
                                            <th className="px-3 py-3 w-24 text-center font-bold">상태</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredRows.length === 0 ? (
                                            <tr><td colSpan="10" className="p-10 text-center text-slate-400 font-bold">표시할 데이터가 없습니다.</td></tr>
                                        ) : filteredRows.map(item => {
                                            const sale = getSaleState(item);
                                            const promo = parseNum(item.행사가) > 0;
                                            const margin = isMarginWarning(item);
                                            const anomaly = isBigChange(item);
                                            const { diff, rate } = getDiffInfo(item);
                                            return (
                                                <tr key={item.코드} className={`transition-colors ${margin || anomaly ? 'bg-rose-50/50' : 'hover:bg-slate-50'}`}>
                                                    <td className="px-3 py-2 text-center">
                                                        {margin ? <i className="fas fa-exclamation-triangle text-rose-500" title="역마진"></i> :
                                                         anomaly ? <i className="fas fa-exclamation-circle text-orange-500" title="큰변동"></i> :
                                                         sale.label === '품절' ? <span className="w-2.5 h-2.5 rounded-full bg-orange-400 inline-block" title="품절"></span> :
                                                         sale.label === '정지중' ? <span className="w-2.5 h-2.5 rounded-full bg-slate-300 inline-block" title="정지중"></span> :
                                                         <i className="fas fa-check-circle text-emerald-400"></i>}
                                                    </td>
                                                    <td className="px-3 py-2 font-mono text-slate-400 text-[11px]">{item.코드}</td>
                                                    <td className="px-3 py-2 text-[11px] text-slate-500 max-w-[140px] truncate">{item.카테고리}</td>
                                                    <td className="px-3 py-2 font-bold text-slate-800">
                                                        {item.품목명} <span className="text-slate-400 font-normal ml-1 text-[11px]">{item.규격 && `(${item.규격})`}</span>
                                                        {isNewItem(item) && <span className="ml-2 px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 text-[10px] font-black">신규</span>}
                                                    </td>
                                                    <td className="px-3 py-2 text-right text-slate-400">
                                                        {fmt(item.기준입고가)}
                                                        {item.기준입고가 > 0 && <div className={`text-[10px] font-bold ${diff >= 0 ? 'text-rose-400' : 'text-blue-400'}`}>{diff === 0 ? '-' : `${diff > 0 ? '+' : ''}${fmt(diff)} / ${(rate*100).toFixed(1)}%`}</div>}
                                                    </td>
                                                    <td className="px-2 py-1 bg-indigo-50/30">
                                                        <input type="text" value={item.입고가} onChange={(e)=>handleEdit(item.코드, '입고가', e.target.value)} title="입고가 수정 시 출고가가 자동 재계산됩니다." className="w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 px-1 py-1 text-right font-black text-indigo-600 outline-none" />
                                                    </td>
                                                    <td className="px-2 py-1 bg-orange-50/30">
                                                        <input type="text" value={item.출고가} onChange={(e)=>handleEdit(item.코드, '출고가', e.target.value)} title="저장할 기본 출고가입니다. 행사가가 있으면 출력 적용가는 행사가가 우선합니다." className={`w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 rounded-none px-1 py-1 text-right font-black outline-none transition-colors ${margin ? 'text-rose-600' : 'text-slate-800'}`} />
                                                    </td>
                                                    <td className="px-3 py-2 text-right">
                                                        <input type="text" value={item.행사가} onChange={(e)=>handleEdit(item.코드, '행사가', e.target.value)} title="행사가가 있으면 출력 적용가는 행사가가 우선합니다." className="w-20 bg-transparent border-b border-transparent focus:border-purple-400 hover:border-slate-300 px-1 py-1 text-right font-black text-purple-700 outline-none" />
                                                    </td>
                                                    <td className="px-2 py-1 bg-slate-50/50">
                                                        <input type="text" value={item.재고수량} onChange={(e)=>handleEdit(item.코드, '재고수량', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-indigo-400 hover:border-slate-300 px-1 py-1 text-center font-bold text-slate-600 outline-none" />
                                                    </td>
                                                    <td className="px-2 py-1 text-center">
                                                        <span className={`inline-flex items-center justify-center w-full border rounded px-2 py-1 text-[12px] font-black ${sale.cls}`}>{sale.text}</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white p-6 border-t border-slate-200 shrink-0 flex gap-4 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                            <button onClick={handleExportExcel} disabled={isProcessing || reviewRows.length === 0} className="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black text-[15px] hover:bg-emerald-700 transition-all shadow-md hover:shadow-lg flex justify-center items-center">
                                <i className="fas fa-save mr-2 text-lg"></i> 마스터 반영 후 엑셀 출력 (F9)
                            </button>
                            <button onClick={handleImageExport} disabled={isProcessing || reviewRows.length === 0} className="px-8 py-4 bg-amber-500 text-white rounded-xl font-black text-[15px] hover:bg-amber-600 transition-all shadow-md hover:shadow-lg flex justify-center items-center">
                                <i className="fas fa-image mr-2 text-lg"></i> 이미지 (F10)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExportApp />);
    </script>
</body>
</html>
