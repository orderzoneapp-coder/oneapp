    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 인앱 브라우저 스크롤 및 하단 잘림 방지 */
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            width: 100%;
            /* 모바일 기기에서는 화면 꽉 차게 설정 */
            max-width: 100%; 
            height: 100%;
            background-color: #ffffff;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 500px 이상 태블릿, PC 환경에서는 기존 모바일 뷰 크기로 유지 */
        @media screen and (min-width: 500px) {
            .app-container {
                max-width: 500px; 
            }
        }

        /* 코치마크 강조 애니메이션 */
        .pulse-gold {
            box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7);
            animation: pulse-gold-ring 1.5s infinite;
        }

        @keyframes pulse-gold-ring {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        /* 도입 팝업 버튼 노란색 물결 펄스 효과 */
        .pulse-button-yellow {
            animation: pulse-yellow 1.5s infinite;
        }

        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        /* 다음 버튼 화살표 좌우 애니메이션 */
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }
        .animate-bounce-x {
            animation: bounce-x 1s ease-in-out infinite;
            display: inline-block;
        }

        /* 툴팁 본체 그라데이션 배경 및 부드러운 애니메이션 설정 */
        .tooltip-pro {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s ease, left 0.4s ease;
            pointer-events: none;
        }
        
        /* 활성화 상태 */
        .tooltip-pro.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* 툴팁 화살표 색상 수정 */
        .arrow-bottom::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: var(--arrow-pos, 50%);
            transform: translateX(-50%);
            border-width: 8px 8px 0 8px;
            border-color: #10b981 transparent transparent transparent;
        }
        
        .arrow-top::before {
            content: '';
            position: absolute;
            top: -8px;
            left: var(--arrow-pos, 50%);
            transform: translateX(-50%);
            border-width: 0 8px 8px 8px;
            border-color: transparent transparent #059669 transparent;
        }

        .scroll-area::-webkit-scrollbar { display: none; }
    </style>
</head>

        const proSteps = [

                desc: '사장님 구매 패턴에 맞춘 <b>행사 상품만 쏙쏙!</b><br>오늘 발주 금액을 훅 낮춰보세요.',

                desc: '상품 우측의 <b class="text-yellow-300">[1] 버튼을 터치</b>해서 상품을 MY1 탭으로 직접 이동시켜 보세요!',
                pos: 'bottom',
                requireClick: true 
            },
            {
                targetIds: ['target-save-btn'],
                title: '변경사항 저장하기',
                desc: '<b>[저장]</b> 버튼을 누르면<br>내 맘대로 주문 리스트 완성!',
                pos: 'bottom'
            }
        ];

        let currentProStep = 0;
        let isAnimating = false;

        function renderTipDots(activeIndex) {
            const dots = document.getElementById('tip-dots');
            dots.innerHTML = '';
            proSteps.forEach((_, i) => {
                const opacity = i === activeIndex ? 'bg-white' : 'bg-white/30';
                dots.innerHTML += `<div class="w-1.5 h-1.5 rounded-full ${opacity} transition-colors"></div>`;
            });
        }

        // 시뮬레이션 터치 핸들러
        window.handleSimulation = function() {
            const targetBtn = document.getElementById('target-btn-1');
            targetBtn.classList.remove('bg-white', 'text-gray-400', 'border-gray-200');
            targetBtn.classList.add('bg-[#008c45]', 'text-white', 'border-[#008c45]');
            
            const interactionPro = document.getElementById('interaction-pro');
            interactionPro.innerHTML = '';
            
            const tooltip = document.getElementById('tip-tooltip');
            tooltip.classList.remove('active');
            
            setTimeout(() => {
                document.getElementById('tip-title').innerHTML = '분류 완료!';
                document.getElementById('tip-desc').innerHTML = '<b>짝짝짝! 🎉</b><br>선택한 상품이 <b>MY1</b> 탭으로 이동했습니다.';
                
                const nextBtn = document.getElementById('pro-next-btn');
                nextBtn.style.display = 'flex';
                
                tooltip.classList.add('active');
            }, 300);
        };

        function showProStep(index) {
            const step = proSteps[index];
            const maskHoles = document.getElementById('mask-holes-pro');
            const spotlight = document.getElementById('spotlight-pro');
            const interactionPro = document.getElementById('interaction-pro');
            const tooltip = document.getElementById('tip-tooltip');
            const appRect = document.getElementById('app').getBoundingClientRect();
            
            tooltip.classList.remove('active');
            
            maskHoles.innerHTML = '';
            spotlight.innerHTML = '';
            interactionPro.innerHTML = '';
            let lastRect = null;

            step.targetIds.forEach(id => {
                const el = document.getElementById(id);
                if(!el) return;
                const rect = el.getBoundingClientRect();
                const pad = 2;
                const top = rect.top - appRect.top - pad;
                const left = rect.left - appRect.left - pad;
                const width = rect.width + (pad * 2);
                const height = rect.height + (pad * 2);

                maskHoles.innerHTML += `<rect x="${left}" y="${top}" width="${width}" height="${height}" rx="8" fill="black" />`;
                spotlight.innerHTML += `<div class="absolute border-2 border-yellow-400 rounded-lg pulse-gold" style="top:${top}px; left:${left}px; width:${width}px; height:${height}px;"></div>`;
                
                if (step.requireClick && id === 'target-btn-1') {
                    interactionPro.innerHTML += `
                        <div onclick="handleSimulation()" class="absolute cursor-pointer flex items-center justify-center" style="top:${top}px; left:${left}px; width:${width}px; height:${height}px; pointer-events: auto;">
                            <div class="absolute -bottom-6 -right-5 text-yellow-300 text-2xl drop-shadow-md animate-bounce">
                                <i class="fas fa-hand-pointer -rotate-[25deg]"></i>
                            </div>
                        </div>`;
                }

                lastRect = { rect, top, left, width, height };
            });

            document.getElementById('tip-title').innerHTML = step.title;
            document.getElementById('tip-desc').innerHTML = step.desc;
            renderTipDots(index);

            const nextBtn = document.getElementById('pro-next-btn');
            
            if (step.requireClick) {
                nextBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'flex';
                if (step.btnText) {
                    nextBtn.innerHTML = `${step.btnText} <i class="fas fa-chevron-right ml-1.5 text-xs animate-bounce-x"></i>`;
                } else if (index === proSteps.length - 1) {
                    nextBtn.innerHTML = '시작하기 <i class="fas fa-chevron-right ml-1.5 text-xs animate-bounce-x"></i>';
                } else {
                    nextBtn.innerHTML = '다음 <i class="fas fa-chevron-right ml-1.5 text-xs animate-bounce-x"></i>';
                }
            }

            tooltip.classList.remove('arrow-bottom', 'arrow-top');

            if (step.pos === 'bottom') {
                tooltip.style.top = `${lastRect.top + lastRect.height + 15}px`;
                tooltip.classList.add('arrow-top');
            } else {
                const tHeight = tooltip.offsetHeight || 150;
                tooltip.style.top = `${lastRect.top - tHeight - 15}px`;
                tooltip.classList.add('arrow-bottom');
            }
            
            // 반응형 툴팁 위치 조정
            let tLeft = (lastRect.left + lastRect.width/2) - 152.5;
            tLeft = Math.max(10, Math.min(appRect.width - 315, tLeft));
            tooltip.style.left = `${tLeft}px`;
            
            const arrowPos = (lastRect.left + lastRect.width/2) - tLeft;
            tooltip.style.setProperty('--arrow-pos', `${arrowPos}px`);

            requestAnimationFrame(() => {
                tooltip.classList.add('active');
            });
        }

        async function nextProStep() {
            if (isAnimating) return;
            isAnimating = true;

            const tooltip = document.getElementById('tip-tooltip');
            tooltip.classList.remove('active');
            
            if (proSteps[currentProStep].action) {
                document.getElementById('mask-holes-pro').innerHTML = '';
                document.getElementById('spotlight-pro').innerHTML = '';
                
                const result = proSteps[currentProStep].action();
                if (result instanceof Promise) {
                    await result;
                }
            } else {
                await new Promise(r => setTimeout(r, 100));
            }
            
            if (currentProStep < proSteps.length - 1) {
                currentProStep++;
                showProStep(currentProStep);
            } else {
                window.location.href = "https://orderz.kr/shop/wishlist.php";
            }
            isAnimating = false;
        }

        function startProGuide() {
            document.getElementById('pro-intro-popup').style.display = 'none';
            document.getElementById('pro-overlay').style.display = 'block';
            showProStep(0);
        }

        window.onload = () => {};
    </script>
</body>
</html>
