<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Revenue Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; user-select: none;}
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 🌟 공통 테이블 하이라이트 스타일 */
        .table-row-hover { border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease;}
        .table-row-hover:last-child { border-bottom: none; }
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #eef2ff; }
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🔑 1. Global Constants & Utilities
        // ==========================================
        const STORAGE_KEYS = { MASTER_DB: 'merchMaster_v870', ORDERS_DB: 'merchOrders_v9', SALES_DB: 'merchSales_v9', HISTORY_DB: 'merchHistory_v870', CLOUD_URL: 'skuSyncCloudUrl_v6', SYNC_TRIGGER: 'merchMaster_sync_trigger' };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16);
            });
        };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);

                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }

                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) parsedData.push(obj);
                    } resolve(parsedData);
                } catch(err) { reject(err); }
            }; reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 [아이콘 시스템] SafeIcon
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'bar-chart-3' ? 'bar-chart' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return;
                            }
                        }
                    }
                }; renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'database':'fa-database', 'upload':'fa-upload', 'pie-chart':'fa-chart-pie', 'shopping-cart':'fa-shopping-cart', 'users':'fa-users', 'megaphone':'fa-bullhorn', 'book-open':'fa-address-book', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'printer':'fa-print', 'search':'fa-search', 'plus':'fa-plus', 'trash-alt':'fa-trash-alt', 'edit':'fa-edit', 'save':'fa-save', 'file-excel':'fa-file-excel', 'link':'fa-link', 'ban':'fa-ban', 'layer-group':'fa-layer-group', 'desktop':'fa-desktop', 'sign-in-alt':'fa-sign-in-alt', 'calculator':'fa-calculator', 'tags':'fa-tags', 'broom':'fa-broom', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'folder-open':'fa-folder-open', 'file-invoice':'fa-file-invoice', 'sync': 'fa-sync-alt', 'building': 'fa-building', 'box': 'fa-box' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 [전역 설정 상태 관리 Hook] useMerchConfig
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleMasterCols(); 
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleUploadCols(); 
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.master ? p : getInitialMappings(); 
            });
            
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialMasterLinks(); 
            });
            
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                const def = [
                    { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
                ];
                if (s) { try { const p = JSON.parse(s); if (p?.length > 0) return p.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' })); } catch(e){} }
                return def;
            });

            const [opsMappings, setOpsMappings] = useState(() => {
                const s = localStorage.getItem('inventoryMappingsLight');
                const def = {
                    code: '품목코드, 상품코드, 코드, 품번, 바코드, sku', name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품', spec: '규격, 옵션, 사이즈', 
                    qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
                    price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
                    date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
                    vendor: '매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
                    matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', 
                    excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플', lifoVendor: '2전송, 쿠팡, B2B, 당일우선, 현금판매', internalLot: '우리, 공용, 분배, 담당자, 우리농산', priorityVendor: '2전송>1창고' 
                };
                return s ? { ...def, ...JSON.parse(s) } : def;
            });

            const [opsGrouping, setOpsGrouping] = useState(() => {
                const s = localStorage.getItem('inventoryGroupingV79');
                const def = { priceMode: 'separate', splitByVendor: false, splitByDate: false };
                return s ? { ...def, ...JSON.parse(s) } : def;
            });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEYS.CLOUD_URL, cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
                localStorage.setItem('inventoryMappingsLight', JSON.stringify(opsMappings));
                localStorage.setItem('inventoryGroupingV79', JSON.stringify(opsGrouping));
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules, opsMappings, opsGrouping]);

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules, opsMappings, setOpsMappings, opsGrouping, setOpsGrouping };
        };

        // ==========================================
        // 🧩 [통합 글로벌 헤더] GlobalHeader
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [ { id: 'master', label: '정보 관리', icon: 'database' }, { id: 'ops', label: '운영 관리', icon: 'truck' }, { id: 'admin', label: '인사이트', icon: 'bar-chart-3' } ];
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: '/NEXUS/wip?tab=guide', group: 'common', isReady: false },
                
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: '/NEXUS/partner_db', group: 'master', isReady: false },
                { id: 'partners', label: '거래처 관리', icon: "users", path: '/NEXUS/partners', group: 'master', isReady: true },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: '/NEXUS/orders', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: '/NEXUS/purchases', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: '/NEXUS/sales', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/NEXUS/inventory', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: '/NEXUS/print_center', group: 'ops', isReady: false },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: '/NEXUS/Report', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: '/NEXUS/cs', group: 'admin', isReady: false }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const [selectedGroup, setSelectedGroup] = useState(currentTab ? currentTab.group : 'common');

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={(e) => { setSelectedGroup('common'); onNavigate(e, '/NEXUS/Dashboard', true); }}>
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>

                                                <div className="flex-1 w-full"><label className="text-[11px] font-bold text-slate-600 mb-1.5 block">추가 세분화 옵션</label><div className="flex items-center gap-4 mt-2"><label className="flex items-center gap-1.5 text-[12px] font-bold text-slate-500 cursor-not-allowed opacity-60"><input type="checkbox" checked={true} readOnly className="rounded border-slate-300" /><span>품목코드 (고정)</span></label><label className="flex items-center gap-1.5 text-[12px] font-bold text-slate-700 cursor-pointer hover:text-blue-600"><input type="checkbox" checked={opsGrouping.splitByVendor} onChange={e => setOpsGrouping({...opsGrouping, splitByVendor: e.target.checked})} className="rounded border-slate-300 text-blue-600 focus:ring-blue-500" /><span>매입처별 분리</span></label><label className="flex items-center gap-1.5 text-[12px] font-bold text-slate-700 cursor-pointer hover:text-blue-600"><input type="checkbox" checked={opsGrouping.splitByDate} onChange={e => setOpsGrouping({...opsGrouping, splitByDate: e.target.checked})} className="rounded border-slate-300 text-blue-600 focus:ring-blue-500" /><span>매입일별 분리</span></label></div></div>

                                {activeTab === 'tagManager' && (

        // ==========================================
        // 📋 View: SalesListView
        // ==========================================
        const SalesListView = ({ salesData, masterProducts, updateSaleItem, syncWithOrders, handleConfirmDispatch, showToast, selectedRows, toggleRow, toggleAllRows, viewMode, setViewMode, searchKw, setSearchKw, handleFileUpload }) => {
            
            const filteredData = useMemo(() => {
                if (!searchKw.trim()) return salesData;
                const kw = searchKw.toLowerCase().replace(/\s/g, '');
                return salesData.filter(s => 
                    String(s.matchName || s.extName).toLowerCase().replace(/\s/g, '').includes(kw) || 
                    String(s.partner).toLowerCase().replace(/\s/g, '').includes(kw) ||
                    String(s.matchCode).includes(kw)
                );
            }, [salesData, searchKw]);

            const groupedData = useMemo(() => {
                if (viewMode === 'list') return filteredData;
                
                const map = {};
                filteredData.forEach(sale => {
                    let key = '', name = '', code = '';
                    if (viewMode === 'partner') {
                        key = sale.partner || '미지정 거래처';
                        name = key;
                    } else if (viewMode === 'item') {
                        code = sale.matchCode || '미연결';
                        name = sale.matchName || sale.extName || '알 수 없음';
                        key = `${code}-${name}`;
                    }

                    if (!map[key]) map[key] = { groupKey: key, name, code, items: [], totalQty: 0, totalSales: 0, totalCost: 0 };
                    map[key].items.push(sale);
                    map[key].totalQty += sale.qty;
                    map[key].totalSales += (sale.salesPrice * sale.qty);
                    map[key].totalCost += (sale.costPrice * sale.qty);
                });
                return Object.values(map).sort((a,b) => b.totalSales - a.totalSales);
            }, [filteredData, viewMode]);

            const renderDataRow = (row, omitPartner = false, omitItem = false) => {
                const totalAmount = row.qty * row.salesPrice;
                const margin = (row.salesPrice > 0) ? ((row.salesPrice - row.costPrice) / row.salesPrice) * 100 : 0;
                const isMarginRisk = margin > 0 && margin < 15;
                const isCompleted = row.status === 'COMPLETED';
                const isReturn = row.qty < 0;

                const mItem = masterProducts[row.matchCode] || {};
                const currentStock = parseNum(mItem.재고수량 || mItem.현재재고 || 0);
                const isShortage = currentStock - row.qty < 0 && row.qty > 0;

                return (
                    <tr key={row.id} onClick={() => !isCompleted && toggleRow(row.id)} className={`table-row-hover transition-colors group ${isCompleted ? 'bg-slate-50/50 opacity-60' : selectedRows.has(row.id) ? 'table-row-selected' : 'cursor-pointer'} ${isReturn ? 'bg-rose-50/30' : ''}`}>
                        <td className="py-3 px-4 text-center border-r border-slate-200 bg-inherit" onClick={e=>e.stopPropagation()}>
                            {isCompleted ? <span className="text-[10px] font-bold text-emerald-600 bg-emerald-100 px-1 rounded">출고완료</span> : <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer" checked={selectedRows.has(row.id)} onChange={() => toggleRow(row.id)} />}
                        </td>
                        <td className="py-3 px-4 text-[11px] text-slate-400 font-mono border-r border-slate-200 bg-inherit">{row.date}</td>
                        {!omitPartner && <td className="py-3 px-4 font-bold text-slate-800 border-r border-slate-200 bg-inherit">{row.partner}</td>}
                        
                        {/* 💡 Lot 매핑 컬럼 */}
                        <td className="py-2 px-3 border-r border-slate-200 bg-inherit" onClick={e=>e.stopPropagation()}>
                            <input type="text" value={row.matchVendor || ''} onChange={(e) => updateSaleItem(row.id, 'matchVendor', e.target.value)} disabled={isCompleted} placeholder="지정안함" className="w-full bg-transparent hover:bg-white focus:bg-white border border-transparent focus:border-indigo-400 focus:ring-1 rounded px-2 py-1.5 outline-none transition-colors text-[12px] font-bold text-slate-700" />
                        </td>

                        {!omitItem && (
                            <td className="py-3 px-4 border-r border-slate-200 bg-white">
                                <div className="flex flex-col w-full overflow-hidden">
                                    <div className="flex items-center justify-between mb-0.5">
                                        <span className="text-[10.5px] font-mono text-indigo-500 tracking-tight font-bold">{row.matchCode || '미연결'}</span>
                                        {isShortage && !isCompleted && <span className="text-[9px] bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded font-bold shadow-sm">🚨잔량부족</span>}
                                    </div>
                                    <div className="flex items-baseline w-full min-w-0 overflow-hidden mt-0.5">
                                        <span className="text-[13px] font-extrabold truncate text-slate-800">{row.matchName || row.extName}</span>
                                        <span className="text-[11.5px] font-medium text-slate-400 truncate ml-1.5 shrink-0 max-w-[40%]">({row.matchSpec})</span>
                                    </div>
                                </div>
                            </td>
                        )}
                        <td className="py-3 px-4 text-right font-medium text-slate-500 border-r border-slate-200 bg-inherit">{row.costPrice > 0 ? row.costPrice.toLocaleString() : '-'}</td>
                        
                        <td className="py-2 px-3 border-r border-slate-200 bg-inherit" onClick={e=>e.stopPropagation()}>
                            <div className="relative flex flex-col items-center">
                                <input type="number" value={row.qty} onChange={(e) => updateSaleItem(row.id, 'qty', e.target.value)} disabled={isCompleted}
                                       className={`w-full text-center hover:bg-white focus:bg-white focus:ring-1 rounded px-2 py-1.5 outline-none transition-colors font-bold disabled:bg-transparent border border-transparent ${isReturn ? 'bg-rose-50 text-rose-700 hover:border-rose-300 focus:border-rose-500 focus:ring-rose-200' : (isShortage && !isCompleted ? 'bg-rose-50 border-rose-300 text-rose-700 focus:ring-rose-200' : 'bg-transparent text-indigo-700 hover:border-slate-300 focus:border-indigo-400 focus:ring-indigo-200')}`} onClick={e=>e.target.select()}/>
                                {!isCompleted && <span className={`text-[9px] mt-0.5 font-bold ${isShortage ? 'text-rose-500' : 'text-slate-400'}`}>재고: {currentStock.toLocaleString()}</span>}
                                {isReturn && <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] px-1.5 rounded-full font-bold shadow-sm">반품</span>}
                            </div>
                        </td>
                        
                        <td className="py-2 px-3 border-r border-slate-200 bg-inherit" onClick={e=>e.stopPropagation()}>
                            <input type="number" value={row.salesPrice} onChange={(e) => updateSaleItem(row.id, 'salesPrice', e.target.value)} disabled={isCompleted}
                                   className="w-full text-right bg-transparent hover:bg-white focus:bg-white border border-transparent hover:border-slate-300 focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 rounded px-2 py-1.5 outline-none transition-colors text-indigo-700 font-black disabled:bg-transparent" onClick={e=>e.target.select()} />
                        </td>
                        
                        <td className={`py-3 px-4 text-right font-black border-r border-slate-200 bg-inherit ${isReturn ? 'text-rose-600' : 'text-slate-800'}`}>{totalAmount.toLocaleString()}</td>
                        <td className={`py-3 px-4 text-right font-bold text-[12px] bg-inherit ${isMarginRisk ? 'text-rose-500' : 'text-emerald-600'}`}>
                            {margin.toFixed(1)}%
                        </td>
                    </tr>
                );
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-[#f1f5f9] fade-in relative p-6">
                    {/* 상단 통합 헤더/툴바 */}
                    <div className="px-6 py-3 flex items-center justify-between gap-4 bg-white border border-slate-200 rounded-xl mb-6 shadow-sm shrink-0">
                        <div className="flex items-center gap-1">
                            <div className="flex bg-slate-100 p-1 rounded-md border border-slate-200 shadow-inner">
                                <button onClick={() => setViewMode('list')} className={`px-4 py-1.5 rounded text-[12px] font-bold transition-all ${viewMode === 'list' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>전체 내역</button>
                                <button onClick={() => setViewMode('partner')} className={`px-4 py-1.5 rounded text-[12px] font-bold transition-all ${viewMode === 'partner' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>거래처별 그룹</button>
                                <button onClick={() => setViewMode('item')} className={`px-4 py-1.5 rounded text-[12px] font-bold transition-all ${viewMode === 'item' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>품목별 그룹</button>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 shrink-0">
                            <button onClick={syncWithOrders} className="h-9 px-4 rounded-md text-[12px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 shadow-sm transition-colors flex items-center shrink-0">
                                <SafeIcon name="sync" size={14} className="mr-1.5" /> 주문 가져오기
                            </button>
                            <label className="cursor-pointer h-9 px-4 rounded-md text-[12px] font-bold bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-colors shadow-sm flex items-center shrink-0">
                                <SafeIcon name="file-excel" size={14} className="mr-1.5 text-emerald-500" /> 엑셀 불러오기
                                <input type="file" className="hidden" multiple accept=".xlsx, .xls, .csv" onChange={handleFileUpload} />
                            </label>
                            <button onClick={() => showToast("✅ [엑셀 다운로드] 기능은 준비 중입니다.")} className="h-9 px-4 rounded-md text-[12px] font-bold bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-colors shadow-sm flex items-center shrink-0">
                                <SafeIcon name="cloud-download" size={14} className="mr-1.5 text-emerald-500" /> 정산 엑셀 다운
                            </button>
                            
                            <div className="w-px h-5 bg-slate-200 mx-1"></div>

                            <button onClick={handleConfirmDispatch} disabled={selectedRows.size === 0} className={`h-9 px-4 rounded-md text-[12px] font-bold shadow-sm transition-colors flex items-center ${selectedRows.size > 0 ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed border border-slate-200'}`}>
                                <SafeIcon name="truck" size={14} className="mr-1.5" /> 출고 확정
                            </button>

                            <div className="w-px h-5 bg-slate-200 mx-1"></div>

                            <div className="relative w-48 sm:w-64 h-9">
                                <input type="text" placeholder="결과 내 검색 (F3)" value={searchKw} onChange={e=>setSearchKw(e.target.value)} className="w-full h-full pl-3 pr-8 py-1 border border-slate-300 rounded-md text-[12px] outline-none focus:border-indigo-400 shadow-sm text-slate-700 font-medium" />
                                <SafeIcon name="search" size={14} className="absolute right-3 top-2.5 text-slate-400 text-[13px] pointer-events-none" />
                            </div>
                        </div>
                    </div>
                    
                    {/* 데이터 그리드 영역 */}
                    <div className="flex-1 overflow-hidden bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col relative">
                        {salesData.length === 0 ? (
                            <div className="flex-1 flex flex-col items-center justify-center fade-in bg-[#fdfcfc]">
                                <i className="fas fa-file-invoice-dollar text-6xl text-slate-200 mb-5 block"></i>
                                <p className="text-[15px] font-black text-slate-600 mb-2">판매 대장에 등록된 내역이 없습니다.</p>
                                <p className="text-[13px] text-slate-400 font-medium">상단의 [주문 가져오기] 버튼을 눌러 대기 중인 주문을 불러오세요.</p>
                            </div>
                        ) : (
                            <div className="flex-1 overflow-auto custom-scrollbar relative">
                                <table className="w-full text-left text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                                    <thead className="text-[12px] font-bold text-slate-500 bg-[#fdfcfc]">
                                        <tr>
                                            <th className="sticky top-0 z-40 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm w-12 text-center" style={{left:0}}><input type="checkbox" className="rounded text-indigo-600 cursor-pointer w-4 h-4 border-slate-300 focus:ring-indigo-500" onChange={toggleAllRows} checked={filteredData.filter(i=>i.status!=='COMPLETED').length > 0 && selectedRows.size === filteredData.filter(i=>i.status!=='COMPLETED').length} /></th>
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm w-32 text-center">주문일자</th>
                                            {viewMode !== 'item' && <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-center">매출처(고객)</th>}
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-center w-36">매입처(Lot)</th>
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm min-w-[280px] w-[280px]">상품정보 (코드/품명/규격)</th>
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-right w-24">매입 원가</th>
                                            <th className="sticky top-0 z-30 bg-indigo-50/50 px-3 py-3.5 border-b border-r border-indigo-100 shadow-sm text-center w-28 text-indigo-700">출고 수량</th>
                                            <th className="sticky top-0 z-30 bg-indigo-50/50 px-3 py-3.5 border-b border-r border-indigo-100 shadow-sm text-right w-36 text-indigo-700">판매 단가</th>
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-right w-32">판매 합계</th>
                                            <th className="sticky top-0 z-30 bg-[#fdfcfc] px-4 py-3.5 border-b border-slate-200 shadow-sm text-right w-24">마진율</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-transparent text-slate-700">
                                        {viewMode === 'list' && groupedData.map(row => renderDataRow(row))}
                                        
                                        {viewMode === 'partner' && groupedData.map(g => {
                                            const margin = g.totalSales > 0 ? ((g.totalSales - g.totalCost) / g.totalSales) * 100 : 0;
                                            return (
                                                <React.Fragment key={`group-${g.groupKey}`}>
                                                    <tr className="bg-slate-50/80 border-y border-slate-200">
                                                        <td colSpan="10" className="px-5 py-3">
                                                            <div className="flex justify-between items-center w-full">
                                                                <div className="flex items-center">
                                                                    <SafeIcon name="building" size={16} className="text-slate-400 mr-2" />
                                                                    <span className="font-black text-[14px] text-slate-800">{g.name}</span>
                                                                    <span className="text-[11px] text-slate-500 ml-2 font-medium">({g.items.length}건)</span>
                                                                </div>
                                                                <div className="flex items-center gap-6 text-[12px]">
                                                                    <span className="text-slate-500">총 판매액 <strong className="text-indigo-700 text-[14px] ml-1">{g.totalSales.toLocaleString()}</strong>원</span>
                                                                    <span className={`font-bold border-l border-slate-300 pl-6 ${margin < 15 ? 'text-rose-500' : 'text-emerald-600'}`}>평균 마진 {margin.toFixed(1)}%</span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    {g.items.map(row => renderDataRow(row, true, false))}
                                                </React.Fragment>
                                            );
                                        })}

                                        {viewMode === 'item' && groupedData.map(g => (
                                            <React.Fragment key={`group-${g.groupKey}`}>
                                                <tr className="bg-slate-50/80 border-y border-slate-200">
                                                    <td colSpan="9" className="px-5 py-3">
                                                        <div className="flex justify-between items-center w-full">
                                                            <div className="flex items-center">
                                                                <SafeIcon name="box" size={16} className="text-slate-400 mr-2" />
                                                                <span className="font-black text-[14px] text-indigo-900">{g.name}</span>
                                                                <span className="text-[11px] font-mono text-slate-400 ml-2">{g.code}</span>
                                                            </div>
                                                            <div className="flex items-center gap-6 text-[12px]">
                                                                <span className="text-slate-500">총 판매수량 <strong className="text-emerald-600 text-[14px] ml-1">{g.totalQty}</strong></span>
                                                                <span className="text-slate-500 border-l border-slate-300 pl-6">총 판매액 <strong className="text-indigo-700 text-[14px] ml-1">{g.totalSales.toLocaleString()}</strong>원</span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                                {g.items.map(row => renderDataRow(row, false, true))}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ Main App Container
        // ==========================================
        function App() {
            const config = useMerchConfig();
            const [showSettings, setShowSettings] = useState(false);
            
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            const [masterProducts, setMasterProducts] = useState({});
            const [salesData, setSalesData] = useState([]);
            
            const [viewMode, setViewMode] = useState('list');
            const [searchKw, setSearchKw] = useState('');
            const [selectedRows, setSelectedRows] = useState(new Set());

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady) { showToast(`⚠️ [${path}] 페이지는 아직 준비 중입니다.`); return; }
                try { window.location.href = path; } catch (err) { showToast(`💡 이동 시뮬레이션: ${path}`); }
            }, [showToast]);

            const loadData = useCallback(async () => {
                const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                setMasterProducts(master);
                const sales = await getIDB(STORAGE_KEYS.SALES_DB) || [];
                setSalesData(sales);
            }, []);

            useEffect(() => { loadData(); }, [loadData]);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) loadData();
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [loadData]);

            // Helper for Mapping Center
            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록']; delete newMaster[code]['상품태그']; count++;
                        }
                    }
                    setMasterProducts(newMaster);
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다.`);
                }
            }, [masterProducts, showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                setMasterProducts(newMaster);
                setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [masterProducts, showToast]);

            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                setMasterProducts({});
                await setIDB(STORAGE_KEYS.MASTER_DB, {});
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다.");
            };

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            // 💡 엑셀 파싱 및 매핑
            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('매출 엑셀 분석 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let newSales = [];
                    const todayStr = new Date().toISOString().slice(0, 10);

                    excelData.forEach(row => {
                        const findKey = (mappingString) => {
                            if (!mappingString) return null;
                            const keys = mappingString.split(',').map(k => k.trim());
                            const rowKeys = Object.keys(row);
                            for (const key of keys) {
                                const matched = rowKeys.find(rk => rk.toLowerCase().replace(/\s/g, '') === key.toLowerCase().replace(/\s/g, ''));
                                if (matched) return matched;
                            }
                            return null;
                        };

                        const codeKey = findKey(config.opsMappings.code) || '품목코드';
                        const code = row[codeKey] || row['코드'] || row['상품코드'];
                        if (!code) return;
                        
                        const qtyKey = findKey(config.opsMappings.qty) || '수량';
                        const priceKey = findKey(config.opsMappings.price) || '단가';
                        const vendorKey = findKey(config.opsMappings.vendor) || '거래처명';
                        
                        // 💡 Lot (매입처) 키워드 감지
                        const matchVendorKey = findKey(config.opsMappings.matchVendor) || 'lot';
                        
                        const qty = parseNum(row[qtyKey] || row['판매수량'] || row['출고량']);
                        const price = parseNum(row[priceKey] || row['출고가'] || row['판매가'] || row['판매단가']);
                        const partner = row[vendorKey] || row['고객명'] || row['매출처'] || '미지정';
                        const matchVendorVal = row[matchVendorKey] || '';
                        
                        const mItem = masterProducts[code] || {};
                        
                        newSales.push({
                            id: `SALE-${Date.now()}-${Math.floor(Math.random()*10000)}`,
                            date: row['일자'] || row['날짜'] || row['주문일'] || todayStr,
                            partner: partner,
                            matchCode: code,
                            matchName: row['품목명'] || row['상품명'] || mItem.품목명 || '',
                            matchSpec: row['규격'] || mItem.규격 || '',
                            extName: row['품목명'] || row['상품명'] || '',
                            qty: qty,
                            costPrice: parseNum(mItem.입고가) || 0,
                            salesPrice: price || parseNum(mItem.출고가) || 0,
                            matchVendor: matchVendorVal,
                            status: 'PENDING'
                        });
                    });

                    setSalesData(prev => {
                        const updated = [...newSales, ...prev];
                        setIDB(STORAGE_KEYS.SALES_DB, updated).catch(console.error);
                        return updated;
                    });
                    
                    showToast(`✅ ${newSales.length}건의 매출 내역이 등록되었습니다.`);
                } catch(error) { 
                    showToast("❌ 업로드 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessing(false); setProcessMsg(''); 
                }
            };

            const syncWithOrders = async () => {
                setIsProcessing(true);
                try {
                    const orders = await getIDB(STORAGE_KEYS.ORDERS_DB) || [];
                    const currentSales = await getIDB(STORAGE_KEYS.SALES_DB) || [];
                    
                    const existingOrderIds = new Set(currentSales.map(s => s.orderIdRef));
                    const newSales = [];

                    orders.forEach(o => {
                        if (existingOrderIds.has(o.id)) return;

                        const mItem = masterProducts[o.matchCode] || {};
                        const costPrice = parseNum(mItem.입고가) || 0;
                        const salesPrice = parseNum(mItem.출고가) || parseNum(mItem.시중가) || 0;

                        newSales.push({
                            id: `SALE-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                            orderIdRef: o.id,
                            date: o.date,
                            partner: o.partner,
                            matchCode: o.matchCode,
                            matchName: o.matchName,
                            matchSpec: o.matchSpec,
                            extName: o.extName,
                            qty: o.qty,
                            costPrice: costPrice,
                            salesPrice: salesPrice,
                            matchVendor: '',
                            status: 'PENDING'
                        });
                    });

                    if (newSales.length > 0) {
                        const updatedSales = [...currentSales, ...newSales];
                        await setIDB(STORAGE_KEYS.SALES_DB, updatedSales);
                        setSalesData(updatedSales);
                        showToast(`🚀 ${newSales.length}건의 신규 주문 데이터가 판매 대장으로 이관되었습니다.`);
                    } else {
                        showToast("💡 대기 중인 새로운 주문 내역이 없습니다.");
                    }
                } catch(e) {
                    showToast("❌ 주문 데이터 동기화 중 오류 발생");
                } finally {
                    setIsProcessing(false);
                }
            };

            const updateSaleItem = (id, field, value) => {
                const val = (field === 'qty' || field === 'salesPrice' || field === 'costPrice') ? parseNum(value) : value;
                setSalesData(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, [field]: val } : item);
                    setIDB(STORAGE_KEYS.SALES_DB, newData).catch(console.error);
                    return newData;
                });
            };

            const handleConfirmDispatch = async () => {
                if (selectedRows.size === 0) return showToast("⚠️ 출고 확정할 항목을 선택하세요.");
                
                const itemsToProcess = salesData.filter(item => selectedRows.has(item.id));
                const hasReturns = itemsToProcess.filter(item => item.qty < 0).length > 0;
                
                // 💡 잔량 부족(마이너스 재고) 경고 방어 로직
                let hasNegativeWarning = false;
                itemsToProcess.forEach(item => {
                    const mItem = masterProducts[item.matchCode] || { 재고수량: 0 };
                    const oldQty = parseNum(mItem.재고수량 || mItem.현재재고 || 0);
                    if (oldQty - item.qty < 0 && item.qty > 0) hasNegativeWarning = true;
                });

                let confirmMsg = hasReturns 
                    ? `선택한 ${selectedRows.size}개 판매 건을 확정합니다.\n(마이너스 수량은 '고객 반품'으로 인식되어 재고가 다시 증가합니다.)`
                    : `선택한 ${selectedRows.size}개 판매 건의 출고를 확정하고 마스터 재고를 차감하시겠습니까?`;

                if (hasNegativeWarning) {
                    confirmMsg = "⚠️ 경고: 선택한 항목 중 출고 시 재고가 마이너스(-)가 되는 품목이 있습니다.\n그래도 출고를 강제 확정하시겠습니까?";
                }

                if (!window.confirm(confirmMsg)) return;

                setIsProcessing(true); setProcessMsg("출고 확정 및 수불부 갱신 중...");

                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    let newMaster = { ...master };
                    let newLogs = [];
                    const nowStr = new Date().toLocaleString('ko-KR');
                    
                    itemsToProcess.forEach(item => {
                        const mItem = newMaster[item.matchCode] || { 코드: item.matchCode, 재고수량: 0 };
                        const oldQty = parseNum(mItem.재고수량 || mItem.현재재고 || 0);
                        const qtyToDeduct = item.qty; 
                        const newQty = oldQty - qtyToDeduct; 
                        
                        const isReturn = qtyToDeduct < 0;
                        const eventType = isReturn ? 'SALES_RETURN' : 'DISPATCH';

                        newMaster[item.matchCode] = { ...mItem, 재고수량: newQty };
                        
                        newLogs.push({
                            id: `DIS-${Date.now()}-${generateUUID().slice(0,8)}`,
                            timestamp: nowStr,
                            date: item.date,
                            type: eventType,
                            code: item.matchCode,
                            name: item.matchName || item.extName,
                            qty: Math.abs(qtyToDeduct),
                            price: item.salesPrice,
                            oldStock: oldQty,
                            newStock: newQty,
                            partner: item.partner,
                            lotVendor: item.matchVendor || '미지정', // 💡 Lot 정보 수불부 기록
                            totalAmount: item.salesPrice * qtyToDeduct
                        });
                    });

                    const updatedSales = salesData.map(s => selectedRows.has(s.id) ? { ...s, status: 'COMPLETED' } : s);

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...history, ...newLogs]);
                    await setIDB(STORAGE_KEYS.SALES_DB, updatedSales);
                    
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());

                    setSalesData(updatedSales);
                    setMasterProducts(newMaster);
                    setSelectedRows(new Set());
                    
                    showToast(`🚚 ${itemsToProcess.length}건 처리가 완료되어 재고에 반영되었습니다.`);
                } catch(e) {
                    showToast("❌ 출고 확정 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            };

            const toggleRow = (id) => {
                const next = new Set(selectedRows);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedRows(next);
            };

            const toggleAllRows = (e) => {
                const available = salesData.filter(i => i.status !== 'COMPLETED');
                if (selectedRows.size === available.length && available.length > 0) setSelectedRows(new Set());
                else setSelectedRows(new Set(available.map(item => item.id)));
            };

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => { showToast("✅ 클라우드 저장 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => { showToast("✅ 데이터 수신 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="sales" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg} 
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate} 
                    />
                    
                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50">
                        <SalesListView 
                            salesData={salesData}
                            masterProducts={masterProducts}
                            updateSaleItem={updateSaleItem} 
                            syncWithOrders={syncWithOrders} 
                            handleConfirmDispatch={handleConfirmDispatch}
                            showToast={showToast} 
                            selectedRows={selectedRows}
                            toggleRow={toggleRow}
                            toggleAllRows={toggleAllRows}
                            viewMode={viewMode}
                            setViewMode={setViewMode}
                            searchKw={searchKw}
                            setSearchKw={setSearchKw}
                            handleFileUpload={handleFileUpload}
                        />

                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
