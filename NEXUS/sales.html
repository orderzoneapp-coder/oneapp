<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Stock Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; user-select: none;}
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 🌟 공통 테이블 하이라이트 스타일 */
        .table-row-hover { border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease;}
        .table-row-hover:last-child { border-bottom: none; }
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #eef2ff; }
        
        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const STORAGE_KEYS = { MASTER_DB: 'merchMaster_v870', HISTORY_DB: 'merchHistory_v870', CLOUD_URL: 'skuSyncCloudUrl_v6' };
        
        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"
        ];

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };

        const getInitialVisibleMasterCols = () => ({ estimate: [] }); 
        const getInitialVisibleUploadCols = () => ({ estimate: ['입고가', '출고가', '입고B', '도매A', '외주비', '노무비'] });
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);

                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }

                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) parsedData.push(obj);
                    } resolve(parsedData);
                } catch(err) { reject(err); }
            }; reader.readAsArrayBuffer(file);
        });

        // 🌟 SafeIcon: 전체 아이콘 지원 확장
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'bar-chart-3' ? 'bar-chart' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return;
                            }
                        }
                    }
                }; renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'layout-dashboard':'fa-th-large', 'database':'fa-database', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'book-open':'fa-address-book', 'users':'fa-users', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'boxes':'fa-boxes', 'printer':'fa-print', 'pie-chart':'fa-chart-pie', 'megaphone':'fa-bullhorn', 'search':'fa-search', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'edit':'fa-edit', 'save':'fa-save', 'link':'fa-link', 'settings':'fa-cogs', 'desktop':'fa-desktop', 'sign-in-alt':'fa-sign-in-alt', 'calculator':'fa-calculator', 'tags':'fa-tags', 'layer-group':'fa-layer-group', 'sitemap':'fa-sitemap', 'ban':'fa-ban', 'bolt':'fa-bolt', 'sort-amount-down':'fa-sort-amount-down', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'trash-alt':'fa-trash-alt', 'folder-open':'fa-folder-open', 'file-invoice':'fa-file-invoice', 'broom':'fa-broom', 'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // 🌟 통합 글로벌 헤더 (v2.2 UI 적용 + 클라우드 버튼 복구)
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [ { id: 'master', label: '정보 관리', icon: 'database' }, { id: 'ops', label: '운영 관리', icon: 'truck' }, { id: 'admin', label: '인사이트', icon: 'bar-chart-3' } ];
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: '/NEXUS/wip?tab=guide', group: 'common', isReady: false },
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: '/NEXUS/partner_db', group: 'master', isReady: false },
                { id: 'partners', label: '거래처 관리', icon: "users", path: '/NEXUS/partners', group: 'master', isReady: true },
                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: '/NEXUS/orders', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: '/NEXUS/purchases', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: '/NEXUS/sales', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/NEXUS/inventory', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: '/NEXUS/print_center', group: 'ops', isReady: false },
                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: '/NEXUS/Report', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: '/NEXUS/cs', group: 'admin', isReady: false }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const [selectedGroup, setSelectedGroup] = useState(currentTab ? currentTab.group : 'common');

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={(e) => { setSelectedGroup('common'); onNavigate(e, '/NEXUS/Dashboard', true); }}>
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center"><span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span><span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.4</span></div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">STOCK LEDGER</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => setSelectedGroup(g.id === selectedGroup ? 'common' : g.id)} className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5 ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center">
                                    {isProcessing ? <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i> : <div className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></div>}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300">
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="설정"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>
                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => (
                                <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                   className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                   ${activeTab === tab.id 
                                       ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]' 
                                       : !tab.isReady 
                                          ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                          : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'
                                   }`}
                                   style={{ marginBottom: activeTab === tab.id ? '-1px' : '0', paddingBottom: activeTab === tab.id ? '13px' : '10px' }}
                                >
                                    <SafeIcon name={tab.icon} size={16} className={activeTab === tab.id ? 'text-indigo-600' : 'opacity-70'} />
                                    {tab.label}
                                </a>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🧩 Hooks (Global Setting Manager)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleMasterCols(); 
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleUploadCols(); 
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.master ? p : getInitialMappings(); 
            });
            
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialMasterLinks(); 
            });
            
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                const def = [
                    { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide' },
                    { id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide' },
                    { id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' },
                    { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }
                ];
                if (s) { try { const p = JSON.parse(s); if (p?.length > 0) return p.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' })); } catch(e){} }
                return def;
            });

            const [opsMappings, setOpsMappings] = useState(() => {
                const s = localStorage.getItem('inventoryMappingsLight');
                const def = {
                    code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',

                                    <textarea 
                                        value={memoModal.text} 
                                        onChange={e=>setMemoModal({...memoModal, text: e.target.value})} 
                                        autoFocus 
                                        rows="3"
                                        placeholder="예: 1박스 샘플 제공, 침수로 인한 폐기 처리" 
                                        className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-[13px] outline-none focus:border-indigo-500 focus:ring-1 shadow-sm resize-none" 
                                        onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSaveMemo(memoModal.code, memoModal.text); setMemoModal({ isOpen: false, code: null, text: '' }); } }}
                                    />
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setMemoModal({ isOpen: false, code: null, text: '' })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button>
                                        <button onClick={() => { handleSaveMemo(memoModal.code, memoModal.text); setMemoModal({ isOpen: false, code: null, text: '' }); }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>
                                            사유 기록 승인
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const config = useMerchConfig();
            
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            
            const [masterProducts, setMasterProducts] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);
            const [inventoryData, setInventoryData] = useState([]);
            
            const [searchKw, setSearchKw] = useState('');
            const [linkSourceKey, setLinkSourceKey] = useState(null); 

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady || path === '#' || path === '') { showToast(`⚠️ 해당 페이지는 아직 준비 중입니다.`); return; }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => {
                    showToast("✅ 클라우드 저장 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => {
                    showToast("✅ 데이터 수신 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            const loadData = useCallback(async () => {
                setIsProcessing(true);
                setProcessMsg("전산 수불부 동기화 중...");
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    
                    setMasterProducts(master);
                    setHistoryLogs(history);

                    let arr = [];
                    for(let code in master) {
                        const m = master[code];
                        const logs = history.filter(h => h.code === code);
                        let inQty = 0, outQty = 0;
                        
                        logs.forEach(log => {
                            if (log.type === 'PURCHASE') inQty += Number(log.qty);
                            if (log.type === 'PURCHASE_RETURN') inQty -= Math.abs(Number(log.qty));
                            if (log.type === 'DISPATCH') outQty += Number(log.qty);
                            if (log.type === 'SALES_RETURN') outQty -= Math.abs(Number(log.qty));
                        });

                        const sysQty = Number(m.재고수량 || 0);

                        arr.push({
                            코드: code,
                            품명: m.품목명,
                            기초: sysQty - inQty + outQty,
                            입고: inQty,
                            출고: outQty,
                            대체입고: 0,
                            대체출고: 0,
                            전산잔량: sysQty,
                            실사: sysQty, 
                            로스: 0,
                            이슈: [],
                            메모: ''
                        });
                    }
                    
                    arr.sort((a,b) => a.품명.localeCompare(b.품명));
                    setInventoryData(arr);
                    
                } catch(e) {
                    showToast("❌ 데이터 로드 중 오류 발생");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [showToast]);

            useEffect(() => { loadData(); }, [loadData]);

            // 타 탭 동기화 트리거 리스너
            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) {
                        loadData();
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [loadData]);

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            // 설정창 연동 액션들
            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                setMasterProducts({});
                await setIDB(STORAGE_KEYS.MASTER_DB, {});
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다.");
                loadData();
            };

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록'];
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    setMasterProducts(newMaster);
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다.`);
                }
            }, [masterProducts, showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                setMasterProducts(newMaster);
                setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [masterProducts, showToast]);

            // 기초 재고 셋업 (Snapshot)
            const handleBaseStockUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                if (!window.confirm("업로드한 엑셀의 수량으로 '기초 재고'를 강제 초기화(Snapshot) 합니다.\n초기화된 품목의 과거 입출고 히스토리는 리셋됩니다. 진행하시겠습니까?")) { e.target.value = ''; return; }
                
                setIsProcessing(true); setProcessMsg('기초 재고 셋업 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let count = 0;
                    let newMaster = { ...masterProducts };
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    let newHistory = [...history];

                    excelData.forEach(row => {
                        const code = row['품목코드'] || row['코드'] || row['상품코드'];
                        if (!code || !newMaster[code]) return;
                        
                        const qtyVal = row['기초'] || row['기초재고'] || row['재고'] || row['수량'] || row['실사'];
                        if (qtyVal !== undefined && qtyVal !== '') {
                            const setupQty = parseNum(qtyVal);
                            
                            // 마스터 DB 수량 업데이트
                            newMaster[code] = { ...newMaster[code], 재고수량: setupQty };
                            
                            // 과거 히스토리 삭제 후 초기 기초재고 로그 생성 (Snapshot)
                            newHistory = newHistory.filter(h => h.code !== code);
                            newHistory.push({
                                id: `OPEN-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                                timestamp: new Date().toLocaleString('ko-KR'),
                                date: new Date().toISOString().slice(0, 10),
                                type: 'OPENING_STOCK',
                                code: code,
                                name: newMaster[code].품목명,
                                qty: setupQty, 
                                oldStock: 0,
                                newStock: setupQty,
                                partner: '시스템 셋업',
                                memo: '기초 재고 리셋 (Snapshot)'
                            });
                            count++;
                        }
                    });

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, newHistory);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    
                    if(count > 0) showToast(`✅ ${count}건의 기초 재고가 성공적으로 셋업(고정)되었습니다.`);
                    else showToast(`⚠️ 일치하는 품목을 찾을 수 없거나 수량 열을 찾을 수 없습니다.`);
                    
                    loadData();
                } catch(error) { 
                    showToast("❌ 셋업 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessing(false); setProcessMsg(''); 
                }
            };

            // 실사 엑셀 업로드 연동
            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('실사 엑셀 대조 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let count = 0;
                    const actualUpdates = {};
                    
                    // 엑셀에서 실사 수량 찾기
                    excelData.forEach(row => {
                        const code = row['품목코드'] || row['코드'] || row['상품코드'];
                        if (!code) return;
                        
                        const qtyVal = row['실사'] || row['실사수량'] || row['재고'] || row['기말실사'] || row['수량'];
                        if (qtyVal !== undefined && qtyVal !== '') {
                            actualUpdates[code] = parseNum(qtyVal);
                        }
                    });

                    setInventoryData(prev => {
                        let updatedCount = 0;
                        const newData = prev.map(item => {
                            if (actualUpdates[item.코드] !== undefined) {
                                const actual = actualUpdates[item.코드];
                                const newLoss = actual - item.전산잔량;
                                let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정'));
                                
                                if (newLoss !== 0) newIssues.push('🚨실사조정');
                                
                                updatedCount++;
                                return { ...item, 실사: actual, 로스: newLoss, 이슈: newIssues };
                            }
                            return item;
                        });
                        count = updatedCount;
                        return newData;
                    });
                    
                    if(count > 0) showToast(`✅ ${count}건의 실사 수량이 전산잔량과 대조되었습니다.`);
                    else showToast(`⚠️ 엑셀에서 일치하는 품목코드를 찾을 수 없습니다.`);
                } catch(error) { 
                    showToast("❌ 업로드 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessing(false); setProcessMsg(''); 
                }
            };

            const updateActualQty = (code, val) => {
                const actual = val === '' ? '' : parseInt(val, 10);
                
                setInventoryData(prev => prev.map(item => {
                    if (item.코드 === code) {
                        const lossCalcVal = actual === '' ? 0 : actual;
                        const newLoss = lossCalcVal - item.전산잔량;
                        
                        let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정'));
                        
                        if (actual !== '' && newLoss !== 0) {
                            newIssues.push('🚨실사조정'); 
                        }
                        
                        return { ...item, 실사: actual, 로스: newLoss, 이슈: newIssues };
                    }
                    return item;
                }));
            };

            const handleSubstitution = (sourceCode, targetCode) => {
                setInventoryData(prev => {
                    const newData = [...prev];
                    const sIdx = newData.findIndex(d => d.코드 === sourceCode);
                    const tIdx = newData.findIndex(d => d.코드 === targetCode);
                    
                    if (sIdx < 0 || tIdx < 0) return prev;

                    let sourceItem = { ...newData[sIdx], 이슈: [...newData[sIdx].이슈] };
                    let targetItem = { ...newData[tIdx], 이슈: [...newData[tIdx].이슈] };

                    if (sourceItem.로스 < 0 && targetItem.로스 > 0) {} 
                    else if (targetItem.로스 < 0 && sourceItem.로스 > 0) { let temp = sourceItem; sourceItem = targetItem; targetItem = temp; }
                    else {
                        showToast("⚠️ 상계 불가! 두 상품 중 하나는 로스가 음수(-), 다른 하나는 양수(+)여야 합니다.");
                        return prev;
                    }

                    const moveQty = Math.min(Math.abs(sourceItem.로스), Math.abs(targetItem.로스));

                    sourceItem.대체출고 += moveQty;
                    sourceItem.전산잔량 -= moveQty;
                    sourceItem.로스 = sourceItem.실사 - sourceItem.전산잔량; 
                    
                    targetItem.대체입고 += moveQty;
                    targetItem.전산잔량 += moveQty;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;

                    if (sourceItem.로스 === 0) sourceItem.이슈 = sourceItem.이슈.filter(msg => !msg.includes('실사조정'));
                    sourceItem.이슈.push(`🔄 (-${moveQty})`);
                    
                    if (targetItem.로스 === 0) targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('실사조정'));
                    targetItem.이슈.push(`🔄 (+${moveQty} ${sourceItem.품명})`);

                    newData[sIdx] = sourceItem;
                    newData[tIdx] = targetItem;
                    
                    showToast(`✅ [${sourceItem.품명}] ➔ [${targetItem.품명}] 로스 상계 완료`);
                    return newData;
                });
            };

            const handleSaveMemo = (code, text) => {
                setInventoryData(prev => prev.map(item => {
                    if (item.코드 === code) {
                        let newIssues = [...item.이슈];
                        if (newIssues.some(i => i.includes('🚨실사조정'))) {
                            newIssues = newIssues.map(msg => msg.replace('🚨실사조정', '✅실사조정(수기)'));
                        }
                        return { ...item, 메모: text, 이슈: newIssues };
                    }
                    return item;
                }));
                showToast("✅ 사유가 기록되어 조정 내역이 승인되었습니다.");
            };

            const handleClosing = async () => {
                const hasErrors = inventoryData.some(item => item.이슈.some(msg => msg.includes('🚨')));
                if (hasErrors) {
                    return showToast("⚠️ 해결되지 않은 오류(🚨실사조정)가 남아있습니다. 스페이스바 상계 또는 사유 메모를 기록하여 모두 승인(✅) 처리 후 마감하세요.");
                }

                if (!window.confirm("✅ 현재의 '실사 수량'이 다음 달의 '기초 재고'로 확정 및 이월됩니다.\n수불부를 마감하시겠습니까?\n(오차가 있던 항목은 '실사조정' 내역으로 보존됩니다.)")) return;

                setIsProcessing(true); setProcessMsg("수불부 마감 및 이월 처리 중...");

                try {
                    let newMaster = { ...masterProducts };
                    let newLogs = [];
                    const nowStr = new Date().toLocaleString('ko-KR');
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];

                    inventoryData.forEach(item => {
                        const code = item.코드;
                        const actualQty = item.실사 === '' ? 0 : item.실사;
                        
                        if (newMaster[code]) {
                            newMaster[code] = { ...newMaster[code], 재고수량: actualQty };
                        }

                        if (item.로스 !== 0 || item.이슈.some(i=>i.includes('🔄'))) {
                            newLogs.push({
                                id: `ADJ-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                                timestamp: nowStr,
                                date: new Date().toISOString().slice(0, 10),
                                type: 'ADJUSTMENT',
                                code: code,
                                name: item.품명,
                                qty: item.로스, 
                                oldStock: item.전산잔량,
                                newStock: actualQty,
                                partner: '시스템 마감(실사)',
                                memo: item.이슈.join(' ') + ' / ' + item.메모
                            });
                        }
                    });

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...history, ...newLogs]);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());

                    showToast("🎉 월 마감이 완료되어 재고가 최종 확정되었습니다!");
                    setTimeout(() => loadData(), 1000); 
                } catch(e) {
                    showToast("❌ 마감 처리 중 오류 발생");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            };

            const unresolvedCount = inventoryData.filter(i => i.이슈.some(msg => msg.includes('🚨'))).length;

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="inventory" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg} 
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate} 
                    />
                    
                    <div className="px-8 py-5 bg-white border-b border-slate-200 flex items-center justify-between shadow-sm shrink-0 relative z-10">
                        <div>
                            <h1 className="text-[18px] font-black text-slate-900 flex items-center">
                                <SafeIcon name="boxes" size={22} className="mr-2.5 text-indigo-500" /> 재고 수불부 마감 및 실사 조정
                            </h1>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            {/* 기초재고 셋업 버튼 추가 */}
                            <label className="cursor-pointer h-9 px-3 rounded-md text-[13px] font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 transition-colors shadow-sm flex items-center shrink-0" title="과거 이력을 리셋하고 현재 수량을 새로운 시작점(기초재고)으로 강제 세팅합니다.">
                                <SafeIcon name="database" size={14} className="mr-1.5 text-slate-400" /> 기초재고 셋업
                                <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleBaseStockUpload} disabled={isProcessing} />
                            </label>

                            <label className="cursor-pointer h-9 px-3 rounded-md text-[13px] font-bold bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-colors shadow-sm flex items-center shrink-0" title="전산잔량과 비교할 실제 창고 재고를 업로드하여 오차를 찾습니다.">
                                <SafeIcon name="file-excel" size={14} className="mr-1.5 text-emerald-500" /> 실사 엑셀 대조
                                <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} disabled={isProcessing} />
                            </label>

                            <div className="flex items-center bg-rose-50 border border-rose-200 px-4 py-1.5 rounded-lg shadow-sm">
                                <span className="text-[11px] font-bold text-rose-600 mr-2">미해결 경고(🚨)</span>
                                <span className="text-[16px] font-black text-rose-700">{unresolvedCount}건</span>
                            </div>
                            
                            <button onClick={handleClosing} disabled={isProcessing || unresolvedCount > 0} className={`px-6 py-2.5 rounded-lg text-[13px] font-black shadow-sm transition-all flex items-center ${unresolvedCount === 0 && inventoryData.length > 0 ? 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                <SafeIcon name="save" size={14} className="mr-2" /> 최종 마감 (Closing)
                            </button>

                            <div className="w-px h-8 bg-slate-200 mx-1"></div>

                            <div className="relative">
                                <SafeIcon name="search" size={14} className="absolute right-3 top-2.5 text-slate-400" />
                                <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="상품명, 코드 검색..." className="w-[240px] bg-slate-50 border border-slate-300 rounded-lg pl-4 pr-9 py-2 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm transition-shadow" />
                            </div>
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50 p-6">
                        <InventoryGrid 
                            inventoryData={inventoryData} 
                            updateActualQty={updateActualQty}
                            handleSubstitution={handleSubstitution}
                            handleSaveMemo={handleSaveMemo}
                            linkSourceKey={linkSourceKey}
                            setLinkSourceKey={setLinkSourceKey}
                            searchKw={searchKw}
                        />

                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
