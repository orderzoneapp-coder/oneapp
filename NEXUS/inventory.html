<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Stock Ledger [DataOps Closing]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .table-row-hover { border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease; }
        .table-row-hover:last-child { border-bottom: none; }
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #eef2ff; }
        
        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 6px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 500; white-space: nowrap; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); pointer-events: none;
        }
        .editable-cell { background-color: rgba(255,255,255,0.7); border: 1px solid transparent; border-radius: 6px; transition: all 0.2s; }
        .editable-cell:hover, .editable-cell:focus-within { background-color: #fff; border-color: #cbd5e1; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }

        .audit-input { width: 100%; text-align: right; background-color: transparent; border-radius: 4px; padding: 4px 6px; font-weight: 700; transition: all 0.2s; outline: none; border: 1px solid transparent; }
        .audit-input:hover { background-color: rgba(255,255,255,0.8); border-color: #cbd5e1; }
        .audit-input:focus { background-color: white; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1); }
        .audit-changed { color: #6366f1 !important; background-color: #eef2ff; border-color: #c7d2fe !important; }

        .issue-card { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .issue-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .issue-card.active { border-color: #6366f1; background-color: #f5f3ff; }
        .terminal-text { font-family: 'Consolas', 'Monaco', monospace; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        const STORAGE_KEYS = { 
            MASTER_DB: 'merchMaster_v870', 
            CLOUD_URL: 'skuSyncCloudUrl_v6', 
            SYNC_TRIGGER: 'merchMaster_sync_trigger', 
            HISTORY_DB: 'merchHistory_v870',
            CLOSING_DB: 'merchClosing_v2' // 버전업
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }
                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) { obj['_raw'] = row; parsedData.push(obj); }
                    } resolve(parsedData);
                } catch(err) { reject(err); }
            }; reader.readAsArrayBuffer(file);
        });

        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    const possibleNames = [kebabName, name, name==='cloud-download'?'download-cloud':name, name==='cloud-upload'?'upload-cloud':name];
                    for (const pName of possibleNames) {
                        if (window.lucide.icons[pName]) { setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return; }
                    }
                }
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'truck':'fa-truck', 'boxes':'fa-boxes', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'edit':'fa-edit', 'save':'fa-save', 'link':'fa-link', 'ban':'fa-ban', 'layer-group':'fa-layer-group', 'sort-amount-down':'fa-sort-amount-down', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'trash-alt':'fa-trash-alt', 'undo':'fa-undo', 'exchange-alt':'fa-exchange-alt', 'check-double':'fa-check-double', 'scale':'fa-balance-scale', 'search-plus':'fa-search-plus', 'file-export':'fa-file-export', 'truck-loading':'fa-truck-loading', 'history':'fa-history', 'exclamation-circle': 'fa-exclamation-circle', 'calendar-alt': 'fa-calendar-alt', 'cut':'fa-cut', 'rocket':'fa-rocket', 'file-excel':'fa-file-excel', 'tags':'fa-tags', 'alert-triangle':'fa-exclamation-triangle' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        const useMerchConfig = () => {
            const [opsMappings] = useState(() => {
                const s = localStorage.getItem('inventoryMappingsLight');
                const def = { code: '품목코드, 상품코드, 코드, 품번, 바코드, sku', qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량' };
                return s ? { ...def, ...JSON.parse(s) } : def;
            });
            const [opsGrouping] = useState(() => {
                const s = localStorage.getItem('inventoryGroupingV79');
                return s ? { ...{ priceMode: 'separate', splitByVendor: false, splitByDate: false }, ...JSON.parse(s) } : { priceMode: 'separate', splitByVendor: false, splitByDate: false };
            });
            return { opsMappings, opsGrouping };
        };

        const GlobalHeader = ({ itemCount, stats, isProcessing }) => {
            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors uppercase">OneApp</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">Nexes</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">Workspace Auditor</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 max-w-2xl px-6 flex items-center">
                            <div className="w-full bg-black/40 border border-slate-700 rounded-lg px-4 py-2 flex items-center gap-4 text-emerald-400 text-[12px] terminal-text shadow-inner">
                                <span className="text-slate-500 shrink-0">SYSTEM.IO ></span>
                                <div className="flex gap-4 overflow-hidden whitespace-nowrap">
                                    <span className="flex items-center gap-1.5"><SafeIcon name="package" size={12}/> {itemCount} Items</span>
                                    <span className={`flex items-center gap-1.5 ${stats.qty > 0 ? 'text-amber-400 animate-pulse' : ''}`}><SafeIcon name="alert-triangle" size={12}/> {stats.qty} Discrepancies</span>
                                    <span className="text-indigo-400">| Net Worth: {stats.totalValue.toLocaleString()}₩</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full pl-6">
                            {isProcessing ? <i className="fas fa-circle-notch fa-spin text-amber-500 text-[18px]"></i> : <div className="relative flex h-2.5 w-2.5"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span></div>}
                        </div>
                    </header>
                </div>
            );
        };

        const GenesisSetupModal = ({ isOpen, onClose, onApplySetup, showToast }) => {
            const [isProcessingLocal, setIsProcessingLocal] = useState(false);

            const handleSetupUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessingLocal(true);
                
                try {
                    const masterProducts = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let newItems = []; let count = 0;
                    
                    excelData.forEach((row) => {
                        const code = row['품목코드'] || row['코드'] || row['상품코드'];
                        if (!code) return;
                        
                        const qty = parseNum(row['수량'] || row['실사수량'] || row['기초수량'] || row['실사'] || row['재고']);
                        if (qty === 0) return; 

                        const mItem = masterProducts[code] || {};
                        const excelPrice = parseNum(row['매입단가'] || row['원가'] || row['단가']);
                        const masterPrice = parseNum(mItem['입고가'] || 0);
                        const price = excelPrice > 0 ? excelPrice : masterPrice;
                        const vendor = row['매입처'] || row['로트'] || row['거래처'] || '기초재고';
                        const batchKey = `${code}|${price}|${vendor}|all`;
                        
                        const existingIdx = newItems.findIndex(i => i.batchKey === batchKey);
                        if (existingIdx >= 0) {
                            newItems[existingIdx].실사 += qty;
                            newItems[existingIdx].로스 += qty;
                        } else {
                            newItems.push({
                                batchKey, 코드: code, 품명: mItem.품목명 || row['품명'] || row['상품명(규격)'] || '미상', 
                                규격: mItem.규격 || row['규격'] || '', 단가: price, 거래처: vendor, 일자: '',
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: qty, 로스: qty, 
                                이슈: ['🚀초기셋업'], 메모: '엑셀 초기화', 출고내역: {}, _orig: { 기초: 0, 입고: 0, 출고: 0 },
                                isDummy: false, 수기확인완료: true
                            });
                        }
                        count++;
                    });
                    
                    if(count > 0) {
                        onApplySetup(newItems);
                        showToast(`✅ ${count}건의 기초 재고 자산이 화면에 세팅되었습니다. 마감을 눌러 확정하세요.`);
                        onClose();
                    } else { showToast(`⚠️ 수량이 있는 유효한 품목 코드를 찾지 못했습니다.`); }
                } catch(error) { showToast("❌ 업로드 오류: " + error.message); } finally { e.target.value = ''; setIsProcessingLocal(false); }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[500] flex justify-center items-center bg-slate-900/80 backdrop-blur-md fade-in">
                    <div className="w-full max-w-[500px] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden modal-bounce">
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0">
                            <div className="flex items-center gap-3"><SafeIcon name="rocket" size={20} className="text-indigo-400"/><h2 className="font-black text-[16px]">시스템 초기 재고 자산화</h2></div>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><SafeIcon name="x" size={20} /></button>
                        </div>
                        <div className="p-6 bg-slate-50 relative">
                            {isProcessingLocal && (<div className="absolute inset-0 bg-white/80 z-20 flex items-center justify-center backdrop-blur-[2px]"><i className="fas fa-circle-notch fa-spin text-indigo-600 text-3xl"></i></div>)}
                            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                                <p className="text-[12px] text-slate-600 leading-relaxed mb-4">현재 창고에 있는 상품들의 <strong>[품목코드, 수량]</strong>이 적힌 엑셀을 업로드하세요.</p>
                                <label className="cursor-pointer w-full py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-black transition-all flex items-center justify-center shadow-md">
                                    <SafeIcon name="upload" size={16} className="mr-2" /> 초기 재고 엑셀 파일 선택
                                    <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleSetupUpload} />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const IssueChip = React.memo(({ msg }) => {
            let shortMsg = msg; let colorClass = "bg-slate-100 text-slate-700 border-slate-200";

            if (msg.includes('실사조정') || msg.includes('수기조정')) {
                shortMsg = msg.includes('✅') ? "✅수기조정" : "🚨수기조정"; 
                colorClass = shortMsg.includes('🚨') ? "bg-orange-50 text-orange-700 border-orange-200" : "bg-emerald-50 text-emerald-700 border-emerald-200";
            } else if (msg.includes('수량변동')) {
                shortMsg = msg.includes('✅') ? "✅수량변경" : "🚨수량변동";
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200" : "bg-emerald-50 text-emerald-700 border-emerald-200";
            } else if (msg.includes('신규발생')) {
                shortMsg = msg.includes('✅') ? "✅신규발생" : "🚨신규발생";
                colorClass = shortMsg.includes('🚨') ? "bg-indigo-50 text-indigo-700 border-indigo-200" : "bg-emerald-50 text-emerald-700 border-emerald-200";
            } else if (msg.includes('🚀초기셋업')) {
                shortMsg = "🚀초기셋업"; colorClass = "bg-blue-100 text-blue-700 border-blue-200";
            } else if (msg.includes('🔄')) {
                shortMsg = msg; colorClass = "bg-slate-100 text-slate-600 border-slate-200 max-w-[150px] truncate";
            }

            return <span className={`px-2 py-0.5 rounded border font-bold text-[10px] ${colorClass}`}>{shortMsg}</span>;
        });

        const SnapshotManagerModal = ({ isOpen, onClose, showToast }) => {
            const [snapshots, setSnapshots] = useState([]);
            
            useEffect(() => { if(isOpen) getIDB(STORAGE_KEYS.CLOSING_DB).then(data => setSnapshots(data || [])); }, [isOpen]);

            const handleDelete = async (id) => {
                if(!window.confirm("이 마감 스냅샷을 롤백(삭제)하시겠습니까?")) return;
                const newSnaps = snapshots.filter(s => s.id !== id);
                await setIDB(STORAGE_KEYS.CLOSING_DB, newSnaps);
                setSnapshots(newSnaps);
                showToast("🗑️ 마감 스냅샷이 롤백되었습니다.");
            };

            const handleExport = (snapshot) => {
                const exportFileNameDate = snapshot.closingDate.replace(/-/g, '');
                const exportData = snapshot.snapshotData.map(item => {
                    const qty = item.실사 === '' || item.실사 === null ? 0 : parseNum(item.실사);
                    const adjust = (parseNum(item.로스) || 0) + (parseNum(item.대체입고) || 0) - (parseNum(item.대체출고) || 0);
                    const price = parseNum(item.단가) || 0;
                    return { '결산일자': snapshot.closingDate, '매입처(Lot)': item.거래처, '상품코드': item.코드, '상품명(규격)': item.품명, '기초수량': item.기초, '입고수량': item.입고, '출고량': item.출고, '기말실사(이월수량)': qty, '매입단가(원가)': price, '기말재고액(자산가치)': qty * price, '로스/조정수량': adjust, '이슈/결과': item.이슈.join(', '), '수기메모': item.메모 || '' };
                });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData), '재고수불_마감');
                try {
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `과거마감기록_${exportFileNameDate}.xlsx`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    showToast(`✅ [${snapshot.closingDate}] 마감 기록이 다운로드되었습니다.`);
                } catch(e) { showToast("❌ 다운로드 오류"); }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[200] bg-slate-900/70 flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[700px] rounded-xl shadow-2xl flex flex-col max-h-[80vh] overflow-hidden modal-bounce">
                        <div className="bg-slate-900 px-6 py-4 flex justify-between items-center text-white shrink-0">
                            <h2 className="font-black text-[16px] flex items-center"><SafeIcon name="archive" size={18} className="text-emerald-400 mr-2"/>일자별 마감 스냅샷 보관소</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><SafeIcon name="x" size={20} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 bg-slate-50 custom-scrollbar">
                            {snapshots.length === 0 ? (
                                <div className="text-center text-slate-400 py-16 font-bold flex flex-col items-center">보관된 마감 스냅샷이 없습니다.</div>
                            ) : (
                                <div className="grid gap-4">
                                    {snapshots.map(snap => (
                                        <div key={snap.id} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between hover:border-emerald-300 transition-colors">
                                            <div>
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[11px] font-black">{snap.closingDate} 마감본</span>
                                                </div>
                                                <div className="text-[13px] text-slate-600 font-bold">총 결산 품목: {snap.stats?.totalItems || 0}개 <span className="mx-2">|</span> 총 로스 가치: <span className="text-rose-600">{snap.stats?.lossValue?.toLocaleString() || 0}</span>원</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleExport(snap)} className="px-3 py-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded text-[11px] font-bold hover:bg-emerald-100 flex items-center"><SafeIcon name="file-excel" size={12} className="mr-1"/>다운로드</button>
                                                <button onClick={() => handleDelete(snap.id)} className="px-3 py-1.5 bg-white text-rose-500 border border-slate-200 rounded text-[11px] font-bold hover:bg-rose-50 flex items-center"><SafeIcon name="undo" size={12} className="mr-1"/>롤백</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ProductRow = React.memo(({ item, idx, isLinked, onStockChange, onSpacebar, onBaseDataChange, onOpenMemo, onSalesMove }) => {
            const displayIssues = item.이슈 ? [...item.이슈] : [];
            const isNegativeActual = item.실사 < 0;
            const isInChanged = item.입고 !== item._orig.in;
            const isOutChanged = item.출고 !== item._orig.out;

            return (
                <tr data-batch={item.batchKey}
                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('bg-blue-50', 'ring-2', 'ring-blue-400', 'z-20', 'shadow-md'); }} 
                    onDragLeave={(e) => { e.preventDefault(); e.currentTarget.classList.remove('bg-blue-50', 'ring-2', 'ring-blue-400', 'z-20', 'shadow-md'); }} 
                    onDrop={(e) => { 
                        e.preventDefault(); e.currentTarget.classList.remove('bg-blue-50', 'ring-2', 'ring-blue-400', 'z-20', 'shadow-md'); 
                        try { 
                            const d = JSON.parse(e.dataTransfer.getData('text/plain')); 
                            const moveQty = Number(d.qty);
                            if (d.sourceKey !== item.batchKey && !isNaN(moveQty) && moveQty > 0) onSalesMove(d.sourceKey, item.batchKey, d.vendor, moveQty, e.ctrlKey || e.metaKey); 
                        } catch (err) {} 
                    }}
                    className={`table-row-hover transition-all duration-200 ${isLinked ? 'table-row-selected relative z-10 scale-[1.01] shadow-sm' : ''} ${item.이슈?.includes('🚀초기셋업') ? 'bg-blue-50/20' : ''}`}
                >
                    <td className="py-3 px-6 border-r border-slate-200 sticky left-0 bg-white shadow-[2px_0_5px_rgba(0,0,0,0.02)]">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-mono text-indigo-500 font-bold flex items-center gap-1">{isLinked && <SafeIcon name="link" size={10} className="animate-pulse" />} {item.코드}</span>
                            <span className="text-[13px] font-extrabold text-slate-800">{item.품명}</span>
                        </div>
                    </td>
                    <td className="py-2 px-3 text-right font-medium text-slate-400 border-r border-slate-100 bg-slate-50/30">{item.기초.toLocaleString()}</td>
                    
                    <td className="py-2 px-2 border-r border-slate-100">
                        <input type="number" value={item.입고} onChange={(e) => onBaseDataChange(item.batchKey, '입고', e.target.value)} onClick={e=>e.target.select()}
                            className={`audit-input text-blue-600 ${isInChanged ? 'audit-changed' : ''}`} />
                    </td>
                    <td className="py-2 px-2 border-r border-slate-100">
                        <input type="number" value={item.출고} onChange={(e) => onBaseDataChange(item.batchKey, '출고', e.target.value)} onClick={e=>e.target.select()}
                            className={`audit-input text-rose-600 ${isOutChanged ? 'audit-changed' : ''}`} />
                    </td>

                    <td className="py-2 px-4 text-right font-black text-[14px] text-indigo-700 bg-indigo-50/20 border-r border-indigo-100">{item.전산잔량.toLocaleString()}</td>
                    
                    <td className="py-2 px-3 bg-emerald-50/20 border-r border-emerald-100 relative">
                        {isLinked && <div className="absolute -top-3 right-2 bg-slate-800 text-white text-[9px] px-1.5 py-0.5 rounded shadow animate-bounce">대상 선택</div>}
                        <input id={`actual-input-${idx}`} type="number" value={item.실사 === null ? '' : item.실사} onChange={(e) => onStockChange(item.batchKey, e.target.value)} onFocus={e => e.target.select()} onKeyDown={(e) => { if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }} placeholder={item.전산잔량}
                            className={`audit-input text-center text-emerald-800 ${item.실사 !== null ? 'audit-changed font-black' : ''} ${isNegativeActual ? 'bg-rose-50 border-rose-400 text-rose-700 focus:ring-rose-200' : ''}`} />
                    </td>

                    <td className={`py-2 px-4 text-right font-black border-r border-slate-200 ${item.로스 < 0 ? 'text-rose-500' : item.로스 > 0 ? 'text-blue-500' : 'text-slate-300'}`}>
                        {item.로스 > 0 ? '+' : ''}{item.로스 === 0 ? '-' : item.로스.toLocaleString()}
                    </td>
                    
                    <td className="py-2 px-6">
                        <div className="flex items-center gap-2 flex-wrap">
                            {isInChanged && <span className="px-2 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold rounded border border-blue-100">입고보정</span>}
                            {isOutChanged && <span className="px-2 py-0.5 bg-rose-50 text-rose-600 text-[10px] font-bold rounded border border-rose-100">출고보정</span>}
                            {displayIssues.map((msg, i) => <IssueChip key={i} msg={msg} />)}
                            {item.메모 && <span className="text-slate-400 text-[11px] italic" onClick={() => onOpenMemo(item.batchKey, item.메모)} cursor="pointer"><SafeIcon name="edit" size={10} className="mr-1"/>{item.메모}</span>}
                        </div>
                        {item.출고내역 && Object.keys(item.출고내역).length > 0 && (
                            <div className="mt-1.5 flex flex-wrap gap-1.5 items-center">
                                {Object.entries(item.출고내역).map(([vendor, data]) => (
                                    <div key={vendor} draggable onDragStart={(e) => { e.stopPropagation(); e.dataTransfer.setData('text/plain', JSON.stringify({sourceKey: item.batchKey, vendor, qty: data.qty})); e.currentTarget.classList.add('opacity-50'); }} onDragEnd={(e) => { e.currentTarget.classList.remove('opacity-50'); }}
                                        className="flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold cursor-grab active:cursor-grabbing border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition-colors" title={`드래그하여 상계 처리 (Ctrl+드롭 분할)`}>
                                        <SafeIcon name="truck" size={10} className="mr-1 text-slate-400" /><span className="truncate max-w-[100px]">{vendor}({data.qty})</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </td>
                    <td className="py-2 px-4 text-center">
                        <button onClick={() => onOpenMemo(item.batchKey, item.메모)} className="w-7 h-7 rounded bg-slate-100 text-slate-400 hover:bg-indigo-600 hover:text-white transition-colors"><SafeIcon name="edit" size={12} /></button>
                    </td>
                </tr>
            );
        }, (prev, next) => prev.item === next.item && prev.isLinked === next.isLinked && prev.idx === next.idx);

        function App() {
            const config = useMerchConfig();
            const [isProcessing, setIsProcessing] = useState(false);
            const [masterProducts, setMasterProducts] = useState({});
            const [inventoryData, setInventoryData] = useState([]);
            const [searchKw, setSearchKw] = useState('');
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const [toastMsg, setToastMsg] = useState('');
            
            // 🌟 월 단위 마감을 일(Date) 단위 마감으로 전면 수정
            const [targetDate, setTargetDate] = useState(() => new Date().toISOString().slice(0, 10));
            const [isClosedDate, setIsClosedDate] = useState(false);
            
            const [activeIssueMode, setActiveIssueMode] = useState(null); // 'loss', 'manual'
            const currentIssueIdxRef = useRef(-1);
            
            const [showGenesisModal, setShowGenesisModal] = useState(false); 
            const [showClosingHistory, setShowClosingHistory] = useState(false);
            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [splitModal, setSplitModal] = useState({ isOpen: false, payload: null });
            const [substHistory, setSubstHistory] = useState([]);
            const [undoUi, setUndoUi] = useState({ state: 'closed' });

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const loadData = useCallback(async () => {
                setIsProcessing(true);
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    const closings = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                    
                    // 🌟 해당 일자 마감 여부 확인
                    const currentDateClosing = closings.find(c => c.closingDate === targetDate);
                    if (currentDateClosing) {
                        setIsClosedDate(true);
                        setInventoryData(currentDateClosing.snapshotData);
                        return;
                    }
                    setIsClosedDate(false);

                    // 과거 마감분 필터링 (일자 기준)
                    const pastClosings = closings.filter(c => c.closingDate < targetDate).sort((a,b) => b.closingDate.localeCompare(a.closingDate));
                    const lastClosing = pastClosings.length > 0 ? pastClosings[0] : null;
                    
                    let pData = {};
                    let stockPool = {};

                    if (lastClosing) {
                        lastClosing.snapshotData.forEach(item => {
                            const code = item.코드;
                            const qty = item.실사 || 0;
                            if (qty === 0) return;
                            const batchKey = item.batchKey; 
                            pData[batchKey] = { ...item, 기초: qty, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: qty, 실사: null, 로스: 0, 이슈: [], 메모: '', 출고내역: {} };
                            if (!stockPool[code]) stockPool[code] = { buckets: [] };
                            stockPool[code].buckets.push({ batchKey, 단가: item.단가, 수량: qty, 거래처: item.거래처 });
                        });
                    } else {
                        // 일자 기준 이전 히스토리
                        const preHistory = history.filter(h => h.date < targetDate);
                        const preInOutByCode = {};
                        preHistory.forEach(log => {
                            if(!preInOutByCode[log.code]) preInOutByCode[log.code] = 0;
                            if(['PURCHASE', 'INITIAL_SETUP', 'ADJUSTMENT_IN'].includes(log.type)) preInOutByCode[log.code] += Number(log.qty);
                            if(['DISPATCH', 'ADJUSTMENT_OUT'].includes(log.type)) preInOutByCode[log.code] -= Number(log.qty);
                            if(log.type === 'PURCHASE_RETURN') preInOutByCode[log.code] -= Number(log.qty);
                            if(log.type === 'SALES_RETURN') preInOutByCode[log.code] += Number(log.qty);
                            if(log.type === 'ADJUSTMENT') preInOutByCode[log.code] += Number(log.qty);
                        });

                        Object.keys(preInOutByCode).forEach(code => {
                            const qty = preInOutByCode[code];
                            if (qty === 0) return;
                            const m = master[code] || {};
                            const price = parseNum(m.입고가);
                            const batchKey = `${code}|${price}|기초재고|all`;

                            pData[batchKey] = {
                                batchKey, 코드: code, 품명: m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: '기초재고', 일자: '',
                                기초: qty, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: qty, 실사: null, 로스: 0,
                                이슈: [], 메모: '', 출고내역: {}, _orig: { in: 0, out: 0, actual: null }, isDummy: !master[code], 수기확인완료: true
                            };
                            if (!stockPool[code]) stockPool[code] = { buckets: [] };
                            stockPool[code].buckets.push({ batchKey, 단가: price, 수량: qty, 거래처: '기초재고' });
                        });
                    }

                    // 🌟 타겟 일자의 히스토리만 필터링
                    const currentHistory = history.filter(h => h.date === targetDate);
                    currentHistory.forEach(log => {
                        const code = log.code;
                        if (log.type === 'PURCHASE' || log.type === 'PURCHASE_RETURN' || log.type === 'INITIAL_SETUP') {
                            const qty = log.type === 'PURCHASE' || log.type === 'INITIAL_SETUP' ? Number(log.qty) : -Number(log.qty);
                            const price = parseNum(log.price);
                            const vendor = log.vendor || '미지정';
                            const date = log.date || '';
                            const batchKey = `${code}|${price}|${vendor}|${date}`; 
                            
                            if (!pData[batchKey]) {
                                const m = master[code] || {};
                                pData[batchKey] = {
                                    batchKey, 코드: log.code, 품명: log.name || m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: vendor, 일자: log.date,
                                    기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                    이슈: [], 메모: '', 출고내역: {}, _orig: { in: 0, out: 0, actual: null }, isDummy: !master[code], 수기확인완료: true
                                };
                            }
                            pData[batchKey].입고 += qty;
                            if (!stockPool[code]) stockPool[code] = { buckets: [] };
                            let bucket = stockPool[code].buckets.find(b => b.batchKey === batchKey);
                            if (bucket) bucket.수량 += qty; else stockPool[code].buckets.push({ batchKey, 단가: price, 수량: qty, 거래처: vendor });
                        } 
                        else if (log.type === 'DISPATCH' || log.type === 'SALES_RETURN') {
                            const qty = log.type === 'DISPATCH' ? Number(log.qty) : -Number(log.qty);
                            const targetVendor = log.lotVendor || '미지정';
                            
                            if (!stockPool[code]) return;
                            const buckets = stockPool[code].buckets.sort((a,b) => b.수량 - a.수량);
                            let remaining = qty;
                            
                            for(let b of buckets) {
                                if (remaining <= 0) break;
                                if (config.opsGrouping.splitByVendor && b.거래처 !== targetVendor) continue;
                                const pItem = pData[b.batchKey];
                                const avail = (pItem.기초 + pItem.입고 - pItem.출고);
                                if (avail > 0) {
                                    const take = Math.min(avail, remaining);
                                    pItem.출고 += take; b.수량 -= take; remaining -= take;
                                    const dispVendor = log.partner || targetVendor;
                                    if (!pItem.출고내역[dispVendor]) pItem.출고내역[dispVendor] = { qty: 0 };
                                    pItem.출고내역[dispVendor].qty += take;
                                }
                            }
                            if (remaining > 0 && buckets.length > 0) {
                                const pItem = pData[buckets[0].batchKey];
                                pItem.출고 += remaining; buckets[0].수량 -= remaining;
                                const dispVendor = log.partner || targetVendor;
                                if (!pItem.출고내역[dispVendor]) pItem.출고내역[dispVendor] = { qty: 0 };
                                pItem.출고내역[dispVendor].qty += remaining;
                            }
                        }
                    });

                    const filteredPData = Object.values(pData).filter(item => item.기초 !== 0 || item.입고 !== 0 || item.출고 !== 0);
                    filteredPData.forEach(item => {
                        item.전산잔량 = item.기초 + item.입고 + item.대체입고 - item.출고 - item.대체출고;
                        item.실사 = item.실사 !== null ? item.실사 : item.전산잔량; 
                        item.로스 = item.실사 - item.전산잔량;
                        item._orig = { in: item.입고, out: item.출고, actual: null };
                    });

                    setMasterProducts(master);
                    setInventoryData(filteredPData.sort((a,b) => a.코드.localeCompare(b.코드)));
                } finally { setIsProcessing(false); }
            }, [targetDate, config.opsGrouping]);

            // 🌟 통계 산출 로직 업데이트 (단가 검증 제외)
            const stats = useMemo(() => {
                let q = 0, m = 0, totalVal = 0;
                inventoryData.forEach(item => {
                    const bal = item.기초 + item.입고 - item.출고;
                    const actual = item.실사 !== null ? item.실사 : bal;
                    if (actual !== bal) q++;
                    if (item.이슈?.some(i => i.includes('✅') || i.includes('🔄') || i.includes('🚀'))) m++;
                    totalVal += actual * item.단가;
                });
                return { qty: q, manual: m, totalValue: totalVal };
            }, [inventoryData]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true);
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let count = 0; const actualUpdates = {};
                    excelData.forEach(row => {
                        const codeKey = Object.keys(row).find(k => k.includes('코드') || k.includes('sku'));
                        const code = row[codeKey]; if (!code) return;
                        const qtyKey = Object.keys(row).find(k => k.includes('실사') || k.includes('수량') || k.includes('재고'));
                        const qtyVal = row[qtyKey];
                        if (qtyVal !== undefined && qtyVal !== '') actualUpdates[code] = parseNum(qtyVal);
                    });

                    setInventoryData(prev => {
                        let updatedCount = 0; let newData = [...prev];
                        const currentCodes = new Set(newData.map(i => i.코드));

                        Object.keys(actualUpdates).forEach(code => { 
                            const actual = actualUpdates[code];
                            if (!currentCodes.has(code)) {
                                if (masterProducts[code]) {
                                    const m = masterProducts[code];
                                    const price = parseNum(m.입고가);
                                    newData.push({
                                        batchKey: `${code}|${price}|기초재고|all`, 코드: code, 품명: m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: '기초재고', 일자: '',
                                        기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: actual, 로스: actual, 
                                        이슈: ['🚨신규발생', '🚨수량변동'], 메모: '', 출고내역: {}, _orig: { in: 0, out: 0, actual: null }, isDummy: false, 수기확인완료: false
                                    });
                                    updatedCount++;
                                }
                            } else {
                                const itemIdx = newData.findIndex(i => i.코드 === code);
                                if (itemIdx >= 0) {
                                    const item = newData[itemIdx];
                                    const newLoss = actual - item.전산잔량;
                                    let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정') && !msg.includes('수량변동'));
                                    if (newLoss !== 0) newIssues.push('🚨수량변동');
                                    newData[itemIdx] = { ...item, 실사: actual, 로스: newLoss, 이슈: newIssues, 수기확인완료: newLoss === 0 };
                                    updatedCount++;
                                }
                            }
                        });
                        count = updatedCount; 
                        return newData.sort((a,b) => a.코드.localeCompare(b.코드));
                    });
                    
                    if(count > 0) showToast(`✅ ${count}건의 실사 수량이 엑셀과 대조되었습니다.`);
                    else showToast(`⚠️ 정상적으로 대조된 항목이 없습니다.`);
                } catch(error) { showToast("❌ 업로드 오류: " + error.message); } finally { e.target.value = ''; setIsProcessing(false); }
            };

            const onBaseDataChange = useCallback((batchKey, field, val) => {
                const numVal = val === '' ? 0 : Number(val);
                setInventoryData(prevP => prevP.map(item => {
                    if (item.batchKey === batchKey) {
                        const newItem = { ...item, [field]: numVal };
                        newItem.전산잔량 = newItem.기초 + newItem.입고 + newItem.대체입고 - newItem.출고 - newItem.대체출고;
                        newItem.로스 = (newItem.실사 !== null ? newItem.실사 : newItem.전산잔량) - newItem.전산잔량;
                        return newItem;
                    }
                    return item;
                }));
            }, []);

            const updateActualQty = useCallback((batchKey, val) => {
                const actual = val === '' ? '' : parseInt(val, 10);
                setInventoryData(prev => prev.map(item => {
                    if (item.batchKey === batchKey) {
                        const newLoss = (actual === '' ? item.전산잔량 : actual) - item.전산잔량;
                        let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정') && !msg.includes('수량변동'));
                        if (actual !== '' && newLoss !== 0) newIssues.push('🚨실사조정');
                        return { ...item, 실사: actual === '' ? null : actual, 로스: newLoss, 이슈: newIssues };
                    }
                    return item;
                }));
            }, []);

            const handleSalesMove = useCallback((sourceKey, targetKey, vendorName, qtyToMove, isCtrl) => {
                if (isCtrl && qtyToMove > 1) { setSplitModal({ isOpen: true, payload: { sourceKey, targetKey, vendor: vendorName, maxQty: qtyToMove } }); return; }
                setInventoryData(prevP => prevP.map(p => {
                    if (p.batchKey === sourceKey) {
                        const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)) };
                        np.출고 -= qtyToMove;
                        if (np.출고내역[vendorName]) { np.출고내역[vendorName].qty -= qtyToMove; if (np.출고내역[vendorName].qty <= 0) delete np.출고내역[vendorName]; }
                        np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                        np.로스 = (np.실사 !== null ? np.실사 : np.전산잔량) - np.전산잔량;
                        return np;
                    }
                    if (p.batchKey === targetKey) {
                        const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)) };
                        np.출고 += qtyToMove;
                        if (!np.출고내역[vendorName]) np.출고내역[vendorName] = { qty: 0 };
                        np.출고내역[vendorName].qty += qtyToMove;
                        np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                        np.로스 = (np.실사 !== null ? np.실사 : np.전산잔량) - np.전산잔량;
                        return np;
                    }
                    return p;
                }));
                showToast(`✅ ${qtyToMove}건의 매출이 이동(Lot매칭)되었습니다.`);
            }, [showToast]);

            const executeImmediateSubstitution = useCallback((key1, key2, targetIdx) => {
                setInventoryData(prev => {
                    const idx1 = prev.findIndex(d => d.batchKey === key1);
                    const realIdx2 = prev.findIndex(d => d.batchKey === key2);
                    if (idx1 < 0 || realIdx2 < 0) return prev;
                    const sourceItemOrig = { ...prev[idx1], 이슈: [...prev[idx1].이슈] };
                    const targetItemOrig = { ...prev[realIdx2], 이슈: [...prev[realIdx2].이슈] };
                    let sourceItem = { ...sourceItemOrig }; let targetItem = { ...targetItemOrig };

                    if ((sourceItem.로스 < 0 && targetItem.로스 > 0) || (targetItem.로스 < 0 && sourceItem.로스 > 0)) {
                        if (targetItem.로스 < 0 && sourceItem.로스 > 0) { let temp = sourceItem; sourceItem = targetItem; targetItem = temp; }
                    } else { showToast("⚠️ 상계 불가! 로스가 음수(-)와 양수(+)여야 합니다."); return prev; }

                    const moveQty = Math.min(Math.abs(sourceItem.로스), Math.abs(targetItem.로스));
                    sourceItem.대체출고 += moveQty; sourceItem.전산잔량 -= moveQty; sourceItem.로스 = (sourceItem.실사||sourceItem.전산잔량) - sourceItem.전산잔량;
                    sourceItem.이슈 = sourceItem.이슈.filter(msg => !msg.includes('수량변동') && !msg.includes('실사조정'));
                    sourceItem.이슈.push(`🔄 (-${moveQty})`); 

                    targetItem.대체입고 += moveQty; targetItem.전산잔량 += moveQty; targetItem.로스 = (targetItem.실사||targetItem.전산잔량) - targetItem.전산잔량;
                    targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('수량변동') && !msg.includes('실사조정'));
                    targetItem.이슈.push(`🔄 (+${moveQty} ${sourceItem.품명})`);

                    setSubstHistory(h => [...h, { id: Date.now(), sourceKey: sourceItem.batchKey, targetKey: targetItem.batchKey, sourceName: sourceItem.품명, targetName: targetItem.품명, sQty: moveQty, tQty: moveQty, sourceItemPrev: sourceItemOrig, targetItemPrev: targetItemOrig }]);
                    const newData = [...prev]; newData[idx1] = sourceItem; newData[realIdx2] = targetItem;
                    showToast(`✅ [${sourceItem.품명}] ➔ [${targetItem.품명}] 로스 상계 완료`);
                    return newData;
                });
            }, [showToast]);

            const handleSpacebarLink = useCallback((targetBatchKey, targetIdx) => {
                if (isClosedDate) return showToast("🔒 마감된 일자는 수정할 수 없습니다.");
                setLinkSourceKey(prevKey => {
                    if (!prevKey) { setTimeout(() => document.getElementById(`actual-input-${targetIdx}`)?.select(), 50); return targetBatchKey; }
                    if (prevKey === targetBatchKey) { setTimeout(() => document.getElementById(`actual-input-${targetIdx}`)?.select(), 50); return null; }
                    setTimeout(() => executeImmediateSubstitution(prevKey, targetBatchKey, targetIdx), 0); return null; 
                });
            }, [executeImmediateSubstitution, isClosedDate, showToast]);

            const handleSaveMemo = useCallback((batchKey, text) => {
                setInventoryData(prev => prev.map(item => {
                    if (item.batchKey === batchKey) {
                        let newIssues = [...item.이슈];
                        if (newIssues.some(i => i.includes('🚨'))) newIssues = newIssues.map(msg => msg.replace('🚨', '✅'));
                        return { ...item, 메모: text, 이슈: newIssues };
                    }
                    return item;
                }));
                showToast("✅ 사유가 기록되어 조정 내역이 승인되었습니다.");
            }, [showToast]);

            const handleClosing = async () => {
                const hasErrors = inventoryData.some(item => item.이슈.some(msg => msg.includes('🚨')));
                if (hasErrors) return showToast("⚠️ 해결되지 않은 오류(🚨)가 남아있습니다. 로스를 보정하거나 메모를 남겨 승인(✅) 후 마감하세요.");
                if (!window.confirm(`[${targetDate}] 일자의 재고 수불부를 마감하시겠습니까?\n이 화면의 데이터가 스냅샷으로 영구 보존됩니다.`)) return;

                setIsProcessing(true);
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    let newMaster = { ...master };
                    let newLogs = []; let logIds = []; 
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    const closings = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                    const isFirstSnapshot = closings.length === 0;

                    inventoryData.forEach(item => {
                        const code = item.코드;
                        const actualQty = item.실사 !== null ? item.실사 : item.전산잔량;
                        
                        if (newMaster[code]) newMaster[code].재고수량 = actualQty;
                        else newMaster[code] = { 코드: code, 품목명: item.품명, 규격: item.규격, 재고수량: actualQty, 입고가: item.단가 };

                        if (item.로스 !== 0 || item.이슈.some(i=>i.includes('🔄')) || isFirstSnapshot || item.입고 !== item._orig.in || item.출고 !== item._orig.out) {
                            const logId = `${isFirstSnapshot ? 'INIT' : 'ADJ'}-${Date.now()}-${Math.floor(Math.random()*1000)}`;
                            newLogs.push({
                                id: logId, timestamp: new Date().toLocaleString('ko-KR'), date: targetDate, 
                                type: isFirstSnapshot ? 'INITIAL_SETUP' : 'ADJUSTMENT', code: code, name: item.품명,
                                qty: isFirstSnapshot ? actualQty : actualQty - (item.기초 + item._orig.in - item._orig.out), 
                                price: item.단가, oldStock: item.전산잔량, newStock: actualQty,
                                partner: isFirstSnapshot ? '초기 자산 셋업' : '시스템 마감(검증)',
                                memo: item.이슈.join(' ') + (item.메모 ? ` / ${item.메모}` : '')
                            });
                            logIds.push(logId);
                        }
                    });

                    const snapshot = {
                        id: `CLOSE-${targetDate}-${Date.now()}`,
                        closingDate: targetDate,
                        stats: { totalItems: inventoryData.length, lossValue: inventoryData.reduce((sum, item) => sum + Math.abs(item.로스 * item.단가), 0) },
                        snapshotData: inventoryData,
                        masterBackup: master, historyLogIds: logIds 
                    };

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...history, ...newLogs]);
                    await setIDB(STORAGE_KEYS.CLOSING_DB, [snapshot, ...closings]);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());

                    showToast(`🎉 ${targetDate} 일자 마감이 완료되었습니다!`);
                    setTimeout(() => { setShowGenesisModal(false); loadData(); }, 1000); 
                } catch(e) { showToast("❌ 마감 처리 중 오류 발생"); } finally { setIsProcessing(false); }
            };

            const jumpToIssue = (type, direction = 'next') => {
                setActiveIssueMode(type);
                const condition = p => {
                    if (type === 'loss') return p.로스 !== 0 || p.이슈.some(i => i.includes('🚨'));
                    if (type === 'manual') return p.이슈.some(i => i.includes('✅') || i.includes('🔄') || i.includes('🚀'));
                    return false;
                };

                const targets = inventoryData.map((p, i) => ({...p, index: i})).filter(condition);
                if (targets.length === 0) return showToast("해당하는 항목이 없습니다.");

                let nextIdx = direction === 'next' ? currentIssueIdxRef.current + 1 : currentIssueIdxRef.current - 1;
                if (nextIdx >= targets.length) nextIdx = 0;
                if (nextIdx < 0) nextIdx = targets.length - 1;

                currentIssueIdxRef.current = nextIdx;
                const t = targets[nextIdx];
                const el = document.getElementById(`actual-input-${t.index}`);
                if (el) {
                    el.focus({ preventScroll: true }); el.select();
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Tab' && activeIssueModeRef.current) { e.preventDefault(); jumpToIssue(activeIssueModeRef.current, e.shiftKey ? 'prev' : 'next'); }
                    if (e.key === 'F9') { e.preventDefault(); /* 엑셀 다운로드 (기획 삭제됨) */ }
                    if (e.key === 'Escape') { setActiveIssueMode(null); currentIssueIdxRef.current = -1; setLinkSourceKey(null); }
                };
                window.addEventListener('keydown', handleKey); return () => window.removeEventListener('keydown', handleKey);
            }, [inventoryData]);

            const displayData = useMemo(() => {
                if (!searchKw.trim()) return inventoryData;
                const kw = searchKw.toLowerCase().replace(/\s/g, '');
                return inventoryData.filter(i => String(i.품명).toLowerCase().replace(/\s/g, '').includes(kw) || String(i.코드).includes(kw));
            }, [inventoryData, searchKw]);

            return (
                <div className="h-screen w-full flex flex-col font-sans overflow-hidden bg-slate-100 select-none">
                    <GlobalHeader itemCount={inventoryData.length} stats={stats} isProcessing={isProcessing} />
                    
                    <GenesisSetupModal isOpen={showGenesisModal} onClose={() => setShowGenesisModal(false)} onApplySetup={(newItems) => { setInventoryData(newItems); }} showToast={showToast} />
                    <SnapshotManagerModal isOpen={showClosingHistory} onClose={() => setShowClosingHistory(false)} showToast={showToast} />

                    <div className="px-8 py-5 bg-white border-b border-slate-200 flex flex-col shadow-sm shrink-0 z-10 gap-4">
                        <div className="flex items-center justify-between">
                            <h1 className="text-[18px] font-black text-slate-900 flex items-center">
                                <SafeIcon name="boxes" size={22} className="mr-2.5 text-indigo-500" /> 재고 수불부 검증 센터 (Audit Workshop)
                            </h1>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowGenesisModal(true)} className="h-9 px-3 rounded-md text-[12px] font-bold bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="rocket" size={14} className="mr-1.5" /> 초기 자산 셋업
                                </button>
                                <label className={`h-9 px-3 rounded-md text-[12px] font-bold shadow-sm flex items-center shrink-0 ${isClosedDate ? 'bg-slate-100 text-slate-400' : 'bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 cursor-pointer'}`}>
                                    <SafeIcon name="file-excel" size={14} className="mr-1.5 text-emerald-500" /> 실사 엑셀 업로드
                                    <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} disabled={isProcessing || isClosedDate} />
                                </label>

                                {/* 🌟 일(Date) 기준 달력으로 변경 */}
                                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg border border-slate-200 shadow-inner ml-2">
                                    <SafeIcon name="calendar-alt" size={14} className="text-slate-500 ml-2" />
                                    <input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} className="bg-transparent text-[13px] font-black text-indigo-600 outline-none cursor-pointer w-32" />
                                </div>
                                
                                <button onClick={() => setShowClosingHistory(true)} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="history" size={14} className="mr-1.5 text-slate-500" /> 일별 마감 이력
                                </button>
                                <button onClick={handleClosing} disabled={isProcessing || isClosedDate} className={`h-9 px-6 rounded-md text-[13px] font-black shadow-sm flex items-center ${isClosedDate ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5'}`}>
                                    {isClosedDate ? <SafeIcon name="lock" size={14} className="mr-2 inline" /> : <SafeIcon name="save" size={14} className="mr-2 inline" />}
                                    {isClosedDate ? '마감 완료' : '일자 마감 (Closing)'}
                                </button>
                                <div className="w-px h-6 bg-slate-200 mx-1"></div>
                                <div className="relative">
                                    <SafeIcon name="search" size={14} className="absolute left-3 top-2.5 text-slate-400" />
                                    <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="검색..." className="w-[200px] bg-slate-50 border border-slate-300 rounded-md pl-9 pr-4 py-1.5 h-9 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm" />
                                </div>
                            </div>
                        </div>
                        
                        {/* 🌟 2원화된 이슈 카드 */}
                        {inventoryData.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                                <div onClick={() => { activeIssueMode !== 'loss' ? jumpToIssue('loss', 'next') : setActiveIssueMode(null); activeIssueModeRef.current = activeIssueMode !== 'loss' ? 'loss' : null; }} className={`p-4 rounded-xl border-[3px] transition-all flex flex-col justify-between relative overflow-hidden cursor-pointer ${activeIssueMode === 'loss' ? 'bg-orange-50 border-orange-500 shadow-md ring-4 ring-orange-500/20' : (stats.qty > 0 ? 'bg-orange-50 border-orange-200 hover:border-orange-400 hover:shadow-md' : 'bg-white border-slate-200 hover:border-slate-300')}`}>
                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${stats.qty > 0 ? 'text-orange-800' : 'text-slate-600'}`}>
                                        <span className="flex items-center"><SafeIcon name="balance-scale" size={16} className={`${activeIssueMode === 'loss' || stats.qty > 0 ? 'text-orange-500' : 'text-slate-400'} mr-2`}/>실사 오차 (로스) 확인</span>
                                        {stats.qty > 0 && <span className="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse shadow-[0_0_8px_rgba(249,115,22,0.6)]"></span>}
                                    </div>
                                    <div className="flex items-end justify-between mt-2">
                                        <div>
                                            <div className={`text-3xl font-black ${activeIssueMode === 'loss' || stats.qty > 0 ? 'text-orange-900' : 'text-slate-800'}`}>{stats.qty}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                            {stats.qty > 0 ? <div className="text-[12px] text-orange-600 font-bold mt-1">클릭/Tab키로 추적 (수정요망)</div> : <div className="text-[12px] text-slate-400 font-semibold mt-1">모든 변동 확인됨</div>}
                                        </div>
                                    </div>
                                </div>
                                <div onClick={() => { activeIssueMode !== 'manual' ? jumpToIssue('manual', 'next') : setActiveIssueMode(null); activeIssueModeRef.current = activeIssueMode !== 'manual' ? 'manual' : null; }} className={`p-4 rounded-xl border-[3px] transition-all flex flex-col justify-between relative overflow-hidden cursor-pointer ${activeIssueMode === 'manual' ? 'bg-indigo-50 border-indigo-500 shadow-md ring-4 ring-indigo-500/20' : (stats.manual > 0 ? 'bg-indigo-50 border-indigo-200 hover:border-indigo-400 hover:shadow-md' : 'bg-white border-slate-200 hover:border-slate-300')}`}>
                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${stats.manual > 0 ? 'text-indigo-800' : 'text-slate-600'}`}>
                                        <span className="flex items-center"><SafeIcon name="tags" size={16} className={`${activeIssueMode === 'manual' || stats.manual > 0 ? 'text-indigo-500' : 'text-slate-400'} mr-2`}/>Lot 매칭 및 수기 보정 이력</span>
                                    </div>
                                    <div className="flex items-end justify-between mt-2">
                                        <div>
                                            <div className={`text-3xl font-black ${activeIssueMode === 'manual' || stats.manual > 0 ? 'text-indigo-900' : 'text-slate-800'}`}>{stats.manual}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                            <div className="text-[12px] text-indigo-600 font-bold mt-1">드래그 및 스페이스바 검증 완료됨</div>
                                        </div>
                                        {substHistory.length > 0 && (
                                            <button onClick={(e) => { e.stopPropagation(); setUndoUi({ state: 'list' }); }} className="px-3 py-1.5 bg-white rounded border border-rose-200 text-rose-600 hover:bg-rose-50 font-bold text-[11px] shadow-sm transition flex items-center">
                                                <SafeIcon name="undo" size={12} className="mr-1"/> 상계 취소 ({substHistory.length})
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50 p-6">
                        {isClosedDate && (
                            <div className="absolute inset-0 z-20 bg-slate-900/5 backdrop-blur-[1px] flex items-center justify-center fade-in">
                                <div className="bg-white/90 px-8 py-4 rounded-2xl shadow-xl flex items-center border border-slate-200">
                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mr-4 shadow-inner"><SafeIcon name="lock" size={24} className="text-slate-500" /></div>
                                    <div><h2 className="text-lg font-black text-slate-800">마감 완료된 일자입니다</h2><p className="text-[13px] font-bold text-slate-500 mt-1">조회만 가능하며, 수량 수정이나 상계 처리는 불가합니다.</p></div>
                                </div>
                            </div>
                        )}
                        
                        <div className={`flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative fade-in`}>
                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="sticky top-0 bg-white shadow-sm border-b border-slate-200 text-slate-500 font-bold text-[12px] z-10">
                                        <tr>
                                            <th className="py-3 px-4 w-[280px] border-r border-slate-200">품목 정보</th>
                                            <th className="py-3 px-3 text-right w-20 border-r border-slate-200">기초</th>
                                            <th className="py-3 px-3 text-right w-20 text-blue-600 border-r border-slate-200">당기입고</th>
                                            <th className="py-3 px-3 text-right w-20 text-rose-600 border-r border-slate-200">당기출고</th>
                                            <th className="py-3 px-3 text-right w-24 bg-indigo-50/50 text-indigo-700 border-r border-indigo-100">전산잔량</th>
                                            <th className="py-3 px-4 text-center w-28 bg-emerald-50/30 text-emerald-700 border-r border-emerald-100">실사 수량</th>
                                            <th className="py-3 px-4 text-right w-24 border-r border-slate-200">오차(로스)</th>
                                            <th className="py-3 px-4 w-[250px] border-r border-slate-200">검증 이슈 및 자동 기록</th>
                                            <th className="py-3 px-4 text-center w-16">사유</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-transparent text-slate-700">
                                        {displayData.length === 0 ? (
                                            <tr><td colSpan="9" className="py-20 text-center text-slate-400 font-bold"><SafeIcon name="boxes" size={40} className="mb-3 text-slate-200 block mx-auto" />해당 일자에 입출고 기록이 없습니다.</td></tr>
                                        ) : displayData.map((item, idx) => (
                                            <ProductRow key={item.batchKey} item={item} idx={idx} isLinked={linkSourceKey === item.batchKey} onStockChange={updateActualQty} onSpacebar={handleSpacebarLink} onBaseDataChange={onBaseDataChange} onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })} onSalesMove={(src, tgt, v, q, c) => { if(c && q>1) setSplitModal({ isOpen:true, payload:{sourceKey:src, targetKey:tgt, vendor:v, maxQty:q} }); else handleSalesMove(src, tgt, v, q, false); }} />
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {memoModal.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[400px] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><h3 className="font-black text-slate-800 text-[14px] flex items-center"><SafeIcon name="edit" size={16} className="text-indigo-500 mr-2"/>사유(메모) 기록</h3><button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="text-slate-400 hover:text-slate-600"><SafeIcon name="x" size={16} /></button></div>
                                    <div className="p-6 space-y-4"><textarea value={memoModal.text} onChange={e=>setMemoModal({...memoModal, text: e.target.value})} autoFocus rows="3" placeholder="예: 1박스 현장 파손 처리" className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-[13px] outline-none focus:border-indigo-500 focus:ring-1 shadow-sm resize-none" onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); } }} /><div className="flex gap-2 pt-2"><button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button><button onClick={() => { handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>기록 완료</button></div></div>
                                </div>
                            </div>
                        )}

                        {splitModal.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[400] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[320px] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><h3 className="font-black text-slate-800 text-[14px] flex items-center"><SafeIcon name="cut" size={16} className="text-indigo-500 mr-2"/>분할 이동 수량</h3><button onClick={() => setSplitModal({ isOpen: false, payload: null })} className="text-slate-400 hover:text-slate-600"><SafeIcon name="x" size={16} /></button></div>
                                    <div className="p-6 space-y-4">
                                        <p className="text-[12px] text-slate-500 font-bold">최대 <span className="text-indigo-600">{splitModal.payload?.maxQty}</span>개 분할 가능</p>
                                        <input id="split-qty-input" type="number" min="1" max={splitModal.payload?.maxQty || 1} defaultValue={splitModal.payload?.maxQty || 1} autoFocus className="w-full text-center text-lg font-black text-indigo-700 bg-white border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-indigo-500 focus:ring-1 shadow-sm" onKeyDown={(e) => { if(e.key === 'Enter') { const val = Number(e.target.value); if(splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) { handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val, false); setSplitModal({ isOpen: false, payload: null }); } } }} />
                                        <div className="flex gap-2 pt-2"><button onClick={() => setSplitModal({ isOpen: false, payload: null })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button><button onClick={() => { const val = Number(document.getElementById('split-qty-input').value); if(splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) { handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val, false); setSplitModal({ isOpen: false, payload: null }); } }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>분할 이동</button></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700 animate-bounce">
                            <SafeIcon name="check-circle" size={20} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
