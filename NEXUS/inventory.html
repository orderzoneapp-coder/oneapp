<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Stock Ledger [Daily Closing]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .table-row-hover { border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease; }
        .table-row-hover:last-child { border-bottom: none; }
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #eef2ff; }
        
        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 6px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 500; white-space: nowrap; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); pointer-events: none;
        }
        .editable-cell { background-color: rgba(255,255,255,0.7); border: 1px solid transparent; border-radius: 6px; transition: all 0.2s; }
        .editable-cell:hover, .editable-cell:focus-within { background-color: #fff; border-color: #cbd5e1; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        // ==========================================
        // 🔑 Global Constants & IDB Utilities
        // ==========================================
        const STORAGE_KEYS = { 
            MASTER_DB: 'merchMaster_v870', 
            CLOUD_URL: 'skuSyncCloudUrl_v6', 
            SYNC_TRIGGER: 'merchMaster_sync_trigger', 
            HISTORY_DB: 'merchHistory_v870',
            CLOSING_DB: 'merchClosing_v1'
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }
                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) { obj['_raw'] = row; parsedData.push(obj); }
                    } resolve(parsedData);
                } catch(err) { reject(err); }
            }; reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 SafeIcon Component
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    const possibleNames = [kebabName, name, name==='cloud-download'?'download-cloud':name, name==='cloud-upload'?'upload-cloud':name, name==='bar-chart-3'?'bar-chart':name];
                    for (const pName of possibleNames) {
                        if (window.lucide.icons[pName]) { setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return; }
                    }
                }
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'edit':'fa-edit', 'save':'fa-save', 'link':'fa-link', 'ban':'fa-ban', 'layer-group':'fa-layer-group', 'sitemap':'fa-sitemap', 'bolt':'fa-bolt', 'sort-amount-down':'fa-sort-amount-down', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'trash-alt':'fa-trash-alt', 'folder-open':'fa-folder-open', 'file-invoice':'fa-file-invoice', 'broom':'fa-broom', 'undo':'fa-undo', 'exchange-alt':'fa-exchange-alt', 'list':'fa-list', 'check-double':'fa-check-double', 'balance-scale':'fa-balance-scale', 'search-plus':'fa-search-plus', 'file-export':'fa-file-export', 'truck-loading':'fa-truck-loading', 'history':'fa-history', 'exclamation-circle': 'fa-exclamation-circle', 'calendar-alt': 'fa-calendar-alt', 'cut':'fa-cut', 'rocket':'fa-rocket', 'file-excel':'fa-file-excel', 'archive':'fa-archive', 'search':'fa-search' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 Read-only Config Hook
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');
            const [opsMappings] = useState(() => {
                const s = localStorage.getItem('inventoryMappingsLight');
                const def = { code: '품목코드, 상품코드, 코드, 품번, 바코드, sku', qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량' };
                return s ? { ...def, ...JSON.parse(s) } : def;
            });
            const [opsGrouping] = useState(() => {
                const s = localStorage.getItem('inventoryGroupingV79');
                return s ? { ...{ priceMode: 'separate', splitByVendor: false, splitByDate: false }, ...JSON.parse(s) } : { priceMode: 'separate', splitByVendor: false, splitByDate: false };
            });
            return { cloudUrl, opsMappings, opsGrouping };
        };

        // ==========================================
        // 🧩 통합 글로벌 헤더 (v3.0 표준 규격)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: false },
                
                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: false },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: false },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: false }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">
                                        {currentTab ? currentTab.label : 'WORKSPACE'}
                                    </span>
                                </div>
                            </div>

                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`현재 데이터 건수: ${itemCount.toLocaleString()}건`}>
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="통합 환경설정 센터 열기"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-6 pt-3 flex items-end gap-1 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                       className={`flex items-center gap-2 px-6 py-3 text-[14px] font-bold rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                       ${isActive 
                                           ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]' 
                                           : isPlaceholder 
                                              ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                              : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'
                                       }`}
                                       style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🌟 Iframe 설정 모달
        // ==========================================
        const IframeSettingsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[500] flex justify-end bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="w-full max-w-[1100px] h-full bg-white shadow-[0_0_40px_rgba(0,0,0,0.3)] flex flex-col slide-in-right border-l border-slate-300 relative overflow-hidden">
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 border-b border-slate-700 shadow-md relative z-10">
                            <div className="flex items-center gap-3">
                                <SafeIcon name="settings" size={20} className="text-indigo-400"/>
                                <h2 className="font-black text-[17px] tracking-wide">통합 환경설정 센터</h2>
                                <span className="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/30 ml-2">Iframe Overlay</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-[12px] text-slate-400 font-medium hidden md:inline-block">설정을 변경하고 창을 닫으면 작업 화면에 즉시 반영됩니다.</span>
                                <button onClick={onClose} className="text-slate-300 hover:text-white transition-colors bg-slate-800 hover:bg-rose-500 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm border border-slate-700 hover:border-rose-400">
                                    <SafeIcon name="x" size={18} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 w-full bg-slate-100 relative">
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div className="text-slate-300 flex flex-col items-center">
                                    <i className="fas fa-circle-notch fa-spin text-3xl mb-3"></i>
                                    <span className="font-bold text-sm">설정 모듈을 불러오는 중입니다...</span>
                                </div>
                            </div>
                            <iframe src="settings.html?mode=iframe" className="absolute inset-0 w-full h-full border-0 bg-white relative z-10" title="Settings Center"></iframe>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🌟 초기 자산화 셋업 모달 (Genesis Setup Modal)
        // ==========================================
        const GenesisSetupModal = ({ isOpen, onClose, onApplySetup, showToast }) => {
            const [isProcessingLocal, setIsProcessingLocal] = useState(false);

            const handleSetupUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessingLocal(true);
                
                try {
                    const masterProducts = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let newItems = [];
                    let count = 0;
                    
                    excelData.forEach((row, idx) => {
                        const code = row['품목코드'] || row['코드'] || row['상품코드'];
                        if (!code) return;
                        
                        const qty = parseNum(row['수량'] || row['실사수량'] || row['기초수량'] || row['실사']);
                        if (qty === 0) return; 

                        const mItem = masterProducts[code] || {};
                        
                        // 하이브리드 단가 적용: 엑셀 단가가 있으면 우선, 없으면 마스터 입고가 적용
                        const excelPrice = parseNum(row['매입단가'] || row['원가'] || row['단가']);
                        const masterPrice = parseNum(mItem['입고가'] || 0);
                        const price = excelPrice > 0 ? excelPrice : masterPrice;
                        
                        const vendor = row['매입처'] || row['로트'] || row['거래처'] || '기초재고';
                        
                        const batchKey = `${code}|${price}|${vendor}|all`;
                        
                        const existingIdx = newItems.findIndex(i => i.batchKey === batchKey);
                        if (existingIdx >= 0) {
                            newItems[existingIdx].실사 += qty;
                            newItems[existingIdx].로스 += qty;
                        } else {
                            newItems.push({
                                batchKey, 
                                코드: code, 
                                품명: mItem.품목명 || row['품목명'] || '미상', 
                                규격: mItem.규격 || row['규격'] || '', 
                                단가: price, 
                                거래처: vendor, 
                                일자: '',
                                기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 
                                실사: qty, 로스: qty, 
                                이슈: ['🚀초기셋업'], 
                                메모: excelPrice > 0 ? '엑셀 단가 적용' : '마스터 단가 적용', 
                                출고내역: {}, 
                                _orig: { 기초: 0, 입고: 0, 출고: 0, 단가: price },
                                isDummy: false, 
                                수기확인완료: true
                            });
                        }
                        count++;
                    });
                    
                    if(count > 0) {
                        onApplySetup(newItems);
                        showToast(`✅ ${count}건의 기초 재고 자산이 화면에 세팅되었습니다. 마감을 눌러 확정하세요.`);

                        showToast(`⚠️ 수량이 있는 유효한 품목 코드를 찾지 못했습니다.`);
                    }
                } catch(error) { 
                    showToast("❌ 업로드 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessingLocal(false);
                }
            };

            if (!isOpen) return null;

        // ==========================================

                                                    <div className="text-[12px] text-slate-700 font-medium space-y-1.5 bg-slate-50 p-2.5 rounded border border-slate-100 mb-2">
                                                        {isPur && <div className="flex justify-between"><span className="text-slate-500 font-bold">벤더명:</span> <span>{log.vendor || '-'}</span></div>}
                                                        {isDis && (<><div className="flex justify-between"><span className="text-slate-500 font-bold">고객명:</span> <span>{log.partner || '-'}</span></div><div className="flex justify-between"><span className="text-slate-500 font-bold">차감로트:</span> <span>{log.lotVendor || '-'}</span></div></>)}
                                                        {(isAdj || isInit) && <div className="flex flex-col"><span className="text-slate-500 font-bold mb-1">{isInit ? '마이그레이션:' : '조정 사유:'}</span> <span className="bg-white p-1.5 rounded border border-slate-200">{log.memo || '-'}</span></div>}

        const SnapshotManagerModal = ({ isOpen, onClose, showToast }) => {
            const [snapshots, setSnapshots] = useState([]);
            
            useEffect(() => {

                showToast("🗑️ 마감 스냅샷이 성공적으로 삭제(롤백)되었습니다.");

                const exportFileNameDate = snapshot.closingDate.replace(/-/g, '');
                const exportData1 = snapshot.snapshotData.map(item => {
                    const qty = item.실사 === '' || item.실사 === null ? 0 : parseNum(item.실사);
                    const adjust = (parseNum(item.로스) || 0) + (parseNum(item.대체입고) || 0) - (parseNum(item.대체출고) || 0);
                    return { '결산일자': snapshot.closingDate, '매입처(Lot)': item.거래처, '상품코드': item.코드, '상품명(규격)': item.품명, '기초수량': item.기초, '입고수량': item.입고, '출고량': item.출고, '기말실사(이월수량)': qty, '로스/조정수량': adjust, '이슈/결과': item.이슈.join(', '), '수기메모': item.메모 || '' };

                const wb = XLSX.utils.book_new();

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `수불일보_마감기록_${exportFileNameDate}.xlsx`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);

                        </div>

                    <td className="py-2.5 px-3 border-r border-slate-200 bg-inherit"><input type="number" value={item.기초 === 0 ? '' : item.기초} onChange={(e) => onBaseDataChange(item.batchKey, '기초', e.target.value)} onClick={e=>e.target.select()} placeholder="0" className={`${cellInputBase} font-medium text-slate-500`} disabled={isInitItem} /></td>
                    <td className="py-2.5 px-3 border-r border-slate-200 bg-inherit"><input type="number" value={item.입고 === 0 ? '' : item.입고} onChange={(e) => onBaseDataChange(item.batchKey, '입고', e.target.value)} onClick={e=>e.target.select()} placeholder="0" className={`${cellInputBase} font-bold text-blue-600`} disabled={isInitItem} /></td>
                    <td className="py-2.5 px-3 border-r border-slate-200 bg-inherit"><input type="number" value={item.출고 === 0 ? '' : item.출고} onChange={(e) => onBaseDataChange(item.batchKey, '출고', e.target.value)} onClick={e=>e.target.select()} placeholder="0" className={`${cellInputBase} font-bold text-rose-600`} disabled={isInitItem} /></td>
                    <td className="py-2.5 px-3 text-right font-black text-[15px] text-indigo-600 bg-indigo-50/30 border-r border-indigo-100">{item.전산잔량.toLocaleString()}</td>
                    
                    <td className="py-2 px-3 bg-indigo-50/30 border-r border-indigo-100 relative">
                        {isLinked && <div className="absolute -top-3 right-2 bg-slate-800 text-white text-[9px] px-1.5 py-0.5 rounded shadow animate-bounce">대상 선택</div>}
                        <input id={`actual-input-${idx}`} type="number" value={item.실사 === null ? '' : item.실사} onChange={(e) => onStockChange(item.batchKey, e.target.value)} onClick={e=>e.target.select()} onFocus={e => e.target.select()} onKeyDown={(e) => { if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }} placeholder={item.전산잔량} className={`w-full text-center hover:bg-white focus:bg-white border rounded px-2 py-1.5 text-[14px] font-black outline-none transition-colors shadow-sm cursor-pointer ${isNegativeActual ? 'bg-rose-50 border-rose-400 text-rose-700 focus:ring-rose-200' : (item.로스 !== 0 ? 'border-orange-400 text-orange-700 bg-orange-50 focus:ring-orange-200' : 'border-transparent text-slate-800 focus:border-indigo-400 focus:ring-indigo-200 bg-transparent')}`} />
                    </td>

                    <td className={`py-2.5 px-4 text-right font-black border-r border-slate-200 bg-inherit ${item.로스 < 0 ? 'text-rose-600' : item.로스 > 0 ? 'text-blue-600' : 'text-slate-300'}`}>{item.로스 > 0 ? '+' : ''}{item.로스 === 0 ? '-' : item.로스.toLocaleString()}</td>
                    
                    <td className="py-2.5 px-4 border-r border-slate-200 bg-inherit">
                        <div className="flex items-center gap-1.5 flex-wrap">
                            {hasIssue && displayIssues.map((msg, i) => <IssueChip key={i} msg={msg} />)}
                            {item.메모 && <span className="px-2 py-0.5 bg-slate-100 text-slate-600 border border-slate-200 rounded font-medium text-[10px] shadow-sm flex items-center"><SafeIcon name="edit" size={10} className="mr-1 text-slate-400"/>{item.메모}</span>}
                        </div>
                        {item.출고내역 && Object.keys(item.출고내역).length > 0 && (
                            <div className="mt-1.5 flex flex-wrap gap-1.5 items-center">
                                {Object.entries(item.출고내역).map(([vendor, data]) => {
                                    return (
                                        <div key={vendor} draggable 
                                            onDragStart={(e) => { 
                                                e.stopPropagation(); 
                                                e.dataTransfer.setData('text/plain', JSON.stringify({sourceKey: item.batchKey, vendor, qty: data.qty})); 
                                                e.currentTarget.classList.add('opacity-50');
                                            }} 
                                            onDragEnd={(e) => { e.currentTarget.classList.remove('opacity-50'); }}
                                            className="flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold cursor-grab active:cursor-grabbing border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition-colors"
                                            title={`${data.qty}개 출고 - 드래그하여 다른 품목으로 이동 (Ctrl+드롭: 분할)`}
                                        >
                                            <SafeIcon name="truck" size={10} className="mr-1 text-slate-400" />
                                            <span className="truncate max-w-[100px]">{vendor}({data.qty})</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </td>

                    <td className="py-2.5 px-4 text-center bg-inherit">
                        <button onClick={() => onOpenMemo(item.batchKey, item.메모)} className={`w-8 h-8 rounded-lg shadow-sm transition-colors flex items-center justify-center mx-auto ${item.이슈.some(i => i.includes('🚨')) ? 'bg-orange-50 text-orange-600 border border-orange-200 hover:bg-orange-100 animate-pulse' : 'bg-white text-slate-400 border border-slate-200 hover:bg-slate-50 hover:text-slate-600'}`} title="강제 조정 시 필수 사유 작성"><SafeIcon name="edit" size={14} /></button>
                    </td>
                </tr>
            );
        }, (prev, next) => prev.item === next.item && prev.isLinked === next.isLinked && prev.idx === next.idx);

        // ==========================================
        // 📊 Main App Container
        // ==========================================
        function App() {
            const config = useMerchConfig();
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            // 💡 월 단위(targetMonth)에서 일 단위(targetDate)로 100% 교체
            const [targetDate, setTargetDate] = useState(() => new Date().toISOString().slice(0, 10));
            const [isClosedDate, setIsClosedDate] = useState(false);
            const [hasSnapshots, setHasSnapshots] = useState(true); 
            
            const [inventoryData, setInventoryData] = useState([]);
            const [historyLogs, setHistoryLogs] = useState([]);
            const [searchKw, setSearchKw] = useState('');
            
            const [linkSourceKey, setLinkSourceKey] = useState(null);
            const [memoModal, setMemoModal] = useState({ isOpen: false, batchKey: null, text: '' });
            const [timelineModal, setTimelineModal] = useState({ isOpen: false, itemCode: null, itemName: '' });
            const [substHistory, setSubstHistory] = useState([]);
            const [undoUi, setUndoUi] = useState({ state: 'closed' });

            const [uploadErrors, setUploadErrors] = useState([]);
            const [showUploadErrorModal, setShowUploadErrorModal] = useState(false);
            const [closingSnapshots, setClosingSnapshots] = useState([]);
            const [showClosingHistory, setShowClosingHistory] = useState(false);

            const [activeIssueMode, setActiveIssueMode] = useState(null);
            const currentIssueIdxRef = useRef(-1);
            const activeIssueModeRef = useRef(null);
            const [splitModal, setSplitModal] = useState({ isOpen: false, payload: null });
            
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showGenesisModal, setShowGenesisModal] = useState(false); 

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady || path === '#') {
                    showToast(`⚠️ [${path}] 페이지는 아직 준비 중입니다.`);
                    return;
                }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) { showToast(`💡 이동 시뮬레이션: [${path}]`); }
            }, [showToast]);

            useEffect(() => {
                const handleMessage = (e) => {
                    if (e.data && e.data.type === 'CLOSE_SETTINGS') {
                        setShowSettingsModal(false);
                        loadData();
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const generateBatchKey = useCallback((code, price, vendor, date) => {
                let key = code || 'NO_CODE';
                if (config.opsGrouping.priceMode === 'separate') key += `|${price}`;
                if (config.opsGrouping.splitByVendor) key += `|${vendor}`;
                if (config.opsGrouping.splitByDate) key += `|${date}`;
                return key;
            }, [config.opsGrouping]);

            // 🌟 Daily 로드 엔진: targetDate 기준 완벽한 기초/입출고 분리
            const loadData = useCallback(async () => {
                setIsProcessing(true); setProcessMsg("일일 수불 엔진 동기화 및 이월 처리 중...");
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    const closings = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                    
                    if (closings.length === 0) setHasSnapshots(false);
                    else setHasSnapshots(true);
                    
                    const currentClosing = closings.find(c => c.closingDate === targetDate);
                    if (currentClosing) {
                        setIsClosedDate(true);
                        setInventoryData(currentClosing.snapshotData);
                        setHistoryLogs(history.filter(h => h.date === targetDate).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp)));
                        return;
                    }
                    
                    setIsClosedDate(false);

                    // 과거 마감 중 가장 가까운 최신 마감본 찾기
                    const pastClosings = closings.filter(c => c.closingDate < targetDate).sort((a,b) => b.closingDate.localeCompare(a.closingDate));
                    const lastClosing = pastClosings.length > 0 ? pastClosings[0] : null;
                    
                    let pData = {};
                    let stockPool = {};
                    let preStock = {}; // 기초 재고를 누적할 임시 객체

                    // 1. 기초 재고 세팅 (가장 최근 마감 스냅샷 기준)
                    if (lastClosing) {
                        lastClosing.snapshotData.forEach(item => {
                            preStock[item.batchKey] = {
                                qty: item.실사 === null || item.실사 === '' ? item.전산잔량 : item.실사,
                                ...item
                            };
                        });
                    }

                    // 2. lastClosing 이후부터 targetDate 전날까지의 preHistory 누적하여 기초 재고 최신화
                    let preHistory = [];
                    if (lastClosing) {
                        preHistory = history.filter(h => h.date > lastClosing.closingDate && h.date < targetDate).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                    } else {
                        preHistory = history.filter(h => h.date < targetDate).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                    }

                    preHistory.forEach(log => {
                        const code = log.code;
                        if (log.type === 'PURCHASE' || log.type === 'PURCHASE_RETURN' || log.type === 'INITIAL_SETUP' || log.type === 'ADJUSTMENT') {
                            const qty = (log.type === 'PURCHASE_RETURN') ? -Number(log.qty) : Number(log.qty);
                            const price = parseNum(log.price);
                            const vendor = log.vendor || '미지정';
                            const date = log.date || ''; 
                            const batchKey = `${code}|${price}|${vendor}|${date}`; 
                            
                            if(!preStock[batchKey]) {
                                const m = master[code] || {};
                                preStock[batchKey] = {
                                    batchKey, 코드: code, 품명: log.name || m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: vendor, qty: 0
                                };
                            }
                            preStock[batchKey].qty += qty;
                        } else if (log.type === 'DISPATCH' || log.type === 'SALES_RETURN') {
                            const qty = log.type === 'DISPATCH' ? Number(log.qty) : -Number(log.qty);
                            const targetVendor = log.lotVendor || '미지정';
                            
                            let availKeys = Object.keys(preStock).filter(k => preStock[k].코드 === code && preStock[k].qty > 0);
                            if (config.opsGrouping.splitByVendor && targetVendor !== '미지정') {
                                const exactMatch = availKeys.filter(k => preStock[k].거래처 === targetVendor);
                                if(exactMatch.length > 0) availKeys = exactMatch;
                            }
                            
                            let remaining = qty;
                            for (let bk of availKeys) {
                                if (remaining <= 0) break;
                                const take = Math.min(preStock[bk].qty, remaining);
                                preStock[bk].qty -= take;
                                remaining -= take;
                            }
                            if(remaining > 0) {
                               const anyAvail = Object.keys(preStock).filter(k => preStock[k].코드 === code);
                               if(anyAvail.length > 0) preStock[anyAvail[0]].qty -= remaining; // 마이너스 로스 감수
                            }
                        }
                    });

                    // 계산된 기초재고(preStock)를 pData에 장착
                    Object.values(preStock).forEach(ps => {
                        if (ps.qty === 0 && !ps.기초) return; // 기존 내역도 없고 0이면 무시
                        pData[ps.batchKey] = {
                            batchKey: ps.batchKey, 코드: ps.코드, 품명: ps.품명, 규격: ps.규격, 단가: ps.단가, 거래처: ps.거래처,
                            기초: ps.qty, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: ps.qty, 실사: null, 로스: 0,
                            이슈: [], 메모: '', 출고내역: {}, _orig: { 기초: ps.qty, 입고: 0, 출고: 0, 단가: ps.단가 },
                            isDummy: !master[ps.코드], 수기확인완료: true
                        };
                        if(!stockPool[ps.코드]) stockPool[ps.코드] = { buckets: [] };
                        stockPool[ps.코드].buckets.push({ batchKey: ps.batchKey, 단가: ps.단가, 수량: ps.qty, 거래처: ps.거래처 });
                    });

                    // 3. 당일(targetDate) 히스토리 반영 (당기 입고 / 당기 출고)
                    const currentHistory = history.filter(h => h.date === targetDate).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                    setHistoryLogs(currentHistory);

                    currentHistory.forEach(log => {
                        const code = log.code;
                        if (log.type === 'PURCHASE' || log.type === 'PURCHASE_RETURN' || log.type === 'INITIAL_SETUP') {
                            const qty = log.type === 'PURCHASE' || log.type === 'INITIAL_SETUP' ? Number(log.qty) : -Number(log.qty);
                            const price = parseNum(log.price);
                            const vendor = log.vendor || '미지정';
                            const date = log.date || '';
                            const batchKey = `${code}|${price}|${vendor}|${date}`; 
                            
                            if (!pData[batchKey]) {
                                const m = master[code] || {};
                                pData[batchKey] = {
                                    batchKey, 코드: log.code, 품명: log.name || m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: vendor, 일자: log.date,
                                    기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                    이슈: [], 메모: '', 출고내역: {}, _orig: { 기초: 0, 입고: 0, 출고: 0, 단가: price },
                                    isDummy: !master[code], 수기확인완료: true
                                };
                            }
                            pData[batchKey].입고 += qty;
                            
                            if (!stockPool[code]) stockPool[code] = { buckets: [] };
                            let bucket = stockPool[code].buckets.find(b => b.batchKey === batchKey);
                            if (bucket) bucket.수량 += qty;
                            else stockPool[code].buckets.push({ batchKey, 단가: price, 수량: qty, 거래처: vendor });
                        } 
                        else if (log.type === 'DISPATCH' || log.type === 'SALES_RETURN') {
                            const qty = log.type === 'DISPATCH' ? Number(log.qty) : -Number(log.qty);
                            const targetVendor = log.lotVendor || '미지정';
                            
                            if (!stockPool[code]) return;
                            const buckets = stockPool[code].buckets.sort((a,b) => b.수량 - a.수량);
                            let remaining = qty;
                            
                            // 벤더 우선 차감
                            for(let b of buckets) {
                                if (remaining <= 0) break;
                                if (config.opsGrouping.splitByVendor && b.거래처 !== targetVendor) continue;
                                const pItem = pData[b.batchKey];
                                const avail = (pItem.기초 + pItem.입고 - pItem.출고);
                                if (avail > 0) {
                                    const take = Math.min(avail, remaining);
                                    pItem.출고 += take;
                                    b.수량 -= take;
                                    remaining -= take;
                                    
                                    const dispVendor = log.partner || targetVendor;
                                    if (!pItem.출고내역[dispVendor]) pItem.출고내역[dispVendor] = { qty: 0 };
                                    pItem.출고내역[dispVendor].qty += take;
                                }
                            }
                            // 남으면 아무 로트에서나 차감
                            for(let b of buckets) {
                                if (remaining <= 0) break;
                                const pItem = pData[b.batchKey];
                                const avail = (pItem.기초 + pItem.입고 - pItem.출고);
                                if (avail > 0) {
                                    const take = Math.min(avail, remaining);
                                    pItem.출고 += take;
                                    b.수량 -= take;
                                    remaining -= take;

                                    const dispVendor = log.partner || targetVendor;
                                    if (!pItem.출고내역[dispVendor]) pItem.출고내역[dispVendor] = { qty: 0 };
                                    pItem.출고내역[dispVendor].qty += take;
                                }
                            }
                            if (remaining > 0 && buckets.length > 0) {
                                const pItem = pData[buckets[0].batchKey];
                                pItem.출고 += remaining;
                                buckets[0].수량 -= remaining;

                                const dispVendor = log.partner || targetVendor;
                                if (!pItem.출고내역[dispVendor]) pItem.출고내역[dispVendor] = { qty: 0 };
                                pItem.출고내역[dispVendor].qty += remaining;
                            }
                        }
                    });

                    const filteredPData = Object.values(pData).filter(item => {
                        return item.기초 !== 0 || item.입고 !== 0 || item.출고 !== 0;
                    });

                    filteredPData.forEach(item => {
                        item.전산잔량 = item.기초 + item.입고 + item.대체입고 - item.출고 - item.대체출고;
                        item.실사 = item.실사 !== null ? item.실사 : item.전산잔량; 
                        item.로스 = item.실사 - item.전산잔량;
                        item._orig = { 기초: item.기초, 입고: item.입고, 출고: item.출고, 단가: item.단가 };
                    });

                    setInventoryData(filteredPData.sort((a,b) => a.품명.localeCompare(b.품명) || a.단가 - b.단가));
                } catch(e) {
                    console.error(e);
                    showToast("❌ 데이터 로드 중 오류 발생");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [targetDate, config.opsGrouping, showToast]);

            useEffect(() => { loadData(); }, [loadData]);

            useEffect(() => {
                const handleStorageChange = (e) => { if (e.key === STORAGE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorageChange);
                
                return () => {
                    window.removeEventListener('storage', handleStorageChange);
                };
            }, [loadData]);

            // 💡 엑셀 헤더 자동 인식 (강화된 로직 적용)
            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('실사 엑셀 대조 중...');
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    let count = 0; const actualUpdates = {}; let errors = [];
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    excelData.forEach((row, idx) => {
                        const findKey = (mappingString) => {
                            if (!mappingString) return null;
                            const keys = mappingString.split(',').map(k => k.trim()); const rowKeys = Object.keys(row);
                            for (const key of keys) { const matched = rowKeys.find(rk => rk.toLowerCase().replace(/\s/g, '') === key.toLowerCase().replace(/\s/g, '')); if (matched) return matched; } return null;
                        };
                        const codeKey = findKey(config.opsMappings.code) || '품목코드';
                        const code = row[codeKey] || row['코드'] || row['상품코드'];
                        if (!code) { errors.push({ row: idx + 2, code: '-', reason: '품목코드 또는 상품코드 누락' }); return; }
                        
                        const qtyKey = findKey(config.opsMappings.qty) || '실사';
                        const qtyVal = row[qtyKey] || row['기말실사'] || row['수량'];
                        if (qtyVal === undefined || qtyVal === '') { errors.push({ row: idx + 2, code, reason: '실사 수량 누락' }); return; }
                        
                        actualUpdates[code] = parseNum(qtyVal);
                    });

                    setInventoryData(prev => {
                        let updatedCount = 0; 
                        let newData = [...prev];
                        const currentCodes = new Set(newData.map(i => i.코드));

                        Object.keys(actualUpdates).forEach(code => { 
                            const actual = actualUpdates[code];
                            if (!currentCodes.has(code)) {
                                if (!master[code]) {
                                    errors.push({ row: '-', code, reason: '마스터 DB에 존재하지 않는 품목코드' });
                                } else {
                                    const m = master[code];
                                    const price = parseNum(m.입고가);
                                    const batchKey = `${code}|${price}|기초재고|all`;
                                    
                                    const newItem = {
                                        batchKey, 코드: code, 품명: m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: '기초재고', 일자: '',

                const condition = (p) => {
                    if (type === 'loss') return p.로스 !== 0 || p.전산잔량 < 0 || p.이슈.some(i => i.includes('🚨'));
                    if (type === 'manual') return p.이슈.some(i => i.includes('✅') || i.includes('🔄') || i.includes('🚀'));
                    return false;
                };

                const targetItems = inventoryData.map((p, i) => ({...p, index: i})).filter(condition);
                if (targetItems.length === 0) {
                    if(!fromCardClick) showToast("해당하는 항목이 없습니다.");
                    setActiveIssueMode(null);
                    return;
                }

                let targetItem = null;
                if (direction === 'next') {
                    targetItem = targetItems.find(p => p.index > currIdx) || targetItems[0];
                } else {
                    for (let i = targetItems.length - 1; i >= 0; i--) {
                        if (targetItems[i].index < currIdx) { targetItem = targetItems[i]; break; }
                    }
                    if (!targetItem) targetItem = targetItems[targetItems.length - 1];
                }

                if (targetItem) {
                    currentIssueIdxRef.current = targetItem.index;
                    setTimeout(() => {
                        const row = document.querySelector(`tr[data-batch="${targetItem.batchKey}"]`);
                        if (row) {
                            const input = document.getElementById(`actual-input-${targetItem.index}`);
                            if (input) { input.focus({ preventScroll: true }); input.select(); }
                            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            
                            const colorClass = type === 'loss' ? 'bg-orange-50' : 'bg-emerald-50';
                            row.classList.add(colorClass);
                            setTimeout(() => row.classList.remove(colorClass), 1500);
                        }
                    }, 100);
                }
            }, [inventoryData, showToast]);

            useEffect(() => {
                const handleGlobalKeys = (e) => {
                    if (e.key === 'Tab' && activeIssueModeRef.current) {
                        e.preventDefault();
                        handleIssueJump(activeIssueModeRef.current, e.shiftKey ? 'prev' : 'next');
                    }
                    if (e.key === 'F9') { e.preventDefault(); handleCombinedExport(); }
                    if (e.key === 'Escape') {
                        if (activeIssueModeRef.current) { setActiveIssueMode(null); currentIssueIdxRef.current = -1; }
                        if (linkSourceKey) setLinkSourceKey(null);
                    }
                };
                window.addEventListener('keydown', handleGlobalKeys);
                return () => window.removeEventListener('keydown', handleGlobalKeys);
            }, [handleIssueJump, handleCombinedExport, linkSourceKey]);

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="inventory" 
                        itemCount={inventoryData.length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettingsModal(true)}
                        onNavigate={handleNavigate} 
                        onPush={handlePush} 
                        onPull={handlePull} 
                    />
                    
                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    
                    <GenesisSetupModal 
                        isOpen={showGenesisModal} 
                        onClose={() => setShowGenesisModal(false)} 
                        onApplySetup={(newItems) => {
                            setInventoryData(newItems);
                            setHasSnapshots(true);

                            <h1 className="text-[18px] font-black text-slate-900 flex items-center">
                                <SafeIcon name="boxes" size={22} className="mr-2.5 text-indigo-500" /> 일일 수불장 및 실사 조정

                                <button onClick={() => setShowGenesisModal(true)} className="h-9 px-3 rounded-md text-[12px] font-bold bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 transition-colors shadow-sm flex items-center shrink-0" title="과거 엑셀 원장으로 기초 재고를 일괄 세팅합니다.">
                                    <SafeIcon name="rocket" size={14} className="mr-1.5" /> 초기 자산 셋업
                                </button>
                                
                                <label className={`h-9 px-3 rounded-md text-[12px] font-bold transition-colors shadow-sm flex items-center shrink-0 ${isClosedDate ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 cursor-pointer'}`}>
                                    <SafeIcon name="file-excel" size={14} className="mr-1.5 text-emerald-500" /> 실사 엑셀 업로드
                                    <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} disabled={isProcessing || isClosedDate} />
                                </label>

                                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg border border-slate-200 shadow-inner ml-2">
                                    <SafeIcon name="calendar-alt" size={14} className="text-slate-500 ml-2" />
                                    <input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} className="bg-transparent text-[13px] font-black text-indigo-600 outline-none cursor-pointer w-32" />
                                </div>
                                
                                <button onClick={handleCombinedExport} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 transition-colors shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="file-export" size={14} className="mr-1.5 text-indigo-500" /> 수불일보 다운 (F9)
                                </button>
                                <button onClick={loadClosingHistory} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 transition-colors shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="history" size={14} className="mr-1.5 text-slate-500" /> 마감 이력 관리
                                </button>
                                <button onClick={handleClosing} disabled={isProcessing || closingStats.lossCount > 0 || isClosedDate} className={`h-9 px-6 rounded-md text-[13px] font-black shadow-sm transition-all flex items-center ${isClosedDate ? 'bg-slate-200 text-slate-400 border border-slate-200 cursor-not-allowed' : (closingStats.lossCount === 0 && inventoryData.length > 0 ? 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed')}`}>
                                    {isClosedDate ? <SafeIcon name="lock" size={14} className="mr-2 inline" /> : <SafeIcon name="save" size={14} className="mr-2 inline" />}
                                    {isClosedDate ? '마감 완료' : '일자 마감 (Daily Closing)'}
                                </button>
                                <div className="w-px h-6 bg-slate-200 mx-1"></div>
                                <div className="relative">
                                    <SafeIcon name="search" size={14} className="absolute left-3 top-2.5 text-slate-400" />
                                    <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="상품명, 코드 검색..." className="w-[220px] bg-slate-50 border border-slate-300 rounded-md pl-9 pr-4 py-1.5 h-9 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm transition-shadow" />
                                </div>
                            </div>
                        </div>
                        
                        {inventoryData.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                                <div

                                        if(activeIssueMode !== 'loss') {
                                            handleIssueJump('loss', 'next', true);
                                        } else {
                                            setActiveIssueMode(null);
                                        }
                                    }}

                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${closingStats.lossCount > 0 ? 'text-orange-800' : 'text-slate-600'}`}>

                                    <div className="flex items-end justify-between mt-2">

                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${closingStats.manualCount > 0 ? 'text-emerald-800' : 'text-slate-600'}`}>
                                        <span className="flex items-center"><SafeIcon name="exchange-alt" size={16} className={`${activeIssueMode === 'manual' || closingStats.manualCount > 0 ? 'text-emerald-500' : 'text-slate-400'} mr-2`}/>Lot 매칭 및 수기 보정 이력</span>

                                    <div className="flex items-end justify-between mt-2">
                                        <div>
                                            <div className={`text-3xl font-black ${activeIssueMode === 'manual' || closingStats.manualCount > 0 ? 'text-emerald-900' : 'text-slate-800'}`}>{closingStats.manualCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                            <div className="text-[12px] text-emerald-600 font-bold mt-1">확인 및 승인됨</div>
                                        </div>
                                        {substHistory.length > 0 && (
                                            <button onClick={(e) => { e.stopPropagation(); setUndoUi({ state: 'list' }); }} className="px-3 py-1.5 bg-white rounded border border-rose-200 text-rose-600 hover:bg-rose-50 font-bold text-[11px] shadow-sm transition flex items-center">

                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                        {!hasSnapshots && inventoryData.length === 0 && (

                                <div className="bg-white px-12 py-10 rounded-2xl shadow-xl flex flex-col items-center border border-slate-200 max-w-lg text-center">
                                    <div className="w-20 h-20 rounded-full bg-indigo-50 flex items-center justify-center shadow-inner mb-6">
                                        <SafeIcon name="rocket" size={40} className="text-indigo-500" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">마감 스냅샷이 없습니다</h2>
                                    <p className="text-[14px] font-bold text-slate-500 leading-relaxed">
                                        시스템을 최초로 도입하셨거나 과거 데이터가 없습니다.<br/>
                                        상단의 <strong className="text-indigo-600">[초기 재고 셋업]</strong> 버튼을 눌러<br/>
                                        현재 창고의 실물 가치를 시스템에 등록해주세요.
                                    </p>
                                </div>
                            </div>
                        )}
                        
                        {isClosedDate && (
                            <div className="absolute inset-0 z-20 bg-slate-900/5 backdrop-blur-[1px] flex items-center justify-center fade-in">
                                <div className="bg-white/90 px-8 py-4 rounded-2xl shadow-xl flex items-center border border-slate-200">
                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mr-4 shadow-inner">
                                        <SafeIcon name="lock" size={24} className="text-slate-500" />
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-black text-slate-800">마감 완료된 일자입니다</h2>
                                        <p className="text-[13px] font-bold text-slate-500 mt-1">데이터를 조회할 수 있지만, 실사 수정이나 상계는 불가합니다.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className={`flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative fade-in ${!hasSnapshots && inventoryData.length === 0 ? 'opacity-0' : 'opacity-100'}`}>
                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="sticky top-0 bg-white shadow-sm border-b border-slate-200 text-slate-500 font-bold text-[12px] z-10">
                                        <tr>
                                            <th className="py-3 px-4 w-[280px] border-r border-slate-200">상품정보 (코드/품명)</th>
                                            <th className="py-3 px-3 text-right w-20 border-r border-slate-200">기초</th>
                                            <th className="py-3 px-3 text-right w-20 text-blue-600 border-r border-slate-200">당기입고</th>
                                            <th className="py-3 px-3 text-right w-20 text-rose-600 border-r border-slate-200">당기출고</th>
                                            <th className="py-3 px-3 text-right w-24 bg-indigo-50/50 text-indigo-700 border-r border-indigo-100">전산잔량</th>
                                            <th className="py-3 px-4 text-center w-28 bg-indigo-50/50 text-indigo-700 border-r border-indigo-100">실사 수량</th>
                                            <th className="py-3 px-4 text-right w-24 border-r border-slate-200">오차(로스)</th>
                                            <th className="py-3 px-4 w-[250px] border-r border-slate-200">이슈 / 메모</th>
                                            <th className="py-3 px-4 text-center w-16">조정</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-transparent text-slate-700">
                                        {displayData.length === 0 ? (
                                            <tr><td colSpan="9" className="py-20 text-center text-slate-400 font-bold"><SafeIcon name="boxes" size={40} className="mb-3 text-slate-200 block mx-auto" />해당 일자에 입출고 또는 재고 기록이 없습니다.</td></tr>
                                        ) : displayData.map((item, idx) => (
                                            <ProductRow key={item.batchKey} item={item} idx={idx} isLinked={linkSourceKey === item.batchKey} onStockChange={updateActualQty} onSpacebar={handleSpacebarLink} onBaseDataChange={handleBaseDataChange} onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })} onShowTimeline={(code, name) => setTimelineModal({ isOpen: true, itemCode: code, itemName: name })} onSalesMove={handleChipDropRequest} />
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {timelineModal.isOpen && <TimelineModal itemCode={timelineModal.itemCode} itemName={timelineModal.itemName} historyLogs={historyLogs} onClose={() => setTimelineModal({ isOpen: false, itemCode: null, itemName: '' })} />}

                        {memoModal.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[400px] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><h3 className="font-black text-slate-800 text-[14px] flex items-center"><SafeIcon name="edit" size={16} className="text-indigo-500 mr-2"/>조정 사유 기록</h3><button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="text-slate-400 hover:text-slate-600"><SafeIcon name="x" size={16} /></button></div>
                                    <div className="p-6 space-y-4"><p className="text-[12px] text-slate-500 font-bold leading-relaxed">실사 수량이 전산과 다릅니다. 폐기, 분실, 샘플제공 등 오차 발생 사유를 기록하면 <span className="text-emerald-600">정상적인 조정(✅)</span>으로 승인됩니다.</p><textarea value={memoModal.text} onChange={e=>setMemoModal({...memoModal, text: e.target.value})} autoFocus rows="3" placeholder="예: 1박스 샘플 제공, 침수로 인한 폐기 처리" className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-[13px] outline-none focus:border-indigo-500 focus:ring-1 shadow-sm resize-none" onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); } }} /><div className="flex gap-2 pt-2"><button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button><button onClick={() => { handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>사유 기록 승인</button></div></div>
                                </div>
                            </div>

                                </div>
                            </div>

                        {showUploadErrorModal && (

                                    <div className="px-5 py-4 border-b border-slate-200 bg-rose-50 flex justify-between items-center"><h3 className="font-black text-rose-800 text-[14px] flex items-center"><SafeIcon name="exclamation-circle" size={16} className="text-rose-500 mr-2"/>엑셀 업로드 누락/오류 보고서</h3><button onClick={() => setShowUploadErrorModal(false)} className="text-rose-400 hover:text-rose-600"><SafeIcon name="x" size={16} /></button></div>
                                    <div className="p-6 overflow-y-auto custom-scrollbar bg-white flex-1"><p className="text-[12px] text-slate-600 mb-4 font-bold">총 <span className="text-rose-600">{uploadErrors.length}</span>건의 데이터가 양식 오류 또는 코드 불일치로 누락되었습니다. 원본 엑셀을 확인해주세요.</p><table className="w-full text-left text-[12px]"><thead className="bg-slate-100 text-slate-600 border-b border-slate-200 sticky top-0"><tr><th className="py-2 px-3 w-16 text-center">행(Row)</th><th className="py-2 px-3 w-24">품목코드</th><th className="py-2 px-3">누락 사유</th></tr></thead><tbody className="divide-y divide-slate-100">{uploadErrors.map((err, i) => <tr key={i} className="hover:bg-slate-50"><td className="py-2 px-3 text-center text-slate-400 font-mono">{err.row}</td><td className="py-2 px-3 font-bold text-slate-700">{err.code}</td><td className="py-2 px-3 text-rose-600 font-medium">{err.reason}</td></tr>)}</tbody></table></div>
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-end"><button onClick={() => setShowUploadErrorModal(false)} className="px-6 py-2.5 bg-slate-800 text-white rounded-lg text-[13px] font-bold shadow-md hover:bg-black transition-all">확인 및 닫기</button></div>
                                </div>
                            </div>
                        )}

                        <SnapshotManagerModal isOpen={showClosingHistory} onClose={() => setShowClosingHistory(false)} showToast={showToast} />

                        {splitModal.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[400] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[320px] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><h3 className="font-black text-slate-800 text-[14px] flex items-center"><SafeIcon name="cut" size={16} className="text-indigo-500 mr-2"/>분할 이동 수량</h3><button onClick={() => setSplitModal({ isOpen: false, payload: null })} className="text-slate-400 hover:text-slate-600"><SafeIcon name="x" size={16} /></button></div>
                                    <div className="p-6 space-y-4">
                                        <p className="text-[12px] text-slate-500 font-bold">최대 <span className="text-indigo-600">{splitModal.payload?.maxQty}</span>개까지 분할하여 이동시킬 수 있습니다.</p>
                                        <input id="split-qty-input" type="number" min="1" max={splitModal.payload?.maxQty || 1} defaultValue={splitModal.payload?.maxQty || 1} autoFocus className="w-full text-center text-lg font-black text-indigo-700 bg-white border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-indigo-500 focus:ring-1 shadow-sm" onKeyDown={(e) => { if(e.key === 'Enter') { const val = Number(e.target.value); if(splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) { handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val); setSplitModal({ isOpen: false, payload: null }); } } }} />
                                        <div className="flex gap-2 pt-2"><button onClick={() => setSplitModal({ isOpen: false, payload: null })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button><button onClick={() => { const val = Number(document.getElementById('split-qty-input').value); if(splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) { handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val); setSplitModal({ isOpen: false, payload: null }); } }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>분할 이동</button></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
