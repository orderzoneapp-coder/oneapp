            const [showClosingHistory, setShowClosingHistory] = useState(false);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady || path === '#' || path === '') { showToast(`⚠️ 해당 페이지는 아직 준비 중입니다.`); return; }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            // 🌟 1. 지능형 수불 집계 엔진 (loadData 고도화)
            const loadData = useCallback(async () => {
                setIsProcessing(true); setProcessMsg("지능형 수불 엔진 동기화 중...");
                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    
                    setMasterProducts(master);
                    setHistoryLogs(history);

                    let pData = {};
                    
                    // 1) 마스터를 기준으로 초기 버킷(기초/전산재고 뼈대) 구성
                    const totalInOutByCode = {};
                    history.forEach(log => {
                        if(!totalInOutByCode[log.code]) totalInOutByCode[log.code] = { in: 0, out: 0 };
                        if(log.type === 'PURCHASE') totalInOutByCode[log.code].in += log.qty;
                        if(log.type === 'PURCHASE_RETURN') totalInOutByCode[log.code].in -= log.qty;
                        if(log.type === 'DISPATCH') totalInOutByCode[log.code].out += log.qty;
                        if(log.type === 'SALES_RETURN') totalInOutByCode[log.code].out -= log.qty;
                    });

                    for(let code in master) {
                        const m = master[code];
                        const sysQty = Number(m.재고수량 || 0);
                        const inOut = totalInOutByCode[code] || { in: 0, out: 0 };
                        const baseQty = sysQty - inOut.in + inOut.out; // 기초수량 역산 (임시)
                        
                        const price = parseNum(m.입고가);
                        const vendor = '기초재고';
                        
                        // 💡 설정에 따른 Grouping Key 생성
                        const batchKey = `${code}|${config.opsGrouping.priceMode === 'separate' ? price : 'avg'}|${config.opsGrouping.splitByVendor ? vendor : 'all'}|all`;
                        
                        pData[batchKey] = {
                            batchKey, 코드: code, 품명: m.품목명, 규격: m.규격, 단가: price, 거래처: vendor, 일자: '',
                            기초: baseQty, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 
                            전산잔량: baseQty, 실사: null, 로스: 0, 
                            이슈: [], 메모: '', 출고내역: {}, _orig: { 기초: baseQty, 입고: 0, 출고: 0, 단가: price },
                            isDummy: false, 수기확인완료: true
                        };
                    }

                    // 2) History 데이터 시간순으로 돌면서 버킷에 당기 발생 할당
                    const sortedHistory = [...history].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

                    sortedHistory.forEach(log => {
                        const code = log.code;
                        if (log.type === 'PURCHASE') {
                            const price = parseNum(log.price);
                            const vendor = log.vendor || '미지정';
                            const date = log.date || '';
                            
                            const batchKey = `${code}|${config.opsGrouping.priceMode === 'separate' ? price : 'avg'}|${config.opsGrouping.splitByVendor ? vendor : 'all'}|${config.opsGrouping.splitByDate ? date : 'all'}`;
                            
                            if (!pData[batchKey]) {
                                const m = master[code] || {};
                                pData[batchKey] = {
                                    batchKey, 코드: code, 품명: log.name || m.품목명 || '미상', 규격: m.규격 || '', 단가: price, 거래처: vendor, 일자: date,
                                    기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: null, 로스: 0, 
                                    이슈: [], 메모: '', 출고내역: {}, _orig: { 기초: 0, 입고: 0, 출고: 0, 단가: price },
                                    isDummy: !master[code], 수기확인완료: true
                                };
                            }
                            pData[batchKey].입고 += log.qty;
                        } 
                        else if (log.type === 'DISPATCH') {
                            const targetVendor = log.lotVendor || '미지정';
                            const buckets = Object.values(pData).filter(p => p.코드 === code).sort((a,b) => (a.기초+a.입고-a.출고) > (b.기초+b.입고-b.출고) ? -1 : 1);
                            
                            let remaining = log.qty;
                            
                            // 1차: 매입처(Lot) 일치 버킷에서 우선 차감
                            for(let b of buckets) {
                                if (remaining <= 0) break;
                                if (config.opsGrouping.splitByVendor && b.거래처 !== targetVendor) continue;
                                const avail = (b.기초 + b.입고 - b.출고);
                                if (avail > 0) {
                                    const take = Math.min(avail, remaining);
                                    b.출고 += take;
                                    remaining -= take;
                                }
                            }
                            
                            // 2차: 남은게 있다면 가장 여유있는 버킷에서 차감 (FIFO 유사 방식)
                            for(let b of buckets) {
                                if (remaining <= 0) break;
                                const avail = (b.기초 + b.입고 - b.출고);
                                if (avail > 0) {
                                    const take = Math.min(avail, remaining);
                                    b.출고 += take;
                                    remaining -= take;
                                }
                            }
                            
                            // 3차: 그래도 남으면(마이너스 재고) 첫번째 버킷에 강제 할당
                            if (remaining > 0 && buckets.length > 0) {
                                buckets[0].출고 += remaining;
                            }
                        }
                    });

                    // 3) 전산잔량 계산 및 최종 정리
                    Object.values(pData).forEach(item => {
                        item.전산잔량 = item.기초 + item.입고 + item.대체입고 - item.출고 - item.대체출고;
                        item.실사 = item.전산잔량; // 초기 실사값은 전산잔량과 동일
                        item.로스 = 0;
                        item._orig = { 기초: item.기초, 입고: item.입고, 출고: item.출고, 단가: item.단가 };
                    });

                    const finalData = Object.values(pData).sort((a,b) => a.품명.localeCompare(b.품명) || a.단가 - b.단가);
                    setInventoryData(finalData);
                    
                } catch(e) {
                    showToast("❌ 데이터 로드 중 오류 발생");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [config.opsGrouping, showToast]);

            useEffect(() => { loadData(); }, [loadData]);

            useEffect(() => {
                const handleStorageChange = (e) => { if (e.key === STORAGE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [loadData]);

            // 🌟 단축키 F9 리포트 연결
            useEffect(() => {
                const handleGlobalKeys = (e) => {
                    if (e.key === 'F9') { e.preventDefault(); handleCombinedExport(); }
                };
                window.addEventListener('keydown', handleGlobalKeys);
                return () => window.removeEventListener('keydown', handleGlobalKeys);
            }, [inventoryData, historyLogs]);

            // 실사 엑셀 업로드 연동
            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('실사 엑셀 대조 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let count = 0;
                    const actualUpdates = {};
                    let errors = []; // 💡 에러 추적 배열
                    
                    // 엑셀에서 실사 수량 찾기
                    excelData.forEach((row, idx) => {
                        const findKey = (mappingString) => {
                            if (!mappingString) return null;
                            const keys = mappingString.split(',').map(k => k.trim());
                            const rowKeys = Object.keys(row);
                            for (const key of keys) {
                                const matched = rowKeys.find(rk => rk.toLowerCase().replace(/\s/g, '') === key.toLowerCase().replace(/\s/g, ''));
                                if (matched) return matched;
                            }
                            return null;
                        };

                        const codeKey = findKey(config.opsMappings.code) || '품목코드';
                        const code = row[codeKey] || row['코드'] || row['상품코드'];
                        
                        if (!code) { errors.push({ row: idx + 2, code: '-', reason: '품목코드 또는 상품코드 누락' }); return; }
                        
                        const qtyKey = findKey(config.opsMappings.qty) || '실사';
                        const qtyVal = row[qtyKey] || row['기말실사'] || row['수량'];
                        
                        if (qtyVal === undefined || qtyVal === '') { errors.push({ row: idx + 2, code, reason: '실사 수량 누락' }); return; }
                        
                        actualUpdates[code] = parseNum(qtyVal);
                    });

                    setInventoryData(prev => {
                        let updatedCount = 0;
                        const currentCodes = new Set(prev.map(i => i.코드));
                        
                        // 마스터에 없는 코드 검출
                        Object.keys(actualUpdates).forEach(code => {
                            if (!currentCodes.has(code)) {
                                errors.push({ row: '-', code, reason: '마스터 DB에 존재하지 않는 품목코드' });
                            }
                        });

                        const newData = prev.map(item => {
                            if (actualUpdates[item.코드] !== undefined) {
                                const actual = actualUpdates[item.코드];
                                const newLoss = actual - item.전산잔량;
                                let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정') && !msg.includes('수량변동'));
                                
                                if (newLoss !== 0) newIssues.push('🚨수량변동(실사반영)');
                                
                                updatedCount++;
                                return { ...item, 실사: actual, 로스: newLoss, 이슈: newIssues, 수기확인완료: newLoss === 0 };
                            }
                            return item;
                        });
                        count = updatedCount;
                        return newData;
                    });
                    
                    if (errors.length > 0) {
                        setUploadErrors(errors);
                        setShowUploadErrorModal(true);
                    }
                    
                    if(count > 0) showToast(`✅ ${count}건의 실사 수량이 전산잔량과 대조되었습니다.`);
                    else showToast(`⚠️ 정상적으로 대조된 항목이 없습니다.`);
                } catch(error) { 
                    showToast("❌ 업로드 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessing(false); setProcessMsg(''); 
                }
            };

            const handleBaseDataChange = useCallback((batchKey, field, val) => {
                const numVal = val === '' ? 0 : Number(val);
                setInventoryData(prevP => prevP.map(item => {
                    if (item.batchKey === batchKey) {
                        const newItem = { ...item, [field]: numVal, 수기확인완료: true };
                        newItem.전산잔량 = newItem.기초 + newItem.입고 + newItem.대체입고 - newItem.출고 - newItem.대체출고;
                        newItem.실사 = newItem.전산잔량; newItem.로스 = 0;
                        let newIssues = [...newItem.이슈].filter(msg => msg !== '장부 수기조정');
                        if (newItem.전산잔량 >= 0) newIssues = newIssues.filter(msg => !msg.includes('수량부족'));
                        if (newItem.로스 === 0) newIssues = newIssues.filter(msg => !msg.includes('수량변동') && !msg.includes('과다로스') && !msg.includes('실사 수기조정'));
                        const isBaseChanged = newItem.기초 !== (newItem._orig?.기초 || 0) || newItem.입고 !== (newItem._orig?.입고 || 0) || newItem.출고 !== (newItem._orig?.출고 || 0);
                        if (isBaseChanged) newIssues.push('장부 수기조정');
                        newItem.이슈 = newIssues.map(msg => msg.replace(/🚨/g, '✅'));
                        return newItem;
                    }
                    return item;
                }));
            }, []);

            const updateActualQty = useCallback((code, val) => {
                const actual = val === '' ? '' : parseInt(val, 10);
                setInventoryData(prev => prev.map(item => {
                    if (item.batchKey === code) { // batchKey로 변경
                        const lossCalcVal = actual === '' ? 0 : actual;
                        const newLoss = lossCalcVal - item.전산잔량;
                        let newIssues = [...item.이슈].filter(msg => !msg.includes('실사조정') && !msg.includes('실사 수기조정'));
                        
                        if (newLoss === 0) newIssues = newIssues.filter(msg => !msg.includes('수량변동') && !msg.includes('과다로스'));
                        if (item.전산잔량 >= 0) newIssues = newIssues.filter(msg => !msg.includes('수량부족'));
                        
                        newIssues = newIssues.map(msg => msg.replace(/🚨/g, '✅'));
                        if (actual !== '' && newLoss !== 0) newIssues.push('🚨실사조정');
                        return { ...item, 실사: actual, 로스: newLoss, 이슈: newIssues, 수기확인완료: true };
                    }
                    return item;
                }));
            }, []);

            const executeImmediateSubstitution = useCallback((key1, key2, targetIdx) => {
                setInventoryData(prev => {
                    const idx1 = prev.findIndex(d => d.batchKey === key1);
                    const realIdx2 = prev.findIndex(d => d.batchKey === key2);
                    if (idx1 < 0 || realIdx2 < 0) return prev;

                    const sourceItemOrig = { ...prev[idx1], 이슈: [...prev[idx1].이슈] };
                    const targetItemOrig = { ...prev[realIdx2], 이슈: [...prev[realIdx2].이슈] };

                    let sourceItem = { ...sourceItemOrig }; let targetItem = { ...targetItemOrig };

                    if (sourceItem.로스 < 0 && targetItem.로스 > 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 > 0) { let temp = sourceItem; sourceItem = targetItem; targetItem = temp; }
                    else { showToast("⚠️ 상계 불가! 로스가 음수(-)와 양수(+)여야 합니다."); return prev; }

                    const sQty = Math.abs(sourceItem.로스); const tQty = Math.abs(targetItem.로스);
                    const moveQty = Math.min(sQty, tQty);

                    sourceItem.대체출고 += moveQty;
                    sourceItem.전산잔량 -= moveQty;
                    sourceItem.로스 = sourceItem.실사 - sourceItem.전산잔량;
                    
                    if (sourceItem.로스 === 0) sourceItem.이슈 = sourceItem.이슈.filter(msg => !msg.includes('수량변동') && !msg.includes('실사조정') && !msg.includes('실사 수기조정') && !msg.includes('과다로스'));
                    sourceItem.이슈.push(`🔄 (-${moveQty})`); 
                    sourceItem.수기확인완료 = true;

                    targetItem.대체입고 += moveQty;
                    targetItem.전산잔량 += moveQty;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;
                    
                    if (targetItem.로스 === 0) targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('수량변동') && !msg.includes('실사조정') && !msg.includes('실사 수기조정') && !msg.includes('과다로스'));
                    targetItem.이슈.push(`🔄 (+${moveQty} ${sourceItem.품명})`);
                    targetItem.수기확인완료 = true;

                    setSubstHistory(h => [...h, {
                        id: Date.now(), sourceKey: sourceItem.batchKey, targetKey: targetItem.batchKey, sourceName: sourceItem.품명, targetName: targetItem.품명, 
                        sQty: moveQty, tQty: moveQty, sourceItemPrev: sourceItemOrig, targetItemPrev: targetItemOrig
                    }]);

                    const newData = [...prev];
                    newData[idx1] = sourceItem;
                    newData[realIdx2] = targetItem;
                    showToast(`✅ [${sourceItem.품명}] ➔ [${targetItem.품명}] 로스 상계 완료`);
                    return newData;
                });
            }, [showToast]);

            const handleSpacebarLink = useCallback((targetBatchKey, targetIdx) => {
                setLinkSourceKey(prevKey => {
                    if (!prevKey) { setTimeout(() => { const input = document.getElementById(`actual-input-${targetIdx}`); if (input) { input.focus(); input.select(); } }, 50); return targetBatchKey; }
                    if (prevKey === targetBatchKey) { setTimeout(() => { const input = document.getElementById(`actual-input-${targetIdx}`); if (input) { input.focus(); input.select(); } }, 50); return null; }
                    setTimeout(() => executeImmediateSubstitution(prevKey, targetBatchKey, targetIdx), 0); return null; 
                });
            }, [executeImmediateSubstitution]);

            const handleUndoAction = useCallback((historyItem) => {
                setInventoryData(prev => {
                    const newData = [...prev]; 
                    const sIdx = newData.findIndex(d => d.batchKey === historyItem.sourceKey); 
                    const tIdx = newData.findIndex(d => d.batchKey === historyItem.targetKey);
                    if (sIdx >= 0) newData[sIdx] = { ...historyItem.sourceItemPrev, 이슈: [...historyItem.sourceItemPrev.이슈] }; 
                    if (tIdx >= 0) newData[tIdx] = { ...historyItem.targetItemPrev, 이슈: [...historyItem.targetItemPrev.이슈] };
                    return newData;
                });
                setSubstHistory(h => h.filter(item => item.id !== historyItem.id));
                showToast("🔙 상계 처리가 취소되었습니다.");
            }, [showToast]);

            const handleUndoAll = useCallback(() => { [...substHistory].reverse().forEach(h => handleUndoAction(h)); setUndoUi({ state: 'closed' }); }, [substHistory, handleUndoAction]);

            const handleSaveMemo = useCallback((batchKey, text) => {
                setInventoryData(prev => prev.map(item => {
                    if (item.batchKey === batchKey) {
                        let newIssues = [...item.이슈];
                        if (newIssues.some(i => i.includes('🚨실사조정'))) {
                            newIssues = newIssues.map(msg => msg.replace('🚨실사조정', '✅실사조정(수기)'));
                        }
                        return { ...item, 메모: text, 이슈: newIssues };
                    }
                    return item;
                }));
                showToast("✅ 사유가 기록되어 조정 내역이 승인되었습니다.");
            }, [showToast]);

            // 🌟 2. 마감 엑셀 다운로드 복원 (F9 단축키 연결)
            const handleCombinedExport = useCallback(() => {
                if (inventoryData.length === 0) { showToast("⚠️ 다운로드할 데이터가 없습니다."); return; }
                
                setIsProcessing(true); setProcessMsg("결산 리포트 엑셀 생성 중...");
                
                setTimeout(() => {
                    const targetDateStr = new Date().toISOString().slice(0, 10);
                    const exportFileNameDate = targetDateStr.replace(/-/g, '');
                    
                    // 시트 1: 재고수불_마감
                    const exportData1 = inventoryData.map(item => {
                        const qty = item.실사 === '' || item.실사 === null ? 0 : parseNum(item.실사);
                        const adjust = (parseNum(item.로스) || 0) + (parseNum(item.대체입고) || 0) - (parseNum(item.대체출고) || 0);
                        const price = parseNum(item.단가) || 0;
                        return { 
                            '결산일자': targetDateStr, '매입처(Lot)': item.거래처, '상품코드': item.코드, '상품명(규격)': item.품명, 
                            '기초수량': item.기초, '입고수량': item.입고, '출고량': item.출고, '기말실사(이월수량)': qty, 
                            '매입단가(원가)': price, '기말재고액(자산가치)': qty * price, '로스/조정수량': adjust, 
                            '이슈/결과': item.이슈.join(', '), '수기메모': item.메모 || '' 
                        };
                    });

                    // 시트 2: 매입현황 (History 참조)
                    const exportData2 = historyLogs.filter(h => h.type === 'PURCHASE').map(h => ({
                        '결산일자': targetDateStr, '매입일자': h.date || targetDateStr, '매입처명(공급사)': h.vendor || '미지정',
                        '상품코드': h.code, '상품명(규격)': h.name, '매입수량': h.qty, '매입단가': h.price, '매입총액(합계)': h.totalAmount
                    }));

                    // 시트 3: 판매현황 (History 참조)
                    const exportData3 = historyLogs.filter(h => h.type === 'DISPATCH').map(h => ({
                        '결산일자': targetDateStr, '매출처명': h.partner || '미지정', '매입처(Lot)': h.lotVendor || '미지정',
                        '상품코드': h.code, '상품명(규격)': h.name, '판매수량': h.qty, '판매단가': h.price, '공급가액': h.totalAmount
                    }));

                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData1), '재고수불_마감');
                    
                    if (exportData2.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData2), '매입현황');
                    else XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{'메시지': '매입내역이 없습니다.'}]), '매입현황');
                    
                    if (exportData3.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData3), '판매현황');
                    else XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{'메시지': '판매내역이 없습니다.'}]), '판매현황');

                    try {
                        const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                        const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a'); a.href = url; a.download = `DataOps_수불마감리포트_${exportFileNameDate}.xlsx`;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                        showToast("✅ 수불부 결산 데이터가 엑셀로 다운로드되었습니다.");
                    } catch (err) { 
                        console.error('엑셀 생성 중 오류:', err); 
                        showToast("❌ 엑셀 파일 생성 중 오류가 발생했습니다."); 
                    } finally {
                        setIsProcessing(false); setProcessMsg('');
                    }
                }, 500);
            }, [inventoryData, historyLogs, showToast]);

            // 🌟 4. 마감 이월 스냅샷 (CLOSING_DB) 로직 및 롤백 정보 추가
            const handleClosing = async () => {
                const hasErrors = inventoryData.some(item => item.이슈.some(msg => msg.includes('🚨')));
                if (hasErrors) {
                    return showToast("⚠️ 해결되지 않은 오류(🚨실사조정)가 남아있습니다. 스페이스바 상계 또는 사유 메모를 기록하여 모두 승인(✅) 처리 후 마감하세요.");
                }

                if (!window.confirm("현재의 실사 수량으로 재고를 덮어쓰고 수불부를 마감하시겠습니까?\n(오차가 있던 항목은 '실사조정' 내역으로 히스토리에 영구 보존됩니다.)")) return;

                setIsProcessing(true); setProcessMsg("수불부 마감 및 이월 처리 중...");

                try {
                    const master = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    let newMaster = { ...master };
                    let newLogs = [];
                    let logIds = []; // 롤백용 ID 추적
                    const nowStr = new Date().toLocaleString('ko-KR');
                    const history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];

                    inventoryData.forEach(item => {
                        const code = item.코드;
                        const actualQty = item.실사 === '' ? 0 : item.실사;
                        
                        if (newMaster[code]) {
                            newMaster[code] = { ...newMaster[code], 재고수량: actualQty };
                        }

                        if (item.로스 !== 0 || item.이슈.some(i=>i.includes('🔄'))) {
                            const logId = `ADJ-${Date.now()}-${Math.floor(Math.random()*1000)}`;
                            newLogs.push({
                                id: logId,
                                timestamp: nowStr,
                                date: new Date().toISOString().slice(0, 10),
                                type: 'ADJUSTMENT',
                                code: code,
                                name: item.품명,
                                qty: item.로스, 
                                oldStock: item.전산잔량,
                                newStock: actualQty,
                                partner: '시스템 마감(실사)',
                                memo: item.이슈.join(' ') + ' / ' + item.메모
                            });
                            logIds.push(logId);
                        }
                    });

                    // 스냅샷 데이터 생성 및 저장
                    const closings = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                    const snapshot = {
                        id: `CLOSE-${Date.now()}`,
                        date: new Date().toISOString(),
                        stats: { totalItems: inventoryData.length, lossValue: inventoryData.reduce((sum, item) => sum + Math.abs((item.로스||0) * (item.단가||0)), 0) },
                        snapshotData: inventoryData,
                        masterBackup: master, // 롤백을 위한 마스터 백업
                        historyLogIds: logIds // 롤백 시 삭제할 로그 ID 목록
                    };

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...history, ...newLogs]);
                    await setIDB(STORAGE_KEYS.CLOSING_DB, [snapshot, ...closings]);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());

                    showToast("🎉 월 마감이 완료되어 재고가 최종 확정되었습니다! (스냅샷 저장됨)");
                    setTimeout(() => loadData(), 1000); 
                } catch(e) {
                    showToast("❌ 마감 처리 중 오류 발생");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            };

            const loadClosingHistory = async () => {
                const data = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                setClosingSnapshots(data);
                setShowClosingHistory(true);
            };

            const handleRollback = async (snapshot) => {
                if (!window.confirm(`⚠️ 경고: [${new Date(snapshot.date).toLocaleString('ko-KR')}]에 실행된 가장 최근 마감을 취소하고 이전 재고 상태로 되돌리시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
                
                setIsProcessing(true); setProcessMsg("마감 상태 롤백 중...");
                try {
                    if (snapshot.masterBackup) await setIDB(STORAGE_KEYS.MASTER_DB, snapshot.masterBackup);
                    
                    if (snapshot.historyLogIds) {
                        let history = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                        history = history.filter(h => !snapshot.historyLogIds.includes(h.id));
                        await setIDB(STORAGE_KEYS.HISTORY_DB, history);
                    }
                    
                    let closings = await getIDB(STORAGE_KEYS.CLOSING_DB) || [];
                    closings = closings.filter(c => c.id !== snapshot.id);
                    await setIDB(STORAGE_KEYS.CLOSING_DB, closings);
                    
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    setShowClosingHistory(false);
                    showToast("✅ 마감이 취소되고 이전 상태로 복구되었습니다.");
                    setTimeout(() => loadData(), 1000);
                } catch(err) {
                    showToast("❌ 롤백 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg("");
                }
            };

            const displayData = useMemo(() => {
                if (!searchKw.trim()) return inventoryData;
                const kw = searchKw.toLowerCase().replace(/\s/g, '');
                return inventoryData.filter(i => String(i.품명).toLowerCase().replace(/\s/g, '').includes(kw) || String(i.코드).includes(kw));
            }, [inventoryData, searchKw]);

            const closingStats = useMemo(() => {
                let lossCount = 0; let manualCount = 0;
                inventoryData.forEach(p => {
                    if (p.로스 !== 0 || p.전산잔량 < 0 || (p.이슈 && p.이슈.some(i => i.includes('🚨')))) lossCount++;
                    if (p.이슈 && p.이슈.some(i => i.includes('✅') || i.includes('🔄'))) manualCount++;
                });
                return { total: inventoryData.length, lossCount, manualCount };
            }, [inventoryData]);

            // Helper for Mapping Center
            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?")) {
                    getIDB(STORAGE_KEYS.MASTER_DB).then(master => {
                        let newMaster = { ...master }; let count = 0;
                        for (let code in newMaster) { if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) { delete newMaster[code]['검색어등록']; delete newMaster[code]['상품태그']; count++; } }
                        setIDB(STORAGE_KEYS.MASTER_DB, newMaster); localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString()); showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다.`);
                    });
                }
            }, [showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                if (!window.confirm(`[${tagName}] 태그를 정말 삭제하시겠습니까?`)) return;
                getIDB(STORAGE_KEYS.MASTER_DB).then(master => {
                    let newMaster = { ...master }; let count = 0; const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';
                    for (let code in newMaster) {
                        if (newMaster[code][fieldKey]) {
                            const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                            if (tags.includes(tagName)) { newMaster[code] = { ...newMaster[code] }; newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', '); count++; }
                        }
                    }
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster); localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString()); showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
                });
            }, [showToast]);

            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                await setIDB(STORAGE_KEYS.MASTER_DB, {}); localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString()); showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다."); loadData();
            };

            const availableCatalogs = useMemo(() => {
                const counts = {};
                inventoryData.forEach(m => {
                    // productData doesn't have tags natively mapped, fetching directly from DB would be better, but we can mock it here for the modal if needed, or rely on the actual modal props
                });
                return [];
            }, [inventoryData]);

            const availableCategories = useMemo(() => { return []; }, [inventoryData]);

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => { showToast("✅ 클라우드 저장 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => { showToast("✅ 데이터 수신 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="inventory" 
                        itemCount={inventoryData.length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg} 
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate} 
                    />
                    
                    {/* 상단 툴바 및 스탯 카드 통합 (DataOps 스타일) */}
                    <div className="px-8 py-5 bg-white border-b border-slate-200 flex flex-col shadow-sm shrink-0 relative z-10 gap-4">
                        <div className="flex items-center justify-between">
                            <h1 className="text-[18px] font-black text-slate-900 flex items-center">
                                <SafeIcon name="boxes" size={22} className="mr-2.5 text-indigo-500" /> 재고 수불부 마감 및 실사 조정
                            </h1>
                            <div className="flex items-center gap-3">
                                <label className="cursor-pointer h-9 px-3 rounded-md text-[13px] font-bold bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-colors shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="file-excel" size={14} className="mr-1.5 text-emerald-500" /> 실사 엑셀 업로드
                                    <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} disabled={isProcessing} />
                                </label>
                                <button onClick={handleCombinedExport} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 transition-colors shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="file-export" size={14} className="mr-1.5 text-indigo-500" /> 정산 엑셀 다운 (F9)
                                </button>
                                <button onClick={loadClosingHistory} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 transition-colors shadow-sm flex items-center shrink-0">
                                    <SafeIcon name="history" size={14} className="mr-1.5 text-slate-500" /> 마감 이력 관리
                                </button>
                                <button onClick={handleClosing} disabled={isProcessing || closingStats.lossCount > 0} className={`h-9 px-6 rounded-md text-[13px] font-black shadow-sm transition-all flex items-center ${closingStats.lossCount === 0 && inventoryData.length > 0 ? 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                    <SafeIcon name="save" size={14} className="mr-2" /> 최종 마감 (Closing)
                                </button>
                                <div className="w-px h-6 bg-slate-200 mx-1"></div>
                                <div className="relative">
                                    <SafeIcon name="search" size={14} className="absolute left-3 top-2.5 text-slate-400" />
                                    <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="상품명, 코드 검색..." className="w-[220px] bg-slate-50 border border-slate-300 rounded-md pl-9 pr-4 py-1.5 h-9 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm transition-shadow" />
                                </div>
                            </div>
                        </div>
                        
                        {/* 🌟 DataOps 3대 스탯 카드 🌟 */}
                        {inventoryData.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                                <div className="bg-white border-slate-200 p-4 rounded-xl border transition-all flex flex-col justify-between relative overflow-hidden hover:shadow-md">
                                    <div className="text-xs font-bold mb-1 flex items-center justify-between text-slate-600"><span className="flex items-center"><SafeIcon name="database" size={16} className="text-slate-500 mr-2"/>총 관리 버킷(분할)</span></div>
                                    <div className="flex items-end justify-between mt-2"><div><div className="text-3xl font-black text-slate-800">{closingStats.total}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div><div className="text-[12px] text-slate-400 font-semibold mt-1">지능형 수불 엔진 동기화됨</div></div></div>
                                </div>
                                <div className={`p-4 rounded-xl border-[3px] transition-all flex flex-col justify-between relative overflow-hidden ${closingStats.lossCount > 0 ? 'bg-orange-50 border-orange-500 shadow-sm' : 'bg-white border-orange-200 hover:border-orange-400 hover:shadow-md'}`}>
                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${closingStats.lossCount > 0 ? 'text-orange-800' : 'text-slate-600'}`}>
                                        <span className="flex items-center"><SafeIcon name="balance-scale" size={16} className="text-orange-500 mr-2"/>실사 오차 (로스) 확인</span>
                                        {closingStats.lossCount > 0 && <span className="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse shadow-[0_0_8px_rgba(249,115,22,0.6)]"></span>}
                                    </div>
                                    <div className="flex items-end justify-between mt-2">
                                        <div>
                                            <div className={`text-3xl font-black ${closingStats.lossCount > 0 ? 'text-orange-900' : 'text-slate-800'}`}>{closingStats.lossCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                            {closingStats.lossCount > 0 ? <div className="text-[12px] text-orange-600 font-bold mt-1">실사 수량 확인하세요</div> : <div className="text-[12px] text-slate-400 font-semibold mt-1">모든 변동 확인됨</div>}
                                        </div>
                                    </div>
                                </div>
                                <div className={`p-4 rounded-xl border transition-all flex flex-col justify-between relative overflow-hidden ${closingStats.manualCount > 0 ? 'bg-emerald-50 border-emerald-500 shadow-sm' : 'bg-white border-emerald-200 hover:border-emerald-400 hover:shadow-md'}`}>
                                    <div className={`text-xs font-bold mb-1 flex items-center justify-between ${closingStats.manualCount > 0 ? 'text-emerald-800' : 'text-slate-600'}`}>
                                        <span className="flex items-center"><SafeIcon name="exchange-alt" size={16} className="text-emerald-500 mr-2"/>상계 및 수기조정</span>
                                    </div>
                                    <div className="flex items-end justify-between mt-2">
                                        <div>
                                            <div className={`text-3xl font-black ${closingStats.manualCount > 0 ? 'text-emerald-900' : 'text-slate-800'}`}>{closingStats.manualCount}<span className="text-sm font-bold text-slate-500 ml-1">건</span></div>
                                            <div className="text-[12px] text-emerald-600 font-bold mt-1">확인 및 승인됨</div>
                                        </div>
                                        {substHistory.length > 0 && (
                                            <button onClick={() => setUndoUi({ state: 'list' })} className="px-3 py-1.5 bg-white rounded border border-rose-200 text-rose-600 hover:bg-rose-50 font-bold text-[11px] shadow-sm transition flex items-center">
                                                <SafeIcon name="undo" size={12} className="mr-1"/> 취소 ({substHistory.length})
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50 p-6">
                        <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative fade-in">
                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                <table className="w-full text-left text-[13px] whitespace-nowrap">
                                    <thead className="sticky top-0 bg-white shadow-sm border-b border-slate-200 text-slate-500 font-bold text-[12px] z-10">
                                        <tr>
                                            <th className="py-3 px-4 w-[280px] border-r border-slate-200">상품정보 (코드/품명)</th>
                                            <th className="py-3 px-3 text-right w-20 border-r border-slate-200">기초</th>
                                            <th className="py-3 px-3 text-right w-20 text-blue-600 border-r border-slate-200">당기입고</th>
                                            <th className="py-3 px-3 text-right w-20 text-rose-600 border-r border-slate-200">당기출고</th>
                                            <th className="py-3 px-3 text-right w-24 bg-indigo-50/50 text-indigo-700 border-r border-indigo-100">전산잔량</th>
                                            <th className="py-3 px-4 text-center w-28 bg-indigo-50/50 text-indigo-700 border-r border-indigo-100">실사 수량</th>
                                            <th className="py-3 px-4 text-right w-24 border-r border-slate-200">오차(로스)</th>
                                            <th className="py-3 px-4 w-[250px] border-r border-slate-200">이슈 / 메모</th>
                                            <th className="py-3 px-4 text-center w-16">조정</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-transparent text-slate-700">
                                        {displayData.length === 0 ? (
                                            <tr><td colSpan="9" className="py-20 text-center text-slate-400 font-bold"><SafeIcon name="boxes" size={40} className="mb-3 text-slate-200 block mx-auto" />표시할 상품이 없습니다.</td></tr>
                                        ) : displayData.map((item, idx) => (
                                            <ProductRow 
                                                key={item.batchKey} item={item} idx={idx} 
                                                isLinked={linkSourceKey === item.batchKey}
                                                onStockChange={updateActualQty} 
                                                onSpacebar={handleSpacebarLink} 
                                                onBaseDataChange={handleBaseDataChange}
                                                onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                onShowTimeline={(code, name) => setTimelineModal({ isOpen: true, itemCode: code, itemName: name })}
                                            />
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* 타임라인 모달 */}
                        {timelineModal.isOpen && (
                            <TimelineModal 
                                itemCode={timelineModal.itemCode} 
                                itemName={timelineModal.itemName} 
                                historyLogs={historyLogs} 
                                onClose={() => setTimelineModal({ isOpen: false, itemCode: null, itemName: '' })} 
                            />
                        )}

                        {/* 메모 모달 */}
                        {memoModal.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[400px] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                        <h3 className="font-black text-slate-800 text-[14px] flex items-center"><SafeIcon name="edit" size={16} className="text-indigo-500 mr-2"/>조정 사유 기록</h3>
                                        <button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="text-slate-400 hover:text-slate-600"><SafeIcon name="x" size={16} /></button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <p className="text-[12px] text-slate-500 font-bold leading-relaxed">
                                            실사 수량이 전산과 다릅니다. 폐기, 분실, 샘플제공 등 오차 발생 사유를 기록하면 <span className="text-emerald-600">정상적인 조정(✅)</span>으로 승인됩니다.
                                        </p>
                                        <textarea 
                                            value={memoModal.text} 
                                            onChange={e=>setMemoModal({...memoModal, text: e.target.value})} 
                                            autoFocus 
                                            rows="3"
                                            placeholder="예: 1박스 샘플 제공, 침수로 인한 폐기 처리" 
                                            className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg text-[13px] outline-none focus:border-indigo-500 focus:ring-1 shadow-sm resize-none" 
                                            onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); } }}
                                        />
                                        <div className="flex gap-2 pt-2">
                                            <button onClick={() => setMemoModal({ isOpen: false, batchKey: null, text: '' })} className="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg hover:bg-slate-200 transition-colors text-[13px]">취소</button>
                                            <button onClick={() => { handleSaveMemo(memoModal.batchKey, memoModal.text); setMemoModal({ isOpen: false, batchKey: null, text: '' }); }} className={`flex-1 font-bold py-2.5 rounded-lg transition-all text-[13px] shadow-sm bg-indigo-600 text-white hover:bg-indigo-700`}>
                                                사유 기록 승인
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Undo 모달 */}
                        {undoUi.state === 'list' && (
                            <div className="fixed inset-0 z-[200] bg-slate-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce border border-slate-200">
                                    <div className="bg-slate-900 p-5 flex justify-between items-center text-white">
                                        <h3 className="font-black text-lg flex items-center"><SafeIcon name="history" size={18} className="text-slate-400 mr-2"/>재고조정 내역 목록</h3>
                                        <button onClick={() => setUndoUi({ state: 'closed' })} className="text-slate-400 hover:text-white transition"><SafeIcon name="x" size={24}/></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto max-h-[60vh] bg-slate-50">
                                        {substHistory.length === 0 ? (
                                            <div className="text-center text-slate-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                        ) : (
                                            <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
                                                <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                    <tr>
                                                        <th className="p-3 font-semibold">원물 (차감 내역)</th>
                                                        <th className="p-3 font-semibold">소분/대체 (증가 내역)</th>
                                                        <th className="p-3 text-right font-semibold">작업</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {[...substHistory].reverse().map(h => (
                                                        <tr key={h.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-3">
                                                                <span className="inline-block w-8 text-rose-600 font-black">-{h.sQty}</span> 
                                                                <span className="font-semibold text-slate-800">{h.sourceName}</span>
                                                            </td>
                                                            <td className="p-3">
                                                                <span className="inline-block w-8 text-blue-600 font-black">+{h.tQty}</span> 
                                                                <span className="font-semibold text-slate-800">{h.targetName}</span>
                                                            </td>
                                                            <td className="p-3 text-right">
                                                                <button onClick={() => handleUndoAction(h)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-100 hover:text-rose-600 hover:border-rose-300 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                    <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center">
                                        {substHistory.length > 0 ? (
                                            <button onClick={handleUndoAll} className="text-rose-600 font-bold hover:text-rose-800 hover:bg-rose-50 border border-transparent hover:border-rose-200 px-4 py-2 rounded-lg text-sm transition flex items-center"><SafeIcon name="trash-alt" size={14} className="mr-2"/>모두 취소</button>
                                        ) : <div></div>}
                                        <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-slate-800 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-slate-900 shadow-md transition">닫기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 💡 업로드 에러 모달 */}
                        {showUploadErrorModal && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[300] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[500px] max-h-[80vh] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-rose-50 flex justify-between items-center">
                                        <h3 className="font-black text-rose-800 text-[14px] flex items-center"><SafeIcon name="exclamation-circle" size={16} className="text-rose-500 mr-2"/>엑셀 업로드 누락/오류 보고서</h3>
                                        <button onClick={() => setShowUploadErrorModal(false)} className="text-rose-400 hover:text-rose-600"><SafeIcon name="x" size={16} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto custom-scrollbar bg-white flex-1">
                                        <p className="text-[12px] text-slate-600 mb-4 font-bold">총 <span className="text-rose-600">{uploadErrors.length}</span>건의 데이터가 양식 오류 또는 코드 불일치로 누락되었습니다. 원본 엑셀을 확인해주세요.</p>
                                        <table className="w-full text-left text-[12px]">
                                            <thead className="bg-slate-100 text-slate-600 border-b border-slate-200 sticky top-0">
                                                <tr><th className="py-2 px-3 w-16 text-center">행(Row)</th><th className="py-2 px-3 w-24">품목코드</th><th className="py-2 px-3">누락 사유</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {uploadErrors.map((err, i) => (
                                                    <tr key={i} className="hover:bg-slate-50">
                                                        <td className="py-2 px-3 text-center text-slate-400 font-mono">{err.row}</td>
                                                        <td className="py-2 px-3 font-bold text-slate-700">{err.code}</td>
                                                        <td className="py-2 px-3 text-rose-600 font-medium">{err.reason}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-end">
                                        <button onClick={() => setShowUploadErrorModal(false)} className="px-6 py-2.5 bg-slate-800 text-white rounded-lg text-[13px] font-bold shadow-md hover:bg-black transition-all">확인 및 닫기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 💡 마감 이력 조회 및 롤백 모달 */}
                        {showClosingHistory && (
                            <div className="fixed inset-0 bg-slate-900/60 z-[300] flex justify-center items-center backdrop-blur-sm fade-in">
                                <div className="bg-white w-[700px] max-h-[80vh] rounded-xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 modal-bounce">
                                    <div className="px-5 py-4 border-b border-slate-200 bg-slate-900 flex justify-between items-center text-white">
                                        <h3 className="font-black text-[15px] flex items-center"><SafeIcon name="history" size={16} className="text-indigo-400 mr-2"/>수불 마감 이력 및 롤백(Roll-back)</h3>
                                        <button onClick={() => setShowClosingHistory(false)} className="text-slate-400 hover:text-white"><SafeIcon name="x" size={16} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto custom-scrollbar bg-slate-50 flex-1">
                                        {closingSnapshots.length === 0 ? (
                                            <div className="text-center py-10 text-slate-400 font-bold">마감 이력이 없습니다.</div>
                                        ) : (
                                            <div className="space-y-4">
                                                {closingSnapshots.sort((a,b)=>new Date(b.date)-new Date(a.date)).map((snap, idx) => (
                                                    <div key={snap.id} className="bg-white border border-slate-200 rounded-xl p-5 flex flex-col gap-3 shadow-sm hover:border-indigo-300 transition-colors">
                                                        <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                                            <div className="font-black text-[14px] text-slate-800 flex items-center">
                                                                <SafeIcon name="calendar-alt" size={14} className="mr-1.5 text-slate-400"/>
                                                                {new Date(snap.date).toLocaleString('ko-KR')} 마감본
                                                                {idx === 0 && <span className="ml-2 bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[10px] font-bold">최신</span>}
                                                            </div>
                                                            <div className="text-[10px] font-mono text-slate-400">{snap.id}</div>
                                                        </div>
                                                        <div className="flex justify-between items-end pt-1">
                                                            <div className="flex gap-6 text-[12px]">
                                                                <div className="flex flex-col"><span className="text-slate-500 font-bold mb-1">총 관리 품목</span><span className="font-black text-slate-800 text-[15px]">{snap.stats?.totalItems?.toLocaleString() || 0}건</span></div>
                                                                <div className="flex flex-col"><span className="text-slate-500 font-bold mb-1">조정 발생액</span><span className="font-black text-rose-600 text-[15px]">{snap.stats?.lossValue?.toLocaleString() || 0}원</span></div>
                                                            </div>
                                                            {idx === 0 && (
                                                                <button onClick={() => handleRollback(snap)} className="px-4 py-2 bg-white border border-rose-200 text-rose-600 rounded-lg text-[12px] font-bold hover:bg-rose-50 hover:border-rose-400 transition-colors shadow-sm flex items-center">
                                                                    <SafeIcon name="undo" size={14} className="mr-1.5"/> 마감 취소 (롤백)
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-end">
                                        <button onClick={() => setShowClosingHistory(false)} className="px-6 py-2.5 bg-slate-800 text-white rounded-lg text-[13px] font-bold shadow-md hover:bg-black transition-all">닫기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
