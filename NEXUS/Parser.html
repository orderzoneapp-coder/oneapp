<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Smart Parser [v2.0]</title>
    <!-- 핵심 라이브러리 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; }
        input, textarea { user-select: auto; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🔑 0. Global Storage Keys (상수화)
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            MANAGED_ITEMS: 'merchPipeline_Managed_v2', 
            MAPPINGS: 'merchMappings_v870',
            MARGIN_RULES: 'merchMarginRules_v878',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            SYNC_TRIGGER: 'merchMaster_sync_trigger',
            PARSER_DICT: 'skuSyncParserDict_v6' 
        };

        // ==========================================
        // 🛠 SafeIcon: 아이콘 2중 안전장치
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'alert-triangle' ? 'alert-circle' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs',
                    'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open', 'file-spreadsheet': 'fa-table', 
                    'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes', 'bar-chart-3': 'fa-chart-bar', 
                    'check-circle-2': 'fa-check-circle', 'x': 'fa-times', 'upload': 'fa-upload', 'alert-triangle': 'fa-exclamation-triangle', 'download': 'fa-download',
                    'database': 'fa-database', 'shopping-cart': 'fa-shopping-cart', 'users': 'fa-users', 'megaphone': 'fa-bullhorn',
                    'pie-chart': 'fa-chart-pie', 'book-open': 'fa-address-book', 'shopping-bag': 'fa-shopping-bag', 'credit-card': 'fa-credit-card', 'line-chart': 'fa-chart-line', 'printer': 'fa-print'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB)
        // ==========================================
        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        // ==========================================
        // 🧩 1. 상수 및 유틸리티
        // ==========================================
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        const normalizeText = (text) => text ? String(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? String(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => {
            if (!str) return '';
            const match = String(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g);
            return match ? match.join('') : '';
        };

        const addTag = (oldTags, newTag) => {
            if (!newTag) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            if (!tags.includes(newTag)) tags.push(newTag);
            return tags.join(', ');
        };

        const removeTag = (oldTags, tagToRemove) => {
            if (!tagToRemove) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            return tags.filter(t => t !== tagToRemove).join(', ');
        };

        // ==========================================
        // 🧩 Components: Global Header (통합 UI - 좌측정렬 적용)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            // 1-Depth: 대분류 그룹
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            // 2-Depth: 소분류 탭 (💡 대표님 기획 반영: 워크플로우 순서 정렬 및 신규 탭 추가)
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common' },
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: '/NEXUS/partner_db', group: 'master' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: '/NEXUS/partners', group: 'master' },
                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: '/NEXUS/orders', group: 'ops' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: '/NEXUS/purchases', group: 'ops' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: '/NEXUS/sales', group: 'ops' },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/NEXUS/inventory', group: 'ops' },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: '/NEXUS/print_center', group: 'ops' },
                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: '/NEXUS/Report', group: 'admin' },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: '/NEXUS/cs', group: 'admin' }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            // 1차 카테고리 클릭 핸들러
            const handleGroupClick = (groupId) => {
                setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            };

            // 로고 클릭 핸들러 (공통 탭으로 전환)
            const handleLogoClick = (e) => {
                setSelectedGroup('common');
                onNavigate(e, '/NEXUS/Dashboard');
            };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">One Board</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "클라우드 동기화 켜짐 (가동중)"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`현재 브라우저 메모리에 다운로드된 마스터 상품 수: ${itemCount.toLocaleString()}개`}>
                                    <i className="fas fa-database text-[10px] text-slate-500"></i>
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="설정"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = tab.path === '#';
                                const isPrintCenter = tab.id === 'print-center';
                                return (
                                    <React.Fragment key={tab.id}>
                                        {isPrintCenter && <div className="w-px h-8 bg-slate-700 mx-2 mb-2"></div>}
                                        <a href={tab.path} onClick={(e) => onNavigate(e, tab.path)}
                                           className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                           ${isActive 
                                               ? 'bg-slate-50 text-indigo-700 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]' 
                                               : isPlaceholder 
                                                  ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                                  : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1E293B] hover:text-slate-200 pb-2.5'
                                           }`}
                                           style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                        >
                                            <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                            {tab.label}
                                        </a>
                                    </React.Fragment>
                                );
                            })}
                            {tabs.filter(t => t.group === selectedGroup).length === 0 && (
                                <div className="px-5 py-2.5 text-[13px] font-bold text-slate-500 pb-4">이 그룹에 할당된 메뉴가 없습니다.</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 엔진 (파서 전용)
        // ==========================================
        const IngestEngine = {
            parseTextSemantically: (rawText) => {
                let lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== '');
                const results = []; let currentItem = {};
                const pushItem = () => {
                    if (currentItem.품목명) {
                        if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, '');
                        results.push({ _id: crypto.randomUUID(), _apply: false, ...currentItem });
                    }
                    currentItem = {};
                };

                lines.forEach(line => {
                    if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^마감$/.test(line) || /이미지\s*준비중/i.test(line)) return;
                    const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                    let extractedPrice = null;
                    if (priceMatch) {
                        extractedPrice = priceMatch[1];
                        line = line.replace(priceMatch[0], '').trim();
                        if (line.endsWith('/')) line = line.slice(0, -1).trim();
                    }
                    if (extractedPrice) currentItem.입고가 = extractedPrice;
                    if (!line) { if (extractedPrice) pushItem(); return; }

                    if (!currentItem.품목명) {
                        if (line.includes(' / ')) {
                            const splitParts = line.split(' / ');
                            let namePart = splitParts[0].trim(); let specPart = splitParts.slice(1).join(' / ').trim();
                            const unitMatch = namePart.match(/(EA|BOX|포|개|박스|봉|캔|병|팩|단|마리)$/i);
                            if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } 
                            else { currentItem.품목명 = namePart; }
                            const specParts = specPart.split('/').map(s => s.trim());
                            currentItem.규격 = specParts[0] || '';
                        } else { currentItem.품목명 = line; }
                    } else {
                        if (line.includes('/')) {
                            const parts = line.split('/').map(s => s.trim());
                            if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                            if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                        } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입)/i.test(line)) {
                            currentItem.규격 = line;
                        }
                    }
                    if (extractedPrice) pushItem();
                });
                if (currentItem.품목명) pushItem();
                return results;
            }
        };

        const MatchEngine = {
            searchMasterProducts: (productsObj, keyword) => {
                if (!keyword || !keyword.trim()) return [];
                const cleanKw = keyword.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                const tokens = cleanKw.split(/\s+/).filter(t => t.length > 0);
                if (tokens.length === 0) return [];
                const results = Object.values(productsObj).map(m => {
                    const mName = String(m.품목명 || '').toLowerCase(); const mSpec = String(m.규격 || '').toLowerCase();
                    let score = 0, matchCount = 0;
                    tokens.forEach(token => {
                        if (mName.includes(token)) { score += token.length * 10; matchCount++; } 
                        else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; } 
                    });
                    if ((mName + mSpec).replace(/\s+/g, '').includes(cleanKw.replace(/\s+/g, ''))) score += 1000;
                    return { item: m, score, matchCount };
                }).filter(r => r.score > 0);
                results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
                return results.map(r => r.item);
            },
            
            runSmartMatch: (extName, extSpec, mProducts, pDict) => {
                const normExtName = normalizeText(extName);
                const normExtSpec = normalizeText(extSpec);
                const extFullText = normalizeText(extName + " " + extSpec);
                const dictKey = `${normExtName}|${normExtSpec}`;

                if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 사전학습일치' };

                let bestMatch = null; let bestScore = 0;
                const extTokens = tokenize(extName + " " + extSpec);
                const extSpecNum = extractSpec(extName + " " + extSpec);
                let perfectMatches = [];

                for (const mCode in mProducts) {
                    const m = mProducts[mCode];
                    const mBrand = String(m.브랜드 || '').trim();
                    const mName = String(m.품목명 || '').trim();
                    const mSpec = String(m.규격 || '').trim();

                    const mFullWithBrand = normalizeText(mBrand + mName + mSpec);
                    const mFullNoBrand = normalizeText(mName + mSpec);
                    const mSpecNum = extractSpec(mBrand + " " + mName + " " + mSpec);

                    let isSpecMatch = true;
                    if (extSpecNum && mSpecNum && extSpecNum !== mSpecNum) isSpecMatch = false;

                    if ((extFullText === mFullWithBrand || extFullText === mFullNoBrand) && isSpecMatch) {
                        perfectMatches.push(m);
                        continue;
                    }

                    const mTokens = tokenize(mBrand + " " + mName + " " + mSpec);
                    const intersection = extTokens.filter(t => mTokens.includes(t));
                    let score = intersection.length / Math.max(extTokens.length, mTokens.length);

                    if (!isSpecMatch) score = score * 0.1; 

                    if (score >= 0.7) {
                        if (score > bestScore) { bestScore = score; bestMatch = m; }
                    }
                }

                if (perfectMatches.length === 1) return { code: perfectMatches[0].코드, status: '🟢 완전일치' };
                if (perfectMatches.length > 1) return { code: '', status: '🟡 중복품목(선택필요)' }; 
                if (bestMatch && bestScore >= 0.7) return { code: '', status: '🟡 유사발견' };
                return { code: '', status: '🔴 불일치' };
            }
        };

        // ==========================================
        // 🧩 4. 시세관리 전용 컴포넌트들
        // ==========================================
        const SmartParserInputModal = ({ onClose, executeParser, showToast, availableTags = [] }) => {
            const [rawText, setRawText] = useState("");
            const [catalogMode, setCatalogMode] = useState(availableTags.length > 0 ? 'select' : 'input');
            const [selectedCatalog, setSelectedCatalog] = useState('');
            const [newCatalogInput, setNewCatalogInput] = useState("");
            const [forceManual, setForceManual] = useState(false);

        const ParserReviewModal = ({ onClose, onConfirm, state, actions }) => {

                    <div className="bg-white w-[900px] max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">

                            <button onClick={onClose}><SafeIcon name="x" className="text-slate-400 hover:text-white" /></button>

                        <div className="p-5 flex flex-col flex-1 overflow-hidden bg-slate-50">
                            <div className="flex-1 flex flex-col bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden fade-in">
                                <div className="px-4 py-3 bg-indigo-50 border-b border-indigo-100 flex justify-between items-center shrink-0">
                                    <span className="text-[12px] font-bold text-indigo-800"><i className="fas fa-info-circle mr-1.5"></i>파싱된 텍스트와 연결된 마스터 상품이 올바른지 확인하세요. (단가 변동 검토는 다음 단계인 '시세 관리'에서 진행됩니다.)</span>
                                    <span className="text-[11px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-black">총 {targetRows.length}건 대기중</span>
                                </div>
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-[12px] whitespace-nowrap">
                                        <thead className="bg-white sticky top-0 border-b border-slate-200 shadow-sm z-10">
                                            <tr className="text-slate-500">

                                                         item._matchStatus.includes('수동') ? <span className="bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded text-[10px] font-black">수동 연결</span> :

                                                    </td>

                                                        <div className="flex flex-col">
                                                            <span className="font-black text-emerald-800 truncate">{item['품목명']}</span>
                                                            <span className="text-[11px] text-emerald-600/70 truncate mt-0.5">{item['규격']} {item['단위'] ? `| ${item['단위']}` : ''}</span>

                                                            <span className="text-[10px] font-mono text-slate-400 mb-0.5">{item._matchCode}</span>
                                                            <span className="font-bold text-slate-800 truncate">{(masterProducts[item._matchCode]?.품목명) || item['품목명']} <span className="font-normal text-slate-500 text-[11px]">({(masterProducts[item._matchCode]?.규격) || item['규격']})</span></span>
                                                        </div>

                                                    </td>

                                            ))}
                                        </tbody>
                                    </table>
