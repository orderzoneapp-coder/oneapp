<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Valuation Hub</title>
    <!-- 핵심 라이브러리 CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 테이블 Hover 시 행 하이라이트 색상 통일 */
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #f0fdf4; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        // ==========================================
        // 🧩 1. 공통 DB & 글로벌 설정 (Core Block)
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            SYNC_TRIGGER: 'merchMaster_sync_trigger',
            HISTORY_DB: 'merchHistory_v870'
        };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: [] }); // 파이프라인에서 기본적으로 마스터 대조열은 숨김
        const getInitialVisibleUploadCols = () => ({ estimate: ['입고가', '출고가', '입고B', '도매A', '외주비', '노무비'] });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0;
        };

        const getFirstValidStr = (objList, keys) => {
            for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return '';
        };

        const isValidSubItemCode = (code) => {
            if (!code) return false; const s = String(code).trim();
            return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null';
        };

        // IndexedDB Wrapper
        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        // SafeIcon Wrapper
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [ kebabName, name, name==='cloud-download'?'download-cloud':name, name==='cloud-upload'?'upload-cloud':name, name==='bar-chart-3'?'bar-chart':name ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'database':'fa-database', 'upload':'fa-upload', 'pie-chart':'fa-chart-pie', 'shopping-cart':'fa-shopping-cart', 'users':'fa-users', 'megaphone':'fa-bullhorn', 'book-open':'fa-address-book', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'printer':'fa-print', 'search':'fa-search', 'plus':'fa-plus', 'trash-alt':'fa-trash-alt', 'edit':'fa-edit', 'save':'fa-save', 'folder-open':'fa-folder-open', 'file-excel':'fa-file-excel', 'eye-slash':'fa-eye-slash', 'redo-alt':'fa-redo-alt', 'plus-square':'fa-plus-square', 'file-invoice':'fa-file-invoice', 'chevron-down':'fa-chevron-down', 'chevron-right':'fa-chevron-right', 'file-export':'fa-file-export', 'magic':'fa-magic', 'desktop':'fa-desktop', 'sign-in-alt':'fa-sign-in-alt', 'calculator':'fa-calculator', 'tags':'fa-tags', 'link':'fa-link', 'broom':'fa-broom', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'search-dollar':'fa-search-dollar', 'list':'fa-list', 'arrow-up':'fa-arrow-up', 'arrow-down':'fa-arrow-down', 'star':'fa-star', 'equals':'fa-equals' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 2. 공통 UI 컴포넌트 (GNB - V2.2 최신 스타일 적용)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [ { id: 'master', label: '정보 관리', icon: 'database' }, { id: 'ops', label: '운영 관리', icon: 'truck' }, { id: 'admin', label: '인사이트', icon: 'bar-chart-3' } ];
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: '/NEXUS/wip?tab=guide', group: 'common', isReady: false },
                
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: '/NEXUS/partner_db', group: 'master', isReady: false },
                { id: 'partners', label: '거래처 관리', icon: "users", path: '/NEXUS/partners', group: 'master', isReady: true },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: '/NEXUS/orders', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: '/NEXUS/purchases', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: '/NEXUS/sales', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/NEXUS/inventory', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: '/NEXUS/print_center', group: 'ops', isReady: false },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: '/NEXUS/Report', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: '/NEXUS/cs', group: 'admin', isReady: false }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, '/NEXUS/Dashboard', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick}>
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.2</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">VALUATION HUB</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)} className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5 ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>
                                    {isProcessing ? <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i> : <div className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></div>}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`마스터 DB 상품 수: ${itemCount.toLocaleString()}개`}>
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="설정"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                       className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                       ${isActive 
                                           ? 'bg-white text-indigo-600 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]' 
                                           : isPlaceholder 
                                              ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                              : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1E293B] hover:text-slate-200 pb-2.5'
                                       }`}
                                       style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🧩 3. V1.2 코어 엔진 (Pricing & Parser)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => ruleWh === '*' || ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean).some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            const matchUnit = (ruleUnit, targetUnit) => ruleUnit === '*' || ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean).some(s => targetUnit === s || targetUnit.includes(s));

            let bestRule = { rate: 10, type: 'divide' }, bestScore = -1;
            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0; if (r.whCode !== '*') score += 2; if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            let calcOutPrice = totalCost;
            if (bestRule.type === 'divide') {
                const safeRate = Math.min(bestRule.rate, 99.99); calcOutPrice = totalCost / (1 - (safeRate / 100));
            } else calcOutPrice = totalCost * (1 + (bestRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice, '시중가': calcOutPrice };
            const providedOutPrice = parseNum(currentFinalData?.['출고가']), mIn = parseNum(mItem?.['입고가']), mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']), extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {

            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);

                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }

                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) parsedData.push(obj);
                    } resolve(parsedData);

        // ==========================================

        const EditableCell = React.memo(({ rowCode, initialVal, field, linkedMasterField, mVal, onUpdateCell }) => {
            const isNum = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
            const [val, setVal] = useState(initialVal); const [isFocused, setIsFocused] = useState(false);
            useEffect(() => { if(!isFocused) setVal(initialVal); }, [initialVal, isFocused]);
            const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNum;
            const onBlur = () => { setIsFocused(false); if(String(val)!==String(initialVal)) onUpdateCell(rowCode, field, linkedMasterField, val); };
            
            const handleKeyDown = (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    if (e.key === 'ArrowLeft' && e.target.selectionStart !== 0) return;
                    if (e.key === 'ArrowRight' && e.target.selectionEnd !== e.target.value.length) return;

                    if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) e.preventDefault();
                    
                    e.target.blur();
                    const td = e.target.closest('td'); const tr = td.closest('tr'); const tbody = tr.closest('tbody');
                    const tds = Array.from(tr.querySelectorAll('td:has(input[type="text"])'));
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.querySelectorAll('tr.table-row-hover'));
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx; let nextColIdx = colIdx;

                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);
                    if (e.key === 'ArrowLeft') { e.preventDefault(); nextColIdx = Math.max(0, colIdx - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault(); nextColIdx = Math.min(tds.length - 1, colIdx + 1); }

                    if (nextRowIdx !== rowIdx || nextColIdx !== colIdx) {
                        const nextTr = trs[nextRowIdx];
                        if (nextTr) {
                            let nextInput;
                            if (e.key === 'Enter') nextInput = nextTr.querySelector('input[data-field="입고가"]') || nextTr.querySelector('td:has(input[type="text"]) input');
                            else { const nextTds = Array.from(nextTr.querySelectorAll('td:has(input[type="text"])')); nextInput = nextTds[nextColIdx]?.querySelector('input'); }
                            if (nextInput) { nextInput.focus(); setTimeout(() => nextInput.select(), 0); }
                        }
                    }
                }
            };

            return (
                <td className={`px-2 py-1.5 border-r border-[#e8eaed] ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/60' : ''}`}>
                    <input type="text" data-field={field} value={val==="오류"?"":val} placeholder={mVal||''} onChange={e=>setVal(e.target.value)} onFocus={e=>{setIsFocused(true); setTimeout(()=>e.target.select(),0);}} onBlur={onBlur} onKeyDown={handleKeyDown} onClick={e=>e.target.select()} className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 focus:ring-indigo-300 rounded px-1.5 py-1 text-[13px] outline-none ${isNum?'text-right':'truncate text-center'} ${isDiff?'text-indigo-700 font-bold':'text-slate-700'}`} />
                </td>
            );
        });

        const MemoizedTableRow = React.memo(({ row, idx, isSel, mItem, isEstimateUploaded, visMasterCols, visUploadCols, masterLinksEst, onToggleSelection, onUpdateCell }) => {
            const uploadName = row.finalData?.['품목명'] !== undefined ? row.finalData['품목명'] : (row.sources?.['estimate']?.['품목명'] || '');
            const uploadSpec = row.finalData?.['규격'] !== undefined ? row.finalData['규격'] : (row.sources?.['estimate']?.['규격'] || '');
            const dName = uploadName || mItem.품목명 || '[미등록]';
            const dSpec = uploadSpec || mItem.규격 || '';
            const rowCode = row.코드 || '';

            return (
                <tr className={`table-row-hover transition-colors ${isSel ? 'table-row-selected' : ''}`} onClick={() => onToggleSelection(rowCode)}>
                    {/* 상품정보 열 (이미지2 UI 적용) */}
                    <td className={`sticky z-20 px-4 py-3 border-r border-[#e8eaed] min-w-[280px] w-[280px] max-w-[280px] bg-white`} style={{left:0}}>
                        <div className="flex flex-col w-full overflow-hidden">
                            <span className="text-[10px] font-mono text-indigo-400 mb-0.5">{rowCode}</span>
                            <div className="flex items-baseline w-full min-w-0 overflow-hidden">
                                <span className={`text-[13px] font-bold truncate text-slate-800 ${!mItem.품목명 ? 'text-rose-500' : ''}`} title={dName}>{dName}</span>
                                {dSpec && <span className="text-[11px] text-slate-400 truncate ml-1.5 shrink-0 max-w-[40%]" title={dSpec}>({dSpec})</span>}
                            </div>
                        </div>
                    </td>

                    {/* 마스터 열 */}
                    {!isEstimateUploaded ? (
                        visMasterCols.map(h => {
                            const isNum = NUMERIC_HEADERS.includes(h);
                            const mVal = mItem[h] !== undefined && mItem[h] !== '' ? (isNum ? parseNum(mItem[h]).toLocaleString() : mItem[h]) : '-';
                            return (
                                <td key={`idle-td-${h}`} className={`px-2 py-1.5 border-r border-[#e8eaed] text-slate-600 ${getCellWidthClass(h)} ${isNum ? 'text-right font-medium' : 'text-center'}`}>
                                    <div className="truncate w-full">{mVal}</div>
                                </td>
                            );
                        })
                    ) : (
                        <>
                            {visMasterCols.map(h => {
                                const isNum = NUMERIC_HEADERS.includes(h);
                                const mVal = mItem[h];
                                let displayVal = mVal;
                                let isChanged = false;

                                if (row.finalData && row.finalData[h] !== undefined) {
                                    if (isNum && parseNum(row.finalData[h]) !== parseNum(mVal)) { displayVal = row.finalData[h]; isChanged = true; } 
                                    else if (!isNum && String(row.finalData[h]) !== String(mVal)) { displayVal = row.finalData[h]; isChanged = true; }
                                }
                                const formattedVal = displayVal !== undefined && displayVal !== '' ? (isNum ? parseNum(displayVal).toLocaleString() : displayVal) : '-';
                                return (
                                    <td key={`pm-d-${h}`} className={`px-2 py-1.5 border-r border-[#e8eaed] transition-colors ${getCellWidthClass(h)} ${isChanged ? 'bg-amber-50 text-amber-800' : 'text-slate-600'} ${isNum ? 'text-right font-medium' : 'text-center'}`}>
                                        <div className="truncate w-full">{formattedVal}</div>
                                    </td>
                                );
                            })}
                            
                            {/* 작업/업로드 열 */}
                            {visUploadCols.map(h => {
                                const linkedMasterField = masterLinksEst[h];
                                const mVal = linkedMasterField && rowCode ? mItem[linkedMasterField] : undefined;
                                const initialVal = row.finalData?.[h] !== undefined ? row.finalData[h] : (row.sources?.['estimate']?.[h] || '');
                                return <EditableCell key={`p-u-e-${h}`} rowCode={rowCode} initialVal={initialVal} field={h} linkedMasterField={linkedMasterField} mVal={mVal} onUpdateCell={onUpdateCell} />;
                            })}
                        </>
                    )}
                </tr>
            );
        });

        const ExcelDataGrid = ({ state, actions }) => {
            const { isEstimateUploaded, fullDisplayRows, visibleMasterCols, visibleUploadCols, masterProducts, masterLinksEst, selectedRows } = state;
            
            const [scrollTop, setScrollTop] = useState(0);
            const handleScroll = useCallback((e) => setScrollTop(e.target.scrollTop), []);

            const ROW_HEIGHT = 56; // 대략적인 행 높이 py-3 기준
            const BUFFER_SIZE = 15; 
            const VIEWPORT_HEIGHT = 800; 

            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_SIZE);
            const endIndex = Math.min(fullDisplayRows.length, Math.floor((scrollTop + VIEWPORT_HEIGHT) / ROW_HEIGHT) + BUFFER_SIZE);

            const displayRows = fullDisplayRows.slice(startIndex, endIndex);
            const topPadding = startIndex * ROW_HEIGHT;
            const bottomPadding = Math.max(0, (fullDisplayRows.length - endIndex) * ROW_HEIGHT);

            const visMaster = visibleMasterCols.estimate?.filter(h=>!['품목코드','품목명','규격'].includes(h)) || [];
            const visUpload = visibleUploadCols.estimate?.filter(h=>h!=='품목코드') || [];

            return (
                <div className="bg-white border border-slate-200 shadow-[0_2px_10px_rgba(0,0,0,0.02)] h-full flex flex-col overflow-hidden relative">
                    <div className="flex-1 overflow-auto custom-scrollbar relative" onScroll={handleScroll}>
                        <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                            <thead className="text-[12px] font-bold text-slate-500 bg-[#fdfcfc]">
                                <tr>
                                    <th className="sticky top-0 z-40 bg-[#fdfcfc] px-4 py-3 border-b border-r border-[#e8eaed] shadow-[0_1px_2px_rgba(0,0,0,0.02)] min-w-[280px] w-[280px] max-w-[280px]" style={{left:0}}>
                                        상품정보 (코드/품명/규격)
                                    </th>
                                    {visMaster.map(h=><th key={`m-${h}`} className={`sticky top-0 z-30 bg-[#fdfcfc] px-3 py-3 border-b border-r border-[#e8eaed] shadow-[0_1px_2px_rgba(0,0,0,0.02)] text-center ${getCellWidthClass(h)}`}>{h}</th>)}
                                    {visUpload.map(h=><th key={`u-${h}`} className={`sticky top-0 z-30 bg-[#fdfcfc] px-3 py-3 border-b border-r border-[#e8eaed] shadow-[0_1px_2px_rgba(0,0,0,0.02)] text-center ${getCellWidthClass(h)}`}>{h}</th>)}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-[#f1f3f5] text-slate-700">
                                {fullDisplayRows.length===0 ? (
                                    <tr><td colSpan="50" className="p-16 text-center text-slate-400 font-bold"><i className="fas fa-file-excel text-5xl mb-4 text-slate-200 block"></i>데이터가 없습니다. 엑셀을 업로드하세요.</td></tr>
                                ) : (
                                    <>
                                        {topPadding > 0 && <tr style={{ height: `${topPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                        
                                        {displayRows.map((row, idx) => {
                                            const mItem = masterProducts[row.코드] || {}; const isSel = selectedRows.has(row.코드);
                                            return <MemoizedTableRow key={row.코드} row={row} idx={idx} isSel={isSel} mItem={mItem} isEstimateUploaded={isEstimateUploaded} visMasterCols={visMaster} visUploadCols={visUpload} masterLinksEst={masterLinksEst} onToggleSelection={actions.toggleRowSelection} onUpdateCell={actions.handleUpdateCell} />;
                                        })}
                                        
                                        {bottomPadding > 0 && <tr style={{ height: `${bottomPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ExportModal = ({ onClose, executeExport }) => {
            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[500px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">
                            <h2 className="font-black text-[16px]"><i className="fas fa-file-export text-amber-400 mr-2"></i>데이터 출력 및 보고서 생성</h2>
                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>
                        <div className="p-6 flex flex-col gap-4">
                            <button onClick={() => { executeExport({title: '통합 엑셀 다운로드'}); onClose(); }} className="w-full flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all group text-left">
                                <div className="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xl mr-4 group-hover:scale-110 transition-transform"><i className="fas fa-file-excel"></i></div>
                                <div>
                                    <div className="font-black text-slate-800 text-[14px]">통합 엑셀 다운로드 (ERP & 쇼핑몰)</div>
                                    <div className="text-slate-500 text-[11px] mt-1">ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드합니다.</div>
                                </div>
                            </button>
                            <button onClick={onClose} className="w-full mt-2 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">취소</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CategorySaveModal = ({ onClose, onSave }) => {
            const [name, setName] = useState('');
            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[400px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">
                            <h2 className="font-black text-[16px]"><i className="fas fa-save text-blue-400 mr-2"></i>현재 화면 견적서로 저장</h2>
                            <button onClick={onClose}><i className="fas fa-times text-slate-400 hover:text-white"></i></button>
                        </div>
                        <div className="p-6 flex flex-col gap-4">
                            <div className="text-[13px] text-slate-600 font-bold mb-2">현재 화면에 띄워진 상품 목록을 언제든 엑셀 없이 불러올 수 있도록 견적서로 묶어 저장합니다.</div>
                            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="저장할 견적서 이름을 입력하세요 (예: A업체 주말견적)" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-[13px] font-bold outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200" autoFocus onKeyDown={(e) => e.key === 'Enter' && onSave(name)} />
                            <div className="flex gap-2 mt-4">
                                <button onClick={onClose} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">취소</button>
                                <button onClick={() => onSave(name)} className="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors">저장하기</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 7. 메인 애플리케이션 (Main Entry)
        // ==========================================
        function App() {
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false); const [processMsg, setProcessMsg] = useState('');
            const [showSettings, setShowSettings] = useState(false); const [showReviewModal, setShowReviewModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            
            const config = useMerchConfig();
            const data = useMerchData();
            const [selectedRows, setSelectedRows] = useState(new Set());

            const [globalSearch, setGlobalSearch] = useState('');
            const [selectedCatalog, setSelectedCatalog] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);
            
            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!path || path === '#' || path === '' || !isReady) {
                    showToast("⚠️ 해당 페이지는 현재 준비 중이거나 경로가 올바르지 않습니다.");
                    return;
                }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 이동 시뮬레이션: [${path}]`);
                }
            }, [showToast]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록']; delete newMaster[code]['상품태그']; count++;
                        }
                    }
                    data.setMasterProducts(newMaster);
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다. (반영 후 클라우드 백업을 눌러주세요)`);
                }
            }, [data.masterProducts, showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...data.masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                data.setMasterProducts(newMaster);
                setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [data.masterProducts, showToast]);

            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                data.setMasterProducts({});
                await setIDB(STORAGE_KEYS.MASTER_DB, {});
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다.");
            };

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(data.masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [data.masterProducts]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('엑셀 시세표 분석 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    const curMap = config.mappings['estimate'] || {}; const headerCache = createHeaderMap(Object.keys(excelData[0]), curMap);
                    
                    let newManaged = { ...data.managedItems }; let count = 0;
                    excelData.forEach(row => {
                        const codeKey = headerCache['품목코드']; const code = row[codeKey];
                        if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                        
                        if (!newManaged[code]) newManaged[code] = { 코드: code, sources: { estimate: {} }, finalData: {} };
                        let mItem = newManaged[code];
                        const nameKey = headerCache['품목명']; mItem.sources['estimate']['품목명'] = nameKey ? row[nameKey] : '';
                        
                        Object.keys(curMap).forEach(h => {
                            const actualKey = headerCache[h];
                            if(actualKey) {
                                const val = row[actualKey];
                                if (val !== undefined && val !== '') {
                                    const isNum = NUMERIC_HEADERS.includes(config.masterLinks['estimate']?.[h]) || NUMERIC_HEADERS.includes(h);
                                    mItem.sources['estimate'][h] = isNum ? parseNum(val) : val;
                                    if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNum ? parseNum(val) : val;
                                }
                            }
                        });
                        
                        delete mItem.finalData['출고가'];
                        const pIn = parseNum(mItem.sources['estimate']['입고가'] || data.masterProducts[code]?.['입고가']);
                        if (pIn > 0) mItem.finalData = calculatePricesEngine(pIn, data.masterProducts[code]||{}, mItem.finalData, config.marginRules, false);
                        count++;
                    });
                    data.setManagedItems(newManaged); showToast(`✅ ${count}건 데이터 로드 완료`);
                } catch(error) { showToast("❌ 업로드 오류: " + error.message); } finally { e.target.value = ''; setIsProcessing(false); setProcessMsg(''); }
            };

            const handleUpdateCell = useCallback((code, field, linkedMasterField, value) => {
                data.setManagedItems(prev => {
                    let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: value } };
                    if (['입고가', '출고가', '외주비', '노무비'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        const pInRaw = (field === '입고가' || linkedMasterField === '입고가') ? value : (currentItem.finalData['입고가'] ?? currentItem.sources['estimate']?.['입고가'] ?? data.masterProducts[code]?.['입고가'] ?? 0);
                        currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), data.masterProducts[code] || {}, currentItem.finalData, config.marginRules, true);
                    } return { ...prev, [code]: currentItem };
                });
            }, [data, config.marginRules]);

            const handleCommitEstimate = useCallback((targetCodes) => {
                if (targetCodes.length === 0) return;
                let newMaster = { ...data.masterProducts }, commitCount = 0, localLogs = []; const nowStr = new Date().toLocaleString('ko-KR');

                targetCodes.forEach(code => {
                    const item = data.managedItems[code]; if (!item || !item.코드) return;
                    const oldItem = data.masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            const linked = config.masterLinks['estimate']?.[field] || (MASTER_HEADERS.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '' && item.finalData[field] !== '오류') {
                                const newVal = NUMERIC_HEADERS.includes(linked) ? parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = NUMERIC_HEADERS.includes(linked) ? parseNum(oldItem[linked]) : oldItem[linked];
                                if (['입고가', '출고가'].includes(linked) && oldVal > 0 && oldVal !== newVal) {
                                    localLogs.push({ id: generateUUID(), timestamp: nowStr, code: code, name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', field: linked, oldVal, newVal, diff: newVal - oldVal });
                                } newMaster[item.코드][linked] = newVal;
                            }
                        });
                    } commitCount++;
                });

                if (localLogs.length > 0) data.addHistoryLogs(localLogs);
                data.setMasterProducts(newMaster); data.setManagedItems({}); setSelectedRows(new Set()); showToast(`✅ ${commitCount}건 마스터 단가 갱신 완료.`);
            }, [data, config.masterLinks, showToast]);

            const executeExport = useCallback(() => { 
                showToast("✅ ERP / 쇼핑몰 엑셀이 다운로드되었습니다."); 
                setShowExportModal(false);
            }, [showToast]);

            const toggleAllRows = () => { const rows = Object.values(data.managedItems); if(selectedRows.size === rows.length) setSelectedRows(new Set()); else setSelectedRows(new Set(rows.map(r=>r.코드))); };
            const toggleRowSelection = (code) => { setSelectedRows(p => { const n = new Set(p); if(n.has(code)) n.delete(code); else n.add(code); return n; }); };
            const handleRemoveFromWorkspace = () => {
                if (selectedRows.size === 0) return showToast('⚠️ 숨길 항목을 선택하세요.');
                data.setManagedItems(p=>{const n={...p}; selectedRows.forEach(c => delete n[c]); return n;});
                setSelectedRows(new Set());
                showToast('✅ 선택한 항목이 화면에서 숨겨졌습니다.');
            };

            const handleLoadCategory = useCallback((categoryName) => {
                setSelectedCategory(categoryName);
                if (!categoryName) return;

                setIsProcessing(true);
                setProcessMsg('카탈로그 및 견적서 병합 중...');
                
                setTimeout(() => {
                    let newManaged = {};
                    
                    Object.values(data.masterProducts).forEach(mItem => {
                        let isMatch = false;

                        const catStr = mItem['견적서'] || mItem['카테고리'] || '';
                        if (catStr.split(',').map(c => c.trim()).includes(categoryName)) {
                            isMatch = true;
                        }

                        if (selectedCatalog) {
                            const catalogStr = mItem['카탈로그'] || '';
                            if (catalogStr.split(',').map(c => c.trim()).includes(selectedCatalog)) {
                                isMatch = true;
                            }
                        }

                        if (isMatch) {
                            newManaged[mItem.코드] = {
                                코드: mItem.코드,
                                sources: { estimate: {} },
                                finalData: calculatePricesEngine(parseNum(mItem['입고가']), mItem, {}, config.marginRules, false)
                            };
                        }
                    });
                    
                    data.setManagedItems(newManaged);
                    setSelectedRows(new Set()); 
                    
                    if (selectedCatalog) {
                        showToast(`✅ [${selectedCatalog}] 카탈로그와 [${categoryName}] 견적서가 합집합으로 병합되었습니다. (${Object.keys(newManaged).length}건)`);
                    } else {
                        showToast(`✅ [${categoryName}] 견적서 로드 완료! (${Object.keys(newManaged).length}건)`);
                    }
                    
                    setIsProcessing(false);
                    setProcessMsg('');
                }, 100);
            }, [data.masterProducts, config.marginRules, selectedCatalog, data.setManagedItems]);

            const handleSaveAsCategory = useCallback((categoryName) => {
                if (!categoryName || !categoryName.trim()) return;
                const rows = Object.values(data.managedItems);
                if (rows.length === 0) return showToast("⚠️ 견적서로 저장할 상품이 없습니다.");

                setIsProcessing(true);
                setProcessMsg('견적서 저장 중...');

                setTimeout(() => {
                    let newMaster = { ...data.masterProducts };
                    let count = 0;
                    const safeName = categoryName.trim();

                    rows.forEach(row => {
                        const code = row.코드;
                        if (!newMaster[code]) return;
                        
                        newMaster[code] = { ...newMaster[code] };
                        const currentCategories = newMaster[code]['견적서'] || newMaster[code]['카테고리'] || '';
                        const tags = currentCategories.split(',').map(s => s.trim()).filter(Boolean);
                        
                        if (!tags.includes(safeName)) {
                            tags.push(safeName);
                            newMaster[code]['견적서'] = tags.join(', ');
                            delete newMaster[code]['카테고리']; // Migration
                            count++;
                        }
                    });

                    data.setMasterProducts(newMaster);
                    setShowCategoryModal(false);
                    showToast(`✅ ${count}개 상품이 [${safeName}] 견적서에 추가/저장되었습니다.`);
                    setIsProcessing(false);
                    setProcessMsg('');
                }, 100);
            }, [data, showToast]);

            const handleReset = useCallback(() => {
                data.setManagedItems({}); 
                setSelectedRows(new Set()); 
                setGlobalSearch(''); 
                setSelectedCatalog(''); 
                setSelectedCategory(''); 
                showToast('작업 화면이 초기화 되었습니다.');
            }, [data.setManagedItems, showToast]);

            const fullDisplayRows = useMemo(() => {
                let baseList = [];
                const isEstimateUploaded = Object.keys(data.managedItems).length > 0;
                
                if (isEstimateUploaded) {
                    baseList = Object.values(data.managedItems); 
                } else {
                    baseList = Object.values(data.masterProducts).map(m => data.managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });

                    if (selectedCatalog) {
                        baseList = baseList.filter(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const tagStr = mItem['카탈로그'] || '';
                            return tagStr.split(',').map(t => t.trim()).includes(selectedCatalog);
                        });
                    }

                    if (selectedCategory) {
                        baseList = baseList.filter(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const tagStr = mItem['견적서'] || mItem['카테고리'] || '';
                            return tagStr.split(',').map(t => t.trim()).includes(selectedCategory);
                        });
                    }
                }

                if (globalSearch) {
                    const cleanKeyword = globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = cleanKeyword.split(/\s+/).filter(t => t.length > 0);
                    if (tokens.length > 0) {
                        baseList = baseList.map(item => {
                            const mItem = data.masterProducts[item.코드] || {};
                            const sourceItem = item.sources?.['estimate'] || {};
                            const finalItem = item.finalData || {};
                            const getVal = (key) => String(finalItem[key] !== undefined ? finalItem[key] : (sourceItem[key] !== undefined ? sourceItem[key] : (mItem[key] || ''))).toLowerCase();
                            
                            const cName = getVal('품목명'); 
                            const cSpec = getVal('규격');
                            const cVendor = getVal('구매처'); 
                            const cWh = getVal('창고');
                            const cCode = String(item.코드 || '').toLowerCase();
                            
                            let score = 0;
                            tokens.forEach(token => {
                                if (cName.includes(token)) score += 10;
                                else if (cCode.includes(token)) score += 8;
                                else if (cVendor.includes(token)) score += 6;
                                else if (cSpec.includes(token)) score += 5;
                                else if (cWh.includes(token)) score += 4;
                            });
                            return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0);
                        baseList.sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else {
                    baseList.sort((a, b) => String(a.코드).localeCompare(String(b.코드)));
                }
                return baseList;
            }, [data.managedItems, data.masterProducts, globalSearch, selectedCatalog, selectedCategory]);

            const appState = { fullDisplayRows, visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts: data.masterProducts, masterLinksEst: config.masterLinks['estimate']||{}, selectedRows, isEstimateUploaded: Object.keys(data.managedItems).length > 0, globalSearch, selectedCatalog, selectedCategory, isProcessing };
            const appActions = { handleUpdateCell, toggleAllRows, toggleRowSelection, handleRemoveFromWorkspace, setShowReviewModal, setShowExportModal, setShowCategoryModal, setGlobalSearch, setSelectedCatalog, handleReset, handleFileUpload, handleLoadCategory, showToast };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-[#f1f5f9] relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader activeTab="pipeline" itemCount={Object.keys(data.masterProducts).length} isProcessing={isProcessing} processMsg={processMsg} onOpenSettings={() => setShowSettings(true)} onPush={()=>{}} onPull={()=>{}} onNavigate={handleNavigate} />
                    
                    <MainToolbar state={appState} actions={appActions} availableCatalogs={availableCatalogs} availableCategories={availableCategories} />

                    <main className="flex-1 overflow-hidden bg-slate-50 p-6 flex flex-col">
                        <ExcelDataGrid state={appState} actions={appActions} />
                    </main>

                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                    {showReviewModal && <ReviewModal onClose={() => setShowReviewModal(false)} onConfirm={handleCommitEstimate} displayRows={fullDisplayRows} masterProducts={data.masterProducts} />}
                    {showCategoryModal && <CategorySaveModal onClose={() => setShowCategoryModal(false)} onSave={handleSaveAsCategory} />}
                    {showExportModal && <ExportModal onClose={() => setShowExportModal(false)} executeExport={executeExport} />}

                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                            <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
