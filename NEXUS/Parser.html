                            </div>
                        </div>

                        <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center shrink-0">
                            <div className="text-[11px] text-slate-500 font-bold"><i className="fas fa-lightbulb text-amber-500 mr-1"></i>매핑이 정확한지 확인 후 파이프라인으로 전송하세요.</div>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-5 py-2.5 bg-slate-100 border border-slate-200 text-slate-600 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기</button>
                                <button onClick={() => { onConfirm(); onClose(); }} className="px-6 py-2.5 bg-[#0B1021] text-white font-black rounded-lg hover:bg-black shadow-sm transition-colors flex items-center">
                                    <SafeIcon name="file-spreadsheet" size={16} className="mr-1.5" /> 파이프라인으로 전송 (시세 관리 열기)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ErpCodeInputModal = ({ onClose, onSubmit, targetItem }) => {
            const [code, setCode] = useState('');
            if (!targetItem) return null;

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-[300] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[420px] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-200">
                        <div className="px-5 py-4 border-b border-gray-200 flex justify-between items-center bg-slate-50">
                            <h2 className="font-bold text-slate-800 text-[15px]"><i className="fas fa-barcode text-indigo-500 mr-2"></i>ERP 코드로 신규 등록</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div className="bg-indigo-50/50 border border-indigo-100 rounded-lg p-4 text-[13px] text-indigo-800 leading-relaxed shadow-inner">
                                <span className="font-black text-indigo-900">[{targetItem['품목명']}]</span> 상품을 마스터 DB에 <strong className="text-rose-500">신규 등록</strong>합니다.<br/>
                                먼저 ERP 시스템에서 해당 상품을 생성하신 후, <strong className="text-indigo-900">발급된 품목코드(SKU)</strong>를 붙여넣어주세요.
                            </div>
                            <div>
                                <label className="block text-[12px] font-black text-slate-600 mb-2">ERP 품목코드 (SKU)</label>
                                <input 
                                    type="text" 
                                    value={code} 
                                    onChange={e => setCode(e.target.value)} 
                                    autoFocus 
                                    placeholder="예: 101012123" 
                                    className="w-full border-2 border-indigo-100 rounded-lg px-4 py-3 text-[14px] font-bold outline-none focus:border-indigo-500 transition-colors placeholder-slate-300" 
                                    onKeyDown={e => e.key === 'Enter' && code.trim() && onSubmit(code)} 
                                />
                            </div>
                            <div className="flex gap-2 pt-2">
                                <button onClick={onClose} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors text-[13px]">취소</button>
                                <button onClick={() => code.trim() && onSubmit(code)} disabled={!code.trim()} className={`flex-1 font-bold py-3 rounded-xl transition-all text-[13px] shadow-sm ${code.trim() ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}>
                                    등록 및 연결
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🧩 3. 훅 및 상태 관리
        // ==========================================
        const useParserApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [parserDict, setParserDict] = useState(() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.PARSER_DICT)) || {}; } catch(e){ return {}; }});

            useEffect(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => {
                    if (data) setMasterProducts(data);
                }).catch(console.error);
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) {
                        getIDB(STORAGE_KEYS.MASTER_DB).then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMaster = async (data) => {
                setMasterProducts(data);
                try {
                    await setIDB(STORAGE_KEYS.MASTER_DB, data);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                }
            };

            const saveDict = (data) => {
                setParserDict(data);
                localStorage.setItem(STORAGE_KEYS.PARSER_DICT, JSON.stringify(data));
            };

            const [parserBuffer, setParserBuffer] = useState([]);
            const [currentTag, setCurrentTag] = useState(''); 
            
            const [activeTab, setActiveTab] = useState('matched'); 
            const [showInputModal, setShowInputModal] = useState(true); 
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showErpModal, setShowErpModal] = useState(false);

            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            const [globalSearch, setGlobalSearch] = useState('');
            const [targetId, setTargetId] = useState(null); 
            const [selectedMissingCodes, setSelectedMissingCodes] = useState(new Set());
            const [processedCodes, setProcessedCodes] = useState(new Set());

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                masterProducts, saveMaster, parserDict, saveDict,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                activeTab, setActiveTab, showInputModal, setShowInputModal,
                showReviewModal, setShowReviewModal, showErpModal, setShowErpModal,
                toastMsg, showToast, isProcessing, setIsProcessing, processMsg, setProcessMsg,
                globalSearch, setGlobalSearch, targetId, setTargetId,
                selectedMissingCodes, setSelectedMissingCodes, processedCodes, setProcessedCodes
            };
        };

        // ==========================================
        // 🧩 4. 비즈니스 액션
        // ==========================================
        const useParserActions = (appState) => {
            const { 
                masterProducts, saveMaster, parserDict, saveDict,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                setActiveTab, setShowInputModal, showToast, setIsProcessing, setProcessMsg,
                setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes,
                processedCodes, setProcessedCodes, setShowErpModal
            } = appState;

            const executeParser = useCallback((rawText, tag, forceManual = false) => {
                setShowInputModal(false); 
                setIsProcessing(true); 
                setProcessMsg("AI 분석 및 스마트 매칭 중...");
                setCurrentTag(tag);
                setProcessedCodes(new Set());

                setTimeout(() => {
                    try {
                        const parsedData = IngestEngine.parseTextSemantically(rawText);
                        const results = []; 
                        
                        parsedData.forEach(rowData => {
                            const extName = rowData['품목명'] || '';
                            const extSpec = rowData['규격'] || '';
                            
                            let matchResult;
                            if (forceManual) matchResult = { code: '', status: '🔴 불일치' };
                            else matchResult = MatchEngine.runSmartMatch(extName, extSpec, masterProducts, parserDict);
                            
                            rowData._matchCode = matchResult.code; 
                            rowData._matchStatus = matchResult.status;
                            if(matchResult.code) { rowData.코드 = matchResult.code; }
                            
                            rowData.finalData = {};
                            const pInNum = rowData['입고가'] ? parseNum(rowData['입고가']) : 0;
                            rowData.finalData['입고가'] = pInNum;
                            
                            results.push(rowData);
                        });
                        
                        setParserBuffer(results); 
                        setActiveTab(forceManual ? 'unmatched' : 'matched'); 
                        setTargetId(null); 
                        setGlobalSearch(''); 
                        setSelectedMissingCodes(new Set());

                        showToast(forceManual ? '✅ 수동 매핑 모드로 로드되었습니다.' : '✅ 텍스트 분석 및 매칭이 완료되었습니다.');
                    } catch (error) {
                        console.error(error);
                        showToast("❌ 텍스트 분석 중 예기치 않은 오류가 발생했습니다.");
                    } finally {
                        setIsProcessing(false); 
                        setProcessMsg(''); 
                    }
                }, 100);
            }, [masterProducts, parserDict]);

            const handleApplyMatched = useCallback(async () => {
                const toApply = parserBuffer.filter(r => r._apply && r._matchCode);
                if (toApply.length === 0) {
                    showToast("⚠️ 파이프라인으로 보낼 항목이 없습니다.");
                    return false;
                }

                setIsProcessing(true); setProcessMsg("파이프라인으로 전송 준비 중...");

                try {
                    let newMaster = { ...masterProducts };
                    let newDict = { ...parserDict };
                    let itemsToPipeline = {};

                    const existingPipeline = await getIDB(STORAGE_KEYS.MANAGED_ITEMS) || {};
                    itemsToPipeline = { ...existingPipeline };

                    toApply.forEach(row => {
                        const code = row._matchCode;

                        if (!newMaster[code]) newMaster[code] = { 코드: code };
                        if (currentTag) {
                            newMaster[code]['카탈로그'] = addTag(newMaster[code]['카탈로그'], currentTag);
                        }

                        if (row['품목명']) {
                            const normExtName = normalizeText(row['품목명']);
                            const normExtSpec = normalizeText(row['규격']);
                            newDict[`${normExtName}|${normExtSpec}`] = code;
                        }

                        const pInNum = parseNum(row.finalData?.['입고가'] || row['입고가']);
                        const mItem = newMaster[code];
                        
                        let managedItem = itemsToPipeline[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                        
                        managedItem.sources.estimate['품목명'] = row['품목명'];
                        managedItem.sources.estimate['규격'] = row['규격'];
                        managedItem.sources.estimate['입고가'] = pInNum;
                        
                        managedItem.finalData['입고가'] = pInNum;
                        managedItem.finalData['품목명'] = mItem.품목명 || row['품목명'];
                        managedItem.finalData['규격'] = mItem.규격 || row['규격'];
                        
                        managedItem.finalData['오더즈'] = mItem['오더즈'] || '999999';
                        managedItem.finalData['3코드'] = mItem['3코드'] || '999999';
                        
                        itemsToPipeline[code] = managedItem;
                    });

                    await saveMaster(newMaster); 
                    saveDict(newDict); 
                    await setIDB(STORAGE_KEYS.MANAGED_ITEMS, itemsToPipeline);

                    showToast(`✅ ${toApply.length}건 파이프라인 전송 완료! 시세 관리로 이동합니다.`);
                    
                    setTimeout(() => {
                        window.location.href = '/NEXUS/Pipeline';
                    }, 800);
                    
                    return true;
                } catch (error) {
                    console.error(error);
                    showToast("❌ 파이프라인 전송 중 오류가 발생했습니다.");
                    return false;
                } finally {
                    setIsProcessing(false); setProcessMsg(''); 
                }
            }, [parserBuffer, masterProducts, parserDict, currentTag, saveMaster, saveDict, setIsProcessing, setProcessMsg, showToast]);

            const handleConfirmMapping = useCallback(async (masterCode) => { 
                if (!targetId) return showToast("⚠️ 먼저 왼쪽에서 매핑할 타겟 상품을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId); if (!row) return;

                try {
                    const nextBuffer = parserBuffer.map(r => {
                        if (r._id === targetId) {
                            return { ...r, _matchCode: masterCode, _matchStatus: '🟢 수동일치', _apply: true };
                        }
                        return r;
                    });

                    setParserBuffer(nextBuffer);
                    setTargetId(null); setGlobalSearch(''); 
                    setActiveTab('matched'); 
                    
                    showToast(`✅ 수동 연결 대기 완료! (일치 탭으로 이동되었습니다)`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 수동 매핑 처리 중 오류가 발생했습니다.");
                }
            }, [targetId, parserBuffer, setParserBuffer, setTargetId, setGlobalSearch, setActiveTab, showToast]);

            const handleCancelMapping = useCallback((rowId) => {
                setParserBuffer(prev => prev.map(r => {
                    if (r._id === rowId) {
                        return { ...r, _matchCode: '', _matchStatus: '🔴 불일치(취소됨)', _apply: false };
                    }
                    return r;
                }));
            }, [setParserBuffer]);

            const handleCreateNewMasterItem = useCallback(async (erpCode) => {
                if (!targetId) return showToast("⚠️ 먼저 추가할 파싱 항목을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId);
                if (!row) return;

                if (!erpCode || !erpCode.trim()) return showToast("⚠️ ERP 코드를 입력해주세요.");
                const newCode = erpCode.trim();

                if (masterProducts[newCode]) {
                    return showToast("⚠️ 이미 마스터 DB에 존재하는 코드입니다. '연결(바인딩)' 버튼을 이용해주세요.");
                }

                setIsProcessing(true); setProcessMsg("신규 마스터 품목 등록 중...");

                try {
                    let newMaster = { ...masterProducts };
                    const pInNum = row.finalData?.['입고가'] !== undefined ? parseNum(row.finalData['입고가']) : parseNum(row['입고가']);

                    newMaster[newCode] = {
                        코드: newCode,
                        품목명: row['품목명'],
                        규격: row['규격'] || '',
                        단위: row['단위'] || '',
                        입고가: pInNum,
                        카탈로그: currentTag ? currentTag : ''
                    };

                    await saveMaster(newMaster);

                    const normExtName = normalizeText(row['품목명']);
                    const normExtSpec = normalizeText(row['규격']);
                    const dictKey = `${normExtName}|${normExtSpec}`;
                    const newDict = { ...parserDict, [dictKey]: newCode };
                    saveDict(newDict);

                    const newProcessed = new Set(processedCodes);
                    newProcessed.add(newCode);
                    setProcessedCodes(newProcessed);

                    const nextBuffer = parserBuffer.map(r => {
                        if (r._id === targetId) {
                            return { ...r, _matchCode: newCode, _matchStatus: '🟢 신규등록', _apply: true, 코드: newCode };
                        }
                        return r;
                    });
                    
                    setParserBuffer(nextBuffer);
                    setTargetId(null);
                    setGlobalSearch('');
                    setActiveTab('matched');
                    setShowErpModal(false);

                    showToast(`✅ [${newCode}] 신규 마스터 등록 및 매핑이 완료되었습니다!`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 신규 등록 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [targetId, parserBuffer, masterProducts, currentTag, parserDict, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setTargetId, setGlobalSearch, setActiveTab, setShowErpModal, setIsProcessing, setProcessMsg, showToast]);

            const handleIgnoreParsedItem = useCallback((id) => {
                setParserBuffer(prev => prev.filter(r => r._id !== id));
                if (targetId === id) { setTargetId(null); setGlobalSearch(''); }
            }, [targetId, setParserBuffer, setTargetId, setGlobalSearch]);

            const handleRemoveMissingTags = useCallback(async () => {
                const codesToProcess = Array.from(selectedMissingCodes);
                if (codesToProcess.length === 0) return showToast("⚠️ 제외할 상품을 선택하세요.");
                if (!currentTag) return showToast("⚠️ 기준 카탈로그가 없습니다.");

                setIsProcessing(true); setProcessMsg("카탈로그 제외 처리 중...");
                
                try {
                    let newMaster = { ...masterProducts };
                    let count = 0;

                    codesToProcess.forEach(code => {
                        if (newMaster[code]) {
                            newMaster[code]['카탈로그'] = removeTag(newMaster[code]['카탈로그'], currentTag);
                            count++;
                        }
                    });

                    await saveMaster(newMaster);
                    setSelectedMissingCodes(new Set()); 
                    showToast(`✅ ${count}개 상품을 '${currentTag}' 카탈로그에서 조용히 제외했습니다.`);
                } catch (error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [selectedMissingCodes, masterProducts, currentTag, saveMaster, setSelectedMissingCodes, setIsProcessing, setProcessMsg, showToast]);

            const handleRemoveTagDirect = useCallback(async (code) => {
                if (!currentTag) return;
                if(!window.confirm(`이 상품을 [${currentTag}] 카탈로그에서 강제로 단종(제외) 처리하시겠습니까?`)) return;
                
                try {
                    let newMaster = { ...masterProducts };
                    if (newMaster[code]) {
                        newMaster[code]['카탈로그'] = removeTag(newMaster[code]['카탈로그'], currentTag);
                        await saveMaster(newMaster);
                        showToast(`✅ 선택한 상품을 '${currentTag}' 카탈로그에서 단종 처리했습니다.`);
                    }
                } catch(error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                }
            }, [masterProducts, currentTag, saveMaster, showToast]);

            return { 
                executeParser, handleApplyMatched, handleConfirmMapping, handleCancelMapping, 
                handleCreateNewMasterItem, handleIgnoreParsedItem, handleRemoveMissingTags, handleRemoveTagDirect,
                openErpModal: () => setShowErpModal(true)
            };
        };

        // ==========================================
        // ⚙️ 메인 렌더링
        // ==========================================
        const ParserApp = () => {
            const appState = useParserApp();
            const actions = useParserActions(appState);

            const { 
                masterProducts, parserBuffer, currentTag, activeTab, setActiveTab,
                showInputModal, setShowInputModal, showReviewModal, setShowReviewModal, 
                showErpModal, setShowErpModal,
                toastMsg, showToast, isProcessing, processMsg,
                globalSearch, setGlobalSearch, targetId, setTargetId,
                selectedMissingCodes, setSelectedMissingCodes, processedCodes
            } = appState;

            const [showSettings, setShowSettings] = useState(false);
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');

            useEffect(() => {
                localStorage.setItem(STORAGE_KEYS.CLOUD_URL, gasUrl);
            }, [gasUrl]);

            const handleNavigate = useCallback((e, path) => {
                if (e && e.preventDefault) e.preventDefault();
                
                if (path === '#') {
                    showToast('⚠️ 준비 중인 기능입니다.');
                    return;
                }

                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            const handlePush = async () => {
                if (!gasUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요.");
                appState.setIsProcessing(true); appState.setProcessMsg("클라우드 백업 중...");
                setTimeout(() => {
                    showToast("✅ 클라우드 저장 완료");
                    appState.setIsProcessing(false); appState.setProcessMsg("");
                }, 1000);
            };

            const handlePull = async () => {
                if (!gasUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요.");
                appState.setIsProcessing(true); appState.setProcessMsg("데이터 동기화 중...");
                setTimeout(() => {
                    showToast("✅ 데이터 수신 완료");
                    appState.setIsProcessing(false); appState.setProcessMsg("");
                }, 1000);
            };

            const availableTags = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({
                    name: tag,
                    count: counts[tag]
                }));
            }, [masterProducts]);

            const matchedRows = parserBuffer.filter(r => r._matchCode);
            const similarRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('유사') && !r._matchStatus.includes('중복'));
            const duplicateRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('중복품목'));
            const combinedSimilarRows = [...duplicateRows, ...similarRows];
            const unmatchedRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('불일치'));

            const missingRows = useMemo(() => {
                if (!currentTag) return [];
                const matchedCodes = new Set(matchedRows.map(r => String(r._matchCode)));
                const processedStr = new Set(Array.from(processedCodes).map(String));
                const missing = [];
                for (const code in masterProducts) {
                    const mItem = masterProducts[code];
                    const tags = (mItem['카탈로그'] || '').split(',').map(s => s.trim());
                    if (tags.includes(currentTag) && !matchedCodes.has(String(code)) && !processedStr.has(String(code))) {
                        missing.push(mItem);
                    }
                }
                return missing;
            }, [masterProducts, matchedRows, currentTag, processedCodes]);

            const masterSearchResults = useMemo(() => {
                if ((activeTab !== 'similar' && activeTab !== 'unmatched') || !globalSearch.trim()) return [];
                return MatchEngine.searchMasterProducts(masterProducts, globalSearch).slice(0, 50);
            }, [globalSearch, masterProducts, activeTab]);

            const displayUnmatchedRows = activeTab === 'similar' ? combinedSimilarRows : unmatchedRows;
            const hasPendingMappings = combinedSimilarRows.length > 0 || unmatchedRows.length > 0;

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    {toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><SafeIcon name="check-circle-2" className="text-emerald-400" />{toastMsg}</div>}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto border-x border-slate-300">
                        <GlobalHeader 
                            activeTab="parser" 
                            itemCount={Object.keys(masterProducts).length} 
                            isProcessing={isProcessing} 
                            processMsg={processMsg}
                            onOpenSettings={() => setShowSettings(true)}
                            onPush={handlePush}
                            onPull={handlePull}
                            onNavigate={handleNavigate}
                        />
                        
                        <div className="shrink-0 flex flex-col bg-white border-b border-slate-200 z-30">
                            <div className="px-6 pt-4 pb-3 flex items-center justify-between gap-4 overflow-x-auto custom-scrollbar w-full">
                                
                                <div className="flex gap-1.5 shrink-0 bg-slate-100/80 p-1.5 rounded-xl border border-slate-200">
                                    <button onClick={()=>setActiveTab('matched')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='matched' ? 'bg-white text-emerald-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🟢 일치 ({matchedRows.length})</button>
                                    <button onClick={()=>setActiveTab('similar')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='similar' ? 'bg-white text-amber-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🟡 유사 ({combinedSimilarRows.length})</button>
                                    <button onClick={()=>setActiveTab('unmatched')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='unmatched' ? 'bg-white text-rose-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🔴 불일치 ({unmatchedRows.length})</button>
                                    <div className="w-px bg-slate-300 mx-0.5 my-1"></div>
                                    <button onClick={()=>setActiveTab('missing')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all flex items-center gap-1.5 ${activeTab==='missing' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>⚪ 누락 {currentTag && missingRows.length > 0 && <span className="bg-rose-100 text-rose-600 px-1.5 rounded text-[10px]">{missingRows.length}</span>}</button>
                                </div>

                                <div className="flex-1 min-w-[10px]"></div>

                                <div className="flex items-center gap-2 shrink-0">
                                    {activeTab === 'matched' && (
                                        <button onClick={() => appState.setShowReviewModal(true)} disabled={matchedRows.filter(r=>r._apply).length === 0} className={`h-9 px-5 rounded-lg text-[12px] font-black shadow-sm transition-colors flex items-center ${matchedRows.filter(r=>r._apply).length > 0 ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`} title="매핑 작업을 완료하고 파이프라인으로 보냅니다.">
                                            <SafeIcon name="check-circle-2" size={14} className="mr-1.5" /> 완료
                                        </button>
                                    )}
                                    {activeTab === 'missing' && (
                                        <button onClick={actions.handleRemoveMissingTags} className={`h-9 px-4 rounded-lg text-[12px] font-bold shadow-sm transition-colors flex items-center ${selectedMissingCodes.size > 0 ? 'bg-rose-50 border border-rose-200 text-rose-600 hover:bg-rose-100' : 'bg-white text-slate-400 border border-slate-200'}`}>
                                            <i className="fas fa-eraser mr-1.5 text-[13px]"></i> 카탈로그 제외
                                        </button>
                                    )}
                                    
                                    {(activeTab === 'matched' || activeTab === 'missing') && <div className="w-px h-6 bg-slate-300 mx-1"></div>}
                                    
                                    <button onClick={() => appState.setShowInputModal(true)} className="h-9 px-4 rounded-lg text-[12px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 shadow-sm transition-colors flex items-center">
                                        <SafeIcon name="zap" size={14} className="mr-1.5" /> 새 파싱
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100">
                            {!currentTag && parserBuffer.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <i className="fas fa-robot text-6xl text-slate-300 mb-4"></i>
                                    <h2 className="text-xl font-black text-slate-600 mb-2">Smart Parser 대기중</h2>
                                    <p className="text-[13px] font-bold">상단 [새 파싱] 버튼을 눌러 작업을 시작하세요.</p>
                                </div>
                            ) : activeTab === 'matched' ? (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in">
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-[#f5f4f0] text-[#5c554d] font-bold sticky top-0 z-10 border-b border-[#e8e4db]">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center"><input type="checkbox" className="rounded" checked={matchedRows.length>0 && matchedRows.every(r=>r._apply)} onChange={() => { const all = matchedRows.every(r=>r._apply); appState.setParserBuffer(p => p.map(r => r._matchCode ? {...r, _apply: !all} : r)); }} /></th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-emerald-700 bg-emerald-50/50">파싱 품목명</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3 text-right text-emerald-700 bg-emerald-50/50">새 입고가 (파싱)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {matchedRows.length === 0 ? <tr><td colSpan="6" className="p-10 text-center text-slate-400">데이터가 없습니다.</td></tr> : matchedRows.map(row => {
                                                    const mItem = masterProducts[row._matchCode] || {};
                                                    const mIn = parseNum(mItem['입고가']);
                                                    const pIn = parseNum(row.finalData['입고가']);
                                                    const isDiff = mIn > 0 && mIn !== pIn;
                                                    return (
                                                        <tr key={row._id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="py-2 px-4 text-center"><input type="checkbox" className="rounded text-emerald-600 focus:ring-emerald-500" checked={row._apply} onChange={() => appState.setParserBuffer(p => p.map(r => r._id === row._id ? {...r, _apply: !r._apply} : r))} /></td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{row._matchCode}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명 || row['품목명']}</span> <span className="text-[11px] text-slate-400">({mItem.규격 || row['규격']})</span></td>
                                                            <td className="py-2 px-3 text-emerald-800 bg-emerald-50/20 font-bold">{row['품목명']}</td>
                                                            <td className="py-2 px-3 text-right text-slate-500 font-bold">{mIn ? mIn.toLocaleString() : '-'}</td>
                                                            <td className={`py-2 px-3 text-right font-black ${isDiff ? 'bg-rose-50/30 text-rose-600' : 'bg-emerald-50/20 text-emerald-600'}`}>
                                                                {pIn > 0 ? pIn.toLocaleString() : '-'}
                                                            </td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : activeTab === 'missing' ? (
                                !currentTag ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm fade-in">
                                        <i className="fas fa-folder-open text-6xl text-slate-200 mb-4"></i>
                                        <h2 className="text-xl font-black text-slate-600 mb-2">누락(단종) 계산 생략됨</h2>
                                        <p className="text-[13px] font-bold text-center leading-relaxed">새 텍스트 파싱 시 기준 카탈로그를 지정하지 않아<br/>누락 상품 대조 작업이 생략되었습니다.</p>
                                    </div>
                                ) : (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in relative">
                                    {hasPendingMappings && (
                                        <div className="bg-amber-50 border-b border-amber-200 p-3.5 flex items-center gap-3 text-amber-800 text-[13px] font-bold shrink-0 shadow-inner">
                                            <i className="fas fa-exclamation-triangle text-amber-500 text-lg"></i>
                                            <div className="flex flex-col">
                                                <span>주의! 아직 처리하지 않은 [유사] 또는 [불일치] 항목이 <span className="text-rose-600 font-black px-1">{combinedSimilarRows.length + unmatchedRows.length}건</span> 남아있습니다.</span>
                                                <span className="text-[11px] font-normal opacity-80 mt-0.5">이 항목들이 단순히 오타로 인해 매칭 안된 것일 수 있으므로, 수동 연결을 먼저 끝마치신 후에 여기서 누락(단종) 처리를 진행해야 안전합니다.</span>
                                            </div>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex flex-col gap-2 shrink-0">
                                        <div className="flex items-center gap-2 text-slate-700 text-[13px] font-bold"><i className="fas fa-info-circle text-indigo-500"></i>마스터 DB에는 <span className="bg-indigo-100 text-indigo-800 px-1.5 py-0.5 rounded">'{currentTag}'</span> 카탈로그에 등록되어 있지만, 이번 파싱 텍스트에는 없는 상품들입니다. (단종 의심)</div>
                                        <div className="text-[11px] text-slate-500">목록에서 체크 후 상단의 [제외] 버튼을 누르면 단가를 훼손하지 않고 해당 카탈로그에서만 조용히 제외합니다.</div>
                                    </div>
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-white sticky top-0 z-10 border-b border-slate-200 text-slate-600">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center">
                                                        <input type="checkbox" className="rounded cursor-pointer" checked={missingRows.length > 0 && selectedMissingCodes.size === missingRows.length} onChange={(e) => {
                                                            const isChecked = e.target.checked;
                                                            appState.setSelectedMissingCodes(prev => {
                                                                if (isChecked) {
                                                                    return new Set(missingRows.map(r=>r.코드));
                                                                } else {
                                                                    return new Set();
                                                                }
                                                            });
                                                        }} />
                                                    </th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3">소속 카탈로그</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {missingRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">누락된 항목이 없습니다. 완벽합니다!</td></tr> : missingRows.map(mItem => {
                                                    const isSel = selectedMissingCodes.has(mItem.코드);
                                                    return (
                                                        <tr key={`miss-${mItem.코드}`} onClick={() => {
                                                            appState.setSelectedMissingCodes(prev => {
                                                                const next = new Set(prev);
                                                                if(next.has(mItem.코드)) next.delete(mItem.코드); else next.add(mItem.코드);
                                                                return next;
                                                            });
                                                        }} className={`cursor-pointer transition-colors ${isSel ? 'bg-rose-50/50' : 'hover:bg-slate-50'}`}>
                                                            <td className="py-2 px-4 text-center">
                                                                <input type="checkbox" className="rounded text-rose-500 focus:ring-rose-500 pointer-events-none" checked={isSel} readOnly />
                                                            </td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{mItem.코드}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명}</span> <span className="text-[11px] text-slate-400">({mItem.규격})</span></td>
                                                            <td className="py-2 px-3 text-right text-slate-500">{mItem.입고가 ? Number(mItem.입고가).toLocaleString() : '-'}</td>
                                                            <td className="py-2 px-3 text-[11px] text-indigo-500 font-bold max-w-[200px] truncate">{mItem['카탈로그']}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )
                            ) : (
                                <div className="flex h-full w-full gap-4 fade-in">
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden relative">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-search text-slate-400"></i><span className="text-[13px] font-black text-slate-700">마스터 수동 검색 (전체 DB)</span></div>
                                            <div className="relative">
                                                <input type="text" placeholder="검색어 입력..." value={globalSearch} onChange={e=>appState.setGlobalSearch(e.target.value)} className="w-[200px] border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] outline-none focus:border-indigo-500" />
                                                <i className="fas fa-search absolute right-2.5 top-2 text-slate-400 text-[12px] pointer-events-none"></i>
                                            </div>
                                        </div>
                                        
                                        {targetId && (
                                            <div className="bg-indigo-50/50 px-4 py-3 border-b border-indigo-100 flex items-center justify-between shrink-0">
                                                <div className="text-[11px] text-indigo-800 font-bold">
                                                    <i className="fas fa-info-circle mr-1.5 text-indigo-500"></i>
                                                    마스터에 없는 신규 상품인가요?
                                                </div>
                                                <button onClick={() => actions.openErpModal()} className="px-3 py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded text-[11px] font-bold transition-colors shadow-sm">
                                                    <i className="fas fa-plus mr-1"></i> ERP 코드로 직접 등록
                                                </button>
                                            </div>
                                        )}

                                        <div className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/30">
                                            {!targetId && !globalSearch ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-hand-point-right text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">우측에서 매핑할 <span className="text-indigo-500">파싱 항목</span>을 먼저 선택하세요.</p></div>
                                            ) : masterSearchResults.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-search text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">검색 결과가 없습니다.</p></div>
                                            ) : (
                                                <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                    <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3">상품정보 (코드/품명/규격)</th><th className="py-2.5 px-3 text-right w-20">입고가</th><th className="py-2.5 px-3 text-center w-32">동작/작업</th></tr></thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {masterSearchResults.map(m => {
                                                            const hasTag = currentTag && (m['카탈로그'] || '').split(',').map(s=>s.trim()).includes(currentTag);
                                                            return (
                                                                <tr key={m.코드} className="hover:bg-indigo-50/50 group transition-colors">
                                                                    <td className="py-2 px-3"><div className="flex flex-col min-w-0 w-full overflow-hidden"><span className="text-[10px] font-mono text-slate-400">{m.코드}</span><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[12px] font-extrabold text-slate-800 truncate">{m.품목명}</span>{m.규격 && <span className="text-[11px] text-slate-500 shrink-0">({m.규격})</span>}</div></div></td>
                                                                    <td className="py-2 px-3 text-right font-bold text-slate-600">{m.입고가 ? Number(m.입고가).toLocaleString() : '-'}</td>
                                                                    <td className="py-2 px-3 text-center flex gap-1 justify-center items-center h-full">
                                                                        <button onClick={() => actions.handleConfirmMapping(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors flex-1" title="우측 항목과 연결하여 카탈로그에 추가합니다."><i className="fas fa-link"></i> 연결</button>
                                                                        {hasTag && (
                                                                            <button onClick={() => actions.handleRemoveTagDirect(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-rose-100 text-rose-600 hover:bg-rose-200 transition-colors" title="이 상품을 현재 카탈로그에서 즉각 단종(제외)시킵니다."><i className="fas fa-eraser"></i> 단종</button>
                                                                        )}
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-list text-slate-400"></i><span className="text-[13px] font-black text-slate-700">파싱된 외부 데이터 (대기중)</span></div>
                                            <span className="text-[11px] font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">총 {displayUnmatchedRows.length}건</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3 text-center w-10">선택</th><th className="py-2.5 px-2 text-center w-14">상태</th><th className="py-2.5 px-3">파싱 품명 및 규격</th><th className="py-2.5 px-3 text-right w-16">입고가</th><th className="py-2.5 px-2 text-center w-10">무시</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {displayUnmatchedRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">대기중인 데이터가 없습니다.</td></tr> : displayUnmatchedRows.map(row => {
                                                        const isTarget = targetId === row._id;
                                                        return (
                                                            <tr key={row._id} onClick={() => { appState.setTargetId(row._id); appState.setGlobalSearch(row['품목명'].replace(/[()[\]{},./]/g, ' ').replace(/\s+/g, ' ').trim()); }} className={`cursor-pointer transition-colors border-l-4 ${isTarget ? 'bg-indigo-50/50 border-indigo-500' : 'hover:bg-slate-50 border-transparent'}`}>
                                                                <td className="py-2 px-3 text-center"><div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center mx-auto ${isTarget ? 'border-indigo-500 bg-white' : 'border-slate-300'}`}>{isTarget && <div className="w-2 h-2 rounded-full bg-indigo-500"></div>}</div></td>
                                                                <td className="py-2 px-2 text-center">
                                                                    {row._matchStatus.includes('중복품목') ? (
                                                                        <span className="bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded text-[10px] font-black" title="ERP에 이름이 똑같은 상품이 여러 개 존재합니다. 수동으로 올바른 코드를 연결해 주세요.">선택필요</span>
                                                                    ) : (
                                                                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold w-max block mx-auto ${activeTab === 'similar' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>{row._matchStatus.substring(0, 2)}</span>
                                                                    )}
                                                                </td>
                                                                <td className="py-2 px-3"><div className="flex flex-col"><span className={`text-[12px] font-extrabold truncate ${isTarget ? 'text-indigo-900' : 'text-slate-800'}`}>{row['품목명']}</span><span className="text-[11px] text-slate-500 mt-0.5 truncate">{row['규격']} {row['단위'] ? `| ${row['단위']}` : ''}</span></div></td>
                                                                <td className={`py-2 px-3 text-right font-bold ${isTarget ? 'text-indigo-600' : 'text-slate-600'}`}>{row['입고가'] || '-'}</td>
                                                                <td className="py-2 px-2 text-center">
                                                                    <button onClick={(e) => { e.stopPropagation(); actions.handleIgnoreParsedItem(row._id); }} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 px-2 py-1.5 rounded transition-colors" title="이 항목을 매핑하지 않고 휴지통에 버립니다."><i className="fas fa-trash-alt"></i></button>
                                                                </td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    {/* 설정 모달 등 */}
                    {showInputModal && <SmartParserInputModal onClose={() => appState.setShowInputModal(false)} executeParser={actions.executeParser} showToast={showToast} availableTags={availableTags} />}
                    {showReviewModal && <ParserReviewModal onClose={() => appState.setShowReviewModal(false)} onConfirm={actions.handleApplyMatched} state={appState} actions={actions} />}
                    {showErpModal && <ErpCodeInputModal onClose={() => appState.setShowErpModal(false)} onSubmit={actions.handleCreateNewMasterItem} targetItem={parserBuffer.find(r => r._id === targetId)} />}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex justify-center items-center backdrop-blur-sm">
                            <div className="bg-white w-[450px] rounded-xl shadow-2xl overflow-hidden border border-gray-200 fade-in">
                                <div className="px-6 py-4 border-b border-gray-200 bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-black text-slate-800 text-base flex items-center"><SafeIcon name="settings" size={18} className="text-indigo-500 mr-2"/>OneApp Sync Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600 transition-colors"><SafeIcon name="x" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">Google Apps Script Webhook URL</label>
                                        <input type="text" value={gasUrl} onChange={(e)=>setGasUrl(e.target.value)} placeholder="https://script.google.com/..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono" />
                                        <p className="mt-3 text-[10px] text-slate-400 leading-relaxed italic">* 자사 구글 시트와 데이터를 동기화하기 위한 주소입니다.</p>
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 border-t border-gray-200 flex justify-end">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-2.5 bg-[#1A2235] text-white rounded-lg text-sm font-bold shadow-md hover:bg-black transition-colors">저장 및 닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParserApp />);
    </script>
</body>
</html>
