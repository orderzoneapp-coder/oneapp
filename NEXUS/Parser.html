<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP MerchOps - Smart Parser [v3.3]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // 💡 [v3.3 표준] STORAGE_KEYS 및 데이터 방어 유틸리티 완벽 일치화 (+델타 동기화 큐 추가)
        const STORAGE_KEYS = { 
            MASTER_DB: 'merchMaster_v870', 
            CLOUD_URL: 'skuSyncCloudUrl_v6', 
            SYNC_TRIGGER: 'merchMaster_sync_trigger', 
            HISTORY_DB: 'merchHistory_v870', 
            CLOSING_DB: 'merchClosing_v1',
            UNSYNCED_MASTER: 'merchUnsyncedMaster_v1', 
            UNSYNCED_HISTORY: 'merchUnsyncedHistory_v1',
            UNSYNCED_DELETES: 'merchUnsyncedDeletes_v1'
        };

        // 💡 하얀 화면 방지용 강제 문자열 변환 유틸리티
        const safeStr = (val, def = '') => (val !== undefined && val !== null && val !== '') ? String(val) : def;

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB) 래퍼
        // ==========================================
        const initIDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('MerchOpsDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const setIDB = async (key, val) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const getIDB = async (key) => {
            const db = await initIDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(tx.error);
            });
        };

        // ==========================================
        // 🧩 1. 상수 및 유틸리티
        // ==========================================
        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const normalizeText = (text) => text ? safeStr(text).replace(/\s+/g, '').toLowerCase() : '';
        const tokenize = (str) => str ? safeStr(str).replace(/[^\w가-힣]/g, ' ').split(/\s+/).filter(Boolean) : [];
        const extractSpec = (str) => {
            if (!str) return '';
            const match = safeStr(str).toLowerCase().match(/\d+(?:\.\d+)?(?:kg|g|ml|l|ea|박스|개|포|단|박|캔|병|봉|팩|입|t|입수)/g);
            return match ? match.join('') : '';
        };

        const addTag = (oldTags, newTag) => {
            if (!newTag) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            if (!tags.includes(newTag)) tags.push(newTag);
            return tags.join(', ');
        };

        const removeTag = (oldTags, tagToRemove) => {
            if (!tagToRemove) return oldTags || '';
            const tags = (oldTags || '').split(',').map(s => s.trim()).filter(Boolean);
            return tags.filter(t => t !== tagToRemove).join(', ');
        };

        const IngestEngine = { normalizeText, tokenize, extractSpec };

        // ==========================================
        // 🧩 2. 핵심 비즈니스 엔진
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) {
                return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };
            }

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = safeStr(currentFinalData?.['창고'] ?? mItem?.['창고']).trim();
            const unitStr = safeStr(currentFinalData?.['단위'] ?? mItem?.['단위']).trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => {
                if (ruleWh === '*') return true;
                const targets = ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            };
            
            const matchUnit = (ruleUnit, targetUnit) => {
                if (ruleUnit === '*') return true;
                const targets = ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean);
                return targets.some(s => targetUnit === s || targetUnit.includes(s));
            };

            let bestRule = null;
            let bestScore = -1;

            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0;
                    if (r.whCode !== '*') score += 2;
                    if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };

            let calcOutPrice = totalCost;
            if (appliedRule.type === 'divide') {
                const safeRate = Math.min(appliedRule.rate, 99.99);
                calcOutPrice = totalCost / (1 - (safeRate / 100));
            } else {
                calcOutPrice = totalCost * (1 + (appliedRule.rate / 100));
            }
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice };
            newFinalData['시중가'] = calcOutPrice;

            const providedOutPrice = parseNum(currentFinalData?.['출고가']);
            const mIn = parseNum(mItem?.['입고가']);
            const mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']);
            const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let calc1Out = Math.round((newFinalData['출고가'] / div1) + extraCost);
                if (!isFinite(calc1Out) || isNaN(calc1Out)) calc1Out = 0;
                newFinalData['1출고'] = Math.round(calc1Out / 10) * 10; 
            }
            return newFinalData;
        };

        const parseTextSemantically = (rawText) => {
            let lines = safeStr(rawText).split('\n').map(l => l.trim()).filter(l => l !== '');
            const results = []; let currentItem = {};
            const pushItem = () => {
                if (currentItem.품목명) {
                    if (currentItem.입고가) currentItem.입고가 = String(currentItem.입고가).replace(/[^\d]/g, '');
                    results.push({ _id: crypto.randomUUID(), _apply: false, ...currentItem });
                }
                currentItem = {};
            };

            lines.forEach(line => {
                if (/^전체\s*상품/.test(line) || /^clock$/i.test(line) || /^마감$/.test(line) || /이미지\s*준비중/i.test(line)) return;
                const priceMatch = line.match(/(?:^|\s|\/|\|)(\d{1,3}(?:,\d{3})*|\d+)\s*원$/);
                let extractedPrice = null;
                if (priceMatch) {
                    extractedPrice = priceMatch[1];
                    line = line.replace(priceMatch[0], '').trim();
                    if (line.endsWith('/')) line = line.slice(0, -1).trim();
                }
                if (extractedPrice) currentItem.입고가 = extractedPrice;
                if (!line) { if (extractedPrice) pushItem(); return; }

                if (!currentItem.품목명) {
                    if (line.includes(' / ')) {
                        const splitParts = line.split(' / ');
                        let namePart = splitParts[0].trim(); let specPart = splitParts.slice(1).join(' / ').trim();
                        const unitMatch = namePart.match(/(EA|BOX|포|개|박스|봉|캔|병|팩|단|마리)$/i);
                        if (unitMatch) { currentItem.단위 = unitMatch[0]; currentItem.품목명 = namePart.slice(0, -unitMatch[0].length).trim(); } 
                        else { currentItem.품목명 = namePart; }
                        const specParts = specPart.split('/').map(s => s.trim());
                        currentItem.규격 = specParts[0] || '';
                    } else { currentItem.품목명 = line; }
                } else {
                    if (line.includes('/')) {
                        const parts = line.split('/').map(s => s.trim());
                        if (!currentItem.단위) currentItem.단위 = parts[0] || '';
                        if (parts.length > 1 && !currentItem.규격) currentItem.규격 = parts[1] || '';
                    } else if (!currentItem.규격 && /^\d+(?:kg|g|ml|l|ea|box|박스|개|포|단|박|캔|병|봉|팩|입)/i.test(line)) {
                        currentItem.규격 = line;
                    }
                }
                if (extractedPrice) pushItem();
            });
            if (currentItem.품목명) pushItem();
            return results;
        };

        const runSmartMatch = (extName, extSpec, mProducts, pDict) => {
            const normExtName = IngestEngine.normalizeText(extName);
            const normExtSpec = IngestEngine.normalizeText(extSpec);
            const extFullText = IngestEngine.normalizeText(extName + " " + extSpec);
            const dictKey = `${normExtName}|${normExtSpec}`;

            // 1. 학습된 사전에 있으면 즉각 일치
            if (pDict[dictKey]) return { code: pDict[dictKey], status: '🔵 사전학습일치' };

            let bestMatch = null;
            let bestScore = 0;
            
            // 외부 텍스트의 구성 토큰 및 규격 숫자 추출
            const extTokens = IngestEngine.tokenize(extName + " " + extSpec);
            const extSpecNum = IngestEngine.extractSpec(extName + " " + extSpec);

            let perfectMatches = [];

            for (const mCode in mProducts) {
                const m = mProducts[mCode];
                const mBrand = safeStr(m.브랜드).trim();
                const mName = safeStr(m.품목명).trim();
                const mSpec = safeStr(m.규격).trim();

                const mFullWithBrand = IngestEngine.normalizeText(mBrand + mName + mSpec);
                const mFullNoBrand = IngestEngine.normalizeText(mName + mSpec);
                const mSpecNum = IngestEngine.extractSpec(mBrand + " " + mName + " " + mSpec);

                let isSpecMatch = true;
                if (extSpecNum && mSpecNum && extSpecNum !== mSpecNum) {
                    isSpecMatch = false; // 규격의 숫자나 단위가 명확히 다름
                }

                // 2. [완전 일치 조건]
                if ((extFullText === mFullWithBrand || extFullText === mFullNoBrand) && isSpecMatch) {
                    perfectMatches.push(m);
                    continue;
                }

                // 3. [유사도 계산] 브랜드 + 이름 + 규격 토큰 비교
                const mTokens = IngestEngine.tokenize(mBrand + " " + mName + " " + mSpec);
                const intersection = extTokens.filter(t => mTokens.includes(t));
                
                let score = intersection.length / Math.max(extTokens.length, mTokens.length);

                if (!isSpecMatch) score = score * 0.1; 

                if (score >= 0.7) {
                    if (score > bestScore) {
                        bestScore = score;
                        bestMatch = m;
                    }
                }
            }

            if (perfectMatches.length === 1) return { code: perfectMatches[0].코드, status: '🟢 완전일치' };
            if (perfectMatches.length > 1) return { code: '', status: '🟡 중복품목(선택필요)' }; 

            if (bestMatch && bestScore >= 0.7) return { code: '', status: '🟡 유사발견' };
            
            return { code: '', status: '🔴 불일치' };
        };

        const searchMasterProducts = (productsObj, keyword) => {
            if (!keyword || !keyword.trim()) return [];
            const cleanKw = safeStr(keyword).toLowerCase().replace(/[()[\]{},./]/g, ' ');
            const tokens = cleanKw.split(/\s+/).filter(t => t.length > 0);
            if (tokens.length === 0) return [];
            const results = Object.values(productsObj).map(m => {
                const mName = safeStr(m.품목명).toLowerCase(); const mSpec = safeStr(m.규격).toLowerCase();
                let score = 0, matchCount = 0;
                tokens.forEach(token => {
                    if (mName.includes(token)) { score += token.length * 10; matchCount++; } 
                    else if (mSpec.includes(token)) { score += token.length * 5; matchCount++; } 
                });
                if ((mName + mSpec).replace(/\s+/g, '').includes(cleanKw.replace(/\s+/g, ''))) score += 1000;
                return { item: m, score, matchCount };
            }).filter(r => r.score > 0);
            results.sort((a, b) => b.score - a.score || b.matchCount - a.matchCount);
            return results.map(r => r.item);
        };

        // ==========================================
        // 🛠 SafeIcon (v3.3 100% 반영본)
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'bar-chart-3' ? 'bar-chart' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs',
                    'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open', 'file-spreadsheet': 'fa-table', 
                    'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes', 'bar-chart-3': 'fa-chart-bar', 
                    'database': 'fa-database', 'sliders-horizontal': 'fa-sliders-h', 'check-circle-2': 'fa-check-circle',
                    'x': 'fa-times', 'pie-chart': 'fa-chart-pie', 'shopping-cart': 'fa-shopping-cart', 'users': 'fa-users', 'megaphone': 'fa-bullhorn',
                    'book-open': 'fa-address-book', 'shopping-bag': 'fa-shopping-bag', 'credit-card': 'fa-credit-card', 'line-chart': 'fa-chart-line', 'printer': 'fa-print', 'camera': 'fa-camera', 'link':'fa-link', 'folder-open':'fa-folder-open', 'folder-plus':'fa-folder-plus', 'magic':'fa-magic', 'history':'fa-history', 'trash-alt':'fa-trash-alt', 'hand-paper':'fa-hand-paper', 'cogs':'fa-cogs', 'clipboard-check':'fa-clipboard-check', 'search-dollar':'fa-search-dollar', 'arrow-right':'fa-arrow-right', 'arrow-up':'fa-arrow-up', 'arrow-down':'fa-arrow-down', 'star':'fa-star', 'equals':'fa-equals', 'list':'fa-list', 'info-circle':'fa-info-circle', 'save':'fa-save', 'search':'fa-search', 'eraser':'fa-eraser'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // 💡 [v3.3 표준] GlobalHeader 전체 교체
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true, shortTag: 'ONE BOARD' },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: true, shortTag: 'SYSTEM GUIDE' },

                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true, shortTag: 'GOLDEN RECORD' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true, shortTag: 'SKU FORGE' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true, shortTag: 'VALUATION HUB' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true, shortTag: 'AI SMART PARSER' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true, shortTag: 'ENTITY REGISTRY' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true, shortTag: 'CRM STRATEGY' },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true, shortTag: 'ORDER STREAM' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true, shortTag: 'SOURCE & PROCURE' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true, shortTag: 'REVENUE LEDGER' },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true, shortTag: 'STOCK LEDGER' },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: true, shortTag: 'OUTPUT TERMINAL' },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true, shortTag: 'INSIGHT ENGINE' },
                { id: 'cs', label: '정보 마당', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: true, shortTag: 'NOTICE PORTAL' }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common';
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.3</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">
                                        {currentTab ? currentTab.shortTag : 'WORKSPACE'}
                                    </span>
                                </div>
                            </div>

                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`마스터 DB 기준 데이터 수`}>
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount ? itemCount.toLocaleString() : 0}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="통합 환경설정 센터 열기"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-6 pt-3 flex items-end gap-1 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                        className={`flex items-center gap-2 px-6 py-3 text-[14px] font-bold rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px]
                                        ${isActive
                                            ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]'
                                            : isPlaceholder
                                                ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5'
                                                : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'
                                        }`}
                                        style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // 💡 [v3.3 표준] IframeSettingsModal (Wide Overlay)
        const IframeSettingsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[500] flex bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="w-full max-w-[1400px] h-full bg-white shadow-[-10px_0_40px_rgba(0,0,0,0.3)] flex flex-col slide-in-right border-l border-slate-300 relative overflow-hidden ml-auto">
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 border-b border-slate-700 shadow-md relative z-10">
                            <div className="flex items-center gap-3">
                                <SafeIcon name="settings" size={20} className="text-indigo-400"/>
                                <h2 className="font-black text-[17px] tracking-wide">통합 환경설정 센터</h2>
                                <span className="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/30 ml-2">Wide Overlay</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-[12px] text-slate-400 font-medium hidden md:inline-block">설정을 변경하고 창을 닫으면 작업 화면에 즉시 반영됩니다.</span>
                                <button onClick={onClose} className="text-slate-300 hover:text-white transition-colors bg-slate-800 hover:bg-rose-500 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm border border-slate-700 hover:border-rose-400">
                                    <SafeIcon name="x" size={18} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 w-full bg-slate-100 relative">
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div className="text-slate-300 flex flex-col items-center">
                                    <i className="fas fa-circle-notch fa-spin text-3xl mb-3"></i>
                                    <span className="font-bold text-sm">설정 모듈을 불러오는 중입니다...</span>
                                </div>
                            </div>
                            <iframe src="settings.html?mode=iframe" className="absolute inset-0 w-full h-full border-0 bg-white relative z-10" title="Settings Center"></iframe>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🧩 Hooks & State Management
        // ==========================================
        const useParserApp = () => {
            const [masterProducts, setMasterProducts] = useState({});
            const [parserDict, setParserDict] = useState(() => { try { return JSON.parse(localStorage.getItem('parserDict_v870')) || {}; } catch(e){ return {}; }});
            const [marginRules, setMarginRules] = useState(() => { try { return JSON.parse(localStorage.getItem('merchMarginRules_v878')) || [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } catch(e) { return [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; } });

            useEffect(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => {
                    if (data) setMasterProducts(data);
                }).catch(console.error);
            }, []);

            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) {
                        getIDB(STORAGE_KEYS.MASTER_DB).then(data => {
                            if (data) setMasterProducts(data);
                        }).catch(console.error);
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            const saveMaster = async (data) => {
                setMasterProducts(data);
                try {
                    await setIDB(STORAGE_KEYS.MASTER_DB, data);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                } catch(e) {
                    console.error("IndexedDB 저장 실패", e);
                }
            };

            const saveDict = (data) => {
                setParserDict(data);
                localStorage.setItem('parserDict_v870', JSON.stringify(data));
            };

            const [parserBuffer, setParserBuffer] = useState([]);
            const [currentTag, setCurrentTag] = useState(''); 
            
            const [activeTab, setActiveTab] = useState('matched'); 
            const [showInputModal, setShowInputModal] = useState(true); 
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showErpModal, setShowErpModal] = useState(false);

            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            const [globalSearch, setGlobalSearch] = useState('');
            const [targetId, setTargetId] = useState(null); 
            const [selectedMissingCodes, setSelectedMissingCodes] = useState(new Set());
            const [processedCodes, setProcessedCodes] = useState(new Set());

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            return {
                masterProducts, saveMaster, parserDict, saveDict, marginRules,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                activeTab, setActiveTab, showInputModal, setShowInputModal,
                showReviewModal, setShowReviewModal,
                showErpModal, setShowErpModal,
                toastMsg, showToast, isProcessing, setIsProcessing, processMsg, setProcessMsg,
                globalSearch, setGlobalSearch, targetId, setTargetId,
                selectedMissingCodes, setSelectedMissingCodes, processedCodes, setProcessedCodes
            };
        };

        const useParserActions = (appState) => {
            const { 
                masterProducts, saveMaster, parserDict, saveDict, marginRules,
                parserBuffer, setParserBuffer, currentTag, setCurrentTag,
                setActiveTab, setShowInputModal, showToast, setIsProcessing, setProcessMsg,
                setGlobalSearch, targetId, setTargetId, selectedMissingCodes, setSelectedMissingCodes,
                processedCodes, setProcessedCodes, setShowErpModal
            } = appState;

            const executeParser = useCallback((rawText, tag, forceManual = false) => {
                setShowInputModal(false); 
                setIsProcessing(true); 
                setProcessMsg("AI 분석 및 스마트 매칭 중...");
                setCurrentTag(tag);
                setProcessedCodes(new Set());

                setTimeout(() => {
                    try {
                        const parsedData = parseTextSemantically(rawText);
                        const results = []; 
                        
                        parsedData.forEach(rowData => {
                            const extName = rowData['품목명'] || '';
                            const extSpec = rowData['규격'] || '';
                            
                            let matchResult;
                            if (forceManual) matchResult = { code: '', status: '🔴 불일치' };
                            else matchResult = runSmartMatch(extName, extSpec, masterProducts, parserDict);
                            
                            rowData._matchCode = matchResult.code; 
                            rowData._matchStatus = matchResult.status;
                            if(matchResult.code) { rowData.코드 = matchResult.code; }
                            
                            rowData.finalData = {};
                            const pInNum = rowData['입고가'] ? parseNum(rowData['입고가']) : 0;
                            
                            if (pInNum > 0 && matchResult.code) {
                                const mItem = masterProducts[matchResult.code] || {};
                                rowData.finalData = calculatePricesEngine(pInNum, mItem, {}, marginRules, true);
                            } else {
                                rowData.finalData['입고가'] = pInNum;
                            }
                            results.push(rowData);
                        });
                        
                        setParserBuffer(results); 
                        setActiveTab(forceManual ? 'unmatched' : 'matched'); 
                        setTargetId(null); 
                        setGlobalSearch(''); 
                        setSelectedMissingCodes(new Set());

                        showToast(forceManual ? '✅ 수동 매핑 모드로 로드되었습니다.' : '✅ 텍스트 분석 및 매칭이 완료되었습니다.');
                    } catch (error) {
                        console.error(error);
                        showToast("❌ 텍스트 분석 중 예기치 않은 오류가 발생했습니다.");
                    } finally {
                        setIsProcessing(false); 
                        setProcessMsg(''); 
                    }
                }, 100);
            }, [masterProducts, parserDict, marginRules, currentTag, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setIsProcessing, setProcessMsg, showToast]);

            const handleApplyMatched = useCallback(async () => {
                const toApply = parserBuffer.filter(r => r._apply && r._matchCode);
                if (toApply.length === 0) {
                    showToast("⚠️ 적용할 항목이 없습니다.");
                    return false;
                }

                setIsProcessing(true); setProcessMsg("데이터베이스 저장 및 이력 기록 중...");

                try {
                    let newMaster = { ...masterProducts };
                    let newDict = { ...parserDict };
                    let newlyProcessed = new Set(processedCodes);
                    
                    let localLogs = [];
                    const nowStr = new Date().toLocaleString('ko-KR');

                    // [개선] 델타 동기화 큐 불러오기
                    let unsyncedMaster = await getIDB(STORAGE_KEYS.UNSYNCED_MASTER) || {};
                    let unsyncedHistory = await getIDB(STORAGE_KEYS.UNSYNCED_HISTORY) || [];

                    toApply.forEach(row => {
                        const code = row._matchCode;
                        newlyProcessed.add(code);

                        const oldItem = newMaster[code] || {};
                        if (!newMaster[code]) newMaster[code] = { 코드: code };
                        else newMaster[code] = { ...newMaster[code] };
                        
                        const pInNum = parseNum(row.finalData?.['입고가'] || row['입고가']);
                        if (pInNum > 0) {
                            const oldP = parseNum(oldItem['입고가']);
                            if (oldP > 0 && oldP !== pInNum) {
                                localLogs.push({
                                    id: generateUUID(), timestamp: nowStr, code: code, 
                                    name: oldItem.품목명 || row['품목명'], spec: oldItem.규격 || row['규격'], 
                                    field: '입고가', oldVal: oldP, newVal: pInNum, diff: pInNum - oldP, catalog: currentTag
                                });
                            }

                            newMaster[code]['입고가'] = pInNum;
                            const recalculated = calculatePricesEngine(pInNum, newMaster[code], row.finalData || {}, marginRules, false);
                            Object.assign(newMaster[code], recalculated);
                        }

                        if (currentTag) {
                            newMaster[code]['카탈로그'] = addTag(newMaster[code]['카탈로그'], currentTag);
                        }

                        if (row['품목명']) {
                            const normExtName = normalizeText(row['품목명']);
                            const normExtSpec = normalizeText(row['규격']);
                            newDict[`${normExtName}|${normExtSpec}`] = code;
                        }
                        
                        // 델타 마스터 큐에 추가
                        unsyncedMaster[code] = newMaster[code];
                    });

                    if (localLogs.length > 0) {
                        let currentHistory = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                        const combined = [...localLogs, ...currentHistory].slice(0, 2000);
                        await setIDB(STORAGE_KEYS.HISTORY_DB, combined);
                        
                        // 델타 히스토리 큐에 추가
                        unsyncedHistory = [...unsyncedHistory, ...localLogs];
                        await setIDB(STORAGE_KEYS.UNSYNCED_HISTORY, unsyncedHistory);
                    }

                    await saveMaster(newMaster); 
                    await setIDB(STORAGE_KEYS.UNSYNCED_MASTER, unsyncedMaster);
                    saveDict(newDict); 
                    
                    setProcessedCodes(newlyProcessed);
                    const appliedIds = new Set(toApply.map(r => r._id));
                    setParserBuffer(prev => prev.filter(r => !appliedIds.has(r._id)));

                    showToast(`✅ ${toApply.length}건 최종 반영 완료! (마스터 갱신 및 AI 학습됨)`);
                    return true;
                } catch (error) {
                    console.error(error);
                    showToast("❌ 데이터베이스 저장 중 오류가 발생했습니다.");
                    return false;
                } finally {
                    setIsProcessing(false); setProcessMsg(''); 
                }
            }, [parserBuffer, masterProducts, parserDict, marginRules, currentTag, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setIsProcessing, setProcessMsg, showToast]);

            const handleConfirmMapping = useCallback(async (masterCode) => { 
                if (!targetId) return showToast("⚠️ 먼저 왼쪽에서 매핑할 타겟 상품을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId); if (!row) return;

                try {
                    let mItem = masterProducts[masterCode] || { 코드: masterCode };
                    const pInNum = row.finalData?.['입고가'] ? parseNum(row.finalData['입고가']) : parseNum(row['입고가']);
                    let recalculatedFinal = row.finalData || {};

                    if(pInNum > 0) {
                        recalculatedFinal = calculatePricesEngine(pInNum, mItem, recalculatedFinal, marginRules, false);
                    }
                    
                    const nextBuffer = parserBuffer.map(r => {
                        if (r._id === targetId) {
                            return { ...r, _matchCode: masterCode, _matchStatus: '🟢 수동일치', _apply: true, finalData: recalculatedFinal };
                        }
                        return r;
                    });

                    setParserBuffer(nextBuffer);
                    setTargetId(null); setGlobalSearch(''); 
                    setActiveTab('matched'); 
                    
                    showToast(`✅ 수동 연결 대기 완료! (일치 탭으로 이동되었습니다)`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 수동 매핑 처리 중 오류가 발생했습니다.");
                }
            }, [targetId, parserBuffer, masterProducts, marginRules, setParserBuffer, setTargetId, setGlobalSearch, setActiveTab, showToast]);

            const handleCancelMapping = useCallback((rowId) => {
                setParserBuffer(prev => prev.map(r => {
                    if (r._id === rowId) {
                        return { ...r, _matchCode: '', _matchStatus: '🔴 불일치(취소됨)', _apply: false };
                    }
                    return r;
                }));
            }, [setParserBuffer]);

            const handleCreateNewMasterItem = useCallback(async (erpCode) => {
                if (!targetId) return showToast("⚠️ 먼저 추가할 파싱 항목을 선택하세요.");
                const row = parserBuffer.find(r => r._id === targetId);
                if (!row) return;

                if (!erpCode || !erpCode.trim()) return showToast("⚠️ ERP 코드를 입력해주세요.");
                const newCode = erpCode.trim();

                if (masterProducts[newCode]) {
                    return showToast("⚠️ 이미 마스터 DB에 존재하는 코드입니다. '연결(바인딩)' 버튼을 이용해주세요.");
                }

                setIsProcessing(true); setProcessMsg("신규 마스터 품목 등록 중...");

                try {
                    let newMaster = { ...masterProducts };
                    const pInNum = row.finalData?.['입고가'] !== undefined ? parseNum(row.finalData['입고가']) : parseNum(row['입고가']);

                    newMaster[newCode] = {
                        코드: newCode,
                        품목명: row['품목명'],
                        규격: row['규격'] || '',
                        단위: row['단위'] || '',
                        입고가: pInNum,
                        카탈로그: currentTag ? currentTag : ''
                    };

                    const recalculatedFinal = calculatePricesEngine(pInNum, newMaster[newCode], row.finalData || {}, marginRules, false);
                    Object.assign(newMaster[newCode], recalculatedFinal);

                    // 델타 동기화 큐 적용
                    const unsyncedMaster = await getIDB(STORAGE_KEYS.UNSYNCED_MASTER) || {};
                    unsyncedMaster[newCode] = newMaster[newCode];
                    await setIDB(STORAGE_KEYS.UNSYNCED_MASTER, unsyncedMaster);

                    await saveMaster(newMaster);

                    const normExtName = normalizeText(row['품목명']);
                    const normExtSpec = normalizeText(row['규격']);
                    const dictKey = `${normExtName}|${normExtSpec}`;
                    const newDict = { ...parserDict, [dictKey]: newCode };
                    saveDict(newDict);

                    const newProcessed = new Set(processedCodes);
                    newProcessed.add(newCode);
                    setProcessedCodes(newProcessed);

                    const nextBuffer = parserBuffer.map(r => {
                        if (r._id === targetId) {
                            return { ...r, _matchCode: newCode, _matchStatus: '🟢 신규등록', _apply: true, finalData: recalculatedFinal, 코드: newCode };
                        }
                        return r;
                    });
                    
                    setParserBuffer(nextBuffer);
                    setTargetId(null);
                    setGlobalSearch('');
                    setActiveTab('matched');
                    setShowErpModal(false);

                    showToast(`✅ [${newCode}] 신규 마스터 등록 및 매핑이 완료되었습니다!`);
                } catch(error) {
                    console.error(error);
                    showToast("❌ 신규 등록 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [targetId, parserBuffer, masterProducts, currentTag, marginRules, parserDict, processedCodes, saveMaster, saveDict, setProcessedCodes, setParserBuffer, setTargetId, setGlobalSearch, setActiveTab, setShowErpModal, setIsProcessing, setProcessMsg, showToast]);

            const handleIgnoreParsedItem = useCallback((id) => {
                setParserBuffer(prev => prev.filter(r => r._id !== id));
                if (targetId === id) { setTargetId(null); setGlobalSearch(''); }
            }, [targetId, setParserBuffer, setTargetId, setGlobalSearch]);

            const handleRemoveMissingTags = useCallback(async () => {
                const codesToProcess = Array.from(selectedMissingCodes);
                if (codesToProcess.length === 0) return showToast("⚠️ 제외할 상품을 선택하세요.");
                if (!currentTag) return showToast("⚠️ 기준 카탈로그가 없습니다.");

                setIsProcessing(true); setProcessMsg("카탈로그 제외 처리 중...");
                
                try {
                    let newMaster = { ...masterProducts };
                    let count = 0;
                    const unsyncedMaster = await getIDB(STORAGE_KEYS.UNSYNCED_MASTER) || {};

                    codesToProcess.forEach(code => {
                        if (newMaster[code]) {
                            newMaster[code]['카탈로그'] = removeTag(newMaster[code]['카탈로그'], currentTag);
                            unsyncedMaster[code] = newMaster[code];
                            count++;
                        }
                    });

                    await setIDB(STORAGE_KEYS.UNSYNCED_MASTER, unsyncedMaster);
                    await saveMaster(newMaster);
                    setSelectedMissingCodes(new Set()); 
                    showToast(`✅ ${count}개 상품을 '${currentTag}' 카탈로그에서 조용히 제외했습니다.`);
                } catch (error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false); setProcessMsg('');
                }
            }, [selectedMissingCodes, masterProducts, currentTag, saveMaster, setSelectedMissingCodes, setIsProcessing, setProcessMsg, showToast]);

            const handleRemoveTagDirect = useCallback(async (code) => {
                if (!currentTag) return;
                if(!window.confirm(`이 상품을 [${currentTag}] 카탈로그에서 강제로 단종(제외) 처리하시겠습니까?`)) return;
                
                try {
                    let newMaster = { ...masterProducts };
                    const unsyncedMaster = await getIDB(STORAGE_KEYS.UNSYNCED_MASTER) || {};
                    if (newMaster[code]) {
                        newMaster[code]['카탈로그'] = removeTag(newMaster[code]['카탈로그'], currentTag);
                        unsyncedMaster[code] = newMaster[code];
                        await setIDB(STORAGE_KEYS.UNSYNCED_MASTER, unsyncedMaster);
                        await saveMaster(newMaster);
                        showToast(`✅ 선택한 상품을 '${currentTag}' 카탈로그에서 단종 처리했습니다.`);
                    }
                } catch(error) {
                    console.error(error);
                    showToast("❌ 제외 처리 중 오류가 발생했습니다.");
                }
            }, [masterProducts, currentTag, saveMaster, showToast]);

            return { 
                executeParser, handleApplyMatched, handleConfirmMapping, handleCancelMapping, 
                handleCreateNewMasterItem, handleIgnoreParsedItem, handleRemoveMissingTags, handleRemoveTagDirect,
                openErpModal: () => setShowErpModal(true)
            };
        };

        // ==========================================
        // 🧩 5. UI 컴포넌트
        // ==========================================
        const ErpCodeInputModal = ({ onClose, onSubmit, targetItem }) => {

        const EditablePriceCell = React.memo(({ rowId, initialVal, onUpdate }) => {
            const [localVal, setLocalVal] = useState(initialVal);
            const [isFocused, setIsFocused] = useState(false);

            useEffect(() => {
                if (!isFocused) setLocalVal(initialVal);
            }, [initialVal, isFocused]);

            const commitChange = (v) => {
                if (String(v) !== String(initialVal)) onUpdate(rowId, v);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.target.blur();
                }
            };

            return (
                <input 
                    type="text" 
                    className="w-full bg-transparent text-right outline-none hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] font-bold text-indigo-700 transition-colors" 
                    value={localVal === "오류" ? "" : localVal} 
                    onChange={(e) => setLocalVal(e.target.value)} 
                    onFocus={() => setIsFocused(true)}
                    onBlur={(e) => { setIsFocused(false); commitChange(e.target.value); }}
                    onKeyDown={handleKeyDown}
                    onClick={(e) => e.target.select()} 
                />
            );

                                        <span className="text-[11px] text-slate-400 font-bold mr-1"><i className="fas fa-history mr-1"></i>기존 카탈로그:</span>

            const [viewMode, setViewMode] = useState('mapping'); // 'mapping' | 'price'
            const [priceFilter, setPriceFilter] = useState('all'); // 'all', 'up', 'down', 'same'
            
            const { parserBuffer, masterProducts } = state;
            const { handleCancelMapping } = actions;

            const targetRows = useMemo(() => {
                return parserBuffer.filter(r => r._apply && r._matchCode);
            }, [parserBuffer]);

            useEffect(() => {
                if (targetRows.length === 0) onClose();
            }, [targetRows.length, onClose]);

            const analysis = useMemo(() => {
                let up = 0, down = 0, same = 0;
                const list = [];

                targetRows.forEach(row => {
                    const mItem = masterProducts[row._matchCode] || {};
                    const oldP = parseNum(mItem['입고가']);
                    const newP = parseNum(row.finalData?.['입고가'] !== undefined ? row.finalData['입고가'] : row['입고가']);
                    
                    let status = 'same';
                    if (oldP === 0 || newP === 0) { status = 'same'; same++; }
                    else if (newP > oldP) { status = 'up'; up++; }
                    else if (newP < oldP) { status = 'down'; down++; }
                    else { status = 'same'; same++; }

                    list.push({
                        ...row,
                        기존단가: oldP,
                        새단가: newP,
                        차액: newP - oldP,
                        상태: status,
                        마스터품명: mItem.품목명 || '',
                        마스터규격: mItem.규격 || ''
                    });
                });

                const priceList = [...list].sort((a, b) => Math.abs(b.차액) - Math.abs(a.차액));
                return { up, down, same, total: targetRows.length, list, priceList };
            }, [targetRows, masterProducts]);

            const filteredPriceList = useMemo(() => {
                if (priceFilter === 'all') return analysis.priceList;
                return analysis.priceList.filter(item => item.상태 === priceFilter);

                                        <span className="text-[11px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-black">총 {analysis.total}건 대기중</span>
                                    </div>

                                                            </div>
                                                        </td>

                                                            <div className="flex flex-col">
                                                                <span className="text-[10px] font-mono text-slate-400 mb-0.5">{item._matchCode}</span>
                                                                <span className="font-bold text-slate-800 truncate">{item.마스터품명 || item['품목명']} <span className="font-normal text-slate-500 text-[11px]">({item.마스터규격 || item['규격']})</span></span>
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-2 text-center">
                                                            <button onClick={() => actions.handleCancelMapping(item._id)} className="px-2.5 py-1.5 bg-white border border-rose-200 text-rose-500 hover:bg-rose-50 hover:text-rose-600 rounded text-[11px] font-bold transition-colors shadow-sm" title="연결을 해제하고 표로 되돌립니다.">취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                            <div className={`text-[11px] font-bold mb-1 ${priceFilter === 'down' ? 'text-blue-100' : 'text-blue-500'}`}><i className="fas fa-arrow-down mr-1"></i>인하</div>
                                            <div className={`font-black text-xl ${priceFilter === 'down' ? 'text-white' : 'text-blue-700'}`}>{analysis.down}<span className="text-[11px] ml-1 font-bold">건</span></div>
                                        </div>
                                        <div onClick={() => setPriceFilter('same')} className={`cursor-pointer border p-3 rounded-xl flex flex-col items-center justify-center shadow-sm transition-all hover:-translate-y-0.5 ${priceFilter === 'same' ? 'bg-slate-500 border-slate-500 text-white' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                            <div className={`text-[11px] font-bold mb-1 ${priceFilter === 'same' ? 'text-slate-200' : 'text-slate-500'}`}><i className="fas fa-equals mr-1"></i>동결/기타 (0원 포함)</div>
                                            <div className={`font-black text-xl ${priceFilter === 'same' ? 'text-white' : 'text-slate-700'}`}>{analysis.same}<span className="text-[11px] ml-1 font-bold">건</span></div>

                                        </div>
