                                                        <th className="px-4 py-2 text-right">기존 입고가</th>
                                                        <th className="px-4 py-2 text-right text-indigo-600">새 입고가</th>
                                                        <th className="px-4 py-2 text-right">차액</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredPriceList.length === 0 ? (
                                                        <tr><td colSpan="6" className="p-8 text-center text-slate-400 font-bold">해당 조건의 항목이 없습니다.</td></tr>
                                                    ) : filteredPriceList.map(item => (
                                                        <tr key={`price-${item._id}`} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-4 py-2 text-center">
                                                                {item.상태 === 'up' && <span className="bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px] font-black">인상</span>}
                                                                {item.상태 === 'down' && <span className="bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded text-[10px] font-black">인하</span>}
                                                                {item.상태 === 'same' && <span className="text-slate-400 text-[10px] font-black">-</span>}
                                                            </td>
                                                            <td className="px-4 py-2 font-mono text-slate-500 text-[11px]">{item._matchCode}</td>
                                                            <td className="px-4 py-2 font-bold text-slate-800 truncate max-w-[200px]">{item.마스터품명 || item['품목명']} <span className="text-slate-400 font-normal ml-1 text-[11px]">({item.마스터규격 || item['규격']})</span></td>
                                                            <td className="px-4 py-2 text-right text-slate-500">{item.기존단가 > 0 ? item.기존단가.toLocaleString() : '-'}</td>
                                                            <td className="px-4 py-2 text-right font-black text-indigo-600">{item.새단가 > 0 ? item.새단가.toLocaleString() : '-'}</td>
                                                            <td className="px-4 py-2 text-right font-bold">
                                                                {item.차액 > 0 && <span className="text-rose-500">+{item.차액.toLocaleString()}</span>}
                                                                {item.차액 < 0 && <span className="text-blue-500">{item.차액.toLocaleString()}</span>}
                                                                {item.차액 === 0 && <span className="text-slate-300">-</span>}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center shrink-0">
                            <div className="text-[11px] text-slate-500 font-bold"><i className="fas fa-lightbulb text-amber-500 mr-1"></i>두 가지 탭을 모두 확인하여 매핑 오류와 단가를 점검한 후 최종 반영하세요.</div>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-5 py-2.5 bg-slate-100 border border-slate-200 text-slate-600 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기 (수정하러 가기)</button>
                                <button onClick={() => { onConfirm(); onClose(); }} className="px-6 py-2.5 bg-indigo-600 text-white font-black rounded-lg hover:bg-indigo-700 shadow-sm transition-colors flex items-center">
                                    <i className="fas fa-save mr-1.5 text-[14px]"></i> 최종 반영 및 AI 사전 등록
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 메인 렌더링
        // ==========================================
        const ParserApp = () => {
            const appState = useParserApp();
            const actions = useParserActions(appState);

            const { 
                masterProducts, parserBuffer, currentTag, activeTab, setActiveTab,
                showInputModal, setShowInputModal, showReviewModal, setShowReviewModal, 
                showErpModal, setShowErpModal,
                toastMsg, showToast, isProcessing, processMsg,
                globalSearch, setGlobalSearch, targetId, setTargetId,
                selectedMissingCodes, setSelectedMissingCodes, processedCodes, marginRules
            } = appState;

            const availableTags = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({
                    name: tag,
                    count: counts[tag]
                }));
            }, [masterProducts]);

            const matchedRows = parserBuffer.filter(r => r._matchCode);
            const similarRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('유사') && !r._matchStatus.includes('중복'));
            const duplicateRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('중복품목'));
            const combinedSimilarRows = [...duplicateRows, ...similarRows];
            const unmatchedRows = parserBuffer.filter(r => !r._matchCode && r._matchStatus.includes('불일치'));

            const missingRows = useMemo(() => {
                if (!currentTag) return [];
                const matchedCodes = new Set(matchedRows.map(r => String(r._matchCode)));
                const processedStr = new Set(Array.from(processedCodes).map(String));
                const missing = [];
                for (const code in masterProducts) {
                    const mItem = masterProducts[code];
                    const tags = (mItem['카탈로그'] || '').split(',').map(s => s.trim());
                    if (tags.includes(currentTag) && !matchedCodes.has(String(code)) && !processedStr.has(String(code))) {
                        missing.push(mItem);
                    }
                }
                return missing;
            }, [masterProducts, matchedRows, currentTag, processedCodes]);

            const masterSearchResults = useMemo(() => {
                if ((activeTab !== 'similar' && activeTab !== 'unmatched') || !globalSearch.trim()) return [];
                return searchMasterProducts(masterProducts, globalSearch).slice(0, 50);
            }, [globalSearch, masterProducts, activeTab]);

            const displayUnmatchedRows = activeTab === 'similar' ? combinedSimilarRows : unmatchedRows;
            const hasPendingMappings = combinedSimilarRows.length > 0 || unmatchedRows.length > 0;

            const handleUpdateMatchedPrice = useCallback((rowId, newVal) => {
                appState.setParserBuffer(prev => prev.map(r => {
                    if (r._id === rowId) {
                        const mItem = masterProducts[r._matchCode] || {};
                        const pInRaw = newVal;
                        const recalculatedFinal = calculatePricesEngine(parseNum(pInRaw), mItem, r.finalData || {}, marginRules, true);
                        return { ...r, finalData: recalculatedFinal };
                    }
                    return r;
                }));
            }, [masterProducts, marginRules, appState]);

            const handleNavigate = useCallback((e, path) => {
                if (e && e.preventDefault) e.preventDefault();
                
                if (path === '#') {
                    showToast('⚠️ 준비 중인 기능입니다.');
                    return;
                }

                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            const handlePush = async () => {
                const cloudUrl = localStorage.getItem('skuSyncCloudUrl_v6');
                if (!cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                
                const unsyncedMaster = await getIDB(STORAGE_KEYS.UNSYNCED_MASTER) || {};
                const unsyncedHistory = await getIDB(STORAGE_KEYS.UNSYNCED_HISTORY) || [];
                const unsyncedDeletes = await getIDB(STORAGE_KEYS.UNSYNCED_DELETES) || [];

                if (Object.keys(unsyncedMaster).length === 0 && unsyncedHistory.length === 0 && unsyncedDeletes.length === 0) {
                    return showToast("⚠️ 클라우드에 새로 반영할 변경사항이 없습니다.");
                }

                appState.setIsProcessing(true); 
                appState.setProcessMsg("클라우드 백업 중...");
                
                try {
                    const payload = {
                        action: 'pushData',
                        masterDelta: unsyncedMaster,
                        historyDelta: unsyncedHistory,
                        deletedCodes: unsyncedDeletes,
                        parserDict: appState.parserDict,
                        marginRules: appState.marginRules
                    };

                    const response = await fetch(cloudUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        await setIDB(STORAGE_KEYS.UNSYNCED_MASTER, {});
                        await setIDB(STORAGE_KEYS.UNSYNCED_HISTORY, []);
                        await setIDB(STORAGE_KEYS.UNSYNCED_DELETES, []);
                        showToast(`✅ 클라우드 데이터 백업이 완료되었습니다. (수정 ${Object.keys(unsyncedMaster).length}건)`);
                    } else {
                        throw new Error(result.message);
                    }
                } catch(error) {
                    console.error("Push Error:", error);
                    showToast("❌ 클라우드 통신 중 오류가 발생했습니다.");
                } finally {
                    appState.setIsProcessing(false); 
                    appState.setProcessMsg("");
                }
            };

            const handlePull = async () => {
                const cloudUrl = localStorage.getItem('skuSyncCloudUrl_v6');
                if (!cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                
                appState.setIsProcessing(true); 
                appState.setProcessMsg("데이터 동기화 중...");
                
                try {
                    const response = await fetch(`${cloudUrl}?action=pullData`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        if (result.master) await appState.saveMaster(result.master);
                        if (result.parserDict) appState.saveDict(result.parserDict);
                        if (result.history) await setIDB(STORAGE_KEYS.HISTORY_DB, result.history);
                        if (result.marginRules && result.marginRules.length > 0) {
                            localStorage.setItem('merchMarginRules_v878', JSON.stringify(result.marginRules));
                        }
                        localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                        showToast("✅ 데이터 수신 완료! 최신 상태로 동기화되었습니다.");
                    } else {
                        throw new Error(result.message || "서버 응답 오류");
                    }
                } catch(error) {
                    console.error("Pull Error:", error);
                    showToast("❌ 데이터 동기화 중 오류가 발생했습니다.");
                } finally {
                    appState.setIsProcessing(false); 
                    appState.setProcessMsg("");
                }
            };

            const [showSettingsModal, setShowSettingsModal] = useState(false);

            return (
                <div className="h-screen w-full bg-slate-100 flex justify-center overflow-hidden font-sans">
                    <style>{`
                        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
                        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; overflow: hidden; }
                        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
                        .fade-in { animation: fadeIn 0.3s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                    `}</style>
                    
                    {toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><i className="fas fa-check-circle text-emerald-400"></i>{toastMsg}</div>}

                    <div className="w-full max-w-[1500px] h-full flex flex-col bg-slate-50 shadow-2xl overflow-hidden mx-auto">
                        <GlobalHeader 
                            activeTab="parser" 
                            itemCount={Object.keys(masterProducts).length} 
                            isProcessing={isProcessing} 
                            processMsg={processMsg} 
                            onOpenSettings={() => setShowSettingsModal(true)} 
                            onPush={handlePush} 
                            onPull={handlePull} 
                            onNavigate={handleNavigate} 
                        />
                            
                        <div className="px-6 pt-4 pb-3 flex items-center justify-between gap-4 overflow-x-auto custom-scrollbar w-full border-b border-slate-200 bg-white shadow-sm shrink-0 z-10">
                            
                            <div className="flex gap-1.5 shrink-0 bg-slate-100/80 p-1.5 rounded-xl border border-slate-200">
                                <button onClick={()=>setActiveTab('matched')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='matched' ? 'bg-white text-emerald-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🟢 일치 ({matchedRows.length})</button>
                                <button onClick={()=>setActiveTab('similar')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='similar' ? 'bg-white text-amber-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🟡 유사 ({combinedSimilarRows.length})</button>
                                <button onClick={()=>setActiveTab('unmatched')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all ${activeTab==='unmatched' ? 'bg-white text-rose-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>🔴 불일치 ({unmatchedRows.length})</button>
                                <div className="w-px bg-slate-300 mx-0.5 my-1"></div>
                                <button onClick={()=>setActiveTab('missing')} className={`px-4 py-1.5 rounded-lg text-[12px] font-black transition-all flex items-center gap-1.5 ${activeTab==='missing' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>⚪ 누락 {currentTag && missingRows.length > 0 && <span className="bg-rose-100 text-rose-600 px-1.5 rounded text-[10px]">{missingRows.length}</span>}</button>
                            </div>

                            <div className="flex-1 min-w-[10px]">
                                {currentTag ? (
                                    <div className="w-full max-w-sm mx-auto bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-md text-[12px] font-bold flex items-center justify-center shadow-inner truncate border border-indigo-100"><i className="fas fa-folder mr-2 opacity-80"></i>작업 카탈로그: <span className="ml-1 text-indigo-900 font-black truncate">{currentTag}</span></div>
                                ) : parserBuffer.length > 0 && (
                                    <div className="w-full max-w-sm mx-auto bg-slate-100 text-slate-600 px-4 py-1.5 rounded-md text-[12px] font-bold flex items-center justify-center shadow-inner truncate border border-slate-200"><i className="fas fa-bolt mr-2 opacity-80"></i>단순 파싱 모드 <span className="ml-1 text-slate-400 font-normal truncate">(카탈로그 미지정)</span></div>
                                )}
                            </div>

                            <div className="flex items-center gap-2 shrink-0">
                                {activeTab === 'matched' && (
                                    <button onClick={() => setShowReviewModal(true)} disabled={matchedRows.filter(r=>r._apply).length === 0} className={`h-9 px-5 rounded-lg text-[12px] font-black shadow-sm transition-colors flex items-center ${matchedRows.filter(r=>r._apply).length > 0 ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`} title="매핑 작업을 완료하고 투트랙 프리뷰를 검토합니다.">
                                        <i className="fas fa-check-circle mr-1.5 text-[13px]"></i> 완료
                                    </button>
                                )}
                                {activeTab === 'missing' && (
                                    <button onClick={actions.handleRemoveMissingTags} className={`h-9 px-4 rounded-lg text-[12px] font-bold shadow-sm transition-colors flex items-center ${selectedMissingCodes.size > 0 ? 'bg-rose-50 border border-rose-200 text-rose-600 hover:bg-rose-100' : 'bg-white text-slate-400 border border-slate-200'}`}>
                                        <i className="fas fa-eraser mr-1.5 text-[13px]"></i> 카탈로그 제외
                                    </button>
                                )}
                                
                                {(activeTab === 'matched' || activeTab === 'missing') && <div className="w-px h-6 bg-slate-300 mx-1"></div>}
                                
                                <button onClick={() => setShowInputModal(true)} className="h-9 px-4 rounded-lg text-[12px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 hover:bg-indigo-100 shadow-sm transition-colors flex items-center">
                                    <i className="fas fa-magic mr-1.5 text-[13px]"></i> 새 파싱
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-auto p-5 pt-0 bg-slate-100 mt-4">
                            {!currentTag && parserBuffer.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <i className="fas fa-robot text-6xl text-slate-300 mb-4"></i>
                                    <h2 className="text-xl font-black text-slate-600 mb-2">Smart Parser 대기중</h2>
                                    <p className="text-[13px] font-bold">상단 [새 텍스트 파싱] 버튼을 눌러 작업을 시작하세요.</p>
                                </div>
                            ) : activeTab === 'matched' ? (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in">
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-[#f5f4f0] text-[#5c554d] font-bold sticky top-0 z-10 border-b border-[#e8e4db]">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center"><input type="checkbox" className="rounded" checked={matchedRows.length>0 && matchedRows.every(r=>r._apply)} onChange={() => { const all = matchedRows.every(r=>r._apply); appState.setParserBuffer(p => p.map(r => r._matchCode ? {...r, _apply: !all} : r)); }} /></th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-emerald-700 bg-emerald-50/50">파싱 품목명</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3 text-right text-emerald-700 bg-emerald-50/50">새 입고가</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {matchedRows.length === 0 ? <tr><td colSpan="6" className="p-10 text-center text-slate-400">데이터가 없습니다.</td></tr> : matchedRows.map(row => {
                                                    const mItem = masterProducts[row._matchCode] || {};
                                                    const mIn = parseNum(mItem['입고가']);
                                                    const pIn = parseNum(row.finalData['입고가']);
                                                    const isDiff = mIn > 0 && mIn !== pIn;
                                                    return (
                                                        <tr key={row._id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="py-2 px-4 text-center"><input type="checkbox" className="rounded text-emerald-600 focus:ring-emerald-500" checked={row._apply} onChange={() => appState.setParserBuffer(p => p.map(r => r._id === row._id ? {...r, _apply: !r._apply} : r))} /></td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{row._matchCode}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명 || row['품목명']}</span> <span className="text-[11px] text-slate-400">({mItem.규격 || row['규격']})</span></td>
                                                            <td className="py-2 px-3 text-emerald-800 bg-emerald-50/20 font-bold">{row['품목명']}</td>
                                                            <td className="py-2 px-3 text-right text-slate-500 font-bold">{mIn ? mIn.toLocaleString() : '-'}</td>
                                                            <td className={`py-2 px-3 text-right font-black ${isDiff ? 'bg-rose-50/30' : 'bg-emerald-50/20'}`}>
                                                                <EditablePriceCell rowId={row._id} initialVal={row.finalData['입고가']} onUpdate={handleUpdateMatchedPrice} />
                                                            </td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : activeTab === 'missing' ? (
                                !currentTag ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm fade-in">
                                        <i className="fas fa-folder-open text-6xl text-slate-200 mb-4"></i>
                                        <h2 className="text-xl font-black text-slate-600 mb-2">누락(단종) 계산 생략됨</h2>
                                        <p className="text-[13px] font-bold text-center leading-relaxed">새 텍스트 파싱 시 기준 카탈로그를 지정하지 않아<br/>누락 상품 대조 작업이 생략되었습니다.</p>
                                    </div>
                                ) : (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col overflow-hidden fade-in relative">
                                    {hasPendingMappings && (
                                        <div className="bg-amber-50 border-b border-amber-200 p-3.5 flex items-center gap-3 text-amber-800 text-[13px] font-bold shrink-0 shadow-inner">
                                            <i className="fas fa-exclamation-triangle text-amber-500 text-lg"></i>
                                            <div className="flex flex-col">
                                                <span>주의! 아직 처리하지 않은 [유사] 또는 [불일치] 항목이 <span className="text-rose-600 font-black px-1">{combinedSimilarRows.length + unmatchedRows.length}건</span> 남아있습니다.</span>
                                                <span className="text-[11px] font-normal opacity-80 mt-0.5">이 항목들이 단순히 오타로 인해 매칭 안된 것일 수 있으므로, 수동 연결을 먼저 끝마치신 후에 여기서 누락(단종) 처리를 진행해야 안전합니다.</span>
                                            </div>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex flex-col gap-2 shrink-0">
                                        <div className="flex items-center gap-2 text-slate-700 text-[13px] font-bold"><i className="fas fa-info-circle text-indigo-500"></i>마스터 DB에는 <span className="bg-indigo-100 text-indigo-800 px-1.5 py-0.5 rounded">'{currentTag}'</span> 카탈로그에 등록되어 있지만, 이번 파싱 텍스트에는 없는 상품들입니다. (단종 의심)</div>
                                        <div className="text-[11px] text-slate-500">목록에서 체크 후 상단의 [제외] 버튼을 누르면 단가를 훼손하지 않고 해당 카탈로그에서만 조용히 제외합니다.</div>
                                    </div>
                                    <div className="flex-1 overflow-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-white sticky top-0 z-10 border-b border-slate-200 text-slate-600">
                                                <tr>
                                                    <th className="py-2.5 px-4 w-12 text-center">
                                                        <input type="checkbox" className="rounded cursor-pointer" checked={missingRows.length > 0 && selectedMissingCodes.size === missingRows.length} onChange={(e) => {
                                                            const isChecked = e.target.checked;
                                                            setSelectedMissingCodes(prev => {
                                                                if (isChecked) {
                                                                    return new Set(missingRows.map(r=>r.코드));
                                                                } else {
                                                                    return new Set();
                                                                }
                                                            });
                                                        }} />
                                                    </th>
                                                    <th className="py-2.5 px-3">상품코드</th>
                                                    <th className="py-2.5 px-3">마스터 품목명 (규격)</th>
                                                    <th className="py-2.5 px-3 text-right">기존 입고가</th>
                                                    <th className="py-2.5 px-3">소속 카탈로그</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {missingRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">누락된 항목이 없습니다. 완벽합니다!</td></tr> : missingRows.map(mItem => {
                                                    const isSel = selectedMissingCodes.has(mItem.코드);
                                                    return (
                                                        <tr key={`miss-${mItem.코드}`} onClick={() => {
                                                            setSelectedMissingCodes(prev => {
                                                                const next = new Set(prev);
                                                                if(next.has(mItem.코드)) next.delete(mItem.코드); else next.add(mItem.코드);
                                                                return next;
                                                            });
                                                        }} className={`cursor-pointer transition-colors ${isSel ? 'bg-rose-50/50' : 'hover:bg-slate-50'}`}>
                                                            <td className="py-2 px-4 text-center">
                                                                <input type="checkbox" className="rounded text-rose-500 focus:ring-rose-500 pointer-events-none" checked={isSel} readOnly />
                                                            </td>
                                                            <td className="py-2 px-3 font-mono text-[11px] text-slate-500">{mItem.코드}</td>
                                                            <td className="py-2 px-3"><span className="font-bold text-slate-800">{mItem.품목명}</span> <span className="text-[11px] text-slate-400">({mItem.규격})</span></td>
                                                            <td className="py-2 px-3 text-right text-slate-500">{mItem.입고가 ? Number(mItem.입고가).toLocaleString() : '-'}</td>
                                                            <td className="py-2 px-3 text-[11px] text-indigo-500 font-bold max-w-[200px] truncate">{mItem['카탈로그']}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                )
                            ) : (
                                <div className="flex h-full w-full gap-4 fade-in">
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden relative">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-search text-slate-400"></i><span className="text-[13px] font-black text-slate-700">마스터 수동 검색 (전체 DB)</span></div>
                                            <div className="relative">
                                                <input type="text" placeholder="검색어 입력..." value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} className="w-[200px] border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] outline-none focus:border-indigo-500" />
                                                <i className="fas fa-search absolute right-2.5 top-2 text-slate-400 text-[12px] pointer-events-none"></i>
                                            </div>
                                        </div>
                                        
                                        {targetId && (
                                            <div className="bg-indigo-50/50 px-4 py-3 border-b border-indigo-100 flex items-center justify-between shrink-0">
                                                <div className="text-[11px] text-indigo-800 font-bold">
                                                    <i className="fas fa-info-circle mr-1.5 text-indigo-500"></i>
                                                    마스터에 없는 신규 상품인가요?
                                                </div>
                                                <button onClick={() => actions.openErpModal()} className="px-3 py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded text-[11px] font-bold transition-colors shadow-sm">
                                                    <i className="fas fa-plus mr-1"></i> ERP 코드로 직접 등록
                                                </button>
                                            </div>
                                        )}

                                        <div className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/30">
                                            {!targetId && !globalSearch ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-hand-point-right text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">우측에서 매핑할 <span className="text-indigo-500">파싱 항목</span>을 먼저 선택하세요.</p></div>
                                            ) : masterSearchResults.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 p-10 text-center"><i className="fas fa-search text-4xl mb-4 text-slate-300"></i><p className="text-[13px] font-bold text-slate-500 mb-1">검색 결과가 없습니다.</p></div>
                                            ) : (
                                                <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                    <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3">상품정보 (코드/품명/규격)</th><th className="py-2.5 px-3 text-right w-20">입고가</th><th className="py-2.5 px-3 text-center w-32">동작/작업</th></tr></thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {masterSearchResults.map(m => {
                                                            const hasTag = currentTag && (m['카탈로그'] || '').split(',').map(s=>s.trim()).includes(currentTag);
                                                            return (
                                                                <tr key={m.코드} className="hover:bg-indigo-50/50 group transition-colors">
                                                                    <td className="py-2 px-3"><div className="flex flex-col min-w-0 w-full overflow-hidden"><span className="text-[10px] font-mono text-slate-400">{m.코드}</span><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[12px] font-extrabold text-slate-800 truncate">{m.품목명}</span>{m.규격 && <span className="text-[11px] text-slate-500 shrink-0">({m.규격})</span>}</div></div></td>
                                                                    <td className="py-2 px-3 text-right font-bold text-slate-600">{m.입고가 ? Number(m.입고가).toLocaleString() : '-'}</td>
                                                                    <td className="py-2 px-3 text-center flex gap-1 justify-center items-center h-full">
                                                                        <button onClick={() => actions.handleConfirmMapping(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors flex-1" title="우측 항목과 연결하여 카탈로그에 추가합니다."><i className="fas fa-link"></i> 연결</button>
                                                                        {hasTag && (
                                                                            <button onClick={() => actions.handleRemoveTagDirect(m.코드)} className="px-2 py-1.5 rounded-lg text-[11px] font-bold shadow-sm bg-rose-100 text-rose-600 hover:bg-rose-200 transition-colors" title="이 상품을 현재 카탈로그에서 즉각 단종(제외)시킵니다."><i className="fas fa-eraser"></i> 단종</button>
                                                                        )}
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="w-1/2 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col overflow-hidden">
                                        <div className="bg-[#f8fafc] px-4 py-3 border-b border-slate-200 flex items-center justify-between shrink-0">
                                            <div className="flex items-center gap-2"><i className="fas fa-list text-slate-400"></i><span className="text-[13px] font-black text-slate-700">파싱된 외부 데이터 (대기중)</span></div>
                                            <span className="text-[11px] font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">총 {displayUnmatchedRows.length}건</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            <table className="w-full text-left text-[12px] whitespace-nowrap">
                                                <thead className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm"><tr><th className="py-2.5 px-3 text-center w-10">선택</th><th className="py-2.5 px-2 text-center w-14">상태</th><th className="py-2.5 px-3">파싱 품명 및 규격</th><th className="py-2.5 px-3 text-right w-16">입고가</th><th className="py-2.5 px-2 text-center w-10">무시</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {displayUnmatchedRows.length === 0 ? <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-bold">대기중인 데이터가 없습니다.</td></tr> : displayUnmatchedRows.map(row => {
                                                        const isTarget = targetId === row._id;
                                                        return (
                                                            <tr key={row._id} onClick={() => { setTargetId(row._id); setGlobalSearch(row['품목명'].replace(/[()[\]{},./]/g, ' ').replace(/\s+/g, ' ').trim()); }} className={`cursor-pointer transition-colors border-l-4 ${isTarget ? 'bg-indigo-50/50 border-indigo-500' : 'hover:bg-slate-50 border-transparent'}`}>
                                                                <td className="py-2 px-3 text-center"><div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center mx-auto ${isTarget ? 'border-indigo-500 bg-white' : 'border-slate-300'}`}>{isTarget && <div className="w-2 h-2 rounded-full bg-indigo-500"></div>}</div></td>
                                                                <td className="py-2 px-2 text-center">
                                                                    {row._matchStatus.includes('중복품목') ? (
                                                                        <span className="bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded text-[10px] font-black" title="ERP에 이름이 똑같은 상품이 여러 개 존재합니다. 수동으로 올바른 코드를 연결해 주세요.">선택필요</span>
                                                                    ) : (
                                                                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold w-max block mx-auto ${activeTab === 'similar' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700'}`}>{row._matchStatus.substring(0, 2)}</span>
                                                                    )}
                                                                </td>
                                                                <td className="py-2 px-3"><div className="flex flex-col"><span className={`text-[12px] font-extrabold truncate ${isTarget ? 'text-indigo-900' : 'text-slate-800'}`}>{row['품목명']}</span><span className="text-[11px] text-slate-500 mt-0.5 truncate">{row['규격']} {row['단위'] ? `| ${row['단위']}` : ''}</span></div></td>
                                                                <td className={`py-2 px-3 text-right font-bold ${isTarget ? 'text-indigo-600' : 'text-slate-600'}`}>{row['입고가'] || '-'}</td>
                                                                <td className="py-2 px-2 text-center">
                                                                    <button onClick={(e) => { e.stopPropagation(); actions.handleIgnoreParsedItem(row._id); }} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 px-2 py-1.5 rounded transition-colors" title="이 항목을 매핑하지 않고 휴지통에 버립니다."><i className="fas fa-trash-alt"></i></button>
                                                                </td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    {showInputModal && <SmartParserInputModal onClose={() => setShowInputModal(false)} executeParser={actions.executeParser} showToast={showToast} availableTags={availableTags} />}
                    {showReviewModal && <ParserReviewModal onClose={() => setShowReviewModal(false)} onConfirm={actions.handleApplyMatched} state={appState} actions={actions} />}
                    {showErpModal && <ErpCodeInputModal onClose={() => setShowErpModal(false)} onSubmit={actions.handleCreateNewMasterItem} targetItem={parserBuffer.find(r => r._id === targetId)} />}
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50 p-6">
                            <i className="fas fa-exclamation-triangle text-rose-500 text-6xl mb-6"></i>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">화면 렌더링 오류 발생 (Crash)</h1>
                            <p className="text-slate-500 mb-6 text-center">
                                불러온 데이터 중 잘못된 형식(숫자 등)이 섞여있어 화면이 중단되었습니다.<br/>
                                아래 [초기화] 버튼을 눌러 복구해 주세요.
                            </p>
                            <div className="bg-white border border-rose-200 p-4 rounded-lg text-xs font-mono text-rose-600 w-full max-w-2xl overflow-auto mb-8 shadow-sm">
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <button
                                onClick={() => {
                                    indexedDB.deleteDatabase('MerchOpsDB');
                                    localStorage.removeItem('merchMaster_v870');
                                    window.location.reload();
                                }}
                                className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-lg flex items-center gap-2"
                            >
                                <i className="fas fa-redo-alt"></i> 로컬 데이터 초기화 및 복구하기
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><ParserApp /></ErrorBoundary>);
    </script>
</body>
</html>
