<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Pipeline [v2.0]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; }
        input, textarea { user-select: auto; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🔑 0. Global Storage Keys (상수화)
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            MANAGED_ITEMS: 'merchPipeline_Managed_v2', // 자동 저장 파이프라인
            MAPPINGS: 'merchMappings_v870',
            MARGIN_RULES: 'merchMarginRules_v878',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        // ==========================================
        // 🛠 SafeIcon: 아이콘 2중 안전장치
        // ==========================================
        const SafeIcon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'alert-triangle' ? 'alert-circle' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs',
                    'terminal': 'fa-terminal', 'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open',
                    'file-spreadsheet': 'fa-table', 'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes',
                    'bar-chart-3': 'fa-chart-bar', 'check': 'fa-check', 'check-circle-2': 'fa-check-circle',
                    'x': 'fa-times', 'upload': 'fa-upload', 'alert-triangle': 'fa-exclamation-triangle', 'download': 'fa-download'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        // ==========================================
        // 🧩 무제한 로컬 스토리지 (IndexedDB)
        // ==========================================
        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        // ==========================================
        // 🧩 1. 상수 및 순수 유틸리티
        // ==========================================
        const MASTER_HEADERS = ["창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록"];
        const NUMERIC_HEADERS = ["안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"];

        const generateUUID = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const getCellWidthClass = (h) => {
            if (NUMERIC_HEADERS.includes(h)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (h === '구매처' || h === '거래처명' || h === '일자') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '품목명' || h === '상품명' || h === '카탈로그' || h === '견적서') return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (h === '간단설명' || h === '지시사항' || h === '상품정보' || h === '적요2') return 'min-w-[150px] w-[150px] max-w-[150px]';
            if (h === '단위' || h === '창고') return 'min-w-[60px] w-[60px] max-w-[60px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const getFirstValidNum = (objList, keys) => { for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return parseNum(obj[k]); } } return 0; };
        const getFirstValidStr = (objList, keys) => { for (let obj of objList) { if (!obj) continue; for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k]; } } return ''; };
        const isValidSubItemCode = (code) => { if (!code) return false; const s = String(code).trim(); return s !== '' && s !== '0' && s !== '00' && s !== '-' && s.toLowerCase() !== 'undefined' && s.toLowerCase() !== 'null'; };

        // ==========================================
        // 🧩 2. 핵심 로직 (단가 계산 엔진 및 파서)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            let bestRule = null; let bestScore = -1;
            marginRules.forEach(r => {
                const matchWh = r.whCode === '*' || r.whCode.split(/[,./|\s]+/).some(s => s === whCode || (!isNaN(s) && !isNaN(whCode) && Number(s) === Number(whCode)));
                const matchUnit = r.unit === '*' || r.unit.toLowerCase().split(/[,./|\s]+/).some(s => unitStr === s || unitStr.includes(s));
                if (matchWh && matchUnit) {
                    let score = (r.whCode !== '*' ? 2 : 0) + (r.unit !== '*' ? 1 : 0);
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            const appliedRule = bestRule || { rate: 10, type: 'divide' };
            let calcOutPrice = appliedRule.type === 'divide' ? totalCost / (1 - (Math.min(appliedRule.rate, 99.99) / 100)) : totalCost * (1 + (appliedRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice, '시중가': calcOutPrice };
            const providedOutPrice = parseNum(currentFinalData?.['출고가']);
            const mIn = parseNum(mItem?.['입고가']); const mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']);
            const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {
                newFinalData['1입고'] = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let calc1Out = Math.round((newFinalData['출고가'] / div1) + extraCost);
                newFinalData['1출고'] = (!isFinite(calc1Out) || isNaN(calc1Out)) ? 0 : Math.round(calc1Out / 10) * 10; 
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {};
            if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                const matchedKey = actualHeaders.find(h => h && keywords.some(kw => String(h).toLowerCase().replace(/\s/g, '').includes(kw)));
                if(matchedKey) headerMap[field] = matchedKey;
            });
            return headerMap;
        };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 대기중"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);

                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx];
                        if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) {
                            if(rowArr[i] !== undefined && rowArr[i] !== null && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--;
                        else break;
                    }

                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) parsedData.push(obj);
                    }
                    resolve(parsedData);
                } catch(err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 3. Global Header & Navigation
        // ==========================================
        const TopHeader = ({ itemCount, isProcessing, processMsg, onOpenSettings }) => {
            const now = new Date();
            const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            let statusText = `DB: ${itemCount}건 로드됨 (${dateStr} ${timeStr})`;
            if (isProcessing) statusText = `${processMsg} (${dateStr} ${timeStr})`;

            return (
                <header className="h-16 bg-[#0B1021] text-white flex items-center justify-between px-6 shrink-0 z-50 border-b border-slate-800/80 shadow-md">
                    <div className="flex items-center">
                        <div className="flex items-center cursor-pointer group" onClick={() => window.location.href = 'dashboard.html'}>
                            <span className="font-black text-[22px] tracking-wider text-slate-100 mr-4">ONEAPP</span>
                            <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                <div className="flex items-center">
                                    <span className="font-black text-[15px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                    <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[8px] font-black tracking-wider shadow-sm leading-none">v2.0</span>
                                </div>
                                <span className="text-[9.5px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">Pipeline</span>
                            </div>
                        </div>
                        <div className="flex flex-col border-l border-slate-700/50 pl-4 ml-5">
                            <span className="text-[9px] text-emerald-500/70 font-mono tracking-widest italic uppercase flex items-center gap-1.5 mt-0.5">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500/80 animate-pulse"></div>Sync_Connected
                            </span>
                        </div>
                    </div>
                    <div className="flex-1 max-w-2xl mx-8 hidden xl:block">
                        <div className="bg-[#050814] border border-[#1A2235] rounded-md flex items-center px-4 py-2 font-mono text-[12px] shadow-inner h-9">
                            <span className="text-emerald-500 mr-2 opacity-80">{'>'}</span>
                            <span className={isProcessing ? "text-amber-400 font-bold" : "text-emerald-400 font-bold uppercase"}>
                                {isProcessing ? `WORKING: ${processMsg}` : `CLUSTER: STABLE | DB_LOADED: ${itemCount}`}
                            </span>
                            <span className="ml-2 w-1.5 h-3.5 bg-emerald-500 animate-pulse inline-block"></span>
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={onOpenSettings} className="w-10 h-10 rounded bg-[#111827] hover:bg-[#1f2937] flex items-center justify-center border border-[#475569] transition-colors text-slate-400 hover:text-white shadow-sm" title="환경설정 (품목 관리로 이동)">
                            <SafeIcon name="settings" size={20} />
                        </button>
                    </div>
                </header>
            );
        };

        const NavigationBar = ({ activeTab }) => {
            const tabs = [
                { id: 'dashboard', label: '대시보드', icon: "layout-dashboard", path: 'dashboard.html' },
                { id: 'item', label: '품목 관리', icon: "package-search", path: 'items.html' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'index.html' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'parser.html' },
                { id: 'outbound', label: '출고 관리', icon: "truck", path: '/outbound/' },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/inventory/' },
                { id: 'insight', label: '인사이트', icon: "bar-chart-3", path: '/insight/' }
            ];
            return (
                <nav className="bg-[#0B1021] px-6 flex items-end gap-1.5 shrink-0 pt-3 border-b border-slate-200 overflow-x-auto custom-scrollbar relative z-10">
                    {tabs.map(tab => {
                        const isActive = activeTab === tab.id;
                        return (
                            <a key={tab.id} href={tab.path} 
                               className={`flex items-center gap-2 px-5 py-2.5 text-[13px] font-bold rounded-t-lg transition-all whitespace-nowrap border-x border-t-[3px] 
                               ${isActive ? 'bg-slate-100 text-indigo-700 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_5px_rgba(0,0,0,0.03)]' : 'bg-[#1A2235] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1e293b] hover:text-slate-200'}`}
                               style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '11px' : '10px' }}>
                                <SafeIcon name={tab.icon} size={15} className={isActive ? 'text-indigo-600' : 'text-slate-500'} />{tab.label}
                            </a>
                        );
                    })}
                </nav>
            );
        };

        // ==========================================
        // 🧩 4. 시세관리 전용 컴포넌트들
        // ==========================================
        
        // 💡 [FIX] EditableCell의 선언 위치를 끌어올리고 isRisk 속성 처리 추가
        const EditableCell = React.memo(({ rowCode, initialVal, field, linkedMasterField, mVal, onUpdateCell, isRisk = false }) => {
            const isNumeric = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
            const [localVal, setLocalVal] = useState(initialVal);
            const [isFocused, setIsFocused] = useState(false);

            useEffect(() => {
                if (!isFocused) setLocalVal(initialVal);
            }, [initialVal, isFocused]);

            const isDiff = linkedMasterField && mVal !== undefined && localVal !== '' && String(mVal) !== String(localVal) && isNumeric;

            const commitChange = (v) => {
                if (String(v) === String(initialVal)) return;
                onUpdateCell(rowCode, field, linkedMasterField, v);
            };

            const handleKeyDown = (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    if (e.key === 'ArrowLeft' && e.target.selectionStart !== 0) return;
                    if (e.key === 'ArrowRight' && e.target.selectionEnd !== e.target.value.length) return;

                    if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) {
                        e.preventDefault();
                    }
                    
                    e.target.blur();
                    
                    const td = e.target.closest('td');
                    const tr = td.closest('tr');
                    const tbody = tr.closest('tbody');
                    
                    const tds = Array.from(tr.querySelectorAll('td:has(input[type="text"])'));
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.querySelectorAll('tr.group'));
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx;
                    let nextColIdx = colIdx;

                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);
                    if (e.key === 'ArrowLeft') { e.preventDefault(); nextColIdx = Math.max(0, colIdx - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault(); nextColIdx = Math.min(tds.length - 1, colIdx + 1); }

                    if (nextRowIdx !== rowIdx || nextColIdx !== colIdx) {
                        const nextTr = trs[nextRowIdx];
                        if (nextTr) {
                            let nextInput;
                            if (e.key === 'Enter') {
                                nextInput = nextTr.querySelector('input[data-field="입고가"]') || nextTr.querySelector('td:has(input[type="text"]) input');
                            } else {
                                const nextTds = Array.from(nextTr.querySelectorAll('td:has(input[type="text"])'));
                                nextInput = nextTds[nextColIdx]?.querySelector('input');
                            }

                            if (nextInput) {
                                nextInput.focus();
                                setTimeout(() => nextInput.select(), 0);
                            }
                        }
                    }
                }
            };

            return (
                <td className={`relative px-2 py-1.5 border-r border-slate-100 ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-indigo-50/40' : 'bg-white'}`}>
                    <input 
                        type="text" 
                        data-field={field} 
                        autoComplete="off" spellCheck="false"
                        className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 rounded px-1.5 py-1 text-[12px] outline-none transition-colors

        const ReviewModal = ({ onClose, onConfirm, displayRows, masterProducts }) => {

                    else if (newP < oldP) { status = 'down'; down++; }
                    else { status = 'same'; same++; }

                    // 💡 [NEW] 변동률(%) 및 급등 위험 감지 계산
                    const diff = newP - oldP;
                    const diffPercent = oldP > 0 ? ((diff / oldP) * 100).toFixed(1) : 0;

                                                    <td className="px-4 py-2 text-center">

                                                    <td className="px-4 py-2 text-right font-bold">

                                                        {item.차액 > 0 ? (

        const ExportModal = ({ onClose, executeExport }) => (
            <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                <div className="bg-white w-[500px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                    <div className="bg-[#0f172a] p-4 text-white flex justify-between shrink-0 border-b border-slate-700">
                        <h2 className="font-black text-[16px]"><i className="fas fa-file-export text-amber-400 mr-2"></i>데이터 출력 및 보고서 생성</h2>
                        <button onClick={onClose}><SafeIcon name="x" className="text-slate-400 hover:text-white" /></button>
                    </div>
                    <div className="p-6 flex flex-col gap-4">
                        <button onClick={() => { executeExport(); onClose(); }} className="w-full flex items-center p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all group text-left">
                            <div className="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xl mr-4 group-hover:scale-110 transition-transform"><i className="fas fa-file-excel"></i></div>
                            <div>
                                <div className="font-black text-slate-800 text-[14px]">통합 엑셀 다운로드 (ERP & 쇼핑몰)</div>
                                <div className="text-slate-500 text-[11px] mt-1">ERP 업데이트 양식과 쇼핑몰 업로드 양식을 각각의 시트로 한 번에 다운로드합니다.</div>
                            </div>
                        </button>
                        <button onClick={onClose} className="w-full mt-2 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">취소</button>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // ⚙️ 5. Main App Container
        // ==========================================
        function App() {
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [globalSearch, setGlobalSearch] = useState('');
            const [selectedRows, setSelectedRows] = useState(new Set());
            
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);

            const mappings = useMemo(() => { const s = localStorage.getItem(STORAGE_KEYS.MAPPINGS); return s ? JSON.parse(s) : { estimate: { '품목코드': '품목코드', '품목명': '품목명', '규격': '규격', '입고가': '입고가', '출고가': '출고가' } }; }, []);
            const marginRules = useMemo(() => { const s = localStorage.getItem(STORAGE_KEYS.MARGIN_RULES); return s ? JSON.parse(s) : [{ id: 'default', whCode: '*', unit: '*', rate: 10, type: 'divide' }]; }, []);
            
            const visibleMasterCols = ['입고가', '출고가'];
            const visibleUploadCols = ['입고가', '출고가', '구매처', '간단설명'];

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            // 💡 [NEW] 마스터 및 자동 저장 데이터(Pipeline) 초기 로드
            useEffect(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => { if (data) setMasterProducts(data); }).catch(console.error);
                getIDB(STORAGE_KEYS.MANAGED_ITEMS).then(data => { if (data && Object.keys(data).length > 0) setManagedItems(data); }).catch(console.error);

                const handleStorageChange = (e) => { if (e.key === STORAGE_KEYS.SYNC_TRIGGER) getIDB(STORAGE_KEYS.MASTER_DB).then(data => { if (data) setMasterProducts(data); }); };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            // 💡 [NEW] 작업 중인 내용(managedItems) 실시간 자동 임시 저장 (Auto-Save)
            useEffect(() => {
                if (Object.keys(managedItems).length > 0) {
                    setIDB(STORAGE_KEYS.MANAGED_ITEMS, managedItems).catch(console.error);
                } else {
                    setIDB(STORAGE_KEYS.MANAGED_ITEMS, {}).catch(console.error);
                }
            }, [managedItems]);

            const handleFileUpload = async (e) => { 
                const files = Array.from(e.target.files); const targetInput = e.target; 
                if (files.length === 0) return; 
                setIsProcessing(true); setProcessMsg('엑셀 로딩 및 분석 중...');
                await new Promise(resolve => setTimeout(resolve, 50)); 
                try {
                    let newManaged = { ...managedItems }; let totalCount = 0;
                    for (const file of files) {
                        const excelData = await parseExcelRobust(file);
                        if (excelData.length === 0) continue;
                        const actualHeaders = Object.keys(excelData[0]);
                        const curMap = mappings.estimate || {};
                        const headerCache = createHeaderMap(actualHeaders, curMap);
                        
                        excelData.forEach(row => {
                            const codeKey = headerCache['품목코드'] || '품목코드'; const code = row[codeKey];
                            if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                            
                            if (!newManaged[code]) newManaged[code] = { 코드: code, sources: { estimate: {} }, finalData: {} };
                            let mItem = newManaged[code];
                            
                            mItem.sources.estimate['품목명'] = headerCache['품목명'] ? row[headerCache['품목명']] : '';
                            mItem.sources.estimate['규격'] = headerCache['규격'] ? row[headerCache['규격']] : '';
                            
                            Object.keys(curMap).forEach(h => {
                                const actualKey = headerCache[h];
                                if(actualKey && row[actualKey] !== undefined && row[actualKey] !== '') {
                                    const isNumeric = NUMERIC_HEADERS.includes(h);
                                    const val = isNumeric ? parseNum(row[actualKey]) : row[actualKey];
                                    mItem.sources.estimate[h] = val;
                                    if (mItem.finalData[h] === undefined) mItem.finalData[h] = val;
                                }
                            });
                            
                            if (mItem.finalData['출고가'] !== undefined) delete mItem.finalData['출고가'];
                            const pIn = parseNum(mItem.sources.estimate['입고가'] || masterProducts[code]?.['입고가']);
                            if (pIn > 0) mItem.finalData = calculatePricesEngine(pIn, masterProducts[code]||{}, mItem.finalData, marginRules, false);
                            
                            totalCount++;
                        });
                    }
                    setManagedItems(newManaged);
                    if(totalCount > 0) showToast(`✅ 견적서 데이터 로드 완료 (${totalCount}건)`);
                } catch(error) { showToast("❌ 파싱 오류 발생. 엑셀 파일을 확인하세요."); } 
                finally { if (targetInput) targetInput.value = ''; setIsProcessing(false); setProcessMsg(''); }
            };

            const fullDisplayRows = useMemo(() => {
                let baseList = Object.values(managedItems);
                if (globalSearch) {
                    const kw = globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ');
                    const tokens = kw.split(/\s+/).filter(t => t.length > 0);
                    baseList = baseList.filter(item => {
                        const mItem = masterProducts[item.코드] || {};
                        const n = String(item.finalData['품목명'] || mItem.품목명 || '').toLowerCase();
                        const c = String(item.코드 || '').toLowerCase();
                        return tokens.every(t => n.includes(t) || c.includes(t));
                    });
                }
                return baseList;
            }, [managedItems, masterProducts, globalSearch]);

            const handleUpdateCell = useCallback((code, field, linkedMasterField, value) => {
                setManagedItems(prev => {
                    let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: value } };
                    if (field === '입고가') {
                        const pInRaw = value;
                        currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), masterProducts[code] || {}, currentItem.finalData, marginRules, true);
                    }
                    return { ...prev, [code]: currentItem };
                });
            }, [masterProducts, marginRules]);

            const toggleRowSelection = useCallback((code) => {
                setSelectedRows(prev => {
                    const next = new Set(prev);
                    if (next.has(code)) next.delete(code); else next.add(code);
                    return next;
                });
            }, []);
            
            const toggleAllRows = () => {
                if (selectedRows.size === fullDisplayRows.length && fullDisplayRows.length > 0) setSelectedRows(new Set());
                else { const next = new Set(); fullDisplayRows.forEach(r => next.add(r.코드)); setSelectedRows(next); }
            };

            const handleCommitEstimate = async () => {
                const targetCodes = selectedRows.size > 0 ? Array.from(selectedRows) : fullDisplayRows.map(r => r.코드);
                if (targetCodes.length === 0) return showToast('⚠️ 반영할 항목이 없습니다.');
                let newMaster = { ...masterProducts }, commitCount = 0;
                
                targetCodes.forEach(code => {
                    const item = managedItems[code]; if (!item) return;
                    if (!newMaster[code]) newMaster[code] = { 코드: code };
                    else newMaster[code] = { ...newMaster[code] };

                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            if (item.finalData[field] !== undefined && item.finalData[field] !== '' && item.finalData[field] !== '오류') {
                                newMaster[code][field] = NUMERIC_HEADERS.includes(field) ? parseNum(item.finalData[field]) : item.finalData[field];
                            }
                        });
                    }
                    commitCount++;
                });

                setMasterProducts(newMaster); setSelectedRows(new Set()); 
                try { await setIDB(STORAGE_KEYS.MASTER_DB, newMaster); localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString()); } catch(e){}
                
                // 💡 [NEW] 마스터에 커밋 후 관리 아이템 비우기 (자동으로 IDB에서도 삭제됨)
                setManagedItems({});
                setGlobalSearch('');
                showToast(`✅ ${commitCount}건 마스터 캐시에 업데이트 완료.`);
            };

            const executeExport = () => {
                if (fullDisplayRows.length === 0) return showToast("⚠️ 내보낼 데이터가 없습니다.");
                setIsExporting(true);
                setTimeout(() => {
                    try {
                        const wb = window.XLSX.utils.book_new(); let erpData = []; erpData.push(['품목코드', '입고가', '0', '출고가', '0', '입고B', 'n', '도매A', 'n', '도매B', 'n', '최종(전송)', 'n', '행사', 'n', '1']); let shopData = []; shopData.push(['상품코드\n코드', '상품명', '규격', '출고가', '도매A', '시중가', '도매B', '도매B', 'C 판매가', 'C 도매가', 'D 판매가', 'D 도매가', '브랜드', '기본설명', '판매여부', '재고수량', '테마1', '테마2', '테마3', '테마4', '테마5', '상품태그']);
                        const createRowArr = (code, inPrice, outPrice, bPrice='', aSale='', bSale='', finalPrice='', instruction='') => { if (!code) return null; const outIn = inPrice > 0 ? inPrice : ''; const outOut = outPrice > 0 ? outPrice : ''; const outFinal = finalPrice > 0 ? finalPrice : outIn; return [ code, outIn, '0', outOut, '0', bPrice||'', 'n', aSale||'', 'n', bSale||'', 'n', outFinal, 'n', instruction||'', 'n', (inPrice > 0 || outPrice > 0) ? '1' : '' ]; };
                        
                        fullDisplayRows.forEach(row => {
                            const mItem = masterProducts[row.코드] || {}, final = row.finalData || {}, source = row.sources?.estimate || {};
                            const pIn = getFirstValidNum([final, source, mItem], ['입고가', '입고']);
                            const pOut = getFirstValidNum([final, source, mItem], ['출고가', '출고']);
                            const pMarketPrice = getFirstValidNum([final, mItem], ['시중가']);
                            const dName = getFirstValidStr([source, mItem], ['품목명']), dSpec = getFirstValidStr([source, mItem], ['규격']), dBrand = getFirstValidStr([source, mItem], ['브랜드']), dInfo = getFirstValidStr([source, mItem], ['간단설명']), dSearch = getFirstValidStr([source, mItem], ['검색어등록']);
                            
                            const pRowErp = createRowArr(row.코드, pIn, pOut, getFirstValidNum([final],['입고B']), getFirstValidNum([final],['도매A']), getFirstValidNum([final],['도매B']), pIn, getFirstValidStr([final],['간단설명'])); if (pRowErp) erpData.push(pRowErp);
                            const priceMarketShop = pMarketPrice > 0 ? pMarketPrice : pOut;
                            shopData.push([row.코드, dName, dSpec, pOut, getFirstValidNum([final, source, mItem], ['도매A']), priceMarketShop, 0, 0, 0, 0, 0, 0, dBrand, dInfo, (pIn===0&&pOut===0)?'0':'1', (pIn===0&&pOut===0)?'999':'999', '', '', '', '', '', dSearch]);
                        });
                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), "쇼핑몰업로드"); window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), "ERP업데이트"); window.XLSX.writeFile(wb, `시세관리출력_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast(`✅ 통합 엑셀 다운로드가 완료되었습니다.`);
                    } catch(e) { showToast("❌ 엑셀 파일 생성 중 오류가 발생했습니다."); } finally { setIsExporting(false); }
                }, 100);
            };

            const [isExporting, setIsExporting] = useState(false);

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <TopHeader itemCount={Object.keys(masterProducts).length} isProcessing={isProcessing} processMsg={processMsg} onOpenSettings={() => { showToast('💡 환경설정은 [품목 관리] 탭을 이용해주세요.'); }} onPush={()=>{}} onPull={()=>{}} />
                    <NavigationBar activeTab="pipeline" />
                    
                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50 pt-6">
                        {Object.keys(managedItems).length === 0 ? (
                            <PipelineEmptyState onUpload={handleFileUpload} />
                        ) : (
                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm h-full flex flex-col relative overflow-hidden mx-6 mb-6">
                                {/* Toolbar */}
                                <div className="px-6 py-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between shrink-0">
                                    <div className="flex gap-2">
                                        <label className="cursor-pointer px-4 py-2 rounded-lg text-[12px] font-bold bg-white text-indigo-700 shadow-sm hover:bg-indigo-50 border border-indigo-200 transition-colors flex items-center">
                                            <SafeIcon name="upload" size={14} className="mr-1.5" /> 엑셀 추가 업로드
                                            <input type="file" className="hidden" multiple onChange={handleFileUpload} accept=".xlsx, .xls, .csv" />
                                        </label>
                                        <button onClick={() => setShowExportModal(true)} className="px-4 py-2 rounded-lg text-[12px] font-bold bg-emerald-50 text-emerald-700 shadow-sm hover:bg-emerald-100 border border-emerald-200 transition-colors flex items-center">
                                            <SafeIcon name="download" size={14} className="mr-1.5" /> 라우팅 출력
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setShowReviewModal(true)} className={`h-9 px-5 rounded-lg text-[12px] font-black shadow-sm transition-colors flex items-center ${fullDisplayRows.length > 0 ? 'bg-[#0B1021] text-white hover:bg-black' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                            <SafeIcon name="check-circle-2" size={14} className="mr-1.5" /> 마스터 반영 검토
                                        </button>
                                        <div className="w-px h-6 bg-slate-300 mx-1"></div>
                                        <button onClick={() => { setManagedItems({}); setSelectedRows(new Set()); setGlobalSearch(''); }} className="w-9 h-9 rounded-lg flex items-center justify-center text-slate-500 hover:text-rose-500 bg-white border border-slate-300 hover:border-rose-300 hover:bg-rose-50 transition-colors shadow-sm" title="화면 초기화 (전체 취소)">
                                            <SafeIcon name="x" size={14} />
                                        </button>
                                        <div className="relative w-56 h-9">
                                            <input type="text" placeholder="결과 내 검색..." value={globalSearch} onChange={(e) => setGlobalSearch(e.target.value)} className="w-full h-full pl-3 pr-8 bg-white border border-slate-300 rounded-lg text-[12px] outline-none focus:border-indigo-400 focus:ring-1 transition-shadow" />
                                            <i className="fas fa-search absolute right-3 top-2.5 text-slate-400 pointer-events-none text-[12px]"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Grid */}
                                <div className="flex-1 overflow-auto custom-scrollbar relative">
                                    <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max min-w-full bg-white">
                                        <thead className="text-[12px] font-extrabold text-slate-600 bg-slate-50 border-b border-slate-200">
                                            <tr>
                                                <th className="sticky top-0 z-40 bg-slate-50 px-4 py-3 border-r border-slate-200 w-[300px]" style={{left: 0}}>
                                                    <div className="flex items-center gap-2">
                                                        <input type="checkbox" className="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer" checked={selectedRows.size === fullDisplayRows.length && fullDisplayRows.length > 0} onChange={toggleAllRows} />
                                                        <span>상품정보 (코드/품명/규격)</span>
                                                    </div>
                                                </th>
                                                {visibleMasterCols.map(h => <th key={`m-${h}`} className="sticky top-0 z-30 bg-blue-50/50 px-2 py-3 border-r border-slate-200 text-center text-blue-800 w-[100px]"><div className="text-[9px] mb-0.5 opacity-70">마스터 대조</div>[M] {h}</th>)}
                                                {visibleUploadCols.map(h => <th key={`u-${h}`} className={`sticky top-0 z-30 bg-slate-50 px-2 py-3 border-r border-slate-200 text-center ${getCellWidthClass(h)}`}>{h}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-slate-700">
                                            {fullDisplayRows.length === 0 ? <tr><td colSpan="20" className="p-10 text-center text-slate-400">일치하는 항목이 없습니다.</td></tr> : fullDisplayRows.map((row, idx) => {
                                                const isSel = selectedRows.has(row.코드); const bg = isSel ? 'bg-indigo-50/50' : 'bg-white hover:bg-slate-50';
                                                const mItem = masterProducts[row.코드] || {}; 
                                                const dName = row.finalData?.['품목명'] || mItem.품목명 || '[미등록]'; const dSpec = row.finalData?.['규격'] || mItem.규격 || '';
                                                
                                                return (
                                                    <tr key={row.코드} className={`group h-[40px] ${bg}`}>
                                                        <td className={`sticky z-20 px-4 py-2 border-r border-slate-200 ${isSel ? 'bg-indigo-50/90' : 'bg-white group-hover:bg-slate-50'}`} style={{left: 0}}>
                                                            <div className="flex gap-3 items-center min-w-0">
                                                                <input type="checkbox" className="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer shrink-0" checked={isSel} onChange={() => toggleRowSelection(row.코드)} />
                                                                <div className="flex flex-col min-w-0 overflow-hidden">
                                                                    <div className="flex items-center gap-1.5"><span className="text-[10px] font-mono text-indigo-400 bg-indigo-50 px-1 rounded">{row.코드}</span></div>
                                                                    <span className="text-sm font-bold truncate text-slate-800 mt-0.5">{dName} <span className="text-[11px] font-normal text-slate-500">{dSpec}</span></span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        {visibleMasterCols.map(h => {
                                                            const isNum = NUMERIC_HEADERS.includes(h); const mVal = mItem[h]; let displayVal = mVal; let isChanged = false;
                                                            if (row.finalData && row.finalData[h] !== undefined) { if (isNum && parseNum(row.finalData[h]) !== parseNum(mVal)) { displayVal = row.finalData[h]; isChanged = true; } else if (!isNum && String(row.finalData[h]) !== String(mVal)) { displayVal = row.finalData[h]; isChanged = true; } }
                                                            const formattedVal = displayVal !== undefined && displayVal !== '' ? (isNum ? parseNum(displayVal).toLocaleString() : displayVal) : '-';
                                                            return <td key={`pm-d-${h}`} className={`px-2 py-1.5 border-r border-slate-100 ${isChanged ? 'bg-amber-50 text-amber-700' : 'text-slate-500'} ${isNum ? 'text-right font-medium' : 'text-center'}`}><div className="truncate w-full">{formattedVal}</div></td>;
                                                        })}
                                                        {visibleUploadCols.map(h => {
                                                            const linkedField = h; const mVal = mItem[linkedField]; const initialVal = row.finalData?.[h] !== undefined ? row.finalData[h] : (row.sources?.estimate?.[h] || '');
                                                            
                                                            // 💡 [NEW] 입고가가 기존 대비 20% 이상 올랐을 때 위험 감지
                                                            let isRisk = false;
                                                            if (h === '입고가') {
                                                                const mIn = parseNum(mVal);
                                                                const newIn = parseNum(initialVal);
                                                                if (mIn > 0 && newIn > 0 && ((newIn - mIn) / mIn) >= 0.2) {
                                                                    isRisk = true;
                                                                }
                                                            }

                                                            return <EditableCell key={`e-${h}`} rowCode={row.코드} initialVal={initialVal} field={h} linkedMasterField={linkedField} mVal={mVal} isRisk={isRisk} onUpdateCell={handleUpdateCell} />;
                                                        })}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {showReviewModal && <ReviewModal onClose={() => setShowReviewModal(false)} onConfirm={handleCommitEstimate} displayRows={fullDisplayRows} masterProducts={masterProducts} />}
                    {showExportModal && <ExportModal onClose={() => setShowExportModal(false)} executeExport={executeExport} />}
                    
                    {isExporting && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[9999] flex flex-col justify-center items-center backdrop-blur-sm fade-in">
                            <i className="fas fa-circle-notch fa-spin text-6xl text-indigo-500 mb-6"></i>
                            <h2 className="text-2xl font-black text-white mb-2">엑셀 파일을 생성하고 있습니다</h2>
                            <p className="text-emerald-400 font-bold">데이터가 많을 경우 수 초 정도 소요될 수 있습니다. 잠시만 기다려주세요...</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
