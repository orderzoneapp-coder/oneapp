<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        // ==========================================
        // 🔑 0. Global Constants & Utilities
        // ==========================================
        const STORAGE_KEYS = { MASTER_DB: 'merchMaster_v870', CLOUD_URL: 'skuSyncCloudUrl_v6', SYNC_TRIGGER: 'merchMaster_sync_trigger', HISTORY_DB: 'merchHistory_v870' };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고", "1입고", "1출고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const isCSV = file.name.toLowerCase().endsWith('.csv');
            if (isCSV) {
                const reader = new FileReader();
                reader.onload = (e) => { try { const wb = window.XLSX.read(e.target.result, { type: 'string', raw: false }); processWorkbook(wb, resolve, reject); } catch(err) { reject(err); } };
                reader.readAsText(file, 'euc-kr'); 
            } else {
                const reader = new FileReader();
                reader.onload = (e) => { try { const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true }); processWorkbook(wb, resolve, reject); } catch(err) { reject(err); } };
                reader.readAsArrayBuffer(file);
            }
            function processWorkbook(wb, resolve, reject) {
                try {
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }
                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) { obj['_raw'] = row; parsedData.push(obj); }
                    } resolve(parsedData);
                } catch (e) { reject(e); }
            }
        });

        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [kebabName, name, name === 'cloud-download' ? 'download-cloud' : name, name === 'cloud-upload' ? 'upload-cloud' : name, name === 'bar-chart-3' ? 'bar-chart' : name];
                        for (const pName of possibleNames) { if (window.lucide.icons[pName]) { setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return; } }
                    }
                }; renderIcon();
            }, [name, size, className]);
            if (!svg) {
                const faMap = { 'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs', 'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open', 'file-spreadsheet': 'fa-table', 'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes', 'bar-chart-3': 'fa-chart-bar', 'check-circle-2': 'fa-check-circle', 'x': 'fa-times', 'database': 'fa-database', 'upload': 'fa-upload', 'pie-chart': 'fa-chart-pie', 'shopping-cart': 'fa-shopping-cart', 'users': 'fa-users', 'megaphone': 'fa-bullhorn', 'book-open': 'fa-address-book', 'shopping-bag': 'fa-shopping-bag', 'credit-card': 'fa-credit-card', 'line-chart': 'fa-chart-line', 'printer': 'fa-print', 'search-dollar': 'fa-search-dollar', 'arrow-up': 'fa-arrow-up', 'arrow-down': 'fa-arrow-down', 'star': 'fa-star', 'equals': 'fa-equals', 'list': 'fa-list', 'save': 'fa-save', 'eye-slash': 'fa-eye-slash', 'redo-alt': 'fa-redo-alt', 'search': 'fa-search', 'file-export': 'fa-file-export', 'file-excel': 'fa-file-excel', 'folder-open': 'fa-folder-open', 'chevron-down': 'fa-chevron-down', 'file-invoice': 'fa-file-invoice' };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 2. Read-Only 설정 훅 
        // ==========================================
        const useMerchConfig = () => {
            const loadConfig = () => {
                const cloudUrl = localStorage.getItem('skuSyncCloudUrl_v6') || '';
                let visibleMasterCols = JSON.parse(localStorage.getItem('merchVisMaster_v870') || 'null');
                if (!visibleMasterCols || !visibleMasterCols.estimate) visibleMasterCols = getInitialVisibleMasterCols();
                if (visibleMasterCols.estimate.includes('카테고리')) visibleMasterCols.estimate = visibleMasterCols.estimate.map(h => h === '카테고리' ? '견적서' : h);

                let visibleUploadCols = JSON.parse(localStorage.getItem('merchVisUpload_v870') || 'null');
                if (!visibleUploadCols || !visibleUploadCols.estimate) visibleUploadCols = getInitialVisibleUploadCols();
                if (visibleUploadCols.estimate.includes('카테고리')) visibleUploadCols.estimate = visibleUploadCols.estimate.map(h => h === '카테고리' ? '견적서' : h);

                let mappings = JSON.parse(localStorage.getItem('merchMappings_v870') || 'null');
                if (!mappings || !mappings.master) mappings = getInitialMappings();
                if (!mappings.estimate['창고']) mappings.estimate['창고'] = '창고, 창고코드';
                if (!mappings.master['창고']) mappings.master['창고'] = '창고, 창고코드';
                if (mappings.estimate['카테고리'] !== undefined) { mappings.estimate['견적서'] = mappings.estimate['카테고리'] + ', 견적서'; delete mappings.estimate['카테고리']; }

                let masterLinks = JSON.parse(localStorage.getItem('merchMasterLinks_v870') || 'null');
                if (!masterLinks || !masterLinks.estimate) masterLinks = getInitialMasterLinks();
                if (masterLinks.estimate['창고'] === undefined) masterLinks.estimate['창고'] = '창고';
                if (masterLinks.estimate['카테고리'] !== undefined) { masterLinks.estimate['견적서'] = '견적서'; delete masterLinks.estimate['카테고리']; }

                let marginRules = JSON.parse(localStorage.getItem('merchMarginRules_v878') || 'null');
                if (!marginRules) marginRules = [ { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' }, { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' } ];
                else try { if (marginRules.length > 0) marginRules = marginRules.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' })); } catch(e){}

                return { cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules };
            };

            const [config, setConfig] = useState(loadConfig());
            useEffect(() => { const handleStorageChange = () => setConfig(loadConfig()); window.addEventListener('storage', handleStorageChange); return () => window.removeEventListener('storage', handleStorageChange); }, []);
            return config;
        };

        // ==========================================
        // 🧩 3. 통합 글로벌 헤더
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [ { id: 'master', label: '정보 관리', icon: 'database' }, { id: 'ops', label: '운영 관리', icon: 'truck' }, { id: 'admin', label: '인사이트', icon: 'bar-chart-3' } ];
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true, shortTag: 'ONE BOARD' },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: true, shortTag: 'SYSTEM GUIDE' },
                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true, shortTag: 'GOLDEN RECORD' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true, shortTag: 'SKU FORGE' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true, shortTag: 'VALUATION HUB' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true, shortTag: 'AI SMART PARSER' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true, shortTag: 'ENTITY REGISTRY' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true, shortTag: 'CRM STRATEGY' },
                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true, shortTag: 'ORDER STREAM' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true, shortTag: 'SOURCE & PROCURE' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true, shortTag: 'REVENUE LEDGER' },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true, shortTag: 'STOCK LEDGER' },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: true, shortTag: 'OUTPUT TERMINAL' },
                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true, shortTag: 'INSIGHT ENGINE' },
                { id: 'cs', label: '정보 마당', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: true, shortTag: 'NOTICE PORTAL' }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common';
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center"><span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span><span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.1</span></div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">{currentTab ? currentTab.shortTag : 'WORKSPACE'}</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (<button key={g.id} onClick={() => handleGroupClick(g.id)} className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5 ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}><SafeIcon name={g.icon} size={15} /> {g.label}</button>))}
                            </div>
                        </div>
                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center">{isProcessing ? <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i> : <div className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></div>}</div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`마스터 DB 기준 상품 수`}><SafeIcon name="database" size={10} className="text-slate-500" /><span className="text-[11px] font-mono font-bold tracking-tight">{itemCount ? itemCount.toLocaleString() : 0}</span></div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>

                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 border-b border-slate-700 shadow-md relative z-10">
                            <div className="flex items-center gap-3"><SafeIcon name="settings" size={20} className="text-indigo-400"/><h2 className="font-black text-[17px] tracking-wide">통합 환경설정 센터</h2><span className="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/30 ml-2">Iframe Overlay</span></div>

                        <div className="flex-1 w-full bg-slate-100 relative"><div className="absolute inset-0 flex items-center justify-center pointer-events-none"><div className="text-slate-300 flex flex-col items-center"><i className="fas fa-circle-notch fa-spin text-3xl mb-3"></i><span className="font-bold text-sm">설정 모듈을 불러오는 중입니다...</span></div></div><iframe src="settings.html?mode=iframe" className="absolute inset-0 w-full h-full border-0 bg-white relative z-10" title="Settings Center"></iframe></div>
                    </div>

        };

        // ==========================================
        // 🧩 4. 비즈니스 코어 엔진 (Pricing & Parser)
        // ==========================================
        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };

            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;

            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            
            const matchWh = (ruleWh, targetWh) => ruleWh === '*' || ruleWh.split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean).some(s => s === targetWh || (targetWh !== '' && !isNaN(s) && !isNaN(targetWh) && Number(s) === Number(targetWh)));
            const matchUnit = (ruleUnit, targetUnit) => ruleUnit === '*' || ruleUnit.toLowerCase().split(/[,./|\s]+/).map(s => s.trim()).filter(Boolean).some(s => targetUnit === s || targetUnit.includes(s));

            let bestRule = { rate: 10, type: 'divide' }, bestScore = -1;
            marginRules.forEach(r => {
                if (matchWh(r.whCode, whCode) && matchUnit(r.unit, unitStr)) {
                    let score = 0; if (r.whCode !== '*') score += 2; if (r.unit !== '*') score += 1;
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            let calcOutPrice = totalCost;
            if (bestRule.type === 'divide') {
                const safeRate = Math.min(bestRule.rate, 99.99); calcOutPrice = totalCost / (1 - (safeRate / 100));
            } else calcOutPrice = totalCost * (1 + (bestRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            if (!isFinite(calcOutPrice) || isNaN(calcOutPrice)) calcOutPrice = 0;

            let newFinalData = { ...currentFinalData, '입고가': baseInPrice, '시중가': calcOutPrice };
            const providedOutPrice = parseNum(currentFinalData?.['출고가']), mIn = parseNum(mItem?.['입고가']), mOut = parseNum(mItem?.['출고가']);

            if (providedOutPrice > 0 && !forceRecalc) newFinalData['출고가'] = providedOutPrice;
            else if (baseInPrice === mIn && mOut > 0 && !forceRecalc) newFinalData['출고가'] = mOut;
            else newFinalData['출고가'] = calcOutPrice;

            const div1 = parseNum(currentFinalData?.['1종연산'] ?? mItem?.['1종연산']), extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']); 
            if (div1 > 0) {
                const provided1In = parseNum(currentFinalData?.['1입고']);
                const provided1Out = parseNum(currentFinalData?.['1출고']);

                let calc1In = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let calc1Out = Math.round(((newFinalData['출고가'] / div1) + extraCost) / 100) * 100; 

                // 💡 엑셀에 이미 소분 단가가 명시되어 들어온 경우 마진 계산기가 덮어쓰지 않고 보존
                newFinalData['1입고'] = (provided1In > 0 && !forceRecalc) ? provided1In : calc1In;
                newFinalData['1출고'] = (provided1Out > 0 && !forceRecalc) ? provided1Out : calc1Out;
            }
            return newFinalData;
        };

        const createHeaderMap = (actualHeaders, mappingConfig) => {
            const headerMap = {}; if(!mappingConfig) return headerMap;
            Object.keys(mappingConfig).forEach(field => {
                const keywords = mappingConfig[field].split(',').map(s => s.trim().toLowerCase().replace(/\s/g, '')).filter(Boolean);
                let matchedKey = actualHeaders.find(h => h && keywords.some(kw => String(h).toLowerCase().replace(/\s/g, '') === kw));
                if (!matchedKey) { matchedKey = actualHeaders.find(h => h && keywords.some(kw => String(h).toLowerCase().replace(/\s/g, '').includes(kw))); }
                if(matchedKey) headerMap[field] = matchedKey;
            }); return headerMap;
        };

                        else if (newP < oldP && newP > 0) { status = 'down'; down++; priceChanged = true; issues.push({ text: `${(newP-oldP).toLocaleString()}원`, color: 'text-blue-500' }); }

                        let textChanged = false;
                        upCols.forEach(h => {
                            if (['품목코드', '입고가', '출고가'].includes(h)) return;
                            const mField = masterLinksEst[h] || h; const mVal = mItem[mField];
                            const uVal = row.finalData?.[h] !== undefined ? row.finalData[h] : row.sources?.['estimate']?.[h];
                            
                            if (mVal !== undefined && uVal !== undefined && String(mVal).trim() !== '' && String(uVal).trim() !== '' && String(mVal).trim() !== String(uVal).trim()) {
                                textChanged = true; issues.push({ text: `[${h}] 다름`, color: 'text-amber-500' });
                            }
                        });

                        if (!priceChanged) {
                            if (textChanged) { status = 'changed'; changed++; } else { status = 'same'; same++; }
                        }
                    }

                    list.push({ 코드: row.코드, 품명: mItem?.품목명 || row.finalData?.['품목명'] || '', 거래처: vendor, 기존단가: oldP, 새단가: newP, issues: issues, 상태: status });
                });

                list.sort((a, b) => { if (a.거래처 !== b.거래처) return a.거래처.localeCompare(b.거래처); return String(a.코드).localeCompare(String(b.코드)); });
                return { up, down, changed, same, newItems, total: displayRows.length, list, vendors: Array.from(vendors).sort() };
            }, [displayRows, masterProducts, visibleUploadCols, masterLinksEst]);

            const filteredList = analysis.list.filter(i => {
                const statusMatch = filter === 'all' || i.상태 === filter;
                const vendorMatch = vendorFilter === 'all' || i.거래처 === vendorFilter;
                return statusMatch && vendorMatch;
            });

            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center backdrop-blur-sm fade-in">
                    <div className="bg-white w-[950px] max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-[#0f172a] p-4 text-white flex justify-between border-b border-slate-700">
                            <h2 className="font-black text-[16px] flex items-center"><SafeIcon name="check-circle-2" className="text-indigo-400 mr-2"/>단가 및 변동 사항 검토 (프리뷰)</h2>
                            <button onClick={onClose}><SafeIcon name="x" className="text-slate-400 hover:text-white" size={20}/></button>
                        </div>
                        <div className="p-6 flex flex-col flex-1 overflow-hidden bg-slate-50">
                            <div className="flex justify-between items-center mb-4 shrink-0 gap-4">
                                <div className="grid grid-cols-6 gap-3 flex-1">
                                    {[{id:'all',icon:'list',label:'전체',val:analysis.total,color:'slate'},{id:'up',icon:'arrow-up',label:'인상',val:analysis.up,color:'rose'},{id:'down',icon:'arrow-down',label:'인하',val:analysis.down,color:'blue'},{id:'new',icon:'star',label:'신규',val:analysis.newItems,color:'emerald'},{id:'changed',icon:'edit',label:'항목변경',val:analysis.changed,color:'amber'},{id:'same',icon:'equals',label:'동결',val:analysis.same,color:'slate'}].map(b => (
                                        <div key={b.id} onClick={()=>setFilter(b.id)} className={`cursor-pointer border p-2.5 rounded-xl flex flex-col items-center justify-center shadow-sm transition-all ${filter===b.id?`bg-${b.color}-600 border-${b.color}-600 text-white`:`bg-white hover:bg-slate-50`}`}>
                                            <div className={`text-[10px] font-bold mb-1 flex items-center ${filter===b.id?'text-white/80':`text-${b.color}-500`}`}><SafeIcon name={b.icon} size={10} className="mr-1"/>{b.label}</div><div className={`font-black text-lg ${filter===b.id?'text-white':'text-slate-700'}`}>{b.val}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-[160px] shrink-0">
                                    <select value={vendorFilter} onChange={e => setVendorFilter(e.target.value)} className="w-full appearance-none border border-slate-300 rounded-xl px-3 py-2 text-[13px] font-bold outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200 shadow-sm bg-white cursor-pointer">
                                        <option value="all">전체 거래처</option>
                                        {analysis.vendors.map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex-1 overflow-hidden flex flex-col bg-white border border-slate-200 rounded-xl">
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-xs"><thead className="bg-slate-50 sticky top-0 border-b"><tr><th className="px-4 py-2 w-14 text-center">상태</th><th className="px-4 py-2 w-24">코드</th><th className="px-4 py-2 w-28">거래처</th><th className="px-4 py-2">품목명 (마스터 기준)</th><th className="px-4 py-2 text-right">기존 입고가</th><th className="px-4 py-2 text-right text-indigo-600">새 입고가</th><th className="px-4 py-2 text-right">이슈 (차액 및 변동)</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100">{filteredList.map((i,idx)=><tr key={idx} className="hover:bg-slate-50">

                                        <td className="px-4 py-2 text-right font-bold text-[11px]">
                                            <div className="flex flex-col items-end gap-0.5">
                                                {i.issues.length === 0 ? <span className="text-slate-300">-</span> : i.issues.map((iss, jdx) => <span key={jdx} className={iss.color}>{iss.text}</span>)}
                                            </div>
                                        </td>
                                    </tr>)}</tbody></table>
                                </div>
                            </div>

                        <div className="bg-slate-100 p-4 border-t flex justify-between items-center gap-2 shrink-0">

                            <div className="flex gap-2">

                            </div>

                </div>

        const CategorySaveModal = ({ onClose, onSave, availableCategories }) => {

                                    <div>
                                        이미 존재하는 카탈로그입니다.
                                        <p className="mt-1 text-[11px] text-indigo-600 font-medium leading-relaxed">선택하신 카탈로그에 새로운 상품들이 <strong>병합(추가)</strong>됩니다.<br/>기존 상품의 변동된 단가는 이미 최신으로 업데이트되었습니다.</p>
                                    </div>
                                </div>
                            ) : name.trim() !== '' ? (
                                <div className="text-[12px] font-bold text-emerald-700 bg-emerald-50 p-3 rounded-lg border border-emerald-200 fade-in flex items-center">
                                    <i className="fas fa-magic mr-1.5"></i> 완전히 새로운 카탈로그가 생성됩니다.
                                </div>
                            ) : null}

                            <div className="flex gap-2 mt-2">
                                <button onClick={onClose} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">취소</button>
                                <button onClick={() => onSave(name)} disabled={!name.trim()} className={`flex-1 font-bold py-3 rounded-xl transition-colors shadow-sm ${name.trim() ? (isExisting ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-blue-600 text-white hover:bg-blue-700') : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                    {isExisting ? '기존 목록에 병합(추가)' : '새로 저장하기'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const getCellWidthClass = (headerName) => {
            if (['출고가', '입고가', '입고B', '도매A', '도매B', '상장가', '단가H', '단가I', '시중가', '행사가'].includes(headerName)) return 'min-w-[90px] w-[90px] max-w-[90px]';
            if (['간단설명', '지시사항', '비고'].includes(headerName)) return 'min-w-[200px] w-[200px] max-w-[200px]';
            if (['규격'].includes(headerName)) return 'min-w-[120px] w-[120px] max-w-[120px]';
            if (['구매처', '거래처명', '거래처'].includes(headerName)) return 'min-w-[120px] w-[120px] max-w-[120px]';
            return 'min-w-[100px] w-[100px] max-w-[100px]';
        };

        const EditableCell = React.memo(({ rowCode, initialVal, field, linkedMasterField, mVal, onUpdateCell }) => {
            const isNum = NUMERIC_HEADERS.includes(linkedMasterField) || NUMERIC_HEADERS.includes(field);
            const [val, setVal] = useState(initialVal); const [isFocused, setIsFocused] = useState(false);
            useEffect(() => { if(!isFocused) setVal(initialVal); }, [initialVal, isFocused]);
            const isDiff = linkedMasterField && mVal !== undefined && val !== '' && String(mVal) !== String(val) && isNum;
            const onBlur = () => { setIsFocused(false); if(String(val)!==String(initialVal)) onUpdateCell(rowCode, field, linkedMasterField, val); };
            
            const handleKeyDown = (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Tab'].includes(e.key)) {
                    if (e.key === 'ArrowLeft' && e.target.selectionStart !== 0) return;
                    if (e.key === 'ArrowRight' && e.target.selectionEnd !== e.target.value.length) return;
                    
                    const isTab = e.key === 'Tab';
                    if (!isTab) e.preventDefault();
                    
                    e.target.blur();
                    const td = e.target.closest('td'); const tr = td.closest('tr'); const tbody = tr.closest('tbody');
                    const tds = Array.from(tr.querySelectorAll('td:has(input[type="text"])'));
                    const colIdx = tds.indexOf(td);
                    const trs = Array.from(tbody.querySelectorAll('tr.table-row-hover'));
                    const rowIdx = trs.indexOf(tr);

                    let nextRowIdx = rowIdx; let nextColIdx = colIdx;

                    if (e.key === 'ArrowUp') nextRowIdx = Math.max(0, rowIdx - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRowIdx = Math.min(trs.length - 1, rowIdx + 1);
                    if (e.key === 'ArrowLeft') { nextColIdx = Math.max(0, colIdx - 1); }
                    if (e.key === 'ArrowRight') { nextColIdx = Math.min(tds.length - 1, colIdx + 1); }
                    if (isTab) {
                        e.preventDefault();
                        if (e.shiftKey) {
                            nextColIdx = colIdx - 1;
                            if (nextColIdx < 0) { nextColIdx = tds.length - 1; nextRowIdx = Math.max(0, rowIdx - 1); }
                        } else {
                            nextColIdx = colIdx + 1;
                            if (nextColIdx >= tds.length) { nextColIdx = 0; nextRowIdx = Math.min(trs.length - 1, rowIdx + 1); }
                        }
                    }

                    if (nextRowIdx !== rowIdx || nextColIdx !== colIdx || e.key === 'Enter') {
                        const nextTr = trs[nextRowIdx];
                        if (nextTr) {
                            let nextInput;
                            if (e.key === 'Enter') {
                                nextInput = nextTr.querySelector('input[data-field="입고가"]') || nextTr.querySelector('td:has(input[type="text"]) input');
                            } else { 
                                const nextTds = Array.from(nextTr.querySelectorAll('td:has(input[type="text"])')); 
                                nextInput = nextTds[nextColIdx]?.querySelector('input'); 
                            }
                            if (nextInput) { nextInput.focus(); setTimeout(() => nextInput.select(), 0); }
                        }
                    }
                }
            };

            return (
                <td className={`px-2 py-1.5 border-r border-slate-200 bg-white ${getCellWidthClass(linkedMasterField || field)} ${isDiff ? 'bg-amber-50/60' : ''}`}>
                    <input type="text" data-field={field} value={val==="오류"?"":val} placeholder={mVal||''} onChange={e=>setVal(e.target.value)} onFocus={e=>{setIsFocused(true); setTimeout(()=>e.target.select(),0);}} onBlur={onBlur} onKeyDown={handleKeyDown} onClick={e=>e.target.select()} className={`w-full bg-transparent hover:bg-slate-50 focus:bg-white focus:ring-1 focus:ring-indigo-300 rounded px-1.5 py-1.5 text-[13px] outline-none ${isNum?'text-right':'truncate text-center'} ${isDiff?'text-indigo-700 font-bold':'text-slate-700 font-medium'} transition-colors`} />
                </td>
            );
        });

        const MemoizedTableRow = React.memo(({ row, idx, isSel, mItem, isEstimateUploaded, visMasterCols, visUploadCols, masterLinksEst, onToggleSelection, onMouseDown, onMouseEnter, onUpdateCell }) => {
            const dName = mItem.품목명 || '[미등록]';
            const dSpec = mItem.규격 || '';
            const rowCode = row.코드 || '';

            return (
                <tr className={`table-row-hover transition-colors ${isSel ? 'table-row-selected' : ''}`} onMouseDown={(e) => onMouseDown && onMouseDown(e, rowCode, isSel)} onMouseEnter={(e) => onMouseEnter && onMouseEnter(e, rowCode)}>
                    <td className={`sticky z-20 px-4 py-3.5 border-r border-slate-200 min-w-[280px] w-[280px] max-w-[280px] bg-slate-50`} style={{left:0}}>
                        <div className="flex flex-col w-full overflow-hidden">
                            <span className="text-[10.5px] font-mono text-indigo-500 mb-0.5 tracking-tight font-bold">{rowCode}</span>
                            <div className="flex items-baseline w-full min-w-0 overflow-hidden mt-0.5">
                                <span className={`text-[13px] font-extrabold truncate text-slate-800 ${!mItem.품목명 ? 'text-rose-500' : ''}`} title={dName}>{dName}</span>
                                {dSpec && <span className="text-[11.5px] font-medium text-slate-400 truncate ml-1.5 shrink-0 max-w-[40%]" title={dSpec}>({dSpec})</span>}
                            </div>
                        </div>
                    </td>

                    {!isEstimateUploaded ? (
                        visMasterCols.map(h => {
                            const isNum = NUMERIC_HEADERS.includes(h);
                            const mVal = mItem[h] !== undefined && mItem[h] !== '' ? (isNum ? parseNum(mItem[h]).toLocaleString() : mItem[h]) : '-';
                            return (
                                <td key={`idle-td-${h}`} className={`px-2 py-1.5 border-r border-slate-200 bg-slate-50 text-slate-600 ${getCellWidthClass(h)} ${isNum ? 'text-right font-medium' : 'text-center'}`}>
                                    <div className="truncate w-full">{mVal}</div>
                                </td>
                            );
                        })
                    ) : (
                        <>
                            {visMasterCols.map(h => {
                                const isNum = NUMERIC_HEADERS.includes(h);
                                const mVal = mItem[h];
                                let displayVal = mVal;
                                let isChanged = false;

                                if (row.finalData && row.finalData[h] !== undefined) {
                                    if (isNum && parseNum(row.finalData[h]) !== parseNum(mVal)) { displayVal = row.finalData[h]; isChanged = true; } 
                                    else if (!isNum && String(row.finalData[h]) !== String(mVal)) { displayVal = row.finalData[h]; isChanged = true; }
                                }
                                const formattedVal = displayVal !== undefined && displayVal !== '' ? (isNum ? parseNum(displayVal).toLocaleString() : displayVal) : '-';
                                return (
                                    <td key={`pm-d-${h}`} className={`px-2 py-1.5 border-r border-slate-200 transition-colors bg-slate-50 ${getCellWidthClass(h)} ${isChanged ? 'text-amber-800 font-bold' : 'text-slate-600'} ${isNum ? 'text-right font-medium' : 'text-center'}`}>
                                        <div className="truncate w-full">{formattedVal}</div>
                                    </td>
                                );
                            })}
                            
                            {visUploadCols.map(h => {
                                const linkedMasterField = masterLinksEst[h];
                                const mVal = linkedMasterField && rowCode ? mItem[linkedMasterField] : undefined;
                                const initialVal = row.finalData?.[h] !== undefined ? row.finalData[h] : (row.sources?.['estimate']?.[h] || '');
                                return <EditableCell key={`p-u-e-${h}`} rowCode={rowCode} initialVal={initialVal} field={h} linkedMasterField={linkedMasterField} mVal={mVal} onUpdateCell={onUpdateCell} />;
                            })}
                        </>
                    )}
                </tr>
            );
        });

        const ExcelDataGrid = ({ state, actions }) => {
            const { isEstimateUploaded, fullDisplayRows, visibleMasterCols, visibleUploadCols, masterProducts, masterLinksEst, selectedRows } = state;
            
            const [scrollTop, setScrollTop] = useState(0);
            const handleScroll = useCallback((e) => setScrollTop(e.target.scrollTop), []);

            const isDragging = useRef(false);
            const dragSelectMode = useRef(true);

            useEffect(() => {
                const handleMouseUp = () => { isDragging.current = false; };
                window.addEventListener('mouseup', handleMouseUp);
                return () => window.removeEventListener('mouseup', handleMouseUp);
            }, []);

            const handleMouseDown = useCallback((e, rowCode, isSel) => {
                const targetTag = e.target.tagName.toLowerCase();
                if (['input', 'select', 'button', 'i'].includes(targetTag)) return;
                isDragging.current = true;
                dragSelectMode.current = !isSel;
                actions.setRowSelection(rowCode, !isSel);
            }, [actions]);

            const handleMouseEnter = useCallback((e, rowCode) => {
                if (isDragging.current) {
                    actions.setRowSelection(rowCode, dragSelectMode.current);
                }
            }, [actions]);

            const ROW_HEIGHT = 56; 
            const BUFFER_SIZE = 15; 
            const VIEWPORT_HEIGHT = 800; 

            const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_SIZE);
            const endIndex = Math.min(fullDisplayRows.length, Math.floor((scrollTop + VIEWPORT_HEIGHT) / ROW_HEIGHT) + BUFFER_SIZE);

            const displayRows = fullDisplayRows.slice(startIndex, endIndex);
            const topPadding = startIndex * ROW_HEIGHT;
            const bottomPadding = Math.max(0, (fullDisplayRows.length - endIndex) * ROW_HEIGHT);

            const visMaster = visibleMasterCols.estimate?.filter(h=>!['품목코드','품목명','규격'].includes(h)) || [];
            const visUpload = visibleUploadCols.estimate?.filter(h=>h!=='품목코드') || [];

            return (
                <div className="bg-white border border-slate-200 shadow-sm h-full flex flex-col overflow-hidden relative">
                    <div className="flex-1 overflow-auto custom-scrollbar relative" onScroll={handleScroll}>
                        <table className="text-left border-collapse text-[13px] whitespace-nowrap relative z-0 w-max bg-white">
                            <thead className="text-[12px] font-bold text-slate-500 bg-white">
                                <tr>
                                    <th className="sticky top-0 z-40 bg-slate-100 px-4 py-3.5 border-y border-r border-slate-200 shadow-sm min-w-[280px] w-[280px] max-w-[280px]" style={{left:0}}>
                                        상품정보 (코드/품명/규격)
                                    </th>
                                    {visMaster.map(h=><th key={`m-${h}`} className={`sticky top-0 z-30 bg-slate-100 px-3 py-3.5 border-y border-r border-slate-200 shadow-sm text-center ${getCellWidthClass(h)}`}><i className="fas fa-lock text-slate-300 text-[10px] mr-1"></i> {h}</th>)}
                                    {visUpload.map(h=><th key={`u-${h}`} className={`sticky top-0 z-30 bg-white px-3 py-3.5 border-y border-r border-slate-200 shadow-sm text-center text-indigo-700 ${getCellWidthClass(h)}`}><i className="fas fa-pen text-indigo-300 text-[10px] mr-1"></i> {h}</th>)}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-transparent text-slate-700">
                                {fullDisplayRows.length===0 ? (
                                    <tr><td colSpan="50" className="p-16 text-center text-slate-400 font-bold"><i className="fas fa-file-excel text-5xl mb-4 text-slate-200 block"></i>데이터가 없습니다. 카탈로그를 불러오거나 엑셀을 업로드하세요.</td></tr>
                                ) : (
                                    <>
                                        {topPadding > 0 && <tr style={{ height: `${topPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                        
                                        {displayRows.map((row, idx) => {
                                            const mItem = masterProducts[row.코드] || {}; const isSel = selectedRows.has(row.코드);
                                            return <MemoizedTableRow key={row.코드} row={row} idx={idx} isSel={isSel} mItem={mItem} isEstimateUploaded={isEstimateUploaded} visMasterCols={visMaster} visUploadCols={visUpload} masterLinksEst={masterLinksEst} onToggleSelection={actions.toggleRowSelection} onMouseDown={handleMouseDown} onMouseEnter={handleMouseEnter} onUpdateCell={actions.handleUpdateCell} />;
                                        })}
                                        
                                        {bottomPadding > 0 && <tr style={{ height: `${bottomPadding}px` }}><td colSpan="50" className="p-0 border-0"></td></tr>}
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        function App() {
            const config = useMerchConfig();
            
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false); 
            const [processMsg, setProcessMsg] = useState('');
            const [isExporting, setIsExporting] = useState(false);
            
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});

            const [globalSearch, setGlobalSearch] = useState('');
            const [selectedCatalog, setSelectedCatalog] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [selectedRows, setSelectedRows] = useState(new Set());

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);
            
            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!path || path === '#' || !isReady) {
                    showToast("⚠️ 해당 페이지는 현재 준비 중이거나 경로가 올바르지 않습니다.");
                    return;
                }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 이동 시뮬레이션: [${path}]`);
                }
            }, [showToast]);

            const loadMaster = useCallback(async () => { 
                const data = await getIDB(STORAGE_KEYS.MASTER_DB); 
                if (data) setMasterProducts(data); 
            }, []);

            useEffect(() => { 
                loadMaster(); 
                const onSync = (e) => { if(e.key === STORAGE_KEYS.SYNC_TRIGGER) loadMaster(); }; 
                window.addEventListener('storage', onSync); 
                
                const handleMessage = (e) => {
                    if (e.data && e.data.type === 'CLOSE_SETTINGS') {
                        setShowSettingsModal(false);
                        loadMaster(); 
                    }
                };
                window.addEventListener('message', handleMessage);

                const handleKeyDown = (e) => {
                    if (e.key === 'F3') {
                        e.preventDefault();
                        const searchInput = document.getElementById('global-search-input');
                        if (searchInput) {
                            searchInput.focus();
                            searchInput.select();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);

                return () => {
                    window.removeEventListener('storage', onSync); 
                    window.removeEventListener('message', handleMessage);
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, [loadMaster]);

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('엑셀 시세표 분석 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    const curMap = config.mappings['estimate'] || {}; 
                    const headerCache = createHeaderMap(Object.keys(excelData[0]), curMap);
                    
                    const allFields = Array.from(new Set([...Object.keys(curMap), ...MASTER_HEADERS, ...NUMERIC_HEADERS]));
                    
                    let newManaged = { ...managedItems }; let count = 0;
                    excelData.forEach(row => {
                        const codeKey = headerCache['품목코드']; 
                        const code = row[codeKey] || row['품목코드'] || row['상품코드'] || row['코드'];
                        if (!code || String(code).replace(/\s/g, '').includes('출력')) return;
                        
                        if (!newManaged[code]) newManaged[code] = { 코드: code, sources: { estimate: {} }, finalData: {} };
                        let mItem = newManaged[code];
                        const nameKey = headerCache['품목명']; mItem.sources['estimate']['품목명'] = nameKey ? row[nameKey] : '';
                        
                        allFields.forEach(h => {
                            let actualKey = headerCache[h];
                            if (!actualKey && row[h] !== undefined) actualKey = h; 

                            if(actualKey && row[actualKey] !== undefined && row[actualKey] !== '') {
                                const val = row[actualKey];
                                const isNum = NUMERIC_HEADERS.includes(config.masterLinks['estimate']?.[h]) || NUMERIC_HEADERS.includes(h);
                                mItem.sources['estimate'][h] = isNum ? parseNum(val) : val;
                                if (mItem.finalData[h] === undefined) mItem.finalData[h] = isNum ? parseNum(val) : val;
                            }
                        });
                        
                        delete mItem.finalData['출고가'];
                        const pIn = parseNum(mItem.sources['estimate']['입고가'] || masterProducts[code]?.['입고가']);
                        if (pIn > 0) mItem.finalData = calculatePricesEngine(pIn, masterProducts[code]||{}, mItem.finalData, config.marginRules, false);
                        count++;
                    });
                    setManagedItems(newManaged); showToast(`✅ ${count}건 데이터 로드 완료`);
                } catch(error) { showToast("❌ 업로드 오류: " + error.message); } finally { e.target.value = ''; setIsProcessing(false); setProcessMsg(''); }
            };

            const handleUpdateCell = useCallback((code, field, linkedMasterField, value) => {
                setManagedItems(prev => {
                    let currentItem = prev[code] || { 코드: code, sources: { estimate: {} }, finalData: {} };
                    currentItem = { ...currentItem, finalData: { ...currentItem.finalData, [field]: value } };
                    if (['입고가', '출고가', '외주비', '노무비'].includes(field) || ['입고가', '출고가'].includes(linkedMasterField)) {
                        const pInRaw = (field === '입고가' || linkedMasterField === '입고가') ? value : (currentItem.finalData['입고가'] ?? currentItem.sources['estimate']?.['입고가'] ?? masterProducts[code]?.['입고가'] ?? 0);
                        currentItem.finalData = calculatePricesEngine(parseNum(pInRaw), masterProducts[code] || {}, currentItem.finalData, config.marginRules, true);
                    } return { ...prev, [code]: currentItem };
                });
            }, [masterProducts, config.marginRules]);

            const handleCommitEstimate = useCallback(async (targetCodes) => {
                if (targetCodes.length === 0) return;
                let newMaster = { ...masterProducts }, commitCount = 0, localLogs = []; const nowStr = new Date().toLocaleString('ko-KR');

                targetCodes.forEach(code => {
                    const item = managedItems[code]; if (!item || !item.코드) return;
                    const oldItem = masterProducts[code] || {};
                    newMaster[item.코드] = { ...(newMaster[item.코드] || { 코드: item.코드 }) };

                    if (item.finalData) {
                        Object.keys(item.finalData).forEach(field => {
                            if ((field === '품목명' || field === '규격') && oldItem['품목명']) return;

                            const linked = config.masterLinks['estimate']?.[field] || (MASTER_HEADERS.includes(field) || NUMERIC_HEADERS.includes(field) ? field : null);
                            if (linked && item.finalData[field] !== undefined && item.finalData[field] !== '' && item.finalData[field] !== '오류') {
                                const newVal = NUMERIC_HEADERS.includes(linked) ? parseNum(item.finalData[field]) : item.finalData[field];
                                const oldVal = NUMERIC_HEADERS.includes(linked) ? parseNum(oldItem[linked]) : oldItem[linked];
                                if (['입고가', '출고가'].includes(linked) && oldVal > 0 && oldVal !== newVal) {
                                    localLogs.push({ id: generateUUID(), timestamp: nowStr, code: code, name: oldItem.품목명 || item.sources?.estimate?.품목명 || '', field: linked, oldVal, newVal, diff: newVal - oldVal });
                                } newMaster[item.코드][linked] = newVal;
                            }
                        });
                    } commitCount++;
                });

                if (localLogs.length > 0) {
                    const oldLogs = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...oldLogs, ...localLogs]);
                }
                setMasterProducts(newMaster); 
                await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);

                                </label>
                                
                                <button onClick={handleExportCurrentView} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-colors shadow-sm flex items-center shrink-0" title="현재 화면 그대로 엑셀로 다운로드합니다.">
                                    <i className="fas fa-file-excel mr-1.5 text-emerald-500"></i> 화면 다운로드
                                </button>

                                <button onClick={() => setShowExportModal(true)} className="h-9 px-3 rounded-md text-[13px] font-bold bg-white text-amber-600 border border-amber-200 hover:bg-amber-50 transition-colors shadow-sm flex items-center shrink-0" title="ERP/쇼핑몰 양식 출력">
                                    <i className="fas fa-file-export mr-1.5 text-amber-500"></i> 보고서
                                </button>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 shrink-0">
                            {selectedRows.size > 0 && (
                                <button onClick={handleRemoveFromWorkspace} className="h-9 px-3 rounded-md text-[12px] font-bold bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 transition-colors shadow-sm flex items-center" title="선택 항목 숨기기">
                                    <i className="fas fa-eye-slash mr-1.5"></i> 숨기기 ({selectedRows.size})
                                </button>
                            )}
                            <button onClick={() => setShowReviewModal(true)} disabled={fullDisplayRows.length === 0} className={`h-9 px-4 rounded-md text-[13px] font-bold shadow-sm transition-colors flex items-center ${fullDisplayRows.length > 0 ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed border border-slate-200'}`}>
                                <i className="fas fa-check-circle mr-1.5"></i> 반영하기
                            </button>

                            <div className="w-px h-5 bg-slate-200 mx-1"></div>

                            <button onClick={handleReset} className="h-9 w-9 rounded-md flex items-center justify-center text-slate-500 hover:text-slate-800 bg-white border border-slate-300 hover:bg-slate-50 transition-colors shadow-sm" title="화면 초기화">
                                <i className="fas fa-redo-alt text-[13px]"></i>
                            </button>
                            <div className="relative w-48 sm:w-64 h-9">
                                <input 
                                    id="global-search-input" 
                                    type="text" 
                                    placeholder="결과 내 검색 (F3)" 
                                    value={globalSearch} 
                                    onChange={e=>setGlobalSearch(e.target.value)} 
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            const firstInPriceInput = document.querySelector('tbody tr.table-row-hover input[data-field="입고가"]');
                                            const fallbackInput = document.querySelector('tbody tr.table-row-hover td:has(input[type="text"]) input');
                                            const target = firstInPriceInput || fallbackInput;
                                            if (target) {
                                                target.focus();
                                                setTimeout(() => target.select(), 0);
                                            }
                                        }
                                    }}
                                    className="w-full h-full pl-3 pr-8 py-1 border border-slate-300 rounded-md text-[12px] outline-none focus:border-blue-400 shadow-sm text-slate-700 font-medium" 
                                />
                                <i className="fas fa-search absolute right-3 top-2.5 text-slate-400 text-[13px] pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden bg-slate-50 p-6 flex flex-col">
                        <ExcelDataGrid state={appState} actions={appActions} />
                    </main>

                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    
                    {showReviewModal && <ReviewModal onClose={() => setShowReviewModal(false)} onConfirm={handleCommitEstimate} displayRows={fullDisplayRows} masterProducts={masterProducts} visibleUploadCols={config.visibleUploadCols} masterLinksEst={config.masterLinks['estimate']||{}} />}
                    {showCategoryModal && <CategorySaveModal onClose={() => setShowCategoryModal(false)} onSave={handleSaveAsCategory} availableCategories={availableCategories} />}
                    {showExportModal && <ExportModal onClose={() => setShowExportModal(false)} executeExport={executeExport} />}

                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700 font-bold">
                            <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
