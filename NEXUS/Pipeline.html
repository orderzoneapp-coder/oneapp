    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        // 💡 [안정성 보장] 브라우저 CDN 오류를 피하기 위한 React 기반 경량화 (Tailwind 묶음 객체)

        const MASTER_HEADERS = [ "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그" ];
        const NUMERIC_HEADERS = [ "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비", "1구매", "1출고", "2구매", "2출고", "1입고", "2입고", "1입고", "1출고" ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        const getInitialMappings = () => {
            return { master: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' }, estimate: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가', '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고' } };
        };
        const getInitialMasterLinks = () => ({ estimate: { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' } });

        const generateUUID = () => { if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID(); return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); }); };
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const isCSV = file.name.toLowerCase().endsWith('.csv');
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = isCSV ? window.XLSX.read(e.target.result, { type: 'string', raw: false }) : window.XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = ''; rowArr.forEach(v => { if(v !== undefined && String(v).trim() !== '') { filledCount++; rawStr += String(v).replace(/\s/g, ''); } });
                        if (rawStr === '') { endIdx--; continue; }
                        if (rawStr.match(/출력|합계|총계/) && filledCount <= 4) endIdx--; else break;
                    }
                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) { obj['_raw'] = row; parsedData.push(obj); }
                    } resolve(parsedData);
                } catch (err) { reject(err); }
            };
            isCSV ? reader.readAsText(file, 'euc-kr') : reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 1. SafeIcon 컴포넌트
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [kebabName, name, name==='cloud-download'?'download-cloud':name, name==='cloud-upload'?'upload-cloud':name, name==='bar-chart-3'?'bar-chart':name];
                        for (const pName of possibleNames) { if (window.lucide.icons[pName]) { setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return; } }
                    }
                }; renderIcon();
            }, [name, size, className]);
            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'database':'fa-database', 'users':'fa-users', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'printer':'fa-print', 'pie-chart':'fa-chart-pie', 'megaphone':'fa-bullhorn', 'book-open':'fa-address-book', 'save':'fa-save', 'file-excel':'fa-file-excel', 'file-export':'fa-file-export', 'folder-open':'fa-folder-open', 'chevron-down':'fa-chevron-down', 'search':'fa-search', 'eye-slash':'fa-eye-slash', 'redo-alt':'fa-redo-alt', 'lock':'fa-lock', 'pen':'fa-pen' };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 2. Config Hook
        // ==========================================
        const useMerchConfig = () => {
            const loadConfig = () => {
                const cloudUrl = localStorage.getItem('skuSyncCloudUrl_v6') || '';
                let visibleMasterCols = JSON.parse(localStorage.getItem('merchVisMaster_v870')) || getInitialVisibleMasterCols();
                let visibleUploadCols = JSON.parse(localStorage.getItem('merchVisUpload_v870')) || getInitialVisibleUploadCols();
                let mappings = JSON.parse(localStorage.getItem('merchMappings_v870')) || getInitialMappings();
                let masterLinks = JSON.parse(localStorage.getItem('merchMasterLinks_v870')) || getInitialMasterLinks();
                let marginRules = JSON.parse(localStorage.getItem('merchMarginRules_v878')) || [ { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' }, { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' } ];
                
                if (visibleMasterCols.estimate?.includes('카테고리')) visibleMasterCols.estimate = visibleMasterCols.estimate.map(h => h === '카테고리' ? '견적서' : h);
                if (visibleUploadCols.estimate?.includes('카테고리')) visibleUploadCols.estimate = visibleUploadCols.estimate.map(h => h === '카테고리' ? '견적서' : h);
                if (mappings.estimate?.['카테고리']) { mappings.estimate['견적서'] = mappings.estimate['카테고리'] + ', 견적서'; delete mappings.estimate['카테고리']; }
                return { cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules };
            };
            const [config, setConfig] = useState(loadConfig());
            useEffect(() => { const handleStorageChange = () => setConfig(loadConfig()); window.addEventListener('storage', handleStorageChange); return () => window.removeEventListener('storage', handleStorageChange); }, []);
            return config;
        };

        // ==========================================
        // 💡 [절대 수정 금지] 15개 탭 완벽 매핑 데이터 및 100% 원본 GlobalHeader
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true, shortTag: 'ONE BOARD' },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: true, shortTag: 'SYSTEM GUIDE' },

                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true, shortTag: 'GOLDEN RECORD' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true, shortTag: 'SKU FORGE' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true, shortTag: 'VALUATION HUB' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true, shortTag: 'AI SMART PARSER' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true, shortTag: 'ENTITY REGISTRY' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true, shortTag: 'CRM STRATEGY' },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true, shortTag: 'ORDER STREAM' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true, shortTag: 'SOURCE & PROCURE' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true, shortTag: 'REVENUE LEDGER' },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true, shortTag: 'STOCK LEDGER' },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true, shortTag: 'INSIGHT ENGINE' },

            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common';
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.2</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">
                                        {currentTab ? currentTab.shortTag : 'WORKSPACE'}
                                    </span>

                            </div>

                            <div className="flex items-end h-full gap-8">

                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}

                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>

                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount ? itemCount.toLocaleString() : 0}</span>
                                </div>
                            </div>

        const calculatePricesEngine = (baseInPrice, mItem = {}, currentFinalData = {}, marginRules = [], forceRecalc = false) => {
            if (!baseInPrice || baseInPrice <= 0) return { ...currentFinalData, '입고가': 0, '시중가': 0, '출고가': 0, '1입고': 0, '1출고': 0 };
            const outsrc = parseNum(currentFinalData?.['외주비'] ?? mItem?.['외주비']);
            const labor = parseNum(currentFinalData?.['노무비'] ?? mItem?.['노무비']);
            const totalCost = baseInPrice + outsrc + labor;
            const whCode = String(currentFinalData?.['창고'] ?? mItem?.['창고'] ?? '').trim();
            const unitStr = String(currentFinalData?.['단위'] ?? mItem?.['단위'] ?? '').trim().toLowerCase();
            const matchWh = (rWh, tWh) => rWh === '*' || rWh.split(/[,./|\s]+/).map(s=>s.trim()).filter(Boolean).some(s=>s===tWh||(tWh!==''&&!isNaN(s)&&!isNaN(tWh)&&Number(s)===Number(tWh)));
            const matchUnit = (rUnit, tUnit) => rUnit === '*' || rUnit.toLowerCase().split(/[,./|\s]+/).map(s=>s.trim()).filter(Boolean).some(s=>tUnit===s||tUnit.includes(s));
            
            let bestRule = { rate: 10, type: 'divide' }, bestScore = -1;
            marginRules.forEach(r => {

                    let score = (r.whCode !== '*' ? 2 : 0) + (r.unit !== '*' ? 1 : 0);
                    if (score > bestScore) { bestScore = score; bestRule = r; }
                }
            });

            let calcOutPrice = bestRule.type === 'divide' ? totalCost / (1 - (Math.min(bestRule.rate, 99.99) / 100)) : totalCost * (1 + (bestRule.rate / 100));
            calcOutPrice = Math.round(calcOutPrice / 100) * 100;
            let newFinalData = { ...currentFinalData, '입고가': baseInPrice, '시중가': calcOutPrice };
            
            const providedOutPrice = currentFinalData?.['출고가'];
            if (forceRecalc) newFinalData['출고가'] = calcOutPrice;

            const extraCost = parseNum(currentFinalData?.['경비'] ?? mItem?.['경비']);
            
            if (div1 > 0) {
                const provided1In = parseNum(currentFinalData?.['1입고']);
                const provided1Out = parseNum(currentFinalData?.['1출고']);

                let calc1In = Math.round(((baseInPrice + outsrc) / div1) / 100) * 100;
                let calc1Out = Math.round(((newFinalData['출고가'] / div1) + extraCost) / 100) * 100;

                    if (e.key === 'ArrowRight') nextColIdx = Math.min(tds.length - 1, colIdx + 1);
                    if (e.key === 'Tab') { e.preventDefault(); if (e.shiftKey) { nextColIdx = colIdx - 1; if (nextColIdx < 0) { nextColIdx = tds.length - 1; nextRowIdx = Math.max(0, rowIdx - 1); } } else { nextColIdx = colIdx + 1; if (nextColIdx >= tds.length) { nextColIdx = 0; nextRowIdx = Math.min(trs.length - 1, rowIdx + 1); } } }

                            });

                            const aoa = [headers];
                            data.forEach(item => {
                                const row = [];
                                columnDefinitions.forEach(colDef => {
                                    if (colDef.type === 'static') row.push(colDef.value);
                                    else if (colDef.type === 'data') row.push(item[colDef.key] !== undefined && item[colDef.key] !== null ? item[colDef.key] : '');
                                    else if (colDef.type === 'vat_01' || colDef.type === 'vat_ny') {
                                        const isTaxable = item.isTaxable === true; 
                                        if (colDef.type === 'vat_01') row.push(isTaxable ? '1' : '0');
                                        else if (colDef.type === 'vat_ny') row.push(isTaxable ? 'y' : 'n');
                                    }
                                });
                                aoa.push(row);
                            });
                            return aoa;
                        };

                        const exportTargetRows = selectedRows.size > 0 ? fullDisplayRows.filter(row => selectedRows.has(row.코드)) : fullDisplayRows;
                        const flatErpData = [];
                        const activeKeys = Array.from(new Set(['품목명', '규격', ...(config.visibleMasterCols.estimate || []), ...(config.visibleUploadCols.estimate || [])]));

                        exportTargetRows.forEach(row => {
                            const mItem = masterProducts[row.코드] || {}, final = row.finalData || {}, source = row.sources?.['estimate'] || {};
                            const pIn = getFirstNum([final, source, mItem], ['입고가', '입고']);
                            const pOut = getFirstNum([final, source, mItem], ['출고가', '출고']);
                            const pMarketPrice = getFirstNum([final, mItem], ['시중가']);

                            const dName = getFirstStr([source, mItem], ['품목명']), dSpec = getFirstStr([source, mItem], ['규격']), dBrand = getFirstStr([source, mItem], ['브랜드']), dInfo = getFirstStr([source, mItem], ['상품정보', '기본설명', '간단설명']), dSearch = getFirstStr([source, mItem], ['검색어등록', '상품태그']);
                            
                            let erpItem = { 품목코드: row.코드 };
                            activeKeys.forEach(k => {
                                const lk = config.masterLinks.estimate?.[k] || k;
                                const val = NUMERIC_HEADERS.includes(lk) ? getFirstNum([final, source, mItem], [k, lk]) : getFirstStr([final, source, mItem], [k, lk]);
                                
                                if (k === '품목명') erpItem['품목(상품명)'] = val || dName;
                                else if (k === '외주비') erpItem['외주비단가'] = val;
                                else erpItem[k] = val;
                            });
                            
                            if(erpItem['외주비단가'] === undefined) erpItem['외주비단가'] = getFirstNum([final, source, mItem], ['외주비단가', '외주비']);
                            erpItem.isTaxable = false; 
                            flatErpData.push(erpItem);
                            
                            const isZeroPrice = (pIn === 0 && pOut === 0);
                            const priceMarketShop = isZeroPrice ? 0 : (pMarketPrice > 0 ? pMarketPrice : pOut);
                            const priceA = isZeroPrice ? 0 : getFirstNum([final, source, mItem], ['도매A', 'A판매가', 'A판매', '출고가']);
                            const isForSale = isZeroPrice ? zeroAction.sale : (pIn > 0 || pOut > 0 ? '1' : '0');
                            const stockQty = isZeroPrice ? zeroAction.stock : '999';
                            
                            shopData.push([row.코드, dName, dSpec, pOut, priceA, priceMarketShop, 0, 0, 0, 0, 0, 0, dBrand, dInfo, isForSale, stockQty, '', '', '', '', '', dSearch]);

                            // 💡 2종 소분 삭제 적용 완료 (1종코드만 처리)
                            [1].forEach(type => { 
                                const cCodeRaw = getFirstStr([final, source, mItem], [`${type}종코드`]); 
                                if (isValidCode(cCodeRaw)) { 
                                    const cCode = String(cCodeRaw).trim();
                                    const cIn = getFirstNum([final, source, mItem], [`${type}입고`, `${type}구매`]), cOut = getFirstNum([final, source, mItem], [`${type}출고`]); 
                                    
                                    const subMaster = masterProducts[cCode] || {};
                                    const cName = subMaster.품목명 || getFirstStr([final, source, mItem], [`${type}그룹명`]) || `${dName} (소분)`;
                                    const cSpec = subMaster.규격 || getFirstStr([mItem, source], [`${type}종규격`]) || '';

                                    let cErpItem = { 품목코드: cCode };
                                    activeKeys.forEach(k => {
                                        if (k === '품목명') cErpItem['품목(상품명)'] = cName;
                                        else if (k === '규격') cErpItem['규격'] = cSpec;
                                        else if (['입고가', '구매가'].includes(k)) cErpItem[k] = cIn;
                                        else if (['출고가'].includes(k)) cErpItem[k] = cOut;
                                        else if (k === '외주비') cErpItem['외주비단가'] = subMaster['외주비'] || 0;
                                        else cErpItem[k] = subMaster[k] !== undefined ? subMaster[k] : '';
                                    });
                                    cErpItem.isTaxable = false;
                                    flatErpData.push(cErpItem);
                                    
                                    const cIsZeroPrice = (cIn === 0 && cOut === 0);
                                    const cMarketPrice = cIsZeroPrice ? 0 : (subMaster.시중가 > 0 ? subMaster.시중가 : cOut);
                                    const cPriceA = cIsZeroPrice ? 0 : (subMaster.도매A > 0 ? subMaster.도매A : cOut);
                                    const cIsForSale = cIsZeroPrice ? zeroAction.sale : (cIn > 0 || cOut > 0 ? '1' : '0');
                                    const cStockQty = cIsZeroPrice ? zeroAction.stock : '999';

                                    shopData.push([cCode, cName, cSpec, cOut, cPriceA, cMarketPrice, 0, 0, 0, 0, 0, 0, subMaster.브랜드||dBrand, subMaster.간단설명||dInfo, cIsForSale, cStockQty, '', '', '', '', '', subMaster.검색어등록||dSearch]);
                                } 
                            });
                        });
                        
                        const erpData = generateDynamicPartialUpdateData(flatErpData, activeKeys);

                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(shopData), "쇼핑몰업로드"); 
                        window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(erpData), "ERP업데이트"); 
                        window.XLSX.writeFile(wb, `보고서출력_${new Date().toISOString().slice(0,10)}.xlsx`);
                        showToast(`✅ [${option.title || '통합 보고서'}] 엑셀 다운로드가 완료되었습니다.`);
                    } catch(e) { showToast("❌ 엑셀 파일 생성 중 오류가 발생했습니다."); console.error(e); } finally { setIsExporting(false); }
                }, 100);
            }, [fullDisplayRows, masterProducts, selectedRows, config.visibleMasterCols, config.visibleUploadCols, config.masterLinks, showToast]);

            const handleLoadWorkspaceData = useCallback((catalog, category) => {
                if (!catalog && !category) return setManagedItems({});
                setIsProcessing(true); setProcessMsg('데이터 로드 및 병합 중...');
                setTimeout(() => {
                    let newManaged = {};
                    Object.values(masterProducts).forEach(mItem => {
                        let isMatch = false;
                        if (catalog && (mItem['카탈로그'] || '').split(',').map(c=>c.trim()).includes(catalog)) isMatch = true;
                        if (category && (mItem['견적서'] || mItem['카테고리'] || '').split(',').map(c=>c.trim()).includes(category)) isMatch = true;
                        if (isMatch) newManaged[mItem.코드] = { 코드: mItem.코드, sources: { estimate: {} }, finalData: calculatePricesEngine(parseNum(mItem['입고가']), mItem, { 출고가: mItem['출고가'] }, config.marginRules, false) };
                    });
                    setManagedItems(newManaged); setSelectedRows(new Set()); 
                    showToast(`✅ 데이터 로드 완료! (${Object.keys(newManaged).length}건)`); setIsProcessing(false); setProcessMsg('');
                }, 100);
            }, [masterProducts, config.marginRules, showToast]);

            const handleSaveAsCategory = useCallback(async (categoryName) => {
                if (!categoryName?.trim()) return; const rows = Object.values(managedItems); if (rows.length === 0) return showToast("⚠️ 카탈로그로 저장할 상품이 없습니다.");
                setIsProcessing(true); setProcessMsg('카탈로그 저장 중...');
                let newMaster = { ...masterProducts }; let count = 0; const safeName = categoryName.trim();
                rows.forEach(row => {
                    if (!newMaster[row.코드]) return; newMaster[row.코드] = { ...newMaster[row.코드] };
                    const tags = (newMaster[row.코드]['견적서'] || newMaster[row.코드]['카테고리'] || '').split(',').map(s=>s.trim()).filter(Boolean);
                    if (!tags.includes(safeName)) { tags.push(safeName); newMaster[row.코드]['견적서'] = tags.join(', '); delete newMaster[row.코드]['카테고리']; count++; }
                });
                setMasterProducts(newMaster); await setIDB(STORAGE_KEYS.MASTER_DB, newMaster); localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                setShowCategoryModal(false); showToast(`✅ ${count}개 상품이 [${safeName}] 카탈로그에 저장되었습니다.`); setIsProcessing(false); setProcessMsg('');
            }, [managedItems, masterProducts, showToast]);

            const handleReset = useCallback(() => { setManagedItems({}); setSelectedRows(new Set()); setGlobalSearch(''); setSelectedCatalog(''); setSelectedCategory(''); showToast('작업 화면이 초기화 되었습니다.'); }, [showToast]);
            const handlePush = async () => { if (!config.cloudUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요."); setIsProcessing(true); setProcessMsg("클라우드 백업 중..."); setTimeout(() => { showToast("✅ 클라우드 저장 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000); };
            const handlePull = async () => { if (!config.cloudUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요."); setIsProcessing(true); setProcessMsg("데이터 동기화 중..."); setTimeout(() => { showToast("✅ 데이터 수신 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000); };
            const handleRemoveFromWorkspace = useCallback(() => { if (selectedRows.size === 0) return showToast('⚠️ 숨길 항목을 선택하세요.'); setManagedItems(p => { const n = { ...p }; selectedRows.forEach(c => delete n[c]); return n; }); setSelectedRows(new Set()); showToast('✅ 선택한 항목이 숨겨졌습니다.'); }, [selectedRows, showToast]);

            const fullDisplayRows = useMemo(() => {
                let base = Object.keys(managedItems).length > 0 ? Object.values(managedItems) : Object.values(masterProducts).map(m => managedItems[m.코드] || { 코드: m.코드, sources: {}, finalData: {} });
                if (!Object.keys(managedItems).length) {
                    if (selectedCatalog) base = base.filter(item => (masterProducts[item.코드]?.['카탈로그'] || '').split(',').map(t=>t.trim()).includes(selectedCatalog));
                    if (selectedCategory) base = base.filter(item => (masterProducts[item.코드]?.['견적서'] || masterProducts[item.코드]?.['카테고리'] || '').split(',').map(t=>t.trim()).includes(selectedCategory));
                }
                if (globalSearch) {
                    const tokens = globalSearch.toLowerCase().replace(/[()[\]{},./]/g, ' ').split(/\s+/).filter(Boolean);
                    if (tokens.length > 0) {
                        base = base.map(item => {
                            const getV = k => String(item.finalData?.[k] ?? item.sources?.estimate?.[k] ?? masterProducts[item.코드]?.[k] ?? '').toLowerCase();
                            let score = 0; const str = `${getV('품목명')} ${getV('규격')} ${getV('구매처')} ${getV('창고')} ${String(item.코드).toLowerCase()}`;
                            tokens.forEach(t => { if (str.includes(t)) score += 10; }); return { ...item, _searchScore: score };
                        }).filter(r => r._searchScore > 0).sort((a, b) => b._searchScore - a._searchScore);
                    }
                } else { base.sort((a, b) => String(a.코드).localeCompare(String(b.코드))); }
                return base;
            }, [managedItems, masterProducts, globalSearch, selectedCatalog, selectedCategory]);

            const handleExportCurrentView = useCallback(() => { 
                if (fullDisplayRows.length === 0) return showToast("⚠️ 내보낼 데이터가 없습니다.");
                setIsExporting(true);
                setTimeout(() => {
                    try {
                        const upCols = config.visibleUploadCols.estimate || [], mCols = config.visibleMasterCols.estimate || [];
                        const headers = ['상태/선택', '품목코드', '마스터_품목명', '마스터_규격', ...mCols.map(h=>`[M]${h}`), ...upCols.map(h=>`[작업]${h}`)];
                        const aoa = [headers];

                        const exportTargetRows = selectedRows.size > 0 ? fullDisplayRows.filter(row => selectedRows.has(row.코드)) : fullDisplayRows;

                        exportTargetRows.forEach(row => {
                            const mItem = masterProducts[row.코드] || {}; const rowData = [selectedRows.has(row.코드)?'선택됨':'', row.코드||'', mItem.품목명||'', mItem.규격||''];
                            mCols.forEach(h => { const val = mItem[h] !== undefined ? mItem[h] : ''; rowData.push(NUMERIC_HEADERS.includes(h) ? parseNum(val) : val); });
                            upCols.forEach(h => { const val = row.finalData?.[h] !== undefined ? row.finalData[h] : (row.sources?.estimate?.[h] || ''); rowData.push(NUMERIC_HEADERS.includes(h)||NUMERIC_HEADERS.includes(config.masterLinks.estimate?.[h]) ? parseNum(val) : val); });
                            aoa.push(rowData);
                        });
                        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(aoa), "현재화면_출력"); window.XLSX.writeFile(wb, `화면출력_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("✅ 다운로드 완료");
                    } catch(e) { showToast("❌ 오류 발생"); } finally { setIsExporting(false); }
                }, 100);
            }, [fullDisplayRows, config.visibleUploadCols, config.visibleMasterCols, config.masterLinks, masterProducts, selectedRows, showToast]);

            const appState = { fullDisplayRows, visibleMasterCols: config.visibleMasterCols, visibleUploadCols: config.visibleUploadCols, masterProducts, masterLinksEst: config.masterLinks['estimate']||{}, selectedRows, isEstimateUploaded: Object.keys(managedItems).length > 0, globalSearch, selectedCatalog, selectedCategory, isProcessing };
            const appActions = { handleUpdateCell, executeExport, setRowSelection: useCallback((c, isSel) => { setSelectedRows(p => { const n = new Set(p); isSel?n.add(c):n.delete(c); return n; }); }, []), handleRemoveFromWorkspace, setShowReviewModal, setShowCategoryModal, setGlobalSearch, handleCatalogChange: e => { setSelectedCatalog(e.target.value); handleLoadWorkspaceData(e.target.value, selectedCategory); }, handleCategoryChange: e => { setSelectedCategory(e.target.value); handleLoadWorkspaceData(selectedCatalog, e.target.value); }, handleReset, handleFileUpload, showToast, handleExportCurrentView };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-[#f1f5f9] relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader activeTab="pipeline" itemCount={Object.keys(masterProducts).length} isProcessing={isProcessing} processMsg={processMsg} onOpenSettings={() => setShowSettingsModal(true)} onPush={handlePush} onPull={handlePull} onNavigate={handleNavigate} />
                    
                    {isExporting && (
                        <div className={`${TW.modalOverlay} flex-col z-[9999]`}>
                            <i className="fas fa-circle-notch fa-spin text-6xl text-indigo-500 mb-6"></i>
                            <h2 className="text-2xl font-black text-white mb-2">엑셀 파일을 생성하고 있습니다</h2>
                            <p className="text-emerald-400 font-bold">잠시만 기다려주세요...</p>
                        </div>
                    )}

                    <div className="px-6 py-3 flex items-center justify-between gap-4 bg-white border-b border-slate-200 z-10 w-full shrink-0">
                        <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar pb-1 -mb-1">
                            <div className="relative"><select value={selectedCatalog} onChange={appActions.handleCatalogChange} className={`${TW.selectBase} w-[160px]`}><option value="">파서 보관함</option>{availableCatalogs.map(tag => <option key={tag.name} value={tag.name}>{tag.name} ({tag.count}건)</option>)}</select><i className="fas fa-folder-open absolute left-3 top-2.5 text-blue-500 text-[13px] pointer-events-none"></i></div><div className="w-px h-5 bg-slate-200 mx-1 shrink-0"></div>
                            <div className="relative"><select value={selectedCategory} onChange={appActions.handleCategoryChange} className={`${TW.selectBase} w-[160px]`}><option value="">카탈로그</option>{availableCategories.map(cat => <option key={cat.name} value={cat.name}>{cat.name} ({cat.count}건)</option>)}</select><i className="fas fa-file-invoice absolute left-3 top-2.5 text-blue-500 text-[13px] pointer-events-none"></i></div>
                            <button onClick={() => setShowCategoryModal(true)} className={`${TW.toolbarBtn} text-blue-600 border-blue-200 hover:bg-blue-50`}><i className="fas fa-save mr-1.5 text-blue-500"></i> 저장</button><div className="w-px h-5 bg-slate-200 mx-1 shrink-0"></div>
                            <label className={`${TW.toolbarBtn} text-emerald-600 border-emerald-200 hover:bg-emerald-50 cursor-pointer`}><i className="fas fa-file-excel mr-1.5 text-emerald-500"></i> 견적 엑셀 불러오기<input type="file" className="hidden" multiple onChange={(e) => handleFileUpload(e)} accept=".xlsx, .xls, .csv" disabled={isProcessing} /></label>
                            <button onClick={handleExportCurrentView} className={`${TW.toolbarBtn} text-emerald-600 border-emerald-200 hover:bg-emerald-50`}><i className="fas fa-file-excel mr-1.5 text-emerald-500"></i> 화면 다운로드</button>
                            <button onClick={() => appActions.executeExport({title: '통합 엑셀 다운로드'})} className={`${TW.toolbarBtn} text-amber-600 border-amber-200 hover:bg-amber-50`}><i className="fas fa-file-export mr-1.5 text-amber-500"></i> 보고서</button>
                        </div>
                        <div className="flex items-center gap-2 shrink-0">
                            {selectedRows.size > 0 && <button onClick={handleRemoveFromWorkspace} className={`${TW.toolbarBtn} bg-rose-50 text-rose-600 border-rose-200 hover:bg-rose-100`}><i className="fas fa-eye-slash mr-1.5"></i> 숨기기 ({selectedRows.size})</button>}
                            <button onClick={() => setShowReviewModal(true)} disabled={fullDisplayRows.length === 0} className={`${TW.toolbarBtn} px-4 ${fullDisplayRows.length > 0 ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed border-slate-200'}`}><i className="fas fa-check-circle mr-1.5"></i> 반영하기</button><div className="w-px h-5 bg-slate-200 mx-1"></div>
                            <button onClick={handleReset} className={`${TW.toolbarBtn} w-9 justify-center text-slate-500 hover:text-slate-800`}><i className="fas fa-redo-alt text-[13px]"></i></button>
                            <div className="relative w-48 sm:w-64 h-9"><input id="global-search-input" type="text" placeholder="결과 내 검색 (F3)" value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); const target = document.querySelector('tbody tr.table-row-hover input[data-field="입고가"]') || document.querySelector('tbody tr.table-row-hover td:has(input[type="text"]) input'); if (target) { target.focus(); setTimeout(() => target.select(), 0); } } }} className={`${TW.selectBase} w-full h-full pl-3 pr-8 py-1 !cursor-text`} /><i className="fas fa-search absolute right-3 top-2.5 text-slate-400 text-[13px] pointer-events-none"></i></div>
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden bg-slate-50 p-6 flex flex-col"><ExcelDataGrid state={appState} actions={appActions} /></main>

                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    {showReviewModal && <ReviewModal onClose={() => setShowReviewModal(false)} onConfirm={handleCommitEstimate} displayRows={fullDisplayRows} masterProducts={masterProducts} visibleUploadCols={config.visibleUploadCols} masterLinksEst={config.masterLinks['estimate']||{}} />}
                    {showCategoryModal && <CategorySaveModal onClose={() => setShowCategoryModal(false)} onSave={handleSaveAsCategory} availableCategories={availableCategories} />}
                    {toastMsg && <div className="fixed bottom-10 right-10 z-[200] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700 font-bold"><SafeIcon name="check-circle-2" size={18} className="text-emerald-400" /><span className="text-sm font-bold tracking-tight">{toastMsg}</span></div>}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
