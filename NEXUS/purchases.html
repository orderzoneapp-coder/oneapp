<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Source & Procure [v3.0]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 🌟 Iframe 드로어용 슬라이딩 애니메이션 추가 */
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 🌟 공통 테이블 하이라이트 스타일 */
        .table-row-hover { border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease; }
        .table-row-hover:last-child { border-bottom: none; }
        .table-row-hover:hover td { background-color: #f8fafc; }
        .table-row-selected td { background-color: #eef2ff; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback, Fragment } = React;

        // ==========================================
        // 🔑 1. Global Constants & Utilities
        // ==========================================
        const STORAGE_KEYS = { MASTER_DB: 'merchMaster_v870', CLOUD_URL: 'skuSyncCloudUrl_v6', SYNC_TRIGGER: 'merchMaster_sync_trigger', HISTORY_DB: 'merchHistory_v870' };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };
        
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const parseExcelRobust = (file) => new Promise((resolve, reject) => {
            if (!window.XLSX) return reject(new Error("엑셀 파서 로드 안됨"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const wb = window.XLSX.read(data, { type: 'array', cellDates: true });
                    const jsonAll = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "", raw: false });
                    if(jsonAll.length === 0) return resolve([]);

                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(15, jsonAll.length); i++) {
                        const rowStr = jsonAll[i].join('').replace(/\s/g, '');
                        if (rowStr.includes('코드') || rowStr.includes('품명') || rowStr.includes('상품')) { headerRowIdx = i; break; }
                    }
                    const headers = jsonAll[headerRowIdx] || [];
                    let endIdx = jsonAll.length - 1;
                    
                    while (endIdx > headerRowIdx) {
                        const rowArr = jsonAll[endIdx]; if (!rowArr || rowArr.length === 0) { endIdx--; continue; }
                        let filledCount = 0, rawStr = '';
                        for(let i=0; i<rowArr.length; i++) if(rowArr[i] !== undefined && String(rowArr[i]).trim() !== '') { filledCount++; rawStr += String(rowArr[i]).replace(/\s/g, ''); }
                        if (rawStr === '') { endIdx--; continue; }
                        if ((rawStr.includes('출력') || rawStr.includes('합계') || rawStr.includes('총계')) && filledCount <= 4) endIdx--; else break;
                    }

                    const parsedData = [];
                    for (let i = headerRowIdx + 1; i <= endIdx; i++) {
                        const row = jsonAll[i]; if (!row) continue;
                        let isEmpty = true; const obj = {}; 
                        headers.forEach((h, idx) => { if (h) { obj[h] = row[idx]; if(row[idx] !== undefined && String(row[idx]).trim() !== '') isEmpty = false; } }); 
                        if(!isEmpty) parsedData.push(obj);
                    } resolve(parsedData);
                } catch(err) { reject(err); }
            }; reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 🧩 [아이콘 시스템] SafeIcon
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'bar-chart-3' ? 'bar-chart' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return;
                            }
                        }
                    }
                }; renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'database':'fa-database', 'upload':'fa-upload', 'pie-chart':'fa-chart-pie', 'shopping-cart':'fa-shopping-cart', 'users':'fa-users', 'megaphone':'fa-bullhorn', 'book-open':'fa-address-book', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'printer':'fa-print', 'search':'fa-search', 'plus':'fa-plus', 'trash-alt':'fa-trash-alt', 'edit':'fa-edit', 'save':'fa-save', 'file-excel':'fa-file-excel', 'link':'fa-link', 'ban':'fa-ban', 'layer-group':'fa-layer-group', 'desktop':'fa-desktop', 'sign-in-alt':'fa-sign-in-alt', 'calculator':'fa-calculator', 'tags':'fa-tags', 'broom':'fa-broom', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'folder-open':'fa-folder-open', 'file-invoice':'fa-file-invoice', 'history':'fa-history' };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 Read-Only 설정 훅 (v3.0 경량화)
        // ==========================================
        const useMerchConfig = () => {
            const loadConfig = () => {
                const cloudUrl = localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '';
                
                const defaultOpsMappings = {
                    code: '품목코드, 상품코드, 코드, 품번, 바코드, sku', name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품', spec: '규격, 옵션, 사이즈', 
                    qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
                    price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
                    date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
                    vendor: '매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
                    matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', 
                    excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플', lifoVendor: '2전송, 쿠팡, B2B, 당일우선, 현금판매', internalLot: '우리, 공용, 분배, 담당자, 우리농산', priorityVendor: '2전송>1창고' 
                };

                let opsMappings = JSON.parse(localStorage.getItem('inventoryMappingsLight') || 'null');
                if (!opsMappings) opsMappings = defaultOpsMappings;

                let opsGrouping = JSON.parse(localStorage.getItem('inventoryGroupingV79') || 'null');
                if (!opsGrouping) opsGrouping = { priceMode: 'separate', splitByVendor: false, splitByDate: false };

                return { cloudUrl, opsMappings, opsGrouping };
            };

            const [config, setConfig] = useState(loadConfig());

            useEffect(() => {
                const handleStorageChange = () => setConfig(loadConfig());
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            return config;
        };

        // ==========================================
        // 🧩 통합 글로벌 헤더 (v3.0)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            // 💡 이미지에 맞춘 대소문자 탭 주소 세팅 완료
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: true },
                
                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: false },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: false }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">SOURCE & PROCURE</span>
                                </div>
                            </div>

                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`현재 브라우저 메모리에 다운로드된 마스터 상품 수: ${itemCount.toLocaleString()}개`}>
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="통합 환경설정 센터 열기"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-6 pt-3 flex items-end gap-1 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                       className={`flex items-center gap-2 px-6 py-3 text-[14px] font-bold rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                       ${isActive 
                                           ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]' 
                                           : isPlaceholder 
                                              ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                              : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'
                                       }`}
                                       style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🌟 Iframe 설정 모달 (경량화)
        // ==========================================
        const IframeSettingsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[500] flex justify-end bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="w-full max-w-[1100px] h-full bg-white shadow-[0_0_40px_rgba(0,0,0,0.3)] flex flex-col slide-in-right border-l border-slate-300 relative overflow-hidden">
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 border-b border-slate-700 shadow-md relative z-10">
                            <div className="flex items-center gap-3">
                                <SafeIcon name="settings" size={20} className="text-indigo-400"/>
                                <h2 className="font-black text-[17px] tracking-wide">통합 환경설정 센터</h2>
                                <span className="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/30 ml-2">Iframe Overlay</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-[12px] text-slate-400 font-medium hidden md:inline-block">설정을 변경하고 창을 닫으면 작업 화면에 즉시 반영됩니다.</span>
                                <button onClick={onClose} className="text-slate-300 hover:text-white transition-colors bg-slate-800 hover:bg-rose-500 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm border border-slate-700 hover:border-rose-400">
                                    <SafeIcon name="x" size={18} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 w-full bg-slate-100 relative">
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div className="text-slate-300 flex flex-col items-center">
                                    <i className="fas fa-circle-notch fa-spin text-3xl mb-3"></i>
                                    <span className="font-bold text-sm">설정 모듈을 불러오는 중입니다...</span>
                                </div>
                            </div>
                            <iframe src="settings.html?mode=iframe" className="absolute inset-0 w-full h-full border-0 bg-white relative z-10" title="Settings Center"></iframe>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ Main App Container
        // ==========================================
        function App() {
            const config = useMerchConfig();
            
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            
            // 🌟 v3.0 추가: 설정 모달 상태
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            
            const [masterProducts, setMasterProducts] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);
            
            const [cart, setCart] = useState([]);
            const [searchKw, setSearchKw] = useState('');
            const [vendorInput, setVendorInput] = useState('');
            const [dateInput, setDateInput] = useState(() => new Date().toISOString().slice(0,10));

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!path || path === '#' || !isReady) return showToast("⚠️ 해당 페이지는 현재 준비 중이거나 경로가 올바르지 않습니다.");
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) { showToast(`💡 이동 시뮬레이션: [${path}]`); }
            }, [showToast]);

            const loadData = async () => {
                const mDB = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                setMasterProducts(mDB);
                const hDB = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                setHistoryLogs(hDB);
            };

            useEffect(() => { loadData(); }, []);

            useEffect(() => {
                const handleStorageChange = (e) => { if (e.key === STORAGE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorageChange);
                
                // 🌟 Iframe 메시지 수신 (설정창 닫힘 감지)
                const handleMessage = (e) => {
                    if (e.data && e.data.type === 'CLOSE_SETTINGS') {
                        setShowSettingsModal(false);
                        loadData(); 
                    }
                };
                window.addEventListener('message', handleMessage);

                return () => {
                    window.removeEventListener('storage', handleStorageChange);
                    window.removeEventListener('message', handleMessage);
                };
            }, []);

            // 품목코드순 정렬이 적용된 검색 결과 로직
            const searchResults = useMemo(() => {
                const arr = Object.values(masterProducts);
                const sortFn = (a, b) => String(a.코드 || '').localeCompare(String(b.코드 || ''), undefined, { numeric: true, sensitivity: 'base' });
                
                if (!searchKw.trim()) {
                    return arr.sort(sortFn).slice(0, 50);
                }
                const kw = searchKw.toLowerCase().replace(/\s+/g, '');
                return arr.filter(item => {
                    const str = ((item['코드']||'') + (item['품목명']||'') + (item['규격']||'')).toLowerCase().replace(/\s+/g, '');
                    return str.includes(kw);
                }).sort(sortFn).slice(0, 50);
            }, [masterProducts, searchKw]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsProcessing(true); setProcessMsg('매입 엑셀 분석 중...');
                try {
                    const excelData = await parseExcelRobust(file);
                    if (excelData.length === 0) throw new Error("데이터가 없습니다.");
                    
                    let newCartItems = [];
                    excelData.forEach(row => {
                        const findKey = (mappingString) => {
                            if (!mappingString) return null;
                            const keys = mappingString.split(',').map(k => k.trim());
                            const rowKeys = Object.keys(row);
                            for (const key of keys) {
                                const matched = rowKeys.find(rk => rk.toLowerCase().replace(/\s/g, '') === key.toLowerCase().replace(/\s/g, ''));
                                if (matched) return matched;
                            }
                            return null;
                        };

                        const codeKey = findKey(config.opsMappings.code) || '품목코드';
                        const code = row[codeKey] || row['코드'] || row['상품코드'];
                        if (!code) return;
                        
                        const qtyKey = findKey(config.opsMappings.qty) || '수량';
                        const priceKey = findKey(config.opsMappings.price) || '단가';
                        const vendorKey = findKey(config.opsMappings.vendor) || findKey(config.opsMappings.matchVendor) || '거래처명';
                        
                        const qty = parseNum(row[qtyKey] || row['입고수량'] || row['구매수량']);
                        const price = parseNum(row[priceKey] || row['입고가'] || row['매입단가'] || row['매입가']);
                        const vendorVal = row[vendorKey] || '';
                        
                        newCartItems.push({
                            코드: code,
                            품목명: row['품목명'] || row['상품명'] || masterProducts[code]?.품목명 || '알 수 없음',
                            규격: row['규격'] || masterProducts[code]?.규격 || '',
                            단가: price || parseNum(masterProducts[code]?.입고가) || 0,
                            수량: qty,
                            vendor: vendorVal
                        });
                    });

                    setCart(prevCart => {
                        const merged = [...prevCart];
                        newCartItems.forEach(newItem => {
                            const existing = merged.find(c => c.코드 === newItem.코드);
                            if (existing) {
                                existing.수량 += newItem.수량;
                                if(newItem.단가 > 0) existing.단가 = newItem.단가; // 엑셀의 최신 단가 우선
                            } else {
                                merged.push(newItem);
                            }
                        });
                        return merged;
                    });
                    
                    showToast(`✅ ${newCartItems.length}건의 매입/반출 내역이 큐에 추가되었습니다.`);
                } catch(error) { 
                    showToast("❌ 업로드 오류: " + error.message); 
                } finally { 
                    e.target.value = ''; setIsProcessing(false); setProcessMsg(''); 
                }
            };

            const addToCart = (item) => {
                if (cart.find(c => c.코드 === item.코드)) return showToast('⚠️ 이미 추가된 항목입니다.');
                setCart([{
                    코드: item.코드,
                    품목명: item.품목명,
                    규격: item.규격,
                    단가: parseNum(item.입고가) || 0,
                    수량: 0,
                    vendor: ''
                }, ...cart]);
            };

            const updateCartItem = (code, field, value) => {
                setCart(cart.map(c => {
                    if (c.코드 === code) {
                        const val = field === 'vendor' ? value : (value === '' ? '' : parseNum(value));
                        return { ...c, [field]: val };
                    }
                    return c;
                }));
            };

            const removeFromCart = (code) => {
                setCart(cart.filter(c => c.코드 !== code));
            };

            const handleCommitPurchases = async () => {
                const validItems = cart.filter(c => c.수량 !== 0 && c.수량 !== '');
                if (validItems.length === 0) return showToast("⚠️ 수량이 입력된 항목이 없습니다.");
                
                // 개별 벤더 확인 (모두 비어있으면 상단 글로벌 벤더 요구)
                const hasAnyVendor = validItems.some(c => c.vendor?.trim() !== '');
                if (!hasAnyVendor && !vendorInput.trim()) {
                    return showToast("⚠️ 공통 매입처 또는 개별 매입처를 입력해주세요.");
                }

                setIsProcessing(true);
                
                try {
                    let newMaster = { ...masterProducts };
                    let newLogs = [];
                    const nowStr = new Date().toLocaleString('ko-KR');
                    
                    const existingHistory = await getIDB(STORAGE_KEYS.HISTORY_DB) || [];
                    const priceMode = config.opsGrouping?.priceMode || 'separate';

                    validItems.forEach(item => {
                        const code = item.코드;
                        const qty = item.수량;
                        const price = item.단가;
                        const itemVendor = (item.vendor || '').trim() || vendorInput.trim() || '미지정';
                        
                        const isReturn = qty < 0;
                        const eventType = isReturn ? 'PURCHASE_RETURN' : 'PURCHASE';
                        
                        if (!isReturn && newMaster[code]) {
                            const oldQty = parseNum(newMaster[code].재고수량 || 0);
                            const oldPrice = parseNum(newMaster[code].입고가 || 0);

                            if (priceMode === 'average' && (oldQty + qty) > 0) {
                                const avgPrice = ((oldQty * oldPrice) + (qty * price)) / (oldQty + qty);
                                newMaster[code] = { ...newMaster[code], 입고가: Math.round(avgPrice) };
                            } else {
                                // latest or separate: 마스터는 최신 단가로 업데이트
                                newMaster[code] = { ...newMaster[code], 입고가: price };
                            }
                        }

                        newLogs.push({
                            id: `PUR-${Date.now()}-${generateUUID().slice(0,8)}`,
                            timestamp: nowStr,
                            date: dateInput,
                            type: eventType,
                            code: code,
                            name: item.품목명,
                            qty: qty, 
                            price: price,
                            vendor: itemVendor,
                            totalAmount: qty * price
                        });
                    });

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.HISTORY_DB, [...existingHistory, ...newLogs]);
                    
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    
                    setMasterProducts(newMaster);
                    setHistoryLogs([...existingHistory, ...newLogs]);
                    setCart([]);
                    
                    showToast(`✅ ${validItems.length}건의 매입/반출 전표가 확정되었습니다.`);
                } catch(err) {
                    console.error(err);
                    showToast("❌ 전표 확정 중 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const totalAmount = cart.reduce((sum, item) => sum + (parseNum(item.수량) * parseNum(item.단가)), 0);

            const todayLogs = useMemo(() => {
                return historyLogs
                    .filter(log => (log.type === 'PURCHASE' || log.type === 'PURCHASE_RETURN') && log.date === dateInput)
                    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            }, [historyLogs, dateInput]);

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => { showToast("✅ 클라우드 저장 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => { showToast("✅ 데이터 수신 완료"); setIsProcessing(false); setProcessMsg(""); }, 1000);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-[#f1f5f9] relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="purchases" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettingsModal(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate}
                    />

                    <main className="flex-1 flex overflow-hidden bg-slate-50">
                        {/* Left: Master Search */}
                        <div className="w-1/3 min-w-[320px] max-w-[400px] bg-white border-r border-slate-200 flex flex-col z-10 shadow-[2px_0_10px_rgba(0,0,0,0.02)]">
                            <div className="p-4 bg-[#f8fafc] border-b border-slate-200 shrink-0">
                                <div className="flex items-center justify-between mb-3">
                                    <h2 className="text-[13px] font-black text-slate-800"><SafeIcon name="search" size={14} className="text-indigo-500 mr-2"/>마스터 상품 검색</h2>
                                    <label className="cursor-pointer px-3 py-1.5 rounded text-[11px] font-bold transition-all flex items-center justify-center bg-white text-emerald-600 shadow-sm hover:bg-emerald-50 border border-emerald-200" title="엑셀 매입장을 업로드합니다.">
                                        <SafeIcon name="file-excel" size={12} className="mr-1.5" /> 엑셀 업로드
                                        <input type="file" className="hidden" multiple onChange={handleFileUpload} accept=".xlsx, .xls, .csv" disabled={isProcessing} />
                                    </label>
                                </div>
                                <div className="relative">
                                    <input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="품명, 규격, 코드 검색..." className="w-full pl-9 pr-3 py-2 bg-white border border-slate-300 rounded-lg text-[12px] font-medium outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200 transition-shadow shadow-sm" />
                                    <SafeIcon name="search" size={14} className="absolute left-3 top-2.5 text-slate-400" />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                                {searchResults.length === 0 ? (
                                    <div className="py-10 text-center text-[12px] text-slate-400 font-bold">검색 결과가 없습니다.</div>
                                ) : searchResults.map(item => (
                                    <div key={item.코드} onClick={() => addToCart(item)} className="p-3 bg-white border border-slate-100 rounded-lg hover:border-indigo-300 hover:bg-indigo-50/50 cursor-pointer flex justify-between items-center group transition-all">
                                        <div className="flex flex-col min-w-0 pr-2">
                                            <span className="text-[10px] font-mono text-slate-400 mb-0.5">{item.코드}</span>
                                            <span className="text-[13px] font-bold text-slate-800 truncate group-hover:text-indigo-700">{item.품목명} <span className="text-[11px] text-slate-400 font-normal">({item.규격})</span></span>
                                        </div>
                                        <button className="w-6 h-6 rounded bg-slate-50 text-slate-400 group-hover:bg-indigo-600 group-hover:text-white flex items-center justify-center transition-all shrink-0">
                                            <SafeIcon name="plus" size={12} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Right: Work Queue */}
                        <div className="flex-1 flex flex-col bg-[#f1f5f9] overflow-hidden relative p-6">
                            <div className="px-5 py-3 mb-4 bg-white border border-slate-200 rounded-xl shrink-0 flex justify-between items-center z-10 shadow-sm">
                                <div>
                                    <h1 className="text-[15px] font-black text-slate-800 flex items-center"><SafeIcon name="credit-card" size={18} className="mr-2 text-indigo-500" />매입 및 반출 전표 작성</h1>
                                    <p className="text-[11px] text-slate-500 font-medium mt-1">수량을 마이너스(-)로 입력 시 <strong>'매입처 반출(환불)'</strong>로 처리되어 원가 훼손 없이 재고만 차감됩니다.</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="flex items-center gap-2">
                                        <label className="text-[12px] font-bold text-slate-600">일자</label>
                                        <input type="date" value={dateInput} onChange={e=>setDateInput(e.target.value)} className="border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm" />
                                    </div>
                                    <div className="w-px h-5 bg-slate-200 mx-1"></div>
                                    <div className="flex items-center gap-2">
                                        <label className="text-[12px] font-bold text-slate-600">공통 매입처</label>
                                        <input type="text" value={vendorInput} onChange={e=>setVendorInput(e.target.value)} placeholder="일괄 적용 시 입력" className="w-36 border border-slate-300 rounded-lg px-3 py-1.5 text-[12px] font-bold outline-none focus:border-indigo-500 shadow-sm" />
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-6 flex-1 flex flex-col">
                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left text-[13px] whitespace-nowrap">
                                        <thead className="text-[12px] font-bold text-slate-500 bg-white">
                                            <tr>
                                                <th className="sticky top-0 z-40 bg-white px-4 py-3.5 border-b border-r border-slate-200 shadow-sm w-12 text-center">No</th>
                                                <th className="sticky top-0 z-40 bg-white px-4 py-3.5 border-b border-r border-slate-200 shadow-sm">상품명 (규격)</th>
                                                <th className="sticky top-0 z-30 bg-white px-4 py-3.5 border-b border-r border-slate-200 shadow-sm w-36">매입처/로트</th>
                                                <th className="sticky top-0 z-30 bg-indigo-50/50 px-4 py-3.5 border-b border-r border-indigo-100 shadow-sm text-center w-28 text-indigo-700">매입 수량</th>
                                                <th className="sticky top-0 z-30 bg-white px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-right w-28">매입 단가</th>
                                                <th className="sticky top-0 z-30 bg-white px-4 py-3.5 border-b border-r border-slate-200 shadow-sm text-right w-32">공급가액</th>
                                                <th className="sticky top-0 z-30 bg-white px-3 py-3.5 border-b border-slate-200 shadow-sm w-12 text-center">삭제</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-transparent text-slate-700">
                                            {cart.length === 0 ? (
                                                <tr><td colSpan="7" className="p-16 text-center text-slate-400 font-bold"><SafeIcon name="package-search" size={40} className="mb-3 text-slate-200 block mx-auto" />좌측에서 매입/반출할 상품을 검색해 담아주세요.</td></tr>
                                            ) : cart.map((item, idx) => {
                                                const amt = parseNum(item.수량) * parseNum(item.단가);
                                                const isReturn = parseNum(item.수량) < 0;
                                                return (
                                                    <tr key={item.코드} className={`table-row-hover transition-colors ${isReturn ? 'bg-rose-50/30' : ''}`}>
                                                        <td className="py-3 px-4 text-center text-slate-400 font-bold text-[11px] border-r border-slate-200 bg-white">{idx + 1}</td>
                                                        <td className="py-3 px-4 border-r border-slate-200 bg-white">
                                                            <div className="flex flex-col w-full overflow-hidden">
                                                                <span className="text-[10.5px] font-mono text-indigo-500 mb-0.5 tracking-tight font-bold">{item.코드}</span>
                                                                <div className="flex items-baseline w-full min-w-0 overflow-hidden mt-0.5">
                                                                    <span className="text-[13px] font-extrabold truncate text-slate-800" title={item.품목명}>{item.품목명}</span>
                                                                    {item.규격 && <span className="text-[11.5px] font-medium text-slate-400 truncate ml-1.5 shrink-0 max-w-[40%]">({item.규격})</span>}
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="py-2.5 px-3 border-r border-slate-200 bg-inherit">
                                                            <input type="text" value={item.vendor || ''} onChange={e=>updateCartItem(item.코드, 'vendor', e.target.value)} placeholder="공통 매입처" className={`w-full border rounded-lg px-2 py-1.5 text-[12px] font-bold outline-none shadow-sm transition-colors ${item.vendor ? 'border-indigo-300 text-indigo-700 bg-indigo-50/30' : 'border-slate-300 text-slate-600 bg-white focus:border-slate-500'}`} />
                                                        </td>
                                                        <td className="py-2 px-3 border-r border-slate-200 bg-inherit">
                                                            <div className="relative">
                                                                <input type="number" value={item.수량} onChange={e=>updateCartItem(item.코드, '수량', e.target.value)} onClick={e=>e.target.select()} placeholder="0" className={`w-full bg-transparent hover:bg-white focus:bg-white border focus:ring-1 rounded px-2 py-1.5 text-center text-[13px] font-black outline-none transition-colors ${isReturn ? 'border-rose-300 text-rose-600 focus:border-rose-500 focus:ring-rose-200' : 'border-transparent hover:border-slate-300 text-indigo-700 focus:border-indigo-400 focus:ring-indigo-200'}`} />
                                                                {isReturn && <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] px-1.5 rounded-full font-bold shadow-sm">반출</span>}
                                                            </div>
                                                        </td>
                                                        <td className="py-2 px-3 border-r border-slate-200 bg-inherit">
                                                            <input type="number" value={item.단가} onChange={e=>updateCartItem(item.코드, '단가', e.target.value)} onClick={e=>e.target.select()} placeholder="0" className="w-full bg-transparent hover:bg-white focus:bg-white border border-transparent hover:border-slate-300 focus:border-slate-400 rounded px-2 py-1.5 text-right text-[13px] font-bold outline-none transition-colors" />
                                                        </td>
                                                        <td className={`py-3 px-4 text-right font-black border-r border-slate-200 bg-inherit ${isReturn ? 'text-rose-600' : 'text-slate-800'}`}>
                                                            {amt.toLocaleString()}
                                                        </td>
                                                        <td className="py-3 px-3 text-center bg-white">
                                                            <button onClick={() => removeFromCart(item.코드)} className="text-slate-300 hover:text-rose-500 transition-colors"><SafeIcon name="x" size={14}/></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            {cart.length > 0 && (
                                <div className="bg-[#0B1021] rounded-xl p-5 shadow-lg flex justify-between items-center text-white mb-6 shrink-0 fade-in">
                                    <div>
                                        <div className="text-[12px] font-bold text-slate-400 mb-1">매입/반출 총합계</div>
                                        <div className="text-2xl font-black">{totalAmount.toLocaleString()} <span className="text-sm font-bold text-slate-400">원</span></div>
                                    </div>
                                    <button onClick={handleCommitPurchases} disabled={isProcessing} className="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-black text-[14px] shadow-[0_0_15px_rgba(79,70,229,0.4)] transition-all transform hover:-translate-y-0.5 flex items-center border border-indigo-500">
                                        <SafeIcon name="check-circle-2" size={16} className="mr-2" /> 전표 확정 및 재고 반영
                                    </button>
                                </div>
                            )}

                            {/* Today's Log */}
                            <div className="shrink-0 max-h-[30%] flex flex-col">
                                <h3 className="text-[13px] font-black text-slate-800 mb-2 flex items-center"><SafeIcon name="history" size={14} className="text-slate-400 mr-2"/>당일 처리 내역 요약</h3>
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex-1 flex flex-col">
                                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                                        <table className="w-full text-left text-[12px] whitespace-nowrap">
                                            <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold sticky top-0">
                                                <tr>
                                                    <th className="py-2 px-4 w-16 text-center">유형</th>
                                                    <th className="py-2 px-4 w-20">시간</th>
                                                    <th className="py-2 px-4 w-32">매입처(로트)</th>
                                                    <th className="py-2 px-4">품목명</th>
                                                    <th className="py-2 px-4 text-right w-20">수량</th>
                                                    <th className="py-2 px-4 text-right w-24">단가</th>
                                                    <th className="py-2 px-4 text-right w-24">합계</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {todayLogs.length === 0 ? (
                                                    <tr><td colSpan="7" className="p-6 text-center text-slate-400 font-bold">기록된 전표가 없습니다.</td></tr>
                                                ) : todayLogs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50">
                                                        <td className="py-1.5 px-4 text-center">
                                                            {log.type === 'PURCHASE' ? <span className="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] font-black">매입</span> : <span className="bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded text-[10px] font-black">반출</span>}
                                                        </td>
                                                        <td className="py-1.5 px-4 text-slate-400 font-mono text-[10px]">{log.timestamp.split(' ')[1]}</td>
                                                        <td className="py-1.5 px-4 font-bold text-slate-600"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">{log.vendor || '-'}</span></td>
                                                        <td className="py-1.5 px-4 font-bold text-slate-800">{log.name}</td>
                                                        <td className={`py-1.5 px-4 text-right font-black ${log.type === 'PURCHASE' ? 'text-blue-600' : 'text-rose-600'}`}>{log.qty}</td>
                                                        <td className="py-1.5 px-4 text-right text-slate-500">{log.price?.toLocaleString()}</td>
                                                        <td className="py-1.5 px-4 text-right font-bold text-slate-700">{log.totalAmount?.toLocaleString()}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 🌟 Iframe Overlay 로 설정 모달 표시 */}
                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    
                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                            <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
