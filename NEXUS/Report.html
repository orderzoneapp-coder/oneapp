<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Insight & Report [v2.0]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f1f5f9; margin: 0;}
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef, Fragment } = React;

        // ==========================================
        // 🔑 Global Storage Keys & Config Constants
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            SYNC_TRIGGER: 'merchMaster_sync_trigger',
            HISTORY_DB: 'merchHistory_v870'
        };

        const MASTER_HEADERS = [
            "창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", 
            "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", 
            "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", 
            "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", 
            "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"
        ];

        const NUMERIC_HEADERS = [
            "안전재고", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고",
            "단가H", "단가I", "시중가", "행사가", "1종연산", "2종연산", "외주비", "노무비", "경비",
            "1구매", "1출고", "2구매", "2출고", "1입고", "2입고"
        ];

        const getInitialVisibleMasterCols = () => ({ estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] });
        const getInitialVisibleUploadCols = () => ({ estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] });
        
        const getInitialMappings = () => {
            const base = { master: {}, estimate: {} };
            base.master = { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' };
            base.estimate = { 
                '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', 
                '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가',
                '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고'
            };
            return base;
        };
        
        const getInitialMasterLinks = () => {
            const base = { master: {}, estimate: {} };
            base.estimate = { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' };
            return base;
        };

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);

        // IndexedDB Wrapper
        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        // ==========================================
        // 🛠 SafeIcon
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'bar-chart-3' ? 'bar-chart' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs',
                    'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open', 'file-spreadsheet': 'fa-table', 
                    'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes', 'bar-chart-3': 'fa-chart-bar', 
                    'database': 'fa-database', 'sliders-horizontal': 'fa-sliders-h', 'check-circle-2': 'fa-check-circle',
                    'x': 'fa-times', 'pie-chart': 'fa-chart-pie', 'shopping-cart': 'fa-shopping-cart', 'users': 'fa-users', 'megaphone': 'fa-bullhorn',
                    'book-open': 'fa-address-book', 'shopping-bag': 'fa-shopping-bag', 'credit-card': 'fa-credit-card', 'line-chart': 'fa-chart-line', 'printer': 'fa-print',
                    'desktop': 'fa-desktop', 'sign-in-alt': 'fa-sign-in-alt', 'calculator': 'fa-calculator', 'tags': 'fa-tags', 'link': 'fa-link', 'broom': 'fa-broom', 'info-circle': 'fa-info-circle', 'lock': 'fa-lock', 'key': 'fa-key', 'folder-open': 'fa-folder-open', 'file-invoice': 'fa-file-invoice', 'trash-alt': 'fa-trash-alt'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 Hooks (Global Setting Manager)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleMasterCols(); 
            });
            
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialVisibleUploadCols(); 
            });
            
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.master ? p : getInitialMappings(); 
            });
            
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                const p = s ? JSON.parse(s) : null; 
                return p?.estimate ? p : getInitialMasterLinks(); 
            });
            
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                const def = [ 
                    { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' }, 
                    { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' }, 
                    { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' } 
                ];
                if (s) { try { const p = JSON.parse(s); if (p?.length > 0) return p.map(r => ({ ...r, whCode: r.whCode || '*', unit: r.unit || '*' })); } catch(e){} }
                return def;
            });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEYS.CLOUD_URL, cloudUrl); 
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols)); 
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings)); 
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks)); 
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
            }, [cloudUrl, visibleMasterCols, visibleUploadCols, mappings, masterLinks, marginRules]);
            
            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules };
        };

        // ==========================================
        // 🧩 Components: Global Header (통합 UI)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'dashboard.html', group: 'common', isReady: true },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'guide.html', group: 'common', isReady: true },
                
                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'item_master.html', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'items.html', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'index.html', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'parser.html', group: 'master', isReady: true },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: true },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'report.html', group: 'admin', isReady: true },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: true }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, '/NEXUS/Dashboard'); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">INSIGHT ENGINE</span>
                                </div>
                            </div>

                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "클라우드 동기화 켜짐 (가동중)"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`현재 브라우저 메모리에 다운로드된 마스터 상품 수: ${itemCount.toLocaleString()}개`}>
                                    <i className="fas fa-database text-[10px] text-slate-500"></i>
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount.toLocaleString()}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="설정"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                       className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                       ${isActive 
                                           ? 'bg-slate-50 text-indigo-700 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]' 
                                           : isPlaceholder 
                                              ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5' 
                                              : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1E293B] hover:text-slate-200 pb-2.5'
                                       }`}
                                       style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                            {tabs.filter(t => t.group === selectedGroup).length === 0 && (
                                <div className="px-5 py-2.5 text-[13px] font-bold text-slate-500 pb-4">이 그룹에 할당된 메뉴가 없습니다.</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🧩 Mapping Center Modal (Global Setting Center)
        // ==========================================
        const MappingCenterModal = ({ onClose, config, actions, availableCatalogs, availableCategories }) => {
            const { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules } = config;
            const { cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB } = actions;
            const [activeTab, setActiveTab] = useState('display');
            const [customEstColInput, setCustomEstColInput] = useState('');

                    <div className="space-y-6">
                        {Object.entries(data.categories || {}).map(([catName, catData]) => (
                            <div key={catName} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                <div className="bg-slate-800 text-white px-4 py-2 font-bold text-[13px] flex justify-between">
                                    <span>{catName}</span>
                                    <span className="text-slate-300 text-[11px]">{catData.items.length}건</span>
                                </div>
                                {catData.comment && (
                                    <div className="p-3 bg-indigo-50 border-b border-indigo-100 text-[12px] text-indigo-800 font-medium whitespace-pre-line">
                                        <i className="fas fa-comment-dots mr-1.5 opacity-50"></i>{catData.comment}
                                    </div>
                                )}
                                <div className="divide-y divide-slate-100 bg-white">
                                    {catData.items.map(item => (
                                        <div key={item.id} className="p-3 flex justify-between items-center">
                                            <div className="flex flex-col min-w-0">
                                                <span className="text-[13px] font-bold text-slate-800 truncate">{item.name}</span>
                                                <span className="text-[10px] text-slate-400 mt-0.5">{item.spec}</span>
                                            </div>
                                            <div className="flex items-center gap-2 shrink-0">
                                                <span className="text-[11px] text-slate-400 line-through decoration-slate-300 font-mono">{item.oldVal?.toLocaleString()}</span>
                                                <span className="text-[13px] font-black text-rose-600 font-mono">{item.newVal?.toLocaleString()}원</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-8 text-center text-[10px] text-slate-400">
                        본 시황 안내는 ONEAPP MerchOps 시스템에서 발행되었습니다.
                    </div>
                </div>
            );
        };

        // ==========================================
        // 📊 관리자 대시보드 컴포넌트
        // ==========================================
        const App = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isCustomerMode = urlParams.get('mode') === 'customer';

            const config = useMerchConfig();

            const [activeMenu, setActiveMenu] = useState('dashboard');
            const [masterProducts, setMasterProducts] = useState({});
            const [historyLogs, setHistoryLogs] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [toastMsg, setToastMsg] = useState("");
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [showSettings, setShowSettings] = useState(false);

            const [publishedReport, setPublishedReport] = useState(null);
            
            const [editorDraft, setEditorDraft] = useState(() => {
                try {
                    const saved = localStorage.getItem('merchReportDraft_v1');
                    return saved ? JSON.parse(saved) : { title: '[Orderz] 시황 변동 안내', greeting: '최근 수입 원자재 및 부자재의 매입 원가가 전반적으로 크게 상승하였습니다.\n안정적인 상품 공급을 위해 부득이하게 일부 품목의 출고가를 조정하게 되었습니다. 고객님들의 너른 양해 부탁드립니다.', categories: {} };
                } catch(e) { return { title: '', greeting: '', categories: {} }; }
            });

            const [isPreviewOpen, setIsPreviewOpen] = useState(false);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); }, []);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const mData = JSON.parse(localStorage.getItem('merchMaster_v870') || '{}');
                        setMasterProducts(mData);
                        
                        const hData = JSON.parse(localStorage.getItem('merchHistory_v870') || '[]');
                        setHistoryLogs(hData);

                        const pData = JSON.parse(localStorage.getItem('merchCustomerReport_v1'));
                        if (pData) setPublishedReport(pData);
                    } catch (error) { 
                        console.error(error); 
                    } finally { 
                        setIsLoading(false); 
                    }
                };
                loadData();
            }, []);

            useEffect(() => {
                if (!isLoading && !isCustomerMode) localStorage.setItem('merchReportDraft_v1', JSON.stringify(editorDraft));
            }, [editorDraft, isLoading, isCustomerMode]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록'];
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    setMasterProducts(newMaster);
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                    showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다.`);
                }
            }, [masterProducts, showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                setMasterProducts(newMaster);
                setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [masterProducts, showToast]);

            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                setMasterProducts({});
                await setIDB(STORAGE_KEYS.MASTER_DB, {});
                localStorage.setItem('merchMaster_sync_trigger', Date.now().toString());
                showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다.");
            };

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const insights = useMemo(() => {
                const marginRisks = Object.values(masterProducts).filter(item => {
                    const inP = parseNum(item['입고가']); const outP = parseNum(item['출고가']);
                    if (inP <= 0 || outP <= 0) return false;
                    const margin = ((outP - inP) / outP) * 100;
                    item._margin = margin;
                    return margin < 15;
                }).sort((a, b) => a._margin - b._margin).slice(0, 30);

                const priceChanges = historyLogs.filter(log => log.field === '입고가' || log.field === '입고').reduce((acc, log) => {
                    if (!acc[log.code] || new Date(log.timestamp) > new Date(acc[log.code].timestamp)) {
                        acc[log.code] = log; 
                    }
                    return acc;
                }, {});

                const volatilityList = Object.values(priceChanges)
                    .filter(log => Math.abs(log.diff) > 0)
                    .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))
                    .slice(0, 15);

                const upCount = Object.values(priceChanges).filter(log => log.diff > 0).length;
                const downCount = Object.values(priceChanges).filter(log => log.diff < 0).length;

                return { marginRisks, volatilityList, changeStats: { total: Object.keys(priceChanges).length, up: upCount, down: downCount } };
            }, [masterProducts, historyLogs]);

            const categoryHierarchy = useMemo(() => {
                const hierarchy = {};
                Object.values(masterProducts).forEach(item => {
                    let c1Name = item['1그룹명']; let c2Name = item['2그룹명']; let c3Name = item['3그룹명'] || (item['카탈로그'] ? item['카탈로그'].split(',')[0].trim() : '');
                    const pCode = String(item['품목코드'] || item['코드'] || '');
                    let c1Code = String(item['1코드'] || (pCode.length >= 2 ? pCode.substring(0, 2) : ''));
                    let c2Code = String(item['2코드'] || (pCode.length >= 4 ? pCode.substring(0, 4) : ''));
                    let c3Code = String(item['오더즈'] || item['3코드'] || (pCode.length >= 6 ? pCode.substring(0, 6) : ''));

                    if (!c1Name || !c1Code) { c1Name = '기타'; c1Code = 'ZZZ99_기타'; }
                    if (!c2Name || !c2Code) { c2Name = '기타'; c2Code = 'ZZZ9999_기타'; }
                    if (!c3Name || !c3Code) { c3Name = '기타'; c3Code = 'ZZZ999999_기타'; }

                    if (!hierarchy[c1Code]) hierarchy[c1Code] = { name: c1Name, code: c1Code, sub: {} };
                    if (!hierarchy[c1Code].sub[c2Code]) hierarchy[c1Code].sub[c2Code] = { name: c2Name, code: c2Code, sub: {} };
                    if (!hierarchy[c1Code].sub[c2Code].sub[c3Code]) {
                        hierarchy[c1Code].sub[c2Code].sub[c3Code] = { name: c3Name, code: c3Code, items: [], totalItems: 0, marginSum: 0, validMarginCount: 0, upCount: 0, downCount: 0 };
                    }
                    const c = hierarchy[c1Code].sub[c2Code].sub[c3Code];
                    c.items.push(item); c.totalItems++;

                    const inP = parseNum(item['입고가']); const outP = parseNum(item['출고가']);
                    if (inP > 0 && outP > 0) { c.marginSum += ((outP - inP) / outP) * 100; c.validMarginCount++; }
                });

                const priceChanges = historyLogs.reduce((acc, log) => {
                    if (!acc[log.code] || new Date(log.timestamp) > new Date(acc[log.code].timestamp)) acc[log.code] = log;
                    return acc;
                }, {});

                Object.values(priceChanges).forEach(log => {
                    const mItem = masterProducts[log.code];
                    if (mItem) {
                        let c1Code = String(mItem['1코드'] || (log.code.length >= 2 ? log.code.substring(0, 2) : 'ZZZ99_기타'));
                        let c2Code = String(mItem['2코드'] || (log.code.length >= 4 ? log.code.substring(0, 4) : 'ZZZ9999_기타'));
                        let c3Code = String(mItem['오더즈'] || mItem['3코드'] || (log.code.length >= 6 ? log.code.substring(0, 6) : 'ZZZ999999_기타'));
                        if (!mItem['1그룹명']) c1Code = 'ZZZ99_기타'; if (!mItem['2그룹명']) c2Code = 'ZZZ9999_기타'; if (!mItem['3그룹명'] && !mItem['카탈로그']) c3Code = 'ZZZ999999_기타';
                        
                        if (hierarchy[c1Code]?.sub[c2Code]?.sub[c3Code]) {
                            const c = hierarchy[c1Code].sub[c2Code].sub[c3Code];
                            if (log.diff > 0) c.upCount++; if (log.diff < 0) c.downCount++;
                        }
                    }
                });

                Object.keys(hierarchy).forEach(c1 => { Object.keys(hierarchy[c1].sub).forEach(c2 => { Object.keys(hierarchy[c1].sub[c2].sub).forEach(c3 => {
                    const c = hierarchy[c1].sub[c2].sub[c3]; c.avgMargin = c.validMarginCount > 0 ? (c.marginSum / c.validMarginCount) : 0;
                });});});
                return hierarchy;
            }, [masterProducts, historyLogs]);

            const [activeC1, setActiveC1] = useState(null);
            const [activeC2, setActiveC2] = useState(null);
            const [activeC3, setActiveC3] = useState(null);

            const c1List = useMemo(() => Object.values(categoryHierarchy).sort((a,b) => a.code.localeCompare(b.code)), [categoryHierarchy]);
            useEffect(() => { if (c1List.length > 0 && !c1List.find(c => c.code === activeC1)) setActiveC1(c1List[0].code); }, [c1List, activeC1]);
            const c2List = useMemo(() => activeC1 && categoryHierarchy[activeC1] ? Object.values(categoryHierarchy[activeC1].sub).sort((a,b) => a.code.localeCompare(b.code)) : [], [categoryHierarchy, activeC1]);
            useEffect(() => { if (c2List.length > 0 && !c2List.find(c => c.code === activeC2)) setActiveC2(c2List[0].code); else if (c2List.length === 0) setActiveC2(null); }, [c2List, activeC1, activeC2]);
            const c3List = useMemo(() => activeC1 && activeC2 && categoryHierarchy[activeC1]?.sub[activeC2] ? Object.values(categoryHierarchy[activeC1].sub[activeC2].sub).sort((a,b) => a.code.localeCompare(b.code)) : [], [categoryHierarchy, activeC1, activeC2]);
            useEffect(() => { if (c3List.length > 0 && !c3List.find(c => c.code === activeC3)) setActiveC3(c3List[0].code); else if (c3List.length === 0) setActiveC3(null); }, [c3List, activeC1, activeC2, activeC3]);

            const handleLoadRecentChanges = () => {
                if(insights.changeStats.total === 0) return showToast("⚠️ 최근 변동된 히스토리 내역이 없습니다.");
                const newCats = {};
                historyLogs.forEach(log => {
                    if ((log.field === '입고가' || log.field === '입고') && Math.abs(log.diff) > 0) {
                        const catName = log.catalog || '기타 카탈로그';
                        if (!newCats[catName]) newCats[catName] = { comment: '', items: [] };
                        const existingIdx = newCats[catName].items.findIndex(i => i.code === log.code);
                        if (existingIdx === -1) newCats[catName].items.push(log);
                        else if (new Date(log.timestamp) > new Date(newCats[catName].items[existingIdx].timestamp)) newCats[catName].items[existingIdx] = log;
                    }
                });
                Object.keys(newCats).forEach(k => { newCats[k].items.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff)); });
                setEditorDraft(prev => ({ ...prev, categories: newCats }));
                showToast(`✅ 최근 변경된 ${insights.changeStats.total}건의 내역을 불러왔습니다.`);
            };

            const handlePublish = () => {
                const cleanData = { ...editorDraft, publishDate: new Date().toLocaleDateString('ko-KR') };
                for (const cat in cleanData.categories) if (cleanData.categories[cat].items.length === 0) delete cleanData.categories[cat];
                localStorage.setItem('merchCustomerReport_v1', JSON.stringify(cleanData));
                setPublishedReport(cleanData);
                showToast("🚀 고객용 웹페이지에 성공적으로 적용(발행)되었습니다!");
            };

            const handleCopyLink = () => {
                const url = window.location.href.split('?')[0] + '?mode=customer';
                const textArea = document.createElement("textarea");
                textArea.value = url; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); showToast("✅ 고객용 링크가 복사되었습니다!"); } catch (err) { showToast("❌ 복사 실패"); }
                document.body.removeChild(textArea);
            };

            const handleDownloadImage = async () => {
                const captureEl = document.getElementById('customer-report-capture-area');
                if (!captureEl) return showToast("⚠️ 이미지를 생성할 영역을 찾을 수 없습니다.");
                showToast("⏳ 이미지를 생성 중입니다...");
                try {
                    const canvas = await html2canvas(captureEl, { scale: 2, useCORS: true, backgroundColor: '#f8fafc' });
                    const link = document.createElement('a'); link.download = `시황안내장_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click(); showToast("✅ 이미지 다운로드가 완료되었습니다!");
                } catch (e) { showToast("❌ 이미지 생성 중 오류가 발생했습니다."); }
            };

            // 💡 안전한 라우팅 핸들러
            const handleNavigate = useCallback((e, path) => {
                if (e && e.preventDefault) e.preventDefault();
                
                if (path === '#') {
                    showToast('⚠️ 준비 중인 기능입니다.');
                    return;
                }

                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => {
                    showToast("✅ 클라우드 저장 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => {
                    showToast("✅ 데이터 수신 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            if (isCustomerMode) return isLoading ? <div className="h-screen flex items-center justify-center text-slate-500 font-bold">로딩중...</div> : <CustomerReportView data={publishedReport} />;
            if (isLoading) return <div className="h-screen flex items-center justify-center text-indigo-500 font-bold"><i className="fas fa-circle-notch fa-spin mr-2"></i>데이터 로딩중...</div>;

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-50 shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="insight" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate}
                    />

                    {toastMsg && <div className="fixed bottom-6 right-6 z-[1000] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in text-sm font-bold border border-slate-700"><SafeIcon name="check-circle-2" className="text-emerald-400" />{toastMsg}</div>}

                    <div className="flex flex-1 overflow-hidden bg-slate-50">
                        <aside className="w-[240px] bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-sm">
                            <div className="p-5 border-b border-slate-100">
                                <h2 className="text-[11px] font-black text-slate-400 tracking-widest uppercase mb-1">Menu</h2>
                            </div>
                            <div className="flex flex-col py-2">
                                <button onClick={() => setActiveMenu('dashboard')} className={`px-6 py-4 text-left text-[14px] font-black border-l-4 transition-all ${activeMenu === 'dashboard' ? 'border-indigo-500 text-indigo-700 bg-indigo-50/50' : 'border-transparent text-slate-600 hover:bg-slate-50'}`}>
                                    <i className="fas fa-chart-line w-6 text-center mr-2"></i> 관리자 대시보드
                                </button>
                                <button onClick={() => setActiveMenu('category')} className={`px-6 py-4 text-left text-[14px] font-black border-l-4 transition-all ${activeMenu === 'category' ? 'border-emerald-500 text-emerald-700 bg-emerald-50/50' : 'border-transparent text-slate-600 hover:bg-slate-50'}`}>
                                    <i className="fas fa-sitemap w-6 text-center mr-2"></i> 카테고리별 분석
                                </button>
                                <button onClick={() => setActiveMenu('editor')} className={`px-6 py-4 text-left text-[14px] font-black border-l-4 transition-all ${activeMenu === 'editor' ? 'border-blue-500 text-blue-700 bg-blue-50/50' : 'border-transparent text-slate-600 hover:bg-slate-50'}`}>
                                    <i className="fas fa-envelope-open-text w-6 text-center mr-2"></i> 고객 안내장 발행
                                </button>
                            </div>
                        </aside>

                        <main className="flex-1 overflow-y-auto bg-slate-50/50 custom-scrollbar p-8">
                            {activeMenu === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-6 fade-in">
                                    <div className="grid grid-cols-3 gap-6">
                                        <div className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm flex flex-col">
                                            <span className="text-sm font-bold text-slate-500 mb-2">총 마스터 상품</span>
                                            <span className="text-3xl font-black text-slate-800">{Object.keys(masterProducts).length.toLocaleString()} <span className="text-lg font-bold text-slate-400">건</span></span>

                                            <div className="mt-6 bg-indigo-50/50 border border-indigo-100 rounded-xl p-6 shadow-sm flex items-center justify-between fade-in">
                                                <div>
                                                    <h3 className="text-[14px] font-black text-indigo-900 mb-1"><i className="fas fa-check-circle mr-1.5 text-emerald-500"></i>발행 완료! 이제 고객에게 공유하세요.</h3>
                                                    <p className="text-[11px] font-bold text-indigo-600/80">링크를 복사하여 카톡으로 보내거나, 한 장의 깔끔한 이미지로 저장할 수 있습니다.</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={handleCopyLink} className="px-4 py-2.5 bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-100 rounded-md text-[12px] font-bold transition-all shadow-sm flex items-center"><i className="fas fa-link mr-1.5"></i> URL 링크 복사</button>
                                                    <button onClick={handleDownloadImage} className="px-4 py-2.5 bg-indigo-600 text-white rounded-md text-[12px] font-bold hover:bg-indigo-700 transition-all shadow-sm flex items-center"><SafeIcon name="camera" className="mr-1.5" /> 카톡 전송용 이미지 다운로드</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {isPreviewOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[1000] flex flex-col items-center justify-center p-4 fade-in overflow-hidden">
                            <div className="w-full max-w-md flex justify-between items-center mb-4 shrink-0 text-white">
                                <span className="font-bold text-sm"><i className="fas fa-mobile-alt mr-2"></i>고객 뷰어 (가로 폭 480px 기준)</span>
                                <button onClick={() => setIsPreviewOpen(false)} className="text-slate-400 hover:text-white text-xl"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="flex-1 w-full max-w-md bg-white rounded-[2rem] overflow-hidden shadow-2xl relative">
                                <CustomerReportView data={editorDraft} />
                            </div>
                            <div className="mt-4 shrink-0">
                                <button onClick={() => setIsPreviewOpen(false)} className="px-6 py-2.5 bg-slate-700 text-white rounded-full text-sm font-bold hover:bg-slate-600 border border-slate-600">닫기</button>
                            </div>
                        </div>
                    )}
                    
                    {publishedReport && (
                        <div style={{ position: 'absolute', top: '-9999px', left: '-9999px' }}>
                            <CustomerReportView data={publishedReport} />
                        </div>
                    )}

                    {/* 설정 모달 */}
                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
