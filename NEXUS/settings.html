<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Settings Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; user-select: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        .config-chip { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; background-color: white; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .config-chip:hover { background-color: #f8fafc; } .config-chip.active { background-color: #e0e7ff; border-color: #c7d2fe; color: #4338ca; font-weight: bold; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        const STORAGE_KEYS = { MASTER_DB: 'merchMaster_v870', CLOUD_URL: 'skuSyncCloudUrl_v6', HISTORY_DB: 'merchHistory_v870', CLOSING_DB: 'merchClosing_v1' };

        const MASTER_HEADERS = ["창고", "1코드", "1그룹명", "2코드", "2그룹명", "3코드", "3그룹명", "오더즈", "구매처", "브랜드", "품목코드", "품목명", "규격", "안전재고", "간단설명", "카탈로그", "견적서", "출고가", "입고가", "입고B", "도매A", "도매B", "상장가", "최종전송", "최종입고", "단가H", "단가I", "시중가", "행사가", "1종코드", "1종규격", "1종연산", "2종코드", "2종규격", "2종연산", "외주비", "노무비", "경비", "비과세", "기본", "연동", "싯가", "단위", "준비기간", "마감시간", "검색어등록", "소싱태그"];
        const requiredCoreFields = ['품목코드', '품목명', '규격'];

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
        };

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error);
        });
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };

        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    const possibleNames = [kebabName, name, name==='cloud-download'?'download-cloud':name, name==='cloud-upload'?'upload-cloud':name, name==='bar-chart-3'?'bar-chart':name];
                    for (const pName of possibleNames) { if (window.lucide.icons[pName]) { setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 })); return; } }
                }
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'cloud-download':'fa-cloud-download-alt', 'cloud-upload':'fa-cloud-upload-alt', 'settings':'fa-cogs', 'layout-dashboard':'fa-th-large', 'package-search':'fa-box-open', 'file-spreadsheet':'fa-table', 'zap':'fa-bolt', 'truck':'fa-truck', 'boxes':'fa-boxes', 'bar-chart-3':'fa-chart-bar', 'database':'fa-database', 'users':'fa-users', 'shopping-bag':'fa-shopping-bag', 'credit-card':'fa-credit-card', 'line-chart':'fa-chart-line', 'printer':'fa-print', 'pie-chart':'fa-chart-pie', 'megaphone':'fa-bullhorn', 'book-open':'fa-address-book', 'link':'fa-link', 'broom':'fa-broom', 'trash-alt':'fa-trash-alt', 'folder-open':'fa-folder-open', 'file-invoice':'fa-file-invoice', 'calculator':'fa-calculator', 'sign-in-alt':'fa-sign-in-alt', 'layer-group':'fa-layer-group', 'desktop':'fa-desktop', 'tags':'fa-tags', 'check-circle-2':'fa-check-circle', 'x':'fa-times', 'info-circle':'fa-info-circle', 'lock':'fa-lock', 'key':'fa-key', 'ban':'fa-ban', 'bolt':'fa-bolt', 'sort-amount-down':'fa-sort-amount-down' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 Hooks (Global Setting Manager)
        // ==========================================
        const useMerchConfig = () => {
            const [cloudUrl, setCloudUrl] = useState(() => localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || '');
            
            const [visibleMasterCols, setVisibleMasterCols] = useState(() => { 
                const s = localStorage.getItem('merchVisMaster_v870'); 
                return s ? JSON.parse(s) : { estimate: ['카탈로그', '견적서', '입고가', '출고가', '입고B', '도매A'] }; 
            });
            const [visibleUploadCols, setVisibleUploadCols] = useState(() => { 
                const s = localStorage.getItem('merchVisUpload_v870'); 
                return s ? JSON.parse(s) : { estimate: ['창고', '구매처', '견적서', '입고가', '출고가', '입고B', '도매A', '간단설명'] }; 
            });
            const [mappings, setMappings] = useState(() => { 
                const s = localStorage.getItem('merchMappings_v870'); 
                return s ? JSON.parse(s) : { master: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격, 규격명, 사이즈, 단량', '출고가': '출고가, 출고, 판매가, 시중가', '입고가': '입고가, 입고, 매입가' }, estimate: { '창고': '창고, 창고코드', '품목코드': '품목코드, 상품코드, 바코드, 상품번호, 코드', '품목명': '품목명, 상품명, 품명, 상품이름', '규격': '규격명, 규격, 사이즈, 단량', '구매처': '거래처명, 구매처, 거래처', '견적서': '견적서, 카테고리, 템플릿, 견적분류', '입고가': '입고가, 입고, 매입가', '출고가': '출고가, 출고, 판매가', '입고B': 'B단가, 입고B', '도매A': 'A판매, A판매가, 도매A', '도매B': 'B판매, B판매가, 도매B', '간단설명': '지시사항, 간단설명, 비고' } }; 
            });
            const [masterLinks, setMasterLinks] = useState(() => { 
                const s = localStorage.getItem('merchMasterLinks_v870'); 
                return s ? JSON.parse(s) : { master: {}, estimate: { '창고': '창고', '구매처': '구매처', '견적서': '견적서', '입고가': '입고가', '출고가': '출고가', '입고B': '입고B', '도매A': '도매A', '도매B': '도매B', '간단설명': '간단설명' } }; 
            });
            const [marginRules, setMarginRules] = useState(() => {
                const s = localStorage.getItem('merchMarginRules_v878');
                return s ? JSON.parse(s) : [ { id: generateUUID(), whCode: '01', unit: 'box, 박스', rate: 10, type: 'divide' }, { id: generateUUID(), whCode: '01', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' }, { id: generateUUID(), whCode: '03, 05', unit: 'box, 박스', rate: 15, type: 'divide' }, { id: generateUUID(), whCode: '03, 05', unit: 'ea, 개, 낱개', rate: 20, type: 'divide' }, { id: generateUUID(), whCode: '*', unit: 'box, 박스', rate: 10, type: 'divide' }, { id: generateUUID(), whCode: '*', unit: 'ea, 개, 낱개', rate: 15, type: 'divide' }, { id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' } ];
            });

            const [opsMappings, setOpsMappings] = useState(() => {
                const s = localStorage.getItem('inventoryMappingsLight');
                const def = { code: '품목코드, 상품코드, 코드, 품번, 바코드, sku', name: '품명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품', spec: '규격, 옵션, 사이즈', qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량', price: '매입단가(원가), 단가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)', date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자', vendor: '매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래', matchVendor: '구매처, 매입처, 매칭정보, 원매입처, lot', excludeVendor: '3우리, 우리농산, 1전송, 창고이동, 폐기, 샘플', lifoVendor: '2전송, 쿠팡, B2B, 당일우선, 현금판매', internalLot: '우리, 공용, 분배, 담당자, 우리농산', priorityVendor: '2전송>1창고' };
                return s ? { ...def, ...JSON.parse(s) } : def;
            });

            const [opsGrouping, setOpsGrouping] = useState(() => {
                const s = localStorage.getItem('inventoryGroupingV79');
                return s ? { ...{ priceMode: 'separate', splitByVendor: false, splitByDate: false }, ...JSON.parse(s) } : { priceMode: 'separate', splitByVendor: false, splitByDate: false };
            });

            const saveConfig = () => {
                localStorage.setItem(STORAGE_KEYS.CLOUD_URL, cloudUrl);
                localStorage.setItem('merchVisMaster_v870', JSON.stringify(visibleMasterCols));
                localStorage.setItem('merchVisUpload_v870', JSON.stringify(visibleUploadCols));
                localStorage.setItem('merchMappings_v870', JSON.stringify(mappings));
                localStorage.setItem('merchMasterLinks_v870', JSON.stringify(masterLinks));
                localStorage.setItem('merchMarginRules_v878', JSON.stringify(marginRules));
                localStorage.setItem('inventoryMappingsLight', JSON.stringify(opsMappings));
                localStorage.setItem('inventoryGroupingV79', JSON.stringify(opsGrouping));
                return true;
            };

            return { cloudUrl, setCloudUrl, visibleMasterCols, setVisibleMasterCols, visibleUploadCols, setVisibleUploadCols, mappings, setMappings, masterLinks, setMasterLinks, marginRules, setMarginRules, opsMappings, setOpsMappings, opsGrouping, setOpsGrouping, saveConfig };
        };

        const GlobalHeader = ({ onNavigate }) => {
            const groups = [ { id: 'master', label: '정보 관리', icon: 'database' }, { id: 'ops', label: '운영 관리', icon: 'truck' }, { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }, { id: 'settings', label: '시스템 설정', icon: 'settings' } ];
            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common' },
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: '/NEXUS/partner_db', group: 'master' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: '/NEXUS/partners', group: 'master' },
                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: '/NEXUS/orders', group: 'ops' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: '/NEXUS/purchases', group: 'ops' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: '/NEXUS/sales', group: 'ops' },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: '/NEXUS/inventory', group: 'ops' },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: '/NEXUS/print_center', group: 'ops' },
                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: '/NEXUS/Report', group: 'admin' },
                { id: 'cs', label: '정보마당(CS)', icon: "megaphone", path: '/NEXUS/cs', group: 'admin' },
                { id: 'settings_main', label: '통합 환경설정', icon: "settings", path: '/NEXUS/settings', group: 'settings' }
            ];

            const currentTab = tabs.find(t => t.id === 'settings_main');
            const [selectedGroup, setSelectedGroup] = useState('settings');

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={(e) => { setSelectedGroup('common'); onNavigate(e, '/NEXUS/Dashboard'); }}>
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center"><span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span><span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.4</span></div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">CONTROL PANEL</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => setSelectedGroup(g.id === selectedGroup ? 'common' : g.id)} className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5 ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex items-center gap-4 h-full">
                            <button onClick={() => onNavigate(null, '/NEXUS/Dashboard')} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-indigo-600 flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="종료하고 대시보드로 돌아가기"><SafeIcon name="x" size={18} /></button>
                        </div>
                    </header>
                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => (
                                <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path)}
                                   className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] ${tab.id === 'settings_main' ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]' : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'}`}
                                   style={{ marginBottom: tab.id === 'settings_main' ? '-1px' : '0', paddingBottom: tab.id === 'settings_main' ? '13px' : '10px' }}>
                                    <SafeIcon name={tab.icon} size={16} className={tab.id === 'settings_main' ? 'text-indigo-600' : 'opacity-70'} /> {tab.label}
                                </a>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const config = useMerchConfig();
            const [activeTab, setActiveTab] = useState('display');
            const [toastMsg, setToastMsg] = useState('');
            const [masterProducts, setMasterProducts] = useState({});
            const [customEstColInput, setCustomEstColInput] = useState('');

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path) => {
                if (e && e.preventDefault) e.preventDefault();
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    else window.location.href = path;
                } catch (err) { showToast(`💡 이동 시뮬레이션: [${path}]`); }
            }, [showToast]);

            useEffect(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => { if (data) setMasterProducts(data); }).catch(console.error);
            }, []);

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => { const trimmed = t.trim(); if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1; });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?")) {
                    let newMaster = { ...masterProducts }; let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {

                                                        <tr key={`map-e-${h}`} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 font-bold text-slate-800 flex items-center"><span className="w-2 h-2 rounded-full bg-emerald-400 mr-3"></span>{h}</td>
                                                            <td className="p-4"><input type="text" value={config.mappings['estimate']?.[h]||''} onChange={e=>config.setMappings(p=>({...p, estimate:{...p.estimate, [h]:e.target.value}}))} placeholder={h} className="w-full border border-slate-300 rounded-lg px-4 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 bg-white font-bold text-slate-700 shadow-sm transition-all" /></td>
                                                            <td className="p-4">
                                                                <select value={config.masterLinks['estimate']?.[h]||''} onChange={e=>config.setMasterLinks(p=>({...p, estimate:{...p.estimate, [h]:e.target.value}}))} className={`w-full border rounded-lg px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all shadow-sm ${config.masterLinks['estimate']?.[h]?'bg-emerald-50 text-emerald-800 border-emerald-300 font-bold':'bg-white border-slate-300 text-slate-600 font-medium'}`}>
                                                                    <option value="">-- DB 연동 안함 (화면 표시만) --</option>
                                                                    {MASTER_HEADERS.map(mh=><option key={mh} value={mh}>{mh}</option>)}
                                                                </select>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'opsMap' && (
                                <div className="max-w-5xl space-y-6 fade-in mx-auto">
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="bg-slate-50 p-5 border-b border-slate-200"><h3 className="text-[15px] font-black text-slate-800 flex items-center"><SafeIcon name="layer-group" size={18} className="text-blue-500 mr-2"/>운영 관리(Ops) 엑셀 매핑 설정</h3><p className="text-[12px] text-slate-500 mt-1.5 font-medium">구매, 판매, 재고 마감 등 운영 모듈에서 업로드되는 엑셀의 열을 추적하고 차감 룰을 결정하는 키워드입니다.</p></div>
                                        <div className="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 bg-white">
                                            {Object.entries({ code: '품목코드 (필수)', name: '품목명 (필수)', spec: '규격 열 (선택)', qty: '수량/실사 (필수)', price: '단가 (필수)', date: '일자 (필수)', vendor: '거래처명 (선택)', matchVendor: '판매전표 내 매입처(Lot 매칭)', excludeVendor: '제외 거래처(창고이동 등)', lifoVendor: '당일우선 출고(LIFO) 거래처', internalLot: '내부분배/공용 로트 (LIFO 예외)', priorityVendor: '출고 우선순위(A>B)' }).map(([k, lbl]) => (
                                                <div key={k} className="flex flex-col relative group">
                                                    <label className={`text-[12px] font-bold mb-2 flex items-center ${['excludeVendor','matchVendor','lifoVendor','internalLot','priorityVendor'].includes(k) ? (k==='excludeVendor'?'text-rose-600':k==='matchVendor'?'text-blue-600':k==='lifoVendor'?'text-purple-600':k==='internalLot'?'text-teal-600':'text-orange-600') : 'text-slate-700'}`}>
                                                        {['excludeVendor','matchVendor','lifoVendor','internalLot','priorityVendor'].includes(k) && <SafeIcon name={k==='excludeVendor'?'ban':k==='matchVendor'?'link':k==='lifoVendor'?'bolt':k==='internalLot'?'users':'sort-amount-down'} size={14} className="mr-1.5"/>}
                                                        {lbl}
                                                    </label>
                                                    <input type="text" value={config.opsMappings[k] || ''} onChange={e => config.setOpsMappings({...config.opsMappings, [k]: e.target.value})} className={`border rounded-lg px-4 py-2.5 text-[13px] font-bold outline-none shadow-sm transition-all focus:ring-2 ${['excludeVendor','matchVendor','lifoVendor','internalLot','priorityVendor'].includes(k) ? (k==='excludeVendor'?'border-rose-200 bg-rose-50 text-rose-800 focus:border-rose-500 focus:ring-rose-100':k==='matchVendor'?'border-blue-200 bg-blue-50 text-blue-800 focus:border-blue-500 focus:ring-blue-100':k==='lifoVendor'?'border-purple-200 bg-purple-50 text-purple-800 focus:border-purple-500 focus:ring-purple-100':k==='internalLot'?'border-teal-200 bg-teal-50 text-teal-800 focus:border-teal-500 focus:ring-teal-100':'border-orange-200 bg-orange-50 text-orange-800 focus:border-orange-500 focus:ring-orange-100') : 'border-slate-300 bg-white text-slate-800 focus:border-blue-500 focus:ring-blue-100'}`} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="bg-slate-50 p-5 border-b border-slate-200"><h3 className="text-[15px] font-black text-slate-800 flex items-center"><SafeIcon name="sliders-horizontal" size={18} className="text-indigo-500 mr-2"/>품목 관리 기준 및 분할 옵션 (DataOps 엔진)</h3></div>
                                        <div className="p-8 flex flex-col lg:flex-row gap-8 items-start bg-white">
                                            <div className="w-full lg:w-1/3">
                                                <label className="text-[13px] font-bold text-slate-700 mb-3 block border-b border-slate-100 pb-2">단가(원가) 병합 기준</label>
                                                <select value={config.opsGrouping.priceMode} onChange={e => config.setOpsGrouping({...config.opsGrouping, priceMode: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-3 text-[13px] font-black text-indigo-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 bg-white shadow-sm transition-all cursor-pointer">
                                                    <option value="separate">① 개별 단가 유지 (단가가 다르면 분할) - 🌟권장</option>
                                                    <option value="average">② 평균 단가 적용 (단가가 달라도 병합)</option>
                                                    <option value="latest">③ 최신 단가 적용 (단가가 달라도 병합)</option>
                                                </select>
                                            </div>
                                            <div className="flex-1 w-full border-t lg:border-t-0 lg:border-l border-slate-200 pt-6 lg:pt-0 lg:pl-8">
                                                <label className="text-[13px] font-bold text-slate-700 mb-3 block border-b border-slate-100 pb-2">동적 로우(Row) 분할 생성 조건</label>
                                                <div className="flex flex-col gap-4 mt-4">
                                                    <label className="flex items-center gap-3 text-[13px] font-black text-slate-400 cursor-not-allowed bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                        <input type="checkbox" checked={true} readOnly className="w-4 h-4 rounded border-slate-300 text-slate-400 focus:ring-0" />
                                                        <span>품목코드 (기본 분할값 - 해제불가)</span>
                                                    </label>
                                                    <label className={`flex items-center gap-3 text-[13px] font-black cursor-pointer p-3 rounded-lg border transition-all ${config.opsGrouping.splitByVendor ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-slate-50'}`}>
                                                        <input type="checkbox" checked={config.opsGrouping.splitByVendor} onChange={e => config.setOpsGrouping({...config.opsGrouping, splitByVendor: e.target.checked})} className="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 transition-all" />
                                                        <span>매입처(Lot)가 다를 경우 행(Row) 분리</span>
                                                    </label>
                                                    <label className={`flex items-center gap-3 text-[13px] font-black cursor-pointer p-3 rounded-lg border transition-all ${config.opsGrouping.splitByDate ? 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-slate-50'}`}>
                                                        <input type="checkbox" checked={config.opsGrouping.splitByDate} onChange={e => config.setOpsGrouping({...config.opsGrouping, splitByDate: e.target.checked})} className="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 transition-all" />
                                                        <span>매입일자가 다를 경우 행(Row) 분리</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'uiCustom' && (
                                <div className="max-w-4xl space-y-6 fade-in mx-auto">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 className="text-[15px] font-black mb-4 pb-3 border-b border-slate-100 flex items-center text-slate-800"><span className="bg-blue-100 text-blue-700 text-[10px] px-2 py-1 rounded-md mr-3 shadow-sm">마스터(읽기 전용)</span> 작업 화면 노출 컬럼 설정</h3>
                                        <div className="flex flex-wrap gap-2 mb-6 p-4 bg-slate-50 border border-slate-200 rounded-lg shadow-inner">
                                            <div className="w-full text-[12px] text-slate-500 font-bold mb-2 flex items-center"><SafeIcon name="info-circle" size={14} className="mr-1.5"/>고정 식별자 (해제 불가)</div>
                                            {requiredCoreFields.map(h => <div key={`m-req-${h}`} className="config-chip active opacity-60 cursor-not-allowed bg-slate-200 border-slate-300 text-slate-700 shadow-sm flex items-center"><SafeIcon name="lock" size={12} className="mr-1.5 text-slate-500"/>{h}</div>)}
                                        </div>
                                        <div className="w-full text-[12px] text-slate-500 font-bold mb-3 flex items-center px-1">선택 가능 항목 (클릭하여 토글)</div>
                                        <div className="flex flex-wrap gap-2 px-1">
                                            {MASTER_HEADERS.filter(h => !requiredCoreFields.includes(h)).map(h => <div key={`m-${h}`} onClick={() => toggleMasterCol('estimate', h)} className={`config-chip hover:-translate-y-0.5 shadow-sm ${config.visibleMasterCols['estimate']?.includes(h)?'active ring-2 ring-indigo-200 bg-indigo-50 border-indigo-300 text-indigo-700':'bg-white border-slate-300 text-slate-600'}`}>{h}</div>)}
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 className="text-[15px] font-black mb-4 pb-3 border-b border-slate-100 flex items-center text-slate-800"><span className="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-1 rounded-md mr-3 shadow-sm">작업/입력 영역</span> 엑셀 연동 및 수정 컬럼 설정</h3>
                                        <div className="text-[12px] text-slate-500 font-bold mb-4 bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-inner leading-relaxed flex items-start">
                                            <SafeIcon name="info-circle" size={14} className="mr-2 mt-0.5 shrink-0 text-slate-400"/>
                                            <p>식별자인 '품목코드'는 엑셀 작업에서 변경할 수 없으므로 제외되었습니다.<br/>마스터에 없는 완전히 새로운 항목명을 우측 하단에서 추가하여 엑셀 매핑에 활용할 수 있습니다.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-2.5 mb-6">
                                            {(config.visibleUploadCols['estimate']||[]).filter(h => !requiredCoreFields.includes(h)).map(h => <div key={`u-e-${h}`} className="config-chip active border-emerald-300 bg-emerald-50 text-emerald-800 hover:bg-rose-50 hover:border-rose-300 hover:text-rose-600 hover:ring-2 hover:ring-rose-100 transition-all group shadow-sm flex items-center"><span className="font-bold">{h}</span><button onClick={()=>config.setVisibleUploadCols(p=>({...p, estimate:p.estimate.filter(x=>x!==h)}))} className="ml-2 text-emerald-400 group-hover:text-rose-500 flex items-center justify-center w-4 h-4 rounded-full bg-white shadow-sm"><SafeIcon name="x" size={10} /></button></div>)}
                                        </div>
                                        <div className="flex items-center gap-3 max-w-md bg-slate-50 p-2 rounded-lg border border-slate-200">
                                            <input type="text" value={customEstColInput} onChange={e=>setCustomEstColInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCustomUploadCol('estimate', customEstColInput)} placeholder="새로운 항목명 입력 (예: 마감시간)" className="flex-1 border border-slate-300 rounded-md px-3 py-2 text-[13px] font-bold outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 shadow-inner" />
                                            <button onClick={()=>addCustomUploadCol('estimate', customEstColInput)} className="bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-md text-[13px] font-bold transition-all shadow-md flex items-center"><SafeIcon name="plus" size={14} className="mr-1.5"/> 추가</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[300] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                            <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
