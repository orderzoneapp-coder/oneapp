<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - One Board [v2.0]</title>
    <!-- 핵심 라이브러리 CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core & FontAwesome (아이콘 2중 안전장치) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        /**
         * 🛠 SafeIcon: 아이콘 라이브러리 로드 실패 시에도 완벽하게 아이콘을 띄워주는 2중 안전장치
         */
        const SafeIcon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, 
                            name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name
                        ];
                        let iconData = null;
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                iconData = window.lucide.icons[pName];
                                break;
                            }
                        }
                        if (iconData) {
                            setSvg(iconData.toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt',
                    'cloud-upload': 'fa-cloud-upload-alt',
                    'settings': 'fa-cogs',
                    'terminal': 'fa-terminal',
                    'layout-dashboard': 'fa-th-large',
                    'package-search': 'fa-box-open',
                    'file-spreadsheet': 'fa-table',
                    'zap': 'fa-bolt',
                    'truck': 'fa-truck',
                    'boxes': 'fa-boxes',
                    'bar-chart-3': 'fa-chart-bar',
                    'check': 'fa-check',
                    'check-circle-2': 'fa-check-circle',
                    'x': 'fa-times'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        // ==========================================
        // 🧩 Components: TopHeader & Nav
        // ==========================================
        const TopHeader = ({ itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull }) => {
            // ...
            return (
                <header className="h-16 bg-[#0B1021] text-white flex items-center justify-between px-6 shrink-0 z-50 border-b border-slate-800/80 shadow-md">
                    <div className="flex items-center">
                        <div className="flex items-center cursor-pointer group" onClick={() => window.location.href = 'https://oneapp.orderz.co.kr/NEXUS/Dashboard'}>
                            <span className="font-black text-[22px] tracking-wider text-slate-100 mr-4">ONEAPP</span>
                            
                            <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                <div className="flex items-center">
                                    <span className="font-black text-[15px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                    <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[8px] font-black tracking-wider shadow-sm leading-none">v2.0</span>
                                </div>
                                <span className="text-[9.5px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">One Board</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col border-l border-slate-700/50 pl-4 ml-5">
                            <span className="text-[9px] text-emerald-500/70 font-mono tracking-widest italic uppercase flex items-center gap-1.5 mt-0.5">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500/80 animate-pulse"></div>
                                Sync_Connected
                            </span>
                        </div>
                    </div>

                    <div className="flex-1 max-w-2xl mx-8 hidden xl:block">
                        <div className="bg-[#050814] border border-[#1A2235] rounded-md flex items-center px-4 py-2 font-mono text-[12px] shadow-inner h-9">
                            <span className="text-emerald-500 mr-2 opacity-80">{'>'}</span>
                            <span className={isProcessing ? "text-amber-400 font-bold" : "text-emerald-400 font-bold uppercase"}>
                                {isProcessing ? `WORKING: ${processMsg}` : `CLUSTER: STABLE | DB_LOADED: ${itemCount}`}
                            </span>
                            <span className="ml-2 w-1.5 h-3.5 bg-emerald-500 animate-pulse inline-block"></span>
                        </div>
                    </div>

                    <div className="flex items-center gap-2">
                        <button onClick={onPull} className="w-10 h-10 rounded bg-[#111827] hover:bg-[#1f2937] flex items-center justify-center border border-[#374151] transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기">
                            <SafeIcon name="cloud-download" size={20} />
                        </button>
                        <button onClick={onPush} className="w-10 h-10 rounded bg-[#111827] hover:bg-[#1f2937] flex items-center justify-center border border-[#374151] transition-colors text-indigo-400 shadow-sm" title="데이터 저장하기">
                            <SafeIcon name="cloud-upload" size={20} />
                        </button>
                        <button onClick={onOpenSettings} className="w-10 h-10 rounded bg-[#111827] hover:bg-[#1f2937] flex items-center justify-center border border-[#475569] transition-colors text-slate-400 hover:text-white ml-2 shadow-sm" title="설정">
                            <SafeIcon name="settings" size={20} />
                        </button>
                    </div>
                </header>
            );
        };

        const NavigationBar = ({ activeTab }) => {
            const tabs = [
                { id: 'dashboard', label: '대시보드', icon: "layout-dashboard", path: 'https://oneapp.orderz.co.kr/NEXUS/Dashboard' },
                { id: 'item-info', label: '마스터 DB', icon: "package-search", path: 'https://oneapp.orderz.co.kr/NEXUS/Item_master' },
                { id: 'item-manage', label: '상품관리', icon: "sliders-horizontal", path: 'https://oneapp.orderz.co.kr/NEXUS/Item_manager' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'index.html' },
                { id: 'outbound', label: '출고 관리', icon: "truck", path: '/outbound/' },
                { id: 'inventory', label: '재고 관리', icon: "boxes", path: '/inventory/' },
                { id: 'insight', label: '인사이트', icon: "bar-chart-3", path: '/insight/' }
            ];

            return (
                <nav className="bg-[#0B1021] px-6 flex items-end gap-1.5 shrink-0 pt-3 border-b border-slate-200 overflow-x-auto custom-scrollbar relative z-10">
                    {tabs.map(tab => {
                        const isActive = activeTab === tab.id;
                        return (
                            <a key={tab.id} href={tab.path} 
                               className={`flex items-center gap-2 px-5 py-2.5 text-[13px] font-bold rounded-t-lg transition-all whitespace-nowrap border-x border-t-[3px] 
                               ${isActive 
                                   ? 'bg-slate-100 text-indigo-700 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_5px_rgba(0,0,0,0.03)]' 
                                   : 'bg-[#1A2235] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1e293b] hover:text-slate-200'
                               }`}
                               style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '11px' : '10px' }}
                            >
                                <SafeIcon name={tab.icon} size={15} className={isActive ? 'text-indigo-600' : 'text-slate-500'} />
                                {tab.label}
                            </a>
                        );
                    })}
                </nav>
            );
        };

        // ==========================================
        // 🧩 View: Main Dashboard
        // ==========================================
        const DashboardWelcome = () => {
            return (
                <div className="h-full flex flex-col items-center justify-center bg-white m-6 rounded-xl border border-slate-200 shadow-sm p-10 fade-in relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500"></div>
                    
                    <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 mb-6 shadow-inner relative">
                        <SafeIcon name="layout-dashboard" size={32} />
                    </div>
                    
                    <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">환영합니다</h2>
                    <p className="text-[14px] text-slate-500 text-center font-medium">
                        상단의 탭 메뉴를 선택하여 업무를 시작하세요.
                    </p>
                </div>
            );
        };

        // ==========================================
        // ⚙️ Main App Container
        // ==========================================
        function App() {
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('skuSyncCloudUrl_v6') || '');
            
            const [itemCount, setItemCount] = useState(0);

            const showToast = useCallback((msg) => { 
                setToastMsg(msg); 
                setTimeout(() => setToastMsg(''), 3000); 
            }, []);

            useEffect(() => {
                localStorage.setItem('skuSyncCloudUrl_v6', gasUrl);
                
                try {
                    const s = localStorage.getItem('skuSyncMaster_v6');
                    if(s) {
                        const parsed = JSON.parse(s);
                        setItemCount(Object.keys(parsed).length);
                    }
                } catch(e) {}
            }, [gasUrl]);

            const handlePush = async () => {
                if (!gasUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("SYNCING...");
                setTimeout(() => {
                    showToast("✅ 클라우드 저장 요청 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 800);
            };

            const handlePull = async () => {
                if (!gasUrl) return showToast("⚠️ 설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("PULLING...");
                setTimeout(() => {
                    showToast("✅ 데이터 동기화 성공");
                    setIsProcessing(false); setProcessMsg("");
                }, 800);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <TopHeader 
                        itemCount={itemCount} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                    />
                    
                    <NavigationBar activeTab="dashboard" />
                    
                    <main className="flex-1 overflow-hidden relative flex flex-col bg-slate-50">
                        <DashboardWelcome />

                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {/* 설정 모달 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex justify-center items-center backdrop-blur-sm">
                            <div className="bg-white w-[450px] rounded-xl shadow-2xl overflow-hidden border border-gray-200 fade-in">
                                <div className="px-6 py-4 border-b border-gray-200 bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-black text-slate-800 text-base flex items-center"><SafeIcon name="settings" size={18} className="text-indigo-500 mr-2"/>OneApp Sync Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600 transition-colors"><SafeIcon name="x" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">Google Apps Script Webhook URL</label>
                                        <input type="text" value={gasUrl} onChange={(e)=>setGasUrl(e.target.value)} placeholder="https://script.google.com/..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono" />
                                        <p className="mt-3 text-[10px] text-slate-400 leading-relaxed italic">* 자사 구글 시트와 데이터를 동기화하기 위한 주소입니다.</p>
                                    </div>
                                </div>
                                <div className="px-6 py-4 bg-slate-50 border-t border-gray-200 flex justify-end">
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-2.5 bg-[#1A2235] text-white rounded-lg text-sm font-bold shadow-md hover:bg-black transition-colors">저장 및 닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
