        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'sliders-horizontal' ? 'sliders' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });

                return Array.from(map.entries()).map(([code, name]) => ({code, name})).sort((a,b) => a.code.localeCompare(b.code));
            }, [masterCatalogProducts]);

            useEffect(() => { if (c1List.length > 0 && !activeC1) setActiveC1(c1List[0].code); }, [c1List, activeC1]);

            const c2List = useMemo(() => {
                if(!activeC1) return [];
                const map = new Map();
                masterCatalogProducts.filter(p => p.c1Code === activeC1).forEach(p => { if (p.c2Code && !map.has(p.c2Code)) map.set(p.c2Code, p.c2Name || p.c2Code); });
                return Array.from(map.entries()).map(([code, name]) => ({code, name})).sort((a,b) => a.code.localeCompare(b.code));
            }, [masterCatalogProducts, activeC1]);

            useEffect(() => {
                if (c2List.length > 0 && !c2List.find(c => c.code === activeC2)) setActiveC2(c2List[0].code);

                targetList.forEach(p => {

                                </div>

                        </div>

                        <div className="p-4 bg-white border-t border-slate-200">

        // ==========================================

        // ==========================================
        // 🧩 Sub Views: BOM Builder
        // ==========================================
        const BOMBuilderView = ({ data, ui, onRegister }) => {
            const masterCatalogProducts = data?.masterCatalogProducts || [];
            const showToast = ui?.showToast;
            
            const [bomList, setBomList] = useState([]);
            const [bomName, setBomName] = useState('');
            const [bomSpec, setBomSpec] = useState('');
            const [searchKw, setSearchKw] = useState('');

            const searchResults = useMemo(() => {
                if(masterCatalogProducts.length === 0) return [];
                if(!searchKw.trim()) return masterCatalogProducts.slice(0, 50);
                const fuse = new Fuse(masterCatalogProducts, { keys: ['name', 'keywords', 'code', 'id'], threshold: 0.3 });
                return fuse.search(searchKw).map(r => r.item).slice(0, 50);
            }, [searchKw, masterCatalogProducts]);

            const addToBom = (item) => { if(!bomList.find(b => b.id === item.id)) setBomList([...bomList, { ...item, qty: 1 }]); };
            const updateQty = (id, delta) => setBomList(bomList.map(b => b.id === id ? { ...b, qty: Math.max(1, b.qty + delta) } : b));
            const removeFromBom = (id) => setBomList(bomList.filter(b => b.id !== id));
            const totalCost = bomList.reduce((sum, item) => sum + ((item.basePrice || 0) * item.qty), 0);

            const handleSubmit = () => {
                if(bomList.length < 2) return showToast('⚠️ 상품을 2개 이상 선택하세요.');
                if(!bomName) return showToast('⚠️ 세트 상품명을 입력하세요.');
                const pseudoSKU = `BOM-${Date.now().toString().slice(-6)}`;
                const newItem = {
                    코드: pseudoSKU,
                    sources: { 'bom': { '품목명': bomName, '규격': bomSpec, '입고가': totalCost, '간단설명': `구성: ${bomList.map(b=>b.name).join(', ')}` } },
                    finalData: { '품목명': bomName, '규격': bomSpec, '입고가': totalCost, '간단설명': `구성: ${bomList.map(b=>b.name).join(', ')}`, '오더즈': '999999', '3코드': '999999', '3그룹명': '기획세트' }
                };
                onRegister(newItem);
                showToast(`✅ [${bomName}] 기획 SKU가 발급되었습니다.`);
                setBomList([]); setBomName(''); setBomSpec('');
            };

            return (
                <div className="h-full flex gap-6 fade-in p-6 pt-4 bg-slate-50 border border-gray-200 m-6 mt-4 rounded-xl shadow-sm">
                    <div className="w-1/2 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                        <div className="px-5 py-4 border-b border-gray-100 shrink-0 bg-slate-50">
                            <h3 className="text-sm font-bold text-slate-800 mb-3">1. 마스터 카탈로그 검색</h3>
                            <div className="relative"><input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="상품 검색 후 우측 세트에 추가..." className="w-full pl-9 pr-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /><i className="fas fa-search absolute left-3 top-2.5 text-slate-400"></i></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 custom-scrollbar">
                            <div className="grid grid-cols-1 gap-2">
                                {masterCatalogProducts.length === 0 ? (
                                    <div className="py-10 text-center text-sm text-slate-400">마스터 DB를 먼저 불러와주세요.</div>
                                ) : searchResults.map(m => (
                                    <div key={m.id} onClick={() => addToBom(m)} className="px-4 py-3 border border-gray-100 bg-white rounded-md hover:border-indigo-300 hover:bg-indigo-50/30 cursor-pointer flex justify-between group transition-all">
                                        <div className="flex flex-col min-w-0"><span className="text-sm font-bold text-slate-800 truncate">{m.name} <span className="text-slate-500 font-normal text-xs ml-1">({m.spec})</span></span><span className="text-xs font-mono text-slate-400 mt-1">{m.id}</span></div>
                                        <div className="text-right shrink-0 ml-2"><div className="text-sm font-bold text-slate-600">{Number(m.basePrice||0).toLocaleString()}원</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="w-1/2 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                        <div className="bg-slate-50 px-5 py-4 border-b border-gray-200 flex items-center justify-between shrink-0">
                            <div><h2 className="text-sm font-bold text-slate-900">2. BOM 세트 조립기</h2><p className="text-xs text-slate-500 mt-1">선택된 단품의 매입가를 순수 합산합니다.</p></div>
                            <div className="bg-white px-3 py-2 rounded border border-gray-200 shadow-sm text-right"><div className="text-xs font-bold text-slate-500">합산 매입가</div><div className="text-lg font-black text-slate-900">{totalCost.toLocaleString()} <span className="text-sm font-normal">원</span></div></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            <div className="space-y-3">
                                {bomList.length === 0 ? (
                                    <div className="h-full flex flex-col justify-center items-center text-slate-400 py-20">
                                        <i className="fas fa-boxes text-3xl mb-3 text-slate-300"></i><p className="text-sm font-medium">좌측에서 구성품을 담아주세요.</p>
                                    </div>
                                ) : bomList.map((item, idx) => (
                                    <div key={item.id} className="bg-white border border-gray-200 p-3 rounded flex items-center justify-between fade-in shadow-sm group">
                                        <div className="flex items-center gap-3 min-w-0"><div className="w-6 h-6 rounded bg-slate-100 text-slate-600 flex items-center justify-center text-xs font-bold">{idx+1}</div><div className="flex flex-col min-w-0"><span className="text-sm font-bold text-slate-800 truncate">{item.name}</span><span className="text-xs text-slate-500 mt-0.5">{item.spec} | {Number(item.basePrice||0).toLocaleString()}원</span></div></div>
                                        <div className="flex items-center gap-4 shrink-0">
                                            <div className="flex items-center bg-slate-50 rounded border border-gray-200"><button onClick={()=>updateQty(item.id, -1)} className="w-7 h-7 text-slate-500 hover:bg-slate-200">-</button><div className="w-8 text-center text-xs font-bold">{item.qty}</div><button onClick={()=>updateQty(item.id, 1)} className="w-7 h-7 text-slate-500 hover:bg-slate-200">+</button></div>
                                            <div className="w-16 text-right text-sm font-bold text-slate-700">{((item.basePrice||0)*item.qty).toLocaleString()}</div><button onClick={()=>removeFromBom(item.id)} className="text-slate-400 hover:text-red-500 w-6 h-6 flex items-center justify-center rounded hover:bg-red-50 transition-colors"><i className="fas fa-times"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-slate-50 p-5 border-t border-gray-200 shrink-0">
                            <div className="flex gap-3 mb-4">
                                <div className="flex-1"><label className="text-xs font-bold text-slate-700 mb-1.5 block">기획(세트) 품목명</label><input type="text" value={bomName} onChange={e=>setBomName(e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /></div>
                                <div className="w-1/3"><label className="text-xs font-bold text-slate-700 mb-1.5 block">규격</label><input type="text" value={bomSpec} onChange={e=>setBomSpec(e.target.value)} placeholder="예: 1세트" className="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /></div>
                            </div>
                            <button onClick={handleSubmit} disabled={bomList.length < 2 || !bomName} className={`w-full py-3 rounded-lg font-bold text-sm shadow-md transition-all ${bomList.length >= 2 && bomName ? 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}>세트 SKU 발급 및 대기열 전송</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 5. Main App Container
        // ==========================================
        function App() {
            const config = useMerchConfig();
            const [viewMode, setViewMode] = useState('catalog'); 
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [masterCatalogProducts, setMasterCatalogProducts] = useState([]);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady || path === '#') { showToast(`⚠️ [${path}] 페이지는 아직 준비 중입니다.`); return; }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드 백업 중...");
                setTimeout(() => {
                    showToast("✅ 클라우드 저장 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("데이터 동기화 중...");
                setTimeout(() => {
                    showToast("✅ 데이터 수신 완료");
                    setIsProcessing(false); setProcessMsg("");
                }, 1000);
            };

            useEffect(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => { 
                    if (data) {
                        setMasterProducts(data); 
                        const catalogArr = Object.values(data).map(row => ({
                            id: row['품목코드'] || row['코드'] || `TEMP-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                            c1Code: String(row['1코드'] || '').trim(),
                            c1Name: row['1그룹명'] || '기타',
                            c2Code: String(row['2코드'] || '').trim(),
                            c2Name: row['2그룹명'] || '기타',
                            c3Code: String(row['3코드'] || '').trim(),
                            c3Name: row['3그룹명'] || '기타',
                            ordersCode: String(row['오더즈'] || '').trim(),
                            name: row['품목명'] || '',
                            spec: row['규격'] || '',
                            basePrice: parseNum(row['입고가'] || row['출고가'] || 0)
                        })).filter(p => p.name);
                        setMasterCatalogProducts(catalogArr);
                    }
                }).catch(console.error);

                getIDB(STORAGE_KEYS.MANAGED_ITEMS).then(data => { if (data) setManagedItems(data); }).catch(console.error);

                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) {
                        getIDB(STORAGE_KEYS.MASTER_DB).then(data => {
                            if (data) setMasterProducts(data);
                        });
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            useEffect(() => {
                if (Object.keys(managedItems).length > 0) {
                    setIDB(STORAGE_KEYS.MANAGED_ITEMS, managedItems).catch(console.error);
                }
            }, [managedItems]);

            // Mapping Center 용 Helper 함수들
            const cleanUpGarbageTags = useCallback(() => {
                if(window.confirm("마스터 DB에 남아있는 불필요한 엑셀 검색어 찌꺼기를 모두 삭제하여 용량을 최적화하시겠습니까?\n(오직 시스템에서 관리하는 속성만 안전하게 남습니다.)")) {
                    let newMaster = { ...masterProducts };
                    let count = 0;
                    for (let code in newMaster) {
                        if (newMaster[code]['검색어등록'] || newMaster[code]['상품태그']) {
                            delete newMaster[code]['검색어등록'];
                            delete newMaster[code]['상품태그'];
                            count++;
                        }
                    }
                    setMasterProducts(newMaster);
                    setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                    showToast(`✅ ${count}건의 찌꺼기 데이터를 삭제했습니다.`);
                }
            }, [masterProducts, showToast]);

            const handleDeleteTag = useCallback((type, tagName) => {
                if (!tagName) return;
                const confirmMsg = `[${tagName}] ${type === 'catalog' ? '카탈로그' : '견적서'}를 정말 삭제하시겠습니까?\n해당 꼬리표가 달린 모든 상품에서 이 태그가 일괄 제거됩니다.`;
                if (!window.confirm(confirmMsg)) return;

                let newMaster = { ...masterProducts };
                let count = 0;
                const fieldKey = type === 'catalog' ? '카탈로그' : '견적서';

                for (let code in newMaster) {
                    if (newMaster[code][fieldKey]) {
                        const tags = newMaster[code][fieldKey].split(',').map(s => s.trim()).filter(Boolean);
                        if (tags.includes(tagName)) {
                            newMaster[code] = { ...newMaster[code] };
                            newMaster[code][fieldKey] = tags.filter(t => t !== tagName).join(', ');
                            count++;
                        }
                    }
                }
                
                setMasterProducts(newMaster);
                setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast(`✅ ${count}개의 상품에서 [${tagName}] 태그를 삭제했습니다.`);
            }, [masterProducts, showToast]);

            const handleClearDB = async () => {
                if (!window.confirm("현재 브라우저의 마스터 DB 전체를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다. (클라우드 데이터는 보존됩니다)")) return;
                setMasterProducts({});
                await setIDB(STORAGE_KEYS.MASTER_DB, {});
                localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                showToast("🗑️ 앱 로컬 데이터가 모두 초기화되었습니다.");
            };

            const availableCatalogs = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['카탈로그'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            const availableCategories = useMemo(() => {
                const counts = {};
                Object.values(masterProducts).forEach(m => {
                    const tagStr = m['견적서'] || m['카테고리'] || '';
                    tagStr.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) counts[trimmed] = (counts[trimmed] || 0) + 1;
                    });
                });
                return Object.keys(counts).sort().map(tag => ({ name: tag, count: counts[tag] }));
            }, [masterProducts]);

            // 카탈로그에서 다수 항목 전송 시
            const handleCatalogRegister = (cartItems, activeC1) => {
                let currentCounter = 1;
                const newManaged = { ...managedItems };
                
                cartItems.forEach(item => {
                    const seq = String(currentCounter++).padStart(3, '0');
                    const catPrefix = activeC1 === '10' ? 'C1' : activeC1 === '20' ? 'F1' : activeC1 === '30' ? 'F2' : activeC1 === '40' ? 'S1' : 'E1';
                    const newSku = `SHOP-${catPrefix}-${new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }).replace(/\./g, '').replace(/\s/g, '')}-${seq}`;
                    
                    newManaged[newSku] = {
                        코드: newSku,
                        sources: { 'catalog': { ...item } },
                        finalData: { 
                            '품목명': '', '규격': '', '구매처': '자체조달',
                            '입고가': 0, '출고가': 0, 
                            '오더즈': item.ordersCode || '999999', '3코드': item.erp3Code || '999999', '3그룹명': item.c3Name || '기타' 
                        }
                    };
                });
                setManagedItems(newManaged);
                showToast(`✅ ${cartItems.length}개의 템플릿이 시세 관리 큐에 등록되었습니다.`);
                setTimeout(() => handleNavigate(null, 'index.html'), 1000);
            };

            // 수기/BOM 단건 전송 시
            const handleSingleRegister = (newItem) => {
                const newManaged = { ...managedItems, [newItem.코드]: newItem };
                setManagedItems(newManaged);
                setTimeout(() => handleNavigate(null, 'index.html'), 1000);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-slate-100 relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="item-manage" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettings(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate}
                    />
                    
                    <div className="px-8 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between shadow-sm shrink-0">
                        <div className="flex gap-1.5 bg-slate-200/50 p-1.5 rounded-xl border border-slate-200">
                            {[ { id: 'catalog', label: '카탈로그 소싱', icon: "network" }, { id: 'smartform', label: '수기등록', icon: "file-code" }, { id: 'bom', label: 'BOM 조립', icon: "boxes" } ].map(nav => (
                                <button key={nav.id} onClick={() => setViewMode(nav.id)} className={`flex items-center gap-2 px-5 py-1.5 rounded-md text-[13px] font-bold transition-all ${viewMode === nav.id ? 'bg-white text-indigo-700 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <SafeIcon name={nav.icon} size={14} /> {nav.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden relative bg-slate-50 flex flex-col">
                        {viewMode === 'catalog' ? (
                            <CategorySourcingView data={{masterCatalogProducts}} ui={{ showToast }} onRegister={handleCatalogRegister} />
                        ) : viewMode === 'smartform' ? (
                            <SmartFormView data={{masterProducts}} ui={{ showToast }} onRegister={handleSingleRegister} />
                        ) : (
                            <BOMBuilderView data={{masterCatalogProducts}} ui={{ showToast }} onRegister={handleSingleRegister} />
                        )}
                        
                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <MappingCenterModal 
                            onClose={() => setShowSettings(false)} 
                            config={config} 
                            actions={{ cleanUpGarbageTags, handleDeleteTag, showToast, handleClearDB }} 
                            availableCatalogs={availableCatalogs} 
                            availableCategories={availableCategories} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
