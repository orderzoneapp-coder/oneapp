    <!-- 핵심 라이브러리 CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 🌟 Iframe 드로어용 슬라이딩 애니메이션 추가 */
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback, Fragment } = React;

        // ==========================================
        // 🔑 0. Global Constants & URL Config
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            SYNC_TRIGGER: 'merchMaster_sync_trigger'
        };

        // 하얀 화면 방지용 강제 문자열 변환 유틸리티 (추가할 것)
        const safeStr = (val, def = '') => (val !== undefined && val !== null && val !== '') ? String(val) : def;

        const ONEAPP_CATEGORIES = [
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '무우', erp3Code: '11010', orders3Code: '101010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '알타리', erp3Code: '11011', orders3Code: '101011' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '배추', erp3Code: '11012', orders3Code: '101012' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '대파', erp3Code: '11013', orders3Code: '101013' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '마늘', erp3Code: '11014', orders3Code: '101014' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '무/배추/대파/마늘', c2Code: '1010', c3Name: '양파', erp3Code: '11015', orders3Code: '101015' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '감자/고구마/당근', c2Code: '1020', c3Name: '감자', erp3Code: '11020', orders3Code: '102010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '감자/고구마/당근', c2Code: '1020', c3Name: '고구마', erp3Code: '11021', orders3Code: '102011' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '버섯류', c2Code: '1030', c3Name: '새송이버섯', erp3Code: '11030', orders3Code: '103010' },
            { c1Name: '채소.과일', c1Code: '10', c2Name: '버섯류', c2Code: '1030', c3Name: '팽이버섯', erp3Code: '11031', orders3Code: '103011' },
            { c1Name: '수산.축산', c1Code: '20', c2Name: '돼지고기', c2Code: '2010', c3Name: '삼겹살', erp3Code: '21010', orders3Code: '201010' },
            { c1Name: '수산.축산', c1Code: '20', c2Name: '닭고기', c2Code: '2020', c3Name: '생닭', erp3Code: '22010', orders3Code: '202010' },
            { c1Name: '가공.식품', c1Code: '30', c2Name: '면류', c2Code: '3010', c3Name: '라면', erp3Code: '31010', orders3Code: '301010' },
            { c1Name: '가공.식품', c1Code: '30', c2Name: '면류', c2Code: '3010', c3Name: '소면', erp3Code: '31011', orders3Code: '301011' },
            { c1Name: '양념.소스', c1Code: '40', c2Name: '장류', c2Code: '4010', c3Name: '쌈장', erp3Code: '41030', orders3Code: '401030' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '재단비닐', erp3Code: '52056', orders3Code: '502056' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '비닐봉투', erp3Code: '52036', orders3Code: '502036' },
            { c1Name: '주방.잡화', c1Code: '50', c2Name: '일회용품/비닐/호일', c2Code: '5020', c3Name: '단무지비닐', erp3Code: '52044', orders3Code: '502044' }
        ];

        // IndexedDB Wrapper
        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        const generatePseudoSKU = (orders3Code) => {
            const seq = String(Math.floor(100 + Math.random() * 900)); 
            return `${orders3Code || '999999'}${seq}`;
        };

        // ==========================================
        // 🛠 SafeIcon
        // ==========================================
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                        const possibleNames = [
                            kebabName, name, 
                            name === 'cloud-download' ? 'download-cloud' : name,
                            name === 'cloud-upload' ? 'upload-cloud' : name,
                            name === 'sliders-horizontal' ? 'sliders' : name
                        ];
                        for (const pName of possibleNames) {
                            if (window.lucide.icons[pName]) {
                                setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2.5 }));
                                return;
                            }
                        }
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svg) {
                const faMap = {
                    'cloud-download': 'fa-cloud-download-alt', 'cloud-upload': 'fa-cloud-upload-alt', 'settings': 'fa-cogs',
                    'terminal': 'fa-terminal', 'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open',
                    'file-spreadsheet': 'fa-table', 'zap': 'fa-bolt', 'truck': 'fa-truck', 'boxes': 'fa-boxes',
                    'bar-chart-3': 'fa-chart-bar', 'check': 'fa-check', 'check-circle-2': 'fa-check-circle',
                    'x': 'fa-times', 'database': 'fa-database', 'sliders-horizontal': 'fa-sliders-h', 'network': 'fa-sitemap',
                    'file-code': 'fa-file-code', 'plus': 'fa-plus', 'search': 'fa-search',
                    'shopping-cart': 'fa-shopping-cart', 'users': 'fa-users', 'megaphone': 'fa-bullhorn',
                    'pie-chart': 'fa-chart-pie', 'book-open': 'fa-address-book', 'shopping-bag': 'fa-shopping-bag', 'credit-card': 'fa-credit-card', 'line-chart': 'fa-chart-line', 'printer': 'fa-print'
                };
                const faName = faMap[name] || `fa-${name}`;
                return <i className={`fas ${faName} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        // ==========================================
        // 🧩 Read-Only 설정 훅 (v3.0 경량화)
        // ==========================================
        const useMerchConfig = () => {
            const loadConfig = () => {
                // [개선] 앱스스크립트 기본 URL 적용
                const cloudUrl = localStorage.getItem(STORAGE_KEYS.CLOUD_URL) || 'https://script.google.com/macros/s/AKfycbyT3YXvGkbSWswoBDxvVV_1m0Xp2it3QmOezFIfQFBNi0TuGViPH_Jz-A8L2sQz80tW/exec';
                return { cloudUrl };
            };

            const [config, setConfig] = useState(loadConfig());

            useEffect(() => {
                const handleStorageChange = () => setConfig(loadConfig());
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            return config;
        };

        // ==========================================
        // 🧩 통합 글로벌 헤더 (v3.3 최신판 전체 교체)
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, isProcessing, processMsg, onOpenSettings, onPush, onPull, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: 'Dashboard.html', group: 'common', isReady: true, shortTag: 'ONE BOARD' },
                { id: 'guide', label: '시스템 가이드', icon: "book-open", path: 'Guide/guide.html', group: 'common', isReady: true, shortTag: 'SYSTEM GUIDE' },

                { id: 'item-info', label: '마스터 DB', icon: "database", path: 'Master.html', group: 'master', isReady: true, shortTag: 'GOLDEN RECORD' },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: 'Item_manager.html', group: 'master', isReady: true, shortTag: 'SKU FORGE' },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: 'Pipeline.html', group: 'master', isReady: true, shortTag: 'VALUATION HUB' },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: 'Parser.html', group: 'master', isReady: true, shortTag: 'AI SMART PARSER' },
                { id: 'partner-db', label: '거래처 DB', icon: "book-open", path: 'partner_db.html', group: 'master', isReady: true, shortTag: 'ENTITY REGISTRY' },
                { id: 'partners', label: '거래처 관리', icon: "users", path: 'partners.html', group: 'master', isReady: true, shortTag: 'CRM STRATEGY' },

                { id: 'orders', label: '주문 관리', icon: "shopping-bag", path: 'orders.html', group: 'ops', isReady: true, shortTag: 'ORDER STREAM' },
                { id: 'purchases', label: '구매 관리', icon: "credit-card", path: 'purchases.html', group: 'ops', isReady: true, shortTag: 'SOURCE & PROCURE' },
                { id: 'sales', label: '판매 관리', icon: "line-chart", path: 'sales.html', group: 'ops', isReady: true, shortTag: 'REVENUE LEDGER' },
                { id: 'inventory', label: '재고 마감', icon: "boxes", path: 'inventory.html', group: 'ops', isReady: true, shortTag: 'STOCK LEDGER' },
                { id: 'print-center', label: '출력 센터', icon: "printer", path: 'print_center.html', group: 'ops', isReady: true, shortTag: 'OUTPUT TERMINAL' },

                { id: 'insight', label: '경영 보고서', icon: "pie-chart", path: 'Report.html', group: 'admin', isReady: true, shortTag: 'INSIGHT ENGINE' },
                { id: 'cs', label: '정보 마당', icon: "megaphone", path: 'cs.html', group: 'admin', isReady: true, shortTag: 'NOTICE PORTAL' }
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common';
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            const handleGroupClick = (groupId) => setSelectedGroup(prev => prev === groupId ? 'common' : groupId);
            const handleLogoClick = (e) => { setSelectedGroup('common'); onNavigate(e, 'Dashboard.html', true); };

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={handleLogoClick} title="통합 대시보드 및 공통 메뉴로 이동">
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v3.3</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">
                                        {currentTab ? currentTab.shortTag : 'WORKSPACE'}
                                    </span>
                                </div>
                            </div>

                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => handleGroupClick(g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-3">
                                <div className="flex items-center justify-center" title={isProcessing ? processMsg : "시스템 정상 대기중"}>
                                    {isProcessing ? (
                                        <i className="fas fa-circle-notch fa-spin text-amber-500 text-[12px]"></i>
                                    ) : (
                                        <div className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </div>
                                    )}
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-300 cursor-help" title={`마스터 DB 기준 데이터 수`}>
                                    <SafeIcon name="database" size={10} className="text-slate-500" />
                                    <span className="text-[11px] font-mono font-bold tracking-tight">{itemCount ? itemCount.toLocaleString() : 0}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button onClick={onPull} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 불러오기(Pull)"><SafeIcon name="cloud-download" size={18} /></button>
                                <button onClick={onPush} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-indigo-400 shadow-sm" title="데이터 백업하기(Push)"><SafeIcon name="cloud-upload" size={18} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={onOpenSettings} className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 hover:text-white shadow-sm" title="통합 환경설정 센터 열기"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-6 pt-3 flex items-end gap-1 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                const isPlaceholder = !tab.isReady;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path, tab.isReady)}
                                        className={`flex items-center gap-2 px-6 py-3 text-[14px] font-bold rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px]
                                        ${isActive
                                            ? 'bg-white text-indigo-600 border-t-indigo-500 border-x-slate-200 relative z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]'
                                            : isPlaceholder
                                                ? 'bg-[#151B2B] text-slate-500 border-t-transparent border-x-transparent cursor-not-allowed opacity-50 pb-2.5'
                                                : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:text-slate-200 pb-2.5'
                                        }`}
                                        style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}
                                    >
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 🌟 IframeSettingsModal (Wide Overlay) 적용
        // ==========================================
        const IframeSettingsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[500] flex bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="w-full max-w-[1400px] h-full bg-white shadow-[-10px_0_40px_rgba(0,0,0,0.3)] flex flex-col slide-in-right border-l border-slate-300 relative overflow-hidden ml-auto">
                        <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white shrink-0 border-b border-slate-700 shadow-md relative z-10">
                            <div className="flex items-center gap-3">
                                <SafeIcon name="settings" size={20} className="text-indigo-400"/>
                                <h2 className="font-black text-[17px] tracking-wide">통합 환경설정 센터</h2>
                                <span className="bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/30 ml-2">Wide Overlay</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-[12px] text-slate-400 font-medium hidden md:inline-block">설정을 변경하고 창을 닫으면 작업 화면에 즉시 반영됩니다.</span>
                                <button onClick={onClose} className="text-slate-300 hover:text-white transition-colors bg-slate-800 hover:bg-rose-500 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm border border-slate-700 hover:border-rose-400">
                                    <SafeIcon name="x" size={18} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 w-full bg-slate-100 relative">
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div className="text-slate-300 flex flex-col items-center">
                                    <i className="fas fa-circle-notch fa-spin text-3xl mb-3"></i>
                                    <span className="font-bold text-sm">설정 모듈을 불러오는 중입니다...</span>
                                </div>
                            </div>
                            <iframe src="settings.html?mode=iframe" className="absolute inset-0 w-full h-full border-0 bg-white relative z-10" title="Settings Center"></iframe>

        // ==========================================
        // 🧩 Sub Views: Smart Form (수기등록)
        // ==========================================
        const SmartFormView = ({ data, ui, onRegister }) => {
            const showToast = ui?.showToast;
            
            const [keyword, setKeyword] = useState('');
            const [selectedCat, setSelectedCat] = useState(null);
            const [formData, setFormData] = useState({ name: '', spec: '', inPrice: '', outPrice: '', vendor: '' });
            const [previewSku, setPreviewSku] = useState('');

            const fuse = useMemo(() => new Fuse(ONEAPP_CATEGORIES, { keys: [{ name: 'c3Name', weight: 0.7 }, { name: 'c2Name', weight: 0.2 }, { name: 'c1Name', weight: 0.1 }], threshold: 0.3 }), []);

            const handleSelectCategory = (cat) => {

                                                            <div className="text-[15px] font-bold text-slate-800 group-hover:text-indigo-700">{cat.c3Name}</div>
                                                            <div className="text-xs text-slate-500 mt-1 flex items-center gap-1.5"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">{cat.c1Name}</span><i className="fas fa-chevron-right text-[8px] text-slate-300"></i><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">{cat.c2Name}</span><i className="fas fa-chevron-right text-[8px] text-slate-300"></i><span className="font-medium text-slate-700">{cat.c3Name}</span></div>
                                                        </div>
                                                        <div className="text-[10px] font-mono text-slate-400 text-right"><div>오더즈: <span className="font-bold text-slate-500">{cat.orders3Code}</span></div><div className="mt-0.5">ERP: {cat.erp3Code}</div></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex justify-between items-center bg-indigo-50 border-2 border-indigo-200 px-5 py-4 rounded-lg mt-2">
                                        <div><div className="text-[15px] font-bold text-indigo-900 mb-1">{selectedCat.c3Name}</div><div className="text-xs font-medium text-indigo-500 flex items-center gap-1">{selectedCat.c1Name} <i className="fas fa-chevron-right text-[8px] opacity-50"></i> {selectedCat.c2Name}</div></div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right"><div className="text-[10px] text-indigo-400 font-bold mb-0.5 uppercase tracking-wider">Generated SKU</div><div className="text-sm font-mono font-black text-indigo-700 bg-white px-2 py-1 rounded shadow-sm border border-indigo-100">{previewSku}</div></div>
                                            <button onClick={()=>{setSelectedCat(null); setKeyword(''); setPreviewSku('');}} className="w-8 h-8 rounded-full bg-white text-indigo-400 hover:text-indigo-600 hover:bg-indigo-100 flex items-center justify-center transition-colors border border-indigo-100 shadow-sm" title="카테고리 변경"><i className="fas fa-sync-alt text-xs"></i></button>
                                        </div>

        // ==========================================
        // 🧩 Sub Views: BOM Builder
        // ==========================================
        const BOMBuilderView = ({ data, ui, onRegister }) => {
            const masterCatalogProducts = data?.masterCatalogProducts || [];
            const showToast = ui?.showToast;
            
            const [bomList, setBomList] = useState([]);
            const [bomName, setBomName] = useState('');
            const [bomSpec, setBomSpec] = useState('');
            const [searchKw, setSearchKw] = useState('');

            const searchResults = useMemo(() => {
                if(masterCatalogProducts.length === 0) return [];
                if(!searchKw.trim()) return masterCatalogProducts.slice(0, 50);
                const fuse = new Fuse(masterCatalogProducts, { keys: ['name', 'keywords', 'code', 'id'], threshold: 0.3 });
                return fuse.search(searchKw).map(r => r.item).slice(0, 50);
            }, [searchKw, masterCatalogProducts]);

            const addToBom = (item) => { if(!bomList.find(b => b.id === item.id)) setBomList([...bomList, { ...item, qty: 1 }]); };
            const updateQty = (id, delta) => setBomList(bomList.map(b => b.id === id ? { ...b, qty: Math.max(1, b.qty + delta) } : b));
            const removeFromBom = (id) => setBomList(bomList.filter(b => b.id !== id));
            const totalCost = bomList.reduce((sum, item) => sum + ((item.basePrice || 0) * item.qty), 0);

            const handleSubmit = () => {
                if(bomList.length < 2) return showToast('⚠️ 상품을 2개 이상 선택하세요.');
                if(!bomName) return showToast('⚠️ 세트 상품명을 입력하세요.');
                const pseudoSKU = `BOM-${Date.now().toString().slice(-6)}`;
                const newItem = {
                    코드: pseudoSKU,
                    sources: { 'bom': { '품목명': bomName, '규격': bomSpec, '입고가': totalCost, '간단설명': `구성: ${bomList.map(b=>b.name).join(', ')}` } },
                    finalData: { '품목명': bomName, '규격': bomSpec, '입고가': totalCost, '간단설명': `구성: ${bomList.map(b=>b.name).join(', ')}`, '오더즈': '999999', '3코드': '999999', '3그룹명': '기획세트' }
                };
                onRegister(newItem);
                showToast(`✅ [${bomName}] 기획 SKU가 발급되었습니다.`);
                setBomList([]); setBomName(''); setBomSpec('');

            return (

                            <div className="relative"><input type="text" value={searchKw} onChange={e=>setSearchKw(e.target.value)} placeholder="상품 검색 후 우측 세트에 추가..." className="w-full pl-9 pr-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /><i className="fas fa-search absolute left-3 top-2.5 text-slate-400"></i></div>

                            <div className="grid grid-cols-1 gap-2">
                                {masterCatalogProducts.length === 0 ? (

                        <div className="bg-slate-50 px-5 py-4 border-b border-gray-200 flex items-center justify-between shrink-0">
                            <div><h2 className="text-sm font-bold text-slate-900">2. BOM 세트 조립기</h2><p className="text-xs text-slate-500 mt-1">선택된 단품의 매입가를 순수 합산합니다.</p></div>
                            <div className="bg-white px-3 py-2 rounded border border-gray-200 shadow-sm text-right"><div className="text-xs font-bold text-slate-500">합산 매입가</div><div className="text-lg font-black text-slate-900">{totalCost.toLocaleString()} <span className="text-sm font-normal">원</span></div></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            <div className="space-y-3">
                                {bomList.length === 0 ? (
                                    <div className="h-full flex flex-col justify-center items-center text-slate-400 py-20">
                                        <i className="fas fa-boxes text-3xl mb-3 text-slate-300"></i><p className="text-sm font-medium">좌측에서 구성품을 담아주세요.</p>
                                    </div>
                                ) : bomList.map((item, idx) => (
                                    <div key={item.id} className="bg-white border border-gray-200 p-3 rounded flex items-center justify-between fade-in shadow-sm group">
                                        <div className="flex items-center gap-3 min-w-0"><div className="w-6 h-6 rounded bg-slate-100 text-slate-600 flex items-center justify-center text-xs font-bold">{idx+1}</div><div className="flex flex-col min-w-0"><span className="text-sm font-bold text-slate-800 truncate">{item.name}</span><span className="text-xs text-slate-500 mt-0.5">{item.spec} | {Number(item.basePrice||0).toLocaleString()}원</span></div></div>
                                        <div className="flex items-center gap-4 shrink-0">
                                            <div className="flex items-center bg-slate-50 rounded border border-gray-200"><button onClick={()=>updateQty(item.id, -1)} className="w-7 h-7 text-slate-500 hover:bg-slate-200">-</button><div className="w-8 text-center text-xs font-bold">{item.qty}</div><button onClick={()=>updateQty(item.id, 1)} className="w-7 h-7 text-slate-500 hover:bg-slate-200">+</button></div>
                                            <div className="w-16 text-right text-sm font-bold text-slate-700">{((item.basePrice||0)*item.qty).toLocaleString()}</div><button onClick={()=>removeFromBom(item.id)} className="text-slate-400 hover:text-red-500 w-6 h-6 flex items-center justify-center rounded hover:bg-red-50 transition-colors"><i className="fas fa-times"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-slate-50 p-5 border-t border-gray-200 shrink-0">
                            <div className="flex gap-3 mb-4">
                                <div className="flex-1"><label className="text-xs font-bold text-slate-700 mb-1.5 block">기획(세트) 품목명</label><input type="text" value={bomName} onChange={e=>setBomName(e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /></div>
                                <div className="w-1/3"><label className="text-xs font-bold text-slate-700 mb-1.5 block">규격</label><input type="text" value={bomSpec} onChange={e=>setBomSpec(e.target.value)} placeholder="예: 1세트" className="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm outline-none focus:border-indigo-500" /></div>
                            </div>
                            <button onClick={handleSubmit} disabled={bomList.length < 2 || !bomName} className={`w-full py-3 rounded-lg font-bold text-sm shadow-md transition-all ${bomList.length >= 2 && bomName ? 'bg-[#0B1021] text-white hover:bg-black hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'}`}>세트 SKU 발급 및 대기열 전송</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ⚙️ 6. Main App Container
        // ==========================================
        function App() {
            const config = useMerchConfig();
            const [viewMode, setViewMode] = useState('catalog'); 
            const [toastMsg, setToastMsg] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [processMsg, setProcessMsg] = useState('');
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            
            const [masterProducts, setMasterProducts] = useState({});
            const [managedItems, setManagedItems] = useState({});
            const [masterCatalogProducts, setMasterCatalogProducts] = useState([]);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = useCallback((e, path, isReady = true) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!isReady || path === '#') { showToast(`⚠️ [${path}] 페이지는 아직 준비 중입니다.`); return; }
                try {
                    const protocol = window.location.protocol;
                    if (protocol === 'about:' || protocol === 'blob:' || protocol === 'data:') {
                        showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                    } else {
                        window.location.href = path;
                    }
                } catch (err) {
                    showToast(`💡 미리보기 환경: [${path}] 로 이동을 시뮬레이션 합니다.`);
                }
            }, [showToast]);

            // [개선] Push 로직: Delta Sync 적용 (Master.html 과 동일하게 수정 내용만 전송)
            const handlePush = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");

                const unsyncedMaster = await getIDB('merchUnsyncedMaster_v1') || {};
                const unsyncedHistory = await getIDB('merchUnsyncedHistory_v1') || [];
                const unsyncedDeletes = await getIDB('merchUnsyncedDeletes_v1') || [];

                if (Object.keys(unsyncedMaster).length === 0 && unsyncedHistory.length === 0 && unsyncedDeletes.length === 0) {
                    return showToast("⚠️ 클라우드에 새로 반영할 변경사항이 없습니다.");
                }

                setIsProcessing(true); setProcessMsg("클라우드 서버로 데이터를 전송 중...");
                
                try {
                    const response = await fetch(config.cloudUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // CORS 에러 방지용 text/plain
                        body: JSON.stringify({
                            action: 'pushData',
                            masterDelta: unsyncedMaster,
                            historyDelta: unsyncedHistory,
                            deletedCodes: unsyncedDeletes
                        })
                    });

                    const result = await response.json();
                    if (result.status === 'success') {
                        // 성공적으로 보내면 큐 비우기
                        await setIDB('merchUnsyncedMaster_v1', {});
                        await setIDB('merchUnsyncedHistory_v1', []);
                        await setIDB('merchUnsyncedDeletes_v1', []);
                        showToast(`✅ 클라우드 동기화 완료 (수정 ${Object.keys(unsyncedMaster).length}건, 삭제 ${unsyncedDeletes.length}건, 이력 ${unsyncedHistory.length}건)`);
                    } else {
                        throw new Error(result.message || '서버 응답 오류');
                    }
                } catch (err) {
                    console.error("Push Error:", err);
                    showToast("❌ 클라우드 백업 실패: " + err.message);
                } finally {
                    setIsProcessing(false); setProcessMsg("");
                }
            };

            // [개선] Pull 로직: 최신 마스터 데이터 내려받기
            const handlePull = async () => {
                if (!config.cloudUrl) return showToast("⚠️ 환경설정에서 앱스크립트 URL을 입력하세요.");
                setIsProcessing(true); setProcessMsg("클라우드에서 최신 데이터를 수신 중...");
                
                try {
                    const response = await fetch(`${config.cloudUrl}?action=pullData`, {
                        method: 'GET',
                        cache: 'no-cache'
                    });
                    
                    if (!response.ok) throw new Error('Network error');
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        if (result.master) {
                            setMasterProducts(result.master);
                            await setIDB(STORAGE_KEYS.MASTER_DB, result.master);
                        }
                        if (result.history) {
                            await setIDB('merchHistory_v870', result.history);
                        }
                        // 수신 성공 시 로컬 트리거 발동 및 리로드
                        localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString());
                        loadMaster();
                        showToast(`✅ 클라우드 수신 완료 (마스터 ${Object.keys(result.master || {}).length}건)`);
                    } else {
                        throw new Error(result.message || '서버 응답 오류');
                    }
                } catch (error) {
                    console.error("Pull Error:", error);
                    showToast("❌ 데이터 수신 실패. URL을 확인하세요.");
                } finally {
                    setIsProcessing(false); setProcessMsg("");
                }
            };

            const loadMaster = useCallback(() => {
                getIDB(STORAGE_KEYS.MASTER_DB).then(data => { 
                    if (data) {
                        setMasterProducts(data); 
                        const catalogArr = Object.values(data).map(row => ({
                            id: row['품목코드'] || row['코드'] || `TEMP-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                            c1Code: String(row['1코드'] || '').trim(),
                            c1Name: row['1그룹명'] || '기타',
                            c2Code: String(row['2코드'] || '').trim(),
                            c2Name: row['2그룹명'] || '기타',
                            c3Code: String(row['3코드'] || '').trim(),
                            c3Name: row['3그룹명'] || '기타',
                            ordersCode: String(row['오더즈'] || '').trim(),
                            name: row['품목명'] || '',
                            spec: row['규격'] || '',
                            basePrice: parseNum(row['입고가'] || row['출고가'] || 0)
                        })).filter(p => p.name);
                        setMasterCatalogProducts(catalogArr);
                    }
                }).catch(console.error);

                // [개선] 로컬 DB 용량 관리 (최근 1000개 이력만 유지)
                getIDB('merchHistory_v870').then(oldLogs => {
                    if (oldLogs && oldLogs.length > 1000) {
                        setIDB('merchHistory_v870', oldLogs.slice(-1000));
                    }
                });
            }, []);

            useEffect(() => {
                loadMaster();
                getIDB('merchPipeline_Managed_v2').then(data => { if (data) setManagedItems(data); }).catch(console.error);

                const handleStorageChange = (e) => {
                    if (e.key === STORAGE_KEYS.SYNC_TRIGGER) {
                        loadMaster();
                    }
                };
                window.addEventListener('storage', handleStorageChange);
                
                // 🌟 Iframe 메시지 수신 (설정창 닫힘 감지)
                const handleMessage = (e) => {
                    if (e.data && e.data.type === 'CLOSE_SETTINGS') {
                        setShowSettingsModal(false);
                        loadMaster(); 
                    }
                };
                window.addEventListener('message', handleMessage);

                return () => {
                    window.removeEventListener('storage', handleStorageChange);
                    window.removeEventListener('message', handleMessage);
                };
            }, [loadMaster]);

            useEffect(() => {
                if (Object.keys(managedItems).length > 0) {
                    setIDB('merchPipeline_Managed_v2', managedItems).catch(console.error);
                }
            }, [managedItems]);

            // 카탈로그에서 다수 항목 전송 시 (Pipeline 관리 대기열로 넘김)
            const handleCatalogRegister = (cartItems, activeC1) => {
                let currentCounter = 1;
                const newManaged = { ...managedItems };
                
                cartItems.forEach(item => {
                    const seq = String(currentCounter++).padStart(3, '0');
                    const catPrefix = activeC1 === '10' ? 'C1' : activeC1 === '20' ? 'F1' : activeC1 === '30' ? 'F2' : activeC1 === '40' ? 'S1' : 'E1';
                    const newSku = `SHOP-${catPrefix}-${new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }).replace(/\./g, '').replace(/\s/g, '')}-${seq}`;
                    
                    newManaged[newSku] = {
                        코드: newSku,
                        sources: { 'catalog': { ...item } },
                        finalData: { 
                            '품목명': '', '규격': '', '구매처': '자체조달',
                            '입고가': 0, '출고가': 0, 
                            '오더즈': item.ordersCode || '999999', '3코드': item.erp3Code || '999999', '3그룹명': item.c3Name || '기타' 
                        }
                    };
                });
                setManagedItems(newManaged);
                showToast(`✅ ${cartItems.length}개의 템플릿이 시세 관리 큐에 등록되었습니다.`);
                setTimeout(() => handleNavigate(null, 'Pipeline.html'), 1000);
            };

            // 수기/BOM 단건 전송 시 (Pipeline 관리 대기열로 넘김)
            const handleSingleRegister = (newItem) => {
                const newManaged = { ...managedItems, [newItem.코드]: newItem };
                setManagedItems(newManaged);
                setTimeout(() => handleNavigate(null, 'Pipeline.html'), 1000);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-[#f1f5f9] relative shadow-2xl border-x border-slate-300 select-none">
                    <GlobalHeader 
                        activeTab="item-manage" 
                        itemCount={Object.keys(masterProducts).length} 
                        isProcessing={isProcessing} 
                        processMsg={processMsg}
                        onOpenSettings={() => setShowSettingsModal(true)}
                        onPush={handlePush}
                        onPull={handlePull}
                        onNavigate={handleNavigate}
                    />
                    
                    <div className="px-8 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between shadow-sm shrink-0">
                        <div className="flex gap-1.5 bg-slate-200/50 p-1.5 rounded-xl border border-slate-200">
                            {[ { id: 'catalog', label: '카탈로그 소싱', icon: "network" }, { id: 'smartform', label: '수기등록', icon: "file-code" }, { id: 'bom', label: 'BOM 조립', icon: "boxes" } ].map(nav => (
                                <button key={nav.id} onClick={() => setViewMode(nav.id)} className={`flex items-center gap-2 px-5 py-1.5 rounded-md text-[13px] font-bold transition-all ${viewMode === nav.id ? 'bg-white text-indigo-700 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <SafeIcon name={nav.icon} size={14} /> {nav.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden relative bg-slate-50 flex flex-col">
                        {viewMode === 'catalog' ? (
                            <CategorySourcingView data={{masterCatalogProducts}} ui={{ showToast }} onRegister={handleCatalogRegister} />
                        ) : viewMode === 'smartform' ? (
                            <SmartFormView data={{masterProducts}} ui={{ showToast }} onRegister={handleSingleRegister} />
                        ) : (
                            <BOMBuilderView data={{masterCatalogProducts}} ui={{ showToast }} onRegister={handleSingleRegister} />
                        )}
                        
                        {toastMsg && (
                            <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                                <SafeIcon name="check-circle-2" size={18} className="text-emerald-400" />
                                <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                            </div>
                        )}
                    </main>

                    {/* 🌟 Iframe Overlay 로 설정 모달 표시 */}
                    <IframeSettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                </div>
            );
        }

        // ErrorBoundary (하얀 화면 방지 로직)
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50 p-6">
                            <i className="fas fa-exclamation-triangle text-rose-500 text-6xl mb-6"></i>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">화면 렌더링 오류 발생 (Crash)</h1>
                            <p className="text-slate-500 mb-6 text-center">
                                불러온 데이터 중 잘못된 형식(숫자 등)이 섞여있어 화면이 중단되었습니다.<br/>
                                아래 [초기화] 버튼을 눌러 복구해 주세요.
                            </p>
                            <div className="bg-white border border-rose-200 p-4 rounded-lg text-xs font-mono text-rose-600 w-full max-w-2xl overflow-auto mb-8 shadow-sm">
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <button
                                onClick={() => {
                                    indexedDB.deleteDatabase('MerchOpsDB');
                                    localStorage.removeItem('merchMaster_v870');
                                    window.location.reload();
                                }}
                                className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-lg flex items-center gap-2"
                            >
                                <i className="fas fa-redo-alt"></i> 로컬 데이터 초기화 및 복구하기
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
