<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP NEXES - Pipeline Manager [v2.0]</title>
    <!-- 핵심 라이브러리 CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core & FontAwesome -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-user-select: none; user-select: none; background-color: #f8fafc; margin: 0; }
        input, textarea, select { user-select: auto; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { box-shadow: inset 0 0 0 1px #e2e8f0; }
        .sticky-col { position: sticky; left: 0; background-color: inherit; z-index: 10; box-shadow: inset -1px 0 0 #e2e8f0; }
        .th-sticky { position: sticky; top: 0; z-index: 20; }
        .th-sticky-col { z-index: 30; }
    </style>
</head>
<body class="overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // ==========================================
        // 🔑 0. Global Constants & Storage Config
        // ==========================================
        const STORAGE_KEYS = {
            MASTER_DB: 'merchMaster_v870',
            MANAGED_ITEMS: 'merchPipeline_Managed_v2', // 대기열
            SYNC_TRIGGER: 'merchMaster_sync_trigger',
            CLOUD_URL: 'skuSyncCloudUrl_v6',
            MARGIN_RULES: 'merchMarginRules_v878'
        };

        // ==========================================
        // 🛠 1. Utilities & IDB
        // ==========================================
        const parseNum = (v) => (!v ? 0 : Number(String(v).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0);
        
        const SafeIcon = React.memo(function SafeIconComponent({ name, size = 18, className = "" }) {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    const pName = kebabName === 'cloud-download' ? 'download-cloud' : kebabName === 'cloud-upload' ? 'upload-cloud' : kebabName === 'sliders-horizontal' ? 'sliders' : kebabName;
                    if (window.lucide.icons[pName]) {
                        setSvg(window.lucide.icons[pName].toSvg({ width: size, height: size, class: className, 'stroke-width': 2 }));
                        return;
                    }
                }
            }, [name, size, className]);

            if (!svg) {
                const faMap = { 'layout-dashboard': 'fa-th-large', 'package-search': 'fa-box-open', 'file-spreadsheet': 'fa-table', 'zap': 'fa-bolt', 'truck': 'fa-truck', 'bar-chart-3': 'fa-chart-bar', 'database': 'fa-database', 'settings': 'fa-cogs', 'cloud-upload': 'fa-cloud-upload-alt', 'cloud-download': 'fa-cloud-download-alt', 'play': 'fa-play', 'save': 'fa-save', 'trash': 'fa-trash', 'check-square': 'fa-check-square', 'square': 'fa-square' };
                return <i className={`fas ${faMap[name] || `fa-${name}`} ${className}`} style={{ fontSize: size }} />;
            }
            return <span className="inline-flex shrink-0 items-center justify-center" dangerouslySetInnerHTML={{ __html: svg }} />;
        });

        const initIDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('MerchOpsDB', 1);
            request.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
        const setIDB = async (key, val) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readwrite'); tx.objectStore('store').put(val, key); tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); };
        const getIDB = async (key) => { const db = await initIDB(); return new Promise((resolve, reject) => { const tx = db.transaction('store', 'readonly'); const req = tx.objectStore('store').get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(tx.error); }); };

        // ==========================================
        // 🧩 2. Global Header Component
        // ==========================================
        const GlobalHeader = ({ activeTab, itemCount, pipelineCount, onNavigate }) => {
            const groups = [
                { id: 'master', label: '정보 관리', icon: 'database' },
                { id: 'ops', label: '운영 관리', icon: 'truck' },
                { id: 'admin', label: '인사이트', icon: 'bar-chart-3' }
            ];

            const tabs = [
                { id: 'dashboard', label: '통합 대시보드', icon: "layout-dashboard", path: '/NEXUS/Dashboard', group: 'common', isReady: true },
                { id: 'item-info', label: '마스터 DB', icon: "database", path: '/NEXUS/Master', group: 'master', isReady: true },
                { id: 'item-manage', label: '상품 관리', icon: "package-search", path: '/NEXUS/Item_manager', group: 'master', isReady: true },
                { id: 'pipeline', label: '시세 관리', icon: "file-spreadsheet", path: '/NEXUS/Pipeline', group: 'master', isReady: true },
                { id: 'parser', label: '스마트 파서', icon: "zap", path: '/NEXUS/Parser', group: 'master', isReady: true },
            ];

            const currentTab = tabs.find(t => t.id === activeTab);
            const activeGroup = currentTab ? currentTab.group : 'common'; 
            const [selectedGroup, setSelectedGroup] = useState(activeGroup);

            return (
                <div className="flex flex-col shrink-0 z-40 relative w-full shadow-sm bg-[#0B1021]">
                    <header className="h-[72px] bg-[#0B1021] text-white flex justify-between px-6 border-b border-slate-800/80 relative z-20">
                        <div className="flex items-center h-full">
                            <div className="flex items-center cursor-pointer group mr-10 h-full" onClick={(e) => onNavigate(e, '/NEXUS/Dashboard')}>
                                <span className="font-black text-[24px] tracking-wider text-slate-100 mr-4 group-hover:text-indigo-400 transition-colors">ONEAPP</span>
                                <div className="flex flex-col border-l-2 border-slate-700/70 pl-4 py-0.5">
                                    <div className="flex items-center">
                                        <span className="font-black text-[16px] leading-none text-indigo-400 tracking-widest uppercase mt-0.5">NEXES</span>
                                        <span className="ml-2.5 bg-emerald-500/10 border border-emerald-400/30 text-emerald-400 px-[5px] py-[2px] rounded text-[9px] font-black tracking-wider shadow-sm leading-none">v2.0</span>
                                    </div>
                                    <span className="text-[10px] text-slate-400/90 font-medium tracking-[0.15em] mt-1 uppercase">PIPELINE OPS</span>
                                </div>
                            </div>
                            <div className="flex items-end h-full gap-8">
                                {groups.map(g => (
                                    <button key={g.id} onClick={() => setSelectedGroup(prev => prev === g.id ? 'common' : g.id)}
                                        className={`pb-[16px] text-[14px] font-bold transition-colors flex items-center gap-1.5
                                        ${selectedGroup === g.id ? 'text-slate-100 border-b-[3px] border-indigo-500 -mb-[2px]' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <SafeIcon name={g.icon} size={15} /> {g.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex items-center gap-4 h-full">
                            <div className="flex items-center bg-[#151B2B] rounded-lg border border-slate-700/50 h-9 px-3 shadow-inner gap-4">
                                <div className="flex items-center gap-1.5 text-indigo-400" title="파이프라인 대기열 (작업 대상)">
                                    <i className="fas fa-layer-group text-[10px]"></i>
                                    <span className="text-[11px] font-mono font-bold tracking-tight">대기: {pipelineCount.toLocaleString()}</span>
                                </div>
                                <div className="w-px h-3.5 bg-slate-700"></div>
                                <div className="flex items-center gap-1.5 text-slate-400" title="마스터 DB 저장된 상품 수">
                                    <i className="fas fa-database text-[10px]"></i>
                                    <span className="text-[11px] font-mono font-bold tracking-tight">DB: {itemCount.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button className="w-10 h-10 rounded-xl bg-[#151B2B] hover:bg-[#1E293B] flex items-center justify-center border border-slate-700 transition-colors text-slate-400 shadow-sm" title="설정 (글로벌 셋팅은 상품관리 화면에서)"><SafeIcon name="settings" size={18} /></button>
                            </div>
                        </div>
                    </header>
                    {selectedGroup && (
                        <div className="bg-[#0B1021] px-8 pt-4 flex items-end gap-2 overflow-x-auto custom-scrollbar border-b border-slate-200 fade-in">
                            {tabs.filter(t => t.group === selectedGroup).map(tab => {
                                const isActive = activeTab === tab.id;
                                return (
                                    <a key={tab.id} href={tab.path} onClick={(e) => onNavigate(e, tab.path)}
                                        className={`flex items-center gap-2 px-6 py-3 text-[14px] font-black rounded-t-xl transition-all whitespace-nowrap border-x border-t-[3px] 
                                        ${isActive ? 'bg-slate-50 text-indigo-700 border-t-indigo-600 border-x-slate-200 relative z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]' : 'bg-[#151B2B] text-slate-400 border-t-transparent border-x-transparent hover:bg-[#1E293B] hover:text-slate-200 pb-2.5'}`}
                                        style={{ marginBottom: isActive ? '-1px' : '0', paddingBottom: isActive ? '13px' : '10px' }}>
                                        <SafeIcon name={tab.icon} size={16} className={isActive ? 'text-indigo-600' : 'opacity-70'} />
                                        {tab.label}
                                    </a>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // ⚙️ 3. Main Application (Pipeline)
        // ==========================================
        function App() {
            const [toastMsg, setToastMsg] = useState('');
            const [masterData, setMasterData] = useState({});
            const [pipelineData, setPipelineData] = useState({});
            const [marginRules, setMarginRules] = useState([]);
            
            // Grid State
            const [selectedCodes, setSelectedCodes] = useState(new Set());
            const [globalSearch, setGlobalSearch] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }, []);

            const handleNavigate = (e, path) => {
                if(e) e.preventDefault();
                showToast(`💡 미리보기 환경: [${path}] 로 이동 시뮬레이션.`);
            };

            // 데이터 로드
            const loadData = useCallback(async () => {
                try {
                    const mDB = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    const pDB = await getIDB(STORAGE_KEYS.MANAGED_ITEMS) || {};
                    setMasterData(mDB);
                    setPipelineData(pDB);

                    const sRules = localStorage.getItem(STORAGE_KEYS.MARGIN_RULES);
                    if(sRules) {
                        try { setMarginRules(JSON.parse(sRules)); } catch(e){}
                    } else {
                        setMarginRules([{ id: 'default', whCode: '*', unit: '*', rate: 20, type: 'divide' }]);
                    }
                } catch (err) {
                    console.error("데이터 로드 실패:", err);
                    showToast("⚠️ 데이터 로드에 실패했습니다.");
                }
            }, [showToast]);

            useEffect(() => {
                loadData();
                const handleStorageChange = (e) => { if (e.key === STORAGE_KEYS.SYNC_TRIGGER) loadData(); };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [loadData]);

            // 필터링된 파이프라인 리스트
            const pipelineList = useMemo(() => {
                let list = Object.values(pipelineData);
                if (globalSearch.trim()) {
                    const kw = globalSearch.toLowerCase().trim();
                    list = list.filter(item => 
                        (item.finalData?.품목명 || '').toLowerCase().includes(kw) ||
                        (item.코드 || '').toLowerCase().includes(kw)
                    );
                }
                // 등록일/수정일 기준 역순 정렬 (임시)
                return list.sort((a, b) => (b.코드 > a.코드 ? 1 : -1));
            }, [pipelineData, globalSearch]);

            const isAllSelected = pipelineList.length > 0 && selectedCodes.size === pipelineList.length;

            const toggleSelectAll = () => {
                if (isAllSelected) setSelectedCodes(new Set());
                else setSelectedCodes(new Set(pipelineList.map(item => item.코드)));
            };

            const toggleSelect = (code) => {
                const newSet = new Set(selectedCodes);
                if (newSet.has(code)) newSet.delete(code);
                else newSet.add(code);
                setSelectedCodes(newSet);
            };

            // 단가 업데이트 (인라인 편집)
            const handlePriceChange = (code, field, value) => {
                const numVal = parseNum(value);
                setPipelineData(prev => ({
                    ...prev,
                    [code]: {
                        ...prev[code],
                        finalData: { ...prev[code].finalData, [field]: numVal }
                    }
                }));
            };

            const handleTextChange = (code, field, value) => {
                setPipelineData(prev => ({
                    ...prev,
                    [code]: {
                        ...prev[code],
                        finalData: { ...prev[code].finalData, [field]: value }
                    }
                }));
            };

            // 마진 룰 일괄 적용
            const applyMarginRulesToSelected = () => {
                if (selectedCodes.size === 0) return showToast("⚠️ 선택된 항목이 없습니다.");
                
                let updatedData = { ...pipelineData };
                let appliedCount = 0;

                selectedCodes.forEach(code => {
                    const item = updatedData[code];
                    if (!item || !item.finalData) return;
                    
                    const inPrice = parseNum(item.finalData['입고가']);
                    if (inPrice <= 0) return; // 입고가가 없으면 적용 불가

                    const spec = String(item.finalData['규격'] || '').toLowerCase();
                    const whCode = '*'; // 임시로 전체 적용 (확장 가능)

                    // 룰 매칭 (단위, 창고코드)
                    let matchedRule = marginRules.find(r => r.id !== 'default' && spec.includes((r.unit || '').toLowerCase()) && (r.whCode === '*' || r.whCode === whCode));
                    if (!matchedRule) matchedRule = marginRules.find(r => r.id === 'default');

                    if (matchedRule) {
                        let newOutPrice = 0;
                        if (matchedRule.type === 'divide') {
                            newOutPrice = Math.round(inPrice / (1 - (matchedRule.rate / 100)));
                        } else {
                            newOutPrice = Math.round(inPrice * (1 + (matchedRule.rate / 100)));
                        }
                        
                        // 10원 단위 반올림/올림 처리 (실무 적용)
                        newOutPrice = Math.ceil(newOutPrice / 10) * 10;

                        updatedData[code] = {
                            ...item,
                            finalData: { ...item.finalData, '출고가': newOutPrice, '_마진룰': matchedRule.rate }
                        };
                        appliedCount++;
                    }
                });

                setPipelineData(updatedData);
                setIDB(STORAGE_KEYS.MANAGED_ITEMS, updatedData); // 바로 저장
                showToast(`✅ ${appliedCount}개 항목에 자동 마진이 적용되었습니다.`);
            };

            // 마스터 DB로 이관 (Commit)
            const commitSelectedToMaster = async () => {
                if (selectedCodes.size === 0) return showToast("⚠️ 선택된 항목이 없습니다.");
                setIsSaving(true);
                
                try {
                    const currentMaster = await getIDB(STORAGE_KEYS.MASTER_DB) || {};
                    let newMaster = { ...currentMaster };
                    let newPipeline = { ...pipelineData };
                    let commitCount = 0;

                    selectedCodes.forEach(code => {
                        const pItem = newPipeline[code];
                        if (pItem && pItem.finalData) {
                            // 마스터 DB 양식에 맞게 병합
                            const existing = newMaster[code] || {};
                            newMaster[code] = {
                                ...existing,
                                '품목코드': code,
                                '품목명': pItem.finalData['품목명'] || existing['품목명'] || '',
                                '규격': pItem.finalData['규격'] || existing['규격'] || '',
                                '입고가': pItem.finalData['입고가'] || existing['입고가'] || 0,
                                '출고가': pItem.finalData['출고가'] || existing['출고가'] || 0,
                                '구매처': pItem.finalData['구매처'] || existing['구매처'] || '자체조달',
                                '오더즈': pItem.finalData['오더즈'] || existing['오더즈'] || '',
                                '3코드': pItem.finalData['3코드'] || existing['3코드'] || '',
                                '3그룹명': pItem.finalData['3그룹명'] || existing['3그룹명'] || '',
                                '최종입고': new Date().toISOString().split('T')[0]
                            };
                            
                            // 대기열에서 삭제
                            delete newPipeline[code];
                            commitCount++;
                        }
                    });

                    await setIDB(STORAGE_KEYS.MASTER_DB, newMaster);
                    await setIDB(STORAGE_KEYS.MANAGED_ITEMS, newPipeline);
                    
                    localStorage.setItem(STORAGE_KEYS.SYNC_TRIGGER, Date.now().toString()); // 다른 탭 동기화 트리거
                    
                    setMasterData(newMaster);
                    setPipelineData(newPipeline);
                    setSelectedCodes(new Set());
                    
                    showToast(`🎉 ${commitCount}개 항목이 마스터 DB로 안전하게 이관되었습니다.`);
                } catch (err) {
                    console.error("Commit Error:", err);
                    showToast("⚠️ 이관 중 오류가 발생했습니다.");
                } finally {
                    setIsSaving(false);
                }
            };

            // 파이프라인에서 삭제 (폐기)
            const discardSelected = async () => {
                if (selectedCodes.size === 0) return showToast("⚠️ 선택된 항목이 없습니다.");
                if (!window.confirm(`선택한 ${selectedCodes.size}개 항목을 대기열에서 영구 삭제하시겠습니까?`)) return;

                let newPipeline = { ...pipelineData };
                selectedCodes.forEach(code => { delete newPipeline[code]; });
                
                await setIDB(STORAGE_KEYS.MANAGED_ITEMS, newPipeline);
                setPipelineData(newPipeline);
                setSelectedCodes(new Set());
                showToast(`🗑️ 선택 항목이 파이프라인에서 폐기되었습니다.`);
            };

            return (
                <div className="h-screen w-full max-w-[1500px] mx-auto flex flex-col font-sans overflow-hidden bg-white shadow-2xl border-x border-slate-300">
                    <GlobalHeader 
                        activeTab="pipeline" 
                        itemCount={Object.keys(masterData).length} 
                        pipelineCount={Object.keys(pipelineData).length}
                        onNavigate={handleNavigate}
                    />

                    {/* Toolbar */}
                    <div className="px-6 py-4 bg-slate-50 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shrink-0 z-10">
                        <div className="flex items-center gap-3">
                            <h2 className="text-[16px] font-black text-slate-800 flex items-center gap-2">
                                <i className="fas fa-filter text-indigo-500"></i> 시세 워크스페이스
                            </h2>
                            <div className="h-5 w-px bg-slate-300 mx-1"></div>
                            <div className="relative">
                                <input type="text" value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} 
                                       placeholder="품목명, 코드 검색..." 
                                       className="w-64 pl-9 pr-3 py-1.5 bg-white border border-slate-300 rounded-md text-[13px] outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-shadow" />
                                <i className="fas fa-search absolute left-3 top-2 text-slate-400 text-[12px]"></i>
                            </div>
                        </div>

                        <div className="flex items-center gap-2">
                            <span className="text-[12px] font-bold text-slate-500 mr-2">선택: {selectedCodes.size}건</span>
                            <button onClick={applyMarginRulesToSelected} disabled={selectedCodes.size === 0}
                                    className={`px-4 py-2 rounded-md text-[13px] font-bold transition-all flex items-center gap-2 shadow-sm
                                    ${selectedCodes.size > 0 ? 'bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-300' : 'bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200'}`}>
                                <i className="fas fa-calculator"></i> 자동 마진 적용
                            </button>
                            <button onClick={discardSelected} disabled={selectedCodes.size === 0}
                                    className={`px-4 py-2 rounded-md text-[13px] font-bold transition-all flex items-center gap-2 shadow-sm
                                    ${selectedCodes.size > 0 ? 'bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200' : 'bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200'}`}>
                                <i className="fas fa-trash-alt"></i> 폐기
                            </button>
                            <div className="h-6 w-px bg-slate-300 mx-1"></div>
                            <button onClick={commitSelectedToMaster} disabled={selectedCodes.size === 0 || isSaving}
                                    className={`px-5 py-2 rounded-md text-[13px] font-black transition-all flex items-center gap-2 shadow-sm
                                    ${selectedCodes.size > 0 && !isSaving ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                                {isSaving ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-check-double"></i>}
                                마스터 DB 확정 (Commit)
                            </button>
                        </div>
                    </div>

                    {/* Main Data Grid */}
                    <main className="flex-1 overflow-auto bg-slate-100 p-6 custom-scrollbar relative">
                        <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col h-full table-container">
                            <div className="overflow-auto flex-1 custom-scrollbar">
                                <table className="w-full text-left text-[13px] border-collapse min-w-[1000px]">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-slate-600 font-bold th-sticky">
                                        <tr>
                                            <th className="p-3 w-[50px] text-center th-sticky th-sticky-col bg-slate-50 border-b border-slate-200 shadow-[1px_0_0_#e2e8f0]">
                                                <button onClick={toggleSelectAll} className="text-slate-400 hover:text-indigo-600">
                                                    <i className={`fas ${isAllSelected ? 'fa-check-square text-indigo-600' : 'fa-square'}`}></i>
                                                </button>
                                            </th>
                                            <th className="p-3 w-[150px] th-sticky th-sticky-col bg-slate-50 border-b border-slate-200 shadow-[1px_0_0_#e2e8f0]">SKU 코드</th>
                                            <th className="p-3 w-[120px]">분류</th>
                                            <th className="p-3 w-[250px]">품목명 (수정가능)</th>
                                            <th className="p-3 w-[150px]">규격 (수정가능)</th>
                                            <th className="p-3 w-[140px] text-right text-rose-700 bg-rose-50/30">입고가(원)</th>
                                            <th className="p-3 w-[80px] text-center bg-indigo-50/30">마진(%)</th>
                                            <th className="p-3 w-[140px] text-right text-indigo-700 bg-indigo-50/30">출고가(원)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {pipelineList.length === 0 ? (
                                            <tr>
                                                <td colSpan="8" className="p-20 text-center text-slate-400">
                                                    <div className="flex flex-col items-center gap-3">
                                                        <i className="fas fa-inbox text-4xl text-slate-300"></i>
                                                        <p className="text-[14px] font-bold">파이프라인 대기열이 비어있습니다.</p>
                                                        <p className="text-[12px]">상품 관리 탭에서 새로운 상품을 발급하거나 시세를 연동하세요.</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : pipelineList.map((item) => {
                                            const code = item.코드;
                                            const isSelected = selectedCodes.has(code);
                                            const finalD = item.finalData || {};
                                            
                                            // 마진율 역계산 (출고가 - 입고가) / 출고가 (실무방식에 따라 다름, 여기선 단순 뷰 용도)
                                            const inP = parseNum(finalD['입고가']);
                                            const outP = parseNum(finalD['출고가']);
                                            let currentMarginStr = "-";
                                            if (finalD['_마진룰']) {
                                                currentMarginStr = `${finalD['_마진룰']}% (Auto)`;
                                            } else if (inP > 0 && outP > 0) {
                                                const mRate = ((outP - inP) / outP * 100).toFixed(1);
                                                currentMarginStr = `${mRate}%`;
                                            }

                                            return (
                                                <tr key={code} className={`hover:bg-slate-50 transition-colors ${isSelected ? 'bg-indigo-50/40' : 'bg-white'}`}>
                                                    <td className={`p-2 text-center sticky-col border-b border-slate-100 ${isSelected ? 'bg-indigo-50/40' : 'bg-white'}`}>
                                                        <button onClick={() => toggleSelect(code)} className={`text-lg ${isSelected ? 'text-indigo-600' : 'text-slate-300 hover:text-slate-400'}`}>
                                                            <i className={`fas ${isSelected ? 'fa-check-square' : 'fa-square'}`}></i>
                                                        </button>
                                                    </td>
                                                    <td className={`p-3 font-mono text-[12px] font-bold text-slate-500 sticky-col border-b border-slate-100 ${isSelected ? 'bg-indigo-50/40' : 'bg-white'}`}>{code}</td>
                                                    <td className="p-3">
                                                        <span className="inline-block bg-slate-100 text-slate-600 px-2 py-1 rounded text-[11px] font-bold">
                                                            {finalD['3그룹명'] || '미분류'}
                                                        </span>
                                                    </td>
                                                    <td className="p-2">
                                                        <input type="text" value={finalD['품목명'] || ''} 
                                                               onChange={(e) => handleTextChange(code, '품목명', e.target.value)}
                                                               className="w-full px-2 py-1.5 border border-transparent hover:border-slate-300 focus:border-indigo-500 rounded bg-transparent focus:bg-white outline-none transition-all font-bold text-slate-800" />
                                                    </td>
                                                    <td className="p-2">
                                                        <input type="text" value={finalD['규격'] || ''} 
                                                               onChange={(e) => handleTextChange(code, '규격', e.target.value)}
                                                               className="w-full px-2 py-1.5 border border-transparent hover:border-slate-300 focus:border-indigo-500 rounded bg-transparent focus:bg-white outline-none transition-all text-slate-600" />
                                                    </td>
                                                    <td className="p-2 bg-rose-50/10">
                                                        <input type="text" value={inP === 0 ? '' : inP.toLocaleString()} 
                                                               onChange={(e) => handlePriceChange(code, '입고가', e.target.value)}
                                                               onFocus={(e) => e.target.select()}
                                                               className="w-full px-2 py-1.5 border border-transparent hover:border-rose-300 focus:border-rose-500 rounded bg-transparent focus:bg-white outline-none transition-all text-right font-mono font-bold text-rose-700" 
                                                               placeholder="0" />
                                                    </td>
                                                    <td className="p-3 text-center text-[11px] font-bold text-slate-400 bg-indigo-50/10">
                                                        {currentMarginStr}
                                                    </td>
                                                    <td className="p-2 bg-indigo-50/10">
                                                        <input type="text" value={outP === 0 ? '' : outP.toLocaleString()} 
                                                               onChange={(e) => handlePriceChange(code, '출고가', e.target.value)}
                                                               onFocus={(e) => e.target.select()}
                                                               className="w-full px-2 py-1.5 border border-transparent hover:border-indigo-300 focus:border-indigo-500 rounded bg-transparent focus:bg-white outline-none transition-all text-right font-mono font-black text-indigo-700" 
                                                               placeholder="0" />
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            
                            {/* Grid Footer / Summary */}
                            <div className="bg-slate-50 border-t border-slate-200 p-3 flex justify-between items-center text-[12px] font-bold text-slate-500 shrink-0">
                                <div>
                                    전체 <span className="text-slate-800">{pipelineList.length}</span> 건 중 <span className="text-indigo-600">{selectedCodes.size}</span> 건 선택됨
                                </div>
                                <div className="flex gap-4">
                                    <span>※ 입고가 입력 후 좌측 상단의 [자동 마진 적용]을 누르면 설정된 룰에 따라 출고가가 자동 계산됩니다.</span>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Toast Notification */}
                    {toastMsg && (
                        <div className="fixed bottom-10 right-10 z-[100] bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 fade-in border border-slate-700">
                            <SafeIcon name="check-square" size={18} className="text-emerald-400" />
                            <span className="text-sm font-bold tracking-tight">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
