<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google" content="notranslate" />
<title>ONEAPP CustomerOps MVP v0.1.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
<style>
body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 2px 8px rgba(15,23,42,.04)}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem .8rem;border-radius:.65rem;font-size:.83rem;font-weight:700;border:1px solid #cbd5e1;background:#fff}
.btn:hover{background:#f8fafc}.btn-primary{background:#111827;color:#fff;border-color:#111827}.btn-primary:hover{background:#1f2937}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:.2rem .5rem;font-size:.7rem;font-weight:800}
.table th{font-size:.72rem;color:#64748b;background:#f8fafc;position:sticky;top:0;z-index:2}.table td{font-size:.78rem;border-top:1px solid #eef2f7}
.input{width:100%;border:1px solid #cbd5e1;border-radius:.6rem;padding:.55rem .65rem;font-size:.82rem;background:#fff}
.kakao{background:#fee500;border-radius:18px;padding:12px;min-height:420px}.bubble{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 7px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;
const fmt=n=>Number(n||0).toLocaleString('ko-KR');
const num=v=>Number(String(v??'').replace(/,/g,'').replace(/[^\d.-]/g,''))||0;
const text=v=>String(v??'').trim();
const pick=(row,names)=>{for(const n of names){if(row[n]!==undefined&&row[n]!==null&&String(row[n]).trim()!=='')return row[n]}return ''};
const dateDiff=(a,b)=>Math.floor((new Date(a)-new Date(b))/86400000);
const today=()=>new Date().toISOString().slice(0,10);
function parseProducts(rows){return rows.map((r,i)=>({id:'P'+i,code:text(pick(r,['품목코드','상품코드','코드'])),name:text(pick(r,['품목명','상품명'])),spec:text(pick(r,['규격','단위'])),category:text(pick(r,['카테고리','3그룹명','2그룹명','1그룹명'])),price:num(pick(r,['행사가','출고가','판매가','현재가격'])),normalPrice:num(pick(r,['시중가','기존가격','출고가'])),stock:num(pick(r,['재고','재고수량','수량'])),sale:text(pick(r,['판매여부','판매','상태']))||'1',event:text(pick(r,['행사테마','테마'])),image:text(pick(r,['이미지','이미지URL','대표이미지']))})).filter(x=>x.code||x.name)}
function parseSales(rows){return rows.map((r,i)=>({id:'S'+i,customerCode:text(pick(r,['고객코드','거래처코드','코드'])),customerName:text(pick(r,['고객명','거래처명','상호'])),phone:text(pick(r,['전화번호','휴대전화','휴대폰'])),productCode:text(pick(r,['품목코드','상품코드'])),productName:text(pick(r,['품목명','상품명'])),orderDate:text(pick(r,['구매일','주문일','거래일','일자'])),qty:num(pick(r,['구매수량','수량'])),price:num(pick(r,['구매단가','단가','출고가'])),amount:num(pick(r,['구매금액','금액','매출액']))})).filter(x=>x.customerCode||x.customerName)}
function buildCandidates(products,sales,consents){
 const byCustomer={};sales.forEach(s=>{const k=s.customerCode||s.customerName;if(!byCustomer[k])byCustomer[k]={code:s.customerCode,name:s.customerName,phone:s.phone,rows:[]};byCustomer[k].rows.push(s)});
 const pmap=Object.fromEntries(products.map(p=>[p.code,p]));const out=[];
 Object.values(byCustomer).forEach(c=>{const grouped={};c.rows.forEach(r=>{const k=r.productCode||r.productName;if(!grouped[k])grouped[k]=[];grouped[k].push(r)});const recommendations=[];
 Object.entries(grouped).forEach(([k,rows])=>{rows.sort((a,b)=>String(a.orderDate).localeCompare(String(b.orderDate)));const p=pmap[k]||products.find(x=>x.name===rows[0].productName);if(!p)return;if(p.sale==='0'||p.stock<=0||p.price<=0)return;const dates=rows.map(x=>x.orderDate).filter(Boolean);let avgCycle=0;if(dates.length>=2){let total=0;for(let i=1;i<dates.length;i++)total+=Math.max(1,dateDiff(dates[i],dates[i-1]));avgCycle=Math.round(total/(dates.length-1));}const last=dates[dates.length-1]||'';const elapsed=last?dateDiff(today(),last):0;const due=avgCycle?Math.round(elapsed/avgCycle*100):0;let type='',reason='',score=0;if(avgCycle&&due>=100){type='재구매 예상';reason=`평균 ${avgCycle}일 주기, 마지막 구매 후 ${elapsed}일 경과`;score=Math.min(99,60+Math.round(due/5));}else if(p.event){type='행사상품';reason=`기존 구매상품이며 행사테마 ${p.event} 적용`;score=72;}else if(p.normalPrice>0&&p.price<p.normalPrice*.95){type='가격인하';reason=`기존 기준가 대비 ${Math.round((1-p.price/p.normalPrice)*100)}% 인하`;score=78;}if(type)recommendations.push({product:p,type,reason,score,last,avgCycle,qty:rows[rows.length-1].qty||1});});
 if(!recommendations.length)return;recommendations.sort((a,b)=>b.score-a.score);const top=recommendations.slice(0,4);const consent=consents[c.code||c.name];const warnings=[];if(!c.phone)warnings.push('전화번호 없음');if(consent==='N')warnings.push('수신거부');out.push({id:crypto.randomUUID?crypto.randomUUID():Math.random().toString(36),customer:c,items:top,type:top[0].type,reason:top[0].reason,score:top[0].score,status:warnings.length?'확인 필요':'검토 필요',warnings,message:''});});return out.sort((a,b)=>b.score-a.score)}
function App(){
 const [products,setProducts]=useState([]),[sales,setSales]=useState([]),[candidates,setCandidates]=useState([]),[selected,setSelected]=useState(null),[filter,setFilter]=useState('전체');const [consents,setConsents]=useState({}),[search,setSearch]=useState('');
 useEffect(()=>{try{const x=JSON.parse(localStorage.getItem('customerops_state')||'{}');if(x.products)setProducts(x.products);if(x.sales)setSales(x.sales);if(x.candidates)setCandidates(x.candidates);if(x.consents)setConsents(x.consents)}catch(e){}},[]);
 useEffect(()=>{localStorage.setItem('customerops_state',JSON.stringify({products,sales,candidates,consents}))},[products,sales,candidates,consents]);
 const loadExcel=(file,type)=>{const r=new FileReader();r.onload=e=>{const wb=XLSX.read(e.target.result,{type:'array'});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});if(type==='products')setProducts(parseProducts(rows));else setSales(parseSales(rows));};r.readAsArrayBuffer(file)};
 const generate=()=>{const list=buildCandidates(products,sales,consents);setCandidates(list);setSelected(list[0]||null)};
 const filtered=useMemo(()=>candidates.filter(c=>(filter==='전체'||c.type===filter||c.status===filter)&&(!search||`${c.customer.name} ${c.customer.code} ${c.items.map(i=>i.product.name).join(' ')}`.includes(search))),[candidates,filter,search]);
 const counts={all:candidates.length,review:candidates.filter(x=>x.status==='검토 필요').length,warning:candidates.filter(x=>x.status==='확인 필요').length,approved:candidates.filter(x=>x.status==='승인 완료').length};
 const makeMessage=c=>{if(!c)return'';const list=c.items.map((x,i)=>`${i+1}. ${x.product.name} ${x.product.spec||''} / ${fmt(x.product.price)}원`).join('\n');return `${c.customer.name||'고객'} 사장님,\n추천드리는 상품 안내드립니다.\n\n${list}\n\n필요 수량을 알려주시면 현재 기준으로 견적을 보내드리겠습니다.`};
 const updateStatus=(id,status)=>setCandidates(prev=>prev.map(x=>x.id===id?{...x,status}:x));const updateMsg=(id,message)=>setCandidates(prev=>prev.map(x=>x.id===id?{...x,message}:x));const current=selected?candidates.find(x=>x.id===selected.id)||selected:null;
 return <div className="min-h-screen"><header className="bg-slate-950 text-white px-5 py-3 flex items-center justify-between"><div><div className="font-black text-lg">ONEAPP CustomerOps</div><div className="text-[11px] text-slate-400">고객별 발송 후보 자동생성 MVP v0.1.0</div></div><div className="flex gap-2 items-center"><label className="btn bg-white text-slate-900 cursor-pointer"><i className="fa-solid fa-box"></i> MerchOps 엑셀<input hidden type="file" accept=".xlsx,.xls,.csv" onChange={e=>e.target.files[0]&&loadExcel(e.target.files[0],'products')}/></label><label className="btn bg-white text-slate-900 cursor-pointer"><i className="fa-solid fa-receipt"></i> DataOps 엑셀<input hidden type="file" accept=".xlsx,.xls,.csv" onChange={e=>e.target.files[0]&&loadExcel(e.target.files[0],'sales')}/></label><button className="btn btn-primary" onClick={generate}><i className="fa-solid fa-wand-magic-sparkles"></i> 후보 생성</button></div></header>
 <main className="p-4 space-y-4"><section className="grid grid-cols-4 gap-3">{[['오늘 발송 후보',counts.all],['검토 필요',counts.review],['확인 필요',counts.warning],['승인 완료',counts.approved]].map(([t,v])=><div key={t} className="card p-4"><div className="text-xs text-slate-500 font-bold">{t}</div><div className="text-2xl font-black mt-1">{v}</div><div className="text-[11px] text-slate-400 mt-1">상품 {products.length}건 · 거래 {sales.length}건</div></div>)}</section>
 <section className="grid grid-cols-[1.55fr_.9fr] gap-4 h-[calc(100vh-190px)]"><div className="card overflow-hidden flex flex-col"><div className="p-3 border-b flex items-center justify-between gap-2"><div className="flex gap-1 flex-wrap">{['전체','재구매 예상','행사상품','가격인하','확인 필요','승인 완료'].map(x=><button key={x} onClick={()=>setFilter(x)} className={`btn ${filter===x?'btn-primary':''}`}>{x}</button>)}</div><input className="input max-w-[240px]" placeholder="고객·상품 검색" value={search} onChange={e=>setSearch(e.target.value)}/></div><div className="overflow-auto flex-1"><table className="table w-full border-collapse"><thead><tr><th className="p-2 text-left">상태</th><th className="p-2 text-left">고객</th><th className="p-2 text-left">유형</th><th className="p-2 text-left">추천상품</th><th className="p-2 text-left">추천 근거</th><th className="p-2 text-right">점수</th></tr></thead><tbody>{filtered.map(c=><tr key={c.id} onClick={()=>setSelected(c)} className={`cursor-pointer hover:bg-slate-50 ${current&&current.id===c.id?'bg-amber-50':''}`}><td className="p-2"><span className={`badge ${c.status==='승인 완료'?'bg-emerald-100 text-emerald-700':c.status==='확인 필요'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}`}>{c.status}</span></td><td className="p-2"><div className="font-extrabold">{c.customer.name}</div><div className="text-[11px] text-slate-400">{c.customer.phone||'전화번호 없음'}</div></td><td className="p-2 font-bold">{c.type}</td><td className="p-2">{c.items.map(x=>x.product.name).join(', ')}</td><td className="p-2 text-slate-600">{c.reason}</td><td className="p-2 text-right font-black">{c.score}</td></tr>)}</tbody></table>{!filtered.length&&<div className="p-12 text-center text-slate-400">엑셀을 불러온 뒤 ‘후보 생성’을 누르세요.</div>}</div></div><div className="card overflow-auto p-4">{current?<Detail c={current} makeMessage={makeMessage} updateStatus={updateStatus} updateMsg={updateMsg} setSelected={setSelected}/>:<div className="h-full flex items-center justify-center text-slate-400">발송 후보를 선택하세요.</div>}</div></section></main></div>}
function Detail({c,makeMessage,updateStatus,updateMsg,setSelected}){const msg=c.message||makeMessage(c);return <div className="space-y-4"><div className="flex items-start justify-between"><div><div className="text-xl font-black">{c.customer.name}</div><div className="text-xs text-slate-500 mt-1">{c.customer.code} · {c.customer.phone||'전화번호 없음'}</div></div><span className="badge bg-slate-100 text-slate-700">{c.type}</span></div><div className="rounded-xl bg-slate-50 p-3"><div className="text-xs font-black text-slate-500">추천 근거</div><div className="text-sm font-bold mt-1">{c.reason}</div>{c.warnings.length>0&&<div className="mt-2 text-xs text-rose-600 font-bold">{c.warnings.join(' · ')}</div>}</div><div><div className="text-sm font-black mb-2">추천 상품</div><div className="space-y-2">{c.items.map((x,i)=><div key={i} className="border rounded-xl p-3"><div className="flex justify-between gap-2"><div><div className="font-black text-sm">{x.product.name}</div><div className="text-xs text-slate-500">{x.product.spec||'-'} · 재고 {fmt(x.product.stock)}</div></div><div className="font-black">{fmt(x.product.price)}원</div></div><div className="text-[11px] text-slate-500 mt-2">{x.reason}</div></div>)}</div></div><div><div className="flex justify-between items-center mb-2"><div className="text-sm font-black">메시지</div><button className="btn" onClick={()=>updateMsg(c.id,makeMessage(c))}>자동 생성</button></div><textarea className="input min-h-[150px] leading-6" value={msg} onChange={e=>updateMsg(c.id,e.target.value)} /></div><div className="kakao"><div className="text-xs font-black mb-2">카카오톡 미리보기</div><div className="bubble whitespace-pre-wrap text-sm leading-6">{msg}</div><button className="w-full mt-3 rounded-lg bg-[#3c1e1e] text-white py-3 text-sm font-black">견적 문의하기</button></div><div className="grid grid-cols-3 gap-2"><button className="btn justify-center" onClick={()=>updateStatus(c.id,'제외')}>제외</button><button className="btn justify-center" onClick={()=>updateStatus(c.id,'검토 필요')}>가저장</button><button className="btn btn-primary justify-center" disabled={c.warnings.length>0} onClick={()=>{updateStatus(c.id,'승인 완료');setSelected({...c,status:'승인 완료'})}}>승인</button></div><div className="text-[11px] text-slate-400 leading-5">실제 카카오 발송은 공식 딜러사 API 키와 템플릿 코드가 연결된 뒤 활성화됩니다. 현재 버전은 추천·검토·승인 작업까지 수행합니다.</div></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
