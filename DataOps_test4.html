<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP DataOps - 핵심 수불부 관리 (v8.99zx Transfer Sales Price Group Algorithm)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* 커스텀 툴팁 스타일 */
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 6px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 500; white-space: nowrap; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); pointer-events: none;
        }

        /* 초기 로딩 애니메이션 (체감 속도 개선) */
        #initial-loader { position: fixed; inset: 0; background-color: #f8fafc; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; color: #475569; letter-spacing: -0.5px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <!-- 초기 로딩 스크린 -->
    <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">ONEAPP DataOps v8.99zx Transfer Sales Price Group Algorithm.....</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 8px;">앱 환경을 구성하고 있습니다</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        /* =======================================================================
           1. 유틸리티 함수 (Data formatting & pure logic)
           ======================================================================= */
        const safeNum = (val) => { const n = Number(val); return isNaN(n) || !isFinite(n) ? 0 : n; };
        const safeStr = (val, fallback = '') => {
            if (val === null || val === undefined) return fallback;
            const s = String(val).trim(); const lower = s.toLowerCase();
            if (lower === 'undefined' || lower === 'nan' || lower === 'null' || lower === '') return fallback; return s;
        };
        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim(); let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) { isNegative = true; strVal = strVal.slice(1, -1); } 
            else if (strVal.startsWith('-')) { isNegative = true; strVal = strVal.slice(1); }
            let num = Number(strVal.replace(/,/g, '').replace(/[^\d.]/g, ''));
            if (isNegative) num = -num; return isNaN(num) ? 0 : num;
        };
        const formatMoney = (num) => { const n = Number(num); return isNaN(n) ? '0' : Math.round(n).toLocaleString(); };
        const normalizeWarehouseCode = (val) => {
            const raw = safeStr(val, '').replace(/\s/g, '');
            if (!raw) return '';
            const upper = raw.toUpperCase();
            if (raw === '02' || raw === '2' || raw.includes('2전송') || raw.includes('전송') || upper === 'W02') return '2전송';
            if (raw === '01' || raw === '1' || raw.includes('1창고') || raw.includes('창고') || upper === 'W01') return '1창고';
            return raw;
        };
        const getRawCell = (raw = {}, names = []) => {
            const keys = Object.keys(raw || {});
            const norm = (v) => safeStr(v, '').replace(/\s/g, '').toLowerCase();
            for (const name of names) {
                const target = norm(name);
                const found = keys.find(k => norm(k) === target);
                if (found !== undefined && safeStr(raw[found], '') !== '') return raw[found];
            }
            for (const name of names) {
                const target = norm(name);
                const found = keys.find(k => norm(k).includes(target) || target.includes(norm(k)));
                if (found !== undefined && safeStr(raw[found], '') !== '') return raw[found];
            }
            return null;
        };
        const getWarehouseFromRow = (row = {}, fallbackFileName = '') => {
            const raw = row._raw || row.raw || {};
            const direct = getRawCell(raw, ['창고명', '창고', '입고창고', '출고창고', '창고코드']);
            const wh = normalizeWarehouseCode(direct);
            if (wh) return wh;
            const fileName = safeStr(row._sourceFileName || fallbackFileName, '');
            if (/^02|2전송|02구매|02판매/.test(fileName)) return '2전송';
            if (/^01|1창고|01구매|01판매/.test(fileName)) return '1창고';
            return '';
        };
        const isTransferWarehouseRow = (row = {}, fallbackFileName = '') => getWarehouseFromRow(row, fallbackFileName) === '2전송';

        const extractDateFromName = (filename) => {
            if (!filename) return 0;
            const match8 = filename.match(/20\d{6}/); if (match8) return parseInt(match8[0], 10);
            const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); if (match6) return parseInt('20' + match6[1], 10);
            return 0;
        };
        const extractDateNum = (dStr) => { const num = parseInt(String(dStr).replace(/\D/g, ''), 10); return isNaN(num) ? 0 : num; };
        const addOneDay = (dateNum) => {
            if (!dateNum) return 0; const y = Math.floor(dateNum / 10000); const m = Math.floor((dateNum % 10000) / 100) - 1; const d = dateNum % 100;
            const date = new Date(y, m, d + 1); return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
        };
        const formatItemDate = (dateStr, refYear) => {
            if (!dateStr) return 0; const str = String(dateStr).trim();
            if (str.includes('실사등록') || str.includes('미지정')) return 0; 
            if (/^\d{5}$/.test(str)) {
                const serial = parseInt(str, 10);
                if (serial > 30000 && serial < 80000) {
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    return parseInt(`${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`, 10);
                }
            }
            const parts = str.match(/\d+/g); if (!parts) return 0;
            let y, m, d;
            if (parts.length >= 3) { y = parts[0]; if (y.length === 2) y = '20' + y; m = parts[1].padStart(2, '0'); d = parts[2].padStart(2, '0'); } 
            else if (parts.length === 2) { if (parts[0].length === 4) { y = parts[0]; m = parts[1].padStart(2, '0'); d = '01'; } else { y = String(refYear); m = parts[0].padStart(2, '0'); d = parts[1].padStart(2, '0'); } } 
            else if (parts.length === 1) {
                const c = parts[0];
                if (c.length === 8) { y = c.substring(0, 4); m = c.substring(4, 6); d = c.substring(6, 8); }
                else if (c.length === 6) { if (c.startsWith('20')) { y = c.substring(0, 4); m = c.substring(4, 6); d = '01'; } else { y = '20' + c.substring(0, 2); m = c.substring(2, 4); d = c.substring(4, 6); } } 
                else return 0;
            } else return 0;
            const numY = parseInt(y, 10); const numM = parseInt(m, 10); const numD = parseInt(d, 10);
            if (numY > 2000 && numY < 2100 && numM >= 1 && numM <= 12 && numD >= 1 && numD <= 31) return numY * 10000 + numM * 100 + numD;
            return 0;
        };
        const formatStrForPeriod = (num) => { const s = String(num); if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; if (s.length === 6) return `${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`; return s; };

        const parseIssuesAndVendors = (str, price) => {
            if (!str) return { issues: [], vendors: {} };
            const parts = str.match(/[^,]+(?:\([^)]+\))*/g) || [];
            const issues = []; const vendors = {};
            const knownIssues = ['과다로스', '원가수정', '수기조정', '매입내역 없음', '전산 재고 부족', '재고 부족', '변동됨', '변경됨', '삭제됨', '신규추가', '수량변동', '단가변경', '매치변경', '원가추출됨', '원가추출', '단가없음', 'Lot불일치', 'Lot원가확인', 'Lot매치실패', 'Lot확인필요', 'Lot매치확인', '1창고FIFO', '매입처없음', '수량부족', '🔄', '🚨', '✅'];

            parts.forEach(p => {
                const part = p.trim(); if (!part) return;
                
                // 🌟 1중 방어막: 과거 엑셀 파일에 잘못 저장된 (NaN) 유령 텍스트 발견 시 즉시 삭제 처리
                if (part.includes('(NaN)')) return;

                let isKnownIssue = knownIssues.some(ki => part.includes(ki));
                if (isKnownIssue) { issues.push(part); } 
                else {
                    const match = part.match(/(.+)\((\d+)\)$/);
                    if (match) {
                        const vendorName = safeStr(match[1], '미지정'); const qty = parseInt(match[2], 10);
                        if (!isNaN(qty)) vendors[vendorName] = { qty, rev: qty * price, cogs: qty * price, isLifo: false, isPerfectMatch: false, displayVendor: vendorName }; else issues.push(part);
                    } else issues.push(part);
                }
            });
            return { issues, vendors };
        };


        // v8.74: ERP 출력물의 소계/합계/총합계 또는 상품이 아닌 숫자형 요약행 방어막.
        // 예: 품명 2593, 상품코드 없음, 매입내역 없음 형태로 하단에 상품처럼 올라오는 행을 차단한다.
        const isSummaryOrInvalidProductRow = ({ code = '', name = '', raw = {} } = {}) => {
            const codeText = safeStr(code, '').trim();
            const nameText = safeStr(name, '').trim();
            const codeNorm = codeText.replace(/\s/g, '').toLowerCase();
            const nameNorm = nameText.replace(/\s/g, '').toLowerCase();
            const rawValues = Object.values(raw || {}).map(v => safeStr(v, '')).filter(Boolean);
            const joined = [codeText, nameText, ...rawValues].join(' ').replace(/\s/g, '').toLowerCase();

            const summaryWords = ['합계', '총합계', '총계', '소계', 'subtotal', 'total'];
            if (summaryWords.some(word => joined.includes(word))) return true;

            const noRealCode = !codeNorm || codeNorm === 'no_code' || codeNorm === '-' || codeNorm === '미상' || codeNorm === '없음';
            const numericOnlyName = /^[+-]?[\d,\.]+$/.test(nameNorm);
            const placeholderName = !nameNorm || nameNorm === '이름없음' || nameNorm === '미상' || nameNorm === '기록없음';

            // 상품명이 숫자만 있고 상품코드가 없으면 대부분 ERP 소계/건수/요약 행이다.
            if (noRealCode && numericOnlyName) return true;
            if (noRealCode && placeholderName) return true;

            // 코드와 품명이 둘 다 같은 숫자형 값이면 정상 상품이라 보기 어렵다.
            if (numericOnlyName && codeNorm && codeNorm === nameNorm) return true;

            return false;
        };

        // v8.99ze: 재고현황/수불마감 기본여부 그룹 정책.
        // 기본=1은 농산류, 기본=2 이상(3·5·7 등)은 식자재, 기본=0/공백은 기타로 분류한다.
        const getBasicRawValue = (item = {}) => {
            if (item.기본 !== undefined && item.기본 !== null && safeStr(item.기본, '') !== '') return item.기본;
            if (item._basicValue !== undefined && item._basicValue !== null && safeStr(item._basicValue, '') !== '') return item._basicValue;
            const raw = item._raw || item.raw || {};
            const v = getRawCell(raw, ['구분(기본)', '구분기본', '기본여부', '기본', '관리기본', '기본구분']);
            return v === null || v === undefined ? '' : v;
        };
        const getBasicNumber = (item = {}) => {
            const raw = getBasicRawValue(item);
            if (raw === '' || raw === null || raw === undefined) return 0;
            return parseNumber(raw);
        };
        const getStockManageGroup = (item = {}) => {
            const n = getBasicNumber(item);
            if (n === 1) return '농산류';
            if (n > 1) return '식자재';
            return '기타';
        };
        const getBasicDisplayValue = (item = {}) => {
            const raw = getBasicRawValue(item);
            if (raw === null || raw === undefined || safeStr(raw, '') === '') return '';
            const n = parseNumber(raw);
            return n === 0 ? 0 : n;
        };

        const TRANSFER_PRICE_GROUP_PRESETS = [
            {
                groupName: '청과상장',
                label: '청과상장',
                description: '청과/상장 거래처',
                customers: ['1마산', '2중앙'],
                rule: ['출고가(공지)', '청과', '상장가'],
                feeMode: 'LISTING_FEE',
                profitMode: 'NORMAL',
                outputCustomerMode: 'GROUP_NAME',
                tone: 'emerald'
            },
            {
                groupName: '식자재',
                label: '식자재',
                description: '식자재 고정단가 거래처',
                customers: ['4연산', '5온산', '6진주', '7초전', '7남해', '8통영', '9구미'],
                rule: ['출고가(공지)', '식자재', '도매A', '출고(외노)'],
                feeMode: 'NONE',
                profitMode: 'NORMAL',
                outputCustomerMode: 'ORIGINAL_CUSTOMER',
                tone: 'amber'
            },
            {
                groupName: '창고출고',
                label: '창고출고',
                description: '9부산 하위 거래처 포함',
                customers: ['9부산', '금양', '상남식자재', '농협45번', '농협44번', '농협66', '삼진', '진영상회', '창원153번', '창원59번', '농협12번', '농협77번'],
                rule: ['출고가(공지)', '도매A', '출고(외노)'],
                feeMode: 'NONE',
                profitMode: 'NORMAL',
                outputCustomerMode: 'ORIGINAL_CUSTOMER',
                tone: 'cyan'
            },
            {
                groupName: '내부이동',
                label: '내부이동',
                description: '매입단가 그대로 적용',
                customers: ['3우리'],
                rule: ['단가'],
                feeMode: 'NONE',
                profitMode: 'ZERO_PROFIT',
                outputCustomerMode: 'GROUP_NAME',
                tone: 'slate'
            }
        ];
        const buildDefaultTransferPriceGroupText = () => TRANSFER_PRICE_GROUP_PRESETS
            .flatMap(group => group.customers.map(customer => `${customer}=${group.groupName}|${group.rule.join('>')}|${group.feeMode}|${group.profitMode}|${group.outputCustomerMode}`))
            .join('\n');
        const normalizeTransferGroupName = (name) => {
            const value = safeStr(name);
            if (value === '9부산') return '창고출고';
            return value;
        };
        // v8.99zu: 2전송 판매업로드 단가 우선순위 고정 + Lot 잔여수량 잠금 + 재고우선 분할매칭 정렬.
        // 전체 우선순위: 공지단가 > 고정단가 > 시세단가.
        // 식자재그룹 고정단가: 식자재 단가, 없으면 도매A.
        // 창고그룹 고정단가: 식자재 단가를 보지 않고 도매A만 적용.
        // 시세단가 fallback은 기존 코드의 출고(외노)를 유지한다.
        const normalizeTransferPriceRuleByGroup = (groupName, rule = []) => {
            const normalizedGroup = normalizeTransferGroupName(groupName);
            if (normalizedGroup === '식자재') return ['출고가(공지)', '식자재', '도매A', '출고(외노)'];
            if (normalizedGroup === '창고출고') return ['출고가(공지)', '도매A', '출고(외노)'];
            if (normalizedGroup === '청과상장') return ['출고가(공지)', '청과', '상장가'];
            if (normalizedGroup === '내부이동') return ['단가'];
            return (rule || []).map(v => safeStr(v)).filter(Boolean);
        };
        const splitTransferCustomerText = (text) => safeStr(text, '')
            .split(/[\n,]+/)
            .map(v => v.trim())
            .filter(Boolean);
        const parseTransferPriceGroupCards = (text) => {
            const cards = TRANSFER_PRICE_GROUP_PRESETS.map(group => ({ ...group, customers: [] }));
            const byName = Object.fromEntries(cards.map(card => [card.groupName, card]));
            safeStr(text, buildDefaultTransferPriceGroupText()).split(/\n+/).map(line => line.trim()).filter(Boolean).forEach(line => {
                const [customerPart, rest = ''] = line.split('=');
                const customer = safeStr(customerPart);
                const [rawGroupName = '', rulePart = '', feeMode = '', profitMode = '', outputCustomerMode = ''] = rest.split('|').map(v => safeStr(v));
                const groupName = normalizeTransferGroupName(rawGroupName);
                if (!customer || !groupName) return;
                if (!byName[groupName]) {
                    byName[groupName] = {
                        groupName,
                        label: groupName,
                        description: '추가 단가그룹',
                        customers: [],
                        rule: rulePart ? rulePart.split('>').map(v => v.trim()).filter(Boolean) : ['출고가(공지)'],
                        feeMode: feeMode || 'NONE',
                        profitMode: profitMode || 'NORMAL',
                        outputCustomerMode: outputCustomerMode || 'ORIGINAL_CUSTOMER',
                        tone: 'purple'
                    };
                    cards.push(byName[groupName]);
                }
                const card = byName[groupName];
                if (!card.customers.includes(customer)) card.customers.push(customer);
                if (rulePart) card.rule = rulePart.split('>').map(v => v.trim()).filter(Boolean);
                if (feeMode) card.feeMode = feeMode;
                if (profitMode) card.profitMode = profitMode;
                if (outputCustomerMode) card.outputCustomerMode = outputCustomerMode;
            });
            return cards.map(card => ({ ...card, rule: normalizeTransferPriceRuleByGroup(card.groupName, card.rule) }));
        };
        const serializeTransferPriceGroupCards = (cards = []) => (cards || [])
            .flatMap(card => (card.customers || []).map(customer => `${customer}=${card.groupName}|${normalizeTransferPriceRuleByGroup(card.groupName, card.rule || []).join('>')}|${card.feeMode || 'NONE'}|${card.profitMode || 'NORMAL'}|${card.outputCustomerMode || 'GROUP_NAME'}`))
            .join('\n');

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            unit: '단위, 규격단위, 포장단위, 단위명, 판매단위',
            qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',

        const CONFIG_MODULE = Object.freeze({

        const STOCK_ENGINE_MODULE = Object.freeze({

                const finalRaw = row.finalQty ?? row.실사;
                const finalQty = finalRaw === '' || finalRaw === null || finalRaw === undefined ? systemQty : safeNum(finalRaw);
                const diffQty = finalQty - systemQty;

            },
            recalculateLegacyItem: (item = {}, options = {}) => {
                const calc = STOCK_ENGINE_MODULE.calculateStock(item);

            normalizeVendor: (val) => UTIL_MODULE.normalizeText(val).replace(/[()（）]/g, ''),

                            const revShare = qtyToDeduct > 0 ? finalRevenue * (take / qtyToDeduct) : 0;
                            if (bucket.수량 !== undefined) bucket.수량 -= take; 
                            pData[bucket.batchKey].출고 += take; pData[bucket.batchKey].매출원가 += cogs; pData[bucket.batchKey].매출액 += revShare;

                            const details = (sale._salesVendorDetails && sale._salesVendorDetails.length)
                                ? sale._salesVendorDetails
                                : [{ vendor: sale.거래처, qty: qtyToDeduct, rev: finalRevenue, remainingQty: qtyToDeduct, remainingRev: finalRevenue }];
                            let remainingTake = Math.abs(take);
                            const sign = take < 0 ? -1 : 1;

                            details.forEach(detail => {
                                if (remainingTake <= 0) return;
                                if (detail.remainingQty === undefined) detail.remainingQty = safeNum(detail.qty);
                                if (detail.remainingRev === undefined) detail.remainingRev = safeNum(detail.rev);
                                const available = Math.abs(safeNum(detail.remainingQty));
                                if (available <= 0) return;
                                const usedAbs = Math.min(available, remainingTake);
                                const usedQty = usedAbs * sign;
                                const revPerUnit = safeNum(detail.qty) !== 0 ? safeNum(detail.rev) / safeNum(detail.qty) : 0;
                                const usedRev = revPerUnit * usedQty;
                                const usedCogs = usedQty * bucket.단가;
                                detail.remainingQty = safeNum(detail.remainingQty) - usedQty;
                                detail.remainingRev = safeNum(detail.remainingRev) - usedRev;
                                remainingTake -= usedAbs;

                                const displayVendor = safeStr(detail.vendor, sale.거래처);
                                const vendorKey = isPerfect ? `${displayVendor}_perfect` : displayVendor;
                                if (!pData[bucket.batchKey].출고내역[vendorKey]) {
                                    pData[bucket.batchKey].출고내역[vendorKey] = {
                                        qty: 0, rev: 0, cogs: 0, 
                                        isLifo: effectiveIsLifo, 
                                        isPerfectMatch: isPerfect,

                                        appliedLot: safeStr(bucket.거래처, ''),
                                        matchMode: matchMode || (matchStr ? 'FIXED_LOT' : (effectiveIsLifo ? 'LIFO' : 'SEQUENTIAL'))
                                    };
                                }
                                pData[bucket.batchKey].출고내역[vendorKey].qty += usedQty; 
                                pData[bucket.batchKey].출고내역[vendorKey].rev += usedRev; 
                                pData[bucket.batchKey].출고내역[vendorKey].cogs += usedCogs;
                            });
                        };

                        if (remainingQty < 0) { deductFromBucket(pool.buckets[pool.buckets.length - 1], remainingQty, false, 'RETURN'); }
                        else if (remainingQty > 0) {
                            // v8.99zu: Lot 잔여수량 잠금 + 재고우선 분할매칭 정책.
                            // 1) 2전송 + 외부 구매처 지정: 당일 동일 구매처 Lot → 기존 재고 FIFO → 부족분만 당일 다른 구매 Lot.
                            // 2) 구매처 매칭 실패/미지정/우리농산 계열: 기존 재고 FIFO → 부족분만 당일 구매 FIFO.
                            // 3) 어떤 경우에도 잔여수량이 0인 Lot에는 추가 배정하지 않는다. 전체 가용수량이 부족할 때만 Lot초과배정 이슈를 남긴다.
                            // 4) 화면/리스트 정렬은 같은 품목코드 안에서 재고 있는 Lot를 상단으로 올린다.
                            let matchFailedFlag = false;
                            let fifoReviewFlag = false;
                            const allBuckets = [...pool.buckets];
                            const saleDateNumRaw = getLotDateNum(safeStr(sale.일자 || targetDateStrFromData || ''));

                            const hasValidSaleDate = saleDateNum && saleDateNum !== UNKNOWN_LOT_SORT_DATE;
                            const isTodayPurchaseBucket = (bucket) => bucket && bucket._sourceType === 'in' && hasValidSaleDate && safeNum(bucket._lotSortDate) === safeNum(saleDateNum);
                            const isRequestedBucket = (bucket) => !!(matchStr && bucket && (normalizeLotName(bucket.거래처) === matchStr || isSameLotName(bucket.거래처, sale.매입처매칭)));
                            const hasPositiveQty = (bucket) => safeNum(bucket && bucket.수량) > 0;
                            const uniqueBuckets = (...lists) => {
                                const seen = new Set();
                                const result = [];
                                lists.flat().filter(Boolean).forEach(bucket => {
                                    const key = bucket.lotKey || `${bucket.batchKey}|${bucket.거래처}|${bucket.일자}|${bucket.단가}`;

                            const requestedBuckets = matchStr ? allBuckets.filter(isRequestedBucket) : [];
                            const todayBuckets = allBuckets.filter(isTodayPurchaseBucket);

                            const stockFifoBuckets = allBuckets.filter(bucket => !isTodayPurchaseBucket(bucket));

                            const stockOtherBuckets = stockFifoBuckets.filter(bucket => !isRequestedBucket(bucket));
                            const hasRequestedPositive = requestedBuckets.some(hasPositiveQty);

                                // v8.99zu 최종 확정: 우리농산/우리/3우리 계열은 2전송이어도 내부분배로 먼저 판정한다.
                                // 내부분배/매칭실패/구매처미지정은 기존 재고 FIFO → 부족분만 당일 같은상품 Lot 순서로 분할 배정한다.
                                if (isInternalDistribution) {
                                    return [
                                        { buckets: stockFifoBuckets, mode: 'INTERNAL_FIFO_STOCK', matchFailed: false, fifoReview: false },
                                        { buckets: todayBuckets, mode: 'INTERNAL_TODAY_AFTER_STOCK', matchFailed: false, fifoReview: false }
                                    ];
                                }
                                if (isTransferLotContext && matchStr) {
                                    if (!hasRequestedPositive) matchFailedFlag = true;

                                        // 외부 구매처가 명확하면 판매일자의 동일 구매처 Lot를 최우선으로 확정 매칭한다.
                                        { buckets: todayRequestedBuckets, mode: 'TRANSFER_TODAY_VENDOR', matchFailed: false, fifoReview: false },
                                        // 동일 구매처 당일 Lot가 없거나 부족한 잔여분은 기존 재고 FIFO로 먼저 보낸다.
                                        { buckets: stockFifoBuckets, mode: 'FIFO_STOCK_AFTER_VENDOR', matchFailed: !hasRequestedPositive, fifoReview: false },
                                        // 그래도 부족한 수량만 당일 다른 구매 Lot로 보낸다.

                                    ];

                                ];
                            };

                                .map(stage => ({ ...stage, buckets: uniqueBuckets(stage.buckets) }))

                                if (!bucket || !pData[bucket.batchKey]) return;

                                    markShortageIfNeeded(shortageBucket, '🚨수량부족');
                                    remainingQty = 0;
                                }
                            }

                    Object.values(pData).forEach(item => {

                            item.전산잔량 = item.기초 + item.입고 - item.출고;

                        const endQtyByCode = {};
                        
                        simpleCountEndItems.forEach(endItem => {

                            if (matchingKeys.length > 0) {

                                    if (isLast) {

                                        let assignQty = 0;

                                            assignQty = Math.min(pItem.전산잔량, remainingActual);

                                    if (pItem.로스 !== 0) {

                                pData[batchKey] = { 
                                    batchKey, 코드: code, 품명: simpleItem ? simpleItem.품명 : '미상', 단가: 0, 일자: targetDateStrFromData, 거래처: '미지정', 기초: 0, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: 0, 실사: totalActualQty, 로스: totalActualQty, 매출액: 0, 매출원가: 0, 메모: '', 이슈: ['🚨전산 재고 없음'], 출고내역: {}, _orig: {기초:0, 입고:0, 출고:0, 단가: 0}, isDummy: (!code || code === 'NO_CODE'), 수기확인완료: false

                    Object.values(pData).forEach(item => {

                            // 🌟 핵심 수정: 실사값이 비어있을 때 (null)

                        .sort((a, b) => {

            const runAnalysis = useCallback(async (filesObj) => {

                    parsedEnd.forEach(item => { const d = formatItemDate(item.일자, refYear); if (d > 0) item.일자 = formatStrForPeriod(d); });
                    parsedIn.forEach(item => { const d = formatItemDate(item.일자, refYear); if (d > 0) item.일자 = formatStrForPeriod(d); if (d > 0 && ((startDateNum && d < startDateNum) || (targetEndDateNum && d > targetEndDateNum))) outOfBoundsCount++; else validIn.push(item); });
                    parsedOut.forEach(item => { const d = formatItemDate(item.일자, refYear); if (d > 0) item.일자 = formatStrForPeriod(d); if (d > 0 && ((startDateNum && d < startDateNum) || (targetEndDateNum && d > targetEndDateNum))) outOfBoundsCount++; else validOut.push(item); });

                    let minD = startDateNum || 99999999; let maxD = targetEndDateNum || 0;
                    if (!startDateNum || !targetEndDateNum) { const tempPeriodData = [...validIn, ...validOut, ...parsedEnd]; tempPeriodData.forEach(item => { const d = formatItemDate(item.일자, refYear); if (d > 0) { if (!startDateNum && d < minD) minD = d; if (!targetEndDateNum && d > maxD) maxD = d; } }); }
                    
                    let periodStr = '기간 미상';
                    if (minD !== 99999999 && maxD !== 0) {
                        if (minD === maxD) periodStr = formatStrForPeriod(minD);
                        else { const d1 = new Date(Math.floor(minD/10000), Math.floor((minD%10000)/100)-1, minD%100); const d2 = new Date(Math.floor(maxD/10000), Math.floor((maxD%10000)/100)-1, maxD%100); periodStr = `${formatStrForPeriod(minD)} ~ ${formatStrForPeriod(maxD)} (총 ${Math.round((d2 - d1) / 86400000) + 1}일간)`; }
                    }

                    let targetDateStrFromData = maxD !== 0 ? `${Math.floor(maxD/10000)}-${String(Math.floor((maxD%10000)/100)).padStart(2,'0')}-${String(maxD%100).padStart(2,'0')}` : (() => { const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; })();

                    let warnings = [];
                    if (prevDateNum && minD !== 99999999 && minD <= prevDateNum) warnings.push(`매입/매출에 기초재고 파일명 기준일(${formatStrForPeriod(prevDateNum)}) 이전의 과거 데이터가 포함되어 있습니다.`);
                    if (endDateNum && maxD !== 0 && maxD > endDateNum) warnings.push(`매입/매출에 실사 파일명 기준일(${formatStrForPeriod(endDateNum)}) 이후의 미래 데이터가 포함되어 있습니다.`);

                    const payload = { parsedPrev, parsedIn: validIn, parsedOut: validOut, parsedEnd, periodStr, targetDateStrFromData };
                    if (warnings.length > 0) { setConfirmModal({ isOpen: true, warnings, payload }); setIsProcessing(false); } 
                    else { executeAnalysis(payload); }
                } catch (err) { setAlertMsg('데이터 분석 중 오류가 발생했습니다.'); console.error(err); setIsProcessing(false); }
            }, [mappings, executeAnalysis, setAlertMsg, setConfirmModal, setIsProcessing]);

            const runCostExtraction = useCallback(async (filesObj) => {
                setIsProcessing(true);
                try {
                    const parsedIn = await parseExcelData(filesObj.in, mappings, 'in');
                    const stockSourceFile = filesObj.end || filesObj.prev;
                    if (!stockSourceFile) {
                        setAlertMsg('원가추출용 재고/수불마감 파일이 없습니다.');
                        return;
                    }

                    // v8.99zc: 원가추출의 재고 소스는 1재고현황이든 수불마감이든 모두 "기초재고"로 해석한다.
                    // 수불마감 파일을 실사/마감 슬롯으로 넣어도 결산일자를 구매일처럼 표시하지 않고,
                    // 구매현황 Lot의 실제 구매일자/구매처/구매단가를 화면 기준값으로 우선 적용한다.
                    const parsedEnd = await parseExcelData(stockSourceFile, mappings, 'prev');

                    let refYear = new Date().getFullYear();
                    const endDateNum = extractDateFromName(stockSourceFile.name);
                    if (endDateNum) refYear = Math.floor(endDateNum / 10000);

                    // v8.99zd: 원가추출 날짜는 재고/수불마감 기준일이 아니라 "구매현황의 실제 구매일자"만 사용한다.
                    // 수불마감의 결산일자, 재고현황의 기록일자, 오늘 날짜는 상품 구매일로 표시하지 않는다.
                    const normalizeKeyText = (val) => safeStr(val, '').replace(/\s/g, '').replace(/[\-_()（）\[\]{}]/g, '').toLowerCase();
                    const normalizeCodeKey = (val) => safeStr(val, '').replace(/\s/g, '').replace(/\.0$/, '').toUpperCase();
                    const getRawExactWithKey = (raw = {}, names = []) => {
                        const keys = Object.keys(raw || {});
                        const norm = (v) => safeStr(v, '').replace(/\s/g, '').replace(/[()（）]/g, '').toLowerCase();
                        for (const name of names) {
                            const target = norm(name);
                            const found = keys.find(k => norm(k) === target);
                            if (found !== undefined && raw[found] !== undefined && raw[found] !== null && String(raw[found]).trim() !== '') return { value: raw[found], key: found };
                        }
                        return { value: null, key: '' };
                    };
                    const toDateDisplay = (dateNum) => dateNum > 0 ? `${Math.floor(dateNum/10000)}-${String(Math.floor((dateNum%10000)/100)).padStart(2,'0')}-${String(dateNum%100).padStart(2,'0')}` : '';
                    const resolvePurchaseDate = (item = {}) => {
                        const raw = item._raw || {};
                        const rawDate = getRawExactWithKey(raw, ['매입일자', '구매일자', '입고일자', '일자', '날짜', '기록']);
                        const candidates = [rawDate.value, item.일자, raw['일자'], raw['매입일자'], raw['구매일자'], raw['입고일자'], raw['날짜'], raw['기록']];
                        for (const cand of candidates) {
                            const d = formatItemDate(cand, refYear);
                            if (d > 0) return { dateNum: d, source: rawDate.key || item._dateSource || '매입일자', rawValue: cand };
                        }
                        return { dateNum: 0, source: rawDate.key || item._dateSource || '', rawValue: '' };
                    };

                    // v8.99zg: 원가추출 파일 기준일은 재고/수불마감 스냅샷 기준일이다.
                    // ERP 재고현황은 1행 제목줄의 날짜가 기준일이다.
                    // 상품별 구매일(기록)이나 오늘 날짜를 기준일/파일명으로 쓰지 않는다.
                    // 우선순위: 1행 제목 기준일 > 파일명 날짜 > 기준일/마감일자/결산일자 컬럼 > 미상.
                    const resolveStockBasisDate = () => {

                        const basisNames = ['기준일', '마감일자', '결산일자', '재고기준일', '재고일자', '재고현황일자'];
                        for (const stockItem of parsedEnd) {

                            const cell = getRawExactWithKey(raw, basisNames);
                            const candidates = [cell.value, raw['기준일'], raw['마감일자'], raw['결산일자'], raw['재고기준일'], raw['재고일자'], raw['재고현황일자']];

                        return { dateNum: 0, source: '' };
                    };
                    const stockBasisDate = resolveStockBasisDate();
                    const stockBasisDateNum = stockBasisDate.dateNum || 0;
                    const targetDateStrFromData = stockBasisDateNum ? toDateDisplay(stockBasisDateNum) : '기준일미상';
                    setTargetDateStr(targetDateStrFromData);
                    setAnalysisPeriod(stockBasisDateNum ? `초기 재고 자산화 모드 / 기준일 ${targetDateStrFromData}` : '초기 재고 자산화 모드 / 기준일미상');

                    // v8.99z/zd: 원가추출은 현재 재고를 최신 구매분부터 역순으로 자산화한다.
                    // 단, 화면 표시일은 구매 Lot의 구매일자만 허용한다. 매칭 실패 시 오늘 날짜로 대체하지 않는다.
                    const sortedIn = [...parsedIn]
                        .map((item, idx) => {
                            const resolvedDate = resolvePurchaseDate(item);
                            return {
                                ...item,

                    const inPoolByCode = {};
                    const inPoolByName = {};
                    sortedIn.forEach(item => {

                            if (!inPoolByCode[codeKey]) inPoolByCode[codeKey] = [];

                        }
                        if (nameKey) {
                            if (!inPoolByName[nameKey]) inPoolByName[nameKey] = [];
                            if (!inPoolByName[nameKey].includes(item)) inPoolByName[nameKey].push(item);
                        }
                    });

                    const pData = {}; let uniqueIdCounter = 0;

                    parsedEnd.forEach((item) => {
                        const code = String(item.코드 || 'NO_CODE');
                        const stockName = item._raw?.['상품명(규격)'] || item.품명;
                        let origPrice = parseNumber(item._raw?.['매입단가(원가)'] !== undefined ? item._raw['매입단가(원가)'] : item.단가);
                        let actualQty = parseNumber(item.수량);
                        if (item._raw?.['기말실사(이월수량)'] !== undefined) actualQty = parseNumber(item._raw['기말실사(이월수량)']);
                        else if (item._raw?.['기말실사'] !== undefined) actualQty = parseNumber(item._raw['기말실사']);

                        if (actualQty <= 0) return;

                        let remainingQty = actualQty;
                        const codeKey = normalizeCodeKey(code);
                        const nameKey = normalizeKeyText(stockName);
                        const inList = inPoolByCode[codeKey] || inPoolByName[nameKey] || [];
                        for (let i = 0; i < inList.length && remainingQty > 0; i++) {
                            const inItem = inList[i];
                            const availableQty = parseNumber(inItem._remainQty);
                            const unitPrice = parseNumber(inItem.단가);
                            if (availableQty <= 0 || unitPrice <= 0) continue;

                            remainingQty -= takeQty;
                            inItem._remainQty = availableQty - takeQty;

                            const purchaseVendor = safeStr(inItem.거래처, '구매처미상');
                            const groupKey = `${code}|${unitPrice}|${purchaseDate}|${purchaseVendor}|${uniqueIdCounter++}`;
                            const priceMismatchIssue = (origPrice > 0 && origPrice !== unitPrice) ? `⚠️재고가${formatMoney(origPrice)}≠구매가${formatMoney(unitPrice)}` : '';
                            pData[groupKey] = {
                                batchKey: groupKey, 코드: code, 품명: stockName, 단가: unitPrice, 일자: purchaseDate, 거래처: purchaseVendor,
                                기초: takeQty, 입고: 0, 출고: 0, 대체입고: 0, 대체출고: 0, 전산잔량: takeQty, 실사: takeQty, 로스: 0,
                                매출액: 0, 매출원가: 0, 메모: item._raw?.['수기메모'] || '', 이슈: [`✅${purchaseDate}(${purchaseVendor})원가추출`, priceMismatchIssue].filter(Boolean),
                                출고내역: {}, _orig: {기초: takeQty, 입고: 0, 출고: 0, 단가: unitPrice}, isDummy: false, 수기확인완료: true,
                                _costExtractMode: 'REVERSE_PURCHASE', _stockRecordDate: item.일자 || '', _stockRecordVendor: item.거래처 || '', _stockRecordPrice: origPrice, 기본: getBasicRawValue(item),
                                _dateDisplayMemo: `${purchaseDate}(${inItem._purchaseDateSource || '구매현황'})`, _matchedBy: inPoolByCode[codeKey] ? 'code' : 'name'
                            };
                        }
                        if (remainingQty > 0) {
                            // 구매현황으로 배정하지 못한 잔여 수량은 오늘 날짜나 수불마감 결산일자를 구매일처럼 표시하지 않는다.
                            const fallbackPrice = origPrice;
                            const fallbackVendor = safeStr(item.거래처, '구매Lot미확정');
                            const fallbackLabel = fallbackPrice > 0 ? `⚠️구매Lot미확정_재고/수불마감값보조(${fallbackVendor})` : '🚨구매Lot없음/단가없음';
                            const groupKey = `${code}|${fallbackPrice}|FALLBACK|${uniqueIdCounter++}`;

                                매출액: 0, 매출원가: 0, 메모: item._raw?.['수기메모'] || '', 이슈: [fallbackLabel],
                                출고내역: {}, _orig: {기초: remainingQty, 입고: 0, 출고: 0, 단가: fallbackPrice}, isDummy: (!code || code === 'NO_CODE'), 수기확인완료: (fallbackPrice > 0),
                                _costExtractMode: 'STOCK_FALLBACK', 기본: getBasicRawValue(item), _dateDisplayMemo: '구매현황에서 해당 재고수량에 배정할 구매일자를 찾지 못했습니다. 오늘 날짜로 보정하지 않았습니다.'
                            };
                        }
                    });

                    const finalProductData = Object.values(pData).filter(item => !isSummaryOrInvalidProductRow({ code: item.코드, name: item.품명, raw: item._raw })).filter(item => !(item.기초 === 0 && item.입고 === 0 && item.출고 === 0 && item.실사 === 0 && item.로스 === 0)).sort((a, b) => FILTER_SORT_MODULE.compareByCodeThenName(a, b));
                    setProductData(finalProductData); setAppStep('closing'); 
                    setTimeout(() => { setAlertMsg("✨ [초기 재고 셋업 완료]\n\n재고/수불마감 자료를 현재 보유수량으로 보고, 매입 내역(2번)의 최신 구매분부터 역순 적용하여 실제 구매일·구매처·구매단가 기준으로 자산화 데이터를 추출했습니다.\n\n수불마감 기준일은 상품별 구매일이 아니라 재고/수불마감 파일의 기준일로 설정했습니다."); }, 800);
                } catch (err) { setAlertMsg('원가 추출 중 오류가 발생했습니다.'); console.error(err); } finally { setIsProcessing(false); }
            }, [mappings, setAlertMsg, setIsProcessing, setAppStep]);

            return {
                productData, setProductData, analysisPeriod, setAnalysisPeriod, targetDateStr, setTargetDateStr, substHistory, setSubstHistory, ackMultiCodes, setAckMultiCodes,
                resetEngine, handleBaseDataChange, handleManualStockChange, executeImmediateSubstitution, handleSalesMove, executeAnalysis, runAnalysis, runCostExtraction
            };
        };

        /* =======================================================================
           4. UI 컴포넌트 (View Layer)
           ======================================================================= */
        
        const IssueChip = React.memo(({ msg }) => {
            let shortMsg = msg;
            let tooltip = msg;
            let colorClass = "bg-slate-100 text-slate-700 border-slate-200";

            if (msg.includes('Lot원가확인') || msg.includes('Lot불일치') || msg.includes('Lot매치실패') || msg.includes('Lot확인필요') || msg.includes('Lot매치확인') || msg.includes('1창고FIFO') || msg.includes('매입처없음') || msg.includes('매치변경')) {
                shortMsg = msg.includes('✅') ? "✅Lot" : "🚨Lot"; tooltip = (msg.includes('Lot확인필요') || msg.includes('1창고FIFO')) ? `1창고 FIFO Lot 확인 필요: ${msg}` : (msg.includes('Lot원가확인') ? `원가 영향 Lot 확인: ${msg}` : `매입처 불일치: ${msg}`);
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-blue-100 text-blue-700 border-blue-200 font-bold shadow-sm";
            } else if (msg.includes('단가없음') || msg.includes('단가변경')) {
                shortMsg = msg.includes('✅') ? "✅단가" : "🚨단가"; tooltip = `매입 단가 누락 또는 변경: ${msg}`;
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg === '🚨잔량' || msg === '✅잔량') {
                shortMsg = msg.includes('✅') ? "✅잔량" : "🚨잔량"; tooltip = "잔량이 마이너스입니다.";
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg === '🚨계산' || msg === '✅계산') {
                shortMsg = msg.includes('✅') ? "✅계산" : "🚨계산"; tooltip = "계산잔량이 마이너스입니다.";
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg.includes('수량부족')) {
                shortMsg = "🚨계산"; tooltip = `계산잔량이 마이너스입니다: ${msg}`;

            } else if (msg.includes('신규발생')) {

                colorClass = shortMsg.includes('🚨') ? "bg-orange-50 text-orange-700 border-orange-200 font-bold shadow-sm" : "bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm font-bold";
            } else if (msg.includes('코드없음')) {
                shortMsg = msg.includes('✅') ? "✅코드" : "🚨코드"; tooltip = `상품코드 정보 누락: ${msg}`;
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg.includes('전산 재고 없음')) {

                colorClass = shortMsg.includes('🚨') ? "bg-orange-50 text-orange-700 border-orange-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg.includes('과다로스')) {

            } else if (msg.includes('장부 수기조정') || msg.includes('원가수정')) {
                shortMsg = "✅수기조정"; tooltip = `사용자가 기초/입고/출고/단가를 직접 수정함: ${msg}`;
                colorClass = "bg-slate-50 text-slate-500 border-slate-200 shadow-sm";
            } else if (msg.includes('🔄')) {
                shortMsg = msg; tooltip = `스페이스바 대체 내역`;
                // 긴 품명이 들어올 수 있으므로 max-w 와 truncate 클래스 적용

            }

            return (
                <span data-tooltip={tooltip} className={`relative px-2 py-0.5 rounded border font-semibold text-[10px] cursor-help ${colorClass}`}>
                    {shortMsg}
                </span>
            );
        });

        const GuideModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[400] bg-slate-900 bg-opacity-60 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-2xl modal-bounce border border-slate-200">
                        <div className="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                            <h3 className="font-black text-slate-800 text-lg flex items-center"><i className="fas fa-book-open text-blue-500 mr-2"></i>이슈 알림(칩) 가이드북</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition"><i className="fas fa-times text-xl"></i></button>
                        </div>
                        
                        <p className="text-sm text-slate-600 mb-5">칩에 마우스를 올리면(모바일은 터치) 원래의 상세 메시지가 표시됩니다.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2">
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨Lot</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-blue-100 text-blue-700 border-blue-200">✅Lot</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">매입처(Lot) 불일치</p>
                                <p className="text-xs text-slate-600 leading-relaxed">매출 전표의 '구매처'와 매입 내역의 '거래처'가 다를 때 발생합니다. <br/>👉 <span className="font-semibold text-blue-600">조치:</span> 매핑 설정을 수정하거나, 로스가 발생한 원물/소분품을 스페이스바로 상계하세요. (내부 공용 로트는 우측 메모에 ℹ️ 로 자동 표시됩니다)</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨단가</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-slate-50 text-slate-400 border-slate-200">✅단가</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">매입 단가 누락 / 변경</p>
                                <p className="text-xs text-slate-600 leading-relaxed">엑셀에 단가 정보가 없거나 0원으로 등록되었습니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 해당 품목의 단가(원가) 입력 칸을 클릭하여 올바른 단가를 수기로 입력하세요.</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-orange-50 text-orange-700 border-orange-200">🚨수량</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-slate-50 text-slate-400 border-slate-200">✅수량</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">전산 잔량과 실사 차이 (로스 발생)</p>
                                <p className="text-xs text-slate-600 leading-relaxed">계산된 전산 잔량(기초+입고-출고)과 입력된 실사 수량이 다릅니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 정상적인 오차라면 Tab 키를 눌러 확인(✅) 처리하고, 이상하다면 원시 데이터 누락을 확인하세요.</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨잔량</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">출고 시 전산 재고 부족 (마이너스)</p>
                                <p className="text-xs text-slate-600 leading-relaxed">보유한 가용 재고보다 판매/출고된 수량이 더 많아 마이너스 재고가 발생했습니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 입고 내역이 누락되었거나 타 매입처 재고가 잘못 차감된 단서가 될 수 있습니다.</p>
                            </div>

                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-orange-50 text-orange-700 border-orange-200">🚨신규</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">신규 품목 발생</p>
                                <p className="text-xs text-slate-600 leading-relaxed">이전 수불 마감 자료에는 없던 새로운 품목 코드가 당기 매입/매출에 등장했습니다.</p>
                            </div>

                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨코드</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">상품 코드 누락</p>
                                <p className="text-xs text-slate-600 leading-relaxed">품명은 있으나 상품 코드(SKU)가 비어있습니다. 정확한 집계를 위해 엑셀 원본에 코드를 채워주세요.</p>
                            </div>
                        </div>
                        
                        <div className="mt-6 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2.5 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-slate-900 transition shadow-md w-full sm:w-auto">확인 및 닫기</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductRow = React.memo(({ item, idx, isLinked, isActiveMulti, isMultiGroupItem, targetDateStr, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove, internalLotMapping, isGroupStart, isNewCategory, normalizeDisplayIssues }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            displayIssues = normalizeDisplayIssues ? normalizeDisplayIssues(displayIssues) : displayIssues;
            
            const totalAvailable = item.기초 + item.입고 + item.대체입고;
            if (item.로스 < 0 && totalAvailable > 0 && (Math.abs(item.로스) / totalAvailable) > 0.2) displayIssues.push('🚨과다로스(20%↑)');
            
            const internalLotKeywords = useMemo(() => (internalLotMapping || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s), [internalLotMapping]);
            
            const regularIssues = [];
            const internalMemos = [];
            const manualMemos = [];

            displayIssues.forEach(msg => {
                const isInternalMsg = msg.startsWith('✅') && !msg.includes('원가추출') && internalLotKeywords.some(kw => msg.toLowerCase().replace('✅', '').includes(kw));
                const isManualMsg = msg.includes('수기조정') || msg.includes('원가수정');

                if (isManualMsg) {
                    manualMemos.push(msg);
                } else if (isInternalMsg) {
                    internalMemos.push(msg);
                } else {
                    regularIssues.push(msg);
                }
            });

            const hasIssue = regularIssues.length > 0;
            
            const addedIn = item.대체입고;
            const addedOut = item.대체출고;
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            const isToday = item.일자 && targetDateStr && item.일자 === targetDateStr;

            // 🌟 랙(Lag) 방지를 위한 입력 필드 로컬 상태 & 디바운싱(Debouncing) 처리
            const [localPrice, setLocalPrice] = useState(item.단가 === 0 ? '' : Math.round(item.단가));
            useEffect(() => setLocalPrice(item.단가 === 0 ? '' : Math.round(item.단가)), [item.단가]);
            const priceTimeout = useRef(null);

            const [localPrev, setLocalPrev] = useState(item.기초 === 0 ? '' : item.기초);
            useEffect(() => setLocalPrev(item.기초 === 0 ? '' : item.기초), [item.기초]);
            const prevTimeout = useRef(null);

            const [localIn, setLocalIn] = useState(totalIn === 0 ? '' : totalIn);
            useEffect(() => setLocalIn(totalIn === 0 ? '' : totalIn), [totalIn]);
            const inTimeout = useRef(null);

            const [localOut, setLocalOut] = useState(totalOut === 0 ? '' : totalOut);
            useEffect(() => setLocalOut(totalOut === 0 ? '' : totalOut), [totalOut]);
            const outTimeout = useRef(null);

            const [localActual, setLocalActual] = useState(item.실사 === null || item.실사 === undefined ? '' : item.실사);
            useEffect(() => setLocalActual(item.실사 === null || item.실사 === undefined ? '' : item.실사), [item.실사]);
            const actualTimeout = useRef(null);

            useEffect(() => {
                return () => {
                    if (priceTimeout.current) clearTimeout(priceTimeout.current);
                    if (prevTimeout.current) clearTimeout(prevTimeout.current);
                    if (inTimeout.current) clearTimeout(inTimeout.current);
                    if (outTimeout.current) clearTimeout(outTimeout.current);
                    if (actualTimeout.current) clearTimeout(actualTimeout.current);
                };
            }, []);

            const handlePriceChange = (e) => {
                const val = e.target.value; setLocalPrice(val);
                if (priceTimeout.current) clearTimeout(priceTimeout.current);
                priceTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '단가', val), 250);
            };

            const handlePrevChange = (e) => {
                const val = e.target.value; setLocalPrev(val);
                if (prevTimeout.current) clearTimeout(prevTimeout.current);
                prevTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '기초', val), 250);
            };

            const handleInChange = (e) => {
                const val = e.target.value; setLocalIn(val);
                if (inTimeout.current) clearTimeout(inTimeout.current);
                const numVal = (val === '' ? 0 : Number(val)) - item.대체입고;
                inTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '입고', numVal), 250);
            };

            const handleOutChange = (e) => {
                const val = e.target.value; setLocalOut(val);
                if (outTimeout.current) clearTimeout(outTimeout.current);
                const numVal = (val === '' ? 0 : Number(val)) - item.대체출고;
                outTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '출고', numVal), 250);
            };

            const handleActualChange = (e) => {
                const val = e.target.value; setLocalActual(val);
                if (actualTimeout.current) clearTimeout(actualTimeout.current);
                actualTimeout.current = setTimeout(() => onStockChange(item.batchKey, val), 250);
            };

            const actualQty = localActual === '' ? '' : Number(localActual);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const focusAndEnsureVisible = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.focus({ preventScroll: true }); el.select();
                    const container = document.getElementById('main-scroll-container');
                    if (container) {
                        const cRect = container.getBoundingClientRect(); const eRect = el.getBoundingClientRect();
                        if (eRect.top < cRect.top + 150 || eRect.bottom > cRect.bottom - 60) {
                            container.scrollTo({ top: container.scrollTop + (eRect.top - cRect.top) - (cRect.height / 2) + (eRect.height / 2), behavior: 'smooth' });
                        }
                    } else el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            const handleKd = (e, type) => {
                const cols = ['price-input', 'base-prev', 'base-in', 'base-out', 'actual-input']; const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') { if (colIdx < cols.length - 1) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx+1]}-${idx}`); } }
                else if (e.key === 'ArrowLeft') { if (colIdx > 0) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx-1]}-${idx}`); } }
                else if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx+1}`); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx-1}`); }
                else if (e.key === ' ' || e.code === 'Space') { if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }
            };

            const cellInputBase = "w-full text-right bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none rounded text-[13px] px-1.5 py-1 transition-all shadow-sm";
            
            let topBorderClass = '';
            if (isGroupStart) {
                topBorderClass = 'border-t-[3px] border-t-slate-300';
            } else if (isNewCategory) {
                // 3차 카테고리(품목코드 앞 6자리) 변경 시 연하고 살짝만 구분되는 테두리 적용
                topBorderClass = 'border-t-[2px] border-t-slate-200';
            }
            
            return (
                <tr 
                    data-code={item.코드} data-batch={item.batchKey} 
                    onDragOver={(e) => { e.preventDefault(); setIsDragOver(true); }} onDragLeave={(e) => { e.preventDefault(); setIsDragOver(false); }} 
                    onDrop={(e) => { 
                        e.preventDefault(); setIsDragOver(false); 
                        try { 
                            const d = JSON.parse(e.dataTransfer.getData('text/plain')); 
                            // 🌟 2중 방어막: 드래그된 수량이 정상적인 숫자일 때만 이동을 허용하여 NaN 감염 방지
                            const moveQty = Number(d.qty);
                            const isCtrlPressed = e.ctrlKey || e.metaKey;
                            if (d.sourceKey !== item.batchKey && !isNaN(moveQty) && moveQty > 0) {
                                onSalesMove(d.sourceKey, item.batchKey, d.vendor, moveQty, d.code, item.코드, isCtrlPressed); 
                            }
                        } catch (err) {} 
                    }}
                    className={`transition duration-200 ${isActiveMulti ? 'bg-blue-50/60 outline outline-2 outline-blue-500 z-20 relative shadow-md' : (isLinked ? 'bg-slate-50 ring-1 ring-blue-400 shadow-md relative z-10 scale-[1.01]' : 'border-b border-slate-100 hover:bg-slate-50')} ${isDragOver ? 'bg-blue-50 outline outline-2 outline-blue-400 scale-[1.01] z-20 shadow-md' : ''} ${!isActiveMulti && item.isDummy && item.단가 === 0 ? 'bg-rose-50/30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.03)] border-r border-slate-200 ${isMultiGroupItem && !isLinked ? 'border-l-4 border-l-blue-400' : ''} ${isLinked ? 'bg-blue-50/50 border-l-4 border-l-blue-600' : ''} ${isActiveMulti ? 'bg-blue-50/60' : (item.isDummy && item.단가 === 0 ? 'bg-rose-50' : 'bg-white group-hover:bg-slate-50')} ${topBorderClass}`}>
                        <div className="flex items-center justify-between w-full">
                            <div className="flex flex-col justify-center flex-1 pr-3 overflow-hidden max-w-[280px]">
                                <div className="font-semibold text-slate-800 text-[13px] flex items-start gap-1 mb-0.5">
                                    {isLinked && <i className="fas fa-link text-blue-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    {isActiveMulti && <i className="fas fa-tags text-blue-500 mr-1 mt-0.5"></i>}
                                    <span title={item.품명} className="truncate leading-tight text-slate-900">{item.품명}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 truncate font-medium tracking-tight flex items-center">
                                    {item.코드 !== '-' && item.코드 !== 'NO_CODE' ? <span className="mr-1">{item.코드}</span> : ''}
                                    <span title={item._dateDisplayMemo || (item.일자 ? item.일자 : '미상(과거처리)')} className={isToday ? "text-blue-700 bg-blue-100 px-1 rounded border border-blue-200 font-bold" : (item._dateDisplayMemo && item._dateDisplayMemo.includes('과거처리') ? "text-slate-500 bg-slate-100 px-1 rounded border border-slate-200 font-bold" : "")}>{item.일자 || '미상'}</span>
                                    <span className="mx-1 text-slate-300">|</span> 
                                    <span className={`truncate ${isToday ? 'text-blue-700 font-bold' : ''}`}>{item.거래처 || '미지정'}</span>
                                    {item.대체입고 > 0 && <span className="text-[9px] text-blue-500 font-semibold whitespace-nowrap ml-1 shrink-0">(조정됨)</span>}
                                </div>
                            </div>
                            <div className="flex items-center justify-end shrink-0 pl-3 border-l border-slate-200">
                                <span className="text-slate-400 font-semibold text-[10px] mr-1">₩</span>
                                <input id={`price-input-${idx}`} data-field="price-input" type="number" className={`${cellInputBase} w-[70px] font-bold ${item.단가 === 0 ? 'border-rose-300 bg-rose-50 text-rose-600' : 'text-slate-800'}`} value={localPrice} onChange={handlePriceChange} onClick={(e) => e.stopPropagation()} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'price-input')} placeholder="0" />
                            </div>
                        </div>
                    </td>
                    <td className={`py-2 px-2 text-right ${isActiveMulti ? 'bg-slate-50/50' : ''} border-r border-slate-100 ${topBorderClass}`}>
                        <input id={`base-prev-${idx}`} data-field="base-prev" type="number" className={`${cellInputBase} font-semibold ${item.기초 < 0 ? 'text-rose-600 border-rose-200' : 'text-slate-700'}`} value={localPrev} onChange={handlePrevChange} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${topBorderClass}`}>
                        <input id={`base-in-${idx}`} data-field="base-in" type="number" className={`${cellInputBase} font-bold ${totalIn > 0 ? 'text-emerald-600' : 'text-slate-400'}`} value={localIn} onChange={handleInChange} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-in')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${topBorderClass}`}>
                        <input id={`base-out-${idx}`} data-field="base-out" type="number" className={`${cellInputBase} font-bold ${totalOut > 0 ? 'text-rose-600' : 'text-slate-400'}`} value={localOut} onChange={handleOutChange} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-out')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${isLinked ? 'bg-blue-50' : ''} relative ${topBorderClass}`}>
                        {isLinked && <div className="absolute -top-6 right-0 bg-slate-800 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md whitespace-nowrap animate-bounce">조정 대상</div>}
                        <input id={`actual-input-${idx}`} data-field="actual-input" type="number" value={localActual} onChange={handleActualChange} onClick={() => onFocusInput(item.batchKey, idx)} onFocus={(e) => { e.target.select(); onFocusInput(item.batchKey, idx); }} onKeyDown={(e) => handleKd(e, 'actual-input')} onWheel={e => e.target.blur()} placeholder={item.전산잔량} className={`w-full text-right bg-white border ${isLinked ? 'border-blue-500 ring-1 ring-blue-500 text-blue-900' : 'border-slate-300 text-slate-800 hover:border-slate-400'} ${isNegativeActual ? 'bg-rose-50 border-rose-400 text-rose-700 font-bold' : 'font-semibold'} rounded text-[13px] px-1.5 py-1 focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 shadow-sm transition-all cursor-pointer`} />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${topBorderClass}`}>
                        {item.로스 !== 0 && <div className="flex flex-col items-end justify-center mb-0.5"><span className={`text-[12px] font-bold ${item.로스 < 0 ? 'text-rose-600' : 'text-blue-600'}`}>{item.로스 > 0 ? '+' : ''}{formatMoney(item.로스)}</span></div>}
                        {item.로스 === 0 && <span className="text-slate-300 font-bold">-</span>}
                    </td>

                const groupCustomer = safeStr(getRawCell(raw, ['거래처', '거래처명']) ?? item.거래처, '').trim();

                // 과거 F열 '청과'는 거래처명으로만 읽고 단가 후보로 쓰지 않는다.
                let detailCustomer = safeStr(getRawCell(raw, ['거래처명']) ?? '', '').trim();
                if (!detailCustomer) {
                    const legacyCheonggwa = getRawCell(raw, ['청과']);
                    if (legacyCheonggwa !== null && transferStrictNumber(legacyCheonggwa) <= 0) detailCustomer = safeStr(legacyCheonggwa, '').trim();
                }
                // v8.99l: 판매업로드 K열 '규격'은 상품명에서 추출하지 않고 구매현황 원본의 거래처명/규격 값을 우선 적용한다.
                // 현재 2전송 구매현황에서는 '거래처명' 컬럼이 판매업로드 K열 규격 자리에 들어가는 운영값이다.
                const purchaseSpecValue = safeStr(getRawCell(raw, ['거래처명']) ?? getRawCell(raw, ['규격', '규격명', '포장규격', '상품규격', '옵션', '사이즈']) ?? '', '').trim();
                const spec = purchaseSpecValue || detailCustomer;
                const qty = parseNumber(getRawCell(raw, ['수량', '입고수량', '구매수량', '매입수량']) ?? item.수량);
                const dateValue = safeStr(getRawCell(raw, ['일자', '날짜', '매입일자']) ?? item.일자, '');
                const purchaseVendor = safeStr(getRawCell(raw, ['구매처', '원구매처', '매입처']) ?? item.거래처, '');
                const cost = transferStrictNumber(getTransferRawValue(raw, '단가')) || transferStrictNumber(getTransferRawValue(raw, '입고가')) || safeNum(item.단가);
                const memo = safeStr(getRawCell(raw, ['적요']) ?? '', '');
                const orderNote = safeStr(getRawCell(raw, ['출고지시']) ?? '', '');
                const notice = getTransferRawValue(raw, '출고가(공지)');
                return { raw, code, name, spec, groupCustomer, detailCustomer, qty, dateValue, purchaseVendor, cost, memo, orderNote, notice };
            }, [getTransferRawValue, transferStrictNumber]);

            const isTransferGenerationValidPurchaseRow = useCallback((item = {}) => {
                const f = getTransferBaseFields(item);
                const joined = Object.values(f.raw || {}).map(v => safeStr(v, '')).join(' ').replace(/\s/g, '');
                if (!f.code || !f.name || !f.groupCustomer || safeNum(f.qty) === 0) return false;
                if (['총합계', '총계', '합계', '소계', '월계'].some(word => joined.includes(word))) return false;
                return true;
            }, [getTransferBaseFields]);

            const resolveTransferEffectiveRule = useCallback((group = {}) => {
                // v8.99zx: 판매업로드 단가/판매가 칸은 화면 저장값이 아니라 단가그룹별 확정 알고리즘을 최종 기준으로 한다.
                // 구버전 localStorage에 식자재>출고(외노) 같은 룰이 남아 있어도 여기서 강제 보정한다.
                const groupName = normalizeTransferGroupName(group.groupName);
                const rule = normalizeTransferPriceRuleByGroup(groupName, group.rule || []);
                return rule.length ? rule : (group.rule || []).map(v => safeStr(v)).filter(Boolean);
            }, []);

            const resolveTransferSalesPrice = useCallback((purchaseItem = {}) => {
                const config = buildTransferPriceConfig();
                const f = getTransferBaseFields(purchaseItem);
                const group = config.groups[f.groupCustomer];
                if (!group) {
                    return { status: 'CUSTOMER_GROUP_MISSING', price: 0, priceKey: '', columnName: '', groupName: '', rulePath: '', feeMode: 'NONE', profitMode: 'NORMAL', outputCustomerMode: 'GROUP_NAME', base: f, effectiveRule: [] };
                }

                const effectiveRule = resolveTransferEffectiveRule(group);
                const effectiveRulePath = effectiveRule.join(' > ');

                for (const priceKey of effectiveRule) {
                    const found = getTransferPriceByKey(f.raw, priceKey, config);
                    if (found.price > 0) {
                        return {
                            status: 'MATCHED',
                            price: found.price,
                            priceKey,
                            columnName: found.columnName,
                            groupName: group.groupName,
                            rulePath: effectiveRulePath,
                            feeMode: group.feeMode,
                            profitMode: group.profitMode,
                            outputCustomerMode: group.outputCustomerMode || 'GROUP_NAME',
                            group,
                            base: f,
                            effectiveRule
                        };
                    }
                }
                return { status: 'PRICE_MISSING', price: 0, priceKey: '', columnName: '', groupName: group.groupName, rulePath: effectiveRulePath, feeMode: group.feeMode, profitMode: group.profitMode, outputCustomerMode: group.outputCustomerMode || 'GROUP_NAME', group, base: f, effectiveRule };
            }, [buildTransferPriceConfig, getTransferBaseFields, getTransferPriceByKey, resolveTransferEffectiveRule]);

            const getTransferOutputCustomerName = useCallback((resolved) => {
                const f = resolved.base || {};
                const mode = safeStr(resolved.outputCustomerMode || resolved.group?.outputCustomerMode || '', 'GROUP_NAME');
                if (mode === 'ORIGINAL_CUSTOMER') return safeStr(f.detailCustomer || f.groupCustomer, '');
                return safeStr(f.groupCustomer || resolved.groupName, '');
            }, []);

            const buildTransferSalesUploadRows = useCallback((parsedIn = []) => {
                const rows = [];
                const fatalErrors = [];
                const warnings = [];
                const addFatal = (info) => fatalErrors.push({ ...info, level: '업로드불가', action: '원본 구매현황을 수정한 뒤 다시 업로드' });
                const addWarning = (info) => warnings.push({ ...info, level: '확인필요', action: info.action || '판매업로드 후 추가 입력/최종 검증' });

                parsedIn.forEach((item, idx) => {
                    const f = getTransferBaseFields(item);
                    const joined = Object.values(f.raw || {}).map(v => safeStr(v, '')).join(' ').replace(/\s/g, '');
                    const isSummaryRow = ['총합계', '총계', '합계', '소계', '월계'].some(word => joined.includes(word));
                    if (isSummaryRow) return;

                    const rowNo = idx + 1;
                    const rowBase = { rowNo, customer: f.groupCustomer, spec: f.spec, outputCustomer: f.detailCustomer || f.groupCustomer, code: f.code, name: f.name, qty: f.qty };
                    const fatalReasons = [];
                    if (!safeStr(f.groupCustomer || f.detailCustomer, '')) fatalReasons.push('거래처명 없음');
                    if (!f.code) fatalReasons.push('품목코드 없음');
                    if (safeNum(f.qty) === 0) fatalReasons.push('수량 없음');

                    if (fatalReasons.length) {
                        addFatal({ ...rowBase, reason: fatalReasons.join(', ') });
                        return;
                    }

                    const resolved = resolveTransferSalesPrice(item);
                    const outputCustomer = getTransferOutputCustomerName(resolved) || f.detailCustomer || f.groupCustomer;
                    const checkReasons = [];
                    if (resolved.status === 'CUSTOMER_GROUP_MISSING') checkReasons.push('거래처 단가그룹 없음');
                    if (resolved.status === 'PRICE_MISSING') checkReasons.push('기준단가 없음');
                    if (!f.name) checkReasons.push('품명 없음');

                    let price = resolved.status === 'MATCHED' ? safeNum(resolved.price) : '';
                    let supply = price === '' ? '' : safeNum(f.qty) * safeNum(price);

                    // v8.99k: 치명 에러는 거래처명/품목코드/수량 없음만 막는다.
                    // 단가그룹 없음·기준단가 없음·단가오염 의심은 실무상 후속 입력 가능성이 있으므로 업로드 행은 생성하고 확인필요로 안내한다.
                    const unitCandidateKeys = ['출고가(공지)', '도매A', '출고(외노)', '상장가', '식자재', '단가', '청과'];
                    const unitCandidates = unitCandidateKeys
                        .map(k => transferStrictNumber(getTransferRawValue(f.raw, k)))
                        .filter(v => v > 0);
                    const looksLikeAmount = price !== '' && safeNum(f.qty) > 1 && unitCandidates.some(v => v > 0 && Math.abs(safeNum(price) - (v * safeNum(f.qty))) < 0.0001);
                    if (looksLikeAmount) {
                        checkReasons.push('단가 칸에 공급가액성 금액 의심');
                        price = '';
                        supply = '';
                    }

                    if (checkReasons.length) {
                        addWarning({
                            ...rowBase,
                            outputCustomer,
                            reason: checkReasons.join(', '),
                            groupName: resolved.groupName || '',
                            rulePath: resolved.rulePath || '',
                            priceSource: resolved.priceKey || '',
                            action: '업로드는 허용하되 단가/매핑 추가 입력 후 최종 통보 또는 재검증'
                        });
                    }

                    const costAmount = price === '' ? 0 : safeNum(f.qty) * safeNum(f.cost);
                    const fee = resolved.feeMode === 'LISTING_FEE' ? 0 : 0;
                    const profit = price === '' ? '' : (resolved.profitMode === 'ZERO_PROFIT' ? 0 : (safeNum(supply) - fee - costAmount));

                    rows.push({
                        '일자': '',
                        '순번': '',
                        '거래처코드': '',
                        '거래처명': outputCustomer,
                        '출하창고': '02',
                        '거래유형': '',
                        '전잔액': '',
                        '전달사항': checkReasons.length ? `확인필요: ${checkReasons.join(', ')}` : '',
                        '품목코드': f.code,
                        '품목명': f.name,
                        // v8.99l: K열 규격은 구매현황 원본 정보값(거래처명/규격)을 그대로 사용한다.
                        '규격': f.spec,
                        '수량': f.qty,
                        '단가': price,
                        '외화금액': '',
                        '공급가액': supply,
                        '적요': f.memo,
                        '출고지시': f.orderNote,
                        '공지': safeStr(f.notice, ''),
                        '구매처': f.purchaseVendor,
                        '날짜': f.dateValue,
                        '구매': f.cost,
                        '생산전표생성': '',
                        '_적용그룹': resolved.groupName || '',
                        '_적용단가명': resolved.priceKey || '',
                        '_단가룰': resolved.rulePath || '',
                        '_확인필요': checkReasons.join(', '),
                        '_수익': profit
                    });
                });
                rows.sort((a, b) =>
                    safeStr(a['거래처명']).localeCompare(safeStr(b['거래처명']), 'ko') ||
                    safeStr(a['규격']).localeCompare(safeStr(b['규격']), 'ko') ||
                    safeStr(a['품목코드']).localeCompare(safeStr(b['품목코드']), 'ko')
                );
                return { rows, fatalErrors, warnings, excluded: fatalErrors, notices: warnings };
            }, [getTransferBaseFields, getTransferOutputCustomerName, getTransferRawValue, resolveTransferSalesPrice, transferStrictNumber]);

            const downloadWorkbook = useCallback((wb, filename) => {
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, []);

            const handleGenerateTransferSalesUpload = useCallback(async (targetFiles = files) => {

                if (!targetFiles.in) {
                    setAlertMsg('판매업로드 생성은 구매현황 파일이 필요합니다.');

                try {

                        return;
