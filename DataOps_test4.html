<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ONEAPP DataOps - 핵심 수불부 관리 (v8.99a Transfer Direct Check Loader Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .modal-bounce { animation: modalBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* 커스텀 툴팁 스타일 */
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: rgba(15, 23, 42, 0.95); color: white; padding: 6px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 500; white-space: nowrap; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); pointer-events: none;
        }

        /* 초기 로딩 애니메이션 (체감 속도 개선) */
        #initial-loader { position: fixed; inset: 0; background-color: #f8fafc; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; color: #475569; letter-spacing: -0.5px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <!-- 초기 로딩 스크린 -->
    <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">ONEAPP DataOps v8.99a 2전송 직접검증 로딩 수정...</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 8px;">앱 환경을 구성하고 있습니다</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        /* =======================================================================
           1. 유틸리티 함수 (Data formatting & pure logic)
           ======================================================================= */
        const safeNum = (val) => { const n = Number(val); return isNaN(n) || !isFinite(n) ? 0 : n; };
        const safeStr = (val, fallback = '') => {
            if (val === null || val === undefined) return fallback;
            const s = String(val).trim(); const lower = s.toLowerCase();
            if (lower === 'undefined' || lower === 'nan' || lower === 'null' || lower === '') return fallback; return s;
        };
        const parseNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return isNaN(val) ? 0 : val;
            let strVal = String(val).trim(); let isNegative = false;
            if (strVal.startsWith('(') && strVal.endsWith(')')) { isNegative = true; strVal = strVal.slice(1, -1); } 
            else if (strVal.startsWith('-')) { isNegative = true; strVal = strVal.slice(1); }
            let num = Number(strVal.replace(/,/g, '').replace(/[^\d.]/g, ''));
            if (isNegative) num = -num; return isNaN(num) ? 0 : num;
        };
        const formatMoney = (num) => { const n = Number(num); return isNaN(n) ? '0' : Math.round(n).toLocaleString(); };
        const normalizeWarehouseCode = (val) => {
            const raw = safeStr(val, '').replace(/\s/g, '');
            if (!raw) return '';
            const upper = raw.toUpperCase();
            if (raw === '02' || raw === '2' || raw.includes('2전송') || raw.includes('전송') || upper === 'W02') return '2전송';
            if (raw === '01' || raw === '1' || raw.includes('1창고') || raw.includes('창고') || upper === 'W01') return '1창고';
            return raw;
        };
        const getRawCell = (raw = {}, names = []) => {
            const keys = Object.keys(raw || {});
            const norm = (v) => safeStr(v, '').replace(/\s/g, '').toLowerCase();
            for (const name of names) {
                const target = norm(name);
                const found = keys.find(k => norm(k) === target);
                if (found !== undefined && safeStr(raw[found], '') !== '') return raw[found];
            }
            for (const name of names) {
                const target = norm(name);
                const found = keys.find(k => norm(k).includes(target) || target.includes(norm(k)));
                if (found !== undefined && safeStr(raw[found], '') !== '') return raw[found];
            }
            return null;
        };
        const getWarehouseFromRow = (row = {}, fallbackFileName = '') => {
            const raw = row._raw || row.raw || {};
            const direct = getRawCell(raw, ['창고명', '창고', '입고창고', '출고창고', '창고코드']);
            const wh = normalizeWarehouseCode(direct);
            if (wh) return wh;
            const fileName = safeStr(row._sourceFileName || fallbackFileName, '');
            if (/^02|2전송|02구매|02판매/.test(fileName)) return '2전송';
            if (/^01|1창고|01구매|01판매/.test(fileName)) return '1창고';
            return '';
        };
        const isTransferWarehouseRow = (row = {}, fallbackFileName = '') => getWarehouseFromRow(row, fallbackFileName) === '2전송';

        const extractDateFromName = (filename) => {
            if (!filename) return 0;
            const match8 = filename.match(/20\d{6}/); if (match8) return parseInt(match8[0], 10);
            const match6 = filename.match(/(?:^|[^\d])(\d{6})(?:[^\d]|$)/); if (match6) return parseInt('20' + match6[1], 10);
            return 0;
        };
        const extractDateNum = (dStr) => { const num = parseInt(String(dStr).replace(/\D/g, ''), 10); return isNaN(num) ? 0 : num; };
        const addOneDay = (dateNum) => {
            if (!dateNum) return 0; const y = Math.floor(dateNum / 10000); const m = Math.floor((dateNum % 10000) / 100) - 1; const d = dateNum % 100;
            const date = new Date(y, m, d + 1); return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
        };
        const formatItemDate = (dateStr, refYear) => {
            if (!dateStr) return 0; const str = String(dateStr).trim();
            if (str.includes('실사등록') || str.includes('미지정')) return 0; 
            if (/^\d{5}$/.test(str)) {
                const serial = parseInt(str, 10);
                if (serial > 30000 && serial < 80000) {
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    return parseInt(`${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`, 10);
                }
            }
            const parts = str.match(/\d+/g); if (!parts) return 0;
            let y, m, d;
            if (parts.length >= 3) { y = parts[0]; if (y.length === 2) y = '20' + y; m = parts[1].padStart(2, '0'); d = parts[2].padStart(2, '0'); } 
            else if (parts.length === 2) { if (parts[0].length === 4) { y = parts[0]; m = parts[1].padStart(2, '0'); d = '01'; } else { y = String(refYear); m = parts[0].padStart(2, '0'); d = parts[1].padStart(2, '0'); } } 
            else if (parts.length === 1) {
                const c = parts[0];
                if (c.length === 8) { y = c.substring(0, 4); m = c.substring(4, 6); d = c.substring(6, 8); }
                else if (c.length === 6) { if (c.startsWith('20')) { y = c.substring(0, 4); m = c.substring(4, 6); d = '01'; } else { y = '20' + c.substring(0, 2); m = c.substring(2, 4); d = c.substring(4, 6); } } 
                else return 0;
            } else return 0;
            const numY = parseInt(y, 10); const numM = parseInt(m, 10); const numD = parseInt(d, 10);
            if (numY > 2000 && numY < 2100 && numM >= 1 && numM <= 12 && numD >= 1 && numD <= 31) return numY * 10000 + numM * 100 + numD;
            return 0;
        };
        const formatStrForPeriod = (num) => { const s = String(num); if (s.length === 8) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; if (s.length === 6) return `${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`; return s; };

        const parseIssuesAndVendors = (str, price) => {
            if (!str) return { issues: [], vendors: {} };
            const parts = str.match(/[^,]+(?:\([^)]+\))*/g) || [];
            const issues = []; const vendors = {};
            const knownIssues = ['과다로스', '원가수정', '수기조정', '매입내역 없음', '전산 재고 부족', '재고 부족', '변동됨', '변경됨', '삭제됨', '신규추가', '수량변동', '단가변경', '매치변경', '원가추출됨', '원가추출', '단가없음', 'Lot불일치', 'Lot매치실패', '매입처없음', '수량부족', '🔄', '🚨', '✅'];

            parts.forEach(p => {
                const part = p.trim(); if (!part) return;
                
                // 🌟 1중 방어막: 과거 엑셀 파일에 잘못 저장된 (NaN) 유령 텍스트 발견 시 즉시 삭제 처리
                if (part.includes('(NaN)')) return;

                let isKnownIssue = knownIssues.some(ki => part.includes(ki));
                if (isKnownIssue) { issues.push(part); } 
                else {
                    const match = part.match(/(.+)\((\d+)\)$/);
                    if (match) {
                        const vendorName = safeStr(match[1], '미지정'); const qty = parseInt(match[2], 10);
                        if (!isNaN(qty)) vendors[vendorName] = { qty, rev: qty * price, cogs: qty * price, isLifo: false, isPerfectMatch: false, displayVendor: vendorName }; else issues.push(part);
                    } else issues.push(part);
                }
            });
            return { issues, vendors };
        };


        // v8.74: ERP 출력물의 소계/합계/총합계 또는 상품이 아닌 숫자형 요약행 방어막.
        // 예: 품명 2593, 상품코드 없음, 매입내역 없음 형태로 하단에 상품처럼 올라오는 행을 차단한다.
        const isSummaryOrInvalidProductRow = ({ code = '', name = '', raw = {} } = {}) => {
            const codeText = safeStr(code, '').trim();
            const nameText = safeStr(name, '').trim();
            const codeNorm = codeText.replace(/\s/g, '').toLowerCase();
            const nameNorm = nameText.replace(/\s/g, '').toLowerCase();
            const rawValues = Object.values(raw || {}).map(v => safeStr(v, '')).filter(Boolean);
            const joined = [codeText, nameText, ...rawValues].join(' ').replace(/\s/g, '').toLowerCase();

            const summaryWords = ['합계', '총합계', '총계', '소계', 'subtotal', 'total'];
            if (summaryWords.some(word => joined.includes(word))) return true;

            const noRealCode = !codeNorm || codeNorm === 'no_code' || codeNorm === '-' || codeNorm === '미상' || codeNorm === '없음';
            const numericOnlyName = /^[+-]?[\d,\.]+$/.test(nameNorm);
            const placeholderName = !nameNorm || nameNorm === '이름없음' || nameNorm === '미상' || nameNorm === '기록없음';

            // 상품명이 숫자만 있고 상품코드가 없으면 대부분 ERP 소계/건수/요약 행이다.
            if (noRealCode && numericOnlyName) return true;
            if (noRealCode && placeholderName) return true;

            // 코드와 품명이 둘 다 같은 숫자형 값이면 정상 상품이라 보기 어렵다.
            if (numericOnlyName && codeNorm && codeNorm === nameNorm) return true;

            return false;
        };

        const defaultMappings = {
            code: '품목코드, 상품코드, 코드, 품번, 바코드, sku',
            name: '품명, 품목명, 품목명(규격), 품목명[규격], 상품명, 제품명, 이름, 품목, 상품',
            spec: '규격, 옵션, 사이즈', 
            unit: '단위, 규격단위, 포장단위, 단위명, 판매단위',
            qty: '기말실사(이월수량), 기말실사, 기말/실사, 수량, 재고, 기말잔량(실사반영), 기말잔량(실사), 기말잔량, 수량(합계), 입고수량, 출고수량, 판매수량, 잔량, 실사, 합계, 기말, 판매량, 출고량, 입고량',
            price: '매입단가(원가), 단가, 입고가, 입고단가, 구매단가, 판매단가, 매입단가, 매입가, 판매가, 공급가액, 공급가, 금액, 원가, 가격, 최종(창고)',
            date: '결산일자, 매입일자, 일자, 날짜, 구매일자, 판매일자, 입고일자, 출고일자',
            vendor: '원구매처, 구매처, 매출처명, 매입처(Lot), 매입처(거래처), 거래처명, 거래처, 거래, 매장명, 매장, 고객, 판매처, 공급사, 판매, 청과, 3거래',
            matchVendor: '구매처, 매입처', 
            excludeVendor: '우리농산, 1전송, 3우리',
            lifoVendor: '2전송, 현금판매',
            internalLot: '우리, 우리농산',
            priorityVendor: '2전송>1창고',
            favoriteVendors: '우리농산\n가락(마니농산)\n가락(창창)\n가락(청산유통)\n가락(호진농산)\n가락(랑희유통)\n가락(경복농산)\n가락(남경)\n가락(초원)',
            unitBoxKeywords: 'BOX, 박스, B/O, CT, CARTON',
            unitEaKeywords: 'EA, EACH, 개, 봉, 팩, 병, 캔',
            unitSplitKeywords: '소분, 분할, 낱개',
            categoryGuide: '10=채소.과일\n20=수산.축산\n30=식품.음료\n40=양념.소스\n50=주방.잡화'
        };


        /* =======================================================================
           1-A. v8.50 내부 모듈 + 현장 고도화 베이스 (Single HTML Logical Modules)
           - 목적: 기존 기능은 유지하고, 이후 고도화를 위한 책임 경계를 만든다.
           - 주의: 물리적 파일 분리는 하지 않는다. 단일 HTML 실행 구조를 유지한다.
           ======================================================================= */
        const CONFIG_MODULE = Object.freeze({
            version: 'v8.99a Transfer Direct Check Loader Fix',
            categoryMap: Object.freeze({
                '10': '채소.과일',
                '20': '수산.축산',
                '30': '식품.음료',
                '40': '양념.소스',
                '50': '주방.잡화'
            }),
            defaultUnitFilter: Object.freeze({ BOX: true, EA: true, SPLIT: false }),
            defaultFavoriteVendors: Object.freeze(['우리농산', '가락(마니농산)', '가락(창창)', '가락(청산유통)', '가락(호진농산)', '가락(랑희유통)', '가락(경복농산)', '가락(남경)', '가락(초원)']),
            splitSettingList: (value) => safeStr(value, '').split(/[\n,]+/).map(v => v.trim()).filter(Boolean),
            hasKeyword: (text, keywords = []) => {
                const normalizedText = safeStr(text, '').replace(/\s/g, '').toLowerCase();
                return (keywords || []).some(keyword => {
                    const normalizedKeyword = safeStr(keyword, '').replace(/\s/g, '').toLowerCase();
                    return normalizedKeyword && normalizedText.includes(normalizedKeyword);
                });
            },
            getFavoriteVendors: (mappings = defaultMappings) => CONFIG_MODULE.splitSettingList(mappings.favoriteVendors || defaultMappings.favoriteVendors),
            getUnitRules: (mappings = defaultMappings) => ({
                BOX: CONFIG_MODULE.splitSettingList(mappings.unitBoxKeywords || defaultMappings.unitBoxKeywords),
                EA: CONFIG_MODULE.splitSettingList(mappings.unitEaKeywords || defaultMappings.unitEaKeywords),
                SPLIT: CONFIG_MODULE.splitSettingList(mappings.unitSplitKeywords || defaultMappings.unitSplitKeywords)
            }),
            defaultSortMode: 'DEFAULT',
            defaultMappings
        });

        const UTIL_MODULE = Object.freeze({
            safeNum,
            safeStr,
            parseNumber,
            formatMoney,
            extractDateFromName,
            extractDateNum,
            addOneDay,
            formatItemDate,
            formatStrForPeriod,
            normalizeText: (val) => safeStr(val, '').replace(/\s/g, '').toLowerCase()
        });

        const DATA_MODEL_MODULE = Object.freeze({
            getCategoryCode: (code) => safeStr(code, '').slice(0, 2),
            getCategory2Code: (code) => safeStr(code, '').replace(/\D/g, '').slice(0, 4) || safeStr(code, '').slice(0, 4),
            getCategoryName: (code) => CONFIG_MODULE.categoryMap[safeStr(code, '').slice(0, 2)] || '기타',
            detectUnitType: (unitValue = '', nameValue = '', unitRules = CONFIG_MODULE.getUnitRules(defaultMappings)) => {
                const unitText = safeStr(unitValue);
                const nameText = safeStr(nameValue);
                const allText = `${unitText} ${nameText}`;

                // v8.55 원칙: 엑셀의 단위 컬럼을 최우선으로 판정한다.
                // 단위 컬럼이 비어 있거나 설정 키워드와 맞지 않을 때만 품명/규격 텍스트를 보조 단서로 사용한다.
                if (unitText) {
                    if (CONFIG_MODULE.hasKeyword(unitText, unitRules.SPLIT)) return 'SPLIT';
                    if (CONFIG_MODULE.hasKeyword(unitText, unitRules.BOX)) return 'BOX';
                    if (CONFIG_MODULE.hasKeyword(unitText, unitRules.EA)) return 'EA';
                }

                if (CONFIG_MODULE.hasKeyword(allText, unitRules.SPLIT)) return 'SPLIT';
                if (CONFIG_MODULE.hasKeyword(allText, unitRules.BOX)) return 'BOX';
                if (CONFIG_MODULE.hasKeyword(allText, unitRules.EA)) return 'EA';
                return 'EA';
            },
            fromLegacyRow: (item = {}, options = {}) => {
                const code = safeStr(item.코드, 'NO_CODE');
                const unitRules = options.unitRules || CONFIG_MODULE.getUnitRules(defaultMappings);
                const rawUnitValue = item.단위 || (item._raw && (item._raw['단위'] || item._raw['규격단위'] || item._raw['포장단위'] || item._raw['단위명'] || item._raw['판매단위']));
                const finalQty = item.실사 === '' || item.실사 === null || item.실사 === undefined ? 0 : safeNum(item.실사);
                const standard = {
                    id: item.batchKey || `${code}|${safeStr(item.품명)}|${safeStr(item.거래처)}`,
                    batchKey: item.batchKey || '',
                    code,
                    name: safeStr(item.품명),
                    spec: '',
                    displayName: safeStr(item.품명),
                    categoryCode: DATA_MODEL_MODULE.getCategoryCode(code),
                    category2Code: DATA_MODEL_MODULE.getCategory2Code(code),
                    categoryName: DATA_MODEL_MODULE.getCategoryName(code),
                    unit: safeStr(rawUnitValue, ''),
                    unitType: DATA_MODEL_MODULE.detectUnitType(rawUnitValue, item.품명, unitRules),
                    vendor: safeStr(item.거래처, '미지정'),
                    lotVendor: safeStr(item.매입처매칭, ''),
                    baseQty: safeNum(item.기초),
                    inQty: safeNum(item.입고),
                    outQty: safeNum(item.출고),
                    finalQty,
                    price: safeNum(item.단가),
                    systemQty: safeNum(item.전산잔량),

        const parseExcelData = (file, currentMappings) => {
            return new Promise((resolve, reject) => {
                if (!file) return resolve([]);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const processWorkbook = (wb) => {
                            const keywords = {
                                code: currentMappings.code.split(',').map(s => s.trim().toLowerCase()),
                                name: Array.from(new Set([...(currentMappings.name || '').split(',').map(s => s.trim().toLowerCase()), '품목명', '품명', '상품명'])),
                                qty: currentMappings.qty.split(',').map(s => s.trim().toLowerCase()),
                                price: currentMappings.price.split(',').map(s => s.trim().toLowerCase()),
                                vendor: currentMappings.vendor.split(',').map(s => s.trim().toLowerCase()),
                                matchVendor: currentMappings.matchVendor ? currentMappings.matchVendor.split(',').map(s => s.trim().toLowerCase()) : [], 
                                spec: currentMappings.spec ? currentMappings.spec.split(',').map(s => s.trim().toLowerCase()) : [],
                                unit: currentMappings.unit ? currentMappings.unit.split(',').map(s => s.trim().toLowerCase()) : ['단위', '규격단위', '포장단위', '단위명', '판매단위'],
                                date: currentMappings.date ? currentMappings.date.split(',').map(s => s.trim().toLowerCase()) : []
                            };
                            const closingColumns = ['기초수량', '입고수량', '출고량', '기말실사(이월수량)', '매입단가(원가)', '로스/조정수량', '이슈/결과', '수기메모'];
                            const stockLedgerColumns = ['재고', '입고', '출고', '잔량', '입고가'];
                            const scoreSheet = (sheetName) => {
                                const sheet = wb.Sheets[sheetName];
                                const jsonAll = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                                let headerRowIdx = -1; let maxScore = 0; let closingScore = 0;
                                for (let i = 0; i < Math.min(30, jsonAll.length); i++) {
                                    const row = jsonAll[i] || []; let score = 0;
                                    const compactCells = row.map(cell => String(cell).replace(/\s/g, '').toLowerCase());
                                    const rowStr = compactCells.join(''); if (!rowStr) continue;
                                    Object.values(keywords).forEach(kwList => { if (kwList.some(kw => kw && compactCells.some(cell => cell.includes(kw.replace(/\s/g, '').toLowerCase())))) score++; });
                                    const rowClosingScore = closingColumns.filter(col => compactCells.some(cell => cell === col.replace(/\s/g, '').toLowerCase())).length;
                                    const rowStockLedgerScore = stockLedgerColumns.filter(col => compactCells.some(cell => cell === col.replace(/\s/g, '').toLowerCase())).length;
                                    const restoreScore = Math.max(rowClosingScore, rowStockLedgerScore);
                                    if (restoreScore > closingScore) closingScore = restoreScore;
                                    if (rowClosingScore >= 4) score += 20 + rowClosingScore;
                                    if (rowStockLedgerScore >= 4) score += 18 + rowStockLedgerScore;
                                    if (sheetName === '재고수불_마감') score += 30;
                                    if (score > maxScore) { maxScore = score; headerRowIdx = i; }
                                }
                                return { sheetName, jsonAll, headerRowIdx, maxScore, closingScore, keywords };
                            };
                            const results = (wb.SheetNames || []).map(scoreSheet);
                            const best = results.sort((a, b) => b.maxScore - a.maxScore)[0] || { jsonAll: [], headerRowIdx: -1, maxScore: 0, closingScore: 0, keywords, sheetName: '' };
                            return best;
                        };

                        let wb = XLSX.read(data, { type: 'array' });
                        let { jsonAll, headerRowIdx, maxScore, keywords, sheetName, closingScore } = processWorkbook(wb);

                        if (maxScore < 2) {
                            try {
                                const text = new TextDecoder('euc-kr').decode(data);
                                const wb2 = XLSX.read(text, { type: 'string' });
                                const res2 = processWorkbook(wb2);
                                if (res2.maxScore > maxScore) { jsonAll = res2.jsonAll; headerRowIdx = res2.headerRowIdx; maxScore = res2.maxScore; keywords = res2.keywords; sheetName = res2.sheetName; closingScore = res2.closingScore; }
                            } catch (error) { console.error("EUC-KR 디코딩 실패", error); }
                        }
                        if (headerRowIdx === -1 || maxScore < 2) return resolve([]); 

                        const rawHeaders = jsonAll[headerRowIdx];
                        const uniqueHeaders = []; const headerCounts = {};
                        for (let j = 0; j < rawHeaders.length; j++) {
                            let h = rawHeaders[j] ? String(rawHeaders[j]).trim() : `__EMPTY_${j}`;
                            if (headerCounts[h]) { const orig = h; h = `${h}_${headerCounts[h]}`; headerCounts[orig]++; } else { headerCounts[h] = 1; }
                            uniqueHeaders.push(h);
                        }

                        const parsedData = [];
                        const getValByKeywords = (obj, kwList) => {
                            const keys = Object.keys(obj); const cleanKeys = keys.map(k => k.replace(/\s/g, '').toLowerCase());
                            for (let kw of kwList) { if (!kw) continue; const idx = cleanKeys.indexOf(kw); if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') return obj[keys[idx]]; }
                            for (let kw of kwList) { if (!kw) continue; const idx = cleanKeys.findIndex(k => k.includes(kw)); if (idx !== -1 && obj[keys[idx]] !== undefined && String(obj[keys[idx]]).trim() !== '') return obj[keys[idx]]; }
                            return null;
                        };

                        for (let i = headerRowIdx + 1; i < jsonAll.length; i++) {
                            const row = jsonAll[i]; if (!row || row.join('').trim() === '') continue;
                            const rowObj = {}; uniqueHeaders.forEach((h, idx) => { if (h) rowObj[h] = row[idx]; });
                            
                            const codeRaw = getValByKeywords(rowObj, keywords.code); const codeStr = safeStr(codeRaw, '');
                            const baseNameRaw = getValByKeywords(rowObj, keywords.name); const baseName = safeStr(baseNameRaw, '');

                            if (!codeStr && !baseName) continue;
                            if (isSummaryOrInvalidProductRow({ code: codeStr, name: baseName, raw: rowObj })) continue;
                            if (codeStr.includes('합계') || codeStr.includes('총계') || baseName.includes('합계') || baseName.includes('총계') || baseName.includes('총합')) continue;
                            if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(codeStr) || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(baseName)) continue;
                            if (codeStr.includes('오전') || codeStr.includes('오후') || baseName.includes('오전') || baseName.includes('오후')) continue;
                            if (codeStr.includes('실사등록') || baseName.includes('실사등록')) continue;
                            if (codeStr.includes('기록없음') || baseName.includes('기록없음')) continue;

                            const specValRaw = getValByKeywords(rowObj, keywords.spec); const specVal = safeStr(specValRaw, '');
                            const unitValRaw = getValByKeywords(rowObj, keywords.unit); const unitVal = safeStr(unitValRaw, '');
                            let fullName = baseName || '이름없음';
                            if (specVal && baseName !== specVal && !baseName.includes(specVal)) fullName = `${baseName}_${specVal}`;

                            const hasStandardClosingCols = ['기초수량', '입고수량', '출고량', '기말실사(이월수량)'].some(k => Object.prototype.hasOwnProperty.call(rowObj, k));
                            const hasStockLedgerCols = ['재고', '입고', '출고', '잔량'].filter(k => Object.prototype.hasOwnProperty.call(rowObj, k)).length >= 3;
                            const isClosingRestoreRow = closingScore >= 4 || sheetName === '재고수불_마감' || hasStandardClosingCols || hasStockLedgerCols;
                            const normObj = {
                                코드: codeStr || 'NO_CODE', 품명: fullName, 단위: unitVal,
                                수량: parseNumber(getValByKeywords(rowObj, keywords.qty)), 단가: parseNumber(getValByKeywords(rowObj, keywords.price)),
                                거래처: safeStr(getValByKeywords(rowObj, keywords.vendor), '미지정'), 매입처매칭: safeStr(getValByKeywords(rowObj, keywords.matchVendor), ''),
                                일자: safeStr(getValByKeywords(rowObj, keywords.date), ''), 메모: '', _raw: rowObj,
                                _sourceSheet: sheetName || '', _sourceFileName: file.name || '', _fileType: isClosingRestoreRow ? 'CLOSING_RESTORE' : 'RAW_DATA'
                            };
                            parsedData.push(normObj);
                        }
                        resolve(parsedData);
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        /* =======================================================================
           3. 비즈니스 로직 훅 (useInventoryEngine)

        const useInventoryEngine = ({ mappings, grouping, setAlertMsg, setConfirmModal, setIsProcessing, setAppStep }) => {
            const [productData, setProductData] = useState([]);

            const resetEngine = useCallback(() => {

            }, []);

            const handleBaseDataChange = useCallback((batchKey, field, val) => {

                    // v8.71 핵심 정책 복구:

                    // 즉 장부 수정은 오차를 만드는 행위가 아니라, 기준 장부를 바로잡는 행위다.
                    const systemQty = safeNum(nextItem.기초) + safeNum(nextItem.입고) + safeNum(nextItem.대체입고) - safeNum(nextItem.출고) - safeNum(nextItem.대체출고);

                    if (isBaseChanged) newIssues.push('장부 수기조정');

                    nextItem.수기확인완료 = !DATAOPS_ISSUE_HELPER.hasUnresolved(nextItem.이슈);

                }));
            }, []);

            const handleManualStockChange = useCallback((batchKey, val) => {
                setProductData(prev => prev.map(item => {
                    if (item.batchKey !== batchKey) return item;

                    // v8.71 핵심 정책 복구:
                    // 잔량 수정은 기초/입고/출고를 역산 수정하지 않는다. 최종 잔량만 바꾸고 오차로 표기한다.
                    const nextItem = { ...item, 실사: val === '' ? '' : Number(val) };
                    const systemQty = safeNum(nextItem.기초) + safeNum(nextItem.입고) + safeNum(nextItem.대체입고) - safeNum(nextItem.출고) - safeNum(nextItem.대체출고);

                    // 잔량 수정으로 오차가 해결되면 수량 이슈는 자동 삭제되고, 남은 경고가 없으면 확인 완료 상태가 된다.

                }));
            }, []);

            const executeImmediateSubstitution = useCallback((key1, key2) => {
                setProductData(prev => {
                    const idx1 = prev.findIndex(d => d.batchKey === key1);
                    const realIdx2 = prev.findIndex(d => d.batchKey === key2);
                    if (idx1 < 0 || realIdx2 < 0) return prev;

                    const sourceItemOrig = { ...prev[idx1], 이슈: [...prev[idx1].이슈] };
                    const targetItemOrig = { ...prev[realIdx2], 이슈: [...prev[realIdx2].이슈] };

                    let sourceItem = { ...sourceItemOrig }; let targetItem = { ...targetItemOrig };

                    if (sourceItem.로스 < 0 && targetItem.로스 > 0) { }
                    else if (targetItem.로스 < 0 && sourceItem.로스 > 0) { let temp = sourceItem; sourceItem = targetItem; targetItem = temp; }
                    else if (sourceItem.로스 < 0 && targetItem.로스 === 0) { }

                    else { setAlertMsg(`재고조정 실패!\n\n두 상품을 연결하려면 먼저 실사 수량을 변경하여 오차(로스)를 만들어주세요.\n• 원물(차감 대상): 마이너스(-) 로스 발생\n• 소분(증가 대상): 플러스(+) 로스 발생`); return prev; }

                    const sQty = Math.abs(sourceItem.로스); const tQty = Math.abs(targetItem.로스);
                    if (tQty === 0) { setAlertMsg("대체되는 상품(소분품)의 실사 수량이 입력되지 않아 조정 비율을 알 수 없습니다.\n수량을 입력해주세요."); return prev; }

                    const transferredCost = sQty * sourceItem.단가; const unitCost = transferredCost / tQty;        

                    sourceItem.대체출고 += sQty;
                    sourceItem.전산잔량 = sourceItem.기초 + sourceItem.입고 + sourceItem.대체입고 - sourceItem.출고 - sourceItem.대체출고;
                    sourceItem.실사 = sourceItem.실사 === null || sourceItem.실사 === '' ? sourceItem.전산잔량 : sourceItem.실사;

                    // 🌟 대체 차감 후 로스가 0이 되면 수량 관련 경고 칩 완전 삭제
                    if (sourceItem.로스 === 0) {

                    }
                    // 🌟 관리자 조작으로 전산잔량이 0 이상이 되면 수량부족(잔량) 이슈 칩 삭제
                    if (sourceItem.전산잔량 >= 0) {

                    }
                    sourceItem.이슈.push(`🔄 (${sQty})`); 
                    sourceItem.수기확인완료 = true;

                    targetItem.대체입고 += tQty;
                    targetItem.전산잔량 = targetItem.기초 + targetItem.입고 + targetItem.대체입고 - targetItem.출고 - targetItem.대체출고;
                    targetItem.실사 = targetItem.실사 === null || targetItem.실사 === '' ? targetItem.전산잔량 : targetItem.실사;
                    targetItem.로스 = targetItem.실사 - targetItem.전산잔량;
                    targetItem.단가 = unitCost; targetItem.매출원가 = targetItem.출고 * unitCost; 
                    
                    // 🌟 소분 대상도 로스가 0이 되면 관련 에러 칩 일괄 삭제
                    if (targetItem.로스 === 0) {
                        targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('수량변동') && !msg.includes('실사 수기조정') && !msg.includes('과다로스'));
                    }
                    // 🌟 관리자 조작으로 전산잔량이 0 이상이 되면 수량부족(잔량) 이슈 칩 삭제
                    if (targetItem.전산잔량 >= 0) {
                        targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('수량부족'));
                    }
                    targetItem.이슈 = targetItem.이슈.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족'));
                    
                    // 🌟 대체 품목(원물) 정보를 거래처 칩과 혼동되지 않도록 우측 '메모' 영역으로 자동 삽입
                    const autoMemo = `🔄 [${sourceItem.품명}]`;
                    if (!(targetItem.메모 || '').includes(autoMemo)) {
                        targetItem.메모 = targetItem.메모 ? targetItem.메모 + ' ' + autoMemo : autoMemo;
                    }
                    
                    targetItem.수기확인완료 = true;

                    setSubstHistory(h => [...h, {
                        id: Date.now(), sourceKey: sourceItem.batchKey, targetKey: targetItem.batchKey, sourceName: sourceItem.품명, targetName: targetItem.품명, 
                        sQty, tQty, transferredCost, sourceItemPrev: sourceItem.batchKey === sourceItemOrig.batchKey ? sourceItemOrig : targetItemOrig, targetItemPrev: targetItem.batchKey === targetItemOrig.batchKey ? targetItemOrig : sourceItemOrig,
                    }]);

                    const newData = [...prev];
                    newData[prev.findIndex(d => d.batchKey === sourceItem.batchKey)] = sourceItem;
                    newData[prev.findIndex(d => d.batchKey === targetItem.batchKey)] = targetItem;
                    return newData;
                });
            }, [setAlertMsg]);

            const handleSalesMove = useCallback((sourceKey, targetKey, vendorName, qtyToMove) => {
                setProductData(prevP => {
                    let sPrice = 0; let tPrice = 0; let sRevUnit = 0; 
                    prevP.forEach(p => {
                        if (p.batchKey === sourceKey) { 
                            sPrice = p.단가; 
                            if(p.출고내역[vendorName] && p.출고내역[vendorName].qty > 0) sRevUnit = p.출고내역[vendorName].rev / p.출고내역[vendorName].qty;
                            else sRevUnit = p.출고 > 0 ? p.매출액 / p.출고 : 0;

                    return prevP.map(p => {
                        if (p.batchKey === sourceKey) {
                            const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)) };
                            np.출고 -= qtyToMove;
                            const movedCogs = qtyToMove * sPrice; const movedRev = qtyToMove * sRevUnit;
                            np.매출원가 -= movedCogs; np.매출액 -= movedRev;
                            if (np.출고내역[vendorName]) {
                                np.출고내역[vendorName].qty -= qtyToMove; np.출고내역[vendorName].rev -= movedRev; np.출고내역[vendorName].cogs -= movedCogs;
                                if (np.출고내역[vendorName].qty <= 0) delete np.출고내역[vendorName];

                            np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                            if (np.실사 !== null && np.실사 !== '') { np.실사 = Number(np.실사) + qtyToMove; np.로스 = np.실사 - np.전산잔량; } else { np.실사 = np.전산잔량; np.로스 = 0; }
                            
                            // 🌟 관리자 조작으로 전산잔량이 0 이상이 되면 수량부족(잔량) 이슈 칩 삭제
                            if (np.전산잔량 >= 0) {
                                np.이슈 = np.이슈.filter(msg => !msg.includes('수량부족'));
                            }
                            np.수기확인완료 = true; return np;
                        }
                        if (p.batchKey === targetKey) {
                            const np = { ...p, 출고내역: JSON.parse(JSON.stringify(p.출고내역)), 이슈: [...p.이슈] };
                            np.출고 += qtyToMove;
                            const movedCogs = qtyToMove * tPrice; const movedRev = qtyToMove * sRevUnit;
                            np.매출원가 += movedCogs; np.매출액 += movedRev;
                            
                            // 수동으로 드래그 앤 드롭 이동된 건이므로 _perfect 태그를 지우고 일반 상태로 귀속시킴
                            const cleanVendorName = vendorName.replace('_perfect', '');
                            if (!np.출고내역[cleanVendorName]) np.출고내역[cleanVendorName] = {qty: 0, rev: 0, cogs: 0, isLifo: false, isPerfectMatch: false, displayVendor: cleanVendorName};
                            np.출고내역[cleanVendorName].qty += qtyToMove; np.출고내역[cleanVendorName].rev += movedRev; np.출고내역[cleanVendorName].cogs += movedCogs;
                            
                            np.전산잔량 = np.기초 + np.입고 + np.대체입고 - np.출고 - np.대체출고;
                            if (np.실사 !== null && np.실사 !== '') { np.실사 = Number(np.실사) - qtyToMove; np.로스 = np.실사 - np.전산잔량; } else { np.실사 = np.전산잔량; np.로스 = 0; }
                            np.이슈 = np.이슈.filter(msg => msg !== '매입내역 없음' && !msg.includes('전산 재고 부족'));
                            
                            // 🌟 관리자 조작으로 전산잔량이 0 이상이 되면 수량부족(잔량) 이슈 칩 삭제
                            if (np.전산잔량 >= 0) {
                                np.이슈 = np.이슈.filter(msg => !msg.includes('수량부족'));
                            }
                            np.수기확인완료 = true; return np;
                        }
                        return p;
                    });
                });
            }, []);

            const executeAnalysis = useCallback((payload) => {
                setIsProcessing(true); setConfirmModal({ isOpen: false, warnings: [], payload: null });
                try {
                    const { parsedPrev, parsedIn, parsedOut, parsedEnd, periodStr, targetDateStrFromData } = payload;
                    setAnalysisPeriod(periodStr); setTargetDateStr(targetDateStrFromData); 
                    
                    const rawHas = (raw = {}, key) => Object.prototype.hasOwnProperty.call(raw, key);
                    const rawVal = (raw = {}, keys = [], fallback = '') => {
                        for (const key of keys) {
                            if (rawHas(raw, key) && raw[key] !== undefined && raw[key] !== null && String(raw[key]).trim() !== '') return raw[key];
                        }
                        return fallback;
                    };
                    const rawNum = (raw = {}, keys = [], fallback = 0) => parseNumber(rawVal(raw, keys, fallback));
                    // v8.65: 재고변동표/수불부는 빈 셀도 0으로 본다.
                    // 컬럼이 존재하는데 값이 비어 있다고 fallback(item.수량 등)을 쓰면 앱이 임의로 재고를 만들어버린다.
                    const rawNumStrict = (raw = {}, keys = [], fallback = 0) => {
                        for (const key of keys) {
                            if (rawHas(raw, key)) return parseNumber(raw[key]);
                        }
                        return parseNumber(fallback);
                    };
                    const isStockLedgerItem = (item) => {
                        const raw = item && item._raw ? item._raw : {};
                        return ['재고', '입고', '출고', '잔량'].filter(k => rawHas(raw, k)).length >= 3;
                    };
                    const isClosingItem = (item) => {
                        const raw = item && item._raw ? item._raw : {};
                        return item?._fileType === 'CLOSING_RESTORE' || rawHas(raw, '로스/조정수량') || rawHas(raw, '기초수량') || rawHas(raw, '기말실사(이월수량)') || isStockLedgerItem(item);
                    };
                    const getClosingBaseQty = (item) => rawNumStrict(item._raw, ['기초수량', '재고'], 0);
                    const getClosingInQty = (item) => rawNumStrict(item._raw, ['입고수량', '입고'], 0);
                    const getClosingOutQty = (item) => rawNumStrict(item._raw, ['출고량', '출고수량', '출고'], 0);
                    const getClosingFinalQty = (item) => rawNumStrict(item._raw, ['기말실사(이월수량)', '기말실사', '잔량'], item.수량 || 0);
                    const getClosingPrice = (item) => rawNumStrict(item._raw, ['매입단가(원가)', '입고가', '단가'], item.단가 || 0);
                    const getClosingAdjustQty = (item) => {
                        // v8.65: 오차는 파일의 문구나 과거 조정값을 믿지 않고 현재 테이블 수학으로만 계산한다.
                        // 오차 = 잔량 - (재고 + 입고 - 출고)
                        return getClosingFinalQty(item) - (getClosingBaseQty(item) + getClosingInQty(item) - getClosingOutQty(item));
                    };
                    const closingEndItems = parsedEnd.filter(isClosingItem); const hasClosingEnd = closingEndItems.length > 0;
                    // v8.65: 마감/재고변동표 복원 모드에서는 1~3번에 같은 수불부가 들어와도
                    // 수량 계산에 재참여시키지 않는다. 테이블 수학은 오직 재고+입고-출고=계산잔량, 잔량-계산잔량=오차다.
                    const prevItems = hasClosingEnd ? parsedPrev.filter(item => !isClosingItem(item)) : parsedPrev;
                    const inItems = parsedIn.filter(item => !isClosingItem(item));
                    const outItems = parsedOut.filter(item => !isClosingItem(item));

                    const generateBatchKey = (code, name, price, vendor, date) => {
                        const actualCode = String(code || 'NO_CODE');
                        if (actualCode === 'NO_CODE') return `NO_CODE|${name}|${price}|${vendor}|${date}`;
                        let key = actualCode;
                        if (grouping.priceMode === 'separate') key += `|${price}`;
                        if (grouping.splitByVendor) key += `|${safeStr(vendor, '미지정')}`;
                        if (grouping.splitByDate) key += `|${safeStr(date, '')}`;
                        return key;
                    };

                    let pData = {}; let autoAckCodes = new Set();
                    
                    if (hasClosingEnd) {
                        closingEndItems.forEach(item => {
                            const code = String(item.코드 || item._raw['상품코드'] || 'NO_CODE');
                            const price = getClosingPrice(item);
                            const date = String(item.일자 || targetDateStrFromData);
                            const name = rawVal(item._raw, ['상품명(규격)', '품목명', '품명', '상품명'], item.품명);
                            const vendor = (item.거래처 && item.거래처 !== '미지정') ? item.거래처 : (rawVal(item._raw, ['매입처(Lot)', '구매처'], '미지정'));

                            const batchKey = generateBatchKey(code, name, price, vendor, date);
                            const { issues, vendors } = parseIssuesAndVendors(item._raw['이슈/결과'] || '', price);
                            
                            const baseQty = getClosingBaseQty(item);
                            const inQty = getClosingInQty(item);
                            const outQty = getClosingOutQty(item);
                            let actualQty = getClosingFinalQty(item);
                            const adjustQty = getClosingAdjustQty(item);

                            if (!pData[batchKey]) {
                                let tRev = 0, tCogs = 0; Object.values(vendors).forEach(v => { tRev += v.rev; tCogs += v.cogs; });
                                pData[batchKey] = {
                                    batchKey, 코드: code, 품명: name, 단가: price, 일자: date, 거래처: vendor,
                                    기초: baseQty, 입고: inQty, 출고: outQty,
                                    대체입고: 0, 대체출고: 0, 전산잔량: baseQty + inQty - outQty,
                                    실사: actualQty, 로스: adjustQty,
                                    매출액: tRev, 매출원가: tCogs, 메모: item._raw['수기메모'] || '',
                                    이슈: issues.filter(i => !i.includes('🚨')),
                                    출고내역: vendors, _orig: {기초: baseQty, 입고: inQty, 출고: outQty, 단가: price},
                                    isDummy: (!code || code === 'NO_CODE'), 수기확인완료: true, _fromFile4: true,
                                    _totalCostForAvg: price * (baseQty + inQty), _latestDateNum: extractDateNum(date)
                                };
                            } else {
                                pData[batchKey].기초 += baseQty; pData[batchKey].입고 += inQty; pData[batchKey].출고 += outQty; pData[batchKey].실사 += actualQty; pData[batchKey].로스 += adjustQty;
                                pData[batchKey].전산잔량 = pData[batchKey].기초 + pData[batchKey].입고 - pData[batchKey].출고;
                                pData[batchKey]._totalCostForAvg += price * (baseQty + inQty);
                                const dNum = extractDateNum(date);
                                if (grouping.priceMode === 'latest' && dNum > pData[batchKey]._latestDateNum) { pData[batchKey].단가 = price; pData[batchKey]._latestDateNum = dNum; } 
                                else if (grouping.priceMode === 'average') { const totalQty = pData[batchKey].기초 + pData[batchKey].입고; if (totalQty > 0) pData[batchKey].단가 = pData[batchKey]._totalCostForAvg / totalQty; }

                                Object.entries(vendors).forEach(([vName, vData]) => {

                                if (item.일자 && (!targetP.일자 || targetP.일자 === targetDateStrFromData || targetP.일자 === '')) targetP.일자 = item.일자;

                        pData[batchKey]._totalCostForAvg += qtyToApply * price; const dNum = extractDateNum(date);

                        if (!stockPool[code]) stockPool[code] = { buckets: [] };

                    };

                    prevItems.forEach(item => { let qty = item.수량; if (isClosingItem(item)) { qty = getClosingFinalQty(item); } else if (item._raw && item._raw['기초수량'] !== undefined) qty = parseNumber(item._raw['기초수량']); addStock(item, 'prev', qty); });
                    inItems.forEach(item => { let qty = item.수량; if (item._raw && item._raw['입고수량'] !== undefined) qty = parseNumber(item._raw['입고수량']); addStock(item, 'in', qty); });

                    Object.values(stockPool).forEach(pool => pool.buckets.sort((a, b) => String(a.일자 || '').localeCompare(String(b.일자 || ''))));

                    // 1. 초기 수량 및 개별 매출액 계산
                    outItems.forEach(sale => { 
                        let qty = parseNumber(sale.수량); 
                        if (sale._raw && sale._raw['출고량'] !== undefined) qty = parseNumber(sale._raw['출고량']); 
                        sale._computedQty = qty; 
                        
                        let finalRevenue = 0;
                        if (sale.단가 !== 0 && qty !== 0) finalRevenue = qty * sale.단가;
                        if (finalRevenue === 0 && sale._raw) {
                            const amtKeys = ['금액', '합계', '매출금액', '판매금액', '공급가액', '공급가', '총액'];
                            for (let k of amtKeys) { const matchedKey = Object.keys(sale._raw).find(rk => rk.replace(/\s/g, '').includes(k)); if (matchedKey && sale._raw[matchedKey] !== undefined && sale._raw[matchedKey] !== '') { finalRevenue = parseNumber(sale._raw[matchedKey]); break; } }
                        }
                        if (finalRevenue === 0 && sale.단가 !== 0 && qty === 0) finalRevenue = sale.단가;
                        sale._finalRevenue = finalRevenue;
                    });

                    // 2. 🌟 핵심: 동일 상품, 동일 거래처, 동일 매입처를 가진 파편화된 전표 병합 (Pre-Aggregation)
                    const aggregatedSales = {};
                    outItems.forEach(sale => {
                        const code = String(sale.코드 || 'NO_CODE');
                        const handledByFile4 = hasClosingEnd && code !== 'NO_CODE' && Object.values(pData).some(p => p.코드 === code && p._fromFile4);
                        if (handledByFile4) return; 
                        if (isExcluded(sale.거래처)) return;

                        const vendorKey = safeStr(sale.거래처, '미지정');
                        const matchKey = safeStr(sale.매입처매칭, '미지정');
                        
                        // 상품코드, 품명, 거래처명, 매입처태그가 모두 동일하면 하나의 전표로 합침
                        const aggKey = `${code}|${sale.품명}|${vendorKey}|${matchKey}`;

                                ...sale,

                        aggregatedSales[aggKey]._finalRevenue += (sale._finalRevenue || 0);
                        aggregatedSales[aggKey]._rawCombinedStr += ' ' + Object.values(sale._raw || {}).map(v => String(v)).join(' ').toLowerCase();
                    });

                    // 3. 병합된 전표 리스트를 우선순위 및 큰 수량부터 차감되도록 정렬
                    const priorityGroups = (mappings.priorityVendor || '')
                        .split('>')
                        .map(group => group.split(',').map(s => s.trim().toLowerCase()).filter(s => s))
                        .filter(group => group.length > 0);

                    const getVendorRank = (vendorName) => {
                        if (!vendorName) return priorityGroups.length;
                        const lowerName = vendorName.toLowerCase();
                        for (let i = 0; i < priorityGroups.length; i++) {
                            if (priorityGroups[i].some(kw => lowerName.includes(kw))) return i;

                    // 4. 차감 로직 시작
                    mergedOutItems.forEach(sale => {

                            pData[bKey].출고내역[sale.거래처].qty += qtyToDeduct; pData[bKey].출고내역[sale.거래처].rev += finalRevenue;

                            if (bucket.수량 !== undefined) bucket.수량 -= take;

                                    if (matchedBuckets.length === 0) { matchFailedFlag = true; matchedBuckets = [...pool.buckets]; }

                            let availableBucketsForPuzzle = matchedBuckets.filter(b => b.수량 > 0);
                            
                            // 1순위: 팔아야 할 수량과 정확히 일치하는 묶음

                            // 2순위: 정확한 수량이 없다면, 수량이 넉넉한(그 이상인) 묶음에서 차감 (LIFO/FIFO 방향 고려)

                                    if (!pData[exactMatchBucket.batchKey].이슈.includes(errorMsg)) { pData[exactMatchBucket.batchKey].이슈.push(errorMsg); pData[exactMatchBucket.batchKey].수기확인완료 = false; }
                                } else if (isInternalDistribution) {

                                    if (!pData[exactMatchBucket.batchKey].이슈.includes(infoMsg)) { pData[exactMatchBucket.batchKey].이슈.push(infoMsg); }

                                const updatedPData = pData[exactMatchBucket.batchKey];

                                    if (!pData[targetBucket.batchKey].이슈.includes(errorMsg)) { pData[targetBucket.batchKey].이슈.push(errorMsg); pData[targetBucket.batchKey].수기확인완료 = false; }
                                } else if (isInternalDistribution) {

                                    if (!pData[targetBucket.batchKey].이슈.includes(infoMsg)) { pData[targetBucket.batchKey].이슈.push(infoMsg); }
                                }

                                const updatedPData = pData[targetBucket.batchKey];
                                const currentBalance = updatedPData.기초 + updatedPData.입고 - updatedPData.출고;
                                if (currentBalance < 0) {
                                    const errorMsg = `🚨수량부족`;
                                    if (!updatedPData.이슈.includes(errorMsg)) { updatedPData.이슈.push(errorMsg); updatedPData.수기확인완료 = false; }

                            }

                    });

                    // *** 전산잔량 미리 갱신 (실사 분배 기준용) ***
                    Object.values(pData).forEach(item => {
                        if (!item._fromFile4) {

                    if (!hasClosingEnd && parsedEnd.length > 0) {
                        const simpleCountEndItems = parsedEnd.filter(item => !isClosingItem(item));
                        const endQtyByCode = {};
                        
                        simpleCountEndItems.forEach(endItem => {
                            const code = String(endItem.코드 || 'NO_CODE');

                            if (!endQtyByCode[code]) endQtyByCode[code] = 0;

                            const totalActualQty = endQtyByCode[code];

                            if (matchingKeys.length > 0) {

                                    if (isLast) {

                colorClass = shortMsg.includes('🚨') ? "bg-orange-50 text-orange-700 border-orange-200 font-bold shadow-sm" : "bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm font-bold";
            } else if (msg.includes('코드없음')) {
                shortMsg = msg.includes('✅') ? "✅코드" : "🚨코드"; tooltip = `상품코드 정보 누락: ${msg}`;
                colorClass = shortMsg.includes('🚨') ? "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg.includes('전산 재고 없음')) {
                shortMsg = "🚨전산재고"; tooltip = `실사에는 있으나 매입/기초 내역 없음: ${msg}`;
                colorClass = "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm";
            } else if (msg.includes('수량변동') || msg.includes('실사 수기조정') || msg.includes('삭제됨')) {
                shortMsg = msg.includes('✅') ? "✅수량" : "🚨수량"; tooltip = `전산 잔량과 실사 수량 차이(로스 발생): ${msg}`;
                colorClass = shortMsg.includes('🚨') ? "bg-orange-50 text-orange-700 border-orange-200 font-bold shadow-sm" : "bg-slate-50 text-slate-400 border-slate-200 shadow-sm";
            } else if (msg.includes('과다로스')) {
                shortMsg = "🚨과다로스"; tooltip = `총 재고의 20%를 초과하는 과다 로스 발생: ${msg}`;
                colorClass = "bg-rose-100 text-rose-700 border-rose-200 font-bold shadow-sm";
            } else if (msg.includes('원가추출')) {
                shortMsg = "✅원가추출"; tooltip = `과거 매입 내역에서 성공적으로 원가 추출됨: ${msg}`;
                colorClass = "bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm font-bold";
            } else if (msg.includes('장부 수기조정') || msg.includes('원가수정')) {
                shortMsg = "✅수기조정"; tooltip = `사용자가 기초/입고/출고/단가를 직접 수정함: ${msg}`;
                colorClass = "bg-slate-50 text-slate-500 border-slate-200 shadow-sm";
            } else if (msg.includes('🔄')) {
                shortMsg = msg; tooltip = `스페이스바 대체 내역`;
                // 긴 품명이 들어올 수 있으므로 max-w 와 truncate 클래스 적용
                colorClass = "bg-slate-100 text-slate-600 border-slate-200 font-medium max-w-[200px] truncate inline-block align-bottom";
            }

            return (
                <span data-tooltip={tooltip} className={`relative px-2 py-0.5 rounded border font-semibold text-[10px] cursor-help ${colorClass}`}>
                    {shortMsg}
                </span>
            );
        });

        const GuideModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[400] bg-slate-900 bg-opacity-60 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-2xl modal-bounce border border-slate-200">
                        <div className="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                            <h3 className="font-black text-slate-800 text-lg flex items-center"><i className="fas fa-book-open text-blue-500 mr-2"></i>이슈 알림(칩) 가이드북</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition"><i className="fas fa-times text-xl"></i></button>
                        </div>
                        
                        <p className="text-sm text-slate-600 mb-5">칩에 마우스를 올리면(모바일은 터치) 원래의 상세 메시지가 표시됩니다.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2">
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨Lot</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-blue-100 text-blue-700 border-blue-200">✅Lot</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">매입처(Lot) 불일치</p>
                                <p className="text-xs text-slate-600 leading-relaxed">매출 전표의 '구매처'와 매입 내역의 '거래처'가 다를 때 발생합니다. <br/>👉 <span className="font-semibold text-blue-600">조치:</span> 매핑 설정을 수정하거나, 로스가 발생한 원물/소분품을 스페이스바로 상계하세요. (내부 공용 로트는 우측 메모에 ℹ️ 로 자동 표시됩니다)</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨단가</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-slate-50 text-slate-400 border-slate-200">✅단가</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">매입 단가 누락 / 변경</p>
                                <p className="text-xs text-slate-600 leading-relaxed">엑셀에 단가 정보가 없거나 0원으로 등록되었습니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 해당 품목의 단가(원가) 입력 칸을 클릭하여 올바른 단가를 수기로 입력하세요.</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-orange-50 text-orange-700 border-orange-200">🚨수량</span><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-slate-50 text-slate-400 border-slate-200">✅수량</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">전산 잔량과 실사 차이 (로스 발생)</p>
                                <p className="text-xs text-slate-600 leading-relaxed">계산된 전산 잔량(기초+입고-출고)과 입력된 실사 수량이 다릅니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 정상적인 오차라면 Tab 키를 눌러 확인(✅) 처리하고, 이상하다면 원시 데이터 누락을 확인하세요.</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨잔량</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">출고 시 전산 재고 부족 (마이너스)</p>
                                <p className="text-xs text-slate-600 leading-relaxed">보유한 가용 재고보다 판매/출고된 수량이 더 많아 마이너스 재고가 발생했습니다.<br/>👉 <span className="font-semibold text-blue-600">조치:</span> 입고 내역이 누락되었거나 타 매입처 재고가 잘못 차감된 단서가 될 수 있습니다.</p>
                            </div>

                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-orange-50 text-orange-700 border-orange-200">🚨신규</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">신규 품목 발생</p>
                                <p className="text-xs text-slate-600 leading-relaxed">이전 수불 마감 자료에는 없던 새로운 품목 코드가 당기 매입/매출에 등장했습니다.</p>
                            </div>

                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded border font-bold text-[10px] bg-rose-100 text-rose-700 border-rose-200">🚨코드</span></div>
                                <p className="text-sm font-bold text-slate-800 mb-1">상품 코드 누락</p>
                                <p className="text-xs text-slate-600 leading-relaxed">품명은 있으나 상품 코드(SKU)가 비어있습니다. 정확한 집계를 위해 엑셀 원본에 코드를 채워주세요.</p>
                            </div>
                        </div>
                        
                        <div className="mt-6 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2.5 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-slate-900 transition shadow-md w-full sm:w-auto">확인 및 닫기</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductRow = React.memo(({ item, idx, isLinked, isActiveMulti, isMultiGroupItem, targetDateStr, onStockChange, onSpacebar, onFocusInput, onBaseDataChange, onOpenMemo, onSalesMove, internalLotMapping, isGroupStart, isNewCategory, normalizeDisplayIssues }) => {
            const [isDragOver, setIsDragOver] = useState(false);

            let displayIssues = item.이슈 ? [...item.이슈] : [];
            displayIssues = displayIssues.filter(msg => !msg.includes('매입내역 없음') && !msg.includes('전산 재고 부족') && !msg.includes('재고 부족'));
            displayIssues = normalizeDisplayIssues ? normalizeDisplayIssues(displayIssues) : displayIssues;
            
            const totalAvailable = item.기초 + item.입고 + item.대체입고;
            if (item.로스 < 0 && totalAvailable > 0 && (Math.abs(item.로스) / totalAvailable) > 0.2) displayIssues.push('🚨과다로스(20%↑)');
            
            const internalLotKeywords = useMemo(() => (internalLotMapping || '').split(',').map(s => s.trim().toLowerCase()).filter(s => s), [internalLotMapping]);
            
            const regularIssues = [];
            const internalMemos = [];
            const manualMemos = [];

            displayIssues.forEach(msg => {
                const isInternalMsg = msg.startsWith('✅') && !msg.includes('원가추출') && internalLotKeywords.some(kw => msg.toLowerCase().replace('✅', '').includes(kw));
                const isManualMsg = msg.includes('수기조정') || msg.includes('원가수정');

                if (isManualMsg) {
                    manualMemos.push(msg);
                } else if (isInternalMsg) {
                    internalMemos.push(msg);
                } else {
                    regularIssues.push(msg);
                }
            });

            const hasIssue = regularIssues.length > 0;
            
            const addedIn = item.대체입고;
            const addedOut = item.대체출고;
            const totalIn = item.입고 + addedIn;
            const totalOut = item.출고 + addedOut;
            const isToday = item.일자 && targetDateStr && item.일자 === targetDateStr;

            // 🌟 랙(Lag) 방지를 위한 입력 필드 로컬 상태 & 디바운싱(Debouncing) 처리
            const [localPrice, setLocalPrice] = useState(item.단가 === 0 ? '' : Math.round(item.단가));
            useEffect(() => setLocalPrice(item.단가 === 0 ? '' : Math.round(item.단가)), [item.단가]);
            const priceTimeout = useRef(null);

            const [localPrev, setLocalPrev] = useState(item.기초 === 0 ? '' : item.기초);
            useEffect(() => setLocalPrev(item.기초 === 0 ? '' : item.기초), [item.기초]);
            const prevTimeout = useRef(null);

            const [localIn, setLocalIn] = useState(totalIn === 0 ? '' : totalIn);
            useEffect(() => setLocalIn(totalIn === 0 ? '' : totalIn), [totalIn]);
            const inTimeout = useRef(null);

            const [localOut, setLocalOut] = useState(totalOut === 0 ? '' : totalOut);
            useEffect(() => setLocalOut(totalOut === 0 ? '' : totalOut), [totalOut]);
            const outTimeout = useRef(null);

            const [localActual, setLocalActual] = useState(item.실사 === null || item.실사 === undefined ? '' : item.실사);
            useEffect(() => setLocalActual(item.실사 === null || item.실사 === undefined ? '' : item.실사), [item.실사]);
            const actualTimeout = useRef(null);

            useEffect(() => {
                return () => {
                    if (priceTimeout.current) clearTimeout(priceTimeout.current);
                    if (prevTimeout.current) clearTimeout(prevTimeout.current);
                    if (inTimeout.current) clearTimeout(inTimeout.current);
                    if (outTimeout.current) clearTimeout(outTimeout.current);
                    if (actualTimeout.current) clearTimeout(actualTimeout.current);
                };
            }, []);

            const handlePriceChange = (e) => {
                const val = e.target.value; setLocalPrice(val);
                if (priceTimeout.current) clearTimeout(priceTimeout.current);
                priceTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '단가', val), 250);
            };

            const handlePrevChange = (e) => {
                const val = e.target.value; setLocalPrev(val);
                if (prevTimeout.current) clearTimeout(prevTimeout.current);
                prevTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '기초', val), 250);
            };

            const handleInChange = (e) => {
                const val = e.target.value; setLocalIn(val);
                if (inTimeout.current) clearTimeout(inTimeout.current);
                const numVal = (val === '' ? 0 : Number(val)) - item.대체입고;
                inTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '입고', numVal), 250);
            };

            const handleOutChange = (e) => {
                const val = e.target.value; setLocalOut(val);
                if (outTimeout.current) clearTimeout(outTimeout.current);
                const numVal = (val === '' ? 0 : Number(val)) - item.대체출고;
                outTimeout.current = setTimeout(() => onBaseDataChange(item.batchKey, '출고', numVal), 250);
            };

            const handleActualChange = (e) => {
                const val = e.target.value; setLocalActual(val);
                if (actualTimeout.current) clearTimeout(actualTimeout.current);
                actualTimeout.current = setTimeout(() => onStockChange(item.batchKey, val), 250);
            };

            const actualQty = localActual === '' ? '' : Number(localActual);
            const isNegativeActual = typeof actualQty === 'number' && actualQty < 0;

            const focusAndEnsureVisible = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.focus({ preventScroll: true }); el.select();
                    const container = document.getElementById('main-scroll-container');
                    if (container) {
                        const cRect = container.getBoundingClientRect(); const eRect = el.getBoundingClientRect();
                        if (eRect.top < cRect.top + 150 || eRect.bottom > cRect.bottom - 60) {
                            container.scrollTo({ top: container.scrollTop + (eRect.top - cRect.top) - (cRect.height / 2) + (eRect.height / 2), behavior: 'smooth' });
                        }
                    } else el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            const handleKd = (e, type) => {
                const cols = ['price-input', 'base-prev', 'base-in', 'base-out', 'actual-input']; const colIdx = cols.indexOf(type);
                if (e.key === 'ArrowRight') { if (colIdx < cols.length - 1) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx+1]}-${idx}`); } }
                else if (e.key === 'ArrowLeft') { if (colIdx > 0) { e.preventDefault(); focusAndEnsureVisible(`${cols[colIdx-1]}-${idx}`); } }
                else if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx+1}`); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); focusAndEnsureVisible(`${type}-${idx-1}`); }
                else if (e.key === ' ' || e.code === 'Space') { if (type === 'actual-input') { e.preventDefault(); onSpacebar(item.batchKey, idx); } }
            };

            const cellInputBase = "w-full text-right bg-slate-50 border border-slate-200 hover:border-slate-300 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none rounded text-[13px] px-1.5 py-1 transition-all shadow-sm";
            
            let topBorderClass = '';
            if (isGroupStart) {
                topBorderClass = 'border-t-[3px] border-t-slate-300';
            } else if (isNewCategory) {
                // 3차 카테고리(품목코드 앞 6자리) 변경 시 연하고 살짝만 구분되는 테두리 적용
                topBorderClass = 'border-t-[2px] border-t-slate-200';
            }
            
            return (
                <tr 
                    data-code={item.코드} data-batch={item.batchKey} 
                    onDragOver={(e) => { e.preventDefault(); setIsDragOver(true); }} onDragLeave={(e) => { e.preventDefault(); setIsDragOver(false); }} 
                    onDrop={(e) => { 
                        e.preventDefault(); setIsDragOver(false); 
                        try { 
                            const d = JSON.parse(e.dataTransfer.getData('text/plain')); 
                            // 🌟 2중 방어막: 드래그된 수량이 정상적인 숫자일 때만 이동을 허용하여 NaN 감염 방지
                            const moveQty = Number(d.qty);
                            const isCtrlPressed = e.ctrlKey || e.metaKey;
                            if (d.sourceKey !== item.batchKey && !isNaN(moveQty) && moveQty > 0) {
                                onSalesMove(d.sourceKey, item.batchKey, d.vendor, moveQty, d.code, item.코드, isCtrlPressed); 
                            }
                        } catch (err) {} 
                    }}
                    className={`transition duration-200 ${isActiveMulti ? 'bg-blue-50/60 outline outline-2 outline-blue-500 z-20 relative shadow-md' : (isLinked ? 'bg-slate-50 ring-1 ring-blue-400 shadow-md relative z-10 scale-[1.01]' : 'border-b border-slate-100 hover:bg-slate-50')} ${isDragOver ? 'bg-blue-50 outline outline-2 outline-blue-400 scale-[1.01] z-20 shadow-md' : ''} ${!isActiveMulti && item.isDummy && item.단가 === 0 ? 'bg-rose-50/30' : ''}`}
                >
                    <td className={`py-2 px-3 sticky left-0 z-10 shadow-[1px_0_0_rgba(0,0,0,0.03)] border-r border-slate-200 ${isMultiGroupItem && !isLinked ? 'border-l-4 border-l-blue-400' : ''} ${isLinked ? 'bg-blue-50/50 border-l-4 border-l-blue-600' : ''} ${isActiveMulti ? 'bg-blue-50/60' : (item.isDummy && item.단가 === 0 ? 'bg-rose-50' : 'bg-white group-hover:bg-slate-50')} ${topBorderClass}`}>
                        <div className="flex items-center justify-between w-full">
                            <div className="flex flex-col justify-center flex-1 pr-3 overflow-hidden max-w-[280px]">
                                <div className="font-semibold text-slate-800 text-[13px] flex items-start gap-1 mb-0.5">
                                    {isLinked && <i className="fas fa-link text-blue-500 mr-1 mt-0.5 animate-pulse"></i>}
                                    {isActiveMulti && <i className="fas fa-tags text-blue-500 mr-1 mt-0.5"></i>}
                                    <span title={item.품명} className="truncate leading-tight text-slate-900">{item.품명}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 truncate font-medium tracking-tight flex items-center">
                                    {item.코드 !== '-' && item.코드 !== 'NO_CODE' ? <span className="mr-1">{item.코드}</span> : ''}
                                    <span className={isToday ? "text-blue-700 bg-blue-100 px-1 rounded border border-blue-200 font-bold" : ""}>{item.일자 || '미상'}</span>
                                    <span className="mx-1 text-slate-300">|</span> 
                                    <span className={`truncate ${isToday ? 'text-blue-700 font-bold' : ''}`}>{item.거래처 || '미지정'}</span>
                                    {item.대체입고 > 0 && <span className="text-[9px] text-blue-500 font-semibold whitespace-nowrap ml-1 shrink-0">(조정됨)</span>}
                                </div>
                            </div>
                            <div className="flex items-center justify-end shrink-0 pl-3 border-l border-slate-200">
                                <span className="text-slate-400 font-semibold text-[10px] mr-1">₩</span>
                                <input id={`price-input-${idx}`} data-field="price-input" type="number" className={`${cellInputBase} w-[70px] font-bold ${item.단가 === 0 ? 'border-rose-300 bg-rose-50 text-rose-600' : 'text-slate-800'}`} value={localPrice} onChange={handlePriceChange} onClick={(e) => e.stopPropagation()} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'price-input')} placeholder="0" />
                            </div>
                        </div>
                    </td>
                    <td className={`py-2 px-2 text-right ${isActiveMulti ? 'bg-slate-50/50' : ''} border-r border-slate-100 ${topBorderClass}`}>
                        <input id={`base-prev-${idx}`} data-field="base-prev" type="number" className={`${cellInputBase} font-semibold ${item.기초 < 0 ? 'text-rose-600 border-rose-200' : 'text-slate-700'}`} value={localPrev} onChange={handlePrevChange} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-prev')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>
                    <td className={`py-2 px-2 text-right border-r border-slate-100 ${topBorderClass}`}>
                        <input id={`base-in-${idx}`} data-field="base-in" type="number" className={`${cellInputBase} font-bold ${totalIn > 0 ? 'text-emerald-600' : 'text-slate-400'}`} value={localIn} onChange={handleInChange} onFocus={e => e.target.select()} onKeyDown={(e) => handleKd(e, 'base-in')} onWheel={e => e.target.blur()} placeholder="0" />
                    </td>

                    const cRect = container.getBoundingClientRect();

                    const header = document.querySelector('thead.sticky');
                    const hRect = header ? header.getBoundingClientRect() : null;

                    const visibleTopGap = Math.max(72, stickyBottom - cRect.top + 44);
                    const workHeight = Math.max(240, cRect.height - visibleTopGap - 48);
                    const targetTop = visibleTopGap + Math.floor(workHeight * 0.5);
                    const nextTop = container.scrollTop + (rRect.top - cRect.top) - targetTop + (rRect.height / 2);
                    container.scrollTo({ top: Math.max(0, nextTop), behavior: 'smooth' });

            const handleIssueJump = useCallback((type, direction = 'next', fromCardClick = false) => {
                setActiveIssueMode(type); setSearchInputVal(''); setFilters(prev => ({ ...prev, search: '', issuesOnly: false, excludeZeroActual: false, reviewType: null, category: 'ALL', favoriteVendorOnly: false, unit: { ...CONFIG_MODULE.defaultUnitFilter } }));

                    const focusIssueTarget = (attempt = 0) => {
                        const safeBatch = window.CSS && CSS.escape ? CSS.escape(targetItem.batchKey) : String(targetItem.batchKey).replace(/"/g, '\\"');
                        const row = document.querySelector(`tr[data-batch="${safeBatch}"]`);
                        if (!row) {
                            if (attempt < 12) setTimeout(() => focusIssueTarget(attempt + 1), 80);
                            return;
                        }

                        const targetField = type === 'missingPrice' ? 'price-input' : 'actual-input';
                        const input = row.querySelector(`input[data-field="${targetField}"]`) || row.querySelector(`input[id^="${targetField}-"]`);
                        scrollIssueRowIntoWorkCenter(row, input, type);

                        const colorClass = type === 'missingPrice' ? 'bg-rose-50' : (type === 'multiPrice' ? 'bg-blue-50' : 'bg-orange-50');
                        row.classList.add(colorClass); setTimeout(() => row.classList.remove(colorClass), 1500);

                        if (!input) {
                            if (attempt < 12) setTimeout(() => focusIssueTarget(attempt + 1), 80);
                            return;
                        }

                        setTimeout(() => {
                            input.classList.add('ring-2', 'ring-rose-500', 'border-rose-500', 'bg-rose-50');
                            setTimeout(() => input.classList.remove('ring-2', 'ring-rose-500', 'border-rose-500', 'bg-rose-50'), 1600);
                        }, 220);
                    };
                    setTimeout(() => focusIssueTarget(0), 180);
                };

                // 역탭/< : 사용자가 지나온 경로로만 복귀한다. 현재 항목을 완료 처리하지 않는다.
                if (direction === 'prev') {
                    let historyTarget = null;
                    while (issueJumpHistoryRef.current.length > 0 && !historyTarget) {
                        const last = issueJumpHistoryRef.current.pop();
                        if (!last || last.type !== type) continue;
                        const foundIndex = productData.findIndex(p => p.batchKey === last.batchKey);
                        if (foundIndex >= 0) historyTarget = { ...productData[foundIndex], index: foundIndex };
                    }

                    if (historyTarget) {
                        focusIssueTargetByItem(historyTarget);
                    } else {
                        setAlertMsg('이전 이동 경로가 없습니다.');
                    }
                    return;
                }

                if (currIdx !== -1 && !fromCardClick) {
                    const currentItemForHistory = productData[currIdx];
                    if (currentItemForHistory) {
                        issueJumpHistoryRef.current.push({ type, batchKey: currentItemForHistory.batchKey, index: currIdx });
                        if (issueJumpHistoryRef.current.length > 100) issueJumpHistoryRef.current.shift();
                    }

                    setProductData(prev => {
                        const newData = [...prev]; const itemToAck = newData[currIdx];
                        if (itemToAck) {
                            let needsUpdate = false; const item = { ...itemToAck };
                            if (!item.수기확인완료) { item.수기확인완료 = true; needsUpdate = true; }
                            if (item.이슈 && item.이슈.some(i => i.includes('🚨'))) { item.이슈 = item.이슈.map(msg => msg.replace(/🚨/g, '✅')); needsUpdate = true; }
                            if (needsUpdate) newData[currIdx] = item;

                        return newData;
                    });
                    if (type === 'multiPrice') { const currentItem = productData[currIdx]; if (currentItem && multiPriceCodes.includes(currentItem.코드)) setAckMultiCodes(prev => new Set(prev).add(currentItem.코드)); }

                                                            <span className="font-semibold text-slate-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-100 hover:text-rose-600 hover:border-rose-300 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-rose-600 font-bold hover:text-rose-800 hover:bg-rose-50 border border-transparent hover:border-rose-200 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-slate-800 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-slate-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
