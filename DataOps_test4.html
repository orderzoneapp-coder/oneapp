                    // v8.99zs: 업로드불가 항목은 별도 시트로 분리하지 않고 확인필요 시트 최상단에 병합한다.
                    // 치명 항목은 판매입력 행에서는 제외하되, 나머지 정상 행의 엑셀 생성은 계속 진행한다.
                    const wb = XLSX.utils.book_new();
                    const uploadColumns = ['일자','순번','거래처코드','거래처명','출하창고','거래유형','전잔액','전달사항','품목코드','품목명','규격','수량','단가','외화금액','공급가액','적요','출고지시','공지','구매처','날짜','구매','생산전표생성'];
                    const outputRows = rows.map(r => {

                    const wsUpload = XLSX.utils.json_to_sheet(outputRows.length ? outputRows : [Object.fromEntries(uploadColumns.map(c => [c, '']))], { header: uploadColumns });
                    wsUpload['!cols'] = [10,8,12,16,8,10,10,14,14,34,14,10,12,10,14,18,18,12,18,10,12,14].map(wch => ({ wch }));

                    const previewColumns = ['일자','거래처명','no.','품목코드','품명','수량','단가','공급가','적요','출고지시','출고가 (공지)','구매처','구매','구매합계','정리','정산','수수료'];

                            '품명': r['품목명'] || '',
                            '수량': qty,
                            '단가': price || '',
                            '공급가': supply || '',
                            '적요': r['적요'] || '',
                            '출고지시': r['출고지시'] || '',
                            '출고가 (공지)': r['공지'] || '',
                            '구매처': r['구매처'] || '',
                            '구매': cost || '',

                            '정리': price && cost ? unitProfit : '',
                            '정산': price && cost ? settlement : '',

                        '품명': e.name || '',

                        '품목코드': e.code || '',
                        '품명': e.name || '',

            const handleValidateTransferSalesPrice = useCallback(async (targetFiles = files) => {

                                    '수익률': margin,
                                    '확인': issueText,
                                    '비고': issueDetails ? `상세상품: ${issueDetails}` : ''
                                };
                            }
                            return {
                                '상품': a.spec ? `${a.name} ${a.spec}`.trim() : a.name,
                                '수량': a.qty,
                                '공급가': Math.round(a.supply),
                                '공제': Math.round(a.fee),
                                '실매출': Math.round(a.netSales),
                                '매입가': Math.round(a.cost),
                                '수익': Math.round(a.profit),
                                '수익률': margin,
                                '확인': issueText,
                                '비고': issueDetails ? `거래처: ${issueDetails}` : ''
                            };
                        }).sort((a, b) => {
                            if (mode === 'customer') {
                                return safeStr(a['그룹']).localeCompare(safeStr(b['그룹']), 'ko') ||
                                    safeStr(a['거래처']).localeCompare(safeStr(b['거래처']), 'ko');
                            }
                            return safeStr(a['상품']).localeCompare(safeStr(b['상품']), 'ko');
                        });
                    };
                    const isListingFeeCustomer = (customerName = '') => ['1마산', '2중앙'].includes(safeStr(customerName, '').trim());
                    const makeReportSheet = (title, summaryRows = [], detailColumns = [], detailRows = []) => {
                        const aoa = [[title], [], ['수익 요약', '값']];
                        const summary = summaryRows[0] || {};
                        Object.entries(summary).forEach(([k, v]) => aoa.push([k, v]));
                        aoa.push([], detailColumns);
                        (detailRows.length ? detailRows : [{ '메시지': '데이터 없음' }]).forEach(row => aoa.push(detailColumns.map(col => row[col] ?? '')));
                        return aoa;
                    };
                    const makeSimpleSheet = (title, columns = [], rows = []) => {
                        const aoa = [[title], [], columns];
                        if (rows.length) rows.forEach(row => aoa.push(columns.map(col => row[col] ?? '')));
                        else aoa.push(['데이터 없음']);
                        return aoa;
                    };
                    const aggregateTransferPriceChanges = (rows = []) => {
                        // 단가확인은 기준단가(단가공지 우선, 없으면 그룹 기준가)와 판매현황 판매가를 비교한다.
                        // 기존 단가변동 외에 입고가/매입원가가 없는 행도 단가확인 시트에 추출한다.
                        const map = {};
                        rows.forEach(r => {
                            const qty = safeNum(r['판매수량']);
                            const groupName = safeStr(r['거래처그룹'], '미지정');
                            const customer = safeStr(r['보고거래처'] || r['거래처명'], '미지정');
                            const itemName = safeStr(r['품명'], '');
                            const noticePrice = safeNum(r['기준단가']);
                            const salesPrice = safeNum(r['실제판매단가']);
                            const costPrice = safeNum(r['매입원가']);
                            if (qty === 0) return;

                            const checks = [];
                            if (noticePrice > 0 && salesPrice > 0 && noticePrice !== salesPrice) checks.push(salesPrice > noticePrice ? '단가인상' : '단가인하');
                            if (costPrice <= 0) checks.push('입고가 없음');
                            if (!checks.length) return;

                            const diff = salesPrice - noticePrice;
                            const key = `${groupName}|${customer}|${itemName}|${noticePrice}|${salesPrice}|${costPrice}|${checks.join('/')}`;
                            if (!map[key]) {
                                map[key] = {
                                    '그룹': groupName,
                                    '거래처': customer,
                                    '상품': itemName,
                                    '수량': 0,
                                    '공지가': noticePrice > 0 ? Math.round(noticePrice) : '',
                                    '판매가': salesPrice > 0 ? Math.round(salesPrice) : '',
                                    '차이': noticePrice > 0 && salesPrice > 0 ? Math.round(diff) : '',
                                    '입고가': costPrice > 0 ? Math.round(costPrice) : '',
                                    '확인': checks.join(', ')
                                };
                            }
                            map[key]['수량'] += qty;
                        });
                        return Object.values(map).sort((a, b) =>
                            safeStr(a['그룹']).localeCompare(safeStr(b['그룹']), 'ko') ||
                            safeStr(a['거래처']).localeCompare(safeStr(b['거래처']), 'ko') ||
                            safeStr(a['상품']).localeCompare(safeStr(b['상품']), 'ko') ||
                            safeStr(a['확인']).localeCompare(safeStr(b['확인']), 'ko')
                        );
                    };

                    const transferMap = {};
                    const transferFeeVendors = {};
                    const salesExcludedRows = [];
                    const ensureRow = (code, name) => {
                        const key = code || 'NO_CODE';
                        if (!transferMap[key]) {
                            transferMap[key] = {
                                code: key,
                                name: name || '이름없음',
                                purchaseQty: 0,
                                purchaseAmount: 0,
                                salesQty: 0,
                                supplyAmount: 0,
                                feeAmount: 0,
                                purchaseVendors: {},
                                salesVendors: {},
                                costDetailRows: []
                            };
                        }
                        if (name && transferMap[key].name === '이름없음') transferMap[key].name = name;
                        return transferMap[key];
                    };

                    parsedIn.forEach(item => {
                        const raw = item._raw || {};
                        if (!isTransferRow(item, targetFiles.in.name) || isReportFooterOrSummaryRow(item)) {
                            transferCleanStats.purchaseSkipped++;
                            return;
                        }
                        const code = getCode(item);
                        const name = getName(item);
                        const qty = parseNumber(getRawCell(raw, ['입고수량', '수량', '구매수량', '매입수량']) ?? item.수량);
                        const price = parseNumber(getRawCell(raw, ['출고(외노)', '입고가', '단가', '구매단가', '매입단가', '매입단가(원가)', '원가', '상장가']) ?? item.단가);
                        const vendor = safeStr(getRawCell(raw, ['구매처', '원구매처', '매입처', '거래처명', '거래처', 'no', 'NO', '3거래']) ?? item.거래처, '미지정');
                        if (!code || !name || safeNum(qty) === 0) {
                            transferCleanStats.purchaseSkipped++;
                            return;
                        }
                        const row = ensureRow(code, name);
                        row.purchaseQty += qty;
                        row.purchaseAmount += qty * price;
                        addVendorSummary(row.purchaseVendors, vendor, qty, qty * price, 0);
                        if (qty || price) row.costDetailRows.push(`${vendor} ${formatMoney(qty)}×${formatMoney(price)}`);
                    });

                    parsedOut.forEach(item => {
                        const raw = item._raw || {};
                        if (!isTransferRow(item, targetFiles.out.name)) {
                            transferCleanStats.salesSkipped++;
                            return;
                        }
                        const code = getCode(item);
                        const name = getName(item);
                        const qty = parseNumber(getRawCell(raw, ['출고수량', '판매수량', '수량', '판매량', '출고량']) ?? item.수량);
                        const unitPrice = parseNumber(getRawCell(raw, ['판매단가', '단가', '출고가', '출고가 (공지)', '출고가(공지)', '청과', '정과']) ?? item.단가);
                        const supply = parseNumber(getRawCell(raw, ['공급가', '공급가액', '최종공급가액', '최종공급가액(할인적용)', '판매금액', '금액']) ?? 0) || (qty * unitPrice);
                        const explicitFee = parseNumber(getRawCell(raw, ['공제금액', '공제', '수수료', '공제수수료']) ?? 0);
                        // v8.99e: 9602011002/공제금액 행은 수수료 열이 아니라 실제 공제 금액 열을 우선 집계한다.
                        // 우선순위: 공급가 > 정산 > 정리 > 공급가액/금액 > 단가×수량 > 단가
                        const deductionAmount = parseNumber(getRawCell(raw, ['공급가', '정산', '정리', '공급가액', '최종공급가액', '최종공급가액(할인적용)', '판매금액', '금액']) ?? 0) || (qty * unitPrice) || unitPrice;
                        const vendorRaw = safeStr(getRawCell(raw, ['거래처명', '거래처', '매출처명', '판매처', '3거래']) ?? item.거래처, '');
                        const vendor = vendorRaw || '미지정';
                        const rowFee = isListingFeeCustomer(vendor) ? explicitFee : 0;

                        if (isTransferFeeRow(item)) {
                            if (isListingFeeCustomer(vendor)) {
                                const feeValue = deductionAmount;
                                transferCleanStats.feeRows++;
                                transferCleanStats.feeAmount += feeValue;
                                addVendorSummary(transferFeeVendors, vendor, 0, 0, feeValue);
                            }
                            return;
                        }
                        if (isReportFooterOrSummaryRow(item)) {
                            transferCleanStats.salesSkipped++;
                            return;
                        }
                        const fatalReasons = [];
                        if (!vendorRaw) fatalReasons.push('거래처명 없음');
                        if (!code) fatalReasons.push('품목코드 없음');
                        if (safeNum(qty) === 0) fatalReasons.push('수량 없음');
                        if (!name) fatalReasons.push('품명 없음');
                        if (fatalReasons.length) {
                            transferCleanStats.salesSkipped++;
                            salesExcludedRows.push({
                                '구분': '판매제외', '심각도': '높음', '거래처명': vendorRaw, '품목코드': code, '품명': name,
                                '규격': safeStr(getRawCell(raw, ['규격', '규격명']) ?? '', ''), '수량': qty,
                                '사유': fatalReasons.join(', '), '필요조치': '원본 판매현황 수정 후 다시 업로드'
                            });
                            return;
                        }
                        const row = ensureRow(code, name);
                        row.salesQty += qty;
                        row.supplyAmount += supply;
                        row.feeAmount += rowFee;
                        addVendorSummary(row.salesVendors, vendor, qty, supply, rowFee);
                    });

                    const finalRows = Object.values(transferMap)
                        .filter(row => safeNum(row.purchaseQty) !== 0 || safeNum(row.salesQty) !== 0)
                        .sort((a, b) => safeStr(a.code).localeCompare(safeStr(b.code)) || safeStr(a.name).localeCompare(safeStr(b.name)))
                        .map((row, idx) => {
                            const balance = safeNum(row.purchaseQty) - safeNum(row.salesQty);
                            const avgCost = safeNum(row.purchaseQty) !== 0 ? row.purchaseAmount / row.purchaseQty : 0;
                            const transferInfo = {
                                purchaseQty: row.purchaseQty,
                                salesQty: row.salesQty,
                                balance,
                                purchaseAmount: row.purchaseAmount,
                                supplyAmount: row.supplyAmount,
                                feeAmount: row.feeAmount,
                                purchaseSummary: summarizeMap(row.purchaseVendors),
                                salesSummary: summarizeMap(row.salesVendors),
                                costDetail: row.costDetailRows.join(' / '),
                                purchaseVendors: row.purchaseVendors,
                                salesVendors: row.salesVendors,
                                feeSummary: ''
                            };
                            return {
                                batchKey: `TRANSFER_DIRECT|${row.code}|${idx}`,
                                코드: row.code,
                                품명: row.name,
                                단위: '',
                                거래처: '2전송검증',
                                일자: '',
                                기초: 0,
                                입고: row.purchaseQty,
                                출고: row.salesQty,
                                대체입고: 0,
                                대체출고: 0,
                                전산잔량: balance,
                                실사: balance,
                                로스: 0,
                                단가: avgCost,
                                매출액: row.supplyAmount,
                                매출원가: row.purchaseAmount,
                                메모: [
                                    row.purchaseVendors && Object.keys(row.purchaseVendors).length ? `구매:${summarizeMap(row.purchaseVendors)}` : '',
                                    row.salesVendors && Object.keys(row.salesVendors).length ? `판매:${summarizeMap(row.salesVendors)}` : '',
                                    row.costDetailRows.length ? `원가:${row.costDetailRows.join(' / ')}` : ''
                                ].filter(Boolean).join(' | '),
                                이슈: [],
                                출고내역: {},
                                _orig: { 기초: 0, 입고: row.purchaseQty, 출고: row.salesQty, 단가: avgCost },
                                isDummy: false,
                                수기확인완료: true,
                                _analysisMode: 'TRANSFER_DIRECT_CHECK',
                                _transfer: transferInfo
                            };
                        });

                    if (finalRows.length > 0 && safeNum(transferCleanStats.feeAmount) !== 0) {
                        // 공제금액은 상품 잔량 계산에는 넣지 않고, 전체 매출/수익 요약에만 차감 반영한다.
                        finalRows[0].매출액 = safeNum(finalRows[0].매출액) + safeNum(transferCleanStats.feeAmount);
                        finalRows[0]._transfer.feeAmount = safeNum(finalRows[0]._transfer.feeAmount) + safeNum(transferCleanStats.feeAmount);
                        finalRows[0]._transfer.feeSummary = summarizeFeeMap(transferFeeVendors);
                        finalRows[0].메모 = [finalRows[0].메모, `공제:${formatMoney(transferCleanStats.feeAmount)} ${summarizeFeeMap(transferFeeVendors)}`].filter(Boolean).join(' | ');
                    }

                    // v8.99zw: 판매가검증은 단가확인 시트로만 단순 출력한다.
                    // 단가확인은 행단위가 아니라 거래처+세부거래처+상품 기준 합계로 출력하고, 입고가 없음도 함께 추출한다.
                    const transferPriceConfigForExport = buildTransferPriceConfig();
                    const purchasePriceRows = [];
                    const purchaseByCustomerCode = {};
                    const purchaseByDetailCustomerCode = {};
                    const purchaseByCode = {};
                    parsedIn.forEach(item => {
                        if (!isTransferRow(item, targetFiles.in.name) || isReportFooterOrSummaryRow(item) || isTransferFeeRow(item)) return;
                        if (!isTransferGenerationValidPurchaseRow(item)) return;
                        const resolved = resolveTransferSalesPrice(item);
                        const f = resolved.base || getTransferBaseFields(item);
                        const outputCustomer = getTransferOutputCustomerName(resolved);
                        const noticePrice = transferStrictNumber(f.notice);
                        const rec = {
                            code: f.code, name: f.name, spec: f.spec || f.detailCustomer || '', qty: f.qty,
                            outputCustomer, purchaseVendor: f.purchaseVendor || '', cost: safeNum(f.cost),
                            status: resolved.status, price: safeNum(resolved.price), noticePrice,
                            priceKey: noticePrice > 0 ? '단가공지' : (resolved.priceKey || ''),
                            groupName: resolved.groupName || '', rulePath: resolved.rulePath || '', profitMode: resolved.profitMode || 'NORMAL'
                        };
                        purchasePriceRows.push(rec);
                        const customerCodeKey = `${outputCustomer}|${f.code}`;
                        const detailCustomerCodeKey = `${f.detailCustomer || outputCustomer}|${f.code}`;
                        if (!purchaseByCustomerCode[customerCodeKey]) purchaseByCustomerCode[customerCodeKey] = [];
                        if (!purchaseByDetailCustomerCode[detailCustomerCodeKey]) purchaseByDetailCustomerCode[detailCustomerCodeKey] = [];
                        if (!purchaseByCode[f.code]) purchaseByCode[f.code] = [];
                        purchaseByCustomerCode[customerCodeKey].push(rec);
                        purchaseByDetailCustomerCode[detailCustomerCodeKey].push(rec);
                        purchaseByCode[f.code].push(rec);
                    });

                    const priceValidationRows = [];
                    const profitDetailRows = [];
                    const checkRows = [];
                    parsedOut.forEach((item, idx) => {
                        const raw = item._raw || {};
                        if (!isTransferRow(item, targetFiles.out.name) || isReportFooterOrSummaryRow(item)) return;
                        const code = getCode(item);
                        const name = getName(item);
                        if (isTransferFeeRow(item)) return;
                        const customer = safeStr(getRawCell(raw, ['거래처명', '거래처', '매출처명', '판매처', '3거래']) ?? item.거래처, '미지정');
                        const detailCustomer = safeStr(getRawCell(raw, ['NO.', 'NO', 'No.', '세부거래처', '거래처세부']) ?? '', '');
                        const reportCustomer = detailCustomer || customer;
                        const spec = safeStr(getRawCell(raw, ['규격', '규격명', '포장규격', '상품규격']) ?? '', '');
                        const qty = parseNumber(getRawCell(raw, ['출고수량', '판매수량', '수량', '판매량', '출고량']) ?? item.수량);
                        const actualPrice = parseNumber(getRawCell(raw, ['판매단가', '단가', '출고가', '출고가 (공지)', '출고가(공지)', '청과', '정과']) ?? item.단가);
                        const supply = parseNumber(getRawCell(raw, ['공급가', '공급가액', '최종공급가액', '최종공급가액(할인적용)', '판매금액', '금액']) ?? 0) || (qty * actualPrice);
                        const fee = isListingFeeCustomer(customer) ? parseNumber(getRawCell(raw, ['수수료', '공제금액', '공제', '공제수수료']) ?? 0) : 0;
                        if (!code || !name || safeNum(qty) === 0) return;
                        const chooseTransferPriceMatch = (candidates = []) => {
                            const list = (candidates || []).filter(Boolean);
                            if (!list.length) return null;
                            if (actualPrice > 0) {
                                // 단가공지는 최우선 기준이다. 판매현황 단가가 공지단가와 같으면 단가변동 이슈로 보지 않는다.
                                const noticeExact = list.find(r => safeNum(r.noticePrice) > 0 && safeNum(r.noticePrice) === actualPrice);
                                if (noticeExact) return noticeExact;
                                const baseExact = list.find(r => safeNum(r.price) > 0 && safeNum(r.price) === actualPrice);
                                if (baseExact) return baseExact;
                            }
                            return list[0] || null;
                        };
                        const detailCandidates = purchaseByDetailCustomerCode[`${reportCustomer}|${code}`] || [];
                        const customerCandidates = purchaseByCustomerCode[`${customer}|${code}`] || [];
                        const codeCandidates = purchaseByCode[code] || [];
                        const match = chooseTransferPriceMatch(detailCandidates) || chooseTransferPriceMatch(customerCandidates) || chooseTransferPriceMatch(codeCandidates);
                        const noticePrice = match ? safeNum(match.noticePrice) : 0;
                        const basePrice = match ? (noticePrice > 0 ? noticePrice : safeNum(match.price)) : 0;
                        const appliedPriceKey = match ? (noticePrice > 0 ? '단가공지' : safeStr(match.priceKey, '')) : '';
                        const cost = match ? safeNum(match.cost) : 0;
                        const costAmount = qty * cost;
                        const netSales = supply - fee;
                        const profit = match && match.profitMode === 'ZERO_PROFIT' ? 0 : netSales - costAmount;
                        const reasons = [];
                        if (!match) reasons.push('구매현황 매칭 없음');
                        if (match && match.status === 'CUSTOMER_GROUP_MISSING') reasons.push('거래처 단가그룹 없음');
                        if (match && match.status === 'PRICE_MISSING') reasons.push('기준단가 없음');
                        if (actualPrice <= 0) reasons.push('판매단가 없음');
                        if (match && match.profitMode !== 'ZERO_PROFIT' && cost <= 0) reasons.push('입고가 없음');
                        if (match && basePrice > 0 && actualPrice > 0 && actualPrice !== basePrice) reasons.push(actualPrice > basePrice ? '단가인상' : '단가인하');
                        const resultText = reasons.length ? reasons.join(', ') : '확인완료';
                        const priceRow = {
                            '거래처명': customer, '보고거래처': reportCustomer, '세부거래처': detailCustomer, '거래처그룹': match ? match.groupName : '',
                            '품목코드': code, '품명': name, '규격': spec, '판매수량': qty,
                            '실제판매단가': actualPrice, '기준단가': basePrice, '적용단가명': appliedPriceKey,
                            '단가룰': match ? match.rulePath : '', '단가차이': actualPrice - basePrice,
                            '공급가액': Math.round(supply), '공제금액': Math.round(fee), '실매출': Math.round(netSales),
                            '매입원가': cost, '매입원가합계': Math.round(costAmount), '수익': Math.round(profit),
                            '수익률(%)': netSales !== 0 ? ((profit / netSales) * 100).toFixed(1) + '%' : '0.0%',
                            '검증결과': resultText
                        };
                        priceValidationRows.push(priceRow);
                        profitDetailRows.push({ ...priceRow, '구매처': match ? match.purchaseVendor : '' });
                        if (reasons.length) checkRows.push({
                            '구분': '확인필요', '심각도': reasons.some(r => r.includes('없음')) ? '중간' : '낮음',
                            '거래처명': customer, '품목코드': code, '품명': name, '규격': spec, '수량': qty,
                            '공급가액': Math.round(supply), '매입원가': Math.round(costAmount), '수익': Math.round(profit),
                            '수익률': netSales !== 0 ? ((profit / netSales) * 100).toFixed(1) + '%' : '0.0%',
                            '사유': resultText, '필요조치': '구매현황/판매현황/매핑설정 확인'
                        });
                    });

                    const transferExportRows = finalRows.map(item => {
                        const t = item._transfer || {};
                        return {
                            '품목코드': item.코드 === 'NO_CODE' ? '' : safeStr(item.코드, '').replace(/\.0$/, '').trim(),
                            '품명': item.품명,
                            '구매수량': safeNum(t.purchaseQty),

                                                                        isActiveMulti={activeMultiCode === item.코드}
                                                                        isMultiGroupItem={multiPriceCodes.includes(item.코드)} 
                                                                        targetDateStr={targetDateStr}
                                                                        onStockChange={handleManualStockChange} onSpacebar={handleSpacebarLink} 
                                                                        onFocusInput={handleFocusInput} onBaseDataChange={handleBaseDataChange}
                                                                        onOpenMemo={(key, text) => setMemoModal({ isOpen: true, batchKey: key, text })}
                                                                        onSalesMove={handleChipDropRequest}
                                                                        internalLotMapping={mappings.internalLot}
                                                                        isGroupStart={isGroupStart}
                                                                        isNewCategory={isNewCategory}
                                                                    />
                                                                </React.Fragment>
                                                            );
                                                            })
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {splitModal.isOpen && (
                        <div className="fixed inset-0 z-[400] bg-slate-900 bg-opacity-60 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-xs modal-bounce">
                                <h3 className="font-bold text-slate-800 mb-3 text-lg"><i className="fas fa-cut text-blue-500 mr-2"></i>분할 이동 수량</h3>
                                <p className="text-xs text-slate-500 mb-4">최대 <span className="font-bold text-blue-600">{splitModal.payload && splitModal.payload.maxQty}</span>개까지 분할하여 이동할 수 있습니다.</p>
                                <input
                                    id="split-qty-input"
                                    type="number"
                                    min="1"
                                    max={splitModal.payload ? splitModal.payload.maxQty : 1}
                                    defaultValue={splitModal.payload ? splitModal.payload.maxQty : 1}
                                    className="w-full border border-slate-300 rounded-lg p-3 text-lg font-bold text-center focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4"
                                    autoFocus
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') {
                                            const val = Number(e.target.value);
                                            if (splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) {
                                                handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val);
                                                setSplitModal({isOpen: false, payload: null});
                                            }
                                        }
                                    }}
                                />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setSplitModal({isOpen: false, payload: null})} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition">취소</button>
                                    <button onClick={() => {
                                        const val = Number(document.getElementById('split-qty-input').value);
                                        if (splitModal.payload && val > 0 && val <= splitModal.payload.maxQty) {
                                            handleSalesMove(splitModal.payload.sourceKey, splitModal.payload.targetKey, splitModal.payload.vendor, val);
                                            setSplitModal({isOpen: false, payload: null});
                                        }
                                    }} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">분할 이동</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {undoUi.state === 'list' && (
                        <div className="fixed inset-0 z-[200] bg-slate-900 bg-opacity-70 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col modal-bounce border border-slate-200">
                                <div className="bg-slate-900 p-5 flex justify-between items-center text-white">
                                    <h3 className="font-black text-lg"><i className="fas fa-history text-slate-400 mr-2"></i>재고조정 내역 목록</h3>
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="text-slate-400 hover:text-white transition"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto max-h-[60vh] bg-slate-50">
                                    {substHistory.length === 0 ? (
                                        <div className="text-center text-slate-500 py-10 font-medium">조정 내역이 없습니다.</div>
                                    ) : (
                                        <table className="w-full text-sm text-left border-collapse bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
                                            <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                <tr>
                                                    <th className="p-3 font-semibold">원물 (차감 내역)</th>
                                                    <th className="p-3 font-semibold">소분/대체 (증가 내역)</th>
                                                    <th className="p-3 text-right font-semibold">작업</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {[...substHistory].reverse().map(h => (
                                                    <tr key={h.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-rose-600 font-black">-{h.sQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.sourceName}</span>
                                                        </td>
                                                        <td className="p-3">
                                                            <span className="inline-block w-8 text-blue-600 font-black">+{h.tQty}</span> 
                                                            <span className="font-semibold text-slate-800">{h.targetName}</span>
                                                        </td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleUndoAction(h)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-100 hover:text-rose-600 hover:border-rose-300 text-xs font-bold transition shadow-sm">개별 취소</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                <div className="bg-white p-4 border-t border-slate-200 flex justify-between items-center">
                                    {substHistory.length > 0 ? (
                                        <button onClick={handleUndoAll} className="text-rose-600 font-bold hover:text-rose-800 hover:bg-rose-50 border border-transparent hover:border-rose-200 px-4 py-2 rounded-lg text-sm transition"><i className="fas fa-trash-alt mr-2"></i>모두 취소</button>
                                    ) : <div></div>}
                                    <button onClick={() => setUndoUi({ state: 'closed' })} className="bg-slate-800 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-slate-900 shadow-md transition">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
